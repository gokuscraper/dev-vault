<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.upload-area{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.upload-area{grid-template-columns:1fr}}
.drop-zone{border:2px dashed #333;border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:border-color 0.2s}
.drop-zone:hover,.drop-zone.drag{border-color:#3b82f6}
.drop-zone h4{color:#4da6ff;font-size:0.85rem;margin-bottom:6px}
.drop-zone p{color:#888;font-size:0.8rem}
.drop-zone input{display:none}
.drop-zone.loaded{border-color:#22c55e;border-style:solid}
.drop-zone.loaded h4{color:#22c55e}
.workspace{display:none}
.mode-tabs{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
.mode-tab{padding:6px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.mode-tab:hover{border-color:#3b82f6;color:#4da6ff}
.mode-tab.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.compare-container{position:relative;background:#161616;border:1px solid #222;border-radius:10px;overflow:hidden;margin-bottom:14px;user-select:none;-webkit-user-select:none;touch-action:none}
.compare-container canvas{display:block;width:100%;height:auto}
.slider-line{position:absolute;top:0;bottom:0;width:3px;background:#fff;cursor:ew-resize;z-index:5;box-shadow:0 0 6px rgba(0,0,0,0.5)}
.slider-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:#fff;border-radius:50%;cursor:ew-resize;z-index:6;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.slider-handle::before{content:'◄►';color:#333;font-size:11px;font-weight:bold}
.label-left,.label-right{position:absolute;top:10px;padding:4px 10px;background:rgba(0,0,0,0.6);color:#fff;border-radius:6px;font-size:0.75rem;font-weight:600;z-index:4}
.label-left{left:10px}
.label-right{right:10px}
.side-by-side{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:#161616;border:1px solid #222;border-radius:10px;overflow:hidden;margin-bottom:14px}
.side-by-side canvas{display:block;width:100%;height:auto}
.diff-view{position:relative;background:#161616;border:1px solid #222;border-radius:10px;overflow:hidden;margin-bottom:14px}
.diff-view canvas{display:block;width:100%;height:auto}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 16px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.85rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.info{font-size:0.78rem;color:#666;text-align:center;margin-top:8px}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>Image Compare</h1>
<p class="sub">Compare two images with a slider — nothing uploaded</p>

<div class="upload-area" id="uploadArea">
<div class="drop-zone" id="dropA" onclick="document.getElementById('fileA').click()">
<h4>Before (Left)</h4>
<p>Drop image or click</p>
<input type="file" id="fileA" accept="image/*">
</div>
<div class="drop-zone" id="dropB" onclick="document.getElementById('fileB').click()">
<h4>After (Right)</h4>
<p>Drop image or click</p>
<input type="file" id="fileB" accept="image/*">
</div>
</div>

<div class="workspace" id="workspace">
<div class="mode-tabs">
<div class="mode-tab active" data-mode="slider">Slider</div>
<div class="mode-tab" data-mode="side">Side by Side</div>
<div class="mode-tab" data-mode="diff">Difference</div>
</div>

<div id="viewSlider">
<div class="compare-container" id="compareContainer">
<canvas id="canvasA"></canvas>
<div class="slider-line" id="sliderLine"></div>
<div class="slider-handle" id="sliderHandle"></div>
<div class="label-left">Before</div>
<div class="label-right">After</div>
</div>
</div>

<div id="viewSide" style="display:none">
<div class="side-by-side">
<canvas id="canvasSideA"></canvas>
<canvas id="canvasSideB"></canvas>
</div>
</div>

<div id="viewDiff" style="display:none">
<div class="diff-view">
<canvas id="canvasDiff"></canvas>
</div>
</div>

<div class="actions">
<button class="btn" onclick="swapImages()">Swap Images</button>
<button class="btn" onclick="resetAll()">New Compare</button>
</div>
<div class="info">All processing happens locally in your browser.</div>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/image-filter/">Image Filter</a> | <a href="https://gokuscraper.github.io/dev-vault/image-crop/">Image Crop</a> | <a href="https://gokuscraper.github.io/dev-vault/image-resize/">Image Resize</a></div>
</div>

<script>
let imgA=null,imgB=null;
let displayW=0,displayH=0;
let sliderPos=0.5;
let currentMode='slider';

// File handling for both drop zones
function setupDrop(zoneId,inputId,side){
  const zone=document.getElementById(zoneId);
  const input=document.getElementById(inputId);
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.classList.remove('drag');
    if(e.dataTransfer.files.length)loadImg(e.dataTransfer.files[0],side,zone);
  });
  input.addEventListener('change',e=>{if(e.target.files.length)loadImg(e.target.files[0],side,zone)});
}
setupDrop('dropA','fileA','a');
setupDrop('dropB','fileB','b');

function loadImg(file,side,zone){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      if(side==='a')imgA=img;else imgB=img;
      zone.classList.add('loaded');
      zone.querySelector('p').textContent='✓ Loaded ('+img.width+'×'+img.height+')';
      if(imgA&&imgB)startCompare();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function startCompare(){
  // Use the larger of the two images' dimensions
  displayW=Math.max(imgA.width,imgB.width);
  displayH=Math.max(imgA.height,imgB.height);
  // Cap for performance
  const maxDim=2000;
  if(displayW>maxDim||displayH>maxDim){
    const s=maxDim/Math.max(displayW,displayH);
    displayW=Math.round(displayW*s);displayH=Math.round(displayH*s);
  }
  document.getElementById('workspace').style.display='block';
  renderCurrent();
}

function renderCurrent(){
  if(!imgA||!imgB)return;
  if(currentMode==='slider')renderSlider();
  else if(currentMode==='side')renderSide();
  else if(currentMode==='diff')renderDiff();
}

// Slider mode
function renderSlider(){
  const cA=document.getElementById('canvasA');
  cA.width=displayW;cA.height=displayH;
  const ctxA=cA.getContext('2d');

  // Draw image B as background
  ctxA.drawImage(imgB,0,0,displayW,displayH);

  // Clip image A to left portion
  const clipX=Math.round(sliderPos*displayW);
  ctxA.save();
  ctxA.beginPath();
  ctxA.rect(0,0,clipX,displayH);
  ctxA.clip();
  ctxA.drawImage(imgA,0,0,displayW,displayH);
  ctxA.restore();

  // Position slider elements
  const container=document.getElementById('compareContainer');
  const pct=(sliderPos*100).toFixed(2)+'%';
  document.getElementById('sliderLine').style.left=`calc(${pct} - 1.5px)`;
  document.getElementById('sliderHandle').style.left=pct;
}

// Slider drag
const container=document.getElementById('compareContainer');
let dragging=false;

function updateSlider(clientX){
  const rect=container.getBoundingClientRect();
  sliderPos=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
  renderSlider();
}

container.addEventListener('mousedown',e=>{dragging=true;updateSlider(e.clientX)});
document.addEventListener('mousemove',e=>{if(dragging)updateSlider(e.clientX)});
document.addEventListener('mouseup',()=>dragging=false);
container.addEventListener('touchstart',e=>{dragging=true;updateSlider(e.touches[0].clientX)},{passive:true});
document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();updateSlider(e.touches[0].clientX)}},{passive:false});
document.addEventListener('touchend',()=>dragging=false);

// Side by side
function renderSide(){
  const cA=document.getElementById('canvasSideA');
  const cB=document.getElementById('canvasSideB');
  cA.width=displayW;cA.height=displayH;
  cB.width=displayW;cB.height=displayH;
  cA.getContext('2d').drawImage(imgA,0,0,displayW,displayH);
  cB.getContext('2d').drawImage(imgB,0,0,displayW,displayH);
}

// Difference mode
function renderDiff(){
  const c=document.getElementById('canvasDiff');
  c.width=displayW;c.height=displayH;
  const ctxD=c.getContext('2d');

  // Draw imgA, get its pixel data
  ctxD.drawImage(imgA,0,0,displayW,displayH);
  const dataA=ctxD.getImageData(0,0,displayW,displayH);

  // Draw imgB, get its pixel data
  ctxD.drawImage(imgB,0,0,displayW,displayH);
  const dataB=ctxD.getImageData(0,0,displayW,displayH);

  // Compute difference
  const out=ctxD.createImageData(displayW,displayH);
  for(let i=0;i<dataA.data.length;i+=4){
    const dr=Math.abs(dataA.data[i]-dataB.data[i]);
    const dg=Math.abs(dataA.data[i+1]-dataB.data[i+1]);
    const db=Math.abs(dataA.data[i+2]-dataB.data[i+2]);
    const diff=dr+dg+db;
    if(diff>30){
      // Highlight differences in red
      out.data[i]=255;out.data[i+1]=50;out.data[i+2]=50;out.data[i+3]=200;
    }else{
      // Show grayscale of original
      const gray=Math.round(0.299*dataA.data[i]+0.587*dataA.data[i+1]+0.114*dataA.data[i+2]);
      out.data[i]=gray;out.data[i+1]=gray;out.data[i+2]=gray;out.data[i+3]=255;
    }
  }
  ctxD.putImageData(out,0,0);
}

// Mode switching
document.querySelectorAll('.mode-tab').forEach(tab=>{
  tab.onclick=()=>{
    currentMode=tab.dataset.mode;
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('viewSlider').style.display=currentMode==='slider'?'block':'none';
    document.getElementById('viewSide').style.display=currentMode==='side'?'block':'none';
    document.getElementById('viewDiff').style.display=currentMode==='diff'?'block':'none';
    renderCurrent();
  };
});

function swapImages(){
  if(!imgA||!imgB)return;
  [imgA,imgB]=[imgB,imgA];
  renderCurrent();
}

function resetAll(){
  imgA=null;imgB=null;sliderPos=0.5;
  document.getElementById('workspace').style.display='none';
  document.querySelectorAll('.drop-zone').forEach(z=>{
    z.classList.remove('loaded');
    z.querySelector('p').textContent='Drop image or click';
  });
  document.getElementById('fileA').value='';
  document.getElementById('fileB').value='';
}
</script>
</body>
</html>
