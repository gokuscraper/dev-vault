<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.drop-zone{border:2px dashed #333;border-radius:10px;padding:40px;text-align:center;cursor:pointer;margin-bottom:14px;transition:border-color 0.2s}
.drop-zone:hover,.drop-zone.drag{border-color:#3b82f6}
.drop-zone p{color:#888;font-size:0.9rem}
.drop-zone input{display:none}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
.sprites-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;min-height:40px}
.sprite-item{position:relative;width:64px;height:64px;border-radius:8px;border:2px solid #333;overflow:hidden;background:#0d0d0d}
.sprite-item img{width:100%;height:100%;object-fit:contain}
.sprite-item .remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:#ef4444;color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.sprite-item:hover .remove{display:flex}
.sprite-item .name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:#ccc;font-size:0.6rem;text-align:center;padding:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field{margin-bottom:10px}
.field label{display:block;font-size:0.78rem;color:#888;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.canvas-wrap{background:#161616;border:1px solid #222;border-radius:10px;padding:8px;text-align:center;overflow:auto;max-height:500px;margin-bottom:14px}
.canvas-wrap canvas{display:block;margin:0 auto;background:repeating-conic-gradient(#222 0% 25%,#161616 0% 50%) 50%/16px 16px}
.output-area{width:100%;min-height:100px;max-height:250px;background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:10px;color:#e6e6e6;font-family:'Fira Code',monospace;font-size:0.75rem;overflow:auto;white-space:pre}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{padding:8px 16px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.85rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.btn-primary{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.btn-primary:hover{background:#234080}
.btn-sm{padding:4px 10px;font-size:0.75rem}
.info{font-size:0.78rem;color:#666;text-align:center;margin-top:8px}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
.stats{font-size:0.78rem;color:#888;margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
<h1>Sprite Sheet Generator</h1>
<p class="sub">Combine images into a sprite sheet with CSS — nothing uploaded</p>

<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
<p>Drop multiple images here or click to select</p>
<input type="file" id="fileInput" accept="image/*" multiple>
</div>

<div class="section">
<h3>Sprites <span id="spriteCount" style="color:#888;font-size:0.75rem">(0)</span></h3>
<div class="sprites-list" id="spritesList"></div>
<button class="btn btn-sm" onclick="document.getElementById('addMore').click()">+ Add More</button>
<input type="file" id="addMore" accept="image/*" multiple style="display:none">
</div>

<div class="section">
<h3>Options</h3>
<div class="field-row">
<div class="field"><label>Layout</label><select id="layout" onchange="generate()">
<option value="horizontal">Horizontal</option>
<option value="vertical">Vertical</option>
<option value="grid">Grid (auto columns)</option>
</select></div>
<div class="field"><label>Padding (px)</label><input id="padding" type="number" value="2" min="0" max="50" onchange="generate()"></div>
</div>
<div class="field-row">
<div class="field"><label>CSS Class Prefix</label><input id="prefix" value="sprite" oninput="generate()"></div>
<div class="field"><label>Sprite Image Path</label><input id="imgPath" value="sprite.png" oninput="generate()"></div>
</div>
</div>

<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
<div class="stats" id="stats"></div>

<div class="section">
<h3>Generated CSS <button class="btn btn-sm" style="margin-left:auto" onclick="copyCSS()">Copy</button></h3>
<div class="output-area" id="cssOutput"></div>
</div>

<div class="actions">
<button class="btn btn-primary" onclick="downloadPNG()">Download PNG</button>
<button class="btn" onclick="downloadCSS()">Download CSS</button>
<button class="btn" onclick="clearAll()">Clear All</button>
</div>
<div class="info">All processing happens locally in your browser.</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/image-resize/">Image Resize</a> | <a href="https://yurukusa.github.io/css-generator/">CSS Generator</a> | <a href="https://yurukusa.github.io/image-to-base64/">Image to Base64</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let sprites=[];

// File handling
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const addMore=document.getElementById('addMore');

function setupDrop(){
  dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag')});
  dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop',e=>{
    e.preventDefault();dropZone.classList.remove('drag');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change',e=>addFiles(e.target.files));
  addMore.addEventListener('change',e=>addFiles(e.target.files));
}
setupDrop();

function addFiles(files){
  if(!files.length)return;
  let loaded=0;
  const total=files.length;
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const name=file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'-');
        sprites.push({img,name,width:img.width,height:img.height,src:e.target.result});
        loaded++;
        if(loaded>=total){renderList();generate()}
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderList(){
  const list=document.getElementById('spritesList');
  list.innerHTML='';
  sprites.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='sprite-item';
    el.innerHTML=`<img src="${s.src}" alt="${s.name}"><span class="name">${s.name}</span>`;
    const rm=document.createElement('button');
    rm.className='remove';rm.textContent='×';
    rm.onclick=()=>{sprites.splice(i,1);renderList();generate()};
    el.appendChild(rm);
    list.appendChild(el);
  });
  document.getElementById('spriteCount').textContent=`(${sprites.length})`;
}

function generate(){
  if(!sprites.length){
    canvas.width=1;canvas.height=1;
    ctx.clearRect(0,0,1,1);
    document.getElementById('cssOutput').textContent='';
    document.getElementById('stats').textContent='';
    return;
  }

  const layout=document.getElementById('layout').value;
  const padding=parseInt(document.getElementById('padding').value)||0;
  const prefix=document.getElementById('prefix').value||'sprite';
  const imgPath=document.getElementById('imgPath').value||'sprite.png';

  // Calculate positions
  let positions=[];
  let totalW=0,totalH=0;

  if(layout==='horizontal'){
    let x=0;
    const maxH=Math.max(...sprites.map(s=>s.height));
    sprites.forEach(s=>{
      positions.push({x,y:0,w:s.width,h:s.height});
      x+=s.width+padding;
    });
    totalW=x-padding;totalH=maxH;
  }else if(layout==='vertical'){
    let y=0;
    const maxW=Math.max(...sprites.map(s=>s.width));
    sprites.forEach(s=>{
      positions.push({x:0,y,w:s.width,h:s.height});
      y+=s.height+padding;
    });
    totalW=maxW;totalH=y-padding;
  }else{
    // Grid
    const cols=Math.ceil(Math.sqrt(sprites.length));
    const maxW=Math.max(...sprites.map(s=>s.width));
    const maxH=Math.max(...sprites.map(s=>s.height));
    const cellW=maxW+padding;
    const cellH=maxH+padding;
    sprites.forEach((s,i)=>{
      const col=i%cols;
      const row=Math.floor(i/cols);
      positions.push({x:col*cellW,y:row*cellH,w:s.width,h:s.height});
    });
    const rows=Math.ceil(sprites.length/cols);
    totalW=cols*cellW-padding;
    totalH=rows*cellH-padding;
  }

  // Draw canvas
  canvas.width=totalW;canvas.height=totalH;
  ctx.clearRect(0,0,totalW,totalH);
  sprites.forEach((s,i)=>{
    ctx.drawImage(s.img,positions[i].x,positions[i].y);
  });

  // Generate CSS
  let css=`.${prefix} {\n  background-image: url('${imgPath}');\n  background-repeat: no-repeat;\n  display: inline-block;\n}\n\n`;
  sprites.forEach((s,i)=>{
    const p=positions[i];
    css+=`.${prefix}-${s.name} {\n  width: ${p.w}px;\n  height: ${p.h}px;\n  background-position: -${p.x}px -${p.y}px;\n}\n\n`;
  });

  document.getElementById('cssOutput').textContent=css;
  document.getElementById('stats').textContent=`Sheet: ${totalW}×${totalH}px | ${sprites.length} sprites`;
}

function copyCSS(){
  const text=document.getElementById('cssOutput').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied!'));
}

function downloadPNG(){
  if(!sprites.length)return;
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='sprite.png';a.click();
  showToast('Downloaded!');
}

function downloadCSS(){
  if(!sprites.length)return;
  const text=document.getElementById('cssOutput').textContent;
  const blob=new Blob([text],{type:'text/css'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='sprite.css';a.click();
  showToast('Downloaded!');
}

function clearAll(){
  sprites=[];renderList();generate();
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}
</script>
</body>
</html>
