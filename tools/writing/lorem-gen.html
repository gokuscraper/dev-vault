<body>
<div class="container">
<h1>Lorem Generator</h1>
<p class="subtitle">Generate placeholder text for your designs and mockups.</p>

<div class="config">
  <div class="row">
    <span class="label">Amount</span>
    <input type="number" id="amount" value="5" min="1" max="100" onchange="generate()">
    <select id="unit" onchange="generate()">
      <option value="paragraphs">Paragraphs</option>
      <option value="sentences">Sentences</option>
      <option value="words">Words</option>
    </select>
  </div>
  <div class="row">
    <span class="label">Options</span>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="startLorem" checked onchange="generate()"> Start with "Lorem ipsum..."</label>
      <label class="toggle"><input type="checkbox" id="wrapP" onchange="generate()"> Wrap in &lt;p&gt; tags</label>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="generate()">Generate</button>
  <button class="btn" onclick="copyText()">Copy Text</button>
  <button class="btn" onclick="copyHTML()">Copy HTML</button>
</div>

<div class="stats" id="stats"></div>
<div class="output" id="output"></div>

</div>

</footer>

<script>
const WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum perspiciatis unde omnis iste natus error voluptatem accusantium doloremque laudantium totam rem aperiam eaque ipsa quae ab illo inventore veritatis quasi architecto beatae vitae dicta explicabo nemo ipsam quia voluptas aspernatur aut odit fugit consequuntur magni dolores eos ratione sequi nesciunt neque porro quisquam dolorem adipisci numquam eius modi tempora incidunt magnam aliquam quaerat autem vel cum soluta nobis eligendi optio cumque nihil impedit quo minus quod maxime placeat facere possimus omnis assumenda repudiandae temporibus quibusdam officiis debitis rerum necessitatibus saepe eveniet voluptates repudiandae recusandae itaque earum hic tenetur sapiente delectus reiciendis voluptatibus maiores alias perferendis doloribus asperiores repellat'.split(' ');

const FIRST='Lorem ipsum dolor sit amet, consectetur adipiscing elit.';

function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr){return arr[randInt(0,arr.length-1)]}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

function genWords(n){
  const result=[];
  for(let i=0;i<n;i++)result.push(pick(WORDS));
  return result.join(' ');
}

function genSentence(){
  const len=randInt(6,16);
  let s=genWords(len);
  s=capitalize(s);
  // Add comma sometimes
  if(len>10&&Math.random()>0.5){
    const pos=randInt(3,len-3);
    const words=s.split(' ');
    words[pos]+=',';
    s=words.join(' ');
  }
  return s+'.';
}

function genParagraph(){
  const sentences=randInt(3,7);
  const result=[];
  for(let i=0;i<sentences;i++)result.push(genSentence());
  return result.join(' ');
}

let lastText='';

function generate(){
  const amount=Math.max(1,Math.min(100,+document.getElementById('amount').value));
  const unit=document.getElementById('unit').value;
  const startLorem=document.getElementById('startLorem').checked;
  const wrapP=document.getElementById('wrapP').checked;

  let paragraphs=[];

  if(unit==='words'){
    let text=genWords(amount);
    text=capitalize(text)+'.';
    if(startLorem&&amount>=5){
      text=FIRST+' '+text;
    }
    paragraphs=[text];
  }else if(unit==='sentences'){
    const sentences=[];
    for(let i=0;i<amount;i++)sentences.push(genSentence());
    if(startLorem)sentences[0]=FIRST;
    // Group into paragraphs of 3-6 sentences
    let current=[];
    sentences.forEach((s,i)=>{
      current.push(s);
      if(current.length>=randInt(3,6)||i===sentences.length-1){
        paragraphs.push(current.join(' '));
        current=[];
      }
    });
  }else{
    for(let i=0;i<amount;i++){
      let p=genParagraph();
      if(i===0&&startLorem)p=FIRST+' '+p;
      paragraphs.push(p);
    }
  }

  lastText=paragraphs.join('\n\n');

  const outputEl=document.getElementById('output');
  if(wrapP){
    outputEl.innerHTML=paragraphs.map(p=>`<p>&lt;p&gt;${p}&lt;/p&gt;</p>`).join('');
  }else{
    outputEl.innerHTML=paragraphs.map(p=>`<p>${p}</p>`).join('');
  }

  // Stats
  const words=lastText.split(/\s+/).length;
  const chars=lastText.length;
  const sents=(lastText.match(/\./g)||[]).length;
  document.getElementById('stats').textContent=`${words} words · ${chars} characters · ${sents} sentences · ${paragraphs.length} paragraph${paragraphs.length>1?'s':''}`;
}

function copyText(){
  const wrapP=document.getElementById('wrapP').checked;
  const text=wrapP?lastText.split('\n\n').map(p=>`<p>${p}</p>`).join('\n\n'):lastText;
  navigator.clipboard.writeText(text);
  showCopied('Copied!');
}

function copyHTML(){
  const html=lastText.split('\n\n').map(p=>`<p>${p}</p>`).join('\n');
  navigator.clipboard.writeText(html);
  showCopied('HTML Copied!');
}

function showCopied(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

generate();
</script>
