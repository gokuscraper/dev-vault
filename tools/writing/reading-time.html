<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Time Calculator — Estimate Read Duration</title>
<meta name="description" content="Estimate reading time, speaking time, word count, and readability scores for any text. Supports Markdown/HTML stripping and complexity analysis.">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/reading-time/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Reading Time Calculator","url":"https://gokuscraper.github.io/dev-vault/reading-time/","description":"Estimate reading time, speaking time, word count, and readability scores for any text.","applicationCategory":"UtilityApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;padding:20px;max-width:960px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:4px;color:#fff}
.subtitle{color:#888;font-size:.9rem;margin-bottom:24px}
.card{background:#161616;border:1px solid #262626;border-radius:8px;padding:20px;margin-bottom:16px}
textarea{width:100%;height:200px;background:#111;border:1px solid #333;border-radius:6px;color:#e0e0e0;padding:12px;font-size:.95rem;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#4da6ff}
.controls{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:12px}
.controls label{font-size:.85rem;color:#aaa;display:flex;align-items:center;gap:6px;cursor:pointer}
input[type=checkbox]{accent-color:#4da6ff}
.slider-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:240px}
.slider-wrap label{white-space:nowrap}
input[type=range]{flex:1;accent-color:#4da6ff}
.wpm-val{color:#4da6ff;font-weight:600;min-width:60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.stat{background:#111;border:1px solid #262626;border-radius:6px;padding:14px;text-align:center}
.stat .value{font-size:1.5rem;font-weight:700;color:#4da6ff}
.stat .label{font-size:.75rem;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
h2{font-size:1.1rem;margin-bottom:12px;color:#ccc}
.complexity{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.complexity .item{background:#111;border:1px solid #262626;border-radius:6px;padding:14px}
.complexity .score{font-size:1.3rem;font-weight:700;color:#4da6ff}
.complexity .desc{font-size:.8rem;color:#888;margin-top:4px}
.breakdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.breakdown .item{background:#111;border:1px solid #262626;border-radius:6px;padding:14px;display:flex;justify-content:space-between;align-items:center}
.breakdown .ctx{font-size:.85rem;color:#aaa}
.breakdown .time{font-size:1.1rem;font-weight:600;color:#4da6ff}
.badge-preview{display:inline-block;background:#222;border:1px solid #333;border-radius:20px;padding:6px 16px;font-size:.9rem;color:#e0e0e0;margin-right:10px}
.btn{background:#4da6ff;color:#000;border:none;border-radius:6px;padding:8px 16px;font-size:.85rem;cursor:pointer;font-weight:600}
.btn:hover{background:#3a8fdf}
.badge-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px}
.copied{color:#4da6ff;font-size:.8rem;opacity:0;transition:opacity .3s}
.copied.show{opacity:1}
footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #222;font-size:.8rem;color:#666}
footer a{color:#4da6ff;text-decoration:none}
footer a:hover{text-decoration:underline}
.related{margin-top:8px}
.empty .value{color:#555}
</style>
</head>
<body>
<h1>Reading Time Calculator</h1>
<p class="subtitle">Estimate read duration, speaking time, and readability for any text</p>

<div class="card">
<textarea id="input" placeholder="Paste your article, blog post, or any text here..."></textarea>
<div class="controls">
<div class="slider-wrap">
<label for="wpm">Reading speed:</label>
<input type="range" id="wpm" min="100" max="400" value="238">
<span class="wpm-val"><span id="wpmVal">238</span> WPM</span>
</div>
<label><input type="checkbox" id="stripMd"> Strip Markdown</label>
<label><input type="checkbox" id="stripHtml"> Strip HTML</label>
</div>
</div>

<div class="card">
<h2>Results</h2>
<div class="grid" id="stats"></div>
</div>

<div class="card">
<h2>Complexity Analysis</h2>
<div class="complexity" id="complexity"></div>
</div>

<div class="card">
<h2>Content Breakdown</h2>
<div class="breakdown" id="breakdown"></div>
</div>

<div class="card">
<h2>Reading Badge</h2>
<div class="badge-row">
<span class="badge-preview" id="badge"></span>
<button class="btn" id="copyBtn" onclick="copyBadge()">Copy Badge</button>
<span class="copied" id="copied">Copied!</span>
</div>
</div>

<footer>
<a href="https://gokuscraper.github.io/dev-vault/">dev-toolkit</a>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/word-count/">word-count</a> · <a href="https://gokuscraper.github.io/dev-vault/char-count/">char-count</a> · <a href="https://gokuscraper.github.io/dev-vault/text-transform/">text-transform</a></div>
</footer>

<script>
const input=document.getElementById('input'),wpmSlider=document.getElementById('wpm'),wpmVal=document.getElementById('wpmVal'),stripMd=document.getElementById('stripMd'),stripHtml=document.getElementById('stripHtml');

function countSyllables(w){
  w=w.toLowerCase().replace(/[^a-z]/g,'');
  if(w.length<=2)return w.length?1:0;
  // Remove trailing silent e
  if(w.endsWith('e')&&!w.endsWith('le')&&w.length>2)w=w.slice(0,-1);
  // Count vowel groups
  const m=w.match(/[aeiouy]+/g);
  let c=m?m.length:1;
  // Common suffixes that add syllables
  if(/(?:ia|ious|eous)$/.test(w))c++;
  return Math.max(1,c);
}

function process(raw){
  let text=raw;
  if(stripMd.checked){
    // Strip markdown: headers, bold, italic, links, images, code blocks, inline code
    text=text.replace(/```[\s\S]*?```/g,' ').replace(/`[^`]+`/g,' ')
      .replace(/!\[.*?\]\(.*?\)/g,' ').replace(/\[([^\]]*)\]\(.*?\)/g,'$1')
      .replace(/^#{1,6}\s+/gm,'').replace(/(\*{1,3}|_{1,3})(.*?)\1/g,'$2')
      .replace(/^[>\-*+]\s+/gm,'').replace(/^\d+\.\s+/gm,'')
      .replace(/^---+$/gm,'').replace(/\|/g,' ');
  }
  if(stripHtml.checked){
    text=text.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/gi,' ');
  }

  const trimmed=text.trim();
  if(!trimmed)return null;

  const chars=trimmed.length;
  const charsNoSpace=trimmed.replace(/\s/g,'').length;
  const words=trimmed.split(/\s+/).filter(w=>w.length>0);
  const wordCount=words.length;
  const sentences=trimmed.split(/[.!?]+/).filter(s=>s.trim().length>0);
  const sentenceCount=Math.max(sentences.length,1);
  const paragraphs=trimmed.split(/\n\s*\n/).filter(p=>p.trim().length>0);
  const paraCount=Math.max(paragraphs.length,1);
  const totalSyllables=words.reduce((s,w)=>s+countSyllables(w),0);
  const avgWordLen=wordCount?(words.reduce((s,w)=>s+w.replace(/[^a-zA-Z0-9]/g,'').length,0)/wordCount):0;
  const avgSentLen=wordCount/sentenceCount;
  const wpm=parseInt(wpmSlider.value);
  const readSec=Math.round((wordCount/wpm)*60);
  const speakSec=Math.round((wordCount/150)*60);

  // Flesch Reading Ease
  const fre=wordCount?206.835-1.015*(wordCount/sentenceCount)-84.6*(totalSyllables/wordCount):0;
  const freClamp=Math.max(0,Math.min(100,fre));
  // Flesch-Kincaid Grade Level
  const fkgl=wordCount?0.39*(wordCount/sentenceCount)+11.8*(totalSyllables/wordCount)-15.59:0;
  const fkglClamp=Math.max(0,fkgl);

  let freLabel,freColor;
  if(freClamp>=70){freLabel='Easy to read';freColor='#4caf50'}
  else if(freClamp>=50){freLabel='Fairly easy';freColor='#8bc34a'}
  else if(freClamp>=30){freLabel='Moderate';freColor='#ff9800'}
  else{freLabel='Difficult';freColor='#f44336'}

  let gradeLabel;
  if(fkglClamp<=6)gradeLabel='Elementary';
  else if(fkglClamp<=8)gradeLabel='Middle school';
  else if(fkglClamp<=12)gradeLabel='High school';
  else gradeLabel='College level';

  return{chars,charsNoSpace,wordCount,sentenceCount,paraCount,avgWordLen:avgWordLen.toFixed(1),avgSentLen:avgSentLen.toFixed(1),readSec,speakSec,fre:freClamp.toFixed(1),freLabel,freColor,fkgl:fkglClamp.toFixed(1),gradeLabel,wpm};
}

function fmt(sec){
  const m=Math.floor(sec/60),s=sec%60;
  return m?`${m} min ${s} sec`:`${s} sec`;
}

function fmtMin(sec){
  return Math.max(1,Math.round(sec/60));
}

function render(){
  wpmVal.textContent=wpmSlider.value;
  const r=process(input.value);
  const statsEl=document.getElementById('stats');
  const compEl=document.getElementById('complexity');
  const breakEl=document.getElementById('breakdown');
  const badgeEl=document.getElementById('badge');

  if(!r){
    const e='class="empty"';
    statsEl.innerHTML=`<div class="stat ${e}"><div class="value">--</div><div class="label">Reading Time</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Speaking Time</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Words</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Characters</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Chars (no spaces)</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Sentences</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Paragraphs</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Avg Word Length</div></div>`;
    compEl.innerHTML=`<div class="item"><div class="score" style="color:#555">--</div><div class="desc">Flesch Reading Ease</div></div><div class="item"><div class="score" style="color:#555">--</div><div class="desc">Flesch-Kincaid Grade</div></div>`;
    breakEl.innerHTML='';
    badgeEl.textContent='Paste text to generate badge';
    return;
  }

  statsEl.innerHTML=`
    <div class="stat"><div class="value">${fmt(r.readSec)}</div><div class="label">Reading Time (${r.wpm} WPM)</div></div>
    <div class="stat"><div class="value">${fmt(r.speakSec)}</div><div class="label">Speaking Time (150 WPM)</div></div>
    <div class="stat"><div class="value">${r.wordCount.toLocaleString()}</div><div class="label">Words</div></div>
    <div class="stat"><div class="value">${r.chars.toLocaleString()}</div><div class="label">Characters</div></div>
    <div class="stat"><div class="value">${r.charsNoSpace.toLocaleString()}</div><div class="label">Chars (no spaces)</div></div>
    <div class="stat"><div class="value">${r.sentenceCount}</div><div class="label">Sentences</div></div>
    <div class="stat"><div class="value">${r.paraCount}</div><div class="label">Paragraphs</div></div>
    <div class="stat"><div class="value">${r.avgWordLen}</div><div class="label">Avg Word Length</div></div>`;

  compEl.innerHTML=`
    <div class="item"><div class="score" style="color:${r.freColor}">${r.fre}</div><div class="desc">Flesch Reading Ease — ${r.freLabel}</div></div>
    <div class="item"><div class="score">${r.fkgl}</div><div class="desc">Grade Level — ${r.gradeLabel}</div></div>`;

  const blogTime=Math.max(1,Math.round((r.wordCount/250)*60));
  const techTime=Math.max(1,Math.round((r.wordCount/180)*60));
  const acadTime=Math.max(1,Math.round((r.wordCount/130)*60));
  const mediumMin=fmtMin(r.readSec);

  breakEl.innerHTML=`
    <div class="item"><span class="ctx">Blog post (250 WPM)</span><span class="time">${fmt(blogTime)}</span></div>
    <div class="item"><span class="ctx">Technical doc (180 WPM)</span><span class="time">${fmt(techTime)}</span></div>
    <div class="item"><span class="ctx">Academic paper (130 WPM)</span><span class="time">${fmt(acadTime)}</span></div>
    <div class="item"><span class="ctx">Medium-style badge</span><span class="time">${mediumMin} min read</span></div>`;

  badgeEl.textContent=getBadgeText(mediumMin,r.wordCount);
}

function getBadgeText(min,words){
  return `\u{1F4D6} ${min} min read \u00B7 ${words.toLocaleString()} words`;
}

function copyBadge(){
  const r=process(input.value);
  if(!r)return;
  const min=fmtMin(r.readSec);
  const text=getBadgeText(min,r.wordCount);
  navigator.clipboard.writeText(text).then(()=>{
    const el=document.getElementById('copied');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1500);
  });
}

input.addEventListener('input',render);
wpmSlider.addEventListener('input',render);
stripMd.addEventListener('change',render);
stripHtml.addEventListener('change',render);
render();
</script>
</body>
</html>
