</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const input=document.getElementById('input'),wpmSlider=document.getElementById('wpm'),wpmVal=document.getElementById('wpmVal'),stripMd=document.getElementById('stripMd'),stripHtml=document.getElementById('stripHtml');

function countSyllables(w){
  w=w.toLowerCase().replace(/[^a-z]/g,'');
  if(w.length<=2)return w.length?1:0;
  // Remove trailing silent e
  if(w.endsWith('e')&&!w.endsWith('le')&&w.length>2)w=w.slice(0,-1);
  // Count vowel groups
  const m=w.match(/[aeiouy]+/g);
  let c=m?m.length:1;
  // Common suffixes that add syllables
  if(/(?:ia|ious|eous)$/.test(w))c++;
  return Math.max(1,c);
}

function process(raw){
  let text=raw;
  if(stripMd.checked){
    // Strip markdown: headers, bold, italic, links, images, code blocks, inline code
    text=text.replace(/```[\s\S]*?```/g,' ').replace(/`[^`]+`/g,' ')
      .replace(/!\[.*?\]\(.*?\)/g,' ').replace(/\[([^\]]*)\]\(.*?\)/g,'$1')
      .replace(/^#{1,6}\s+/gm,'').replace(/(\*{1,3}|_{1,3})(.*?)\1/g,'$2')
      .replace(/^[>\-*+]\s+/gm,'').replace(/^\d+\.\s+/gm,'')
      .replace(/^---+$/gm,'').replace(/\|/g,' ');
  }
  if(stripHtml.checked){
    text=text.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/gi,' ');
  }

  const trimmed=text.trim();
  if(!trimmed)return null;

  const chars=trimmed.length;
  const charsNoSpace=trimmed.replace(/\s/g,'').length;
  const words=trimmed.split(/\s+/).filter(w=>w.length>0);
  const wordCount=words.length;
  const sentences=trimmed.split(/[.!?]+/).filter(s=>s.trim().length>0);
  const sentenceCount=Math.max(sentences.length,1);
  const paragraphs=trimmed.split(/\n\s*\n/).filter(p=>p.trim().length>0);
  const paraCount=Math.max(paragraphs.length,1);
  const totalSyllables=words.reduce((s,w)=>s+countSyllables(w),0);
  const avgWordLen=wordCount?(words.reduce((s,w)=>s+w.replace(/[^a-zA-Z0-9]/g,'').length,0)/wordCount):0;
  const avgSentLen=wordCount/sentenceCount;
  const wpm=parseInt(wpmSlider.value);
  const readSec=Math.round((wordCount/wpm)*60);
  const speakSec=Math.round((wordCount/150)*60);

  // Flesch Reading Ease
  const fre=wordCount?206.835-1.015*(wordCount/sentenceCount)-84.6*(totalSyllables/wordCount):0;
  const freClamp=Math.max(0,Math.min(100,fre));
  // Flesch-Kincaid Grade Level
  const fkgl=wordCount?0.39*(wordCount/sentenceCount)+11.8*(totalSyllables/wordCount)-15.59:0;
  const fkglClamp=Math.max(0,fkgl);

  let freLabel,freColor;
  if(freClamp>=70){freLabel='Easy to read';freColor='#4caf50'}
  else if(freClamp>=50){freLabel='Fairly easy';freColor='#8bc34a'}
  else if(freClamp>=30){freLabel='Moderate';freColor='#ff9800'}
  else{freLabel='Difficult';freColor='#f44336'}

  let gradeLabel;
  if(fkglClamp<=6)gradeLabel='Elementary';
  else if(fkglClamp<=8)gradeLabel='Middle school';
  else if(fkglClamp<=12)gradeLabel='High school';
  else gradeLabel='College level';

  return{chars,charsNoSpace,wordCount,sentenceCount,paraCount,avgWordLen:avgWordLen.toFixed(1),avgSentLen:avgSentLen.toFixed(1),readSec,speakSec,fre:freClamp.toFixed(1),freLabel,freColor,fkgl:fkglClamp.toFixed(1),gradeLabel,wpm};
}

function fmt(sec){
  const m=Math.floor(sec/60),s=sec%60;
  return m?`${m} min ${s} sec`:`${s} sec`;
}

function fmtMin(sec){
  return Math.max(1,Math.round(sec/60));
}

function render(){
  wpmVal.textContent=wpmSlider.value;
  const r=process(input.value);
  const statsEl=document.getElementById('stats');
  const compEl=document.getElementById('complexity');
  const breakEl=document.getElementById('breakdown');
  const badgeEl=document.getElementById('badge');

  if(!r){
    const e='class="empty"';
    statsEl.innerHTML=`<div class="stat ${e}"><div class="value">--</div><div class="label">Reading Time</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Speaking Time</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Words</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Characters</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Chars (no spaces)</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Sentences</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Paragraphs</div></div><div class="stat ${e}"><div class="value">--</div><div class="label">Avg Word Length</div></div>`;
    compEl.innerHTML=`<div class="item"><div class="score" style="color:#555">--</div><div class="desc">Flesch Reading Ease</div></div><div class="item"><div class="score" style="color:#555">--</div><div class="desc">Flesch-Kincaid Grade</div></div>`;
    breakEl.innerHTML='';
    badgeEl.textContent=T("jtc_paste_text_to_generate_ba");
    return;
  }

  statsEl.innerHTML=`
    <div class="stat"><div class="value">${fmt(r.readSec)}</div><div class="label">Reading Time (${r.wpm} WPM)</div></div>
    <div class="stat"><div class="value">${fmt(r.speakSec)}</div><div class="label">Speaking Time (150 WPM)</div></div>
    <div class="stat"><div class="value">${r.wordCount.toLocaleString()}</div><div class="label">Words</div></div>
    <div class="stat"><div class="value">${r.chars.toLocaleString()}</div><div class="label">Characters</div></div>
    <div class="stat"><div class="value">${r.charsNoSpace.toLocaleString()}</div><div class="label">Chars (no spaces)</div></div>
    <div class="stat"><div class="value">${r.sentenceCount}</div><div class="label">Sentences</div></div>
    <div class="stat"><div class="value">${r.paraCount}</div><div class="label">Paragraphs</div></div>
    <div class="stat"><div class="value">${r.avgWordLen}</div><div class="label">Avg Word Length</div></div>`;

  compEl.innerHTML=`
    <div class="item"><div class="score" style="color:${r.freColor}">${r.fre}</div><div class="desc">Flesch Reading Ease — ${r.freLabel}</div></div>
    <div class="item"><div class="score">${r.fkgl}</div><div class="desc">Grade Level — ${r.gradeLabel}</div></div>`;

  const blogTime=Math.max(1,Math.round((r.wordCount/250)*60));
  const techTime=Math.max(1,Math.round((r.wordCount/180)*60));
  const acadTime=Math.max(1,Math.round((r.wordCount/130)*60));
  const mediumMin=fmtMin(r.readSec);

  breakEl.innerHTML=`
    <div class="item"><span class="ctx">Blog post (250 WPM)</span><span class="time">${fmt(blogTime)}</span></div>
    <div class="item"><span class="ctx">Technical doc (180 WPM)</span><span class="time">${fmt(techTime)}</span></div>
    <div class="item"><span class="ctx">Academic paper (130 WPM)</span><span class="time">${fmt(acadTime)}</span></div>
    <div class="item"><span class="ctx">Medium-style badge</span><span class="time">${mediumMin} min read</span></div>`;

  badgeEl.textContent=getBadgeText(mediumMin,r.wordCount);
}

function getBadgeText(min,words){
  return `\u{1F4D6} ${min} min read \u00B7 ${words.toLocaleString()} words`;
}

function copyBadge(){
  const r=process(input.value);
  if(!r)return;
  const min=fmtMin(r.readSec);
  const text=getBadgeText(min,r.wordCount);
  navigator.clipboard.writeText(text).then(()=>{
    const el=document.getElementById('copied');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1500);
  });
}

input.addEventListener('input',render);
wpmSlider.addEventListener('input',render);
stripMd.addEventListener('change',render);
stripHtml.addEventListener('change',render);
render();
</script>
