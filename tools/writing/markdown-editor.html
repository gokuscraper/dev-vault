// --- Markdown Parser ---
function parseMarkdown(md) {
  // Protect code blocks first
  const codeBlocks = [];
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const i = codeBlocks.length;
    const escaped = escHtml(code.replace(/\n$/, ''));
    const label = lang ? `<span class="lang-label" ti="label_eschtml_lang" ti="label_eschtml_lang" ti="label_eschtml_lang">${escHtml(lang)}</span>` : '';
    codeBlocks.push(`<pre>${label}<code>${escaped}</code></pre>`);
    return `%%CODEBLOCK_${i}%%`;
  });

  // Protect inline code
  const inlineCodes = [];
  md = md.replace(/`([^`\n]+)`/g, (_, code) => {
    const i = inlineCodes.length;
    inlineCodes.push(`<code>${escHtml(code)}</code>`);
    return `%%INLINE_${i}%%`;
  });

  // Process block-level elements line by line
  const lines = md.split('\n');
  let html = '';
  let inList = false, listType = '';
  let tableRows = [];
  let inTable = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code block placeholder
    const cbMatch = line.match(/^%%CODEBLOCK_(\d+)%%$/);
    if (cbMatch) {
      if (inList) { html += `</${listType}>`; inList = false; }
      if (inTable) { html += renderTable(tableRows); tableRows = []; inTable = false; }
      html += codeBlocks[+cbMatch[1]];
      continue;
    }

    // Table rows
    if (line.match(/^\|(.+)\|$/)) {
      if (inList) { html += `</${listType}>`; inList = false; }
      // Skip separator row
      if (line.match(/^\|[\s\-:|]+\|$/)) { continue; }
      tableRows.push(line);
      inTable = true;
      // Check if next line is NOT a table row
      if (i + 1 >= lines.length || !lines[i + 1].match(/^\|/)) {
        html += renderTable(tableRows);
        tableRows = [];
        inTable = false;
      }
      continue;
    }
    if (inTable) { html += renderTable(tableRows); tableRows = []; inTable = false; }

    // Horizontal rule
    if (line.match(/^-{3,}$/) || line.match(/^\*{3,}$/) || line.match(/^_{3,}$/)) {
      if (inList) { html += `</${listType}>`; inList = false; }
      html += '<hr>';
      continue;
    }

    // Headers
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      if (inList) { html += `</${listType}>`; inList = false; }
      const level = hMatch[1].length;
      html += `<h${level}>${parseInline(hMatch[2])}</h${level}>`;
      continue;
    }

    // Blockquote
    if (line.match(/^>\s?/)) {
      if (inList) { html += `</${listType}>`; inList = false; }
      let quoteLines = [line.replace(/^>\s?/, '')];
      while (i + 1 < lines.length && lines[i + 1].match(/^>\s?/)) {
        i++;
        quoteLines.push(lines[i].replace(/^>\s?/, ''));
      }
      html += `<blockquote>${quoteLines.map(l => `<p>${parseInline(l)}</p>`).join('')}</blockquote>`;
      continue;
    }

    // Unordered list
    if (line.match(/^[\-\*]\s+/)) {
      if (inList && listType !== 'ul') { html += `</${listType}>`; inList = false; }
      if (!inList) { html += '<ul>'; inList = true; listType = 'ul'; }
      html += `<li>${parseInline(line.replace(/^[\-\*]\s+/, ''))}</li>`;
      continue;
    }

    // Ordered list
    if (line.match(/^\d+\.\s+/)) {
      if (inList && listType !== 'ol') { html += `</${listType}>`; inList = false; }
      if (!inList) { html += '<ol>'; inList = true; listType = 'ol'; }
      html += `<li>${parseInline(line.replace(/^\d+\.\s+/, ''))}</li>`;
      continue;
    }

    // Close list if we're no longer in one
    if (inList) { html += `</${listType}>`; inList = false; }

    // Empty line
    if (line.trim() === '') { continue; }

    // Paragraph
    html += `<p>${parseInline(line)}</p>`;
  }

  if (inList) html += `</${listType}>`;
  if (inTable) html += renderTable(tableRows);

  // Restore code blocks and inline codes
  html = html.replace(/%%CODEBLOCK_(\d+)%%/g, (_, i) => codeBlocks[+i]);
  html = html.replace(/%%INLINE_(\d+)%%/g, (_, i) => inlineCodes[+i]);

  return html;
}

function parseInline(text) {
  // Images (before links to avoid conflict)
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Bold+Italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong ti="strong_1" ti="strong_1" ti="strong_1">$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Restore inline code placeholders (already handled, keep as-is)
  return text;
}

function renderTable(rows) {
  if (!rows.length) return '';
  const parse = r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
  const header = parse(rows[0]);
  let t = '<table><thead><tr>' + header.map(h => `<th ti="th_parseinline_h" ti="th_parseinline_h" ti="th_parseinline_h">${parseInline(h)}</th>`).join('') + '</tr></thead><tbody>';
  for (let i = 1; i < rows.length; i++) {
    const cells = parse(rows[i]);
    t += '<tr>' + cells.map(c => `<td>${parseInline(c)}</td>`).join('') + '</tr>';
  }
  return t + '</tbody></table>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Editor Actions ---
function ins(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'text';
  editor.setRangeText(before + sel + after, s, e, 'select');
  editor.selectionStart = s + before.length;
  editor.selectionEnd = s + before.length + sel.length;
  editor.focus();
  update();
}

function insLine(prefix) {
  const s = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
  const before = s > 0 && editor.value[s-1] !== '\n' ? '\n' : '';
  editor.setRangeText(before + prefix, lineStart === s ? s : s, s, 'end');
  editor.focus();
  update();
}

function insBlock(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'code here';
  const pre = s > 0 && editor.value[s-1] !== '\n' ? '\n' : '';
  editor.setRangeText(pre + before + sel + after + '\n', s, e, 'end');
  editor.focus();
  update();
}

function insLink() {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'link text';
  editor.setRangeText(`[${sel}](url)`, s, e, 'end');
  editor.focus();
  update();
}

function insImage() {
  const s = editor.selectionStart, e = editor.selectionEnd;
  editor.setRangeText('![alt](image-url)', s, e, 'end');
  editor.focus();
  update();
}

// --- Export ---
function copyHTML() {
  const html = parseMarkdown(editor.value);
  navigator.clipboard.writeText(html).then(() => toast('HTML copied!'));
}

function downloadMd() {
  dl(editor.value, 'document.md', 'text/markdown');
}

function downloadHTML() {
  const html = `<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><title>Document</title></head>\n<body>\n${parseMarkdown(editor.value)}\n</body>\n</html>`;
  dl(html, 'document.html', 'text/html');
}

function dl(content, name, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Downloaded ${name}`);
}

// --- Fullscreen ---
function toggleFS() {
  const sv = document.getElementById('splitView');
  sv.classList.toggle('fullscreen');
  document.getElementById('fsBtn').textContent = sv.classList.contains('fullscreen') ? '✕' : '⛶';
}

// --- Stats ---
function updateStats() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words;
  document.getElementById('charCount').textContent = text.length;
  document.getElementById('lineCount').textContent = text.split('\n').length;
}

// --- Update & Auto-save ---
function update() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    preview.innerHTML = '<div class="pane-label"><span>Preview</span></div>' + parseMarkdown(editor.value);
    updateStats();
    try { localStorage.setItem('md-editor-content', editor.value); } catch(e) {}
  }, 100);
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1600);
}

// --- Init ---
editor.addEventListener('input', update);
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.setRangeText('  ', s, s, 'end');
    update();
  }
});

// Restore from localStorage or use sample
const saved = localStorage.getItem('md-editor-content');
editor.value = saved !== null ? saved : sampleMd;
update();
</script>
