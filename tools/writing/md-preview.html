<body>
<div class="container">
<div class="header">
  <h1>Markdown Preview</h1>
  <p>Write Markdown on the left, see rendered preview on the right.</p>
</div>

<div class="toolbar">
  <button class="tb" onclick="insert('**','**')"><b>B</b></button>
  <button class="tb" onclick="insert('*','*')"><i>I</i></button>
  <button class="tb" onclick="insert('~~','~~')"><s>S</s></button>
  <button class="tb" onclick="insert('`','`')">Code</button>
  <button class="tb" onclick="insert('\n```\n','\n```\n')">Block</button>
  <button class="tb" onclick="insert('[','](url)')">Link</button>
  <button class="tb" onclick="insert('![alt](',')')">Image</button>
  <button class="tb" onclick="insertLine('## ')">H2</button>
  <button class="tb" onclick="insertLine('### ')">H3</button>
  <button class="tb" onclick="insertLine('- ')">List</button>
  <button class="tb" onclick="insertLine('1. ')">OL</button>
  <button class="tb" onclick="insertLine('- [ ] ')">Task</button>
  <button class="tb" onclick="insertLine('> ')">Quote</button>
  <button class="tb" onclick="insertLine('---')">HR</button>
  <button class="tb" onclick="insertTable()">Table</button>
  <button class="tb primary" onclick="copyHTML()">Copy HTML</button>
  <button class="tb" onclick="copyMD()">Copy MD</button>
  <button class="tb" onclick="clearAll()">Clear</button>
</div>

<div class="editor-wrap">
  <div class="editor-pane">
    <div class="pane-header">
      <span>Markdown</span>
      <span class="word-count" id="wordCount">0 words</span>
    </div>
    <textarea id="editor" spellcheck="false" oninput="render()" onscroll="syncScroll()"></textarea>
  </div>
  <div class="preview-pane">
    <div class="pane-header">
      <span>Preview</span>
      <span class="word-count" id="charCount">0 chars</span>
    </div>
    <div id="preview"></div>
  </div>
</div>
</div>

<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');

const SAMPLE=`# Markdown Preview

Write **Markdown** on the left and see the *live preview* on the right.

## Features

- **Bold**, *italic*, ~~strikethrough~~
- \`inline code\` and code blocks
- [Links](https://example.com) and images
- Tables, task lists, blockquotes

### Code Block

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet("World"));
\`\`\`

### Table

| Feature | Supported |
|---------|-----------|
| Headers | Yes |
| Bold/Italic | Yes |
| Code blocks | Yes |
| Tables | Yes |
| Task lists | Yes |

### Task List

- [x] Write Markdown parser
- [x] Add live preview
- [ ] Add syntax highlighting
- [ ] Export to PDF

### Blockquote

> The best way to predict the future is to invent it.
> — Alan Kay

---

*Made with zero dependencies. Single HTML file.*
`;

editor.value=SAMPLE;

// Minimal GFM Markdown parser
function parseMD(md){
  let html=md;

  // Escape HTML entities in input
  html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Code blocks (fenced)
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>{
    return'<pre><code>'+code.trim()+'</code></pre>';
  });

  // Inline code (must be before other inline processing)
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');

  // Headers
  html=html.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');

  // HR
  html=html.replace(/^---+$/gm,'<hr>');

  // Blockquotes
  html=html.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>');
  // Merge consecutive blockquotes
  html=html.replace(/<\/blockquote>\n<blockquote>/g,'\n');

  // Images
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');

  // Links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Bold + Italic
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');

  // Strikethrough
  html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');

  // Tables
  html=html.replace(/^(\|.+\|)\n(\|[\s-:|]+\|)\n((?:\|.+\|\n?)*)/gm,(m,header,sep,body)=>{
    const ths=header.split('|').filter(c=>c.trim()).map(c=>'<th>'+c.trim()+'</th>').join('');
    const rows=body.trim().split('\n').map(row=>{
      const tds=row.split('|').filter(c=>c.trim()).map(c=>'<td>'+c.trim()+'</td>').join('');
      return'<tr>'+tds+'</tr>';
    }).join('');
    return'<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
  });

  // Task lists
  html=html.replace(/^- \[x\] (.+)$/gm,'<li class="task"><input type="checkbox" checked disabled> $1</li>');
  html=html.replace(/^- \[ \] (.+)$/gm,'<li class="task"><input type="checkbox" disabled> $1</li>');

  // Unordered lists
  html=html.replace(/^- (.+)$/gm,'<li>$1</li>');
  // Wrap consecutive <li> (non-task) in <ul>
  html=html.replace(/((?:<li(?:\s[^>]*)?>.*<\/li>\n?)+)/g,'<ul>$1</ul>');

  // Ordered lists
  html=html.replace(/^\d+\. (.+)$/gm,'<oli>$1</oli>');
  html=html.replace(/((?:<oli>.*<\/oli>\n?)+)/g,(m)=>{
    return'<ol>'+m.replace(/<\/?oli>/g,(t)=>t==='<oli>'?'<li>':'</li>')+'</ol>';
  });

  // Paragraphs — wrap remaining text lines
  const lines=html.split('\n');
  let result=[];
  let inBlock=false;
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(line.match(/^<(h[1-6]|pre|ul|ol|li|table|thead|tbody|tr|th|td|blockquote|hr|img|div)/)){
      inBlock=true;
      result.push(line);
    }else if(line.match(/^<\/(pre|ul|ol|table|tbody|blockquote|div)/)){
      result.push(line);
      inBlock=false;
    }else if(inBlock){
      result.push(line);
    }else if(line.trim()===''){
      result.push('');
    }else{
      result.push('<p>'+line+'</p>');
    }
  }

  return result.join('\n');
}

function render(){
  const md=editor.value;
  preview.innerHTML=parseMD(md);
  // Word count
  const words=md.trim().split(/\s+/).filter(w=>w.length>0).length;
  document.getElementById('wordCount').textContent=words+' word'+(words!==1?'s':'');
  document.getElementById('charCount').textContent=md.length+' char'+(md.length!==1?'s':'');
}

function insert(before,after){
  const start=editor.selectionStart;
  const end=editor.selectionEnd;
  const selected=editor.value.substring(start,end);
  editor.value=editor.value.substring(0,start)+before+selected+after+editor.value.substring(end);
  editor.selectionStart=start+before.length;
  editor.selectionEnd=start+before.length+selected.length;
  editor.focus();
  render();
}

function insertLine(prefix){
  const start=editor.selectionStart;
  const before=editor.value.substring(0,start);
  const lineStart=before.lastIndexOf('\n')+1;
  editor.value=editor.value.substring(0,lineStart)+prefix+editor.value.substring(lineStart);
  editor.selectionStart=editor.selectionEnd=lineStart+prefix.length;
  editor.focus();
  render();
}

function insertTable(){
  const table='\n| Column 1 | Column 2 | Column 3 |\n|----------|----------|----------|\n| Cell 1   | Cell 2   | Cell 3   |\n| Cell 4   | Cell 5   | Cell 6   |\n';
  const pos=editor.selectionStart;
  editor.value=editor.value.substring(0,pos)+table+editor.value.substring(pos);
  editor.focus();
  render();
}

function copyHTML(){
  navigator.clipboard.writeText(preview.innerHTML);
  showCopied('HTML Copied!');
}

function copyMD(){
  navigator.clipboard.writeText(editor.value);
  showCopied('Markdown Copied!');
}

function clearAll(){
  editor.value='';
  render();
}

function showCopied(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Tab key support
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const start=editor.selectionStart;
    editor.value=editor.value.substring(0,start)+'  '+editor.value.substring(editor.selectionEnd);
    editor.selectionStart=editor.selectionEnd=start+2;
    render();
  }
});

// Init
render();
</script>
