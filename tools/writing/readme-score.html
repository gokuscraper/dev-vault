{"@context": "https://schema.org", "@type": "WebApplication", "name": "README Score", "description": "Paste your README.md and get a quality score. 16 checks based on open source best practices. Free, instant, no signup.", "url": "https://gokuscraper.github.io/dev-vault/readme-score/", "applicationCategory": "DeveloperApplication", "operatingSystem": "Any", "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"}, "author": {"@type": "Organization", "name": "gokuscraper", "url": "https://github.com/gokuscraper"}}

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}
.tabs{display:flex;gap:0;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid #333}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:#161616;color:#888;font-size:0.85rem;font-weight:600;border:none}
.tab.active{background:#1a2744;color:#4da6ff}
.tab:hover:not(.active){background:#1c1c1c}
#pasteTab,#fetchTab{display:none}
#pasteTab.active,#fetchTab.active{display:block}
textarea{width:100%;height:280px;padding:14px;border-radius:10px;border:1px solid #333;background:#161616;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;resize:vertical;outline:none;line-height:1.5}
textarea:focus{border-color:#3b82f6}
.fetch-row{display:flex;gap:10px;margin-bottom:16px}
.fetch-row input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:0.95rem;outline:none}
.fetch-row input:focus{border-color:#3b82f6}
.btn{padding:12px 28px;border-radius:10px;border:none;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;font-size:0.95rem;display:block;margin:16px auto 0;min-width:160px}
.btn:hover{background:#2563eb}
.btn:disabled{opacity:0.5;cursor:not-allowed}
#error{color:#ef4444;text-align:center;margin-top:12px;display:none;font-size:0.88rem}
#results{display:none;margin-top:32px}
.score-ring{width:160px;height:160px;margin:0 auto 24px;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:10}
.score-ring .bg{stroke:#1a1a1a}
.score-ring .fg{stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.8rem;font-weight:900;color:#fff}
.score-label{text-align:center;font-size:1.1rem;font-weight:700;margin-bottom:24px}
.grade-A{color:#10b981}.grade-B{color:#3b82f6}.grade-C{color:#f59e0b}.grade-D{color:#ef4444}.grade-F{color:#dc2626}
.checks{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.check{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;background:#161616;border:1px solid #1a1a1a}
.check.pass{border-left:3px solid #10b981}
.check.fail{border-left:3px solid #ef4444}
.check.partial{border-left:3px solid #f59e0b}
.check-icon{font-size:0.9rem;flex-shrink:0;margin-top:2px}
.check-body{flex:1}
.check-name{font-size:0.88rem;font-weight:600;color:#ddd}
.check-desc{font-size:0.76rem;color:#888;margin-top:2px}
.check-weight{font-size:0.72rem;color:#555;flex-shrink:0}
.tips{background:#0d1b2a;border:1px solid #1b3a5c;border-radius:12px;padding:20px;margin-bottom:24px}
.tips h3{color:#4da6ff;margin-bottom:10px;font-size:0.95rem}
.tips ul{list-style:none;padding:0}
.tips li{padding:5px 0;color:#a0c4e8;font-size:0.84rem}
.tips li::before{content:'>';margin-right:8px;color:#4da6ff}
.share-row{text-align:center}
.share-btn{display:inline-block;padding:10px 20px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#888;font-size:0.82rem;cursor:pointer;text-decoration:none}
.share-btn:hover{border-color:#555;color:#ccc}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
</style>
</head>
<body>
<div class="container">
<h1>README Score</h1>
<p class="subtitle">16 checks based on open source best practices. Paste your README and see.</p>

<div class="tabs">
  <div class="tab active" onclick="switchTab('paste')">Paste Markdown</div>
  <div class="tab" onclick="switchTab('fetch')">Fetch from GitHub</div>
</div>

<div id="pasteTab" class="active">
  <textarea id="readme" placeholder="Paste your README.md content here..."></textarea>
</div>

<div id="fetchTab">
  <div class="fetch-row">
    <input type="text" id="repoUrl" placeholder="owner/repo (e.g. facebook/react)">
    <button class="btn" style="margin:0" onclick="fetchReadme()">Fetch</button>
  </div>
</div>

<button class="btn" id="scoreBtn" onclick="score()">Score My README</button>
<div id="error"></div>

<div id="results">
  <div class="score-ring" id="ring"></div>
  <div class="score-label" id="gradeLabel"></div>
  <div class="checks" id="checkList"></div>
  <div class="tips" id="tips" style="display:none"></div>
  <div class="share-row">
    <a class="share-btn" id="shareBtn" target="_blank">Share on X</a>
  </div>
</div>
</div>

<footer>
  <a href="https://github.com/gokuscraper/readme-score">GitHub</a> ·
  Also: <a href="https://gokuscraper.github.io/dev-vault/devto-stats/">dev.to Stats</a> ·
  <a href="https://gokuscraper.github.io/dev-vault/title-score/">Title Score</a>
</footer>

<script>
const $=id=>document.getElementById(id);

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('[id$=Tab]').forEach(el=>el.classList.remove('active'));
  if(t==='paste'){document.querySelectorAll('.tab')[0].classList.add('active');$('pasteTab').classList.add('active')}
  else{document.querySelectorAll('.tab')[1].classList.add('active');$('fetchTab').classList.add('active')}
}

async function fetchReadme(){
  const repo=$('repoUrl').value.trim().replace('https://github.com/','').replace(/\/$/,'');
  if(!repo||!repo.includes('/'))return showError('Enter owner/repo format');
  $('error').style.display='none';
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/readme`,{headers:{'Accept':'application/vnd.github.v3.raw'}});
    if(!r.ok)throw new Error('Could not fetch README ('+r.status+')');
    $('readme').value=await r.text();
    switchTab('paste');
    score();
  }catch(e){showError(e.message)}
}

function showError(msg){$('error').textContent=msg;$('error').style.display='block'}

const CHECKS=[
  {name:'Title / Project Name',desc:'Has a clear H1 heading',weight:8,test:md=>/^#\s+\S/m.test(md)},
  {name:'Description',desc:'Opening paragraph explains what this project does',weight:10,test:md=>{const m=md.match(/^#[^\n]+\n+([\s\S]*?)(?=\n#|\n```|\n\||\n-\s|\n\d\.)/);return m&&m[1].trim().length>30}},
  {name:'Badges',desc:'Has status badges (build, coverage, npm, license)',weight:4,test:md=>/\[!\[.*?\]\(.*?\)\]/.test(md)||/!\[.*?badge.*?\]/i.test(md)},
  {name:'Installation',desc:'Has an install or getting started section',weight:10,test:md=>/##?\s*(install|getting.started|setup|quick.start)/im.test(md)},
  {name:'Usage Examples',desc:'Shows how to use the project with code examples',weight:10,test:md=>{const hasSection=/##?\s*(usage|example|how.to.use|demo)/im.test(md);const hasCode=(md.match(/```/g)||[]).length>=2;return hasSection&&hasCode}},
  {name:'Code Blocks',desc:'Contains at least one code block',weight:5,test:md=>(md.match(/```/g)||[]).length>=2},
  {name:'API / Configuration',desc:'Documents API, options, or configuration',weight:6,test:md=>/##?\s*(api|config|option|parameter|flag|argument|reference)/im.test(md)},
  {name:'Screenshots / Visuals',desc:'Includes images, GIFs, or diagrams',weight:5,test:md=>/!\[.*?\]\(.*?\.(png|jpg|gif|svg|webp|mp4)/i.test(md)||/!\[.*?\]\(https?:\/\//i.test(md)},
  {name:'Table of Contents',desc:'Has a table of contents for navigation',weight:3,test:md=>/##?\s*(table.of.contents|contents|toc)/im.test(md)||/(- \[.*?\]\(#.*?\)\n){3,}/.test(md)},
  {name:'Contributing Guide',desc:'Has contributing section or links to CONTRIBUTING.md',weight:5,test:md=>/##?\s*contribut/im.test(md)||/CONTRIBUTING\.md/i.test(md)},
  {name:'License',desc:'Mentions license type',weight:6,test:md=>/##?\s*license/im.test(md)||/\bMIT\b|\bApache\b|\bGPL\b|\bBSD\b|\bISC\b/i.test(md)},
  {name:'Requirements / Prerequisites',desc:'Lists dependencies or system requirements',weight:4,test:md=>/##?\s*(require|prerequisite|depend|compat)/im.test(md)},
  {name:'Features List',desc:'Has a features section or bullet list of capabilities',weight:5,test:md=>/##?\s*features/im.test(md)},
  {name:'Changelog / Versioning',desc:'Links to changelog or mentions versioning',weight:3,test:md=>/##?\s*(changelog|version|release|what.*new)/im.test(md)||/CHANGELOG\.md/i.test(md)},
  {name:'Contact / Support',desc:'Has contact info, issue tracker link, or support section',weight:3,test:md=>/##?\s*(support|contact|help|community|discord|slack)/im.test(md)||/issues/i.test(md)},
  {name:'Sufficient Length',desc:'README is substantial (200+ words)',weight:6,test:md=>md.split(/\s+/).length>=200},
];

const TOTAL_WEIGHT=CHECKS.reduce((s,c)=>s+c.weight,0);

function score(){
  const md=$('readme').value.trim();
  if(!md){showError('Paste your README first');return}
  $('error').style.display='none';

  let earned=0;
  const results=CHECKS.map(c=>{
    const pass=c.test(md);
    if(pass)earned+=c.weight;
    return{...c,pass};
  });

  const pct=Math.round(earned/TOTAL_WEIGHT*100);
  const grade=pct>=90?'A':pct>=75?'B':pct>=55?'C':pct>=35?'D':'F';
  const gradeColor={A:'#10b981',B:'#3b82f6',C:'#f59e0b',D:'#ef4444',F:'#dc2626'}[grade];

  // Ring
  const circ=2*Math.PI*65;
  const offset=circ-(pct/100*circ);
  $('ring').innerHTML=`
    <svg viewBox="0 0 150 150">
      <circle class="bg" cx="75" cy="75" r="65"/>
      <circle class="fg" cx="75" cy="75" r="65" stroke="${gradeColor}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="score-num">${pct}</div>
  `;
  $('gradeLabel').className='score-label grade-'+grade;
  $('gradeLabel').textContent={A:'Excellent README',B:'Good README',C:'Needs Improvement',D:'Incomplete',F:'Bare Minimum'}[grade];

  // Check list
  $('checkList').innerHTML=results.map(r=>`
    <div class="check ${r.pass?'pass':'fail'}">
      <div class="check-icon">${r.pass?'<span style="color:#10b981">&#10003;</span>':'<span style="color:#ef4444">&#10007;</span>'}</div>
      <div class="check-body">
        <div class="check-name">${r.name}</div>
        <div class="check-desc">${r.desc}</div>
      </div>
      <div class="check-weight">${r.weight}pt</div>
    </div>
  `).join('');

  // Tips for failed checks
  const failed=results.filter(r=>!r.pass);
  if(failed.length){
    const topFailed=failed.sort((a,b)=>b.weight-a.weight).slice(0,5);
    $('tips').style.display='block';
    $('tips').innerHTML=`<h3>Top Improvements (${failed.length} items)</h3><ul>${topFailed.map(f=>`<li><strong>${f.name}</strong> (+${f.weight}pt) — ${f.desc}</li>`).join('')}</ul>`;
  }else{
    $('tips').style.display='none';
  }

  // Share
  const shareText=`My README scored ${pct}/100 (${grade}) on README Score! ${pct>=75?'Not bad.':'Room for improvement.'}`;
  $('shareBtn').href=`https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent('https://gokuscraper.github.io/dev-vault/readme-score/')}`;

  $('results').style.display='block';
  $('results').scrollIntoView({behavior:'smooth'});
}
</script>
<footer style="text-align:center;padding:32px 16px;border-top:1px solid #1a1a1a;margin-top:40px;color:#555;font-size:0.78rem">
