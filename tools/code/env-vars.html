<script>

  // Node.js

  {name:'GITHUB_RUN_ID',plat:'github',desc:'Unique ID for the workflow run',example:'1658821493',tag:'common'},
  {name:'GITHUB_WORKSPACE',plat:'github',desc:'Workspace directory path',example:'/home/runner/work/repo/repo',tag:'common'},
  {name:'GITHUB_EVENT_NAME',plat:'github',desc:'Trigger event name',example:'push | pull_request | schedule',tag:'common'},
  {name:'RUNNER_OS',plat:'github',desc:'Runner operating system',example:'Linux | Windows | macOS',tag:'common'},

  {name:'COMPOSE_FILE',plat:'docker',desc:'Compose file path(s)',example:'docker-compose.yml:docker-compose.prod.yml',tag:'optional'},

  // Database
  {name:'DATABASE_URL',plat:'db',desc:'Full database connection string',example:'postgresql://user:pass@host:5432/dbname',tag:'secret'},
  {name:'REDIS_URL',plat:'db',desc:'Redis connection URL',example:'redis://localhost:6379',tag:'secret'},

  {name:'PGUSER',plat:'db',desc:'PostgreSQL username',example:'postgres',tag:'secret'},
  {name:'PGPASSWORD',plat:'db',desc:'PostgreSQL password',example:'secret123',tag:'secret'},
  {name:'PGDATABASE',plat:'db',desc:'PostgreSQL database name',example:'mydb',tag:'optional'},
  {name:'MYSQL_ROOT_PASSWORD',plat:'db',desc:'MySQL root password (Docker)',example:'rootpass',tag:'secret'},

  // Auth / API Keys
  {name:'JWT_SECRET',plat:'auth',desc:'JWT signing secret',example:'your-256-bit-secret',tag:'secret'},
  {name:'SESSION_SECRET',plat:'auth',desc:'Express session signing key',example:'keyboard-cat',tag:'secret'},

  {name:'STRIPE_PUBLISHABLE_KEY',plat:'auth',desc:'Stripe publishable key (safe for frontend)',example:'pk_live_xxxxxxxxxxxx',tag:'common'},

  {name:'OPENAI_API_KEY',plat:'auth',desc:'OpenAI API key',example:'sk-xxxxxxxxxxxx',tag:'secret'},

  {name:'TERM',plat:'system',desc:'Terminal type',example:'xterm-256color',tag:'optional'},
  {name:'LANG',plat:'system',desc:'System locale',example:'en_US.UTF-8',tag:'optional'},
  {name:'TZ',plat:'system',desc:'Timezone',example:'America/New_York',tag:'optional'},
  {name:'HTTP_PROXY',plat:'system',desc:'HTTP proxy URL',example:'http://proxy.example.com:8080',tag:'optional'},
  {name:'HTTPS_PROXY',plat:'system',desc:'HTTPS proxy URL',example:'http://proxy.example.com:8080',tag:'optional'},
  {name:'NO_PROXY',plat:'system',desc:'Hosts to bypass proxy',example:'localhost,127.0.0.1,.internal',tag:'optional'},
  {name:'DEBUG',plat:'system',desc:'Debug logging (used by many npm packages)',example:'app:*,http',tag:'optional'},
  {name:'LOG_LEVEL',plat:'system',desc:'Application log level',example:'info | debug | warn | error',tag:'optional'},
  {name:'NO_COLOR',plat:'system',desc:'Disable color output (de facto standard)',example:'1',tag:'optional'},
  {name:'FORCE_COLOR',plat:'system',desc:'Force color output',example:'1',tag:'optional'},

const PLATS = {
  node:'Node.js',aws:'AWS',gcp:'GCP',github:'GitHub Actions',docker:'Docker',
  db:'Database',auth:'Auth & APIs',ci:'CI/CD & Hosting',frontend:'Frontend',system:'System'
};

let activePlat = '';
const searchEl = document.getElementById('search');

function init() {
  const platEl = document.getElementById('platforms');
  platEl.innerHTML = `<span class="plat-btn active" onclick="filterPlat('')">All</span>` +
    Object.entries(PLATS).map(([k,v]) => {
      const c = VARS.filter(v2 => v2.plat === k).length;
      return `<span class="plat-btn" data-plat="${k}" onclick="filterPlat('${k}')">${v} (${c})</span>`;
    }).join('');

  searchEl.addEventListener('input', render);
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchEl) { e.preventDefault(); searchEl.focus(); }
    if (e.key === 'Escape') { searchEl.value = ''; render(); searchEl.blur(); }
  });

  const q = new URLSearchParams(location.search).get('q');
  if (q) { searchEl.value = q; }
  const p = new URLSearchParams(location.search).get('p');
  if (p) { activePlat = p; }

  render();
}

function filterPlat(plat) {
  activePlat = plat;
  document.querySelectorAll('.plat-btn').forEach(b => b.classList.toggle('active',
    (plat === '' && !b.dataset.plat) || b.dataset.plat === plat));
  render();
}

function render() {
  const query = searchEl.value.trim().toLowerCase();
  let filtered = VARS;

  if (activePlat) filtered = filtered.filter(v => v.plat === activePlat);
  if (query) filtered = filtered.filter(v =>
    v.name.toLowerCase().includes(query) ||
    v.desc.toLowerCase().includes(query) ||
    v.plat.includes(query)
  );

  document.getElementById('stats').textContent = `${filtered.length} of ${VARS.length} variables`;

  // Group by platform
  const groups = {};
  for (const v of filtered) {
    if (!groups[v.plat]) groups[v.plat] = [];
    groups[v.plat].push(v);
  }

  let html = '';
  for (const [plat, vars] of Object.entries(groups)) {
    html += `<div class="var-group"><h3 ti="h3_plats_plat_plat">${PLATS[plat] || plat}</h3><table class="var-table">`;
    for (const v of vars) {
      const tagHtml = v.tag === 'secret' ? '<span class="tag tag-secret">secret</span>' :
        v.tag === 'required' ? '<span class="tag tag-required">required</span>' : '';
      html += `<tr>
        <td class="var-name" onclick="copyVar('${v.name}', this)" title="Click to copy">${esc(v.name)}${tagHtml}</td>
        <td>
          <div class="var-desc">${esc(v.desc)}</div>
          ${v.example ? `<div class="var-example">Example: <code>${esc(v.example)}</code></div>` : ''}
        </td>
      </tr>`;
    }
    html += '</table></div>';
  }

  if (filtered.length === 0) html = '<p style="text-align:center;color:var(--muted);padding:20px">No variables found.</p>';
  document.getElementById('results').innerHTML = html;
}

function copyVar(name, el) {
  navigator.clipboard.writeText(name).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1200);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

init();
</script>
