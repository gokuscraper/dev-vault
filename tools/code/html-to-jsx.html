<script>
// ─────────────────────────────────────────────
// Conversion engine
// ─────────────────────────────────────────────

const SELF_CLOSING = new Set([
  'area','base','br','col','embed','hr','img','input','link',
  'meta','param','source','track','wbr'
]);

// HTML attr → JSX attr map
const ATTR_MAP = {
  // Core
  'class':            'className',
  'for':              'htmlFor',
  'tabindex':         'tabIndex',
  'accesskey':        'accessKey',
  'contenteditable':  'contentEditable',
  'crossorigin':      'crossOrigin',
  'spellcheck':       'spellCheck',
  'autocomplete':     'autoComplete',
  'autofocus':        'autoFocus',
  'autoplay':         'autoPlay',
  'enctype':          'encType',
  'formaction':       'formAction',
  'formenctype':      'formEncType',
  'formmethod':       'formMethod',
  'formnovalidate':   'formNoValidate',
  'formtarget':       'formTarget',
  'novalidate':       'noValidate',
  'readonly':         'readOnly',
  'maxlength':        'maxLength',
  'minlength':        'minLength',
  'usemap':           'useMap',
  'frameborder':      'frameBorder',
  'allowfullscreen':  'allowFullScreen',
  'cellpadding':      'cellPadding',
  'cellspacing':      'cellSpacing',
  'colspan':          'colSpan',
  'rowspan':          'rowSpan',
  'bgcolor':          'bgColor',
  'marginwidth':      'marginWidth',
  'marginheight':     'marginHeight',
  // default* variants
  'value':            'defaultValue',
  'checked':          'defaultChecked',
  'selected':         'defaultSelected',
  // xlink / xml
  'xlink:href':       'xlinkHref',
  'xlink:title':      'xlinkTitle',
  'xlink:show':       'xlinkShow',
  'xlink:actuate':    'xlinkActuate',
  'xml:space':        'xmlSpace',
  'xml:lang':         'xmlLang',
  'xml:base':         'xmlBase',
  // Events — HTML attr → React handler
  'onclick':          'onClick',
  'ondblclick':       'onDoubleClick',
  'onchange':         'onChange',
  'oninput':          'onInput',
  'onsubmit':         'onSubmit',
  'onreset':          'onReset',
  'onfocus':          'onFocus',
  'onblur':           'onBlur',
  'onkeydown':        'onKeyDown',
  'onkeyup':          'onKeyUp',
  'onkeypress':       'onKeyPress',
  'onmousedown':      'onMouseDown',
  'onmouseup':        'onMouseUp',
  'onmouseover':      'onMouseOver',
  'onmouseout':       'onMouseOut',
  'onmousemove':      'onMouseMove',
  'onmouseenter':     'onMouseEnter',
  'onmouseleave':     'onMouseLeave',
  'oncontextmenu':    'onContextMenu',
  'onscroll':         'onScroll',
  'onwheel':          'onWheel',
  'ondragstart':      'onDragStart',
  'ondragend':        'onDragEnd',
  'ondragover':       'onDragOver',
  'ondragenter':      'onDragEnter',
  'ondragleave':      'onDragLeave',
  'ondrop':           'onDrop',
  'onload':           'onLoad',
  'onerror':          'onError',
  'ontouchstart':     'onTouchStart',
  'ontouchend':       'onTouchEnd',
  'ontouchmove':      'onTouchMove',
  'onabort':          'onAbort',
  'oncanplay':        'onCanPlay',
  'oncanplaythrough': 'onCanPlayThrough',
  'ondurationchange': 'onDurationChange',
  'onemptied':        'onEmptied',
  'onencrypted':      'onEncrypted',
  'onended':          'onEnded',
  'onloadeddata':     'onLoadedData',
  'onloadedmetadata': 'onLoadedMetadata',
  'onloadstart':      'onLoadStart',
  'onpause':          'onPause',
  'onplay':           'onPlay',
  'onplaying':        'onPlaying',
  'onprogress':       'onProgress',
  'onratechange':     'onRateChange',
  'onseeked':         'onSeeked',
  'onseeking':        'onSeeking',
  'onstalled':        'onStalled',
  'onsuspend':        'onSuspend',
  'ontimeupdate':     'onTimeUpdate',
  'onvolumechange':   'onVolumeChange',
  'onwaiting':        'onWaiting',
  'onanimationstart': 'onAnimationStart',
  'onanimationend':   'onAnimationEnd',
  'onanimationiteration': 'onAnimationIteration',
  'ontransitionend':  'onTransitionEnd',
  'onselect':         'onSelect',
  'oncopy':           'onCopy',
  'oncut':            'onCut',
  'onpaste':          'onPaste',
  'oncompositionend':   'onCompositionEnd',
  'oncompositionstart': 'onCompositionStart',
  'oncompositionupdate':'onCompositionUpdate',
};

// CSS property name → camelCase (common set + generic rule)
function cssPropToJSX(prop) {
  prop = prop.trim();
  // vendor prefixes: -webkit-transform → WebkitTransform
  if (prop.startsWith('-')) {
    prop = prop.replace(/^-(\w)/, (_, c) => c.toUpperCase());
  }
  // camelCase: background-color → backgroundColor
  return prop.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
}

function cssValueToJSX(val) {
  val = val.trim();
  // If purely numeric (px, em, rem, % etc.) keep as string
  // Numbers without units become JS numbers
  if (/^-?\d+(\.\d+)?$/.test(val)) return val; // raw number — no quotes
  return `'${val.replace(/'/g, "\\'")}'`;
}

function parseInlineStyle(styleStr) {
  // Returns { jsxStr, count }
  const declarations = styleStr.split(';').map(s => s.trim()).filter(Boolean);
  if (!declarations.length) return { jsxStr: '{{}}', count: 0 };
  let count = 0;
  const pairs = [];
  for (const decl of declarations) {
    const colon = decl.indexOf(':');
    if (colon === -1) continue;
    const prop = decl.slice(0, colon).trim();
    const val  = decl.slice(colon + 1).trim();
    pairs.push(`${cssPropToJSX(prop)}: ${cssValueToJSX(val)}`);
    count++;
  }
  return { jsxStr: `{{${pairs.join(', ')}}}`, count };
}

// ── Tokenise-then-reconstruct approach ──────────────────────

function convertHTMLtoJSX(html) {
  let changes = 0;

  // 1. HTML comments → JSX comments
  html = html.replace(/<!--([\s\S]*?)-->/g, (_, content) => {
    changes++;
    return `{/*${content}*/}`;
  });

  // 2. Process tags — match opening/closing/self-closing tags
  html = html.replace(/<(\/?)([\w:.-]+)((?:\s+[\s\S]*?)?)(\/?)>/g, (full, slash, tagName, attrsRaw, selfSlash) => {
    // Closing tag — nothing to map
    if (slash === '/') return full;

    const lowerTag = tagName.toLowerCase();
    const isSelfClose = SELF_CLOSING.has(lowerTag);

    // Parse attributes preserving order
    let newAttrs = '';
    let attrChanges = 0;

    if (attrsRaw.trim()) {
      // Match attribute tokens: name, name="val", name='val', name={expr}, boolean
      const attrRegex = /([\w:.-]+)\s*(?:=\s*(?:"([^"]*)"|'([^']*)'|\{([^}]*)\}|(\S+)))?/g;
      let m;
      while ((m = attrRegex.exec(attrsRaw)) !== null) {
        const [ , name, dq, sq, brace, bare ] = m;
        const rawName = name.toLowerCase();
        const val = dq !== undefined ? dq : sq !== undefined ? sq : brace !== undefined ? brace : bare;
        const hasBrace = brace !== undefined;

        // Skip empty matches at end
        if (!name.trim()) continue;

        // data-* and aria-* pass through unchanged
        if (rawName.startsWith('data-') || rawName.startsWith('aria-')) {
          if (val !== undefined) {
            newAttrs += ` ${name}="${val}"`;
          } else {
            newAttrs += ` ${name}`;
          }
          continue;
        }

        const jsxName = ATTR_MAP[rawName] || name;
        if (jsxName !== name) attrChanges++;

        if (val === undefined) {
          // Boolean attr → just the name (e.g. disabled, required)
          newAttrs += ` ${jsxName}`;
          continue;
        }

        // style attribute → object
        if (rawName === 'style' && !hasBrace) {
          const { jsxStr, count } = parseInlineStyle(val);
          newAttrs += ` ${jsxName}=${jsxStr}`;
          attrChanges += count;
          continue;
        }

        // Event handler values: keep as JSX expr if looks like a fn call
        if (rawName.startsWith('on') && !hasBrace) {
          // wrap in curly braces
          newAttrs += ` ${jsxName}={${val}}`;
          continue;
        }

        if (hasBrace) {
          newAttrs += ` ${jsxName}={${val}}`;
        } else {
          newAttrs += ` ${jsxName}="${val}"`;
        }
      }
      changes += attrChanges;
    }

    // Self-closing
    const close = isSelfClose ? ' />' : '>';
    if (isSelfClose && selfSlash === '') changes++; // added self-close slash

    return `<${tagName}${newAttrs}${close}`;
  });

  return { jsx: html, changes };
}

// ─────────────────────────────────────────────
// Syntax highlighting (simple regex)
// ─────────────────────────────────────────────

function escape(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(jsx) {
  // We'll tokenise line by line to keep it manageable
  const lines = jsx.split('\n');
  return lines.map(line => highlightLine(line)).join('\n');
}

function highlightLine(line) {
  // JSX comment: {/* ... */}
  line = line.replace(/\{\/\*([\s\S]*?)\*\/\}/g, (_, c) =>
    `<span class="tok-comment">{/*${escape(c)}*/}</span>`
  );

  // Tags: <TagName attrs>
  line = line.replace(/(&lt;\/?[\w:.-]+)((?:\s+(?:[\w:.-]+)(?:\s*=\s*(?:"[^"]*"|'[^']*'|\{[^}]*\}))?)*)\s*(\/&gt;|&gt;)/g,
    (full, tag, attrs, close) => {
      const tagHL = `<span class="tok-tag">${tag}</span>`;
      const attrsHL = attrs.replace(/([\w:.-]+)(\s*=\s*)("([^"]*)"|'([^']*)'|\{([^}]*)\})/g,
        (_, name, eq, val) => {
          const valHL = val.startsWith('{')
            ? `<span class="tok-brace">{</span><span class="tok-jsx-expr">${escape(val.slice(1,-1))}</span><span class="tok-brace">}</span>`
            : `<span class="tok-str">${escape(val)}</span>`;
          return `<span class="tok-attr">${name}</span>${eq}${valHL}`;
        }
      ).replace(/([\w:.-]+)(?!=)/g, m => `<span class="tok-attr">${m}</span>`);
      return `${tagHL}${attrsHL}<span class="tok-tag">${close}</span>`;
    }
  );

  return line;
}

// ─────────────────────────────────────────────
// UI state
// ─────────────────────────────────────────────

let lastJSX = '';

function onInput() {
  const html = document.getElementById('htmlInput').value;
  const lines = html ? html.split('\n').length : 0;
  document.getElementById('htmlLines').textContent = `${lines} line${lines !== 1 ? 's' : ''}`;

  if (!html.trim()) {
    document.getElementById('jsxOutput').innerHTML = '';
    document.getElementById('convCount').textContent = '0';
    document.getElementById('statusChanges').textContent = '';
    lastJSX = '';
    return;
  }

  const { jsx, changes } = convertHTMLtoJSX(html);
  lastJSX = jsx;

  document.getElementById('convCount').textContent = changes;
  document.getElementById('statusChanges').textContent =
    changes > 0 ? `${changes} attribute${changes !== 1 ? 's' : ''} converted` : 'No changes needed';

  // Render highlighted
  const escaped = escape(jsx);
  document.getElementById('jsxOutput').innerHTML = highlight(escaped);
}

function copyJSX() {
  if (!lastJSX) return;
  navigator.clipboard.writeText(lastJSX).then(() => {
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent=T("jtc_copied");
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  });
}

async function pasteHTML() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('htmlInput').value = text;
    onInput();
  } catch {
    document.getElementById('htmlInput').focus();
    document.execCommand('paste');
    onInput();
  }
}

function clearAll() {
  document.getElementById('htmlInput').value = '';
  document.getElementById('jsxOutput').innerHTML = '';
  document.getElementById('convCount').textContent = '0';
  document.getElementById('htmlLines').textContent=T("jtc_0_lines");
  document.getElementById('statusChanges').textContent = '';
  lastJSX = '';
}
