<meta name="description" content="Precision stopwatch with lap tracking, multiple parallel timers, keyboard shortcuts, and CSV export. Free browser-based tool.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.6rem;margin-bottom:4px;color:#fff}
.subtitle{color:#888;font-size:.85rem;margin-bottom:18px}
.controls-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.controls-bar button{background:#222;color:#e0e0e0;border:1px solid #333;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem}
.controls-bar button:hover{background:#333}
.controls-bar button.active{background:#4da6ff;color:#000;border-color:#4da6ff}
#timers{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:1100px}
.timer-card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;flex:1;min-width:300px;max-width:360px}
.timer-card.fullscreen{position:fixed;inset:0;max-width:none;min-width:0;z-index:999;border-radius:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-card.fullscreen .time-display{font-size:8vw}
.timer-label{font-size:.75rem;color:#888;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.timer-label span{cursor:pointer}
.time-display{font-family:'Courier New',monospace;font-size:3rem;text-align:center;color:#fff;letter-spacing:2px;padding:16px 0;user-select:none}
.btn-row{display:flex;gap:8px;justify-content:center;margin:12px 0}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;transition:background .15s}
.btn-start{background:#4da6ff;color:#000}.btn-start:hover{background:#6bb8ff}
.btn-start.running{background:#ff4d4d}.btn-start.running:hover{background:#ff6b6b}
.btn-lap{background:#333;color:#e0e0e0}.btn-lap:hover{background:#444}
.btn-reset{background:#222;color:#999}.btn-reset:hover{background:#333;color:#e0e0e0}
.btn-fs{background:transparent;color:#666;border:1px solid #333;padding:4px 8px;font-size:.7rem;border-radius:4px;cursor:pointer}
.btn-fs:hover{color:#e0e0e0;border-color:#555}
.lap-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.78rem}
.lap-table th{color:#888;text-align:left;padding:4px 6px;border-bottom:1px solid #333;font-weight:normal}
.lap-table td{padding:4px 6px;border-bottom:1px solid #1a1a1a;font-family:'Courier New',monospace}
.lap-table .fastest td{color:#4dff88}.lap-table .slowest td{color:#ff4d4d}
.lap-scroll{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #161616}
.export-row{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.export-row button{background:transparent;color:#666;border:1px solid #333;padding:2px 8px;border-radius:4px;font-size:.7rem;cursor:pointer}
.export-row button:hover{color:#e0e0e0;border-color:#555}
.shortcuts{color:#555;font-size:.7rem;margin-top:18px;text-align:center}
.shortcuts kbd{background:#222;padding:1px 5px;border-radius:3px;border:1px solid #333;color:#888}
footer{margin-top:auto;padding-top:30px;text-align:center;font-size:.75rem;color:#555}
footer a{color:#4da6ff;text-decoration:none}footer a:hover{text-decoration:underline}

<body>
<h1>Stopwatch</h1>
<p class="subtitle">Precision timer with laps</p>
<div class="controls-bar">
  <button onclick="addTimer()" id="addBtn">+ Add Timer</button>
  <button onclick="toggleTick()" id="tickBtn">Tick Sound: Off</button>
</div>
<div id="timers"></div>
<p class="shortcuts"><kbd>Space</kbd> Start/Stop &nbsp; <kbd>L</kbd> Lap &nbsp; <kbd>R</kbd> Reset &nbsp; <kbd>1-3</kbd> Focus timer</p>
<footer>
  <a href="https://yurukusa.github.io/dev-toolkit/">dev-toolkit</a>
  &nbsp;|&nbsp; Related: Pomodoro &middot; Countdown Timer
</footer>
<script>
const timers = [];
let focusedTimer = 0;
let tickEnabled = false;
let audioCtx = null;

function fmt(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function beep() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 880; o.type = 'sine';
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}

function createTimerState(id) {
  return { id, running: false, elapsed: 0, startTs: 0, laps: [], rafId: null, lastTickSec: -1, isFs: false };
}

function addTimer() {
  if (timers.length >= 3) return;
  const t = createTimerState(timers.length);
  timers.push(t);
  focusedTimer = t.id;
  renderTimers();
  if (timers.length >= 3) document.getElementById('addBtn').style.display = 'none';
}

function removeTimer(id) {
  const t = timers.find(x => x.id === id);
  if (t) { if (t.rafId) cancelAnimationFrame(t.rafId); }
  timers.splice(timers.findIndex(x => x.id === id), 1);
  timers.forEach((x, i) => x.id = i);
  focusedTimer = Math.min(focusedTimer, timers.length - 1);
  if (focusedTimer < 0) focusedTimer = 0;
  renderTimers();
  document.getElementById('addBtn').style.display = '';
}

function getElapsed(t) {
  return t.running ? t.elapsed + (performance.now() - t.startTs) : t.elapsed;
}

function updateDisplay(t) {
  const el = getElapsed(t);
  const disp = document.getElementById(`display-${t.id}`);
  if (disp) disp.textContent = fmt(el);
  if (t.id === focusedTimer) document.title = `${fmt(el)} - Stopwatch`;
  if (tickEnabled && t.running) {
    const sec = Math.floor(el / 1000);
    if (sec !== t.lastTickSec) { t.lastTickSec = sec; beep(); }
  }
  if (t.running) t.rafId = requestAnimationFrame(() => updateDisplay(t));
}

function toggleTimer(id) {
  const t = timers[id]; if (!t) return;
  focusedTimer = id;
  if (t.running) {
    t.elapsed += performance.now() - t.startTs;
    t.running = false;
    if (t.rafId) cancelAnimationFrame(t.rafId);
    updateDisplay(t);
    updateButtons(t);
  } else {
    t.startTs = performance.now();
    t.running = true;
    t.lastTickSec = -1;
    updateDisplay(t);
    updateButtons(t);
  }
}

function resetTimer(id) {
  const t = timers[id]; if (!t) return;
  if (t.rafId) cancelAnimationFrame(t.rafId);
  t.running = false; t.elapsed = 0; t.startTs = 0; t.laps = []; t.lastTickSec = -1;
  const disp = document.getElementById(`display-${t.id}`);
  if (disp) disp.textContent = fmt(0);
  updateButtons(t);
  renderLaps(t);
  if (t.id === focusedTimer) document.title = 'Stopwatch \u2014 Timer with Laps';
}

function lapTimer(id) {
  const t = timers[id]; if (!t || !t.running) return;
  focusedTimer = id;
  const total = getElapsed(t);
  const prevTotal = t.laps.length ? t.laps[t.laps.length - 1].total : 0;
  t.laps.push({ num: t.laps.length + 1, lap: total - prevTotal, total });
  renderLaps(t);
}

function updateButtons(t) {
  const btn = document.getElementById(`startBtn-${t.id}`);
  if (!btn) return;
  btn.textContent = t.running ? 'Stop' : 'Start';
  btn.className = t.running ? 'btn btn-start running' : 'btn btn-start';
}

function renderLaps(t) {
  const container = document.getElementById(`laps-${t.id}`);
  if (!container) return;
  if (!t.laps.length) { container.innerHTML = ''; return; }
  let fastest = Infinity, slowest = 0, fi = -1, si = -1;
  if (t.laps.length > 1) {
    t.laps.forEach((l, i) => { if (l.lap < fastest) { fastest = l.lap; fi = i; } if (l.lap > slowest) { slowest = l.lap; si = i; } });
  }
  let html = '<div class="lap-scroll"><table class="lap-table"><tr><th>#</th><th>Lap</th><th>Total</th><th>\u0394</th></tr>';
  for (let i = t.laps.length - 1; i >= 0; i--) {
    const l = t.laps[i];
    const delta = i > 0 ? l.lap - t.laps[i-1].lap : 0;
    const ds = i > 0 ? (delta >= 0 ? '+' : '') + fmt(Math.abs(delta)) : '\u2014';
    const cls = (t.laps.length > 1 && i === fi) ? 'fastest' : (t.laps.length > 1 && i === si) ? 'slowest' : '';
    html += `<tr class="${cls}"><td>${l.num}</td><td>${fmt(l.lap)}</td><td>${fmt(l.total)}</td><td>${i > 0 && delta < 0 ? '-' : ''}${ds}</td></tr>`;
  }
  html += '</table></div>';
  html += `<div class="export-row"><button onclick="exportLaps(${t.id},'text')">Copy Text</button><button onclick="exportLaps(${t.id},'csv')">Copy CSV</button></div>`;
  container.innerHTML = html;
}

function exportLaps(id, format) {
  const t = timers[id]; if (!t || !t.laps.length) return;
  let out;
  if (format === 'csv') {
    out = 'Lap,Lap Time,Total Time,Delta\n';
    t.laps.forEach((l, i) => {
      const delta = i > 0 ? l.lap - t.laps[i-1].lap : 0;
      out += `${l.num},${fmt(l.lap)},${fmt(l.total)},${i > 0 ? (delta >= 0 ? '+' : '-') + fmt(Math.abs(delta)) : ''}\n`;
    });
  } else {
    out = t.laps.map((l, i) => {
      const delta = i > 0 ? l.lap - t.laps[i-1].lap : 0;
      return `Lap ${l.num}: ${fmt(l.lap)} (Total: ${fmt(l.total)})${i > 0 ? ' \u0394' + (delta >= 0 ? '+' : '-') + fmt(Math.abs(delta)) : ''}`;
    }).join('\n');
  }
  navigator.clipboard.writeText(out).then(() => {
    const btn = event.target; const orig = btn.textContent; btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = orig, 1200);
  });
}

function toggleFullscreen(id) {
  const card = document.getElementById(`card-${id}`);
  const t = timers[id]; if (!t || !card) return;
  t.isFs = !t.isFs;
  card.classList.toggle('fullscreen', t.isFs);
}

function toggleTick() {
  tickEnabled = !tickEnabled;
  if (tickEnabled && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (tickEnabled && audioCtx.state === 'suspended') audioCtx.resume();
  document.getElementById('tickBtn').textContent = `Tick Sound: ${tickEnabled ? 'On' : 'Off'}`;
  document.getElementById('tickBtn').classList.toggle('active', tickEnabled);
}

function renderTimers() {
  const container = document.getElementById('timers');
  container.innerHTML = '';
  timers.forEach(t => {
    const card = document.createElement('div');
    card.className = 'timer-card'; card.id = `card-${t.id}`;
    card.innerHTML = `
      <div class="timer-label">
        <span>Timer ${t.id + 1}${t.id === focusedTimer ? ' (focused)' : ''}</span>
        <span style="display:flex;gap:6px">
          <button class="btn-fs" onclick="toggleFullscreen(${t.id})" title="Fullscreen">\u26f6</button>
          ${timers.length > 1 ? `<button class="btn-fs" onclick="removeTimer(${t.id})" title="Remove">\u2715</button>` : ''}
        </span>
      </div>
      <div class="time-display" id="display-${t.id}">${fmt(getElapsed(t))}</div>
      <div class="btn-row">
        <button class="btn ${t.running ? 'btn-start running' : 'btn-start'}" id="startBtn-${t.id}" onclick="toggleTimer(${t.id})">${t.running ? 'Stop' : 'Start'}</button>
        <button class="btn btn-lap" onclick="lapTimer(${t.id})">Lap</button>
        <button class="btn btn-reset" onclick="resetTimer(${t.id})">Reset</button>
      </div>
      <div id="laps-${t.id}"></div>`;
    container.appendChild(card);
    renderLaps(t);
    if (t.running) { t.rafId = requestAnimationFrame(() => updateDisplay(t)); }
  });
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ') { e.preventDefault(); toggleTimer(focusedTimer); }
  else if (e.key === 'l' || e.key === 'L') lapTimer(focusedTimer);
  else if (e.key === 'r' || e.key === 'R') resetTimer(focusedTimer);
  else if (e.key >= '1' && e.key <= '3') {
    const idx = parseInt(e.key) - 1;
    if (idx < timers.length) { focusedTimer = idx; renderTimers(); }
  }
});

addTimer();
</script>
</body>
</html>
