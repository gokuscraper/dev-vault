<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.editorconfig Generator — Editor Config Builder</title>
<meta name="description" content="Generate .editorconfig visually. Set indent style, charset, EOL per file type. 6 presets. No signup.">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/editorconfig-gen/">
<script type="application/ld+json">

</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.rule-item{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;padding:12px;margin-bottom:8px;position:relative}
.rule-item .remove{position:absolute;top:6px;right:8px;color:#666;cursor:pointer;font-size:0.8rem}
.rule-item .remove:hover{color:#f85149}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:160px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>.editorconfig Generator</h1>
<p class="sub">Consistent coding style across editors and IDEs</p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Root Setting</h3>
<div class="check-row"><input type="checkbox" id="isRoot" checked onchange="gen()"><label for="isRoot">root = true (stop searching parent directories)</label></div>
</div>

<div class="section">
<h3>Global Defaults [*]</h3>
<div class="row">
<div class="col"><label>Indent Style</label><select id="gIndent" onchange="gen()"><option selected>space</option><option>tab</option></select></div>
<div class="col"><label>Indent Size</label><input type="number" id="gSize" value="2" min="1" max="8" oninput="gen()"></div>
<div class="col"><label>End of Line</label><select id="gEol" onchange="gen()"><option selected>lf</option><option>crlf</option><option>cr</option></select></div>
</div>
<div class="row">
<div class="col"><label>Charset</label><select id="gCharset" onchange="gen()"><option selected>utf-8</option><option>utf-8-bom</option><option>latin1</option></select></div>
<div class="col"><label>Trim Trailing Whitespace</label><select id="gTrim" onchange="gen()"><option selected>true</option><option>false</option></select></div>
<div class="col"><label>Insert Final Newline</label><select id="gNewline" onchange="gen()"><option selected>true</option><option>false</option></select></div>
</div>
<div class="row">
<div class="col"><label>Max Line Length (optional)</label><input type="number" id="gMaxLine" value="" min="0" placeholder="off" oninput="gen()"></div>
</div>
</div>

<div class="section">
<h3>File-Specific Overrides</h3>
<div id="rulesList"></div>
<button class="add-btn" onclick="addRule()">+ Add Override</button>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/prettier-config-gen/">Prettier Config</a> | <a href="https://gokuscraper.github.io/dev-vault/eslint-config-gen/">ESLint Config</a> | <a href="https://gokuscraper.github.io/dev-vault/gitignore-gen/">.gitignore Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const PRESETS = {
  'Standard': {root:true,indent:'space',size:2,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',
    rules:[{glob:'*.md',indent:'space',size:2,trim:'false',maxLine:''},{glob:'Makefile',indent:'tab',size:4,trim:'true',maxLine:''},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''}]},
  'Tabs (4)': {root:true,indent:'tab',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',
    rules:[{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'*.md',indent:'space',size:2,trim:'false',maxLine:''}]},
  'PHP/Laravel': {root:true,indent:'space',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'120',
    rules:[{glob:'*.blade.php',indent:'space',size:4,trim:'true',maxLine:''},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'*.md',indent:'space',size:2,trim:'false',maxLine:''}]},
  'Go': {root:true,indent:'tab',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',
    rules:[{glob:'*.go',indent:'tab',size:4,trim:'true',maxLine:''},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'Makefile',indent:'tab',size:4,trim:'true',maxLine:''}]},
  'Python': {root:true,indent:'space',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'88',
    rules:[{glob:'*.py',indent:'space',size:4,trim:'true',maxLine:'88'},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'Makefile',indent:'tab',size:4,trim:'true',maxLine:''}]},
  'Minimal': {root:true,indent:'space',size:2,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',rules:[]}
};

let rules = [];

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('div');b.className='preset';b.textContent=n;
    b.onclick=()=>loadPreset(n);c.appendChild(b);
  });
}

function loadPreset(name){
  const p=PRESETS[name];if(!p)return;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  document.getElementById('isRoot').checked=p.root;
  document.getElementById('gIndent').value=p.indent;
  document.getElementById('gSize').value=p.size;
  document.getElementById('gEol').value=p.eol;
  document.getElementById('gCharset').value=p.charset;
  document.getElementById('gTrim').value=p.trim;
  document.getElementById('gNewline').value=p.newline;
  document.getElementById('gMaxLine').value=p.maxLine;
  rules=JSON.parse(JSON.stringify(p.rules));
  renderRules();gen();
}

function addRule(){rules.push({glob:'*.ext',indent:'space',size:2,trim:'true',maxLine:''});renderRules();gen()}
function removeRule(i){rules.splice(i,1);renderRules();gen()}

function renderRules(){
  const c=document.getElementById('rulesList');c.innerHTML='';
  rules.forEach((r,i)=>{
    const d=document.createElement('div');d.className='rule-item';
    d.innerHTML=`<span class="remove" onclick="removeRule(${i})">✕</span>
    <div class="row">
      <div class="col"><label>Glob Pattern</label><input value="${esc(r.glob)}" onchange="rules[${i}].glob=this.value;gen()" placeholder="*.py"></div>
      <div class="col"><label>Indent</label><select onchange="rules[${i}].indent=this.value;gen()"><option${r.indent==='space'?' selected':''}>space</option><option${r.indent==='tab'?' selected':''}>tab</option></select></div>
      <div class="col" style="max-width:80px"><label>Size</label><input type="number" value="${r.size}" min="1" max="8" onchange="rules[${i}].size=+this.value;gen()"></div>
      <div class="col"><label>Trim WS</label><select onchange="rules[${i}].trim=this.value;gen()"><option${r.trim==='true'?' selected':''}>true</option><option${r.trim==='false'?' selected':''}>false</option></select></div>
      <div class="col" style="max-width:80px"><label>Max Line</label><input type="number" value="${r.maxLine||''}" placeholder="off" onchange="rules[${i}].maxLine=this.value;gen()"></div>
    </div>`;
    c.appendChild(d);
  });
}

function gen(){
  let out='# EditorConfig: https://editorconfig.org\n\n';
  if(document.getElementById('isRoot').checked) out+='root = true\n\n';

  out+='[*]\n';
  out+=`indent_style = ${document.getElementById('gIndent').value}\n`;
  const gSize=document.getElementById('gSize').value;
  if(document.getElementById('gIndent').value==='tab'){
    out+=`tab_width = ${gSize}\n`;
  } else {
    out+=`indent_size = ${gSize}\n`;
  }
  out+=`end_of_line = ${document.getElementById('gEol').value}\n`;
  out+=`charset = ${document.getElementById('gCharset').value}\n`;
  out+=`trim_trailing_whitespace = ${document.getElementById('gTrim').value}\n`;
  out+=`insert_final_newline = ${document.getElementById('gNewline').value}\n`;
  const gMax=document.getElementById('gMaxLine').value;
  if(gMax) out+=`max_line_length = ${gMax}\n`;

  rules.forEach(r=>{
    out+=`\n[${r.glob}]\n`;
    out+=`indent_style = ${r.indent}\n`;
    if(r.indent==='tab'){
      out+=`tab_width = ${r.size}\n`;
    } else {
      out+=`indent_size = ${r.size}\n`;
    }
    out+=`trim_trailing_whitespace = ${r.trim}\n`;
    if(r.maxLine) out+=`max_line_length = ${r.maxLine}\n`;
  });

  document.getElementById('out').textContent=out;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('Standard');
</script>
</body>
</html>
