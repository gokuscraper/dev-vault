</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const PRESETS = {
  'Standard': {root:true,indent:'space',size:2,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',
    rules:[{glob:'*.md',indent:'space',size:2,trim:'false',maxLine:''},{glob:'Makefile',indent:'tab',size:4,trim:'true',maxLine:''},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''}]},
  'Tabs (4)': {root:true,indent:'tab',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',
    rules:[{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'*.md',indent:'space',size:2,trim:'false',maxLine:''}]},
  'PHP/Laravel': {root:true,indent:'space',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'120',
    rules:[{glob:'*.blade.php',indent:'space',size:4,trim:'true',maxLine:''},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'*.md',indent:'space',size:2,trim:'false',maxLine:''}]},
  'Go': {root:true,indent:'tab',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',
    rules:[{glob:'*.go',indent:'tab',size:4,trim:'true',maxLine:''},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'Makefile',indent:'tab',size:4,trim:'true',maxLine:''}]},
  'Python': {root:true,indent:'space',size:4,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'88',
    rules:[{glob:'*.py',indent:'space',size:4,trim:'true',maxLine:'88'},{glob:'*.{yml,yaml}',indent:'space',size:2,trim:'true',maxLine:''},{glob:'Makefile',indent:'tab',size:4,trim:'true',maxLine:''}]},
  'Minimal': {root:true,indent:'space',size:2,eol:'lf',charset:'utf-8',trim:'true',newline:'true',maxLine:'',rules:[]}
};

let rules = [];

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('div');b.className='preset';b.textContent=n;
    b.onclick=()=>loadPreset(n);c.appendChild(b);
  });
}

function loadPreset(name){
  const p=PRESETS[name];if(!p)return;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  document.getElementById('isRoot').checked=p.root;
  document.getElementById('gIndent').value=p.indent;
  document.getElementById('gSize').value=p.size;
  document.getElementById('gEol').value=p.eol;
  document.getElementById('gCharset').value=p.charset;
  document.getElementById('gTrim').value=p.trim;
  document.getElementById('gNewline').value=p.newline;
  document.getElementById('gMaxLine').value=p.maxLine;
  rules=JSON.parse(JSON.stringify(p.rules));
  renderRules();gen();
}

function addRule(){rules.push({glob:'*.ext',indent:'space',size:2,trim:'true',maxLine:''});renderRules();gen()}
function removeRule(i){rules.splice(i,1);renderRules();gen()}

function renderRules(){
  const c=document.getElementById('rulesList');c.innerHTML='';
  rules.forEach((r,i)=>{
    const d=document.createElement('div');d.className='rule-item';
    d.innerHTML=`<span class="remove" onclick="removeRule(${i})">✕</span>
    <div class="row">
      <div class="col"><label ti="label_glob_pattern">Glob Pattern</label><input value="${esc(r.glob)}" onchange="rules[${i}].glob=this.value;gen()" tp="placeholder_py" placeholder="*.py"></div>
      <div class="col"><label ti="label_indent">Indent</label><select onchange="rules[${i}].indent=this.value;gen()"><option${r.indent==='space'?' selected':''}>space</option><option${r.indent==='tab'?' selected':''}>tab</option></select></div>
      <div class="col" style="max-width:80px"><label ti="label_size">Size</label><input type="number" value="${r.size}" min="1" max="8" onchange="rules[${i}].size=+this.value;gen()"></div>
      <div class="col"><label ti="label_trim_ws">Trim WS</label><select onchange="rules[${i}].trim=this.value;gen()"><option${r.trim==='true'?' selected':''}>true</option><option${r.trim==='false'?' selected':''}>false</option></select></div>
      <div class="col" style="max-width:80px"><label ti="label_max_line">Max Line</label><input type="number" value="${r.maxLine||''}" placeholder="off" onchange="rules[${i}].maxLine=this.value;gen()"></div>
    </div>`;
    c.appendChild(d);
  });
}

function gen(){
  let out='# EditorConfig: https://editorconfig.org\n\n';
  if(document.getElementById('isRoot').checked) out+='root = true\n\n';

  out+='[*]\n';
  out+=`indent_style = ${document.getElementById('gIndent').value}\n`;
  const gSize=document.getElementById('gSize').value;
  if(document.getElementById('gIndent').value==='tab'){
    out+=`tab_width = ${gSize}\n`;
  } else {
    out+=`indent_size = ${gSize}\n`;
  }
  out+=`end_of_line = ${document.getElementById('gEol').value}\n`;
  out+=`charset = ${document.getElementById('gCharset').value}\n`;
  out+=`trim_trailing_whitespace = ${document.getElementById('gTrim').value}\n`;
  out+=`insert_final_newline = ${document.getElementById('gNewline').value}\n`;
  const gMax=document.getElementById('gMaxLine').value;
  if(gMax) out+=`max_line_length = ${gMax}\n`;

  rules.forEach(r=>{
    out+=`\n[${r.glob}]\n`;
    out+=`indent_style = ${r.indent}\n`;
    if(r.indent==='tab'){
      out+=`tab_width = ${r.size}\n`;
    } else {
      out+=`indent_size = ${r.size}\n`;
    }
    out+=`trim_trailing_whitespace = ${r.trim}\n`;
    if(r.maxLine) out+=`max_line_length = ${r.maxLine}\n`;
  });

  document.getElementById('out').textContent=out;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('Standard');
</script>
