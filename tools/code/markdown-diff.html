<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.tabs{display:flex;gap:4px;margin-bottom:16px;justify-content:center}
.tab{padding:8px 20px;border-radius:8px;border:1px solid #333;background:transparent;color:#888;font-size:0.85rem;cursor:pointer;font-weight:600}
.tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.tab:hover:not(.active){border-color:#555}
.split-view{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.split-view{grid-template-columns:1fr}}
.pane{display:flex;flex-direction:column}
.pane-label{font-size:0.85rem;color:#888;font-weight:600;margin-bottom:6px}
.pane textarea{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none;resize:vertical;font-family:monospace;min-height:400px}
.pane textarea:focus{border-color:#3b82f6}
.preview-pane{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:16px;min-height:400px;overflow:auto;line-height:1.6}
.preview-pane h1,.preview-pane h2,.preview-pane h3{color:#fff;margin:16px 0 8px}
.preview-pane h1:first-child,.preview-pane h2:first-child,.preview-pane h3:first-child{margin-top:0}
.preview-pane p{margin:8px 0;color:#ccc}
.preview-pane code{background:#161616;padding:2px 6px;border-radius:4px;font-size:0.9em;color:#4ade80}
.preview-pane pre{background:#161616;padding:12px;border-radius:6px;overflow:auto;margin:8px 0}
.preview-pane pre code{background:none;padding:0}
.preview-pane ul,.preview-pane ol{padding-left:24px;margin:8px 0}
.preview-pane li{margin:4px 0;color:#ccc}
.preview-pane blockquote{border-left:3px solid #3b82f6;padding:4px 12px;margin:8px 0;color:#888;background:#0a0a0a;border-radius:0 4px 4px 0}
.preview-pane table{width:100%;border-collapse:collapse;margin:8px 0}
.preview-pane th,.preview-pane td{padding:8px 12px;border:1px solid #333;text-align:left}
.preview-pane th{background:#161616;color:#ccc;font-weight:600}
.preview-pane hr{margin:16px 0;border:none;border-top:1px solid #333}
.preview-pane a{color:#4da6ff}
.preview-pane img{max-width:100%}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="container">
<h1>Markdown Diff</h1>
<p class="subtitle">Compare two Markdown documents side by side.</p>

<div class="tabs">
  <button class="tab active" onclick="switchMode('code')" id="tabCode">Code</button>
  <button class="tab" onclick="switchMode('preview')" id="tabPreview">Preview</button>
</div>

<div id="codeView">
  <div class="split-view">
    <div class="pane">
      <div class="pane-label">Source Markdown</div>
      <textarea id="sourceMd" oninput="updateDiff()"># Hello World

This is the **original** document.

- Item 1
- Item 2

Here is a paragraph with some `inline code`.

```js
const x = 1;
console.log(x);
```

> A blockquote</textarea>
    </div>
    <div class="pane">
      <div class="pane-label">Modified Markdown</div>
      <textarea id="targetMd" oninput="updateDiff()"># Hello World

This is the **modified** document.

- Item 1
- Item 2
- Item 3

Here is a paragraph with some `inline code` and more text.

```js
const x = 2;
console.log(x + 1);
```

> A blockquote
> Added line</textarea>
    </div>
  </div>
</div>

<div id="previewView" style="display:none">
  <div class="split-view">
    <div class="pane">
      <div class="pane-label">Source Preview</div>
      <div class="preview-pane" id="sourcePreview"></div>
    </div>
    <div class="pane">
      <div class="pane-label">Modified Preview</div>
      <div class="preview-pane" id="targetPreview"></div>
    </div>
  </div>
</div>

<footer>
  <p><a href="https://github.com/yurukusa/dev-toolkit">GitHub</a></p>
</footer>
</div>

<script>
function switchMode(mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
  document.getElementById('codeView').style.display = mode === 'code' ? '' : 'none';
  document.getElementById('previewView').style.display = mode === 'preview' ? '' : 'none';
  if (mode === 'preview') updateDiff();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Simple Markdown to HTML renderer
function mdToHtml(md) {
  // Escape HTML first
  let html = escapeHtml(md);
  
  // Code blocks (fenced)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });
  
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');
  
  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  
  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  
  // Links
  html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
  
  // Images
  html = html.replace(/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1">');
  
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  
  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  
  // Paragraphs (wrap remaining lines)
  const lines = html.split('\n');
  html = lines.map(line => {
    line = line.trim();
    if (!line) return '';
    if (line.startsWith('<h') || line.startsWith('<pre') || line.startsWith('<ul') || line.startsWith('<li') || line.startsWith('<blockquote') || line.startsWith('<hr') || line.startsWith('<table') || line.endsWith('</pre>') || line.endsWith('</ul>') || line.endsWith('</blockquote>') || line.endsWith('</li>')) {
      return line;
    }
    return '<p>' + line + '</p>';
  }).join('\n');
  
  // Clean up nested paragraph issues
  html = html.replace(/<li><p>/g, '<li>');
  html = html.replace(/<\/p><\/li>/g, '</li>');
  html = html.replace(/<blockquote><p>/g, '<blockquote>');
  html = html.replace(/<\/p><\/blockquote>/g, '</blockquote>');
  
  return html;
}

function updateDiff() {
  const source = document.getElementById('sourceMd').value;
  const target = document.getElementById('targetMd').value;
  
  document.getElementById('sourcePreview').innerHTML = mdToHtml(source);
  document.getElementById('targetPreview').innerHTML = mdToHtml(target);
}

updateDiff();
</script>
</body>
</html>
