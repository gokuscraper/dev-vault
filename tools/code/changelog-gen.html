<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
let versions=[];
let vId=0;
const TYPES=['Added','Changed','Deprecated','Removed','Fixed','Security'];

function addVersion(ver,date,entries){
  versions.unshift({
    id:vId++,
    version:ver||'1.0.0',
    date:date||new Date().toISOString().slice(0,10),
    entries:entries||[{type:'Added',text:''}]
  });
  renderVersions();gen();
}

function removeVersion(id){
  versions=versions.filter(v=>v.id!==id);
  renderVersions();gen();
}

function renderVersions(){
  const list=document.getElementById('versionsList');
  list.innerHTML='';
  versions.forEach((ver,vi)=>{
    const card=document.createElement('div');
    card.className='version-card';
    let entriesHTML='';
    ver.entries.forEach((e,ei)=>{
      const opts=TYPES.map(t=>`<option value="${t}"${t===e.type?' selected':''}>${t}</option>`).join('');
      entriesHTML+=`<div class="entry-row"><select onchange="versions[${vi}].entries[${ei}].type=this.value;gen()">${opts}</select><input value="${esc(e.text)}" tp="placeholder_description" placeholder="Description" oninput="versions[${vi}].entries[${ei}].text=this.value;gen()"><button onclick="versions[${vi}].entries.splice(${ei},1);renderVersions();gen()">×</button></div>`;
    });

    card.innerHTML=`<h4>v${ver.version}</h4><button class="remove" onclick="removeVersion(${ver.id})">×</button>
      <div class="field-row">
        <div class="field"><label ti="label_version">Version</label><input value="${ver.version}" oninput="versions[${vi}].version=this.value;gen()"></div>
        <div class="field"><label ti="label_date">Date</label><input type="date" value="${ver.date}" oninput="versions[${vi}].date=this.value;gen()"></div>
      </div>
      ${entriesHTML}
      <button class="add-btn" onclick="versions[${vi}].entries.push({type:'Added',text:''});renderVersions();gen()" ti="btn_entry">+ Entry</button>`;
    list.appendChild(card);
  });
}

function esc(s){return s.replace(/"/g,'&quot;')}

function gen(){
  const projName=document.getElementById('projName').value;
  const repoUrl=document.getElementById('repoUrl').value;

  let md=`# Changelog\n\nAll notable changes to ${projName} will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n`;

  versions.forEach((ver,i)=>{
    if(repoUrl&&i<versions.length-1){
      const prev=versions[i+1];
      md+=`## [${ver.version}](${repoUrl}/compare/v${prev.version}...v${ver.version}) - ${ver.date}\n\n`;
    }else{
      md+=`## [${ver.version}] - ${ver.date}\n\n`;
    }

    // Group entries by type
    const grouped={};
    ver.entries.forEach(e=>{
      if(!e.text)return;
      if(!grouped[e.type])grouped[e.type]=[];
      grouped[e.type].push(e.text);
    });

    TYPES.forEach(type=>{
      if(grouped[type]&&grouped[type].length){
        md+=`### ${type}\n\n`;
        grouped[type].forEach(text=>md+=`- ${text}\n`);
        md+='\n';
      }
    });
  });

  document.getElementById('output').textContent=md;
}

function loadPreset(name){
  versions=[];vId=0;
  const today=new Date().toISOString().slice(0,10);
  if(name==='initial'){
    addVersion('1.0.0',today,[{type:'Added',text:'Initial release'},{type:'Added',text:'Core functionality'},{type:'Added',text:'Documentation'}]);
  }else if(name==='bugfix'){
    addVersion('1.0.1',today,[{type:'Fixed',text:'Fix crash on empty input'},{type:'Fixed',text:'Fix incorrect date formatting'}]);
    addVersion('1.0.0','2024-01-01',[{type:'Added',text:'Initial release'}]);
  }else if(name==='feature'){
    addVersion('1.1.0',today,[{type:'Added',text:'New feature X'},{type:'Added',text:'Support for Y format'},{type:'Changed',text:'Improved performance'},{type:'Fixed',text:'Minor bug fixes'}]);
    addVersion('1.0.0','2024-01-01',[{type:'Added',text:'Initial release'}]);
  }else if(name==='major'){
    addVersion('2.0.0',today,[{type:'Added',text:'Complete rewrite'},{type:'Changed',text:'New API interface'},{type:'Removed',text:'Deprecated v1 endpoints'},{type:'Security',text:'Updated all dependencies'}]);
    addVersion('1.0.0','2024-01-01',[{type:'Added',text:'Initial release'}]);
  }
}

function copyMd(){
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>showToast('Copied!'));
}

function downloadMd(){
  const blob=new Blob([document.getElementById('output').textContent],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='CHANGELOG.md';a.click();
  showToast('Downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

loadPreset('initial');
</script>
