<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA Roles & Properties Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;padding:20px;max-width:1200px;margin:0 auto}
h1{text-align:center;margin-bottom:8px;font-size:1.8rem;color:#00bcd4}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}
.section{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:20px;margin-bottom:16px}
.section h2{font-size:1.1rem;color:#00bcd4;margin-bottom:12px}
h3{color:#4dd0e1;margin:12px 0 8px;font-size:1rem}
button{background:#1a1a2e;color:#e0e0e0;border:1px solid #333;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:0.85rem;transition:all .2s}
button:hover{background:#252545;border-color:#00bcd4}
button.primary{background:#006064;border-color:#00838f}
button.primary:hover{background:#00838f}
input,textarea,select{background:#1a1a1a;color:#e0e0e0;border:1px solid #333;padding:8px 12px;border-radius:4px;font-size:0.9rem;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:#00bcd4}
textarea{font-family:'Fira Code',monospace;resize:vertical}
pre{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;padding:14px;font-family:'Fira Code',monospace;font-size:0.82rem;overflow-x:auto;white-space:pre-wrap;margin:8px 0}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.tabs button{padding:8px 16px}
.tabs button.active{background:#006064;border-color:#00bcd4}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
.role-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:12px;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:#00bcd4;background:#0a1a1a}
.role-card.selected{border-color:#00bcd4;background:#0a2020}
.role-card h4{color:#4dd0e1;font-size:0.9rem;margin-bottom:4px}
.role-card p{font-size:0.78rem;color:#888}
.role-detail{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:20px;margin-top:12px;display:none}
.role-detail.active{display:block}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.75rem;margin:2px;background:#1a1a2e;border:1px solid #333}
.tag.required{background:#3a1b1b;border-color:#c62828;color:#ef9a9a}
.tag.allowed{background:#1b2a1b;border-color:#2e7d32;color:#a5d6a7}
.tag.implicit{background:#2a2a1b;border-color:#f9a825;color:#fff176}
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row input{flex:1}
.pattern-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin:8px 0}
.pattern-card h4{color:#4dd0e1;margin-bottom:8px}
.live-region{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:16px;margin:12px 0}
.audit-result{padding:8px 12px;border-radius:4px;margin:4px 0;font-size:0.85rem}
.audit-result.pass{background:#152a15;border:1px solid #2e7d32;color:#a5d6a7}
.audit-result.fail{background:#2a1515;border:1px solid #c62828;color:#ef9a9a}
.audit-result.warn{background:#2a2a15;border:1px solid #f9a825;color:#fff176}
</style>
</head>
<body>
<h1>ARIA Roles & Properties Explorer</h1>
<p class="subtitle">Comprehensive reference for WAI-ARIA roles, states, and properties</p>

<div class="section">
<h2>Role Categories</h2>
<div class="tabs" id="categoryTabs"></div>
<div class="filter-row">
<input id="roleSearch" placeholder="Search roles..." oninput="filterRoles(this.value)">
</div>
<div class="category-grid" id="rolesGrid"></div>
<div class="role-detail" id="roleDetail"></div>
</div>

<div class="section">
<h2>Interactive Role Tester</h2>
<p style="color:#888;font-size:0.85rem;margin-bottom:12px">Apply a role to an element and see its accessibility tree representation</p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div>
<h3>HTML Code</h3>
<textarea id="testerCode" rows="6" oninput="updateTester()"><div role="button" tabindex="0" aria-pressed="false">
  Toggle Dark Mode
</div></textarea>
</div>
<div>
<h3>Accessibility Interpretation</h3>
<div id="testerOutput" style="background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;padding:14px;min-height:160px;font-size:0.85rem"></div>
</div>
</div>
</div>

<div class="section">
<h2>ARIA Validator</h2>
<textarea id="auditCode" rows="6" placeholder='<div role="checkbox">Check me</div>
<button aria-expanded="true">Menu</button>
<nav aria-label="Main navigation">
  <a href="/">Home</a>
</nav>'></textarea>
<button class="primary" onclick="runAudit()" style="margin-top:8px">Validate ARIA Usage</button>
<div id="auditResults" style="margin-top:12px"></div>
</div>

<div class="section">
<h2>Common Patterns</h2>
<div id="patterns"></div>
</div>

<script>
const roles = {
  landmark: {
    label: 'Landmark',
    roles: {
      banner: {desc:'Site header. Typically <header> at top level.',props:[],required:[],keyboard:'None',html:'<header>'},
      complementary: {desc:'Supporting content related to main. Typically <aside>.',props:['aria-label'],required:[],keyboard:'None',html:'<aside>'},
      contentinfo: {desc:'Information about the page. Typically <footer> at top level.',props:[],required:[],keyboard:'None',html:'<footer>'},
      form: {desc:'A form landmark. Use <form> with aria-label.',props:['aria-label'],required:[],keyboard:'None',html:'<form>'},
      main: {desc:'The main content of the page. One per page.',props:[],required:[],keyboard:'None',html:'<main>'},
      navigation: {desc:'A collection of navigation links.',props:['aria-label'],required:[],keyboard:'None',html:'<nav>'},
      region: {desc:'A perceivable section with specific purpose.',props:['aria-label'],required:['aria-label'],keyboard:'None',html:'<section> (with aria-label)'},
      search: {desc:'Search functionality landmark.',props:['aria-label'],required:[],keyboard:'None',html:'<search> or <form role="search">'}
    }
  },
  widget: {
    label: 'Widget',
    roles: {
      alert: {desc:'Important message, usually time-sensitive. Implicitly aria-live="assertive".',props:['aria-atomic'],required:[],keyboard:'None (auto-announced)',html:'None'},
      alertdialog: {desc:'Alert dialog requiring user response.',props:['aria-label','aria-describedby'],required:['aria-label'],keyboard:'Focus trap, Escape to close',html:'None'},
      button: {desc:'Clickable element that triggers an action.',props:['aria-pressed','aria-expanded','aria-disabled'],required:[],keyboard:'Space/Enter to activate',html:'<button>'},
      checkbox: {desc:'Checkable input with true/false/mixed state.',props:['aria-checked','aria-disabled','aria-required'],required:['aria-checked'],keyboard:'Space to toggle',html:'<input type="checkbox">'},
      combobox: {desc:'Input with popup for selecting values.',props:['aria-expanded','aria-autocomplete','aria-activedescendant','aria-controls'],required:['aria-expanded','aria-controls'],keyboard:'Arrow keys, Enter, Escape',html:'None'},
      dialog: {desc:'Window overlaid on the main content.',props:['aria-label','aria-describedby','aria-modal'],required:['aria-label'],keyboard:'Focus trap, Escape to close, Tab within',html:'<dialog>'},
      gridcell: {desc:'A cell in a grid or treegrid.',props:['aria-selected','aria-readonly','aria-expanded'],required:[],keyboard:'Arrow keys within grid',html:'<td> in grid'},
      link: {desc:'Navigational hyperlink.',props:['aria-disabled','aria-expanded'],required:[],keyboard:'Enter to follow',html:'<a href>'},
      listbox: {desc:'List of selectable options.',props:['aria-multiselectable','aria-required','aria-activedescendant'],required:[],keyboard:'Arrow keys, Home/End, type-ahead',html:'<select>'},
      menu: {desc:'List of actions or functions.',props:['aria-activedescendant','aria-orientation'],required:[],keyboard:'Arrow keys, Enter, Escape',html:'None'},
      menuitem: {desc:'An option in a menu.',props:['aria-disabled','aria-expanded','aria-haspopup'],required:[],keyboard:'Enter to activate',html:'None'},
      menuitemcheckbox: {desc:'Checkable menu item.',props:['aria-checked'],required:['aria-checked'],keyboard:'Space to toggle, Enter to activate',html:'None'},
      menuitemradio: {desc:'Radio-selectable menu item.',props:['aria-checked'],required:['aria-checked'],keyboard:'Arrow keys, Space to select',html:'None'},
      option: {desc:'A selectable item in a listbox.',props:['aria-selected','aria-disabled'],required:[],keyboard:'None (parent handles)',html:'<option>'},
      progressbar: {desc:'Displays progress of a task.',props:['aria-valuenow','aria-valuemin','aria-valuemax','aria-label'],required:[],keyboard:'None',html:'<progress>'},
      radio: {desc:'One of a group of checkable options.',props:['aria-checked','aria-disabled'],required:['aria-checked'],keyboard:'Arrow keys within group',html:'<input type="radio">'},
      scrollbar: {desc:'Controls scrolling within a viewport.',props:['aria-controls','aria-orientation','aria-valuenow','aria-valuemin','aria-valuemax'],required:['aria-controls','aria-valuenow','aria-valuemin','aria-valuemax'],keyboard:'Arrow keys',html:'None'},
      searchbox: {desc:'Text input for search queries.',props:['aria-activedescendant','aria-autocomplete'],required:[],keyboard:'Standard text input',html:'<input type="search">'},
      separator: {desc:'Divider that separates content. Focusable if movable.',props:['aria-orientation','aria-valuenow','aria-valuemin','aria-valuemax'],required:[],keyboard:'Arrow keys if focusable',html:'<hr>'},
      slider: {desc:'User input with a range of values.',props:['aria-valuenow','aria-valuemin','aria-valuemax','aria-orientation','aria-label'],required:['aria-valuenow','aria-valuemin','aria-valuemax'],keyboard:'Arrow keys, Home/End',html:'<input type="range">'},
      spinbutton: {desc:'Input for selecting from a range by incrementing/decrementing.',props:['aria-valuenow','aria-valuemin','aria-valuemax','aria-required'],required:['aria-valuenow','aria-valuemin','aria-valuemax'],keyboard:'Arrow Up/Down, Home/End',html:'<input type="number">'},
      switch: {desc:'Toggle between on and off states.',props:['aria-checked'],required:['aria-checked'],keyboard:'Space to toggle',html:'None'},
      tab: {desc:'A tab in a tablist.',props:['aria-selected','aria-controls'],required:[],keyboard:'Arrow keys, Home/End',html:'None'},
      tabpanel: {desc:'Container for content associated with a tab.',props:['aria-labelledby'],required:[],keyboard:'Tab to enter content',html:'None'},
      textbox: {desc:'Text input field.',props:['aria-multiline','aria-placeholder','aria-readonly','aria-required','aria-autocomplete'],required:[],keyboard:'Standard text input',html:'<input type="text">, <textarea>'},
      tooltip: {desc:'Popup displaying description for an element.',props:[],required:[],keyboard:'Escape to dismiss',html:'None'},
      tree: {desc:'Hierarchical list with collapsible items.',props:['aria-multiselectable','aria-activedescendant'],required:[],keyboard:'Arrow keys, Enter/Space',html:'None'},
      treeitem: {desc:'An item in a tree.',props:['aria-expanded','aria-selected','aria-level'],required:[],keyboard:'Right to expand, Left to collapse',html:'None'}
    }
  },
  structure: {
    label: 'Document Structure',
    roles: {
      application: {desc:'Declares a region as a web application (not a document). Disables browse mode.',props:['aria-label'],required:['aria-label'],keyboard:'App handles all keys',html:'None'},
      article: {desc:'Self-contained composition (blog post, comment, etc.).',props:[],required:[],keyboard:'None',html:'<article>'},
      cell: {desc:'A cell in a tabular container.',props:['aria-colindex','aria-colspan','aria-rowindex','aria-rowspan'],required:[],keyboard:'None',html:'<td>'},
      columnheader: {desc:'Header cell for a column.',props:['aria-sort','aria-colindex'],required:[],keyboard:'None',html:'<th scope="col">'},
      definition: {desc:'A definition of a term.',props:[],required:[],keyboard:'None',html:'<dd>'},
      document: {desc:'Declares a region as a document (re-enables browse mode within application).',props:[],required:[],keyboard:'Standard browse mode',html:'None'},
      feed: {desc:'Scrollable list of articles.',props:['aria-busy'],required:[],keyboard:'Page Up/Down',html:'None'},
      figure: {desc:'Self-contained content with optional caption.',props:['aria-label'],required:[],keyboard:'None',html:'<figure>'},
      group: {desc:'A set of UI objects.',props:['aria-label','aria-activedescendant'],required:[],keyboard:'None',html:'<fieldset>'},
      heading: {desc:'A heading for a section.',props:['aria-level'],required:['aria-level'],keyboard:'Screen reader heading nav (H key)',html:'<h1>-<h6>'},
      img: {desc:'Image content.',props:['aria-label'],required:[],keyboard:'None',html:'<img>'},
      list: {desc:'A list of items.',props:[],required:[],keyboard:'None',html:'<ul>, <ol>'},
      listitem: {desc:'An item in a list.',props:['aria-level','aria-posinset','aria-setsize'],required:[],keyboard:'None',html:'<li>'},
      math: {desc:'Mathematical expression.',props:['aria-label'],required:[],keyboard:'None',html:'<math>'},
      note: {desc:'Parenthetic or ancillary content.',props:[],required:[],keyboard:'None',html:'None'},
      row: {desc:'A row of cells in a grid/table.',props:['aria-colindex','aria-level','aria-rowindex','aria-selected','aria-expanded'],required:[],keyboard:'Arrow keys in grid',html:'<tr>'},
      rowgroup: {desc:'Group of rows (header/body/footer).',props:[],required:[],keyboard:'None',html:'<thead>, <tbody>, <tfoot>'},
      rowheader: {desc:'Header cell for a row.',props:['aria-sort'],required:[],keyboard:'None',html:'<th scope="row">'},
      table: {desc:'A data table.',props:['aria-label','aria-colcount','aria-rowcount'],required:[],keyboard:'Table navigation (screen reader)',html:'<table>'},
      term: {desc:'A word or phrase with a definition.',props:[],required:[],keyboard:'None',html:'<dt>'},
      toolbar: {desc:'Collection of frequently used function buttons.',props:['aria-orientation','aria-activedescendant'],required:[],keyboard:'Arrow keys between items',html:'None'}
    }
  }
};

let currentCategory = 'landmark';
let searchFilter = '';

function renderCategoryTabs() {
  const tabs = document.getElementById('categoryTabs');
  Object.keys(roles).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.textContent = `${roles[cat].label} (${Object.keys(roles[cat].roles).length})`;
    btn.className = i === 0 ? 'active' : '';
    btn.onclick = () => {
      currentCategory = cat;
      tabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRoles();
    };
    tabs.appendChild(btn);
  });
}

function filterRoles(q) {
  searchFilter = q.toLowerCase();
  renderRoles();
}

function renderRoles() {
  const grid = document.getElementById('rolesGrid');
  const cat = roles[currentCategory];
  const filtered = Object.entries(cat.roles).filter(([name, r]) =>
    !searchFilter || name.includes(searchFilter) || r.desc.toLowerCase().includes(searchFilter)
  );
  grid.innerHTML = filtered.map(([name, r]) => `
    <div class="role-card" onclick="showRole('${currentCategory}','${name}')">
      <h4>role="${name}"</h4>
      <p>${r.desc.substring(0, 80)}${r.desc.length > 80 ? '...' : ''}</p>
    </div>`).join('');
  document.getElementById('roleDetail').classList.remove('active');
}

function showRole(cat, name) {
  const r = roles[cat].roles[name];
  const detail = document.getElementById('roleDetail');
  detail.innerHTML = `
    <h3>role="${name}"</h3>
    <p>${r.desc}</p>
    ${r.html !== 'None' ? `<p style="margin-top:8px"><strong>Implicit HTML:</strong> <code>${r.html}</code></p>` : '<p style="margin-top:8px;color:#888">No implicit HTML element. Must use role attribute.</p>'}
    <h3>Required Properties</h3>
    ${r.required.length > 0 ? r.required.map(p => `<span class="tag required">${p} (required)</span>`).join('') : '<span style="color:#888;font-size:0.85rem">None required</span>'}
    <h3>Supported Properties</h3>
    ${r.props.length > 0 ? r.props.map(p => `<span class="tag allowed">${p}</span>`).join('') : '<span style="color:#888;font-size:0.85rem">No role-specific properties</span>'}
    <h3>Keyboard Expectations</h3>
    <p style="font-size:0.9rem">${r.keyboard}</p>
    <h3>Example</h3>
    <pre>&lt;div role="${name}"${r.required.map(p => ` ${p}="${getDefaultValue(p)}"`).join('')}${r.props.filter(p=>!r.required.includes(p)).slice(0,2).map(p => ` ${p}="${getDefaultValue(p)}"`).join('')}&gt;
  Content here
&lt;/div&gt;</pre>
    <h3>Screen Reader Announcement</h3>
    <div style="background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;padding:14px;font-size:0.9rem">
      "${getAnnouncement(name, r)}"
    </div>`;
  detail.classList.add('active');
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function getDefaultValue(prop) {
  const defaults = {
    'aria-checked':'false','aria-expanded':'false','aria-selected':'false',
    'aria-pressed':'false','aria-disabled':'false','aria-hidden':'false',
    'aria-required':'true','aria-label':'Label text','aria-describedby':'desc-id',
    'aria-controls':'panel-id','aria-labelledby':'heading-id','aria-level':'2',
    'aria-valuenow':'50','aria-valuemin':'0','aria-valuemax':'100',
    'aria-modal':'true','aria-orientation':'horizontal','aria-autocomplete':'list',
    'aria-activedescendant':'item-1','aria-sort':'ascending','aria-atomic':'true',
    'aria-multiselectable':'false','aria-readonly':'false','aria-colindex':'1',
    'aria-rowindex':'1','aria-colspan':'1','aria-rowspan':'1',
    'aria-colcount':'5','aria-rowcount':'10','aria-posinset':'1','aria-setsize':'5',
    'aria-multiline':'false','aria-placeholder':'Enter text','aria-busy':'false',
    'aria-haspopup':'true'
  };
  return defaults[prop] || 'value';
}

function getAnnouncement(name, r) {
  const announcements = {
    button: 'Content here, button',
    checkbox: 'Content here, checkbox, not checked',
    radio: 'Content here, radio button, not selected',
    link: 'Content here, link',
    alert: 'Alert: Content here',
    dialog: 'Content here, dialog',
    tab: 'Content here, tab, 1 of 3',
    slider: 'Content here, slider, 50',
    switch: 'Content here, switch, off',
    progressbar: 'Content here, progress bar, 50%',
    navigation: 'Content here, navigation',
    main: 'Main landmark',
    banner: 'Banner landmark',
    search: 'Search landmark',
    complementary: 'Complementary landmark',
    region: 'Label text, region',
    heading: 'Content here, heading level 2',
    listbox: 'Content here, list box',
    combobox: 'Content here, combo box, collapsed',
    menu: 'Content here, menu',
    menuitem: 'Content here, menu item',
    tree: 'Content here, tree',
    treeitem: 'Content here, tree item',
    tooltip: 'Content here, tooltip',
    toolbar: 'Content here, toolbar',
    table: 'Content here, table',
    grid: 'Content here, grid',
    textbox: 'Content here, edit text',
    searchbox: 'Content here, search edit text',
    spinbutton: 'Content here, spin button, 50',
    option: 'Content here, 1 of N',
    separator: 'Separator',
    img: 'Label text, image',
    figure: 'Content here, figure',
    article: 'Content here, article',
    feed: 'Content here, feed',
    application: 'Label text, application'
  };
  return announcements[name] || `Content here, ${name}`;
}

function updateTester() {
  const code = document.getElementById('testerCode').value;
  const output = document.getElementById('testerOutput');
  const parser = new DOMParser();
  const doc = parser.parseFromString(code, 'text/html');
  const elements = doc.body.querySelectorAll('*');
  let tree = '';
  elements.forEach(el => {
    const role = el.getAttribute('role') || getImplicitRole(el.tagName.toLowerCase());
    const label = el.getAttribute('aria-label') || el.textContent.trim().substring(0, 40);
    const attrs = [];
    for (const attr of el.attributes) {
      if (attr.name.startsWith('aria-') && attr.name !== 'aria-label') {
        attrs.push(`${attr.name}="${attr.value}"`);
      }
    }
    tree += `<div style="margin:4px 0;padding:4px 8px;background:#141414;border-radius:3px">
      <strong style="color:#4dd0e1">${role || el.tagName.toLowerCase()}</strong>
      ${label ? `"${label}"` : ''}
      ${attrs.length ? `<br><span style="color:#888;font-size:0.8rem">${attrs.join(', ')}</span>` : ''}
    </div>`;
  });
  output.innerHTML = tree || '<span style="color:#888">Enter HTML to see accessibility tree</span>';
}

function getImplicitRole(tag) {
  const map = {
    a: 'link', button: 'button', h1: 'heading', h2: 'heading', h3: 'heading',
    h4: 'heading', h5: 'heading', h6: 'heading', header: 'banner', footer: 'contentinfo',
    main: 'main', nav: 'navigation', aside: 'complementary', form: 'form',
    input: 'textbox', select: 'listbox', textarea: 'textbox', img: 'img',
    table: 'table', ul: 'list', ol: 'list', li: 'listitem', hr: 'separator',
    dialog: 'dialog', article: 'article', section: 'region', progress: 'progressbar',
    details: 'group', summary: 'button', output: 'status', meter: 'meter',
    fieldset: 'group', legend: 'none', option: 'option', tr: 'row', td: 'cell',
    th: 'columnheader'
  };
  return map[tag] || null;
}

function runAudit() {
  const code = document.getElementById('auditCode').value;
  const results = document.getElementById('auditResults');
  if (!code.trim()) { results.innerHTML = ''; return; }

  const findings = [];
  const parser = new DOMParser();
  const doc = parser.parseFromString(code, 'text/html');
  const elements = doc.body.querySelectorAll('*');

  elements.forEach(el => {
    const role = el.getAttribute('role');
    const tag = el.tagName.toLowerCase();

    // Check: role with required properties
    if (role) {
      for (const [cat, catData] of Object.entries(roles)) {
        if (catData.roles[role]) {
          const r = catData.roles[role];
          r.required.forEach(prop => {
            if (!el.hasAttribute(prop)) {
              findings.push({type:'fail', msg:`<code>&lt;${tag} role="${role}"&gt;</code> is missing required property <code>${prop}</code>`});
            }
          });
          // Check: redundant role
          const implicitRole = getImplicitRole(tag);
          if (implicitRole === role) {
            findings.push({type:'warn', msg:`<code>&lt;${tag} role="${role}"&gt;</code> &mdash; Redundant role. <code>&lt;${tag}&gt;</code> already has implicit role "${role}"`});
          }
        }
      }
    }

    // Check: interactive without keyboard access
    if (role && ['button','link','checkbox','radio','tab','switch','menuitem','slider','spinbutton','combobox','textbox','searchbox'].includes(role)) {
      if (!['button','a','input','select','textarea'].includes(tag) && !el.hasAttribute('tabindex')) {
        findings.push({type:'fail', msg:`<code>&lt;${tag} role="${role}"&gt;</code> needs <code>tabindex="0"</code> for keyboard accessibility`});
      }
    }

    // Check: img without alt or aria-label
    if (tag === 'img' && !el.hasAttribute('alt') && !el.hasAttribute('aria-label') && !el.hasAttribute('aria-labelledby')) {
      findings.push({type:'fail', msg:`<code>&lt;img&gt;</code> is missing <code>alt</code>, <code>aria-label</code>, or <code>aria-labelledby</code>`});
    }

    // Check: aria-hidden on focusable
    if (el.getAttribute('aria-hidden') === 'true' && (el.hasAttribute('tabindex') || ['button','a','input','select','textarea'].includes(tag))) {
      findings.push({type:'warn', msg:`<code>&lt;${tag} aria-hidden="true"&gt;</code> is focusable but hidden from accessibility tree`});
    }
  });

  if (findings.length === 0) {
    findings.push({type:'pass', msg:'No ARIA issues detected in the provided HTML'});
  }

  results.innerHTML = findings.map(f =>
    `<div class="audit-result ${f.type}">${f.type === 'fail' ? 'Error' : f.type === 'warn' ? 'Warning' : 'Pass'}: ${f.msg}</div>`
  ).join('');
}
