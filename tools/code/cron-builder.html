<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:'Fira Code',monospace}
input:focus,select:focus{border-color:#3b82f6}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
.cron-display{text-align:center;padding:20px;margin-bottom:14px}
.cron-display .expr{font-size:2rem;font-family:'Fira Code',monospace;color:#4da6ff;letter-spacing:4px;margin-bottom:8px;word-break:break-all}
.cron-display .explain{font-size:0.9rem;color:#ccc;line-height:1.5}
.field-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.field-box{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:10px;text-align:center}
.field-box .flabel{font-size:0.7rem;color:#888;margin-bottom:4px;text-transform:uppercase}
.field-box input{text-align:center;font-size:1.1rem;padding:6px 4px}
.next-runs{background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px}
.next-runs h4{font-size:0.85rem;color:#4da6ff;margin-bottom:8px}
.next-runs .run{font-size:0.82rem;color:#c9d1d9;padding:4px 0;font-family:'Fira Code',monospace;border-bottom:1px solid #1c1c1c}
.next-runs .run:last-child{border-bottom:none}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
@media(max-width:600px){.field-grid{grid-template-columns:repeat(5,1fr);gap:4px}.field-box{padding:6px}.field-box input{font-size:0.9rem}}

<body>
<div class="container">
<h1>Cron Expression Builder</h1>
<p class="sub">Build crontab schedules visually</p>

<div class="presets" id="presetBtns"></div>

<div class="cron-display">
<div class="expr" id="cronExpr">* * * * *</div>
<div class="explain" id="cronExplain"></div>
</div>

<div class="section">
<h3>Fields</h3>
<div class="field-grid">
<div class="field-box"><div class="flabel">Minute</div><input id="f0" value="*" oninput="update()"></div>
<div class="field-box"><div class="flabel">Hour</div><input id="f1" value="*" oninput="update()"></div>
<div class="field-box"><div class="flabel">Day</div><input id="f2" value="*" oninput="update()"></div>
<div class="field-box"><div class="flabel">Month</div><input id="f3" value="*" oninput="update()"></div>
<div class="field-box"><div class="flabel">Weekday</div><input id="f4" value="*" oninput="update()"></div>
</div>
<div class="row">
<div class="col"><label>Quick set: Minute</label><select onchange="document.getElementById('f0').value=this.value;update()">
<option value="*">Every minute (*)</option>
<option value="0">:00</option>
<option value="15">:15</option>
<option value="30">:30</option>
<option value="45">:45</option>
<option value="*/5">Every 5 min</option>
<option value="*/10">Every 10 min</option>
<option value="*/15">Every 15 min</option>
<option value="*/30">Every 30 min</option>
</select></div>
<div class="col"><label>Quick set: Hour</label><select onchange="document.getElementById('f1').value=this.value;update()">
<option value="*">Every hour (*)</option>
<option value="0">0 (midnight)</option>
<option value="6">6 AM</option>
<option value="9">9 AM</option>
<option value="12">12 PM</option>
<option value="18">6 PM</option>
<option value="*/2">Every 2 hours</option>
<option value="*/6">Every 6 hours</option>
<option value="9-17">9-17 (business)</option>
</select></div>
</div>
<div class="row">
<div class="col"><label>Quick set: Day of Month</label><select onchange="document.getElementById('f2').value=this.value;update()">
<option value="*">Every day (*)</option>
<option value="1">1st</option>
<option value="15">15th</option>
<option value="1,15">1st & 15th</option>
</select></div>
<div class="col"><label>Quick set: Month</label><select onchange="document.getElementById('f3').value=this.value;update()">
<option value="*">Every month (*)</option>
<option value="1">January</option>
<option value="1,4,7,10">Quarterly</option>
</select></div>
<div class="col"><label>Quick set: Weekday</label><select onchange="document.getElementById('f4').value=this.value;update()">
<option value="*">Every day (*)</option>
<option value="1-5">Mon-Fri</option>
<option value="0,6">Sat-Sun</option>
<option value="1">Monday</option>
<option value="5">Friday</option>
</select></div>
</div>
</div>

<div class="next-runs" id="nextRuns">
<h4>Next 5 Runs</h4>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/gh-actions-gen/">GH Actions Gen</a> | <a href="https://yurukusa.github.io/dockerfile-gen/">Dockerfile Gen</a> | <a href="https://yurukusa.github.io/dependabot-gen/">Dependabot Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const PRESETS=[
  {name:'Every minute',v:['*','*','*','*','*']},
  {name:'Hourly',v:['0','*','*','*','*']},
  {name:'Daily midnight',v:['0','0','*','*','*']},
  {name:'Daily 9 AM',v:['0','9','*','*','*']},
  {name:'Weekly Mon 9AM',v:['0','9','*','*','1']},
  {name:'Every 5 min',v:['*/5','*','*','*','*']},
  {name:'Every 15 min',v:['*/15','*','*','*','*']},
  {name:'Twice daily',v:['0','9,18','*','*','*']},
  {name:'Weekdays 9AM',v:['0','9','*','*','1-5']},
  {name:'Monthly 1st',v:['0','0','1','*','*']},
  {name:'Quarterly',v:['0','0','1','1,4,7,10','*']},
  {name:'Yearly',v:['0','0','1','1','*']},
];

const MONTHS=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function initPresets(){
  const c=document.getElementById('presetBtns');
  PRESETS.forEach((p,i)=>{
    const b=document.createElement('div');b.className='preset';b.textContent=p.name;
    b.onclick=()=>{
      document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
      b.classList.add('active');
      p.v.forEach((v,j)=>document.getElementById('f'+j).value=v);
      update();
    };
    c.appendChild(b);
  });
}

function getFields(){
  return [0,1,2,3,4].map(i=>document.getElementById('f'+i).value.trim()||'*');
}

function explain(fields){
  const [min,hr,dom,mon,dow]=fields;
  const parts=[];

  // Minute
  if(min==='*') parts.push('Every minute');
  else if(min.startsWith('*/')) parts.push(`Every ${min.slice(2)} minutes`);
  else if(min.includes(',')) parts.push(`At minutes ${min}`);
  else if(min.includes('-')) parts.push(`Minutes ${min}`);
  else parts.push(`At minute ${min}`);

  // Hour
  if(hr==='*'){}
  else if(hr.startsWith('*/')) parts.push(`every ${hr.slice(2)} hours`);
  else if(hr.includes(',')) parts.push(`at ${hr.split(',').map(h=>`${h}:00`).join(', ')}`);
  else if(hr.includes('-')){
    const[a,b]=hr.split('-');
    parts.push(`between ${a}:00 and ${b}:00`);
  } else parts.push(`at ${hr.padStart(2,'0')}:00`);

  // DOM
  if(dom!=='*'){
    if(dom.includes(',')) parts.push(`on days ${dom} of the month`);
    else parts.push(`on day ${dom} of the month`);
  }

  // Month
  if(mon!=='*'){
    if(mon.includes(',')){
      parts.push(`in ${mon.split(',').map(m=>MONTHS[+m]||m).join(', ')}`);
    } else parts.push(`in ${MONTHS[+mon]||mon}`);
  }

  // DOW
  if(dow!=='*'){
    if(dow==='1-5') parts.push('on weekdays (Mon-Fri)');
    else if(dow==='0,6') parts.push('on weekends (Sat-Sun)');
    else if(dow.includes(',')) parts.push(`on ${dow.split(',').map(d=>DAYS[+d]||d).join(', ')}`);
    else if(dow.includes('-')){
      const[a,b]=dow.split('-');
      parts.push(`${DAYS[+a]||a} through ${DAYS[+b]||b}`);
    } else parts.push(`on ${DAYS[+dow]||dow}`);
  }

  return parts.join(', ')+'.';
}

// Parse a single cron field into a set of matching values
function parseField(field, min, max){
  const vals=new Set();
  field.split(',').forEach(part=>{
    // Step: */n or m-n/s
    const stepMatch=part.match(/^(\*|(\d+)-(\d+))\/(\d+)$/);
    if(stepMatch){
      const step=+stepMatch[4];
      let start=min, end=max;
      if(stepMatch[2]!==undefined){start=+stepMatch[2];end=+stepMatch[3];}
      for(let i=start;i<=end;i+=step) vals.add(i);
      return;
    }
    // Range: m-n
    const rangeMatch=part.match(/^(\d+)-(\d+)$/);
    if(rangeMatch){
      for(let i=+rangeMatch[1];i<=+rangeMatch[2];i++) vals.add(i);
      return;
    }
    // Star
    if(part==='*'){
      for(let i=min;i<=max;i++) vals.add(i);
      return;
    }
    // Single number
    if(/^\d+$/.test(part)) vals.add(+part);
  });
  return vals;
}

function getNextRuns(fields, count=5){
  const [minF,hrF,domF,monF,dowF]=fields;
  const mins=parseField(minF,0,59);
  const hrs=parseField(hrF,0,23);
  const doms=parseField(domF,1,31);
  const mons=parseField(monF,1,12);
  const dows=parseField(dowF,0,6);

  const runs=[];
  const now=new Date();
  const d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours(),now.getMinutes()+1,0,0);

  // Cap iterations to prevent infinite loops
  for(let iter=0;iter<525600&&runs.length<count;iter++){
    const mo=d.getMonth()+1;
    const dm=d.getDate();
    const dw=d.getDay();
    const hr=d.getHours();
    const mn=d.getMinutes();

    if(mons.has(mo)&&doms.has(dm)&&dows.has(dw)&&hrs.has(hr)&&mins.has(mn)){
      runs.push(new Date(d));
    }
    d.setMinutes(d.getMinutes()+1);
  }
  return runs;
}

function update(){
  const fields=getFields();
  const expr=fields.join(' ');
  document.getElementById('cronExpr').textContent=expr;
  document.getElementById('cronExplain').textContent=explain(fields);

  // Next runs
  const runs=getNextRuns(fields);
  const container=document.getElementById('nextRuns');
  const runsHtml=runs.length>0
    ? runs.map(r=>`<div class="run">${r.toLocaleString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})}</div>`).join('')
    : '<div class="run" style="color:#888">No runs found in the next year</div>';
  container.innerHTML=`<h4>Next 5 Runs</h4>${runsHtml}`;

  // Crontab line
  document.getElementById('out').textContent=`# ${explain(fields)}\n${expr} /path/to/command`;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
update();
</script>
</body>
</html>
