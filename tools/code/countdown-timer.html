<script>
const MAX_TIMERS = 3;
let timers = [];
let timerIdCounter = 0;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(timerId) {
  const t = timers.find(t => t.id === timerId);
  if (!t || !t.alarming) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 880;
  osc.type = 'square';
  gain.gain.value = 0.15;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.stop(ctx.currentTime + 0.15);
  t.beepCount = (t.beepCount || 0) + 1;
  if (t.alarming && t.beepCount < 30) {
    t.beepTimeout = setTimeout(() => beep(timerId), 300);
  }
}

function notify(label) {
  if (Notification.permission === 'granted') {
    new Notification('Timer Complete', { body: label || 'Countdown finished!' });
  }
}

function addTimer() {
  if (timers.length >= MAX_TIMERS) return;
  const id = ++timerIdCounter;
  const timer = { id, state: 'idle', totalMs: 0, remainMs: 0, endTime: 0, alarming: false, beepCount: 0, beepTimeout: null, interval: null };
  timers.push(timer);
  renderTimer(timer);
  updateAddBtn();
}

function removeTimer(id) {
  const idx = timers.findIndex(t => t.id === id);
  if (idx === -1) return;
  const t = timers[idx];
  clearInterval(t.interval);
  clearTimeout(t.beepTimeout);
  t.alarming = false;
  timers.splice(idx, 1);
  document.getElementById('timer-' + id).remove();
  updateAddBtn();
  updateTitle();
}

function updateAddBtn() {
  const btn = document.querySelector('.add-btn');
  btn.disabled = timers.length >= MAX_TIMERS;
  btn.textContent = timers.length >= MAX_TIMERS ? 'Max 3 timers' : '+ Add Timer';
}

function renderTimer(t) {
  const div = document.createElement('div');
  div.className = 'timer-card';
  div.id = 'timer-' + t.id;
  div.setAttribute('tabindex', '0');
  div.innerHTML = `
    <div class="timer-top">
      <input class="label-input" tp="placeholder_timer_label_e_g_pasta" tp="placeholder_timer_label_e_g_pasta" tp="placeholder_timer_label_e_g_pasta" tp="placeholder_timer_label_e_g_pasta" placeholder="Timer label (e.g. Pasta)" data-id="${t.id}">
      <button class="remove-btn" onclick="removeTimer(${t.id})" title="Remove">&times;</button>
    </div>
    <div class="input-row" data-inputs="${t.id}">
      <div class="time-group"><input class="time-input" type="number" min="0" max="99" value="0" data-field="h" data-id="${t.id}"><span class="time-label" ti="label_hrs" ti="label_hrs" ti="label_hrs" ti="label_hrs">hrs</span></div>
      <div class="time-group"><input class="time-input" type="number" min="0" max="59" value="5" data-field="m" data-id="${t.id}"><span class="time-label" ti="label_min" ti="label_min" ti="label_min" ti="label_min">min</span></div>
      <div class="time-group"><input class="time-input" type="number" min="0" max="59" value="0" data-field="s" data-id="${t.id}"><span class="time-label" ti="label_sec" ti="label_sec" ti="label_sec" ti="label_sec">sec</span></div>
    </div>
    <div class="presets" data-presets="${t.id}">
      <button class="preset" onclick="setPreset(${t.id},1)" ti="btn_1m" ti="btn_1m" ti="btn_1m" ti="btn_1m">1m</button>
      <button class="preset" onclick="setPreset(${t.id},3)" ti="btn_3m" ti="btn_3m" ti="btn_3m" ti="btn_3m">3m</button>
      <button class="preset" onclick="setPreset(${t.id},5)" ti="btn_5m" ti="btn_5m" ti="btn_5m" ti="btn_5m">5m</button>
      <button class="preset" onclick="setPreset(${t.id},10)" ti="btn_10m" ti="btn_10m" ti="btn_10m" ti="btn_10m">10m</button>
      <button class="preset" onclick="setPreset(${t.id},15)" ti="btn_15m" ti="btn_15m" ti="btn_15m" ti="btn_15m">15m</button>
      <button class="preset" onclick="setPreset(${t.id},30)" ti="btn_30m" ti="btn_30m" ti="btn_30m" ti="btn_30m">30m</button>
      <button class="preset" onclick="setPreset(${t.id},60)" ti="btn_1hr" ti="btn_1hr" ti="btn_1hr" ti="btn_1hr">1hr</button>
    </div>
    <div class="display" data-display="${t.id}">00:05:00</div>
    <div class="progress-bar"><div class="progress-fill" data-progress="${t.id}"></div></div>
    <div class="controls" data-controls="${t.id}">
      <button class="ctrl-btn btn-start" onclick="startTimer(${t.id})" ti="btn_start" ti="btn_start_2" ti="btn_start" ti="btn_start_2" ti="btn_start" ti="btn_start_2" ti="btn_start" ti="btn_start_2">Start</button>
      <button class="ctrl-btn btn-reset" onclick="resetTimer(${t.id})" ti="btn_reset" ti="btn_reset_2" ti="btn_reset_3" ti="btn_reset_4" ti="btn_reset_5" ti="btn_reset" ti="btn_reset_2" ti="btn_reset_3" ti="btn_reset_4" ti="btn_reset_5" ti="btn_reset" ti="btn_reset_2" ti="btn_reset_3" ti="btn_reset_4" ti="btn_reset_5" ti="btn_reset" ti="btn_reset_2" ti="btn_reset_3" ti="btn_reset_4" ti="btn_reset_5">Reset</button>
    </div>`;
  document.getElementById('timers').appendChild(div);
}

function getInputs(id) {
  const card = document.getElementById('timer-' + id);
  const h = parseInt(card.querySelector('[data-field="h"]').value) || 0;
  const m = parseInt(card.querySelector('[data-field="m"]').value) || 0;
  const s = parseInt(card.querySelector('[data-field="s"]').value) || 0;
  return (h * 3600 + m * 60 + s) * 1000;
}

function setInputs(id, ms) {
  const card = document.getElementById('timer-' + id);
  const total = Math.round(ms / 1000);
  card.querySelector('[data-field="h"]').value = Math.floor(total / 3600);
  card.querySelector('[data-field="m"]').value = Math.floor((total % 3600) / 60);
  card.querySelector('[data-field="s"]').value = total % 60;
}

function setPreset(id, minutes) {
  const t = timers.find(t => t.id === id);
  if (!t || t.state === 'running') return;
  if (t.alarming) stopAlarm(id);
  t.state = 'idle';
  const ms = minutes * 60000;
  setInputs(id, ms);
  updateDisplay(id, ms);
  updateProgress(id, 0, ms);
  renderControls(id);
}

function formatTime(ms) {
  const total = Math.max(0, Math.ceil(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateDisplay(id, ms) {
  const el = document.querySelector(`[data-display="${id}"]`);
  if (el) el.textContent = formatTime(ms);
}

function updateProgress(id, elapsed, total) {
  const el = document.querySelector(`[data-progress="${id}"]`);
  if (el) el.style.width = total > 0 ? Math.min(100, (elapsed / total) * 100) + '%' : '0%';
}

function renderControls(id) {
  const t = timers.find(t => t.id === id);
  if (!t) return;
  const el = document.querySelector(`[data-controls="${id}"]`);
  if (t.alarming) {
    el.innerHTML = `<button class="ctrl-btn btn-stop-alarm" onclick="stopAlarm(${id})" ti="btn_stop_alarm" ti="btn_stop_alarm" ti="btn_stop_alarm" ti="btn_stop_alarm">Stop Alarm</button><button class="ctrl-btn btn-reset" onclick="resetTimer(${id})">Reset</button>`;
  } else if (t.state === 'running') {
    el.innerHTML = `<button class="ctrl-btn btn-pause" onclick="pauseTimer(${id})" ti="btn_pause" ti="btn_pause" ti="btn_pause" ti="btn_pause">Pause</button><button class="ctrl-btn btn-reset" onclick="resetTimer(${id})">Reset</button>`;
  } else if (t.state === 'paused') {
    el.innerHTML = `<button class="ctrl-btn btn-start" onclick="resumeTimer(${id})" ti="btn_resume" ti="btn_resume" ti="btn_resume" ti="btn_resume">Resume</button><button class="ctrl-btn btn-reset" onclick="resetTimer(${id})">Reset</button>`;
  } else {
    el.innerHTML = `<button class="ctrl-btn btn-start" onclick="startTimer(${id})">Start</button><button class="ctrl-btn btn-reset" onclick="resetTimer(${id})">Reset</button>`;
  }
}

function startTimer(id) {
  const t = timers.find(t => t.id === id);
  if (!t || t.state === 'running') return;
  const ms = getInputs(id);
  if (ms <= 0) return;
  t.totalMs = ms;
  t.remainMs = ms;
  t.endTime = Date.now() + ms;
  t.state = 'running';
  toggleInputs(id, true);
  renderControls(id);
  tick(id);
  t.interval = setInterval(() => tick(id), 250);
  if (Notification.permission === 'default') Notification.requestPermission();
}

function resumeTimer(id) {
  const t = timers.find(t => t.id === id);
  if (!t || t.state !== 'paused') return;
  t.endTime = Date.now() + t.remainMs;
  t.state = 'running';
  renderControls(id);
  t.interval = setInterval(() => tick(id), 250);
}

function pauseTimer(id) {
  const t = timers.find(t => t.id === id);
  if (!t || t.state !== 'running') return;
  clearInterval(t.interval);
  t.remainMs = Math.max(0, t.endTime - Date.now());
  t.state = 'paused';
  renderControls(id);
  updateTitle();
}

function resetTimer(id) {
  const t = timers.find(t => t.id === id);
  if (!t) return;
  clearInterval(t.interval);
  clearTimeout(t.beepTimeout);
  t.alarming = false;
  t.state = 'idle';
  t.remainMs = 0;
  const card = document.getElementById('timer-' + id);
  card.classList.remove('done');
  toggleInputs(id, false);
  const ms = getInputs(id);
  updateDisplay(id, ms);
  updateProgress(id, 0, ms);
  renderControls(id);
  updateTitle();
}

function stopAlarm(id) {
  const t = timers.find(t => t.id === id);
  if (!t) return;
  clearTimeout(t.beepTimeout);
  t.alarming = false;
  t.beepCount = 0;
  document.getElementById('timer-' + id).classList.remove('done');
  renderControls(id);
}

function tick(id) {
  const t = timers.find(t => t.id === id);
  if (!t || t.state !== 'running') return;
  const remain = Math.max(0, t.endTime - Date.now());
  t.remainMs = remain;
  updateDisplay(id, remain);
  updateProgress(id, t.totalMs - remain, t.totalMs);
  updateTitle();
  if (remain <= 0) {
    clearInterval(t.interval);
    t.state = 'done';
    t.alarming = true;
    t.beepCount = 0;
    const card = document.getElementById('timer-' + id);
    card.classList.add('done');
    const label = card.querySelector('.label-input').value;
    beep(id);
    notify(label || 'Timer');
    renderControls(id);
  }
}

function toggleInputs(id, disabled) {
  const card = document.getElementById('timer-' + id);
  card.querySelectorAll('.time-input').forEach(i => i.disabled = disabled);
}

function updateTitle() {
  const running = timers.filter(t => t.state === 'running' || t.state === 'paused');
  if (running.length > 0) {
    const first = running[0];
    document.title = formatTime(first.remainMs) + ' — Countdown Timer';
  } else {
    document.title = 'Countdown Timer — Custom Timer';
  }
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    const focused = document.activeElement.closest('.timer-card');
    const id = focused ? parseInt(focused.id.replace('timer-', '')) : (timers[0] && timers[0].id);
    if (!id) return;
    const t = timers.find(t => t.id === id);
    if (!t) return;
    if (t.alarming) stopAlarm(id);
    else if (t.state === 'running') pauseTimer(id);
    else if (t.state === 'paused') resumeTimer(id);
    else startTimer(id);
  }
});

addTimer();
</script>
