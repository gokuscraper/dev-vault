<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dockerfile Gen — Visual Dockerfile Generator</title>
<meta name="description" content="Generate Dockerfiles visually. Node.js, Python, Go, Rust, Ruby, PHP, Java templates. Multi-stage builds, .dockerignore. Free.">
<meta property="og:title" content="Dockerfile Gen — Visual Dockerfile Generator">
<meta property="og:description" content="Generate Dockerfiles for any language. Multi-stage builds, .dockerignore. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/dockerfile-gen/">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://yurukusa.github.io/dockerfile-gen/">
<script type="application/ld+json">
{"@context": "https://schema.org", "@type": "WebApplication", "name": "Dockerfile Gen", "description": "Generate Dockerfiles visually. Node.js, Python, Go, Rust, Ruby, PHP, Java templates. Multi-stage builds, .dockerignore.", "url": "https://yurukusa.github.io/dockerfile-gen/", "applicationCategory": "DeveloperApplication", "operatingSystem": "Any", "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"}, "author": {"@type": "Organization", "name": "yurukusa", "url": "https://github.com/yurukusa"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.section{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.section h3{font-size:0.9rem;color:#ccc;margin-bottom:12px}

.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.template-card{padding:12px;border-radius:8px;border:1px solid #333;background:#0d0d0d;cursor:pointer;text-align:center;transition:all 0.15s}
.template-card:hover{border-color:#555}
.template-card.selected{background:#1a2744;border-color:#2a4a7a}
.template-card .icon{font-size:1.2rem;margin-bottom:4px}
.template-card .name{font-size:0.82rem;color:#fff;font-weight:600}

.input-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.input-row label{font-size:0.82rem;color:#888;min-width:120px;font-weight:600}
.input-row input,.input-row select{flex:1;padding:8px 12px;border-radius:8px;border:1px solid #333;background:#0d0d0d;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;outline:none;min-width:120px}
.input-row input:focus,.input-row select:focus{border-color:#3b82f6}

.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer}
.check-item:hover{background:#1a1a1a}
.check-item input{accent-color:#3b82f6;width:16px;height:16px;margin-top:2px;flex-shrink:0}
.check-item .label{font-size:0.82rem;color:#ccc}
.check-item .desc{font-size:0.72rem;color:#666;margin-top:2px}

.btn-row{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}

.tabs{display:flex;gap:0;border-bottom:2px solid #222;margin-bottom:0}
.tab{padding:10px 20px;cursor:pointer;font-size:0.85rem;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:600}
.tab.active{color:#4da6ff;border-bottom-color:#3b82f6}
.tab:hover:not(.active){color:#ccc}

.output-section{background:#161616;border:1px solid #222;border-radius:0 0 12px 12px;border-top:none;padding:20px;margin-bottom:16px}
textarea.output{width:100%;height:400px;padding:12px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#ddd;font-family:'Fira Code',monospace;font-size:0.78rem;resize:vertical;outline:none;line-height:1.5}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

footer{text-align:center;padding:32px 16px;border-top:1px solid #1a1a1a;margin-top:40px;color:#555;font-size:0.78rem}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>Dockerfile Gen</h1>
<p class="subtitle">Generate production-ready Dockerfiles for any language.</p>

<!-- Language selection -->
<div class="section">
  <h3>Select language / framework</h3>
  <div class="template-grid" id="templateGrid"></div>
</div>

<!-- Options -->
<div class="section" id="optionsSection" style="display:none">
  <h3>Configuration</h3>
  <div class="input-row"><label>Base image</label><input id="baseImage" placeholder="auto-detected"></div>
  <div class="input-row"><label>App directory</label><input id="appDir" value="/app" placeholder="/app"></div>
  <div class="input-row"><label>Port</label><input id="port" value="3000" placeholder="3000"></div>
  <div class="input-row"><label>Start command</label><input id="startCmd" placeholder="auto-detected"></div>
  <div class="check-grid" style="margin-top:12px">
    <label class="check-item"><input type="checkbox" id="multiStage" checked><div><div class="label">Multi-stage build</div><div class="desc">Smaller final image</div></div></label>
    <label class="check-item"><input type="checkbox" id="nonRoot" checked><div><div class="label">Non-root user</div><div class="desc">Security best practice</div></div></label>
    <label class="check-item"><input type="checkbox" id="healthcheck"><div><div class="label">Health check</div><div class="desc">HEALTHCHECK instruction</div></div></label>
    <label class="check-item"><input type="checkbox" id="cacheMount"><div><div class="label">Cache mounts</div><div class="desc">BuildKit cache for deps</div></div></label>
    <label class="check-item"><input type="checkbox" id="labels"><div><div class="label">Labels</div><div class="desc">OCI image labels</div></div></label>
  </div>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="generate()">Generate</button>
  <button class="btn" onclick="copyTab()">Copy</button>
  <button class="btn" onclick="downloadTab()">Download</button>
</div>

<!-- Output tabs -->
<div id="outputWrapper" style="display:none">
<div class="tabs">
  <div class="tab active" onclick="showTab('dockerfile')">Dockerfile</div>
  <div class="tab" onclick="showTab('dockerignore')">.dockerignore</div>
  <div class="tab" onclick="showTab('compose')">docker-compose.yml</div>
</div>
<div class="output-section">
  <textarea class="output" id="outputArea" readonly></textarea>
</div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/dockerfile-gen">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
  <div class="related" style="margin-top:12px">
    <strong style="color:#888">Related Tools</strong><br>
    <a href="https://yurukusa.github.io/env-gen/">Env Gen</a>
    <a href="https://yurukusa.github.io/nginx-config/">Nginx Config</a>
    <a href="https://yurukusa.github.io/gitignore-gen/">gitignore Gen</a>
  </div>
  <div style="margin-top:12px"><a href="https://yurukusa.github.io/dev-toolkit/" style="color:#666">Dev Toolkit — 110+ free tools</a></div>
</footer>

<script>
const LANGS=[
  {id:'node',name:'Node.js',icon:'JS',base:'node:20-alpine',port:'3000',start:'node server.js',install:'npm ci --omit=dev',copy:'package*.json',buildCmd:'npm run build',srcCopy:'.'},
  {id:'python',name:'Python',icon:'Py',base:'python:3.12-slim',port:'8000',start:'python -m uvicorn main:app --host 0.0.0.0',install:'pip install --no-cache-dir -r requirements.txt',copy:'requirements.txt',buildCmd:'',srcCopy:'.'},
  {id:'go',name:'Go',icon:'Go',base:'golang:1.23-alpine',port:'8080',start:'./app',install:'go mod download',copy:'go.mod go.sum',buildCmd:'CGO_ENABLED=0 go build -o app .',srcCopy:'.'},
  {id:'rust',name:'Rust',icon:'Rs',base:'rust:1.79-slim',port:'8080',start:'./app',install:'',copy:'Cargo.toml Cargo.lock',buildCmd:'cargo build --release',srcCopy:'src/'},
  {id:'ruby',name:'Ruby',icon:'Rb',base:'ruby:3.3-slim',port:'3000',start:'bundle exec rails server -b 0.0.0.0',install:'bundle install --without development test',copy:'Gemfile Gemfile.lock',buildCmd:'bundle exec rake assets:precompile',srcCopy:'.'},
  {id:'php',name:'PHP',icon:'PHP',base:'php:8.3-fpm-alpine',port:'9000',start:'php-fpm',install:'composer install --no-dev --optimize-autoloader',copy:'composer.json composer.lock',buildCmd:'',srcCopy:'.'},
  {id:'java',name:'Java',icon:'J',base:'eclipse-temurin:21-jdk-alpine',port:'8080',start:'java -jar app.jar',install:'',copy:'pom.xml',buildCmd:'./mvnw package -DskipTests',srcCopy:'src/'},
  {id:'dotnet',name:'.NET',icon:'C#',base:'mcr.microsoft.com/dotnet/sdk:8.0-alpine',port:'5000',start:'dotnet app.dll',install:'dotnet restore',copy:'*.csproj',buildCmd:'dotnet publish -c Release -o /publish',srcCopy:'.'},
  {id:'static',name:'Static',icon:'H',base:'nginx:alpine',port:'80',start:'',install:'',copy:'',buildCmd:'',srcCopy:'.'},
  {id:'deno',name:'Deno',icon:'D',base:'denoland/deno:alpine',port:'8000',start:'deno run --allow-net --allow-read main.ts',install:'',copy:'deno.json',buildCmd:'',srcCopy:'.'},
];

let selected=null;
let activeTab='dockerfile';
const outputs={dockerfile:'',dockerignore:'',compose:''};

function renderGrid(){
  document.getElementById('templateGrid').innerHTML=LANGS.map(l=>
    `<div class="template-card${selected===l.id?' selected':''}" onclick="selectLang('${l.id}')">
      <div class="icon">${l.icon}</div>
      <div class="name">${l.name}</div>
    </div>`
  ).join('');
}

function selectLang(id){
  selected=id;
  const l=LANGS.find(x=>x.id===id);
  document.getElementById('baseImage').value=l.base;
  document.getElementById('port').value=l.port;
  document.getElementById('startCmd').value=l.start;
  document.getElementById('optionsSection').style.display='block';
  renderGrid();
  generate();
}

function val(id){return document.getElementById(id)?.value||''}
function ck(id){return document.getElementById(id)?.checked}

function generate(){
  if(!selected) return;
  const l=LANGS.find(x=>x.id===selected);
  const base=val('baseImage')||l.base;
  const appDir=val('appDir')||'/app';
  const port=val('port')||l.port;
  const startCmd=val('startCmd')||l.start;
  const multi=ck('multiStage');
  const nonRoot=ck('nonRoot');
  const health=ck('healthcheck');
  const cache=ck('cacheMount');
  const labels=ck('labels');

  // Generate Dockerfile
  const df=[];
  df.push('# Generated by Dockerfile Gen — https://yurukusa.github.io/dockerfile-gen/');
  df.push('');

  if(selected==='static'){
    df.push(`FROM ${base}`);
    df.push(`COPY . /usr/share/nginx/html`);
    df.push(`EXPOSE ${port}`);
    df.push('CMD ["nginx", "-g", "daemon off;"]');
  }else if(selected==='go'&&multi){
    // Go multi-stage
    df.push(`FROM ${base} AS builder`);
    df.push(`WORKDIR ${appDir}`);
    if(l.copy) df.push(`COPY ${l.copy} ./`);
    df.push(`RUN ${l.install}`);
    df.push(`COPY ${l.srcCopy} ./`);
    df.push(`RUN ${l.buildCmd}`);
    df.push('');
    df.push('FROM alpine:latest');
    if(nonRoot){
      df.push('RUN addgroup -S app && adduser -S app -G app');
    }
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY --from=builder ${appDir}/app .`);
    if(nonRoot) df.push('USER app');
    df.push(`EXPOSE ${port}`);
    if(health) df.push(`HEALTHCHECK --interval=30s --timeout=3s CMD wget -qO- http://localhost:${port}/health || exit 1`);
    if(labels){
      df.push('LABEL org.opencontainers.image.source="https://github.com/user/repo"');
      df.push('LABEL org.opencontainers.image.description="Go application"');
    }
    df.push(`CMD ["${startCmd}"]`);
  }else if(selected==='rust'&&multi){
    df.push(`FROM ${base} AS builder`);
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY ${l.copy} ./`);
    df.push('RUN mkdir src && echo "fn main(){}" > src/main.rs && cargo build --release && rm -rf src');
    df.push(`COPY ${l.srcCopy} ./`);
    df.push('RUN cargo build --release');
    df.push('');
    df.push('FROM debian:bookworm-slim');
    if(nonRoot) df.push('RUN useradd -r -s /bin/false app');
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY --from=builder ${appDir}/target/release/app .`);
    if(nonRoot) df.push('USER app');
    df.push(`EXPOSE ${port}`);
    if(health) df.push(`HEALTHCHECK --interval=30s --timeout=3s CMD curl -f http://localhost:${port}/health || exit 1`);
    df.push(`CMD ["./app"]`);
  }else if(selected==='java'&&multi){
    df.push(`FROM ${base} AS builder`);
    df.push(`WORKDIR ${appDir}`);
    df.push('COPY . .');
    df.push(`RUN ${l.buildCmd}`);
    df.push('');
    df.push('FROM eclipse-temurin:21-jre-alpine');
    if(nonRoot) df.push('RUN addgroup -S app && adduser -S app -G app');
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY --from=builder ${appDir}/target/*.jar app.jar`);
    if(nonRoot) df.push('USER app');
    df.push(`EXPOSE ${port}`);
    if(health) df.push(`HEALTHCHECK --interval=30s --timeout=3s CMD wget -qO- http://localhost:${port}/actuator/health || exit 1`);
    df.push('CMD ["java", "-jar", "app.jar"]');
  }else if(selected==='dotnet'&&multi){
    df.push(`FROM ${base} AS builder`);
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY ${l.copy} ./`);
    df.push(`RUN ${l.install}`);
    df.push('COPY . .');
    df.push(`RUN ${l.buildCmd}`);
    df.push('');
    df.push('FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine');
    if(nonRoot) df.push('RUN addgroup -S app && adduser -S app -G app');
    df.push('WORKDIR /publish');
    df.push('COPY --from=builder /publish .');
    if(nonRoot) df.push('USER app');
    df.push(`EXPOSE ${port}`);
    df.push('ENTRYPOINT ["dotnet", "app.dll"]');
  }else if(selected==='node'&&multi){
    df.push(`FROM ${base} AS builder`);
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY ${l.copy} ./`);
    if(cache) df.push('RUN --mount=type=cache,target=/root/.npm npm ci');
    else df.push('RUN npm ci');
    df.push('COPY . .');
    df.push(`RUN ${l.buildCmd}`);
    df.push('');
    df.push(`FROM ${base}`);
    if(nonRoot) df.push('RUN addgroup -S app && adduser -S app -G app');
    df.push(`WORKDIR ${appDir}`);
    df.push(`COPY ${l.copy} ./`);
    df.push(`RUN ${l.install}`);
    df.push('COPY --from=builder /app/dist ./dist');
    if(nonRoot) df.push('USER app');
    df.push(`EXPOSE ${port}`);
    if(health) df.push(`HEALTHCHECK --interval=30s --timeout=3s CMD wget -qO- http://localhost:${port}/health || exit 1`);
    df.push(`CMD ["${startCmd}"]`);
  }else{
    // Single stage (or non-multi-stage)
    df.push(`FROM ${base}`);
    df.push(`WORKDIR ${appDir}`);
    if(l.copy){
      df.push(`COPY ${l.copy} ./`);
      if(l.install){
        if(cache&&selected==='node') df.push('RUN --mount=type=cache,target=/root/.npm npm ci');
        else if(cache&&selected==='python') df.push('RUN --mount=type=cache,target=/root/.cache/pip pip install --no-cache-dir -r requirements.txt');
        else df.push(`RUN ${l.install}`);
      }
    }
    df.push(`COPY ${l.srcCopy||'.'} ./`);
    if(l.buildCmd) df.push(`RUN ${l.buildCmd}`);
    if(nonRoot){
      if(base.includes('alpine')) df.push('RUN addgroup -S app && adduser -S app -G app');
      else df.push('RUN useradd -r -s /bin/false app');
      df.push('USER app');
    }
    df.push(`EXPOSE ${port}`);
    if(health) df.push(`HEALTHCHECK --interval=30s --timeout=3s CMD wget -qO- http://localhost:${port}/health || exit 1`);
    if(labels){
      df.push('LABEL org.opencontainers.image.source="https://github.com/user/repo"');
    }
    df.push(`CMD ["${startCmd.split(' ')[0]}"${startCmd.split(' ').slice(1).map(a=>', "'+a+'"').join('')}]`);
  }

  outputs.dockerfile=df.join('\n');

  // Generate .dockerignore
  const di=['# Generated by Dockerfile Gen','node_modules','npm-debug.log*','.git','.gitignore','.env','.env.*','Dockerfile','docker-compose*.yml','.dockerignore','README.md','LICENSE','.vscode','.idea','__pycache__','*.pyc','.pytest_cache','target/debug','tmp/','log/','coverage/','dist/','build/'];
  outputs.dockerignore=di.join('\n');

  // Generate docker-compose.yml
  const dc=[];
  dc.push('# Generated by Dockerfile Gen');
  dc.push('services:');
  dc.push('  app:');
  dc.push('    build: .');
  dc.push(`    ports:`);
  dc.push(`      - "${port}:${port}"`);
  dc.push('    environment:');
  dc.push('      - NODE_ENV=production');
  dc.push('    restart: unless-stopped');
  if(health){
    dc.push('    healthcheck:');
    dc.push('      test: ["CMD", "wget", "-qO-", "http://localhost:'+port+'/health"]');
    dc.push('      interval: 30s');
    dc.push('      timeout: 3s');
    dc.push('      retries: 3');
  }
  outputs.compose=dc.join('\n');

  document.getElementById('outputWrapper').style.display='block';
  showTab(activeTab);
}

function showTab(id){
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const idx={dockerfile:0,dockerignore:1,compose:2}[id]||0;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('outputArea').value=outputs[id]||'';
}

function copyTab(){
  const t=document.getElementById('outputArea').value;
  if(!t) return;
  navigator.clipboard.writeText(t);
  toast('Copied!');
}

function downloadTab(){
  const t=document.getElementById('outputArea').value;
  if(!t) return;
  const names={dockerfile:'Dockerfile',dockerignore:'.dockerignore',compose:'docker-compose.yml'};
  const blob=new Blob([t],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=names[activeTab]||'Dockerfile';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Downloaded!');
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

renderGrid();
</script>
</body>
</html>
