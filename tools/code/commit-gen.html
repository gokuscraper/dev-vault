<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commit Message Generator — Conventional Commits Builder</title>
<meta name="description" content="Generate conventional commit messages. Type, scope, description, body, breaking changes, co-authors. Copy git command.">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/commit-gen/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Commit Message Generator","description":"Build conventional commit messages visually with type, scope, body, and footer support.","url":"https://gokuscraper.github.io/dev-vault/commit-gen/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"gokuscraper","url":"https://github.com/gokuscraper"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:inherit}
textarea{font-family:'Fira Code',monospace;resize:vertical}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:12px}
.type-btn{padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.78rem;text-align:left}
.type-btn:hover{border-color:#3b82f6;color:#4da6ff}
.type-btn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.type-btn .emoji{margin-right:4px}
.type-btn .name{font-weight:600}
.preview{background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:12px}
.preview pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.85rem;color:#c9d1d9;line-height:1.5}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.5}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.char-count{font-size:0.75rem;color:#666;text-align:right;margin-top:2px}
.char-count.warn{color:#d29922}
.char-count.error{color:#f85149}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>Commit Message Generator</h1>
<p class="sub">Build conventional commit messages</p>

<div class="section">
<h3>Type</h3>
<div class="type-grid" id="typeGrid"></div>
</div>

<div class="section">
<h3>Header</h3>
<div class="row">
<div class="col" style="max-width:200px"><label>Scope (optional)</label><input id="scope" oninput="gen()" placeholder="api, auth, ui..."></div>
<div class="col"><label>Description (imperative mood)</label><input id="desc" oninput="gen()" placeholder="add login endpoint" maxlength="100"></div>
</div>
<div class="char-count" id="headerCount"></div>
</div>

<div class="section">
<h3>Body (optional)</h3>
<textarea id="body" rows="3" oninput="gen()" placeholder="Explain what and why, not how..."></textarea>
</div>

<div class="section">
<h3>Footer (optional)</h3>
<div class="check-row"><input type="checkbox" id="isBreaking" onchange="gen()"><label for="isBreaking">BREAKING CHANGE</label></div>
<div id="breakingRow" style="display:none;margin-bottom:10px">
<label>Breaking change description</label>
<input id="breakingDesc" oninput="gen()" placeholder="The API endpoint now requires authentication">
</div>
<div class="row">
<div class="col"><label>Closes issue (optional)</label><input id="closes" oninput="gen()" placeholder="#123, #456"></div>
<div class="col"><label>Co-authored-by (optional)</label><input id="coauthor" oninput="gen()" placeholder="Name <email>"></div>
</div>
<div class="check-row"><input type="checkbox" id="useEmoji" onchange="gen()"><label for="useEmoji">Include emoji prefix (gitmoji)</label></div>
</div>

<div class="section">
<h3>Preview</h3>
<div class="preview"><pre id="preview"></pre></div>
</div>

<div class="section">
<h3>Git Command</h3>
<div class="output">
<button class="copy-btn" onclick="copyCmd()">Copy</button>
<pre id="cmd"></pre>
</div>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/git-cheatsheet/">Git Cheatsheet</a> | <a href="https://gokuscraper.github.io/dev-vault/readme-gen/">README Gen</a> | <a href="https://gokuscraper.github.io/dev-vault/diff-text/">Diff Text</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const TYPES=[
  {name:'feat',emoji:'✨',desc:'New feature'},
  {name:'fix',emoji:'🐛',desc:'Bug fix'},
  {name:'docs',emoji:'📝',desc:'Documentation'},
  {name:'style',emoji:'💄',desc:'Formatting'},
  {name:'refactor',emoji:'♻️',desc:'Refactor'},
  {name:'perf',emoji:'⚡',desc:'Performance'},
  {name:'test',emoji:'✅',desc:'Tests'},
  {name:'build',emoji:'📦',desc:'Build system'},
  {name:'ci',emoji:'👷',desc:'CI config'},
  {name:'chore',emoji:'🔧',desc:'Chores'},
  {name:'revert',emoji:'⏪',desc:'Revert'},
  {name:'wip',emoji:'🚧',desc:'Work in progress'}
];

let selectedType='feat';

function initTypes(){
  const c=document.getElementById('typeGrid');
  TYPES.forEach(t=>{
    const b=document.createElement('div');
    b.className='type-btn'+(t.name===selectedType?' active':'');
    b.innerHTML=`<span class="emoji">${t.emoji}</span><span class="name">${t.name}</span><br><span style="font-size:0.7rem;color:#666">${t.desc}</span>`;
    b.onclick=()=>{selectedType=t.name;document.querySelectorAll('.type-btn').forEach(el=>el.classList.remove('active'));b.classList.add('active');gen()};
    c.appendChild(b);
  });
}

function gen(){
  const scope=document.getElementById('scope').value;
  const desc=document.getElementById('desc').value;
  const body=document.getElementById('body').value;
  const isBreaking=document.getElementById('isBreaking').checked;
  const breakingDesc=document.getElementById('breakingDesc').value;
  const closes=document.getElementById('closes').value;
  const coauthor=document.getElementById('coauthor').value;
  const useEmoji=document.getElementById('useEmoji').checked;

  document.getElementById('breakingRow').style.display=isBreaking?'block':'none';

  const typeObj=TYPES.find(t=>t.name===selectedType);
  const emoji=useEmoji&&typeObj?typeObj.emoji+' ':'';
  const bang=isBreaking?'!':'';
  const scopePart=scope?`(${scope})`:'';
  const header=`${emoji}${selectedType}${scopePart}${bang}: ${desc}`;

  // Header length check
  const hLen=header.length;
  const counter=document.getElementById('headerCount');
  counter.textContent=`${hLen}/72 characters`;
  counter.className='char-count'+(hLen>72?' error':hLen>50?' warn':'');

  let msg=header;
  if(body) msg+='\n\n'+body;
  let footer='';
  if(isBreaking&&breakingDesc) footer+=`BREAKING CHANGE: ${breakingDesc}\n`;
  if(closes) footer+=`Closes ${closes}\n`;
  if(coauthor) footer+=`Co-authored-by: ${coauthor}\n`;
  if(footer) msg+='\n\n'+footer.trimEnd();

  document.getElementById('preview').textContent=msg;

  // Git command
  const escaped=msg.replace(/'/g,"'\\''");
  document.getElementById('cmd').textContent=`git commit -m '${escaped}'`;
}

function copyCmd(){
  navigator.clipboard.writeText(document.getElementById('cmd').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initTypes();
gen();
</script>
</body>
</html>
