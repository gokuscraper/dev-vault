<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const TYPES=[
  {name:'feat',emoji:'✨',desc:'New feature'},
  {name:'fix',emoji:'🐛',desc:'Bug fix'},
  {name:'docs',emoji:'📝',desc:'Documentation'},
  {name:'style',emoji:'💄',desc:'Formatting'},
  {name:'refactor',emoji:'♻️',desc:'Refactor'},
  {name:'perf',emoji:'⚡',desc:'Performance'},
  {name:'test',emoji:'✅',desc:'Tests'},
  {name:'build',emoji:'📦',desc:'Build system'},
  {name:'ci',emoji:'👷',desc:'CI config'},
  {name:'chore',emoji:'🔧',desc:'Chores'},
  {name:'revert',emoji:'⏪',desc:'Revert'},
  {name:'wip',emoji:'🚧',desc:'Work in progress'}
];

let selectedType='feat';

function initTypes(){
  const c=document.getElementById('typeGrid');
  TYPES.forEach(t=>{
    const b=document.createElement('div');
    b.className='type-btn'+(t.name===selectedType?' active':'');
    b.innerHTML=`<span class="emoji">${t.emoji}</span><span class="name">${t.name}</span><br><span style="font-size:0.7rem;color:#666">${t.desc}</span>`;
    b.onclick=()=>{selectedType=t.name;document.querySelectorAll('.type-btn').forEach(el=>el.classList.remove('active'));b.classList.add('active');gen()};
    c.appendChild(b);
  });
}

function gen(){
  const scope=document.getElementById('scope').value;
  const desc=document.getElementById('desc').value;
  const body=document.getElementById('body').value;
  const isBreaking=document.getElementById('isBreaking').checked;
  const breakingDesc=document.getElementById('breakingDesc').value;
  const closes=document.getElementById('closes').value;
  const coauthor=document.getElementById('coauthor').value;
  const useEmoji=document.getElementById('useEmoji').checked;

  document.getElementById('breakingRow').style.display=isBreaking?'block':'none';

  const typeObj=TYPES.find(t=>t.name===selectedType);
  const emoji=useEmoji&&typeObj?typeObj.emoji+' ':'';
  const bang=isBreaking?'!':'';
  const scopePart=scope?`(${scope})`:'';
  const header=`${emoji}${selectedType}${scopePart}${bang}: ${desc}`;

  // Header length check
  const hLen=header.length;
  const counter=document.getElementById('headerCount');
  counter.textContent=`${hLen}/72 characters`;
  counter.className='char-count'+(hLen>72?' error':hLen>50?' warn':'');

  let msg=header;
  if(body) msg+='\n\n'+body;
  let footer='';
  if(isBreaking&&breakingDesc) footer+=`BREAKING CHANGE: ${breakingDesc}\n`;
  if(closes) footer+=`Closes ${closes}\n`;
  if(coauthor) footer+=`Co-authored-by: ${coauthor}\n`;
  if(footer) msg+='\n\n'+footer.trimEnd();

  document.getElementById('preview').textContent=msg;

  // Git command
  const escaped=msg.replace(/'/g,"'\\''");
  document.getElementById('cmd').textContent=`git commit -m '${escaped}'`;
}

function copyCmd(){
  navigator.clipboard.writeText(document.getElementById('cmd').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initTypes();
gen();
</script>
