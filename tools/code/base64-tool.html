<body>
<div class="container">
<h1>Base64 Tool</h1>
<p class="subtitle">Encode, decode, and transform text. Base64, URL, HTML, JWT.</p>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Base64</div>
  <div class="tab" onclick="switchTab(1)">URL</div>
  <div class="tab" onclick="switchTab(2)">HTML</div>
  <div class="tab" onclick="switchTab(3)">JWT</div>
</div>

<!-- Base64 -->
<div class="panel active" id="p0">
  <div class="layout">
    <div>
      <div class="label-row"><span class="label">Text</span><span class="info" id="b64inputInfo"></span></div>
      <textarea id="b64input" placeholder="Enter text to encode..." oninput="b64Encode()">Hello, World!</textarea>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="b64Encode()">Encode ↓</button>
      <button class="btn swap-btn" onclick="b64Swap()">⇅</button>
      <button class="btn primary" onclick="b64Decode()">Decode ↑</button>
      <button class="btn" onclick="copyText('b64output')">Copy</button>
    </div>
    <div>
      <div class="label-row"><span class="label">Base64</span><span class="info" id="b64outputInfo"></span></div>
      <textarea class="output-area" id="b64output" placeholder="Base64 output..."></textarea>
    </div>
  </div>
</div>

<!-- URL -->
<div class="panel" id="p1">
  <div class="layout">
    <div>
      <div class="label">Text / URL</div>
      <textarea id="urlInput" placeholder="Enter text to URL encode..." oninput="urlEncode()">Hello World & foo=bar</textarea>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="urlEncode()">Encode ↓</button>
      <button class="btn swap-btn" onclick="urlSwap()">⇅</button>
      <button class="btn primary" onclick="urlDecode()">Decode ↑</button>
      <button class="btn" onclick="copyText('urlOutput')">Copy</button>
    </div>
    <div>
      <div class="label">URL Encoded</div>
      <textarea class="output-area" id="urlOutput"></textarea>
    </div>
  </div>
</div>

<!-- HTML -->
<div class="panel" id="p2">
  <div class="layout">
    <div>
      <div class="label">Text / HTML</div>
      <textarea id="htmlInput" placeholder="Enter HTML to encode..." oninput="htmlEncode()"><div class="test">Hello & "World"</div></textarea>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="htmlEncode()">Encode ↓</button>
      <button class="btn swap-btn" onclick="htmlSwap()">⇅</button>
      <button class="btn primary" onclick="htmlDecode()">Decode ↑</button>
      <button class="btn" onclick="copyText('htmlOutput')">Copy</button>
    </div>
    <div>

  </div>
</div>

<!-- JWT -->
<div class="panel" id="p3">
  <div class="layout">
    <div>
      <div class="label">JWT Token</div>
      <textarea id="jwtInput" placeholder="Paste a JWT token..." oninput="jwtDecode()">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c</textarea>
    </div>
    <div id="jwtError" style="color:#ef4444;font-size:0.82rem;min-height:20px"></div>
    <div class="jwt-section" id="jwtOutput"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
}

// Base64
function b64Encode(){
  try{
    const text=$('b64input').value;
    const encoded=btoa(unescape(encodeURIComponent(text)));
    $('b64output').value=encoded;
    $('b64inputInfo').textContent=text.length+' chars';
    $('b64outputInfo').textContent=encoded.length+' chars ('+Math.round(encoded.length/text.length*100)+'% of original)';
  }catch(e){$('b64output').value='Error: '+e.message}
}
function b64Decode(){
  try{
    const encoded=$('b64output').value.trim();
    $('b64input').value=decodeURIComponent(escape(atob(encoded)));
  }catch(e){$('b64input').value='Error: Invalid Base64'}
}
function b64Swap(){
  const a=$('b64input').value;
  $('b64input').value=$('b64output').value;
  $('b64output').value=a;
}

// URL
function urlEncode(){$('urlOutput').value=encodeURIComponent($('urlInput').value)}
function urlDecode(){
  try{$('urlInput').value=decodeURIComponent($('urlOutput').value)}
  catch(e){$('urlInput').value='Error: Invalid URL encoding'}
}
function urlSwap(){const a=$('urlInput').value;$('urlInput').value=$('urlOutput').value;$('urlOutput').value=a}

// HTML
function htmlEncode(){
  const text=$('htmlInput').value;
  $('htmlOutput').value=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function htmlDecode(){
  const el=document.createElement('textarea');
  el.innerHTML=$('htmlOutput').value;
  $('htmlInput').value=el.value;
}
function htmlSwap(){const a=$('htmlInput').value;$('htmlInput').value=$('htmlOutput').value;$('htmlOutput').value=a}

// JWT
function jwtDecode(){
  const token=$('jwtInput').value.trim();
  if(!token){$('jwtOutput').innerHTML='';$('jwtError').textContent='';return}

  const parts=token.split('.');
  if(parts.length!==3){
    $('jwtError').textContent='Invalid JWT: expected 3 parts separated by dots';
    $('jwtOutput').innerHTML='';
    return;
  }

  try{
    const header=JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
    const payload=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));

    // Format dates in payload
    const payloadDisplay={...payload};
    ['iat','exp','nbf'].forEach(k=>{
      if(payloadDisplay[k]){
        const d=new Date(payloadDisplay[k]*1000);
        payloadDisplay[k+' (date)']=d.toISOString();
      }
    });

    $('jwtError').textContent='';
    $('jwtOutput').innerHTML=`
      <div class="jwt-part jwt-header">
        <h4>Header</h4>
        <pre>${JSON.stringify(header,null,2)}</pre>
      </div>
      <div class="jwt-part jwt-payload">
        <h4>Payload</h4>
        <pre>${JSON.stringify(payloadDisplay,null,2)}</pre>
      </div>
      <div class="jwt-part jwt-sig">
        <h4>Signature</h4>
        <pre>${parts[2]}</pre>
      </div>
    `;
  }catch(e){
    $('jwtError').textContent='Error decoding JWT: '+e.message;
    $('jwtOutput').innerHTML='';
  }
}

function copyText(id){
  navigator.clipboard.writeText($(id).value);
  const el=document.createElement('div');
  el.className='copied';el.textContent='Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Init
b64Encode();
urlEncode();
htmlEncode();
jwtDecode();
</script>
