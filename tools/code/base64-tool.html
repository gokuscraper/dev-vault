<script>
const $=id=>document.getElementById(id);

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
}

// Base64
function b64Encode(){
  try{
    const text=$('b64input').value;
    const encoded=btoa(unescape(encodeURIComponent(text)));
    $('b64output').value=encoded;
    $('b64inputInfo').textContent=text.length+' chars';
    $('b64outputInfo').textContent=encoded.length+' chars ('+Math.round(encoded.length/text.length*100)+'% of original)';
  }catch(e){$('b64output').value='Error: '+e.message}
}
function b64Decode(){
  try{
    const encoded=$('b64output').value.trim();
    $('b64input').value=decodeURIComponent(escape(atob(encoded)));
  }catch(e){$('b64input').value='Error: Invalid Base64'}
}
function b64Swap(){
  const a=$('b64input').value;
  $('b64input').value=$('b64output').value;
  $('b64output').value=a;
}

// URL
function urlEncode(){$('urlOutput').value=encodeURIComponent($('urlInput').value)}
function urlDecode(){
  try{$('urlInput').value=decodeURIComponent($('urlOutput').value)}
  catch(e){$('urlInput').value='Error: Invalid URL encoding'}
}
function urlSwap(){const a=$('urlInput').value;$('urlInput').value=$('urlOutput').value;$('urlOutput').value=a}

// HTML
function htmlEncode(){
  const text=$('htmlInput').value;
  $('htmlOutput').value=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function htmlDecode(){
  const el=document.createElement('textarea');
  el.innerHTML=$('htmlOutput').value;
  $('htmlInput').value=el.value;
}
function htmlSwap(){const a=$('htmlInput').value;$('htmlInput').value=$('htmlOutput').value;$('htmlOutput').value=a}

// JWT
function jwtDecode(){
  const token=$('jwtInput').value.trim();
  if(!token){$('jwtOutput').innerHTML='';$('jwtError').textContent='';return}

  const parts=token.split('.');
  if(parts.length!==3){
    $('jwtError').textContent=T("jtc_invalid_jwt_expected_3_pa");
    $('jwtOutput').innerHTML='';
    return;
  }

  try{
    const header=JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
    const payload=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));

    // Format dates in payload
    const payloadDisplay={...payload};
    ['iat','exp','nbf'].forEach(k=>{
      if(payloadDisplay[k]){
        const d=new Date(payloadDisplay[k]*1000);
        payloadDisplay[k+' (date)']=d.toISOString();
      }
    });

    $('jwtError').textContent='';
    $('jwtOutput').innerHTML=`
      <div class="jwt-part jwt-header">
        <h4>Header</h4>
        <pre>${JSON.stringify(header,null,2)}</pre>
      </div>
      <div class="jwt-part jwt-payload">
        <h4>Payload</h4>
        <pre>${JSON.stringify(payloadDisplay,null,2)}</pre>
      </div>
      <div class="jwt-part jwt-sig">
        <h4>Signature</h4>
        <pre>${parts[2]}</pre>
      </div>
    `;
  }catch(e){
    $('jwtError').textContent=T("jtcpre_error_decoding_jwt")+e.message;
    $('jwtOutput').innerHTML='';
  }
}

function copyText(id){
  navigator.clipboard.writeText($(id).value);
  const el=document.createElement('div');
  el.className='copied';el.textContent=T("jtc_copied");
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Init
b64Encode();
urlEncode();
htmlEncode();
jwtDecode();
</script>
