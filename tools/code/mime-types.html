<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--accent-hover:#79c0ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;--pink:#f778ba;--cyan:#39d2c0;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.3)}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5}
body{min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent-hover);text-decoration:underline}

.container{max-width:1100px;margin:0 auto;padding:0 16px;width:100%}

header{padding:32px 0 24px;text-align:center}
header h1{font-size:1.8rem;font-weight:700;margin-bottom:6px}
header h1 span{color:var(--accent)}
header p{color:var(--text-dim);font-size:.95rem}

.search-wrap{position:relative;max-width:600px;margin:20px auto 0}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
#search{width:100%;padding:12px 14px 12px 42px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;outline:none;transition:border-color .15s}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text-dim)}

.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0 24px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:.82rem;cursor:pointer;transition:all .15s;user-select:none}
.filter-btn:hover{border-color:var(--text-dim);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn .count{opacity:.6;margin-left:4px;font-size:.75rem}

.stats{text-align:center;color:var(--text-dim);font-size:.85rem;margin-bottom:16px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:40px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .15s;cursor:default}
.card:hover{border-color:var(--text-dim)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-mime{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;font-size:.92rem;font-weight:600;color:var(--accent);word-break:break-all;cursor:pointer;transition:color .15s}
.card-mime:hover{color:var(--accent-hover)}
.card-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500}
.cat-text{background:rgba(59,185,80,.15);color:var(--green)}
.cat-application{background:rgba(88,166,255,.15);color:var(--accent)}
.cat-image{background:rgba(210,153,34,.15);color:var(--orange)}
.cat-audio{background:rgba(188,140,255,.15);color:var(--purple)}
.cat-video{background:rgba(247,120,186,.15);color:var(--pink)}
.cat-font{background:rgba(57,210,192,.15);color:var(--cyan)}
.cat-multipart{background:rgba(248,81,73,.15);color:var(--red)}
.cat-model{background:rgba(210,153,34,.15);color:var(--orange)}

.card-desc{font-size:.85rem;color:var(--text-dim);margin-bottom:8px}
.card-ext{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ext-tag{font-family:monospace;font-size:.78rem;padding:2px 8px;border-radius:4px;background:rgba(88,166,255,.1);color:var(--accent)}
.card-content-type{font-size:.78rem;color:var(--text-dim);font-family:monospace;background:rgba(255,255,255,.04);padding:6px 10px;border-radius:4px;margin-bottom:6px;word-break:break-all}
.card-context{font-size:.8rem;color:var(--text-dim);font-style:italic}
.card-common{display:inline-block;font-size:.68rem;padding:1px 6px;border-radius:4px;background:rgba(59,185,80,.15);color:var(--green);margin-left:6px;vertical-align:middle}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:.88rem;font-weight:500;transition:transform .25s ease;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

.no-results{text-align:center;padding:60px 20px;color:var(--text-dim)}
.no-results h3{font-size:1.2rem;margin-bottom:8px;color:var(--text)}

footer{margin-top:auto;padding:24px 0;text-align:center;color:var(--text-dim);font-size:.82rem;border-top:1px solid var(--border)}

@media(max-width:680px){
  header h1{font-size:1.4rem}
  .grid{grid-template-columns:1fr}
  .filters{gap:6px}
  .filter-btn{padding:5px 10px;font-size:.78rem}
}
</style>
</head>

<header>

<main class="container">

  <div class="stats" id="stats"></div>

const $=s=>document.querySelector(s);
const grid=$("#grid");
const searchInput=$("#search");
const filtersEl=$("#filters");
const statsEl=$("#stats");
const noResults=$("#no-results");
const toast=$("#toast");
let activeCategory="All";
let toastTimer=null;

// Build category counts
const catCounts={All:DB.length};
DB.forEach(e=>{catCounts[e.category]=(catCounts[e.category]||0)+1});

// Render filter buttons
const catOrder=["All","Text","Application","Image","Audio","Video","Font","Multipart","Model"];
catOrder.forEach(cat=>{
  if(!catCounts[cat])return;
  const btn=document.createElement("button");
  btn.className="filter-btn"+(cat==="All"?" active":"");
  btn.innerHTML=`${cat}<span class="count">${catCounts[cat]}</span>`;
  btn.dataset.cat=cat;
  btn.addEventListener("click",()=>{
    activeCategory=cat;
    filtersEl.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.cat===cat));
    render();
  });
  filtersEl.appendChild(btn);
});

function copyMime(mime){
  navigator.clipboard.writeText(mime).then(()=>{
    toast.textContent=`Copied: ${mime}`;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toast.classList.remove("show"),1800);
  });
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function contentTypeExample(entry){
  const m=entry.mime;
  if(m.startsWith("text/"))return`Content-Type: ${m}; charset=utf-8`;
  if(m==="multipart/form-data")return`Content-Type: multipart/form-data; boundary=----FormBoundary`;
  if(m.includes("json")||m.includes("xml"))return`Content-Type: ${m}; charset=utf-8`;
  return`Content-Type: ${m}`;
}

function renderCard(entry){
  const catClass="cat-"+entry.category.toLowerCase();
  const exts=entry.extensions.map(e=>`<span class="ext-tag">${escHtml(e)}</span>`).join("");
  const commonBadge=entry.common?'<span class="card-common">common</span>':"";
  return`<div class="card">
  <div class="card-head">
    <span class="card-mime" onclick="copyMime('${escHtml(entry.mime)}')" title="Click to copy">${escHtml(entry.mime)}${commonBadge}</span>
    <span class="card-badge ${catClass}">${escHtml(entry.category)}</span>
  </div>
  <div class="card-desc">${escHtml(entry.description)}</div>
  ${exts?`<div class="card-ext">${exts}</div>`:""}
  <div class="card-content-type">${escHtml(contentTypeExample(entry))}</div>
  ${entry.context?`<div class="card-context">${escHtml(entry.context)}</div>`:""}
</div>`;
}

function render(){
  const q=searchInput.value.trim().toLowerCase();
  let filtered=DB;
  if(activeCategory!=="All")filtered=filtered.filter(e=>e.category===activeCategory);
  if(q){
    filtered=filtered.filter(e=>{
      const ext=q.startsWith(".")?q:"."+q;
      return e.mime.toLowerCase().includes(q)
        ||e.extensions.some(x=>x.toLowerCase().includes(q)||x.toLowerCase()===ext)
        ||e.description.toLowerCase().includes(q)
        ||e.category.toLowerCase().includes(q)
        ||(e.context&&e.context.toLowerCase().includes(q));
    });
  }
  // Sort: common first, then alphabetical
  filtered.sort((a,b)=>{
    if(a.common!==b.common)return a.common?-1:1;
    return a.mime.localeCompare(b.mime);
  });
  grid.innerHTML=filtered.map(renderCard).join("");
  statsEl.textContent=`Showing ${filtered.length} of ${DB.length} MIME types`;
  noResults.hidden=filtered.length>0;
}

// URL param support
const params=new URLSearchParams(location.search);
if(params.get("q")){
  searchInput.value=params.get("q");
}

searchInput.addEventListener("input",()=>{
  render();
  const url=new URL(location);
  if(searchInput.value)url.searchParams.set("q",searchInput.value);
  else url.searchParams.delete("q");
  history.replaceState(null,"",url);
});

render();
</script>
</body>
</html>
