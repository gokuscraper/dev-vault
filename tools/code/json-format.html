<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:1000px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}
.toolbar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.btn.danger{border-color:#ef4444;color:#ef4444}
.btn.danger:hover{background:#ef4444;color:#fff}

.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.panel{display:flex;flex-direction:column}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#161616;border:1px solid #222;border-bottom:none;border-radius:10px 10px 0 0}
.panel-header .label{font-size:0.78rem;color:#888;text-transform:uppercase;font-weight:600}
.panel-header .info{font-size:0.72rem;color:#555}
textarea{width:100%;height:400px;padding:14px;border:1px solid #222;background:#161616;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;resize:vertical;outline:none;line-height:1.6;border-radius:0 0 10px 10px}
textarea:focus{border-color:#3b82f6}

#outputArea{background:#0d0d0d;color:#10b981}
#status{text-align:center;padding:8px;font-size:0.85rem;font-weight:600;border-radius:8px;margin-bottom:16px}
.status-valid{background:#0d2818;color:#10b981;border:1px solid #1a4a2e}
.status-invalid{background:#2d0a0a;color:#ef4444;border:1px solid #4a1a1a}
.status-empty{background:#161616;color:#555;border:1px solid #222}

.stats{display:flex;gap:16px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.stat{font-size:0.82rem}
.stat .n{color:#fff;font-weight:700}
.stat .l{color:#666}

.tree-section{display:none;margin-bottom:20px}
.tree-section h2{font-size:1.1rem;color:#ccc;margin-bottom:12px;border-bottom:1px solid #222;padding-bottom:8px}
.tree{font-family:'Fira Code',monospace;font-size:0.82rem;line-height:1.8;max-height:500px;overflow:auto;background:#161616;border:1px solid #222;border-radius:10px;padding:14px}
.tree-key{color:#8b5cf6}
.tree-str{color:#10b981}
.tree-num{color:#f59e0b}
.tree-bool{color:#3b82f6}
.tree-null{color:#ef4444}
.tree-toggle{cursor:pointer;user-select:none;color:#555}
.tree-toggle:hover{color:#888}
.tree-indent{margin-left:20px}
.tree-hidden{display:none}

footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:700px){.layout{grid-template-columns:1fr}textarea{height:250px}}

<body>
<div class="container">
<h1>JSON Format</h1>
<p class="subtitle">Beautify, validate, and minify JSON. Paste and go.</p>

<div class="toolbar">
  <button class="btn primary" onclick="format()">Beautify</button>
  <button class="btn" onclick="minify()">Minify</button>
  <button class="btn" onclick="sortKeys()">Sort Keys</button>
  <button class="btn" onclick="toggleTree()">Tree View</button>
  <button class="btn" onclick="copyOutput()">Copy</button>
  <button class="btn" onclick="downloadJSON()">Download</button>
  <button class="btn danger" onclick="clearAll()">Clear</button>
</div>

<div id="status" class="status-empty">Paste JSON to begin</div>
<div class="stats" id="stats"></div>

<div class="layout">
  <div class="panel">
    <div class="panel-header">
      <span class="label">Input</span>
      <span class="info" id="inputInfo"></span>
    </div>
    <textarea id="inputArea" placeholder='Paste JSON here...

Example:
{"name":"John","age":30,"hobbies":["reading","coding"]}'></textarea>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="label">Output</span>
      <span class="info" id="outputInfo"></span>
    </div>
    <textarea id="outputArea" readonly></textarea>
  </div>
</div>

<div class="tree-section" id="treeSection">
  <h2>Tree View</h2>
  <div class="tree" id="treeView"></div>
</div>
</div>

<footer>
  <a href="https://github.com/gokuscraper/json-format">GitHub</a> ·
  Also: <a href="https://gokuscraper.github.io/dev-vault/regex-test/">Regex Test</a> ·
  <a href="https://gokuscraper.github.io/dev-vault/cron-explain/">Cron Explain</a> ·
  <a href="https://gokuscraper.github.io/dev-vault/gh-stats/">gh-stats</a>
</footer>

<script>
const $=id=>document.getElementById(id);

$('inputArea').addEventListener('input',validate);

function validate(){
  const raw=$('inputArea').value.trim();
  if(!raw){
    $('status').className='status-empty';
    $('status').textContent='Paste JSON to begin';
    $('outputArea').value='';
    $('stats').innerHTML='';
    return null;
  }
  try{
    const obj=JSON.parse(raw);
    $('status').className='status-valid';
    $('status').textContent='Valid JSON';
    updateStats(raw,obj);
    return obj;
  }catch(e){
    $('status').className='status-invalid';
    $('status').textContent='Invalid: '+e.message;
    $('outputArea').value='';
    $('stats').innerHTML='';
    return null;
  }
}

function updateStats(raw,obj){
  const size=new Blob([raw]).size;
  const depth=getDepth(obj);
  const keys=countKeys(obj);
  const arrays=countType(obj,'array');
  const objects=countType(obj,'object');

  $('stats').innerHTML=`
    <div class="stat"><span class="n">${fmtBytes(size)}</span> <span class="l">size</span></div>
    <div class="stat"><span class="n">${keys}</span> <span class="l">keys</span></div>
    <div class="stat"><span class="n">${depth}</span> <span class="l">depth</span></div>
    <div class="stat"><span class="n">${objects}</span> <span class="l">objects</span></div>
    <div class="stat"><span class="n">${arrays}</span> <span class="l">arrays</span></div>
  `;

  $('inputInfo').textContent=fmtBytes(size);
}

function format(){
  const obj=validate();
  if(!obj&&$('inputArea').value.trim()){return}
  if(!obj)return;
  const formatted=JSON.stringify(obj,null,2);
  $('outputArea').value=formatted;
  $('outputInfo').textContent=fmtBytes(new Blob([formatted]).size);
}

function minify(){
  const obj=validate();
  if(!obj)return;
  const min=JSON.stringify(obj);
  $('outputArea').value=min;
  $('outputInfo').textContent=fmtBytes(new Blob([min]).size);
}

function sortKeys(){
  const obj=validate();
  if(!obj)return;
  const sorted=deepSort(obj);
  const formatted=JSON.stringify(sorted,null,2);
  $('outputArea').value=formatted;
  $('outputInfo').textContent='sorted';
}

function deepSort(obj){
  if(Array.isArray(obj))return obj.map(deepSort);
  if(obj&&typeof obj==='object'){
    const sorted={};
    Object.keys(obj).sort().forEach(k=>{sorted[k]=deepSort(obj[k])});
    return sorted;
  }
  return obj;
}

function toggleTree(){
  const section=$('treeSection');
  if(section.style.display==='block'){section.style.display='none';return}
  const obj=validate();
  if(!obj)return;
  $('treeView').innerHTML=renderTree(obj);
  section.style.display='block';
}

function renderTree(val,key='',level=0){
  if(val===null)return`<div class="tree-indent" style="margin-left:${level*20}px">${key?`<span class="tree-key">"${esc(key)}"</span>: `:''}<span class="tree-null">null</span></div>`;
  if(typeof val==='boolean')return`<div class="tree-indent" style="margin-left:${level*20}px">${key?`<span class="tree-key">"${esc(key)}"</span>: `:''}<span class="tree-bool">${val}</span></div>`;
  if(typeof val==='number')return`<div class="tree-indent" style="margin-left:${level*20}px">${key?`<span class="tree-key">"${esc(key)}"</span>: `:''}<span class="tree-num">${val}</span></div>`;
  if(typeof val==='string')return`<div class="tree-indent" style="margin-left:${level*20}px">${key?`<span class="tree-key">"${esc(key)}"</span>: `:''}<span class="tree-str">"${esc(val)}"</span></div>`;

  if(Array.isArray(val)){
    const id='t'+Math.random().toString(36).slice(2);
    let html=`<div class="tree-indent" style="margin-left:${level*20}px"><span class="tree-toggle" onclick="document.getElementById('${id}').classList.toggle('tree-hidden')">▼</span> ${key?`<span class="tree-key">"${esc(key)}"</span>: `:''}[${val.length}]</div>`;
    html+=`<div id="${id}">`;
    val.forEach((v,i)=>{html+=renderTree(v,String(i),level+1)});
    html+='</div>';
    return html;
  }

  if(typeof val==='object'){
    const keys=Object.keys(val);
    const id='t'+Math.random().toString(36).slice(2);
    let html=`<div class="tree-indent" style="margin-left:${level*20}px"><span class="tree-toggle" onclick="document.getElementById('${id}').classList.toggle('tree-hidden')">▼</span> ${key?`<span class="tree-key">"${esc(key)}"</span>: `:''}{ ${keys.length} keys }</div>`;
    html+=`<div id="${id}">`;
    keys.forEach(k=>{html+=renderTree(val[k],k,level+1)});
    html+='</div>';
    return html;
  }
  return '';
}

function copyOutput(){
  const text=$('outputArea').value;
  if(!text)return;
  navigator.clipboard.writeText(text);
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards';
  el.textContent='Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

function downloadJSON(){
  const text=$('outputArea').value||$('inputArea').value;
  if(!text)return;
  const blob=new Blob([text],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='formatted.json';
  a.click();
}

function clearAll(){
  $('inputArea').value='';
  $('outputArea').value='';
  $('stats').innerHTML='';
  $('inputInfo').textContent='';
  $('outputInfo').textContent='';
  $('treeSection').style.display='none';
  $('status').className='status-empty';
  $('status').textContent='Paste JSON to begin';
}

function getDepth(obj,d=0){
  if(!obj||typeof obj!=='object')return d;
  if(Array.isArray(obj))return obj.length?Math.max(...obj.map(v=>getDepth(v,d+1))):d+1;
  const vals=Object.values(obj);
  return vals.length?Math.max(...vals.map(v=>getDepth(v,d+1))):d+1;
}
function countKeys(obj){
  if(!obj||typeof obj!=='object')return 0;
  if(Array.isArray(obj))return obj.reduce((s,v)=>s+countKeys(v),0);
  return Object.keys(obj).length+Object.values(obj).reduce((s,v)=>s+countKeys(v),0);
}
function countType(obj,type){
  if(!obj||typeof obj!=='object')return 0;
  let count=type==='array'?Array.isArray(obj)?1:0:(!Array.isArray(obj)?1:0);
  const vals=Array.isArray(obj)?obj:Object.values(obj);
  return count+vals.reduce((s,v)=>s+countType(v,type),0);
}
function fmtBytes(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
