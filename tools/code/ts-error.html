<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TS Error — TypeScript Error Code Decoder</title>
<meta name="description" content="Decode TypeScript error codes instantly. Human-readable explanations, fix examples, and common causes for 80+ TS errors.">
<meta property="og:title" content="TS Error — TypeScript Error Code Decoder">
<meta property="og:description" content="Decode TypeScript error codes. Human-readable explanations with fix examples.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://yurukusa.github.io/ts-error/">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#3178c6;--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
code{background:rgba(110,118,129,.2);padding:2px 6px;border-radius:3px;font-size:13px;font-family:'SF Mono',Monaco,Consolas,monospace}
pre{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.5;font-family:'SF Mono',Monaco,Consolas,monospace}
pre .good{color:var(--green)}
pre .bad{color:var(--red)}
pre .comment{color:var(--muted)}

.container{max-width:800px;margin:0 auto;padding:24px 16px}
header{text-align:center;margin-bottom:32px}
header h1{font-size:28px;margin-bottom:6px}
header h1 span{color:var(--accent)}
header p{color:var(--muted);font-size:14px}

.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box .hint{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px}

.categories{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.cat-btn{padding:4px 12px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.cat-btn:hover,.cat-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(49,120,198,.1)}

.error-list{display:grid;gap:12px}
.error-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.error-card:hover{border-color:var(--accent)}
.error-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.error-header .code{font-family:monospace;font-weight:700;color:var(--red);font-size:15px;white-space:nowrap}
.error-header .title{flex:1;margin:0 12px;font-size:14px}
.error-header .cat{font-size:11px;color:var(--muted);background:rgba(139,148,158,.1);padding:2px 8px;border-radius:10px;white-space:nowrap}
.error-body{padding:0 16px 16px;display:none}
.error-body.open{display:block}
.error-body h4{font-size:13px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.error-body .cause{color:var(--text);font-size:14px;margin-bottom:8px}
.error-body .tip{background:rgba(63,185,80,.08);border-left:3px solid var(--green);padding:8px 12px;border-radius:0 4px 4px 0;font-size:13px;margin-top:8px}

.stats{text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px}

footer{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:32px}

@media(max-width:600px){.error-header{flex-wrap:wrap}.error-header .cat{margin-top:4px}}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><span>TS</span> Error</h1>
    <p>TypeScript error code decoder — human-readable explanations with fix examples</p>
  </header>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search by error code (TS2304) or keyword (cannot find)" autocomplete="off">
    <span class="hint">/ to focus</span>
  </div>

  <div class="categories" id="categories"></div>
  <div class="stats" id="stats"></div>
  <div class="error-list" id="errorList"></div>
</div>

<footer>
  <p>TS Error — <a href="https://www.typescriptlang.org/docs/" target="_blank">TypeScript Docs</a> | Part of <a href="https://yurukusa.github.io/dev-toolkit/" target="_blank">Dev Toolkit</a></p>
</footer>

<script>
const ERRORS = [
  // Type Errors
  {code:2304,title:"Cannot find name '{0}'",cat:"type",cause:"Variable, function, or type is used but not defined or imported.",fix:"Import the missing module or declare the variable/type.",before:`<span class="bad">console.log(myVar);</span> <span class="comment">// TS2304: Cannot find name 'myVar'</span>`,after:`<span class="good">const myVar = 'hello';</span>\nconsole.log(myVar);`},
  {code:2322,title:"Type '{0}' is not assignable to type '{1}'",cat:"type",cause:"You're assigning a value that doesn't match the expected type.",fix:"Fix the value to match the type, or widen the type annotation.",before:`<span class="bad">const x: number = "hello";</span> <span class="comment">// TS2322</span>`,after:`<span class="good">const x: number = 42;</span>\n<span class="comment">// or</span>\n<span class="good">const x: string = "hello";</span>`},
  {code:2339,title:"Property '{0}' does not exist on type '{1}'",cat:"type",cause:"Accessing a property that TypeScript doesn't know about on the type.",fix:"Add the property to the type, or use type assertion.",before:`<span class="bad">const obj: {} = {};\nobj.name;</span> <span class="comment">// TS2339</span>`,after:`<span class="good">const obj: { name?: string } = {};\nobj.name;</span>`},
  {code:2345,title:"Argument of type '{0}' is not assignable to parameter of type '{1}'",cat:"type",cause:"Function argument doesn't match the parameter type.",fix:"Fix the argument type or update the function signature.",before:`<span class="bad">function greet(name: string) {}\ngreet(42);</span> <span class="comment">// TS2345</span>`,after:`<span class="good">greet("Alice");</span>`},
  {code:2349,title:"This expression is not callable",cat:"type",cause:"Trying to call something that isn't a function.",fix:"Check if the variable is actually a function or if you have a naming conflict.",before:`<span class="bad">const x = 5;\nx();</span> <span class="comment">// TS2349</span>`,after:`<span class="good">const x = () => 5;\nx();</span>`},
  {code:2351,title:"This expression is not constructable",cat:"type",cause:"Using `new` on something that isn't a constructor.",fix:"Ensure you're calling a class or constructor function.",before:`<span class="bad">const fn = () => {};\nnew fn();</span> <span class="comment">// TS2351</span>`,after:`<span class="good">class MyClass {}\nnew MyClass();</span>`},
  {code:2352,title:"Conversion of type '{0}' to type '{1}' may be a mistake",cat:"type",cause:"Type assertion between incompatible types.",fix:"Use `unknown` as an intermediate step, or fix the types.",before:`<span class="bad">const x = "hello" as number;</span> <span class="comment">// TS2352</span>`,after:`<span class="good">const x = "hello" as unknown as number;</span>\n<span class="comment">// Better: fix the actual type</span>`},
  {code:2355,title:"A function whose declared type is neither 'void' nor 'any' must return a value",cat:"type",cause:"Function has a return type but doesn't return anything.",fix:"Add a return statement or change the return type to void.",before:`<span class="bad">function getNum(): number {\n  console.log("hi");\n}</span> <span class="comment">// TS2355</span>`,after:`<span class="good">function getNum(): number {\n  console.log("hi");\n  return 42;\n}</span>`},
  {code:2365,title:"Operator '{0}' cannot be applied to types '{1}' and '{2}'",cat:"type",cause:"Using an operator with incompatible types.",fix:"Convert or check types before using the operator.",before:`<span class="bad">"5" - 3;</span> <span class="comment">// TS2365</span>`,after:`<span class="good">Number("5") - 3;</span>`},
  {code:2366,title:"Function lacks ending return statement",cat:"type",cause:"Not all code paths return a value.",fix:"Add return statements to all branches.",before:`<span class="bad">function check(x: number): string {\n  if (x > 0) return "pos";\n}</span>`,after:`<span class="good">function check(x: number): string {\n  if (x > 0) return "pos";\n  return "non-pos";\n}</span>`},
  {code:2531,title:"Object is possibly 'null'",cat:"null",cause:"Accessing a value that might be null without checking.",fix:"Add a null check or use optional chaining.",before:`<span class="bad">const el = document.getElementById('x');\nel.textContent = 'hi';</span> <span class="comment">// TS2531</span>`,after:`<span class="good">const el = document.getElementById('x');\nif (el) el.textContent = 'hi';</span>\n<span class="comment">// or</span>\n<span class="good">el?.textContent = 'hi';</span>`},
  {code:2532,title:"Object is possibly 'undefined'",cat:"null",cause:"Accessing a value that might be undefined.",fix:"Add an undefined check or use optional chaining.",before:`<span class="bad">const arr = [1, 2, 3];\nconst val: number = arr.find(x => x > 5);</span>`,after:`<span class="good">const val = arr.find(x => x > 5) ?? 0;</span>`},
  {code:2533,title:"Object is possibly 'null' or 'undefined'",cat:"null",cause:"Value could be null or undefined in strict mode.",fix:"Add a nullish check or use non-null assertion (!) if you're sure.",before:`<span class="bad">function f(x?: string | null) {\n  x.toUpperCase();\n}</span>`,after:`<span class="good">function f(x?: string | null) {\n  if (x) x.toUpperCase();\n}</span>`},
  {code:18048,title:"'{0}' is possibly 'undefined'",cat:"null",cause:"Same as TS2532 but for newer TypeScript versions.",fix:"Add a check or use nullish coalescing.",before:`<span class="bad">const map = new Map&lt;string, number&gt;();\nconst v: number = map.get('key');</span>`,after:`<span class="good">const v: number = map.get('key') ?? 0;</span>`},

  // Module/Import
  {code:2307,title:"Cannot find module '{0}'",cat:"module",cause:"Module doesn't exist or TypeScript can't find its types.",fix:"Install the package or its @types. Check tsconfig paths.",before:`<span class="bad">import foo from 'nonexistent';</span> <span class="comment">// TS2307</span>`,after:`<span class="good">npm install nonexistent</span>\n<span class="comment">// or</span>\n<span class="good">npm install @types/nonexistent</span>`},
  {code:1259,title:"Module '{0}' can only be default-imported using the 'esModuleInterop' flag",cat:"module",cause:"CommonJS module imported with ES default import syntax.",fix:"Enable esModuleInterop in tsconfig.json or use * as import.",before:`<span class="bad">import express from 'express';</span> <span class="comment">// TS1259</span>`,after:`<span class="good">// tsconfig.json: "esModuleInterop": true</span>\n<span class="comment">// or</span>\n<span class="good">import * as express from 'express';</span>`},
  {code:2691,title:"An import path cannot end with a '.ts' extension",cat:"module",cause:"Importing with .ts extension which TypeScript doesn't allow.",fix:"Remove the extension or use .js extension (for ESM output).",before:`<span class="bad">import { foo } from './utils.ts';</span>`,after:`<span class="good">import { foo } from './utils';</span>\n<span class="comment">// or for ESM:</span>\n<span class="good">import { foo } from './utils.js';</span>`},
  {code:2792,title:"Cannot find module '{0}'. Did you mean to set the 'moduleResolution' option?",cat:"module",cause:"Module resolution strategy can't find the package.",fix:'Set moduleResolution to "node" or "bundler" in tsconfig.',before:`<span class="bad">import { z } from 'zod';</span> <span class="comment">// TS2792</span>`,after:`<span class="comment">// tsconfig.json:</span>\n<span class="good">"moduleResolution": "bundler"</span>`},
  {code:7016,title:"Could not find a declaration file for module '{0}'",cat:"module",cause:"JavaScript module has no TypeScript type definitions.",fix:"Install @types package or create a .d.ts declaration.",before:`<span class="bad">import foo from 'untyped-pkg';</span> <span class="comment">// TS7016</span>`,after:`<span class="comment">// Install types:</span>\n<span class="good">npm i -D @types/untyped-pkg</span>\n<span class="comment">// Or create src/untyped-pkg.d.ts:</span>\n<span class="good">declare module 'untyped-pkg';</span>`},

  // Syntax/Declaration
  {code:1005,title:"'{0}' expected",cat:"syntax",cause:"Missing a character like ), }, ;, or > in your code.",fix:"Check for unclosed brackets, missing semicolons, or syntax errors.",before:`<span class="bad">if (x > 0 {\n  console.log(x);\n}</span>`,after:`<span class="good">if (x > 0) {\n  console.log(x);\n}</span>`},
  {code:1128,title:"Declaration or statement expected",cat:"syntax",cause:"Unexpected token where TypeScript expects a declaration.",fix:"Check for misplaced code, extra braces, or syntax errors.",before:`<span class="bad">} <span class="comment">// extra closing brace</span>\nconst x = 1;</span>`,after:`<span class="good">const x = 1;</span>`},
  {code:1135,title:"Argument expression expected",cat:"syntax",cause:"Function call has invalid syntax in arguments.",fix:"Fix the argument expression syntax.",before:`<span class="bad">fn(,);</span>`,after:`<span class="good">fn();</span>`},
  {code:1155,title:"'const' declarations must be initialized",cat:"syntax",cause:"Declared a const without assigning a value.",fix:"Add an initializer or use let instead.",before:`<span class="bad">const x;</span> <span class="comment">// TS1155</span>`,after:`<span class="good">const x = undefined;</span>\n<span class="comment">// or</span>\n<span class="good">let x;</span>`},
  {code:2300,title:"Duplicate identifier '{0}'",cat:"syntax",cause:"Same name declared twice in the same scope.",fix:"Rename one of the declarations.",before:`<span class="bad">let x = 1;\nlet x = 2;</span> <span class="comment">// TS2300</span>`,after:`<span class="good">let x = 1;\nlet y = 2;</span>`},
  {code:2451,title:"Cannot redeclare block-scoped variable '{0}'",cat:"syntax",cause:"Variable already declared in this scope or in a .ts file without modules.",fix:"Use a different name or add export {} to make it a module.",before:`<span class="bad"><span class="comment">// a.ts</span>\nconst name = 'A';\n<span class="comment">// b.ts</span>\nconst name = 'B';</span> <span class="comment">// TS2451</span>`,after:`<span class="good"><span class="comment">// Add to make each file a module:</span>\nexport {};\nconst name = 'A';</span>`},

  // Class/Interface
  {code:2420,title:"Class '{0}' incorrectly implements interface '{1}'",cat:"class",cause:"Class is missing properties required by the interface.",fix:"Add all required properties and methods from the interface.",before:`<span class="bad">interface Animal { name: string; speak(): void; }\nclass Dog implements Animal {\n  name = 'Rex';\n}</span>`,after:`<span class="good">class Dog implements Animal {\n  name = 'Rex';\n  speak() { console.log('Woof'); }\n}</span>`},
  {code:2511,title:"Cannot create an instance of an abstract class",cat:"class",cause:"Using new on an abstract class.",fix:"Create a concrete subclass and instantiate that.",before:`<span class="bad">abstract class Shape {}\nnew Shape();</span> <span class="comment">// TS2511</span>`,after:`<span class="good">class Circle extends Shape {}\nnew Circle();</span>`},
  {code:2515,title:"Non-abstract class '{0}' does not implement inherited abstract member '{1}'",cat:"class",cause:"Subclass missing implementation of abstract method.",fix:"Implement all abstract methods in the subclass.",before:`<span class="bad">abstract class Base { abstract greet(): string; }\nclass Sub extends Base {}</span>`,after:`<span class="good">class Sub extends Base {\n  greet() { return 'hi'; }\n}</span>`},
  {code:2564,title:"Property '{0}' has no initializer and is not definitely assigned",cat:"class",cause:"Class property declared but never assigned in constructor.",fix:"Initialize the property, add ?, or use definite assignment assertion (!).",before:`<span class="bad">class User {\n  name: string;\n}</span> <span class="comment">// TS2564</span>`,after:`<span class="good">class User {\n  name: string = '';\n}</span>\n<span class="comment">// or</span>\n<span class="good">class User {\n  name!: string; <span class="comment">// definite assignment</span>\n}</span>`},

  // Generics
  {code:2314,title:"Generic type '{0}' requires {1} type argument(s)",cat:"generic",cause:"Generic type used without providing required type parameters.",fix:"Add the required type arguments.",before:`<span class="bad">const arr: Array = [1, 2];</span> <span class="comment">// TS2314</span>`,after:`<span class="good">const arr: Array&lt;number&gt; = [1, 2];</span>`},
  {code:2344,title:"Type '{0}' does not satisfy the constraint '{1}'",cat:"generic",cause:"Generic type argument doesn't meet the constraint.",fix:"Ensure the type argument extends the required constraint.",before:`<span class="bad">function f&lt;T extends string&gt;(x: T) {}\nf(42);</span> <span class="comment">// TS2344</span>`,after:`<span class="good">f("hello");</span>`},
  {code:2558,title:"Expected {0} type arguments, but got {1}",cat:"generic",cause:"Wrong number of generic type parameters provided.",fix:"Match the expected number of type parameters.",before:`<span class="bad">type Pair&lt;A, B&gt; = [A, B];\nconst p: Pair&lt;number&gt; = [1, 2];</span>`,after:`<span class="good">const p: Pair&lt;number, number&gt; = [1, 2];</span>`},

  // Strict Mode
  {code:7006,title:"Parameter '{0}' implicitly has an 'any' type",cat:"strict",cause:"Function parameter has no type annotation (noImplicitAny).",fix:"Add a type annotation to the parameter.",before:`<span class="bad">function greet(name) {</span> <span class="comment">// TS7006</span>`,after:`<span class="good">function greet(name: string) {</span>`},
  {code:7031,title:"Binding element '{0}' implicitly has an 'any' type",cat:"strict",cause:"Destructured parameter has no type annotation.",fix:"Add type annotation to the destructured parameter.",before:`<span class="bad">function f({ x, y }) {}</span> <span class="comment">// TS7031</span>`,after:`<span class="good">function f({ x, y }: { x: number; y: number }) {}</span>`},
  {code:7053,title:"Element implicitly has an 'any' type because expression can't be used to index type",cat:"strict",cause:"Dynamic property access on object without index signature.",fix:"Add an index signature or use a type-safe approach.",before:`<span class="bad">const obj = { a: 1 };\nconst key = 'a';\nobj[key];</span> <span class="comment">// TS7053</span>`,after:`<span class="good">const obj: Record&lt;string, number&gt; = { a: 1 };\nobj[key];</span>\n<span class="comment">// or</span>\n<span class="good">obj[key as keyof typeof obj];</span>`},
  {code:2367,title:"This comparison appears to be unintentional because the types have no overlap",cat:"strict",cause:"Comparing two types that can never be equal.",fix:"Check if you're comparing the right values or fix the types.",before:`<span class="bad">const x: string = 'a';\nif (x === 42) {}</span> <span class="comment">// TS2367</span>`,after:`<span class="good">if (x === '42') {}</span>`},

  {code:2551,title:"Property '{0}' does not exist on type '{1}'. Did you mean '{2}'?",cat:"type",cause:"Typo in property name — TypeScript suggests a similar one.",fix:"Use the suggested property name.",before:`<span class="bad">interface User { name: string; }\nconst u: User = { nmae: 'a' };</span> <span class="comment">// TS2551</span>`,after:`<span class="good">const u: User = { name: 'a' };</span>`},

  {code:1308,title:"'await' expressions are only allowed within async functions",cat:"async",cause:"Using await outside an async function.",fix:"Mark the function as async or use .then() instead.",before:`<span class="bad">function getData() {\n  const data = await fetch('/api');\n}</span>`,after:`<span class="good">async function getData() {\n  const data = await fetch('/api');\n}</span>`},
  {code:2801,title:"This condition will always return true since this 'Promise' is always defined",cat:"async",cause:"Checking a Promise in an if statement instead of awaiting it.",fix:"Add await before the Promise.",before:`<span class="bad">async function f() {\n  if (fetch('/api')) {}\n}</span> <span class="comment">// TS2801</span>`,after:`<span class="good">async function f() {\n  if (await fetch('/api')) {}\n}</span>`},

  {code:2786,title:"'{0}' cannot be used as a JSX component",cat:"react",cause:"Component return type doesn't match JSX element type.",fix:"Ensure component returns JSX.Element or null.",before:`<span class="bad">const Comp = () => 'text';\n&lt;Comp /&gt;</span> <span class="comment">// TS2786</span>`,after:`<span class="good">const Comp = () => &lt;span&gt;text&lt;/span&gt;;</span>`},
  {code:17004,title:"Cannot use JSX unless the '--jsx' flag is provided",cat:"react",cause:"JSX syntax used but jsx option not set in tsconfig.",fix:'Set "jsx": "react-jsx" in tsconfig.json.',before:`<span class="comment">// tsconfig.json missing jsx option</span>`,after:`<span class="good">"compilerOptions": {\n  "jsx": "react-jsx"\n}</span>`},
  {code:2607,title:"JSX element class does not support attributes because it does not have a '{0}' property",cat:"react",cause:"Component doesn't accept the props you're passing.",fix:"Add the prop to the component's type definition.",before:`<span class="bad">function Btn() { return &lt;button/&gt;; }\n&lt;Btn color="red" /&gt;</span>`,after:`<span class="good">function Btn({ color }: { color: string }) {\n  return &lt;button style={{color}}/&gt;;\n}</span>`},

  // Config
  {code:5023,title:"Unknown compiler option '{0}'",cat:"config",cause:"Invalid option in tsconfig.json.",fix:"Check the option name against TypeScript docs.",before:`<span class="bad">"compilerOptions": {\n  "modul": "esnext"\n}</span>`,after:`<span class="good">"module": "esnext"</span>`},
  {code:5110,title:"Option 'module' must be set to 'NodeNext' when option 'moduleResolution' is set to 'NodeNext'",cat:"config",cause:"Mismatched module and moduleResolution settings.",fix:"Use matching module and moduleResolution values.",before:`<span class="bad">"module": "esnext",\n"moduleResolution": "nodenext"</span>`,after:`<span class="good">"module": "nodenext",\n"moduleResolution": "nodenext"</span>`},
  {code:6133,title:"'{0}' is declared but its value is never read",cat:"config",cause:"Variable or import is unused.",fix:"Remove the unused declaration or prefix with _.",before:`<span class="bad">const unused = 5;</span> <span class="comment">// TS6133</span>`,after:`<span class="good">const _unused = 5;</span>\n<span class="comment">// or just remove it</span>`},

  // Utility Types
  {code:2344,title:"Type 'string' does not satisfy the constraint 'keyof T'",cat:"generic",cause:"String literal doesn't match the keys of a type.",fix:"Use keyof or a valid key of the target type.",before:`<span class="bad">type Pick&lt;T, K&gt; = { [P in K]: T[P] };\ntype X = Pick&lt;{a:1}, 'b'&gt;;</span>`,after:`<span class="good">type X = Pick&lt;{a:1, b:2}, 'b'&gt;;</span>`},

  // Advanced
  {code:2590,title:"Expression expected",cat:"syntax",cause:"Often caused by using satisfies or other new keywords in older TS versions.",fix:"Upgrade TypeScript to 4.9+ for satisfies, or 5.0+ for other new features.",before:`<span class="bad">const cfg = {} satisfies Config;</span> <span class="comment">// TS2590 (TS &lt; 4.9)</span>`,after:`<span class="good">npm install typescript@latest</span>`},
  {code:2589,title:"Type instantiation is excessively deep and possibly infinite",cat:"type",cause:"Recursive type creates an infinite loop.",fix:"Add a depth limit to recursive types or simplify.",before:`<span class="bad">type Deep&lt;T&gt; = { x: Deep&lt;T&gt; };\ntype X = Deep&lt;string&gt;;</span>`,after:`<span class="good">type Deep&lt;T, D extends any[] = []&gt; =\n  D['length'] extends 10 ? T :\n  { x: Deep&lt;T, [...D, 0]&gt; };</span>`},
  {code:2769,title:"No overload matches this call",cat:"type",cause:"None of the function's overload signatures match your arguments.",fix:"Check the function's available overloads and match one.",before:`<span class="bad">document.addEventListener('click', (e: KeyboardEvent) => {});</span>`,after:`<span class="good">document.addEventListener('click', (e: MouseEvent) => {});</span>`},
  {code:2741,title:"Property '{0}' is missing in type '{1}' but required in type '{2}'",cat:"type",cause:"Object literal is missing a required property.",fix:"Add the missing property.",before:`<span class="bad">interface Config { host: string; port: number; }\nconst cfg: Config = { host: 'localhost' };</span>`,after:`<span class="good">const cfg: Config = { host: 'localhost', port: 3000 };</span>`},
  {code:2739,title:"Type '{0}' is missing the following properties from type '{1}': {2}",cat:"type",cause:"Multiple required properties are missing.",fix:"Add all missing properties.",before:`<span class="bad">interface Point { x: number; y: number; z: number; }\nconst p: Point = { x: 1 };</span>`,after:`<span class="good">const p: Point = { x: 1, y: 0, z: 0 };</span>`},
  {code:2775,title:"Assertions require every name in the call target to be declared with an explicit type annotation",cat:"type",cause:"Using asserts in a function without explicit types.",fix:"Add explicit type annotations.",before:`<span class="bad">const assert = (v) => { if (!v) throw Error(); };</span>`,after:`<span class="good">function assert(v: unknown): asserts v {\n  if (!v) throw Error();\n}</span>`},
  {code:2554,title:"Expected {0} arguments, but got {1}",cat:"type",cause:"Wrong number of arguments passed to a function.",fix:"Match the expected number of arguments.",before:`<span class="bad">function add(a: number, b: number) {}\nadd(1);</span> <span class="comment">// TS2554</span>`,after:`<span class="good">add(1, 2);</span>`},
  {code:2556,title:"A spread argument must either have a tuple type or be passed to a rest parameter",cat:"type",cause:"Spreading an array into a function with fixed parameters.",fix:"Use 'as const' or a tuple type.",before:`<span class="bad">const args = [1, 2];\nMath.max(...args);</span> <span class="comment">// TS2556</span>`,after:`<span class="good">const args = [1, 2] as const;\nMath.max(...args);</span>`},
  {code:4111,title:"Property '{0}' comes from an index signature, so it must be accessed with ['{0}']",cat:"strict",cause:"noPropertyAccessFromIndexSignature requires bracket notation.",fix:"Use bracket notation or disable the option.",before:`<span class="bad">const obj: Record&lt;string, number&gt; = {};\nobj.key;</span> <span class="comment">// TS4111</span>`,after:`<span class="good">obj['key'];</span>`},
];

const CATS = {type:'Type',null:'Null Safety',module:'Module',syntax:'Syntax',class:'Class',generic:'Generic',strict:'Strict Mode',async:'Async',react:'React/JSX',config:'Config'};
let activeCat = '';

function init() {
  // Categories
  const catEl = document.getElementById('categories');
  catEl.innerHTML = `<span class="cat-btn active" onclick="filterCat('')">All</span>` +
    Object.entries(CATS).map(([k,v]) => {
      const count = ERRORS.filter(e => e.cat === k).length;
      return `<span class="cat-btn" onclick="filterCat('${k}')">${v} (${count})</span>`;
    }).join('');

  render();

  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('search').value = '';
      render();
      document.getElementById('search').blur();
    }
  });

  document.getElementById('search').addEventListener('input', render);

  // URL param
  const q = new URLSearchParams(location.search).get('q');
  if (q) { document.getElementById('search').value = q; render(); }
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  let filtered = ERRORS;

  if (activeCat) filtered = filtered.filter(e => e.cat === activeCat);

  if (query) {
    const num = query.replace(/^ts/i, '');
    filtered = filtered.filter(e =>
      String(e.code).includes(num) ||
      e.title.toLowerCase().includes(query) ||
      e.cause.toLowerCase().includes(query) ||
      e.fix.toLowerCase().includes(query)
    );
  }

  // Deduplicate by code (some codes appear in multiple categories)
  const seen = new Set();
  filtered = filtered.filter(e => {
    const key = e.code + e.title;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  document.getElementById('stats').textContent = `${filtered.length} of ${ERRORS.length} errors`;

  document.getElementById('errorList').innerHTML = filtered.map((e, i) => `
    <div class="error-card" id="err-${i}">
      <div class="error-header" onclick="toggle(${i})">
        <span class="code">TS${e.code}</span>
        <span class="title">${esc(e.title)}</span>
        <span class="cat">${CATS[e.cat] || e.cat}</span>
      </div>
      <div class="error-body" id="body-${i}">
        <h4>Why this happens</h4>
        <div class="cause">${esc(e.cause)}</div>

        <h4>How to fix</h4>
        <div class="tip">${esc(e.fix)}</div>

        ${e.before ? `<h4>Before (error)</h4><pre>${e.before}</pre>` : ''}
        ${e.after ? `<h4>After (fixed)</h4><pre>${e.after}</pre>` : ''}

        <p style="margin-top:12px;font-size:12px;color:var(--muted)">
          <a href="https://www.typescriptlang.org/docs/handbook/" target="_blank">TypeScript Handbook</a> ·
          Search: <a href="https://stackoverflow.com/search?q=TS${e.code}" target="_blank">StackOverflow</a>
        </p>
      </div>
    </div>
  `).join('');

  // Auto-open if single result
  if (filtered.length === 1) toggle(0);
}

function toggle(i) {
  const body = document.getElementById(`body-${i}`);
  if (body) body.classList.toggle('open');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

init();
</script>
</body>
</html>
