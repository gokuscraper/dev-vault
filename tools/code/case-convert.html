<script>
// ─── Tokenizer ────────────────────────────────────────────────────────────────
// Splits any naming format into an array of lowercase word tokens.
function tokenize(input) {
  if (!input || !input.trim()) return [];
  let s = input.trim();
  // Handle camelCase / PascalCase boundaries
  s = s.replace(/([a-z\d])([A-Z])/g, '$1 $2');
  s = s.replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
  // Replace all common separators with space
  s = s.replace(/[\s/_\-\.\\]+/g, ' ');
  return s.trim().split(' ').filter(Boolean).map(w => w.toLowerCase());
}

function capitalize(w) { return w ? w[0].toUpperCase() + w.slice(1) : ''; }

// ─── Converters ───────────────────────────────────────────────────────────────
const converters = {
  camel:          w => w.length ? w[0] + w.slice(1).map(capitalize).join('') : '',
  pascal:         w => w.map(capitalize).join(''),
  snake:          w => w.join('_'),
  screamingSnake: w => w.join('_').toUpperCase(),
  kebab:          w => w.join('-'),
  screamingKebab: w => w.join('-').toUpperCase(),
  dot:            w => w.join('.'),
  path:           w => w.join('/'),
  title:          w => w.map(capitalize).join(' '),
  sentence:       w => w.length ? capitalize(w[0]) + (w.length > 1 ? ' ' + w.slice(1).join(' ') : '') : '',
  upper:          w => w.join(' ').toUpperCase(),
  lower:          w => w.join(' '),
  flat:           w => w.join(''),
  train:          w => w.map(capitalize).join('-'),
};

// ─── Format metadata ──────────────────────────────────────────────────────────
const formats = [
  { id: 'camel',          label: 'camelCase',            example: 'myVariableName'   },
  { id: 'pascal',         label: 'PascalCase',           example: 'MyVariableName'   },
  { id: 'snake',          label: 'snake_case',           example: 'my_variable_name' },
  { id: 'screamingSnake', label: 'SCREAMING_SNAKE_CASE', example: 'MY_VARIABLE_NAME' },
  { id: 'kebab',          label: 'kebab-case',           example: 'my-variable-name' },
  { id: 'screamingKebab', label: 'SCREAMING-KEBAB-CASE', example: 'MY-VARIABLE-NAME' },
  { id: 'dot',            label: 'dot.case',             example: 'my.variable.name' },
  { id: 'path',           label: 'path/case',            example: 'my/variable/name' },
  { id: 'title',          label: 'Title Case',           example: 'My Variable Name' },
  { id: 'sentence',       label: 'Sentence case',        example: 'My variable name' },
  { id: 'upper',          label: 'UPPERCASE',            example: 'MY VARIABLE NAME' },
  { id: 'lower',          label: 'lowercase',            example: 'my variable name' },
  { id: 'flat',           label: 'flatcase',             example: 'myvariablename'   },
  { id: 'train',          label: 'Train-Case',           example: 'My-Variable-Name' },
];

// ─── Auto-detect ──────────────────────────────────────────────────────────────
function detectFormat(line) {
  const s = line.trim();
  if (!s) return null;
  if (/^[A-Z][A-Z0-9_]*$/.test(s) && /_/.test(s))                        return 'screamingSnake';
  if (/^[A-Z][A-Z0-9-]*$/.test(s) && /-/.test(s))                        return 'screamingKebab';
  if (/^[a-z][a-z0-9_]*$/.test(s) && /_/.test(s))                        return 'snake';
  if (/^[a-z][a-z0-9-]*$/.test(s) && /-/.test(s))                        return 'kebab';
  if (/^[a-z][a-z0-9.]*$/.test(s) && /\./.test(s))                       return 'dot';
  if (/^[a-z][a-z0-9/]*$/.test(s) && /\//.test(s))                       return 'path';
  if (/^([A-Z][a-z0-9]*)(-[A-Z][a-z0-9]*)+$/.test(s))                   return 'train';
  if (/^[A-Z][a-z0-9]+([A-Z][a-z0-9]+)+$/.test(s))                      return 'pascal';
  if (/^[a-z][a-z0-9]*([A-Z][a-z0-9]+)+$/.test(s))                      return 'camel';
  if (/^([A-Z][a-z]+ )+[A-Z][a-z]+$/.test(s))                           return 'title';
  if (/^[A-Z][a-z]/.test(s) && /\s/.test(s))                             return 'sentence';
  if (/^[A-Z ]+$/.test(s) && !/[_\-\/.]/.test(s) && /\s/.test(s))       return 'upper';
  if (/^[a-z ]+$/.test(s) && !/[_\-\/.]/.test(s) && /\s/.test(s))       return 'lower';
  if (/^[a-z]+$/.test(s))                                                 return 'flat';
  return null;
}

// ─── Single-line conversion ───────────────────────────────────────────────────
function convertLine(line) {
  const words = tokenize(line);
  const out = {};
  for (const { id } of formats) {
    out[id] = words.length ? converters[id](words) : '';
  }
  return out;
}

// ─── Build output cards ───────────────────────────────────────────────────────
const grid = document.getElementById('output-grid');
for (const fmt of formats) {
  const card = document.createElement('div');
  card.className = 'output-card';
  card.id = `card-${fmt.id}`;
  card.innerHTML = `
    <div class="output-card-header">
      <span class="format-label" ti="label_fmt_label">${fmt.label}</span>
      <div class="card-actions">
        <button class="swap-btn" data-id="${fmt.id}" title="Use as input" ti="btn_use">↑ Use</button>
        <button class="copy-btn" data-id="${fmt.id}" title="Copy to clipboard" ti="btn_copy">Copy</button>
      </div>
    </div>
    <div class="output-value placeholder" id="val-${fmt.id}">${fmt.example}</div>
  `;
  grid.appendChild(card);
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const inputEl = document.getElementById('input-text');
const badge   = document.getElementById('detected-badge');
const wcEl    = document.getElementById('word-count');

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  const raw = inputEl.value;
  const lines = raw.split('\n');
  const nonEmpty = lines.filter(l => l.trim());

  // Word count
  const totalWords = nonEmpty.flatMap(l => tokenize(l)).length;
  wcEl.textContent = totalWords ? `${totalWords} word${totalWords !== 1 ? 's' : ''}` : '';

  // Auto-detect (first non-empty line)
  const detected = nonEmpty.length ? detectFormat(nonEmpty[0]) : null;
  if (detected) {
    const lbl = formats.find(f => f.id === detected)?.label || detected;
    badge.textContent=T("jtcpre_detected")+ lbl;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  // Highlight detected card
  for (const fmt of formats) {
    document.getElementById(`card-${fmt.id}`).classList.toggle('detected', fmt.id === detected);
  }

  // Render outputs
  if (!raw.trim()) {
    for (const fmt of formats) {
      const el = document.getElementById(`val-${fmt.id}`);
      el.textContent = fmt.example;
      el.className = 'output-value placeholder';
    }
    return;
  }

  const isMulti = nonEmpty.length > 1;

  for (const fmt of formats) {
    const el = document.getElementById(`val-${fmt.id}`);
    el.className = 'output-value';

    if (isMulti) {
      // Convert each line independently; preserve blank lines
      el.textContent = lines.map(line =>
        line.trim() ? convertLine(line)[fmt.id] : ''
      ).join('\n').replace(/\n+$/, '');
    } else {
      el.textContent = convertLine(nonEmpty[0])[fmt.id];
    }
  }
}

// ─── Events ───────────────────────────────────────────────────────────────────
inputEl.addEventListener('input', update);

grid.addEventListener('click', e => {
  const copyBtn = e.target.closest('.copy-btn');
  const swapBtn = e.target.closest('.swap-btn');

  if (copyBtn) {
    const el = document.getElementById(`val-${copyBtn.dataset.id}`);
    if (el.classList.contains('placeholder')) return;
    const text = el.textContent;
    const done = () => {
      copyBtn.textContent=T("jtc_copied");
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent=T("jtc_copy"); copyBtn.classList.remove('copied'); }, 1600);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }

  if (swapBtn) {
    const el = document.getElementById(`val-${swapBtn.dataset.id}`);
    if (el.classList.contains('placeholder')) return;
    inputEl.value = el.textContent;
    inputEl.focus();
    update();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

document.querySelectorAll('.sample-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.dataset.sample;
    inputEl.focus();
    update();
  });
});

document.getElementById('clear-btn').addEventListener('click', () => {
  inputEl.value = '';
  inputEl.focus();
  update();
});

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  Object.assign(ta.style, { position: 'fixed', top: 0, left: 0, opacity: 0 });
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
  cb();
}

// Initial render
update();
</script>

(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
