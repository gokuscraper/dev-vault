<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--blue:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--radius:8px;--gap:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

header{padding:20px 24px 0;max-width:1200px;width:100%;margin:0 auto}
header h1{font-size:1.5rem;font-weight:600;margin-bottom:4px}
header h1 span{color:var(--blue)}
header p{color:var(--text-dim);font-size:.875rem;margin-bottom:16px}

.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--blue)}
.search-box input::placeholder{color:var(--text-dim)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}

.categories{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.cat-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-btn:hover{border-color:var(--text-dim);color:var(--text)}
.cat-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

.stats{color:var(--text-dim);font-size:.8rem;margin-bottom:12px}
.stats span{color:var(--text)}

.main-area{display:flex;gap:16px;max-width:1200px;width:100%;margin:0 auto;padding:0 24px 24px;flex:1;min-height:0}
.grid-col{flex:1;min-width:0;overflow-y:auto;max-height:calc(100vh - 240px)}
.detail-col{width:340px;flex-shrink:0;position:sticky;top:0}

.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.char-card:hover{border-color:var(--blue);transform:translateY(-1px)}
.char-card.copied{border-color:var(--green);background:#3fb95015}
.char-card .ch{font-size:2rem;line-height:1.3;display:block}
.char-card .code{font-size:.7rem;color:var(--text-dim);font-family:monospace;display:block;margin-top:2px}
.char-card .name{font-size:.65rem;color:var(--text-dim);display:block;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:sticky;top:16px}
.detail-panel .big-char{font-size:5rem;text-align:center;line-height:1.2;margin-bottom:8px;display:block}
.detail-panel h3{font-size:1rem;text-align:center;margin-bottom:4px}
.detail-panel .cat-label{text-align:center;color:var(--text-dim);font-size:.8rem;margin-bottom:16px;display:block}
.detail-panel table{width:100%;font-size:.85rem;border-collapse:collapse}
.detail-panel td{padding:6px 0;border-bottom:1px solid var(--border)}
.detail-panel td:first-child{color:var(--text-dim);width:100px}
.detail-panel td:last-child{font-family:monospace;word-break:break-all}
.detail-panel .copy-row{cursor:pointer;border-radius:4px;transition:background .15s}
.detail-panel .copy-row:hover{background:var(--border)}
.detail-panel .copy-btn{display:block;margin:16px auto 0;padding:8px 24px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9rem;font-weight:500;transition:opacity .15s}
.detail-panel .copy-btn:hover{opacity:.85}
.detail-panel .empty{color:var(--text-dim);text-align:center;padding:40px 0;font-size:.9rem}

.history-section{margin-top:16px}
.history-section h4{font-size:.8rem;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.history-list{display:flex;flex-wrap:wrap;gap:6px}
.history-item{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:1.2rem;cursor:pointer;transition:border-color .15s}
.history-item:hover{border-color:var(--blue)}
.clear-hist{font-size:.7rem;color:var(--text-dim);cursor:pointer;margin-left:auto}
.clear-hist:hover{color:var(--text)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:8px 20px;border-radius:var(--radius);font-size:.875rem;font-weight:500;opacity:0;transition:all .3s ease;pointer-events:none;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

footer{text-align:center;padding:16px;color:var(--text-dim);font-size:.8rem;border-top:1px solid var(--border);margin-top:auto}

@media(max-width:768px){
  .main-area{flex-direction:column}
  .detail-col{width:100%;order:-1}
  .grid-col{max-height:none}
  .char-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
  header{padding:16px 16px 0}
  .main-area{padding:0 16px 16px}
}
</style>
</head>

{char:"\u2709",code:"U+2709",name:"Envelope",category:"Symbols",keywords:["envelope","mail","email","letter"]},
{char:"\u270D",code:"U+270D",name:"Writing Hand",category:"Symbols",keywords:["write","hand","pen","edit"]},
{char:"\u270E",code:"U+270E",name:"Lower Right Pencil",category:"Symbols",keywords:["pencil","write","edit"]},
{char:"\u270F",code:"U+270F",name:"Pencil",category:"Symbols",keywords:["pencil","write","edit","draw"]},
{char:"\u2710",code:"U+2710",name:"Upper Right Pencil",category:"Symbols",keywords:["pencil","write","edit"]},

// Additional Currency
{char:"\u20BC",code:"U+20BC",name:"Manat Sign",category:"Currency",keywords:["manat","azn","money","azerbaijan"]},
{char:"\u20BE",code:"U+20BE",name:"Lari Sign",category:"Currency",keywords:["lari","gel","money","georgia"]},

// Additional Emoji
{char:"\u{1F4E6}",code:"U+1F4E6",name:"Package",category:"Emoji",keywords:["package","box","delivery","npm"]},
{char:"\u{1F6A7}",code:"U+1F6A7",name:"Construction",category:"Emoji",keywords:["construction","wip","building","work in progress"]},
{char:"\u{1F504}",code:"U+1F504",name:"Counterclockwise Arrows Button",category:"Emoji",keywords:["refresh","reload","sync","arrows"]},
{char:"\u{1F50E}",code:"U+1F50E",name:"Magnifying Glass Right",category:"Emoji",keywords:["search","find","magnify","right"]},
];

const CATEGORIES=["Emoji","Math","Arrows","Currency","Box Drawing","Greek","Latin","Symbols","Technical","Dingbats"];
let activeCategory=null;
let selectedChar=null;
let history=JSON.parse(localStorage.getItem("unicode-history")||"[]");

const searchInput=document.getElementById("searchInput");
const charGrid=document.getElementById("charGrid");
const detailPanel=document.getElementById("detailPanel");
const categoriesEl=document.getElementById("categories");
const statsEl=document.getElementById("stats");
const toastEl=document.getElementById("toast");
const historySection=document.getElementById("historySection");
const historyList=document.getElementById("historyList");
const clearHist=document.getElementById("clearHist");

// Init categories
CATEGORIES.forEach(cat=>{
  const btn=document.createElement("button");
  btn.className="cat-btn";
  btn.textContent=cat;
  btn.onclick=()=>{
    if(activeCategory===cat){activeCategory=null;btn.classList.remove("active")}
    else{document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));activeCategory=cat;btn.classList.add("active")}
    render();
  };
  categoriesEl.appendChild(btn);
});

function getFiltered(){
  const q=searchInput.value.trim().toLowerCase();
  let items=CHARS;
  if(activeCategory)items=items.filter(c=>c.category===activeCategory);
  if(q){
    const isHex=q.startsWith("u+");
    items=items.filter(c=>{
      if(isHex)return c.code.toLowerCase().includes(q);
      return c.name.toLowerCase().includes(q)||c.keywords.some(k=>k.includes(q))||c.code.toLowerCase().includes(q)||c.char===q;
    });
  }
  return items;
}

function render(){
  const items=getFiltered();
  statsEl.innerHTML=`Showing <span>${items.length}</span> of <span>${CHARS.length}</span> characters`;
  charGrid.innerHTML="";
  items.forEach(c=>{
    const card=document.createElement("div");
    card.className="char-card";
    card.innerHTML=`<span class="ch">${escapeHTML(c.char)}</span><span class="code">${c.code}</span><span class="name">${escapeHTML(c.name)}</span>`;
    card.onclick=()=>{
      copyChar(c,card);
      showDetail(c);
    };
    charGrid.appendChild(card);
  });
}

function escapeHTML(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function copyChar(c,card){
  navigator.clipboard.writeText(c.char).then(()=>{
    showToast("Copied "+c.char+" ("+c.code+")");
    if(card){card.classList.add("copied");setTimeout(()=>card.classList.remove("copied"),600)}
    addHistory(c);
  }).catch(()=>{});
}

function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>toastEl.classList.remove("show"),1500);
}

function codePointNum(c){return c.char.codePointAt(0)}

function toUTF8Bytes(c){
  const cp=codePointNum(c);
  const bytes=[];
  if(cp<=0x7F)bytes.push(cp);
  else if(cp<=0x7FF){bytes.push(0xC0|(cp>>6));bytes.push(0x80|(cp&0x3F))}
  else if(cp<=0xFFFF){bytes.push(0xE0|(cp>>12));bytes.push(0x80|((cp>>6)&0x3F));bytes.push(0x80|(cp&0x3F))}
  else{bytes.push(0xF0|(cp>>18));bytes.push(0x80|((cp>>12)&0x3F));bytes.push(0x80|((cp>>6)&0x3F));bytes.push(0x80|(cp&0x3F))}
  return bytes.map(b=>"0x"+b.toString(16).toUpperCase().padStart(2,"0")).join(" ");
}

function toHTMLEntity(c){
  const cp=codePointNum(c);
  return "&#"+cp+";";
}

function toCSSEscape(c){
  const cp=codePointNum(c);
  return "\\"+cp.toString(16).toUpperCase();
}

function toJSEscape(c){
  const cp=codePointNum(c);
  if(cp<=0xFFFF)return "\\u"+cp.toString(16).toUpperCase().padStart(4,"0");
  return "\\u{"+cp.toString(16).toUpperCase()+"}";
}

function showDetail(c){
  selectedChar=c;
  const cp=codePointNum(c);
  const rows=[
    ["Code Point",c.code],
    ["Decimal",cp.toString()],
    ["UTF-8",toUTF8Bytes(c)],
    ["HTML Entity",toHTMLEntity(c)],
    ["CSS",toCSSEscape(c)],
    ["JavaScript",toJSEscape(c)],
    ["Category",c.category],
    ["Keywords",c.keywords.join(", ")]
  ];
  detailPanel.innerHTML=`
    <span class="big-char">${escapeHTML(c.char)}</span>
    <h3 ti="h3_escapehtml_c_name">${escapeHTML(c.name)}</h3>
    <span class="cat-label" ti="label_c_category">${c.category}</span>
    <table>${rows.map(([k,v])=>`<tr class="copy-row" title="Click to copy" data-val="${escapeHTML(v)}"><td>${k}</td><td>${escapeHTML(v)}</td></tr>`).join("")}</table>
    <button class="copy-btn" id="copyBtn" ti="btn_copy_character">Copy Character</button>
  `;
  document.getElementById("copyBtn").onclick=()=>copyChar(c,null);
  detailPanel.querySelectorAll(".copy-row").forEach(row=>{
    row.onclick=()=>{
      navigator.clipboard.writeText(row.dataset.val).then(()=>showToast("Copied: "+row.dataset.val));
    };
  });
}

function addHistory(c){
  history=history.filter(h=>h.code!==c.code);
  history.unshift({char:c.char,code:c.code,name:c.name,category:c.category,keywords:c.keywords});
  if(history.length>20)history=history.slice(0,20);
  localStorage.setItem("unicode-history",JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  if(history.length===0){historySection.style.display="none";return}
  historySection.style.display="block";
  historyList.innerHTML="";
  history.forEach(h=>{
    const item=document.createElement("div");
    item.className="history-item";
    item.textContent=h.char;
    item.title=h.name+" ("+h.code+")";
    item.onclick=()=>{
      const full=CHARS.find(c=>c.code===h.code)||h;
      copyChar(full,null);
      showDetail(full);
    };
    historyList.appendChild(item);
  });
}

clearHist.onclick=()=>{
  history=[];
  localStorage.removeItem("unicode-history");
  renderHistory();
};

// URL param support
const params=new URLSearchParams(window.location.search);
if(params.get("q")){searchInput.value=params.get("q")}

searchInput.addEventListener("input",()=>{
  const url=new URL(window.location);
  if(searchInput.value)url.searchParams.set("q",searchInput.value);
  else url.searchParams.delete("q");
  window.history.replaceState(null,"",url);
  render();
});

render();
renderHistory();
</script>
