<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:'Fira Code',monospace}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
textarea{min-height:80px;resize:vertical}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
.col-method{max-width:120px}
.kv-item{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.kv-item input{flex:1}
.kv-item .remove{color:#666;cursor:pointer;font-size:0.8rem;padding:4px 8px}
.kv-item .remove:hover{color:#f85149}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:60px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6;word-break:break-all}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>cURL Command Builder</h1>
<p class="sub">Build curl commands visually — method, headers, body, auth</p>

<div class="presets">
<div class="preset" onclick="loadPreset('get')">GET JSON</div>
<div class="preset" onclick="loadPreset('post')">POST JSON</div>
<div class="preset" onclick="loadPreset('upload')">File Upload</div>
<div class="preset" onclick="loadPreset('bearer')">Bearer Auth</div>
<div class="preset" onclick="loadPreset('graphql')">GraphQL</div>
</div>

<div class="section">
<h3>Request</h3>
<div class="row">
<div class="col col-method"><label>Method</label><select id="method" onchange="gen()">
<option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option><option>HEAD</option><option>OPTIONS</option>
</select></div>
<div class="col"><label>URL</label><input id="url" value="https://api.example.com/users" oninput="gen()"></div>
</div>
</div>

<div class="section">
<h3>Headers</h3>
<div id="headers"></div>
<button class="add-btn" onclick="addHeader()">+ Add Header</button>
</div>

<div class="section">
<h3>Query Parameters</h3>
<div id="params"></div>
<button class="add-btn" onclick="addParam()">+ Add Parameter</button>
</div>

<div class="section">
<h3>Body</h3>
<div class="row" style="margin-bottom:8px">
<div class="col"><label>Content Type</label><select id="bodyType" onchange="gen()">
<option value="none">None</option>
<option value="json">JSON</option>
<option value="form">Form Data</option>
<option value="raw">Raw</option>
</select></div>
</div>
<textarea id="body" oninput="gen()" placeholder='{"key": "value"}' style="display:none"></textarea>
</div>

<div class="section">
<h3>Auth</h3>
<div class="row">
<div class="col"><label>Type</label><select id="authType" onchange="toggleAuth();gen()">
<option value="none">None</option>
<option value="bearer">Bearer Token</option>
<option value="basic">Basic Auth</option>
</select></div>
<div class="col" id="authVal" style="display:none"><label>Token / user:pass</label><input id="authInput" oninput="gen()" placeholder="token or user:password"></div>
</div>
</div>

<div class="section">
<h3>Options</h3>
<div class="check-row"><input type="checkbox" id="optVerbose" onchange="gen()"><label for="optVerbose">Verbose (-v)</label></div>
<div class="check-row"><input type="checkbox" id="optInsecure" onchange="gen()"><label for="optInsecure">Insecure (-k)</label></div>
<div class="check-row"><input type="checkbox" id="optFollow" checked onchange="gen()"><label for="optFollow">Follow redirects (-L)</label></div>
<div class="check-row"><input type="checkbox" id="optSilent" onchange="gen()"><label for="optSilent">Silent (-s)</label></div>
<div class="check-row"><input type="checkbox" id="optCompressed" onchange="gen()"><label for="optCompressed">Compressed (--compressed)</label></div>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/api-tester/">API Tester</a> | <a href="https://gokuscraper.github.io/dev-vault/json-formatter/">JSON Formatter</a> | <a href="https://gokuscraper.github.io/dev-vault/jwt-decode/">JWT Decode</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
let headers=[{k:'Content-Type',v:'application/json'}];
let params=[];

function renderKV(arr,containerId,addFn){
  const c=document.getElementById(containerId);c.innerHTML='';
  arr.forEach((item,i)=>{
    const d=document.createElement('div');d.className='kv-item';
    d.innerHTML=`<input placeholder="Key" value="${esc(item.k)}" oninput="${containerId==='headers'?'headers':'params'}[${i}].k=this.value;gen()">
    <input placeholder="Value" value="${esc(item.v)}" oninput="${containerId==='headers'?'headers':'params'}[${i}].v=this.value;gen()">
    <span class="remove" onclick="remove${containerId==='headers'?'Header':'Param'}(${i})">✕</span>`;
    c.appendChild(d);
  });
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function addHeader(){headers.push({k:'',v:''});renderKV(headers,'headers');gen()}
function removeHeader(i){headers.splice(i,1);renderKV(headers,'headers');gen()}
function addParam(){params.push({k:'',v:''});renderKV(params,'params');gen()}
function removeParam(i){params.splice(i,1);renderKV(params,'params');gen()}

function toggleAuth(){
  const t=document.getElementById('authType').value;
  document.getElementById('authVal').style.display=t==='none'?'none':'block';
}

function shellEscape(s){
  if(!s)return "''";
  if(!/[^a-zA-Z0-9@%_+=:,./-]/.test(s))return s;
  return "'"+s.replace(/'/g,"'\\''")+"'";
}

function gen(){
  const method=document.getElementById('method').value;
  const url=document.getElementById('url').value;
  const bodyType=document.getElementById('bodyType').value;
  const bodyEl=document.getElementById('body');
  const authType=document.getElementById('authType').value;
  const authInput=document.getElementById('authInput').value;

  bodyEl.style.display=(bodyType!=='none')?'block':'none';

  const parts=['curl'];

  // Options
  if(document.getElementById('optVerbose').checked) parts.push('-v');
  if(document.getElementById('optInsecure').checked) parts.push('-k');
  if(document.getElementById('optFollow').checked) parts.push('-L');
  if(document.getElementById('optSilent').checked) parts.push('-s');
  if(document.getElementById('optCompressed').checked) parts.push('--compressed');

  // Method
  if(method!=='GET') parts.push('-X '+method);

  // Headers
  headers.forEach(h=>{
    if(h.k.trim()) parts.push("-H "+shellEscape(h.k+': '+h.v));
  });

  // Auth
  if(authType==='bearer'&&authInput){
    parts.push("-H "+shellEscape('Authorization: Bearer '+authInput));
  } else if(authType==='basic'&&authInput){
    parts.push('-u '+shellEscape(authInput));
  }

  // Body
  if(bodyType==='json'&&bodyEl.value.trim()){
    parts.push("-d "+shellEscape(bodyEl.value.trim()));
  } else if(bodyType==='form'&&bodyEl.value.trim()){
    bodyEl.value.trim().split('\n').forEach(line=>{
      const eq=line.indexOf('=');
      if(eq>0) parts.push("--data-urlencode "+shellEscape(line.trim()));
    });
  } else if(bodyType==='raw'&&bodyEl.value.trim()){
    parts.push("-d "+shellEscape(bodyEl.value.trim()));
  }

  // URL with query params
  let fullUrl=url;
  const validParams=params.filter(p=>p.k.trim());
  if(validParams.length){
    const qs=validParams.map(p=>encodeURIComponent(p.k)+'='+encodeURIComponent(p.v)).join('&');
    fullUrl+=(url.includes('?')?'&':'?')+qs;
  }
  parts.push(shellEscape(fullUrl));

  // Format: backslash-continue if long
  const cmd=parts.join(' ');
  if(cmd.length>80){
    document.getElementById('out').textContent=parts[0]+' \\\n  '+parts.slice(1).join(' \\\n  ');
  } else {
    document.getElementById('out').textContent=cmd;
  }
}

function loadPreset(name){
  headers=[];params=[];
  document.getElementById('authType').value='none';
  document.getElementById('authInput').value='';
  document.getElementById('bodyType').value='none';
  document.getElementById('body').value='';
  document.getElementById('optVerbose').checked=false;
  document.getElementById('optInsecure').checked=false;
  document.getElementById('optFollow').checked=true;
  document.getElementById('optSilent').checked=false;
  document.getElementById('optCompressed').checked=false;

  if(name==='get'){
    document.getElementById('method').value='GET';
    document.getElementById('url').value='https://api.example.com/users';
    headers=[{k:'Accept',v:'application/json'}];
    params=[{k:'page',v:'1'},{k:'limit',v:'20'}];
  } else if(name==='post'){
    document.getElementById('method').value='POST';
    document.getElementById('url').value='https://api.example.com/users';
    headers=[{k:'Content-Type',v:'application/json'}];
    document.getElementById('bodyType').value='json';
    document.getElementById('body').value='{\n  "name": "Alice",\n  "email": "alice@example.com"\n}';
  } else if(name==='upload'){
    document.getElementById('method').value='POST';
    document.getElementById('url').value='https://api.example.com/upload';
    headers=[{k:'Content-Type',v:'multipart/form-data'}];
    document.getElementById('bodyType').value='raw';
    document.getElementById('body').value='@/path/to/file.png';
  } else if(name==='bearer'){
    document.getElementById('method').value='GET';
    document.getElementById('url').value='https://api.example.com/me';
    headers=[{k:'Accept',v:'application/json'}];
    document.getElementById('authType').value='bearer';
    document.getElementById('authInput').value='your-token-here';
  } else if(name==='graphql'){
    document.getElementById('method').value='POST';
    document.getElementById('url').value='https://api.example.com/graphql';
    headers=[{k:'Content-Type',v:'application/json'}];
    document.getElementById('bodyType').value='json';
    document.getElementById('body').value='{\n  "query": "{ users { id name email } }"\n}';
  }

  toggleAuth();
  renderKV(headers,'headers');
  renderKV(params,'params');
  gen();
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

renderKV(headers,'headers');
renderKV(params,'params');
toggleAuth();
gen();
</script>
</body>
</html>
