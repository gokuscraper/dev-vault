<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
let headers=[{k:'Content-Type',v:'application/json'}];
let params=[];

function renderKV(arr,containerId,addFn){
  const c=document.getElementById(containerId);c.innerHTML='';
  arr.forEach((item,i)=>{
    const d=document.createElement('div');d.className='kv-item';
    d.innerHTML=`<input tp="placeholder_key" placeholder="Key" value="${esc(item.k)}" oninput="${containerId==='headers'?'headers':'params'}[${i}].k=this.value;gen()">
    <input tp="placeholder_value" placeholder="Value" value="${esc(item.v)}" oninput="${containerId==='headers'?'headers':'params'}[${i}].v=this.value;gen()">
    <span class="remove" onclick="remove${containerId==='headers'?'Header':'Param'}(${i})">✕</span>`;
    c.appendChild(d);
  });
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function addHeader(){headers.push({k:'',v:''});renderKV(headers,'headers');gen()}
function removeHeader(i){headers.splice(i,1);renderKV(headers,'headers');gen()}
function addParam(){params.push({k:'',v:''});renderKV(params,'params');gen()}
function removeParam(i){params.splice(i,1);renderKV(params,'params');gen()}

function toggleAuth(){
  const t=document.getElementById('authType').value;
  document.getElementById('authVal').style.display=t==='none'?'none':'block';
}

function shellEscape(s){
  if(!s)return "''";
  if(!/[^a-zA-Z0-9@%_+=:,./-]/.test(s))return s;
  return "'"+s.replace(/'/g,"'\\''")+"'";
}

function gen(){
  const method=document.getElementById('method').value;
  const url=document.getElementById('url').value;
  const bodyType=document.getElementById('bodyType').value;
  const bodyEl=document.getElementById('body');
  const authType=document.getElementById('authType').value;
  const authInput=document.getElementById('authInput').value;

  bodyEl.style.display=(bodyType!=='none')?'block':'none';

  const parts=['curl'];

  // Options
  if(document.getElementById('optVerbose').checked) parts.push('-v');
  if(document.getElementById('optInsecure').checked) parts.push('-k');
  if(document.getElementById('optFollow').checked) parts.push('-L');
  if(document.getElementById('optSilent').checked) parts.push('-s');
  if(document.getElementById('optCompressed').checked) parts.push('--compressed');

  // Method
  if(method!=='GET') parts.push('-X '+method);

  // Headers
  headers.forEach(h=>{
    if(h.k.trim()) parts.push("-H "+shellEscape(h.k+': '+h.v));
  });

  // Auth
  if(authType==='bearer'&&authInput){
    parts.push("-H "+shellEscape('Authorization: Bearer '+authInput));
  } else if(authType==='basic'&&authInput){
    parts.push('-u '+shellEscape(authInput));
  }

  // Body
  if(bodyType==='json'&&bodyEl.value.trim()){
    parts.push("-d "+shellEscape(bodyEl.value.trim()));
  } else if(bodyType==='form'&&bodyEl.value.trim()){
    bodyEl.value.trim().split('\n').forEach(line=>{
      const eq=line.indexOf('=');
      if(eq>0) parts.push("--data-urlencode "+shellEscape(line.trim()));
    });
  } else if(bodyType==='raw'&&bodyEl.value.trim()){
    parts.push("-d "+shellEscape(bodyEl.value.trim()));
  }

  // URL with query params
  let fullUrl=url;
  const validParams=params.filter(p=>p.k.trim());
  if(validParams.length){
    const qs=validParams.map(p=>encodeURIComponent(p.k)+'='+encodeURIComponent(p.v)).join('&');
    fullUrl+=(url.includes('?')?'&':'?')+qs;
  }
  parts.push(shellEscape(fullUrl));

  // Format: backslash-continue if long
  const cmd=parts.join(' ');
  if(cmd.length>80){
    document.getElementById('out').textContent=parts[0]+' \\\n  '+parts.slice(1).join(' \\\n  ');
  } else {
    document.getElementById('out').textContent=cmd;
  }
}

function loadPreset(name){
  headers=[];params=[];
  document.getElementById('authType').value='none';
  document.getElementById('authInput').value='';
  document.getElementById('bodyType').value='none';
  document.getElementById('body').value='';
  document.getElementById('optVerbose').checked=false;
  document.getElementById('optInsecure').checked=false;
  document.getElementById('optFollow').checked=true;
  document.getElementById('optSilent').checked=false;
  document.getElementById('optCompressed').checked=false;

  if(name==='get'){
    document.getElementById('method').value='GET';
    document.getElementById('url').value='https://api.example.com/users';
    headers=[{k:'Accept',v:'application/json'}];
    params=[{k:'page',v:'1'},{k:'limit',v:'20'}];
  } else if(name==='post'){
    document.getElementById('method').value='POST';
    document.getElementById('url').value='https://api.example.com/users';
    headers=[{k:'Content-Type',v:'application/json'}];
    document.getElementById('bodyType').value='json';
    document.getElementById('body').value='{\n  "name": "Alice",\n  "email": "alice@example.com"\n}';
  } else if(name==='upload'){
    document.getElementById('method').value='POST';
    document.getElementById('url').value='https://api.example.com/upload';
    headers=[{k:'Content-Type',v:'multipart/form-data'}];
    document.getElementById('bodyType').value='raw';
    document.getElementById('body').value='@/path/to/file.png';
  } else if(name==='bearer'){
    document.getElementById('method').value='GET';
    document.getElementById('url').value='https://api.example.com/me';
    headers=[{k:'Accept',v:'application/json'}];
    document.getElementById('authType').value='bearer';
    document.getElementById('authInput').value='your-token-here';
  } else if(name==='graphql'){
    document.getElementById('method').value='POST';
    document.getElementById('url').value='https://api.example.com/graphql';
    headers=[{k:'Content-Type',v:'application/json'}];
    document.getElementById('bodyType').value='json';
    document.getElementById('body').value='{\n  "query": "{ users { id name email } }"\n}';
  }

  toggleAuth();
  renderKV(headers,'headers');
  renderKV(params,'params');
  gen();
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

renderKV(headers,'headers');
renderKV(params,'params');
toggleAuth();
gen();
</script>
