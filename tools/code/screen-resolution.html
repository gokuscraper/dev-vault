<script>
const breakpoints = [
  {name:'xs', min:0, max:575, label:'<576px'},
  {name:'sm', min:576, max:767, label:'≥576px'},
  {name:'md', min:768, max:991, label:'≥768px'},
  {name:'lg', min:992, max:1199, label:'≥992px'},
  {name:'xl', min:1200, max:1399, label:'≥1200px'},
  {name:'xxl', min:1400, max:Infinity, label:'≥1400px'}
];

const devices = [
  {name:'iPhone SE', w:375, h:667, dpr:2},
  {name:'iPhone 15 Pro', w:393, h:852, dpr:3},
  {name:'iPad Air', w:820, h:1180, dpr:2},
  {name:'MacBook Air 13"', w:1470, h:956, dpr:2},
  {name:'1080p Monitor', w:1920, h:1080, dpr:1},
  {name:'1440p Monitor', w:2560, h:1440, dpr:1},
  {name:'4K Monitor', w:3840, h:2160, dpr:1}
];

const snippets = [
  {lang:'JavaScript', code:`// Screen resolution
screen.width + ' × ' + screen.height

// Viewport size
window.innerWidth + ' × ' + window.innerHeight

// Device pixel ratio
window.devicePixelRatio

// Orientation
screen.orientation?.type // e.g. "landscape-primary"

// Touch support
navigator.maxTouchPoints > 0`},
  {lang:'CSS', code:`/* Breakpoint media queries */
@media (min-width: 576px) { /* sm */ }
@media (min-width: 768px) { /* md */ }
@media (min-width: 992px) { /* lg */ }
@media (min-width: 1200px) { /* xl */ }
@media (min-width: 1400px) { /* xxl */ }

/* High-DPI screens */
@media (min-resolution: 2dppx) { /* retina */ }

/* Orientation */
@media (orientation: portrait) { }`}
];

function getOrientation() {
  if (screen.orientation) return screen.orientation.type.replace('-',' ') + ' (' + screen.orientation.angle + '°)';
  return window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
}

function getData() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  return [
    {label:'Screen Resolution', value:`${screen.width} × ${screen.height}`, detail:'CSS pixels'},
    {label:'Viewport Size', value:`${vw} × ${vh}`, detail:'Inner window'},
    {label:'Available Screen', value:`${screen.availWidth} × ${screen.availHeight}`, detail:'Minus taskbar'},
    {label:'Device Pixel Ratio', value:`${dpr}x`, detail:dpr>1?'High-DPI / Retina':'Standard'},
    {label:'Physical Pixels', value:`${Math.round(vw*dpr)} × ${Math.round(vh*dpr)}`, detail:'Viewport × DPR'},
    {label:'Color Depth', value:`${screen.colorDepth}-bit`, detail:`${Math.pow(2,screen.colorDepth).toLocaleString()} colors`},
    {label:'Orientation', value:getOrientation(), detail:''},
    {label:'Touch Points', value:navigator.maxTouchPoints||0, detail:navigator.maxTouchPoints>0?'Touch supported':'No touch'}
  ];
}

function renderCards() {
  const d = getData();
  document.getElementById('cards').innerHTML = d.map(c =>
    `<div class="card"><div class="label">${c.label}</div><div class="value">${c.value}</div>${c.detail?`<div class="detail">${c.detail}</div>`:''}</div>`
  ).join('');
}

function renderBreakpoints() {
  const w = window.innerWidth;
  document.getElementById('bps').innerHTML = breakpoints.map(b => {
    const active = w >= b.min && w <= b.max;
    return `<div class="bp${active?' active':''}"><div class="name">${b.name}</div><div class="range">${b.label}</div></div>`;
  }).join('');
}

function renderComparison() {
  const vw = window.innerWidth, vh = window.innerHeight, dpr = window.devicePixelRatio||1;
  const rows = [{name:'Your Device', w:vw, h:vh, dpr, you:true}, ...devices];
  rows.sort((a,b) => (a.w*a.h) - (b.w*b.h));
  document.getElementById('compare').innerHTML =
    '<tr><th ti="th_device" ti="th_device">Device</th><th ti="th_viewport" ti="th_viewport">Viewport</th><th ti="th_dpr" ti="th_dpr">DPR</th><th ti="th_physical" ti="th_physical">Physical</th></tr>' +
    rows.map(r =>
      `<tr class="${r.you?'you':''}"><td>${r.name}</td><td>${r.w} × ${r.h}</td><td>${r.dpr}x</td><td>${r.w*r.dpr} × ${r.h*r.dpr}</td></tr>`
    ).join('');
}

function renderSnippets() {
  document.getElementById('snippets').innerHTML = snippets.map(s =>
    `<div class="snippet"><span class="lang">${s.lang}</span><code>${s.code}</code></div>`
  ).join('');
}

function update() { renderCards(); renderBreakpoints(); renderComparison(); }

function copyAll() {
  const d = getData();
  const txt = d.map(c => `${c.label}: ${c.value}${c.detail?' ('+c.detail+')':''}`).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.getElementById('copyBtn');
    b.textContent=T("jtc_copied"); b.classList.add('copied');
    setTimeout(() => { b.textContent=T("jtc_copy_all_info"); b.classList.remove('copied'); }, 1500);
  });
}

update();
renderSnippets();
window.addEventListener('resize', update);
if (screen.orientation) screen.orientation.addEventListener('change', update);
</script>
