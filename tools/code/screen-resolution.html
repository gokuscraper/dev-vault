<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Resolution — Device & Viewport Info</title>
<meta name="description" content="Live display of screen resolution, viewport size, device pixel ratio, orientation, and media query breakpoints. No dependencies.">
<link rel="canonical" href="https://yurukusa.github.io/screen-resolution/">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Screen Resolution Info","url":"https://yurukusa.github.io/screen-resolution/","description":"Display device screen and viewport information with live resize monitoring.","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;padding:20px;max-width:900px;margin:0 auto}
h1{color:#4da6ff;font-size:1.4rem;margin-bottom:4px}
.sub{color:#888;font-size:.85rem;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:8px;padding:14px}
.card .label{color:#888;font-size:.75rem;text-transform:uppercase;margin-bottom:4px}
.card .value{color:#4da6ff;font-size:1.3rem;font-weight:700}
.card .detail{color:#666;font-size:.75rem;margin-top:2px}
.section{margin-bottom:24px}
.section h2{color:#ccc;font-size:1rem;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:6px}
.bp-row{display:flex;gap:8px;flex-wrap:wrap}
.bp{background:#161616;border:1px solid #222;border-radius:6px;padding:8px 12px;font-size:.8rem;opacity:.4;transition:all .2s}
.bp.active{opacity:1;border-color:#4da6ff;background:#1a2a3a}
.bp .name{color:#4da6ff;font-weight:700}
.bp .range{color:#888;font-size:.7rem}
.compare{width:100%;border-collapse:collapse;font-size:.8rem}
.compare th{text-align:left;color:#888;padding:6px 10px;border-bottom:1px solid #222;font-weight:400}
.compare td{padding:6px 10px;border-bottom:1px solid #1a1a1a}
.compare tr.you{background:#1a2a3a;color:#4da6ff}
.compare tr.you td{font-weight:700}
.snippet{background:#161616;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.snippet code{color:#8cc;font-size:.78rem;white-space:pre-wrap}
.snippet .lang{position:absolute;top:6px;right:10px;color:#555;font-size:.65rem}
.btn{background:#4da6ff;color:#000;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-weight:700;font-size:.85rem;margin-bottom:20px}
.btn:hover{background:#6bb8ff}
.btn:active{transform:scale(.97)}
.copied{background:#2a6;color:#fff}
footer{text-align:center;color:#555;font-size:.75rem;margin-top:30px;padding-top:16px;border-top:1px solid #1a1a1a}
footer a{color:#4da6ff;text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<h1>Screen Resolution — Device & Viewport Info</h1>
<p class="sub">Live-updating display information. Resize your browser to see changes.</p>
<button class="btn" id="copyBtn" onclick="copyAll()">Copy All Info</button>

<div class="section">
<h2>Device Info</h2>
<div class="grid" id="cards"></div>
</div>

<div class="section">
<h2>CSS Breakpoints</h2>
<div class="bp-row" id="bps"></div>
</div>

<div class="section">
<h2>Device Comparison</h2>
<table class="compare" id="compare"></table>
</div>

<div class="section">
<h2>Code Snippets</h2>
<div id="snippets"></div>
</div>

<footer>
<a href="https://yurukusa.github.io/dev-toolkit/">dev-toolkit</a> ·
<a href="https://yurukusa.github.io/responsive-breakpoints/">responsive-breakpoints</a>
</footer>

<script>
const breakpoints = [
  {name:'xs', min:0, max:575, label:'<576px'},
  {name:'sm', min:576, max:767, label:'≥576px'},
  {name:'md', min:768, max:991, label:'≥768px'},
  {name:'lg', min:992, max:1199, label:'≥992px'},
  {name:'xl', min:1200, max:1399, label:'≥1200px'},
  {name:'xxl', min:1400, max:Infinity, label:'≥1400px'}
];

const devices = [
  {name:'iPhone SE', w:375, h:667, dpr:2},
  {name:'iPhone 15 Pro', w:393, h:852, dpr:3},
  {name:'iPad Air', w:820, h:1180, dpr:2},
  {name:'MacBook Air 13"', w:1470, h:956, dpr:2},
  {name:'1080p Monitor', w:1920, h:1080, dpr:1},
  {name:'1440p Monitor', w:2560, h:1440, dpr:1},
  {name:'4K Monitor', w:3840, h:2160, dpr:1}
];

const snippets = [
  {lang:'JavaScript', code:`// Screen resolution
screen.width + ' × ' + screen.height

// Viewport size
window.innerWidth + ' × ' + window.innerHeight

// Device pixel ratio
window.devicePixelRatio

// Orientation
screen.orientation?.type // e.g. "landscape-primary"

// Touch support
navigator.maxTouchPoints > 0`},
  {lang:'CSS', code:`/* Breakpoint media queries */
@media (min-width: 576px) { /* sm */ }
@media (min-width: 768px) { /* md */ }
@media (min-width: 992px) { /* lg */ }
@media (min-width: 1200px) { /* xl */ }
@media (min-width: 1400px) { /* xxl */ }

/* High-DPI screens */
@media (min-resolution: 2dppx) { /* retina */ }

/* Orientation */
@media (orientation: portrait) { }`}
];

function getOrientation() {
  if (screen.orientation) return screen.orientation.type.replace('-',' ') + ' (' + screen.orientation.angle + '°)';
  return window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
}

function getData() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  return [
    {label:'Screen Resolution', value:`${screen.width} × ${screen.height}`, detail:'CSS pixels'},
    {label:'Viewport Size', value:`${vw} × ${vh}`, detail:'Inner window'},
    {label:'Available Screen', value:`${screen.availWidth} × ${screen.availHeight}`, detail:'Minus taskbar'},
    {label:'Device Pixel Ratio', value:`${dpr}x`, detail:dpr>1?'High-DPI / Retina':'Standard'},
    {label:'Physical Pixels', value:`${Math.round(vw*dpr)} × ${Math.round(vh*dpr)}`, detail:'Viewport × DPR'},
    {label:'Color Depth', value:`${screen.colorDepth}-bit`, detail:`${Math.pow(2,screen.colorDepth).toLocaleString()} colors`},
    {label:'Orientation', value:getOrientation(), detail:''},
    {label:'Touch Points', value:navigator.maxTouchPoints||0, detail:navigator.maxTouchPoints>0?'Touch supported':'No touch'}
  ];
}

function renderCards() {
  const d = getData();
  document.getElementById('cards').innerHTML = d.map(c =>
    `<div class="card"><div class="label">${c.label}</div><div class="value">${c.value}</div>${c.detail?`<div class="detail">${c.detail}</div>`:''}</div>`
  ).join('');
}

function renderBreakpoints() {
  const w = window.innerWidth;
  document.getElementById('bps').innerHTML = breakpoints.map(b => {
    const active = w >= b.min && w <= b.max;
    return `<div class="bp${active?' active':''}"><div class="name">${b.name}</div><div class="range">${b.label}</div></div>`;
  }).join('');
}

function renderComparison() {
  const vw = window.innerWidth, vh = window.innerHeight, dpr = window.devicePixelRatio||1;
  const rows = [{name:'Your Device', w:vw, h:vh, dpr, you:true}, ...devices];
  rows.sort((a,b) => (a.w*a.h) - (b.w*b.h));
  document.getElementById('compare').innerHTML =
    '<tr><th>Device</th><th>Viewport</th><th>DPR</th><th>Physical</th></tr>' +
    rows.map(r =>
      `<tr class="${r.you?'you':''}"><td>${r.name}</td><td>${r.w} × ${r.h}</td><td>${r.dpr}x</td><td>${r.w*r.dpr} × ${r.h*r.dpr}</td></tr>`
    ).join('');
}

function renderSnippets() {
  document.getElementById('snippets').innerHTML = snippets.map(s =>
    `<div class="snippet"><span class="lang">${s.lang}</span><code>${s.code}</code></div>`
  ).join('');
}

function update() { renderCards(); renderBreakpoints(); renderComparison(); }

function copyAll() {
  const d = getData();
  const txt = d.map(c => `${c.label}: ${c.value}${c.detail?' ('+c.detail+')':''}`).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.getElementById('copyBtn');
    b.textContent = 'Copied!'; b.classList.add('copied');
    setTimeout(() => { b.textContent = 'Copy All Info'; b.classList.remove('copied'); }, 1500);
  });
}

update();
renderSnippets();
window.addEventListener('resize', update);
if (screen.orientation) screen.orientation.addEventListener('change', update);
</script>
</body>
</html>
