</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
function highlight() {
  const code = document.getElementById('codeInput').value;
  const lang = document.getElementById('langSelect').value;
  const showLineNumbers = document.getElementById('showLineNumbers').checked;
  const out = document.getElementById('highlightOutput');
  
  if (!code.trim()) { out.innerHTML = '<pre><code>Enter code above to highlight...</code></pre>'; return; }
  
  let result;
  try {
    hljs.highlightAuto(code);
    const langDetected = hljs.highlightAuto(code).language || lang;
    result = hljs.highlight(code, { language: langDetected || lang });
  } catch(e) {
    result = { value: escapeHtml(code) };
  }
  
  let html = result.value;
  
  if (showLineNumbers) {
    const lines = html.split('\n');
    const lineCount = lines.length;
    const pad = String(lineCount).length;
    html = lines.map((line, i) => {
      const num = String(i + 1).padStart(pad, ' ');
      return '<span style="user-select:none;color:#555;margin-right:1em">' + num + '</span>' + line;
    }).join('\n');
  }
  
  out.innerHTML = '<pre><code class="hljs">' + html + '</code></pre>';
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function changeTheme() {
  const theme = document.getElementById('themeSelect').value;
  document.getElementById('hljsTheme').href = 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/' + theme + '.min.css';
}

function copyHtml() {
  const html = document.getElementById('highlightOutput').innerHTML;
  if (!html || html.includes('Enter code')) return;
  
  // Wrap in proper HTML document
  const fullHtml = '<html><body>' + html + '</body></html>';
  navigator.clipboard.write([
    new ClipboardItem({
      'text/html': new Blob([fullHtml], { type: 'text/html' }),
      'text/plain': new Blob([document.getElementById('codeInput').value], { type: 'text/plain' })
    })
  ]).then(showToast).catch(() => {
    // Fallback
    navigator.clipboard.writeText(document.getElementById('codeInput').value).then(showToast);
  });
}

function copyText() {
  navigator.clipboard.writeText(document.getElementById('codeInput').value).then(showToast);
}

function showToast() {
  const t = document.createElement('div');
  t.className = 'copy-toast';
  t.textContent=T("jtc_copied");
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

// Initial highlight
document.addEventListener('DOMContentLoaded', highlight);
</script>
