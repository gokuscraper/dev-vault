<div class="container">
<h1>Cron Explain</h1>
<p class="subtitle">Paste a cron expression. Get plain English + next run times.</p>

<div class="input-section">
  <div class="cron-input">
    <input type="text" id="cronInput" value="0 9 * * 1-5" placeholder="* * * * *" autocomplete="off">
  </div>
  <div class="field-labels">
    <div class="field-label">Minute</div>
    <div class="field-label">Hour</div>
    <div class="field-label">Day</div>
    <div class="field-label">Month</div>
    <div class="field-label">Weekday</div>
  </div>
  <div class="presets">
    <button class="preset" onclick="setExpr('* * * * *')">every minute</button>
    <button class="preset" onclick="setExpr('0 * * * *')">every hour</button>
    <button class="preset" onclick="setExpr('0 0 * * *')">midnight</button>
    <button class="preset" onclick="setExpr('0 9 * * 1-5')">9am weekdays</button>
    <button class="preset" onclick="setExpr('*/5 * * * *')">every 5 min</button>
    <button class="preset" onclick="setExpr('0 0 1 * *')">monthly</button>
    <button class="preset" onclick="setExpr('0 12 * * 0')">noon Sunday</button>
    <button class="preset" onclick="setExpr('30 2 * * *')">2:30am daily</button>
    <button class="preset" onclick="setExpr('0 0 * * 0')">weekly Sun</button>
    <button class="preset" onclick="setExpr('0 0 1 1 *')">yearly Jan 1</button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const MONTHS=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT_DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

$('cronInput').addEventListener('input',()=>explain());
function setExpr(e){$('cronInput').value=e;explain()}

function parseCronField(field,min,max){
  const parts=field.split(',');
  const values=new Set();
  for(const part of parts){
    if(part==='*'){for(let i=min;i<=max;i++)values.add(i);continue}
    const stepMatch=part.match(/^(\*|(\d+)-(\d+))\/(\d+)$/);
    if(stepMatch){
      const start=stepMatch[2]?parseInt(stepMatch[2]):min;
      const end=stepMatch[3]?parseInt(stepMatch[3]):max;
      const step=parseInt(stepMatch[4]);
      for(let i=start;i<=end;i+=step)values.add(i);
      continue;
    }
    const rangeMatch=part.match(/^(\d+)-(\d+)$/);
    if(rangeMatch){
      const s=parseInt(rangeMatch[1]),e=parseInt(rangeMatch[2]);
      for(let i=s;i<=e;i++)values.add(i);
      continue;
    }
    const num=parseInt(part);
    if(!isNaN(num))values.add(num);
  }
  return[...values].sort((a,b)=>a-b);
}

function explainField(field,type){
  if(field==='*')return'every '+type;
  if(field.startsWith('*/'))return`every ${field.slice(2)} ${type}s`;
  if(field.includes(',')&&!field.includes('-'))return field.split(',').map(v=>formatVal(v,type)).join(', ');
  if(field.includes('-')&&!field.includes(',')){
    const[a,b]=field.split('-');
    return`${formatVal(a,type)} through ${formatVal(b,type)}`;
  }
  return formatVal(field,type);
}

function formatVal(v,type){
  const n=parseInt(v);
  if(type==='month'&&n>=1&&n<=12)return MONTHS[n];
  if(type==='weekday'&&n>=0&&n<=6)return DAYS[n];
  if(type==='hour')return`${n}:00`;
  return v;
}

function buildHumanReadable(parts){
  const[min,hour,dom,month,dow]=parts;
  let text='';

  // Frequency
  if(min==='*'&&hour==='*')text='Every minute';
  else if(min.startsWith('*/')&&hour==='*')text=`Every ${min.slice(2)} minutes`;
  else if(hour.startsWith('*/')&&min==='0')text=`Every ${hour.slice(2)} hours`;
  else if(min==='0'&&hour==='*')text='Every hour, on the hour';
  else{
    const h=hour==='*'?'every hour':explainField(hour,'hour');
    const m=min==='0'?'':min==='*'?'every minute':`:${min.padStart(2,'0')}`;
    if(hour!=='*'&&min!=='*'){
      // Specific time
      const hours=parseCronField(hour,0,23);
      const mins=parseCronField(min,0,59);
      if(hours.length===1&&mins.length===1){
        text=`At ${hours[0]}:${String(mins[0]).padStart(2,'0')}`;
      }else{
        text=`At minute ${min} past ${h}`;
      }
    }else{
      text=`At ${h}${m}`;
    }
  }

  // Day restrictions
  if(dow!=='*'&&dom==='*'){
    text+=` on ${explainField(dow,'weekday')}`;
  }else if(dom!=='*'&&dow==='*'){
    text+=` on day ${dom} of the month`;
  }else if(dom!=='*'&&dow!=='*'){
    text+=` on day ${dom} and on ${explainField(dow,'weekday')}`;
  }

  // Month
  if(month!=='*'){
    text+=` in ${explainField(month,'month')}`;
  }

  return text;
}

function getNextRuns(parts,count=10){
  const[minF,hourF,domF,monthF,dowF]=parts;
  const mins=parseCronField(minF,0,59);
  const hours=parseCronField(hourF,0,23);
  const doms=parseCronField(domF,1,31);
  const months=parseCronField(monthF,1,12);
  const dows=parseCronField(dowF,0,6);

  const runs=[];
  const now=new Date();
  const check=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours(),now.getMinutes()+1,0);

  // Limit search to prevent infinite loops
  const maxIter=525960; // ~1 year in minutes
  for(let i=0;i<maxIter&&runs.length<count;i++){
    const d=new Date(check.getTime()+i*60000);
    if(!months.includes(d.getMonth()+1))continue;
    if(domF!=='*'&&!doms.includes(d.getDate()))continue;
    if(dowF!=='*'&&!dows.includes(d.getDay()))continue;
    if(!hours.includes(d.getHours()))continue;
    if(!mins.includes(d.getMinutes()))continue;
    runs.push(d);
  }
  return runs;
}

function relativeTime(date){
  const diff=date-new Date();
  const mins=Math.floor(diff/60000);
  if(mins<60)return`in ${mins} min`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`in ${hrs}h ${mins%60}m`;
  const days=Math.floor(hrs/24);
  if(days<30)return`in ${days}d ${hrs%24}h`;
  return`in ${days} days`;
}

function explain(){
  const expr=$('cronInput').value.trim();
  if(!expr){$('output').style.display='none';return}

  const parts=expr.split(/\s+/);
  if(parts.length<5||parts.length>5){
    $('output').style.display='block';
    $('output').innerHTML=`<div class="error">Expected 5 fields: minute hour day month weekday</div>`;
    return;
  }

  try{
    const human=buildHumanReadable(parts);
    const runs=getNextRuns(parts);

    const fieldNames=['Minute','Hour','Day of Month','Month','Day of Week'];
    const fieldRanges=['0-59','0-23','1-31','1-12','0-6'];

    $('output').style.display='block';
    $('output').innerHTML=`
      <div class="explanation">
        <div class="text">${human}</div>
        <div class="human">${expr}</div>
      </div>

      <div class="breakdown">
        ${parts.map((p,i)=>`
          <div class="field-card">
            <div class="name">${fieldNames[i]}</div>
            <div class="value">${p}</div>
            <div class="meaning">${explainField(p,['minute','hour','day','month','weekday'][i])}</div>
          </div>
        `).join('')}
      </div>

      <div class="section">
        <h2>Next ${runs.length} Runs</h2>
        <ul class="run-list">
          ${runs.map(r=>`
            <li>
              <span>${r.toLocaleString('en',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})}</span>
              <span class="relative">${relativeTime(r)}</span>
            </li>
          `).join('')}
        </ul>
      </div>

      <div style="text-align:center">
        <a class="share-btn" href="https://x.com/intent/tweet?text=${encodeURIComponent(`Cron: ${expr} → "${human}"`)}&url=${encodeURIComponent('https://gokuscraper.github.io/dev-vault/cron-explain/')}" target="_blank">Share on X</a>
      </div>
    `;
  }catch(e){
    $('output').style.display='block';
    $('output').innerHTML=`<div class="error">Invalid cron expression: ${e.message}</div>`;
  }
}

// Init
explain();

// URL param
const params=new URLSearchParams(location.search);
if(params.get('expr')){$('cronInput').value=params.get('expr');explain()}
</script>
