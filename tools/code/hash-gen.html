async function computeHash(data,algo){
  if(algo==='md5'){
    if(typeof data==='string')return md5(data);
    // For file ArrayBuffer, convert to string (limited to small files for MD5)
    const bytes=new Uint8Array(data);
    let str='';
    for(let i=0;i<bytes.length;i++)str+=String.fromCharCode(bytes[i]);
    return md5(str);
  }
  const webAlgo=algos[algo];
  let buf;
  if(typeof data==='string'){
    buf=new TextEncoder().encode(data);
  }else{
    buf=data;
  }
  const hashBuf=await crypto.subtle.digest(webAlgo,buf);
  return Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function renderResults(container,hashes){
  container.innerHTML=Object.entries(hashes).map(([algo,hash])=>`
    <div class="hash-row">
      <div class="algo">${algo}</div>
      <div class="value">${hash}</div>
      <button class="copy-btn" onclick="copyHash(this,'${hash}')" ti="btn_copy">Copy</button>
    </div>
  `).join('');
}

async function hashText(){
  const text=$('textInput').value;
  if(!text){$('textResults').innerHTML='';return}
  const results={};
  for(const algo of activeAlgos){
    results[algo]=await computeHash(text,algo);
  }
  renderResults($('textResults'),results);
}

async function hashFile(file){
  if(!file)return;
  const size=file.size;
  const sizeStr=size<1024?size+' B':size<1048576?(size/1024).toFixed(1)+' KB':(size/1048576).toFixed(1)+' MB';
  $('fileInfo').textContent=`${file.name} (${sizeStr})`;

  const buf=await file.arrayBuffer();
  const results={};
  for(const algo of ['sha1','sha256','sha512']){
    results[algo]=await computeHash(buf,algo);
  }
  renderResults($('fileResults'),results);
}

function compareHashes(){
  const h1=$('hash1').value.trim().toLowerCase();
  const h2=$('hash2').value.trim().toLowerCase();
  if(!h1||!h2){$('compareResult').innerHTML='';return}
  if(h1===h2){
    $('compareResult').innerHTML='<span class="match">Match! Hashes are identical.</span>';
  }else{
    $('compareResult').innerHTML='<span class="no-match">No match. Hashes differ.</span>';
  }
}

function copyHash(btn,hash){
