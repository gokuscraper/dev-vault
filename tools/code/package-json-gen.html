<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>package.json Generator — Create npm Package Config Visually</title>
<meta name="description" content="Generate package.json visually. Set name, version, scripts, dependencies, license, engines, exports. 6 project templates. No signup.">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/package-json-gen/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"package.json Generator","description":"Generate package.json visually with templates for CLI, library, web app, and more.","url":"https://gokuscraper.github.io/dev-vault/package-json-gen/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"gokuscraper","url":"https://github.com/gokuscraper"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none}
input:focus,select:focus{border-color:#3b82f6}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:180px}
.kv-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.kv-row input{flex:1}
.kv-row .rm{color:#666;cursor:pointer;font-size:0.8rem;padding:0 4px}
.kv-row .rm:hover{color:#f85149}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>package.json Generator</h1>
<p class="sub">Create npm package configuration visually</p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Basic Info</h3>
<div class="row">
<div class="col"><label>Name</label><input id="pName" oninput="gen()"></div>
<div class="col" style="max-width:120px"><label>Version</label><input id="pVersion" value="1.0.0" oninput="gen()"></div>
<div class="col"><label>Description</label><input id="pDesc" oninput="gen()"></div>
</div>
<div class="row">
<div class="col"><label>Author</label><input id="pAuthor" oninput="gen()"></div>
<div class="col" style="max-width:160px"><label>License</label>
<select id="pLicense" onchange="gen()">
<option>MIT</option><option>ISC</option><option>Apache-2.0</option><option>GPL-3.0-only</option><option>BSD-3-Clause</option><option>UNLICENSED</option>
</select></div>
<div class="col"><label>Repository URL</label><input id="pRepo" oninput="gen()" placeholder="https://github.com/user/repo"></div>
</div>
</div>

<div class="section">
<h3>Entry Points</h3>
<div class="row">
<div class="col"><label>main</label><input id="pMain" oninput="gen()" placeholder="index.js"></div>
<div class="col"><label>module (ESM)</label><input id="pModule" oninput="gen()" placeholder="dist/index.mjs"></div>
<div class="col"><label>types</label><input id="pTypes" oninput="gen()" placeholder="dist/index.d.ts"></div>
</div>
<div class="row">
<div class="col"><label>bin (CLI command)</label><input id="pBin" oninput="gen()" placeholder="cli.js"></div>
</div>
<div class="check-row"><input type="checkbox" id="pESM" onchange="gen()"><label for="pESM">"type": "module" (ESM)</label></div>
<div class="check-row"><input type="checkbox" id="pPrivate" onchange="gen()"><label for="pPrivate">"private": true</label></div>
</div>

<div class="section">
<h3>Scripts</h3>
<div id="scriptsList"></div>
<button class="add-btn" onclick="addScript()">+ Add Script</button>
</div>

<div class="section">
<h3>Keywords</h3>
<input id="pKeywords" oninput="gen()" placeholder="cli, tool, utility (comma-separated)">
</div>

<div class="section">
<h3>Engines</h3>
<div class="row">
<div class="col"><label>Node.js</label><input id="pNode" oninput="gen()" placeholder=">=18.0.0"></div>
<div class="col"><label>npm</label><input id="pNpm" oninput="gen()" placeholder=">=9.0.0"></div>
</div>
</div>

<div class="section">
<h3>Files (published to npm)</h3>
<input id="pFiles" oninput="gen()" placeholder="dist, README.md, LICENSE (comma-separated)">
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/npm-health/">npm Health</a> | <a href="https://gokuscraper.github.io/dev-vault/gitignore-gen/">.gitignore Gen</a> | <a href="https://gokuscraper.github.io/dev-vault/gh-actions-gen/">GH Actions Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const TEMPLATES = {
  'CLI Tool': {
    name:'my-cli',version:'1.0.0',desc:'A CLI tool',author:'',license:'MIT',repo:'',
    main:'index.js',module:'',types:'',bin:'cli.js',esm:true,private:false,
    scripts:[{k:'start',v:'node cli.js'},{k:'test',v:'node --test'},{k:'lint',v:'eslint .'}],
    keywords:'cli, tool',node:'>=18.0.0',npm:'',files:'index.js, cli.js, README.md, LICENSE'
  },
  'Library (ESM)': {
    name:'my-lib',version:'0.1.0',desc:'A JavaScript library',author:'',license:'MIT',repo:'',
    main:'dist/index.cjs',module:'dist/index.mjs',types:'dist/index.d.ts',bin:'',esm:true,private:false,
    scripts:[{k:'build',v:'tsup src/index.ts --format cjs,esm --dts'},{k:'test',v:'vitest'},{k:'lint',v:'eslint src'},{k:'prepublishOnly',v:'npm run build'}],
    keywords:'library',node:'>=18.0.0',npm:'',files:'dist, README.md, LICENSE'
  },
  'Web App': {
    name:'my-app',version:'0.1.0',desc:'A web application',author:'',license:'MIT',repo:'',
    main:'',module:'',types:'',bin:'',esm:true,private:true,
    scripts:[{k:'dev',v:'vite'},{k:'build',v:'vite build'},{k:'preview',v:'vite preview'},{k:'test',v:'vitest'},{k:'lint',v:'eslint src'}],
    keywords:'',node:'>=18.0.0',npm:'',files:''
  },
  'Express API': {
    name:'my-api',version:'1.0.0',desc:'REST API server',author:'',license:'MIT',repo:'',
    main:'src/index.js',module:'',types:'',bin:'',esm:true,private:true,
    scripts:[{k:'start',v:'node src/index.js'},{k:'dev',v:'nodemon src/index.js'},{k:'test',v:'jest --coverage'},{k:'lint',v:'eslint src'}],
    keywords:'api, rest, express',node:'>=18.0.0',npm:'',files:''
  },
  'TypeScript': {
    name:'my-ts-project',version:'1.0.0',desc:'A TypeScript project',author:'',license:'MIT',repo:'',
    main:'dist/index.js',module:'',types:'dist/index.d.ts',bin:'',esm:true,private:false,
    scripts:[{k:'build',v:'tsc'},{k:'dev',v:'tsc --watch'},{k:'test',v:'vitest'},{k:'lint',v:'eslint src --ext .ts'},{k:'prepublishOnly',v:'npm run build'}],
    keywords:'typescript',node:'>=18.0.0',npm:'',files:'dist, README.md, LICENSE'
  },
  'Monorepo': {
    name:'my-monorepo',version:'0.0.0',desc:'Monorepo workspace',author:'',license:'MIT',repo:'',
    main:'',module:'',types:'',bin:'',esm:true,private:true,
    scripts:[{k:'build',v:'turbo build'},{k:'dev',v:'turbo dev'},{k:'test',v:'turbo test'},{k:'lint',v:'turbo lint'},{k:'clean',v:'turbo clean'}],
    keywords:'',node:'>=18.0.0',npm:'',files:''
  }
};

let scripts = [];

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(TEMPLATES).forEach(n=>{
    const b=document.createElement('div');
    b.className='preset';b.textContent=n;
    b.onclick=()=>loadPreset(n);
    c.appendChild(b);
  });
}

function loadPreset(name){
  const t=TEMPLATES[name];if(!t)return;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  document.getElementById('pName').value=t.name;
  document.getElementById('pVersion').value=t.version;
  document.getElementById('pDesc').value=t.desc;
  document.getElementById('pAuthor').value=t.author;
  document.getElementById('pLicense').value=t.license;
  document.getElementById('pRepo').value=t.repo;
  document.getElementById('pMain').value=t.main;
  document.getElementById('pModule').value=t.module;
  document.getElementById('pTypes').value=t.types;
  document.getElementById('pBin').value=t.bin;
  document.getElementById('pESM').checked=t.esm;
  document.getElementById('pPrivate').checked=t.private;
  scripts=JSON.parse(JSON.stringify(t.scripts));
  document.getElementById('pKeywords').value=t.keywords;
  document.getElementById('pNode').value=t.node;
  document.getElementById('pNpm').value=t.npm;
  document.getElementById('pFiles').value=t.files;
  renderScripts();gen();
}

function addScript(){scripts.push({k:'',v:''});renderScripts();gen()}
function removeScript(i){scripts.splice(i,1);renderScripts();gen()}

function renderScripts(){
  const c=document.getElementById('scriptsList');c.innerHTML='';
  scripts.forEach((s,i)=>{
    const d=document.createElement('div');d.className='kv-row';
    d.innerHTML=`<input style="max-width:140px" value="${esc(s.k)}" onchange="scripts[${i}].k=this.value;gen()" placeholder="script name">
    <input value="${esc(s.v)}" onchange="scripts[${i}].v=this.value;gen()" placeholder="command">
    <span class="rm" onclick="removeScript(${i})">✕</span>`;
    c.appendChild(d);
  });
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function gen(){
  const pkg = {};
  const name = document.getElementById('pName').value;
  if(name) pkg.name = name;
  pkg.version = document.getElementById('pVersion').value || '1.0.0';
  const desc = document.getElementById('pDesc').value;
  if(desc) pkg.description = desc;
  if(document.getElementById('pESM').checked) pkg.type = 'module';
  const main = document.getElementById('pMain').value;
  if(main) pkg.main = main;
  const mod = document.getElementById('pModule').value;
  if(mod) pkg.module = mod;
  const types = document.getElementById('pTypes').value;
  if(types) pkg.types = types;
  const bin = document.getElementById('pBin').value;
  if(bin) pkg.bin = { [name||'cli']: bin };
  if(document.getElementById('pPrivate').checked) pkg.private = true;

  // Scripts
  const sc = {};
  scripts.forEach(s => { if(s.k && s.v) sc[s.k] = s.v; });
  if(Object.keys(sc).length) pkg.scripts = sc;

  // Keywords
  const kw = document.getElementById('pKeywords').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(kw.length) pkg.keywords = kw;

  const author = document.getElementById('pAuthor').value;
  if(author) pkg.author = author;
  pkg.license = document.getElementById('pLicense').value;

  const repo = document.getElementById('pRepo').value;
  if(repo) pkg.repository = { type: 'git', url: repo };

  // Engines
  const engines = {};
  const nodeV = document.getElementById('pNode').value;
  const npmV = document.getElementById('pNpm').value;
  if(nodeV) engines.node = nodeV;
  if(npmV) engines.npm = npmV;
  if(Object.keys(engines).length) pkg.engines = engines;

  // Files
  const files = document.getElementById('pFiles').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(files.length) pkg.files = files;

  document.getElementById('out').textContent = JSON.stringify(pkg, null, 2);
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('CLI Tool');
</script>
</body>
</html>
