<script>
const TEMPLATES = {
  'CLI Tool': {

  },
  'Web App': {

  },

    keywords:'api, rest, express',node:'>=18.0.0',npm:'',files:''
  },
  'TypeScript': {
    name:'my-ts-project',version:'1.0.0',desc:'A TypeScript project',author:'',license:'MIT',repo:'',
    main:'dist/index.js',module:'',types:'dist/index.d.ts',bin:'',esm:true,private:false,
    scripts:[{k:'build',v:'tsc'},{k:'dev',v:'tsc --watch'},{k:'test',v:'vitest'},{k:'lint',v:'eslint src --ext .ts'},{k:'prepublishOnly',v:'npm run build'}],
    keywords:'typescript',node:'>=18.0.0',npm:'',files:'dist, README.md, LICENSE'
  },
  'Monorepo': {
    name:'my-monorepo',version:'0.0.0',desc:'Monorepo workspace',author:'',license:'MIT',repo:'',
    main:'',module:'',types:'',bin:'',esm:true,private:true,
    scripts:[{k:'build',v:'turbo build'},{k:'dev',v:'turbo dev'},{k:'test',v:'turbo test'},{k:'lint',v:'turbo lint'},{k:'clean',v:'turbo clean'}],
    keywords:'',node:'>=18.0.0',npm:'',files:''
  }
};

let scripts = [];

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(TEMPLATES).forEach(n=>{
    const b=document.createElement('div');
    b.className='preset';b.textContent=n;
    b.onclick=()=>loadPreset(n);
    c.appendChild(b);
  });
}

function loadPreset(name){
  const t=TEMPLATES[name];if(!t)return;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  document.getElementById('pName').value=t.name;
  document.getElementById('pVersion').value=t.version;
  document.getElementById('pDesc').value=t.desc;
  document.getElementById('pAuthor').value=t.author;
  document.getElementById('pLicense').value=t.license;
  document.getElementById('pRepo').value=t.repo;
  document.getElementById('pMain').value=t.main;
  document.getElementById('pModule').value=t.module;
  document.getElementById('pTypes').value=t.types;
  document.getElementById('pBin').value=t.bin;
  document.getElementById('pESM').checked=t.esm;
  document.getElementById('pPrivate').checked=t.private;
  scripts=JSON.parse(JSON.stringify(t.scripts));
  document.getElementById('pKeywords').value=t.keywords;
  document.getElementById('pNode').value=t.node;
  document.getElementById('pNpm').value=t.npm;
  document.getElementById('pFiles').value=t.files;
  renderScripts();gen();
}

function addScript(){scripts.push({k:'',v:''});renderScripts();gen()}
function removeScript(i){scripts.splice(i,1);renderScripts();gen()}

function renderScripts(){
  const c=document.getElementById('scriptsList');c.innerHTML='';
  scripts.forEach((s,i)=>{
    const d=document.createElement('div');d.className='kv-row';
    d.innerHTML=`<input style="max-width:140px" value="${esc(s.k)}" onchange="scripts[${i}].k=this.value;gen()" tp="placeholder_script_name" tp="placeholder_script_name" tp="placeholder_script_name" tp="placeholder_script_name" tp="placeholder_script_name" placeholder="script name">
    <input value="${esc(s.v)}" onchange="scripts[${i}].v=this.value;gen()" tp="placeholder_command" tp="placeholder_command" tp="placeholder_command" tp="placeholder_command" tp="placeholder_command" placeholder="command">
    <span class="rm" onclick="removeScript(${i})">✕</span>`;
    c.appendChild(d);
  });
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function gen(){
  const pkg = {};
  const name = document.getElementById('pName').value;
  if(name) pkg.name = name;
  pkg.version = document.getElementById('pVersion').value || '1.0.0';
  const desc = document.getElementById('pDesc').value;
  if(desc) pkg.description = desc;
  if(document.getElementById('pESM').checked) pkg.type = 'module';
  const main = document.getElementById('pMain').value;
  if(main) pkg.main = main;
  const mod = document.getElementById('pModule').value;
  if(mod) pkg.module = mod;
  const types = document.getElementById('pTypes').value;
  if(types) pkg.types = types;
  const bin = document.getElementById('pBin').value;
  if(bin) pkg.bin = { [name||'cli']: bin };
  if(document.getElementById('pPrivate').checked) pkg.private = true;

  // Scripts
  const sc = {};
  scripts.forEach(s => { if(s.k && s.v) sc[s.k] = s.v; });
  if(Object.keys(sc).length) pkg.scripts = sc;

  // Keywords
  const kw = document.getElementById('pKeywords').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(kw.length) pkg.keywords = kw;

  const author = document.getElementById('pAuthor').value;
  if(author) pkg.author = author;
  pkg.license = document.getElementById('pLicense').value;

  const repo = document.getElementById('pRepo').value;
  if(repo) pkg.repository = { type: 'git', url: repo };

  // Engines
  const engines = {};
  const nodeV = document.getElementById('pNode').value;
  const npmV = document.getElementById('pNpm').value;
  if(nodeV) engines.node = nodeV;
  if(npmV) engines.npm = npmV;
  if(Object.keys(engines).length) pkg.engines = engines;

  // Files
  const files = document.getElementById('pFiles').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(files.length) pkg.files = files;

  document.getElementById('out').textContent = JSON.stringify(pkg, null, 2);
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('CLI Tool');
</script>
