body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}

<script>
(function(){
  // --- State ---
  let audioCtx = null;
  let oscNode = null;
  let gainNode = null;
  let playing = false;
  let freq = 440;
  let waveform = 'sine';
  let volume = 0.5;
  let detuneCents = 0;

  // --- DOM ---
  const freqSlider = document.getElementById('freqSlider');
  const freqNumInput = document.getElementById('freqNumInput');
  const freqText = document.getElementById('freqText');
  const freqUnit = document.getElementById('freqUnit');
  const noteName = document.getElementById('noteName');
  const noteCents = document.getElementById('noteCents');
  const playBtn = document.getElementById('playBtn');
  const volSlider = document.getElementById('volSlider');
  const volVal = document.getElementById('volVal');
  const detuneSlider = document.getElementById('detuneSlider');
  const detuneVal = document.getElementById('detuneVal');
  const waveBtns = document.querySelectorAll('.wave-btn');
  const presetBtns = document.querySelectorAll('.preset-btn');
  const octUp = document.getElementById('octUp');
  const octDown = document.getElementById('octDown');

  // --- Note names ---
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

  function freqToNote(f) {
    // A4 = 440Hz = MIDI 69
    const midi = 12 * Math.log2(f / 440) + 69;
    const rounded = Math.round(midi);
    const centsOff = Math.round((midi - rounded) * 100);
    const noteIndex = ((rounded % 12) + 12) % 12;
    const octave = Math.floor(rounded / 12) - 1;
    return { name: NOTE_NAMES[noteIndex] + octave, cents: centsOff };
  }

  // --- Logarithmic slider mapping ---
  // slider 0..1000 -> freq 20..20000 (log scale)
  const LOG_MIN = Math.log(20);
  const LOG_MAX = Math.log(20000);

  function sliderToFreq(val) {
    const t = val / 1000;
    return Math.exp(LOG_MIN + t * (LOG_MAX - LOG_MIN));
  }

  function freqToSlider(f) {
    f = Math.max(20, Math.min(20000, f));
    return ((Math.log(f) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * 1000;
  }

  // --- Display updates ---
  function updateDisplay() {
    if (freq >= 1000) {
      freqText.textContent = (freq / 1000).toFixed(freq >= 10000 ? 2 : 3);
      freqUnit.textContent=T("jtc_khz");
    } else {
      freqText.textContent = freq < 100 ? freq.toFixed(1) : freq.toFixed(freq % 1 === 0 ? 0 : 2);
      freqUnit.textContent=T("jtc_hz");
    }
    const note = freqToNote(freq);
    noteName.textContent = note.name;
    const sign = note.cents > 0 ? '+' : '';
    noteCents.textContent = note.cents === 0 ? 'exact' : sign + note.cents + ' cents';

    // Octave button limits
    octDown.disabled = freq / 2 < 20;
    octUp.disabled = freq * 2 > 20000;
  }

  function setFreq(f, fromSlider) {
    freq = Math.max(20, Math.min(20000, f));
    if (!fromSlider) freqSlider.value = freqToSlider(freq);
    freqNumInput.value = freq < 100 ? freq.toFixed(1) : Math.round(freq * 100) / 100;
    updateDisplay();
    applyToOsc();
  }

  function applyToOsc() {
    if (!oscNode || !gainNode) return;
    const t = audioCtx.currentTime + 0.03;
    oscNode.frequency.linearRampToValueAtTime(freq, t);
    oscNode.detune.linearRampToValueAtTime(detuneCents, t);
    gainNode.gain.linearRampToValueAtTime(volume, t);
  }

  // --- Audio control ---
  function ensureCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function startTone() {
    ensureCtx();
    if (oscNode) stopTone();
    oscNode = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    oscNode.type = waveform;
    oscNode.frequency.value = freq;
    oscNode.detune.value = detuneCents;
    gainNode.gain.value = 0;
    oscNode.connect(gainNode).connect(audioCtx.destination);
    oscNode.start();
    // Fade in to avoid click
    gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.02);
    playing = true;
    playBtn.textContent=T("jtc_stop");
    playBtn.className = 'play-btn playing';
  }

  function stopTone() {
    if (oscNode && gainNode) {
      const t = audioCtx.currentTime;
      gainNode.gain.linearRampToValueAtTime(0, t + 0.02);
      const osc = oscNode;
      setTimeout(function(){ try{ osc.stop(); }catch(e){} }, 30);
    }
    oscNode = null;
    gainNode = null;
    playing = false;
    playBtn.textContent=T("jtc_play");
    playBtn.className = 'play-btn stopped';
  }

  // --- Event listeners ---
  playBtn.addEventListener('click', function() {
    if (playing) stopTone(); else startTone();
  });

  freqSlider.addEventListener('input', function() {
    setFreq(sliderToFreq(parseFloat(this.value)), true);
  });

  freqNumInput.addEventListener('input', function() {
    const v = parseFloat(this.value);
    if (!isNaN(v) && v >= 20 && v <= 20000) setFreq(v, false);
  });

  volSlider.addEventListener('input', function() {
    volume = parseInt(this.value) / 100;
    volVal.textContent = this.value + '%';
    applyToOsc();
  });

  detuneSlider.addEventListener('input', function() {
    detuneCents = parseInt(this.value);
    const sign = detuneCents > 0 ? '+' : '';
    detuneVal.textContent = sign + detuneCents + ' cents';
    applyToOsc();
  });

  waveBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      waveform = this.dataset.wave;
      waveBtns.forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      if (oscNode) oscNode.type = waveform;
    });
  });

  presetBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      setFreq(parseFloat(this.dataset.freq), false);
    });
  });

  octUp.addEventListener('click', function() {
    if (freq * 2 <= 20000) setFreq(freq * 2, false);
  });

  octDown.addEventListener('click', function() {
    if (freq / 2 >= 20) setFreq(freq / 2, false);
  });

  // Keyboard: space to toggle play
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      if (playing) stopTone(); else startTone();
    }
  });

  // Init display
  freqSlider.value = freqToSlider(440);
  updateDisplay();
})();
</script>
