<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makefile Generator — Build Makefiles Visually</title>
<meta name="description" content="Generate Makefiles visually. C/C++, Go, Python, Docker, LaTeX templates. Custom targets, variables, dependencies. No signup.">
<link rel="canonical" href="https://yurukusa.github.io/makefile-gen/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Makefile Generator","description":"Generate Makefiles visually with templates for C/C++, Go, Python, Docker, and LaTeX.","url":"https://yurukusa.github.io/makefile-gen/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"yurukusa","url":"https://github.com/yurukusa"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#3b82f6}
textarea{font-family:'Fira Code',monospace;resize:vertical}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:180px}
.target-item{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;padding:10px;margin-bottom:8px;position:relative}
.target-item .remove{position:absolute;top:6px;right:8px;color:#666;cursor:pointer;font-size:0.8rem}
.target-item .remove:hover{color:#f85149}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6;tab-size:4}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>Makefile Generator</h1>
<p class="sub">Build Makefiles visually with templates</p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Variables</h3>
<div id="varsList"></div>
<button class="add-btn" onclick="addVar()">+ Add Variable</button>
</div>

<div class="section">
<h3>Options</h3>
<div class="check-row"><input type="checkbox" id="optPhony" checked onchange="gen()"><label for="optPhony">.PHONY declarations</label></div>
<div class="check-row"><input type="checkbox" id="optDefault" checked onchange="gen()"><label for="optDefault">.DEFAULT_GOAL</label></div>
<div class="check-row"><input type="checkbox" id="optHelp" checked onchange="gen()"><label for="optHelp">help target (auto-generated)</label></div>
<div class="check-row"><input type="checkbox" id="optSilent" onchange="gen()"><label for="optSilent">Silent mode (@prefix)</label></div>
</div>

<div class="section">
<h3>Targets</h3>
<div id="targetsList"></div>
<button class="add-btn" onclick="addTarget()">+ Add Target</button>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/dockerfile-gen/">Dockerfile Gen</a> | <a href="https://yurukusa.github.io/gh-actions-gen/">GH Actions Gen</a> | <a href="https://yurukusa.github.io/gitignore-gen/">.gitignore Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const TEMPLATES = {
  'C/C++': {
    vars: [{k:'CC',v:'gcc'},{k:'CFLAGS',v:'-Wall -Wextra -O2'},{k:'TARGET',v:'app'},{k:'SRC',v:'$(wildcard src/*.c)'},{k:'OBJ',v:'$(SRC:.c=.o)'}],
    targets: [
      {name:'all',deps:'$(TARGET)',cmds:'',desc:'Build everything'},
      {name:'$(TARGET)',deps:'$(OBJ)',cmds:'$(CC) $(CFLAGS) -o $@ $^',desc:''},
      {name:'%.o',deps:'%.c',cmds:'$(CC) $(CFLAGS) -c $< -o $@',desc:''},
      {name:'clean',deps:'',cmds:'rm -f $(OBJ) $(TARGET)',desc:'Remove build artifacts'},
      {name:'run',deps:'$(TARGET)',cmds:'./$(TARGET)',desc:'Build and run'},
    ]
  },
  'Go': {
    vars: [{k:'BINARY',v:'app'},{k:'PKG',v:'./...'},{k:'LDFLAGS',v:'-s -w'}],
    targets: [
      {name:'all',deps:'build',cmds:'',desc:'Build everything'},
      {name:'build',deps:'',cmds:'go build -ldflags "$(LDFLAGS)" -o $(BINARY) .',desc:'Build binary'},
      {name:'test',deps:'',cmds:'go test -race -v $(PKG)',desc:'Run tests'},
      {name:'lint',deps:'',cmds:'golangci-lint run',desc:'Run linter'},
      {name:'clean',deps:'',cmds:'rm -f $(BINARY)',desc:'Remove binary'},
      {name:'run',deps:'build',cmds:'./$(BINARY)',desc:'Build and run'},
    ]
  },
  'Python': {
    vars: [{k:'PYTHON',v:'python3'},{k:'VENV',v:'.venv'}],
    targets: [
      {name:'all',deps:'install',cmds:'',desc:'Setup project'},
      {name:'install',deps:'',cmds:'$(PYTHON) -m venv $(VENV)\n$(VENV)/bin/pip install -r requirements.txt',desc:'Create venv and install deps'},
      {name:'test',deps:'',cmds:'$(VENV)/bin/pytest -v',desc:'Run tests'},
      {name:'lint',deps:'',cmds:'$(VENV)/bin/flake8 .\n$(VENV)/bin/mypy .',desc:'Run linters'},
      {name:'format',deps:'',cmds:'$(VENV)/bin/black .\n$(VENV)/bin/isort .',desc:'Format code'},
      {name:'clean',deps:'',cmds:'rm -rf $(VENV) __pycache__ .pytest_cache .mypy_cache',desc:'Remove venv and caches'},
      {name:'run',deps:'',cmds:'$(VENV)/bin/python main.py',desc:'Run application'},
    ]
  },
  'Docker': {
    vars: [{k:'IMAGE',v:'myapp'},{k:'TAG',v:'latest'},{k:'PORT',v:'8080'}],
    targets: [
      {name:'all',deps:'build',cmds:'',desc:'Build image'},
      {name:'build',deps:'',cmds:'docker build -t $(IMAGE):$(TAG) .',desc:'Build Docker image'},
      {name:'run',deps:'',cmds:'docker run --rm -p $(PORT):$(PORT) $(IMAGE):$(TAG)',desc:'Run container'},
      {name:'push',deps:'',cmds:'docker push $(IMAGE):$(TAG)',desc:'Push to registry'},
      {name:'stop',deps:'',cmds:'docker stop $$(docker ps -q --filter ancestor=$(IMAGE):$(TAG))',desc:'Stop containers'},
      {name:'clean',deps:'',cmds:'docker rmi $(IMAGE):$(TAG)',desc:'Remove image'},
      {name:'compose-up',deps:'',cmds:'docker compose up -d',desc:'Start with docker compose'},
      {name:'compose-down',deps:'',cmds:'docker compose down',desc:'Stop docker compose'},
    ]
  },
  'Node.js': {
    vars: [{k:'NODE',v:'node'},{k:'NPM',v:'npm'}],
    targets: [
      {name:'all',deps:'install',cmds:'',desc:'Setup project'},
      {name:'install',deps:'',cmds:'$(NPM) ci',desc:'Install dependencies'},
      {name:'dev',deps:'',cmds:'$(NPM) run dev',desc:'Start dev server'},
      {name:'build',deps:'',cmds:'$(NPM) run build',desc:'Build for production'},
      {name:'test',deps:'',cmds:'$(NPM) test',desc:'Run tests'},
      {name:'lint',deps:'',cmds:'$(NPM) run lint',desc:'Run linter'},
      {name:'clean',deps:'',cmds:'rm -rf node_modules dist',desc:'Remove node_modules and dist'},
    ]
  },
  'LaTeX': {
    vars: [{k:'TEX',v:'pdflatex'},{k:'DOC',v:'main'},{k:'BIB',v:'bibtex'}],
    targets: [
      {name:'all',deps:'$(DOC).pdf',cmds:'',desc:'Build PDF'},
      {name:'$(DOC).pdf',deps:'$(DOC).tex',cmds:'$(TEX) $(DOC)\n$(BIB) $(DOC) || true\n$(TEX) $(DOC)\n$(TEX) $(DOC)',desc:''},
      {name:'clean',deps:'',cmds:'rm -f $(DOC).pdf $(DOC).aux $(DOC).log $(DOC).bbl $(DOC).blg $(DOC).toc $(DOC).out',desc:'Remove build files'},
      {name:'watch',deps:'',cmds:'while true; do inotifywait -e modify $(DOC).tex && make all; done',desc:'Watch and rebuild'},
    ]
  },
  'Rust': {
    vars: [{k:'BINARY',v:'target/release/app'}],
    targets: [
      {name:'all',deps:'build',cmds:'',desc:'Build everything'},
      {name:'build',deps:'',cmds:'cargo build --release',desc:'Build release binary'},
      {name:'test',deps:'',cmds:'cargo test',desc:'Run tests'},
      {name:'lint',deps:'',cmds:'cargo clippy -- -D warnings\ncargo fmt --check',desc:'Run clippy and check formatting'},
      {name:'format',deps:'',cmds:'cargo fmt',desc:'Format code'},
      {name:'clean',deps:'',cmds:'cargo clean',desc:'Remove target directory'},
      {name:'run',deps:'',cmds:'cargo run --release',desc:'Build and run'},
    ]
  },
  'Minimal': {
    vars: [],
    targets: [
      {name:'all',deps:'build',cmds:'',desc:'Default target'},
      {name:'build',deps:'',cmds:'echo "Building..."',desc:'Build project'},
      {name:'test',deps:'',cmds:'echo "Testing..."',desc:'Run tests'},
      {name:'clean',deps:'',cmds:'echo "Cleaning..."',desc:'Clean up'},
    ]
  }
};

let vars = [];
let targets = [];
let currentPreset = '';

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(TEMPLATES).forEach(name=>{
    const b=document.createElement('div');
    b.className='preset';
    b.textContent=name;
    b.onclick=()=>loadPreset(name);
    c.appendChild(b);
  });
}

function loadPreset(name){
  const t=TEMPLATES[name];
  if(!t)return;
  currentPreset=name;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  vars=JSON.parse(JSON.stringify(t.vars));
  targets=JSON.parse(JSON.stringify(t.targets));
  renderVars();
  renderTargets();
  gen();
}

function addVar(){vars.push({k:'VAR',v:'value'});renderVars();gen()}
function removeVar(i){vars.splice(i,1);renderVars();gen()}
function addTarget(){targets.push({name:'target',deps:'',cmds:'echo "done"',desc:'Description'});renderTargets();gen()}
function removeTarget(i){targets.splice(i,1);renderTargets();gen()}

function renderVars(){
  const c=document.getElementById('varsList');c.innerHTML='';
  vars.forEach((v,i)=>{
    const d=document.createElement('div');
    d.className='row';
    d.innerHTML=`<div class="col" style="max-width:180px"><input value="${esc(v.k)}" onchange="vars[${i}].k=this.value;gen()" placeholder="VAR_NAME"></div>
    <div class="col"><input value="${esc(v.v)}" onchange="vars[${i}].v=this.value;gen()" placeholder="value"></div>
    <div style="padding-top:2px"><span style="color:#666;cursor:pointer;font-size:0.8rem" onclick="removeVar(${i})">✕</span></div>`;
    c.appendChild(d);
  });
}

function renderTargets(){
  const c=document.getElementById('targetsList');c.innerHTML='';
  targets.forEach((t,i)=>{
    const d=document.createElement('div');d.className='target-item';
    d.innerHTML=`<span class="remove" onclick="removeTarget(${i})">✕</span>
    <div class="row">
      <div class="col" style="max-width:160px"><label>Target</label><input value="${esc(t.name)}" onchange="targets[${i}].name=this.value;gen()"></div>
      <div class="col" style="max-width:180px"><label>Dependencies</label><input value="${esc(t.deps)}" onchange="targets[${i}].deps=this.value;gen()" placeholder="dep1 dep2"></div>
      <div class="col"><label>Description</label><input value="${esc(t.desc)}" onchange="targets[${i}].desc=this.value;gen()" placeholder="## help text"></div>
    </div>
    <label>Commands (one per line)</label>
    <textarea rows="2" onchange="targets[${i}].cmds=this.value;gen()">${esc(t.cmds)}</textarea>`;
    c.appendChild(d);
  });
}

function gen(){
  const phony=document.getElementById('optPhony').checked;
  const defGoal=document.getElementById('optDefault').checked;
  const help=document.getElementById('optHelp').checked;
  const silent=document.getElementById('optSilent').checked;
  const pfx=silent?'@':'';
  let m='';

  // Variables
  vars.forEach(v=>{if(v.k&&v.v)m+=`${v.k} ?= ${v.v}\n`});
  if(vars.length)m+='\n';

  // Default goal
  if(defGoal && targets.length){
    m+=`.DEFAULT_GOAL := ${targets[0].name}\n\n`;
  }

  // Phony
  if(phony){
    const phonies=targets.filter(t=>!t.name.includes('$')&&!t.name.includes('%')).map(t=>t.name);
    if(phonies.length) m+=`.PHONY: ${phonies.join(' ')}\n\n`;
  }

  // Help target
  if(help){
    m+=`help: ## Show this help\n\t@grep -E '^[a-zA-Z_-]+:.*?## .*$$' $(MAKEFILE_LIST) | sort | awk 'BEGIN {FS = ":.*?## "}; {printf "\\033[36m%-20s\\033[0m %s\\n", $$1, $$2}'\n\n`;
  }

  // Targets
  targets.forEach(t=>{
    let line=`${t.name}:`;
    if(t.deps)line+=` ${t.deps}`;
    if(t.desc && help)line+=` ## ${t.desc}`;
    m+=line+'\n';
    if(t.cmds){
      t.cmds.split('\n').forEach(cmd=>{
        if(cmd.trim()) m+=`\t${pfx}${cmd.trim()}\n`;
      });
    }
    m+='\n';
  });

  document.getElementById('out').textContent=m.trimEnd()+'\n';
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('C/C++');
</script>
</body>
</html>
