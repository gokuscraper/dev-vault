<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.input-area{margin-bottom:16px}
.input-area textarea{width:100%;min-height:150px;padding:14px;border-radius:10px;border:1px solid #222;background:#0d0d0d;color:#e6e6e6;font-family:'Fira Code',monospace;font-size:0.85rem;outline:none;resize:vertical}
.input-area textarea:focus{border-color:#3b82f6}

.transforms{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.tf-btn{padding:10px;border-radius:8px;border:1px solid #222;background:#161616;color:#888;font-size:0.78rem;cursor:pointer;text-align:center;font-weight:600;transition:all 0.15s}
.tf-btn:hover{border-color:#3b82f6;color:#4da6ff;background:#1a2744}
.tf-btn .label{display:block;font-size:0.82rem;margin-bottom:2px}
.tf-btn .example{font-size:0.65rem;color:#555}

.output-area{margin-bottom:16px;position:relative}
.output-area textarea{width:100%;min-height:150px;padding:14px;border-radius:10px;border:1px solid #222;background:#0d0d0d;color:#10b981;font-family:'Fira Code',monospace;font-size:0.85rem;outline:none;resize:vertical}
.copy-btn{position:absolute;top:8px;right:8px;padding:4px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.72rem;cursor:pointer}
.copy-btn:hover{border-color:#3b82f6;color:#4da6ff}

.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#161616;border:1px solid #222;border-radius:8px;padding:8px 14px;text-align:center}
.stat .num{font-family:'Fira Code',monospace;font-size:1rem;color:#4da6ff}
.stat .lbl{font-size:0.68rem;color:#555;margin-top:2px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}

<body>
<div class="container">
<h1>Text Transform</h1>
<p class="subtitle">Case converter & text utilities. 12 transformations.</p>

<div class="input-area">
  <textarea id="input" placeholder="Paste your text here..." oninput="updateStats()">Hello World Example Text</textarea>
</div>

<div class="transforms">
  <button class="tf-btn" onclick="apply(t=>t.toUpperCase())"><span class="label">UPPERCASE</span><span class="example">HELLO WORLD</span></button>
  <button class="tf-btn" onclick="apply(t=>t.toLowerCase())"><span class="label">lowercase</span><span class="example">hello world</span></button>
  <button class="tf-btn" onclick="apply(titleCase)"><span class="label">Title Case</span><span class="example">Hello World</span></button>
  <button class="tf-btn" onclick="apply(sentenceCase)"><span class="label">Sentence case</span><span class="example">Hello world</span></button>
  <button class="tf-btn" onclick="apply(toCamel)"><span class="label">camelCase</span><span class="example">helloWorld</span></button>
  <button class="tf-btn" onclick="apply(toPascal)"><span class="label">PascalCase</span><span class="example">HelloWorld</span></button>
  <button class="tf-btn" onclick="apply(toSnake)"><span class="label">snake_case</span><span class="example">hello_world</span></button>
  <button class="tf-btn" onclick="apply(toKebab)"><span class="label">kebab-case</span><span class="example">hello-world</span></button>
  <button class="tf-btn" onclick="apply(toConstant)"><span class="label">CONSTANT_CASE</span><span class="example">HELLO_WORLD</span></button>
  <button class="tf-btn" onclick="apply(toDot)"><span class="label">dot.case</span><span class="example">hello.world</span></button>
  <button class="tf-btn" onclick="apply(reverseText)"><span class="label">Reverse</span><span class="example">dlroW olleH</span></button>
  <button class="tf-btn" onclick="apply(sortLines)"><span class="label">Sort Lines</span><span class="example">A→Z per line</span></button>
  <button class="tf-btn" onclick="apply(dedupeLines)"><span class="label">Deduplicate</span><span class="example">Remove dupes</span></button>
  <button class="tf-btn" onclick="apply(trimLines)"><span class="label">Trim Lines</span><span class="example">Strip whitespace</span></button>
  <button class="tf-btn" onclick="apply(removeEmpty)"><span class="label">Remove Empty</span><span class="example">No blank lines</span></button>
  <button class="tf-btn" onclick="apply(numberLines)"><span class="label">Number Lines</span><span class="example">1. Hello</span></button>
</div>

<div class="output-area">
  <textarea id="output" readonly></textarea>
  <button class="copy-btn" onclick="copyOutput()">Copy</button>
</div>

<div class="stats" id="stats"></div>
</div>

<footer>
  <a href="https://github.com/gokuscraper/text-transform">GitHub</a> ·
  Part of <a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a>
</footer>

<script>
function getInput(){return document.getElementById('input').value}

function apply(fn){
  document.getElementById('output').value=fn(getInput());
  updateStats();
}

function words(t){return t.replace(/[^a-zA-Z0-9]+/g,' ').trim().split(/\s+/).filter(Boolean)}

function titleCase(t){return t.replace(/\b\w/g,c=>c.toUpperCase())}
function sentenceCase(t){return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase()}

function toCamel(t){const w=words(t);return w.map((s,i)=>i===0?s.toLowerCase():s.charAt(0).toUpperCase()+s.slice(1).toLowerCase()).join('')}
function toPascal(t){return words(t).map(s=>s.charAt(0).toUpperCase()+s.slice(1).toLowerCase()).join('')}
function toSnake(t){return words(t).map(s=>s.toLowerCase()).join('_')}
function toKebab(t){return words(t).map(s=>s.toLowerCase()).join('-')}
function toConstant(t){return words(t).map(s=>s.toUpperCase()).join('_')}
function toDot(t){return words(t).map(s=>s.toLowerCase()).join('.')}

function reverseText(t){return[...t].reverse().join('')}
function sortLines(t){return t.split('\n').sort((a,b)=>a.localeCompare(b)).join('\n')}
function dedupeLines(t){return[...new Set(t.split('\n'))].join('\n')}
function trimLines(t){return t.split('\n').map(l=>l.trim()).join('\n')}
function removeEmpty(t){return t.split('\n').filter(l=>l.trim()).join('\n')}
function numberLines(t){return t.split('\n').map((l,i)=>`${i+1}. ${l}`).join('\n')}

function updateStats(){
  const t=getInput();
  const chars=t.length;
  const w=t.trim()?t.trim().split(/\s+/).length:0;
  const lines=t.split('\n').length;
  const bytes=new Blob([t]).size;
  document.getElementById('stats').innerHTML=[
    {num:chars,lbl:'Characters'},
    {num:w,lbl:'Words'},
    {num:lines,lbl:'Lines'},
    {num:bytes<1024?bytes+' B':(bytes/1024).toFixed(1)+' KB',lbl:'Size'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function copyOutput(){
  navigator.clipboard.writeText(document.getElementById('output').value);
  const el=document.createElement('div');
  el.className='copied';el.textContent='Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

updateStats();
</script>
