<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}
.search{width:100%;max-width:480px;margin:0 auto 20px;display:block;padding:12px 18px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:1rem;outline:none}
.search:focus{border-color:#3b82f6}
.filters{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.filter-btn.active{border-color:var(--fc,#3b82f6);color:var(--fc,#4da6ff);background:var(--fb,#1a2744)}
.filter-btn:hover:not(.active){background:#1c1c1c}
.code-list{display:flex;flex-direction:column;gap:8px}
.code-card{background:#161616;border:1px solid #222;border-radius:10px;padding:14px 18px;display:flex;gap:14px;align-items:flex-start;transition:border-color 0.2s;cursor:pointer}
.code-card:hover{border-color:#3b82f6}
.code-num{font-family:'Fira Code',monospace;font-size:1.1rem;font-weight:700;min-width:44px}
.c1xx .code-num{color:#8b8bef}
.c2xx .code-num{color:#10b981}
.c3xx .code-num{color:#f59e0b}
.c4xx .code-num{color:#ef4444}
.c5xx .code-num{color:#ec4899}
.code-info{flex:1}
.code-name{font-size:0.9rem;color:#fff;margin-bottom:4px;font-weight:600}
.code-desc{font-size:0.78rem;color:#888;line-height:1.5;display:none}
.code-card.expanded .code-desc{display:block}
.code-tag{display:inline-block;font-size:0.68rem;padding:2px 8px;border-radius:10px;margin-top:6px}
.c1xx .code-tag{background:#1a1a3a;color:#8b8bef}
.c2xx .code-tag{background:#0d2818;color:#10b981}
.c3xx .code-tag{background:#1a1a00;color:#f59e0b}
.c4xx .code-tag{background:#2d0a0a;color:#ef4444}
.c5xx .code-tag{background:#2d0a1a;color:#ec4899}
.count{text-align:center;font-size:0.78rem;color:#555;margin-bottom:16px}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
</style>

<body>
<div class="container">
<h1>HTTP Status</h1>
<p class="subtitle">Quick reference for all HTTP status codes.</p>

<input type="text" class="search" id="search" placeholder="Search by code or name..." oninput="filter()">

<div class="filters" id="filters"></div>
<div class="count" id="count"></div>
<div class="code-list" id="list"></div>
</div>

<footer>
  <a href="https://github.com/yurukusa/http-status">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
const CODES=[
  // 1xx Informational
  {code:100,name:'Continue',cat:'1xx',desc:'The server has received the request headers. The client should proceed to send the request body.'},
  {code:101,name:'Switching Protocols',cat:'1xx',desc:'The server is switching protocols as requested by the client (e.g., upgrading to WebSocket).'},
  {code:102,name:'Processing',cat:'1xx',desc:'The server has received and is processing the request, but no response is available yet (WebDAV).'},
  {code:103,name:'Early Hints',cat:'1xx',desc:'Used to return some response headers before the final HTTP message. Allows preloading resources.'},
  // 2xx Success
  {code:200,name:'OK',cat:'2xx',desc:'The request succeeded. The response body contains the requested resource. The most common status code.'},
  {code:201,name:'Created',cat:'2xx',desc:'The request succeeded and a new resource was created. Typically returned after POST or PUT requests.'},
  {code:202,name:'Accepted',cat:'2xx',desc:'The request has been accepted for processing, but processing is not complete. Used for async operations.'},
  {code:204,name:'No Content',cat:'2xx',desc:'The request succeeded but there is no content to return. Common for DELETE requests or updates.'},
  {code:206,name:'Partial Content',cat:'2xx',desc:'The server is delivering only part of the resource due to a Range header sent by the client.'},
  {code:207,name:'Multi-Status',cat:'2xx',desc:'Provides status for multiple independent operations (WebDAV). Body contains XML with individual statuses.'},
  // 3xx Redirection
  {code:301,name:'Moved Permanently',cat:'3xx',desc:'The resource has been permanently moved to a new URL. Search engines update their links. Use for permanent redirects.'},
  {code:302,name:'Found',cat:'3xx',desc:'The resource is temporarily at a different URL. The client should continue using the original URL for future requests.'},
  {code:303,name:'See Other',cat:'3xx',desc:'The response to the request can be found at another URL using a GET method. Often used after POST.'},
  {code:304,name:'Not Modified',cat:'3xx',desc:'The resource has not been modified since the last request. The client can use its cached version.'},
  {code:307,name:'Temporary Redirect',cat:'3xx',desc:'Like 302, but guarantees the HTTP method will not change. POST stays POST.'},
  {code:308,name:'Permanent Redirect',cat:'3xx',desc:'Like 301, but guarantees the HTTP method will not change. POST stays POST.'},
  // 4xx Client Error
  {code:400,name:'Bad Request',cat:'4xx',desc:'The server cannot process the request due to malformed syntax, invalid parameters, or missing required fields.'},
  {code:401,name:'Unauthorized',cat:'4xx',desc:'Authentication is required and has not been provided or has failed. Include a WWW-Authenticate header.'},
  {code:403,name:'Forbidden',cat:'4xx',desc:'The server understood the request but refuses to authorize it. Authentication will not help. Access denied.'},
  {code:404,name:'Not Found',cat:'4xx',desc:'The requested resource could not be found. The most well-known HTTP error code.'},
  {code:405,name:'Method Not Allowed',cat:'4xx',desc:'The HTTP method is not supported for the requested resource. E.g., POST to a read-only resource.'},
  {code:406,name:'Not Acceptable',cat:'4xx',desc:'The server cannot produce a response matching the Accept headers sent by the client.'},
  {code:408,name:'Request Timeout',cat:'4xx',desc:'The server timed out waiting for the request. The client may retry without modifications.'},
  {code:409,name:'Conflict',cat:'4xx',desc:'The request conflicts with the current state of the server. Common with concurrent updates or version conflicts.'},
  {code:410,name:'Gone',cat:'4xx',desc:'The resource is no longer available and will not be available again. Like 404 but permanent.'},
  {code:413,name:'Payload Too Large',cat:'4xx',desc:'The request body is larger than the server is willing to process. Check upload size limits.'},
  {code:414,name:'URI Too Long',cat:'4xx',desc:'The request URI is longer than the server can interpret. Usually from too many query parameters.'},
  {code:415,name:'Unsupported Media Type',cat:'4xx',desc:'The media type of the request body is not supported. Check the Content-Type header.'},
  {code:418,name:"I'm a Teapot",cat:'4xx',desc:'An April Fools\' joke from RFC 2324. The server refuses to brew coffee because it is a teapot.'},
  {code:422,name:'Unprocessable Entity',cat:'4xx',desc:'The request is well-formed but semantically incorrect. Common for validation errors in APIs.'},
  {code:429,name:'Too Many Requests',cat:'4xx',desc:'The user has sent too many requests in a given amount of time (rate limiting). Check Retry-After header.'},
  {code:451,name:'Unavailable For Legal Reasons',cat:'4xx',desc:'The resource is unavailable due to legal demands. Named after Fahrenheit 451.'},
  // 5xx Server Error
  {code:500,name:'Internal Server Error',cat:'5xx',desc:'A generic server error. Something went wrong on the server side. Check server logs for details.'},
  {code:501,name:'Not Implemented',cat:'5xx',desc:'The server does not support the functionality required to fulfill the request.'},
  {code:502,name:'Bad Gateway',cat:'5xx',desc:'The server received an invalid response from an upstream server. Common with reverse proxies and load balancers.'},
  {code:503,name:'Service Unavailable',cat:'5xx',desc:'The server is temporarily unable to handle the request. Usually due to maintenance or overload.'},
  {code:504,name:'Gateway Timeout',cat:'5xx',desc:'The server did not receive a timely response from an upstream server. Similar to 502 but for timeouts.'},
  {code:507,name:'Insufficient Storage',cat:'5xx',desc:'The server cannot store the representation needed to complete the request (WebDAV).'},
  {code:508,name:'Loop Detected',cat:'5xx',desc:'The server detected an infinite loop while processing the request (WebDAV).'},
];

const CATS=[
  {id:'all',label:'All',color:'#4da6ff',bg:'#1a2744'},
  {id:'1xx',label:'1xx Info',color:'#8b8bef',bg:'#1a1a3a'},
  {id:'2xx',label:'2xx Success',color:'#10b981',bg:'#0d2818'},
  {id:'3xx',label:'3xx Redirect',color:'#f59e0b',bg:'#1a1a00'},
  {id:'4xx',label:'4xx Client',color:'#ef4444',bg:'#2d0a0a'},
  {id:'5xx',label:'5xx Server',color:'#ec4899',bg:'#2d0a1a'},
];

let activeCat='all';

function renderFilters(){
  document.getElementById('filters').innerHTML=CATS.map(c=>{
    const count=c.id==='all'?CODES.length:CODES.filter(x=>x.cat===c.id).length;
    const isActive=c.id===activeCat;
    return`<button class="filter-btn${isActive?' active':''}" style="--fc:${c.color};--fb:${c.bg}" onclick="setCat('${c.id}')">${c.label} (${count})</button>`;
  }).join('');
}

function setCat(id){activeCat=id;renderFilters();filter()}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=CODES.filter(c=>{
    const matchCat=activeCat==='all'||c.cat===activeCat;
    const matchQ=!q||String(c.code).includes(q)||c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  document.getElementById('count').textContent=`${filtered.length} status code${filtered.length!==1?'s':''}`;
  document.getElementById('list').innerHTML=filtered.map(c=>`
    <div class="code-card c${c.cat}" onclick="this.classList.toggle('expanded')">
      <div class="code-num">${c.code}</div>
      <div class="code-info">
        <div class="code-name">${c.name}</div>
        <div class="code-desc">${c.desc}</div>
        <span class="code-tag">${c.cat.toUpperCase()}</span>
      </div>
    </div>
  `).join('')||'<div style="text-align:center;color:#555;padding:40px">No matching status codes.</div>';
}

renderFilters();
filter();
</script>
