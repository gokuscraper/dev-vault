<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
let mode='yaml2json';

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='yaml2json'?0:1)));
  document.getElementById('inputLabel').textContent=m==='yaml2json'?'YAML Input':'JSON Input';
  document.getElementById('outputLabel').textContent=m==='yaml2json'?'JSON Output':'YAML Output';
  document.getElementById('input').placeholder=m==='yaml2json'?'Paste YAML here...':'Paste JSON here...';
}

function convert(){
  const input=document.getElementById('input').value.trim();
  if(!input){return}
  const errBox=document.getElementById('errorBox');
  errBox.style.display='none';

  try{
    let result;
    if(mode==='yaml2json'){
      const obj=jsyaml.load(input);
      const indentVal=document.getElementById('jsonIndent').value;
      const indent=indentVal==='\t'?'\t':indentVal==='0'?undefined:+indentVal;
      result=JSON.stringify(obj,null,indent);
    }else{
      const obj=JSON.parse(input);
      const yamlInd=+document.getElementById('yamlIndent').value;
      result=jsyaml.dump(obj,{indent:yamlInd,lineWidth:-1,noRefs:true,sortKeys:false});
    }
    document.getElementById('output').value=result;
    showStats(input,result);
  }catch(e){
    errBox.textContent=T("jtcpre_error")+e.message;
    errBox.style.display='block';
    document.getElementById('output').value='';
  }
}

function showStats(input,output){
  const inLines=input.split('\n').length;
  const outLines=output.split('\n').length;
  document.getElementById('stats').innerHTML=[
    {num:inLines,lbl:'Input Lines'},{num:outLines,lbl:'Output Lines'},
    {num:formatBytes(new Blob([input]).size),lbl:'Input Size'},
    {num:formatBytes(new Blob([output]).size),lbl:'Output Size'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function formatBytes(b){if(b<1024)return b+' B';return(b/1024).toFixed(1)+' KB'}

function copyOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  navigator.clipboard.writeText(v);
  showToast('Copied!');
}

function downloadOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  const ext=mode==='yaml2json'?'json':'yaml';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([v],{type:'text/plain'}));
  a.download='converted.'+ext;a.click();
  URL.revokeObjectURL(a.href);
}

function swap(){
  const out=document.getElementById('output').value;
  document.getElementById('input').value=out;
  document.getElementById('output').value='';
  setMode(mode==='yaml2json'?'json2yaml':'yaml2json');
  document.getElementById('errorBox').style.display='none';
}

function clearAll(){
  document.getElementById('input').value='';
  document.getElementById('output').value='';
  document.getElementById('stats').innerHTML='';
  document.getElementById('errorBox').style.display='none';
}

function loadSample(){
  if(mode==='yaml2json'){
    document.getElementById('input').value=`# Docker Compose example
version: "3.8"
services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html
    environment:
      NODE_ENV: production
      DEBUG: false
    depends_on:
      - api
  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/app
    restart: unless-stopped
  db:
    image: postgres:16
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app
volumes:
  db_data:`;
  }else{
    document.getElementById('input').value=JSON.stringify({
      version:"3.8",
      services:{
        web:{image:"nginx:alpine",ports:["80:80"],environment:{NODE_ENV:"production"}},
        api:{build:"./api",ports:["3000:3000"],restart:"unless-stopped"},
        db:{image:"postgres:16",environment:{POSTGRES_USER:"user",POSTGRES_DB:"app"}}
      }
    },null,2);
  }
  convert();
}

function showToast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

document.getElementById('input').addEventListener('input',()=>{
  const v=document.getElementById('input').value.trim();
  if(v.length>5)convert();
});
</script>
