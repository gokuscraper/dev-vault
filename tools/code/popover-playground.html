<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --text:#e6e6e6;--text2:#999;--accent:#3b82f6;--accent-hover:#2563eb;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

header{text-align:center;padding:2.5rem 1rem 1.5rem;border-bottom:1px solid var(--border)}
header h1{font-size:1.75rem;font-weight:700;letter-spacing:-.02em}
header h1 span{color:var(--accent)}
header p{color:var(--text2);margin-top:.35rem;font-size:.95rem}

.support-bar{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.75rem;font-size:.85rem}
.support-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.support-dot.ok{background:var(--green)}.support-dot.no{background:var(--red)}.support-dot.partial{background:var(--yellow)}

.container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* Preset tabs */
.presets{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.preset-btn{
  padding:.5rem 1rem;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;font-size:.85rem;
  transition:all .15s
}
.preset-btn:hover{border-color:var(--accent);color:var(--text)}
.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:768px){.layout{grid-template-columns:1fr}}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;color:var(--text2)
}

/* Controls panel */
.controls{padding:1rem;display:flex;flex-direction:column;gap:1rem}
.control-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.35rem;font-weight:500}
.control-group select,.control-group input[type=text]{
  width:100%;padding:.45rem .6rem;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:.85rem;outline:none
}
.control-group select:focus,.control-group input:focus{border-color:var(--accent)}
.control-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

/* Demo area */
.demo-area{
  min-height:320px;padding:2rem;display:flex;align-items:center;justify-content:center;
  position:relative;background:var(--surface2)
}
.demo-area [popover]{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);padding:1rem 1.25rem;font-size:.9rem;box-shadow:0 8px 32px rgba(0,0,0,.5);
  max-width:320px
}
.demo-area [popover]::backdrop{background:rgba(0,0,0,.4)}

.trigger-btn{
  padding:.6rem 1.25rem;border-radius:var(--radius);border:1px solid var(--accent);
  background:var(--accent);color:#fff;cursor:pointer;font-size:.9rem;font-weight:500;
  transition:background .15s
}
.trigger-btn:hover{background:var(--accent-hover)}

/* Popover-specific styles */
.tooltip-pop{padding:.5rem .75rem !important;font-size:.8rem !important;border-radius:6px !important}
.menu-pop{padding:.25rem 0 !important;min-width:180px}
.menu-pop .menu-item{
  display:block;width:100%;padding:.5rem 1rem;border:none;background:none;color:var(--text);
  text-align:left;cursor:pointer;font-size:.85rem;transition:background .1s
}
.menu-pop .menu-item:hover{background:var(--surface2)}
.dialog-pop{text-align:center;min-width:280px}
.dialog-pop h3{margin-bottom:.5rem;font-size:1.1rem}
.dialog-pop p{color:var(--text2);font-size:.85rem;margin-bottom:1rem}
.dialog-pop .dialog-actions{display:flex;gap:.5rem;justify-content:center}
.dialog-pop .dialog-actions button{
  padding:.4rem 1rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.85rem
}
.dialog-pop .dialog-actions .primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.dialog-pop .dialog-actions .secondary{background:var(--surface2);color:var(--text)}
.toast-pop{
  position:fixed !important;bottom:1.5rem !important;right:1.5rem !important;
  inset:auto !important;margin:0 !important;
  display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem !important;min-width:240px
}
.toast-pop .toast-icon{font-size:1.2rem}
.toast-pop .toast-text .toast-title{font-weight:600;font-size:.85rem}
.toast-pop .toast-text .toast-desc{color:var(--text2);font-size:.8rem}
.nested-outer{min-width:260px}
.nested-outer h4{margin-bottom:.5rem;font-size:.95rem}
.nested-inner{margin-top:.5rem}

/* Code view */
.code-view{position:relative}
.code-block{
  padding:1rem;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.8rem;
  line-height:1.7;overflow-x:auto;white-space:pre;color:#c9d1d9;background:#0d1117;
  min-height:200px;max-height:420px
}
.copy-btns{display:flex;gap:.35rem}
.copy-btn{
  padding:.3rem .6rem;border-radius:5px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);cursor:pointer;font-size:.75rem;transition:all .15s
}
.copy-btn:hover{border-color:var(--accent);color:var(--text)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}

.try-btn{
  display:block;margin:1.5rem auto 0;padding:.6rem 2rem;border-radius:var(--radius);
  border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;
  font-size:.9rem;font-weight:500;transition:all .15s
}
.try-btn:hover{background:var(--accent);color:#fff}

/* Syntax highlighting */
.hl-tag{color:#7ee787}.hl-attr{color:#79c0ff}.hl-val{color:#a5d6ff}
.hl-comment{color:#8b949e;font-style:italic}.hl-prop{color:#d2a8ff}.hl-sel{color:#ffa657}

footer{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:.8rem;border-top:1px solid var(--border)}
</style>
</head>

  txtPop.textContent = hasPopover ? 'Popover API supported' : 'Popover API not supported';

          <div popover="auto" id="tooltip-pop" class="tooltip-pop">This is a native HTML popover tooltip</div>`;

        const pop = area.querySelector('#tooltip-pop');

}`
    },
    {
      name: 'Nested',
      desc: 'Popovers inside popovers',
      type: 'auto', action: 'toggle', id: 'nested-outer', btnText: 'Open Outer',
      content: 'nested',
      buildDemo(area) {
        area.innerHTML = `
          <button class="trigger-btn" popovertarget="nested-outer" popovertargetaction="toggle" ti="btn_open_outer" ti="btn_open_outer_2">Open Outer</button>
          <div popover="auto" id="nested-outer" class="nested-outer">
            <h4>Outer Popover</h4>
            <p style="color:#999;font-size:.85rem;margin-bottom:.75rem">This popover contains another popover inside it.</p>
            <button class="trigger-btn" style="font-size:.8rem;padding:.4rem .8rem" popovertarget="nested-inner" popovertargetaction="toggle" ti="btn_open_inner" ti="btn_open_inner_2">Open Inner</button>
            <div popover="auto" id="nested-inner" class="nested-inner" style="padding:1rem">
              <p style="font-size:.85rem">I am nested inside the outer popover!</p>
              <p style="color:#999;font-size:.8rem;margin-top:.35rem">Click outside to close both, or close me first.</p>
            </div>
          </div>`;
      },
      html: `<!-- Nested Popovers -->
<button popovertarget="nested-outer">
  Open Outer
</button>

<div popover="auto" id="nested-outer"
     class="outer-popover">
  <h4>Outer Popover</h4>
  <p>This popover contains another
     popover inside it.</p>

  <button popovertarget="nested-inner">
    Open Inner
  </button>

  <div popover="auto" id="nested-inner"
       class="inner-popover">
    <p>I am nested inside the outer
       popover!</p>
    <p class="hint">Click outside to close
       both, or close me first.</p>
  </div>
</div>`,
      css: `.outer-popover {
  min-width: 260px;
  padding: 1rem 1.25rem;
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
}

.outer-popover h4 {
  margin-bottom: .5rem;
}

.outer-popover p {
  color: #999;
  font-size: .85rem;
  margin-bottom: .75rem;
}

.inner-popover {
  padding: 1rem;
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
}

.hint {
  color: #999;
  font-size: .8rem;
  margin-top: .35rem;
}`
    }
  ];

  // Custom preset (controls-driven)
  function getCustomPreset() {
    const type = document.getElementById('ctrlType').value;
    const action = document.getElementById('ctrlAction').value;
    const id = document.getElementById('ctrlId').value || 'my-popover';
    const btnText = document.getElementById('ctrlBtnText').value || 'Open';
    const content = document.getElementById('ctrlContent').value || 'Popover content';
    return {
      html: `<!-- Custom Popover -->
<button popovertarget="${id}"
        popovertargetaction="${action}" ti="btn_btntext" ti="btn_btntext_2">
  ${btnText}
</button>

<div popover="${type}" id="${id}">
  ${content}
</div>`,
      css: `[popover] {
  padding: 1rem 1.25rem;
  background: #141414;
  color: #e6e6e6;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  max-width: 320px;
}

[popover]::backdrop {
  background: rgba(0,0,0,.4);
}`,
      buildDemo(area) {
        // Remove old popovers from previous custom demos
        area.innerHTML = '';
        const safeId = id.replace(/[^a-zA-Z0-9_-]/g, '');
        area.innerHTML = `
          <button class="trigger-btn" popovertarget="${safeId}" popovertargetaction="${action}">${btnText}</button>
          <div popover="${type}" id="${safeId}">${content}</div>`;
        if (type === 'manual') {
          const pop = area.querySelector(`#${safeId}`);
          const closeBtn = document.createElement('button');
          closeBtn.textContent=T("jtc_close");
          closeBtn.style.cssText = 'margin-top:.75rem;padding:.3rem .8rem;border-radius:6px;border:1px solid #2a2a2a;background:#1e1e1e;color:#e6e6e6;cursor:pointer;font-size:.8rem;display:block';
          closeBtn.addEventListener('click', () => { try { pop.hidePopover(); } catch(e){} });
          pop.appendChild(closeBtn);
        }
      }
    };
  }

  // Render preset bar
  const presetBar = document.getElementById('presetBar');
  presets.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (i === 0 ? ' active' : '');
    btn.textContent = p.name;
    btn.title = p.desc;
    btn.addEventListener('click', () => selectPreset(i));
    presetBar.appendChild(btn);
  });
  const customBtn = document.createElement('button');
  customBtn.className = 'preset-btn';
  customBtn.textContent=T("jtc_custom");
  customBtn.title = 'Use controls to configure';
  customBtn.addEventListener('click', () => selectPreset(-1));
  presetBar.appendChild(customBtn);

  let activePreset = 0;

  function selectPreset(idx) {
    activePreset = idx;
    presetBar.querySelectorAll('.preset-btn').forEach((b, i) => {
      if (idx === -1) {
        b.classList.toggle('active', i === presets.length);
      } else {
        b.classList.toggle('active', i === idx);
      }
    });
    render();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlight(code) {
    // Simple syntax highlighting
    let out = escapeHtml(code);
    // Comments
    out = out.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-comment">$1</span>');
    out = out.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="hl-comment">$1</span>');
    out = out.replace(/(\/\/.*)/g, '<span class="hl-comment">$1</span>');
    // HTML tags
    out = out.replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="hl-tag">$2</span>');
    // Attributes
    out = out.replace(/\b([\w-]+)(=)(&quot;|&#39;)/g, '<span class="hl-attr">$1</span>$2$3');
    // CSS selectors (lines starting with . # or element)
    out = out.replace(/^(\s*)([\.\#\[\w][^\{]*?)(\{)/gm, '$1<span class="hl-sel">$2</span>$3');
    // CSS properties
    out = out.replace(/^\s*([\w-]+)\s*:/gm, function(m, p) {
      return m.replace(p, '<span class="hl-prop">' + p + '</span>');
    });
    return out;
  }

  function render() {
    const area = document.getElementById('demoArea');
    const codeBlock = document.getElementById('codeBlock');

    let data;
    if (activePreset === -1) {
      data = getCustomPreset();
    } else {
      data = presets[activePreset];
    }

    data.buildDemo(area);

    const fullCode = (data.html || '') + '\n\n<style>\n' + (data.css || '') + '\n</style>';
    codeBlock.innerHTML = highlight(fullCode);

    // Store for copy
    codeBlock.dataset.html = data.html || '';
    codeBlock.dataset.css = data.css || '';
    codeBlock.dataset.all = fullCode;
  }

  // Control changes trigger custom preset
  ['ctrlType','ctrlAction','ctrlId','ctrlBtnText','ctrlContent'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      selectPreset(-1);
    });
  });

  // Try button
  document.getElementById('tryBtn').addEventListener('click', () => {
    const area = document.getElementById('demoArea');
    const btn = area.querySelector('[popovertarget], .trigger-btn');
    if (btn) btn.click();
  });

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.target;
      const block = document.getElementById('codeBlock');
      const text = block.dataset[target] || '';
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        const orig = btn.textContent;
        btn.textContent=T("jtc_copied");
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1500);
      });
    });
  });

  // Initial render
  render();
})();
</script>
