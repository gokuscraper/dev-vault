<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-surface: #141414;
  --bg-elevated: #1e1e1e;
  --bg-hover: #282828;
  --text: #e6e6e6;
  --text-dim: #888;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --border: #2a2a2a;
  --radius: 8px;
  --transition-duration: 300ms;
  --transition-easing: ease;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}

header {
  text-align: center;
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

header h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}

header h1 span { color: var(--accent); }

header p {
  color: var(--text-dim);
  font-size: 14px;
  max-width: 560px;
  margin: 0 auto;
}

.support-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.support-banner.supported {
  background: #052e16;
  border-color: #166534;
  color: #4ade80;
}

.support-banner.unsupported {
  background: #451a03;
  border-color: #92400e;
  color: #fbbf24;
}

.support-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.supported .support-dot { background: #4ade80; }
.unsupported .support-dot { background: #fbbf24; }

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
}

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
}

.sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.panel-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.control-group {
  margin-bottom: 14px;
}

.control-group:last-child { margin-bottom: 0; }

.control-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--text);
}

.control-value {
  color: var(--accent);
  font-family: 'SF Mono', 'Cascadia Code', monospace;
  font-size: 12px;
}

input[type="range"] {
  width: 100%;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

select, button {
  font-family: inherit;
  font-size: 13px;
}

select {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  outline: none;
  cursor: pointer;
}

select:focus { border-color: var(--accent); }

.preset-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.preset-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, border-color 0.15s;
}

.preset-btn:hover {
  background: var(--bg-hover);
  border-color: #3a3a3a;
}

.preset-btn.active {
  border-color: var(--accent);
  background: #1e293b;
}

.preset-icon {
  font-size: 18px;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

.preset-info { flex: 1; min-width: 0; }

.preset-name {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
}

.preset-desc {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.3;
}

.main-area {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.toolbar-btn {
  padding: 7px 14px;
  background: var(--bg-surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar-btn:hover {
  background: var(--bg-hover);
  border-color: #3a3a3a;
}

.toolbar-btn.active {
  background: #7f1d1d;
  border-color: #dc2626;
  color: #fca5a5;
}

.toolbar-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.toolbar-btn.primary:hover {
  background: var(--accent-hover);
}

.toolbar-spacer { flex: 1; }

.demo-area {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 400px;
  position: relative;
  overflow: hidden;
}

.demo-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
  text-align: center;
}

/* Card Expand Preset */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  padding: 20px;
}

.demo-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: transform 0.15s;
}

.demo-card:hover { transform: translateY(-2px); }

.card-color {
  width: 100%;
  height: 80px;
  border-radius: 6px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 12px;
  color: var(--text-dim);
}

.card-expanded {
  position: absolute;
  inset: 0;
  background: var(--bg-surface);
  padding: 32px;
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.card-expanded .card-color {
  height: 200px;
  margin-bottom: 20px;
}

.card-expanded .card-title {
  font-size: 22px;
  margin-bottom: 8px;
}

.card-expanded .card-sub {
  font-size: 14px;
  line-height: 1.6;
}

.card-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* List Reorder Preset */
.list-container {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
}

.list-rank {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.list-bar {
  height: 6px;
  border-radius: 3px;
  background: var(--accent);
  opacity: 0.4;
}

/* Theme Toggle Preset */
.theme-demo {
  padding: 20px;
  min-height: 400px;
  transition: background 0s, color 0s;
}

.theme-demo.light-mode {
  background: #fafafa;
  color: #1a1a1a;
}

.theme-demo.light-mode .theme-card {
  background: #fff;
  border-color: #e0e0e0;
  color: #1a1a1a;
}

.theme-demo.light-mode .theme-card-sub { color: #666; }

.theme-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.theme-header h3 { font-size: 18px; }

.theme-toggle-btn {
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
}

.theme-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.theme-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.theme-card h4 { font-size: 14px; margin-bottom: 4px; }
.theme-card-sub { font-size: 12px; color: var(--text-dim); }

/* Image Gallery Preset */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  padding: 20px;
}

.gallery-thumb {
  aspect-ratio: 1;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
}

.gallery-thumb:hover { transform: scale(1.03); }

.gallery-thumb-label {
  position: absolute;
  bottom: 8px;
  left: 8px;
  font-size: 11px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 2px 8px;
  border-radius: 4px;
}

.gallery-full {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.9);
  z-index: 10;
  cursor: pointer;
  padding: 32px;
}

.gallery-full-img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 8px;
}

.gallery-full-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* Tab Switch Preset */
.tab-demo { padding: 20px; }

.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  background: var(--bg-elevated);
  padding: 4px;
  border-radius: 8px;
}

.tab-btn {
  flex: 1;
  padding: 8px 16px;
  background: transparent;
  color: var(--text-dim);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: color 0.15s;
}

.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

.tab-content {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  min-height: 280px;
}

.tab-content h3 { font-size: 18px; margin-bottom: 12px; }
.tab-content p { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 12px; }

.tab-content .stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 12px;
}

.stat-box {
  text-align: center;
  padding: 16px;
  background: var(--bg-surface);
  border-radius: 6px;
}

.stat-num {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Code View */
.code-panel {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.code-tabs {
  display: flex;
  gap: 4px;
}

.code-tab {
  padding: 4px 12px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}

.code-tab.active {
  background: var(--bg-elevated);
  color: var(--text);
  border-color: var(--border);
}

.copy-btn {
  padding: 4px 12px;
  background: var(--bg-elevated);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: color 0.15s, border-color 0.15s;
}

.copy-btn:hover {
  color: var(--text);
  border-color: #3a3a3a;
}

.code-body {
  padding: 16px;
  overflow-x: auto;
  max-height: 320px;
  overflow-y: auto;
}

.code-body pre {
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: #c9d1d9;
  white-space: pre;
  tab-size: 2;
}

.code-body .kw { color: #ff7b72; }
.code-body .fn { color: #d2a8ff; }
.code-body .str { color: #a5d6ff; }
.code-body .cm { color: #8b949e; }
.code-body .prop { color: #79c0ff; }
.code-body .num { color: #ffa657; }

/* Slow-motion indicator */
.slowmo-indicator {
  position: absolute;
  top: 12px;
  left: 12px;
  background: #dc2626;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 4px;
  z-index: 20;
  display: none;
  align-items: center;
  gap: 6px;
  animation: pulse-rec 1.2s infinite;
}

.slowmo-indicator.visible { display: flex; }

@keyframes pulse-rec {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.rec-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #fff;
}

footer {
  text-align: center;
  padding: 24px 0;
  color: var(--text-dim);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 24px;
}

footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* View Transition Overrides */
::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: var(--transition-duration);
  animation-timing-function: var(--transition-easing);
}

::view-transition-old(demo-content),
::view-transition-new(demo-content) {
  animation-duration: var(--transition-duration);
  animation-timing-function: var(--transition-easing);
}

::view-transition-old(gallery-img),
::view-transition-new(gallery-img) {
  animation-duration: var(--transition-duration);
  animation-timing-function: var(--transition-easing);
}

/* Custom animations */
@keyframes vt-fade-out { from { opacity: 1; } to { opacity: 0; } }
@keyframes vt-fade-in { from { opacity: 0; } to { opacity: 1; } }

@keyframes vt-slide-out { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30px); opacity: 0; } }
@keyframes vt-slide-in { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@keyframes vt-scale-out { from { transform: scale(1); opacity: 1; } to { transform: scale(0.9); opacity: 0; } }
@keyframes vt-scale-in { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }

@keyframes vt-morph-out { from { transform: scale(1) rotate(0); opacity: 1; } to { transform: scale(0.95) rotate(-1deg); opacity: 0; } }
@keyframes vt-morph-in { from { transform: scale(1.05) rotate(1deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
</style>
</head>
<body>


<div class="container" style="position:relative">
  <header>
    <h1><span>View Transitions</span> API Playground</h1>
    <p>Experiment with the View Transitions API. Click elements in the demo to trigger smooth animated transitions between DOM states.</p>
  </header>

  <div id="supportBanner" class="support-banner">
    <div class="support-dot"></div>
    <span id="supportText"></span>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">Controls</div>

        <div class="control-group">
          <div class="control-label">
            <span>Duration</span>
            <span class="control-value" id="durationVal">300ms</span>
          </div>
          <input type="range" id="duration" min="100" max="2000" step="50" value="300">
        </div>

        <div class="control-group">
          <div class="control-label"><span>Easing</span></div>
          <select id="easing">
            <option value="ease">ease</option>
            <option value="ease-in-out">ease-in-out</option>
            <option value="cubic-bezier(0.4, 0, 0.2, 1)">cubic-bezier(0.4, 0, 0.2, 1)</option>
            <option value="linear(0, 0.5 25%, 1 50%, 0.5 75%, 1)">spring (linear())</option>
          </select>
        </div>

        <div class="control-group">
          <div class="control-label"><span>Animation</span></div>
          <select id="animation">
            <option value="fade">Fade</option>
            <option value="slide">Slide</option>
            <option value="scale">Scale</option>
            <option value="morph">Morph</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Presets</div>
        <div class="preset-list">
          <button class="preset-btn active" data-preset="card-expand">
            <span class="preset-icon">&#9632;</span>
            <div class="preset-info">
              <div class="preset-name">Card Expand</div>
              <div class="preset-desc">Click card to morph into full view</div>
            </div>
          </button>
          <button class="preset-btn" data-preset="list-reorder">
            <span class="preset-icon">&#9776;</span>
            <div class="preset-info">
              <div class="preset-name">List Reorder</div>
              <div class="preset-desc">Shuffle items with animated positions</div>
            </div>
          </button>
          <button class="preset-btn" data-preset="theme-toggle">
            <span class="preset-icon">&#9681;</span>
            <div class="preset-info">
              <div class="preset-name">Theme Toggle</div>
              <div class="preset-desc">Light/dark crossfade transition</div>
            </div>
          </button>
          <button class="preset-btn" data-preset="image-gallery">
            <span class="preset-icon">&#9733;</span>
            <div class="preset-info">
              <div class="preset-name">Image Gallery</div>
              <div class="preset-desc">Thumbnail to fullscreen morph</div>
            </div>
          </button>
          <button class="preset-btn" data-preset="tab-switch">
            <span class="preset-icon">&#9700;</span>
            <div class="preset-info">
              <div class="preset-name">Tab Switch</div>
              <div class="preset-desc">Smooth content transitions between tabs</div>
            </div>
          </button>
        </div>
      </div>
    </aside>

    <div class="main-area">
      <div class="toolbar">
        <button class="toolbar-btn primary" id="triggerBtn" ti="btn_trigger_transition">Trigger Transition</button>
        <button class="toolbar-btn" id="recordBtn">
          <span style="color:#dc2626;">&#9679;</span> Record (Slow-mo)
        </button>
        <div class="toolbar-spacer"></div>
        <button class="toolbar-btn" id="resetBtn" ti="btn_reset">Reset</button>
      </div>

      <div class="demo-area" id="demoArea">
        <div class="slowmo-indicator" id="slowmoIndicator">
          <span class="rec-dot"></span> SLOW-MO 0.25x
        </div>
      </div>

      <div class="code-panel">
        <div class="code-header">
          <div class="code-tabs">
            <button class="code-tab active" data-tab="js" ti="btn_javascript">JavaScript</button>
            <button class="code-tab" data-tab="css" ti="btn_css">CSS</button>
          </div>
          <button class="copy-btn" id="copyBtn" ti="btn_copy">Copy</button>
        </div>
        <div class="code-body">
          <pre id="codeContent"></pre>
        </div>
      </div>
    </div>
  </div>

  <footer>
  </footer>
</div>

<script>
(function() {
  'use strict';

  const hasViewTransitions = !!document.startViewTransition;
  const supportBanner = document.getElementById('supportBanner');
  const supportText = document.getElementById('supportText');

  if (hasViewTransitions) {
    supportBanner.classList.add('supported');
    supportText.textContent=T("jtc_view_transitions_api_is_s");
  } else {
    supportBanner.classList.add('unsupported');
    supportText.textContent=T("jtc_view_transitions_api_is_n");
  }

  const demoArea = document.getElementById('demoArea');
  const codeContent = document.getElementById('codeContent');
  const durationSlider = document.getElementById('duration');
  const durationVal = document.getElementById('durationVal');
  const easingSelect = document.getElementById('easing');
  const animationSelect = document.getElementById('animation');
  const triggerBtn = document.getElementById('triggerBtn');
  const recordBtn = document.getElementById('recordBtn');
  const resetBtn = document.getElementById('resetBtn');
  const copyBtn = document.getElementById('copyBtn');
  const slowmoIndicator = document.getElementById('slowmoIndicator');

  let currentPreset = 'card-expand';
  let currentCodeTab = 'js';
  let isRecording = false;
  let presetState = {};

  // Controls
  durationSlider.addEventListener('input', function() {
    durationVal.textContent = this.value + 'ms';
    applyTransitionStyles();
  });

  easingSelect.addEventListener('change', applyTransitionStyles);
  animationSelect.addEventListener('change', function() {
    applyTransitionStyles();
    updateCode();
  });

  function getDuration() {
    return parseInt(durationSlider.value);
  }

  function getEasing() {
    return easingSelect.value;
  }

  function getAnimation() {
    return animationSelect.value;
  }

  function getEffectiveDuration() {
    return isRecording ? getDuration() * 4 : getDuration();
  }

  function applyTransitionStyles() {
    const dur = getEffectiveDuration() + 'ms';
    const ease = getEasing();
    document.documentElement.style.setProperty('--transition-duration', dur);
    document.documentElement.style.setProperty('--transition-easing', ease);
    applyAnimationKeyframes();
    updateCode();
  }

  function applyAnimationKeyframes() {
    let existing = document.getElementById('vt-dynamic-styles');
    if (existing) existing.remove();

    const anim = getAnimation();
    const dur = getEffectiveDuration() + 'ms';
    const ease = getEasing();

    const style = document.createElement('style');
    style.id = 'vt-dynamic-styles';
    style.textContent = `
      ::view-transition-old(demo-content) {
        animation: vt-${anim}-out ${dur} ${ease} both;
      }
      ::view-transition-new(demo-content) {
        animation: vt-${anim}-in ${dur} ${ease} both;
      }
      ::view-transition-old(gallery-img) {
        animation: vt-${anim}-out ${dur} ${ease} both;
      }
      ::view-transition-new(gallery-img) {
        animation: vt-${anim}-in ${dur} ${ease} both;
      }
    `;
    document.head.appendChild(style);
  }

  // Transition wrapper
  function doTransition(callback) {
    applyTransitionStyles();
    if (hasViewTransitions) {
      document.startViewTransition(callback);
    } else {
      callback();
    }
  }

  // Record mode
  recordBtn.addEventListener('click', function() {
    isRecording = !isRecording;
    this.classList.toggle('active', isRecording);
    slowmoIndicator.classList.toggle('visible', isRecording);
    applyTransitionStyles();
  });

  // Reset
  resetBtn.addEventListener('click', function() {
    presetState = {};
    loadPreset(currentPreset);
  });

  // Presets
  document.querySelectorAll('.preset-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentPreset = this.dataset.preset;
      presetState = {};
      loadPreset(currentPreset);
    });
  });

  // Code tabs
  document.querySelectorAll('.code-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.code-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentCodeTab = this.dataset.tab;
      updateCode();
    });
  });

  // Copy
  copyBtn.addEventListener('click', function() {
    const text = codeContent.textContent;
    navigator.clipboard.writeText(text).then(function() {
      copyBtn.textContent=T("jtc_copied");
      setTimeout(function() { copyBtn.textContent=T("jtc_copy"); }, 1500);
    });
  });

  // Trigger button
  triggerBtn.addEventListener('click', function() {
    triggerPreset(currentPreset);
  });

  // ============ PRESETS ============

  const cardData = [
    { color: '#3b82f6', title: 'Blue Horizon', desc: 'A rich cobalt that evokes open skies and infinite possibility.' },
    { color: '#8b5cf6', title: 'Violet Dream', desc: 'Deep purple tones that convey creativity and imagination.' },
    { color: '#ec4899', title: 'Rose Quartz', desc: 'Warm pink that radiates softness and gentle energy.' },
    { color: '#f59e0b', title: 'Amber Glow', desc: 'Golden warmth reminiscent of late afternoon sunlight.' },
    { color: '#10b981', title: 'Emerald Isle', desc: 'Lush green that speaks of growth and renewal.' },
    { color: '#06b6d4', title: 'Cyan Pulse', desc: 'Electric blue-green bringing modern, digital energy.' },
  ];

  const listData = [
    { name: 'React', score: 94 },
    { name: 'Vue', score: 87 },
    { name: 'Svelte', score: 82 },
    { name: 'Angular', score: 76 },
    { name: 'Solid', score: 71 },
    { name: 'Preact', score: 68 },
    { name: 'Lit', score: 63 },
  ];

  const galleryColors = [
    { bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', label: 'Aurora' },
    { bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)', label: 'Sunset' },
    { bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)', label: 'Ocean' },
    { bg: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)', label: 'Forest' },
    { bg: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', label: 'Peach' },
    { bg: 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)', label: 'Lavender' },
    { bg: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)', label: 'Sand' },
    { bg: 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)', label: 'Sky' },
  ];

  const tabData = [
    {
      title: 'Overview',
      content: '<h3 ti="h3_view_transitions_api">View Transitions API</h3><p>The View Transitions API provides a mechanism for easily creating animated transitions between different DOM states, while also updating the DOM contents in a single step.</p><p>It works by capturing snapshots of the old and new states, then animating between them using CSS animations under the hood.</p>'
    },
    {
      title: 'Usage',
      content: '<h3 ti="h3_how_to_use">How to Use</h3><p>Call <code style="background:#1e1e1e;padding:2px 6px;border-radius:3px;font-size:13px;">document.startViewTransition(callback)</code> with a callback that updates the DOM. The browser handles snapshotting and animation automatically.</p><p>Use the <code style="background:#1e1e1e;padding:2px 6px;border-radius:3px;font-size:13px;">view-transition-name</code> CSS property to create named transitions for individual elements.</p>'
    },
    {
      title: 'Stats',
      content: '<h3 ti="h3_browser_support">Browser Support</h3><div class="stat-grid"><div class="stat-box"><div class="stat-num">111+</div><div class="stat-label">Chrome</div></div><div class="stat-box"><div class="stat-num">111+</div><div class="stat-label">Edge</div></div><div class="stat-box"><div class="stat-num">--</div><div class="stat-label">Firefox</div></div></div><p style="margin-top:16px;">Same-document view transitions shipped in Chrome and Edge 111. Cross-document transitions are available in Chrome 126+.</p>'
    }
  ];

  function loadPreset(preset) {
    switch (preset) {
      case 'card-expand': loadCardExpand(); break;
      case 'list-reorder': loadListReorder(); break;
      case 'theme-toggle': loadThemeToggle(); break;
      case 'image-gallery': loadImageGallery(); break;
      case 'tab-switch': loadTabSwitch(); break;
    }
    updateCode();
  }

  function triggerPreset(preset) {
    switch (preset) {
      case 'card-expand':
        if (presetState.expanded) closeCard();
        else if (cardData.length > 0) expandCard(0);
        break;
      case 'list-reorder': shuffleList(); break;
      case 'theme-toggle': toggleTheme(); break;
      case 'image-gallery':
        if (presetState.galleryOpen != null) closeGallery();
        else openGallery(0);
        break;
      case 'tab-switch':
        var next = ((presetState.activeTab || 0) + 1) % tabData.length;
        switchTab(next);
        break;
    }
  }

  // --- Card Expand ---
  function loadCardExpand() {
    presetState.expanded = false;
    var html = '<div class="card-grid" style="view-transition-name:demo-content;">';
    cardData.forEach(function(card, i) {
      html += '<div class="demo-card" data-index="' + i + '">' +
        '<div class="card-color" style="background:' + card.color + ';"></div>' +
        '<div class="card-title">' + card.title + '</div>' +
        '<div class="card-sub">Click to expand</div></div>';
    });
    html += '</div>';
    demoArea.innerHTML = html + slowmoHTML();
    demoArea.querySelectorAll('.demo-card').forEach(function(el) {
      el.addEventListener('click', function() {
        expandCard(parseInt(this.dataset.index));
      });
    });
  }

  function expandCard(index) {
    var card = cardData[index];
    doTransition(function() {
      presetState.expanded = true;
      presetState.expandedIndex = index;
      demoArea.innerHTML = '<div class="card-expanded" style="view-transition-name:demo-content;">' +
        '<button class="card-close" id="cardClose">&times;</button>' +
        '<div class="card-color" style="background:' + card.color + ';"></div>' +
        '<div class="card-title">' + card.title + '</div>' +
        '<div class="card-sub">' + card.desc + '</div></div>' + slowmoHTML();
      document.getElementById('cardClose').addEventListener('click', closeCard);
    });
  }

  function closeCard() {
    doTransition(function() {
      presetState.expanded = false;
      loadCardExpand();
    });
  }

  // --- List Reorder ---
  function loadListReorder() {
    presetState.listOrder = listData.map(function(_, i) { return i; });
    renderList();
  }

  function renderList() {
    var order = presetState.listOrder;
    var html = '<div class="list-container" style="view-transition-name:demo-content;">';
    order.forEach(function(idx, rank) {
      var item = listData[idx];
      html += '<div class="list-item" style="view-transition-name:list-item-' + idx + ';">' +
        '<div class="list-rank">' + (rank + 1) + '</div>' +
        '<span style="flex:1;">' + item.name + '</span>' +
        '<div class="list-bar" style="width:' + item.score + 'px;"></div>' +
        '<span style="color:var(--text-dim);font-size:12px;width:30px;text-align:right;">' + item.score + '</span></div>';
    });
    html += '</div>';
    demoArea.innerHTML = html + slowmoHTML();
  }

  function shuffleList() {
    var arr = presetState.listOrder.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    doTransition(function() {
      presetState.listOrder = arr;
      renderList();
    });
  }

  // --- Theme Toggle ---
  function loadThemeToggle() {
    presetState.lightMode = false;
    renderTheme();

  function renderTheme() {
    var light = presetState.lightMode;

      '<button class="theme-toggle-btn" id="themeBtn" ti="btn_switch_to_light_dark_ligh">Switch to ' + (light ? 'Dark' : 'Light') + '</button></div>' +

      html += '<div class="theme-card"><h4>Component ' + (i + 1) + '</h4>' +

    demoArea.innerHTML = html + slowmoHTML();

  function toggleTheme() {

    html += '</div>';
    demoArea.innerHTML = html + slowmoHTML();

      el.addEventListener('click', function() {

      document.getElementById('galleryClose').addEventListener('click', closeGallery);
      demoArea.querySelector('.gallery-full').addEventListener('click', function(e) {
        if (e.target === this) closeGallery();

  }

  function closeGallery() {
    doTransition(function() {
      presetState.galleryOpen = null;
      loadImageGallery();
    });
  }

  // --- Tab Switch ---
  function loadTabSwitch() {
    presetState.activeTab = 0;
    renderTabs();

  function renderTabs() {
    var active = presetState.activeTab;
    var html = '<div class="tab-demo"><div class="tab-bar">';

      html += '<button class="tab-btn' + (i === active ? ' active' : '') + '" data-index="' + i + '" ti="btn_t_title">' + t.title + '</button>';

    demoArea.innerHTML = html + slowmoHTML();

      btn.addEventListener('click', function() {
        var idx = parseInt(this.dataset.index);

          '<span class="prop">::view-transition-new</span>(root) {\n' +
          '  <span class="prop">animation-duration</span>: <span class="num">' + dur + 'ms</span>;\n' +
          '  <span class="prop">animation-timing-function</span>: ' + ease + ';\n' +
          '}\n\n' +
          '<span class="cm">/* Crossfade: old fades out, new fades in */</span>\n' +
          '<span class="prop">::view-transition-old</span>(root) {\n' +
          '  <span class="prop">animation</span>: <span class="str">fade-out</span> <span class="num">' + dur + 'ms</span> ' + ease + ';\n' +
          '}\n\n' +
          '<span class="prop">::view-transition-new</span>(root) {\n' +
          '  <span class="prop">animation</span>: <span class="str">fade-in</span> <span class="num">' + dur + 'ms</span> ' + ease + ';\n' +
          '}';
      }
    },
    'image-gallery': {
      js: function() {
        return '<span class="cm">// Image Gallery with named transitions</span>\n' +
          '<span class="kw">function</span> <span class="fn">openImage</span>(index) {\n' +
          '  <span class="kw">const</span> thumb = thumbs[index];\n\n' +
          '  <span class="cm">// Assign view-transition-name dynamically</span>\n' +
          '  thumb.<span class="prop">style</span>.<span class="prop">viewTransitionName</span> =\n' +
          '    <span class="str">`gallery-img`</span>;\n\n' +
          '  <span class="kw">if</span> (!document.<span class="fn">startViewTransition</span>) {\n' +
          '    <span class="fn">showFullscreen</span>(index);\n' +
          '    <span class="kw">return</span>;\n' +
          '  }\n\n' +
          '  <span class="kw">const</span> t = document.<span class="fn">startViewTransition</span>(() => {\n' +
          '    <span class="fn">showFullscreen</span>(index);\n' +
          '    <span class="cm">// New element also gets the same name</span>\n' +
          '    fullImg.<span class="prop">style</span>.<span class="prop">viewTransitionName</span> =\n' +
          '      <span class="str">`gallery-img`</span>;\n' +
          '  });\n' +
          '}';
      },
      css: function() {
        var dur = getDuration();
        var ease = getEasing();
        return '<span class="cm">/* Gallery: morph thumbnail to fullscreen */</span>\n' +
          '<span class="prop">::view-transition-old</span>(gallery-img),\n' +
          '<span class="prop">::view-transition-new</span>(gallery-img) {\n' +
          '  <span class="prop">animation-duration</span>: <span class="num">' + dur + 'ms</span>;\n' +
          '  <span class="prop">animation-timing-function</span>: ' + ease + ';\n' +
          '}\n\n' +
          '<span class="cm">/* The browser interpolates size + position */</span>\n' +
          '<span class="prop">::view-transition-group</span>(gallery-img) {\n' +
          '  <span class="prop">animation-duration</span>: <span class="num">' + dur + 'ms</span>;\n' +
          '  <span class="prop">animation-timing-function</span>: ' + ease + ';\n' +
          '}';
      }
    },
    'tab-switch': {
      js: function() {
        return '<span class="cm">// Tab Switch with View Transitions</span>\n' +
          '<span class="kw">let</span> activeTab = <span class="num">0</span>;\n\n' +
          '<span class="kw">function</span> <span class="fn">switchTab</span>(index) {\n' +
          '  <span class="kw">if</span> (index === activeTab) <span class="kw">return</span>;\n\n' +
          '  <span class="kw">if</span> (!document.<span class="fn">startViewTransition</span>) {\n' +
          '    activeTab = index;\n' +
          '    <span class="fn">renderContent</span>();\n' +
          '    <span class="kw">return</span>;\n' +
          '  }\n\n' +
          '  document.<span class="fn">startViewTransition</span>(() => {\n' +
          '    activeTab = index;\n' +
          '    <span class="fn">renderContent</span>();\n' +
          '  });\n' +
          '}\n\n' +
          'tabs.<span class="fn">forEach</span>((btn, i) => {\n' +
          '  btn.<span class="fn">addEventListener</span>(<span class="str">\'click\'</span>, () => {\n' +
          '    <span class="fn">switchTab</span>(i);\n' +
          '  });\n' +
          '});';
      },
      css: function() {
        var anim = getAnimation();
        var dur = getDuration();
        var ease = getEasing();
        return '<span class="cm">/* Tab content transition */</span>\n' +
          '<span class="prop">.tab-content</span> {\n' +
          '  <span class="prop">view-transition-name</span>: <span class="str">demo-content</span>;\n' +
          '}\n\n' +
          '<span class="prop">::view-transition-old</span>(demo-content) {\n' +
          '  <span class="prop">animation</span>: <span class="str">vt-' + anim + '-out</span> <span class="num">' + dur + 'ms</span> ' + ease + ' <span class="str">both</span>;\n' +
          '}\n\n' +
          '<span class="prop">::view-transition-new</span>(demo-content) {\n' +
          '  <span class="prop">animation</span>: <span class="str">vt-' + anim + '-in</span> <span class="num">' + dur + 'ms</span> ' + ease + ' <span class="str">both</span>;\n' +
          '}';
      }
    }
  };

  function updateCode() {
    var snippets = codeSnippets[currentPreset];
    if (!snippets) return;
    var fn = snippets[currentCodeTab];
    if (fn) codeContent.innerHTML = fn();
  }

  // Init
  applyTransitionStyles();
  loadPreset(currentPreset);
})();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
