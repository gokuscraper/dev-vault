<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Actions Generator — Build CI/CD Workflows Visually</title>
<meta name="description" content="Generate GitHub Actions workflow YAML visually. CI/CD for Node.js, Python, Go, Rust, Docker, Deploy. 8 templates. No signup.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:20px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.85rem;font-weight:600}
.tab.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.panel{display:none}
.panel.active{display:block}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.col{flex:1;min-width:200px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
textarea{font-family:'Fira Code',monospace;resize:vertical}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
button{padding:8px 16px;border-radius:6px;border:1px solid #333;background:#1a2744;color:#4da6ff;cursor:pointer;font-size:0.85rem;font-weight:600}
button:hover{background:#243860}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.preset{padding:6px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.78rem}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.add-btn{padding:4px 10px;font-size:0.75rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.step-item{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;padding:10px;margin-bottom:8px;position:relative}
.step-item .remove{position:absolute;top:6px;right:8px;color:#666;cursor:pointer;font-size:0.8rem}
.step-item .remove:hover{color:#f85149}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>GitHub Actions Generator</h1>
<p class="sub">Build CI/CD workflow YAML visually</p>

<div class="tabs">
<div class="tab active" onclick="showTab('build')">Build</div>
<div class="tab" onclick="showTab('templates')">Templates</div>
<div class="tab" onclick="showTab('output')">Output</div>
</div>

<div class="panel active" id="p-build">
<div class="section">
<h3>Workflow</h3>
<div class="row">
<div class="col"><label>Workflow Name</label><input id="wfName" value="CI" oninput="gen()"></div>
<div class="col"><label>Filename</label><input id="wfFile" value=".github/workflows/ci.yml" readonly style="color:#666"></div>
</div>
</div>

<div class="section">
<h3>Triggers</h3>
<div class="row">
<div class="col">
<div class="check-row"><input type="checkbox" id="tPush" checked onchange="gen()"><label for="tPush">push</label></div>
<div class="check-row"><input type="checkbox" id="tPR" checked onchange="gen()"><label for="tPR">pull_request</label></div>
<div class="check-row"><input type="checkbox" id="tSchedule" onchange="gen()"><label for="tSchedule">schedule (cron)</label></div>
<div class="check-row"><input type="checkbox" id="tDispatch" onchange="gen()"><label for="tDispatch">workflow_dispatch</label></div>
<div class="check-row"><input type="checkbox" id="tRelease" onchange="gen()"><label for="tRelease">release (published)</label></div>
</div>
<div class="col">
<label>Branches (push/PR)</label>
<input id="tBranches" value="main" oninput="gen()" placeholder="main, develop">
<div style="margin-top:8px" id="cronRow" class="hidden">
<label>Cron Expression</label>
<input id="tCron" value="0 0 * * 1" oninput="gen()" placeholder="0 0 * * 1">
</div>
</div>
</div>
</div>

<div class="section">
<h3>Jobs</h3>
<div id="jobsList"></div>
<button class="add-btn" onclick="addJob()">+ Add Job</button>
</div>
</div>

<div class="panel" id="p-templates">
<h3 style="margin-bottom:12px;color:#fff;font-size:1rem">Quick Start Templates</h3>
<div class="presets" id="templateBtns"></div>
<p style="color:#888;font-size:0.82rem;margin-top:8px">Click a template to load it into the builder. You can then customize it.</p>
</div>

<div class="panel" id="p-output">
<button onclick="gen();showTab('output')" style="margin-bottom:8px">Regenerate</button>
<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="yamlOut"></pre>
</div>
</div>

<div class="footer">
<a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a>
</div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/gitignore-gen/">.gitignore Gen</a> | <a href="https://gokuscraper.github.io/dev-vault/dockerfile-gen/">Dockerfile Gen</a> | <a href="https://gokuscraper.github.io/dev-vault/env-gen/">.env Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const TEMPLATES = {
  'Node.js CI': {
    name:'CI',triggers:{push:true,pr:true,schedule:false,dispatch:false,release:false},branches:'main',cron:'',
    jobs:[{name:'test',runsOn:'ubuntu-latest',nodeV:'20',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Setup Node.js',uses:'actions/setup-node@v4',with:'node-version: ${{ matrix.node-version }}'},
      {name:'Install',run:'npm ci'},
      {name:'Lint',run:'npm run lint --if-present'},
      {name:'Test',run:'npm test'},
    ],matrix:'node-version: [18, 20, 22]',services:'',env:'CI: true'}]
  },
  'Python CI': {
    name:'CI',triggers:{push:true,pr:true,schedule:false,dispatch:false,release:false},branches:'main',cron:'',
    jobs:[{name:'test',runsOn:'ubuntu-latest',nodeV:'',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Setup Python',uses:'actions/setup-python@v5',with:'python-version: ${{ matrix.python-version }}'},
      {name:'Install',run:'pip install -r requirements.txt'},
      {name:'Lint',run:'pip install flake8 && flake8 .'},
      {name:'Test',run:'pytest'},
    ],matrix:'python-version: ["3.10", "3.11", "3.12"]',services:'',env:''}]
  },
  'Go CI': {
    name:'CI',triggers:{push:true,pr:true,schedule:false,dispatch:false,release:false},branches:'main',cron:'',
    jobs:[{name:'test',runsOn:'ubuntu-latest',nodeV:'',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Setup Go',uses:'actions/setup-go@v5',with:'go-version: "1.22"'},
      {name:'Build',run:'go build ./...'},
      {name:'Test',run:'go test -race ./...'},
      {name:'Vet',run:'go vet ./...'},
    ],matrix:'',services:'',env:''}]
  },
  'Rust CI': {
    name:'CI',triggers:{push:true,pr:true,schedule:false,dispatch:false,release:false},branches:'main',cron:'',
    jobs:[{name:'test',runsOn:'ubuntu-latest',nodeV:'',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Setup Rust',uses:'dtolnay/rust-toolchain@stable'},
      {name:'Cache',uses:'Swatinem/rust-cache@v2'},
      {name:'Build',run:'cargo build --verbose'},
      {name:'Test',run:'cargo test --verbose'},
      {name:'Clippy',run:'cargo clippy -- -D warnings'},
    ],matrix:'',services:'',env:''}]
  },
  'Docker Build': {
    name:'Docker',triggers:{push:true,pr:false,schedule:false,dispatch:false,release:true},branches:'main',cron:'',
    jobs:[{name:'build',runsOn:'ubuntu-latest',nodeV:'',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Docker meta',uses:'docker/metadata-action@v5',with:'images: ghcr.io/${{ github.repository }}'},
      {name:'Login to GHCR',uses:'docker/login-action@v3',with:'registry: ghcr.io\nusername: ${{ github.actor }}\npassword: ${{ secrets.GITHUB_TOKEN }}'},
      {name:'Build and push',uses:'docker/build-push-action@v5',with:'context: .\npush: ${{ github.event_name != \'pull_request\' }}\ntags: ${{ steps.meta.outputs.tags }}'},
    ],matrix:'',services:'',env:''}]
  },
  'npm Publish': {
    name:'Publish',triggers:{push:false,pr:false,schedule:false,dispatch:false,release:true},branches:'main',cron:'',
    jobs:[{name:'publish',runsOn:'ubuntu-latest',nodeV:'20',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Setup Node.js',uses:'actions/setup-node@v4',with:'node-version: 20\nregistry-url: https://registry.npmjs.org'},
      {name:'Install',run:'npm ci'},
      {name:'Test',run:'npm test'},
      {name:'Publish',run:'npm publish',env:'NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}'},
    ],matrix:'',services:'',env:''}]
  },
  'Deploy Pages': {
    name:'Deploy',triggers:{push:true,pr:false,schedule:false,dispatch:false,release:false},branches:'main',cron:'',
    jobs:[{name:'deploy',runsOn:'ubuntu-latest',nodeV:'20',steps:[
      {name:'Checkout',uses:'actions/checkout@v4'},
      {name:'Setup Node.js',uses:'actions/setup-node@v4',with:'node-version: 20'},
      {name:'Install',run:'npm ci'},
      {name:'Build',run:'npm run build'},
      {name:'Deploy to Pages',uses:'peaceiris/actions-gh-pages@v4',with:'github_token: ${{ secrets.GITHUB_TOKEN }}\npublish_dir: ./dist'},
    ],matrix:'',services:'',env:''}]
  },
  'Release Drafter': {
    name:'Release',triggers:{push:true,pr:true,schedule:false,dispatch:false,release:false},branches:'main',cron:'',
    jobs:[{name:'draft',runsOn:'ubuntu-latest',nodeV:'',steps:[
      {name:'Draft Release',uses:'release-drafter/release-drafter@v6',with:'config-name: release-drafter.yml',env:'GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}'},
    ],matrix:'',services:'',env:''}]
  }
};

let jobs = [];
let currentTemplate = '';

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', el.textContent.toLowerCase().includes(t.slice(0,4))));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  if(t==='output') gen();
}

function initTemplates() {
  const c = document.getElementById('templateBtns');
  Object.keys(TEMPLATES).forEach(name => {
    const b = document.createElement('div');
    b.className = 'preset';
    b.textContent = name;
    b.onclick = () => loadTemplate(name);
    c.appendChild(b);
  });
}

function loadTemplate(name) {
  const t = TEMPLATES[name];
  if(!t) return;
  currentTemplate = name;
  document.querySelectorAll('.preset').forEach(el => el.classList.toggle('active', el.textContent===name));
  document.getElementById('wfName').value = t.name;
  document.getElementById('tPush').checked = t.triggers.push;
  document.getElementById('tPR').checked = t.triggers.pr;
  document.getElementById('tSchedule').checked = t.triggers.schedule;
  document.getElementById('tDispatch').checked = t.triggers.dispatch;
  document.getElementById('tRelease').checked = t.triggers.release;
  document.getElementById('tBranches').value = t.branches;
  document.getElementById('tCron').value = t.cron;
  jobs = JSON.parse(JSON.stringify(t.jobs));
  renderJobs();
  gen();
  showTab('build');
}

function addJob() {
  jobs.push({name:'job-'+(jobs.length+1),runsOn:'ubuntu-latest',nodeV:'',steps:[
    {name:'Checkout',uses:'actions/checkout@v4'},
  ],matrix:'',services:'',env:''});
  renderJobs();
  gen();
}

function removeJob(i) {
  jobs.splice(i,1);
  renderJobs();
  gen();
}

function addStep(ji) {
  jobs[ji].steps.push({name:'',uses:'',run:'',with:'',env:''});
  renderJobs();
  gen();
}

function removeStep(ji,si) {
  jobs[ji].steps.splice(si,1);
  renderJobs();
  gen();
}

function renderJobs() {
  const c = document.getElementById('jobsList');
  c.innerHTML = '';
  jobs.forEach((job,ji) => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.style.background = '#141414';
    div.style.border = '1px solid #2a2a2a';
    div.style.padding = '12px';
    div.style.marginBottom = '10px';
    div.innerHTML = `
      <span class="remove" onclick="removeJob(${ji})">✕</span>
      <div class="row">
        <div class="col"><label>Job Name</label><input value="${esc(job.name)}" onchange="jobs[${ji}].name=this.value;gen()"></div>
        <div class="col"><label>Runs On</label><select onchange="jobs[${ji}].runsOn=this.value;gen()">
          <option${job.runsOn==='ubuntu-latest'?' selected':''}>ubuntu-latest</option>
          <option${job.runsOn==='ubuntu-22.04'?' selected':''}>ubuntu-22.04</option>
          <option${job.runsOn==='macos-latest'?' selected':''}>macos-latest</option>
          <option${job.runsOn==='windows-latest'?' selected':''}>windows-latest</option>
        </select></div>
      </div>
      <div class="row">
        <div class="col"><label>Strategy Matrix (YAML, optional)</label><input value="${esc(job.matrix)}" onchange="jobs[${ji}].matrix=this.value;gen()" placeholder="node-version: [18, 20, 22]"></div>
      </div>
      <div class="row">
        <div class="col"><label>Job-level env (KEY: value, optional)</label><input value="${esc(job.env||'')}" onchange="jobs[${ji}].env=this.value;gen()" placeholder="CI: true"></div>
      </div>
      <label style="margin:8px 0 4px;font-size:0.8rem;color:#aaa">Steps</label>
      <div id="steps-${ji}"></div>
      <button class="add-btn" onclick="addStep(${ji})" style="margin-top:6px">+ Add Step</button>
    `;
    c.appendChild(div);
    const sc = div.querySelector(`#steps-${ji}`);
    job.steps.forEach((step,si) => {
      const sd = document.createElement('div');
      sd.className = 'step-item';
      sd.innerHTML = `
        <span class="remove" onclick="removeStep(${ji},${si})">✕</span>
        <div class="row">
          <div class="col"><label>Name</label><input value="${esc(step.name)}" onchange="jobs[${ji}].steps[${si}].name=this.value;gen()"></div>
        </div>
        <div class="row">
          <div class="col"><label>uses (action)</label><input value="${esc(step.uses||'')}" onchange="jobs[${ji}].steps[${si}].uses=this.value;gen()" placeholder="actions/checkout@v4"></div>
          <div class="col"><label>run (command)</label><input value="${esc(step.run||'')}" onchange="jobs[${ji}].steps[${si}].run=this.value;gen()" placeholder="npm test"></div>
        </div>
        <div class="row">
          <div class="col"><label>with (YAML)</label><input value="${esc(step.with||'')}" onchange="jobs[${ji}].steps[${si}].with=this.value;gen()" placeholder="node-version: 20"></div>
          <div class="col"><label>env (KEY: val)</label><input value="${esc(step.env||'')}" onchange="jobs[${ji}].steps[${si}].env=this.value;gen()" placeholder="NODE_AUTH_TOKEN: ..."></div>
        </div>
      `;
      sc.appendChild(sd);
    });
  });
  document.getElementById('cronRow').style.display = document.getElementById('tSchedule').checked ? 'block' : 'none';
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function indent(s, n) {
  const pad = '  '.repeat(n);
  return s.split('\n').map(l => pad + l).join('\n');
}

function gen() {
  const name = document.getElementById('wfName').value || 'CI';
  const push = document.getElementById('tPush').checked;
  const pr = document.getElementById('tPR').checked;
  const sched = document.getElementById('tSchedule').checked;
  const dispatch = document.getElementById('tDispatch').checked;
  const release = document.getElementById('tRelease').checked;
  const branches = document.getElementById('tBranches').value.split(',').map(b=>b.trim()).filter(Boolean);
  const cron = document.getElementById('tCron').value;

  document.getElementById('cronRow').style.display = sched ? 'block' : 'none';

  let y = `name: ${name}\n\non:\n`;
  if(push) {
    y += `  push:\n    branches: [${branches.map(b=>'"'+b+'"').join(', ')}]\n`;
  }
  if(pr) {
    y += `  pull_request:\n    branches: [${branches.map(b=>'"'+b+'"').join(', ')}]\n`;
  }
  if(sched && cron) {
    y += `  schedule:\n    - cron: '${cron}'\n`;
  }
  if(dispatch) {
    y += `  workflow_dispatch:\n`;
  }
  if(release) {
    y += `  release:\n    types: [published]\n`;
  }

  y += '\njobs:\n';
  jobs.forEach(job => {
    y += `  ${job.name}:\n`;
    y += `    runs-on: ${job.runsOn}\n`;
    if(job.matrix) {
      y += `    strategy:\n      matrix:\n`;
      job.matrix.split('\n').forEach(l => {
        if(l.trim()) y += `        ${l.trim()}\n`;
      });
    }
    if(job.env) {
      y += `    env:\n`;
      job.env.split(',').forEach(e => {
        const t = e.trim();
        if(t) y += `      ${t}\n`;
      });
    }
    y += `    steps:\n`;
    job.steps.forEach(step => {
      if(step.name) y += `      - name: ${step.name}\n`;
      else y += `      -\n`;
      if(step.uses) {
        y += `        uses: ${step.uses}\n`;
        if(step.with) {
          y += `        with:\n`;
          step.with.split('\n').forEach(l => {
            if(l.trim()) y += `          ${l.trim()}\n`;
          });
        }
      }
      if(step.run) {
        if(step.run.includes('\n') || step.run.includes('&&')) {
          y += `        run: |\n`;
          step.run.split('\n').forEach(l => { y += `          ${l}\n`; });
        } else {
          y += `        run: ${step.run}\n`;
        }
      }
      if(step.env) {
        y += `        env:\n`;
        step.env.split(',').forEach(e => {
          const t = e.trim();
          if(t) y += `          ${t}\n`;
        });
      }
    });
  });

  document.getElementById('yamlOut').textContent = y;
  document.getElementById('wfFile').value = `.github/workflows/${name.toLowerCase().replace(/\s+/g,'-')}.yml`;
}

function copyOut() {
  navigator.clipboard.writeText(document.getElementById('yamlOut').textContent);
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1500);
}

// Init
loadTemplate('Node.js CI');
initTemplates();
</script>
</body>
</html>
