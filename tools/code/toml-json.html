<body>
<div class="container">
<h1>TOML ↔ JSON</h1>
<p class="subtitle">Convert between TOML and JSON. Perfect for Cargo.toml, pyproject.toml, config files.</p>

<div class="mode-toggle">
  <button class="mode-btn active" onclick="setMode('toml2json')">TOML → JSON</button>
  <button class="mode-btn" onclick="setMode('json2toml')">JSON → TOML</button>
</div>

<div class="options">
  <div class="opt"><label>JSON indent</label><select id="jsonIndent"><option value="2">2 spaces</option><option value="4">4 spaces</option><option value="0">Minified</option></select></div>
</div>

<div class="editor">
  <div class="pane"><h3 id="inputLabel">TOML Input</h3><textarea id="input" placeholder="Paste TOML here..."></textarea></div>
  <div class="pane"><h3 id="outputLabel">JSON Output</h3><textarea id="output" readonly placeholder="Result will appear here..."></textarea></div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="btn-row">
  <button class="btn primary" onclick="convert()">Convert</button>
  <button class="btn" onclick="copyOutput()">Copy</button>
  <button class="btn" onclick="downloadOutput()">Download</button>
  <button class="btn" onclick="swap()">⇄ Swap</button>
  <button class="btn" onclick="clearAll()">Clear</button>
  <button class="btn" onclick="loadSample('cargo')">Cargo.toml</button>
  <button class="btn" onclick="loadSample('pyproject')">pyproject.toml</button>
</div>

<div class="stats" id="stats"></div>
</div>

<script>
let mode='toml2json';
let TOML=null;

// smol-toml loads as UMD — detect global
if(typeof window.TOML!=='undefined')TOML=window.TOML;
else if(typeof window.smolToml!=='undefined')TOML=window.smolToml;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='toml2json'?0:1)));
  document.getElementById('inputLabel').textContent=m==='toml2json'?'TOML Input':'JSON Input';
  document.getElementById('outputLabel').textContent=m==='toml2json'?'JSON Output':'TOML Output';
  document.getElementById('input').placeholder=m==='toml2json'?'Paste TOML here...':'Paste JSON here...';
}

// Fallback: minimal TOML parser for common cases
function parseTomlFallback(text){
  const result={};
  let current=result;
  const path=[];
  for(const raw of text.split('\n')){
    const line=raw.replace(/#.*$/,'').trim();
    if(!line)continue;
    // Table header
    const tableMatch=line.match(/^\[([^\]]+)\]$/);
    if(tableMatch){
      const keys=tableMatch[1].split('.').map(k=>k.replace(/^["']|["']$/g,''));
      current=result;
      for(const k of keys){
        if(!current[k])current[k]={};
        current=current[k];
      }
      continue;
    }
    // Array of tables
    const arrMatch=line.match(/^\[\[([^\]]+)\]\]$/);
    if(arrMatch){
      const keys=arrMatch[1].split('.').map(k=>k.replace(/^["']|["']$/g,''));
      let ref=result;
      for(let i=0;i<keys.length-1;i++){
        if(!ref[keys[i]])ref[keys[i]]={};
        ref=ref[keys[i]];
      }
      const last=keys[keys.length-1];
      if(!Array.isArray(ref[last]))ref[last]=[];
      const obj={};
      ref[last].push(obj);
      current=obj;
      continue;
    }
    // Key = Value
    const kvMatch=line.match(/^([^=]+?)\s*=\s*(.+)$/);
    if(kvMatch){
      const key=kvMatch[1].trim().replace(/^["']|["']$/g,'');
      let val=kvMatch[2].trim();
      // Parse value
      if(val==='true')val=true;
      else if(val==='false')val=false;
      else if(/^-?\d+$/.test(val))val=parseInt(val);
      else if(/^-?\d+\.\d+$/.test(val))val=parseFloat(val);
      else if(val.startsWith('"')&&val.endsWith('"'))val=val.slice(1,-1).replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"');
      else if(val.startsWith("'")&&val.endsWith("'"))val=val.slice(1,-1);
      else if(val.startsWith('[')){
        try{val=JSON.parse(val.replace(/'/g,'"'))}catch(e){/* keep as string */}
      }
      current[key]=val;
    }
  }
  return result;
}

function jsonToToml(obj,prefix=''){
  let lines=[];
  const simple={};
  const tables={};
  for(const[k,v]of Object.entries(obj)){
    if(v===null||v===undefined)continue;
    if(typeof v==='object'&&!Array.isArray(v)){
      tables[k]=v;
    }else{
      simple[k]=v;
    }
  }
  // Simple key-values
  for(const[k,v]of Object.entries(simple)){
    lines.push(`${k} = ${tomlValue(v)}`);
  }
  // Tables
  for(const[k,v]of Object.entries(tables)){
    const fullKey=prefix?`${prefix}.${k}`:k;
    if(lines.length>0)lines.push('');
    lines.push(`[${fullKey}]`);
    lines.push(jsonToToml(v,fullKey));
  }
  return lines.join('\n');
}

function tomlValue(v){
  if(typeof v==='string')return`"${v.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n')}"`;
  if(typeof v==='boolean')return v?'true':'false';
  if(typeof v==='number')return String(v);
  if(Array.isArray(v))return'['+v.map(tomlValue).join(', ')+']';
  return String(v);
}

function convert(){
  const input=document.getElementById('input').value.trim();
  if(!input)return;
  const errBox=document.getElementById('errorBox');
  errBox.style.display='none';

  try{
    let result;
    if(mode==='toml2json'){
      let obj;
      try{
        if(TOML&&TOML.parse)obj=TOML.parse(input);
        else obj=parseTomlFallback(input);
      }catch(e){
        obj=parseTomlFallback(input);
      }
      const indentVal=document.getElementById('jsonIndent').value;
      const indent=indentVal==='0'?undefined:+indentVal;
      result=JSON.stringify(obj,null,indent);
    }else{
      const obj=JSON.parse(input);
      result=jsonToToml(obj);
    }
    document.getElementById('output').value=result;
    showStats(input,result);
  }catch(e){
    errBox.textContent='Error: '+e.message;
    errBox.style.display='block';
    document.getElementById('output').value='';
  }
}

function showStats(input,output){
  const inLines=input.split('\n').length;
  const outLines=output.split('\n').length;
  document.getElementById('stats').innerHTML=[
    {num:inLines,lbl:'Input Lines'},{num:outLines,lbl:'Output Lines'},
    {num:formatBytes(new Blob([input]).size),lbl:'Input Size'},
    {num:formatBytes(new Blob([output]).size),lbl:'Output Size'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function formatBytes(b){if(b<1024)return b+' B';return(b/1024).toFixed(1)+' KB'}

function copyOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  navigator.clipboard.writeText(v);
  showToast('Copied!');
}

function downloadOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  const ext=mode==='toml2json'?'json':'toml';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([v],{type:'text/plain'}));
  a.download='converted.'+ext;a.click();
  URL.revokeObjectURL(a.href);
}

function swap(){
  document.getElementById('input').value=document.getElementById('output').value;
  document.getElementById('output').value='';
  setMode(mode==='toml2json'?'json2toml':'toml2json');
  document.getElementById('errorBox').style.display='none';
}

function clearAll(){
  document.getElementById('input').value='';
  document.getElementById('output').value='';
  document.getElementById('stats').innerHTML='';
  document.getElementById('errorBox').style.display='none';
}

const SAMPLES={
  cargo:`[package]
name = "my-app"
version = "0.1.0"
edition = "2021"
authors = ["Alice <alice@example.com>"]
description = "A fast CLI tool"
license = "MIT"
repository = "https://github.com/alice/my-app"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"

[profile.release]
opt-level = 3
lto = true
strip = true`,

  pyproject:`[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "my-package"
version = "0.1.0"
description = "A Python package"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  { name = "Alice", email = "alice@example.com" }
]
dependencies = [
  "requests>=2.31",
  "click>=8.0",
  "rich>=13.0"
]

[project.optional-dependencies]
dev = ["pytest", "ruff", "mypy"]

[project.scripts]
my-cli = "my_package.cli:main"

[tool.ruff]
line-length = 88
target-version = "py310"`
};

function loadSample(key){
  setMode('toml2json');
  document.getElementById('input').value=SAMPLES[key];
  convert();
}

function showToast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

document.getElementById('input').addEventListener('input',()=>{
  const v=document.getElementById('input').value.trim();
  if(v.length>5)convert();
});
</script>
