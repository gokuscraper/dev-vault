<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Performance Budget Calculator — Estimate Page Load Times</title>
<meta name="description" content="Calculate page performance budget. Asset sizes, load time estimates for 3G/4G/WiFi. Visual breakdown. Optimization recommendations.">
<link rel="canonical" href="https://yurukusa.github.io/performance-budget/">
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"WebApplication",
  "name":"Performance Budget Calculator",
  "description":"Calculate page performance budget. Asset sizes, load time estimates for 3G/4G/WiFi. Visual breakdown. Optimization recommendations.",
  "url":"https://yurukusa.github.io/performance-budget/",
  "applicationCategory":"DeveloperApplication",
  "operatingSystem":"Any",
  "offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:0.78rem;color:#888;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{border-color:#4da6ff;color:#4da6ff;background:#1a2744}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.8rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.btn-primary{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
.asset-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.asset-row label{width:90px;font-size:0.78rem;color:#888;font-weight:600;flex-shrink:0}
.asset-row input{width:80px;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem;flex-shrink:0;text-align:right}
.asset-bar-wrap{flex:1;height:18px;background:#0d0d0d;border-radius:4px;overflow:hidden}
.asset-bar{height:100%;border-radius:4px;transition:width .3s ease}
.asset-kb{width:60px;font-size:0.72rem;color:#666;text-align:right;flex-shrink:0}
.total-display{text-align:center;padding:14px 0;margin-top:6px;border-top:1px solid #222}
.total-weight{font-size:1.8rem;font-weight:700;color:#fff}
.total-mb{font-size:0.85rem;color:#888;margin-top:2px}
.budget-status{display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.78rem;font-weight:600;margin-top:6px}
.budget-green{background:#0d2818;color:#3fb950;border:1px solid #1a4d2e}
.budget-yellow{background:#2d2200;color:#d29922;border:1px solid #4d3a00}
.budget-red{background:#2d0f0f;color:#f85149;border:1px solid #5c1a1a}
.speed-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a}
.speed-row:last-child{border-bottom:none}
.speed-name{font-size:0.8rem;color:#888}
.speed-bps{font-size:0.68rem;color:#555}
.speed-time{font-size:0.9rem;font-weight:600;color:#e6e6e6}
.chart-wrap{display:flex;justify-content:center;padding:10px 0}
.chart-wrap canvas{max-width:200px;max-height:200px}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.72rem;color:#888}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.rec-item{padding:8px 10px;margin-bottom:6px;background:#0d0d0d;border-radius:6px;font-size:0.78rem;color:#ccc;border-left:3px solid #d29922}
.rec-item.good{border-left-color:#3fb950;color:#3fb950}
.budget-field{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.budget-field label{font-size:0.78rem;color:#888;font-weight:600}
.budget-field input{width:100px;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem;text-align:right}
.budget-field span{font-size:0.78rem;color:#666}
.export-area{margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Performance Budget Calculator</h1>
<p class="sub">Estimate page load times from asset sizes</p>

<div class="presets">
  <button class="preset" onclick="applyPreset('blog')">Minimal Blog</button>
  <button class="preset" onclick="applyPreset('spa')">SPA</button>
  <button class="preset" onclick="applyPreset('ecommerce')">E-commerce</button>
  <button class="preset" onclick="applyPreset('portfolio')">Portfolio</button>
</div>

<div class="layout">
  <div>
    <div class="section">
      <h3>Asset Sizes (KB)</h3>
      <div id="assets"></div>
      <div class="total-display">
        <div class="total-weight" id="totalWeight">0 KB</div>
        <div class="total-mb" id="totalMb">0 MB</div>
        <div id="budgetStatus"></div>
      </div>
    </div>

    <div class="section">
      <h3>Budget Threshold</h3>
      <div class="budget-field">
        <label>Target</label>
        <input type="number" id="budgetInput" value="1500" min="0" step="100" oninput="recalc()">
        <span>KB</span>
      </div>
    </div>

    <div class="section">
      <h3>Recommendations</h3>
      <div id="recs"></div>
    </div>
  </div>

  <div>
    <div class="section">
      <h3>Load Time Estimates</h3>
      <div id="speeds"></div>
    </div>

    <div class="section">
      <h3>Budget Breakdown</h3>
      <div class="chart-wrap"><canvas id="pie" width="200" height="200"></canvas></div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="section export-area">
      <h3>Export Summary</h3>
      <button class="btn btn-primary" onclick="copySummary()">Copy Summary</button>
    </div>
  </div>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/image-resize/">Image Resize</a> | <a href="https://yurukusa.github.io/js-minifier/">JS Minifier</a> | <a href="https://yurukusa.github.io/css-minifier/">CSS Minifier</a></div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const categories = [
  {id:'html',label:'HTML',default:50,color:'#4da6ff'},
  {id:'css',label:'CSS',default:100,color:'#a78bfa'},
  {id:'js',label:'JavaScript',default:300,color:'#f59e0b'},
  {id:'images',label:'Images',default:500,color:'#3fb950'},
  {id:'fonts',label:'Fonts',default:150,color:'#f472b6'},
  {id:'other',label:'Other / Media',default:0,color:'#888'}
];

const connections = [
  {name:'Slow 3G',kbps:400},
  {name:'Fast 3G',kbps:1500},
  {name:'4G',kbps:10000},
  {name:'WiFi',kbps:30000},
  {name:'Fiber',kbps:100000}
];

const presets = {
  blog:{html:20,css:30,js:50,images:100,fonts:0,other:0},
  spa:{html:10,css:150,js:800,images:200,fonts:100,other:0},
  ecommerce:{html:30,css:200,js:600,images:1500,fonts:150,other:0},
  portfolio:{html:20,css:80,js:100,images:800,fonts:200,other:0}
};

function init(){
  const wrap=document.getElementById('assets');
  categories.forEach(c=>{
    const row=document.createElement('div');
    row.className='asset-row';
    row.innerHTML=`<label>${c.label}</label><input type="number" id="in_${c.id}" value="${c.default}" min="0" step="10" oninput="recalc()"><div class="asset-bar-wrap"><div class="asset-bar" id="bar_${c.id}" style="background:${c.color}"></div></div><span class="asset-kb" id="kb_${c.id}"></span>`;
    wrap.appendChild(row);
  });
  recalc();
}

function getValues(){
  return categories.map(c=>({...c,value:Math.max(0,parseFloat(document.getElementById('in_'+c.id).value)||0)}));
}

function recalc(){
  const vals=getValues();
  const total=vals.reduce((s,v)=>s+v.value,0);
  const maxVal=Math.max(...vals.map(v=>v.value),1);
  const budget=Math.max(0,parseFloat(document.getElementById('budgetInput').value)||0);

  // bars
  vals.forEach(v=>{
    const pct=(v.value/maxVal)*100;
    document.getElementById('bar_'+v.id).style.width=pct+'%';
    document.getElementById('kb_'+v.id).textContent=v.value>0?v.value+'KB':'';
  });

  // total
  document.getElementById('totalWeight').textContent=total.toLocaleString()+' KB';
  document.getElementById('totalMb').textContent=(total/1024).toFixed(2)+' MB';

  // budget status
  const statusEl=document.getElementById('budgetStatus');
  const ratio=total/budget;
  if(ratio<=0.8){
    statusEl.innerHTML=`<span class="budget-status budget-green">Under budget (${Math.round(total/budget*100)}%)</span>`;
  }else if(ratio<=1){
    statusEl.innerHTML=`<span class="budget-status budget-yellow">Near budget (${Math.round(total/budget*100)}%)</span>`;
  }else{
    statusEl.innerHTML=`<span class="budget-status budget-red">Over budget (${Math.round(total/budget*100)}%)</span>`;
  }

  // speeds
  const speedsEl=document.getElementById('speeds');
  speedsEl.innerHTML=connections.map(c=>{
    const kb=total;
    const bits=kb*8*1024;
    const secs=bits/(c.kbps*1000);
    const display=secs<1?(Math.round(secs*1000)+'ms'):(secs.toFixed(2)+'s');
    return `<div class="speed-row"><div><div class="speed-name">${c.name}</div><div class="speed-bps">${formatKbps(c.kbps)}</div></div><div class="speed-time">${display}</div></div>`;
  }).join('');

  // pie chart
  drawPie(vals,total);

  // recommendations
  buildRecs(vals,total);
}

function formatKbps(k){
  return k>=1000?(k/1000)+' Mbps':k+' Kbps';
}

function drawPie(vals,total){
  const canvas=document.getElementById('pie');
  const ctx=canvas.getContext('2d');
  const size=200;
  const cx=size/2,cy=size/2,r=80;
  ctx.clearRect(0,0,size,size);

  if(total===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#222';ctx.fill();
    document.getElementById('legend').innerHTML='';
    return;
  }

  let startAngle=-Math.PI/2;
  const active=vals.filter(v=>v.value>0);

  active.forEach(v=>{
    const slice=(v.value/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startAngle,startAngle+slice);
    ctx.closePath();
    ctx.fillStyle=v.color;
    ctx.fill();
    startAngle+=slice;
  });

  // center hole
  ctx.beginPath();ctx.arc(cx,cy,45,0,Math.PI*2);ctx.fillStyle='#161616';ctx.fill();

  // legend
  document.getElementById('legend').innerHTML=active.map(v=>{
    const pct=Math.round(v.value/total*100);
    return `<div class="legend-item"><div class="legend-dot" style="background:${v.color}"></div>${v.label} ${pct}%</div>`;
  }).join('');
}

function buildRecs(vals,total){
  const el=document.getElementById('recs');
  const recs=[];
  const v=k=>vals.find(x=>x.id===k).value;

  if(v('js')>300) recs.push('Consider code splitting or lazy loading');
  if(v('images')>500) recs.push('Optimize images with WebP/AVIF');
  if(v('fonts')>200) recs.push('Consider system fonts or font subsetting');
  if(total>2000) recs.push('Page may feel slow on mobile connections');
  if(v('css')>200) recs.push('Consider removing unused CSS');

  if(recs.length===0){
    el.innerHTML='<div class="rec-item good">All assets within recommended limits</div>';
  }else{
    el.innerHTML=recs.map(r=>`<div class="rec-item">${r}</div>`).join('');
  }
}

function applyPreset(key){
  const p=presets[key];
  categories.forEach(c=>{
    document.getElementById('in_'+c.id).value=p[c.id]||0;
  });
  document.querySelectorAll('.preset').forEach(el=>{
    el.classList.toggle('active',el.textContent.toLowerCase().includes(key==='ecommerce'?'e-comm':key));
  });
  recalc();
}

function copySummary(){
  const vals=getValues();
  const total=vals.reduce((s,v)=>s+v.value,0);
  const budget=parseFloat(document.getElementById('budgetInput').value)||0;
  let txt='Performance Budget Summary\n';
  txt+='==========================\n\n';
  vals.forEach(v=>{if(v.value>0)txt+=`${v.label}: ${v.value} KB\n`;});
  txt+=`\nTotal: ${total.toLocaleString()} KB (${(total/1024).toFixed(2)} MB)\n`;
  txt+=`Budget: ${budget} KB — ${total<=budget?'UNDER':'OVER'} budget\n\n`;
  txt+='Load Times:\n';
  connections.forEach(c=>{
    const bits=total*8*1024;
    const secs=bits/(c.kbps*1000);
    const display=secs<1?(Math.round(secs*1000)+'ms'):(secs.toFixed(2)+'s');
    txt+=`  ${c.name} (${formatKbps(c.kbps)}): ${display}\n`;
  });
  navigator.clipboard.writeText(txt).then(()=>{
    const t=document.getElementById('toast');t.style.display='block';setTimeout(()=>t.style.display='none',2000);
  });
}

init();
</script>
</body>
</html>
