<script>
(function() {
  'use strict';

  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var audioCtx = null;
  var analyser = null;
  var gainNode = null;
  var source = null;
  var micStream = null;
  var audioEl = null;
  var animId = null;
  var vizMode = 'bars';
  var colorTheme = 'blue';
  var isActive = false;
  var currentSource = 'mic';

  // Elements
  var micBtn = document.getElementById('mic-btn');
  var micError = document.getElementById('mic-error');
  var micPanel = document.getElementById('mic-panel');
  var filePanel = document.getElementById('file-panel');
  var fileInput = document.getElementById('file-input');
  var dropZone = document.getElementById('drop-zone');
  var fileNameEl = document.getElementById('file-name');
  var playBtn = document.getElementById('play-btn');
  var progressBar = document.getElementById('progress-bar');
  var progressFill = document.getElementById('progress-fill');
  var timeDisplay = document.getElementById('time-display');
  var fftSelect = document.getElementById('fft-size');
  var smoothSlider = document.getElementById('smoothing');
  var smoothVal = document.getElementById('smoothing-val');
  var gainSlider = document.getElementById('gain');
  var gainVal = document.getElementById('gain-val');

  function resizeCanvas() {
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio || 1);
    canvas.height = rect.height * (window.devicePixelRatio || 1);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = parseInt(fftSelect.value);
    analyser.smoothingTimeConstant = smoothSlider.value / 100;
    gainNode = audioCtx.createGain();
    gainNode.gain.value = gainSlider.value / 100;
    gainNode.connect(analyser);
  }

  function cleanUp() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    if (source) {
      try { source.disconnect(); } catch(e) {}
      source = null;
    }
    if (micStream) {
      micStream.getTracks().forEach(function(t) { t.stop(); });
      micStream = null;
    }
    if (audioEl) {
      audioEl.pause();
      audioEl.src = '';
      audioEl = null;
    }
    if (gainNode) { try { gainNode.disconnect(); } catch(e) {} }
    if (analyser) { try { analyser.disconnect(); } catch(e) {} }
    isActive = false;
  }

  // Source tabs
  document.querySelectorAll('.source-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      cleanUp();
      micBtn.textContent=T("jtc_start_microphone");
      micBtn.className = 'action-btn btn-start';
      playBtn.innerHTML = '&#9654;';
      playBtn.disabled = true;
      document.querySelectorAll('.source-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentSource = btn.dataset.src;
      micPanel.classList.toggle('hidden', currentSource !== 'mic');
      filePanel.classList.toggle('hidden', currentSource !== 'file');
      clearCanvas();
    });
  });

  // Viz tabs
  document.querySelectorAll('.viz-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.viz-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      vizMode = tab.dataset.mode;
    });
  });

  // Color themes
  document.querySelectorAll('.color-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.color-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      colorTheme = btn.dataset.theme;
    });
  });

  // Microphone
  micBtn.addEventListener('click', function() {
    if (isActive && currentSource === 'mic') {
      cleanUp();
      micBtn.textContent=T("jtc_start_microphone");
      micBtn.className = 'action-btn btn-start';
      micError.style.display = 'none';
      clearCanvas();
      return;
    }
    cleanUp();
    initAudio();
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      micStream = stream;
      source = audioCtx.createMediaStreamSource(stream);
      source.connect(gainNode);
      isActive = true;
      micBtn.textContent=T("jtc_stop_microphone");
      micBtn.className = 'action-btn btn-stop';
      micError.style.display = 'none';
      draw();
    }).catch(function(err) {
      micError.textContent=T("jtcpre_microphone_access_denied")+ err.message;
      micError.style.display = 'block';
    });
  });

  // File handling
  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function() {
    if (fileInput.files.length) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    cleanUp();
    initAudio();
    fileNameEl.textContent = file.name;
    var url = URL.createObjectURL(file);
    audioEl = new Audio();
    audioEl.crossOrigin = 'anonymous';
    audioEl.src = url;
    audioEl.addEventListener('loadedmetadata', function() {
      playBtn.disabled = false;
      updateTime();
    });
    audioEl.addEventListener('ended', function() {
      playBtn.innerHTML = '&#9654;';
      isActive = false;
    });
    audioEl.addEventListener('timeupdate', updateTime);
    // MediaElementSource can only be created once per element
    source = audioCtx.createMediaElementSource(audioEl);
    source.connect(gainNode);
    analyser.connect(audioCtx.destination);
    isActive = false;
  }

  playBtn.addEventListener('click', function() {
    if (!audioEl) return;
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioEl.paused) {
      audioEl.play();
      playBtn.innerHTML = '&#10074;&#10074;';
      isActive = true;
      draw();
    } else {
      audioEl.pause();
      playBtn.innerHTML = '&#9654;';
    }
  });

  progressBar.addEventListener('click', function(e) {
    if (!audioEl || !audioEl.duration) return;
    var rect = progressBar.getBoundingClientRect();
    var ratio = (e.clientX - rect.left) / rect.width;
    audioEl.currentTime = ratio * audioEl.duration;
  });

  function updateTime() {
    if (!audioEl) return;
    var cur = audioEl.currentTime || 0;
    var dur = audioEl.duration || 0;
    if (dur && isFinite(dur)) {
      progressFill.style.width = (cur / dur * 100) + '%';
    }
    timeDisplay.textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
  }

  function fmtTime(s) {
    if (!isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // Controls
  fftSelect.addEventListener('change', function() {
    if (analyser) analyser.fftSize = parseInt(fftSelect.value);
  });
  smoothSlider.addEventListener('input', function() {
    var v = smoothSlider.value / 100;
    smoothVal.textContent = v.toFixed(2);
    if (analyser) analyser.smoothingTimeConstant = v;
  });
  gainSlider.addEventListener('input', function() {
    var v = gainSlider.value / 100;
    gainVal.textContent = v.toFixed(1) + 'x';
    if (gainNode) gainNode.gain.value = v;
  });

  // Color helpers
  function getColor(i, total, val) {
    var norm = val / 255;
    switch (colorTheme) {
      case 'rainbow':
        var hue = (i / total) * 360;
        return 'hsl(' + hue + ',' + (70 + norm * 30) + '%,' + (40 + norm * 30) + '%)';
      case 'green':
        return 'rgb(' + Math.floor(20 + norm * 40) + ',' + Math.floor(100 + norm * 155) + ',' + Math.floor(50 + norm * 80) + ')';
      case 'purple':
        return 'rgb(' + Math.floor(100 + norm * 80) + ',' + Math.floor(30 + norm * 50) + ',' + Math.floor(150 + norm * 105) + ')';
      default: // blue gradient
        return 'rgb(' + Math.floor(30 + norm * 47) + ',' + Math.floor(100 + norm * 66) + ',' + Math.floor(200 + norm * 55) + ')';
    }
  }

  function getLineColor() {
    switch (colorTheme) {
      case 'rainbow': return '#ff6b6b';
      case 'green': return '#4dff88';
      case 'purple': return '#b44dff';
      default: return '#4da6ff';
    }
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // Drawing
  function draw() {
    if (!analyser) return;
    animId = requestAnimationFrame(draw);

    var w = canvas.width;
    var h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    if (vizMode === 'bars') drawBars(w, h);
    else if (vizMode === 'wave') drawWave(w, h);
    else drawCircle(w, h);
  }

  function drawBars(w, h) {
    var bufLen = analyser.frequencyBinCount;
    var data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    var barCount = Math.min(bufLen, 128);
    var step = Math.floor(bufLen / barCount);
    var barW = (w / barCount) * 0.8;
    var gap = (w / barCount) * 0.2;

    for (var i = 0; i < barCount; i++) {
      var val = data[i * step];
      var barH = (val / 255) * h * 0.9;
      var x = i * (barW + gap);
      ctx.fillStyle = getColor(i, barCount, val);
      // Rounded top via small radius
      var r = Math.min(barW / 2, 4);
      var y = h - barH;
      if (barH > r * 2) {
        ctx.beginPath();
        ctx.moveTo(x, h);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.lineTo(x + barW - r, y);
        ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
        ctx.lineTo(x + barW, h);
        ctx.fill();
      } else if (barH > 0) {
        ctx.fillRect(x, h - barH, barW, barH);
      }
    }
  }

  function drawWave(w, h) {
    var bufLen = analyser.fftSize;
    var data = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(data);

    ctx.lineWidth = 2 * (window.devicePixelRatio || 1);
    ctx.strokeStyle = getLineColor();
    ctx.beginPath();
    var sliceW = w / bufLen;
    for (var i = 0; i < bufLen; i++) {
      var v = data[i] / 128.0;
      var y = (v * h) / 2;
      if (i === 0) ctx.moveTo(0, y);
      else ctx.lineTo(i * sliceW, y);
    }
    ctx.stroke();

    // Center line
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();
  }

  function drawCircle(w, h) {
    var bufLen = analyser.frequencyBinCount;
    var data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    var cx = w / 2;
    var cy = h / 2;
    var minDim = Math.min(w, h);
    var innerR = minDim * 0.12;
    var maxBarH = minDim * 0.35;
    var barCount = Math.min(bufLen, 180);
    var step = Math.floor(bufLen / barCount);
    var angleStep = (Math.PI * 2) / barCount;
    var barW = Math.max(1, (2 * Math.PI * innerR) / barCount * 0.7);

    // Inner circle glow
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.strokeStyle = getLineColor();
    ctx.lineWidth = 1.5;
    ctx.stroke();

    for (var i = 0; i < barCount; i++) {
      var val = data[i * step];
      var barH = (val / 255) * maxBarH;
      if (barH < 1) barH = 1;
      var angle = i * angleStep - Math.PI / 2;
      var x1 = cx + Math.cos(angle) * innerR;
      var y1 = cy + Math.sin(angle) * innerR;
      var x2 = cx + Math.cos(angle) * (innerR + barH);
      var y2 = cy + Math.sin(angle) * (innerR + barH);

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = getColor(i, barCount, val);
      ctx.lineWidth = barW;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }
})();
</script>
