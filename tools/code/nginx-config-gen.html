<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nginx Config Generator — Visual Server Block Builder</title>
<meta name="description" content="Generate nginx.conf visually. Reverse proxy, static site, SPA, SSL, gzip, rate limiting. 8 presets. No signup.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:'Fira Code',monospace}
input:focus,select:focus{border-color:#3b82f6}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>Nginx Config Generator</h1>
<p class="sub">Build nginx server blocks visually</p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Server</h3>
<div class="row">
<div class="col"><label>Server Name</label><input id="serverName" value="example.com" oninput="gen()"></div>
<div class="col" style="max-width:100px"><label>Port</label><input id="port" type="number" value="80" oninput="gen()"></div>
</div>
<div class="row">
<div class="col"><label>Root Directory</label><input id="root" value="/var/www/html" oninput="gen()"></div>
</div>
</div>

<div class="section">
<h3>Type</h3>
<div class="row">
<div class="col"><label>Server Type</label><select id="serverType" onchange="gen()">
<option value="static">Static Site</option>
<option value="spa">SPA (Single Page App)</option>
<option value="proxy">Reverse Proxy</option>
<option value="php">PHP (FastCGI)</option>
</select></div>
<div class="col" id="proxyCol" style="display:none"><label>Upstream URL</label><input id="upstream" value="http://127.0.0.1:3000" oninput="gen()"></div>
</div>
</div>

<div class="section">
<h3>SSL / HTTPS</h3>
<div class="check-row"><input type="checkbox" id="ssl" onchange="gen()"><label for="ssl">Enable HTTPS (SSL/TLS)</label></div>
<div id="sslOpts" style="display:none">
<div class="row">
<div class="col"><label>Certificate</label><input id="sslCert" value="/etc/letsencrypt/live/example.com/fullchain.pem" oninput="gen()"></div>
<div class="col"><label>Private Key</label><input id="sslKey" value="/etc/letsencrypt/live/example.com/privkey.pem" oninput="gen()"></div>
</div>
<div class="check-row"><input type="checkbox" id="httpRedirect" checked onchange="gen()"><label for="httpRedirect">Redirect HTTP → HTTPS</label></div>
<div class="check-row"><input type="checkbox" id="hsts" checked onchange="gen()"><label for="hsts">HSTS header</label></div>
</div>
</div>

<div class="section">
<h3>Performance</h3>
<div class="check-row"><input type="checkbox" id="gzip" checked onchange="gen()"><label for="gzip">Enable gzip compression</label></div>
<div class="check-row"><input type="checkbox" id="caching" onchange="gen()"><label for="caching">Static asset caching (1 year)</label></div>
<div class="check-row"><input type="checkbox" id="http2" onchange="gen()"><label for="http2">HTTP/2</label></div>
</div>

<div class="section">
<h3>Security</h3>
<div class="check-row"><input type="checkbox" id="secHeaders" onchange="gen()"><label for="secHeaders">Security headers (X-Frame, X-Content-Type, etc.)</label></div>
<div class="check-row"><input type="checkbox" id="rateLimit" onchange="gen()"><label for="rateLimit">Rate limiting (10 req/s)</label></div>
<div class="check-row"><input type="checkbox" id="cors" onchange="gen()"><label for="cors">CORS headers</label></div>
</div>

<div class="section">
<h3>Logging</h3>
<div class="row">
<div class="col"><label>Access Log</label><input id="accessLog" value="/var/log/nginx/access.log" oninput="gen()"></div>
<div class="col"><label>Error Log</label><input id="errorLog" value="/var/log/nginx/error.log" oninput="gen()"></div>
</div>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/dockerfile-gen/">Dockerfile Gen</a> | <a href="https://yurukusa.github.io/curl-builder/">cURL Builder</a> | <a href="https://yurukusa.github.io/makefile-gen/">Makefile Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const PRESETS={
  'Static Site':{type:'static',port:80,root:'/var/www/html',ssl:false,gzip:true,caching:false,secHeaders:false,rateLimit:false,cors:false,http2:false},
  'SPA (React/Vue)':{type:'spa',port:80,root:'/var/www/app/dist',ssl:false,gzip:true,caching:true,secHeaders:false,rateLimit:false,cors:false,http2:false},
  'Reverse Proxy':{type:'proxy',port:80,root:'/var/www/html',upstream:'http://127.0.0.1:3000',ssl:false,gzip:true,caching:false,secHeaders:false,rateLimit:false,cors:false,http2:false},
  'SSL + Proxy':{type:'proxy',port:443,root:'/var/www/html',upstream:'http://127.0.0.1:3000',ssl:true,gzip:true,caching:false,secHeaders:true,rateLimit:false,cors:false,http2:true},
  'PHP (Laravel)':{type:'php',port:80,root:'/var/www/html/public',ssl:false,gzip:true,caching:false,secHeaders:false,rateLimit:false,cors:false,http2:false},
  'API Gateway':{type:'proxy',port:443,root:'/var/www/html',upstream:'http://127.0.0.1:8080',ssl:true,gzip:true,caching:false,secHeaders:true,rateLimit:true,cors:true,http2:true},
  'WordPress':{type:'php',port:80,root:'/var/www/wordpress',ssl:false,gzip:true,caching:true,secHeaders:true,rateLimit:false,cors:false,http2:false},
  'Full Production':{type:'proxy',port:443,root:'/var/www/html',upstream:'http://127.0.0.1:3000',ssl:true,gzip:true,caching:true,secHeaders:true,rateLimit:true,cors:false,http2:true},
};

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(name=>{
    const b=document.createElement('div');b.className='preset';b.textContent=name;
    b.onclick=()=>{
      document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
      b.classList.add('active');
      applyPreset(PRESETS[name]);
    };
    c.appendChild(b);
  });
}

function applyPreset(p){
  document.getElementById('serverType').value=p.type;
  document.getElementById('port').value=p.ssl?443:p.port;
  document.getElementById('root').value=p.root;
  if(p.upstream) document.getElementById('upstream').value=p.upstream;
  document.getElementById('ssl').checked=p.ssl;
  document.getElementById('gzip').checked=p.gzip;
  document.getElementById('caching').checked=p.caching;
  document.getElementById('secHeaders').checked=p.secHeaders;
  document.getElementById('rateLimit').checked=p.rateLimit;
  document.getElementById('cors').checked=p.cors;
  document.getElementById('http2').checked=p.http2;
  gen();
}

function gen(){
  const name=document.getElementById('serverName').value||'_';
  const port=document.getElementById('port').value||'80';
  const root=document.getElementById('root').value;
  const type=document.getElementById('serverType').value;
  const upstream=document.getElementById('upstream').value;
  const ssl=document.getElementById('ssl').checked;
  const gzip=document.getElementById('gzip').checked;
  const caching=document.getElementById('caching').checked;
  const http2=document.getElementById('http2').checked;
  const secHeaders=document.getElementById('secHeaders').checked;
  const rateLimit=document.getElementById('rateLimit').checked;
  const cors=document.getElementById('cors').checked;
  const httpRedirect=document.getElementById('httpRedirect').checked;
  const hsts=document.getElementById('hsts').checked;
  const accessLog=document.getElementById('accessLog').value;
  const errorLog=document.getElementById('errorLog').value;
  const sslCert=document.getElementById('sslCert').value;
  const sslKey=document.getElementById('sslKey').value;

  // Toggle visibility
  document.getElementById('proxyCol').style.display=type==='proxy'?'block':'none';
  document.getElementById('sslOpts').style.display=ssl?'block':'none';

  let conf='';

  // Rate limit zone
  if(rateLimit){
    conf+=`limit_req_zone $binary_remote_addr zone=rate_limit:10m rate=10r/s;\n\n`;
  }

  // HTTP redirect block
  if(ssl&&httpRedirect){
    conf+=`server {\n`;
    conf+=`    listen 80;\n`;
    conf+=`    server_name ${name};\n`;
    conf+=`    return 301 https://$host$request_uri;\n`;
    conf+=`}\n\n`;
  }

  // Main server block
  conf+=`server {\n`;
  const listenExtra=(http2?' http2':'');
  if(ssl){
    conf+=`    listen 443 ssl${listenExtra};\n`;
    conf+=`    listen [::]:443 ssl${listenExtra};\n`;
  } else {
    conf+=`    listen ${port}${listenExtra};\n`;
    conf+=`    listen [::]:${port}${listenExtra};\n`;
  }
  conf+=`    server_name ${name};\n`;
  conf+=`    root ${root};\n`;
  conf+=`    index index.html index.htm`;
  if(type==='php') conf+=` index.php`;
  conf+=`;\n\n`;

  // SSL
  if(ssl){
    conf+=`    # SSL\n`;
    conf+=`    ssl_certificate ${sslCert};\n`;
    conf+=`    ssl_certificate_key ${sslKey};\n`;
    conf+=`    ssl_protocols TLSv1.2 TLSv1.3;\n`;
    conf+=`    ssl_ciphers HIGH:!aNULL:!MD5;\n`;
    conf+=`    ssl_prefer_server_ciphers on;\n`;
    if(hsts) conf+=`    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;\n`;
    conf+=`\n`;
  }

  // Logging
  conf+=`    access_log ${accessLog};\n`;
  conf+=`    error_log ${errorLog};\n\n`;

  // Security headers
  if(secHeaders){
    conf+=`    # Security headers\n`;
    conf+=`    add_header X-Frame-Options "SAMEORIGIN" always;\n`;
    conf+=`    add_header X-Content-Type-Options "nosniff" always;\n`;
    conf+=`    add_header X-XSS-Protection "1; mode=block" always;\n`;
    conf+=`    add_header Referrer-Policy "strict-origin-when-cross-origin" always;\n\n`;
  }

  // CORS
  if(cors){
    conf+=`    # CORS\n`;
    conf+=`    add_header Access-Control-Allow-Origin "*" always;\n`;
    conf+=`    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;\n`;
    conf+=`    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;\n\n`;
  }

  // Gzip
  if(gzip){
    conf+=`    # Gzip\n`;
    conf+=`    gzip on;\n`;
    conf+=`    gzip_vary on;\n`;
    conf+=`    gzip_min_length 1024;\n`;
    conf+=`    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;\n\n`;
  }

  // Rate limiting
  if(rateLimit){
    conf+=`    # Rate limiting\n`;
    conf+=`    limit_req zone=rate_limit burst=20 nodelay;\n\n`;
  }

  // Location blocks based on type
  if(type==='static'){
    conf+=`    location / {\n`;
    conf+=`        try_files $uri $uri/ =404;\n`;
    conf+=`    }\n`;
  } else if(type==='spa'){
    conf+=`    location / {\n`;
    conf+=`        try_files $uri $uri/ /index.html;\n`;
    conf+=`    }\n`;
  } else if(type==='proxy'){
    conf+=`    location / {\n`;
    conf+=`        proxy_pass ${upstream};\n`;
    conf+=`        proxy_http_version 1.1;\n`;
    conf+=`        proxy_set_header Upgrade $http_upgrade;\n`;
    conf+=`        proxy_set_header Connection "upgrade";\n`;
    conf+=`        proxy_set_header Host $host;\n`;
    conf+=`        proxy_set_header X-Real-IP $remote_addr;\n`;
    conf+=`        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n`;
    conf+=`        proxy_set_header X-Forwarded-Proto $scheme;\n`;
    conf+=`        proxy_cache_bypass $http_upgrade;\n`;
    conf+=`    }\n`;
  } else if(type==='php'){
    conf+=`    location / {\n`;
    conf+=`        try_files $uri $uri/ /index.php?$query_string;\n`;
    conf+=`    }\n\n`;
    conf+=`    location ~ \\.php$ {\n`;
    conf+=`        fastcgi_pass unix:/var/run/php/php-fpm.sock;\n`;
    conf+=`        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;\n`;
    conf+=`        include fastcgi_params;\n`;
    conf+=`    }\n\n`;
    conf+=`    location ~ /\\.(?!well-known).* {\n`;
    conf+=`        deny all;\n`;
    conf+=`    }\n`;
  }

  // Static asset caching
  if(caching){
    conf+=`\n    # Static asset caching\n`;
    conf+=`    location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {\n`;
    conf+=`        expires 1y;\n`;
    conf+=`        add_header Cache-Control "public, immutable";\n`;
    conf+=`        access_log off;\n`;
    conf+=`    }\n`;
  }

  conf+=`}\n`;

  document.getElementById('out').textContent=conf;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
gen();
</script>
</body>
</html>
