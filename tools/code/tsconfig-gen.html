  const c=document.getElementById('pathsList');c.innerHTML='';
  paths.forEach((p,i)=>{
    const d=document.createElement('div');d.className='kv-row';
    d.innerHTML=`<input style="max-width:120px" value="${esc(p.k)}" onchange="paths[${i}].k=this.value;gen()" tp="placeholder_x" placeholder="@/*">
    <span style="color:#666">→</span>
    <input value="${esc(p.v)}" onchange="paths[${i}].v=this.value;gen()" tp="placeholder_src_2" placeholder="src/*">
    <span class="rm" onclick="removePath(${i})">✕</span>`;
    c.appendChild(d);
  });
}

function gen(){
  const co={};
  co.target=document.getElementById('oTarget').value;
  co.module=document.getElementById('oModule').value;
  co.moduleResolution=document.getElementById('oModRes').value;
  const lib=document.getElementById('oLib').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(lib.length) co.lib=lib;
  const jsx=document.getElementById('oJsx').value;
  if(jsx) co.jsx=jsx;
  if(document.getElementById('oStrict').checked) co.strict=true;
  if(document.getElementById('oNoImplicitAny').checked) co.noImplicitAny=true;
  if(document.getElementById('oStrictNull').checked) co.strictNullChecks=true;
  if(document.getElementById('oStrictFunc').checked) co.strictFunctionTypes=true;
  if(document.getElementById('oNoUnused').checked) co.noUnusedLocals=true;
  if(document.getElementById('oNoUnusedP').checked) co.noUnusedParameters=true;
  if(document.getElementById('oNoFallthrough').checked) co.noFallthroughCasesInSwitch=true;
  if(document.getElementById('oExactOptional').checked) co.exactOptionalPropertyTypes=true;
  const outDir=document.getElementById('oOutDir').value;
  if(outDir) co.outDir=outDir;
  const rootDir=document.getElementById('oRootDir').value;
  if(rootDir) co.rootDir=rootDir;
  if(document.getElementById('oDecl').checked) co.declaration=true;
  if(document.getElementById('oDeclMap').checked) co.declarationMap=true;
  if(document.getElementById('oSourceMap').checked) co.sourceMap=true;
  if(document.getElementById('oEmitDecl').checked) co.emitDeclarationOnly=true;
  if(document.getElementById('oNoEmit').checked) co.noEmit=true;
  if(document.getElementById('oIncremental').checked) co.incremental=true;
  if(document.getElementById('oEsInterop').checked) co.esModuleInterop=true;
  if(document.getElementById('oSynDefault').checked) co.allowSyntheticDefaultImports=true;
  if(document.getElementById('oResolveJson').checked) co.resolveJsonModule=true;
  if(document.getElementById('oIsolated').checked) co.isolatedModules=true;
  if(document.getElementById('oSkipLib').checked) co.skipLibCheck=true;
  if(document.getElementById('oForceConsistent').checked) co.forceConsistentCasingInFileNames=true;
  if(document.getElementById('oVerbatim').checked) co.verbatimModuleSyntax=true;

  const baseUrl=document.getElementById('oBaseUrl').value;
  if(baseUrl) co.baseUrl=baseUrl;
  if(paths.length){
    co.paths={};
    paths.forEach(p=>{if(p.k&&p.v) co.paths[p.k]=[p.v]});
  }

  const cfg={compilerOptions:co};
  const inc=document.getElementById('oInclude').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(inc.length) cfg.include=inc;
  const exc=document.getElementById('oExclude').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(exc.length) cfg.exclude=exc;

  document.getElementById('out').textContent=JSON.stringify(cfg,null,2);
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('Node.js (ESM)');
</script>


<script>

if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){

document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
