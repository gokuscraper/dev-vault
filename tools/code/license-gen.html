let selected = 'MIT';

function showTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.textContent.toLowerCase().includes(t.slice(0,3))));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
}

function renderCards(){
  const c=document.getElementById('cards');
  LICENSES.forEach(l=>{
    const d=document.createElement('div');
    d.className='license-card'+(l.id===selected?' selected':'');
    d.onclick=()=>{selected=l.id;renderCards();showDetail(l.id)};
    const tags=l.must.length===0?'<span class="tag tag-yes">No conditions</span>':
      (l.must.includes('Same license')?'<span class="tag tag-warn">Copyleft</span>':'<span class="tag tag-yes">Permissive</span>');
    d.innerHTML=`<h3 ti="h3_l_name">${l.name}</h3><div class="spdx">${l.spdx}</div><div class="tags">${tags}</div><p>${l.desc}</p><p style="color:#555;font-size:0.72rem;margin-top:6px">${l.pop}</p>`;
    c.appendChild(d);
  });
}

function showDetail(id){
  const l=LICENSES.find(x=>x.id===id);if(!l)return;
  const d=document.getElementById('detail');
  d.innerHTML=`<div class="detail"><h2 ti="h2_l_name">${l.name}</h2><p style="color:#888;margin-bottom:16px">${l.desc}</p>
  <div class="perm-grid">
    <div class="perm-col can"><h4>Permissions</h4><ul>${l.can.map(x=>`<li>✓ ${x}</li>`).join('')}</ul></div>
    <div class="perm-col must"><h4>Conditions</h4><ul>${l.must.length?l.must.map(x=>`<li>● ${x}</li>`).join(''):'<li>None</li>'}</ul></div>
    <div class="perm-col cannot"><h4>Limitations</h4><ul>${l.cannot.length?l.cannot.map(x=>`<li>✕ ${x}</li>`).join(''):'<li>None</li>'}</ul></div>
  </div></div>`;
}

function genFile(){
  const id=document.getElementById('genLicense').value;
  const name=document.getElementById('genName').value||'[Your Name]';
  const year=document.getElementById('genYear').value;
  const tmpl=TEXTS[id]||`${id} License\n\nCopyright (c) {year} {name}`;
  document.getElementById('out').textContent=tmpl.replace(/\{year\}/g,year).replace(/\{name\}/g,name);
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

renderCards();
