<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none}
input:focus,select:focus{border-color:#3b82f6}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:160px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.rule-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.rule-row select{max-width:120px}
.rule-row .rm{color:#666;cursor:pointer;font-size:0.8rem;padding:0 4px}
.rule-row .rm:hover{color:#f85149}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
.badge{display:inline-block;font-size:0.7rem;padding:2px 6px;border-radius:4px;margin-left:6px}
.badge-new{background:#1a3a1a;color:#3fb950;border:1px solid #2a5a2a}
</style>
</head>
<body>
<div class="container">
<h1>ESLint Config Generator</h1>
<p class="sub">Build ESLint v9 flat config visually <span class="badge badge-new">Flat Config</span></p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Plugins & Extends</h3>
<div class="check-row"><input type="checkbox" id="pJS" checked onchange="gen()"><label for="pJS">@eslint/js (recommended)</label></div>
<div class="check-row"><input type="checkbox" id="pTS" onchange="gen()"><label for="pTS">typescript-eslint</label></div>
<div class="check-row"><input type="checkbox" id="pReact" onchange="gen()"><label for="pReact">eslint-plugin-react + react-hooks</label></div>
<div class="check-row"><input type="checkbox" id="pNext" onchange="gen()"><label for="pNext">@next/eslint-plugin-next</label></div>
<div class="check-row"><input type="checkbox" id="pImport" onchange="gen()"><label for="pImport">eslint-plugin-import-x</label></div>
<div class="check-row"><input type="checkbox" id="pPrettier" onchange="gen()"><label for="pPrettier">eslint-config-prettier (disable formatting rules)</label></div>
<div class="check-row"><input type="checkbox" id="pNode" onchange="gen()"><label for="pNode">eslint-plugin-n (Node.js)</label></div>
</div>

<div class="section">
<h3>File Patterns</h3>
<div class="row">
<div class="col"><label>Include files</label><input id="fInclude" value="**/*.{js,mjs,cjs,ts,tsx}" oninput="gen()"></div>
<div class="col"><label>Ignore patterns</label><input id="fIgnore" value="node_modules/, dist/, build/, .next/" oninput="gen()"></div>
</div>
</div>

<div class="section">
<h3>Environment</h3>
<div class="row">
<div class="col">
<div class="check-row"><input type="checkbox" id="eBrowser" checked onchange="gen()"><label for="eBrowser">Browser (window, document)</label></div>
<div class="check-row"><input type="checkbox" id="eNode" checked onchange="gen()"><label for="eNode">Node.js (process, __dirname)</label></div>
</div>
<div class="col">
<div class="check-row"><input type="checkbox" id="eES2024" checked onchange="gen()"><label for="eES2024">ES2024 globals</label></div>
</div>
</div>
</div>

<div class="section">
<h3>Custom Rules</h3>
<div id="rulesList"></div>
<button class="add-btn" onclick="addRule()">+ Add Rule</button>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="section" style="margin-top:16px">
<h3>Install Command</h3>
<div class="output" style="margin-top:0;min-height:auto">
<button class="copy-btn" onclick="copyInstall()">Copy</button>
<pre id="installCmd"></pre>
</div>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/tsconfig-gen/">tsconfig Gen</a> | <a href="https://gokuscraper.github.io/dev-vault/package-json-gen/">package.json Gen</a> | <a href="https://gokuscraper.github.io/dev-vault/gh-actions-gen/">GH Actions Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const COMMON_RULES = [
  'no-unused-vars','no-console','no-debugger','eqeqeq','curly','prefer-const',
  'no-var','arrow-body-style','prefer-template','no-implicit-coercion',
  'no-throw-literal','no-return-await','require-await','no-shadow',
  '@typescript-eslint/no-unused-vars','@typescript-eslint/no-explicit-any',
  '@typescript-eslint/consistent-type-imports','@typescript-eslint/no-floating-promises',
  'react/react-in-jsx-scope','react-hooks/rules-of-hooks','react-hooks/exhaustive-deps',
  'import-x/order','import-x/no-duplicates','import-x/no-unresolved'
];

const PRESETS = {
  'JavaScript': {js:true,ts:false,react:false,next:false,import:false,prettier:false,node:false,browser:true,nodeEnv:false,rules:[{k:'no-unused-vars',v:'warn'},{k:'no-console',v:'warn'},{k:'eqeqeq',v:'error'},{k:'prefer-const',v:'error'}]},
  'TypeScript': {js:true,ts:true,react:false,next:false,import:true,prettier:false,node:false,browser:false,nodeEnv:true,rules:[{k:'@typescript-eslint/no-unused-vars',v:'warn'},{k:'@typescript-eslint/no-explicit-any',v:'warn'},{k:'@typescript-eslint/consistent-type-imports',v:'error'}]},
  'React': {js:true,ts:true,react:true,next:false,import:true,prettier:false,node:false,browser:true,nodeEnv:false,rules:[{k:'react/react-in-jsx-scope',v:'off'},{k:'react-hooks/exhaustive-deps',v:'warn'}]},
  'Next.js': {js:true,ts:true,react:true,next:true,import:true,prettier:false,node:false,browser:true,nodeEnv:true,rules:[{k:'react/react-in-jsx-scope',v:'off'}]},
  'Node.js': {js:true,ts:true,react:false,next:false,import:true,prettier:false,node:true,browser:false,nodeEnv:true,rules:[{k:'no-console',v:'off'},{k:'@typescript-eslint/no-unused-vars',v:'warn'}]},
  'Strict': {js:true,ts:true,react:false,next:false,import:true,prettier:false,node:false,browser:false,nodeEnv:true,rules:[{k:'@typescript-eslint/no-explicit-any',v:'error'},{k:'@typescript-eslint/no-floating-promises',v:'error'},{k:'eqeqeq',v:'error'},{k:'curly',v:'error'},{k:'no-var',v:'error'},{k:'prefer-const',v:'error'}]},
  'Prettier': {js:true,ts:true,react:true,next:false,import:true,prettier:true,node:false,browser:true,nodeEnv:false,rules:[{k:'react/react-in-jsx-scope',v:'off'}]},
  'Minimal': {js:true,ts:false,react:false,next:false,import:false,prettier:false,node:false,browser:true,nodeEnv:true,rules:[]}
};

let rules = [];

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('div');b.className='preset';b.textContent=n;
    b.onclick=()=>loadPreset(n);c.appendChild(b);
  });
}

function loadPreset(name){
  const p=PRESETS[name];if(!p)return;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  document.getElementById('pJS').checked=p.js;
  document.getElementById('pTS').checked=p.ts;
  document.getElementById('pReact').checked=p.react;
  document.getElementById('pNext').checked=p.next;
  document.getElementById('pImport').checked=p.import;
  document.getElementById('pPrettier').checked=p.prettier;
  document.getElementById('pNode').checked=p.node;
  document.getElementById('eBrowser').checked=p.browser;
  document.getElementById('eNode').checked=p.nodeEnv;
  rules=JSON.parse(JSON.stringify(p.rules||[]));
  renderRules();gen();
}

function addRule(){rules.push({k:'no-unused-vars',v:'warn'});renderRules();gen()}
function removeRule(i){rules.splice(i,1);renderRules();gen()}

function renderRules(){
  const c=document.getElementById('rulesList');c.innerHTML='';
  rules.forEach((r,i)=>{
    const d=document.createElement('div');d.className='rule-row';
    let opts=COMMON_RULES.map(r2=>`<option${r2===r.k?' selected':''}>${r2}</option>`).join('');
    d.innerHTML=`<select style="flex:2" onchange="rules[${i}].k=this.value;gen()">${opts}<option${COMMON_RULES.includes(r.k)?'':' selected'}>${COMMON_RULES.includes(r.k)?'':r.k}</option></select>
    <select onchange="rules[${i}].v=this.value;gen()"><option${r.v==='off'?' selected':''}>off</option><option${r.v==='warn'?' selected':''}>warn</option><option${r.v==='error'?' selected':''}>error</option></select>
    <span class="rm" onclick="removeRule(${i})">✕</span>`;
    c.appendChild(d);
  });
}

function gen(){
  const js=document.getElementById('pJS').checked;
  const ts=document.getElementById('pTS').checked;
  const react=document.getElementById('pReact').checked;
  const next=document.getElementById('pNext').checked;
  const imp=document.getElementById('pImport').checked;
  const prettier=document.getElementById('pPrettier').checked;
  const node=document.getElementById('pNode').checked;
  const browser=document.getElementById('eBrowser').checked;
  const nodeEnv=document.getElementById('eNode').checked;
  const ignoreStr=document.getElementById('fIgnore').value;

  let imports=[];
  let configs=[];
  let deps=['eslint'];

  if(js){imports.push("import js from '@eslint/js';");configs.push('js.configs.recommended');deps.push('@eslint/js')}
  if(ts){imports.push("import tseslint from 'typescript-eslint';");configs.push('...tseslint.configs.recommended');deps.push('typescript-eslint')}
  if(react){imports.push("import react from 'eslint-plugin-react';");imports.push("import reactHooks from 'eslint-plugin-react-hooks';");deps.push('eslint-plugin-react','eslint-plugin-react-hooks')}
  if(next){imports.push("import next from '@next/eslint-plugin-next';");deps.push('@next/eslint-plugin-next')}
  if(imp){imports.push("import importX from 'eslint-plugin-import-x';");deps.push('eslint-plugin-import-x')}
  if(prettier){imports.push("import prettier from 'eslint-config-prettier';");deps.push('eslint-config-prettier')}
  if(node){imports.push("import n from 'eslint-plugin-n';");deps.push('eslint-plugin-n')}
  if(browser||nodeEnv) imports.push("import globals from 'globals';");
  if(browser||nodeEnv) deps.push('globals');

  let out = imports.join('\n')+'\n\nexport default [\n';

  // Ignores
  const ignores=ignoreStr.split(',').map(s=>s.trim()).filter(Boolean);
  if(ignores.length){
    out+=`  { ignores: [${ignores.map(i=>`'${i}'`).join(', ')}] },\n`;
  }

  // Extends
  configs.forEach(c=>out+=`  ${c},\n`);

  // Main config
  out+='  {\n';
  const filePattern=document.getElementById('fInclude').value;
  if(filePattern) out+=`    files: ['${filePattern}'],\n`;

  // Language options
  let hasLangOpts = browser||nodeEnv||ts;
  if(hasLangOpts){
    out+='    languageOptions: {\n';
    let globs=[];
    if(browser) globs.push('...globals.browser');
    if(nodeEnv) globs.push('...globals.node');
    if(globs.length) out+=`      globals: { ${globs.join(', ')} },\n`;
    if(ts) out+=`      parserOptions: { project: true },\n`;
    out+='    },\n';
  }

  // Plugins
  let pluginEntries=[];
  if(react) pluginEntries.push("react", "      'react-hooks': reactHooks");
  if(next) pluginEntries.push("      next");
  if(imp) pluginEntries.push("      'import-x': importX");
  if(node) pluginEntries.push("      n");
  if(pluginEntries.length){
    out+='    plugins: {\n';
    if(react){out+="      react,\n      'react-hooks': reactHooks,\n"}
    if(next) out+="      '@next/next': next,\n";
    if(imp) out+="      'import-x': importX,\n";
    if(node) out+="      n,\n";
    out+='    },\n';
  }

  // Settings
  if(react){
    out+="    settings: { react: { version: 'detect' } },\n";
  }

  // Rules
  if(rules.length){
    out+='    rules: {\n';
    rules.forEach(r=>{
      if(r.k) out+=`      '${r.k}': '${r.v}',\n`;
    });
    out+='    },\n';
  }

  out+='  },\n';

  // Prettier (must be last)
  if(prettier) out+='  prettier,\n';

  out+='];\n';

  document.getElementById('out').textContent=out;

  // Install command
  const uniqueDeps=[...new Set(deps)];
  document.getElementById('installCmd').textContent=`npm install -D ${uniqueDeps.join(' ')}`;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  showToast();
}
function copyInstall(){
  navigator.clipboard.writeText(document.getElementById('installCmd').textContent);
  showToast();
}
function showToast(){
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('TypeScript');
</script>
</body>
</html>
