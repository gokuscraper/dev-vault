<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSH Config Generator — Build ~/.ssh/config Visually</title>
<meta name="description" content="Generate SSH config file visually. Add hosts, keys, proxy jumps, port forwarding. 6 presets for common setups. No signup.">
<link rel="canonical" href="https://yurukusa.github.io/ssh-config-gen/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"SSH Config Generator","description":"Build SSH config files visually with host entries, keys, proxies, and port forwarding.","url":"https://yurukusa.github.io/ssh-config-gen/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"yurukusa","url":"https://github.com/yurukusa"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:'Fira Code',monospace}
input:focus,select:focus{border-color:#3b82f6}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
.host-item{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;padding:12px;margin-bottom:8px;position:relative}
.host-item .remove{position:absolute;top:6px;right:8px;color:#666;cursor:pointer;font-size:0.8rem}
.host-item .remove:hover{color:#f85149}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>SSH Config Generator</h1>
<p class="sub">Build ~/.ssh/config visually — hosts, keys, proxies, tunnels</p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Global Defaults</h3>
<div class="check-row"><input type="checkbox" id="keepAlive" checked onchange="gen()"><label for="keepAlive">ServerAliveInterval 60</label></div>
<div class="check-row"><input type="checkbox" id="addKeys" checked onchange="gen()"><label for="addKeys">AddKeysToAgent yes</label></div>
<div class="check-row"><input type="checkbox" id="strictHost" onchange="gen()"><label for="strictHost">StrictHostKeyChecking no</label></div>
</div>

<div class="section">
<h3>Hosts</h3>
<div id="hostList"></div>
<button class="add-btn" onclick="addHost()">+ Add Host</button>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/curl-builder/">cURL Builder</a> | <a href="https://yurukusa.github.io/chmod-calc/">chmod Calc</a> | <a href="https://yurukusa.github.io/password-gen/">Password Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const PRESETS={
'Basic Server':[
  {alias:'prod',hostname:'192.168.1.100',user:'deploy',port:'22',key:'~/.ssh/id_ed25519',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
],
'GitHub':[
  {alias:'github.com',hostname:'github.com',user:'git',port:'22',key:'~/.ssh/github_ed25519',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
],
'Jump Host':[
  {alias:'bastion',hostname:'bastion.example.com',user:'admin',port:'22',key:'~/.ssh/bastion_key',jump:'',localForward:'',remoteForward:'',forwardAgent:false},
  {alias:'internal',hostname:'10.0.0.50',user:'deploy',port:'22',key:'~/.ssh/internal_key',jump:'bastion',localForward:'',remoteForward:'',forwardAgent:true}
],
'Multi-env':[
  {alias:'staging',hostname:'staging.example.com',user:'deploy',port:'22',key:'~/.ssh/staging_key',jump:'',localForward:'',remoteForward:'',forwardAgent:false},
  {alias:'production',hostname:'prod.example.com',user:'deploy',port:'22',key:'~/.ssh/prod_key',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
],
'Tunnel / Port Forward':[
  {alias:'db-tunnel',hostname:'server.example.com',user:'admin',port:'22',key:'~/.ssh/id_ed25519',jump:'',localForward:'5432:localhost:5432',remoteForward:'',forwardAgent:false}
],
'AWS EC2':[
  {alias:'ec2-web',hostname:'ec2-12-34-56-78.compute-1.amazonaws.com',user:'ec2-user',port:'22',key:'~/.ssh/aws-key.pem',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
]
};

let hosts=[];

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('div');b.className='preset';b.textContent=n;
    b.onclick=()=>{
      document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
      b.classList.add('active');
      hosts=JSON.parse(JSON.stringify(PRESETS[n]));
      renderHosts();gen();
    };
    c.appendChild(b);
  });
}

function addHost(){
  hosts.push({alias:'myserver',hostname:'192.168.1.1',user:'root',port:'22',key:'~/.ssh/id_ed25519',jump:'',localForward:'',remoteForward:'',forwardAgent:false});
  renderHosts();gen();
}

function removeHost(i){hosts.splice(i,1);renderHosts();gen()}

function renderHosts(){
  const c=document.getElementById('hostList');c.innerHTML='';
  hosts.forEach((h,i)=>{
    const d=document.createElement('div');d.className='host-item';
    d.innerHTML=`<span class="remove" onclick="removeHost(${i})">✕</span>
    <div class="row">
      <div class="col"><label>Host Alias</label><input value="${esc(h.alias)}" onchange="hosts[${i}].alias=this.value;gen()"></div>
      <div class="col"><label>HostName (IP/domain)</label><input value="${esc(h.hostname)}" onchange="hosts[${i}].hostname=this.value;gen()"></div>
    </div>
    <div class="row">
      <div class="col"><label>User</label><input value="${esc(h.user)}" onchange="hosts[${i}].user=this.value;gen()"></div>
      <div class="col" style="max-width:100px"><label>Port</label><input value="${esc(h.port)}" onchange="hosts[${i}].port=this.value;gen()"></div>
      <div class="col"><label>IdentityFile</label><input value="${esc(h.key)}" onchange="hosts[${i}].key=this.value;gen()"></div>
    </div>
    <div class="row">
      <div class="col"><label>ProxyJump (via host alias)</label><input value="${esc(h.jump)}" onchange="hosts[${i}].jump=this.value;gen()" placeholder="bastion"></div>
    </div>
    <div class="row">
      <div class="col"><label>LocalForward (local:remote:remotePort)</label><input value="${esc(h.localForward)}" onchange="hosts[${i}].localForward=this.value;gen()" placeholder="5432:localhost:5432"></div>
      <div class="col"><label>RemoteForward</label><input value="${esc(h.remoteForward)}" onchange="hosts[${i}].remoteForward=this.value;gen()" placeholder="8080:localhost:3000"></div>
    </div>
    <div class="check-row"><input type="checkbox" ${h.forwardAgent?'checked':''} onchange="hosts[${i}].forwardAgent=this.checked;gen()" id="fa${i}"><label for="fa${i}">ForwardAgent</label></div>`;
    c.appendChild(d);
  });
}

function gen(){
  let conf='# ~/.ssh/config\n# Generated by ssh-config-gen\n\n';

  // Global
  const globals=[];
  if(document.getElementById('keepAlive').checked) globals.push('  ServerAliveInterval 60','  ServerAliveCountMax 3');
  if(document.getElementById('addKeys').checked) globals.push('  AddKeysToAgent yes');
  if(document.getElementById('strictHost').checked) globals.push('  StrictHostKeyChecking no','  UserKnownHostsFile /dev/null');
  if(globals.length){
    conf+='Host *\n'+globals.join('\n')+'\n\n';
  }

  // Hosts
  hosts.forEach(h=>{
    conf+=`Host ${h.alias}\n`;
    if(h.hostname) conf+=`  HostName ${h.hostname}\n`;
    if(h.user) conf+=`  User ${h.user}\n`;
    if(h.port&&h.port!=='22') conf+=`  Port ${h.port}\n`;
    if(h.key) conf+=`  IdentityFile ${h.key}\n`;
    if(h.jump) conf+=`  ProxyJump ${h.jump}\n`;
    if(h.localForward) conf+=`  LocalForward ${h.localForward}\n`;
    if(h.remoteForward) conf+=`  RemoteForward ${h.remoteForward}\n`;
    if(h.forwardAgent) conf+=`  ForwardAgent yes\n`;
    conf+='\n';
  });

  document.getElementById('out').textContent=conf;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
hosts=JSON.parse(JSON.stringify(PRESETS['Basic Server']));
renderHosts();gen();
</script>
</body>
</html>
