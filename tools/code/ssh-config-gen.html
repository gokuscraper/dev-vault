<div class="check-row"><input type="checkbox" id="addKeys" checked onchange="gen()"><label for="addKeys" ti="label_addkeystoagent_yes">AddKeysToAgent yes</label></div>
<div class="check-row"><input type="checkbox" id="strictHost" onchange="gen()"><label for="strictHost" ti="label_stricthostkeychecking_no">StrictHostKeyChecking no</label></div>
</div>

<div class="section">
<h3 ti="h3_hosts">Hosts</h3>

<button class="add-btn" onclick="addHost()" ti="btn_add_host">+ Add Host</button>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const PRESETS={
'Basic Server':[
  {alias:'prod',hostname:'192.168.1.100',user:'deploy',port:'22',key:'~/.ssh/id_ed25519',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
],
'GitHub':[
  {alias:'github.com',hostname:'github.com',user:'git',port:'22',key:'~/.ssh/github_ed25519',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
],
'Jump Host':[
  {alias:'bastion',hostname:'bastion.example.com',user:'admin',port:'22',key:'~/.ssh/bastion_key',jump:'',localForward:'',remoteForward:'',forwardAgent:false},
  {alias:'internal',hostname:'10.0.0.50',user:'deploy',port:'22',key:'~/.ssh/internal_key',jump:'bastion',localForward:'',remoteForward:'',forwardAgent:true}
],
'Multi-env':[
  {alias:'staging',hostname:'staging.example.com',user:'deploy',port:'22',key:'~/.ssh/staging_key',jump:'',localForward:'',remoteForward:'',forwardAgent:false},
  {alias:'production',hostname:'prod.example.com',user:'deploy',port:'22',key:'~/.ssh/prod_key',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
],
'Tunnel / Port Forward':[
  {alias:'db-tunnel',hostname:'server.example.com',user:'admin',port:'22',key:'~/.ssh/id_ed25519',jump:'',localForward:'5432:localhost:5432',remoteForward:'',forwardAgent:false}
],
'AWS EC2':[
  {alias:'ec2-web',hostname:'ec2-12-34-56-78.compute-1.amazonaws.com',user:'ec2-user',port:'22',key:'~/.ssh/aws-key.pem',jump:'',localForward:'',remoteForward:'',forwardAgent:false}
]
};

let hosts=[];

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('div');b.className='preset';b.textContent=n;
    b.onclick=()=>{
      document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
      b.classList.add('active');
      hosts=JSON.parse(JSON.stringify(PRESETS[n]));
      renderHosts();gen();
    };
    c.appendChild(b);
  });
}

function addHost(){
  hosts.push({alias:'myserver',hostname:'192.168.1.1',user:'root',port:'22',key:'~/.ssh/id_ed25519',jump:'',localForward:'',remoteForward:'',forwardAgent:false});
  renderHosts();gen();
}

function removeHost(i){hosts.splice(i,1);renderHosts();gen()}

function renderHosts(){
  const c=document.getElementById('hostList');c.innerHTML='';
  hosts.forEach((h,i)=>{
    const d=document.createElement('div');d.className='host-item';
    d.innerHTML=`<span class="remove" onclick="removeHost(${i})">✕</span>
    <div class="row">
      <div class="col"><label ti="label_host_alias">Host Alias</label><input value="${esc(h.alias)}" onchange="hosts[${i}].alias=this.value;gen()"></div>
      <div class="col"><label ti="label_hostname_ip_domain">HostName (IP/domain)</label><input value="${esc(h.hostname)}" onchange="hosts[${i}].hostname=this.value;gen()"></div>
    </div>
    <div class="row">
      <div class="col"><label ti="label_user">User</label><input value="${esc(h.user)}" onchange="hosts[${i}].user=this.value;gen()"></div>
      <div class="col" style="max-width:100px"><label ti="label_port">Port</label><input value="${esc(h.port)}" onchange="hosts[${i}].port=this.value;gen()"></div>
      <div class="col"><label ti="label_identityfile">IdentityFile</label><input value="${esc(h.key)}" onchange="hosts[${i}].key=this.value;gen()"></div>
    </div>
    <div class="row">
      <div class="col"><label ti="label_proxyjump_via_host_alias">ProxyJump (via host alias)</label><input value="${esc(h.jump)}" onchange="hosts[${i}].jump=this.value;gen()" tp="placeholder_bastion" placeholder="bastion"></div>
    </div>
    <div class="row">
      <div class="col"><label ti="label_localforward_local_remote">LocalForward (local:remote:remotePort)</label><input value="${esc(h.localForward)}" onchange="hosts[${i}].localForward=this.value;gen()" tp="placeholder_5432_localhost_5432" placeholder="5432:localhost:5432"></div>
      <div class="col"><label ti="label_remoteforward">RemoteForward</label><input value="${esc(h.remoteForward)}" onchange="hosts[${i}].remoteForward=this.value;gen()" tp="placeholder_8080_localhost_3000" placeholder="8080:localhost:3000"></div>
    </div>
    <div class="check-row"><input type="checkbox" ${h.forwardAgent?'checked':''} onchange="hosts[${i}].forwardAgent=this.checked;gen()" id="fa${i}"><label for="fa${i}" ti="label_forwardagent">ForwardAgent</label></div>`;
    c.appendChild(d);
  });
}

function gen(){
  let conf='# ~/.ssh/config\n# Generated by ssh-config-gen\n\n';

  // Global
  const globals=[];
  if(document.getElementById('keepAlive').checked) globals.push('  ServerAliveInterval 60','  ServerAliveCountMax 3');
  if(document.getElementById('addKeys').checked) globals.push('  AddKeysToAgent yes');
  if(document.getElementById('strictHost').checked) globals.push('  StrictHostKeyChecking no','  UserKnownHostsFile /dev/null');
  if(globals.length){
    conf+='Host *\n'+globals.join('\n')+'\n\n';
  }

  // Hosts
  hosts.forEach(h=>{
    conf+=`Host ${h.alias}\n`;
    if(h.hostname) conf+=`  HostName ${h.hostname}\n`;
    if(h.user) conf+=`  User ${h.user}\n`;
    if(h.port&&h.port!=='22') conf+=`  Port ${h.port}\n`;
    if(h.key) conf+=`  IdentityFile ${h.key}\n`;
    if(h.jump) conf+=`  ProxyJump ${h.jump}\n`;
    if(h.localForward) conf+=`  LocalForward ${h.localForward}\n`;
    if(h.remoteForward) conf+=`  RemoteForward ${h.remoteForward}\n`;
    if(h.forwardAgent) conf+=`  ForwardAgent yes\n`;
    conf+='\n';
  });

  document.getElementById('out').textContent=conf;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
hosts=JSON.parse(JSON.stringify(PRESETS['Basic Server']));
renderHosts();gen();
</script>
