<script>
const WORDS = {
easy: ["the","be","to","of","and","a","in","that","have","i","it","for","not","on","with","he","as","you","do","at","this","but","his","by","from","they","we","her","she","or","an","will","my","one","all","would","there","their","what","so","up","out","if","about","who","get","which","go","me","when","make","can","like","time","no","just","him","know","take","people","into","year","your","good","some","could","them","see","other","than","then","now","look","only","come","its","over","think","also","back","after","use","two","how","our","work","first","well","way","even","new","want","because","any","these","give","day","most","us","great","help","very","still","own","need","much","right","big","old","long","run","small","try","ask","said","play","life","part","name","read","hand","high","keep","start","set","end","find","let","home","last","same","tell","did","thing","off","put","each","too","best","hard","open","early","move","left","pay","close","side","been","real","line","turn","head","long","must","own","run","sure","full","kind","mean","nice","late","past","next","less","hold","seem","idea","hear","feel","plan","walk","room","wait","pick","grow","talk","list","stop","show","care","rest","food","call","top","form","eat","hot","add","stay","low","step","wide","half","live","power","mind","field","done","fast"],
medium: ["about","above","accept","across","actually","address","admit","afraid","afternoon","against","agree","ahead","allow","almost","already","although","always","amount","angle","angry","animal","announce","another","answer","anyone","anything","anyway","appear","apple","area","argue","around","arrive","article","attend","aunt","avoid","awful","baby","balance","basket","battle","beach","beauty","become","before","began","begin","behind","believe","belong","below","bend","beside","beyond","billion","blanket","block","blood","board","bone","border","borrow","bottom","brain","branch","brave","bread","break","breathe","bridge","bright","broad","broken","brother","brown","build","bunch","burn","business","busy","butter","cabin","calm","camera","camp","cancel","capable","capital","captain","capture","career","careful","carry","catch","cause","center","central","certain","chair","challenge","champion","chance","change","chapter","charge","chart","cheap","check","cheese","chief","child","choice","choose","church","circle","citizen","civil","claim","class","clean","clear","climb","clock","closely","cloud","coach","coast","coffee","cold","collect","college","color","column","combine","comfort","command","comment","common","community","company","compare","complete","concern","condition","conduct","conference","confirm","conflict","confuse","connect","consider","constant","contact","contain","content","context","continue","contract","control","convert","correct","corner"],
hard: ["aberration","abstraction","acquiesce","algorithm","amalgamation","ambiguity","anachronism","antithesis","apocryphal","archipelago","asymptotic","bureaucracy","cacophony","capitulation","circumlocution","cognizance","concatenation","conflagration","conglomerate","corroborate","crystallization","decentralization","decomposition","decontamination","dereference","deterministic","disambiguation","ephemeral","epistemological","extrapolation","idempotent","implementation","infrastructure","instantiation","interpolation","juxtaposition","lexicographic","metamorphosis","methodology","nomenclature","obfuscation","orchestration","parallelization","paradigm","permutation","polymorphism","pontificate","procrastination","quintessential","recapitulation","reconciliation","refactoring","reverberation","serialization","specification","stratification","synchronization","transformation","ubiquitous","unambiguous","unprecedented","vulnerability","authentication","authorization","containerization","microservices","observability","orchestration","provisioning","redundancy","scalability","throughput","virtualization","middleware","monolithic","deployment","repository","dependency","encapsulation","inheritance","abstraction"],
code: ["function","return","const","let","var","if","else","for","while","do","switch","case","break","continue","default","try","catch","throw","finally","class","extends","constructor","super","this","new","delete","typeof","instanceof","import","export","from","async","await","yield","promise","resolve","reject","null","undefined","true","false","void","static","public","private","protected","interface","implements","enum","type","readonly","abstract","override","string","number","boolean","array","object","map","set","filter","reduce","forEach","indexOf","includes","length","push","pop","shift","splice","slice","concat","join","split","trim","replace","match","test","exec","JSON","parse","stringify","console","log","error","warn","debug","document","window","element","querySelector","addEventListener","setTimeout","setInterval","clearTimeout","fetch","response","request","headers","body","method","status","error","callback","middleware","router","express","require","module","exports","process","argv","stdin","stdout","stderr","buffer","stream","pipe","event","emit","listen","socket","connect","close","read","write","open","path","file","directory"]
};

let targetText = '';
let charStates = [];
let startTime = null;
let timerInterval = null;
let finished = false;
let currentPos = 0;
let errorCount = 0;
let totalTyped = 0;
let difficulty = 'easy';
let wordCount = 25;

const $ = id => document.getElementById(id);
const display = $('textDisplay');
const input = $('inputArea');
const customText = $('customText');

function pick(arr, n) {
  const result = [];
  for (let i = 0; i < n; i++) result.push(arr[Math.floor(Math.random() * arr.length)]);
  return result;
}

function generateText() {
  if (difficulty === 'custom') {
    const t = customText.value.trim();
    return t || pick(WORDS.easy, wordCount).join(' ');
  }
  if (difficulty === 'code') {
    const lines = [];
    const kw = WORDS.code;
    let remaining = wordCount;
    while (remaining > 0) {
      const len = Math.min(3 + Math.floor(Math.random() * 5), remaining);
      lines.push(pick(kw, len).join(' '));
      remaining -= len;
    }
    return lines.join('\n');
  }
  return pick(WORDS[difficulty] || WORDS.easy, wordCount).join(' ');
}

function renderDisplay() {
  display.innerHTML = '';
  for (let i = 0; i < targetText.length; i++) {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = targetText[i] === '\n' ? '\u21b5\n' : targetText[i];
    if (charStates[i] === 'correct') span.classList.add('correct');
    else if (charStates[i] === 'incorrect') span.classList.add('incorrect');
    if (i === currentPos && !finished) span.classList.add('current');
    display.appendChild(span);
  }
}

function reset() {
  targetText = generateText();
  charStates = new Array(targetText.length).fill('');
  currentPos = 0;
  errorCount = 0;
  totalTyped = 0;
  startTime = null;
  finished = false;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  input.value = '';
  input.disabled = false;
  $('liveWpm').textContent = '0';
  $('liveAcc').textContent=T("jtc_100");
  $('liveTime').textContent=T("jtc_0s");
  $('results').style.display = 'none';
  renderDisplay();
  input.focus();
}

function elapsed() { return startTime ? (Date.now() - startTime) / 1000 : 0; }

function calcWpm() {
  const mins = elapsed() / 60;
  if (mins < 0.01) return 0;
  return Math.round((currentPos / 5) / mins);
}

function calcAcc() {
  if (totalTyped === 0) return 100;
  return Math.round(((totalTyped - errorCount) / totalTyped) * 100);
}

function updateLive() {
  $('liveWpm').textContent = calcWpm();
  $('liveAcc').textContent = calcAcc() + '%';
  $('liveTime').textContent = Math.floor(elapsed()) + 's';
}

function finish() {
  finished = true;
  input.disabled = true;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const wpm = calcWpm();
  const secs = Math.round(elapsed());
  const mins = elapsed() / 60;
  const cpm = mins > 0.01 ? Math.round(currentPos / mins) : 0;
  const acc = calcAcc();
  $('resWpm').textContent = wpm;
  $('resCpm').textContent = cpm;
  $('resAcc').textContent = acc + '%';
  $('resErrors').textContent = errorCount;
  $('resTime').textContent = secs + 's';
  $('results').style.display = 'block';
  renderDisplay();
  saveHistory({ wpm, cpm, acc, errors: errorCount, time: secs, diff: difficulty, wc: wordCount, date: new Date().toISOString() });
  renderHistory();
}

function saveHistory(entry) {
  let h = JSON.parse(localStorage.getItem('typingHistory') || '[]');
  h.unshift(entry);
  if (h.length > 5) h = h.slice(0, 5);
  localStorage.setItem('typingHistory', JSON.stringify(h));
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('typingHistory') || '[]');
  if (!h.length) { $('historySection').style.display = 'none'; return; }
  $('historySection').style.display = 'block';
  const best = Math.max(...h.map(e => e.wpm));
  $('historyList').innerHTML = h.map(e => {
    const badge = e.wpm === best ? '<span class="best-badge">BEST</span>' : '';
    const d = new Date(e.date);
    const ts = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    return `<div class="history-row"><span><span class="wpm">${e.wpm} WPM</span>${badge} &middot; ${e.acc}% &middot; ${e.diff} ${e.wc}w</span><span>${ts}</span></div>`;
  }).join('');
}

input.addEventListener('input', () => {
  if (finished) return;
  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(updateLive, 200);
  }
  const typed = input.value;
  charStates = new Array(targetText.length).fill('');
  let errors = 0;
  for (let i = 0; i < typed.length && i < targetText.length; i++) {
    if (typed[i] === targetText[i]) {
      charStates[i] = 'correct';
    } else {
      charStates[i] = 'incorrect';
      errors++;
    }
  }
  currentPos = Math.min(typed.length, targetText.length);
  errorCount = errors;
  totalTyped = typed.length;
  renderDisplay();
  updateLive();
  if (typed.length >= targetText.length) finish();
});

input.addEventListener('paste', e => e.preventDefault());
input.addEventListener('drop', e => e.preventDefault());

document.querySelectorAll('#difficultyBtns .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#difficultyBtns .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    customText.style.display = difficulty === 'custom' ? 'block' : 'none';
    reset();
  });
});

document.querySelectorAll('#wordCountBtns .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#wordCountBtns .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    wordCount = parseInt(btn.dataset.wc);
    reset();
  });
});

$('restartBtn').addEventListener('click', reset);

document.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    $('restartBtn').focus();
  }
  if (e.key === 'Enter' && document.activeElement === $('restartBtn')) {
    reset();
  }
});

customText.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); reset(); }
});

reset();
renderHistory();
</script>
