<script>
function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',t.textContent.toLowerCase().includes(name.slice(0,3))));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

// UUID v4
function uuidv4(){
  return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;
    return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

// UUID v7 (RFC 9562)
function uuidv7(){
  const now=Date.now();
  const ms=now.toString(16).padStart(12,'0');
  const rand=crypto.getRandomValues(new Uint8Array(10));
  let hex=ms;
  hex+=((rand[0]&0x0f)|0x70).toString(16).padStart(2,'0');
  hex+=(rand[1]).toString(16).padStart(2,'0');
  hex+=((rand[2]&0x3f)|0x80).toString(16).padStart(2,'0');
  for(let i=3;i<10;i++)hex+=rand[i].toString(16).padStart(2,'0');
  return hex.slice(0,8)+'-'+hex.slice(8,12)+'-'+hex.slice(12,16)+'-'+hex.slice(16,20)+'-'+hex.slice(20,32);
}

// ULID
function ulid(){
  const CHARS='0123456789ABCDEFGHJKMNPQRSTVWXYZ';
  const now=Date.now();
  let str='';
  let t=now;
  for(let i=9;i>=0;i--){str=CHARS[t%32]+str;t=Math.floor(t/32)}
  const rand=crypto.getRandomValues(new Uint8Array(10));
  for(let i=0;i<16;i++)str+=CHARS[rand[i%10]%32];
  return str;
}

// nanoid
function nanoid(size=21){
  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-';
  const rand=crypto.getRandomValues(new Uint8Array(size));
  return Array.from(rand,b=>CHARS[b%64]).join('');
}

// Short ID
function shortid(){
  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const rand=crypto.getRandomValues(new Uint8Array(8));
  return Array.from(rand,b=>CHARS[b%62]).join('');
}

function genById(type){
  switch(type){
    case'v4':return uuidv4();
    case'v7':return uuidv7();
    case'ulid':return ulid();
    case'nanoid':return nanoid();
    case'short':return shortid();
    default:return uuidv4();
  }
}

function generate(){
  const type=document.getElementById('uuidType').value;
  const cas=document.getElementById('uuidCase').value;
  let id=genById(type);
  if(cas==='upper')id=id.toUpperCase();
  else id=id.toLowerCase();
  // ULID is naturally uppercase
  if(type==='ulid'&&cas==='lower')id=id.toLowerCase();
  document.getElementById('uuidOutput').textContent=id;
}

function copyUuid(){
  const text=document.getElementById('uuidOutput').textContent;
  if(text){navigator.clipboard.writeText(text);toast('Copied!')}
}

function bulkGenerate(){
  const type=document.getElementById('bulkType').value;
  const count=Math.min(1000,Math.max(1,+document.getElementById('bulkCount').value||10));
  const ids=[];
  for(let i=0;i<count;i++)ids.push(genById(type));
  document.getElementById('bulkOutput').textContent=ids.join('\n');
}

function copyBulk(){
  const text=document.getElementById('bulkOutput').textContent;
  navigator.clipboard.writeText(text);
  toast('All Copied!');
}

function validateUuid(){
  const input=document.getElementById('validateInput').value.trim();
  const el=document.getElementById('validateResult');
  if(!input){el.innerHTML='';return}

  const uuidRegex=/^[0-9a-f]{8}-[0-9a-f]{4}-([0-9a-f])[0-9a-f]{3}-([0-9a-f])[0-9a-f]{3}-[0-9a-f]{12}$/i;
  const match=input.match(uuidRegex);

  if(match){
    const version=parseInt(match[1],16);
    const variantBit=parseInt(match[2],16);
    let variant='Unknown';
    if((variantBit&0x8)===0)variant='NCS (reserved)';
    else if((variantBit&0xc)===0x8)variant='RFC 4122 / RFC 9562';
    else if((variantBit&0xe)===0xc)variant='Microsoft (reserved)';
    else variant='Future (reserved)';

    let extra='';
    if(version===7){
      // Extract timestamp from v7
      const tsHex=input.replace(/-/g,'').slice(0,12);
      const ts=parseInt(tsHex,16);
      if(ts>0)extra=`<div class="parse-item"><span class="lbl">Timestamp: </span><span class="val">${new Date(ts).toISOString()}</span></div>`;
    }

    el.innerHTML=`<div class="validate-result valid">
      ✓ Valid UUID
      <div class="parse-grid">
        <div class="parse-item"><span class="lbl">Version: </span><span class="val">${version}</span></div>
        <div class="parse-item"><span class="lbl">Variant: </span><span class="val">${variant}</span></div>
        ${extra}
      </div>
    </div>`;
  }else{
    // Check if it's a ULID
    const ulidRegex=/^[0-9A-HJKMNP-TV-Z]{26}$/i;
    if(ulidRegex.test(input)){
      el.innerHTML=`<div class="validate-result valid">✓ Valid ULID</div>`;
    }else{
      el.innerHTML=`<div class="validate-result invalid">✗ Not a valid UUID or ULID</div>`;
    }
  }
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

generate();
</script>
