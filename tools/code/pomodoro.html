<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer — Focus & Break Cycle Timer</title>
<meta name="description" content="Free Pomodoro timer with work/break cycles, browser notifications, progress tracking, and session history. No signup, no ads.">
<meta property="og:title" content="Pomodoro Timer — Focus & Break Cycle Timer">
<meta property="og:description" content="Focus timer with customizable work/break cycles, notifications, and session tracking.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/pomodoro/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://yurukusa.github.io/pomodoro/">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Pomodoro Timer",
  "description": "Free Pomodoro focus timer with work/break cycles, browser notifications, audio alerts, progress tracking, and session history.",
  "url": "https://yurukusa.github.io/pomodoro/",
  "applicationCategory": "ProductivityApplication",
  "operatingSystem": "Any",
  "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
  "author": {"@type": "Organization", "name": "yurukusa", "url": "https://github.com/yurukusa"}
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;flex-direction:column}
.container{max-width:640px;margin:0 auto;padding:24px 16px;flex:1;width:100%}
h1{text-align:center;font-size:1.6rem;color:#fff;margin-bottom:4px;padding-top:24px}
.subtitle{text-align:center;color:#888;font-size:0.85rem;margin-bottom:28px}
.timer-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.ring-container{position:relative;width:260px;height:260px}
.ring-container svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#222;stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke 0.3s}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-text .time{font-size:3.6rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-text .phase{font-size:0.9rem;font-weight:600;margin-top:4px}
.round-info{text-align:center;color:#888;font-size:0.85rem;margin-top:12px}
.controls{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.btn{padding:10px 22px;border-radius:10px;border:1px solid #333;background:#161616;color:#e6e6e6;font-size:0.9rem;cursor:pointer;font-weight:600;transition:background 0.2s,border-color 0.2s}
.btn:hover{background:#1c1c1c;border-color:#555}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.btn:disabled{opacity:0.4;cursor:default}
.task-row{margin-bottom:24px}
.task-row input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:0.88rem;outline:none}
.task-row input:focus{border-color:#4da6ff}
.task-row input::placeholder{color:#555}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:18px;margin-bottom:16px}
.card h2{font-size:1rem;color:#4da6ff;margin-bottom:12px;font-weight:600}
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.preset-btn{padding:6px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#888;font-size:0.78rem;cursor:pointer;font-weight:600}
.preset-btn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.preset-btn:hover:not(.active){background:#1c1c1c}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.setting-row label{font-size:0.85rem;color:#aaa}
.setting-row input[type=range]{width:120px;accent-color:#4da6ff}
.setting-row .val{font-size:0.85rem;color:#fff;min-width:32px;text-align:right}
.stats{display:flex;gap:16px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;text-align:center;padding:10px;background:#0a0a0a;border-radius:8px}
.stat .num{font-size:1.4rem;font-weight:700;color:#fff}
.stat .lbl{font-size:0.72rem;color:#666;margin-top:2px}
.history-list{max-height:180px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a1a;font-size:0.82rem}
.history-item .h-time{color:#888}
.history-item .h-task{color:#ccc;flex:1;margin-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .h-dur{color:#4da6ff}
.empty{color:#555;font-size:0.82rem;text-align:center;padding:12px}
footer{text-align:center;padding:24px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:480px){.ring-container{width:220px;height:220px}.timer-text .time{font-size:2.8rem}.controls{flex-wrap:wrap}h1{font-size:1.3rem}}
</style>
</head>
<body>
<div class="container">
<h1>Pomodoro Timer</h1>
<p class="subtitle">Focus & Break Cycle Timer</p>

<div class="timer-wrap">
  <div class="ring-container">
    <svg id="ringSvg" width="100%" height="100%" viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="116"/>
      <circle id="ringFg" class="ring-fg" cx="130" cy="130" r="116" stroke="#ef4444" stroke-dasharray="729.2" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="time" id="timerDisplay">25:00</div>
      <div class="phase" id="phaseLabel" style="color:#ef4444">Work</div>
    </div>
  </div>
  <div class="round-info" id="roundInfo">Round 1 of 4</div>
</div>

<div class="controls">
  <button class="btn primary" id="startBtn" onclick="toggleTimer()">Start</button>
  <button class="btn" id="resetBtn" onclick="resetTimer()">Reset</button>
  <button class="btn" id="skipBtn" onclick="skipPhase()">Skip</button>
</div>

<div class="task-row">
  <input type="text" id="taskInput" placeholder="What are you working on?" maxlength="80">
</div>

<div class="card">
  <h2>Presets</h2>
  <div class="presets">
    <button class="preset-btn active" onclick="applyPreset(25,5,15,4,this)">Classic 25/5/15</button>
    <button class="preset-btn" onclick="applyPreset(15,3,10,4,this)">Short Sprint 15/3/10</button>
    <button class="preset-btn" onclick="applyPreset(50,10,20,4,this)">Deep Work 50/10/20</button>
  </div>
  <div class="setting-row"><label>Work</label><input type="range" id="sWork" min="15" max="60" value="25" oninput="updateSetting()"><span class="val" id="vWork">25m</span></div>
  <div class="setting-row"><label>Short Break</label><input type="range" id="sShort" min="3" max="15" value="5" oninput="updateSetting()"><span class="val" id="vShort">5m</span></div>
  <div class="setting-row"><label>Long Break</label><input type="range" id="sLong" min="10" max="30" value="15" oninput="updateSetting()"><span class="val" id="vLong">15m</span></div>
  <div class="setting-row"><label>Long break after</label><input type="range" id="sRounds" min="2" max="6" value="4" oninput="updateSetting()"><span class="val" id="vRounds">4</span></div>
</div>

<div class="card">
  <h2>Today's Progress</h2>
  <div class="stats">
    <div class="stat"><div class="num" id="statSessions">0</div><div class="lbl">Sessions</div></div>
    <div class="stat"><div class="num" id="statFocus">0m</div><div class="lbl">Focus Time</div></div>
  </div>
</div>

<div class="card">
  <h2>Session History</h2>
  <div class="history-list" id="historyList"><div class="empty">No sessions yet today</div></div>
</div>
</div>

<footer>
  <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a> &middot;
  Related: Stopwatch &middot; Reading Time
</footer>

<script>
const CIRC = 2 * Math.PI * 116; // ~729.2
const STORAGE_KEY = 'pomodoro_history';
const SETTINGS_KEY = 'pomodoro_settings';

let settings = { work: 25, short: 5, long: 15, rounds: 4 };
let phase = 'work'; // work | short | long
let round = 1;
let totalSec = settings.work * 60;
let remainSec = totalSec;
let running = false;
let interval = null;
let lastTick = 0;
let notifPermission = false;

const ringFg = document.getElementById('ringFg');
const timerDisplay = document.getElementById('timerDisplay');
const phaseLabel = document.getElementById('phaseLabel');
const roundInfo = document.getElementById('roundInfo');
const startBtn = document.getElementById('startBtn');

// -- Phase colors --
const colors = { work: '#ef4444', short: '#22c55e', long: '#3b82f6' };

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s) { settings = s; applySettingsToUI(); }
  } catch(e) {}
}

function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function applySettingsToUI() {
  document.getElementById('sWork').value = settings.work;
  document.getElementById('sShort').value = settings.short;
  document.getElementById('sLong').value = settings.long;
  document.getElementById('sRounds').value = settings.rounds;
  updateSettingLabels();
}

function updateSettingLabels() {
  document.getElementById('vWork').textContent = settings.work + 'm';
  document.getElementById('vShort').textContent = settings.short + 'm';
  document.getElementById('vLong').textContent = settings.long + 'm';
  document.getElementById('vRounds').textContent = settings.rounds;
}

function updateSetting() {
  if (running) return;
  settings.work = +document.getElementById('sWork').value;
  settings.short = +document.getElementById('sShort').value;
  settings.long = +document.getElementById('sLong').value;
  settings.rounds = +document.getElementById('sRounds').value;
  updateSettingLabels();
  saveSettings();
  // Clear active preset
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  resetPhase();
}

function applyPreset(w, s, l, r, btn) {
  if (running) return;
  settings = { work: w, short: s, long: l, rounds: r };
  applySettingsToUI();
  saveSettings();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetPhase();
}

function resetPhase() {
  phase = 'work';
  round = 1;
  totalSec = settings.work * 60;
  remainSec = totalSec;
  render();
}

function render() {
  const m = Math.floor(remainSec / 60);
  const s = remainSec % 60;
  const display = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  timerDisplay.textContent = display;
  document.title = display + ' — Pomodoro Timer';

  const color = colors[phase];
  phaseLabel.style.color = color;
  phaseLabel.textContent = phase === 'work' ? 'Work' : phase === 'short' ? 'Short Break' : 'Long Break';
  ringFg.setAttribute('stroke', color);

  const progress = totalSec > 0 ? (totalSec - remainSec) / totalSec : 0;
  ringFg.setAttribute('stroke-dasharray', CIRC);
  ringFg.setAttribute('stroke-dashoffset', CIRC * (1 - progress));

  roundInfo.textContent = 'Round ' + round + ' of ' + settings.rounds;
  startBtn.textContent = running ? 'Pause' : 'Start';
}

function toggleTimer() {
  if (running) {
    clearInterval(interval);
    running = false;
  } else {
    if (notifPermission === false && 'Notification' in window) {
      Notification.requestPermission().then(p => { notifPermission = p === 'granted'; });
    }
    lastTick = Date.now();
    interval = setInterval(tick, 250);
    running = true;
  }
  render();
}

function tick() {
  const now = Date.now();
  const elapsed = Math.floor((now - lastTick) / 1000);
  if (elapsed < 1) return;
  lastTick += elapsed * 1000;
  remainSec = Math.max(0, remainSec - elapsed);
  render();
  if (remainSec <= 0) {
    clearInterval(interval);
    running = false;
    onPhaseComplete();
  }
}

function onPhaseComplete() {
  playBeep();
  if (phase === 'work') {
    addHistory(settings.work, document.getElementById('taskInput').value.trim());
    updateStats();
  }
  sendNotification();
  advancePhase();
  render();
}

function advancePhase() {
  if (phase === 'work') {
    if (round >= settings.rounds) {
      phase = 'long';
      totalSec = settings.long * 60;
    } else {
      phase = 'short';
      totalSec = settings.short * 60;
    }
  } else {
    if (phase === 'long') round = 1; else round++;
    phase = 'work';
    totalSec = settings.work * 60;
  }
  remainSec = totalSec;
}

function resetTimer() {
  clearInterval(interval);
  running = false;
  totalSec = phase === 'work' ? settings.work * 60 : phase === 'short' ? settings.short * 60 : settings.long * 60;
  remainSec = totalSec;
  render();
}

function skipPhase() {
  clearInterval(interval);
  running = false;
  advancePhase();
  render();
}

// -- Audio --
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
    // Second beep
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.frequency.value = 1100;
    osc2.type = 'sine';
    gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.6);
    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.1);
    osc2.start(ctx.currentTime + 0.6);
    osc2.stop(ctx.currentTime + 1.1);
  } catch(e) {}
}

// -- Notifications --
function sendNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const msg = phase === 'work' ? 'Break is over — time to focus!' : 'Work session complete — take a break!';
  new Notification('Pomodoro Timer', { body: msg, icon: '🍅' });
}

// -- History & Stats --
function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function getHistory() {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return all[todayKey()] || [];
  } catch(e) { return []; }
}

function addHistory(minutes, task) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const key = todayKey();
    if (!all[key]) all[key] = [];
    all[key].push({ time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), minutes, task: task || 'Untitled' });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  } catch(e) {}
}

function updateStats() {
  const hist = getHistory();
  const sessions = hist.length;
  const focus = hist.reduce((a, h) => a + h.minutes, 0);
  document.getElementById('statSessions').textContent = sessions;
  document.getElementById('statFocus').textContent = focus + 'm';
  renderHistory(hist);
}

function renderHistory(hist) {
  const el = document.getElementById('historyList');
  if (!hist.length) { el.innerHTML = '<div class="empty">No sessions yet today</div>'; return; }
  el.innerHTML = hist.slice().reverse().map(h =>
    '<div class="history-item"><span class="h-task">' + escHtml(h.task) + '</span><span class="h-dur">' + h.minutes + 'm</span><span class="h-time">' + h.time + '</span></div>'
  ).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// -- Init --
loadSettings();
resetPhase();
updateStats();
</script>
</body>
</html>
