<body>
<div class="container">
<h1>JavaScript Obfuscator</h1>
<p class="subtitle">Obfuscate JS code using Base64 encoding or ROT13 cipher.</p>

}
console.log(greet('World'));</textarea>
  <div class="char-count" id="charCount">0 characters</div>

  <div class="controls">
    <div>
      <div class="label">Method</div>
      <select id="method" onchange="obfuscate()">
        <option value="base64">Base64 Encoding</option>
        <option value="rot13">ROT13 Cipher</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;align-self:flex-end">
      <button class="btn primary" onclick="obfuscate()">Obfuscate</button>
      <button class="btn" onclick="copyOutput()">Copy</button>
      <button class="btn" onclick="downloadOutput()">Download .js</button>
    </div>

</div>

<script>
function rot13(str) {
  return str.replace(/[A-Za-z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode(base + (c.charCodeAt(0) - base + 13) % 26);
  });
}

function obfuscate() {
  const code = document.getElementById('inputCode').value;
  const method = document.getElementById('method').value;
  const output = document.getElementById('outputDisplay');
  const charCount = document.getElementById('charCount');
  
  charCount.textContent = code.length + ' characters';
  
  if (!code.trim()) {
    output.textContent = 'Please enter some code.';
    return;
  }
  
  if (method === 'base64') {
    const b = btoa(unescape(encodeURIComponent(code)));
    output.textContent = '(function(){eval(atob("' + b + '"));})();';
  } else {
    const r = rot13(code);
    output.textContent = '(function(s){function r(u){return u.replace(/[A-Za-z]/g,c=>String.fromCharCode((c<="Z"?65:97)+((c.charCodeAt(0)-(c<="Z"?65:97)+13)%26)))};eval(r(s))})("' + r + '");';
  }
}

function copyOutput() {
  const text = document.getElementById('outputDisplay').textContent;
  if (!text || text === 'Waiting for input...') return;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.createElement('div');
    t.className = 'copy-toast';
    t.textContent = 'Copied!';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1500);
  });
}

function downloadOutput() {
  const text = document.getElementById('outputDisplay').textContent;
  if (!text || text === 'Waiting for input...') return;
  const blob = new Blob([text], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'obfuscated.js';
  a.click();
  URL.revokeObjectURL(url);
}

obfuscate();
</script>
