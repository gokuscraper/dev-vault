<script>
let rows=4,cols=4,data=[],aligns=[],hasHeader=true,currentFormat='html',sortCol=-1,sortAsc=true;

function init(){
  data=[];
  aligns=[];
  for(let r=0;r<rows;r++){
    data.push([]);
    for(let c=0;c<cols;c++) data[r].push('');
  }
  for(let c=0;c<cols;c++) aligns.push('left');
  sortCol=-1;
  render();
}

function render(){
  renderEditor();
  renderAlignControls();
  generate();
}

function renderEditor(){
  const wrap=document.getElementById('editor-wrap');
  document.getElementById('dims').textContent=data.length+'r x '+(data[0]?data[0].length:0)+'c';
  hasHeader=document.getElementById('opt-header').checked;
  let h='<table><thead><tr><th></th>';
  const numCols=data[0]?data[0].length:0;
  for(let c=0;c<numCols;c++){
    h+='<th><div class="col-header-wrap">';
    if(hasHeader){
      h+='<input class="header-cell" value="'+esc(data[0][c])+'" data-r="0" data-c="'+c+'" oninput="cellEdit(this)" onkeydown="cellTab(event,this)">';
    } else {
      h+='<span style="color:#666;font-size:0.7rem">Col '+(c+1)+'</span>';
    }
    if(numCols>1) h+='<button class="del-btn" onclick="delCol('+c+')" title="Delete column">&times;</button>';
    h+='</div></th>';
  }
  h+='</tr></thead><tbody>';
  const startRow=hasHeader?1:0;
  for(let r=startRow;r<data.length;r++){
    h+='<tr><td class="row-actions">';
    if(data.length>(hasHeader?2:1)) h+='<button class="del-btn" onclick="delRow('+r+')" title="Delete row">&times;</button>';
    h+='</td>';
    for(let c=0;c<numCols;c++){
      h+='<td><input class="cell" value="'+esc(data[r][c])+'" data-r="'+r+'" data-c="'+c+'" oninput="cellEdit(this)" onkeydown="cellTab(event,this)"></td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table>';
  wrap.innerHTML=h;

  // header sort click
  if(hasHeader){
    wrap.querySelectorAll('thead th').forEach((th,i)=>{
      if(i===0) return;
      th.style.cursor='pointer';
      th.addEventListener('click',e=>{
        if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON') return;
        sortByCol(i-1);
      });
    });
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function cellEdit(el){
  const r=+el.dataset.r,c=+el.dataset.c;
  data[r][c]=el.value;
  generate();
}

function cellTab(e,el){
  if(e.key==='Tab'){
    e.preventDefault();
    const r=+el.dataset.r,c=+el.dataset.c;
    const numCols=data[0].length;
    let nr=r,nc=c+1;
    if(e.shiftKey){nc=c-1;if(nc<0){nc=numCols-1;nr=r-1;}}
    else{if(nc>=numCols){nc=0;nr=r+1;}}
    const next=document.querySelector('input[data-r="'+nr+'"][data-c="'+nc+'"]');
    if(next){next.focus();next.select();}
  }
}

function addRow(){
  const numCols=data[0]?data[0].length:cols;
  data.push(new Array(numCols).fill(''));
  render();
}

function addCol(){
  for(let r=0;r<data.length;r++) data[r].push('');
  aligns.push('left');
  render();
}

function delRow(r){
  if(data.length<=(hasHeader?2:1)) return;
  data.splice(r,1);
  render();
}

function delCol(c){
  if(data[0].length<=1) return;
  for(let r=0;r<data.length;r++) data[r].splice(c,1);
  aligns.splice(c,1);
  render();
}

function sortByCol(c){
  if(!hasHeader||data.length<2) return;
  if(sortCol===c) sortAsc=!sortAsc;
  else{sortCol=c;sortAsc=true;}
  const body=data.slice(1);
  body.sort((a,b)=>{
    let va=a[c]||'',vb=b[c]||'';
    const na=parseFloat(va),nb=parseFloat(vb);
    if(!isNaN(na)&&!isNaN(nb)) return sortAsc?na-nb:nb-na;
    return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  });
  data=[data[0],...body];
  render();
}

function renderAlignControls(){
  const numCols=data[0]?data[0].length:0;
  let h='<div style="font-size:0.78rem;color:#888;margin-bottom:4px;font-weight:600">Column Alignment</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
  for(let c=0;c<numCols;c++){
    const a=aligns[c]||'left';
    h+='<div style="font-size:0.7rem;color:#666"><span>Col '+(c+1)+'</span><div class="align-btns">';
    h+='<button class="align-btn'+(a==='left'?' active':'')+'" onclick="setAlign('+c+',\'left\')">L</button>';
    h+='<button class="align-btn'+(a==='center'?' active':'')+'" onclick="setAlign('+c+',\'center\')">C</button>';
    h+='<button class="align-btn'+(a==='right'?' active':'')+'" onclick="setAlign('+c+',\'right\')">R</button>';
    h+='</div></div>';
  }
  h+='</div>';
  document.getElementById('align-controls').innerHTML=h;
}

function setAlign(c,a){aligns[c]=a;render();}

function setFormat(f){
  currentFormat=f;
  document.querySelectorAll('#format-tabs .tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('#format-tabs .tab[onclick="setFormat(\''+f+'\')"]').classList.add('active');
  generate();
}

function getOpts(){
  return{
    bordered:document.getElementById('opt-bordered').checked,
    striped:document.getElementById('opt-striped').checked,
    hover:document.getElementById('opt-hover').checked,
    header:document.getElementById('opt-header').checked,
    padding:document.getElementById('opt-padding').value,
    headerBg:document.getElementById('opt-header-bg').value
  };
}

function generate(){
  hasHeader=document.getElementById('opt-header').checked;
  renderPreview();
  const out=generateFormat(currentFormat);
  document.getElementById('output').textContent=out;
}

function padMap(){return{compact:'4px 6px',normal:'8px 12px',spacious:'12px 18px'};}

function renderPreview(){
  const o=getOpts();
  const p=padMap()[o.padding];
  const numCols=data[0]?data[0].length:0;
  let h='<table class="preview-table" style="border-collapse:collapse;width:100%">';
  if(o.header&&data.length>0){
    h+='<thead><tr>';
    for(let c=0;c<numCols;c++){
      const a=aligns[c]||'left';
      h+='<th style="padding:'+p+';text-align:'+a+';background:'+o.headerBg+';color:#4da6ff;'+(o.bordered?'border:1px solid #333;':'border-bottom:2px solid #333;')+'">'+escHtml(data[0][c])+'</th>';
    }
    h+='</tr></thead>';
  }
  h+='<tbody>';
  const start=o.header?1:0;
  for(let r=start;r<data.length;r++){
    const stripe=o.striped&&((r-start)%2===1)?'background:#1a1a1a;':'';
    h+='<tr style="'+stripe+'"'+(o.hover?' onmouseover="this.style.background=\'#1e2a3a\'" onmouseout="this.style.background=\''+(o.striped&&((r-start)%2===1)?'#1a1a1a':'transparent')+'\'"':'')+'>';
    for(let c=0;c<numCols;c++){
      const a=aligns[c]||'left';
      h+='<td style="padding:'+p+';text-align:'+a+';'+(o.bordered?'border:1px solid #333;':'border-bottom:1px solid #222;')+'">'+escHtml(data[r][c])+'</td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table>';
  document.getElementById('preview').innerHTML=h;
}

function generateFormat(fmt){
  const o=getOpts();
  const numCols=data[0]?data[0].length:0;
  if(numCols===0) return '';
  switch(fmt){
    case 'html': return genHTML(o);
    case 'markdown': return genMarkdown(o);
    case 'csv': return genCSV(',');
    case 'tsv': return genCSV('\t');
    case 'json': return genJSON(o);
    case 'latex': return genLaTeX(o);
    case 'ascii': return genASCII(o);
  }
  return '';
}

function genHTML(o){
  const p=padMap()[o.padding];
  const numCols=data[0]?data[0].length:0;
  let s='<table style="border-collapse:collapse;width:100%'+(o.bordered?';border:1px solid #ccc':'')+';">\n';
  if(o.header&&data.length>0){
    s+='  <thead>\n    <tr>\n';
    for(let c=0;c<numCols;c++){
      const a=aligns[c]||'left';
      s+='      <th style="padding:'+p+';text-align:'+a+';background:'+o.headerBg+';'+(o.bordered?'border:1px solid #ccc;':'border-bottom:2px solid #ccc;')+'">'+escHtml(data[0][c])+'</th>\n';
    }
    s+='    </tr>\n  </thead>\n';
  }
  s+='  <tbody>\n';
  const start=o.header?1:0;
  for(let r=start;r<data.length;r++){
    const bg=o.striped&&((r-start)%2===1)?' background:#f9f9f9;':'';
    s+='    <tr'+(bg?' style="'+bg.trim()+'"':'')+'>\n';
    for(let c=0;c<numCols;c++){
      const a=aligns[c]||'left';
      s+='      <td style="padding:'+p+';text-align:'+a+';'+(o.bordered?'border:1px solid #ccc;':'border-bottom:1px solid #eee;')+'">'+escHtml(data[r][c])+'</td>\n';
    }
    s+='    </tr>\n';
  }
  s+='  </tbody>\n</table>';
  return s;
}

function genMarkdown(){
  const numCols=data[0]?data[0].length:0;
  if(numCols===0) return '';
  const widths=[];
  for(let c=0;c<numCols;c++){
    let w=3;
    for(let r=0;r<data.length;r++) w=Math.max(w,(data[r][c]||'').length);
    widths.push(w);
  }
  let s='| ';
  const hRow=hasHeader?0:-1;
  if(hasHeader){
    for(let c=0;c<numCols;c++) s+=pad(data[0][c],widths[c],aligns[c])+' | ';
    s=s.trimEnd()+'\n| ';
  } else {
    for(let c=0;c<numCols;c++) s+=pad('Col '+(c+1),widths[c],aligns[c])+' | ';
    s=s.trimEnd()+'\n| ';
  }
  for(let c=0;c<numCols;c++){
    const a=aligns[c]||'left';
    let sep='-'.repeat(widths[c]);
    if(a==='center') sep=':'+'-'.repeat(Math.max(1,widths[c]-2))+':';
    else if(a==='right') sep='-'.repeat(Math.max(1,widths[c]-1))+':';
    else sep=':'+'-'.repeat(Math.max(1,widths[c]-1));
    s+=sep+' | ';
  }
  s=s.trimEnd()+'\n';
  const start=hasHeader?1:0;
  for(let r=start;r<data.length;r++){
    s+='| ';
    for(let c=0;c<numCols;c++) s+=pad(data[r][c],widths[c],aligns[c])+' | ';
    s=s.trimEnd()+'\n';
  }
  return s.trimEnd();
}

function pad(str,w,a){
  str=str||'';
  const d=w-str.length;
  if(d<=0) return str;
  if(a==='right') return ' '.repeat(d)+str;
  if(a==='center'){const l=Math.floor(d/2);return ' '.repeat(l)+str+' '.repeat(d-l);}
  return str+' '.repeat(d);
}

function genCSV(sep){
  return data.map(row=>row.map(c=>{
    const s=String(c||'');
    if(s.includes(sep)||s.includes('"')||s.includes('\n')) return '"'+s.replace(/"/g,'""')+'"';
    return s;
  }).join(sep)).join('\n');
}

function genJSON(o){
  if(!o.header||data.length<2) return JSON.stringify(data,null,2);
  const headers=data[0].map((h,i)=>h||'col'+(i+1));
  const rows=data.slice(1).map(row=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=row[i]||'');
    return obj;
  });
  return JSON.stringify(rows,null,2);
}

function genLaTeX(o){
  const numCols=data[0]?data[0].length:0;
  const colSpec=aligns.map(a=>a==='center'?'c':a==='right'?'r':'l').join(o.bordered?'|':'');
  let s='\\begin{tabular}{'+(o.bordered?'|'+colSpec+'|':colSpec)+'}\n';
  if(o.bordered) s+='\\hline\n';
  const start=0;
  for(let r=0;r<data.length;r++){
    const cells=[];
    for(let c=0;c<numCols;c++) cells.push(texEsc(data[r][c]||''));
    s+=cells.join(' & ')+' \\\\\n';
    if(r===0&&o.header) s+='\\hline\n';
  }
  if(o.bordered) s+='\\hline\n';
  s+='\\end{tabular}';
  return s;
}

function texEsc(s){return s.replace(/[&%$#_{}~^\\]/g,c=>'\\'+c);}

function genASCII(){
  const numCols=data[0]?data[0].length:0;
  if(numCols===0) return '';
  const widths=[];
  for(let c=0;c<numCols;c++){
    let w=1;
    for(let r=0;r<data.length;r++) w=Math.max(w,(data[r][c]||'').length);
    widths.push(w);
  }
  const hr='+'+widths.map(w=>'-'.repeat(w+2)).join('+')+'+';
  let s=hr+'\n';
  for(let r=0;r<data.length;r++){
    s+='|';
    for(let c=0;c<numCols;c++){
      s+=' '+pad(data[r][c],widths[c],aligns[c])+' |';
    }
    s+='\n';
    if(r===0&&hasHeader) s+=hr.replace(/-/g,'=')+'\n';
    else s+=hr+'\n';
  }
  return s.trimEnd();
}

function downloadOutput(){
  const t=document.getElementById('output').textContent;
  const ext={html:'.html',markdown:'.md',csv:'.csv',tsv:'.tsv',json:'.json',latex:'.tex',ascii:'.txt'}[currentFormat]||'.txt';
  const mime={html:'text/html',markdown:'text/markdown',csv:'text/csv',tsv:'text/tab-separated-values',json:'application/json',latex:'text/x-latex',ascii:'text/plain'}[currentFormat]||'text/plain';
  const blob=new Blob([t],{type:mime});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='table'+ext;
  a.click();
  URL.revokeObjectURL(a.href);
}

function toast(msg){
  const t=document.getElementById('toast');

}

function importData(){
  const raw=document.getElementById('import-data').value.trim();
  if(!raw) return;
  // Try JSON
  try{
    const j=JSON.parse(raw);
    if(Array.isArray(j)){
      if(j.length>0&&typeof j[0]==='object'&&!Array.isArray(j[0])){
        const keys=Object.keys(j[0]);
        data=[keys];
        aligns=keys.map(()=>'left');
        j.forEach(obj=>data.push(keys.map(k=>String(obj[k]||''))));
      } else {
        data=j.map(r=>Array.isArray(r)?r.map(c=>String(c||'')):[String(r)]);
        aligns=(data[0]||[]).map(()=>'left');
      }
      render();
      document.getElementById('import-data').value='';
      toast('Imported JSON');
      return;
    }
  }catch(e){}
  // CSV/TSV
  const lines=raw.split('\n').filter(l=>l.trim());
  const sep=lines[0].includes('\t')?'\t':',';
  data=lines.map(line=>parseCSVLine(line,sep));
  const maxCols=Math.max(...data.map(r=>r.length));
  data=data.map(r=>{while(r.length<maxCols)r.push('');return r;});
  aligns=data[0].map(()=>'left');
  render();
  document.getElementById('import-data').value='';
  toast('Imported '+(sep==='\t'?'TSV':'CSV'));
}

function parseCSVLine(line,sep){
  const cells=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){
      if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}
      else if(ch==='"') inQ=false;
      else cur+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===sep){cells.push(cur);cur='';}
      else cur+=ch;
    }
  }
  cells.push(cur);
  return cells;
}
