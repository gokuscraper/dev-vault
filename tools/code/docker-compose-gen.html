<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.preset{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#fff;font-size:0.85rem;outline:none;font-family:'Fira Code',monospace}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
textarea{min-height:60px;resize:vertical}
.row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
.svc-item{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;padding:12px;margin-bottom:8px;position:relative}
.svc-item .remove{position:absolute;top:6px;right:8px;color:#666;cursor:pointer;font-size:0.8rem}
.svc-item .remove:hover{color:#f85149}
.svc-item h4{font-size:0.85rem;color:#ccc;margin-bottom:8px}
.add-btn{padding:5px 12px;font-size:0.78rem;border:1px dashed #444;background:transparent;color:#888;border-radius:4px;cursor:pointer}
.add-btn:hover{border-color:#3b82f6;color:#4da6ff}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#3b82f6}
.check-row label{margin:0;font-size:0.85rem;color:#ccc;font-weight:normal}
.output{position:relative;background:#0d1117;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;min-height:200px}
.output pre{white-space:pre-wrap;font-family:'Fira Code',monospace;font-size:0.82rem;color:#c9d1d9;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#21262d;color:#aaa;cursor:pointer}
.copy-btn:hover{color:#fff;border-color:#3b82f6}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>Docker Compose Generator</h1>
<p class="sub">Build docker-compose.yml visually — services, volumes, networks</p>

<div class="presets" id="presetBtns"></div>

<div class="section">
<h3>Services</h3>
<div id="svcList"></div>
<button class="add-btn" onclick="addSvc()">+ Add Service</button>
</div>

<div class="output">
<button class="copy-btn" onclick="copyOut()">Copy</button>
<pre id="out"></pre>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/dockerfile-gen/">Dockerfile Gen</a> | <a href="https://yurukusa.github.io/nginx-config-gen/">Nginx Config Gen</a> | <a href="https://yurukusa.github.io/env-gen/">Env Gen</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const PRESETS={
'Node + Postgres':[
  {name:'app',image:'node:20-alpine',build:'.',ports:'3000:3000',env:'NODE_ENV=production\nDATABASE_URL=postgres://user:pass@db:5432/mydb',volumes:'./:/app\n/app/node_modules',depends:'db',restart:'unless-stopped',command:'npm start'},
  {name:'db',image:'postgres:16-alpine',ports:'5432:5432',env:'POSTGRES_USER=user\nPOSTGRES_PASSWORD=pass\nPOSTGRES_DB=mydb',volumes:'pgdata:/var/lib/postgresql/data',depends:'',restart:'unless-stopped',command:'',build:''}
],
'Python + Redis':[
  {name:'app',image:'python:3.12-slim',build:'.',ports:'8000:8000',env:'REDIS_URL=redis://redis:6379',volumes:'./:/app',depends:'redis',restart:'unless-stopped',command:'python -m uvicorn main:app --host 0.0.0.0'},
  {name:'redis',image:'redis:7-alpine',ports:'6379:6379',env:'',volumes:'redis_data:/data',depends:'',restart:'unless-stopped',command:'',build:''}
],
'MERN Stack':[
  {name:'frontend',image:'node:20-alpine',build:'./frontend',ports:'3000:3000',env:'REACT_APP_API_URL=http://localhost:5000',volumes:'./frontend:/app\n/app/node_modules',depends:'api',restart:'unless-stopped',command:'npm start'},
  {name:'api',image:'node:20-alpine',build:'./api',ports:'5000:5000',env:'MONGO_URI=mongodb://mongo:27017/mydb\nNODE_ENV=production',volumes:'./api:/app\n/app/node_modules',depends:'mongo',restart:'unless-stopped',command:'npm start'},
  {name:'mongo',image:'mongo:7',ports:'27017:27017',env:'',volumes:'mongo_data:/data/db',depends:'',restart:'unless-stopped',command:'',build:''}
],
'WordPress':[
  {name:'wordpress',image:'wordpress:latest',build:'',ports:'8080:80',env:'WORDPRESS_DB_HOST=db\nWORDPRESS_DB_USER=wp\nWORDPRESS_DB_PASSWORD=secret\nWORDPRESS_DB_NAME=wordpress',volumes:'wp_data:/var/www/html',depends:'db',restart:'unless-stopped',command:''},
  {name:'db',image:'mysql:8',build:'',ports:'',env:'MYSQL_ROOT_PASSWORD=rootsecret\nMYSQL_DATABASE=wordpress\nMYSQL_USER=wp\nMYSQL_PASSWORD=secret',volumes:'db_data:/var/lib/mysql',depends:'',restart:'unless-stopped',command:''}
],
'Nginx + App':[
  {name:'nginx',image:'nginx:alpine',build:'',ports:'80:80\n443:443',env:'',volumes:'./nginx.conf:/etc/nginx/conf.d/default.conf',depends:'app',restart:'unless-stopped',command:''},
  {name:'app',image:'node:20-alpine',build:'.',ports:'3000:3000',env:'NODE_ENV=production',volumes:'./:/app',depends:'',restart:'unless-stopped',command:'npm start'}
],
'Go + Postgres':[
  {name:'app',image:'',build:'.',ports:'8080:8080',env:'DATABASE_URL=postgres://user:pass@db:5432/mydb\nPORT=8080',volumes:'',depends:'db',restart:'unless-stopped',command:''},
  {name:'db',image:'postgres:16-alpine',build:'',ports:'5432:5432',env:'POSTGRES_USER=user\nPOSTGRES_PASSWORD=pass\nPOSTGRES_DB=mydb',volumes:'pgdata:/var/lib/postgresql/data',depends:'',restart:'unless-stopped',command:''}
],
'Minimal':[
  {name:'app',image:'alpine:latest',build:'',ports:'',env:'',volumes:'',depends:'',restart:'no',command:'echo hello'}
],
'Monitoring':[
  {name:'prometheus',image:'prom/prometheus:latest',build:'',ports:'9090:9090',env:'',volumes:'./prometheus.yml:/etc/prometheus/prometheus.yml\nprom_data:/prometheus',depends:'',restart:'unless-stopped',command:''},
  {name:'grafana',image:'grafana/grafana:latest',build:'',ports:'3000:3000',env:'GF_SECURITY_ADMIN_PASSWORD=admin',volumes:'grafana_data:/var/lib/grafana',depends:'prometheus',restart:'unless-stopped',command:''}
]
};

let svcs=[];

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function initPresets(){
  const c=document.getElementById('presetBtns');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('div');b.className='preset';b.textContent=n;
    b.onclick=()=>loadPreset(n);c.appendChild(b);
  });
}

function loadPreset(name){
  const p=PRESETS[name];if(!p)return;
  document.querySelectorAll('.preset').forEach(el=>el.classList.toggle('active',el.textContent===name));
  svcs=JSON.parse(JSON.stringify(p));
  renderSvcs();gen();
}

function addSvc(){
  svcs.push({name:'service',image:'alpine:latest',build:'',ports:'',env:'',volumes:'',depends:'',restart:'unless-stopped',command:''});
  renderSvcs();gen();
}

function removeSvc(i){svcs.splice(i,1);renderSvcs();gen()}

function renderSvcs(){
  const c=document.getElementById('svcList');c.innerHTML='';
  svcs.forEach((s,i)=>{
    const d=document.createElement('div');d.className='svc-item';
    d.innerHTML=`<span class="remove" onclick="removeSvc(${i})">✕</span>
    <div class="row">
      <div class="col"><label>Service Name</label><input value="${esc(s.name)}" onchange="svcs[${i}].name=this.value;gen()"></div>
      <div class="col"><label>Image</label><input value="${esc(s.image)}" onchange="svcs[${i}].image=this.value;gen()" placeholder="node:20-alpine"></div>
    </div>
    <div class="row">
      <div class="col"><label>Build Context</label><input value="${esc(s.build)}" onchange="svcs[${i}].build=this.value;gen()" placeholder="./app (leave empty to use image)"></div>
      <div class="col"><label>Restart Policy</label><select onchange="svcs[${i}].restart=this.value;gen()">
        <option${s.restart==='no'?' selected':''}>no</option>
        <option${s.restart==='always'?' selected':''}>always</option>
        <option${s.restart==='unless-stopped'?' selected':''}>unless-stopped</option>
        <option${s.restart==='on-failure'?' selected':''}>on-failure</option>
      </select></div>
    </div>
    <div class="row">
      <div class="col"><label>Ports (one per line, host:container)</label><textarea rows="2" onchange="svcs[${i}].ports=this.value;gen()">${esc(s.ports)}</textarea></div>
      <div class="col"><label>Volumes (one per line)</label><textarea rows="2" onchange="svcs[${i}].volumes=this.value;gen()">${esc(s.volumes)}</textarea></div>
    </div>
    <div class="row">
      <div class="col"><label>Environment (KEY=VALUE per line)</label><textarea rows="2" onchange="svcs[${i}].env=this.value;gen()">${esc(s.env)}</textarea></div>
    </div>
    <div class="row">
      <div class="col"><label>Depends On (comma-sep)</label><input value="${esc(s.depends)}" onchange="svcs[${i}].depends=this.value;gen()"></div>
      <div class="col"><label>Command</label><input value="${esc(s.command)}" onchange="svcs[${i}].command=this.value;gen()" placeholder="npm start"></div>
    </div>`;
    c.appendChild(d);
  });
}

function gen(){
  if(svcs.length===0){document.getElementById('out').textContent='# Add a service to generate docker-compose.yml';return}

  let y='services:\n';
  const namedVolumes=new Set();

  svcs.forEach(s=>{
    y+=`  ${s.name}:\n`;
    if(s.build) y+=`    build: ${s.build}\n`;
    if(s.image&&!s.build) y+=`    image: ${s.image}\n`;
    if(s.image&&s.build) y+=`    image: ${s.image}\n`;

    if(s.command) y+=`    command: ${s.command}\n`;
    if(s.restart&&s.restart!=='no') y+=`    restart: ${s.restart}\n`;

    const ports=lines(s.ports);
    if(ports.length){
      y+=`    ports:\n`;
      ports.forEach(p=>y+=`      - "${p}"\n`);
    }

    const env=lines(s.env);
    if(env.length){
      y+=`    environment:\n`;
      env.forEach(e=>y+=`      - ${e}\n`);
    }

    const vols=lines(s.volumes);
    if(vols.length){
      y+=`    volumes:\n`;
      vols.forEach(v=>{
        y+=`      - ${v}\n`;
        // Detect named volumes (name:path format without ./)
        const parts=v.split(':');
        if(parts.length>=2&&!parts[0].startsWith('.')&&!parts[0].startsWith('/')){
          namedVolumes.add(parts[0]);
        }
      });
    }

    const deps=s.depends.split(',').map(d=>d.trim()).filter(Boolean);
    if(deps.length){
      y+=`    depends_on:\n`;
      deps.forEach(d=>y+=`      - ${d}\n`);
    }
    y+='\n';
  });

  if(namedVolumes.size>0){
    y+=`volumes:\n`;
    namedVolumes.forEach(v=>y+=`  ${v}:\n`);
  }

  document.getElementById('out').textContent=y;
}

function lines(s){return(s||'').split('\n').map(l=>l.trim()).filter(Boolean)}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const t=document.getElementById('toast');t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

initPresets();
loadPreset('Node + Postgres');
</script>
</body>
</html>
