<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const LOCALES=[
  {tag:'en-US',name:'English (US)',native:'English'},
  {tag:'en-GB',name:'English (UK)',native:'English'},
  {tag:'de-DE',name:'German',native:'Deutsch'},
  {tag:'fr-FR',name:'French',native:'Français'},
  {tag:'es-ES',name:'Spanish',native:'Español'},
  {tag:'it-IT',name:'Italian',native:'Italiano'},
  {tag:'pt-BR',name:'Portuguese (BR)',native:'Português'},
  {tag:'nl-NL',name:'Dutch',native:'Nederlands'},
  {tag:'pl-PL',name:'Polish',native:'Polski'},
  {tag:'sv-SE',name:'Swedish',native:'Svenska'},
  {tag:'da-DK',name:'Danish',native:'Dansk'},
  {tag:'fi-FI',name:'Finnish',native:'Suomi'},
  {tag:'nb-NO',name:'Norwegian',native:'Norsk'},
  {tag:'ru-RU',name:'Russian',native:'Русский'},
  {tag:'uk-UA',name:'Ukrainian',native:'Українська'},
  {tag:'tr-TR',name:'Turkish',native:'Türkçe'},
  {tag:'ar-SA',name:'Arabic',native:'العربية'},
  {tag:'he-IL',name:'Hebrew',native:'עברית'},
  {tag:'hi-IN',name:'Hindi',native:'हिन्दी'},
  {tag:'zh-CN',name:'Chinese (Simplified)',native:'简体中文'},
  {tag:'zh-TW',name:'Chinese (Traditional)',native:'繁體中文'},
  {tag:'ja-JP',name:'Japanese',native:'日本語'},
  {tag:'ko-KR',name:'Korean',native:'한국어'},
  {tag:'th-TH',name:'Thai',native:'ไทย'},
  {tag:'vi-VN',name:'Vietnamese',native:'Tiếng Việt'},
];

let currentTab='date';

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  ['date','number','currency','relative','list'].forEach(t=>{
    document.getElementById('input'+t.charAt(0).toUpperCase()+t.slice(1)).style.display=t===tab?'':'none';
  });
  render();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(){
  // Show/hide unit select for number tab
  const ns=document.getElementById('numberStyle').value;
  document.getElementById('numberUnit').style.display=ns==='unit'?'':'none';

  let rows=[];
  let code='';

  if(currentTab==='date'){
    const val=document.getElementById('dateInput').value;
    const date=val?new Date(val):new Date();
    const ds=document.getElementById('dateStyle').value;
    const ts=document.getElementById('timeStyle').value;
    const opts={dateStyle:ds};
    if(ts!=='none')opts.timeStyle=ts;

    LOCALES.forEach(loc=>{
      try{
        const fmt=new Intl.DateTimeFormat(loc.tag,opts).format(date);
        rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:fmt});
      }catch(e){rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:'—'})}
    });
    code=`new Intl.DateTimeFormat('${LOCALES[0].tag}', ${JSON.stringify(opts)}).format(new Date('${date.toISOString()}'))`;
  }
  else if(currentTab==='number'){
    const num=parseFloat(document.getElementById('numberInput').value)||0;
    const style=document.getElementById('numberStyle').value;
    const opts={style};
    if(style==='unit')opts.unit=document.getElementById('numberUnit').value;

    LOCALES.forEach(loc=>{
      try{
        const fmt=new Intl.NumberFormat(loc.tag,opts).format(num);
        rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:fmt});
      }catch(e){rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:'—'})}
    });
    code=`new Intl.NumberFormat('${LOCALES[0].tag}', ${JSON.stringify(opts)}).format(${num})`;
  }
  else if(currentTab==='currency'){
    const num=parseFloat(document.getElementById('currencyAmount').value)||0;
    const cur=document.getElementById('currencyCode').value;
    const display=document.getElementById('currencyDisplay').value;
    const opts={style:'currency',currency:cur,currencyDisplay:display};

    LOCALES.forEach(loc=>{
      try{
        const fmt=new Intl.NumberFormat(loc.tag,opts).format(num);
        rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:fmt});
      }catch(e){rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:'—'})}
    });
    code=`new Intl.NumberFormat('${LOCALES[0].tag}', ${JSON.stringify(opts)}).format(${num})`;
  }
  else if(currentTab==='relative'){
    const val=parseInt(document.getElementById('relativeValue').value)||0;
    const unit=document.getElementById('relativeUnit').value;
    const style=document.getElementById('relativeStyle').value;

    LOCALES.forEach(loc=>{
      try{
        const fmt=new Intl.RelativeTimeFormat(loc.tag,{style}).format(val,unit);
        rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:fmt});
      }catch(e){rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:'—'})}
    });
    code=`new Intl.RelativeTimeFormat('${LOCALES[0].tag}', {style:'${style}'}).format(${val}, '${unit}')`;
  }
  else if(currentTab==='list'){
    const items=document.getElementById('listItems').value.split(',').map(s=>s.trim()).filter(Boolean);
    const type=document.getElementById('listType').value;
    const style=document.getElementById('listStyle').value;

    LOCALES.forEach(loc=>{
      try{
        const fmt=new Intl.ListFormat(loc.tag,{style,type}).format(items);
        rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:fmt});
      }catch(e){rows.push({tag:loc.tag,name:loc.name,native:loc.native,result:'—'})}
    });
    code=`new Intl.ListFormat('${LOCALES[0].tag}', {style:'${style}',type:'${type}'}).format(${JSON.stringify(items)})`;
  }

  let html='<table class="result-table"><thead><tr><th ti="th_locale">Locale</th><th ti="th_tag">Tag</th><th ti="th_formatted_output">Formatted Output</th></tr></thead><tbody>';
  rows.forEach(r=>{
    html+=`<tr>
      <td><span class="locale-name">${esc(r.name)}</span> <span class="lang-native">${esc(r.native)}</span></td>
      <td><span class="locale-tag">${esc(r.tag)}</span></td>
      <td><span class="formatted">${esc(r.result)}</span></td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('results').innerHTML=html;

  document.getElementById('codeBlock').style.display='';
  document.getElementById('codeContent').textContent=code;
}

function copyCode(){
  const code=document.getElementById('codeContent').textContent;
  navigator.clipboard.writeText(code);
  toast('Code Copied!');
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Init date input to now
const now=new Date();
const pad=n=>String(n).padStart(2,'0');
document.getElementById('dateInput').value=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

render();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;

document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);

document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
