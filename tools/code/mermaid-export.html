<script>
mermaid.initialize({ startOnLoad: false, theme: 'default' });

let currentSvg = '';

async function renderDiagram() {
  const code = document.getElementById('mermaidInput').value;
  const container = document.getElementById('mermaidOutput');
  const error = document.getElementById('errorMessage');
  
  if (!code.trim()) { container.innerHTML = ''; error.style.display = 'none'; currentSvg = ''; return; }
  
  try {
    mermaid.parse(code);
    const { svg } = await mermaid.render('mermaidRender_' + Date.now(), code);
    container.innerHTML = svg;
    currentSvg = svg;
    error.style.display = 'none';
  } catch(e) {
    error.textContent=T("jtcpre_invalid_mermaid_syntax")+ (e.message || e.str || e);
    error.style.display = 'block';
    currentSvg = '';
  }
}

function fixSvg(svg) {
  const match = svg.match(/viewBox="([\d.\s-]+)"/);
  if (match) {
    const [, , w, h] = match[1].split(/\s+/).map(Number);
    svg = svg.replace(/width="[^"]*"/, 'width="' + w + '"');
    svg = svg.replace(/height="[^"]*"/, 'height="' + h + '"');
  }
  if (!svg.includes('xmlns=')) {
    svg = svg.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  }
  return svg;
}

function exportSvg() {
  if (!currentSvg) return;
  const data = '<?xml version="1.0" encoding="UTF-8"?>' + fixSvg(currentSvg);
  download(data, 'diagram.svg', 'image/svg+xml');
}

function exportPng() { exportRaster('png'); }
function exportJpg() { exportRaster('jpeg'); }

function exportRaster(format) {
  if (!currentSvg) return;
  const svgData = fixSvg(currentSvg);
  const blob = new Blob([svgData], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const scale = 3;
    const canvas = document.createElement('canvas');
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(function(b) {
      if (b) download(URL.createObjectURL(b), 'diagram.' + (format === 'jpeg' ? 'jpg' : 'png'), b.type);
      URL.revokeObjectURL(url);
    }, 'image/' + format, 0.92);
  };
  img.src = url;
}

function download(data, filename, mime) {
  const isUrl = typeof data === 'string' && data.startsWith('blob:');
  const a = document.createElement('a');
  a.href = isUrl ? data : URL.createObjectURL(new Blob([data], { type: mime }));
  a.download = filename;
  a.click();
  if (!isUrl) setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

renderDiagram();
</script>
