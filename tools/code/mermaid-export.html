<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Exporter</title>
<meta name="description" content="Render Mermaid diagrams and export as SVG, PNG, or JPG. Free browser tool.">
<link rel="canonical" href="https://yurukusa.github.io/mermaid-export/">
<script type="application/ld+json">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:0.95rem;color:#ccc;margin-bottom:12px;font-weight:600}
textarea{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none;resize:vertical;font-family:monospace;min-height:150px}
textarea:focus{border-color:#3b82f6}
.diagram-box{background:#fff;border:1px solid #333;border-radius:8px;padding:20px;overflow-x:auto;margin:12px 0;min-height:100px;display:flex;align-items:center;justify-content:center}
.diagram-box svg{max-width:100%}
.error{color:#ef4444;font-weight:600;text-align:center;padding:10px}
.btn-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#fff}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.label{font-size:0.8rem;color:#888;margin-bottom:6px;font-weight:600}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="container">
<h1>Mermaid Exporter</h1>
<p class="subtitle">Render Mermaid diagrams and export as SVG, PNG, or JPG.</p>

<div class="card">
  <textarea id="mermaidInput" oninput="renderDiagram()">graph TD
A[Start] --> B{Is it working?}
B -- Yes --> C[Great!]
B -- No --> D[Fix it!]</textarea>
  
  <div class="diagram-box" id="diagramContainer">
    <div class="error" id="errorMessage" style="display:none"></div>
    <div id="mermaidOutput"></div>
  </div>
  
  <div class="btn-row">
    <button class="btn primary" onclick="exportSvg()">Export SVG</button>
    <button class="btn" onclick="exportPng()">Export PNG</button>
    <button class="btn" onclick="exportJpg()">Export JPG</button>
  </div>
</div>

<footer>
  <p><a href="https://github.com/yurukusa/dev-toolkit">GitHub</a></p>
</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
mermaid.initialize({ startOnLoad: false, theme: 'default' });

let currentSvg = '';

async function renderDiagram() {
  const code = document.getElementById('mermaidInput').value;
  const container = document.getElementById('mermaidOutput');
  const error = document.getElementById('errorMessage');
  
  if (!code.trim()) { container.innerHTML = ''; error.style.display = 'none'; currentSvg = ''; return; }
  
  try {
    mermaid.parse(code);
    const { svg } = await mermaid.render('mermaidRender_' + Date.now(), code);
    container.innerHTML = svg;
    currentSvg = svg;
    error.style.display = 'none';
  } catch(e) {
    error.textContent = 'Invalid Mermaid syntax: ' + (e.message || e.str || e);
    error.style.display = 'block';
    currentSvg = '';
  }
}

function fixSvg(svg) {
  const match = svg.match(/viewBox="([\d.\s-]+)"/);
  if (match) {
    const [, , w, h] = match[1].split(/\s+/).map(Number);
    svg = svg.replace(/width="[^"]*"/, 'width="' + w + '"');
    svg = svg.replace(/height="[^"]*"/, 'height="' + h + '"');
  }
  if (!svg.includes('xmlns=')) {
    svg = svg.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  }
  return svg;
}

function exportSvg() {
  if (!currentSvg) return;
  const data = '<?xml version="1.0" encoding="UTF-8"?>' + fixSvg(currentSvg);
  download(data, 'diagram.svg', 'image/svg+xml');
}

function exportPng() { exportRaster('png'); }
function exportJpg() { exportRaster('jpeg'); }

function exportRaster(format) {
  if (!currentSvg) return;
  const svgData = fixSvg(currentSvg);
  const blob = new Blob([svgData], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const scale = 3;
    const canvas = document.createElement('canvas');
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(function(b) {
      if (b) download(URL.createObjectURL(b), 'diagram.' + (format === 'jpeg' ? 'jpg' : 'png'), b.type);
      URL.revokeObjectURL(url);
    }, 'image/' + format, 0.92);
  };
  img.src = url;
}

function download(data, filename, mime) {
  const isUrl = typeof data === 'string' && data.startsWith('blob:');
  const a = document.createElement('a');
  a.href = isUrl ? data : URL.createObjectURL(new Blob([data], { type: mime }));
  a.download = filename;
  a.click();
  if (!isUrl) setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

renderDiagram();
</script>
</body>
</html>
