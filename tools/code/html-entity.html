{char:'\u23CE',name:'return',d:9166,cat:'Technical'},{char:'\u2328',name:'keyboard',d:9000,cat:'Technical'},
{char:'\u2380',name:'insert',d:9088,cat:'Technical'},{char:'\u21E7',name:'shift',d:8679,cat:'Technical'},
{char:'\u2303',name:'ctrl',d:8963,cat:'Technical'},{char:'\u2387',name:'altKey',d:9095,cat:'Technical'},
{char:'\u23CF',name:'eject',d:9167,cat:'Technical'},{char:'\u23F5',name:'play',d:9205,cat:'Technical'},
{char:'\u23F8',name:'pause',d:9208,cat:'Technical'},{char:'\u23F9',name:'stop',d:9209,cat:'Technical'},
{char:'\u23EA',name:'rewind',d:9194,cat:'Technical'},{char:'\u23E9',name:'ffwd',d:9193,cat:'Technical'}
];

const cats=['Common','Arrows','Math','Currency','Greek','Symbols','Punctuation','Technical'];
const grid=document.getElementById('grid');
const search=document.getElementById('search');
const catFilter=document.getElementById('catFilter');
const stats=document.getElementById('stats');
const toast=document.getElementById('toast');

// Why: populate category dropdown from known list to stay in sync
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;catFilter.appendChild(o)});

function hex(d){return d.toString(16).toUpperCase().padStart(4,'0')}

function render(){
  const q=search.value.toLowerCase();
  const cat=catFilter.value;
  const filtered=E.filter(e=>{
    if(cat&&e.cat!==cat)return false;
    if(!q)return true;
    return e.char.toLowerCase().includes(q)||e.name.toLowerCase().includes(q)||
      ('&#'+e.d+';').includes(q)||('&#x'+hex(e.d).toLowerCase()+';').includes(q)||
      ('u+'+hex(e.d).toLowerCase()).includes(q)||e.cat.toLowerCase().includes(q);
  });
  stats.textContent=filtered.length+' of '+E.length+' entities';
  // Why: innerHTML batch is faster than incremental DOM for full re-renders
  grid.innerHTML=filtered.map(e=>`<div class="card" data-char="${e.char.replace(/"/g,'&quot;')}" data-name="${e.name}">
<div class="char">${e.d===38?'&amp;':e.d===60?'&lt;':e.d===62?'&gt;':e.d===34?'&quot;':e.char}</div>
<div class="name">&amp;${e.name};</div>
<div class="codes"><span>&amp;#${e.d};</span><span>&amp;#x${hex(e.d)};</span><span>U+${hex(e.d)}</span></div>
</div>`).join('');
}

grid.addEventListener('click',e=>{
  const card=e.target.closest('.card');
  if(!card)return;
  const ch=card.dataset.char;
  navigator.clipboard.writeText(ch).then(()=>showToast('Copied: '+ch+' (&'+card.dataset.name+';)'));
});

function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),1800);
}

search.addEventListener('input',render);
catFilter.addEventListener('change',render);

// Converter
const convInput=document.getElementById('convInput');
const convResults=document.getElementById('convResults');
convInput.addEventListener('input',()=>{
  const ch=convInput.value;
  if(!ch){convResults.innerHTML='';return}
  const cp=ch.codePointAt(0);
  const h=cp.toString(16).toUpperCase().padStart(4,'0');
  // Why: find matching named entity for the character if one exists in our database
  const named=E.find(e=>e.d===cp);
  const items=[
    {label:'Character',value:ch},
    named?{label:'Named',value:'&'+named.name+';'}:null,
    {label:'Decimal',value:'&#'+cp+';'},
    {label:'Hex',value:'&#x'+h+';'},
    {label:'Unicode',value:'U+'+h},
    {label:'CSS',value:'\\'+h},
    {label:'JS',value:cp>0xFFFF?'\\u{'+h+'}':'\\u'+h}
  ].filter(Boolean);
  convResults.innerHTML=items.map(i=>`<div class="conv-item" data-val="${i.value.replace(/"/g,'&quot;')}">
<div class="label">${i.label}</div><div class="value">${i.value.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div></div>`).join('');
});
convResults.addEventListener('click',e=>{
  const item=e.target.closest('.conv-item');
  if(!item)return;
  navigator.clipboard.writeText(item.dataset.val).then(()=>showToast('Copied: '+item.dataset.val));
});

render();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
