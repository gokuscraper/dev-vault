<script>
// --- Tokenizer ---
function tokenize(src) {
  const tokens = [];
  let i = 0;
  while (i < src.length) {
    const ch = src[i];
    // Whitespace
    if (/\s/.test(ch)) { let s = i; while (i < src.length && /\s/.test(src[i])) i++; tokens.push({type:'ws',value:src.slice(s,i)}); continue; }

    if (ch === '/' && src[i+1] === '/') { let s = i; i += 2; while (i < src.length && src[i] !== '\n') i++; tokens.push({type:'comment',value:src.slice(s,i)}); continue; }

    if (ch === '/' && src[i+1] === '*') { let s = i; i += 2; while (i < src.length && !(src[i]==='*'&&src[i+1]==='/')) i++; i += 2; tokens.push({type:'comment',value:src.slice(s,i)}); continue; }
    // Template literal
    if (ch === '`') { let s = i; i++; let depth = 0;
      while (i < src.length) { if (src[i]==='\\') { i+=2; continue; } if (src[i]==='$'&&src[i+1]==='{') { depth++; i+=2; continue; } if (src[i]==='}'&&depth>0) { depth--; i++; continue; } if (src[i]==='`'&&depth===0) { i++; break; } i++; }
      tokens.push({type:'template',value:src.slice(s,i)}); continue; }

      const isRegex = !prev || prev.type==='op' || prev.type==='ws' || (prev.type==='punct' && /[,(;=!&|?:~^[{]/.test(prev.value)) || (prev.type==='keyword' && /^(return|typeof|instanceof|in|of|new|delete|void|throw|case)$/.test(prev.value));
      if (isRegex) { let s = i; i++; while (i<src.length&&src[i]!=='/') { if (src[i]==='\\') i++; if (src[i]==='['){ i++; while(i<src.length&&src[i]!==']'){if(src[i]==='\\')i++;i++;} } i++; } i++; while(i<src.length&&/[gimsuy]/.test(src[i]))i++; tokens.push({type:'regex',value:src.slice(s,i)}); continue; }
    }

      if(i<src.length&&src[i]==='n')i++; tokens.push({type:'number',value:src.slice(s,i)}); continue; }
    // Identifier / keyword
    if (/[a-zA-Z_$]/.test(ch)) { let s=i; while(i<src.length&&/[a-zA-Z0-9_$]/.test(src[i]))i++;
      const w=src.slice(s,i); const kws='break,case,catch,class,const,continue,debugger,default,delete,do,else,export,extends,finally,for,function,if,import,in,instanceof,let,new,of,return,super,switch,this,throw,try,typeof,var,void,while,with,yield,async,await,static,from,as';

    const ops3 = ['===','!==','>>>','**=','||=','&&=','??=','<<=','>>=','...'];

// --- Formatter ---
function formatCode(src, opts) {

  const noSpaceBefore = new Set([';',',',')','++','--','.','?.','[']);
  const noSpaceAfter = new Set(['(','[','.','?.','!','~','++','--']);

  function addNewline() { out += '\n' + indent.repeat(depth); needNewline = false; needSpace = false; }
  function addSpace() { if (needSpace) { out += ' '; needSpace = false; } }

  for (let ti = 0; ti < tokens.length; ti++) {
    const t = tokens[ti];

        if (needNewline) addNewline(); else addSpace();
        out += t.value; needNewline = true;
      }
      continue;
    }

      out += t.value; needSpace = true; continue;
    }

      }

      // Peek for else, catch, finally, while (do-while)
      let next = peekSignificant(tokens, ti + 1);
      if (next && (next.value === 'else' || next.value === 'catch' || next.value === 'finally' || next.value === 'while')) {
        needSpace = true;
      } else { needNewline = true; }
      lastSignificant = '}'; continue;
    }
    // Open brace
    if (v === '{') {
      if (opts.brackets === 'new') { addNewline(); }
      else { addSpace(); }
      out += '{'; depth++; needNewline = true; lastSignificant = '{'; continue;
    }
    // Semicolons
    if (v === ';') {
      if (opts.semi !== 'remove') { out += ';'; }
      // Check if next token is ) for for-loops
      let next = peekSignificant(tokens, ti + 1);
      if (next && next.value === ')') { needSpace = false; }
      else if (next && next.value !== ';') { needNewline = true; }
      else { needSpace = true; }
      lastSignificant = ';'; continue;
    }
    // Comma
    if (v === ',') {
      out += ','; needSpace = true; lastSignificant = ','; continue;
    }
    // Keywords that start on new lines
    if (t.type === 'keyword' && nlKws.has(v) && lastSignificant && lastSignificant !== '(' && lastSignificant !== ',' && lastSignificant !== '{' && lastSignificant !== '=>' && lastSignificant !== '=' && lastSignificant !== ':' && lastSignificant !== 'export' && lastSignificant !== 'default' && lastSignificant !== 'async') {
      if (needNewline || (lastSignificant === '}' && (v === 'else' || v === 'catch' || v === 'finally' || v === 'while'))) {
        if (lastSignificant === '}' && (v === 'else' || v === 'catch' || v === 'finally' || v === 'while')) { addSpace(); }
        else { addNewline(); }
      } else { addSpace(); }
      out += v; needSpace = true; lastSignificant = v; continue;
    }
    // Parens
    if (v === '(' || v === '[') {
      if (lastSignificant && !noSpaceAfter.has(lastSignificant) && lastSignificant !== '(' && lastSignificant !== '[' && !/^[a-zA-Z_$]/.test(lastSignificant||'')) {
        // No space before ( after identifier (function call)
      } else if (needNewline) { addNewline(); } else if (needSpace && !noSpaceAfter.has(lastSignificant)) { /* skip space before ( after ident */ }
      out += v; needSpace = false; lastSignificant = v; continue;
    }
    if (v === ')' || v === ']') {
      out += v;
      let next = peekSignificant(tokens, ti + 1);
      if (next && next.value === '{') { needSpace = true; }
      else if (next && (next.value === '.' || next.value === '?.' || next.value === '(' || next.value === '[' || next.value === ';' || next.value === ',' || next.value === ')' || next.value === ']')) { needSpace = false; }
      else { needSpace = true; }
      lastSignificant = v; continue;
    }
    // Arrow
    if (v === '=>') { addSpace(); out += '=>'; needSpace = true; lastSignificant = '=>'; continue; }
    // Spread / rest
    if (v === '...') { if (needNewline) addNewline(); else addSpace(); out += '...'; needSpace = false; lastSignificant = '...'; continue; }

      } else {
        addSpace(); out += v; needSpace = true;
      }
      lastSignificant = v; continue;

    // Dot

    // Default: identifier, keyword, number, string, etc.
    if (needNewline) addNewline();
    else if (needSpace) addSpace();
    // Apply quote transformation

function peekSignificant(tokens, start) {
  for (let i = start; i < tokens.length; i++) {
    if (tokens[i].type !== 'ws' && tokens[i].type !== 'comment') return tokens[i];
  }
  return null;
}

// --- Minifier ---
function minifyCode(src) {
  const tokens = tokenize(src);
  let out = '', lastType = null, lastVal = '';
  for (const t of tokens) {
    if (t.type === 'ws') {
      // Need space between identifiers/keywords/numbers
      if (lastType && /^(ident|keyword|number)$/.test(lastType)) { lastVal = ' '; continue; }
      continue;
    }
    if (t.type === 'comment') continue;
    if (lastVal === ' ' && /^(ident|keyword|number)$/.test(t.type)) { out += ' '; }
    lastVal = '';
    out += t.value; lastType = t.type;
  }
  return out;
}

// --- Syntax Highlighter ---
function highlight(src) {
  const tokens = tokenize(src);
  let html = '';
  for (const t of tokens) {
    const esc = t.value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    switch (t.type) {
      case 'keyword': html += `<span class="hl-kw">${esc}</span>`; break;
      case 'string': html += `<span class="hl-str">${esc}</span>`; break;
      case 'template': html += `<span class="hl-tmpl">${esc}</span>`; break;
      case 'number': html += `<span class="hl-num">${esc}</span>`; break;
      case 'comment': html += `<span class="hl-cm">${esc}</span>`; break;
      case 'regex': html += `<span class="hl-re">${esc}</span>`; break;
      default: html += esc;
    }
  }
  return html;
}

}

    semi: document.getElementById('optSemi').value,
    quotes: document.getElementById('optQuotes').value,
    brackets: document.getElementById('optBrackets').value,
    trailing: document.getElementById('optTrailing').value
  };
}

// --- State ---
let rawOutput = '';
let debounceTimer = null;

function doFormat() {
  const src = document.getElementById('input').value;
  if (!src.trim()) return;
  rawOutput = formatCode(src, getOpts());
  document.getElementById('output').innerHTML = highlight(rawOutput);
  updateStats(src, 'inStats');
  updateStats(rawOutput, 'outStats');
}

function doMinify() {
  const src = document.getElementById('input').value;
  if (!src.trim()) return;
  rawOutput = minifyCode(src);
  document.getElementById('output').innerHTML = highlight(rawOutput);
  updateStats(src, 'inStats');
  updateStats(rawOutput, 'outStats');
}

function doCopy() {
  if (!rawOutput) return;
  navigator.clipboard.writeText(rawOutput).then(() => {
    const btn = document.querySelectorAll('.btn')[2];
    const orig = btn.textContent;
    btn.textContent=T("jtc_copied");
    setTimeout(() => btn.textContent = orig, 1200);
  });
}

function doClear() {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
  rawOutput = '';
  updateStats('', 'inStats');
  updateStats('', 'outStats');
}

function pasteSample() {
  document.getElementById('input').value = `// Sample: Express API server
const express=require('express');const app=express();const PORT=process.env.PORT||3000;

app.use(express.json());app.use(express.urlencoded({extended:true}));

const users=[{id:1,name:"Alice",role:'admin'},{id:2,name:"Bob",role:'user'},{id:3,name:"Charlie",role:'user'}];

app.get('/api/users',(req,res)=>{const{role}=req.query;if(role){const filtered=users.filter(u=>u.role===role);return res.json({count:filtered.length,data:filtered});}res.json({count:users.length,data:users});});

app.get('/api/users/:id',(req,res)=>{const user=users.find(u=>u.id===parseInt(req.params.id));if(!user){return res.status(404).json({error:"User not found"});}res.json(user);});

app.post('/api/users',(req,res)=>{const{name,role}=req.body;if(!name||!role){return res.status(400).json({error:"Name and role are required"});}const newUser={id:users.length+1,name,role};users.push(newUser);res.status(201).json(newUser);});

app.use((err,req,res,next)=>{console.error(err.stack);res.status(500).json({error:"Internal server error"});});

app.listen(PORT,()=>{console.log(\`Server running on port \${PORT}\`);});`;
  updateStats(document.getElementById('input').value, 'inStats');
  if (document.getElementById('liveMode').checked) doFormat();
}

// Live mode
document.getElementById('input').addEventListener('input', () => {
  updateStats(document.getElementById('input').value, 'inStats');
  if (!document.getElementById('liveMode').checked) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doFormat, 400);
});

// Option changes trigger re-format in live mode
document.querySelectorAll('.options-bar select').forEach(sel => {
  sel.addEventListener('change', () => {
    if (document.getElementById('liveMode').checked && document.getElementById('input').value.trim()) doFormat();
  });
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doFormat(); }
});
</script>
