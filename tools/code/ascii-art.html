// ── Rendering engine ──
function renderText(text, fontName, gap) {
  const font = FONTS[fontName];
  if (!font) return '';
  const upper = text.toUpperCase();
  const spacer = ' '.repeat(gap);
  const lines = [];

  for (let row = 0; row < font.height; row++) {
    let line = '';
    for (let i = 0; i < upper.length; i++) {
      const ch = upper[i];
      const glyph = font.chars[ch] || font.chars[' '];
      if (i > 0) line += spacer;
      line += (glyph[row] || '');
    }
    lines.push(line.replace(/\s+$/, ''));
  }

  // Remove trailing empty lines
  while (lines.length > 0 && lines[lines.length - 1].trim() === '') {
    lines.pop();
  }
  return lines.join('\n');
}

// ── UI logic ──
const textInput = document.getElementById('textInput');
const fontSelect = document.getElementById('fontSelect');
const widthSelect = document.getElementById('widthSelect');
const output = document.getElementById('output');
const charCount = document.getElementById('charCount');
const lineCount = document.getElementById('lineCount');
const widthCount = document.getElementById('widthCount');
const copyBtn = document.getElementById('copyBtn');

let currentOutput = '';

function update() {
  const text = textInput.value;
  if (!text.trim()) {
    output.innerHTML = '<span class="placeholder">Your ASCII art will appear here...</span>';
    currentOutput = '';
    charCount.textContent = '0';
    lineCount.textContent = '0';
    widthCount.textContent = '0';
    return;
  }
  const gap = parseInt(widthSelect.value, 10);
  currentOutput = renderText(text, fontSelect.value, gap);
  output.textContent = currentOutput;
  charCount.textContent = currentOutput.length;
  const lines = currentOutput.split('\n');
  lineCount.textContent = lines.length;
  widthCount.textContent = Math.max(...lines.map(l => l.length));
}

textInput.addEventListener('input', update);
fontSelect.addEventListener('change', update);
widthSelect.addEventListener('change', update);

function copyOutput() {
  if (!currentOutput) return;
  navigator.clipboard.writeText(currentOutput).then(() => {
    copyBtn.textContent=T("jtc_copied");
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent=T("jtc_copy");
      copyBtn.classList.remove('copied');
    }, 1500);
  });
}

function downloadOutput() {
  if (!currentOutput) return;
  const blob = new Blob([currentOutput], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ascii-art.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function clearAll() {
  textInput.value = '';
  update();
  textInput.focus();
}

// Init with example
textInput.value = 'HELLO';
update();
</script>
