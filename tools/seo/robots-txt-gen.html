<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.field{margin-bottom:10px}
.field label{display:block;font-size:0.78rem;color:#888;margin-bottom:4px;font-weight:600}
.field input{width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem}
.rule-card{background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.rule-card h4{font-size:0.82rem;color:#4da6ff;margin-bottom:8px}
.rule-card .remove{position:absolute;top:8px;right:8px;width:20px;height:20px;background:#ef4444;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.path-list{margin-bottom:6px}
.path-row{display:flex;gap:6px;margin-bottom:4px}
.path-row select{width:80px;background:#0d0d0d;border:1px solid #333;border-radius:4px;padding:4px;color:#e6e6e6;font-size:0.78rem}
.path-row input{flex:1;background:#0d0d0d;border:1px solid #333;border-radius:4px;padding:4px 8px;color:#e6e6e6;font-size:0.78rem}
.path-row button{padding:4px 8px;border-radius:4px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.7rem}
.add-btn{padding:4px 10px;border-radius:4px;border:1px solid #333;background:#161616;color:#4da6ff;cursor:pointer;font-size:0.75rem;font-weight:600}
.add-btn:hover{border-color:#3b82f6}
.output-area{width:100%;min-height:250px;max-height:500px;background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:10px;color:#e6e6e6;font-family:'Fira Code',monospace;font-size:0.78rem;overflow:auto;white-space:pre}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.8rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.btn-primary{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.btn-sm{padding:4px 10px;font-size:0.75rem}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>robots.txt Generator</h1>
<p class="sub">Create robot exclusion rules visually</p>

<div class="section">
<h3>Presets</h3>
<div class="presets">
<div class="preset" onclick="loadPreset('allow-all')">Allow All</div>
<div class="preset" onclick="loadPreset('block-all')">Block All</div>
<div class="preset" onclick="loadPreset('standard')">Standard</div>
<div class="preset" onclick="loadPreset('wordpress')">WordPress</div>
<div class="preset" onclick="loadPreset('nextjs')">Next.js</div>
<div class="preset" onclick="loadPreset('block-ai')">Block AI Crawlers</div>
</div>
</div>

<div class="layout">
<div>
<div class="section">
<h3>Sitemap</h3>
<div class="field"><label>Sitemap URL</label><input id="sitemapUrl" value="" placeholder="https://example.com/sitemap.xml" oninput="gen()"></div>
</div>

<div class="section">
<h3>Rules <button class="btn btn-sm" style="float:right" onclick="addRule()">+ Add Rule</button></h3>
<div id="rulesList"></div>
</div>
</div>

<div>
<div class="output-area" id="output"></div>
<div class="actions">
<button class="btn btn-primary" onclick="copyTxt()">Copy</button>
<button class="btn" onclick="downloadTxt()">Download robots.txt</button>
</div>
</div>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/meta-tag-gen/">Meta Tags</a> | <a href="https://gokuscraper.github.io/dev-vault/htaccess-gen/">.htaccess</a> | <a href="https://gokuscraper.github.io/dev-vault/nginx-config-gen/">Nginx Config</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
let rules=[];
let ruleId=0;

function addRule(agent,paths){
  rules.push({id:ruleId++,agent:agent||'*',paths:paths||[{type:'Disallow',path:''}]});
  renderRules();gen();
}

function removeRule(id){
  rules=rules.filter(r=>r.id!==id);
  renderRules();gen();
}

function renderRules(){
  const list=document.getElementById('rulesList');
  list.innerHTML='';
  rules.forEach((rule,ri)=>{
    const card=document.createElement('div');
    card.className='rule-card';
    let pathsHTML='<div class="path-list" id="paths_'+rule.id+'">';
    rule.paths.forEach((p,pi)=>{
      pathsHTML+=`<div class="path-row"><select onchange="rules[${ri}].paths[${pi}].type=this.value;gen()"><option value="Allow"${p.type==='Allow'?' selected':''}>Allow</option><option value="Disallow"${p.type==='Disallow'?' selected':''}>Disallow</option></select><input value="${p.path}" placeholder="/path/" oninput="rules[${ri}].paths[${pi}].path=this.value;gen()"><button onclick="rules[${ri}].paths.splice(${pi},1);renderRules();gen()">×</button></div>`;
    });
    pathsHTML+='</div>';

    card.innerHTML=`<h4>User-agent</h4><button class="remove" onclick="removeRule(${rule.id})">×</button>
      <div class="field"><input value="${rule.agent}" placeholder="*" oninput="rules[${ri}].agent=this.value;gen()"></div>
      ${pathsHTML}
      <button class="add-btn" onclick="rules[${ri}].paths.push({type:'Disallow',path:''});renderRules();gen()">+ Add Path</button>`;
    list.appendChild(card);
  });
}

function gen(){
  let txt='';
  rules.forEach(rule=>{
    txt+=`User-agent: ${rule.agent}\n`;
    rule.paths.forEach(p=>{
      if(p.path||p.type==='Disallow')txt+=`${p.type}: ${p.path}\n`;
    });
    txt+='\n';
  });
  const sitemap=document.getElementById('sitemapUrl').value;
  if(sitemap)txt+=`Sitemap: ${sitemap}\n`;
  document.getElementById('output').textContent=txt;
}

function loadPreset(name){
  rules=[];ruleId=0;
  if(name==='allow-all'){
    addRule('*',[{type:'Allow',path:'/'}]);
  }else if(name==='block-all'){
    addRule('*',[{type:'Disallow',path:'/'}]);
  }else if(name==='standard'){
    addRule('*',[{type:'Disallow',path:'/admin/'},{type:'Disallow',path:'/api/'},{type:'Disallow',path:'/private/'},{type:'Allow',path:'/'}]);
  }else if(name==='wordpress'){
    addRule('*',[{type:'Disallow',path:'/wp-admin/'},{type:'Disallow',path:'/wp-includes/'},{type:'Disallow',path:'/wp-content/plugins/'},{type:'Allow',path:'/wp-admin/admin-ajax.php'}]);
  }else if(name==='nextjs'){
    addRule('*',[{type:'Disallow',path:'/_next/static/media/'},{type:'Disallow',path:'/api/'},{type:'Allow',path:'/'}]);
  }else if(name==='block-ai'){
    addRule('GPTBot',[{type:'Disallow',path:'/'}]);
    addRule('ChatGPT-User',[{type:'Disallow',path:'/'}]);
    addRule('CCBot',[{type:'Disallow',path:'/'}]);
    addRule('anthropic-ai',[{type:'Disallow',path:'/'}]);
    addRule('Google-Extended',[{type:'Disallow',path:'/'}]);
    addRule('*',[{type:'Allow',path:'/'}]);
  }
}

function copyTxt(){
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>showToast('Copied!'));
}

function downloadTxt(){
  const blob=new Blob([document.getElementById('output').textContent],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='robots.txt';a.click();
  showToast('Downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

// Init
loadPreset('standard');
</script>
</body>
</html>
