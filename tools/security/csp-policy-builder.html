try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const DIRECTIVES = [
  'default-src','script-src','style-src','img-src','connect-src','font-src',
  'media-src','object-src','frame-src','child-src','worker-src','manifest-src',
  'base-uri','form-action','frame-ancestors','navigate-to','report-uri','report-to',
  'upgrade-insecure-requests','block-all-mixed-content','sandbox'
];
const SUGGESTIONS = {
  common: ["'self'","'none'","'unsafe-inline'","'unsafe-eval'","'strict-dynamic'","'unsafe-hashes'","data:","blob:","https:","http:","*"],
  urls: ["https://cdn.jsdelivr.net","https://cdnjs.cloudflare.com","https://fonts.googleapis.com","https://fonts.gstatic.com","https://www.google-analytics.com","https://*.cloudflare.com"]
};

let directives = [];
let outputTab = 'header';

function addDirective(name='default-src', sources=[]) {
  directives.push({name, sources: [...sources]});
  render();
}

function removeDirective(i) {
  directives.splice(i, 1);
  render();
}

function addSource(i, val) {
  if (!val) return;
  if (!directives[i].sources.includes(val)) {
    directives[i].sources.push(val);
    render();
  }
}

function removeSource(di, si) {
  directives[di].sources.splice(si, 1);
  render();
}

function changeDirectiveName(i, name) {
  directives[i].name = name;
  render();
}

function buildCSP() {
  return directives.map(d => {
    if (['upgrade-insecure-requests','block-all-mixed-content'].includes(d.name)) return d.name;
    return d.name + ' ' + d.sources.join(' ');
  }).join('; ');
}

function getOutput() {
  const csp = buildCSP();
  if (!csp) return '(no directives added)';
  switch(outputTab) {
    case 'header': return 'Content-Security-Policy: ' + csp;
    case 'meta': return '<meta http-equiv="Content-Security-Policy" content="' + csp.replace(/"/g,'&quot;') + '">';
    case 'nginx': return "add_header Content-Security-Policy \"" + csp + "\" always;";
    case 'apache': return 'Header set Content-Security-Policy "' + csp + '"';
  }
}

function setOutputTab(tab, btn) {
  outputTab = tab;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateOutput();
}

function updateOutput() {
  document.getElementById('output').textContent = getOutput();
}

function copyOutput() {
  navigator.clipboard.writeText(getOutput()).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(()=>btn.textContent='Copy', 1500);
  });
}

function render() {
  const container = document.getElementById('directives');
  container.innerHTML = directives.map((d, i) => {
    const usedNames = directives.map(x=>x.name);
    const available = DIRECTIVES.filter(n=>n===d.name||!usedNames.includes(n));
    const noValue = ['upgrade-insecure-requests','block-all-mixed-content'].includes(d.name);
    return `<div class="directive-row">
      <div class="directive-header">
        <select onchange="changeDirectiveName(${i},this.value)">
          ${available.map(n=>`<option value="${n}"${n===d.name?' selected':''}>${n}</option>`).join('')}
        </select>
        <button class="danger" onclick="removeDirective(${i})" ti="btn_remove" ti="btn_remove">Remove</button>
      </div>
      ${noValue ? '<p class="info">This directive takes no value</p>' : `
      <div class="sources-container">
        ${d.sources.map((s,si)=>`<span class="source-tag">${s}<span class="remove" onclick="removeSource(${i},${si})">x</span></span>`).join('')}
      </div>
      <div class="add-source-row">
        <input id="src-input-${i}" tp="placeholder_add_source_value" tp="placeholder_add_source_value" placeholder="Add source value..." onkeydown="if(event.key==='Enter'){addSource(${i},this.value);this.value=''}">
        <button onclick="const inp=document.getElementById('src-input-${i}');addSource(${i},inp.value);inp.value=''" ti="btn_add" ti="btn_add">Add</button>
      </div>
      <div class="suggestions">
        ${SUGGESTIONS.common.map(s=>`<button onclick="addSource(${i},'${s}')" ti="btn_s" ti="btn_s">${s}</button>`).join('')}
      </div>`}
    </div>`;
  }).join('');
  updateOutput();
}

function loadPreset(name) {
  directives = [];
  const presets = {
    strict: [
      {name:'default-src',sources:["'none'"]},
      {name:'script-src',sources:["'self'"]},
      {name:'style-src',sources:["'self'"]},
      {name:'img-src',sources:["'self'"]},
      {name:'font-src',sources:["'self'"]},
      {name:'connect-src',sources:["'self'"]},
      {name:'frame-ancestors',sources:["'none'"]},
      {name:'base-uri',sources:["'self'"]},
      {name:'form-action',sources:["'self'"]},
      {name:'upgrade-insecure-requests',sources:[]}
    ],
    moderate: [
      {name:'default-src',sources:["'self'"]},
      {name:'script-src',sources:["'self'","'unsafe-inline'"]},
      {name:'style-src',sources:["'self'","'unsafe-inline'"]},
      {name:'img-src',sources:["'self'","data:","https:"]},
      {name:'font-src',sources:["'self'","https://fonts.gstatic.com"]},
      {name:'connect-src',sources:["'self'"]},
      {name:'frame-ancestors',sources:["'self'"]}
    ],
    permissive: [
      {name:'default-src',sources:["*"]},
      {name:'script-src',sources:["*","'unsafe-inline'","'unsafe-eval'"]},
      {name:'style-src',sources:["*","'unsafe-inline'"]},
      {name:'img-src',sources:["*","data:","blob:"]}
    ],
    api: [
      {name:'default-src',sources:["'none'"]},
      {name:'frame-ancestors',sources:["'none'"]},
      {name:'base-uri',sources:["'none'"]},
      {name:'form-action',sources:["'none'"]}
    ],
    spa: [
      {name:'default-src',sources:["'self'"]},
      {name:'script-src',sources:["'self'","'unsafe-eval'"]},
      {name:'style-src',sources:["'self'","'unsafe-inline'"]},
      {name:'img-src',sources:["'self'","data:","blob:"]},
      {name:'connect-src',sources:["'self'","https:"]},
      {name:'font-src',sources:["'self'","https://fonts.gstatic.com"]}
    ]
  };
  directives = presets[name].map(d=>({name:d.name,sources:[...d.sources]}));
  render();
}

function clearAll() {
  directives = [];
  render();
}

function testViolations() {
  const html = document.getElementById('testHtml').value;
  const results = document.getElementById('violationResults');
  if (!html.trim()) { results.innerHTML=''; return; }

  const findings = [];
  const getSourcesFor = (directive) => {
    const d = directives.find(x=>x.name===directive);
    if (d) return d.sources;
    const def = directives.find(x=>x.name==='default-src');
    return def ? def.sources : null;
  };

  const checkAllowed = (sources, url) => {
    if (!sources) return true;
    if (sources.includes('*')) return true;
    if (sources.includes("'none'")) return false;
    if (sources.includes("'self'") && (url==='' || url.startsWith('/'))) return true;
    if (sources.includes("'unsafe-inline'") && !url) return true;
    if (url && sources.includes('https:') && url.startsWith('https://')) return true;
    if (url && sources.includes('data:') && url.startsWith('data:')) return true;
    if (url && sources.some(s => !s.startsWith("'") && url.startsWith(s))) return true;
    return false;
  };

  // Check external scripts
  const scriptSrcRegex = /<script[^>]+src=["']([^"']+)["']/gi;
  let m;
  while ((m = scriptSrcRegex.exec(html))) {
    const sources = getSourcesFor('script-src');
    const allowed = checkAllowed(sources, m[1]);
    findings.push({type: 'script-src', detail: m[1], allowed});
  }

  // Check inline scripts
  const inlineScriptRegex = /<script(?![^>]*src)[^>]*>[\s\S]*?<\/script>/gi;
  while ((m = inlineScriptRegex.exec(html))) {
    const sources = getSourcesFor('script-src');
    const allowed = sources && sources.includes("'unsafe-inline'");
    findings.push({type: 'script-src', detail: 'inline <script>', allowed});
  }

  // Check external styles
  const styleLinkRegex = /<link[^>]+href=["']([^"']+)["'][^>]*rel=["']stylesheet["']|<link[^>]*rel=["']stylesheet["'][^>]+href=["']([^"']+)["']/gi;
  while ((m = styleLinkRegex.exec(html))) {
    const url = m[1] || m[2];
    const sources = getSourcesFor('style-src');
    const allowed = checkAllowed(sources, url);
    findings.push({type: 'style-src', detail: url, allowed});
  }

  // Check inline styles
  const inlineStyleRegex = /<style[^>]*>[\s\S]*?<\/style>/gi;
  while ((m = inlineStyleRegex.exec(html))) {
    const sources = getSourcesFor('style-src');
    const allowed = sources && sources.includes("'unsafe-inline'");
    findings.push({type: 'style-src', detail: 'inline <style>', allowed});
  }

  // Check images
  const imgRegex = /<img[^>]+src=["']([^"']+)["']/gi;
  while ((m = imgRegex.exec(html))) {
    const sources = getSourcesFor('img-src');
    const allowed = checkAllowed(sources, m[1]);
    findings.push({type: 'img-src', detail: m[1], allowed});
  }

  // Check iframes
  const iframeRegex = /<iframe[^>]+src=["']([^"']+)["']/gi;
  while ((m = iframeRegex.exec(html))) {
    const sources = getSourcesFor('frame-src');
    const allowed = checkAllowed(sources, m[1]);
    findings.push({type: 'frame-src', detail: m[1], allowed});
  }

  if (findings.length === 0) {
    results.innerHTML = '<div class="violation-item allowed">No resources detected in the HTML to test.</div>';
    return;
  }

  results.innerHTML = findings.map(f =>
    `<div class="violation-item ${f.allowed?'allowed':'blocked'}">
      <strong ti="strong_f_type" ti="strong_f_type">[${f.type}]</strong> ${f.detail} &mdash; ${f.allowed?'ALLOWED':'BLOCKED'}
    </div>`
  ).join('');
}

// Initialize with moderate preset
loadPreset('moderate');
</script>
