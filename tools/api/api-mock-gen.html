<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Mock Generator — Generate Mock API Responses</title>
<meta name="description" content="Generate mock API responses for testing. JSON/XML. Status codes, headers, pagination. Realistic fake data. Copy or download.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.field{margin-bottom:10px}
.field label{display:block;font-size:0.78rem;color:#888;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.check-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.check-row label{font-size:0.78rem;color:#aaa}
.kv-list{margin-bottom:8px}
.kv-row{display:flex;gap:6px;margin-bottom:4px}
.kv-row input{flex:1;background:#0d0d0d;border:1px solid #333;border-radius:4px;padding:4px 8px;color:#e6e6e6;font-size:0.78rem}
.kv-row button{padding:4px 8px;border-radius:4px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.7rem}
.add-btn{padding:4px 10px;border-radius:4px;border:1px solid #333;background:#161616;color:#4da6ff;cursor:pointer;font-size:0.75rem;font-weight:600}
.output-area{width:100%;min-height:350px;max-height:600px;background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:10px;color:#e6e6e6;font-family:'Fira Code',monospace;font-size:0.75rem;overflow:auto;white-space:pre}
.status-bar{display:flex;gap:8px;align-items:center;margin-bottom:10px;padding:8px 12px;background:#0d0d0d;border-radius:6px;font-size:0.78rem}
.status-code{padding:3px 8px;border-radius:4px;font-weight:700;font-family:'Fira Code',monospace}
.s2xx{background:#0d2818;color:#22c55e}
.s3xx{background:#1a1a06;color:#eab308}
.s4xx{background:#2d1b06;color:#f59e0b}
.s5xx{background:#2d0606;color:#ef4444}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.8rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.btn-primary{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="container">
<h1>API Mock Generator</h1>
<p class="sub">Generate realistic mock API responses for testing</p>

<div class="section">
<h3>Endpoint Presets</h3>
<div class="presets" id="presetList">
<div class="preset active" onclick="loadPreset('users')">Users List</div>
<div class="preset" onclick="loadPreset('user')">Single User</div>
<div class="preset" onclick="loadPreset('posts')">Blog Posts</div>
<div class="preset" onclick="loadPreset('products')">Products</div>
<div class="preset" onclick="loadPreset('auth')">Auth Token</div>
<div class="preset" onclick="loadPreset('error404')">404 Error</div>
<div class="preset" onclick="loadPreset('error500')">500 Error</div>
<div class="preset" onclick="loadPreset('paginated')">Paginated</div>
</div>
</div>

<div class="layout">
<div>
<div class="section">
<h3>Response Settings</h3>
<div class="field-row">
<div class="field"><label>Status Code</label><select id="statusCode" onchange="gen()">
<option value="200">200 OK</option>
<option value="201">201 Created</option>
<option value="204">204 No Content</option>
<option value="301">301 Moved</option>
<option value="400">400 Bad Request</option>
<option value="401">401 Unauthorized</option>
<option value="403">403 Forbidden</option>
<option value="404">404 Not Found</option>
<option value="422">422 Unprocessable</option>
<option value="429">429 Rate Limited</option>
<option value="500">500 Server Error</option>
<option value="503">503 Unavailable</option>
</select></div>
<div class="field"><label>Format</label><select id="format" onchange="gen()"><option value="json">JSON</option><option value="xml">XML</option></select></div>
</div>
<div class="field-row">
<div class="field"><label>Item Count</label><input id="count" type="number" value="5" min="1" max="50" onchange="gen()"></div>
<div class="field"><label>Delay (display only)</label><input id="delay" value="0ms" oninput="gen()"></div>
</div>
</div>

<div class="section">
<h3>Response Headers</h3>
<div class="kv-list" id="headersList"></div>
<button class="add-btn" onclick="addHeader()">+ Add Header</button>
</div>

<div class="section">
<h3>Data Shape</h3>
<div class="check-row"><input type="checkbox" id="wrapData" checked onchange="gen()"><label for="wrapData">Wrap in { data: [...] }</label></div>
<div class="check-row"><input type="checkbox" id="addMeta" onchange="gen()"><label for="addMeta">Add pagination meta</label></div>
<div class="check-row"><input type="checkbox" id="addTimestamp" checked onchange="gen()"><label for="addTimestamp">Add timestamps</label></div>
<div class="check-row"><input type="checkbox" id="addId" checked onchange="gen()"><label for="addId">Add IDs</label></div>
</div>
</div>

<div>
<div id="statusDisplay"></div>
<div class="output-area" id="output"></div>
<div class="actions">
<button class="btn btn-primary" onclick="copyOutput()">Copy</button>
<button class="btn" onclick="downloadOutput()">Download</button>
<button class="btn" onclick="regenerate()">Regenerate</button>
</div>
</div>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/json-formatter/">JSON Formatter</a> | <a href="https://gokuscraper.github.io/dev-vault/curl-builder/">cURL Builder</a> | <a href="https://gokuscraper.github.io/dev-vault/jwt-debugger/">JWT Debugger</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
let currentPreset='users';

const FIRST_NAMES=['Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Henry','Iris','Jack','Kate','Liam','Mia','Noah','Olivia','Peter','Quinn','Ruby','Sam','Tina'];
const LAST_NAMES=['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Anderson','Taylor','Thomas','Jackson','White','Harris','Martin','Thompson','Moore','Allen'];
const DOMAINS=['example.com','test.io','demo.dev','sample.org','mock.net'];
const TITLES=['Getting Started with','Advanced Guide to','Introduction to','Best Practices for','Understanding','Deep Dive into'];
const TOPICS=['React','TypeScript','Docker','Kubernetes','GraphQL','Rust','WebAssembly','CI/CD','Microservices','Testing'];
const PRODUCT_NAMES=['Pro Widget','Smart Gadget','Ultra Tool','Power Device','Mega System','Flex Module','Core Engine','Quick Helper'];
const CATEGORIES=['Electronics','Software','Hardware','Accessories','Services','Books'];

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function uuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
function isoDate(daysAgo){const d=new Date();d.setDate(d.getDate()-daysAgo);return d.toISOString()}

function generateUser(){
  const first=rand(FIRST_NAMES),last=rand(LAST_NAMES);
  const obj={};
  if(document.getElementById('addId').checked)obj.id=randInt(1,9999);
  obj.name=first+' '+last;
  obj.email=first.toLowerCase()+'.'+last.toLowerCase()+'@'+rand(DOMAINS);
  obj.role=rand(['admin','user','editor','viewer']);
  obj.active=Math.random()>0.2;
  if(document.getElementById('addTimestamp').checked){
    obj.created_at=isoDate(randInt(1,365));
    obj.updated_at=isoDate(randInt(0,30));
  }
  return obj;
}

function generatePost(){
  const obj={};
  if(document.getElementById('addId').checked)obj.id=randInt(1,999);
  obj.title=rand(TITLES)+' '+rand(TOPICS);
  obj.slug=obj.title.toLowerCase().replace(/\s+/g,'-');
  obj.author=rand(FIRST_NAMES)+' '+rand(LAST_NAMES);
  obj.tags=[rand(TOPICS).toLowerCase(),rand(['tutorial','guide','tips'])];
  obj.published=Math.random()>0.3;
  obj.views=randInt(100,50000);
  if(document.getElementById('addTimestamp').checked){
    obj.published_at=isoDate(randInt(1,180));
  }
  return obj;
}

function generateProduct(){
  const obj={};
  if(document.getElementById('addId').checked)obj.id=uuid();
  obj.name=rand(PRODUCT_NAMES)+' '+rand(['X','Pro','Lite','Plus','Max']);
  obj.price=parseFloat((Math.random()*200+9.99).toFixed(2));
  obj.currency='USD';
  obj.category=rand(CATEGORIES);
  obj.in_stock=Math.random()>0.15;
  obj.rating=parseFloat((Math.random()*2+3).toFixed(1));
  obj.reviews=randInt(0,500);
  if(document.getElementById('addTimestamp').checked){
    obj.created_at=isoDate(randInt(1,365));
  }
  return obj;
}

function gen(){
  const status=parseInt(document.getElementById('statusCode').value);
  const format=document.getElementById('format').value;
  const count=parseInt(document.getElementById('count').value)||5;
  const wrap=document.getElementById('wrapData').checked;
  const meta=document.getElementById('addMeta').checked;

  // Status display
  const cls=status<300?'s2xx':status<400?'s3xx':status<500?'s4xx':'s5xx';
  const headers=getHeaders();
  let headerStr=headers.map(h=>`${h.key}: ${h.value}`).join('\n');
  document.getElementById('statusDisplay').innerHTML=`<div class="status-bar"><span class="status-code ${cls}">${status}</span><span style="color:#888">${headerStr?'Headers: '+headers.length:''}</span></div>`;

  let data;
  if(status>=400){
    data=generateError(status);
  }else if(currentPreset==='auth'){
    data=generateAuth();
  }else{
    const generators={users:generateUser,user:generateUser,posts:generatePost,products:generateProduct,paginated:generateUser};
    const genFn=generators[currentPreset]||generateUser;

    if(currentPreset==='user'){
      data=genFn();
    }else{
      const items=Array.from({length:count},genFn);
      if(wrap){
        data={data:items};
        if(meta){
          data.meta={total:randInt(count,count*20),page:1,per_page:count,total_pages:randInt(1,20)};
        }
      }else{
        data=items;
      }
    }
  }

  if(format==='json'){
    document.getElementById('output').textContent=JSON.stringify(data,null,2);
  }else{
    document.getElementById('output').textContent=jsonToXml(data);
  }
}

function generateError(status){
  const messages={
    400:{error:'Bad Request',message:'The request body is invalid or missing required fields'},
    401:{error:'Unauthorized',message:'Invalid or expired authentication token'},
    403:{error:'Forbidden',message:'You do not have permission to access this resource'},
    404:{error:'Not Found',message:'The requested resource was not found'},
    422:{error:'Unprocessable Entity',message:'Validation failed',details:[{field:'email',message:'must be a valid email'}]},
    429:{error:'Too Many Requests',message:'Rate limit exceeded. Try again in 60 seconds',retry_after:60},
    500:{error:'Internal Server Error',message:'An unexpected error occurred'},
    503:{error:'Service Unavailable',message:'Service is temporarily unavailable for maintenance'}
  };
  return messages[status]||{error:'Error',message:'An error occurred',status_code:status};
}

function generateAuth(){
  return{access_token:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.'+btoa(JSON.stringify({sub:uuid(),iat:Math.floor(Date.now()/1000),exp:Math.floor(Date.now()/1000)+3600})).replace(/=/g,'')+'.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c',token_type:'Bearer',expires_in:3600,refresh_token:uuid(),scope:'read write'};
}

function jsonToXml(obj,root){
  root=root||'response';
  let xml='<?xml version="1.0" encoding="UTF-8"?>\n<'+root+'>\n';
  xml+=objToXml(obj,1);
  xml+='</'+root+'>';
  return xml;
}

function objToXml(obj,indent){
  const pad='  '.repeat(indent);
  let xml='';
  if(Array.isArray(obj)){
    obj.forEach(item=>{
      xml+=pad+'<item>\n'+objToXml(item,indent+1)+pad+'</item>\n';
    });
  }else if(typeof obj==='object'&&obj!==null){
    Object.entries(obj).forEach(([key,val])=>{
      if(Array.isArray(val)){
        xml+=pad+`<${key}>\n`;
        val.forEach(item=>{
          if(typeof item==='object'){
            xml+=pad+'  <item>\n'+objToXml(item,indent+2)+pad+'  </item>\n';
          }else{
            xml+=pad+`  <item>${item}</item>\n`;
          }
        });
        xml+=pad+`</${key}>\n`;
      }else if(typeof val==='object'&&val!==null){
        xml+=pad+`<${key}>\n`+objToXml(val,indent+1)+pad+`</${key}>\n`;
      }else{
        xml+=pad+`<${key}>${val}</${key}>\n`;
      }
    });
  }
  return xml;
}

// Headers
function addHeader(k,v){
  const list=document.getElementById('headersList');
  const row=document.createElement('div');
  row.className='kv-row';
  row.innerHTML=`<input placeholder="Header" value="${k||''}" oninput="gen()"><input placeholder="Value" value="${v||''}" oninput="gen()"><button onclick="this.parentElement.remove();gen()">×</button>`;
  list.appendChild(row);
}

function getHeaders(){
  return Array.from(document.getElementById('headersList').querySelectorAll('.kv-row')).map(r=>{
    const inputs=r.querySelectorAll('input');
    return{key:inputs[0].value,value:inputs[1].value};
  }).filter(h=>h.key);
}

function loadPreset(name){
  currentPreset=name;
  document.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));
  const btn=document.querySelector(`.preset[onclick="loadPreset('${name}')"]`);
  if(btn)btn.classList.add('active');

  const defaults={
    users:{status:'200',count:5,wrap:true,meta:false},
    user:{status:'200',count:1,wrap:false,meta:false},
    posts:{status:'200',count:5,wrap:true,meta:false},
    products:{status:'200',count:5,wrap:true,meta:false},
    auth:{status:'200',count:1,wrap:false,meta:false},
    error404:{status:'404',count:1,wrap:false,meta:false},
    error500:{status:'500',count:1,wrap:false,meta:false},
    paginated:{status:'200',count:10,wrap:true,meta:true}
  };
  const d=defaults[name]||defaults.users;
  document.getElementById('statusCode').value=d.status;
  document.getElementById('count').value=d.count;
  document.getElementById('wrapData').checked=d.wrap;
  document.getElementById('addMeta').checked=d.meta;

  // Default headers
  document.getElementById('headersList').innerHTML='';
  addHeader('Content-Type','application/json');
  addHeader('X-Request-ID',uuid());

  gen();
}

function regenerate(){gen()}

function copyOutput(){
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>showToast('Copied!'));
}

function downloadOutput(){
  const text=document.getElementById('output').textContent;
  const ext=document.getElementById('format').value==='json'?'json':'xml';
  const blob=new Blob([text],{type:ext==='json'?'application/json':'application/xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mock-response.'+ext;a.click();
  showToast('Downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

// Init
addHeader('Content-Type','application/json');
addHeader('X-Request-ID',uuid());
gen();
</script>
</body>
</html>
