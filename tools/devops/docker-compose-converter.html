<!DOCTYPE html>
<html tk="title_docker_run_to_compose_con" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Run to Compose Converter</title>
<meta name="description" content="Convert docker run commands to docker-compose.yml format. Paste a docker run command and get the equivalent docker-compose YAML.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:640px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;font-family:monospace;resize:vertical;min-height:70px}
textarea:focus{border-color:#3b82f6}
.alert{margin-top:10px;padding:12px;border-radius:8px;font-size:0.85rem}
.alert.info{background:#0d1b2a;border:1px solid #1b3a5c;color:#a0c4e8}
.alert.warning{background:#1a1a0d;border:1px solid #5c5c1b;color:#e8e4a0}
.alert.error{background:#1a0d0d;border:1px solid #5c1b1b;color:#e8a0a0}
.alert li{margin-left:16px;margin-top:4px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button:disabled{opacity:.4;cursor:default}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:12px}
</style>
</head>
<body>


<div class="container" style="position:relative">
  <h1 ti="h1_docker_run_compose">Docker Run → Compose</h1>
  <p class="desc" ti="subtitle_convert_a_docker_run_comm">Convert a docker run command to docker-compose.yml</p>
  <div class="card">
    <label ti="label_docker_run_command">Docker run command</label>
    <textarea id="dockerRun" rows="3" spellcheck="false">docker run -p 80:80 -v /var/run/docker.sock:/tmp/docker.sock:ro --restart always --log-opt max-size=1g nginx</textarea>
    <label ti="label_docker_compose_yml">docker-compose.yml</label>
    <textarea id="composeOutput" rows="8" readonly></textarea>
    <div id="messages"></div>
    <div class="flex-center">
      <button id="downloadBtn" disabled ti="btn_download_docker_compose_y">Download docker-compose.yml</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/composerize-ts@1.1.0/dist/composerize.umd.js"></script>

<script>var _LANG={'title_docker_run_to_compose_con':["Docker Run to Compose Converter", "Docker Run 到 Compose 转换器"],'metadesc_convert_docker_run_comman':["Convert docker run commands to docker-compose.yml format. Paste a docker run command and get the equivalent docker-compose YAML.", "将 docker run 命令转换为 docker-compose.yml 格式。粘贴 docker run 命令即可获得等效的 docker-compose YAML 文件。"],'h1_docker_run_compose':["Docker Run → Compose", "Docker 运行 → Compose"],'subtitle_convert_a_docker_run_comm':["Convert a docker run command to docker-compose.yml", "将 docker run 命令转换为 docker-compose.yml 文件"],'btn_download_docker_compose_y':["Download docker-compose.yml", "下载 docker-compose.yml"],'strong_label':["${label}:", "${label}:"],'strong_error':["Error:", "错误："],'label_docker_run_command':["Docker run command", "Docker 运行命令"],'label_docker_compose_yml':["docker-compose.yml", "docker-compose.yml"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function update() {
  const cmd = document.getElementById('dockerRun').value.trim();
  const output = document.getElementById('composeOutput');
  const msgs = document.getElementById('messages');
  const downloadBtn = document.getElementById('downloadBtn');

  if (!cmd) { output.value = ''; msgs.innerHTML = ''; downloadBtn.disabled = true; return; }

  try {
    const result = composerize.composerize(cmd);
    output.value = result.yaml;
    downloadBtn.disabled = !result.yaml;

    let html = '';
    if (result.messages && result.messages.length) {
      result.messages.forEach(m => {
        const type = m.type === 0 ? 'info' : m.type === 1 ? 'warning' : 'error';
        const label = m.type === 0 ? 'Not translatable' : m.type === 1 ? 'Not implemented' : 'Error';
        html += `<div class="alert ${type}"><strong ti="strong_label">${label}:</strong> ${m.value}</div>`;
      });
    }
    msgs.innerHTML = html;
  } catch(e) {
    output.value = '';
    msgs.innerHTML = `<div class="alert error"><strong ti="strong_error">Error:</strong> ${e.message}</div>`;
    downloadBtn.disabled = true;
  }
}

document.getElementById('dockerRun').addEventListener('input', update);
document.getElementById('downloadBtn').addEventListener('click', () => {
  const yaml = document.getElementById('composeOutput').value;
  if (!yaml) return;
  const blob = new Blob([yaml], { type: 'application/yaml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'docker-compose.yml';
  a.click();
  URL.revokeObjectURL(a.href);
});
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
