<body>


<div class="container" style="position:relative">
<h1 ti="h1_grafana_dashboard_generat">Grafana Dashboard Generator</h1>
<p class="sub" ti="subtitle_create_import_ready_grafa">Create import-ready Grafana dashboard JSON — no Grafana needed</p>

<div class="section">
<h3 ti="h3_dashboard">Dashboard</h3>
<div class="field-row">
<div class="field"><label ti="label_title" ti="label_title_2">Title</label><input id="dTitle" value="My Dashboard" oninput="gen()"></div>
<div class="field"><label ti="label_refresh_interval">Refresh Interval</label><select id="dRefresh" onchange="gen()"><option value="5s">5s</option><option value="10s">10s</option><option value="30s" selected>30s</option><option value="1m">1m</option><option value="5m">5m</option></select></div>
</div>
<div class="field"><label ti="label_tags_comma_separated">Tags (comma-separated)</label><input id="dTags" value="monitoring" oninput="gen()"></div>
</div>

<div class="preset" onclick="loadPreset('docker')">Docker</div>
<div class="preset" onclick="loadPreset('nginx')">Nginx</div>
<div class="preset" onclick="loadPreset('kubernetes')">Kubernetes</div>

<div>

</div>

</div>

</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
let panels=[];
let nextId=1;

function addPanel(title,type,query,unit){
  panels.push({
    id:nextId++,
    title:title||'Panel '+(panels.length+1),
    type:type||'timeseries',
    query:query||'up',
    unit:unit||'short',
    thresholdMode:'off',
    thresholdValue:80
  });
  renderPanels();gen();
}

function removePanel(id){
  panels=panels.filter(p=>p.id!==id);
  renderPanels();gen();
}

function renderPanels(){
  const list=document.getElementById('panelsList');
  list.innerHTML='';
  panels.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='panel-card';
    card.innerHTML=`
      <h4>Panel ${i+1}</h4>
      <button class="remove" onclick="removePanel(${p.id})">×</button>
      <div class="field"><label>Title</label><input value="${esc(p.title)}" onchange="panels[${i}].title=this.value;gen()"></div>
      <div class="field-row">
        <div class="field"><label ti="label_type">Type</label><select onchange="panels[${i}].type=this.value;gen()">
          <option value="timeseries"${p.type==='timeseries'?' selected':''}>Time Series</option>
          <option value="stat"${p.type==='stat'?' selected':''}>Stat</option>
          <option value="gauge"${p.type==='gauge'?' selected':''}>Gauge</option>
          <option value="bargauge"${p.type==='bargauge'?' selected':''}>Bar Gauge</option>
          <option value="table"${p.type==='table'?' selected':''}>Table</option>
          <option value="heatmap"${p.type==='heatmap'?' selected':''}>Heatmap</option>
        </select></div>
        <div class="field"><label ti="label_unit">Unit</label><select onchange="panels[${i}].unit=this.value;gen()">
          <option value="short"${p.unit==='short'?' selected':''}>Short</option>
          <option value="percent"${p.unit==='percent'?' selected':''}>Percent</option>
          <option value="bytes"${p.unit==='bytes'?' selected':''}>Bytes</option>
          <option value="s"${p.unit==='s'?' selected':''}>Seconds</option>
          <option value="reqps"${p.unit==='reqps'?' selected':''}>Req/s</option>
          <option value="decbytes"${p.unit==='decbytes'?' selected':''}>Dec Bytes</option>
        </select></div>
      </div>
      <div class="field"><label ti="label_promql_query">PromQL Query</label><input value="${esc(p.query)}" onchange="panels[${i}].query=this.value;gen()"></div>
    `;
    list.appendChild(card);
  });
}

function esc(s){return s.replace(/"/g,'&quot;')}

function gen(){
  const title=document.getElementById('dTitle').value;
  const refresh=document.getElementById('dRefresh').value;
  const tags=document.getElementById('dTags').value.split(',').map(t=>t.trim()).filter(Boolean);

  const gridW=12;
  const panelHeight=8;

  const dashboard={
    __inputs:[{name:'DS_PROMETHEUS',label:'Prometheus',type:'datasource',pluginId:'prometheus'}],
    title:title,
    tags:tags,
    timezone:'browser',
    refresh:refresh,
    time:{from:'now-1h',to:'now'},
    panels:panels.map((p,i)=>{
      const col=(i%2)*gridW;
      const row=Math.floor(i/2)*panelHeight;
      const panel={
        id:p.id,
        title:p.title,
        type:p.type,
        gridPos:{h:panelHeight,w:gridW,x:col,y:row},
        datasource:{type:'prometheus',uid:'${DS_PROMETHEUS}'},
        targets:[{expr:p.query,refId:'A'}],
        fieldConfig:{
          defaults:{
            unit:p.unit,
            thresholds:{mode:'absolute',steps:[{color:'green',value:null}]}
          },
          overrides:[]
        }
      };
      return panel;
    }),
    schemaVersion:39,
    version:1
  };

  document.getElementById('output').textContent=JSON.stringify(dashboard,null,2);
}

function loadPreset(name){
  panels=[];nextId=1;
  const presets={
    'node-exporter':[
      {title:'CPU Usage',type:'timeseries',query:'100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)',unit:'percent'},
      {title:'Memory Usage',type:'gauge',query:'(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100',unit:'percent'},
      {title:'Disk Usage',type:'stat',query:'(1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100',unit:'percent'},
      {title:'Network Received',type:'timeseries',query:'rate(node_network_receive_bytes_total{device="eth0"}[5m])',unit:'bytes'},
      {title:'Load Average',type:'timeseries',query:'node_load1',unit:'short'},
      {title:'Uptime',type:'stat',query:'node_time_seconds - node_boot_time_seconds',unit:'s'}
    ],
    docker:[
      {title:'Container CPU',type:'timeseries',query:'rate(container_cpu_usage_seconds_total[5m]) * 100',unit:'percent'},
      {title:'Container Memory',type:'timeseries',query:'container_memory_usage_bytes',unit:'bytes'},
      {title:'Running Containers',type:'stat',query:'count(container_last_seen)',unit:'short'},
      {title:'Network I/O',type:'timeseries',query:'rate(container_network_receive_bytes_total[5m])',unit:'bytes'}
    ],
    nginx:[
      {title:'Requests/sec',type:'timeseries',query:'rate(nginx_http_requests_total[5m])',unit:'reqps'},
      {title:'Active Connections',type:'stat',query:'nginx_connections_active',unit:'short'},
      {title:'5xx Errors',type:'timeseries',query:'rate(nginx_http_requests_total{status=~"5.."}[5m])',unit:'reqps'},
      {title:'Response Time',type:'timeseries',query:'histogram_quantile(0.95, rate(nginx_request_duration_seconds_bucket[5m]))',unit:'s'}
    ],
    kubernetes:[
      {title:'Pod CPU',type:'timeseries',query:'sum(rate(container_cpu_usage_seconds_total{namespace="default"}[5m])) by (pod)',unit:'short'},
      {title:'Pod Memory',type:'timeseries',query:'sum(container_memory_working_set_bytes{namespace="default"}) by (pod)',unit:'bytes'},
      {title:'Pod Restarts',type:'stat',query:'sum(kube_pod_container_status_restarts_total{namespace="default"}) by (pod)',unit:'short'},
      {title:'Node Count',type:'stat',query:'count(kube_node_info)',unit:'short'}
    ],
    api:[
      {title:'Request Rate',type:'timeseries',query:'rate(http_requests_total[5m])',unit:'reqps'},
      {title:'Error Rate',type:'timeseries',query:'rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100',unit:'percent'},
      {title:'P95 Latency',type:'timeseries',query:'histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))',unit:'s'},
      {title:'Availability',type:'stat',query:'(1 - rate(http_requests_total{status=~"5.."}[24h]) / rate(http_requests_total[24h])) * 100',unit:'percent'}
    ]
  };
  const p=presets[name];if(!p)return;
  p.forEach(panel=>addPanel(panel.title,panel.type,panel.query,panel.unit));
}

function copyJSON(){
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>showToast('Copied!'));
}

function downloadJSON(){
  const text=document.getElementById('output').textContent;
  const blob=new Blob([text],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dashboard.json';a.click();
  showToast('Downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

// Init with example
addPanel('Example','timeseries','up','short');
</script>

  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);

  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);

document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});

</script>
