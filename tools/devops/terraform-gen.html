<style>

.preset{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}

<div class="container">
<h1>Terraform Generator</h1>
<p class="sub">Generate HCL configurations visually — AWS, GCP, Azure</p>

<div class="section">
<h3>Provider</h3>

<script>
let provider='aws';
let resource='ec2';

const RESOURCES={
  aws:['ec2','s3','rds','vpc','lambda','cloudfront','iam-role','security-group'],
  gcp:['compute','gcs','cloudsql','vpc','cloud-function','cloud-run'],
  azure:['vm','storage','sql-db','vnet','function-app','app-service']
};

// Provider tabs
document.querySelectorAll('#providerTabs .tab').forEach(tab=>{
  tab.onclick=()=>{
    provider=tab.dataset.p;
    document.querySelectorAll('#providerTabs .tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    updateResourceTabs();
  };
});

function updateResourceTabs(){
  const cont=document.getElementById('resourceTabs');
  cont.innerHTML='';
  const res=RESOURCES[provider]||[];
  res.forEach((r,i)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(i===0?' active':'');
    tab.textContent=r;
    tab.dataset.res=r;
    tab.onclick=()=>{
      resource=r;
      document.querySelectorAll('#resourceTabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      updateFields();gen();
    };
    cont.appendChild(tab);
  });
  resource=res[0]||'';
  updateFields();gen();
}

function updateFields(){
  const panel=document.getElementById('fieldsPanel');
  let html='<div class="section"><h3>Configuration</h3>';

  if(provider==='aws'){
    html+='<div class="field"><label>Region</label><select id="fRegion" onchange="gen()"><option>us-east-1</option><option>us-west-2</option><option>eu-west-1</option><option>ap-northeast-1</option><option>ap-southeast-1</option></select></div>';

    if(resource==='ec2'){
      html+=field('fName','Name','my-instance')+field('fAmi','AMI','ami-0c55b159cbfafe1f0')+
        fieldRow(field('fType','Instance Type','t3.micro'),field('fKeyName','Key Pair','my-key'))+
        '<div class="check-row"><input type="checkbox" id="fPublicIp" checked onchange="gen()"><label for="fPublicIp">Public IP</label></div>'+
        '<div class="field"><label>Tags</label></div><div class="kv-list" id="fTags"></div><button class="add-btn" onclick="addKV(\'fTags\');gen()">+ Tag</button>';
    }else if(resource==='s3'){
      html+=field('fBucket','Bucket Name','my-bucket-name')+
        '<div class="field"><label>ACL</label><select id="fAcl" onchange="gen()"><option value="private">private</option><option value="public-read">public-read</option></select></div>'+
        '<div class="check-row"><input type="checkbox" id="fVersioning" onchange="gen()"><label for="fVersioning">Versioning</label></div>'+
        '<div class="check-row"><input type="checkbox" id="fWebsite" onchange="gen()"><label for="fWebsite">Static Website Hosting</label></div>';
    }else if(resource==='rds'){
      html+=field('fIdentifier','DB Identifier','my-db')+field('fEngine','Engine','postgres')+field('fEngineVer','Engine Version','16.1')+
        fieldRow(field('fDbClass','Instance Class','db.t3.micro'),field('fStorage','Storage (GB)','20'))+
        fieldRow(field('fDbName','Database Name','mydb'),field('fDbUser','Username','admin'))+
        '<div class="check-row"><input type="checkbox" id="fMultiAz" onchange="gen()"><label for="fMultiAz">Multi-AZ</label></div>'+
        '<div class="check-row"><input type="checkbox" id="fPublicDb" onchange="gen()"><label for="fPublicDb">Publicly Accessible</label></div>';
    }else if(resource==='vpc'){
      html+=field('fVpcCidr','CIDR Block','10.0.0.0/16')+field('fVpcName','Name','my-vpc')+
        '<div class="check-row"><input type="checkbox" id="fDnsSupport" checked onchange="gen()"><label for="fDnsSupport">DNS Support</label></div>'+
        '<div class="check-row"><input type="checkbox" id="fDnsHostnames" checked onchange="gen()"><label for="fDnsHostnames">DNS Hostnames</label></div>';
    }else if(resource==='lambda'){
      html+=field('fFuncName','Function Name','my-function')+field('fRuntime','Runtime','nodejs20.x')+
        field('fHandler','Handler','index.handler')+field('fMemory','Memory (MB)','128')+field('fTimeout','Timeout (s)','30');
    }else if(resource==='cloudfront'){
      html+=field('fOrigin','Origin Domain','my-bucket.s3.amazonaws.com')+field('fOriginId','Origin ID','S3Origin')+
        '<div class="check-row"><input type="checkbox" id="fHttpsOnly" checked onchange="gen()"><label for="fHttpsOnly">HTTPS Only</label></div>';
    }else if(resource==='iam-role'){
      html+=field('fRoleName','Role Name','my-role')+
        '<div class="field"><label>Assume Role Service</label><select id="fAssumeService" onchange="gen()"><option>ec2.amazonaws.com</option><option>lambda.amazonaws.com</option><option>ecs-tasks.amazonaws.com</option></select></div>';
    }else if(resource==='security-group'){
      html+=field('fSgName','Name','my-sg')+field('fSgDesc','Description','Security group')+
        fieldRow(field('fIngressPort','Ingress Port','80'),field('fIngressCidr','Ingress CIDR','0.0.0.0/0'));
    }
  }else if(provider==='gcp'){
    html+='<div class="field"><label>Project</label><input id="fProject" value="my-project" oninput="gen()"></div>'+
      '<div class="field"><label>Region</label><select id="fRegion" onchange="gen()"><option>us-central1</option><option>us-east1</option><option>europe-west1</option><option>asia-northeast1</option></select></div>';

    if(resource==='compute'){
      html+=field('fName','Name','my-vm')+field('fMachineType','Machine Type','e2-micro')+field('fImage','Image','debian-cloud/debian-12')+field('fZone','Zone','us-central1-a');
    }else if(resource==='gcs'){
      html+=field('fBucket','Bucket Name','my-bucket')+field('fLocation','Location','US')+
        '<div class="field"><label>Storage Class</label><select id="fStorageClass" onchange="gen()"><option>STANDARD</option><option>NEARLINE</option><option>COLDLINE</option></select></div>';
    }else if(resource==='cloudsql'){
      html+=field('fName','Name','my-db')+field('fDbVersion','Version','POSTGRES_16')+field('fTier','Tier','db-f1-micro');
    }else if(resource==='vpc'){
      html+=field('fName','Name','my-vpc')+field('fSubnetCidr','Subnet CIDR','10.0.0.0/24')+field('fSubnetRegion','Subnet Region','us-central1');
    }else if(resource==='cloud-function'){
      html+=field('fName','Name','my-function')+field('fRuntime','Runtime','nodejs20')+field('fEntry','Entry Point','helloWorld')+field('fMemory','Memory (MB)','256');
    }else if(resource==='cloud-run'){
      html+=field('fName','Name','my-service')+field('fImage','Image','gcr.io/my-project/my-image')+field('fPort','Port','8080');
    }
  }else if(provider==='azure'){
    html+='<div class="field"><label>Location</label><select id="fLocation" onchange="gen()"><option>eastus</option><option>westus2</option><option>westeurope</option><option>japaneast</option></select></div>'+
      field('fRgName','Resource Group','my-rg');

    if(resource==='vm'){
      html+=field('fName','Name','my-vm')+field('fVmSize','Size','Standard_B1s')+field('fAdminUser','Admin Username','azureuser');
    }else if(resource==='storage'){
      html+=field('fName','Name','mystorageaccount')+
        '<div class="field"><label>Account Tier</label><select id="fTier" onchange="gen()"><option>Standard</option><option>Premium</option></select></div>';
    }else if(resource==='sql-db'){
      html+=field('fServerName','Server Name','my-sqlserver')+field('fDbName','Database Name','mydb')+field('fAdminUser','Admin Login','sqladmin');
    }else if(resource==='vnet'){
      html+=field('fName','Name','my-vnet')+field('fAddrSpace','Address Space','10.0.0.0/16')+field('fSubnetPrefix','Subnet Prefix','10.0.1.0/24');
    }else if(resource==='function-app'){
      html+=field('fName','Name','my-func-app')+field('fRuntime','Runtime','node')+field('fRuntimeVer','Runtime Version','~20');
    }else if(resource==='app-service'){
      html+=field('fName','Name','my-web-app')+
        '<div class="field"><label>SKU</label><select id="fSku" onchange="gen()"><option>F1</option><option>B1</option><option>S1</option><option>P1v2</option></select></div>';
    }
  }

  html+='</div>';
  panel.innerHTML=html;
  gen();
}

function field(id,label,val){
  return `<div class="field"><label>${label}</label><input id="${id}" value="${val}" oninput="gen()"></div>`;
}
function fieldRow(a,b){return `<div class="field-row">${a}${b}</div>`}

function addKV(listId,k,v){
  const list=document.getElementById(listId);
  if(!list)return;
  const row=document.createElement('div');
  row.className='kv-row';
  row.innerHTML=`<input placeholder="key" value="${k||''}" oninput="gen()"><input placeholder="value" value="${v||''}" oninput="gen()"><button onclick="this.parentElement.remove();gen()">×</button>`;
  list.appendChild(row);
}

function getKVs(listId){
  const list=document.getElementById(listId);
  if(!list)return[];
  return Array.from(list.querySelectorAll('.kv-row')).map(r=>{
    const inputs=r.querySelectorAll('input');
    return{key:inputs[0].value,value:inputs[1].value};
  }).filter(kv=>kv.key);
}

function v(id){const el=document.getElementById(id);return el?el.value:'';}
function ch(id){const el=document.getElementById(id);return el?el.checked:false;}

function gen(){
  let hcl='';
  const region=v('fRegion')||v('fLocation')||'us-east-1';

  if(provider==='aws'){
    hcl+=`terraform {\n  required_providers {\n    aws = {\n      source  = "hashicorp/aws"\n      version = "~> 5.0"\n    }\n  }\n}\n\nprovider "aws" {\n  region = "${region}"\n}\n\n`;

    if(resource==='ec2'){
      const tags=getKVs('fTags');
      hcl+=`resource "aws_instance" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  ami           = "${v('fAmi')}"\n  instance_type = "${v('fType')}"\n  key_name      = "${v('fKeyName')}"\n\n  associate_public_ip_address = ${ch('fPublicIp')}\n`;
      if(tags.length){
        hcl+='\n  tags = {\n';
        tags.forEach(t=>hcl+=`    ${t.key} = "${t.value}"\n`);
        hcl+='  }\n';
      }
      hcl+='}\n';
    }else if(resource==='s3'){
      const name=v('fBucket');
      hcl+=`resource "aws_s3_bucket" "${name.replace(/[^a-z0-9_]/g,'_')}" {\n  bucket = "${name}"\n}\n`;
      if(ch('fVersioning')){
        hcl+=`\nresource "aws_s3_bucket_versioning" "${name.replace(/[^a-z0-9_]/g,'_')}" {\n  bucket = aws_s3_bucket.${name.replace(/[^a-z0-9_]/g,'_')}.id\n  versioning_configuration {\n    status = "Enabled"\n  }\n}\n`;
      }
      if(ch('fWebsite')){
        hcl+=`\nresource "aws_s3_bucket_website_configuration" "${name.replace(/[^a-z0-9_]/g,'_')}" {\n  bucket = aws_s3_bucket.${name.replace(/[^a-z0-9_]/g,'_')}.id\n  index_document {\n    suffix = "index.html"\n  }\n  error_document {\n    key = "error.html"\n  }\n}\n`;
      }
    }else if(resource==='rds'){
      hcl+=`resource "aws_db_instance" "${v('fIdentifier').replace(/[^a-z0-9_]/g,'_')}" {\n  identifier        = "${v('fIdentifier')}"\n  engine            = "${v('fEngine')}"\n  engine_version    = "${v('fEngineVer')}"\n  instance_class    = "${v('fDbClass')}"\n  allocated_storage = ${v('fStorage')}\n  db_name           = "${v('fDbName')}"\n  username          = "${v('fDbUser')}"\n  password          = var.db_password\n  multi_az          = ${ch('fMultiAz')}\n  publicly_accessible = ${ch('fPublicDb')}\n\n  skip_final_snapshot = true\n}\n\nvariable "db_password" {\n  type      = string\n  sensitive = true\n}\n`;
    }else if(resource==='vpc'){
      hcl+=`resource "aws_vpc" "${v('fVpcName').replace(/[^a-z0-9_]/g,'_')}" {\n  cidr_block           = "${v('fVpcCidr')}"\n  enable_dns_support   = ${ch('fDnsSupport')}\n  enable_dns_hostnames = ${ch('fDnsHostnames')}\n\n  tags = {\n    Name = "${v('fVpcName')}"\n  }\n}\n`;
    }else if(resource==='lambda'){
      hcl+=`resource "aws_lambda_function" "${v('fFuncName').replace(/[^a-z0-9_]/g,'_')}" {\n  function_name = "${v('fFuncName')}"\n  runtime       = "${v('fRuntime')}"\n  handler       = "${v('fHandler')}"\n  memory_size   = ${v('fMemory')}\n  timeout       = ${v('fTimeout')}\n\n  filename         = "function.zip"\n  source_code_hash = filebase64sha256("function.zip")\n\n  role = aws_iam_role.lambda_role.arn\n}\n`;
    }else if(resource==='cloudfront'){
      hcl+=`resource "aws_cloudfront_distribution" "cdn" {\n  enabled = true\n\n  origin {\n    domain_name = "${v('fOrigin')}"\n    origin_id   = "${v('fOriginId')}"\n  }\n\n  default_cache_behavior {\n    allowed_methods  = ["GET", "HEAD"]\n    cached_methods   = ["GET", "HEAD"]\n    target_origin_id = "${v('fOriginId')}"\n    viewer_protocol_policy = "${ch('fHttpsOnly')?'redirect-to-https':'allow-all'}"\n\n    forwarded_values {\n      query_string = false\n      cookies { forward = "none" }\n    }\n  }\n\n  restrictions {\n    geo_restriction { restriction_type = "none" }\n  }\n\n  viewer_certificate {\n    cloudfront_default_certificate = true\n  }\n}\n`;
    }else if(resource==='iam-role'){
      hcl+=`resource "aws_iam_role" "${v('fRoleName').replace(/[^a-z0-9_]/g,'_')}" {\n  name = "${v('fRoleName')}"\n\n  assume_role_policy = jsonencode({\n    Version = "2012-10-17"\n    Statement = [{\n      Action = "sts:AssumeRole"\n      Effect = "Allow"\n      Principal = {\n        Service = "${v('fAssumeService')}"\n      }\n    }]\n  })\n}\n`;
    }else if(resource==='security-group'){
      hcl+=`resource "aws_security_group" "${v('fSgName').replace(/[^a-z0-9_]/g,'_')}" {\n  name        = "${v('fSgName')}"\n  description = "${v('fSgDesc')}"\n\n  ingress {\n    from_port   = ${v('fIngressPort')}\n    to_port     = ${v('fIngressPort')}\n    protocol    = "tcp"\n    cidr_blocks = ["${v('fIngressCidr')}"]\n  }\n\n  egress {\n    from_port   = 0\n    to_port     = 0\n    protocol    = "-1"\n    cidr_blocks = ["0.0.0.0/0"]\n  }\n}\n`;
    }
  }else if(provider==='gcp'){
    hcl+=`terraform {\n  required_providers {\n    google = {\n      source  = "hashicorp/google"\n      version = "~> 5.0"\n    }\n  }\n}\n\nprovider "google" {\n  project = "${v('fProject')}"\n  region  = "${region}"\n}\n\n`;

    if(resource==='compute'){
      hcl+=`resource "google_compute_instance" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name         = "${v('fName')}"\n  machine_type = "${v('fMachineType')}"\n  zone         = "${v('fZone')}"\n\n  boot_disk {\n    initialize_params {\n      image = "${v('fImage')}"\n    }\n  }\n\n  network_interface {\n    network = "default"\n    access_config {}\n  }\n}\n`;
    }else if(resource==='gcs'){
      hcl+=`resource "google_storage_bucket" "${v('fBucket').replace(/[^a-z0-9_]/g,'_')}" {\n  name          = "${v('fBucket')}"\n  location      = "${v('fLocation')}"\n  storage_class = "${v('fStorageClass')}"\n\n  uniform_bucket_level_access = true\n}\n`;
    }else if(resource==='cloudsql'){
      hcl+=`resource "google_sql_database_instance" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name             = "${v('fName')}"\n  database_version = "${v('fDbVersion')}"\n  region           = "${region}"\n\n  settings {\n    tier = "${v('fTier')}"\n  }\n\n  deletion_protection = false\n}\n`;
    }else if(resource==='vpc'){
      hcl+=`resource "google_compute_network" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                    = "${v('fName')}"\n  auto_create_subnetworks = false\n}\n\nresource "google_compute_subnetwork" "${v('fName').replace(/[^a-z0-9_]/g,'_')}_subnet" {\n  name          = "${v('fName')}-subnet"\n  ip_cidr_range = "${v('fSubnetCidr')}"\n  region        = "${v('fSubnetRegion')}"\n  network       = google_compute_network.${v('fName').replace(/[^a-z0-9_]/g,'_')}.id\n}\n`;
    }else if(resource==='cloud-function'){
      hcl+=`resource "google_cloudfunctions_function" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name        = "${v('fName')}"\n  runtime     = "${v('fRuntime')}"\n  entry_point = "${v('fEntry')}"\n  available_memory_mb = ${v('fMemory')}\n\n  trigger_http = true\n\n  source_archive_bucket = "my-source-bucket"\n  source_archive_object = "function-source.zip"\n}\n`;
    }else if(resource==='cloud-run'){
      hcl+=`resource "google_cloud_run_service" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name     = "${v('fName')}"\n  location = "${region}"\n\n  template {\n    spec {\n      containers {\n        image = "${v('fImage')}"\n        ports {\n          container_port = ${v('fPort')}\n        }\n      }\n    }\n  }\n\n  traffic {\n    percent         = 100\n    latest_revision = true\n  }\n}\n`;
    }
  }else if(provider==='azure'){
    const loc=v('fLocation');
    hcl+=`terraform {\n  required_providers {\n    azurerm = {\n      source  = "hashicorp/azurerm"\n      version = "~> 3.0"\n    }\n  }\n}\n\nprovider "azurerm" {\n  features {}\n}\n\nresource "azurerm_resource_group" "rg" {\n  name     = "${v('fRgName')}"\n  location = "${loc}"\n}\n\n`;

    if(resource==='vm'){
      hcl+=`resource "azurerm_linux_virtual_machine" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                = "${v('fName')}"\n  resource_group_name = azurerm_resource_group.rg.name\n  location            = azurerm_resource_group.rg.location\n  size                = "${v('fVmSize')}"\n  admin_username      = "${v('fAdminUser')}"\n\n  admin_ssh_key {\n    username   = "${v('fAdminUser')}"\n    public_key = file("~/.ssh/id_rsa.pub")\n  }\n\n  os_disk {\n    caching              = "ReadWrite"\n    storage_account_type = "Standard_LRS"\n  }\n\n  source_image_reference {\n    publisher = "Canonical"\n    offer     = "0001-com-ubuntu-server-jammy"\n    sku       = "22_04-lts"\n    version   = "latest"\n  }\n\n  network_interface_ids = []\n}\n`;
    }else if(resource==='storage'){
      hcl+=`resource "azurerm_storage_account" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                     = "${v('fName')}"\n  resource_group_name      = azurerm_resource_group.rg.name\n  location                 = azurerm_resource_group.rg.location\n  account_tier             = "${v('fTier')}"\n  account_replication_type = "LRS"\n}\n`;
    }else if(resource==='sql-db'){
      hcl+=`resource "azurerm_mssql_server" "${v('fServerName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                         = "${v('fServerName')}"\n  resource_group_name          = azurerm_resource_group.rg.name\n  location                     = azurerm_resource_group.rg.location\n  version                      = "12.0"\n  administrator_login          = "${v('fAdminUser')}"\n  administrator_login_password = var.sql_password\n}\n\nresource "azurerm_mssql_database" "${v('fDbName').replace(/[^a-z0-9_]/g,'_')}" {\n  name      = "${v('fDbName')}"\n  server_id = azurerm_mssql_server.${v('fServerName').replace(/[^a-z0-9_]/g,'_')}.id\n  sku_name  = "S0"\n}\n\nvariable "sql_password" {\n  type      = string\n  sensitive = true\n}\n`;
    }else if(resource==='vnet'){
      hcl+=`resource "azurerm_virtual_network" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                = "${v('fName')}"\n  resource_group_name = azurerm_resource_group.rg.name\n  location            = azurerm_resource_group.rg.location\n  address_space       = ["${v('fAddrSpace')}"]\n\n  subnet {\n    name           = "default"\n    address_prefix = "${v('fSubnetPrefix')}"\n  }\n}\n`;
    }else if(resource==='function-app'){
      hcl+=`resource "azurerm_service_plan" "plan" {\n  name                = "${v('fName')}-plan"\n  resource_group_name = azurerm_resource_group.rg.name\n  location            = azurerm_resource_group.rg.location\n  os_type             = "Linux"\n  sku_name            = "Y1"\n}\n\nresource "azurerm_linux_function_app" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                = "${v('fName')}"\n  resource_group_name = azurerm_resource_group.rg.name\n  location            = azurerm_resource_group.rg.location\n  service_plan_id     = azurerm_service_plan.plan.id\n\n  site_config {\n    application_stack {\n      ${v('fRuntime')}_version = "${v('fRuntimeVer')}"\n    }\n  }\n\n  storage_account_name       = "STORAGE_ACCOUNT_NAME"\n  storage_account_access_key = "STORAGE_ACCESS_KEY"\n}\n`;
    }else if(resource==='app-service'){
      hcl+=`resource "azurerm_service_plan" "plan" {\n  name                = "${v('fName')}-plan"\n  resource_group_name = azurerm_resource_group.rg.name\n  location            = azurerm_resource_group.rg.location\n  os_type             = "Linux"\n  sku_name            = "${v('fSku')}"\n}\n\nresource "azurerm_linux_web_app" "${v('fName').replace(/[^a-z0-9_]/g,'_')}" {\n  name                = "${v('fName')}"\n  resource_group_name = azurerm_resource_group.rg.name\n  location            = azurerm_resource_group.rg.location\n  service_plan_id     = azurerm_service_plan.plan.id\n\n  site_config {}\n}\n`;
    }
  }

  document.getElementById('output').textContent=hcl;
}

function loadPreset(name){
  if(name==='web-server'){
    provider='aws';resource='ec2';
    document.querySelectorAll('#providerTabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.p==='aws'));
    updateResourceTabs();
    setTimeout(()=>{
      document.getElementById('fName').value='web-server';
      document.getElementById('fType').value='t3.small';
      gen();
    },50);
  }else if(name==='static-site'){
    provider='aws';resource='s3';
    document.querySelectorAll('#providerTabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.p==='aws'));
    updateResourceTabs();
    setTimeout(()=>{
      const tabs=document.querySelectorAll('#resourceTabs .tab');
      tabs.forEach(t=>{if(t.dataset.res==='s3'){t.click()}});
    },50);
  }else if(name==='api-backend'){
    provider='aws';resource='rds';
    document.querySelectorAll('#providerTabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.p==='aws'));
    updateResourceTabs();
    setTimeout(()=>{
      const tabs=document.querySelectorAll('#resourceTabs .tab');
      tabs.forEach(t=>{if(t.dataset.res==='rds'){t.click()}});
    },50);
  }else if(name==='serverless'){
    provider='aws';resource='lambda';
    document.querySelectorAll('#providerTabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.p==='aws'));
    updateResourceTabs();
    setTimeout(()=>{
      const tabs=document.querySelectorAll('#resourceTabs .tab');
      tabs.forEach(t=>{if(t.dataset.res==='lambda'){t.click()}});
    },50);
  }
}

function copyHCL(){
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>showToast('Copied!'));
}

function downloadHCL(){
  const text=document.getElementById('output').textContent;
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='main.tf';a.click();
  showToast('Downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

// Init
updateResourceTabs();
</script>
