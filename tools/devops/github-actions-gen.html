"Deploy step (placeholder)", "部署步骤（占位符）"],'footer_dev_vault':["Dev Vault", "开发者宝库"],'link_dev_vault':["Dev Vault", "开发者宝库"],'link_dependabot_config':["Dependabot Config", "Dependabot 配置"],'link_docker_compose':["Docker Compose", "Docker Compose"],'link_github_profile':["GitHub Profile", "GitHub个人资料"]};

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const LANG_CONFIG={
  node:{setup:'actions/setup-node@v4',versionKey:'node-version',install:'npm ci',lint:'npm run lint',test:'npm test',build:'npm run build',cache:'node_modules',cacheKey:'npm',hashFile:'**/package-lock.json'},
  python:{setup:'actions/setup-python@v5',versionKey:'python-version',install:'pip install -r requirements.txt',lint:'flake8 .',test:'pytest',build:'python setup.py build',cache:'~/.cache/pip',cacheKey:'pip',hashFile:'**/requirements.txt'},
  go:{setup:'actions/setup-go@v5',versionKey:'go-version',install:'go mod download',lint:'golangci-lint run',test:'go test ./...',build:'go build -v ./...',cache:'~/go/pkg/mod',cacheKey:'go',hashFile:'**/go.sum'},
  rust:{setup:'dtolnay/rust-toolchain@stable',versionKey:'toolchain',install:'',lint:'cargo clippy -- -D warnings',test:'cargo test',build:'cargo build --release',cache:'~/.cargo/registry',cacheKey:'cargo',hashFile:'**/Cargo.lock'}
};

function v(id){return document.getElementById(id).value}
function ch(id){return document.getElementById(id).checked}

document.getElementById('tSchedule').addEventListener('change',()=>{
  document.getElementById('fCron').style.display=ch('tSchedule')?'block':'none';
});

function toggleMatrix(){
  document.getElementById('fMatrix').style.display=ch('jMatrixEnable')?'block':'none';
  gen();
}

function gen(){
  const name=v('wName');
  const lang=v('jLang');
  const lc=LANG_CONFIG[lang]||{};
  const runner=v('jRunner');
  const version=v('jVersion');
  const branches=v('tBranches').split(',').map(b=>b.trim()).filter(Boolean);
  const matrixEnabled=ch('jMatrixEnable');
  const matrixVersions=v('jMatrix').split(',').map(b=>b.trim()).filter(Boolean);

  let y=`name: ${name}\n\non:\n`;

  // Triggers
  if(ch('tPush')){
    y+=`  push:\n    branches: [${branches.map(b=>`"${b}"`).join(', ')}]\n`;
  }
  if(ch('tPR')){
    y+=`  pull_request:\n    branches: [${branches.map(b=>`"${b}"`).join(', ')}]\n`;
  }
  if(ch('tManual'))y+=`  workflow_dispatch:\n`;
  if(ch('tSchedule'))y+=`  schedule:\n    - cron: "${v('tCron')}"\n`;

  // Jobs
  y+=`\njobs:\n  build:\n    runs-on: ${runner}\n`;

  if(matrixEnabled&&matrixVersions.length>1&&lang!=='none'){
    y+=`    strategy:\n      matrix:\n        ${lc.versionKey||'version'}: [${matrixVersions.map(v=>`"${v}"`).join(', ')}]\n`;
  }

  y+=`    steps:\n`;

  // Steps
  if(ch('sCheckout')){
    y+=`      - uses: actions/checkout@v4\n`;
  }

  if(ch('sSetup')&&lang!=='none'&&lc.setup){
    y+=`\n      - name: Set up ${lang}\n        uses: ${lc.setup}\n`;
    if(lang!=='rust'){
      const ver=matrixEnabled&&matrixVersions.length>1?`\${{ matrix.${lc.versionKey} }}`:version;
      y+=`        with:\n          ${lc.versionKey}: "${ver}"\n`;
    }
  }

  if(ch('sCache')&&lang!=='none'&&lc.cache){
    y+=`\n      - name: Cache dependencies\n        uses: actions/cache@v4\n        with:\n          path: ${lc.cache}\n          key: \${{ runner.os }}-${lc.cacheKey}-\${{ hashFiles('${lc.hashFile}') }}\n          restore-keys: |\n            \${{ runner.os }}-${lc.cacheKey}-\n`;
  }

  if(ch('sInstall')&&lc.install){
    y+=`\n      - name: Install dependencies\n        run: ${lc.install}\n`;
  }

  if(ch('sLint')&&lc.lint){
    y+=`\n      - name: Lint\n        run: ${lc.lint}\n`;
  }

  if(ch('sTest')&&lc.test){
    y+=`\n      - name: Test\n        run: ${lc.test}\n`;
  }

  if(ch('sBuild')&&lc.build){
    y+=`\n      - name: Build\n        run: ${lc.build}\n`;
  }

  if(ch('sDocker')){
    y+=`\n      - name: Log in to Docker Hub\n        uses: docker/login-action@v3\n        with:\n          username: \${{ secrets.DOCKER_USERNAME }}\n          password: \${{ secrets.DOCKER_PASSWORD }}\n`;
    y+=`\n      - name: Build and push Docker image\n        uses: docker/build-push-action@v5\n        with:\n          push: true\n          tags: \${{ secrets.DOCKER_USERNAME }}/\${{ github.event.repository.name }}:latest\n`;
  }

  if(ch('sDeploy')){
    y+=`\n      - name: Deploy\n        run: echo "Add your deploy commands here"\n        env:\n          DEPLOY_TOKEN: \${{ secrets.DEPLOY_TOKEN }}\n`;
  }

  document.getElementById('output').textContent=y;
}

// Presets
function loadPreset(name){
  const presets={
    node:{name:'CI',lang:'node',version:'20',push:true,pr:true,manual:false,schedule:false,checkout:true,setup:true,install:true,lint:true,test:true,build:false,cache:true,docker:false,deploy:false},
    python:{name:'Python CI',lang:'python',version:'3.12',push:true,pr:true,manual:false,schedule:false,checkout:true,setup:true,install:true,lint:true,test:true,build:false,cache:true,docker:false,deploy:false},
    go:{name:'Go CI',lang:'go',version:'1.22',push:true,pr:true,manual:false,schedule:false,checkout:true,setup:true,install:true,lint:true,test:true,build:true,cache:true,docker:false,deploy:false},
    rust:{name:'Rust CI',lang:'rust',version:'stable',push:true,pr:true,manual:false,schedule:false,checkout:true,setup:true,install:false,lint:true,test:true,build:true,cache:true,docker:false,deploy:false},
    docker:{name:'Docker Build',lang:'none',version:'',push:true,pr:false,manual:true,schedule:false,checkout:true,setup:false,install:false,lint:false,test:false,build:false,cache:false,docker:true,deploy:false},
    static:{name:'Deploy Static Site',lang:'node',version:'20',push:true,pr:false,manual:false,schedule:false,checkout:true,setup:true,install:true,lint:false,test:false,build:true,cache:true,docker:false,deploy:true},
    release:{name:'Release',lang:'node',version:'20',push:true,pr:false,manual:true,schedule:false,checkout:true,setup:true,install:true,lint:true,test:true,build:true,cache:true,docker:false,deploy:false},
    lint:{name:'Lint',lang:'node',version:'20',push:true,pr:true,manual:false,schedule:false,checkout:true,setup:true,install:true,lint:true,test:false,build:false,cache:true,docker:false,deploy:false}
  };
  const p=presets[name];if(!p)return;

  document.getElementById('wName').value=p.name;
  document.getElementById('jLang').value=p.lang;
  document.getElementById('jVersion').value=p.version;
  document.getElementById('tPush').checked=p.push;
  document.getElementById('tPR').checked=p.pr;
  document.getElementById('tManual').checked=p.manual;
  document.getElementById('tSchedule').checked=p.schedule;
  document.getElementById('sCheckout').checked=p.checkout;
  document.getElementById('sSetup').checked=p.setup;
  document.getElementById('sInstall').checked=p.install;
  document.getElementById('sLint').checked=p.lint;
  document.getElementById('sTest').checked=p.test;
  document.getElementById('sBuild').checked=p.build;
  document.getElementById('sCache').checked=p.cache;
  document.getElementById('sDocker').checked=p.docker;
  document.getElementById('sDeploy').checked=p.deploy;

  document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.preset[onclick="loadPreset('${name}')"]`).classList.add('active');
  gen();
}

function copyYaml(){
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>showToast('Copied!'));
}

function downloadYaml(){
  const text=document.getElementById('output').textContent;
  const blob=new Blob([text],{type:'text/yaml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=v('wFile')||'ci.yml';a.click();
  showToast('Downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}

// Init
gen();
</script>

document.documentElement.lang=L;

document.querySelectorAll('[ti]').forEach(function(e){

  e.textContent=T(k);

  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;

</script>
