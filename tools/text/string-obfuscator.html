<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Obfuscator</title>
<meta name="description" content="Obfuscate text using various encodings: Base64, Hex, ROT13, Reversed, Binary, Atbash cipher.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:#3b82f6}
.result-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px;font-family:monospace;font-size:0.85rem;color:#e6e6e6;word-break:break-all;min-height:40px;margin-bottom:10px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px}
</style>
</head>
<body>
<div class="container">
  <h1>String Obfuscator</h1>
  <p class="desc">Transform text using various encoding and obfuscation methods</p>
  <div class="card">
    <label>Input text</label>
    <input type="text" id="inputText" value="Hello World 123!" spellcheck="false">
    <label>Method</label>
    <select id="method">
      <option value="base64">Base64</option>
      <option value="hex">Hex</option>
      <option value="rot13">ROT13</option>
      <option value="reverse">Reverse</option>
      <option value="binary">Binary</option>
      <option value="atbash">Atbash cipher</option>
    </select>
    <label>Result</label>
    <div class="result-box" id="output"></div>
    <div class="flex-center">
      <button id="copyBtn">Copy</button>
    </div>
  </div>
</div>
<script>
const atbashMap = {};
'abcdefghijklmnopqrstuvwxyz'.split('').forEach((c, i, a) => {
  atbashMap[c] = a[a.length - 1 - i];
  atbashMap[c.toUpperCase()] = a[a.length - 1 - i].toUpperCase();
});

function obfuscate(text, method) {
  switch(method) {
    case 'base64': return btoa(text);
    case 'hex': return Array.from(new TextEncoder().encode(text)).map(b => b.toString(16).padStart(2, '0')).join(' ');
    case 'rot13': return text.replace(/[a-zA-Z]/g, c => String.fromCharCode(c.charCodeAt(0) + (c <= 'Z' ? (c <= 'M' ? 13 : -13) : (c <= 'm' ? 13 : -13))));
    case 'reverse': return text.split('').reverse().join('');
    case 'binary': return Array.from(new TextEncoder().encode(text)).map(b => b.toString(2).padStart(8, '0')).join(' ');
    case 'atbash': return text.split('').map(c => atbashMap[c] || c).join('');
    default: return text;
  }
}

function update() {
  const text = document.getElementById('inputText').value;
  const method = document.getElementById('method').value;
  document.getElementById('output').textContent = obfuscate(text, method);
}

document.getElementById('inputText').addEventListener('input', update);
document.getElementById('method').addEventListener('change', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
});
update();
</script>
</body>
</html>
