<!DOCTYPE html>
<html tk="title_string_obfuscator" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Obfuscator</title>
<meta name="description" content="Obfuscate text using various encodings: Base64, Hex, ROT13, Reversed, Binary, Atbash cipher.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:#3b82f6}
.result-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px;font-family:monospace;font-size:0.85rem;color:#e6e6e6;word-break:break-all;min-height:40px;margin-bottom:10px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_string_obfuscator" ti="h1_string_obfuscator">String Obfuscator</h1>
  <p class="desc" ti="subtitle_transform_text_using_vari">Transform text using various encoding and obfuscation methods</p>
  <div class="card">
    <label ti="label_input_text">Input text</label>
    <input type="text" id="inputText" value="Hello World 123!" spellcheck="false">
    <label ti="label_method">Method</label>
    <select id="method">
      <option value="base64">Base64</option>
      <option value="hex">Hex</option>
      <option value="rot13">ROT13</option>
      <option value="reverse">Reverse</option>
      <option value="binary">Binary</option>
      <option value="atbash">Atbash cipher</option>
    </select>
    <label ti="label_result">Result</label>
    <div class="result-box" id="output"></div>
    <div class="flex-center">
      <button id="copyBtn" ti="btn_copy">Copy</button>
    </div>
  </div>
</div>

<script>var _LANG={'title_string_obfuscator':["String Obfuscator", "字符串混淆器"],'metadesc_obfuscate_text_using_vari':["Obfuscate text using various encodings: Base64, Hex, ROT13, Reversed, Binary, Atbash cipher.", "使用各种编码对文本进行混淆：Base64、十六进制、ROT13、反向编码、二进制编码、Atbash 密码。"],'h1_string_obfuscator':["String Obfuscator", "字符串混淆器"],'subtitle_transform_text_using_vari':["Transform text using various encoding and obfuscation methods", "使用各种编码和混淆方法转换文本"],'btn_copy':["Copy", "复制"],'label_input_text':["Input text", "输入文本"],'label_method':["Method", "方法"],'label_result':["Result", "结果"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const atbashMap = {};
'abcdefghijklmnopqrstuvwxyz'.split('').forEach((c, i, a) => {
  atbashMap[c] = a[a.length - 1 - i];
  atbashMap[c.toUpperCase()] = a[a.length - 1 - i].toUpperCase();
});

function obfuscate(text, method) {
  switch(method) {
    case 'base64': return btoa(text);
    case 'hex': return Array.from(new TextEncoder().encode(text)).map(b => b.toString(16).padStart(2, '0')).join(' ');
    case 'rot13': return text.replace(/[a-zA-Z]/g, c => String.fromCharCode(c.charCodeAt(0) + (c <= 'Z' ? (c <= 'M' ? 13 : -13) : (c <= 'm' ? 13 : -13))));
    case 'reverse': return text.split('').reverse().join('');
    case 'binary': return Array.from(new TextEncoder().encode(text)).map(b => b.toString(2).padStart(8, '0')).join(' ');
    case 'atbash': return text.split('').map(c => atbashMap[c] || c).join('');
    default: return text;
  }
}

function update() {
  const text = document.getElementById('inputText').value;
  const method = document.getElementById('method').value;
  document.getElementById('output').textContent = obfuscate(text, method);
}

document.getElementById('inputText').addEventListener('input', update);
document.getElementById('method').addEventListener('change', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
});
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
