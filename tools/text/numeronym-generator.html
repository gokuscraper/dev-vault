<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numeronym Generator</title>
<meta name="description" content="Generate numeronyms (i18n-style abbreviations) from words and phrases. e.g. 'internationalization' → 'i18n'.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none}
input:focus,textarea:focus{border-color:#3b82f6}
textarea{font-family:monospace;resize:vertical;min-height:80px}
.result-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px;font-family:monospace;font-size:0.9rem;color:#4da6ff;word-break:break-all;min-height:40px;margin:10px 0}
.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.row label{margin:0;min-width:80px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px}
</style>
</head>
<body>
<div class="container">
  <h1>Numeronym Generator</h1>
  <p class="desc">Generate i18n-style numeronyms — e.g. 'internationalization' → 'i18n'</p>
  <div class="card">
    <label>Input (one word per line)</label>
    <textarea id="inputWords" rows="5" spellcheck="false">internationalization
accessibility
localization
Hello World
Dev Toolkit
number of words</textarea>
    <div class="result-box" id="output"></div>
    <div class="flex-center">
      <button id="copyBtn">Copy</button>
    </div>
  </div>
</div>
<script>
function toNumeronym(word) {
  const w = word.trim();
  if (w.length <= 2) return w;
  return w[0] + (w.length - 2) + w[w.length - 1];
}

function numeronymLine(line) {
  return line.split(/\s+/).map(w => {
    if (!w) return '';
    // Keep punctuation at end
    const m = w.match(/^([a-zA-Z]+)([^a-zA-Z]*)$/);
    if (m) return toNumeronym(m[1]) + m[2];
    return toNumeronym(w);
  }).join(' ');
}

function update() {
  const text = document.getElementById('inputWords').value;
  document.getElementById('output').textContent = text.split('\n').map(numeronymLine).join('\n');
}

document.getElementById('inputWords').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
});
update();
</script>
</body>
</html>
