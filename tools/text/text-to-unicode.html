<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Unicode Converter</title>
<meta name="description" content="Convert text to Unicode code points. Shows decimal, hex, binary, HTML entities, and Unicode character names.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:680px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;resize:vertical;min-height:60px;font-family:monospace;margin-bottom:12px}
textarea:focus{border-color:#3b82f6}
table{width:100%;border-collapse:collapse;font-size:0.85rem;margin-bottom:8px}
th{color:#888;font-weight:600;text-align:left;padding:6px 8px;border-bottom:1px solid #333;font-size:0.8rem}
td{padding:6px 8px;border-bottom:1px solid #1a1a1a;font-family:monospace}
td:first-child{font-size:1.3rem;text-align:center;width:40px}
tr:hover td{background:#0d1520}
.hex{color:#4da6ff}
.dec{color:#888}
.bin{color:#555;font-size:0.75rem}
.html{color:#22c55e}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px}
</style>
</head>
<body>
<div class="container">
  <h1>Text to Unicode Converter</h1>
  <p class="desc">View Unicode code points for any text</p>
  <div class="card">
    <label>Input text</label>
    <textarea id="input" rows="3" spellcheck="false">Hello 世界 🌍</textarea>
    <div id="tableWrap"></div>
    <div class="flex-center">
      <button id="copyBtn">Copy as CSV</button>
    </div>
  </div>
</div>
<script>
function update() {
  const text = document.getElementById('input').value;
  const wrap = document.getElementById('tableWrap');
  if (!text) { wrap.innerHTML = ''; return; }
  let html = '<table><thead><tr><th>Char</th><th>Decimal</th><th>Hex</th><th>Binary</th><th>HTML Entity</th><th>JS Escape</th></tr></thead><tbody>';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    const hex = code.toString(16).toUpperCase();
    const bin = code.toString(2);
    const htmlEntity = code > 127 ? `&#${code};` : ch;
    const jsEscape = code > 127 ? `\\u{${hex}}` : ch;
    html += `<tr>
      <td>${ch === ' ' ? '&nbsp;' : ch}</td>
      <td class="dec">${code}</td>
      <td class="hex">U+${hex.padStart(4, '0')}</td>
      <td class="bin">${bin}</td>
      <td class="html">${htmlEntity}</td>
      <td class="dec">${jsEscape}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

document.getElementById('input').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  const rows = Array.from(document.querySelectorAll('#tableWrap tbody tr')).map(tr => {
    const cells = tr.querySelectorAll('td');
    return Array.from(cells).map(td => td.textContent.trim()).join(',');
  }).join('\n');
  navigator.clipboard.writeText('Char,Decimal,Hex,Binary,HTML Entity,JS Escape\n' + rows);
});
update();
</script>
</body>
</html>
