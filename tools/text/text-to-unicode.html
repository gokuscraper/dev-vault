<script>
function update() {
  const text = document.getElementById('input').value;
  const wrap = document.getElementById('tableWrap');
  if (!text) { wrap.innerHTML = ''; return; }
  let html = '<table><thead><tr><th ti="th_char" ti="th_char" ti="th_char">Char</th><th ti="th_decimal" ti="th_decimal" ti="th_decimal">Decimal</th><th ti="th_hex" ti="th_hex" ti="th_hex">Hex</th><th ti="th_binary" ti="th_binary" ti="th_binary">Binary</th><th ti="th_html_entity" ti="th_html_entity" ti="th_html_entity">HTML Entity</th><th ti="th_js_escape" ti="th_js_escape" ti="th_js_escape">JS Escape</th></tr></thead><tbody>';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    const hex = code.toString(16).toUpperCase();
    const bin = code.toString(2);
    const htmlEntity = code > 127 ? `&#${code};` : ch;
    const jsEscape = code > 127 ? `\\u{${hex}}` : ch;
    html += `<tr>
      <td>${ch === ' ' ? '&nbsp;' : ch}</td>
      <td class="dec">${code}</td>
      <td class="hex">U+${hex.padStart(4, '0')}</td>
      <td class="bin">${bin}</td>
      <td class="html">${htmlEntity}</td>
      <td class="dec">${jsEscape}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

document.getElementById('input').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  const rows = Array.from(document.querySelectorAll('#tableWrap tbody tr')).map(tr => {
    const cells = tr.querySelectorAll('td');
    return Array.from(cells).map(td => td.textContent.trim()).join(',');
  }).join('\n');
  navigator.clipboard.writeText('Char,Decimal,Hex,Binary,HTML Entity,JS Escape\n' + rows);
});
update();
</script>
