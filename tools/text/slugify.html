<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slugify</title>
<meta name="description" content="Convert text to URL-friendly slugs. Remove accents, special characters, and replace spaces with hyphens.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none}
input:focus,textarea:focus{border-color:#3b82f6}
textarea{font-family:monospace;resize:vertical;min-height:60px;color:#4da6ff}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.row label{display:flex;align-items:center;gap:4px;cursor:pointer;color:#ccc;font-size:0.85rem;font-weight:400}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>Slugify</h1>
  <p class="desc">Convert text to URL-friendly slugs</p>
  <div class="card">
    <label>Input text</label>
    <input type="text" id="inputText" value="Hello World! How are you?" spellcheck="false">
    <div class="row">
      <label><input type="radio" name="separator" value="-" checked> Hyphen (-)</label>
      <label><input type="radio" name="separator" value="_"> Underscore (_)</label>
      <label><input type="radio" name="separator" value=""> None</label>
      <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
      <label><input type="checkbox" id="trim" checked> Trim</label>
    </div>
    <label>Slug</label>
    <textarea id="output" rows="2" readonly></textarea>
    <div class="flex-center">
      <button id="copyBtn">Copy</button>
    </div>
  </div>
</div>
<script>
const accentMap = {
  'Г ГЎГўГЈГӨГҘ': 'a', 'ГЁГ©ГӘГ«': 'e', 'Г¬ГӯГ®ГҜ': 'i', 'ГІГіГҙГөГ¶': 'o', 'Г№ГәГ»Гј': 'u',
  'Гұ': 'n', 'Г§': 'c', 'Гё': 'o', 'Гҹ': 'ss',
};

function slugify(text, sep, toLower, doTrim) {
  let s = text;
  // Replace accented chars
  for (const [accented, plain] of Object.entries(accentMap)) {
    const re = new RegExp('[' + accented + ']', 'gi');
    s = s.replace(re, plain);
  }
  if (toLower) s = s.toLowerCase();
  if (doTrim) s = s.trim();
  // Remove invalid chars
  s = s.replace(/[^a-z0-9\s_-]/gi, '');
  // Collapse spaces
  s = s.replace(/\s+/g, ' ');
  // Replace spaces with separator
  if (sep) s = s.replace(/\s/g, sep);
  else s = s.replace(/\s/g, '');
  // Remove consecutive separators
  if (sep) s = s.replace(new RegExp(RegExp.escape(sep) + '+', 'g'), sep);
  // Trim separators
  if (sep) {
    const re = new RegExp('^' + RegExp.escape(sep) + '|' + RegExp.escape(sep) + '$', 'g');
    s = s.replace(re, '');
  }
  return s;
}

function getOpts() {
  const sep = document.querySelector('input[name="separator"]:checked').value;
  const lower = document.getElementById('lowercase').checked;
  const trim = document.getElementById('trim').checked;
  return { sep, lower, trim };
}

function update() {
  const text = document.getElementById('inputText').value;
  const opts = getOpts();
  document.getElementById('output').value = slugify(text, opts.sep, opts.lower, opts.trim);
}

document.getElementById('inputText').addEventListener('input', update);
document.querySelectorAll('input[name="separator"], #lowercase, #trim').forEach(el => el.addEventListener('change', update));
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
update();
</script>
</body>
</html>
