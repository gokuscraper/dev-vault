<!DOCTYPE html>
<html tk="title_wysiwyg_editor" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WYSIWYG Editor</title>
<meta name="description" content="Browser-based rich text WYSIWYG editor. Bold, italic, underline, lists, headings, links, images, and more. Paste content and export as HTML or Markdown.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:760px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border:1px solid #333;border-bottom:none;border-radius:8px 8px 0 0;background:#1a1a1a}
.toolbar button{background:none;border:none;color:#ccc;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:0.85rem;font-weight:600}
.toolbar button:hover{background:#2a2a2a;color:#fff}
.toolbar button.active{color:#3b82f6;background:#0d1520}
.toolbar .sep{width:1px;background:#333;margin:2px 4px}
.toolbar select{padding:4px 6px;border-radius:4px;border:1px solid #333;background:#222;color:#fff;font-size:0.8rem;outline:none}
.editor{min-height:300px;padding:14px;border:1px solid #333;border-radius:0 0 8px 8px;background:#111;color:#e6e6e6;font-size:1rem;line-height:1.6;outline:none;overflow-y:auto}
.editor:focus{border-color:#3b82f6}
.editor img{max-width:100%;border-radius:4px}
.editor a{color:#3b82f6}
.tabs{display:flex;margin-bottom:0;gap:2px}
.tabs button{padding:8px 16px;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;font-size:0.8rem;font-weight:600;border-radius:8px 8px 0 0}
.tabs button.active{background:#161616;color:#fff;border-color:#3b82f6}
.panel{display:none}
.panel.active{display:block}
.output{font-family:monospace;font-size:0.85rem;background:#111;border:1px solid #333;border-radius:8px;padding:14px;min-height:100px;white-space:pre-wrap;word-break:break-word}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:10px}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_wysiwyg_editor" ti="h1_wysiwyg_editor">WYSIWYG Editor</h1>
  <p class="desc" ti="subtitle_rich_text_editor_with_htm">Rich text editor with HTML and Markdown export</p>
  <div class="card">
    <div class="toolbar" id="toolbar">
      <select id="headingSelect">
        <option value="p">Paragraph</option>
        <option value="h1">Heading 1</option>
        <option value="h2">Heading 2</option>
        <option value="h3">Heading 3</option>
        <option value="h4">Heading 4</option>
        <option value="pre">Code</option>
        <option value="blockquote">Quote</option>
      </select>
      <span class="sep"></span>
      <button data-cmd="bold" title="Bold"><strong>B</strong></button>
      <button data-cmd="italic" title="Italic"><em>I</em></button>
      <button data-cmd="underline" title="Underline"><u>U</u></button>
      <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
      <span class="sep"></span>
      <button data-cmd="insertUnorderedList" title="Bullet list">&#8226; List</button>
      <button data-cmd="insertOrderedList" title="Numbered list" ti="btn_1_list">1. List</button>
      <span class="sep"></span>
      <button data-cmd="createLink" title="Insert link" ti="btn_link">Link</button>
      <button data-cmd="insertImage" title="Insert image" ti="btn_img">Img</button>
      <button id="clearBtn" ti="btn_clear">Clear</button>
    </div>
    <div class="editor" id="editor" contenteditable="true">
      <p>Start typing here...</p>
    </div>
    <div style="margin-top:12px">
      <div class="tabs">
        <button class="active" data-panel="html" ti="btn_html">HTML</button>
        <button data-panel="markdown" ti="btn_markdown">Markdown</button>
      </div>
      <div class="panel active" id="htmlPanel"><div class="output" id="htmlOutput"></div></div>
      <div class="panel" id="markdownPanel"><div class="output" id="mdOutput"></div></div>
    </div>
    <div class="flex-center">
      <button id="copyOutput" ti="btn_copy_output">Copy Output</button>
    </div>
  </div>
</div>

<script>var _LANG={'title_wysiwyg_editor':["WYSIWYG Editor", "所见即所得编辑器"],'metadesc_browser_based_rich_text_w':["Browser-based rich text WYSIWYG editor. Bold, italic, underline, lists, headings, links, images, and more. Paste content and export as HTML or Markdown.", "基于浏览器的富文本所见即所得编辑器。支持粗体、斜体、下划线、列表、标题、链接、图像等多种格式。粘贴内容并导出为 HTML 或 Markdown 格式。"],'h1_wysiwyg_editor':["WYSIWYG Editor", "所见即所得编辑器"],'subtitle_rich_text_editor_with_htm':["Rich text editor with HTML and Markdown export", "支持导出 HTML 和 Markdown 的富文本编辑器"],'btn_list':["• List", "• 列表"],'btn_1_list':["1. List", "1. 列表"],'btn_link':["Link", "关联"],'btn_img':["Img", "图片"],'btn_clear':["Clear", "清除"],'btn_html':["HTML", "HTML"],'btn_markdown':["Markdown", "Markdown"],'btn_copy_output':["Copy Output", "复制输出"],'jalert_enter_url':["Enter URL:", "输入网址："],'jalert_enter_image_url':["Enter image URL:", "请输入图片网址："]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const editor = document.getElementById('editor');
const htmlOutput = document.getElementById('htmlOutput');
const mdOutput = document.getElementById('mdOutput');

// Toolbar commands
document.querySelectorAll('[data-cmd]').forEach(btn => {
  btn.addEventListener('click', () => {
    const cmd = btn.dataset.cmd;
    if (cmd === 'createLink') {
      const url = T("jalert_enter_url");
      if (url) document.execCommand(cmd, false, url);
    } else if (cmd === 'insertImage') {
      const url = T("jalert_enter_image_url");
      if (url) document.execCommand(cmd, false, url);
    } else {
      document.execCommand(cmd, false, null);
    }
    editor.focus();
    updateOutput();
  });
});

document.getElementById('headingSelect').addEventListener('change', function() {
  document.execCommand('formatBlock', false, '<' + this.value + '>');
  editor.focus();
  updateOutput();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  editor.innerHTML = '<p><br></p>';
  updateOutput();
});

// Tab switching
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(btn.dataset.panel + 'Panel').classList.add('active');
  });
});

// Simple HTML to Markdown converter
function htmlToMarkdown(html) {
  let md = html;
  // Headings
  md = md.replace(/<h1[^>]*>([\s\S]*?)<\/h1>/gi, '# $1\n\n');
  md = md.replace(/<h2[^>]*>([\s\S]*?)<\/h2>/gi, '## $1\n\n');
  md = md.replace(/<h3[^>]*>([\s\S]*?)<\/h3>/gi, '### $1\n\n');
  md = md.replace(/<h4[^>]*>([\s\S]*?)<\/h4>/gi, '#### $1\n\n');
  // Bold / italic / strike
  md = md.replace(/<strong>([\s\S]*?)<\/strong>/gi, '**$1**');
  md = md.replace(/<b>([\s\S]*?)<\/b>/gi, '**$1**');
  md = md.replace(/<em>([\s\S]*?)<\/em>/gi, '*$1*');
  md = md.replace(/<i>([\s\S]*?)<\/i>/gi, '*$1*');
  md = md.replace(/<u>([\s\S]*?)<\/u>/gi, '__$1__');
  md = md.replace(/<s>([\s\S]*?)<\/s>/gi, '~~$1~~');
  // Links
  md = md.replace(/<a[^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi, '[$2]($1)');
  // Images
  md = md.replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*>/gi, '![$2]($1)');
  md = md.replace(/<img[^>]*src="([^"]*)"[^>]*>/gi, '![]($1)');
  // Lists
  md = md.replace(/<li>([\s\S]*?)<\/li>/gi, '* $1\n');
  md = md.replace(/<ol>([\s\S]*?)<\/ol>/gi, '$1\n');
  md = md.replace(/<ul>([\s\S]*?)<\/ul>/gi, '$1\n');
  // Blockquote
  md = md.replace(/<blockquote>([\s\S]*?)<\/blockquote>/gi, '> $1\n\n');
  // Pre / code
  md = md.replace(/<pre>([\s\S]*?)<\/pre>/gi, '```\n$1\n```\n\n');
  md = md.replace(/<code>([\s\S]*?)<\/code>/gi, '`$1`');
  // Paragraphs
  md = md.replace(/<p[^>]*>([\s\S]*?)<\/p>/gi, '$1\n\n');
  // Line breaks
  md = md.replace(/<br\s*\/?>/gi, '\n');
  // Remove remaining tags
  md = md.replace(/<[^>]*>/g, '');
  // Clean up excessive newlines
  md = md.replace(/\n{3,}/g, '\n\n');
  md = md.trim();
  return md;
}

function updateOutput() {
  const html = editor.innerHTML;
  htmlOutput.textContent = html;
  mdOutput.textContent = htmlToMarkdown(html);
}

editor.addEventListener('input', updateOutput);
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
  }
});

document.getElementById('copyOutput').addEventListener('click', () => {
  const active = document.querySelector('.panel.active');
  const text = active.querySelector('.output').textContent;
  navigator.clipboard.writeText(text);
});

updateOutput();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
