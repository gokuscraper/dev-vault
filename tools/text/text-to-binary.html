<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
let direction = 'text2bin';

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const output = document.getElementById('output');
  if (direction === 'text2bin') {
    output.value = Array.from(input).map(ch => {
      return ch.charCodeAt(0).toString(2).padStart(8, '0');
    }).join(' ');
  } else {
    const bytes = input.trim().split(/\s+/).filter(Boolean);
    output.value = bytes.map(b => {
      const code = parseInt(b, 2);
      return isNaN(code) ? '' : String.fromCharCode(code);
    }).join('');
  }
}

document.getElementById('input').addEventListener('input', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
document.getElementById('swapBtn').addEventListener('click', () => {
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const tmp = input.value;
  input.value = output.value;
  output.value = tmp;
  // Swap direction tab
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  const newDir = direction === 'text2bin' ? 'bin2text' : 'text2bin';
  document.querySelector(`[data-dir="${newDir}"]`).classList.add('active');
  direction = newDir;
  convert();
});
convert();
</script>
