<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Binary Converter</title>
<meta name="description" content="Convert text to binary (bits) and binary back to text. Supports ASCII, UTF-8, and custom byte separators.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:600px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;resize:vertical;min-height:80px;font-family:monospace;margin-bottom:10px}
textarea:focus{border-color:#3b82f6}
.tabs{display:flex;gap:2px;margin-bottom:10px}
.tabs button{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;font-size:0.8rem;font-weight:600}
.tabs button.active{background:#161616;color:#fff;border-color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="container">
  <h1>Text to Binary Converter</h1>
  <p class="desc">Convert text to binary and binary back to text</p>
  <div class="card">
    <div class="tabs">
      <button class="active" data-dir="text2bin">Text → Binary</button>
      <button data-dir="bin2text">Binary → Text</button>
    </div>
    <label>Input</label>
    <textarea id="input" rows="4" spellcheck="false">Hello World</textarea>
    <label>Output</label>
    <textarea id="output" rows="4" readonly></textarea>
    <div class="flex-center">
      <button id="copyBtn">Copy Output</button>
      <button id="swapBtn">Swap</button>
    </div>
  </div>
</div>
<script>
let direction = 'text2bin';

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const output = document.getElementById('output');
  if (direction === 'text2bin') {
    output.value = Array.from(input).map(ch => {
      return ch.charCodeAt(0).toString(2).padStart(8, '0');
    }).join(' ');
  } else {
    const bytes = input.trim().split(/\s+/).filter(Boolean);
    output.value = bytes.map(b => {
      const code = parseInt(b, 2);
      return isNaN(code) ? '' : String.fromCharCode(code);
    }).join('');
  }
}

document.getElementById('input').addEventListener('input', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
document.getElementById('swapBtn').addEventListener('click', () => {
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const tmp = input.value;
  input.value = output.value;
  output.value = tmp;
  // Swap direction tab
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  const newDir = direction === 'text2bin' ? 'bin2text' : 'text2bin';
  document.querySelector(`[data-dir="${newDir}"]`).classList.add('active');
  direction = newDir;
  convert();
});
convert();
</script>
</body>
</html>
