<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to NATO Alphabet</title>
<meta name="description" content="Convert text to the NATO phonetic alphabet (Alpha, Bravo, Charlie...). Useful for spelling things over the phone or radio.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;outline:none;margin-bottom:12px}
input:focus{border-color:#3b82f6}
.result-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px;min-height:40px;margin-bottom:10px;line-height:1.8}
.word{display:inline-block;margin-right:8px}
.word .code{color:#4da6ff;font-weight:600;font-family:monospace}
.word .letter{color:#888;font-size:0.8rem}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center}
</style>
</head>
<body>
<div class="container">
  <h1>Text to NATO Alphabet</h1>
  <p class="desc">Convert text to the NATO phonetic alphabet for clear communication</p>
  <div class="card">
    <label>Text to convert</label>
    <input type="text" id="inputText" value="Hello World" spellcheck="false">
    <div class="result-box" id="output"></div>
    <div class="flex-center">
      <button id="copyBtn">Copy</button>
    </div>
  </div>
</div>
<script>
const nato = {
  a:'Alpha', b:'Bravo', c:'Charlie', d:'Delta', e:'Echo', f:'Foxtrot', g:'Golf',
  h:'Hotel', i:'India', j:'Juliett', k:'Kilo', l:'Lima', m:'Mike',
  n:'November', o:'Oscar', p:'Papa', q:'Quebec', r:'Romeo', s:'Sierra',
  t:'Tango', u:'Uniform', v:'Victor', w:'Whiskey', x:'X-ray', y:'Yankee', z:'Zulu',
  '0':'Zero', '1':'One', '2':'Two', '3':'Three', '4':'Four',
  '5':'Five', '6':'Six', '7':'Seven', '8':'Eight', '9':'Nine',
};

function update() {
  const text = document.getElementById('inputText').value;
  const out = document.getElementById('output');
  out.innerHTML = '';
  for (const ch of text) {
    const lower = ch.toLowerCase();
    const word = nato[lower] || (ch === ' ' ? null : ch);
    if (word) {
      const span = document.createElement('span');
      span.className = 'word';
      span.innerHTML = `<span class="code">${word}</span> <span class="letter">${ch === ' ' ? '&nbsp;' : ch}</span>`;
      out.appendChild(span);
    } else {
      out.appendChild(document.createTextNode(' '));
    }
  }
}

document.getElementById('inputText').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  const result = Array.from(document.querySelectorAll('.code')).map(el => el.textContent).join(' ');
  navigator.clipboard.writeText(result);
});
update();
</script>
</body>
</html>
