<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}

<body>

  <p class="desc" ti="subtitle_convert_text_to_the_nato" ti="subtitle_convert_text_to_the_nato" ti="subtitle_convert_text_to_the_nato">Convert text to the NATO phonetic alphabet for clear communication</p>

<script>var _LANG={'title_text_to_nato_alphabet':["Text to NATO Alphabet", "文本转北约字母表"],'metadesc_convert_text_to_the_nato':["Convert text to the NATO phonetic alphabet (Alpha, Bravo, Charlie...). Useful for spelling things over the phone or radio.", "将文本转换为北约音标字母（Alpha、Bravo、Charlie……）。方便在电话或无线电中拼写单词。"],'h1_text_to_nato_alphabet':["Text to NATO Alphabet", "文本转北约字母表"],'subtitle_convert_text_to_the_nato':["Convert text to the NATO phonetic alphabet for clear communication", "将文本转换为北约音标字母，以便清晰沟通。"],'btn_copy':["Copy", "复制"],'label_text_to_convert':["Text to convert", "要转换的文本"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>var _LANG={'title_text_to_nato_alphabet':["Text to NATO Alphabet", "文本转北约字母表"],'metadesc_convert_text_to_the_nato':["Convert text to the NATO phonetic alphabet (Alpha, Bravo, Charlie...). Useful for spelling things over the phone or radio.", "将文本转换为北约音标字母（Alpha、Bravo、Charlie……）。方便在电话或无线电中拼写单词。"],'h1_text_to_nato_alphabet':["Text to NATO Alphabet", "文本转北约字母表"],'subtitle_convert_text_to_the_nato':["Convert text to the NATO phonetic alphabet for clear communication", "将文本转换为北约音标字母，以便清晰沟通。"],'btn_copy':["Copy", "复制"],'label_text_to_convert':["Text to convert", "要转换的文本"]};

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const nato = {
  a:'Alpha', b:'Bravo', c:'Charlie', d:'Delta', e:'Echo', f:'Foxtrot', g:'Golf',
  h:'Hotel', i:'India', j:'Juliett', k:'Kilo', l:'Lima', m:'Mike',
  n:'November', o:'Oscar', p:'Papa', q:'Quebec', r:'Romeo', s:'Sierra',
  t:'Tango', u:'Uniform', v:'Victor', w:'Whiskey', x:'X-ray', y:'Yankee', z:'Zulu',
  '0':'Zero', '1':'One', '2':'Two', '3':'Three', '4':'Four',
  '5':'Five', '6':'Six', '7':'Seven', '8':'Eight', '9':'Nine',
};

function update() {
  const text = document.getElementById('inputText').value;
  const out = document.getElementById('output');
  out.innerHTML = '';
  for (const ch of text) {
    const lower = ch.toLowerCase();
    const word = nato[lower] || (ch === ' ' ? null : ch);
    if (word) {
      const span = document.createElement('span');
      span.className = 'word';
      span.innerHTML = `<span class="code">${word}</span> <span class="letter">${ch === ' ' ? '&nbsp;' : ch}</span>`;
      out.appendChild(span);
    } else {
      out.appendChild(document.createTextNode(' '));
    }
  }
}

document.getElementById('inputText').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  const result = Array.from(document.querySelectorAll('.code')).map(el => el.textContent).join(' ');
  navigator.clipboard.writeText(result);
});
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
