<!DOCTYPE html>
<html tk="title_list_converter" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Converter</title>
<meta name="description" content="Convert lists between formats: comma-separated, newline-separated, JSON array, pipe-separated, numbered, and SQL IN clause.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:640px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;font-family:monospace}
textarea:focus,select:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:80px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:12px}
</style>
</head>
<body>


<div class="container" style="position:relative">
  <h1 ti="title_list_converter" ti="h1_list_converter">List Converter</h1>
  <p class="desc" ti="subtitle_convert_lists_between_dif">Convert lists between different formats</p>
  <div class="card">
    <label ti="label_input_format">Input format</label>
    <select id="inputFmt">
      <option value="csv">Comma-separated (item1,item2,item3)</option>
      <option value="newline" selected>Newline-separated (one per line)</option>
      <option value="json">JSON array</option>
      <option value="pipe">Pipe-separated</option>
      <option value="numbered">Numbered list (1. / -)</option>
    </select>
    <textarea id="inputList" rows="5" spellcheck="false">apple
banana
cherry
date
elderberry</textarea>
    <label ti="label_output_format">Output format</label>
    <select id="outputFmt">
      <option value="csv">Comma-separated</option>
      <option value="newline">Newline-separated</option>
      <option value="json">JSON array</option>
      <option value="pipe">Pipe-separated</option>
      <option value="numbered">Numbered list (1. ...)</option>
      <option value="sql">SQL IN clause</option>
    </select>
    <textarea id="outputList" rows="5" readonly></textarea>
    <div class="flex-center">
      <button id="copyBtn" ti="btn_copy">Copy</button>
    </div>
  </div>
</div>

<script>var _LANG={'title_list_converter':["List Converter", "列表转换器"],'metadesc_convert_lists_between_for':["Convert lists between formats: comma-separated, newline-separated, JSON array, pipe-separated, numbered, and SQL IN clause.", "在以下格式之间转换列表：逗号分隔、换行符分隔、JSON 数组、管道符分隔、编号和 SQL IN 子句。"],'h1_list_converter':["List Converter", "列表转换器"],'subtitle_convert_lists_between_dif':["Convert lists between different formats", "在不同格式之间转换列表"],'btn_copy':["Copy", "复制"],'label_input_format':["Input format", "输入格式"],'label_output_format':["Output format", "输出格式"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function parseInput(text, fmt) {
  switch(fmt) {
    case 'csv': return text.split(',').map(s => s.trim()).filter(Boolean);
    case 'newline': return text.split('\n').map(s => s.trim()).filter(Boolean);
    case 'json': try { return JSON.parse(text); } catch(e) { return []; }
    case 'pipe': return text.split('|').map(s => s.trim()).filter(Boolean);
    case 'numbered': return text.split('\n').map(s => s.replace(/^[\d.\-)\s]+/, '').trim()).filter(Boolean);
    default: return [];
  }
}

function formatOutput(items, fmt) {
  switch(fmt) {
    case 'csv': return items.join(', ');
    case 'newline': return items.join('\n');
    case 'json': return JSON.stringify(items, null, 2);
    case 'pipe': return items.join(' | ');
    case 'numbered': return items.map((item, i) => (i + 1) + '. ' + item).join('\n');
    case 'sql': return '(' + items.map(item => `'${item.replace(/'/g, "''")}'`).join(', ') + ')';
    default: return '';
  }
}

function update() {
  const input = document.getElementById('inputList').value;
  const inFmt = document.getElementById('inputFmt').value;
  const outFmt = document.getElementById('outputFmt').value;
  const items = parseInput(input, inFmt);
  document.getElementById('outputList').value = formatOutput(items, outFmt);
}

document.getElementById('inputList').addEventListener('input', update);
document.getElementById('inputFmt').addEventListener('change', update);
document.getElementById('outputFmt').addEventListener('change', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('outputList').value);
});
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
