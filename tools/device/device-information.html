<!DOCTYPE html>
<html tk="title_device_information" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Information</title>
<meta name="description" content="View detailed information about your device and browser: screen size, user agent, hardware concurrency, memory, battery, and more.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:640px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
h2{font-size:0.95rem;color:#fff;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #222}
h2:first-child{margin-top:0}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
td{padding:5px 8px;border-bottom:1px solid #1a1a1a}
td:first-child{color:#888;width:45%}
td:last-child{color:#e6e6e6;font-family:monospace;word-break:break-all}
tr:hover td{background:#0d1520}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin:10px 0}
</style>
</head>
<body>


<div class="container" style="position:relative">
  <h1 ti="title_device_information" ti="h1_device_information">Device Information</h1>
  <p class="desc" ti="subtitle_detailed_information_abou">Detailed information about your browser and device</p>
  <div class="card">
    <div class="flex-center">
      <button id="refreshBtn" ti="btn_refresh">Refresh</button>
      <button id="copyBtn" ti="btn_copy_all">Copy All</button>
    </div>
    <div id="info"></div>
  </div>
</div>

<script>var _LANG={'title_device_information':["Device Information", "设备信息"],'metadesc_view_detailed_information':["View detailed information about your device and browser: screen size, user agent, hardware concurrency, memory, battery, and more.", "查看有关您的设备和浏览器的详细信息：屏幕尺寸、用户代理、硬件并发性、内存、电池等。"],'h1_device_information':["Device Information", "设备信息"],'h2_browser':["Browser", "浏览器"],'h2_screen':["Screen", "屏幕"],'h2_window':["Window", "窗户"],'h2_location':["Location", "地点"],'h2_timing':["Timing", "定时"],'h2_navigator_features':["Navigator Features", "导航功能"],'subtitle_detailed_information_abou':["Detailed information about your browser and device", "有关您的浏览器和设备的详细信息"],'btn_refresh':["Refresh", "刷新"],'btn_copy_all':["Copy All", "全部复制"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function row(label, value) {
  return `<tr><td>${label}</td><td>${value ?? '<span style="color:#555">N/A</span>'}</td></tr>`;
}

function getInfo() {
  const n = navigator;
  const s = screen;
  const d = document;
  const w = window;
  const l = location;
  const sections = [];

  sections.push('<h2 ti="h2_browser">Browser</h2><table>');
  sections.push(row('User Agent', n.userAgent));
  sections.push(row('Platform', n.platform));
  sections.push(row('Language', n.language));
  sections.push(row('Languages', n.languages?.join(', ')));
  sections.push(row('Vendor', n.vendor));
  sections.push(row('Product', n.product));
  sections.push(row('Cookie Enabled', n.cookieEnabled));
  sections.push(row('Do Not Track', n.doNotTrack));
  sections.push(row('On Line', n.onLine));
  sections.push(row('Hardware Concurrency', n.hardwareConcurrency));
  sections.push(row('Device Memory (GB)', n.deviceMemory));
  sections.push(row('Max Touch Points', n.maxTouchPoints));
  sections.push('</table>');

  sections.push('<h2 ti="h2_screen">Screen</h2><table>');
  sections.push(row('Width', s.width + 'px'));
  sections.push(row('Height', s.height + 'px'));
  sections.push(row('Avail Width', s.availWidth + 'px'));
  sections.push(row('Avail Height', s.availHeight + 'px'));
  sections.push(row('Color Depth', s.colorDepth + '-bit'));
  sections.push(row('Pixel Depth', s.pixelDepth + '-bit'));
  sections.push(row('Device Pixel Ratio', w.devicePixelRatio));
  sections.push(row('Orientation', s.orientation?.type));
  sections.push('</table>');

  sections.push('<h2 ti="h2_window">Window</h2><table>');
  sections.push(row('Inner Width', w.innerWidth + 'px'));
  sections.push(row('Inner Height', w.innerHeight + 'px'));
  sections.push(row('Outer Width', w.outerWidth + 'px'));
  sections.push(row('Outer Height', w.outerHeight + 'px'));
  sections.push(row('Scroll X', w.scrollX));
  sections.push(row('Scroll Y', w.scrollY));
  sections.push(row('Page X Offset', w.pageXOffset));
  sections.push(row('Page Y Offset', w.pageYOffset));
  sections.push('</table>');

  sections.push('<h2 ti="h2_location">Location</h2><table>');
  sections.push(row('HREF', l.href));
  sections.push(row('Protocol', l.protocol));
  sections.push(row('Host', l.host));
  sections.push(row('Hostname', l.hostname));
  sections.push(row('Port', l.port));
  sections.push(row('Pathname', l.pathname));
  sections.push(row('Search', l.search));
  sections.push(row('Hash', l.hash));
  sections.push(row('Origin', l.origin));
  sections.push('</table>');

  sections.push('<h2 ti="h2_timing">Timing</h2><table>');
  const t = performance?.timing;
  if (t) {
    sections.push(row('DOM Interactive', new Date(t.domInteractive).toISOString()));
    sections.push(row('DOM Complete', new Date(t.domComplete).toISOString()));
    sections.push(row('Load Event End', new Date(t.loadEventEnd).toISOString()));
    sections.push(row('Navigation Start', new Date(t.navigationStart).toISOString()));
  }
  sections.push('</table>');

  sections.push('<h2 ti="h2_navigator_features">Navigator Features</h2><table>');
  sections.push(row('Service Worker', 'serviceWorker' in n));
  sections.push(row('Geolocation', 'geolocation' in n));
  sections.push(row('Web Bluetooth', 'bluetooth' in n));
  sections.push(row('Web USB', 'usb' in n));
  sections.push(row('Web NFC', 'nfc' in n));
  sections.push(row('Web Serial', 'serial' in n));
  sections.push(row('Web Share', 'share' in n));
  sections.push(row('Web Locks', 'locks' in n));
  sections.push(row('Credentials', 'credentials' in n));
  sections.push(row('MediaDevices', 'mediaDevices' in n?.mediaDevices));
  sections.push(row('Clipboard', 'clipboard' in n));
  sections.push(row('Storage', 'storage' in n));
  sections.push(row('Connection', 'connection' in n));
  sections.push(row('Battery', 'getBattery' in n));
  sections.push(row('Virtual Keyboard', 'virtualKeyboard' in n));
  sections.push('</table>');

  return sections.join('');
}

function refresh() {
  document.getElementById('info').innerHTML = getInfo();
}

document.getElementById('refreshBtn').addEventListener('click', refresh);
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = Array.from(document.querySelectorAll('#info tr')).map(tr => {
    const cells = tr.querySelectorAll('td');
    return cells.length === 2 ? cells[0].textContent + ': ' + cells[1].textContent : '';
  }).filter(Boolean).join('\n');
  navigator.clipboard.writeText(text);
});
refresh();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
