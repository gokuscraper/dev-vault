<!DOCTYPE html>
<html tk="title_camera_recorder" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Recorder</title>
<meta name="description" content="Record video from your camera. Preview, record, pause, and download as WebM. Supports front/back camera switching and quality settings.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:640px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.video-wrap{position:relative;background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px}
video{width:100%;display:block;min-height:360px;max-height:480px;object-fit:contain;background:#000}
.controls{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.controls button{padding:10px 24px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
.controls button:hover{background:#252525;border-color:#3b82f6}
.controls button.record{color:#ef4444;border-color:#ef4444}
.controls button.record:hover{background:#2a1a1a}
.controls button.recording{background:#ef4444;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}
.controls button.stop{color:#22c55e;border-color:#22c55e}
.controls button.stop:hover{background:#1a2a1a}
.row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.row label{color:#aaa;font-size:0.85rem;font-weight:600}
.row select{padding:8px 12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.85rem;outline:none}
.status{color:#888;font-size:0.85rem;text-align:center;margin-top:10px;min-height:20px}
.download-link{display:none;text-align:center;margin-top:10px}
.download-link a{color:#3b82f6;font-weight:600;font-size:0.9rem}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_camera_recorder" ti="h1_camera_recorder">Camera Recorder</h1>
  <p class="desc" ti="subtitle_record_video_from_your_ca">Record video from your camera and download as WebM</p>
  <div class="card">
    <div class="row">
      <label ti="label_camera">Camera</label>
      <select id="cameraSelect">
        <option value="user">Front-facing</option>
        <option value="environment">Rear-facing</option>
      </select>
      <label ti="label_quality">Quality</label>
      <select id="qualitySelect">
        <option value="640x480">640 × 480</option>
        <option value="1280x720" selected>1280 × 720 (HD)</option>
        <option value="1920x1080">1920 × 1080 (Full HD)</option>
      </select>
    </div>
    <div class="video-wrap">
      <video id="preview" autoplay muted playsinline></video>
    </div>
    <div class="controls">
      <button id="startBtn" ti="btn_start_camera">Start Camera</button>
      <button id="recordBtn" class="record" disabled ti="btn_record">● Record</button>
      <button id="stopBtn" disabled ti="btn_stop">■ Stop</button>
      <button id="pauseBtn" disabled ti="btn_pause">⏸ Pause</button>
    </div>
    <div class="status" id="status" ti="status_click_start_camera_to_beg">Click "Start Camera" to begin</div>
    <div class="download-link" id="downloadLink">
      <a id="downloadAnchor" download="recording.webm">⬇ Download Recording</a>
    </div>
  </div>
</div>

<script>var _LANG={'title_camera_recorder':["Camera Recorder", "摄像机录像机"],'metadesc_record_video_from_your_ca':["Record video from your camera. Preview, record, pause, and download as WebM. Supports front/back camera switching and quality settings.", "使用摄像头录制视频。预览、录制、暂停和下载为 WebM 格式。支持前后摄像头切换和画质设置。"],'h1_camera_recorder':["Camera Recorder", "摄像机录像机"],'subtitle_record_video_from_your_ca':["Record video from your camera and download as WebM", "使用摄像头录制视频并下载为 WebM 格式。"],'btn_start_camera':["Start Camera", "启动相机"],'btn_record':["● Record", "● 记录"],'btn_stop':["■ Stop", "■ 停止"],'btn_pause':["⏸ Pause", "⏸ 暂停"],'label_camera':["Camera", "相机"],'label_quality':["Quality", "质量"],'status_click_start_camera_to_beg':["Click \"Start Camera\" to begin", "点击“开始拍摄”按钮即可开始。"],'jtc_restart_camera':["Restart Camera", "重启相机"],'jtc_camera_ready_click_record':["Camera ready. Click ● Record to start.", "准备好相机。点击●开始录制。"],'jtc_camera_error':["Camera error:", "相机故障："],'jtc_record':["● Record", "● 记录"],'jtc_paused':["Paused", "暂停"],'jtc_resume':["▶ Resume", "▶ 简历"],'jtc_recording':["Recording...", "记录..."],'jtc_pause':["⏸ Pause", "⏸ 暂停"],'jtc_recording_2':["● Recording", "● 录音"],'jtc_recording_3':["Recording...", "记录..."],'jtc_recording_error':["Recording error:", "录制错误："],'jtc_resume_2':["▶ Resume", "▶ 简历"],'jtc_pause_2':["⏸ Pause", "⏸ 暂停"],'jtcpre_camera_error':["Camera error: ", "相机故障："],'jtcpre_recording_error':["Recording error: ", "录制错误："]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const video = document.getElementById('preview');
const startBtn = document.getElementById('startBtn');
const recordBtn = document.getElementById('recordBtn');
const stopBtn = document.getElementById('stopBtn');
const pauseBtn = document.getElementById('pauseBtn');
const statusEl = document.getElementById('status');
const downloadLink = document.getElementById('downloadLink');
const downloadAnchor = document.getElementById('downloadAnchor');

let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

async function startCamera() {
  stopCamera();
  const facingMode = document.getElementById('cameraSelect').value;
  const [w, h] = document.getElementById('qualitySelect').value.split('x').map(Number);

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: w }, height: { ideal: h } },
      audio: true
    });
    video.srcObject = mediaStream;
    startBtn.textContent=T("jtc_restart_camera");
    recordBtn.disabled = false;
    stopBtn.disabled = true;
    pauseBtn.disabled = true;
    statusEl.textContent=T("jtc_camera_ready_click_record");
    downloadLink.style.display = 'none';
  } catch(e) {
    statusEl.textContent=T("jtcpre_camera_error")+ e.message;
  }
}

function stopCamera() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  video.srcObject = null;
  recordBtn.disabled = true;
  stopBtn.disabled = true;
  pauseBtn.disabled = true;
}

function startRecording() {
  if (!mediaStream) return;
  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm;codecs=vp9,opus' });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      downloadAnchor.href = url;
      downloadLink.style.display = 'block';
      statusEl.textContent = `Recording saved (${(blob.size / 1024 / 1024).toFixed(1)} MB).`;
      recordBtn.textContent=T("jtc_record");
      recordBtn.classList.remove('recording');
      isRecording = false;
      recordBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
    };
    mediaRecorder.onpause = () => {
      statusEl.textContent=T("jtc_paused");
      pauseBtn.textContent=T("jtc_resume");
    };
    mediaRecorder.onresume = () => {
      statusEl.textContent=T("jtc_recording");
      pauseBtn.textContent=T("jtc_pause");
    };
    mediaRecorder.start(100);
    isRecording = true;
    recordBtn.textContent=T("jtc_recording_2");
    recordBtn.classList.add('recording');
    stopBtn.disabled = false;
    pauseBtn.disabled = false;
    statusEl.textContent=T("jtc_recording");
    downloadLink.style.display = 'none';
  } catch(e) {
    statusEl.textContent=T("jtcpre_recording_error")+ e.message;
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}

function togglePause() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.pause();
    pauseBtn.textContent=T("jtc_resume");
  } else if (mediaRecorder && mediaRecorder.state === 'paused') {
    mediaRecorder.resume();
    pauseBtn.textContent=T("jtc_pause");
  }
}

startBtn.addEventListener('click', startCamera);
recordBtn.addEventListener('click', () => {
  if (!isRecording) startRecording();
});
stopBtn.addEventListener('click', stopRecording);
pauseBtn.addEventListener('click', togglePause);
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
