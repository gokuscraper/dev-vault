<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi QR Code Generator</title>
<meta name="description" content="Generate a QR code for sharing WiFi network credentials. Supports WPA/WPA2, WEP, no password, and WPA2-EAP.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:#3b82f6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.check-row label{margin:0;cursor:pointer}
.qr-box{text-align:center;padding:16px}
.qr-box img{width:220px;height:220px;border-radius:8px;margin-bottom:12px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
button.primary:hover{background:#2563eb}
.flex-center{display:flex;justify-content:center}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>WiFi QR Code Generator</h1>
  <p class="desc">Generate a QR code for sharing WiFi credentials</p>
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.1/lib/qr-code-styling.min.js"></script>
  <div class="card">
    <label>Encryption</label>
    <select id="encryption">
      <option value="WPA">WPA/WPA2</option>
      <option value="nopass">No password</option>
      <option value="WEP">WEP</option>
      <option value="WPA2-EAP">WPA2-EAP</option>
    </select>
    <label>SSID</label>
    <input type="text" id="ssid" value="My WiFi" spellcheck="false">
    <div class="check-row">
      <input type="checkbox" id="hiddenSsid">
      <label for="hiddenSsid">Hidden SSID</label>
    </div>
    <div id="passwordRow">
      <label>Password</label>
      <input type="text" id="password" value="password123" spellcheck="false">
    </div>
  </div>
  <div class="card">
    <div class="qr-box" id="qrBox">
      <div id="qrPlaceholder" style="width:220px;height:220px;margin:0 auto 12px;background:#161616;border:1px solid #333;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#555;font-size:0.85rem">Generating...</div>
      <button class="primary" id="downloadBtn">Download QR code</button>
    </div>
  </div>
</div>
<script>
let qrCode = null;

function buildWifiString() {
  const enc = document.getElementById('encryption').value;
  const ssid = document.getElementById('ssid').value;
  const password = document.getElementById('password').value;
  const hidden = document.getElementById('hiddenSsid').checked;
  let s = 'WIFI:S:' + ssid + ';';
  if (enc !== 'nopass') s += 'T:' + enc + ';P:' + password + ';';
  else s += 'T:nopass;';
  if (hidden) s += 'H:true;';
  s += ';';
  return s;
}

function update() {
  const enc = document.getElementById('encryption').value;
  document.getElementById('passwordRow').style.display = enc === 'nopass' ? 'none' : 'block';

  const wifiStr = buildWifiString();
  const placeholder = document.getElementById('qrPlaceholder');

  if (qrCode) { try { qrCode.update({ data: wifiStr }); } catch(e) {} }
  else {
    placeholder.textContent = 'Generating...';
    setTimeout(() => {
      try {
        qrCode = new QRCodeStyling({
          width: 220, height: 220,
          data: wifiStr,
          margin: 10,
          qrOptions: { typeNumber: 0, mode: 'Byte', errorCorrectionLevel: 'M' },
          dotsOptions: { type: 'rounded', color: '#ffffff' },
          backgroundOptions: { color: '#000000' },
        });
        qrCode.append(placeholder);
      } catch(e) { placeholder.textContent = 'Error generating QR'; }
    }, 100);
  }
}

document.getElementById('encryption').addEventListener('change', update);
document.getElementById('ssid').addEventListener('input', update);
document.getElementById('password').addEventListener('input', update);
document.getElementById('hiddenSsid').addEventListener('change', update);
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (qrCode) qrCode.download({ name: 'wifi-qr', extension: 'png' });
});

update();
</script>
</body>
</html>
