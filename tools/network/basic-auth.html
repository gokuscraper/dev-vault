<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Auth Generator</title>
<meta name="description" content="Generate HTTP Basic Authentication headers from a username and password. Copy the Authorization header directly.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px}
input:focus{border-color:#3b82f6}
.header-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px 16px;font-family:monospace;font-size:0.85rem;color:#e6e6e6;word-break:break-all;margin-bottom:12px}
.header-label{color:#888;font-size:0.8rem;margin-bottom:6px;font-weight:600}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
button.primary:hover{background:#2563eb}
.flex-center{display:flex;justify-content:center}
</style>
</head>
<body>
<div class="container">
  <h1>Basic Auth Generator</h1>
  <p class="desc">Generate an HTTP Basic Authentication header from a username and password</p>
  <div class="card">
    <label for="username">Username</label>
    <input type="text" id="username" value="admin" spellcheck="false">
    <label for="password">Password</label>
    <input type="password" id="password" value="password123" spellcheck="false">
    <div class="header-label">Authorization header</div>
    <div class="header-box" id="headerOutput">Authorization: Basic YWRtaW46cGFzc3dvcmQxMjM=</div>
    <div class="flex-center">
      <button class="primary" id="copyBtn">Copy header</button>
    </div>
  </div>
</div>
<script>
function update() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const encoded = btoa(user + ':' + pass);
  document.getElementById('headerOutput').textContent = 'Authorization: Basic ' + encoded;
}
document.getElementById('username').addEventListener('input', update);
document.getElementById('password').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('headerOutput').textContent);
});
update();
</script>
</body>
</html>
