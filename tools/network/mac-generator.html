<div class="container" style="position:relative">
  <h1 ti="title_mac_address_generator" ti="h1_mac_address_generator" ti="title_mac_address_generator" ti="h1_mac_address_generator" ti="title_mac_address_generator" ti="h1_mac_address_generator">MAC Address Generator</h1>
  <p class="desc" ti="subtitle_generate_random_mac_addre" ti="subtitle_generate_random_mac_addre" ti="subtitle_generate_random_mac_addre">Generate random MAC addresses with custom prefix, case, and separator</p>

  <div class="card">
    <div class="row">
      <label ti="label_quantity" ti="label_quantity" ti="label_quantity">Quantity</label>
      <input type="number" id="amount" value="5" min="1" max="100">

    <div class="row">
      <label ti="label_prefix_optional" ti="label_prefix_optional" ti="label_prefix_optional">Prefix (optional)</label>

    </div>
    <div class="row">
      <label ti="label_case" ti="label_case" ti="label_case">Case</label>
      <select id="caseSel">
        <option value="upper">Uppercase</option>
        <option value="lower">Lowercase</option>
      </select>
    </div>
    <div class="row">
      <label ti="label_separator" ti="label_separator" ti="label_separator">Separator</label>
      <select id="separator">
        <option value=":">:</option>
        <option value="-">-</option>
        <option value=".">.</option>
        <option value="">None</option>

    </div>
  </div>

  <pre id="output">64:16:7F:A3:B2:C1
64:16:7F:D4:E5:F6
64:16:7F:78:90:AB
64:16:7F:CD:EF:12

  </div>
</div>

<script>
function randomByte() { return Math.floor(Math.random() * 256).toString(16).padStart(2, '0'); }

function splitPrefix(prefix) {
  if (!prefix) return [];
  const hasSep = /[^0-9a-f]/i.test(prefix);
  const parts = hasSep ? prefix.split(/[^0-9a-f]/i) : prefix.match(/.{1,2}/g) || [];
  return parts.filter(Boolean).map(b => b.padStart(2, '0'));
}

function generate(prefix, separator, caseFn, count) {
  const pref = splitPrefix(prefix);
  return Array.from({length: count}, () => {
    const bytes = [...pref];
    while (bytes.length < 6) bytes.push(randomByte());
    return caseFn(bytes.join(separator));
  }).join('\n');
}

function getCaseFn() {
  return document.getElementById('caseSel').value === 'upper' ? s => s.toUpperCase() : s => s.toLowerCase();
}

function update() {
  const amount = parseInt(document.getElementById('amount').value) || 1;
  const prefix = document.getElementById('prefix').value;
  const sep = document.getElementById('separator').value;
  const caseFn = getCaseFn();
  document.getElementById('output').textContent = generate(prefix, sep, caseFn, Math.min(amount, 100));
}

document.getElementById('refreshBtn').addEventListener('click', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
});
['amount','prefix','caseSel','separator'].forEach(id =>
  document.getElementById(id).addEventListener('change', update));
update();
</script>
