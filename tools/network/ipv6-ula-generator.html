<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPv6 ULA Generator</title>
<meta name="description" content="Generate IPv6 Unique Local Addresses (ULA) using a MAC address. Implements the IETF recommended method with SHA-1 hashing.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:16px}
.info{background:#0d1b2a;border:1px solid #1b3a5c;border-radius:8px;padding:12px 16px;color:#a0c4e8;font-size:0.82rem;margin-bottom:20px;line-height:1.5}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;outline:none;margin-bottom:16px;font-family:monospace}
input:focus{border-color:#3b82f6}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #222}
.row:last-child{border-bottom:none}
.rl{color:#aaa;font-size:0.85rem;font-weight:600}
.rv{color:#4da6ff;font-family:monospace;font-size:0.95rem;word-break:break-all;text-align:right;max-width:70%}
.error{color:#f87171;font-size:0.85rem;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="container">
  <h1>IPv6 ULA Generator</h1>
  <p class="desc">Generate IPv6 Unique Local Addresses from a MAC address</p>

  <div class="info">This tool uses the first method suggested by IETF: the current timestamp plus the MAC address, SHA-1 hashed, with the lower 40 bits used to generate a random ULA.</div>

  <div class="card">
    <label for="macInput">MAC address</label>
    <input type="text" id="macInput" value="20:37:06:12:34:56" spellcheck="false">
    <div class="error" id="macError">Invalid MAC address</div>
    <div id="results"></div>
  </div>
</div>
<script>
function normalizeMac(s) {
  return s.trim().replace(/[.:-]/g, '').toLowerCase();
}

function isValidMac(s) {
  const clean = normalizeMac(s);
  return /^[0-9a-f]{12}$/i.test(clean);
}

async function sha1(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-1', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function update() {
  const mac = document.getElementById('macInput').value;
  const err = document.getElementById('macError');
  const res = document.getElementById('results');

  if (!isValidMac(mac)) {
    err.style.display = 'block';
    res.innerHTML = '';
    return;
  }
  err.style.display = 'none';

  const timestamp = Date.now();
  const hash = await sha1(timestamp + normalizeMac(mac));
  const hex40 = hash.substring(30);
  const ula = 'fd' + hex40.substring(0,2) + ':' + hex40.substring(2,6) + ':' + hex40.substring(6);

  res.innerHTML = [
    { label: 'IPv6 ULA', value: ula + '::/48' },
    { label: 'First routable block', value: ula + ':0::/64' },
    { label: 'Last routable block', value: ula + ':ffff::/64' },
  ].map(i => `<div class="row"><span class="rl">${i.label}</span><span class="rv">${i.value}</span></div>`).join('');
}

document.getElementById('macInput').addEventListener('input', update);
update();
</script>
</body>
</html>
