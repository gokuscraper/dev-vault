var _L=_l;

<script>
let ouiDb = null;

function normalizeMac(s) {
  return s.trim().replace(/[.:-]/g, '').toUpperCase().substring(0, 6);
}

function isValidMac(s) {
  return /^[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}$/.test(s.trim());
}

async function loadOuiDb() {
  document.getElementById('loadingMsg').style.display = 'block';
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/oui-data@1.0.0/oui.json');
    ouiDb = await res.json();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('vendorFallback').style.display = 'none';
    update();
  } catch(e) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('vendorFallback').style.display = 'block';
  }
}

function update() {
  const mac = document.getElementById('macInput').value;
  const info = document.getElementById('vendorInfo');
  const err = document.getElementById('errorMsg');
  const copyBtn = document.getElementById('copyBtn');

  if (!isValidMac(mac)) {
    err.style.display = 'block';
    info.innerHTML = '';
    copyBtn.disabled = true;
    return;
  }
  err.style.display = 'none';

  if (!ouiDb) {
    info.innerHTML = '<span class="unknown">Enter a MAC address...</span>';
    copyBtn.disabled = true;
    return;
  }

  const prefix = normalizeMac(mac);
  const vendor = ouiDb[prefix];
  if (vendor) {
    info.innerHTML = vendor.replace(/\n/g, '<br>');
    copyBtn.disabled = false;
  } else {
    info.innerHTML = '<span class="unknown">Unknown vendor for this address</span>';
    copyBtn.disabled = true;
  }
}

document.getElementById('macInput').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('vendorInfo').textContent;
  if (text) navigator.clipboard.writeText(text);
});

loadOuiDb();
</script>
