<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAC Address Lookup</title>
<meta name="description" content="Look up the vendor/manufacturer of a MAC address. Uses the IEEE OUI database.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;outline:none;margin-bottom:12px;font-family:monospace}
input:focus{border-color:#3b82f6}
.vendor-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px 16px;font-size:0.9rem;color:#e6e6e6;min-height:40px;margin-bottom:12px;line-height:1.5}
.vendor-label{color:#888;font-size:0.8rem;margin-bottom:6px;font-weight:600}
.unknown{color:#666;font-style:italic}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:disabled{opacity:.4;cursor:default}
button:hover:not(:disabled){background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center}
.loading{color:#888;font-size:0.85rem;margin-bottom:8px;display:none}
.error-msg{color:#f87171;font-size:0.85rem;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="container">
  <h1>MAC Address Lookup</h1>
  <p class="desc">Look up the vendor/manufacturer from a MAC address</p>
  <div class="card">
    <label for="macInput">MAC address</label>
    <input type="text" id="macInput" value="20:37:06:12:34:56" spellcheck="false">
    <div class="loading" id="loadingMsg">Loading OUI database...</div>
    <div class="error-msg" id="errorMsg">Invalid MAC address format</div>
    <div class="vendor-label">Vendor info</div>
    <div class="vendor-box" id="vendorInfo"><span class="unknown">Loading...</span></div>
    <div class="vendor-box" id="vendorFallback" style="display:none;border-color:#7a2a2a;color:#f87171">
      OUI database could not be loaded. You can try again later.
    </div>
    <div class="flex-center">
      <button id="copyBtn" disabled>Copy vendor info</button>
    </div>
  </div>
</div>
<script>
let ouiDb = null;

function normalizeMac(s) {
  return s.trim().replace(/[.:-]/g, '').toUpperCase().substring(0, 6);
}

function isValidMac(s) {
  return /^[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}([.:-]?)[0-9A-Fa-f]{2}$/.test(s.trim());
}

async function loadOuiDb() {
  document.getElementById('loadingMsg').style.display = 'block';
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/oui-data@1.0.0/oui.json');
    ouiDb = await res.json();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('vendorFallback').style.display = 'none';
    update();
  } catch(e) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('vendorFallback').style.display = 'block';
  }
}

function update() {
  const mac = document.getElementById('macInput').value;
  const info = document.getElementById('vendorInfo');
  const err = document.getElementById('errorMsg');
  const copyBtn = document.getElementById('copyBtn');

  if (!isValidMac(mac)) {
    err.style.display = 'block';
    info.innerHTML = '';
    copyBtn.disabled = true;
    return;
  }
  err.style.display = 'none';

  if (!ouiDb) {
    info.innerHTML = '<span class="unknown">Enter a MAC address...</span>';
    copyBtn.disabled = true;
    return;
  }

  const prefix = normalizeMac(mac);
  const vendor = ouiDb[prefix];
  if (vendor) {
    info.innerHTML = vendor.replace(/\n/g, '<br>');
    copyBtn.disabled = false;
  } else {
    info.innerHTML = '<span class="unknown">Unknown vendor for this address</span>';
    copyBtn.disabled = true;
  }
}

document.getElementById('macInput').addEventListener('input', update);
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('vendorInfo').textContent;
  if (text) navigator.clipboard.writeText(text);
});

loadOuiDb();
</script>
</body>
</html>
