<!DOCTYPE html>
<html tk="title_ipv4_address_converter" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPv4 Address Converter</title>
<meta name="description" content="Convert IPv4 addresses between Decimal, Hexadecimal, Binary, and IPv6 mapped formats.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input[type=text]{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;outline:none;margin-bottom:16px;font-family:monospace}
input:focus{border-color:#3b82f6}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #222}
.row:last-child{border-bottom:none}
.rl{color:#aaa;font-size:0.85rem;font-weight:600}
.rv{color:#fff;font-family:monospace;font-size:0.95rem;word-break:break-all;text-align:right;max-width:70%}
.error{color:#f87171;font-size:0.85rem;margin-bottom:10px;display:none}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_ipv4_address_converter" ti="h1_ipv4_address_converter">IPv4 Address Converter</h1>
  <p class="desc" ti="subtitle_convert_an_ipv4_address_b">Convert an IPv4 address between Decimal, Hexadecimal, Binary, and IPv6 formats</p>

  <div class="card">
    <label for="ipInput" ti="label_ipv4_address">IPv4 address</label>
    <input type="text" id="ipInput" value="192.168.1.1" spellcheck="false">
    <div class="error" id="errorMsg">Invalid IPv4 address</div>
    <div id="results"></div>
  </div>
</div>

<script>var _LANG={'title_ipv4_address_converter':["IPv4 Address Converter", "IPv4地址转换器"],'metadesc_convert_ipv4_addresses_be':["Convert IPv4 addresses between Decimal, Hexadecimal, Binary, and IPv6 mapped formats.", "在十进制、十六进制、二进制和 IPv6 映射格式之间转换 IPv4 地址。"],'h1_ipv4_address_converter':["IPv4 Address Converter", "IPv4地址转换器"],'subtitle_convert_an_ipv4_address_b':["Convert an IPv4 address between Decimal, Hexadecimal, Binary, and IPv6 formats", "在十进制、十六进制、二进制和 IPv6 格式之间转换 IPv4 地址"],'label_ipv4_address':["IPv4 address", "IPv4 地址"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function isValidIpv4(ip) {
  return /^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.){3}(25[0-5]|(2[0-4]|1\d|[1-9]|)\d)$/.test(ip.trim());
}

function ipv4ToInt(ip) {
  return ip.trim().split('.').reduce((acc, part, i) => acc + parseInt(part) * Math.pow(256, 3 - i), 0);
}

function convertBase(value, fromBase, toBase) {
  return parseInt(value, fromBase).toString(toBase);
}

function ipv4ToIpv6(ip, prefix) {
  prefix = prefix || '0000:0000:0000:0000:0000:ffff:';
  const hexParts = ip.trim().split('.').map(p => parseInt(p).toString(16).padStart(2, '0'));
  const chunks = [];
  for (let i = 0; i < hexParts.length; i += 2) chunks.push(hexParts[i] + hexParts[i+1]);
  return prefix + chunks.join(':');
}

function update() {
  const ip = document.getElementById('ipInput').value;
  const err = document.getElementById('errorMsg');
  const res = document.getElementById('results');

  if (!isValidIpv4(ip)) {
    err.style.display = 'block';
    res.innerHTML = '';
    return;
  }
  err.style.display = 'none';

  const dec = ipv4ToInt(ip);
  const items = [
    { label: 'Decimal', value: String(dec) },
    { label: 'Hexadecimal', value: convertBase(String(dec), 10, 16).toUpperCase() },
    { label: 'Binary', value: convertBase(String(dec), 10, 2) },
    { label: 'IPv6 (mapped)', value: ipv4ToIpv6(ip) },
    { label: 'IPv6 (short)', value: ipv4ToIpv6(ip, '::ffff:') },
  ];
  res.innerHTML = items.map(i => `<div class="row"><span class="rl">${i.label}</span><span class="rv">${i.value}</span></div>`).join('');
}

document.getElementById('ipInput').addEventListener('input', update);
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
