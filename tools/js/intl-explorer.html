<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intl API Explorer</title>
<meta name="description" content="Interactive explorer for JavaScript Intl API — NumberFormat, DateTimeFormat, RelativeTimeFormat, ListFormat, Segmenter, and more.">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #6e9eff;
  --accent-dim: #4a7ad4;
  --green: #4caf50;
  --red: #ef5350;
  --orange: #ff9800;
  --purple: #b388ff;
  --radius: 8px;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; }
header { text-align: center; padding: 2rem 1rem; border-bottom: 1px solid var(--border); }
header h1 { font-size: 2rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header p { color: var(--text-dim); margin-top: 0.5rem; }
nav { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; padding: 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
nav button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
nav button:hover { border-color: var(--accent); }
nav button.active { background: var(--accent); color: #000; border-color: var(--accent); }
main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card h3 { color: var(--accent); margin-bottom: 0.75rem; font-size: 1.1rem; }
.card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 0.75rem; }
.output { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; font-family: var(--font-mono); font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
button.run { background: var(--accent); color: #000; border: none; padding: 0.5rem 1.25rem; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; transition: background 0.2s; }
button.run:hover { background: var(--accent-dim); }
select, input[type="text"], input[type="number"] { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.6rem; border-radius: var(--radius); font-size: 0.85rem; font-family: var(--font-mono); }
select:focus, input:focus { outline: none; border-color: var(--accent); }
.row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
.row label { color: var(--text-dim); font-size: 0.85rem; min-width: 70px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--accent); font-weight: 600; }
.tag { display: inline-block; padding: 0.2rem 0.5rem; background: var(--surface-2); border-radius: 4px; margin: 0.15rem; font-size: 0.8rem; border: 1px solid var(--border); }
.seg-word { background: rgba(110,158,255,0.15); border-color: rgba(110,158,255,0.3); }
.seg-sentence { background: rgba(76,175,80,0.15); border-color: rgba(76,175,80,0.3); }
.seg-grapheme { background: rgba(179,136,255,0.15); border-color: rgba(179,136,255,0.3); }
@media (max-width: 700px) { nav button { font-size: 0.75rem; padding: 0.4rem 0.75rem; } }
</style>
</head>
<body>
<header>
  <h1><span>Intl</span> API Explorer</h1>
  <p>Internationalization APIs for numbers, dates, text, and more</p>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<script>
function ln(label, value, cls='value') {
  return `<span class="label">${esc(label)}: </span><span class="${cls}">${esc(String(value))}</span>\n`;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const LOCALES = ['en-US','ja-JP','de-DE','fr-FR','zh-CN','ko-KR','ar-SA','hi-IN','pt-BR','ru-RU','es-ES','th-TH'];
function localeOpts() { return LOCALES.map(l => `<option value="${l}">${l}</option>`).join(''); }

const sections = [
  { id: 'number', label: 'NumberFormat' },
  { id: 'datetime', label: 'DateTimeFormat' },
  { id: 'relative', label: 'RelativeTime' },
  { id: 'list', label: 'ListFormat' },
  { id: 'plural', label: 'PluralRules' },
  { id: 'segmenter', label: 'Segmenter' },
  { id: 'display', label: 'DisplayNames' },
  { id: 'grid', label: 'Locale Grid' },
];

const nav = document.getElementById('nav');
sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.label;
  btn.onclick = () => {
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById('sec-' + s.id).classList.add('active');
    document.querySelectorAll('nav button').forEach((b, j) => b.classList.toggle('active', j === i));
  };
  if (i === 0) btn.classList.add('active');
  nav.appendChild(btn);
});

const main = document.getElementById('main');

// ── NumberFormat ──
const sec1 = document.createElement('div');
sec1.id = 'sec-number';
sec1.className = 'section active';
sec1.innerHTML = `
<div class="card">
  <h3>Intl.NumberFormat</h3>
  <p>Format numbers as currency, percentages, units, and more across locales.</p>
  <div class="row">
    <label>Number</label><input type="number" id="nfNum" value="1234567.89" step="any" style="width:150px">
    <label>Locale</label><select id="nfLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runNumberFormat()">Format</button>
  <div class="output" id="nfOut"></div>
</div>
<div class="card">
  <h3>Currency Comparison</h3>
  <p>See how the same amount looks in different currencies.</p>
  <button class="run" onclick="runCurrency()">Compare Currencies</button>
  <div class="output" id="currOut"></div>
</div>`;
main.appendChild(sec1);

function runNumberFormat() {
  const o = document.getElementById('nfOut');
  const num = +document.getElementById('nfNum').value;
  const locale = document.getElementById('nfLocale').value;
  const formats = [
    { label: 'Decimal', opts: {} },
    { label: 'Currency (USD)', opts: { style: 'currency', currency: 'USD' } },
    { label: 'Currency (EUR)', opts: { style: 'currency', currency: 'EUR' } },
    { label: 'Currency (JPY)', opts: { style: 'currency', currency: 'JPY' } },
    { label: 'Percent', opts: { style: 'percent' } },
    { label: 'Unit (km)', opts: { style: 'unit', unit: 'kilometer' } },
    { label: 'Unit (kg)', opts: { style: 'unit', unit: 'kilogram' } },
    { label: 'Unit (°C)', opts: { style: 'unit', unit: 'celsius' } },
    { label: 'Compact (short)', opts: { notation: 'compact', compactDisplay: 'short' } },
    { label: 'Compact (long)', opts: { notation: 'compact', compactDisplay: 'long' } },
    { label: 'Scientific', opts: { notation: 'scientific' } },
    { label: 'Engineering', opts: { notation: 'engineering' } },
    { label: 'Accounting', opts: { style: 'currency', currency: 'USD', currencySign: 'accounting' } },
    { label: 'Min 2 / Max 4 frac', opts: { minimumFractionDigits: 2, maximumFractionDigits: 4 } },
    { label: 'Sig digits (3)', opts: { maximumSignificantDigits: 3 } },
    { label: 'Grouping off', opts: { useGrouping: false } },
  ];
  let result = ln('Input', num) + ln('Locale', locale) + '\n';
  for (const f of formats) {
    try {
      const formatted = new Intl.NumberFormat(locale, f.opts).format(num);
      result += ln(f.label.padEnd(25), formatted);
    } catch(e) { result += ln(f.label.padEnd(25), e.message, 'error'); }
  }
  o.innerHTML = result;
}

function runCurrency() {
  const o = document.getElementById('currOut');
  const amount = 1234.56;
  const currencies = ['USD','EUR','GBP','JPY','CNY','KRW','INR','BRL','RUB','CHF','AUD','CAD'];
  let result = '';
  for (const cur of currencies) {
    const row = LOCALES.slice(0, 4).map(loc => {
      try { return new Intl.NumberFormat(loc, {style:'currency',currency:cur}).format(amount); }
      catch { return 'N/A'; }
    });
    result += ln(cur, row.join('  |  '));
  }
  o.innerHTML = result;
}

// ── DateTimeFormat ──
const sec2 = document.createElement('div');
sec2.id = 'sec-datetime';
sec2.className = 'section';
sec2.innerHTML = `
<div class="card">
  <h3>Intl.DateTimeFormat</h3>
  <p>Format dates and times with extensive options.</p>
  <div class="row">
    <label>Locale</label><select id="dtLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runDateTimeFormat()">Format Current Date</button>
  <div class="output" id="dtOut"></div>
</div>
<div class="card">
  <h3>Calendar Systems</h3>
  <button class="run" onclick="runCalendarDTF()">Compare Calendars</button>
  <div class="output" id="calDtOut"></div>
</div>`;
main.appendChild(sec2);

function runDateTimeFormat() {
  const o = document.getElementById('dtOut');
  const locale = document.getElementById('dtLocale').value;
  const now = new Date();
  const styles = [
    { label: 'full', opts: { dateStyle: 'full' } },
    { label: 'long', opts: { dateStyle: 'long' } },
    { label: 'medium', opts: { dateStyle: 'medium' } },
    { label: 'short', opts: { dateStyle: 'short' } },
    { label: 'full + time', opts: { dateStyle: 'full', timeStyle: 'long' } },
    { label: 'time only (medium)', opts: { timeStyle: 'medium' } },
    { label: 'weekday + month + day', opts: { weekday: 'long', month: 'long', day: 'numeric' } },
    { label: 'numeric all', opts: { year: 'numeric', month: '2-digit', day: '2-digit' } },
    { label: '2-digit year', opts: { year: '2-digit', month: 'short', day: 'numeric' } },
    { label: 'hour12: true', opts: { hour: '2-digit', minute: '2-digit', hour12: true } },
    { label: 'hour12: false', opts: { hour: '2-digit', minute: '2-digit', hour12: false } },
    { label: 'era', opts: { year: 'numeric', era: 'long' } },
    { label: 'timeZoneName short', opts: { timeStyle: 'short', timeZoneName: 'short' } },
    { label: 'timeZoneName long', opts: { hour: 'numeric', timeZoneName: 'long' } },
  ];
  let result = ln('Date', now.toISOString()) + ln('Locale', locale) + '\n';
  for (const s of styles) {
    try {
      result += ln(s.label.padEnd(25), new Intl.DateTimeFormat(locale, s.opts).format(now));
    } catch(e) { result += ln(s.label.padEnd(25), e.message, 'error'); }
  }
  o.innerHTML = result;
}

function runCalendarDTF() {
  const o = document.getElementById('calDtOut');
  const now = new Date();
  const calendars = ['gregory','japanese','chinese','hebrew','islamic','persian','indian','buddhist','coptic','ethiopic'];
  let result = '';
  for (const cal of calendars) {
    try {
      const fmt = new Intl.DateTimeFormat('en-US', { calendar: cal, dateStyle: 'full' });
      result += ln(cal.padEnd(14), fmt.format(now));
    } catch(e) { result += ln(cal.padEnd(14), e.message, 'error'); }
  }
  o.innerHTML = result;
}

// ── RelativeTimeFormat ──
const sec3 = document.createElement('div');
sec3.id = 'sec-relative';
sec3.className = 'section';
sec3.innerHTML = `
<div class="card">
  <h3>Intl.RelativeTimeFormat</h3>
  <p>Format relative time strings like "3 days ago" or "in 2 hours".</p>
  <div class="row">
    <label>Value</label><input type="number" id="rtVal" value="-3" style="width:80px">
    <label>Unit</label>
    <select id="rtUnit">
      <option value="second">second</option>
      <option value="minute">minute</option>
      <option value="hour">hour</option>
      <option value="day" selected>day</option>
      <option value="week">week</option>
      <option value="month">month</option>
      <option value="quarter">quarter</option>
      <option value="year">year</option>
    </select>
    <label>Locale</label><select id="rtLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runRelativeTime()">Format</button>
  <div class="output" id="rtOut"></div>
</div>
<div class="card">
  <h3>All Units at Once</h3>
  <button class="run" onclick="runAllRelative()">Show All Units (-3 to +3)</button>
  <div class="output" id="rtAllOut"></div>
</div>`;
main.appendChild(sec3);

function runRelativeTime() {
  const o = document.getElementById('rtOut');
  const val = +document.getElementById('rtVal').value;
  const unit = document.getElementById('rtUnit').value;
  const locale = document.getElementById('rtLocale').value;
  let result = '';
  const styles = [
    { label: 'long + always', opts: { style: 'long', numeric: 'always' } },
    { label: 'long + auto', opts: { style: 'long', numeric: 'auto' } },
    { label: 'short + always', opts: { style: 'short', numeric: 'always' } },
    { label: 'narrow + always', opts: { style: 'narrow', numeric: 'always' } },
  ];
  for (const s of styles) {
    try {
      const fmt = new Intl.RelativeTimeFormat(locale, s.opts);
      result += ln(s.label.padEnd(25), fmt.format(val, unit));
    } catch(e) { result += ln(s.label.padEnd(25), e.message, 'error'); }
  }
  o.innerHTML = result;
}

function runAllRelative() {
  const o = document.getElementById('rtAllOut');
  const locale = document.getElementById('rtLocale').value;
  const units = ['second','minute','hour','day','week','month','quarter','year'];
  const fmt = new Intl.RelativeTimeFormat(locale, { numeric: 'auto' });
  let result = '';
  for (const u of units) {
    const vals = [-3, -2, -1, 0, 1, 2, 3].map(v => {
      try { return fmt.format(v, u); } catch { return '?'; }
    });
    result += ln(u.padEnd(10), vals.join(' | '));
  }
  o.innerHTML = result;
}

// ── ListFormat ──
const sec4 = document.createElement('div');
sec4.id = 'sec-list';
sec4.className = 'section';
sec4.innerHTML = `
<div class="card">
  <h3>Intl.ListFormat</h3>
  <p>Format lists of items with proper conjunction/disjunction for each locale.</p>
  <div class="row">
    <label>Items</label><input type="text" id="lfItems" value="Apple, Banana, Cherry" style="width:300px">
    <label>Locale</label><select id="lfLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runListFormat()">Format</button>
  <div class="output" id="lfOut"></div>
</div>`;
main.appendChild(sec4);

function runListFormat() {
  const o = document.getElementById('lfOut');
  const items = document.getElementById('lfItems').value.split(',').map(s => s.trim()).filter(Boolean);
  const locale = document.getElementById('lfLocale').value;
  const configs = [
    { label: 'conjunction + long', opts: { type: 'conjunction', style: 'long' } },
    { label: 'conjunction + short', opts: { type: 'conjunction', style: 'short' } },
    { label: 'conjunction + narrow', opts: { type: 'conjunction', style: 'narrow' } },
    { label: 'disjunction + long', opts: { type: 'disjunction', style: 'long' } },
    { label: 'disjunction + short', opts: { type: 'disjunction', style: 'short' } },
    { label: 'unit + long', opts: { type: 'unit', style: 'long' } },
    { label: 'unit + short', opts: { type: 'unit', style: 'short' } },
    { label: 'unit + narrow', opts: { type: 'unit', style: 'narrow' } },
  ];
  let result = ln('Items', JSON.stringify(items)) + ln('Locale', locale) + '\n';
  for (const c of configs) {
    try {
      result += ln(c.label.padEnd(25), new Intl.ListFormat(locale, c.opts).format(items));
    } catch(e) { result += ln(c.label.padEnd(25), e.message, 'error'); }
  }
  o.innerHTML = result;
}

// ── PluralRules ──
const sec5 = document.createElement('div');
sec5.id = 'sec-plural';
sec5.className = 'section';
sec5.innerHTML = `
<div class="card">
  <h3>Intl.PluralRules</h3>
  <p>Determine the plural category for a number in different locales.</p>
  <div class="row">
    <label>Locale</label><select id="prLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runPluralRules()">Show Plural Categories</button>
  <div class="output" id="prOut"></div>
</div>`;
main.appendChild(sec5);

function runPluralRules() {
  const o = document.getElementById('prOut');
  const locale = document.getElementById('prLocale').value;
  const pr = new Intl.PluralRules(locale);
  const prOrd = new Intl.PluralRules(locale, { type: 'ordinal' });
  const nums = [0, 0.5, 1, 2, 3, 4, 5, 10, 11, 12, 20, 21, 100, 101, 1000];
  let result = ln('Locale', locale) + '\n';
  result += ln('── Cardinal (type: "cardinal") ──', '', 'label') + '\n';
  for (const n of nums) {
    result += ln(String(n).padEnd(8), pr.select(n));
  }
  result += '\n' + ln('── Ordinal (type: "ordinal") ──', '', 'label') + '\n';
  for (const n of [1, 2, 3, 4, 11, 12, 13, 21, 22, 23]) {
    result += ln(String(n).padEnd(8), prOrd.select(n));
  }
  result += '\n' + ln('Usage example', '', 'label');
  result += `const pr = new Intl.PluralRules('${locale}');\n`;
  result += `const msgs = { one: 'item', other: 'items' };\n`;
  result += `const count = 5;\n`;
  result += `\`\${count} \${msgs[pr.select(count)]}\` → "${5} ${({one:'item',other:'items'})[pr.select(5)]}"`;
  o.innerHTML = result;
}

// ── Segmenter ──
const sec6 = document.createElement('div');
sec6.id = 'sec-segmenter';
sec6.className = 'section';
sec6.innerHTML = `
<div class="card">
  <h3>Intl.Segmenter</h3>
  <p>Segment text into words, sentences, or grapheme clusters — essential for CJK languages and emoji.</p>
  <div class="row">
    <label>Text</label><input type="text" id="segText" value="Hello, World! This is a test. 日本語のテスト。👨‍👩‍👧‍👦🏳️‍🌈" style="width:100%;max-width:500px">
  </div>
  <div class="row">
    <label>Locale</label><select id="segLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runSegmenter()">Segment</button>
  <div id="segOut"></div>
</div>`;
main.appendChild(sec6);

function runSegmenter() {
  const container = document.getElementById('segOut');
  const text = document.getElementById('segText').value;
  const locale = document.getElementById('segLocale').value;

  if (typeof Intl.Segmenter === 'undefined') {
    container.innerHTML = '<div class="output"><span class="error">Intl.Segmenter is not supported in this browser</span></div>';
    return;
  }

  let html = '';
  for (const granularity of ['word', 'sentence', 'grapheme']) {
    const seg = new Intl.Segmenter(locale, { granularity });
    const segments = [...seg.segment(text)];
    const cls = `seg-${granularity}`;

    html += `<div style="margin-bottom:1rem"><strong style="color:var(--accent)">${granularity} (${segments.length} segments):</strong><div style="margin-top:0.5rem">`;
    for (const s of segments) {
      const display = s.segment.replace(/\n/g, '\\n').replace(/ /g, '·');
      const extra = s.isWordLike !== undefined ? (s.isWordLike ? ' [word]' : '') : '';
      html += `<span class="tag ${cls}" title="index: ${s.index}">${esc(display)}${extra}</span>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

// ── DisplayNames ──
const sec7 = document.createElement('div');
sec7.id = 'sec-display';
sec7.className = 'section';
sec7.innerHTML = `
<div class="card">
  <h3>Intl.DisplayNames</h3>
  <p>Get human-readable names for languages, regions, currencies, scripts, and more.</p>
  <div class="row">
    <label>Locale</label><select id="dnLocale">${localeOpts()}</select>
  </div>
  <button class="run" onclick="runDisplayNames()">Show Names</button>
  <div class="output" id="dnOut"></div>
</div>`;
main.appendChild(sec7);

function runDisplayNames() {
  const o = document.getElementById('dnOut');
  const locale = document.getElementById('dnLocale').value;
  let result = '';

  // Languages
  result += ln('── Languages ──', '', 'label') + '\n';
  try {
    const dn = new Intl.DisplayNames(locale, { type: 'language' });
    for (const code of ['en','ja','de','fr','zh','ko','ar','hi','pt','ru','es','th']) {
      result += ln(code.padEnd(6), dn.of(code));
    }
  } catch(e) { result += ln('Error', e.message, 'error'); }

  // Regions
  result += '\n' + ln('── Regions ──', '', 'label') + '\n';
  try {
    const dn = new Intl.DisplayNames(locale, { type: 'region' });
    for (const code of ['US','JP','DE','FR','CN','KR','GB','IN','BR','RU','AU','CA']) {
      result += ln(code.padEnd(6), dn.of(code));
    }
  } catch(e) { result += ln('Error', e.message, 'error'); }

  // Currencies
  result += '\n' + ln('── Currencies ──', '', 'label') + '\n';
  try {
    const dn = new Intl.DisplayNames(locale, { type: 'currency' });
    for (const code of ['USD','EUR','GBP','JPY','CNY','KRW','INR','BRL','RUB','CHF']) {
      result += ln(code.padEnd(6), dn.of(code));
    }
  } catch(e) { result += ln('Error', e.message, 'error'); }

  // Scripts
  result += '\n' + ln('── Scripts ──', '', 'label') + '\n';
  try {
    const dn = new Intl.DisplayNames(locale, { type: 'script' });
    for (const code of ['Latn','Jpan','Hans','Hant','Cyrl','Arab','Deva','Kore','Thai']) {
      result += ln(code.padEnd(6), dn.of(code));
    }
  } catch(e) { result += ln('Error', e.message, 'error'); }

  o.innerHTML = result;
}

// ── Locale Grid ──
const sec8 = document.createElement('div');
sec8.id = 'sec-grid';
sec8.className = 'section';
sec8.innerHTML = `
<div class="card">
  <h3>Locale Comparison Grid</h3>
  <p>See the same value formatted across all locales simultaneously.</p>
  <button class="run" onclick="runLocaleGrid()">Generate Grid</button>
  <div id="gridOut" style="overflow-x:auto"></div>
</div>`;
main.appendChild(sec8);

function runLocaleGrid() {
  const container = document.getElementById('gridOut');
  const now = new Date();
  const num = 1234567.89;

  let html = '<table><thead><tr><th>Locale</th><th>Number</th><th>Currency</th><th>Date</th><th>Relative (-1 day)</th><th>List</th></tr></thead><tbody>';
  for (const loc of LOCALES) {
    let numFmt, curFmt, dateFmt, relFmt, listFmt;
    try { numFmt = new Intl.NumberFormat(loc).format(num); } catch { numFmt = '?'; }
    try { curFmt = new Intl.NumberFormat(loc, {style:'currency',currency:'USD'}).format(num); } catch { curFmt = '?'; }
    try { dateFmt = new Intl.DateTimeFormat(loc, {dateStyle:'medium'}).format(now); } catch { dateFmt = '?'; }
    try { relFmt = new Intl.RelativeTimeFormat(loc, {numeric:'auto'}).format(-1, 'day'); } catch { relFmt = '?'; }
    try { listFmt = new Intl.ListFormat(loc, {type:'conjunction'}).format(['A','B','C']); } catch { listFmt = '?'; }
    html += `<tr><td style="color:var(--accent);font-weight:600">${loc}</td><td>${esc(numFmt)}</td><td>${esc(curFmt)}</td><td>${esc(dateFmt)}</td><td>${esc(relFmt)}</td><td>${esc(listFmt)}</td></tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

// Auto-run first
runNumberFormat();
</script>
