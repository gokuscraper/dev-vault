*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-surface: #1a1a1a;
  --bg-input: #222222;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #e6e6e6;
  --text-secondary: #999;
  --text-dim: #666;
  --accent: #818cf8;
  --accent-hover: #6366f1;
  --accent-glow: rgba(129, 140, 248, 0.15);
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html { font-size: 14px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg-elevated);
}
.header h1 { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.header h1 .icon {
  width: 28px; height: 28px; background: var(--accent); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
}
.badge { font-size: 0.75rem; padding: 3px 8px; background: var(--accent-glow); color: var(--accent); border-radius: 99px; font-weight: 600; }
.header-right { display: flex; gap: 12px; align-items: center; }
.header-right a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }

/* Layout */
.layout { display: grid; grid-template-columns: 340px 1fr 1fr; height: calc(100vh - 57px); }

/* Controls Panel */
.controls-panel {
  display: flex; flex-direction: column; border-right: 1px solid var(--border);
  overflow-y: auto; background: var(--bg-elevated);
}
.section-title {
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-dim); padding: 12px 16px 6px; user-select: none;
}
.control-group { padding: 6px 16px 12px; border-bottom: 1px solid var(--border); }
.control-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.control-row:last-child { margin-bottom: 0; }
.control-row label { font-size: 0.8rem; color: var(--text-secondary); min-width: 80px; flex-shrink: 0; }
.control-row input, .control-row select {
  flex: 1; font-family: var(--font); font-size: 0.8rem;
  padding: 6px 10px; border-radius: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); outline: none;
}
.control-row input:focus, .control-row select:focus { border-color: var(--accent); }
.control-row input[type="range"] { padding: 0; border: none; background: none; accent-color: var(--accent); }
.control-row .val-display { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); min-width: 50px; text-align: right; }

/* Presets */
.presets { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px 12px; border-bottom: 1px solid var(--border); }
.preset-btn {
  padding: 5px 12px; border-radius: 99px; font-family: var(--font);
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary);
  transition: all 0.15s;
}
.preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.preset-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* Keyframes */
.keyframes-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 6px; }
.keyframes-header h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
.btn-sm {
  padding: 4px 10px; border-radius: 6px; font-family: var(--font);
  font-size: 0.7rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--accent); background: var(--accent-glow); color: var(--accent);
}
.btn-sm:hover { background: var(--accent); color: #fff; }

.keyframe-list { padding: 0 16px 12px; }
.kf-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px; overflow: hidden;
}
.kf-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: var(--bg-input); cursor: pointer;
}
.kf-header span { font-size: 0.8rem; font-weight: 600; color: var(--text); }
.kf-header .kf-offset { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); }
.kf-remove {
  width: 22px; height: 22px; border-radius: 4px; border: none;
  background: rgba(239,68,68,0.15); color: var(--red); cursor: pointer;
  font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
}
.kf-remove:hover { background: var(--red); color: #fff; }
.kf-body { padding: 10px 12px; }
.kf-prop-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.kf-prop-row:last-child { margin-bottom: 0; }
.kf-prop-row select, .kf-prop-row input {
  font-family: var(--font); font-size: 0.75rem;
  padding: 4px 8px; border-radius: 4px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); outline: none;
}
.kf-prop-row select { width: 120px; }
.kf-prop-row input { flex: 1; }
.kf-prop-row input:focus, .kf-prop-row select:focus { border-color: var(--accent); }
.kf-add-prop {
  font-size: 0.7rem; color: var(--accent); background: none; border: none;
  cursor: pointer; padding: 4px 0; font-family: var(--font); font-weight: 600;
}
.kf-add-prop:hover { text-decoration: underline; }

/* Preview Panel */
.preview-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg-elevated);
}
.panel-header h3 { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }

.preview-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: var(--bg); position: relative; overflow: hidden;
}
.preview-area .grid-bg {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 24px 24px; opacity: 0.5;
}

#previewTarget {
  width: 100px; height: 100px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  position: relative; z-index: 1; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.preview-controls {
  display: flex; gap: 8px; padding: 10px 16px;
  border-top: 1px solid var(--border); background: var(--bg-elevated);
}
.btn-play {
  flex: 1; padding: 8px 16px; border-radius: var(--radius); font-family: var(--font);
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  border: none; background: var(--accent); color: #fff; transition: background 0.15s;
}
.btn-play:hover { background: var(--accent-hover); }
.btn-outline {
  padding: 8px 14px; border-radius: var(--radius); font-family: var(--font);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text);
}
.btn-outline.copied { border-color: var(--green); color: var(--green); }

/* Code Panel */
.code-panel { display: flex; flex-direction: column; }
.code-output { flex: 1; overflow: auto; padding: 16px; background: var(--bg); }
.code-output pre {
  font-family: var(--mono); font-size: 0.8rem; line-height: 1.7; white-space: pre-wrap;
  tab-size: 2;
}
.kw { color: #c084fc; }
.fn { color: #67e8f9; }
.str { color: #86efac; }
.num { color: #fbbf24; }
.prop { color: #93c5fd; }
.cmt { color: var(--text-dim); font-style: italic; }
.punc { color: var(--text-secondary); }

/* Timeline */
.timeline-bar {
  height: 40px; border-top: 1px solid var(--border); background: var(--bg-elevated);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.timeline-track {
  flex: 1; height: 6px; background: var(--bg-input); border-radius: 3px;
  position: relative; cursor: pointer;
}
.timeline-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  width: 0%; transition: none;
}
.timeline-markers { position: absolute; inset: -6px 0; }
.timeline-marker {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg-elevated);
  top: 50%; transform: translate(-50%, -50%);
}
.timeline-time { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); min-width: 60px; }

/* Info bar */
.info-bar {
  padding: 10px 16px; border-top: 1px solid var(--border);
  background: var(--bg-elevated); font-size: 0.8rem; color: var(--text-secondary);
  display: flex; gap: 16px; align-items: center;
}
.tag-green { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: rgba(34,197,94,0.15); color: var(--green); }

/* Target shape selector */
.shape-btns { display: flex; gap: 4px; }
.shape-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-input); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; color: var(--text-secondary);
}
.shape-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

@media (max-width: 1100px) {
  .layout { grid-template-columns: 1fr 1fr; }
  .controls-panel { display: none; }
}
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .preview-panel { min-height: 300px; }
}

        { offset: 0.8, props: { transform: 'translateY(0)' } },

        { offset: 1, props: { transform: 'translateY(0)' } },
      ],
      options: { duration: 1200, easing: 'ease', iterations: 'Infinity', direction: 'normal', fill: 'none', delay: 0, composite: 'replace' },
    },
    shake: {
      keyframes: [
        { offset: 0, props: { transform: 'translateX(0)' } },
        { offset: 0.1, props: { transform: 'translateX(-10px)' } },
        { offset: 0.2, props: { transform: 'translateX(10px)' } },
        { offset: 0.3, props: { transform: 'translateX(-10px)' } },
        { offset: 0.4, props: { transform: 'translateX(10px)' } },
        { offset: 0.5, props: { transform: 'translateX(-6px)' } },
        { offset: 0.6, props: { transform: 'translateX(6px)' } },
        { offset: 0.7, props: { transform: 'translateX(-3px)' } },
        { offset: 0.8, props: { transform: 'translateX(3px)' } },
        { offset: 1, props: { transform: 'translateX(0)' } },
      ],
      options: { duration: 600, easing: 'ease-out', iterations: 1, direction: 'normal', fill: 'none', delay: 0, composite: 'replace' },
    },
    pulse: {
      keyframes: [
        { offset: 0, props: { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(129,140,248,0.7)' } },
        { offset: 0.5, props: { transform: 'scale(1.05)', boxShadow: '0 0 0 20px rgba(129,140,248,0)' } },
        { offset: 1, props: { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(129,140,248,0)' } },
      ],
      options: { duration: 1500, easing: 'ease-in-out', iterations: 'Infinity', direction: 'normal', fill: 'none', delay: 0, composite: 'replace' },
    },
    flip: {
      keyframes: [
        { offset: 0, props: { transform: 'perspective(400px) rotateY(0deg)' } },
        { offset: 0.4, props: { transform: 'perspective(400px) rotateY(170deg)' } },
        { offset: 0.5, props: { transform: 'perspective(400px) rotateY(190deg)' } },
        { offset: 0.8, props: { transform: 'perspective(400px) rotateY(360deg)' } },
        { offset: 1, props: { transform: 'perspective(400px) rotateY(360deg)' } },
      ],
      options: { duration: 1000, easing: 'ease-in-out', iterations: 1, direction: 'normal', fill: 'forwards', delay: 0, composite: 'replace' },
    },
    colorShift: {
      keyframes: [
        { offset: 0, props: { backgroundColor: '#818cf8', borderRadius: '12px' } },
        { offset: 0.25, props: { backgroundColor: '#f472b6', borderRadius: '50%' } },
        { offset: 0.5, props: { backgroundColor: '#34d399', borderRadius: '20%' } },
        { offset: 0.75, props: { backgroundColor: '#fbbf24', borderRadius: '50%' } },
        { offset: 1, props: { backgroundColor: '#818cf8', borderRadius: '12px' } },
      ],
      options: { duration: 3000, easing: 'ease-in-out', iterations: 'Infinity', direction: 'normal', fill: 'none', delay: 0, composite: 'replace' },
    },
    swing: {
      keyframes: [
        { offset: 0, props: { transform: 'rotate(0deg)' } },
        { offset: 0.2, props: { transform: 'rotate(15deg)' } },
        { offset: 0.4, props: { transform: 'rotate(-10deg)' } },
        { offset: 0.6, props: { transform: 'rotate(5deg)' } },
        { offset: 0.8, props: { transform: 'rotate(-5deg)' } },
        { offset: 1, props: { transform: 'rotate(0deg)' } },
      ],
      options: { duration: 1000, easing: 'ease-in-out', iterations: 1, direction: 'normal', fill: 'none', delay: 0, composite: 'replace' },
    },
  };

  // Init with fadeIn
  function loadPreset(name) {
    const p = PRESETS[name];
    if (!p) return;
    keyframes = JSON.parse(JSON.stringify(p.keyframes));
    setOptionsUI(p.options);
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
    renderKeyframes();
    readOptions();
    renderCode();
    playAnimation();
  }

  function setOptionsUI(opts) {
    document.getElementById('opt-duration').value = opts.duration;
    document.getElementById('val-duration').textContent = opts.duration + 'ms';
    document.getElementById('opt-delay').value = opts.delay;
    document.getElementById('val-delay').textContent = opts.delay + 'ms';
    document.getElementById('opt-easing').value = opts.easing;
    document.getElementById('opt-iterations').value = String(opts.iterations);
    document.getElementById('opt-direction').value = opts.direction;
    document.getElementById('opt-fill').value = opts.fill;
    document.getElementById('opt-composite').value = opts.composite;
    durationDisplay.textContent = opts.duration + 'ms';
  }

  function readOptions() {
    const dur = parseInt(document.getElementById('opt-duration').value);
    const itr = document.getElementById('opt-iterations').value;
    options = {
      duration: dur,
      delay: parseInt(document.getElementById('opt-delay').value),
      easing: document.getElementById('opt-easing').value,
      iterations: itr === 'Infinity' ? Infinity : parseInt(itr),
      direction: document.getElementById('opt-direction').value,
      fill: document.getElementById('opt-fill').value,
      composite: document.getElementById('opt-composite').value,
    };
    durationDisplay.textContent = dur + 'ms';
    renderTimelineMarkers();
  }

  // Build WAAPI keyframes array from our state
  function buildKeyframes() {
    return keyframes.map(kf => {
      const obj = { offset: kf.offset };
      for (const [prop, val] of Object.entries(kf.props)) {
        obj[prop] = val;
      }
      return obj;
    });
  }

  // Play
  function playAnimation() {
    if (currentAnimation) {
      currentAnimation.cancel();
    }
    const kfs = buildKeyframes();
    if (kfs.length < 2) return;
    try {
      currentAnimation = target.animate(kfs, options);
      currentAnimation.onfinish = () => {
        timelineFill.style.width = '100%';
      };
      updateTimeline();
    } catch (e) {
      console.error('Animation error:', e);
    }
  }

  function updateTimeline() {
    if (!currentAnimation || currentAnimation.playState === 'finished' || currentAnimation.playState === 'idle') return;
    const ct = currentAnimation.currentTime ?? 0;
    const totalDur = options.duration + options.delay;
    const pct = Math.min(100, (ct / totalDur) * 100);
    timelineFill.style.width = pct + '%';
    timeDisplay.textContent = Math.round(ct) + 'ms';
    requestAnimationFrame(updateTimeline);
  }

  function renderTimelineMarkers() {
    timelineMarkers.innerHTML = '';
    keyframes.forEach(kf => {
      const m = document.createElement('div');
      m.className = 'timeline-marker';
      m.style.left = (kf.offset * 100) + '%';
      m.title = 'offset: ' + kf.offset;
      timelineMarkers.appendChild(m);
    });
  }

  // Render keyframe cards
  function renderKeyframes() {
    keyframeList.innerHTML = '';
    keyframes.forEach((kf, i) => {
      const card = document.createElement('div');
      card.className = 'kf-card';

      const header = document.createElement('div');
      header.className = 'kf-header';
      header.innerHTML = `<span>Keyframe ${i + 1} <span class="kf-offset">${Math.round(kf.offset * 100)}%</span></span>`;
      if (keyframes.length > 2) {
        const rm = document.createElement('button');
        rm.className = 'kf-remove';
        rm.innerHTML = '&times;';
        rm.onclick = (e) => { e.stopPropagation(); keyframes.splice(i, 1); renderKeyframes(); readOptions(); renderCode(); playAnimation(); };
        header.appendChild(rm);
      }
      card.appendChild(header);

      const body = document.createElement('div');
      body.className = 'kf-body';

      // Offset
      const offRow = document.createElement('div');
      offRow.className = 'kf-prop-row';
      offRow.innerHTML = `<select style="width:120px"><option selected>offset</option></select>`;
      const offInput = document.createElement('input');
      offInput.type = 'number'; offInput.min = '0'; offInput.max = '1'; offInput.step = '0.05';
      offInput.value = kf.offset;
      offInput.onchange = () => { kf.offset = parseFloat(offInput.value) || 0; renderKeyframes(); readOptions(); renderCode(); };
      offRow.appendChild(offInput);
      body.appendChild(offRow);

      // Props
      for (const [prop, val] of Object.entries(kf.props)) {
        const row = document.createElement('div');
        row.className = 'kf-prop-row';
        const sel = document.createElement('select');
        CSS_PROPS.forEach(p => {
          const o = document.createElement('option');
          o.value = p; o.textContent = p;
          if (p === prop) o.selected = true;
          sel.appendChild(o);
        });
        sel.onchange = () => {
          const newProp = sel.value;
          if (newProp !== prop) {
            delete kf.props[prop];
            kf.props[newProp] = val;
            renderKeyframes(); renderCode();
          }
        };
        const inp = document.createElement('input');
        inp.type = 'text'; inp.value = val;
        inp.oninput = () => { kf.props[prop] = inp.value; renderCode(); };
        const rmBtn = document.createElement('button');
        rmBtn.className = 'kf-remove';
        rmBtn.innerHTML = '&times;';
        rmBtn.style.width = '20px'; rmBtn.style.height = '20px'; rmBtn.style.fontSize = '0.7rem';
        rmBtn.onclick = () => { delete kf.props[prop]; renderKeyframes(); renderCode(); };
        row.appendChild(sel); row.appendChild(inp); row.appendChild(rmBtn);
        body.appendChild(row);
      }

      // Add prop button
      const addBtn = document.createElement('button');
      addBtn.className = 'kf-add-prop';
      addBtn.textContent=T("jtc_add_property");
      addBtn.onclick = () => {
        const available = CSS_PROPS.filter(p => !(p in kf.props));
        if (available.length) {
          kf.props[available[0]] = available[0] === 'opacity' ? '1' : available[0] === 'transform' ? 'none' : '';
          renderKeyframes(); renderCode();
        }
      };
      body.appendChild(addBtn);

      card.appendChild(body);
      keyframeList.appendChild(card);
    });
    renderTimelineMarkers();
  }

  // Code generation
  function renderCode() {
    const kfs = buildKeyframes();
    const oStr = [];
    if (options.duration !== 1000) oStr.push(`  <span class="prop">duration</span><span class="punc">:</span> <span class="num">${options.duration}</span><span class="punc">,</span>`);
    else oStr.push(`  <span class="prop">duration</span><span class="punc">:</span> <span class="num">1000</span><span class="punc">,</span>`);
    if (options.delay) oStr.push(`  <span class="prop">delay</span><span class="punc">:</span> <span class="num">${options.delay}</span><span class="punc">,</span>`);
    oStr.push(`  <span class="prop">easing</span><span class="punc">:</span> <span class="str">'${options.easing}'</span><span class="punc">,</span>`);
    const itrStr = options.iterations === Infinity ? '<span class="num">Infinity</span>' : `<span class="num">${options.iterations}</span>`;
    if (options.iterations !== 1) oStr.push(`  <span class="prop">iterations</span><span class="punc">:</span> ${itrStr}<span class="punc">,</span>`);
    if (options.direction !== 'normal') oStr.push(`  <span class="prop">direction</span><span class="punc">:</span> <span class="str">'${options.direction}'</span><span class="punc">,</span>`);
    if (options.fill !== 'none') oStr.push(`  <span class="prop">fill</span><span class="punc">:</span> <span class="str">'${options.fill}'</span><span class="punc">,</span>`);
    if (options.composite !== 'replace') oStr.push(`  <span class="prop">composite</span><span class="punc">:</span> <span class="str">'${options.composite}'</span><span class="punc">,</span>`);

    // Keyframes
    let kfStr = '<span class="punc">[</span>\n';
    kfs.forEach((kf, i) => {
      kfStr += '  <span class="punc">{</span>';
      const entries = Object.entries(kf);
      entries.forEach(([k, v], j) => {
        if (k === 'offset') {
          kfStr += ` <span class="prop">${k}</span><span class="punc">:</span> <span class="num">${v}</span>`;
        } else {
          kfStr += ` <span class="prop">${k}</span><span class="punc">:</span> <span class="str">'${v}'</span>`;
        }
        if (j < entries.length - 1) kfStr += '<span class="punc">,</span>';
      });
      kfStr += ' <span class="punc">}</span>';
      if (i < kfs.length - 1) kfStr += '<span class="punc">,</span>';
      kfStr += '\n';
    });
    kfStr += '<span class="punc">]</span>';

    const html = `<span class="cmt">// Select the element</span>
<span class="kw">const</span> el <span class="punc">=</span> document.<span class="fn">querySelector</span><span class="punc">(</span><span class="str">'.my-element'</span><span class="punc">)</span><span class="punc">;</span>

<span class="cmt">// Define keyframes</span>
<span class="kw">const</span> keyframes <span class="punc">=</span> ${kfStr}<span class="punc">;</span>

<span class="cmt">// Animation options</span>
<span class="kw">const</span> options <span class="punc">=</span> <span class="punc">{</span>
${oStr.join('\n')}
<span class="punc">}</span><span class="punc">;</span>

<span class="cmt">// Run the animation</span>
<span class="kw">const</span> animation <span class="punc">=</span> el.<span class="fn">animate</span><span class="punc">(</span>keyframes<span class="punc">,</span> options<span class="punc">)</span><span class="punc">;</span>

<span class="cmt">// Control methods:</span>
<span class="cmt">// animation.pause();</span>
<span class="cmt">// animation.play();</span>
<span class="cmt">// animation.cancel();</span>
<span class="cmt">// animation.reverse();</span>
<span class="cmt">// animation.finish();</span>
<span class="cmt">// animation.onfinish = () => { ... };</span>`;

    codeContent.innerHTML = html;
  }

  // Plain text code for copy
  function getPlainCode() {
    const kfs = buildKeyframes();
    let code = `// Select the element\nconst el = document.querySelector('.my-element');\n\n// Define keyframes\nconst keyframes = [\n`;
    kfs.forEach((kf, i) => {
      const entries = Object.entries(kf).map(([k, v]) => k === 'offset' ? `${k}: ${v}` : `${k}: '${v}'`);
      code += `  { ${entries.join(', ')} }`;
      if (i < kfs.length - 1) code += ',';
      code += '\n';
    });
    code += '];\n\n// Animation options\nconst options = {\n';
    code += `  duration: ${options.duration},\n`;
    if (options.delay) code += `  delay: ${options.delay},\n`;
    code += `  easing: '${options.easing}',\n`;
    if (options.iterations !== 1) code += `  iterations: ${options.iterations === Infinity ? 'Infinity' : options.iterations},\n`;
    if (options.direction !== 'normal') code += `  direction: '${options.direction}',\n`;
    if (options.fill !== 'none') code += `  fill: '${options.fill}',\n`;
    if (options.composite !== 'replace') code += `  composite: '${options.composite}',\n`;
    code += '};\n\n// Run the animation\nconst animation = el.animate(keyframes, options);';
    return code;
  }

  // Event listeners
  playBtn.onclick = playAnimation;
  pauseBtn.onclick = () => { if (currentAnimation) currentAnimation.playState === 'paused' ? currentAnimation.play() : currentAnimation.pause(); };
  resetBtn.onclick = () => {
    if (currentAnimation) currentAnimation.cancel();
    timelineFill.style.width = '0%';
    timeDisplay.textContent=T("jtc_0ms");
  };

  copyBtn.onclick = () => {
    navigator.clipboard.writeText(getPlainCode()).then(() => {
      copyBtn.textContent=T("jtc_copied");
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent=T("jtc_copy"); copyBtn.classList.remove('copied'); }, 2000);
    });
  };

  // Preset buttons
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => loadPreset(btn.dataset.preset));
  });

  // Option sliders
  ['duration', 'delay'].forEach(id => {
    const el = document.getElementById('opt-' + id);
    const valEl = document.getElementById('val-' + id);
    el.addEventListener('input', () => {
      valEl.textContent = el.value + 'ms';
      readOptions(); renderCode();
    });
    el.addEventListener('change', () => { readOptions(); renderCode(); playAnimation(); });
  });

  // Option selects
  ['easing', 'iterations', 'direction', 'fill', 'composite'].forEach(id => {
    document.getElementById('opt-' + id).addEventListener('change', () => {
      readOptions(); renderCode(); playAnimation();
    });
  });

  // Add keyframe
  addKeyframeBtn.onclick = () => {
    const lastOffset = keyframes.length ? keyframes[keyframes.length - 1].offset : 0;
    const newOffset = Math.min(1, lastOffset + 0.25);
    keyframes.push({ offset: newOffset, props: { opacity: '1' } });
    keyframes.sort((a, b) => a.offset - b.offset);
    renderKeyframes(); readOptions(); renderCode();
  };

  // Shape buttons
  document.querySelectorAll('.shape-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const shape = btn.dataset.shape;
      target.style.borderRadius = shape === 'circle' ? '50%' : shape === 'card' ? '4px' : '12px';
      target.style.width = shape === 'card' ? '140px' : shape === 'text' ? '80px' : '100px';
      target.style.height = shape === 'card' ? '180px' : shape === 'text' ? '80px' : '100px';
      target.style.fontSize = shape === 'text' ? '2rem' : '0.9rem';
      target.textContent = shape === 'text' ? 'Aa' : shape === 'card' ? 'Card' : 'WAAPI';
    });
  });

  // Init
  loadPreset('fadeIn');
})();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
