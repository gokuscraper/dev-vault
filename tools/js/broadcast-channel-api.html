<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadcast Channel API Visualizer</title>
<meta name="description" content="Interactive visualizer for the BroadcastChannel API. Simulate cross-tab messaging, channel lifecycle, and message routing with visual diagrams.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a3e,#2a1a4e);padding:20px 24px;border-bottom:1px solid #333}
.header h1{font-size:1.4rem;color:#a78bfa}
.header p{font-size:.85rem;color:#888;margin-top:4px}
.container{display:grid;grid-template-columns:220px 1fr 280px;height:calc(100vh - 80px)}
.sidebar{background:#111;border-right:1px solid #222;padding:12px;overflow-y:auto}
.sidebar h3{font-size:.75rem;text-transform:uppercase;color:#666;margin-bottom:8px;letter-spacing:1px}
.preset-btn{display:block;width:100%;text-align:left;background:#1a1a2e;border:1px solid #333;color:#ccc;padding:8px 10px;margin-bottom:4px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
.preset-btn:hover{border-color:#7c3aed;color:#fff}
.preset-btn.active{background:#2d1b69;border-color:#7c3aed;color:#a78bfa}
.main{padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.tabs-area{background:#111;border-radius:8px;border:1px solid #222;padding:16px;flex:1;min-height:300px;position:relative}
.tabs-area h3{font-size:.85rem;color:#888;margin-bottom:12px}
.tab-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.tab-box{width:160px;background:#1a1a2e;border:2px solid #333;border-radius:8px;padding:12px;position:relative}
.tab-box.active{border-color:#7c3aed}
.tab-box .tab-title{font-size:.75rem;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.tab-box .tab-title .dot{width:6px;height:6px;border-radius:50%;background:#555}
.tab-box.active .tab-title .dot{background:#22c55e}
.tab-box .tab-name{font-size:.9rem;font-weight:600;color:#e0e0e0;margin-bottom:8px}
.tab-box .tab-channel{font-size:.7rem;color:#666;padding:2px 6px;background:#0a0a1a;border-radius:4px;display:inline-block;margin-bottom:4px}
.tab-box .tab-channel.joined{color:#22c55e;background:#0a2a1a}
.tab-box .msg-indicator{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:#7c3aed;opacity:0;transition:.3s}
.tab-box .msg-indicator.flash{opacity:1;animation:flash .6s ease-out}
@keyframes flash{0%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(1)}}
.channel-hub{display:flex;align-items:center;justify-content:center;margin:16px 0}
.channel-pipe{background:linear-gradient(90deg,#7c3aed22,#7c3aed44,#7c3aed22);height:3px;flex:1;position:relative;max-width:500px}
.channel-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.7rem;color:#7c3aed;white-space:nowrap;background:#111;padding:0 8px}
.msg-packet{position:absolute;width:12px;height:12px;border-radius:50%;background:#7c3aed;top:-5px;opacity:0}
.msg-packet.animate{animation:travel 1s ease-in-out forwards}
@keyframes travel{0%{left:0;opacity:1}50%{opacity:1}100%{left:calc(100% - 12px);opacity:0}}
.flow-log{background:#111;border-radius:8px;border:1px solid #222;padding:12px;max-height:200px;overflow-y:auto}
.flow-log h3{font-size:.85rem;color:#888;margin-bottom:8px}
.log-entry{font-size:.75rem;padding:4px 0;border-bottom:1px solid #1a1a2e;display:flex;gap:8px;align-items:flex-start}
.log-entry .log-time{color:#555;min-width:50px}
.log-entry .log-arrow{color:#7c3aed}
.log-entry .log-msg{color:#ccc}
.log-entry.system .log-msg{color:#f59e0b}
.log-entry.error .log-msg{color:#ef4444}
.ref-panel{background:#111;border-left:1px solid #222;padding:12px;overflow-y:auto;font-size:.8rem}
.ref-panel h3{font-size:.75rem;text-transform:uppercase;color:#666;margin-bottom:8px;letter-spacing:1px}
.ref-section{margin-bottom:16px}
.ref-section h4{color:#a78bfa;font-size:.8rem;margin-bottom:6px}
.ref-section p{color:#888;line-height:1.5;font-size:.75rem;margin-bottom:4px}
.code-block{background:#0a0a1a;border:1px solid #222;border-radius:6px;padding:10px;font-family:'Fira Code',monospace;font-size:.72rem;color:#e0e0e0;overflow-x:auto;margin:8px 0;line-height:1.5;white-space:pre}
.code-block .kw{color:#c084fc}
.code-block .str{color:#22c55e}
.code-block .cm{color:#555}
.code-block .fn{color:#60a5fa}
.code-block .op{color:#f59e0b}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.ctrl-btn{background:#1a1a2e;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
.ctrl-btn:hover{border-color:#7c3aed;color:#fff}
.ctrl-btn.primary{background:#7c3aed;border-color:#7c3aed;color:#fff}
.ctrl-btn.primary:hover{background:#6d28d9}
.ctrl-btn.danger{border-color:#ef4444;color:#ef4444}
.ctrl-btn.danger:hover{background:#ef444422}
.ctrl-btn:disabled{opacity:.4;cursor:not-allowed}
.input-row{display:flex;gap:6px;align-items:center}
.input-row input{background:#0a0a1a;border:1px solid #333;color:#e0e0e0;padding:5px 8px;border-radius:4px;font-size:.8rem;width:120px}
.input-row input:focus{outline:none;border-color:#7c3aed}
.input-row label{font-size:.75rem;color:#888}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.65rem;font-weight:600}
.badge-open{background:#0a2a1a;color:#22c55e}
.badge-closed{background:#2a0a0a;color:#ef4444}
.compat-note{background:#1a1a0a;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:.72rem;color:#f59e0b;margin-top:8px}
.live-demo{background:#0f0f2a;border:1px solid #333;border-radius:8px;padding:12px;margin-top:8px}
.live-demo h4{color:#a78bfa;font-size:.8rem;margin-bottom:8px}
.live-status{font-size:.75rem;color:#888;margin-top:6px}
</style>
</head>
<body>
<div class="header">
<h1>Broadcast Channel API Visualizer</h1>
<p>Explore cross-tab messaging, channel lifecycle, and message routing</p>
</div>
<div class="container">
<div class="sidebar">
<h3>Scenarios</h3>
<div id="presets"></div>
<div style="margin-top:16px">
<h3>Live Demo</h3>
<div class="live-demo">
<h4>Real BroadcastChannel</h4>
<div class="input-row" style="margin-bottom:6px">
<input id="liveMsg" placeholder="Type message..." style="width:100%">
</div>
<button class="ctrl-btn primary" style="width:100%;margin-bottom:4px" onclick="sendLiveMessage()">Broadcast</button>
<div id="liveLog" style="max-height:100px;overflow-y:auto;font-size:.7rem;color:#888"></div>
<div class="live-status">Open this page in another tab to see real cross-tab messaging</div>
</div>
</div>
</div>
<div class="main">
<div class="controls">
<button class="ctrl-btn primary" id="playBtn" onclick="play()">&#9654; Play</button>
<button class="ctrl-btn" id="stepBtn" onclick="step()">Step &rarr;</button>
<button class="ctrl-btn" onclick="resetScenario()">Reset</button>
<span style="font-size:.75rem;color:#666;margin-left:8px" id="stepInfo">Step 0 / 0</span>
</div>
<div class="tabs-area">
<h3>Simulated Browsing Contexts</h3>
<div id="tabGrid" class="tab-grid"></div>
<div class="channel-hub">
<div class="channel-pipe" id="channelPipe">
<div class="channel-label" id="channelLabel">Channel: "updates"</div>
</div>
</div>
</div>
<div class="flow-log">
<h3>Message Flow Log</h3>
<div id="logArea"></div>
</div>
</div>
<div class="ref-panel">
<h3>Reference</h3>
<div id="refContent"></div>
</div>
</div>

<script>
const PRESETS = [
  {
    name: 'Basic Broadcast',
    desc: 'One sender, multiple receivers on the same channel',
    channel: 'updates',
    tabs: [
      { name: 'Tab A', role: 'sender' },
      { name: 'Tab B', role: 'receiver' },
      { name: 'Tab C', role: 'receiver' },
    ],
    steps: [
      { type: 'join', tab: 0, msg: 'Tab A joins channel "updates"' },
      { type: 'join', tab: 1, msg: 'Tab B joins channel "updates"' },
      { type: 'join', tab: 2, msg: 'Tab C joins channel "updates"' },
      { type: 'send', from: 0, data: '{ theme: "dark" }', msg: 'Tab A broadcasts theme change' },
      { type: 'receive', tab: 1, data: '{ theme: "dark" }', msg: 'Tab B receives & applies theme' },
      { type: 'receive', tab: 2, data: '{ theme: "dark" }', msg: 'Tab C receives & applies theme' },
      { type: 'note', msg: 'Sender does NOT receive its own message' },
    ],
    code: `<span class="cm">// Create or join a channel</span>
<span class="kw">const</span> ch = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"updates"</span>);

<span class="cm">// Send a message (all OTHER tabs receive it)</span>
ch.<span class="fn">postMessage</span>({ theme: <span class="str">"dark"</span> });

<span class="cm">// Receive messages</span>
ch.<span class="fn">onmessage</span> = (e) <span class="op">=></span> {
  console.<span class="fn">log</span>(e.data); <span class="cm">// { theme: "dark" }</span>
};`,
    ref: '<p>BroadcastChannel connects all browsing contexts (tabs, iframes, workers) on the <strong>same origin</strong>.</p><p>The sender never receives its own message. Only other contexts listening on the same channel name get it.</p>'
  },
  {
    name: 'Multiple Channels',
    desc: 'Isolate messages by using different channel names',
    channel: 'auth',
    tabs: [
      { name: 'Login Tab', role: 'sender', channels: ['auth'] },
      { name: 'Dashboard', role: 'receiver', channels: ['auth', 'data'] },
      { name: 'Settings', role: 'receiver', channels: ['data'] },
    ],
    steps: [
      { type: 'join', tab: 0, channel: 'auth', msg: 'Login Tab joins "auth" channel' },
      { type: 'join', tab: 1, channel: 'auth', msg: 'Dashboard joins "auth" channel' },
      { type: 'join', tab: 1, channel: 'data', msg: 'Dashboard also joins "data" channel' },
      { type: 'join', tab: 2, channel: 'data', msg: 'Settings joins "data" only' },
      { type: 'send', from: 0, channel: 'auth', data: '{ loggedIn: true }', msg: 'Login broadcasts on "auth"' },
      { type: 'receive', tab: 1, channel: 'auth', data: '{ loggedIn: true }', msg: 'Dashboard receives auth event' },
      { type: 'miss', tab: 2, msg: 'Settings is NOT on "auth" — message not received' },
      { type: 'note', msg: 'Channels are isolated by name. Only matching names receive messages.' },
    ],
    code: `<span class="cm">// A tab can listen to multiple channels</span>
<span class="kw">const</span> auth = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"auth"</span>);
<span class="kw">const</span> data = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"data"</span>);

auth.<span class="fn">onmessage</span> = (e) <span class="op">=></span> handleAuth(e.data);
data.<span class="fn">onmessage</span> = (e) <span class="op">=></span> handleData(e.data);

<span class="cm">// Messages on "auth" never leak to "data"</span>`,
    ref: '<p>Each channel name creates an independent message bus. A context can subscribe to any number of channels simultaneously.</p><p>This pattern is useful for separating concerns: auth events, data sync, UI theme changes, etc.</p>'
  },
  {
    name: 'Channel Close',
    desc: 'What happens when a tab closes its channel',
    channel: 'sync',
    tabs: [
      { name: 'Tab A', role: 'sender' },
      { name: 'Tab B', role: 'receiver' },
      { name: 'Tab C', role: 'receiver' },
    ],
    steps: [
      { type: 'join', tab: 0, msg: 'Tab A joins "sync"' },
      { type: 'join', tab: 1, msg: 'Tab B joins "sync"' },
      { type: 'join', tab: 2, msg: 'Tab C joins "sync"' },
      { type: 'send', from: 0, data: '"hello"', msg: 'Tab A broadcasts "hello"' },
      { type: 'receive', tab: 1, data: '"hello"', msg: 'Tab B receives' },
      { type: 'receive', tab: 2, data: '"hello"', msg: 'Tab C receives' },
      { type: 'close', tab: 2, msg: 'Tab C calls channel.close()' },
      { type: 'send', from: 0, data: '"update"', msg: 'Tab A broadcasts "update"' },
      { type: 'receive', tab: 1, data: '"update"', msg: 'Tab B receives' },
      { type: 'miss', tab: 2, msg: 'Tab C does NOT receive — channel is closed' },
      { type: 'error', tab: 2, msg: 'Tab C tries postMessage → InvalidStateError' },
    ],
    code: `<span class="kw">const</span> ch = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"sync"</span>);

<span class="cm">// Close when done (e.g., on page unload)</span>
ch.<span class="fn">close</span>();

<span class="cm">// After close:</span>
ch.<span class="fn">postMessage</span>(<span class="str">"x"</span>); <span class="cm">// ❌ InvalidStateError</span>
ch.<span class="fn">onmessage</span> = ...; <span class="cm">// No effect</span>

<span class="cm">// To rejoin, create a new instance</span>
<span class="kw">const</span> ch2 = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"sync"</span>);`,
    ref: '<p><code>close()</code> permanently disconnects a BroadcastChannel instance. It cannot be reopened — you must create a new one.</p><p>Calling <code>postMessage()</code> on a closed channel throws <code>InvalidStateError</code>.</p><p>Close channels in <code>beforeunload</code> or when no longer needed to prevent memory leaks.</p>'
  },
  {
    name: 'Leader Election',
    desc: 'Use BroadcastChannel to elect a leader tab',
    channel: 'leader',
    tabs: [
      { name: 'Tab 1', role: 'candidate' },
      { name: 'Tab 2', role: 'candidate' },
      { name: 'Tab 3', role: 'candidate' },
    ],
    steps: [
      { type: 'join', tab: 0, msg: 'Tab 1 joins "leader" channel' },
      { type: 'join', tab: 1, msg: 'Tab 2 joins "leader" channel' },
      { type: 'join', tab: 2, msg: 'Tab 3 joins "leader" channel' },
      { type: 'send', from: 0, data: '{ type: "claim", id: 1 }', msg: 'Tab 1 claims leadership' },
      { type: 'receive', tab: 1, data: '{ type: "claim", id: 1 }', msg: 'Tab 2 sees claim, yields' },
      { type: 'receive', tab: 2, data: '{ type: "claim", id: 1 }', msg: 'Tab 3 sees claim, yields' },
      { type: 'leader', tab: 0, msg: '★ Tab 1 becomes LEADER' },
      { type: 'note', msg: 'Leader handles background sync, WebSocket, etc. Others defer.' },
      { type: 'close', tab: 0, msg: 'Tab 1 closes (user navigates away)' },
      { type: 'send', from: 1, data: '{ type: "claim", id: 2 }', msg: 'Tab 2 detects vacancy, claims' },
      { type: 'receive', tab: 2, data: '{ type: "claim", id: 2 }', msg: 'Tab 3 yields to Tab 2' },
      { type: 'leader', tab: 1, msg: '★ Tab 2 becomes new LEADER' },
    ],
    code: `<span class="kw">const</span> ch = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"leader"</span>);
<span class="kw">let</span> isLeader = <span class="kw">false</span>;

<span class="cm">// Try to claim on load</span>
ch.<span class="fn">postMessage</span>({ type: <span class="str">"claim"</span>, id: tabId });

<span class="cm">// Listen for claims</span>
ch.<span class="fn">onmessage</span> = (e) <span class="op">=></span> {
  <span class="kw">if</span> (e.data.type === <span class="str">"claim"</span>) {
    <span class="kw">if</span> (e.data.id < tabId) isLeader = <span class="kw">false</span>;
  }
  <span class="kw">if</span> (e.data.type === <span class="str">"resign"</span>) {
    <span class="cm">// Previous leader left — try to claim</span>
    ch.<span class="fn">postMessage</span>({ type: <span class="str">"claim"</span>, id: tabId });
  }
};`,
    ref: '<p><strong>Leader Election</strong> is a classic pattern: only one tab handles expensive operations (WebSocket connections, background sync, polling).</p><p>When the leader tab closes, it broadcasts a "resign" message (or other tabs detect timeout) and a new election begins.</p><p>Libraries like <code>broadcast-channel</code> (npm) provide built-in leader election on top of this API.</p>'
  },
  {
    name: 'Logout Sync',
    desc: 'Log out all tabs when user logs out in one',
    channel: 'session',
    tabs: [
      { name: 'Profile', role: 'sender' },
      { name: 'Feed', role: 'receiver' },
      { name: 'Messages', role: 'receiver' },
      { name: 'Settings', role: 'receiver' },
    ],
    steps: [
      { type: 'join', tab: 0, msg: 'Profile joins "session"' },
      { type: 'join', tab: 1, msg: 'Feed joins "session"' },
      { type: 'join', tab: 2, msg: 'Messages joins "session"' },
      { type: 'join', tab: 3, msg: 'Settings joins "session"' },
      { type: 'note', msg: 'User clicks "Log Out" on Profile tab...' },
      { type: 'send', from: 0, data: '{ action: "logout" }', msg: 'Profile broadcasts logout' },
      { type: 'receive', tab: 1, data: '{ action: "logout" }', msg: 'Feed → redirect to /login' },
      { type: 'receive', tab: 2, data: '{ action: "logout" }', msg: 'Messages → redirect to /login' },
      { type: 'receive', tab: 3, data: '{ action: "logout" }', msg: 'Settings → redirect to /login' },
      { type: 'note', msg: 'All tabs redirect simultaneously. No stale sessions.' },
    ],
    code: `<span class="cm">// On every page</span>
<span class="kw">const</span> session = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"session"</span>);

session.<span class="fn">onmessage</span> = (e) <span class="op">=></span> {
  <span class="kw">if</span> (e.data.action === <span class="str">"logout"</span>) {
    localStorage.<span class="fn">clear</span>();
    window.location.href = <span class="str">"/login"</span>;
  }
};

<span class="cm">// When user logs out</span>
<span class="kw">function</span> <span class="fn">handleLogout</span>() {
  session.<span class="fn">postMessage</span>({ action: <span class="str">"logout"</span> });
  window.location.href = <span class="str">"/login"</span>;
}`,
    ref: '<p><strong>Session sync</strong> is the most common BroadcastChannel use case. Without it, logging out of one tab leaves other tabs in a stale authenticated state.</p><p>Also useful for login: when a user logs in on one tab, all others can refresh to show authenticated content.</p>'
  },
  {
    name: 'Worker Communication',
    desc: 'SharedWorker alternative using BroadcastChannel',
    channel: 'worker-bus',
    tabs: [
      { name: 'Main Thread', role: 'sender' },
      { name: 'Web Worker', role: 'worker' },
      { name: 'Another Tab', role: 'receiver' },
    ],
    steps: [
      { type: 'join', tab: 0, msg: 'Main thread joins "worker-bus"' },
      { type: 'join', tab: 1, msg: 'Web Worker joins "worker-bus"' },
      { type: 'join', tab: 2, msg: 'Another Tab joins "worker-bus"' },
      { type: 'send', from: 0, data: '{ task: "process" }', msg: 'Main thread sends task to worker' },
      { type: 'receive', tab: 1, data: '{ task: "process" }', msg: 'Worker receives task' },
      { type: 'receive', tab: 2, data: '{ task: "process" }', msg: 'Other tab also sees task' },
      { type: 'send', from: 1, data: '{ result: [1,2,3] }', msg: 'Worker broadcasts result' },
      { type: 'receive', tab: 0, data: '{ result: [1,2,3] }', msg: 'Main thread gets result' },
      { type: 'receive', tab: 2, data: '{ result: [1,2,3] }', msg: 'Other tab also gets result' },
      { type: 'note', msg: 'BroadcastChannel works in Workers, ServiceWorkers, and SharedWorkers' },
    ],
    code: `<span class="cm">// In main thread</span>
<span class="kw">const</span> bus = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"worker-bus"</span>);
bus.<span class="fn">postMessage</span>({ task: <span class="str">"process"</span> });

<span class="cm">// In worker.js</span>
<span class="kw">const</span> bus = <span class="kw">new</span> <span class="fn">BroadcastChannel</span>(<span class="str">"worker-bus"</span>);
bus.<span class="fn">onmessage</span> = (e) <span class="op">=></span> {
  <span class="kw">const</span> result = doWork(e.data);
  bus.<span class="fn">postMessage</span>({ result });
};

<span class="cm">// Simpler than SharedWorker or</span>
<span class="cm">// MessagePort for many-to-many</span>`,
    ref: '<p>BroadcastChannel works in all execution contexts: windows, iframes, Web Workers, Service Workers, and Shared Workers.</p><p>It is a simpler alternative to SharedWorker or MessageChannel when you need many-to-many communication without caring about specific targets.</p><p><strong>Limitation:</strong> Messages are cloned via structured clone algorithm — no transferables like with <code>postMessage()</code>.</p>'
  },
];

let currentPreset = 0;
let currentStep = 0;
let playing = false;
let playTimer = null;

// Live BroadcastChannel
let liveChannel;
try {
  liveChannel = new BroadcastChannel('dev-toolkit-demo');
  liveChannel.onmessage = (e) => {
    addLiveLog('received', e.data);
  };
} catch(err) {
  // BroadcastChannel not supported
}

function sendLiveMessage() {
  const input = document.getElementById('liveMsg');
  const msg = input.value.trim();
  if (!msg || !liveChannel) return;
  liveChannel.postMessage(msg);
  addLiveLog('sent', msg);
  input.value = '';
}

document.getElementById('liveMsg').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendLiveMessage();
});

function addLiveLog(type, msg) {
  const log = document.getElementById('liveLog');
  const now = new Date().toLocaleTimeString();
  const color = type === 'sent' ? '#7c3aed' : '#22c55e';
  const arrow = type === 'sent' ? '→' : '←';
  log.innerHTML += `<div style="color:${color};margin-bottom:2px">${now} ${arrow} ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

// Render presets
function renderPresets() {
  const el = document.getElementById('presets');
  el.innerHTML = PRESETS.map((p, i) => `
    <button class="preset-btn ${i === currentPreset ? 'active' : ''}" onclick="selectPreset(${i})">
      <div style="font-weight:600">${p.name}</div>
      <div style="font-size:.7rem;color:#666;margin-top:2px">${p.desc}</div>
    </button>
  `).join('');
}

function selectPreset(i) {
  currentPreset = i;
  currentStep = 0;
  playing = false;
  clearTimeout(playTimer);
  renderPresets();
  renderScenario();
}

function renderScenario() {
  const p = PRESETS[currentPreset];
  renderTabs(p);
  renderLog();
  updateStepInfo();
  renderRef(p);
  document.getElementById('channelLabel').textContent = `Channel: "${p.channel}"`;
}

function renderTabs(p) {
  const grid = document.getElementById('tabGrid');
  grid.innerHTML = p.tabs.map((t, i) => {
    const isJoined = isTabJoined(i);
    const isClosed = isTabClosed(i);
    const isLeader = isTabLeader(i);
    const roleLabel = t.role === 'worker' ? '⚙ Worker' : t.role === 'sender' ? '📤' : t.role === 'candidate' ? '🏷' : '📥';
    let channelsHtml = '';
    if (t.channels) {
      channelsHtml = t.channels.map(c => `<span class="tab-channel ${isJoined ? 'joined' : ''}">${c}</span> `).join('');
    } else {
      channelsHtml = `<span class="tab-channel ${isJoined ? 'joined' : ''}">${p.channel}</span>`;
    }
    return `
      <div class="tab-box ${isJoined && !isClosed ? 'active' : ''}" id="tab-${i}">
        <div class="tab-title"><span class="dot"></span> ${roleLabel} ${t.role}</div>
        <div class="tab-name">${t.name}</div>
        ${channelsHtml}
        ${isLeader ? '<div style="color:#f59e0b;font-size:.7rem;margin-top:4px">★ LEADER</div>' : ''}
        ${isClosed ? '<div style="color:#ef4444;font-size:.7rem;margin-top:4px">✕ CLOSED</div>' : ''}
        <div class="msg-indicator" id="indicator-${i}"></div>
      </div>
    `;
  }).join('');
}

function isTabJoined(tabIdx) {
  const p = PRESETS[currentPreset];
  for (let i = 0; i < currentStep && i < p.steps.length; i++) {
    if (p.steps[i].type === 'join' && p.steps[i].tab === tabIdx) return true;
  }
  return false;
}

function isTabClosed(tabIdx) {
  const p = PRESETS[currentPreset];
  for (let i = 0; i < currentStep && i < p.steps.length; i++) {
    if (p.steps[i].type === 'close' && p.steps[i].tab === tabIdx) return true;
  }
  return false;
}

function isTabLeader(tabIdx) {
  const p = PRESETS[currentPreset];
  let leader = -1;
  for (let i = 0; i < currentStep && i < p.steps.length; i++) {
    if (p.steps[i].type === 'leader') leader = p.steps[i].tab;
    if (p.steps[i].type === 'close' && p.steps[i].tab === leader) leader = -1;
  }
  return leader === tabIdx;
}

function renderLog() {
  const p = PRESETS[currentPreset];
  const logArea = document.getElementById('logArea');
  let html = '';
  for (let i = 0; i < currentStep && i < p.steps.length; i++) {
    const s = p.steps[i];
    let cls = '';
    let arrow = '';
    if (s.type === 'send') arrow = `<span style="color:#7c3aed">▶ SEND</span>`;
    else if (s.type === 'receive') arrow = `<span style="color:#22c55e">◀ RECV</span>`;
    else if (s.type === 'join') arrow = `<span style="color:#60a5fa">+ JOIN</span>`;
    else if (s.type === 'close') { arrow = `<span style="color:#ef4444">✕ CLOSE</span>`; cls = 'error'; }
    else if (s.type === 'miss') { arrow = `<span style="color:#666">○ MISS</span>`; }
    else if (s.type === 'error') { arrow = `<span style="color:#ef4444">⚠ ERROR</span>`; cls = 'error'; }
    else if (s.type === 'leader') { arrow = `<span style="color:#f59e0b">★ LEAD</span>`; cls = 'system'; }
    else if (s.type === 'note') { arrow = `<span style="color:#f59e0b">ℹ NOTE</span>`; cls = 'system'; }
    html += `<div class="log-entry ${cls}">
      <span class="log-time">${i + 1}.</span>
      <span class="log-arrow">${arrow}</span>
      <span class="log-msg">${s.msg}${s.data ? ` — <code style="color:#a78bfa">${s.data}</code>` : ''}</span>
    </div>`;
  }
  logArea.innerHTML = html;
  logArea.scrollTop = logArea.scrollHeight;
}

function renderRef(p) {
  const el = document.getElementById('refContent');
  el.innerHTML = `
    <div class="ref-section">
      <h4>${p.name}</h4>
      ${p.ref}
    </div>
    <div class="ref-section">
      <h4>Code</h4>
      <div class="code-block">${p.code}</div>
    </div>
    <div class="ref-section">
      <h4>API Reference</h4>
      <div class="code-block"><span class="cm">// Constructor</span>
<span class="kw">new</span> <span class="fn">BroadcastChannel</span>(name)

<span class="cm">// Properties</span>
channel.<span class="op">name</span>      <span class="cm">// channel name (read-only)</span>

<span class="cm">// Methods</span>
channel.<span class="fn">postMessage</span>(data)
channel.<span class="fn">close</span>()

<span class="cm">// Events</span>
channel.<span class="fn">onmessage</span>
channel.<span class="fn">onmessageerror</span></div>
    </div>
    <div class="compat-note">
      ✅ Supported in all modern browsers (Chrome 54+, Firefox 38+, Safari 15.4+, Edge 79+)
    </div>
  `;
}

function updateStepInfo() {
  const p = PRESETS[currentPreset];
  document.getElementById('stepInfo').textContent = `Step ${currentStep} / ${p.steps.length}`;
}

function flashIndicator(tabIdx) {
  const el = document.getElementById(`indicator-${tabIdx}`);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function animatePacket() {
  const pipe = document.getElementById('channelPipe');
  const packet = document.createElement('div');
  packet.className = 'msg-packet';
  pipe.appendChild(packet);
  requestAnimationFrame(() => {
    packet.classList.add('animate');
    setTimeout(() => packet.remove(), 1100);
  });
}

function step() {
  const p = PRESETS[currentPreset];
  if (currentStep >= p.steps.length) return;
  const s = p.steps[currentStep];
  currentStep++;

  if (s.type === 'send') {
    flashIndicator(s.from);
    animatePacket();
  } else if (s.type === 'receive') {
    flashIndicator(s.tab);
  }

  renderTabs(p);
  renderLog();
  updateStepInfo();
}

function play() {
  const p = PRESETS[currentPreset];
  if (currentStep >= p.steps.length) {
    currentStep = 0;
    renderTabs(p);
    renderLog();
  }
  playing = !playing;
  document.getElementById('playBtn').innerHTML = playing ? '⏸ Pause' : '▶ Play';
  if (playing) autoStep();
}

function autoStep() {
  if (!playing) return;
  const p = PRESETS[currentPreset];
  if (currentStep >= p.steps.length) {
    playing = false;
    document.getElementById('playBtn').innerHTML = '▶ Play';
    return;
  }
  step();
  playTimer = setTimeout(autoStep, 800);
}

function resetScenario() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('playBtn').innerHTML = '▶ Play';
  currentStep = 0;
  renderScenario();
}

// Init
renderPresets();
renderScenario();
</script>
</body>
</html>
