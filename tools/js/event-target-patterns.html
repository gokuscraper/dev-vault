<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventTarget Patterns Playground</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #7c4dff;
    --accent2: #448aff;
    --success: #69f0ae;
    --warning: #ffd740;
    --error: #ff5252;
    --radius: 8px;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    background: var(--surface);
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
  .layout {
    display: flex;
    min-height: calc(100vh - 80px);
  }
  nav {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 1rem 0;
    overflow-y: auto;
  }
  nav button {
    display: block;
    width: 100%;
    padding: 0.6rem 1.2rem;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }
  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active {
    color: var(--accent);
    background: rgba(124, 77, 255, 0.1);
    border-left: 3px solid var(--accent);
  }
  main {
    flex: 1;
    padding: 2rem;
    overflow-y: auto;
    max-width: 900px;
  }
  .section { display: none; }
  .section.active { display: block; }
  .section h2 {
    font-size: 1.3rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  .section > p {
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .card h3 {
    font-size: 1rem;
    margin-bottom: 0.75rem;
    color: var(--accent2);
  }
  pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    line-height: 1.5;
    margin-bottom: 0.75rem;
    color: #b0b0b0;
  }
  code { font-family: var(--font-mono); font-size: 0.8rem; }
  .inline-code {
    background: var(--surface2);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-size: 0.85em;
  }
  button.run-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.5rem 1.2rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  button.run-btn:hover { opacity: 0.85; }
  button.run-btn:active { transform: scale(0.97); }
  button.secondary-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 1.2rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
    margin-left: 0.5rem;
  }
  button.secondary-btn:hover { border-color: var(--accent); }
  .output {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    margin-top: 0.75rem;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    min-height: 60px;
    max-height: 250px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--success);
  }
  .output .log-warn { color: var(--warning); }
  .output .log-error { color: var(--error); }
  .output .log-info { color: var(--accent2); }
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
  .tag {
    display: inline-block;
    padding: 0.2em 0.6em;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-right: 0.25rem;
  }
  .tag-api { background: rgba(124,77,255,0.2); color: var(--accent); }
  .tag-pattern { background: rgba(68,138,255,0.2); color: var(--accent2); }
  .demo-area {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-top: 0.75rem;
    min-height: 80px;
  }
  .demo-box {
    display: inline-block;
    padding: 0.5rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    margin: 0.25rem;
    transition: all 0.2s;
    font-size: 0.85rem;
  }
  .demo-box:hover { border-color: var(--accent); }
  .demo-box.highlight {
    border-color: var(--success);
    background: rgba(105,240,174,0.1);
  }
  input[type="text"], input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.75rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    font-family: var(--font-mono);
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 0.85rem; color: var(--text-muted); margin-right: 0.5rem; }
  .flex-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    nav { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0; }
    nav button { white-space: nowrap; border-left: none !important; border-bottom: 3px solid transparent; }
    nav button.active { border-left: none !important; border-bottom-color: var(--accent); }
    main { padding: 1rem; }
  }
</style>
</head>
<body>
<header>
  <h1>EventTarget Patterns Playground</h1>
  <p>Interactive demos of the EventTarget API, CustomEvent, delegation, and advanced patterns</p>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script>
const sections = [
  { id: 'custom-target', title: 'Custom EventTarget' },
  { id: 'custom-event', title: 'CustomEvent + detail' },
  { id: 'delegation', title: 'Event Delegation' },
  { id: 'options', title: 'Listener Options' },
  { id: 'composition', title: 'Event Composition' },
  { id: 'abort-signal', title: 'AbortSignal Cleanup' },
  { id: 'event-bus', title: 'Event Bus / Pub-Sub' },
  { id: 'dispatch-return', title: 'dispatchEvent Return' },
];

// --- Utility ---
function log(el, msg, type = '') {
  const span = document.createElement('span');
  if (type) span.className = `log-${type}`;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}
function clearLog(el) { el.textContent = ''; }

// --- Build nav ---
const nav = document.getElementById('nav');
const main = document.getElementById('main');

sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.title;
  btn.dataset.section = s.id;
  if (i === 0) btn.classList.add('active');
  btn.onclick = () => {
    nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    main.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(s.id).classList.add('active');
  };
  nav.appendChild(btn);
});

// ===================== SECTION 1: Custom EventTarget =====================
main.innerHTML += `
<div id="custom-target" class="section active">
  <h2>Custom EventTarget</h2>
  <p>Create your own event-emitting objects by extending EventTarget. No DOM needed.</p>

  <div class="card">
    <h3>Basic Custom EventTarget</h3>
    <span class="tag tag-api">EventTarget</span>
    <pre>class DataStore extends EventTarget {
  #data = new Map();

  set(key, value) {
    const old = this.#data.get(key);
    this.#data.set(key, value);
    this.dispatchEvent(new CustomEvent('change', {
      detail: { key, value, old }
    }));
  }

  get(key) { return this.#data.get(key); }
}</pre>
    <div class="btn-row">
      <button class="run-btn" onclick="demoCustomTarget()">Run Demo</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-custom-target'))">Clear</button>
    </div>
    <div class="output" id="out-custom-target"></div>
  </div>

  <div class="card">
    <h3>Timer EventTarget</h3>
    <span class="tag tag-api">EventTarget</span>
    <span class="tag tag-pattern">Observable</span>
    <pre>class Timer extends EventTarget {
  #id = null;
  start(interval = 1000) {
    this.#id = setInterval(() => {
      this.dispatchEvent(new Event('tick'));
    }, interval);
    this.dispatchEvent(new Event('start'));
  }
  stop() {
    clearInterval(this.#id);
    this.dispatchEvent(new Event('stop'));
  }
}</pre>
    <div class="btn-row">
      <button class="run-btn" onclick="demoTimer('start')">Start Timer</button>
      <button class="secondary-btn" onclick="demoTimer('stop')">Stop Timer</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-timer'))">Clear</button>
    </div>
    <div class="output" id="out-timer"></div>
  </div>
</div>`;

// Section 1 logic
class DataStore extends EventTarget {
  #data = new Map();
  set(key, value) {
    const old = this.#data.get(key);
    this.#data.set(key, value);
    this.dispatchEvent(new CustomEvent('change', { detail: { key, value, old } }));
  }
  get(key) { return this.#data.get(key); }
}

function demoCustomTarget() {
  const out = document.getElementById('out-custom-target');
  const store = new DataStore();
  store.addEventListener('change', (e) => {
    const { key, value, old } = e.detail;
    log(out, `[change] "${key}": ${old ?? 'undefined'} -> ${value}`, 'info');
  });
  log(out, '--- Creating DataStore and setting values ---');
  store.set('theme', 'dark');
  store.set('lang', 'en');
  store.set('theme', 'light');
  log(out, `store.get("theme") = "${store.get('theme')}"`, 'warn');
}

class Timer extends EventTarget {
  #id = null;
  #count = 0;
  start(interval = 500) {
    this.#count = 0;
    this.#id = setInterval(() => {
      this.#count++;
      this.dispatchEvent(new CustomEvent('tick', { detail: { count: this.#count } }));
    }, interval);
    this.dispatchEvent(new Event('start'));
  }
  stop() {
    if (this.#id) { clearInterval(this.#id); this.#id = null; }
    this.dispatchEvent(new Event('stop'));
  }
}

let _timer = null;
function demoTimer(action) {
  const out = document.getElementById('out-timer');
  if (action === 'start') {
    if (_timer) _timer.stop();
    _timer = new Timer();
    _timer.addEventListener('start', () => log(out, '[start] Timer started', 'info'));
    _timer.addEventListener('stop', () => log(out, '[stop] Timer stopped', 'warn'));
    _timer.addEventListener('tick', (e) => log(out, `[tick] #${e.detail.count}`));
    _timer.start(500);
  } else {
    if (_timer) { _timer.stop(); _timer = null; }
  }
}

// ===================== SECTION 2: CustomEvent + detail =====================
main.innerHTML += `
<div id="custom-event" class="section">
  <h2>CustomEvent with Detail Data</h2>
  <p>Pass arbitrary data through events using the detail property.</p>

  <div class="card">
    <h3>Structured Detail Data</h3>
    <span class="tag tag-api">CustomEvent</span>
    <pre>const event = new CustomEvent('user:action', {
  detail: {
    userId: 42,
    action: 'purchase',
    items: ['widget-a', 'widget-b'],
    timestamp: Date.now()
  }
});</pre>
    <div class="flex-row" style="margin-bottom:0.5rem">
      <label>Event type:</label>
      <input type="text" id="ce-type" value="user:action" style="width:150px">
      <label>User ID:</label>
      <input type="number" id="ce-uid" value="42" style="width:80px">
      <label>Action:</label>
      <select id="ce-action">
        <option>purchase</option>
        <option>login</option>
        <option>logout</option>
        <option>signup</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="run-btn" onclick="demoCustomEvent()">Dispatch Event</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-ce'))">Clear</button>
    </div>
    <div class="output" id="out-ce"></div>
  </div>

  <div class="card">
    <h3>Event Detail Immutability</h3>
    <span class="tag tag-pattern">Best Practice</span>
    <pre>// detail is NOT frozen by default - listeners can mutate it
const evt = new CustomEvent('data', { detail: { count: 0 } });
// Freeze detail to prevent mutation:
const safe = new CustomEvent('data', {
  detail: Object.freeze({ count: 0 })
});</pre>
    <div class="btn-row">
      <button class="run-btn" onclick="demoImmutability()">Test Mutability</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-immut'))">Clear</button>
    </div>
    <div class="output" id="out-immut"></div>
  </div>
</div>`;

function demoCustomEvent() {
  const out = document.getElementById('out-ce');
  const type = document.getElementById('ce-type').value || 'user:action';
  const userId = Number(document.getElementById('ce-uid').value) || 42;
  const action = document.getElementById('ce-action').value;
  const target = new EventTarget();
  target.addEventListener(type, (e) => {
    log(out, `[${e.type}] Received:`, 'info');
    log(out, `  detail = ${JSON.stringify(e.detail, null, 2)}`);
  });
  const evt = new CustomEvent(type, {
    detail: { userId, action, items: ['widget-a', 'widget-b'], timestamp: Date.now() }
  });
  log(out, `Dispatching "${type}"...`);
  target.dispatchEvent(evt);
}

function demoImmutability() {
  const out = document.getElementById('out-immut');
  const target = new EventTarget();

  // Mutable detail
  const mutableEvt = new CustomEvent('data', { detail: { count: 0 } });
  target.addEventListener('data', (e) => {
    e.detail.count = 999;
    log(out, `Listener mutated detail.count to ${e.detail.count}`, 'warn');
  }, { once: true });
  target.dispatchEvent(mutableEvt);
  log(out, `After dispatch, detail.count = ${mutableEvt.detail.count}`, 'error');

  // Frozen detail
  const frozenEvt = new CustomEvent('safe', { detail: Object.freeze({ count: 0 }) });
  target.addEventListener('safe', (e) => {
    try { e.detail.count = 999; } catch { /* strict mode throws */ }
    log(out, `Attempted mutation, detail.count = ${e.detail.count}`, 'info');
  }, { once: true });
  target.dispatchEvent(frozenEvt);
  log(out, `Frozen detail preserved: count = ${frozenEvt.detail.count}`);
}

// ===================== SECTION 3: Event Delegation =====================
main.innerHTML += `
<div id="delegation" class="section">
  <h2>Event Delegation</h2>
  <p>Handle events from many child elements with a single parent listener.</p>

  <div class="card">
    <h3>Interactive Delegation Demo</h3>
    <span class="tag tag-pattern">Delegation</span>
    <pre>// One listener on the parent handles all children
container.addEventListener('click', (e) => {
  const item = e.target.closest('[data-action]');
  if (!item) return;
  const action = item.dataset.action;
  // handle action...
});</pre>
    <p style="color:var(--text-muted);font-size:0.85rem;margin:0.5rem 0">Click any box below. One listener on the container handles all clicks:</p>
    <div class="demo-area" id="delegation-area">
      <div class="demo-box" data-action="save" data-id="1">Save</div>
      <div class="demo-box" data-action="delete" data-id="2">Delete</div>
      <div class="demo-box" data-action="edit" data-id="3">Edit</div>
      <div class="demo-box" data-action="copy" data-id="4">Copy</div>
      <div class="demo-box" data-action="share" data-id="5">Share</div>
    </div>
    <div class="btn-row">
      <button class="run-btn" onclick="addDelegatedItem()">Add Item</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-deleg'))">Clear</button>
    </div>
    <div class="output" id="out-deleg"></div>
  </div>

  <div class="card">
    <h3>Event.target vs Event.currentTarget</h3>
    <span class="tag tag-api">Event</span>
    <pre>// target: element that triggered the event
// currentTarget: element the listener is attached to
parent.addEventListener('click', (e) => {
  console.log(e.target);        // clicked child
  console.log(e.currentTarget); // parent
});</pre>
    <p style="color:var(--text-muted);font-size:0.85rem;margin:0.5rem 0">Click nested elements to see target vs currentTarget:</p>
    <div class="demo-area" id="target-demo" style="cursor:pointer">
      <div style="background:var(--surface2);padding:0.75rem;border-radius:6px;border:1px solid var(--border)" data-name="outer">
        <span style="color:var(--text-muted);font-size:0.8rem">outer div</span>
        <div style="background:var(--bg);padding:0.5rem;border-radius:4px;margin-top:0.5rem;border:1px solid var(--border)" data-name="inner">
          <span style="color:var(--text-muted);font-size:0.8rem">inner div</span>
          <button class="secondary-btn" data-name="button" style="margin-top:0.5rem;margin-left:0">deep button</button>
        </div>
      </div>
    </div>
    <div class="output" id="out-target"></div>
  </div>
</div>`;

// Section 3 logic
let delegItemId = 6;
const delegArea = document.getElementById('delegation-area');
const delegOut = document.getElementById('out-deleg');

delegArea.addEventListener('click', (e) => {
  const item = e.target.closest('[data-action]');
  if (!item) return;
  item.classList.add('highlight');
  setTimeout(() => item.classList.remove('highlight'), 300);
  log(delegOut, `[click] action="${item.dataset.action}" id="${item.dataset.id}" tag=${item.tagName}`, 'info');
});

function addDelegatedItem() {
  const actions = ['archive', 'pin', 'flag', 'export', 'print'];
  const action = actions[Math.floor(Math.random() * actions.length)];
  const box = document.createElement('div');
  box.className = 'demo-box';
  box.dataset.action = action;
  box.dataset.id = delegItemId++;
  box.textContent = action.charAt(0).toUpperCase() + action.slice(1);
  delegArea.appendChild(box);
  log(delegOut, `Added new item: action="${action}" id="${box.dataset.id}"`, 'warn');
}

document.getElementById('target-demo').addEventListener('click', (e) => {
  const out = document.getElementById('out-target');
  const targetName = e.target.dataset?.name || e.target.tagName.toLowerCase();
  log(out, `target: ${targetName}  |  currentTarget: ${e.currentTarget.id}`, 'info');
});

// ===================== SECTION 4: Listener Options =====================
main.innerHTML += `
<div id="options" class="section">
  <h2>Listener Options</h2>
  <p>Explore once, signal, passive, and capture options for addEventListener.</p>

  <div class="card">
    <h3>once Option</h3>
    <span class="tag tag-api">once</span>
    <pre>// Listener is automatically removed after first invocation
button.addEventListener('click', handler, { once: true });</pre>
    <div class="btn-row">
      <button class="run-btn" id="once-btn">Click me (once: true)</button>
      <button class="secondary-btn" onclick="resetOnce()">Reset</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-once'))">Clear</button>
    </div>
    <div class="output" id="out-once"></div>
  </div>

  <div class="card">
    <h3>capture Option</h3>
    <span class="tag tag-api">capture</span>
    <pre>// capture: true -> listener fires during capture phase (parent first)
// capture: false (default) -> listener fires during bubble phase (child first)
parent.addEventListener('click', handler, { capture: true });</pre>
    <div class="btn-row">
      <button class="run-btn" onclick="demoCaptureVsBubble()">Test Capture vs Bubble</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-capture'))">Clear</button>
    </div>
    <div class="output" id="out-capture"></div>
  </div>

  <div class="card">
    <h3>passive Option</h3>
    <span class="tag tag-api">passive</span>
    <pre>// passive: true tells the browser the listener won't call preventDefault()
// This allows optimizations (smoother scrolling)
el.addEventListener('touchmove', handler, { passive: true });
// Calling preventDefault() in a passive listener is a no-op + console warning</pre>
    <div class="btn-row">
      <button class="run-btn" onclick="demoPassive()">Test Passive</button>
      <button class="secondary-btn" onclick="clearLog(document.getElementById('out-passive'))">Clear</button>
    </div>
    <div class="output" id="out-passive"></div>
  </div>

  <div class="card">
    <h3>signal Option (AbortSignal)</h3>
    <span class="tag tag-api">signal</span>
    <pre>const controller = new AbortController();
el.addEventListener('click', handler, { signal: controller.signal });
// Later: remove the listener
controller.abort();</pre>
    <p style="color:var(--text-muted);font-size:0.85rem">See the AbortSignal Cleanup section for full demo.</p>
  </div>
</div>`;

// Section 4 logic
function setupOnce() {
  const btn = document.getElementById('once-btn');
  const out = document.getElementById('out-once');
  let count = 0;
  const handler = () => {
    count++;
    log(out, `Fired! (count: ${count}) - this listener is now removed`, 'info');
  };
  btn.addEventListener('click', handler, { once: true });
  btn._onceSetup = true;
}
function resetOnce() {
  const out = document.getElementById('out-once');
  log(out, 'Re-attaching once listener...', 'warn');
  setupOnce();
}
setupOnce();

function demoCaptureVsBubble() {
  const out = document.getElementById('out-capture');
  clearLog(out);
  const grandparent = document.createElement('div');
  const parent = document.createElement('div');
  const child = document.createElement('div');
  grandparent.appendChild(parent);
  parent.appendChild(child);

  const order = [];
  grandparent.addEventListener('click', () => { order.push('grandparent (capture)'); }, { capture: true });
  parent.addEventListener('click', () => { order.push('parent (capture)'); }, { capture: true });
  child.addEventListener('click', () => { order.push('child (target)'); });
  parent.addEventListener('click', () => { order.push('parent (bubble)'); });
  grandparent.addEventListener('click', () => { order.push('grandparent (bubble)'); });

  child.dispatchEvent(new Event('click', { bubbles: true }));
  log(out, 'Event propagation order:');
  order.forEach((step, i) => log(out, `  ${i + 1}. ${step}`, step.includes('capture') ? 'warn' : 'info'));
}

function demoComposition() {

function demoShadowComposed() {

}

function demoVeto() {
  const out = document.getElementById('out-veto');
  const shouldVeto = document.getElementById('veto-check').checked;
  const target = new EventTarget();

  target.addEventListener('beforeSave', (e) => {
    log(out, 'Listener received "beforeSave"', 'info');
    if (shouldVeto) {
      e.preventDefault();
      log(out, '  -> preventDefault() called!', 'error');
    } else {
      log(out, '  -> allowing event to proceed', 'info');
    }
  });

  const event = new Event('beforeSave', { cancelable: true });
  const allowed = target.dispatchEvent(event);
  log(out, `\ndispatchEvent() returned: ${allowed}`, allowed ? '' : 'error');
  if (allowed) {
    log(out, 'Save proceeds!', 'info');
  } else {
    log(out, 'Save was vetoed.', 'warn');
  }

function demoValidation() {
  const out = document.getElementById('out-validate');
  const name = document.getElementById('form-name').value;

  class Form extends EventTarget {
    submit(data) {
      const evt = new CustomEvent('beforeSubmit', { cancelable: true, detail: { data } });
      if (this.dispatchEvent(evt)) {
        this.dispatchEvent(new CustomEvent('submit', { detail: { data } }));
        return true;
      }
      return false;
    }
  }

  const form = new Form();
  form.addEventListener('beforeSubmit', (e) => {
    log(out, `[beforeSubmit] Validating: name="${e.detail.data.name}"`, 'info');
    if (!e.detail.data.name) {
      e.preventDefault();
      log(out, '  Validation FAILED: name is empty', 'error');

  });
  form.addEventListener('submit', (e) => {
    log(out, `[submit] Form submitted with: ${JSON.stringify(e.detail.data)}`, 'info');
  });

  log(out, `\nAttempting form submit with name="${name}"...`);
  const result = form.submit({ name, ts: Date.now() });
  log(out, `Result: ${result ? 'SUBMITTED' : 'VETOED'}`, result ? '' : 'warn');
}
