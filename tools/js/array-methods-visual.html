<style>
:root {

button.run { background: var(--accent); color: #000; border: none; padding: 0.5rem 1.25rem; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; margin-right: 0.5rem; transition: background 0.2s; }

.arr-viz { display: flex; gap: 4px; flex-wrap: wrap; margin: 0.5rem 0; }
.arr-item {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 40px;
  height: 36px;
  padding: 0 8px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  border: 2px solid;
  transition: all 0.3s;
}
.arr-item.normal { background: rgba(110,158,255,0.15); border-color: rgba(110,158,255,0.4); color: var(--accent); }
.arr-item.highlight { background: rgba(76,175,80,0.2); border-color: rgba(76,175,80,0.5); color: var(--green); }

.arr-item.accumulator { background: rgba(255,152,0,0.2); border-color: rgba(255,152,0,0.5); color: var(--orange); min-width: 60px; }
.step { padding: 0.75rem; border-left: 3px solid var(--border); margin: 0.5rem 0; margin-left: 0.5rem; }
.step-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.25rem; }

table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--accent); font-weight: 600; }
code { background: var(--surface-2); padding: 0.1rem 0.35rem; border-radius: 3px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--purple); }
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
.badge-yes { background: rgba(76,175,80,0.15); color: var(--green); }
.badge-no { background: rgba(239,83,80,0.15); color: var(--red); }
.badge-new { background: rgba(179,136,255,0.15); color: var(--purple); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 700px) {
  .grid-2 { grid-template-columns: 1fr; }

<script>
function ln(label, value, cls='value') {
  return `<span class="label" ti="label_label" ti="label_label">${label}: </span><span class="${cls}">${value}</span>\n`;
}

function arrViz(items, cls='normal') {
  return '<div class="arr-viz">' + items.map(v => `<div class="arr-item ${cls}">${v}</div>`).join('') + '</div>';
}

const sections = [
  { id: 'classic', label: 'map/filter/reduce' },
  { id: 'forloop', label: 'vs for loop' },
  { id: 'newmethods', label: 'New Methods' },
  { id: 'groupby', label: 'groupBy' },
  { id: 'setops', label: 'Set Operations' },
  { id: 'immutable', label: 'Mutable vs Immutable' },
  { id: 'perf', label: 'Performance' },
];

const nav = document.getElementById('nav');
sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.label;
  btn.onclick = () => {
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById('sec-' + s.id).classList.add('active');
    document.querySelectorAll('nav button').forEach((b, j) => b.classList.toggle('active', j === i));
  };
  if (i === 0) btn.classList.add('active');
  nav.appendChild(btn);
});

const main = document.getElementById('main');

// ── Classic Methods ──
const sec1 = document.createElement('div');
sec1.id = 'sec-classic';
sec1.className = 'section active';
sec1.innerHTML = `
<div class="card">
  <h3 ti="h3_map_transform_each_elemen" ti="h3_map_transform_each_elemen">map() — Transform each element</h3>
  <button class="run" onclick="vizMap()" ti="btn_visualize" ti="btn_visualize_2" ti="btn_visualize_3" ti="btn_visualize_4" ti="btn_visualize" ti="btn_visualize_2" ti="btn_visualize_3" ti="btn_visualize_4">Visualize</button>
  <div id="mapViz"></div>
</div>
<div class="card">
  <h3 ti="h3_filter_keep_matching_elem" ti="h3_filter_keep_matching_elem">filter() — Keep matching elements</h3>
  <button class="run" onclick="vizFilter()">Visualize</button>
  <div id="filterViz"></div>
</div>
<div class="card">
  <h3 ti="h3_reduce_accumulate_to_sing" ti="h3_reduce_accumulate_to_sing">reduce() — Accumulate to single value</h3>
  <button class="run" onclick="vizReduce()">Visualize</button>
  <div id="reduceViz"></div>
</div>
<div class="card">
  <h3 ti="h3_flatmap_map_flatten" ti="h3_flatmap_map_flatten">flatMap() — Map + Flatten</h3>
  <button class="run" onclick="vizFlatMap()">Visualize</button>
  <div id="flatMapViz"></div>
</div>`;
main.appendChild(sec1);

function vizMap() {
  const c = document.getElementById('mapViz');
  const input = [1, 2, 3, 4, 5];
  const fn = x => x * 2;
  let html = '<div class="step-label">Input: [1, 2, 3, 4, 5]</div>' + arrViz(input);
  html += '<div class="arrow">↓ map(x => x * 2)</div>';

  // Step by step
  for (let i = 0; i < input.length; i++) {
    const items = input.map((v, j) => {
      if (j < i) return `<div class="arr-item result">${fn(v)}</div>`;
      if (j === i) return `<div class="arr-item highlight">${v} → ${fn(v)}</div>`;
      return `<div class="arr-item normal">${v}</div>`;
    });
    html += `<div class="step"><div class="step-label">Step ${i+1}: fn(${input[i]}) = ${fn(input[i])}</div><div class="arr-viz">${items.join('')}</div></div>`;
  }

  html += '<div class="step-label">Result:</div>' + arrViz(input.map(fn), 'result');
  c.innerHTML = html;
}

function vizFilter() {
  const c = document.getElementById('filterViz');
  const input = [1, 2, 3, 4, 5, 6, 7, 8];
  const fn = x => x % 2 === 0;
  let html = '<div class="step-label">Input: [1, 2, 3, 4, 5, 6, 7, 8]</div>' + arrViz(input);
  html += '<div class="arrow">↓ filter(x => x % 2 === 0)</div>';

  for (let i = 0; i < input.length; i++) {
    const pass = fn(input[i]);
    const items = input.map((v, j) => {
      if (j < i) return `<div class="arr-item ${fn(v) ? 'highlight' : 'filtered'}">${v}</div>`;
      if (j === i) return `<div class="arr-item ${pass ? 'highlight' : 'filtered'}">${v} ${pass ? '✓' : '✗'}</div>`;
      return `<div class="arr-item normal">${v}</div>`;
    });
    html += `<div class="step"><div class="step-label">Step ${i+1}: ${input[i]} % 2 === 0? ${pass ? 'YES — keep' : 'NO — remove'}</div><div class="arr-viz">${items.join('')}</div></div>`;
  }

  html += '<div class="step-label">Result:</div>' + arrViz(input.filter(fn), 'highlight');
  c.innerHTML = html;
}

function vizReduce() {
  const c = document.getElementById('reduceViz');
  const input = [10, 20, 30, 40, 50];
  let html = '<div class="step-label">Input: [10, 20, 30, 40, 50]</div>' + arrViz(input);
  html += '<div class="arrow">↓ reduce((acc, x) => acc + x, 0)</div>';

  let acc = 0;
  for (let i = 0; i < input.length; i++) {
    const prev = acc;
    acc += input[i];
    html += `<div class="step">
      <div class="step-label">Step ${i+1}: acc(${prev}) + ${input[i]} = ${acc}</div>
      <div class="arr-viz">
        <div class="arr-item accumulator">acc=${acc}</div>
        ${input.slice(i+1).map(v => `<div class="arr-item normal">${v}</div>`).join('')}
      </div>
    </div>`;
  }

  html += `<div class="step-label">Result:</div><div class="arr-viz"><div class="arr-item accumulator">${acc}</div></div>`;
  c.innerHTML = html;
}

function vizFlatMap() {
  const c = document.getElementById('flatMapViz');
  const input = [[1,2], [3], [4,5,6]];
  let html = '<div class="step-label">Input: [[1,2], [3], [4,5,6]]</div>';
  html += '<div class="arr-viz">' + input.map(a => `<div class="arr-item normal">[${a}]</div>`).join('') + '</div>';
  html += '<div class="arrow">↓ flatMap(x => x.map(n => n * 10))</div>';

  const fn = x => x.map(n => n * 10);
  for (let i = 0; i < input.length; i++) {
    const mapped = fn(input[i]);
    html += `<div class="step"><div class="step-label">Step ${i+1}: [${input[i]}] → map(n => n*10) → [${mapped}] → flatten</div>
    <div class="arr-viz">${mapped.map(v => `<div class="arr-item result">${v}</div>`).join('')}</div></div>`;
  }

  const result = input.flatMap(fn);
  html += '<div class="step-label">Result:</div>' + arrViz(result, 'result');
  c.innerHTML = html;
}

// ── vs for loop ──
const sec2 = document.createElement('div');
sec2.id = 'sec-forloop';
sec2.className = 'section';
sec2.innerHTML = `
<div class="card">
  <h3 ti="h3_array_methods_vs_for_loop" ti="h3_array_methods_vs_for_loop">Array Methods vs for Loop</h3>
  <p>Side-by-side comparison showing equivalent operations.</p>
  <div class="output" id="forOut"></div>
</div>`;
main.appendChild(sec2);

document.getElementById('forOut').innerHTML = `<span class="label" ti="label_map_equivalent" ti="label_map_equivalent">── map equivalent ──</span>

<span class="warn">// for loop</span>
const result = [];
for (let i = 0; i < arr.length; i++) {
  result.push(arr[i] * 2);
}

<span class="value">// Array method</span>
const result = arr.map(x => x * 2);

<span class="label" ti="label_filter_equivalent" ti="label_filter_equivalent">── filter equivalent ──</span>

<span class="warn">// for loop</span>
const result = [];
for (const item of arr) {
  if (item > 5) result.push(item);
}

<span class="value">// Array method</span>
const result = arr.filter(x => x > 5);

<span class="label" ti="label_reduce_equivalent" ti="label_reduce_equivalent">── reduce equivalent ──</span>

<span class="warn">// for loop</span>
let sum = 0;
for (const n of arr) {
  sum += n;
}

<span class="value">// Array method</span>
const sum = arr.reduce((acc, n) => acc + n, 0);

<span class="label" ti="label_chaining_advantage" ti="label_chaining_advantage">── Chaining advantage ──</span>

<span class="warn">// for loop (nested, harder to read)</span>
const result = [];
for (const item of arr) {
  if (item.active) {
    result.push(item.name.toUpperCase());
  }
}

<span class="value">// Array methods (declarative, chainable)</span>
const result = arr
  .filter(item => item.active)
  .map(item => item.name.toUpperCase());`;

// ── New Methods ──
const sec3 = document.createElement('div');
sec3.id = 'sec-newmethods';
sec3.className = 'section';
sec3.innerHTML = `
<div class="card">
  <h3 ti="h3_es2023_new_array_methods" ti="h3_es2023_new_array_methods">ES2023+ New Array Methods</h3>
  <p>Interactive demos of recently added methods.</p>
  <button class="run" onclick="runNewMethods()" ti="btn_run_all" ti="btn_run_all">Run All</button>
  <div id="newOut"></div>
</div>`;
main.appendChild(sec3);

function runNewMethods() {
  const c = document.getElementById('newOut');
  const arr = [10, 20, 30, 40, 50];
  let html = '';

  // .at()
  html += '<div class="card" style="background:var(--surface-2);border:1px solid var(--border)">';
  html += '<h3 style="color:var(--purple)">Array.at() <span class="badge badge-new">ES2022</span></h3>';
  html += `<div class="step-label">arr = [${arr}]</div>` + arrViz(arr);
  html += `<div class="output" style="margin-top:0.5rem">`;
  html += ln('arr.at(0)', arr.at(0));
  html += ln('arr.at(-1)', arr.at(-1));
  html += ln('arr.at(-2)', arr.at(-2));
  html += ln('vs arr[arr.length-1]', arr[arr.length-1], 'warn');
  html += '</div></div>';

  // .findLast() / .findLastIndex()
  const arr2 = [5, 12, 8, 130, 44, 3];
  html += '<div class="card" style="background:var(--surface-2);border:1px solid var(--border)">';
  html += '<h3 style="color:var(--purple)">findLast() / findLastIndex() <span class="badge badge-new">ES2023</span></h3>';
  html += `<div class="step-label">arr = [${arr2}]</div>` + arrViz(arr2);
  if (arr2.findLast) {
    html += `<div class="output" style="margin-top:0.5rem">`;
    html += ln('findLast(x => x > 10)', arr2.findLast(x => x > 10));
    html += ln('findLastIndex(x => x > 10)', arr2.findLastIndex(x => x > 10));
    html += ln('vs find(x => x > 10)', arr2.find(x => x > 10), 'warn');
    html += ln('vs findIndex(x => x > 10)', arr2.findIndex(x => x > 10), 'warn');
    html += '</div>';
  } else {
    html += '<div class="output"><span class="error">Not supported in this browser</span></div>';
  }
  html += '</div>';

  // .toSorted() / .toReversed() / .toSpliced() / .with()
  const arr3 = [3, 1, 4, 1, 5, 9];
  html += '<div class="card" style="background:var(--surface-2);border:1px solid var(--border)">';
  html += '<h3 style="color:var(--purple)">toSorted() / toReversed() / toSpliced() / with() <span class="badge badge-new">ES2023</span></h3>';
  html += `<div class="step-label">arr = [${arr3}]</div>` + arrViz(arr3);
  html += '<div class="output" style="margin-top:0.5rem">';

  if (arr3.toSorted) {
    const sorted = arr3.toSorted();
    html += ln('toSorted()', `[${sorted}]`) + ln('  original unchanged', `[${arr3}]`);
  } else { html += ln('toSorted()', 'Not supported', 'error'); }

  if (arr3.toReversed) {
    const rev = arr3.toReversed();
    html += ln('toReversed()', `[${rev}]`) + ln('  original unchanged', `[${arr3}]`);
  } else { html += ln('toReversed()', 'Not supported', 'error'); }

  if (arr3.toSpliced) {
    const spliced = arr3.toSpliced(2, 1, 99);
    html += ln('toSpliced(2, 1, 99)', `[${spliced}]`) + ln('  original unchanged', `[${arr3}]`);
  } else { html += ln('toSpliced()', 'Not supported', 'error'); }

  if (arr3.with) {
    const w = arr3.with(2, 99);
    html += ln('with(2, 99)', `[${w}]`) + ln('  original unchanged', `[${arr3}]`);
  } else { html += ln('with()', 'Not supported', 'error'); }

  html += '</div></div>';
  c.innerHTML = html;
}

// ── groupBy ──
const sec4 = document.createElement('div');
sec4.id = 'sec-groupby';
sec4.className = 'section';
sec4.innerHTML = `
<div class="card">
  <h3 ti="h3_object_groupby_map_groupb" ti="h3_object_groupby_map_groupb">Object.groupBy() / Map.groupBy()</h3>
  <p>Group array elements by a classifier function. <span class="badge badge-new">ES2024</span></p>

function runGroupBy() {
  const c = document.getElementById('groupOut');
  const inventory = [
    { name: 'asparagus', type: 'vegetables', quantity: 5 },
    { name: 'bananas', type: 'fruit', quantity: 0 },
    { name: 'goat', type: 'meat', quantity: 23 },
    { name: 'cherries', type: 'fruit', quantity: 12 },
    { name: 'fish', type: 'meat', quantity: 1 },
    { name: 'corn', type: 'vegetables', quantity: 8 },
  ];

  let html = '<div class="step-label">Input:</div><div class="output" style="margin-bottom:1rem">';
  html += inventory.map(i => `{ name: "${i.name}", type: "${i.type}", qty: ${i.quantity} }`).join('\n');
  html += '</div>';

  // Object.groupBy
  if (typeof Object.groupBy === 'function') {
    const byType = Object.groupBy(inventory, item => item.type);
    html += '<div class="step-label">Object.groupBy(inventory, item => item.type):</div>';
    html += '<div class="output">';
    for (const [key, items] of Object.entries(byType)) {
      html += `<span class="value">${key}:</span>\n`;
      items.forEach(i => { html += `  ${i.name} (qty: ${i.quantity})\n`; });
    }
    html += '</div>';

    // Group by quantity status
    const byStatus = Object.groupBy(inventory, item => item.quantity > 0 ? 'in-stock' : 'out-of-stock');
    html += '<div class="step-label" style="margin-top:1rem">Object.groupBy(inventory, item => qty > 0 ? "in-stock" : "out-of-stock"):</div>';
    html += '<div class="output">';
    for (const [key, items] of Object.entries(byStatus)) {
      html += `<span class="${key === 'in-stock' ? 'value' : 'error'}">${key}:</span> ${items.map(i => i.name).join(', ')}\n`;
    }
    html += '</div>';
  } else {
    html += '<div class="output"><span class="error">Object.groupBy() is not supported in this browser</span>\n\n';
    html += '<span class="label" ti="label_polyfill_pattern" ti="label_polyfill_pattern">Polyfill pattern:</span>\n';
    html += 'function groupBy(arr, fn) {\n  return arr.reduce((groups, item) => {\n    const key = fn(item);\n    (groups[key] ??= []).push(item);\n    return groups;\n  }, {});\n}';
    html += '</div>';
  }

  // Map.groupBy
  if (typeof Map.groupBy === 'function') {
    html += '<div class="step-label" style="margin-top:1rem">Map.groupBy (returns Map instead of Object):</div>';
    const mapResult = Map.groupBy(inventory, item => item.type);
    html += '<div class="output">';
    html += ln('Type', 'Map') + ln('Size', mapResult.size);
    for (const [key, items] of mapResult) {
      html += ln(key, items.map(i => i.name).join(', '));
    }
    html += ln('Advantage', 'Any value as key (not just strings)', 'warn');
    html += '</div>';
  }

  c.innerHTML = html;
}

function runSetOps() {
  const c = document.getElementById('setOut');
  const a = new Set([1, 2, 3, 4, 5]);
  const b = new Set([3, 4, 5, 6, 7]);

  let html = '<div class="step-label">Set A = {1, 2, 3, 4, 5}</div>' + arrViz([1,2,3,4,5], 'normal');
  html += '<div class="step-label">Set B = {3, 4, 5, 6, 7}</div>' + arrViz([3,4,5,6,7], 'result');

  html += '<div class="output" style="margin-top:1rem">';

  const ops = [
    { name: 'union', desc: 'All elements from both', expected: [1,2,3,4,5,6,7] },
    { name: 'intersection', desc: 'Elements in both', expected: [3,4,5] },
    { name: 'difference', desc: 'In A but not B', expected: [1,2] },
    { name: 'symmetricDifference', desc: 'In either but not both', expected: [1,2,6,7] },
  ];

  for (const op of ops) {
    if (typeof a[op.name] === 'function') {
      const result = [...a[op.name](b)];
      html += ln(`A.${op.name}(B)`, `{${result.join(', ')}} — ${op.desc}`);
    } else {
      html += ln(`A.${op.name}(B)`, `Not supported — expected: {${op.expected.join(', ')}} (${op.desc})`, 'warn');
    }
  }

  // Boolean checks
  const sub = new Set([3, 4]);
  html += '\n' + ln('── Boolean checks ──', '', 'label');

  if (typeof sub.isSubsetOf === 'function') {
    html += ln('{3,4}.isSubsetOf(A)', sub.isSubsetOf(a));
    html += ln('{3,4}.isSupersetOf(A)', sub.isSupersetOf(a));
  } else {
    html += ln('isSubsetOf', 'Not supported — {3,4} is subset of A: true', 'warn');
  }

  if (typeof a.isDisjointFrom === 'function') {
    const disjoint = new Set([8, 9]);
    html += ln('A.isDisjointFrom({8,9})', a.isDisjointFrom(disjoint));
    html += ln('A.isDisjointFrom(B)', a.isDisjointFrom(b));
  } else {
    html += ln('isDisjointFrom', 'Not supported', 'warn');
  }

  // Fallback implementations
  html += '\n' + ln('── Manual implementation (if not supported) ──', '', 'label');
  html += '\n// Union\nconst union = new Set([...a, ...b]);\n';
  html += '// Intersection\nconst intersect = new Set([...a].filter(x => b.has(x)));\n';
  html += '// Difference\nconst diff = new Set([...a].filter(x => !b.has(x)));\n';
  html += '// Symmetric Difference\nconst symDiff = new Set([...a].filter(x => !b.has(x)).concat([...b].filter(x => !a.has(x))));\n';

  html += '</div>';
  c.innerHTML = html;
}

function runMutability() {
  const c = document.getElementById('mutOut');
  const methods = [
    { name: 'sort()', mutable: true, immutable: 'toSorted()', category: 'Sort' },
    { name: 'reverse()', mutable: true, immutable: 'toReversed()', category: 'Reverse' },
    { name: 'splice()', mutable: true, immutable: 'toSpliced()', category: 'Splice' },
    { name: 'arr[i] = v', mutable: true, immutable: 'with(i, v)', category: 'Replace' },
    { name: 'push()', mutable: true, immutable: '[...arr, v]', category: 'Add end' },
    { name: 'pop()', mutable: true, immutable: 'arr.slice(0,-1)', category: 'Remove end' },
    { name: 'unshift()', mutable: true, immutable: '[v, ...arr]', category: 'Add start' },
    { name: 'shift()', mutable: true, immutable: 'arr.slice(1)', category: 'Remove start' },
    { name: 'fill()', mutable: true, immutable: 'arr.map(() => v)', category: 'Fill' },
    { name: 'copyWithin()', mutable: true, immutable: '(manual)', category: 'Copy within' },
  ];

  let html = '<table><thead><tr><th ti="th_operation" ti="th_operation">Operation</th><th style="color:var(--red)" ti="th_mutating" ti="th_mutating">Mutating</th><th style="color:var(--green)" ti="th_immutable" ti="th_immutable">Immutable</th></tr></thead><tbody>';
  for (const m of methods) {
    html += `<tr><td>${m.category}</td><td><code style="color:var(--red)">${m.name}</code></td><td><code style="color:var(--green)">${m.immutable}</code></td></tr>`;
  }
  html += '</tbody></table>';

  // Live demo
  html += '<div class="output" style="margin-top:1rem">';
  const arr = [3, 1, 4, 1, 5];
  html += ln('Original', `[${arr}]`);

  const sorted = [...arr].sort();
  html += '\n' + ln('── sort() mutates! ──', '', 'label');
  const arrCopy = [...arr];
  arrCopy.sort();
  html += ln('After arr.sort()', `[${arrCopy}]`, 'error');
  html += ln('Original is now', `[${arrCopy}]  (same reference — mutated!)`, 'error');

  if (arr.toSorted) {
    const orig2 = [3, 1, 4, 1, 5];
    const sorted2 = orig2.toSorted();
    html += '\n' + ln('── toSorted() is safe ──', '', 'label');
    html += ln('toSorted() result', `[${sorted2}]`);
    html += ln('Original unchanged', `[${orig2}]`, 'value');
  }

  html += '</div>';
  c.innerHTML = html;
}

  <div class="output"><span class="value">1. Avoid chaining filter().map() on huge arrays</span>
   // BAD: iterates twice
   arr.filter(x => x > 5).map(x => x * 2)
   // GOOD: single pass with reduce
   arr.reduce((acc, x) => x > 5 ? [...acc, x * 2] : acc, [])
   // EVEN BETTER: flatMap (single pass)
   arr.flatMap(x => x > 5 ? [x * 2] : [])

<span class="value">2. Use for...of for early termination</span>
   // find() stops at first match — efficient
   arr.find(x => x > 100)
   // some()/every() also short-circuit
   arr.some(x => x > 100)

<span class="value">3. Pre-allocate for known sizes</span>
   // BAD: push grows dynamically
   const result = [];
   for (const x of arr) result.push(x * 2);
   // GOOD: pre-allocate
   const result = new Array(arr.length);
   for (let i = 0; i < arr.length; i++) result[i] = arr[i] * 2;

<span class="value">4. Use typed arrays for numeric data</span>
   // Regular: ~100ms for 10M items
   const arr = new Array(10_000_000).fill(0).map((_,i) => i);
   // Typed: ~20ms for 10M items
   const arr = new Float64Array(10_000_000);</div>

function runPerfBench() {
  const o = document.getElementById('perfOut');
  o.innerHTML = ln('Status', 'Running...', 'warn');

  requestAnimationFrame(() => {
    const sizes = [1000, 10000, 100000];
    let result = '';

    for (const size of sizes) {
      const arr = Array.from({length: size}, (_, i) => i);
      result += ln(`── Array size: ${size.toLocaleString()} ──`, '', 'label') + '\n';

      // map
      let t = performance.now();
      arr.map(x => x * 2);
      result += ln('map(x => x*2)', (performance.now() - t).toFixed(2) + ' ms');

      // filter
      t = performance.now();
      arr.filter(x => x % 2 === 0);
      result += ln('filter(x => x%2===0)', (performance.now() - t).toFixed(2) + ' ms');

      // reduce
      t = performance.now();
      arr.reduce((a, b) => a + b, 0);
      result += ln('reduce(sum)', (performance.now() - t).toFixed(2) + ' ms');

      // for loop
      t = performance.now();
      let sum = 0;
      for (let i = 0; i < arr.length; i++) sum += arr[i];
      result += ln('for loop (sum)', (performance.now() - t).toFixed(2) + ' ms');

      // forEach
      t = performance.now();
      let sum2 = 0;
      arr.forEach(x => sum2 += x);
      result += ln('forEach (sum)', (performance.now() - t).toFixed(2) + ' ms');

      // find
      t = performance.now();
      arr.find(x => x === size - 1);
      result += ln('find (last element)', (performance.now() - t).toFixed(2) + ' ms');

      // includes
      t = performance.now();
      arr.includes(size - 1);
      result += ln('includes (last)', (performance.now() - t).toFixed(2) + ' ms');

      result += '\n';
    }

    o.innerHTML = result;
  });
}
