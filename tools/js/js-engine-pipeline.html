let currentScenario=0,currentStep=-1,currentTab='detail',autoInterval=null;

function init(){
  const sel=document.getElementById('scenarioSelect');
  SCENARIOS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.name;sel.appendChild(o)});
  sel.onchange=()=>{currentScenario=+sel.value;resetPipeline()};
  renderStages();
  resetPipeline();
}

function renderStages(){
  const el=document.getElementById('stages');
  el.innerHTML=STAGES.slice(0,SCENARIOS[currentScenario].maxStage+1).map((s,i)=>
    `<div class="stage-badge ${STAGE_CLASSES[i]}" id="stage-${s}">${STAGE_LABELS[i]}</div>`
  ).join('');
}

function getStageForStep(step){
  const s=SCENARIOS[currentScenario];
  const total=1+1+1+1+1+s.execution.length;
  if(step<=0)return 0;
  if(step===1)return 1;
  if(step===2)return 2;
  if(step===3)return 3;
  if(step===4)return 4;
  const execIdx=step-5;
  if(execIdx>=0&&execIdx<s.execution.length){
    const t=s.execution[execIdx].type;
    if(t==='interp')return 5;
    if(t==='jit')return 6;
    if(t==='opt')return 7;
    if(t==='deopt')return 8;
  }
  return Math.min(step,s.maxStage);
}

function updateStages(){
  const activeStage=getStageForStep(currentStep);
  const maxStage=SCENARIOS[currentScenario].maxStage;
  STAGES.forEach((s,i)=>{
    const el=document.getElementById('stage-'+s);
    if(!el)return;
    el.className=`stage-badge ${STAGE_CLASSES[i]}`;
    if(i===activeStage)el.classList.add('active');
    else if(i<activeStage)el.classList.add('done');
  });
}

function renderContent(){
  const s=SCENARIOS[currentScenario];
  const stage=getStageForStep(currentStep);
  const el=document.getElementById('pipelineContent');
  let html='';

  // Source
  if(currentStep>=0){
    html+=`<div class="content-panel"><h3 ti="h3_source_code">Source Code</h3><div class="code-block">${escHtml(s.code)}</div></div>`;
  }

  // Tokens
  if(currentStep>=1){
    html+=`<div class="content-panel"><h3 ti="h3_tokens">Tokens</h3><div class="code-block" style="white-space:pre-wrap">`;
    s.tokens.forEach(t=>{html+=`<span class="token tk-${t.type}">${escHtml(t.val)}</span> `});
    html+=`</div></div>`;
  }

  // AST
  if(currentStep>=3){
    html+=`<div class="content-panel"><h3 ti="h3_abstract_syntax_tree">Abstract Syntax Tree</h3>`;
    s.ast.forEach(n=>{
      const cls=stage>=3?'highlight':'';
      html+=`<div class="ast-node ${cls}" style="margin-left:${n.depth*20}px">`;
      if(n.type==='lazy')html+=`<span style="color:#ff6b6b">⚠ </span>`;
      else if(n.type==='node')html+=`<span style="color:#69db7c">▸ </span>`;
      else if(n.type==='decl')html+=`<span style="color:#ffd43b">◆ </span>`;
      else html+=`<span style="color:#666">• </span>`;
      html+=escHtml(n.label)+`</div>`;
    });
    html+=`</div>`;
  }

  // Bytecode
  if(currentStep>=4){
    html+=`<div class="content-panel"><h3 ti="h3_ignition_bytecode">Ignition Bytecode</h3>`;
    s.bytecode.forEach((b,i)=>{
      const hl=stage>=4?'highlight':'';
      html+=`<div class="bytecode-line ${hl}"><span class="bc-op">${b.op}</span> <span class="bc-reg">${b.args}</span> <span style="color:#666">${b.comment}</span></div>`;
    });
    html+=`</div>`;
  }

  // Execution
  if(currentStep>=5){
    const execIdx=currentStep-5;
    html+=`<div class="content-panel"><h3 ti="h3_execution_timeline">Execution Timeline</h3>`;
    s.execution.forEach((e,i)=>{
      if(i>execIdx)return;
      html+=`<div class="exec-line ${e.type}"><span class="step-num">${i+1}</span><span>${escHtml(e.msg)}</span></div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
  updateStages();
  renderTab();
}

function renderTab(){
  const s=SCENARIOS[currentScenario];
  const stage=getStageForStep(currentStep);
  const el=document.getElementById('tabContent');

  if(currentTab==='detail'){
    const stageName=STAGES[stage]||'source';
    const detail=s.details[stageName]||'Step through the pipeline to see details.';
    let html=`<div class="info-card"><h4>${STAGE_LABELS[stage]||'Source'} Stage</h4><p>${detail}</p></div>`;

    // Hot/cold status
    if(stage>=5){
      const execIdx=currentStep-5;
      let heat='cold';
      if(execIdx>=0){
        const types=s.execution.slice(0,execIdx+1).map(e=>e.type);
        if(types.includes('opt'))heat='hot';
        else if(types.includes('jit'))heat='warm';
      }
      html+=`<div class="info-card"><h4>Function Status</h4><p>Current tier: <span class="hot-badge hot-${heat}">${heat.toUpperCase()}</span></p></div>`;
    }

    el.innerHTML=html;
  }else if(currentTab==='execution'){
    const execIdx=Math.max(0,currentStep-5);
    let html='<div class="info-card"><h4>Execution Log</h4></div>';
    if(currentStep>=5){
      const s2=SCENARIOS[currentScenario];
      s2.execution.forEach((e,i)=>{
        const opacity=i<=execIdx?1:.3;
        html+=`<div class="exec-line ${e.type}" style="opacity:${opacity}"><span class="step-num">${i+1}</span><span>${escHtml(e.msg)}</span></div>`;
      });
    }else{
      html+='<p style="color:#666;font-size:.8rem;padding:8px">Advance to the Interpreter stage to see execution log.</p>';
    }
    el.innerHTML=html;
  }else{
    el.innerHTML=`
    <div class="info-card"><h4>V8 Compilation Tiers</h4>
    <table class="ref-table">
    <tr><th ti="th_tier">Tier</th><th ti="th_name">Name</th><th ti="th_speed">Speed</th><th ti="th_quality">Quality</th></tr>
    <tr><td>0</td><td>Ignition (Interpreter)</td><td>Instant start</td><td>Baseline</td></tr>
    <tr><td>1</td><td>Sparkplug</td><td>~ms compile</td><td>No optimization</td></tr>
    <tr><td>2</td><td>Maglev</td><td>~5ms compile</td><td>Type speculation</td></tr>
    <tr><td>3</td><td>TurboFan</td><td>~50ms compile</td><td>Full optimization</td></tr>
    </table></div>
    <div class="info-card"><h4>Key Concepts</h4>
    <table class="ref-table">
    <tr><th ti="th_concept">Concept</th><th ti="th_description">Description</th></tr>
    <tr><td>Hidden Class (Map)</td><td>Internal shape descriptor for objects. Same property order = same map.</td></tr>
    <tr><td>Inline Cache (IC)</td><td>Caches property lookup results per call site. States: uninitialized → monomorphic → polymorphic → megamorphic.</td></tr>
    <tr><td>Type Feedback</td><td>Runtime type info collected by Ignition. Guides JIT speculation.</td></tr>
    <tr><td>Deoptimization</td><td>Discards optimized code when speculation fails. Falls back to bytecode.</td></tr>
    <tr><td>OSR</td><td>On-Stack Replacement: optimize a function while it's running mid-loop.</td></tr>
    <tr><td>SMI</td><td>Small Integer: 31-bit integer stored directly in pointer (no heap allocation).</td></tr>
    <tr><td>HeapNumber</td><td>64-bit double stored on heap. Slower than SMI due to allocation + indirection.</td></tr>
    </table></div>
    <div class="info-card"><h4>Optimization Techniques</h4>
    <table class="ref-table">
    <tr><th ti="th_technique">Technique</th><th ti="th_what_it_does">What it does</th></tr>
    <tr><td>Inlining</td><td>Replaces function call with function body</td></tr>
    <tr><td>Escape Analysis</td><td>Eliminates heap allocation if object doesn't escape</td></tr>
    <tr><td>LICM</td><td>Loop-Invariant Code Motion: hoists unchanging code out of loops</td></tr>
    <tr><td>Dead Code Elimination</td><td>Removes unreachable or unused code paths</td></tr>
    <tr><td>Bounds Check Elimination</td><td>Proves array access is always in-bounds</td></tr>
    <tr><td>Register Allocation</td><td>Maps variables to CPU registers instead of memory</td></tr>
    </table></div>`;
  }
}

function stepForward(){
  const s=SCENARIOS[currentScenario];
  const maxStep=4+s.execution.length;
  if(currentStep<maxStep){currentStep++;renderContent()}
}
function stepBack(){if(currentStep>-1){currentStep--;renderContent()}}
function resetPipeline(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null}
  currentStep=-1;renderStages();renderContent();
}
function autoPlay(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null;return}
  autoInterval=setInterval(()=>{
    const s=SCENARIOS[currentScenario];
    const maxStep=4+s.execution.length;
    if(currentStep>=maxStep){clearInterval(autoInterval);autoInterval=null;return}
    stepForward();
  },800);
}
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(t.slice(0,3))));
  renderTab();
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
init();
</script>
