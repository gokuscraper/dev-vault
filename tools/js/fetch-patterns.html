<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetch API Advanced Patterns</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #00bcd4;
    --accent2: #26c6da;
    --success: #69f0ae;
    --warning: #ffd740;
    --error: #ff5252;
    --radius: 8px;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    background: var(--surface);
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #80deea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
  .layout { display: flex; min-height: calc(100vh - 80px); }
  nav {
    width: 260px; min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 1rem 0;
    overflow-y: auto;
  }
  nav button {
    display: block; width: 100%; padding: 0.6rem 1.2rem;
    background: none; border: none; color: var(--text-muted);
    font-size: 0.85rem; text-align: left; cursor: pointer; transition: all 0.15s;
  }
  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active {
    color: var(--accent); background: rgba(0,188,212,0.1);
    border-left: 3px solid var(--accent);
  }
  main { flex: 1; padding: 2rem; overflow-y: auto; max-width: 900px; }
  .section { display: none; }
  .section.active { display: block; }
  .section h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--accent); }
  .section > p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem;
  }
  .card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--accent2); }
  pre {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem; overflow-x: auto;
    font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.5;
    margin-bottom: 0.75rem; color: #b0b0b0;
  }
  code { font-family: var(--font-mono); font-size: 0.8rem; }
  button.run-btn {
    background: var(--accent); color: #000; border: none;
    padding: 0.5rem 1.2rem; border-radius: var(--radius);
    cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: opacity 0.15s;
  }
  button.run-btn:hover { opacity: 0.85; }
  button.secondary-btn {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); padding: 0.5rem 1.2rem;
    border-radius: var(--radius); cursor: pointer; font-size: 0.85rem;
    transition: all 0.15s; margin-left: 0.5rem;

  button.secondary-btn:hover { border-color: var(--accent); }

    background: #0d1117; border: 1px solid var(--border);

<body>
<header>
  <h1>Fetch API Advanced Patterns</h1>
  <p>Request/Response inspection, streaming, AbortController, retry, deduplication, caching, and interceptors</p>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script>
const sections = [
  { id: 'request-response', title: 'Request/Response' },
  { id: 'headers', title: 'Headers Manipulation' },
  { id: 'streaming', title: 'Streaming Body' },
  { id: 'abort', title: 'AbortController' },
  { id: 'retry', title: 'Retry with Backoff' },
  { id: 'dedup', title: 'Request Dedup' },
  { id: 'cache', title: 'Cache API' },
  { id: 'interceptor', title: 'Fetch Interceptor' },
];

function log(el, msg, type = '') {
  const span = document.createElement('span');
  if (type) span.className = `log-${type}`;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}
function clearLog(el) { el.textContent = ''; }

// Build nav
const nav = document.getElementById('nav');
const main = document.getElementById('main');
sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.title;
  btn.dataset.section = s.id;
  if (i === 0) btn.classList.add('active');
  btn.onclick = () => {
    nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    main.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(s.id).classList.add('active');
  };
  nav.appendChild(btn);
});

main.innerHTML += `

const errorRes = new Response('Not Found', { status: 404 });
const redirectRes = Response.redirect('https://example.com', 301);</pre>
    <div class="btn-row">
      <button class="run-btn" onclick="demoResponse('json')">JSON Response</button>
      <button class="run-btn" onclick="demoResponse('error')">Error Response</button>

function demoRequest() {
  const out = document.getElementById('out-req');
  const method = document.getElementById('req-method').value;
  const url = document.getElementById('req-url').value;
  const body = method !== 'GET' && method !== 'HEAD' ? JSON.stringify({ key: 'value' }) : undefined;
  const req = new Request(url, {
    method, body,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer xxx' },
    mode: 'cors', credentials: 'same-origin'
  });
  log(out, 'Request properties:', 'info');
  log(out, `  url: ${req.url}`);
  log(out, `  method: ${req.method}`);
  log(out, `  mode: ${req.mode}`);
  log(out, `  credentials: ${req.credentials}`);
  log(out, `  cache: ${req.cache}`);
  log(out, `  redirect: ${req.redirect}`);
  log(out, `  referrerPolicy: ${req.referrerPolicy}`);
  log(out, `  bodyUsed: ${req.bodyUsed}`);
  log(out, '\nHeaders:', 'info');
  req.headers.forEach((v, k) => log(out, `  ${k}: ${v}`));
  // Clone demo
  const clone = req.clone();
  log(out, `\nCloned request method: ${clone.method}`, 'warn');
}

function demoResponse(type) {
  const out = document.getElementById('out-res');
  let res;
  if (type === 'json') {
    res = Response.json({ message: 'hello', data: [1, 2, 3] }, { status: 200, headers: { 'X-Custom': 'test' } });
  } else if (type === 'error') {
    res = new Response('Not Found', { status: 404, statusText: 'Not Found' });
  } else {
    res = Response.redirect('https://example.com', 301);
  }
  log(out, `Response (${type}):`, 'info');
  log(out, `  ok: ${res.ok}`);
  log(out, `  status: ${res.status}`);
  log(out, `  statusText: ${res.statusText}`);
  log(out, `  type: ${res.type}`);
  log(out, `  redirected: ${res.redirected}`);
  log(out, `  bodyUsed: ${res.bodyUsed}`);
  log(out, '\nHeaders:', 'info');
  res.headers.forEach((v, k) => log(out, `  ${k}: ${v}`));
  if (type === 'json') {
    res.clone().json().then(data => {
      log(out, `\nBody (JSON): ${JSON.stringify(data)}`, 'warn');
    });
  } else if (type === 'error') {
    res.clone().text().then(text => {
      log(out, `\nBody (text): ${text}`, 'error');
    });
  }
}

function demoHeaders() {

function demoHeadersGuard() {

  // Response.redirect creates immutable headers

async function demoStream() {
  const out = document.getElementById('out-stream');
  const bar = document.getElementById('stream-progress');
  bar.style.width = '0%';

  // Simulate a large response with a custom ReadableStream
  const totalSize = 1024 * 100;
  const chunkSize = 1024 * 10;
  const chunks = Math.ceil(totalSize / chunkSize);

  const stream = new ReadableStream({
    async start(controller) {
      for (let i = 0; i < chunks; i++) {
        await new Promise(r => setTimeout(r, 200));
        controller.enqueue(new Uint8Array(chunkSize).fill(65 + i));
      }
      controller.close();
    }
  });

  const reader = stream.getReader();
  let received = 0;
  log(out, `Streaming ${totalSize} bytes in ~${chunkSize} byte chunks...`, 'info');

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    received += value.length;
    const pct = (received / totalSize * 100).toFixed(1);
    bar.style.width = pct + '%';
    log(out, `Chunk: ${value.length} bytes | Total: ${received}/${totalSize} (${pct}%)`, 'info');
  }
  log(out, `\nStream complete! Total bytes: ${received}`, 'warn');
}

async function demoTransformStream() {
  const out = document.getElementById('out-transform');
  // Create source data
  const lines = [
    JSON.stringify({ id: 1, event: 'click', ts: Date.now() }),
    JSON.stringify({ id: 2, event: 'scroll', ts: Date.now() + 100 }),
    JSON.stringify({ id: 3, event: 'keydown', ts: Date.now() + 200 }),
  ];
  const raw = new TextEncoder().encode(lines.join('\n') + '\n');

  // Simulated response body
  const body = new ReadableStream({
    start(controller) {
      controller.enqueue(raw);
      controller.close();
    }
  });

  // Transform pipeline
  const jsonLines = new TransformStream({
    buffer: '',
    transform(chunk, controller) {
      const text = chunk;
      for (const line of text.split('\n')) {
        if (line.trim()) {
          try { controller.enqueue(JSON.parse(line)); }
          catch { controller.enqueue({ raw: line }); }
        }
      }
    }
  });

  log(out, 'Pipeline: ReadableStream -> TextDecoderStream -> JSON Lines', 'info');

  const pipeline = body
    .pipeThrough(new TextDecoderStream())
    .pipeThrough(jsonLines);

  const reader = pipeline.getReader();
  let count = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    count++;
    log(out, `Record ${count}: ${JSON.stringify(value)}`, 'info');
  }
  log(out, `\nPipeline complete: ${count} records processed`, 'warn');
}

let _fetchController = null;
function demoAbortFetch() {
  const out = document.getElementById('out-abort');
  _fetchController = new AbortController();
  log(out, 'Starting simulated fetch (3 second delay)...', 'info');

  const fakeResponse = new Promise((resolve, reject) => {
    const tid = setTimeout(() => resolve({ data: 'success' }), 3000);
    _fetchController.signal.addEventListener('abort', () => {
      clearTimeout(tid);
      reject(new DOMException('The operation was aborted.', 'AbortError'));
    });
  });

  fakeResponse
    .then(data => log(out, `Response: ${JSON.stringify(data)}`, 'info'))
    .catch(err => {
      if (err.name === 'AbortError') {
        log(out, `Fetch cancelled: ${err.message}`, 'warn');
      } else {
        log(out, `Error: ${err.message}`, 'error');
      }
    });
}

    <pre>async function fetchWithRetry(url, options = {}, config = {}) {

      await new Promise(r => setTimeout(r, jitter));

  }

async function demoRetry() {
  const out = document.getElementById('out-retry');
  const maxRetries = Number(document.getElementById('retry-max').value) || 3;
  const failRate = Number(document.getElementById('retry-fail').value) / 100;
  const baseDelay = Number(document.getElementById('retry-delay').value) || 300;
  const start = performance.now();

  log(out, `Config: maxRetries=${maxRetries}, failRate=${(failRate*100).toFixed(0)}%, baseDelay=${baseDelay}ms`, 'info');

  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    const elapsed = (performance.now() - start).toFixed(0);
    const success = Math.random() > failRate;

    if (success) {
      log(out, `Attempt ${attempt + 1}: SUCCESS (${elapsed}ms elapsed)`, 'info');
      log(out, `\nCompleted in ${attempt + 1} attempt(s), ${elapsed}ms total`, 'warn');
      return;
    }

    log(out, `Attempt ${attempt + 1}: FAILED (server error 500)`, 'error');

    if (attempt < maxRetries) {
      const delay = Math.min(baseDelay * Math.pow(2, attempt), 30000);
      const jitter = Math.round(delay * (0.5 + Math.random() * 0.5));
      log(out, `  Waiting ${jitter}ms before retry (backoff: ${delay}ms + jitter)`, 'warn');
      await new Promise(r => setTimeout(r, jitter));
    }
  }
  log(out, `\nAll ${maxRetries + 1} attempts failed. Giving up.`, 'error');
}

function demoDedup() {

  const inflight = new Map();
  let actualRequests = 0;

      return inflight.get(url);

      };

      // Response interceptor
      logs.push({ phase: 'response', msg: `Status: ${response.status} ${response.ok ? 'OK' : 'ERROR'}` });
      if (!response.ok) {
        logs.push({ phase: 'error', msg: `Error interceptor triggered` });
      }
      return response;
    };

function demoMiddleware() {
  const out = document.getElementById('out-middleware');

  // Middleware chain
  const middlewares = [

      log(out, '[MW 1: Auth] Adding Authorization header', 'info');

      const res = await next(req);
      log(out, '[MW 1: Auth] Response passed through', 'info');
      return res;
    },
    async (req, next) => {
      const start = performance.now();
      log(out, '[MW 2: Timer] Request started', 'warn');
      const res = await next(req);
      const elapsed = (performance.now() - start).toFixed(1);
      log(out, `[MW 2: Timer] Completed in ${elapsed}ms`, 'warn');
      return res;
    },
    async (req, next) => {
      log(out, '[MW 3: Logger] Logging request', 'info');
      log(out, `  URL: ${req.url}`, 'info');

      log(out, `[MW 3: Logger] Status: ${res.status}`);
      return res;
    },
  ];

  // Compose middlewares
  function compose(middlewares, finalHandler) {

  const handler = compose(middlewares, async (req) => {
    await new Promise(r => setTimeout(r, 300));
    return { status: 200, data: 'OK' };
