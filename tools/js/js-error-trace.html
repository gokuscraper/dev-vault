<!DOCTYPE html>
<html tk="title_js_error_stack_trace_visu" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Error Stack Trace Visualizer</title>
<meta name="description" content="Interactive JavaScript error stack trace visualizer. Generate errors, see the call stack visually, understand error propagation and try/catch flow.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242837;--border:#2e3347;--text:#e4e7f1;--dim:#8b90a5;--accent:#6c8cff;--accent2:#a78bfa;--green:#4ade80;--red:#f87171;--orange:#fbbf24;--cyan:#22d3ee}
body{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:15px;font-weight:600}
.header span{color:var(--dim);font-size:12px}
.main{display:flex;height:calc(100vh - 49px)}

.left{width:400px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.left label{padding:8px 14px;font-size:11px;color:var(--dim);background:var(--surface);border-bottom:1px solid var(--border)}
.left textarea{flex:1;background:var(--bg);color:var(--text);border:none;padding:14px;font-family:inherit;font-size:12px;resize:none;outline:none;line-height:1.6}
.controls{padding:10px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:6px;border:none;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5a7aee}
.btn-sm{padding:3px 10px;font-size:10px;background:var(--surface2);color:var(--dim);border:1px solid var(--border);border-radius:4px;cursor:pointer}
.btn-sm:hover{color:var(--text)}
.error-msg{color:var(--red);font-size:11px}
.presets-bar{border-top:1px solid var(--border);background:var(--surface);padding:8px 14px;display:flex;gap:6px;overflow-x:auto}
.preset-chip{padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);cursor:pointer;white-space:nowrap}
.preset-chip:hover{border-color:var(--accent);color:var(--text)}
.preset-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(108,140,255,.1)}

.right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Error info */
.error-banner{padding:12px 20px;background:rgba(248,113,113,.08);border-bottom:1px solid rgba(248,113,113,.2)}
.error-banner .error-type{font-size:13px;color:var(--red);font-weight:700}
.error-banner .error-message{font-size:12px;color:var(--text);margin-top:4px}
.error-banner .error-raw{font-size:10px;color:var(--dim);margin-top:6px;line-height:1.4}
.no-error{padding:12px 20px;background:rgba(74,222,128,.06);border-bottom:1px solid rgba(74,222,128,.15)}
.no-error p{color:var(--green);font-size:12px}

/* Stack frames */
.frames-area{flex:1;padding:16px 20px;overflow-y:auto}
.frame{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.frame.top{border-color:var(--red)}
.frame.caught{border-color:var(--orange);border-style:dashed}
.frame-header{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.frame-header:hover{background:var(--surface2)}
.frame-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.frame-num.top{background:var(--red);color:#fff}
.frame-num.normal{background:var(--surface2);color:var(--dim)}
.frame-name{font-size:12px;font-weight:600;flex:1}
.frame-location{font-size:10px;color:var(--dim)}
.frame-tag{font-size:9px;padding:2px 6px;border-radius:8px}
.frame-tag.error-origin{background:rgba(248,113,113,.2);color:var(--red)}
.frame-tag.try-catch{background:rgba(251,191,36,.2);color:var(--orange)}
.frame-tag.async{background:rgba(167,139,250,.2);color:var(--accent2)}
.frame-details{padding:0 14px 12px;display:none;font-size:11px}
.frame.expanded .frame-details{display:block}
.frame-code{background:var(--bg);border-radius:6px;padding:10px;margin-top:6px;line-height:1.6;overflow-x:auto}
.frame-code .line{display:flex;gap:8px}
.frame-code .line-num{color:var(--dim);min-width:24px;text-align:right;user-select:none}
.frame-code .line-content{color:var(--text)}
.frame-code .line.error-line{background:rgba(248,113,113,.1);border-radius:3px}
.frame-code .line.error-line .line-content{color:var(--red)}

/* Propagation flow */
.flow-area{border-top:1px solid var(--border);padding:14px 20px;background:var(--surface);max-height:160px;overflow-y:auto}
.flow-area h3{font-size:11px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.flow-step{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px}
.flow-step .flow-icon{font-size:14px;min-width:20px;text-align:center}
.flow-step .flow-text{color:var(--text)}
.flow-step.throw .flow-text{color:var(--red)}
.flow-step.catch .flow-text{color:var(--orange)}
.flow-step.unwind .flow-text{color:var(--dim)}
.flow-step.ok .flow-text{color:var(--green)}
</style>
</head>
<body>



<div class="header">
  <h1 ti="title_js_error_stack_trace_visu" ti="h1_js_error_stack_trace_visu">JS Error Stack Trace Visualizer</h1>
  <span>Run code, catch errors, visualize the call stack</span>
</div>

<div class="main">
  <div class="left">
    <label ti="label_javascript_code">JavaScript Code</label>
    <textarea id="codeInput" spellcheck="false"></textarea>
    <div class="presets-bar" id="presetsBar"></div>
    <div class="controls">
      <button class="btn btn-primary" onclick="runCode()" ti="btn_run_trace">Run & Trace</button>
      <button class="btn-sm" onclick="clearAll()" ti="btn_clear">Clear</button>
    </div>
  </div>
  <div class="right">
    <div id="errorBanner"></div>
    <div class="frames-area" id="framesArea">
      <div style="color:var(--dim);text-align:center;padding-top:60px;font-size:12px">Click <strong ti="strong_run_trace" ti="strong_run_trace_2">Run & Trace</strong> to execute code and visualize any errors</div>
    </div>
    <div class="flow-area" id="flowArea" style="display:none">
      <h3 ti="h3_error_propagation">Error Propagation</h3>
      <div id="flowSteps"></div>
    </div>
  </div>
</div>


<script>var _LANG={'title_js_error_stack_trace_visu':["JS Error Stack Trace Visualizer", "JS 错误堆栈跟踪可视化工具"],'metadesc_interactive_javascript_er':["Interactive JavaScript error stack trace visualizer. Generate errors, see the call stack visually, understand error propagation and try/catch flow.", "交互式 JavaScript 错误堆栈跟踪可视化工具。生成错误，直观查看调用堆栈，了解错误传播和 try/catch 流程。"],'h1_js_error_stack_trace_visu':["JS Error Stack Trace Visualizer", "JS 错误堆栈跟踪可视化工具"],'h1_name':["' + name + '", "&#39; + 姓名 + &#39;"],'h3_error_propagation':["Error Propagation", "错误传播"],'btn_run_trace':["Run & Trace", "运行与追踪"],'btn_clear':["Clear", "清除"],'strong_run_trace':["Run & Trace", "运行与追踪"],'strong_run_trace_2':["Run & Trace", "运行与追踪"],'label_javascript_code':["JavaScript Code", "JavaScript 代码"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const PRESETS = [
  {
    name: 'Simple Error',
    code: `function deepFunction() {
  throw new Error('Something went wrong');
}

function middleFunction() {
  deepFunction();
}

function topFunction() {
  middleFunction();
}

topFunction();`
  },
  {
    name: 'TypeError',
    code: `function processUser(user) {
  return user.name.toUpperCase();
}

function getDisplayName(data) {
  return processUser(data.user);
}

function renderProfile(config) {
  const name = getDisplayName(config);
  return '<h1 ti="h1_name">' + name + '</h1>';
}

renderProfile({ user: null });`
  },
  {
    name: 'Try/Catch',
    code: `function riskyOperation() {
  throw new RangeError('Value out of bounds');
}

function processData() {
  try {
    riskyOperation();
  } catch (e) {
    console.log('Caught:', e.message);
    // Error is handled here
    return 'fallback value';
  }
}

function main() {
  const result = processData();
  console.log('Result:', result);
}

main();`
  },
  {
    name: 'Nested Try/Catch',
    code: `function validate(value) {
  if (typeof value !== 'number') {
    throw new TypeError('Expected number, got ' + typeof value);
  }
  if (value < 0) {
    throw new RangeError('Value must be positive');
  }
  return value * 2;
}

function process(input) {
  try {
    return validate(input);
  } catch (e) {
    if (e instanceof TypeError) {
      console.log('Type error caught, using default');
      return validate(0);
    }
    throw e;  // Re-throw RangeError
  }
}

function main() {
  try {
    process(-5);
  } catch (e) {
    console.log('Final catch:', e.message);
  }
}

main();`
  },
  {
    name: 'Custom Error',
    code: `class ValidationError extends Error {
  constructor(field, message) {
    super(message);
    this.name = 'ValidationError';
    this.field = field;
  }
}

class NotFoundError extends Error {
  constructor(resource) {
    super(resource + ' not found');
    this.name = 'NotFoundError';
    this.resource = resource;
  }
}

function findUser(id) {
  if (id < 0) {
    throw new ValidationError('id', 'ID must be positive');
  }
  throw new NotFoundError('User #' + id);
}

function getProfile(userId) {
  return findUser(userId);
}

getProfile(42);`
  },
  {
    name: 'Async Error',
    code: `async function fetchData(url) {
  throw new Error('Network error: ' + url);
}

async function processAPI() {
  const data = await fetchData('/api/users');
  return data;
}

async function main() {
  try {
    await processAPI();
  } catch (e) {
    console.log('Async error caught:', e.message);
  }
}

main();`
  },
  {
    name: 'ReferenceError',
    code: `function calculate() {
  return undeclaredVariable + 10;
}

function processOrder(items) {
  const total = calculate();
  return { total, items };
}

function checkout(cart) {
  return processOrder(cart.items);
}

checkout({ items: [1, 2, 3] });`
  },
  {
    name: 'Stack Overflow',
    code: `function factorial(n) {
  // Missing base case!
  return n * factorial(n - 1);
}

try {
  factorial(5);
} catch (e) {
  console.log('Caught:', e.message);
}`
  }
];

// Render presets
const presetsBar = document.getElementById('presetsBar');
PRESETS.forEach((p, i) => {
  const chip = document.createElement('button');
  chip.className = 'preset-chip' + (i === 0 ? ' active' : '');
  chip.textContent = p.name;
  chip.addEventListener('click', () => {
    document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    document.getElementById('codeInput').value = p.code;
    runCode();
  });
  presetsBar.appendChild(chip);
});

document.getElementById('codeInput').value = PRESETS[0].code;

// State
let expandedFrame = null;

function runCode() {
  const code = document.getElementById('codeInput').value;
  const banner = document.getElementById('errorBanner');
  const frames = document.getElementById('framesArea');
  const flowArea = document.getElementById('flowArea');
  const flowSteps = document.getElementById('flowSteps');

  let error = null;
  let logs = [];
  let caught = false;

  // Override console.log to capture
  const origLog = console.log;
  console.log = (...args) => {
    logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
  };

  try {
    const fn = new Function(code);
    fn();
  } catch (e) {
    error = e;
  }

  console.log = origLog;

  // Check if error was caught inside the code
  if (!error && logs.length > 0) {
    const catchLog = logs.find(l => l.includes('Caught') || l.includes('caught') || l.includes('error') || l.includes('Error'));
    if (catchLog) caught = true;
  }

  // Render error banner
  if (error) {
    banner.className = 'error-banner';
    banner.innerHTML = `
      <div class="error-type">${esc(error.name || 'Error')}</div>
      <div class="error-message">${esc(error.message)}</div>
      <div class="error-raw">${esc(error.stack?.split('\n').slice(0, 1).join('') || '')}</div>`;
  } else {
    banner.className = 'no-error';
    if (caught) {
      banner.innerHTML = `<p>Error was caught by try/catch. ${logs.length} console.log message${logs.length !== 1 ? 's' : ''}.</p>`;
    } else {
      banner.innerHTML = `<p>No errors. Code executed successfully.${logs.length ? ' ' + logs.length + ' log(s).' : ''}</p>`;
    }
  }

  // Parse and render stack frames
  if (error && error.stack) {
    const parsedFrames = parseStack(error.stack);
    renderFrames(parsedFrames, code, error);

    // Render propagation flow
    flowArea.style.display = '';
    renderFlow(parsedFrames, error, code);
  } else {
    // Analyze code structure for educational display
    const codeFrames = analyzeCodeStructure(code, caught);
    if (codeFrames.length > 0) {
      renderStructureFrames(codeFrames, code, caught);
    } else {
      frames.innerHTML = `<div style="color:var(--green);text-align:center;padding-top:60px;font-size:12px">Code ran without errors</div>`;
    }

    if (caught) {
      flowArea.style.display = '';
      renderCaughtFlow(code);
    } else {
      flowArea.style.display = 'none';
    }
  }

  // Show logs
  if (logs.length > 0 && !error) {
    const logHtml = logs.map(l => `<div style="color:var(--green);font-size:11px;padding:2px 0">> ${esc(l)}</div>`).join('');
    frames.innerHTML += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Console Output:</div>${logHtml}</div>`;
  }
}

function parseStack(stack) {
  const lines = stack.split('\n');
  const frames = [];

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line.startsWith('at ')) continue;

    const match = line.match(/at\s+(?:(?:new\s+)?([^\s(]+)\s*)?\(?(?:(.+?):(\d+):(\d+)|(.+?))\)?$/);
    if (match) {
      frames.push({
        name: match[1] || '(anonymous)',
        file: match[2] || match[5] || '',
        line: match[3] ? parseInt(match[3]) : 0,
        col: match[4] ? parseInt(match[4]) : 0,
        raw: line
      });
    }
  }

  // Filter out internal frames (eval, Function, etc.)
  return frames.filter(f => !f.name.includes('eval') && f.name !== 'Function');
}

function renderFrames(parsedFrames, code, error) {
  const area = document.getElementById('framesArea');
  const codeLines = code.split('\n');

  area.innerHTML = parsedFrames.map((frame, i) => {
    const isTop = i === 0;
    const funcLines = findFunctionLines(code, frame.name);

    return `<div class="frame${isTop ? ' top' : ''}" onclick="toggleFrame(this)">
      <div class="frame-header">
        <span class="frame-num ${isTop ? 'top' : 'normal'}">${i}</span>
        <span class="frame-name">${esc(frame.name)}</span>
        ${isTop ? '<span class="frame-tag error-origin">error origin</span>' : ''}
        ${frame.name.includes('async') ? '<span class="frame-tag async">async</span>' : ''}
        <span class="frame-location">${frame.line ? 'line ' + frame.line : ''}</span>
      </div>
      <div class="frame-details">
        <div style="margin-bottom:6px;color:var(--dim)">Raw: ${esc(frame.raw)}</div>
        ${funcLines ? `<div class="frame-code">${renderCodeSnippet(codeLines, funcLines.start, funcLines.end, frame.line)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function analyzeCodeStructure(code, caught) {
  const frames = [];
  const funcRegex = /(?:async\s+)?function\s+(\w+)/g;
  let match;
  while ((match = funcRegex.exec(code))) {
    frames.push({ name: match[1], index: match.index });
  }
  return frames;
}

function renderStructureFrames(codeFrames, code, caught) {
  const area = document.getElementById('framesArea');
  const codeLines = code.split('\n');

  area.innerHTML = '<div style="font-size:11px;color:var(--dim);margin-bottom:12px">Functions in this code:</div>' +
    codeFrames.map((frame, i) => {
      const funcLines = findFunctionLines(code, frame.name);
      return `<div class="frame${caught && i === 0 ? ' caught' : ''}" onclick="toggleFrame(this)">
        <div class="frame-header">
          <span class="frame-num normal">${i}</span>
          <span class="frame-name">${esc(frame.name)}()</span>
          ${caught ? '<span class="frame-tag try-catch">has try/catch</span>' : ''}
        </div>
        <div class="frame-details">
          ${funcLines ? `<div class="frame-code">${renderCodeSnippet(codeLines, funcLines.start, funcLines.end, -1)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
}

function findFunctionLines(code, name) {
  const lines = code.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('function ' + name) || lines[i].includes('function ' + name.replace('()', ''))) {
      let depth = 0;
      let start = i;
      for (let j = i; j < lines.length; j++) {
        depth += (lines[j].match(/{/g) || []).length;
        depth -= (lines[j].match(/}/g) || []).length;
        if (depth <= 0 && j > i) return { start: start + 1, end: j + 1 };
      }
      return { start: start + 1, end: Math.min(start + 10, lines.length) };
    }
  }
  return null;
}

function renderCodeSnippet(lines, start, end, errorLine) {
  return lines.slice(start - 1, end).map((line, i) => {
    const lineNum = start + i;
    const isError = lineNum === errorLine;
    return `<div class="line${isError ? ' error-line' : ''}">
      <span class="line-num">${lineNum}</span>
      <span class="line-content">${esc(line)}</span>
    </div>`;
  }).join('');
}

function renderFlow(parsedFrames, error, code) {
  const steps = document.getElementById('flowSteps');
  const hasTryCatch = code.includes('try');

  let html = '';
  // Reverse to show call order
  const reversed = [...parsedFrames].reverse();

  reversed.forEach((frame, i) => {
    if (i === 0) {
      html += `<div class="flow-step ok"><span class="flow-icon">▶</span><span class="flow-text">${esc(frame.name)}() called</span></div>`;
    } else {
      html += `<div class="flow-step ok"><span class="flow-icon">↳</span><span class="flow-text">calls ${esc(frame.name)}()</span></div>`;
    }
  });

  html += `<div class="flow-step throw"><span class="flow-icon">💥</span><span class="flow-text">${esc(error.name)}: "${esc(error.message)}"</span></div>`;

  // Unwind
  parsedFrames.forEach((frame, i) => {
    if (i < parsedFrames.length - 1) {
      html += `<div class="flow-step unwind"><span class="flow-icon">↑</span><span class="flow-text">unwinds through ${esc(frame.name)}()</span></div>`;
    }
  });

  html += `<div class="flow-step throw"><span class="flow-icon">❌</span><span class="flow-text">Uncaught ${esc(error.name)} — reaches top level</span></div>`;

  steps.innerHTML = html;
}

function renderCaughtFlow(code) {
  const steps = document.getElementById('flowSteps');
  const funcs = [];
  const funcRegex = /function\s+(\w+)/g;
  let m;
  while ((m = funcRegex.exec(code))) funcs.push(m[1]);

  let html = '';
  funcs.forEach((name, i) => {
    html += `<div class="flow-step ok"><span class="flow-icon">${i === 0 ? '▶' : '↳'}</span><span class="flow-text">${i === 0 ? name + '() called' : 'calls ' + name + '()'}</span></div>`;
  });

  html += `<div class="flow-step throw"><span class="flow-icon">💥</span><span class="flow-text">Error thrown</span></div>`;
  html += `<div class="flow-step catch"><span class="flow-icon">🛡</span><span class="flow-text">Caught by try/catch — error handled</span></div>`;
  html += `<div class="flow-step ok"><span class="flow-icon">✅</span><span class="flow-text">Execution continues normally</span></div>`;

  steps.innerHTML = html;
}

function toggleFrame(el) {
  el.classList.toggle('expanded');
}

function clearAll() {
  document.getElementById('errorBanner').innerHTML = '';
  document.getElementById('errorBanner').className = '';
  document.getElementById('framesArea').innerHTML = '<div style="color:var(--dim);text-align:center;padding-top:60px;font-size:12px">Click <strong>Run & Trace</strong> to execute code and visualize any errors</div>';
  document.getElementById('flowArea').style.display = 'none';
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Auto-run first preset
runCode();
</script>

</body>
