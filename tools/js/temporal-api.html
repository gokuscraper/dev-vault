<!DOCTYPE html>
<html tk="title_temporal_api_playground" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporal API Playground</title>
<meta name="description" content="Interactive playground for the TC39 Temporal API — explore PlainDate, ZonedDateTime, Duration arithmetic, calendar systems, and more.">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #6e9eff;
  --accent-dim: #4a7ad4;
  --green: #4caf50;
  --red: #ef5350;
  --orange: #ff9800;
  --purple: #b388ff;
  --radius: 8px;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}
header {
  text-align: center;
  padding: 2rem 1rem;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 2rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header p { color: var(--text-dim); margin-top: 0.5rem; }
.support-banner {
  max-width: 800px;
  margin: 1rem auto;
  padding: 0.75rem 1rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  text-align: center;
}
.support-ok { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: var(--green); }
.support-no { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3); color: var(--red); }
nav {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
nav button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem 1rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
nav button:hover { border-color: var(--accent); }
nav button.active { background: var(--accent); color: #000; border-color: var(--accent); }
main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
.section { display: none; }
.section.active { display: block; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.card h3 { color: var(--accent); margin-bottom: 0.75rem; font-size: 1.1rem; }
.card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 0.75rem; }
.output {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
}
.output .label { color: var(--text-dim); }
.output .value { color: var(--green); }
.output .error { color: var(--red); }
.output .warn { color: var(--orange); }
button.run {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 0.5rem 1.25rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  transition: background 0.2s;
}
button.run:hover { background: var(--accent-dim); }
select, input[type="text"], input[type="number"] {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.6rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  font-family: var(--font-mono);
}
select:focus, input:focus { outline: none; border-color: var(--accent); }
.row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
.row label { color: var(--text-dim); font-size: 0.85rem; min-width: 80px; }
.code {
  background: var(--surface-2);
  border-radius: 4px;
  padding: 0.15rem 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--purple);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
th, td {
  padding: 0.5rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th { color: var(--accent); font-weight: 600; }
td.yes { color: var(--green); }
td.no { color: var(--red); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 700px) {
  .grid-2 { grid-template-columns: 1fr; }
  nav button { font-size: 0.75rem; padding: 0.4rem 0.75rem; }
}
</style>
</head>

<script>
// Feature detection
const hasTemporal = typeof globalThis.Temporal !== 'undefined';

document.getElementById('supportBanner').className = 'support-banner ' + (hasTemporal ? 'support-ok' : 'support-no');
document.getElementById('supportBanner').textContent = hasTemporal
  ? '✓ Temporal API is natively supported in this browser!'
  : '✗ Temporal API is not available in this browser. Demos will use simulated outputs to show the API shape.';

// Simulated Temporal for browsers without native support
function tryTemporal(fn, fallback) {
  if (hasTemporal) {
    try { return fn(); } catch(e) { return `Error: ${e.message}`; }
  }
  return fallback;
}

const sections = [
  { id: 'now', label: 'Temporal.Now', icon: '⏱' },
  { id: 'plaindate', label: 'PlainDate/Time', icon: '📅' },
  { id: 'zoned', label: 'ZonedDateTime', icon: '🌍' },
  { id: 'duration', label: 'Duration', icon: '⏳' },
  { id: 'calendars', label: 'Calendars', icon: '📆' },
  { id: 'formatting', label: 'Formatting', icon: '🔤' },
  { id: 'comparison', label: 'vs Date', icon: '⚔️' },
  { id: 'support', label: 'Support', icon: 'ℹ️' },
];

const nav = document.getElementById('nav');
sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = `${s.icon} ${s.label}`;
  btn.onclick = () => showSection(s.id);
  if (i === 0) btn.classList.add('active');
  nav.appendChild(btn);
});

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', sections[i].id === id);
  });
}

const main = document.getElementById('main');

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}

function makeOutput(id) { return h('div', {className: 'output', id}); }
function line(label, value, cls='value') { return `<span class="label" ti="label_label" ti="label_label" ti="label_label">${label}: </span><span class="${cls}">${value}</span>\n`; }

// Section 1: Temporal.Now
const secNow = h('div', {className: 'section active', id: 'sec-now'});
const nowCard = h('div', {className: 'card'});
nowCard.innerHTML = '<h3 ti="h3_temporal_now" ti="h3_temporal_now" ti="h3_temporal_now">Temporal.Now</h3><p>Get the current instant, date, and time in various formats.</p>';
const nowBtn = h('button', {className: 'run', onClick: runNow}, 'Run Temporal.Now');
const nowOut = makeOutput('nowOut');
nowCard.append(nowBtn, nowOut);
secNow.append(nowCard);

function runNow() {
  const o = document.getElementById('nowOut');
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (hasTemporal) {
    try {
      const inst = Temporal.Now.instant();
      const zdt = Temporal.Now.zonedDateTimeISO();
      const pd = Temporal.Now.plainDateISO();
      const pt = Temporal.Now.plainTimeISO();
      const pdt = Temporal.Now.plainDateTimeISO();
      o.innerHTML =
        line('Temporal.Now.instant()', inst.toString()) +
        line('Temporal.Now.zonedDateTimeISO()', zdt.toString()) +
        line('Temporal.Now.plainDateISO()', pd.toString()) +
        line('Temporal.Now.plainTimeISO()', pt.toString()) +
        line('Temporal.Now.plainDateTimeISO()', pdt.toString()) +
        line('Timezone', tz) +
        line('Epoch milliseconds', inst.epochMilliseconds) +
        line('Epoch nanoseconds', inst.epochNanoseconds.toString());
    } catch(e) { o.innerHTML = line('Error', e.message, 'error'); }
  } else {
    const now = new Date();
    o.innerHTML =
      line('Temporal.Now.instant()', `${now.toISOString().replace('.000','.')}000000Z`, 'warn') +
      line('Temporal.Now.zonedDateTimeISO()', `(simulated) ${now.toISOString()}[${tz}]`, 'warn') +
      line('Temporal.Now.plainDateISO()', now.toISOString().slice(0,10), 'warn') +
      line('Temporal.Now.plainTimeISO()', now.toISOString().slice(11,23), 'warn') +
      line('Temporal.Now.plainDateTimeISO()', now.toISOString().slice(0,23), 'warn') +
      line('Note', 'These are simulated values — Temporal API not available', 'warn');
  }
}

// Section 2: PlainDate/Time
const secPlain = h('div', {className: 'section', id: 'sec-plaindate'});
const plainCard = h('div', {className: 'card'});
plainCard.innerHTML = `<h3 ti="h3_plaindate_plaintime_plain" ti="h3_plaindate_plaintime_plain" ti="h3_plaindate_plaintime_plain">PlainDate, PlainTime, PlainDateTime</h3>
<p>Wall-clock date and time without timezone. Create, inspect, and manipulate.</p>`;
const plainInputs = h('div', {className: 'row'});
plainInputs.innerHTML = `
<label ti="label_year" ti="label_year_2" ti="label_year" ti="label_year_2" ti="label_year" ti="label_year_2">Year</label><input type="number" id="pYear" value="2026" style="width:80px">
<label ti="label_month" ti="label_month" ti="label_month">Month</label><input type="number" id="pMonth" value="3" min="1" max="12" style="width:60px">
<label ti="label_day" ti="label_day" ti="label_day">Day</label><input type="number" id="pDay" value="12" min="1" max="31" style="width:60px">
<label ti="label_hour" ti="label_hour" ti="label_hour">Hour</label><input type="number" id="pHour" value="14" min="0" max="23" style="width:60px">
<label ti="label_minute" ti="label_minute" ti="label_minute">Minute</label><input type="number" id="pMin" value="30" min="0" max="59" style="width:60px">`;
const plainBtn = h('button', {className: 'run', onClick: runPlain}, 'Create & Inspect');
const plainOut = makeOutput('plainOut');
plainCard.append(plainInputs, plainBtn, plainOut);

const plainArithCard = h('div', {className: 'card'});
plainArithCard.innerHTML = `<h3 ti="h3_date_arithmetic" ti="h3_date_arithmetic" ti="h3_date_arithmetic">Date Arithmetic</h3><p>Add or subtract from a PlainDate.</p>`;
const arithRow = h('div', {className: 'row'});
arithRow.innerHTML = `
<label ti="label_add" ti="label_add" ti="label_add">Add</label>
<input type="number" id="addYears" value="0" style="width:50px"><span style="color:var(--text-dim)">y</span>
<input type="number" id="addMonths" value="1" style="width:50px"><span style="color:var(--text-dim)">m</span>
<input type="number" id="addDays" value="15" style="width:50px"><span style="color:var(--text-dim)">d</span>`;
const arithBtn = h('button', {className: 'run', onClick: runArith}, 'Calculate');
const arithOut = makeOutput('arithOut');
plainArithCard.append(arithRow, arithBtn, arithOut);
secPlain.append(plainCard, plainArithCard);

function getPlainVals() {
  return {
    y: +document.getElementById('pYear').value,
    m: +document.getElementById('pMonth').value,
    d: +document.getElementById('pDay').value,
    h: +document.getElementById('pHour').value,
    min: +document.getElementById('pMin').value,
  };
}

function runPlain() {
  const o = document.getElementById('plainOut');
  const v = getPlainVals();
  if (hasTemporal) {
    try {
      const pd = Temporal.PlainDate.from({year:v.y, month:v.m, day:v.d});
      const pt = Temporal.PlainTime.from({hour:v.h, minute:v.min});
      const pdt = pd.toPlainDateTime(pt);
      o.innerHTML =
        line('PlainDate', pd.toString()) +
        line('  .year', pd.year) +
        line('  .month', pd.month) +
        line('  .monthCode', pd.monthCode) +
        line('  .day', pd.day) +
        line('  .dayOfWeek', pd.dayOfWeek + ' (1=Mon, 7=Sun)') +
        line('  .dayOfYear', pd.dayOfYear) +
        line('  .weekOfYear', pd.weekOfYear) +
        line('  .daysInMonth', pd.daysInMonth) +
        line('  .daysInYear', pd.daysInYear) +
        line('  .inLeapYear', pd.inLeapYear) +
        '\n' +
        line('PlainTime', pt.toString()) +
        line('  .hour', pt.hour) +
        line('  .minute', pt.minute) +
        '\n' +
        line('PlainDateTime', pdt.toString());
    } catch(e) { o.innerHTML = line('Error', e.message, 'error'); }
  } else {
    o.innerHTML =
      line('PlainDate', `${v.y}-${String(v.m).padStart(2,'0')}-${String(v.d).padStart(2,'0')}`, 'warn') +
      line('PlainTime', `${String(v.h).padStart(2,'0')}:${String(v.min).padStart(2,'0')}:00`, 'warn') +

function runZoned() {
  const o = document.getElementById('zonedOut');
  const from = document.getElementById('fromTz').value;
  const to = document.getElementById('toTz').value;
  if (hasTemporal) {
    try {
      const now = Temporal.Now.zonedDateTimeISO(from);
      const converted = now.withTimeZone(to);
      o.innerHTML =
        line('From', now.toString()) +
        line('  Offset', now.offset) +
        line('  Hour', now.hour) +
        '\n' +
        line('To', converted.toString()) +
        line('  Offset', converted.offset) +
        line('  Hour', converted.hour) +
        '\n' +
        line('Difference', `${converted.hour - now.hour} hours (wall clock)`);
    } catch(e) { o.innerHTML = line('Error', e.message, 'error'); }
  } else {
    const now = new Date();
    const fmtFrom = new Intl.DateTimeFormat('en-US', {timeZone:from, hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZoneName:'short'}).format(now);
    const fmtTo = new Intl.DateTimeFormat('en-US', {timeZone:to, hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZoneName:'short'}).format(now);
    o.innerHTML =
      line('From (' + from + ')', fmtFrom, 'warn') +
      line('To (' + to + ')', fmtTo, 'warn') +
      line('Note', 'Simulated with Intl.DateTimeFormat', 'warn');
  }
}

function runDST() {
  const o = document.getElementById('dstOut');
  const tz = document.getElementById('dstTz').value;
  const year = +document.getElementById('dstYear').value;
  if (hasTemporal) {
    try {
      let transitions = [];
      let prevOffset = null;
      for (let m = 1; m <= 12; m++) {
        for (let d = 1; d <= 28; d++) {
          const zdt = Temporal.PlainDateTime.from({year, month:m, day:d, hour:12}).toZonedDateTime(tz);
          if (prevOffset !== null && zdt.offset !== prevOffset) {
            transitions.push({date: `${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, from: prevOffset, to: zdt.offset});
          }
          prevOffset = zdt.offset;
        }
      }
      if (transitions.length === 0) {
        o.innerHTML = line('Result', `No DST transitions found for ${tz} in ${year}`);
      } else {
        o.innerHTML = transitions.map(t =>
          line('Transition', `${t.date}: ${t.from} → ${t.to}`)
        ).join('');
      }
    } catch(e) { o.innerHTML = line('Error', e.message, 'error'); }
  } else {
    o.innerHTML = line('Note', 'DST detection requires native Temporal API', 'warn');
  }
}

function runDuration() {
  const o = document.getElementById('durOut');
  const g = id => +document.getElementById(id).value;
  if (hasTemporal) {
    try {
      const d1 = Temporal.Duration.from({hours:g('d1h'),minutes:g('d1m'),seconds:g('d1s')});
      const d2 = Temporal.Duration.from({hours:g('d2h'),minutes:g('d2m'),seconds:g('d2s')});
      const sum = d1.add(d2);
      const cmp = Temporal.Duration.compare(d1, d2);
      o.innerHTML =
        line('Duration 1', d1.toString()) +
        line('Duration 2', d2.toString()) +
        line('Sum', sum.toString()) +
        line('Sum (balanced)', sum.round({largestUnit:'hour'}).toString()) +
        line('Compare', cmp === 0 ? 'Equal' : cmp > 0 ? 'D1 > D2' : 'D1 < D2') +
        line('D1 total seconds', d1.total('second'));
    } catch(e) { o.innerHTML = line('Error', e.message, 'error'); }
  } else {
    const s1 = g('d1h')*3600 + g('d1m')*60 + g('d1s');
    const s2 = g('d2h')*3600 + g('d2m')*60 + g('d2s');
    const sum = s1 + s2;
    o.innerHTML =
      line('Duration 1', `PT${g('d1h')}H${g('d1m')}M${g('d1s')}S`, 'warn') +
      line('Duration 2', `PT${g('d2h')}H${g('d2m')}M${g('d2s')}S`, 'warn') +
      line('Sum (seconds)', sum, 'warn') +
      line('Sum', `${Math.floor(sum/3600)}h ${Math.floor((sum%3600)/60)}m ${sum%60}s`, 'warn');
  }
}

function runDurBalance() {
  const o = document.getElementById('durCOut');
  if (hasTemporal) {

}

  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
