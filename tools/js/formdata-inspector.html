<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormData Inspector — Visual FormData API Explorer</title>
<meta name="description" content="Build HTML forms visually and inspect FormData.entries(), blob/file previews, MIME types, and POST body output in real time.">
<style>
/* ── Reset & Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232735;
  --border: #2e3345;
  --border-focus: #6366f1;
  --text: #e2e4ed;
  --text-dim: #8b8fa3;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --radius: 8px;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ───────────────────────────────────────── */
header {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.3rem;
}

.app {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  max-width: 1600px;
  margin: 0 auto;
  min-height: calc(100vh - 100px);
}

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
}

/* ── Panels ───────────────────────────────────────── */
.panel {
  padding: 1.2rem;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 100px);
}

.panel:last-child { border-right: none; }

.panel-title {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.panel-title .badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  padding: 0.1rem 0.45rem;
  border-radius: 99px;
  font-weight: 700;
}

/* ── Presets ───────────────────────────────────────── */
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 1rem;
}

.preset-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.75rem;
  padding: 0.35rem 0.7rem;
  border-radius: 99px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Form Builder ─────────────────────────────────── */
.field-list { display: flex; flex-direction: column; gap: 0.6rem; }

.field-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.8rem;
  position: relative;
  transition: border-color 0.15s;
}

.field-card:hover { border-color: var(--border-focus); }

.field-card-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.field-type-badge {
  font-size: 0.65rem;
  font-family: var(--mono);
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  font-weight: 600;
}

.field-type-badge.text { background: #6366f120; color: var(--accent); }
.field-type-badge.file { background: #22c55e20; color: var(--green); }
.field-type-badge.select { background: #f59e0b20; color: var(--orange); }
.field-type-badge.checkbox { background: #3b82f620; color: var(--blue); }
.field-type-badge.radio { background: #06b6d420; color: var(--cyan); }
.field-type-badge.textarea { background: #a855f720; color: #a855f7; }
.field-type-badge.number { background: #ec489920; color: #ec4899; }
.field-type-badge.hidden { background: #64748b20; color: #94a3b8; }
.field-type-badge.date { background: #f4364320; color: #f43643; }
.field-type-badge.email { background: #14b8a620; color: #14b8a6; }

.field-name-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.8rem;
  outline: none;
}

.field-remove {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1rem;
  padding: 0 0.3rem;
  line-height: 1;
  transition: color 0.15s;
}

.field-remove:hover { color: var(--red); }

.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 0.45rem 0.6rem;
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.15s;
}

.field-input:focus { border-color: var(--border-focus); }

textarea.field-input { resize: vertical; min-height: 60px; font-family: inherit; }

select.field-input { cursor: pointer; }

.field-input[type="file"] {
  padding: 0.3rem;
  font-size: 0.75rem;
}

.field-meta {
  margin-top: 0.4rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* ── Add Field ────────────────────────────────────── */
.add-field-row {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.8rem;
  flex-wrap: wrap;
}

.add-btn {
  background: var(--surface);
  border: 1px dashed var(--border);
  color: var(--text-dim);
  font-size: 0.7rem;
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Inspector Panel ──────────────────────────────── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
}

.tab {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.78rem;
  padding: 0.5rem 1rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Entries Tree ─────────────────────────────────── */
.entry-row {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  padding: 0.6rem 0.8rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.4rem;
  font-size: 0.8rem;
  transition: border-color 0.15s;
}

.entry-row:hover { border-color: var(--border-focus); }

.entry-key {
  font-family: var(--mono);
  color: var(--cyan);
  font-weight: 600;
  min-width: 100px;
  word-break: break-all;
}

.entry-value {
  flex: 1;
  font-family: var(--mono);
  color: var(--text);
  word-break: break-all;
}

.entry-type {
  font-size: 0.65rem;
  padding: 0.1rem 0.35rem;
  border-radius: 4px;
  font-family: var(--mono);
  white-space: nowrap;
}

.entry-type.string { background: #6366f120; color: var(--accent); }
.entry-type.file { background: #22c55e20; color: var(--green); }
.entry-type.blob { background: #f59e0b20; color: var(--orange); }

/* ── File/Blob Preview ────────────────────────────── */
.file-preview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.8rem;
  margin-bottom: 0.5rem;
}

.file-preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

.file-preview-name {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--green);
}

.file-preview-meta {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

.file-preview-image {
  max-width: 100%;
  max-height: 200px;
  border-radius: 6px;
  margin-top: 0.4rem;
}

.file-preview-text {
  background: var(--surface2);
  border-radius: 6px;
  padding: 0.6rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  max-height: 150px;
  overflow: auto;
  margin-top: 0.4rem;
  white-space: pre-wrap;
  word-break: break-all;
}

.hex-dump {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  line-height: 1.4;
}

/* ── POST Body / Code ─────────────────────────────── */
.code-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  line-height: 1.5;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text);
  max-height: 500px;
  overflow-y: auto;
}

.code-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
  font-family: var(--mono);
  text-transform: uppercase;
}

.encoding-selector {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.8rem;
}

.encoding-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.7rem;
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--mono);
  transition: all 0.15s;
}

.encoding-btn:hover { border-color: var(--accent); color: var(--accent); }
.encoding-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── MIME Table ────────────────────────────────────── */
.mime-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
}

.mime-table th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.5rem 0.6rem;
  border-bottom: 1px solid var(--border);
}

.mime-table td {
  padding: 0.5rem 0.6rem;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.75rem;
}

.mime-table tr:hover td { background: var(--surface); }

/* ── Empty State ──────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-dim);
}

.empty-state-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.empty-state-text { font-size: 0.85rem; }

/* ── Checkbox / Radio ─────────────────────────────── */
.check-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }

.check-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.8rem;
}

.check-item input { accent-color: var(--accent); }

/* ── Scrollbar ────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── Stats bar ────────────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 1.2rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

.stat {
  font-size: 0.72rem;
  color: var(--text-dim);
}

.stat-value {
  font-family: var(--mono);
  color: var(--text);
  font-weight: 600;
}

/* ── Copy button ──────────────────────────────────── */
.copy-btn {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.65rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--mono);
  transition: all 0.15s;
}

.copy-btn:hover { border-color: var(--accent); color: var(--accent); }

.code-wrapper { position: relative; }

footer {
  text-align: center;
  padding: 1rem;
  color: var(--text-dim);
  font-size: 0.7rem;
  border-top: 1px solid var(--border);
}

footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>FormData Inspector</h1>
  <p>Build forms visually, inspect FormData entries, preview files, and see POST body output</p>
</header>

<div class="app">
  <!-- Left Panel: Form Builder -->
  <div class="panel" id="builderPanel">
    <div class="panel-title">Form Builder <span class="badge" id="fieldCount">0</span></div>

    <div class="presets" id="presets"></div>

    <form id="liveForm" enctype="multipart/form-data">
      <div class="field-list" id="fieldList"></div>
    </form>

    <div class="add-field-row" id="addFieldRow"></div>
  </div>

  <!-- Right Panel: Inspector -->
  <div class="panel" id="inspectorPanel">
    <div class="panel-title">Inspector</div>

    <div class="stats-bar" id="statsBar">
      <div class="stat">Entries: <span class="stat-value" id="statEntries">0</span></div>
      <div class="stat">Size: <span class="stat-value" id="statSize">0 B</span></div>
      <div class="stat">Files: <span class="stat-value" id="statFiles">0</span></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="entries">Entries</button>
      <button class="tab" data-tab="files">Files &amp; Blobs</button>
      <button class="tab" data-tab="post">POST Body</button>
      <button class="tab" data-tab="mime">MIME Types</button>
      <button class="tab" data-tab="code">JS Code</button>
    </div>

    <!-- Entries Tab -->
    <div class="tab-content active" id="tab-entries"></div>

    <!-- Files Tab -->
    <div class="tab-content" id="tab-files"></div>

    <!-- POST Body Tab -->
    <div class="tab-content" id="tab-post">
      <div class="encoding-selector">
        <button class="encoding-btn active" data-encoding="multipart">multipart/form-data</button>
        <button class="encoding-btn" data-encoding="urlencoded">application/x-www-form-urlencoded</button>
        <button class="encoding-btn" data-encoding="json">application/json</button>
      </div>
      <div class="code-wrapper">
        <button class="copy-btn" id="copyPostBody">Copy</button>
        <div class="code-block" id="postBodyOutput"></div>
      </div>
    </div>

    <!-- MIME Tab -->
    <div class="tab-content" id="tab-mime"></div>

    <!-- JS Code Tab -->
    <div class="tab-content" id="tab-code">
      <div class="code-label">Equivalent JavaScript</div>
      <div class="code-wrapper">
        <button class="copy-btn" id="copyJsCode">Copy</button>
        <div class="code-block" id="jsCodeOutput"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="https://github.com/yurukusa/formdata-inspector">GitHub</a> &middot;
  Built with the <a href="https://developer.mozilla.org/en-US/docs/Web/API/FormData">FormData API</a>
</footer>

<script>
// ── Presets ──────────────────────────────────────────
const PRESETS = [
  {
    name: 'User Profile',
    fields: [
      { type: 'text', name: 'username', value: 'johndoe', placeholder: 'Username' },
      { type: 'email', name: 'email', value: 'john@example.com', placeholder: 'Email' },
      { type: 'text', name: 'display_name', value: 'John Doe', placeholder: 'Display Name' },
      { type: 'file', name: 'avatar', accept: 'image/*' },
      { type: 'textarea', name: 'bio', value: 'Hello, I am John.', placeholder: 'Bio' },
    ]
  },
  {
    name: 'File Upload',
    fields: [
      { type: 'text', name: 'title', value: 'My Document', placeholder: 'Title' },
      { type: 'file', name: 'document', accept: '.pdf,.doc,.docx,.txt' },
      { type: 'file', name: 'thumbnail', accept: 'image/*' },
      { type: 'select', name: 'category', options: ['Personal', 'Work', 'Archive'], value: 'Work' },
      { type: 'checkbox', name: 'public', label: 'Make public', checked: true },
    ]
  },
  {
    name: 'API Request',
    fields: [
      { type: 'hidden', name: 'api_key', value: 'sk-demo-key-12345' },
      { type: 'text', name: 'endpoint', value: '/api/v1/data', placeholder: 'Endpoint' },
      { type: 'select', name: 'method', options: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE'], value: 'POST' },
      { type: 'textarea', name: 'payload', value: '{"query": "test", "limit": 10}', placeholder: 'JSON Payload' },
      { type: 'number', name: 'timeout', value: '30', placeholder: 'Timeout (s)' },
    ]
  },
  {
    name: 'Multi-File Gallery',
    fields: [
      { type: 'text', name: 'gallery_name', value: 'Summer 2026', placeholder: 'Gallery Name' },
      { type: 'file', name: 'photos', accept: 'image/*', multiple: true },
      { type: 'textarea', name: 'description', value: 'Photos from vacation', placeholder: 'Description' },
      { type: 'date', name: 'event_date', value: '2026-07-15' },
      { type: 'select', name: 'visibility', options: ['Public', 'Private', 'Unlisted'], value: 'Public' },
    ]
  },
  {
    name: 'Contact Form',
    fields: [
      { type: 'text', name: 'name', value: 'Jane Smith', placeholder: 'Full Name' },
      { type: 'email', name: 'email', value: 'jane@example.com', placeholder: 'Email' },
      { type: 'text', name: 'subject', value: 'Partnership Inquiry', placeholder: 'Subject' },
      { type: 'textarea', name: 'message', value: 'I would like to discuss a potential collaboration...', placeholder: 'Message' },
      { type: 'checkbox', name: 'newsletter', label: 'Subscribe to newsletter', checked: false },
    ]
  },
  {
    name: 'Product Listing',
    fields: [
      { type: 'text', name: 'product_name', value: 'Wireless Headphones', placeholder: 'Product Name' },
      { type: 'number', name: 'price', value: '49.99', placeholder: 'Price' },
      { type: 'textarea', name: 'description', value: 'Premium wireless headphones with noise cancellation', placeholder: 'Description' },
      { type: 'file', name: 'images', accept: 'image/*', multiple: true },
      { type: 'select', name: 'category', options: ['Electronics', 'Clothing', 'Books', 'Home', 'Sports'], value: 'Electronics' },
      { type: 'radio', name: 'condition', options: ['New', 'Used', 'Refurbished'], value: 'New' },
      { type: 'hidden', name: 'seller_id', value: 'usr_8f3k2' },
    ]
  },
  {
    name: 'Blob Append',
    fields: [
      { type: 'text', name: 'name', value: 'data-export', placeholder: 'Name' },
      { type: '__blob', name: 'json_blob', blobType: 'application/json', blobContent: '{"key":"value","count":42}' },
      { type: '__blob', name: 'csv_blob', blobType: 'text/csv', blobContent: 'id,name,score\n1,Alice,95\n2,Bob,87' },
      { type: '__blob', name: 'binary_blob', blobType: 'application/octet-stream', blobContent: 'BINARY_DEMO' },
    ]
  },
];

const FIELD_TYPES = ['text', 'email', 'number', 'date', 'textarea', 'select', 'checkbox', 'radio', 'file', 'hidden'];

// ── State ───────────────────────────────────────────
let fields = [];
let activePreset = -1;
let activeTab = 'entries';
let activeEncoding = 'multipart';
// Map of field id -> File objects from file inputs
const fileMap = new Map();
let fieldIdCounter = 0;

// ── Init ────────────────────────────────────────────
function init() {
  renderPresets();
  renderAddButtons();
  setupTabs();
  setupEncodings();
  setupCopy();
  // Load first preset
  loadPreset(0);
}

// ── Presets ──────────────────────────────────────────
function renderPresets() {
  const el = document.getElementById('presets');
  el.innerHTML = PRESETS.map((p, i) =>
    `<button class="preset-btn${i === activePreset ? ' active' : ''}" data-preset="${i}">${p.name}</button>`
  ).join('');
  el.addEventListener('click', e => {
    const btn = e.target.closest('[data-preset]');
    if (btn) loadPreset(parseInt(btn.dataset.preset));
  });
}

function loadPreset(index) {
  activePreset = index;
  fields = PRESETS[index].fields.map(f => ({ ...f, id: ++fieldIdCounter }));
  fileMap.clear();
  renderPresets();
  renderFields();
  inspect();
}

// ── Add Buttons ─────────────────────────────────────
function renderAddButtons() {
  const el = document.getElementById('addFieldRow');
  el.innerHTML = FIELD_TYPES.map(t =>
    `<button class="add-btn" data-add="${t}">+ ${t}</button>`
  ).join('');
  el.addEventListener('click', e => {
    const btn = e.target.closest('[data-add]');
    if (btn) addField(btn.dataset.add);
  });
}

function addField(type) {
  const id = ++fieldIdCounter;
  const f = { type, name: `field_${id}`, id };
  if (type === 'select') f.options = ['Option A', 'Option B', 'Option C'];
  if (type === 'radio') { f.options = ['Yes', 'No']; f.value = 'Yes'; }
  if (type === 'checkbox') { f.label = 'Enabled'; f.checked = false; }
  fields.push(f);
  activePreset = -1;
  renderPresets();
  renderFields();
  inspect();
}

// ── Render Fields ───────────────────────────────────
function renderFields() {
  const list = document.getElementById('fieldList');
  document.getElementById('fieldCount').textContent = fields.length;

  if (fields.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">+</div><div class="empty-state-text">Add fields or choose a preset</div></div>';
    return;
  }

  list.innerHTML = fields.map((f, i) => {
    const typeClass = f.type === '__blob' ? 'file' : f.type;
    const typeName = f.type === '__blob' ? 'blob' : f.type;
    return `
      <div class="field-card" data-index="${i}">
        <div class="field-card-header">
          <span class="field-type-badge ${typeClass}">${typeName}</span>
          <input class="field-name-input" value="${esc(f.name)}" data-field="name" data-index="${i}" spellcheck="false" placeholder="field name">
          <button class="field-remove" data-remove="${i}" title="Remove field">&times;</button>
        </div>
        ${renderFieldInput(f, i)}
      </div>
    `;
  }).join('');

  // Bind events
  list.querySelectorAll('[data-field="name"]').forEach(el => {
    el.addEventListener('input', e => {
      fields[e.target.dataset.index].name = e.target.value;
      inspect();
    });
  });

  list.querySelectorAll('[data-remove]').forEach(el => {
    el.addEventListener('click', e => {
      const idx = parseInt(e.target.dataset.remove);
      fileMap.delete(fields[idx].id);
      fields.splice(idx, 1);
      activePreset = -1;
      renderPresets();
      renderFields();
      inspect();
    });
  });

  list.querySelectorAll('[data-value]').forEach(el => {
    el.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.index);
      fields[idx].value = e.target.value;
      inspect();
    });
  });

  list.querySelectorAll('[data-file]').forEach(el => {
    el.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.index);
      const fld = fields[idx];
      if (e.target.files.length > 0) {
        fileMap.set(fld.id, Array.from(e.target.files));
      } else {
        fileMap.delete(fld.id);
      }
      inspect();
    });
  });

  list.querySelectorAll('[data-check]').forEach(el => {
    el.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.index);
      fields[idx].checked = e.target.checked;
      inspect();
    });
  });

  list.querySelectorAll('[data-radio]').forEach(el => {
    el.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.index);
      fields[idx].value = e.target.value;
      inspect();
    });
  });
}

function renderFieldInput(f, i) {
  switch (f.type) {
    case 'text':
    case 'email':
    case 'number':
    case 'date':
      return `<input class="field-input" type="${f.type}" value="${esc(f.value || '')}" placeholder="${esc(f.placeholder || '')}" data-value data-index="${i}">`;

    case 'hidden':
      return `
        <input class="field-input" type="text" value="${esc(f.value || '')}" placeholder="hidden value" data-value data-index="${i}">
        <div class="field-meta">type=hidden (not visible to users)</div>
      `;

    case 'textarea':
      return `<textarea class="field-input" placeholder="${esc(f.placeholder || '')}" data-value data-index="${i}">${esc(f.value || '')}</textarea>`;

    case 'file':
      return `<input class="field-input" type="file" ${f.accept ? `accept="${esc(f.accept)}"` : ''} ${f.multiple ? 'multiple' : ''} data-file data-index="${i}">`;

    case 'select':
      return `<select class="field-input" data-value data-index="${i}">${
        (f.options || []).map(o => `<option value="${esc(o)}"${f.value === o ? ' selected' : ''}>${esc(o)}</option>`).join('')
      }</select>`;

    case 'checkbox':
      return `<div class="check-group"><label class="check-item"><input type="checkbox" ${f.checked ? 'checked' : ''} data-check data-index="${i}"> ${esc(f.label || 'Checked')}</label></div>`;

    case 'radio':
      return `<div class="check-group">${
        (f.options || []).map(o =>
          `<label class="check-item"><input type="radio" name="radio_${f.id}" value="${esc(o)}" ${f.value === o ? 'checked' : ''} data-radio data-index="${i}"> ${esc(o)}</label>`
        ).join('')
      }</div>`;

    case '__blob':
      return `
        <div class="field-meta">MIME: ${esc(f.blobType || 'application/octet-stream')}</div>
        <div class="file-preview-text">${esc(f.blobContent || '')}</div>
      `;

    default:
      return `<input class="field-input" type="text" value="${esc(f.value || '')}" data-value data-index="${i}">`;
  }
}

// ── Inspect (core) ──────────────────────────────────
function inspect() {
  const fd = buildFormData();
  const entries = [];

  for (const [key, value] of fd.entries()) {
    entries.push({ key, value });
  }

  renderEntries(entries);
  renderFiles(entries);
  renderPostBody(entries, fd);
  renderMime(entries);
  renderJsCode();
  updateStats(entries);
}

function buildFormData() {
  const fd = new FormData();

  for (const f of fields) {
    switch (f.type) {
      case 'checkbox':
        if (f.checked) fd.append(f.name, 'on');
        break;

      case 'file': {
        const files = fileMap.get(f.id);
        if (files && files.length > 0) {
          for (const file of files) {
            fd.append(f.name, file, file.name);
          }
        } else {
          // Append empty file to show the key exists
          fd.append(f.name, new File([], '', { type: 'application/octet-stream' }));
        }
        break;
      }

      case '__blob': {
        const blob = new Blob([f.blobContent || ''], { type: f.blobType || 'application/octet-stream' });
        fd.append(f.name, blob, `${f.name}.${mimeToExt(f.blobType)}`);
        break;
      }

      default:
        fd.append(f.name, f.value || '');
    }
  }

  return fd;
}

// ── Render Entries Tab ──────────────────────────────
function renderEntries(entries) {
  const el = document.getElementById('tab-entries');

  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-text">No entries yet</div></div>';
    return;
  }

  el.innerHTML = entries.map(({ key, value }) => {
    let typeLabel, typeClass, displayValue;

    if (value instanceof File) {
      typeLabel = value.name ? 'File' : 'File (empty)';
      typeClass = 'file';
      displayValue = value.name
        ? `${value.name} (${formatSize(value.size)}, ${value.type || 'unknown'})`
        : '(no file selected)';
    } else if (value instanceof Blob) {
      typeLabel = 'Blob';
      typeClass = 'blob';
      displayValue = `Blob (${formatSize(value.size)}, ${value.type || 'unknown'})`;
    } else {
      typeLabel = 'String';
      typeClass = 'string';
      displayValue = value === '' ? '(empty string)' : value;
    }

    return `
      <div class="entry-row">
        <div class="entry-key">${esc(key)}</div>
        <div class="entry-value">${esc(displayValue)}</div>
        <span class="entry-type ${typeClass}">${typeLabel}</span>
      </div>
    `;
  }).join('');
}

// ── Render Files Tab ────────────────────────────────
function renderFiles(entries) {
  const el = document.getElementById('tab-files');
  const fileEntries = entries.filter(e => e.value instanceof File || e.value instanceof Blob);

  if (fileEntries.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-text">No files or blobs in FormData</div></div>';
    return;
  }

  el.innerHTML = '';
  for (const { key, value } of fileEntries) {
    const div = document.createElement('div');
    div.className = 'file-preview';

    const isFile = value instanceof File && value.name;
    const name = isFile ? value.name : `[Blob]`;
    const mime = value.type || 'application/octet-stream';
    const size = formatSize(value.size);

    div.innerHTML = `
      <div class="file-preview-header">
        <span class="file-preview-name">${esc(key)} = ${esc(name)}</span>
        <span class="file-preview-meta">${esc(mime)} &middot; ${size}</span>
      </div>
    `;

    if (value.size > 0) {
      if (mime.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = 'file-preview-image';
        img.src = URL.createObjectURL(value);
        img.onload = () => URL.revokeObjectURL(img.src);
        div.appendChild(img);
      } else if (mime.startsWith('text/') || mime === 'application/json') {
        const reader = new FileReader();
        reader.onload = () => {
          const pre = document.createElement('div');
          pre.className = 'file-preview-text';
          pre.textContent = reader.result.slice(0, 2000);
          div.appendChild(pre);
        };
        reader.readAsText(value.slice(0, 2000));
      } else {
        // Hex dump for binary
        const reader = new FileReader();
        reader.onload = () => {
          const arr = new Uint8Array(reader.result);
          const hex = hexDump(arr.slice(0, 128));
          const pre = document.createElement('div');
          pre.className = 'file-preview-text hex-dump';
          pre.textContent = hex;
          div.appendChild(pre);
        };
        reader.readAsArrayBuffer(value.slice(0, 128));
      }
    } else {
      const note = document.createElement('div');
      note.className = 'field-meta';
      note.textContent = '(empty - no file selected)';
      div.appendChild(note);
    }

    el.appendChild(div);
  }
}

// ── Render POST Body Tab ────────────────────────────
async function renderPostBody(entries, fd) {
  const output = document.getElementById('postBodyOutput');

  if (entries.length === 0) {
    output.textContent = '(no data)';
    return;
  }

  switch (activeEncoding) {
    case 'multipart': {
      // Simulate multipart/form-data
      const boundary = '----WebKitFormBoundary' + randomHex(16);
      let body = '';
      for (const { key, value } of entries) {
        body += `--${boundary}\r\n`;
        if (value instanceof File || value instanceof Blob) {
          const name = value instanceof File && value.name ? value.name : 'blob';
          const mime = value.type || 'application/octet-stream';
          body += `Content-Disposition: form-data; name="${key}"; filename="${name}"\r\n`;
          body += `Content-Type: ${mime}\r\n\r\n`;
          if (value.size > 0) {
            if (value.size <= 1024 && (mime.startsWith('text/') || mime === 'application/json')) {
              body += await value.text();
            } else {
              body += `[${formatSize(value.size)} binary data]`;
            }
          }
          body += '\r\n';
        } else {
          body += `Content-Disposition: form-data; name="${key}"\r\n\r\n`;
          body += `${value}\r\n`;
        }
      }
      body += `--${boundary}--\r\n`;

      output.textContent = body;
      break;
    }

    case 'urlencoded': {
      const params = new URLSearchParams();
      for (const { key, value } of entries) {
        if (typeof value === 'string') {
          params.append(key, value);
        } else {
          params.append(key, value instanceof File ? value.name : '[blob]');
        }
      }
      output.textContent = `Content-Type: application/x-www-form-urlencoded\n\n${params.toString()}`;
      break;
    }

    case 'json': {
      const obj = {};
      for (const { key, value } of entries) {
        const v = typeof value === 'string' ? value
          : value instanceof File ? { __file: value.name, size: value.size, type: value.type }
          : { __blob: true, size: value.size, type: value.type };

        if (key in obj) {
          if (!Array.isArray(obj[key])) obj[key] = [obj[key]];
          obj[key].push(v);
        } else {
          obj[key] = v;
        }
      }
      output.textContent = `Content-Type: application/json\n\n${JSON.stringify(obj, null, 2)}`;
      break;
    }
  }
}

// ── Render MIME Tab ──────────────────────────────────
function renderMime(entries) {
  const el = document.getElementById('tab-mime');
  const fileEntries = entries.filter(e => e.value instanceof File || e.value instanceof Blob);

  if (fileEntries.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-text">No files or blobs to show MIME info</div></div>';
    return;
  }

  el.innerHTML = `
    <table class="mime-table">
      <thead><tr><th>Key</th><th>Filename</th><th>MIME Type</th><th>Size</th><th>Category</th></tr></thead>
      <tbody>
        ${fileEntries.map(({ key, value }) => {
          const name = value instanceof File && value.name ? value.name : '(blob)';
          const mime = value.type || 'application/octet-stream';
          const cat = mimeCategory(mime);
          return `<tr>
            <td style="color:var(--cyan)">${esc(key)}</td>
            <td>${esc(name)}</td>
            <td>${esc(mime)}</td>
            <td>${formatSize(value.size)}</td>
            <td>${cat}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ── Render JS Code Tab ──────────────────────────────
function renderJsCode() {
  const el = document.getElementById('jsCodeOutput');
  const lines = ['const fd = new FormData();', ''];

  for (const f of fields) {
    switch (f.type) {
      case 'checkbox':
        if (f.checked) lines.push(`fd.append('${escJs(f.name)}', 'on');`);
        break;
      case 'file':
        lines.push(`// fd.append('${escJs(f.name)}', fileInput.files[0]);`);
        break;
      case '__blob':
        lines.push(`fd.append('${escJs(f.name)}', new Blob([${JSON.stringify(f.blobContent || '')}], { type: '${escJs(f.blobType)}' }), '${escJs(f.name)}.${mimeToExt(f.blobType)}');`);
        break;
      default:
        lines.push(`fd.append('${escJs(f.name)}', ${JSON.stringify(f.value || '')});`);
    }
  }

  lines.push('');
  lines.push("// Send with fetch");
  lines.push("// fetch('/api/endpoint', { method: 'POST', body: fd });");

  el.textContent = lines.join('\n');
}

// ── Update Stats ────────────────────────────────────
function updateStats(entries) {
  document.getElementById('statEntries').textContent = entries.length;

  let totalSize = 0;
  let fileCount = 0;
  for (const { value } of entries) {
    if (value instanceof File || value instanceof Blob) {
      totalSize += value.size;
      fileCount++;
    } else {
      totalSize += new Blob([value]).size;
    }
  }

  document.getElementById('statSize').textContent = formatSize(totalSize);
  document.getElementById('statFiles').textContent = fileCount;
}

// ── Tabs ────────────────────────────────────────────
function setupTabs() {
  document.querySelector('.tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === `tab-${activeTab}`));
  });
}

// ── Encodings ───────────────────────────────────────
function setupEncodings() {
  document.querySelector('.encoding-selector').addEventListener('click', e => {
    const btn = e.target.closest('.encoding-btn');
    if (!btn) return;
    activeEncoding = btn.dataset.encoding;
    document.querySelectorAll('.encoding-btn').forEach(b => b.classList.toggle('active', b.dataset.encoding === activeEncoding));
    inspect();
  });
}

// ── Copy ────────────────────────────────────────────
function setupCopy() {
  document.getElementById('copyPostBody').addEventListener('click', () => {
    copyText(document.getElementById('postBodyOutput').textContent, document.getElementById('copyPostBody'));
  });
  document.getElementById('copyJsCode').addEventListener('click', () => {
    copyText(document.getElementById('jsCodeOutput').textContent, document.getElementById('copyJsCode'));
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── Utilities ───────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escJs(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  return `${(bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
}

function randomHex(len) {
  return Array.from(crypto.getRandomValues(new Uint8Array(len)), b => b.toString(16).padStart(2, '0')).join('').slice(0, len);
}

function hexDump(arr) {
  const lines = [];
  for (let i = 0; i < arr.length; i += 16) {
    const hex = Array.from(arr.slice(i, i + 16), b => b.toString(16).padStart(2, '0')).join(' ');
    const ascii = Array.from(arr.slice(i, i + 16), b => b >= 32 && b <= 126 ? String.fromCharCode(b) : '.').join('');
    lines.push(`${i.toString(16).padStart(8, '0')}  ${hex.padEnd(48)}  |${ascii}|`);
  }
  return lines.join('\n');
}

function mimeToExt(mime) {
  const map = {
    'application/json': 'json',
    'text/csv': 'csv',
    'text/plain': 'txt',
    'text/html': 'html',
    'application/octet-stream': 'bin',
    'image/png': 'png',
    'image/jpeg': 'jpg',
    'application/pdf': 'pdf',
  };
  return map[mime] || 'bin';
}

function mimeCategory(mime) {
  if (mime.startsWith('image/')) return 'Image';
  if (mime.startsWith('text/')) return 'Text';
  if (mime.startsWith('audio/')) return 'Audio';
  if (mime.startsWith('video/')) return 'Video';
  if (mime === 'application/json') return 'JSON';
  if (mime === 'application/pdf') return 'Document';
  if (mime.startsWith('application/')) return 'Application';
  return 'Other';
}

// ── Boot ────────────────────────────────────────────
init();
