.tree-node-content:hover{background:rgba(100,100,255,.05)}
.node-icon{font-size:1rem;min-width:18px;text-align:center}
.node-name{color:#e0e0e0}
.node-badge{font-size:.65rem;padding:1px 6px;border-radius:8px;font-weight:600}
.badge-check{background:rgba(105,219,124,.2);color:#69db7c}
.badge-skip{background:rgba(255,107,107,.2);color:#ff6b6b}
.badge-current{background:rgba(255,212,59,.2);color:#ffd43b}
.badge-found{background:rgba(105,219,124,.3);color:#69db7c;font-size:.7rem}

.found-node{background:rgba(105,219,124,.08);border-left:3px solid #69db7c}

.resolve-step.active{border-left-color:#ffd43b;background:rgba(255,212,59,.08)}
.resolve-step.success{border-left-color:#69db7c;background:rgba(105,219,124,.08)}
.resolve-step.fail{border-left-color:#ff6b6b;opacity:.5}

let curScenario=0,curStep=-1,autoInterval=null,currentTab='detail';

function init(){
  const sel=document.getElementById('scenarioSelect');
  SCENARIOS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.name;sel.appendChild(o)});
  sel.onchange=()=>{curScenario=+sel.value;reset()};
  reset();
}

function reset(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null}
  curStep=-1;render();
}

function render(){
  const s=SCENARIOS[curScenario];
  // Import statement
  document.getElementById('importPanel').innerHTML=`<h3 ti="h3_s_type_esm_esm_import_cj">${s.type==='esm'?'ESM Import':'CJS Require'}</h3><div class="import-stmt">${formatImport(s.importCode)}</div>`;
  // File tree
  const step=s.steps[curStep];
  document.getElementById('fileTree').innerHTML=renderTree(s.tree,step);
  // Steps
  const el=document.getElementById('resolveSteps');
  el.innerHTML=s.steps.map((st,i)=>{
    let cls=i<curStep?'fail':i===curStep?'active':'';
    if(st.found&&i<=curStep)cls='success';
    if(i<curStep&&!st.found)cls='fail';
    return `<div class="resolve-step ${cls}">${esc(st.desc)}</div>`;
  }).join('');
  renderTab();
}

function renderTree(node,step,depth=0){
  const isChecked=step&&step.check===node.id;
  const isFound=step&&step.found&&step.check===node.id;
  let cls='';
  if(isFound)cls='found-node';
  else if(isChecked)cls='step-node';

  let html=`<li class="tree-node"><div class="tree-node-content ${cls}">`;
  html+=`<span class="node-icon">${node.icon}</span>`;
  html+=`<span class="node-name">${esc(node.name)}</span>`;
  if(isFound)html+=` <span class="node-badge badge-found">✓ FOUND</span>`;
  else if(isChecked)html+=` <span class="node-badge badge-current">← checking</span>`;
  if(node.note)html+=` <span style="color:#666;font-size:.7rem">${esc(node.note)}</span>`;
  html+=`</div>`;
  if(node.children){
    html+=`<ul class="tree">`;
    node.children.forEach(c=>{html+=renderTree(c,step,depth+1)});
    html+=`</ul>`;
  }
  html+=`</li>`;
  return html;
}

function formatImport(code){
  return code.replace(/(import|from|require|const|let|var)/g,'<span class="import-kw">$1</span>')
    .replace(/("[^"]*"|'[^']*')/g,'<span class="import-str">$1</span>')
    .replace(/(\w+)\s*=/,'<span class="import-id">$1</span> =');
}

function renderTab(){
  const s=SCENARIOS[curScenario];
  const step=s.steps[curStep];
  const el=document.getElementById('tabContent');

  if(currentTab==='detail'){
    let html='';
    if(step){
      html+=`<div class="info-card"><h4>Step ${curStep+1} / ${s.steps.length}</h4><p>${esc(step.detail)}</p></div>`;
    }else{
      html+=`<div class="info-card"><h4>${s.name}</h4><p>Step through to see how Node.js resolves the module specifier "${esc(s.specifier)}".</p></div>`;
    }
    html+=`<div class="info-card"><h4>Resolution Type</h4><p>${s.type==='esm'?'ECMAScript Modules (import)':'CommonJS (require())'}</p></div>`;
    el.innerHTML=html;
  }else{
    el.innerHTML=`
    <div class="vs-table">
    <div class="vs-col cjs"><h4>CommonJS (CJS)</h4><ul>
    <li>require() — synchronous</li>
    <li>Auto-appends: .js, .json, .node</li>
    <li>Directory → index.js fallback</li>
    <li>package.json "main" field</li>
    <li>module.exports / exports</li>
    <li>Dynamic: require(variable)</li>
    <li>Cached by absolute path</li>
    </ul></div>
    <div class="vs-col esm"><h4>ESM (import)</h4><ul>
    <li>import — asynchronous</li>
    <li>Explicit extensions required</li>
    <li>No index.js fallback</li>
    <li>package.json "exports" field</li>
    <li>export / export default</li>
    <li>Static: import("expr") for dynamic</li>
    <li>Cached by URL</li>
    </ul></div>
    </div>
    <div class="info-card"><h4>package.json Fields</h4>
    <table class="ref-table">
    <tr><th ti="th_field">Field</th><th ti="th_used_by">Used by</th><th ti="th_purpose">Purpose</th></tr>
    <tr><td>"main"</td><td>CJS</td><td>Entry point for require()</td></tr>
    <tr><td>"module"</td><td>Bundlers</td><td>ESM entry (not Node.js)</td></tr>
    <tr><td>"exports"</td><td>ESM+CJS</td><td>Conditional entry points. Overrides "main"</td></tr>
    <tr><td>"type"</td><td>Node.js</td><td>"module" = .js files are ESM. "commonjs" = default</td></tr>
    <tr><td>"imports"</td><td>ESM</td><td>Package-private import aliases (#utils)</td></tr>
    <tr><td>"browser"</td><td>Bundlers</td><td>Browser-specific entry/overrides</td></tr>
    <tr><td>"types"</td><td>TypeScript</td><td>.d.ts type definitions entry</td></tr>
    </table></div>
    <div class="info-card"><h4>Export Conditions</h4>
    <table class="ref-table">
    <tr><th ti="th_condition">Condition</th><th ti="th_matched_by">Matched by</th></tr>
    <tr><td>"import"</td><td>ESM import statement</td></tr>
    <tr><td>"require"</td><td>CJS require() call</td></tr>
    <tr><td>"node"</td><td>Node.js runtime</td></tr>
    <tr><td>"browser"</td><td>Browser bundlers</td></tr>
    <tr><td>"default"</td><td>Always (fallback)</td></tr>
    <tr><td>"types"</td><td>TypeScript</td></tr>
    <tr><td>"development"</td><td>Dev mode bundlers</td></tr>
    <tr><td>"production"</td><td>Prod mode bundlers</td></tr>
    </table></div>
    <div class="info-card"><h4>CJS Resolution Algorithm</h4>
    <table class="ref-table">
    <tr><td>1</td><td>Is specifier a core module? (fs, path, etc.) → done</td></tr>
    <tr><td>2</td><td>Starts with "./" or "../"? → resolve relative path</td></tr>
    <tr><td>3</td><td>Try exact path, then +.js, +.json, +.node</td></tr>
    <tr><td>4</td><td>Try directory: path/index.js, index.json, index.node</td></tr>
    <tr><td>5</td><td>Bare specifier → walk up node_modules directories</td></tr>
    <tr><td>6</td><td>Read package.json "main" or default to index.js</td></tr>
    </table></div>`;
  }
}

function stepForward(){
  const s=SCENARIOS[curScenario];
  if(curStep<s.steps.length-1){curStep++;render()}
}
function stepBack(){if(curStep>=0){curStep--;render()}}
function autoPlay(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null;return}
  autoInterval=setInterval(()=>{
    if(curStep>=SCENARIOS[curScenario].steps.length-1){clearInterval(autoInterval);autoInterval=null;return}
    stepForward();
  },1200);
}
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().startsWith(t.slice(0,3))));
  renderTab();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
init();
</script>
