<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>structuredClone Advanced Playground</title>
<meta name="description" content="Interactive playground for structuredClone — deep clone demos, supported types matrix, transfer lists, performance benchmarks, and more.">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #6e9eff;
  --accent-dim: #4a7ad4;
  --green: #4caf50;
  --red: #ef5350;
  --orange: #ff9800;
  --purple: #b388ff;
  --yellow: #ffd54f;
  --radius: 8px;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.6;
}
header {
  text-align: center;
  padding: 2rem 1rem;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 2rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header p { color: var(--text-dim); margin-top: 0.5rem; }
nav {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
nav button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem 1rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
nav button:hover { border-color: var(--accent); }
nav button.active { background: var(--accent); color: #000; border-color: var(--accent); }
main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
.section { display: none; }
.section.active { display: block; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.card h3 { color: var(--accent); margin-bottom: 0.75rem; font-size: 1.1rem; }
.card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 0.75rem; }
.output {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
}
.label { color: var(--text-dim); }
.value { color: var(--green); }
.error { color: var(--red); }
.warn { color: var(--orange); }
button.run {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 0.5rem 1.25rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  transition: background 0.2s;
}
button.run:hover { background: var(--accent-dim); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--accent); font-weight: 600; }
.badge {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.badge-yes { background: rgba(76,175,80,0.15); color: var(--green); }
.badge-no { background: rgba(239,83,80,0.15); color: var(--red); }
.badge-partial { background: rgba(255,152,0,0.15); color: var(--orange); }
.bar-container {
  background: var(--surface-2);
  border-radius: 4px;
  height: 24px;
  position: relative;
  overflow: hidden;
}
.bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #000;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 700px) {
  .grid-2 { grid-template-columns: 1fr; }
  nav button { font-size: 0.75rem; padding: 0.4rem 0.75rem; }
}
code {
  background: var(--surface-2);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--purple);
}
</style>
</head>
<body>
<header>
  <h1><span>structuredClone</span> Advanced Playground</h1>
  <p>Deep cloning, type support, transfers, and performance — all interactive</p>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<script>
function ln(label, value, cls='value') {
  return `<span class="label">${label}: </span><span class="${cls}">${value}</span>\n`;
}

const sections = [
  { id: 'deepshallow', label: 'Deep vs Shallow' },
  { id: 'types', label: 'Supported Types' },
  { id: 'unsupported', label: 'Unsupported' },
  { id: 'transfer', label: 'Transfer List' },
  { id: 'perf', label: 'Performance' },
  { id: 'circular', label: 'Circular Refs' },
  { id: 'patterns', label: 'Patterns' },
];

const nav = document.getElementById('nav');
sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.label;
  btn.onclick = () => {
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById('sec-' + s.id).classList.add('active');
    document.querySelectorAll('nav button').forEach((b, j) => b.classList.toggle('active', j === i));
  };
  if (i === 0) btn.classList.add('active');
  nav.appendChild(btn);
});

const main = document.getElementById('main');

// ── Section 1: Deep vs Shallow ──
const sec1 = document.createElement('div');
sec1.id = 'sec-deepshallow';
sec1.className = 'section active';
sec1.innerHTML = `
<div class="card">
  <h3>Deep Clone vs Shallow Clone</h3>
  <p>See the critical difference: shallow copies share nested references, deep clones don't.</p>
  <button class="run" onclick="runDeepShallow()">Run Demo</button>
  <div class="output" id="dsOut"></div>
</div>
<div class="card">
  <h3>Spread Operator Trap</h3>
  <p>A common mistake: using <code>{...obj}</code> or <code>[...arr]</code> for deep cloning.</p>
  <button class="run" onclick="runSpreadTrap()">Run Demo</button>
  <div class="output" id="spreadOut"></div>
</div>`;
main.appendChild(sec1);

function runDeepShallow() {
  const o = document.getElementById('dsOut');
  const original = { name: 'Alice', scores: [95, 87, 92], address: { city: 'Tokyo', zip: '100-0001' } };

  // Shallow copy
  const shallow = { ...original };
  shallow.name = 'Bob';
  shallow.scores.push(100);
  shallow.address.city = 'Osaka';

  // Deep copy
  const original2 = { name: 'Alice', scores: [95, 87, 92], address: { city: 'Tokyo', zip: '100-0001' } };
  const deep = structuredClone(original2);
  deep.name = 'Bob';
  deep.scores.push(100);
  deep.address.city = 'Osaka';

  o.innerHTML =
    ln('── Shallow Copy ({...obj}) ──', '', 'label') +
    ln('original.name', original.name) +
    ln('shallow.name', shallow.name) +
    ln('original.scores', JSON.stringify(original.scores), 'error') +
    ln('shallow.scores', JSON.stringify(shallow.scores), 'error') +
    ln('original.address.city', original.address.city, 'error') +
    ln('Problem', 'Nested objects/arrays are shared!', 'error') +
    '\n' +
    ln('── Deep Copy (structuredClone) ──', '', 'label') +
    ln('original2.name', original2.name) +
    ln('deep.name', deep.name) +
    ln('original2.scores', JSON.stringify(original2.scores), 'value') +
    ln('deep.scores', JSON.stringify(deep.scores), 'value') +
    ln('original2.address.city', original2.address.city, 'value') +
    ln('Result', 'Completely independent copy!', 'value');
}

function runSpreadTrap() {
  const o = document.getElementById('spreadOut');
  const data = { users: [{ name: 'Alice', tags: ['admin'] }], meta: { version: 1 } };

  const methods = {
    'Spread {...}': () => ({ ...data }),
    'Object.assign': () => Object.assign({}, data),
    'JSON.parse(JSON.stringify)': () => JSON.parse(JSON.stringify(data)),
    'structuredClone': () => structuredClone(data),
  };

  let result = '';
  for (const [name, fn] of Object.entries(methods)) {
    const copy = fn();
    const isDeep = copy.users !== data.users && copy.users[0] !== data.users[0];
    result += ln(name.padEnd(30), isDeep ? 'TRUE deep clone' : 'SHALLOW — nested refs shared!', isDeep ? 'value' : 'error');
  }
  o.innerHTML = result;
}

// ── Section 2: Supported Types ──
const sec2 = document.createElement('div');
sec2.id = 'sec-types';
sec2.className = 'section';
sec2.innerHTML = `
<div class="card">
  <h3>Supported Types Matrix</h3>
  <p>structuredClone supports far more types than JSON. Click to test each one live.</p>
  <button class="run" onclick="runTypeMatrix()">Test All Types</button>
  <div id="typeMatrix"></div>
</div>`;
main.appendChild(sec2);

function runTypeMatrix() {
  const tests = [
    { name: 'Object', fn: () => ({ a: 1, b: { c: 2 } }) },
    { name: 'Array', fn: () => [1, [2, 3], { a: 4 }] },
    { name: 'String', fn: () => 'hello' },
    { name: 'Number', fn: () => 42 },
    { name: 'Boolean', fn: () => true },
    { name: 'null', fn: () => null },
    { name: 'undefined', fn: () => undefined },
    { name: 'Date', fn: () => new Date() },
    { name: 'RegExp', fn: () => /test/gi },
    { name: 'Map', fn: () => new Map([['a',1],['b',2]]) },
    { name: 'Set', fn: () => new Set([1,2,3]) },
    { name: 'ArrayBuffer', fn: () => new ArrayBuffer(8) },
    { name: 'Uint8Array', fn: () => new Uint8Array([1,2,3]) },
    { name: 'Int32Array', fn: () => new Int32Array([1,2,3]) },
    { name: 'Float64Array', fn: () => new Float64Array([1.1,2.2]) },
    { name: 'DataView', fn: () => new DataView(new ArrayBuffer(8)) },
    { name: 'Blob', fn: () => new Blob(['hello'], {type:'text/plain'}) },
    { name: 'File', fn: () => new File(['data'], 'test.txt', {type:'text/plain'}) },
    { name: 'ImageData', fn: () => new ImageData(2, 2) },
    { name: 'BigInt', fn: () => BigInt(9007199254740991) },
    { name: 'Error', fn: () => new Error('test error') },
    { name: 'TypeError', fn: () => new TypeError('type error') },
    { name: 'NaN', fn: () => NaN },
    { name: 'Infinity', fn: () => Infinity },
    { name: '-0', fn: () => -0 },
  ];

  let html = '<table><thead><tr><th>Type</th><th>structuredClone</th><th>JSON roundtrip</th><th>Preserved?</th></tr></thead><tbody>';

  for (const t of tests) {
    let scOk = false, scResult = '';
    let jsonOk = false, jsonResult = '';

    try {
      const val = t.fn();
      const cloned = structuredClone(val);
      scOk = true;
      scResult = String(cloned);
      if (cloned instanceof Map) scResult = `Map(${cloned.size})`;
      if (cloned instanceof Set) scResult = `Set(${cloned.size})`;
      if (cloned instanceof Date) scResult = cloned.toISOString();
      if (cloned instanceof RegExp) scResult = cloned.toString();
      if (cloned instanceof Blob) scResult = `Blob(${cloned.size})`;
      if (cloned instanceof ArrayBuffer) scResult = `ArrayBuffer(${cloned.byteLength})`;
      if (ArrayBuffer.isView(cloned)) scResult = `${cloned.constructor.name}(${cloned.length || cloned.byteLength})`;
      if (cloned instanceof ImageData) scResult = `ImageData(${cloned.width}x${cloned.height})`;
      if (cloned instanceof Error) scResult = `${cloned.constructor.name}: ${cloned.message}`;
    } catch(e) { scResult = e.message; }

    try {
      const val = t.fn();
      const cloned = JSON.parse(JSON.stringify(val));
      jsonOk = true;
      jsonResult = JSON.stringify(cloned).substring(0, 30);
    } catch(e) { jsonResult = 'Fails'; }

    // Check if JSON preserves type
    const jsonPreserves = jsonOk && (() => {
      try {
        const val = t.fn();
        const rt = JSON.parse(JSON.stringify(val));
        if (val instanceof Date) return rt instanceof Date;
        if (val instanceof RegExp) return rt instanceof RegExp;
        if (val instanceof Map) return rt instanceof Map;
        if (val instanceof Set) return rt instanceof Set;
        if (typeof val === 'bigint') return typeof rt === 'bigint';
        if (val instanceof Error) return rt instanceof Error;
        if (val === undefined) return rt === undefined;
        if (Object.is(val, NaN)) return Object.is(rt, NaN);
        if (Object.is(val, -0)) return Object.is(rt, -0);
        if (val === Infinity) return rt === Infinity;
        return true;
      } catch { return false; }
    })();

    html += `<tr>
      <td><code>${t.name}</code></td>
      <td><span class="badge ${scOk?'badge-yes':'badge-no'}">${scOk ? scResult.substring(0,25) : 'FAIL'}</span></td>
      <td><span class="badge ${jsonOk?'badge-yes':'badge-no'}">${jsonOk ? jsonResult : 'FAIL'}</span></td>
      <td><span class="badge ${jsonPreserves?'badge-yes':'badge-no'}">${jsonPreserves ? 'Yes' : 'No'}</span></td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('typeMatrix').innerHTML = html;
}

// ── Section 3: Unsupported Types ──
const sec3 = document.createElement('div');
sec3.id = 'sec-unsupported';
sec3.className = 'section';
sec3.innerHTML = `
<div class="card">
  <h3>Unsupported Types</h3>
  <p>These types will throw a <code>DataCloneError</code> when passed to structuredClone.</p>
  <button class="run" onclick="runUnsupported()">Test Unsupported Types</button>
  <div class="output" id="unsupOut"></div>
</div>
<div class="card">
  <h3>What Gets Lost</h3>
  <p>Some properties are silently dropped during cloning.</p>
  <button class="run" onclick="runLost()">Run Demo</button>
  <div class="output" id="lostOut"></div>
</div>`;
main.appendChild(sec3);

function runUnsupported() {
  const o = document.getElementById('unsupOut');
  const tests = [
    { name: 'Function', fn: () => structuredClone(function(){}) },
    { name: 'Arrow Function', fn: () => structuredClone(() => {}) },
    { name: 'Symbol', fn: () => structuredClone(Symbol('test')) },
    { name: 'DOM Node', fn: () => structuredClone(document.createElement('div')) },
    { name: 'WeakMap', fn: () => structuredClone(new WeakMap()) },
    { name: 'WeakSet', fn: () => structuredClone(new WeakSet()) },
    { name: 'WeakRef', fn: () => structuredClone(new WeakRef({})) },
    { name: 'Promise', fn: () => structuredClone(Promise.resolve(1)) },
    { name: 'Generator', fn: () => structuredClone((function*(){})()) },
    { name: 'Proxy', fn: () => { const p = new Proxy({}, {}); return structuredClone(p); } },
  ];

  let result = '';
  for (const t of tests) {
    try {
      t.fn();
      result += ln(t.name.padEnd(20), 'Unexpectedly succeeded', 'warn');
    } catch(e) {
      result += ln(t.name.padEnd(20), e.constructor.name + ': ' + e.message.substring(0,60), 'error');
    }
  }
  o.innerHTML = result;
}

function runLost() {
  const o = document.getElementById('lostOut');
  // Prototype chain
  class Dog { constructor(n) { this.name = n; } bark() { return 'woof'; } }
  const dog = new Dog('Rex');
  const clonedDog = structuredClone(dog);

  // Property descriptors
  const obj = {};
  Object.defineProperty(obj, 'secret', { value: 42, enumerable: false, writable: false });
  obj.visible = 'yes';
  const clonedObj = structuredClone(obj);

  // Symbol keys
  const sym = Symbol('key');
  const symObj = { [sym]: 'symbol value', normal: 'normal value' };
  const clonedSym = structuredClone(symObj);

  o.innerHTML =
    ln('── Prototype Chain ──', '', 'label') +
    ln('original instanceof Dog', dog instanceof Dog) +
    ln('clone instanceof Dog', clonedDog instanceof Dog, 'error') +
    ln('clone.name', clonedDog.name) +
    ln('clone.bark', typeof clonedDog.bark, 'error') +
    ln('Verdict', 'Prototype lost — methods gone, plain object returned', 'warn') +
    '\n' +
    ln('── Property Descriptors ──', '', 'label') +
    ln('original.secret', obj.secret) +
    ln('clone.secret', clonedObj.secret ?? 'undefined', clonedObj.secret !== undefined ? 'value' : 'error') +
    ln('original writable?', Object.getOwnPropertyDescriptor(obj, 'secret')?.writable) +
    ln('clone writable?', clonedObj.secret !== undefined ? Object.getOwnPropertyDescriptor(clonedObj, 'secret')?.writable : 'property missing', 'warn') +
    ln('Verdict', 'Non-enumerable properties are lost; descriptors reset to defaults', 'warn') +
    '\n' +
    ln('── Symbol Keys ──', '', 'label') +
    ln('original[Symbol]', symObj[sym]) +
    ln('clone has Symbol?', Object.getOwnPropertySymbols(clonedSym).length > 0 ? 'yes' : 'no', 'error') +
    ln('clone.normal', clonedSym.normal) +
    ln('Verdict', 'Symbol-keyed properties are silently dropped', 'warn');
}

// ── Section 4: Transfer List ──
const sec4 = document.createElement('div');
sec4.id = 'sec-transfer';
sec4.className = 'section';
sec4.innerHTML = `
<div class="card">
  <h3>Transfer List Demo</h3>
  <p>Transfer ownership of ArrayBuffers instead of copying. The original becomes detached (zero-copy move).</p>
  <button class="run" onclick="runTransfer()">Run Transfer Demo</button>
  <div class="output" id="transferOut"></div>
</div>
<div class="card">
  <h3>Transfer vs Clone Performance</h3>
  <p>Compare the speed of transferring vs cloning a large ArrayBuffer.</p>
  <button class="run" onclick="runTransferPerf()">Benchmark (64MB buffer)</button>
  <div class="output" id="transferPerfOut"></div>
</div>`;
main.appendChild(sec4);

function runTransfer() {
  const o = document.getElementById('transferOut');
  try {
    const buffer = new ArrayBuffer(1024);
    const view = new Uint8Array(buffer);
    view[0] = 42; view[1] = 99;

    o.innerHTML =
      ln('Original buffer byteLength', buffer.byteLength) +
      ln('Original view[0]', view[0]) +
      ln('Original view[1]', view[1]) +
      '\n';

    const transferred = structuredClone(buffer, { transfer: [buffer] });
    const newView = new Uint8Array(transferred);

    o.innerHTML +=
      ln('── After Transfer ──', '', 'label') +
      ln('Transferred byteLength', transferred.byteLength) +
      ln('Transferred view[0]', newView[0]) +
      ln('Transferred view[1]', newView[1]) +
      '\n' +
      ln('Original detached?', buffer.byteLength === 0 ? 'YES (byteLength=0)' : 'NO', buffer.byteLength === 0 ? 'value' : 'error') +
      ln('Original byteLength', buffer.byteLength, 'warn');

    // Try to access original
    try {
      const oldView = new Uint8Array(buffer);
      o.innerHTML += ln('Access original', 'Still accessible (unexpected)', 'warn');
    } catch(e) {
      o.innerHTML += ln('Access original', e.message, 'error');
    }
  } catch(e) {
    o.innerHTML = ln('Error', e.message, 'error') +
      ln('Note', 'Transfer requires { transfer: [...] } option support', 'warn');
  }
}

function runTransferPerf() {
  const o = document.getElementById('transferPerfOut');
  const SIZE = 64 * 1024 * 1024; // 64MB

  // Clone benchmark
  let cloneTime;
  {
    const buf = new ArrayBuffer(SIZE);
    new Uint8Array(buf).fill(42);
    const start = performance.now();
    const cloned = structuredClone(buf);
    cloneTime = performance.now() - start;
  }

  // Transfer benchmark
  let transferTime;
  {
    const buf = new ArrayBuffer(SIZE);
    new Uint8Array(buf).fill(42);
    const start = performance.now();
    try {
      const moved = structuredClone(buf, { transfer: [buf] });
      transferTime = performance.now() - start;
    } catch(e) {
      transferTime = -1;
    }
  }

  o.innerHTML =
    ln('Buffer size', (SIZE / 1024 / 1024) + ' MB') +
    ln('Clone time', cloneTime.toFixed(2) + ' ms') +
    ln('Transfer time', transferTime >= 0 ? transferTime.toFixed(2) + ' ms' : 'Not supported', transferTime >= 0 ? 'value' : 'error') +
    ln('Speedup', transferTime >= 0 ? (cloneTime / transferTime).toFixed(1) + 'x faster' : 'N/A', 'warn') +
    '\n' +
    ln('Why?', 'Transfer moves memory ownership (zero-copy). Clone copies all bytes.', 'label');
}

// ── Section 5: Performance ──
const sec5 = document.createElement('div');
sec5.id = 'sec-perf';
sec5.className = 'section';
sec5.innerHTML = `
<div class="card">
  <h3>Performance: JSON.parse vs structuredClone</h3>
  <p>Benchmark deep cloning with different object sizes and types.</p>
  <button class="run" onclick="runPerfBench()">Run Benchmark (10,000 iterations)</button>
  <div class="output" id="perfOut"></div>
  <div id="perfBars" style="margin-top:1rem"></div>
</div>`;
main.appendChild(sec5);

function runPerfBench() {
  const o = document.getElementById('perfOut');
  const bars = document.getElementById('perfBars');
  o.innerHTML = ln('Status', 'Running benchmark...', 'warn');

  requestAnimationFrame(() => {
    const testCases = [
      { name: 'Simple object', gen: () => ({ a: 1, b: 'hello', c: true }) },
      { name: 'Nested (3 levels)', gen: () => ({ a: { b: { c: { d: 1 } } }, e: [1,2,3] }) },
      { name: 'Array of 100 objects', gen: () => Array.from({length:100}, (_,i) => ({ id: i, name: `item${i}`, active: i%2===0 })) },
      { name: 'With Date/RegExp', gen: () => ({ d: new Date(), r: /test/gi, n: 42 }) },
      { name: 'With Map/Set', gen: () => ({ m: new Map([['a',1]]), s: new Set([1,2,3]) }) },
    ];

    const ITERATIONS = 10000;
    let result = ln('Iterations', ITERATIONS) + '\n';
    let barHTML = '';
    let maxTime = 0;
    const results = [];

    for (const tc of testCases) {
      const obj = tc.gen();

      // JSON benchmark
      let jsonTime = Infinity;
      const canJson = !(obj.m instanceof Map || obj.s instanceof Set || obj.d instanceof Date && false);
      if (canJson) {
        try {
          const start = performance.now();
          for (let i = 0; i < ITERATIONS; i++) JSON.parse(JSON.stringify(obj));
          jsonTime = performance.now() - start;
        } catch { jsonTime = -1; }
      } else {
        jsonTime = -1;
      }

      // structuredClone benchmark
      const scStart = performance.now();
      for (let i = 0; i < ITERATIONS; i++) structuredClone(obj);
      const scTime = performance.now() - scStart;

      results.push({ name: tc.name, jsonTime, scTime });
      const winner = jsonTime > 0 && jsonTime < scTime ? 'JSON' : 'structuredClone';
      const ratio = jsonTime > 0 ? (jsonTime / scTime).toFixed(2) : 'N/A';

      result += ln(`── ${tc.name} ──`, '', 'label');
      result += ln('  JSON.parse/stringify', jsonTime > 0 ? jsonTime.toFixed(1) + ' ms' : 'Cannot handle this type', jsonTime > 0 ? 'value' : 'error');
      result += ln('  structuredClone', scTime.toFixed(1) + ' ms');
      result += ln('  Winner', winner, winner === 'JSON' ? 'warn' : 'value');
      result += ln('  Ratio (JSON/SC)', ratio) + '\n';

      maxTime = Math.max(maxTime, jsonTime, scTime);
    }

    // Build bars
    barHTML = '<div style="display:grid;gap:0.5rem">';
    for (const r of results) {
      const jsonW = r.jsonTime > 0 ? (r.jsonTime / maxTime * 100) : 0;
      const scW = r.scTime / maxTime * 100;
      barHTML += `<div style="font-size:0.8rem;color:var(--text-dim);margin-top:0.5rem">${r.name}</div>`;
      barHTML += `<div class="bar-container"><div class="bar" style="width:${jsonW}%;background:var(--orange)">${r.jsonTime > 0 ? 'JSON ' + r.jsonTime.toFixed(0) + 'ms' : 'N/A'}</div></div>`;
      barHTML += `<div class="bar-container"><div class="bar" style="width:${scW}%;background:var(--accent)">SC ${r.scTime.toFixed(0)}ms</div></div>`;
    }
    barHTML += '</div>';

    o.innerHTML = result;
    bars.innerHTML = barHTML;
  });
}

function runCircular() {
  const o = document.getElementById('circOut');

  // Simple circular
  const obj = { name: 'root' };
  obj.self = obj;

  let result = ln('── Simple Self-Reference ──', '', 'label');
  result += ln('obj.self === obj', true);

  // JSON fails
  try {
    JSON.stringify(obj);
    result += ln('JSON.stringify', 'Succeeded (unexpected)', 'warn');
  } catch(e) {
    result += ln('JSON.stringify', e.message, 'error');
  }

  // structuredClone works
  try {
    const cloned = structuredClone(obj);
    result += ln('structuredClone', 'Succeeded!', 'value');
    result += ln('clone.self === clone', cloned.self === cloned);
    result += ln('clone.self === original', cloned.self === obj, 'value');
    result += ln('clone.name', cloned.name);
  } catch(e) {
    result += ln('structuredClone', e.message, 'error');
  }

  o.innerHTML = result;
}

function runComplexCircular() {
  const o = document.getElementById('complexCircOut');
  let result = '';

  // Mutual reference
  const a = { name: 'A' };
  const b = { name: 'B' };
  a.friend = b;
  b.friend = a;

  try {
    const cloned = structuredClone(a);
    result += ln('── Mutual Reference (A↔B) ──', '', 'label');
    result += ln('clone.friend.name', cloned.friend.name);
    result += ln('clone.friend.friend === clone', cloned.friend.friend === cloned);
    result += ln('Preserved?', 'Yes — graph structure maintained', 'value');
  } catch(e) {
    result += ln('Mutual Reference', e.message, 'error');
  }

  // Array with self
  const arr = [1, 2, 3];
  arr.push(arr);

  try {
    const clonedArr = structuredClone(arr);
    result += '\n' + ln('── Self-Referencing Array ──', '', 'label');
    result += ln('arr[3] === arr', arr[3] === arr);
    result += ln('clone[3] === clone', clonedArr[3] === clonedArr);
    result += ln('clone[3] === original', clonedArr[3] === arr, 'value');
  } catch(e) {
    result += ln('Self-Ref Array', e.message, 'error');
  }

  // Map with circular
  const map = new Map();
  map.set('self', map);
  map.set('data', 42);

  try {
    const clonedMap = structuredClone(map);
    result += '\n' + ln('── Map with Self-Reference ──', '', 'label');
    result += ln('map.get("self") === map', map.get('self') === map);
    result += ln('clone.get("self") === clone', clonedMap.get('self') === clonedMap);
    result += ln('clone.get("data")', clonedMap.get('data'));
  } catch(e) {
    result += ln('Map Circular', e.message, 'error');
  }

  // Shared reference (deduplication)
  const shared = { value: 'shared' };
  const container = { a: shared, b: shared };

  try {
    const clonedContainer = structuredClone(container);
    result += '\n' + ln('── Shared Reference Deduplication ──', '', 'label');
    result += ln('original.a === original.b', container.a === container.b);
    result += ln('clone.a === clone.b', clonedContainer.a === clonedContainer.b);
    result += ln('Result', 'Shared identity is preserved in the clone!', 'value');
  } catch(e) {
    result += ln('Shared Ref', e.message, 'error');
  }

  o.innerHTML = result;
}

</div>

function runPatterns() {
  const o = document.getElementById('patternsOut');
  let result = '';

  // Pattern 1: toJSON/fromJSON
  result += ln('── Pattern 1: toJSON / fromJSON ──', '', 'label');
  class User {
    constructor(name, joined) {
      this.name = name;
      this.joined = joined;
    }
    toJSON() { return { __type: 'User', name: this.name, joined: this.joined.toISOString() }; }
    static fromJSON(data) { return new User(data.name, new Date(data.joined)); }
    greet() { return `Hi, I'm ${this.name}`; }
  }

  const user = new User('Alice', new Date('2024-01-15'));
  const serialized = user.toJSON();
  const restored = User.fromJSON(serialized);
  result += ln('Original greet()', user.greet());
  result += ln('Serialized', JSON.stringify(serialized));
  result += ln('Restored greet()', restored.greet());
  result += ln('Restored instanceof User', restored instanceof User);

  // Pattern 2: Clone + reattach prototype
  result += '\n' + ln('── Pattern 2: Clone + Reattach Prototype ──', '', 'label');
  function cloneWithPrototype(obj) {
    const cloned = structuredClone(obj);
    Object.setPrototypeOf(cloned, Object.getPrototypeOf(obj));
    return cloned;
  }
  const clonedUser = cloneWithPrototype(user);
  result += ln('clone.greet()', clonedUser.greet());
  result += ln('clone instanceof User', clonedUser instanceof User);
  result += ln('Warning', 'Methods using closures will break!', 'warn');

  // Pattern 3: Registry pattern
  result += '\n' + ln('── Pattern 3: Type Registry ──', '', 'label');
  const registry = new Map();
  function registerType(name, cls) { registry.set(name, cls); }
  function deepCloneWithTypes(obj) {
    const data = structuredClone(obj);
    function revive(o) {
      if (o && typeof o === 'object' && o.__type && registry.has(o.__type)) {
        const Cls = registry.get(o.__type);
        return Cls.fromJSON ? Cls.fromJSON(o) : Object.assign(new Cls(), o);
      }
      return o;
    }
    return revive(data);
  }
  registerType('User', User);
  const regClone = deepCloneWithTypes(user.toJSON());
  result += ln('Registry clone greet()', regClone.greet());
  result += ln('Registry clone type', regClone instanceof User);

  o.innerHTML = result;
}

function runImmutable() {
  const o = document.getElementById('immutableOut');
  // Simulated Redux-like store
  const state = {
    users: [
      { id: 1, name: 'Alice', settings: { theme: 'dark', notifications: true } },
      { id: 2, name: 'Bob', settings: { theme: 'light', notifications: false } },
    ],
    meta: { lastUpdated: new Date(), version: 1 }
  };

  // Update user 1's theme without mutating original
  const newState = structuredClone(state);
  newState.users[0].settings.theme = 'solarized';
  newState.meta.lastUpdated = new Date();
  newState.meta.version++;

  o.innerHTML =
    ln('── State Update ──', '', 'label') +
    ln('Old state user[0].theme', state.users[0].settings.theme) +
    ln('New state user[0].theme', newState.users[0].settings.theme) +
    ln('Old state version', state.meta.version) +
    ln('New state version', newState.meta.version) +
    ln('States independent?', state.users[0].settings.theme !== newState.users[0].settings.theme) +
    ln('Date preserved?', newState.meta.lastUpdated instanceof Date);
}

function runDefaults() {
  const o = document.getElementById('defaultsOut');
  const DEFAULTS = {
    retries: 3,
    timeout: 5000,
    headers: { 'Content-Type': 'application/json' },
    hooks: { beforeRequest: [], afterResponse: [] },
  };

  // Each call gets independent defaults
  function createConfig(overrides = {}) {
    const config = structuredClone(DEFAULTS);
    return { ...config, ...overrides };
  }

  const config1 = createConfig();
  config1.headers['Authorization'] = 'Bearer token1';
  config1.hooks.beforeRequest.push('logger');

  const config2 = createConfig({ retries: 5 });

  o.innerHTML =
    ln('config1.headers', JSON.stringify(config1.headers)) +
    ln('config2.headers', JSON.stringify(config2.headers)) +
    ln('DEFAULTS.headers', JSON.stringify(DEFAULTS.headers)) +
    ln('config1.hooks.beforeRequest', JSON.stringify(config1.hooks.beforeRequest)) +
    ln('config2.hooks.beforeRequest', JSON.stringify(config2.hooks.beforeRequest)) +
    ln('config2.retries', config2.retries) +
    '\n' +
    ln('Key insight', 'Each config is fully independent — no shared references', 'value');
}
