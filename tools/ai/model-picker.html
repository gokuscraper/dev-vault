<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Model Picker — Which AI Model Should You Use?</title>
<meta name="description" content="Answer 4 questions, get a personalized AI model recommendation. Compare Claude, GPT, Gemini, DeepSeek, and more.">
<meta property="og:title" content="Model Picker — Which AI Model Should You Use?">
<meta property="og:description" content="Answer 4 questions. Get your ideal AI model. Claude, GPT, Gemini, DeepSeek — which one fits you?">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta property="og:url" content="https://gokuscraper.github.io/dev-vault/model-picker/">
<meta property="og:type" content="website">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/model-picker/">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Model Picker",
  "description": "Answer 4 questions, get a personalized AI model recommendation. Compare Claude, GPT, Gemini, DeepSeek, and more.",
  "url": "https://gokuscraper.github.io/dev-vault/model-picker/",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Any",
  "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
  "author": {"@type": "Organization", "name": "gokuscraper", "url": "https://github.com/gokuscraper"}
}
</script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#21262d;--text:#e6edf3;--dim:#8b949e;--blue:#58a6ff;--green:#3fb950;--orange:#ffa657;--red:#f85149;--purple:#bc8cff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hero{background:linear-gradient(135deg,#161b22 0%,#0d1117 100%);border-bottom:1px solid var(--border);padding:40px 24px 32px;text-align:center}
.hero h1{font-size:2rem;font-weight:700;letter-spacing:-0.5px}
.hero h1 span{color:var(--orange)}
.hero p{color:var(--dim);margin-top:8px;font-size:1rem;max-width:480px;margin-inline:auto}
.main{max-width:720px;margin:0 auto;padding:24px 16px}

/* Quiz */
.quiz{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px}
.q-title{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.q-num{color:var(--orange);font-size:.85rem;margin-bottom:4px}
.options{display:flex;flex-direction:column;gap:10px}
.option{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:.15s}
.option:hover{border-color:var(--blue)}
.option.selected{border-color:var(--green);background:rgba(63,185,80,.06)}
.option .opt-label{font-weight:600;font-size:.95rem}
.option .opt-desc{color:var(--dim);font-size:.82rem;margin-top:4px}
.nav{display:flex;justify-content:space-between;margin-top:20px}
.btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 24px;cursor:pointer;color:var(--text);font-size:.9rem;transition:.15s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--green);border-color:var(--green);color:#000;font-weight:600}
.btn.primary:hover{background:#4cc960}
.btn:disabled{opacity:.3;cursor:not-allowed}
.progress{display:flex;gap:6px;margin-bottom:20px}
.progress .dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:.2s}
.progress .dot.active{background:var(--orange)}
.progress .dot.done{background:var(--green)}

/* Results */
.results{display:none}
.result-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;position:relative}
.result-card.top{border-color:var(--green)}
.result-card .rank{position:absolute;top:12px;right:16px;font-size:.75rem;color:var(--dim);font-family:monospace}
.result-card.top .rank{color:var(--green);font-weight:700}
.result-card .model-name{font-size:1.3rem;font-weight:700}
.result-card .provider{color:var(--dim);font-size:.85rem;margin-top:2px}
.result-card .score-bar{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.score-item{text-align:center;min-width:60px}
.score-val{font-size:1.2rem;font-weight:700;font-family:monospace}
.score-val.green{color:var(--green)}
.score-val.blue{color:var(--blue)}
.score-val.orange{color:var(--orange)}
.score-val.purple{color:var(--purple)}
.score-lbl{font-size:.72rem;color:var(--dim);margin-top:2px}
.reason{margin-top:12px;font-size:.88rem;color:var(--dim);line-height:1.5;border-top:1px solid var(--border);padding-top:12px}
.restart{text-align:center;margin-top:20px}
.links{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.link-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--blue);text-decoration:none;font-size:.82rem;transition:.15s}
.link-btn:hover{border-color:var(--blue)}
.share-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-top:16px;text-align:center}
.share-text{font-family:monospace;font-size:.85rem;color:var(--text);background:var(--bg);padding:10px 14px;border-radius:6px;margin-top:8px;cursor:pointer;user-select:all}

.note{text-align:center;color:var(--dim);font-size:.78rem;margin-top:16px;padding:0 16px}
.footer{text-align:center;padding:32px 16px;color:var(--dim);font-size:.82rem;border-top:1px solid var(--border);margin-top:24px}
.footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <h1>Model <span>Picker</span></h1>
  <p>4 questions. Your ideal AI model. No signup required.</p>
</div>
<div class="main">
  <div id="quizSection">
    <div class="progress" id="progress"></div>
    <div class="quiz" id="quizCard"></div>
  </div>
  <div class="results" id="results"></div>
  <div class="note">Quality scores from Chatbot Arena Elo, SWE-bench Verified, and GPQA Diamond. Prices as of March 2026.</div>
</div>
<div class="footer">
  Built by <a href="https://github.com/gokuscraper" target="_blank">gokuscraper</a> ·
  <a href="https://github.com/gokuscraper/model-picker" target="_blank">GitHub</a> ·
  <a href="https://gokuscraper.github.io/dev-vault/llm-price/" target="_blank">LLM Price</a> (monthly costs) ·
  <a href="https://gokuscraper.github.io/dev-vault/prompt-price/" target="_blank">Prompt Price</a> (per-call costs) ·
  <a href="https://gokuscraper.github.io/dev-vault/ai-roi-calc/" target="_blank">AI ROI</a> (vs human cost) ·
</div>

<script>
const MODELS = [
  {name:'Claude Opus 4.6',provider:'Anthropic',input:5,output:25,ctx:200,quality:91,coding:95,writing:92,analysis:90,speed:60},
  {name:'Claude Sonnet 4.6',provider:'Anthropic',input:3,output:15,ctx:200,quality:86,coding:88,writing:85,analysis:85,speed:75},
  {name:'Claude Haiku 4.5',provider:'Anthropic',input:1,output:5,ctx:200,quality:72,coding:70,writing:70,analysis:68,speed:92},
  {name:'Claude Haiku 3.5',provider:'Anthropic',input:0.8,output:4,ctx:200,quality:65,coding:62,writing:64,analysis:60,speed:95},
  {name:'GPT-5.4',provider:'OpenAI',input:2.5,output:15,ctx:272,quality:92,coding:93,writing:92,analysis:91,speed:62},
  {name:'GPT-5.2',provider:'OpenAI',input:1.75,output:14,ctx:400,quality:89,coding:90,writing:90,analysis:88,speed:65},
  {name:'GPT-5.1',provider:'OpenAI',input:1.25,output:10,ctx:400,quality:86,coding:87,writing:86,analysis:85,speed:70},
  {name:'GPT-5 Mini',provider:'OpenAI',input:0.25,output:2,ctx:400,quality:73,coding:72,writing:71,analysis:70,speed:88},
  {name:'GPT-5 Nano',provider:'OpenAI',input:0.05,output:0.4,ctx:400,quality:55,coding:50,writing:52,analysis:48,speed:97},
  {name:'o3',provider:'OpenAI',input:2,output:8,ctx:200,quality:88,coding:92,writing:78,analysis:92,speed:40},
  {name:'o4-mini',provider:'OpenAI',input:1.1,output:4.4,ctx:200,quality:81,coding:85,writing:72,analysis:84,speed:55},
  {name:'GPT-4.1',provider:'OpenAI',input:2,output:8,ctx:1000,quality:82,coding:83,writing:80,analysis:80,speed:70},
  {name:'GPT-4.1 Nano',provider:'OpenAI',input:0.1,output:0.4,ctx:1000,quality:58,coding:55,writing:54,analysis:52,speed:96},
  {name:'Gemini 3.1 Pro',provider:'Google',input:2,output:12,ctx:2000,quality:90,coding:89,writing:88,analysis:91,speed:65},
  {name:'Gemini 3 Flash',provider:'Google',input:0.5,output:3,ctx:1000,quality:80,coding:78,writing:77,analysis:79,speed:86},
  {name:'Gemini 2.5 Pro',provider:'Google',input:1.25,output:10,ctx:2000,quality:87,coding:86,writing:84,analysis:88,speed:68},
  {name:'Gemini 2.5 Flash',provider:'Google',input:0.3,output:2.5,ctx:1000,quality:78,coding:76,writing:75,analysis:76,speed:88},
  {name:'DeepSeek V3.2',provider:'DeepSeek',input:0.28,output:0.42,ctx:164,quality:84,coding:88,writing:75,analysis:82,speed:72},
  {name:'Mistral Large 3',provider:'Mistral',input:2,output:6,ctx:260,quality:77,coding:75,writing:76,analysis:74,speed:78},
  {name:'Grok 4',provider:'xAI',input:3,output:15,ctx:256,quality:85,coding:84,writing:82,analysis:84,speed:65},
  {name:'Llama 4 Maverick',provider:'Meta',input:0.5,output:0.77,ctx:1000,quality:80,coding:78,writing:76,analysis:78,speed:82},
  {name:'Llama 4 Scout',provider:'Meta',input:0.11,output:0.34,ctx:10000,quality:70,coding:66,writing:65,analysis:68,speed:90},
];

const QUESTIONS = [
  {
    title: 'What will you primarily use it for?',
    options: [
      {label:'Coding',desc:'Writing, reviewing, or debugging code',value:'coding'},
      {label:'Writing',desc:'Blog posts, emails, creative content',value:'writing'},
      {label:'Analysis',desc:'Data analysis, research, reasoning',value:'analysis'},
      {label:'General chat',desc:'Q&A, brainstorming, conversation',value:'chat'},
    ]
  },
  {
    title: 'How important is cost?',
    options: [
      {label:'Every cent counts',desc:'Minimize cost above all else',value:'critical'},
      {label:'Cost-conscious',desc:'Good balance of price and quality',value:'balanced'},
      {label:'Quality first',desc:'Willing to pay for the best results',value:'premium'},
    ]
  },
  {
    title: 'How much context do you need?',
    options: [
      {label:'Small (< 32K)',desc:'Short conversations, single files',value:'small'},
      {label:'Medium (32K–200K)',desc:'Multiple files, long documents',value:'medium'},
      {label:'Large (200K+)',desc:'Entire codebases, books, massive datasets',value:'large'},
    ]
  },
  {
    title: 'How important is response speed?',
    options: [
      {label:'Need it fast',desc:'Real-time chat, interactive use',value:'fast'},
      {label:'Balanced',desc:'Some waiting is fine for better results',value:'balanced'},
      {label:'Quality over speed',desc:'Will wait for the best answer',value:'slow'},
    ]
  },
];

let currentQ = 0;
let answers = {};

function renderProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = QUESTIONS.map((_, i) => {
    const cls = i < currentQ ? 'dot done' : i === currentQ ? 'dot active' : 'dot';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const card = document.getElementById('quizCard');
  const selected = answers[currentQ];
  card.innerHTML = `
    <div class="q-num">Question ${currentQ + 1} of ${QUESTIONS.length}</div>
    <div class="q-title">${q.title}</div>
    <div class="options">
      ${q.options.map((o, i) => `
        <div class="option ${selected === o.value ? 'selected' : ''}" onclick="selectOption(${currentQ}, '${o.value}')">
          <div class="opt-label">${o.label}</div>
          <div class="opt-desc">${o.desc}</div>
        </div>
      `).join('')}
    </div>
    <div class="nav">
      <button class="btn" onclick="prevQ()" ${currentQ === 0 ? 'disabled' : ''}>Back</button>
      ${currentQ === QUESTIONS.length - 1
        ? `<button class="btn primary" onclick="showResults()" ${!answers[currentQ] ? 'disabled' : ''}>See Results</button>`
        : `<button class="btn" onclick="nextQ()" ${!answers[currentQ] ? 'disabled' : ''}>Next</button>`
      }
    </div>
  `;
  renderProgress();
}

function selectOption(qIdx, value) {
  answers[qIdx] = value;
  renderQuestion();
}

function prevQ() { if (currentQ > 0) { currentQ--; renderQuestion(); } }
function nextQ() { if (answers[currentQ] && currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); } }

function scoreModel(m) {
  let score = 0;
  const useCase = answers[0];
  const cost = answers[1];
  const context = answers[2];
  const speed = answers[3];

  // Use case weight (40%)
  if (useCase === 'coding') score += m.coding * 0.4;
  else if (useCase === 'writing') score += m.writing * 0.4;
  else if (useCase === 'analysis') score += m.analysis * 0.4;
  else score += m.quality * 0.4;

  // Cost (25%)
  const maxCost = Math.max(...MODELS.map(x => x.input + x.output));
  const costNorm = 1 - ((m.input + m.output) / maxCost);
  if (cost === 'critical') score += costNorm * 100 * 0.35;
  else if (cost === 'balanced') score += costNorm * 100 * 0.20;
  else score += costNorm * 100 * 0.05;

  // Context (15%)
  if (context === 'large') {
    if (m.ctx >= 1000) score += 15;
    else if (m.ctx >= 200) score += 8;
    else score += 2;
  } else if (context === 'medium') {
    if (m.ctx >= 200) score += 15;
    else if (m.ctx >= 32) score += 10;
    else score += 5;
  } else {
    score += 12; // small context — all models qualify
  }

  // Speed (20%)
  if (speed === 'fast') score += m.speed * 0.2;
  else if (speed === 'balanced') score += m.speed * 0.12;
  else score += m.speed * 0.05;

  return Math.round(score * 10) / 10;
}

function getReason(m, rank) {
  const useCase = answers[0];
  const cost = answers[1];
  const parts = [];

  if (useCase === 'coding') {
    if (m.coding >= 88) parts.push('Top-tier coding performance');
    else if (m.coding >= 75) parts.push('Strong coding capability');
    else parts.push('Adequate for basic coding tasks');
  } else if (useCase === 'writing') {
    if (m.writing >= 85) parts.push('Excellent writing quality');
    else if (m.writing >= 70) parts.push('Good writing output');
    else parts.push('Functional for simple writing');
  } else if (useCase === 'analysis') {
    if (m.analysis >= 85) parts.push('Advanced reasoning and analysis');
    else if (m.analysis >= 70) parts.push('Solid analytical capability');
    else parts.push('Basic analysis support');
  } else {
    if (m.quality >= 85) parts.push('Premium all-around intelligence');
    else if (m.quality >= 70) parts.push('Versatile general-purpose model');
    else parts.push('Lightweight general assistant');
  }

  const monthly10M = m.input * 10 + m.output * 2;
  if (cost === 'critical' && monthly10M < 5) parts.push('Extremely affordable at $' + monthly10M.toFixed(1) + '/mo (10M tokens)');
  else if (monthly10M < 20) parts.push('$' + monthly10M.toFixed(0) + '/mo at 10M input + 2M output');
  else parts.push('$' + monthly10M.toFixed(0) + '/mo at 10M input + 2M output');

  if (m.ctx >= 1000) parts.push(m.ctx >= 2000 ? 'Massive ' + (m.ctx/1000) + 'M context window' : m.ctx/1000 + 'M context window');
  else parts.push(m.ctx + 'K context');

  return parts.join('. ') + '.';
}

function showResults() {
  document.getElementById('quizSection').style.display = 'none';
  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';

  const scored = MODELS.map(m => ({...m, score: scoreModel(m)})).sort((a,b) => b.score - a.score);
  const top3 = scored.slice(0, 3);

  const ucLabel = {coding:'Coding',writing:'Writing',analysis:'Analysis',chat:'General'}[answers[0]];

  let html = `<h2 style="margin-bottom:16px;font-size:1.1rem;color:var(--dim)">Your top picks for <span style="color:var(--orange)">${ucLabel}</span>:</h2>`;

  top3.forEach((m, i) => {
    const monthly = m.input * 10 + m.output * 2;
    const ucScore = answers[0] === 'coding' ? m.coding : answers[0] === 'writing' ? m.writing : answers[0] === 'analysis' ? m.analysis : m.quality;
    html += `
      <div class="result-card ${i === 0 ? 'top' : ''}">
        <div class="rank">${i === 0 ? 'BEST MATCH' : '#' + (i+1)}</div>
        <div class="model-name">${m.name}</div>
        <div class="provider">${m.provider}</div>
        <div class="score-bar">
          <div class="score-item"><div class="score-val green">${m.score}</div><div class="score-lbl">Match</div></div>
          <div class="score-item"><div class="score-val blue">${ucScore}</div><div class="score-lbl">${ucLabel}</div></div>
          <div class="score-item"><div class="score-val orange">$${monthly < 10 ? monthly.toFixed(1) : monthly.toFixed(0)}</div><div class="score-lbl">/mo*</div></div>
          <div class="score-item"><div class="score-val purple">${m.ctx >= 1000 ? (m.ctx/1000)+'M' : m.ctx+'K'}</div><div class="score-lbl">Context</div></div>
          <div class="score-item"><div class="score-val">${m.speed}</div><div class="score-lbl">Speed</div></div>
        </div>
        <div class="reason">${getReason(m, i)}</div>
        <div class="links">
          <a class="link-btn" href="https://gokuscraper.github.io/dev-vault/llm-price/" target="_blank">See monthly cost</a>
          <a class="link-btn" href="https://gokuscraper.github.io/dev-vault/prompt-price/" target="_blank">See per-call cost</a>
        </div>
      </div>
    `;
  });

  html += `
    <div style="font-size:.75rem;color:var(--dim);margin-top:8px">*Monthly estimate at 10M input + 2M output tokens</div>
    <div class="share-box">
      <div style="font-size:.85rem;color:var(--dim)">Share your result:</div>
      <div class="share-text" onclick="navigator.clipboard.writeText(this.textContent)">${ucLabel} use case → ${top3[0].name} is my best match (score: ${top3[0].score}) via gokuscraper.github.io/dev-vault/model-picker</div>
      <div style="font-size:.72rem;color:var(--dim);margin-top:6px">Click to copy</div>
    </div>
    <div class="restart"><button class="btn" onclick="restart()">Start Over</button></div>
  `;

  resultsEl.innerHTML = html;
}

function restart() {
  currentQ = 0;
  answers = {};
  document.getElementById('quizSection').style.display = '';
  document.getElementById('results').style.display = 'none';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
