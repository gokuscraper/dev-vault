<script>
// Minimal RFC 4648 base32 decoding
function base32ToBytes(s) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  s = s.toUpperCase().replace(/[^A-Z2-7]/g, '');
  const bytes = [];
  let buffer = 0, bits = 0;
  for (const ch of s) {
    const idx = alphabet.indexOf(ch);
    if (idx === -1) continue;
    buffer = (buffer << 5) | idx;
    bits += 5;
    if (bits >= 8) {
      bits -= 8;
      bytes.push((buffer >> bits) & 0xff);
    }
  }
  return new Uint8Array(bytes);
}

// HMAC-SHA1 via Web Crypto API
async function hmacSha1(key, msg) {
  const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, msg);
  return new Uint8Array(sig);
}

function truncate(hs) {
  const offset = hs[hs.length - 1] & 0xf;
  const code = ((hs[offset] & 0x7f) << 24) | ((hs[offset + 1] & 0xff) << 16) | ((hs[offset + 2] & 0xff) << 8) | (hs[offset + 3] & 0xff);
  return code;
}

async function generateOTP(secret, counter, digits) {
  const key = base32ToBytes(secret);
  const msg = new Uint8Array(8);
  let c = counter;
  for (let i = 7; i >= 0; i--) {
    msg[i] = c & 0xff;
    c >>= 8;
  }
  const hs = await hmacSha1(key, msg);
  const code = truncate(hs);
  const mod = Math.pow(10, digits);
  return String(code % mod).padStart(digits, '0');
}

// TOTP
let totpInterval;
async function updateTOTP() {
  const secret = document.getElementById('totpSecret').value;
  const digits = parseInt(document.getElementById('totpDigits').value);
  const now = Math.floor(Date.now() / 1000);
  const counter = Math.floor(now / 30);
  const elapsed = now % 30;
  document.getElementById('totpCountdown').textContent = 30 - elapsed;
  document.getElementById('totpProgress').style.width = ((30 - elapsed) / 30 * 100) + '%';
  try {
    document.getElementById('totpCode').textContent = await generateOTP(secret, counter, digits);
  } catch(e) {
    document.getElementById('totpCode').textContent=T("jtc_error");
  }
}

function startTOTP() {
  updateTOTP();
  clearInterval(totpInterval);
  totpInterval = setInterval(updateTOTP, 1000);
}

document.getElementById('totpSecret').addEventListener('input', updateTOTP);
document.getElementById('totpDigits').addEventListener('change', updateTOTP);
document.getElementById('totpRefreshBtn').addEventListener('click', updateTOTP);
document.getElementById('totpCopyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('totpCode').textContent);
});

// HOTP
let hotpCounter = 0;
async function generateHOTP(increment) {
  const secret = document.getElementById('hotpSecret').value;
  const digits = parseInt(document.getElementById('hotpDigits').value);
  const counterInput = document.getElementById('hotpCounter');
  hotpCounter = parseInt(counterInput.value) || 0;
  try {
    document.getElementById('hotpCode').textContent = await generateOTP(secret, hotpCounter, digits);
  } catch(e) {
    document.getElementById('hotpCode').textContent=T("jtc_error");
  }
  if (increment) {
    hotpCounter++;
    counterInput.value = hotpCounter;
  }
}

document.getElementById('hotpSecret').addEventListener('input', () => generateHOTP(false));
document.getElementById('hotpDigits').addEventListener('change', () => generateHOTP(false));
document.getElementById('hotpCounter').addEventListener('input', () => generateHOTP(false));
document.getElementById('hotpGenerateBtn').addEventListener('click', () => generateHOTP(true));
document.getElementById('hotpCopyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('hotpCode').textContent);
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('totpPanel').classList.toggle('hidden', tab.dataset.tab !== 'totp');
    document.getElementById('hotpPanel').classList.toggle('hidden', tab.dataset.tab !== 'hotp');
  });
});

startTOTP();
generateHOTP(false);
</script>
