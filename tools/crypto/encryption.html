<!DOCTYPE html>
<html tk="title_encryption_tool" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encryption Tool</title>
<meta name="description" content="Encrypt and decrypt text using AES, TripleDES, Rabbit, or RC4 algorithms with a secret key.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:640px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:0.95rem;color:#4da6ff;margin-bottom:14px;font-weight:600}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea,input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;font-family:monospace}
input:focus,textarea:focus,select:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.mt-10{margin-top:10px}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_encryption_tool" ti="h1_encryption_tool">Encryption Tool</h1>
  <p class="desc" ti="subtitle_encrypt_and_decrypt_text">Encrypt and decrypt text using symmetric algorithms</p>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <div class="card">
    <h2 ti="h2_encrypt">Encrypt</h2>
    <textarea id="encInput" rows="3" spellcheck="false">Lorem ipsum dolor sit amet</textarea>
    <div class="row2 mt-10">
      <input type="text" id="encSecret" value="my secret key" tp="placeholder_secret_key" tp="placeholder_secret_key_2" placeholder="Secret key" spellcheck="false">
      <select id="encAlgo">
        <option value="AES">AES</option>
        <option value="TripleDES">TripleDES</option>
        <option value="Rabbit">Rabbit</option>
        <option value="RC4">RC4</option>
      </select>
    </div>
    <label ti="label_encrypted_output">Encrypted output</label>
    <textarea id="encOutput" rows="3" readonly></textarea>
  </div>
  <div class="card">
    <h2 ti="h2_decrypt">Decrypt</h2>
    <textarea id="decInput" rows="3" spellcheck="false">U2FsdGVkX1/EC3+6P5dbbkZ3e1kQ5o2yzuU0NHTjmrKnLBEwreV489Kr0DIBu+Bs</textarea>
    <div class="row2 mt-10">
      <input type="text" id="decSecret" value="my secret key" placeholder="Secret key" spellcheck="false">
      <select id="decAlgo">
        <option value="AES">AES</option>
        <option value="TripleDES">TripleDES</option>
        <option value="Rabbit">Rabbit</option>
        <option value="RC4">RC4</option>
      </select>
    </div>
    <label ti="label_decrypted_output">Decrypted output</label>
    <textarea id="decOutput" rows="3" readonly></textarea>
  </div>
</div>

<script>var _LANG={'title_encryption_tool':["Encryption Tool", "加密工具"],'metadesc_encrypt_and_decrypt_text':["Encrypt and decrypt text using AES, TripleDES, Rabbit, or RC4 algorithms with a secret key.", "使用 AES、TripleDES、Rabbit 或 RC4 算法和密钥对文本进行加密和解密。"],'h1_encryption_tool':["Encryption Tool", "加密工具"],'h2_encrypt':["Encrypt", "加密"],'h2_decrypt':["Decrypt", "解密"],'subtitle_encrypt_and_decrypt_text':["Encrypt and decrypt text using symmetric algorithms", "使用对称算法加密和解密文本"],'placeholder_secret_key':["Secret key", "密钥"],'placeholder_secret_key_2':["Secret key", "密钥"],'label_encrypted_output':["Encrypted output", "加密输出"],'label_decrypted_output':["Decrypted output", "解密后的输出"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const algos = { AES: CryptoJS.AES, TripleDES: CryptoJS.TripleDES, Rabbit: CryptoJS.Rabbit, RC4: CryptoJS.RC4 };

function updateEnc() {
  const input = document.getElementById('encInput').value;
  const secret = document.getElementById('encSecret').value;
  const algo = document.getElementById('encAlgo').value;
  try {
    document.getElementById('encOutput').value = algos[algo].encrypt(input, secret).toString();
  } catch(e) { document.getElementById('encOutput').value = 'Error'; }
}

function updateDec() {
  const input = document.getElementById('decInput').value;
  const secret = document.getElementById('decSecret').value;
  const algo = document.getElementById('decAlgo').value;
  try {
    const dec = algos[algo].decrypt(input, secret).toString(CryptoJS.enc.Utf8);
    document.getElementById('decOutput').value = dec || 'Unable to decrypt — wrong key or corrupted data';
  } catch(e) { document.getElementById('decOutput').value = 'Error: ' + e.message; }
}

['encInput','encSecret','encAlgo'].forEach(id => document.getElementById(id).addEventListener('input', updateEnc));
['decInput','decSecret','decAlgo'].forEach(id => document.getElementById(id).addEventListener('input', updateDec));
updateEnc(); updateDec();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
