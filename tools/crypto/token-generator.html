<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Generator</title>
<meta name="description" content="Generate cryptographically secure random tokens with configurable length, uppercase, lowercase, numbers, and symbols.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#4da6ff;font-size:0.9rem;outline:none;font-family:monospace;text-align:center;resize:none}
textarea:focus{border-color:#3b82f6}
.switch-row{display:flex;gap:24px;justify-content:center;margin-bottom:14px}
.switch-item{display:flex;align-items:center;gap:8px}
.switch-item label{color:#ccc;font-size:0.85rem;margin:0;cursor:pointer}
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.slider-row label{min-width:60px;margin:0}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:#333;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#3b82f6;cursor:pointer}
.length-val{color:#4da6ff;font-weight:600;min-width:30px;text-align:center}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
button.primary:hover{background:#2563eb}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <h1>Token Generator</h1>
  <p class="desc">Generate cryptographically secure random tokens</p>
  <div class="card">
    <div class="switch-row">
      <label class="switch-item"><input type="checkbox" id="chkUpper" checked> Uppercase</label>
      <label class="switch-item"><input type="checkbox" id="chkLower" checked> Lowercase</label>
      <label class="switch-item"><input type="checkbox" id="chkNumbers" checked> Numbers</label>
      <label class="switch-item"><input type="checkbox" id="chkSymbols"> Symbols</label>
    </div>
    <div class="slider-row">
      <label>Length</label>
      <input type="range" id="lengthSlider" min="1" max="512" value="64">
      <span class="length-val" id="lengthVal">64</span>
    </div>
    <textarea id="tokenOutput" rows="3" readonly></textarea>
    <div class="flex-center">
      <button class="primary" id="refreshBtn">Refresh</button>
      <button id="copyBtn">Copy</button>
    </div>
  </div>
</div>
<script>
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateToken() {
  const upper = document.getElementById('chkUpper').checked;
  const lower = document.getElementById('chkLower').checked;
  const numbers = document.getElementById('chkNumbers').checked;
  const symbols = document.getElementById('chkSymbols').checked;
  const length = parseInt(document.getElementById('lengthSlider').value);

  let chars = '';
  if (upper) chars += 'ABCDEFGHIJKLMOPQRSTUVWXYZ';
  if (lower) chars += 'abcdefghijklmopqrstuvwxyz';
  if (numbers) chars += '0123456789';
  if (symbols) chars += '.,;:!?.-/"\'#([-|\\@)]=}*+';

  if (!chars) { document.getElementById('tokenOutput').value = 'Select at least one character set'; return; }

  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars[arr[i] % chars.length];
  }
  document.getElementById('tokenOutput').value = result;
}

document.getElementById('refreshBtn').addEventListener('click', generateToken);
document.getElementById('copyBtn').addEventListener('click', () => {
  const v = document.getElementById('tokenOutput').value;
  if (v) navigator.clipboard.writeText(v);
});
['chkUpper','chkLower','chkNumbers','chkSymbols','lengthSlider'].forEach(id =>
  document.getElementById(id).addEventListener('change', generateToken));
document.getElementById('lengthSlider').addEventListener('input', () => {
  document.getElementById('lengthVal').textContent = document.getElementById('lengthSlider').value;
});
generateToken();
</script>
</body>
</html>
