<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyser</title>
<meta name="description" content="Analyze password strength with real-time feedback. Checks length, character variety, common patterns, entropy, and estimated crack time.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1.1rem;outline:none;margin-bottom:12px;font-family:monospace}
input:focus{border-color:#3b82f6}
.meter{height:8px;background:#222;border-radius:4px;margin-bottom:12px;overflow:hidden}
.meter-bar{height:100%;border-radius:4px;transition:width .3s,background .3s;width:0%}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:10px;text-align:center}
.stat .val{font-size:1.2rem;font-weight:700;color:#4da6ff}
.stat .lbl{color:#888;font-size:0.75rem;margin-top:2px}
.checks{margin-bottom:12px}
.check{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.85rem;color:#888}
.check.pass{color:#22c55e}
.check.fail{color:#888}
.check .icon{width:18px;text-align:center}
</style>
</head>
<body>
<div class="container">
  <h1>Password Strength Analyser</h1>
  <p class="desc">Real-time password strength analysis with entropy and crack time estimation</p>
  <div class="card">
    <input type="text" id="password" placeholder="Type a password..." spellcheck="false" autocomplete="off">
    <div class="meter"><div class="meter-bar" id="meterBar"></div></div>
    <div id="score" style="text-align:center;font-size:0.9rem;color:#888;margin-bottom:12px"></div>
    <div class="stats">
      <div class="stat"><div class="val" id="length">0</div><div class="lbl">Length</div></div>
      <div class="stat"><div class="val" id="entropy">0</div><div class="lbl">Entropy (bits)</div></div>
      <div class="stat"><div class="val" id="charset">0</div><div class="lbl">Char Types</div></div>
      <div class="stat"><div class="val" id="crackTime">instant</div><div class="lbl">Crack Time</div></div>
    </div>
    <div class="checks" id="checks"></div>
  </div>
</div>
<script>
const checks = [
  { id: 'length', label: 'At least 8 characters', test: s => s.length >= 8 },
  { id: 'upper', label: 'Uppercase letter', test: s => /[A-Z]/.test(s) },
  { id: 'lower', label: 'Lowercase letter', test: s => /[a-z]/.test(s) },
  { id: 'digit', label: 'Number', test: s => /[0-9]/.test(s) },
  { id: 'symbol', label: 'Symbol', test: s => /[^a-zA-Z0-9]/.test(s) },
  { id: 'common', label: 'Not a common password', test: s => !commonPasswords.includes(s.toLowerCase()) && s.length > 0 },
];

const commonPasswords = ['password','123456','12345678','qwerty','abc123','monkey','123456789','letmein','trustno1','dragon','baseball','iloveyou','master','sunshine','welcome','shadow','superman','princess','football','passw0rd','admin','guest','root','test','default'];

function calcEntropy(s) {
  let pool = 0;
  if (/[a-z]/.test(s)) pool += 26;
  if (/[A-Z]/.test(s)) pool += 26;
  if (/[0-9]/.test(s)) pool += 10;
  if (/[^a-zA-Z0-9]/.test(s)) pool += 32;
  if (pool === 0) return 0;
  return Math.round(s.length * Math.log2(pool));
}

function crackTime(bits) {
  const rate = 1e9; // 1 billion guesses/sec
  const seconds = Math.pow(2, bits) / rate;
  if (bits < 20) return 'instant';
  if (seconds < 60) return Math.round(seconds) + 's';
  if (seconds < 3600) return Math.round(seconds / 60) + ' min';
  if (seconds < 86400) return Math.round(seconds / 3600) + ' hrs';
  if (seconds < 31536000) return Math.round(seconds / 86400) + ' days';
  if (seconds < 315360000) return Math.round(seconds / 31536000) + ' years';
  return 'centuries';
}

function analyze() {
  const pw = document.getElementById('password').value;
  const e = calcEntropy(pw);
  const score = Math.min(100, Math.round((e / 80) * 100));

  document.getElementById('length').textContent = pw.length;
  document.getElementById('entropy').textContent = e;
  const types = [!!(/[a-z]/.test(pw)), !!(/[A-Z]/.test(pw)), !!(/[0-9]/.test(pw)), !!(/[^a-zA-Z0-9]/.test(pw))].filter(Boolean).length;
  document.getElementById('charset').textContent = types;
  document.getElementById('crackTime').textContent = crackTime(e);

  const bar = document.getElementById('meterBar');
  bar.style.width = score + '%';
  if (score < 25) { bar.style.background = '#ef4444'; document.getElementById('score').textContent = 'Weak'; document.getElementById('score').style.color = '#ef4444'; }
  else if (score < 50) { bar.style.background = '#f97316'; document.getElementById('score').textContent = 'Fair'; document.getElementById('score').style.color = '#f97316'; }
  else if (score < 75) { bar.style.background = '#eab308'; document.getElementById('score').textContent = 'Good'; document.getElementById('score').style.color = '#eab308'; }
  else { bar.style.background = '#22c55e'; document.getElementById('score').textContent = 'Strong'; document.getElementById('score').style.color = '#22c55e'; }

  document.getElementById('checks').innerHTML = checks.map(c => {
    const pass = c.test(pw);
    return `<div class="check ${pass ? 'pass' : 'fail'}"><span class="icon">${pass ? '✓' : '○'}</span>${c.label}</div>`;
  }).join('');
}

document.getElementById('password').addEventListener('input', analyze);
analyze();
</script>
</body>
</html>
