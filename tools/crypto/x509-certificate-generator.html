<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X.509 Certificate Generator</title>
<meta name="description" content="Generate self-signed X.509 SSL/TLS certificates with RSA-2048 key pair. Free browser tool using Web Crypto API.">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/x509-certificate-generator/">
<script type="application/ld+json">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:0.95rem;color:#ccc;margin-bottom:12px;font-weight:600}
label{font-size:0.8rem;color:#888;margin-bottom:4px;display:block;font-weight:600}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none;margin-bottom:10px}
input:focus,select:focus{border-color:#3b82f6}
.form-row{display:flex;gap:12px}
.form-row > div{flex:1}
.output-box{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:14px;font-family:monospace;font-size:0.75rem;color:#4ade80;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;margin-bottom:10px;cursor:pointer}
.output-box:hover{border-color:#3b82f6}
.output-box.full{max-height:400px}
.btn-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#fff}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.btn.green{background:#10b981;border-color:#10b981;color:#fff}
.btn.green:hover{background:#059669}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #555;border-top-color:#4da6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.status{text-align:center;font-size:0.82rem;color:#888;padding:8px}
.copy-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
.results{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media(max-width:600px){.results{grid-template-columns:1fr}.form-row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
<h1>X.509 Certificate Generator</h1>
<p class="subtitle">Generate self-signed SSL/TLS certificates locally in your browser.</p>

<div class="card">
  <h3>Subject Details</h3>
  <label>Common Name *</label>
  <input id="commonName" type="text" value="example.com" placeholder="e.g. example.com">
  
  <div class="form-row">
    <div>
      <label>Country *</label>
      <select id="country">
        <option value="">-- Select --</option><option value="US">United States</option><option value="GB">United Kingdom</option><option value="DE">Germany</option><option value="FR">France</option><option value="JP">Japan</option><option value="CN">China</option><option value="SG">Singapore</option><option value="AU">Australia</option><option value="CA">Canada</option><option value="BR">Brazil</option><option value="IN">India</option><option value="NL">Netherlands</option><option value="SE">Sweden</option><option value="CH">Switzerland</option><option value="KR">South Korea</option>
      </select>
    </div>
    <div>
      <label>State / Province</label>
      <input id="state" type="text" placeholder="e.g. California">
    </div>
  </div>
  
  <div class="form-row">
    <div>
      <label>Locality</label>
      <input id="locality" type="text" placeholder="e.g. San Francisco">
    </div>
    <div>
      <label>Organization</label>
      <input id="organization" type="text" placeholder="e.g. My Company">
    </div>
  </div>
  
  <div class="form-row">
    <div>
      <label>Organizational Unit</label>
      <input id="orgUnit" type="text" placeholder="e.g. IT Department">
    </div>
    <div>
      <label>Email</label>
      <input id="email" type="email" placeholder="admin@example.com">
    </div>
  </div>
  
  <h3 style="margin-top:14px">Validity</h3>
  <div class="form-row">
    <div>
      <label>Valid From</label>
      <input id="startDate" type="date">
    </div>
    <div>
      <label>Valid To</label>
      <input id="endDate" type="date">
    </div>
  </div>
  
  <h3 style="margin-top:14px">Subject Alternative Names (SAN)</h3>
  <label>Comma-separated domains (e.g. example.com, www.example.com, api.example.com)</label>
  <input id="sanInput" type="text" value="example.com, www.example.com" placeholder="example.com, *.example.com">
  
  <div class="btn-row">
    <button class="btn primary" id="genBtn" onclick="generate()">🔑 Generate Certificate</button>
  </div>
  
  <div id="status" class="status"></div>
</div>

<div id="results" style="display:none">
  <div class="results">
    <div class="card">
      <h3>Certificate (.crt)</h3>
      <div class="output-box full" id="certOutput" onclick="copyText('certOutput')">Generating...</div>
      <button class="btn" onclick="download('certOutput', 'certificate.crt')">Download</button>
    </div>
    <div class="card">
      <h3>Private Key (.key)</h3>
      <div class="output-box full" id="keyOutput" onclick="copyText('keyOutput')">Generating...</div>
      <button class="btn" onclick="download('keyOutput', 'private.key')">Download</button>
    </div>
  </div>
</div>

<footer>
  <p>Powered by Web Crypto API. <a href="https://github.com/gokuscraper/dev-toolkit">GitHub</a></p>
</footer>
</div>

<script>
// Set default dates
const today = new Date();
const nextYear = new Date(today);
nextYear.setFullYear(nextYear.getFullYear() + 1);
document.getElementById('startDate').value = today.toISOString().split('T')[0];
document.getElementById('endDate').value = nextYear.toISOString().split('T')[0];

function copyText(id) {
  const el = document.getElementById(id);
  const text = el.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.createElement('div');
    t.className = 'copy-toast';
    t.textContent = 'Copied!';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1500);
  });
}

function download(id, filename) {
  const text = document.getElementById(id).textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'application/x-pem-file' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function arrayBufferToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function base64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function toPem(b64, label) {
  const lines = ['-----BEGIN ' + label + '-----'];
  for (let i = 0; i < b64.length; i += 64) lines.push(b64.substr(i, 64));
  lines.push('-----END ' + label + '-----');
  return lines.join('\n');
}

function strToBytes(str) {
  const bytes = [];
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i);
    if (code < 0x80) bytes.push(code);
    else if (code < 0x800) { bytes.push(0xc0 | (code >> 6)); bytes.push(0x80 | (code & 0x3f)); }
    else { bytes.push(0xe0 | (code >> 12)); bytes.push(0x80 | ((code >> 6) & 0x3f)); bytes.push(0x80 | (code & 0x3f)); }
  }
  return bytes;
}

function encodeDERLength(length) {
  if (length < 0x80) return [length];
  const bytes = [];
  let l = length;
  while (l > 0) { bytes.unshift(l & 0xff); l >>= 8; }
  return [0x80 | bytes.length, ...bytes];
}

function encodeDERInteger(value) {
  // Value is a hex string
  const bytes = value.match(/.{1,2}/g).map(b => parseInt(b, 16));
  if (bytes[0] >= 0x80) bytes.unshift(0); // Positive sign byte
  return [0x02, ...encodeDERLength(bytes.length), ...bytes];
}

function encodeDERTagged(tag, bytes) {
  return [tag, ...encodeDERLength(bytes.length), ...bytes];
}

function encodeDERSequence(bytes) {
  return [0x30, ...encodeDERLength(bytes.length), ...bytes];
}

function encodeDERPrintableString(str) {
  const bytes = strToBytes(str);
  return [0x13, ...encodeDERLength(bytes.length), ...bytes];
}

function encodeDERUTF8String(str) {
  const bytes = strToBytes(str);
  return [0x0c, ...encodeDERLength(bytes.length), ...bytes];
}

function encodeDERBitString(bytes) {
  return [0x03, ...encodeDERLength(bytes.length + 1), 0x00, ...bytes];
}

function encodeDERNull() {
  return [0x05, 0x00];
}

function encodeDEROctetString(bytes) {
  return [0x04, ...encodeDERLength(bytes.length), ...bytes];
}

function encodeDEROID(oid) {
  const parts = oid.split('.').map(Number);
  const bytes = [40 * parts[0] + parts[1]];
  for (let i = 2; i < parts.length; i++) {
    let v = parts[i];
    const b = [];
    b.unshift(v & 0x7f);
    v >>= 7;
    while (v > 0) { b.unshift(0x80 | (v & 0x7f)); v >>= 7; }
    bytes.push(...b);
  }
  return [0x06, ...encodeDERLength(bytes.length), ...bytes];
}

// Build TBSCertificate
function buildTBS(cn, country, state, locality, org, orgUnit, email, sanDomains, startDate, endDate, pubKeyBytes, serialBytes) {
  const validity = encodeDERSequence([
    encodeDERTagged(0x80, strToBytes(startDate)), // notBefore (UTCTime)
    encodeDERTagged(0x81, strToBytes(endDate)),   // notAfter (UTCTime)
  ]);
  
  // Subject attributes
  const subjectAttrs = [];
  
  const addAttr = (oid, value) => {
    if (!value) return;
    subjectAttrs.push(encodeDERSequence([
      encodeDERSequence([encodeDEROID(oid), encodeDERPrintableString(value)]),
    ]));
  };
  
  addAttr('2.5.4.6', country);   // countryName
  addAttr('2.5.4.8', state);     // stateOrProvinceName
  addAttr('2.5.4.7', locality);  // localityName
  addAttr('2.5.4.10', org);      // organizationName
  addAttr('2.5.4.11', orgUnit);  // organizationalUnitName
  addAttr('2.5.4.3', cn);        // commonName
  if (email) {
    // Email is a IA5String in subject
    subjectAttrs.push(encodeDERSequence([
      encodeDERSequence([encodeDEROID('1.2.840.113549.1.9.1'), encodeDERTagged(0x16, strToBytes(email))]),
    ]));
  }
  
  const subject = encodeDERSequence(subjectAttrs.flat());
  
  // Subject Public Key Info
  const spki = encodeDERSequence([
    encodeDERSequence([
      encodeDEROID('1.2.840.113549.1.1.1'), // rsaEncryption
      encodeDERNull(),
    ]),
    encodeDERBitString(pubKeyBytes),
  ]);
  
  // Extensions
  const extensions = [];
  
  // Basic Constraints: CA=true
  const basicConstraints = encodeDERSequence([
    encodeDEROID('2.5.29.19'),  // basicConstraints
    true ? 0x01 : 0x00,        // critical
    encodeDEROctetString(encodeDERSequence([0x01, 0x01, 0xff])), // cA=TRUE
  ]);
  
  // The basic constraints extension value is actually a SEQUENCE wrapped around the OCTET STRING
  // Fix: the OCTET STRING contains the DER-encoded BasicConstraints
  const bcValue = encodeDEROctetString(encodeDERSequence([0x01, 0x01, 0xff]));
  const extBasic = encodeDERSequence([
    encodeDEROID('2.5.29.19'),
    0x01, 0x01, 0xff, // critical=TRUE
    ...bcValue,
  ]);
  
  // Simpler approach for BC
  const bcExt = encodeDERSequence([
    encodeDEROID('2.5.29.19'),
    encodeDEROctetString(encodeDERSequence([0x30, 0x03, 0x01, 0x01, 0xff])),
  ]);
  
  extensions.push(bcExt);
  
  // Subject Alt Names
  if (sanDomains.length > 0 || email) {
    const sanNames = [];
    sanDomains.forEach(d => {
      const domain = d.trim();
      if (!domain) return;
      // DNS name: tag [2] (context-specific, constructed), IA5String
      const nameBytes = strToBytes(domain);
      sanNames.push(...[0x82, ...encodeDERLength(nameBytes.length), ...nameBytes]);
    });
    if (email) {
      const emailBytes = strToBytes(email);
      sanNames.push(...[0x81, ...encodeDERLength(emailBytes.length), ...emailBytes]);
    }
    
    const sanExt = encodeDERSequence([
      encodeDEROID('2.5.29.17'),  // subjectAltName
      encodeDEROctetString(encodeDERSequence(sanNames)),
    ]);
    extensions.push(sanExt);
  }
  
  const extSeq = encodeDERSequence(extensions.flat());
  
  // Serial number
  const serial = encodeDERInteger(serialBytes);
  
  // Signature algorithm
  const sigAlg = encodeDERSequence([
    encodeDEROID('1.2.840.113549.1.1.11'), // sha256WithRSAEncryption
    encodeDERNull(),
  ]);
  
  // Issuer (same as subject for self-signed)
  const issuer = subject;
  
  // Version: v3 (value = 2)
  const version = encodeDERTagged(0xa0, encodeDERInteger('02'));
  
  return encodeDERSequence([
    ...version,
    serial,
    sigAlg,
    issuer,
    validity,
    subject,
    spki,
    encodeDERTagged(0xa3, extSeq), // extensions [3]
  ]);
}

async function generate() {
  const btn = document.getElementById('genBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  
  const cn = document.getElementById('commonName').value.trim();
  if (!cn) { status.innerHTML = 'Please enter a Common Name'; return; }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  status.innerHTML = 'Generating RSA-2048 key pair...';
  
  try {
    // Generate RSA key pair
    const keyPair = await crypto.subtle.generateKey(
      { name: 'RSA-PSS', modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: 'SHA-256' },
      true,
      ['sign', 'verify']
    );
    
    // Export public key as SPKI
    const spki = await crypto.subtle.exportKey('spki', keyPair.publicKey);
    const spkiBytes = Array.from(new Uint8Array(spki));
    
    // Export private key as PKCS8
    const pkcs8 = await crypto.subtle.exportKey('pkcs8', keyPair.privateKey);
    const pkcs8B64 = arrayBufferToBase64(pkcs8);
    
    status.innerHTML = 'Building certificate...';
    
    // Build certificate data
    const country = document.getElementById('country').value;
    const state = document.getElementById('state').value.trim();
    const locality = document.getElementById('locality').value.trim();
    const org = document.getElementById('organization').value.trim();
    const orgUnit = document.getElementById('orgUnit').value.trim();
    const email = document.getElementById('email').value.trim();
    const sanInput = document.getElementById('sanInput').value.trim();
    const sanDomains = sanInput ? sanInput.split(',').map(d => d.trim()).filter(d => d) : [cn];
    const startDate = document.getElementById('startDate').value.replace(/-/g, '') + '000000Z';
    const endDate = document.getElementById('endDate').value.replace(/-/g, '') + '235959Z';
    
    // Serial number (16 random hex bytes)
    const serialBytes = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('');
    
    // Build TBS certificate
    const tbsBytes = buildTBS(cn, country, state, locality, org, orgUnit, email, sanDomains, startDate, endDate, spkiBytes, serialBytes);
    const tbsArray = new Uint8Array(tbsBytes);
    
    status.innerHTML = 'Signing certificate...';
    
    // Sign with RSA-PSS
    const signature = await crypto.subtle.sign(
      { name: 'RSA-PSS', saltLength: 32 },
      keyPair.privateKey,
      tbsArray
    );
    const sigBytes = Array.from(new Uint8Array(signature));
    
    // Build final certificate
    const sigAlg = encodeDERSequence([
      encodeDEROID('1.2.840.113549.1.1.11'), // sha256WithRSAEncryption
      encodeDERNull(),
    ]);
    
    const certBytes = encodeDERSequence([
      ...tbsBytes,
      sigAlg,
      encodeDERBitString(sigBytes),
    ]);
    
    const certB64 = btoa(String.fromCharCode(...new Uint8Array(certBytes)));
    
    document.getElementById('certOutput').textContent = toPem(certB64, 'CERTIFICATE');
    document.getElementById('keyOutput').textContent = toPem(pkcs8B64, 'RSA PRIVATE KEY');
    
    results.style.display = 'block';
    btn.innerHTML = '🔑 Regenerate Certificate';
    status.innerHTML = '✅ Certificate generated successfully! Click to copy PEM data.';
    
  } catch(e) {
    status.innerHTML = 'Error: ' + e.message;
    btn.innerHTML = '🔑 Generate Certificate';
  }
  
  btn.disabled = false;
}
</script>
</body>
