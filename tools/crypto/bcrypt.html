<!DOCTYPE html>
<html tk="title_bcrypt" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCrypt</title>
<meta name="description" content="Hash and compare strings using the BCrypt algorithm. Generate secure password hashes with configurable salt rounds.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:600px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:0.95rem;color:#4da6ff;margin-bottom:14px;font-weight:600}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,textarea,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;font-family:monospace}
input:focus,textarea:focus,select:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:50px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row label{margin-bottom:0;min-width:80px}
.match-yes{color:#34d399;font-weight:700;font-size:1.1rem}
match-no{color:#f87171;font-weight:700;font-size:1.1rem}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
button.primary:hover{background:#2563eb}
.mt-10{margin-top:10px}
.flex-center{display:flex;justify-content:center}
</style>
</head>
<body>




<div class="container" style="position:relative">
  <h1 ti="title_bcrypt" ti="h1_bcrypt" ti="title_bcrypt" ti="h1_bcrypt">BCrypt</h1>
  <p class="desc" ti="subtitle_hash_and_compare_strings" ti="subtitle_hash_and_compare_strings">Hash and compare strings using the BCrypt algorithm</p>
  <div class="card">
    <h2 ti="h2_hash" ti="h2_hash">Hash</h2>
    <label ti="label_your_string" ti="label_your_string_2" ti="label_your_string" ti="label_your_string_2">Your string</label>
    <input type="text" id="hashInput" value="Hello World" spellcheck="false">
    <div class="row mt-10">
      <label ti="label_salt_rounds" ti="label_salt_rounds">Salt rounds</label>
      <input type="number" id="saltCount" value="10" min="0" max="100" style="width:100px">
    </div>
    <div class="mt-10">
      <label ti="label_result" ti="label_result">Result</label>
      <textarea id="hashOutput" readonly rows="2"></textarea>
    </div>
    <div class="flex-center mt-10">
      <button class="primary" id="copyHashBtn" ti="btn_copy_hash" ti="btn_copy_hash">Copy hash</button>
    </div>
  </div>
  <div class="card">
    <h2 ti="h2_compare_string_with_hash" ti="h2_compare_string_with_hash">Compare string with hash</h2>
    <label>Your string</label>
    <input type="text" id="compareString" value="Hello World" spellcheck="false">
    <label class="mt-10" ti="label_your_hash" ti="label_your_hash">Your hash</label>
    <input type="text" id="compareHash" tp="placeholder_paste_a_bcrypt_hash" tp="placeholder_paste_a_bcrypt_hash" placeholder="Paste a BCrypt hash..." spellcheck="false">
    <div class="mt-10">
      <span id="matchResult" style="font-size:1.1rem;font-weight:700"></span>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>

<script>var _LANG={'title_bcrypt':["BCrypt", "BCrypt"],'metadesc_hash_and_compare_strings':["Hash and compare strings using the BCrypt algorithm. Generate secure password hashes with configurable salt rounds.", "使用 BCrypt 算法对字符串进行哈希和比较。生成具有可配置盐轮数的安全密码哈希。"],'h1_bcrypt':["BCrypt", "BCrypt"],'h2_hash':["Hash", "哈希"],'h2_compare_string_with_hash':["Compare string with hash", "比较字符串与哈希"],'subtitle_hash_and_compare_strings':["Hash and compare strings using the BCrypt algorithm", "使用 BCrypt 算法对字符串进行哈希和比较"],'btn_copy_hash':["Copy hash", "复制哈希"],'placeholder_paste_a_bcrypt_hash':["Paste a BCrypt hash...", "粘贴 BCrypt 哈希..."],'label_your_string':["Your string", "你的字符串"],'label_salt_rounds':["Salt rounds", "盐轮数"],'label_result':["Result", "结果"],'label_your_string_2':["Your string", "你的字符串"],'label_your_hash':["Your hash", "你的哈希"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const hashInput = document.getElementById('hashInput');
const saltCount = document.getElementById('saltCount');
const hashOutput = document.getElementById('hashOutput');

function updateHash() {
  try {
    hashOutput.value = dcodeIO.bcrypt.hashSync(hashInput.value, parseInt(saltCount.value) || 10);
  } catch(e) {
    hashOutput.value = 'Error: ' + e.message;
  }
}
hashInput.addEventListener('input', updateHash);
saltCount.addEventListener('input', updateHash);
updateHash();

document.getElementById('copyHashBtn').addEventListener('click', () => {
  if (hashOutput.value) navigator.clipboard.writeText(hashOutput.value);
});

const compareString = document.getElementById('compareString');
const compareHash = document.getElementById('compareHash');
const matchResult = document.getElementById('matchResult');

function updateCompare() {
  try {
    const match = dcodeIO.bcrypt.compareSync(compareString.value, compareHash.value);
    matchResult.textContent = match ? 'Yes ✓ — Match!' : 'No ✗ — Does not match';
    matchResult.style.color = match ? '#34d399' : '#f87171';
  } catch(e) {
    matchResult.textContent = '';
  }
}
compareString.addEventListener('input', updateCompare);
compareHash.addEventListener('input', updateCompare);
</script>
<script>var _LANG={'title_bcrypt':["BCrypt", "BCrypt"],'metadesc_hash_and_compare_strings':["Hash and compare strings using the BCrypt algorithm. Generate secure password hashes with configurable salt rounds.", "使用 BCrypt 算法对字符串进行哈希和比较。生成具有可配置盐轮数的安全密码哈希。"],'h1_bcrypt':["BCrypt", "BCrypt"],'h2_hash':["Hash", "哈希"],'h2_compare_string_with_hash':["Compare string with hash", "比较字符串与哈希"],'subtitle_hash_and_compare_strings':["Hash and compare strings using the BCrypt algorithm", "使用 BCrypt 算法对字符串进行哈希和比较"],'btn_copy_hash':["Copy hash", "复制哈希"],'placeholder_paste_a_bcrypt_hash':["Paste a BCrypt hash...", "粘贴 BCrypt 哈希..."],'label_your_string':["Your string", "你的字符串"],'label_salt_rounds':["Salt rounds", "盐轮数"],'label_result':["Result", "结果"],'label_your_string_2':["Your string", "你的字符串"],'label_your_hash':["Your hash", "你的哈希"]};

(function(){var L;try{L=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(L!='zh')L='en'}catch(e){L='en'}
function T(k){var a=_LANG&&_LANG[k];return a?a[L==='zh'?1:0]:k}
function applyLang(){
  document.documentElement.lang=L;
  var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
  document.querySelectorAll('[ti]').forEach(function(e){
    var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
    e.textContent=T(k);
  });
  document.querySelectorAll('[tp]').forEach(function(e){
    var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
    e.placeholder=T(k);
  });
  document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
}
function sL(l){L=l;try{localStorage.setItem('_dv_lang',l)}catch(e){}applyLang()}
if(typeof _LANG==='undefined')var _LANG={};
applyLang();
})();
</script>


<script>

if(typeof _LANG==='undefined'){_LANG={}}

</body>
</html>
