function generateEntropy(bits) {
  const bytes = new Uint8Array(bits / 8);
  crypto.getRandomValues(bytes);
  const checksumBits = bits / 32;
  let hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  
  // Compute SHA256 checksum
  async function getChecksum() {
    const hash = await crypto.subtle.digest('SHA-256', bytes);
    const hashBytes = new Uint8Array(hash);
    const firstByte = hashBytes[0];
    // Take first checksumBits bits
    const cs = firstByte >> (8 - checksumBits);
    const fullBits = bits + checksumBits;
    const totalBytes = Math.ceil(fullBits / 8);
    const full = new Uint8Array(totalBytes);
    full.set(bytes);
    // Append checksum bits
    if (totalBytes > bytes.length) {
      full[bytes.length] = cs << (8 - (fullBits % 8 || 8));
    }
    
    // Convert to 11-bit indices for wordlist
    const words = [];
    let buffer = 0;
    let bitsInBuffer = 0;
    for (let i = 0; i < full.length; i++) {
      buffer = (buffer << 8) | full[i];
      bitsInBuffer += 8;
      while (bitsInBuffer >= 11) {
        bitsInBuffer -= 11;
        const idx = (buffer >> bitsInBuffer) & 0x7ff;
        if (idx < 2048) words.push(wordlist[idx]);
        else {
          const idx2 = idx & 0x7ff;
          words.push(idx2 < 2048 ? wordlist[idx2] : wordlist[0]);
        }
      }
    }
    return words.join(' ');
  }
  
  return getChecksum();
}

async function mnemonicToSeed(mnemonic, passphrase) {
  const encoder = new TextEncoder();
  const password = encoder.encode(mnemonic.normalize('NFKD'));
  const salt = encoder.encode(('mnemonic' + passphrase).normalize('NFKD'));
  const key = await crypto.subtle.importKey('raw', password, 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: 2048, hash: 'SHA-512' },
    key,
    512
  );
  return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
}
