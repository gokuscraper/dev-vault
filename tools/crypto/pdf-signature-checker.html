<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:720px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:0.95rem;color:#4da6ff;margin-bottom:12px;font-weight:600}
.drop-zone{border:2px dashed #333;border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:#3b82f6;background:#1a1a2e}
.drop-zone.drag-over{background:#1a1a3e}
.drop-zone p{color:#888;font-size:0.9rem}
.drop-zone .icon{font-size:2.5rem;color:#555;margin-bottom:10px}
.drop-zone input{display:none}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.badge{padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:600}
.badge.ok{background:#0a2e1a;color:#4ade80;border:1px solid #166534}
.badge.fail{background:#2e0a0a;color:#f87171;border:1px solid #991b1b}
.badge.info{background:#0a1a2e;color:#60a5fa;border:1px solid #1e3a5f}
.file-info{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;margin-bottom:14px}
.file-info .name{flex:1;font-size:0.9rem;word-break:break-all}
.file-info .size{color:#888;font-size:0.8rem;white-space:nowrap}
.sig-block{margin-bottom:20px}
.sig-block:last-child{margin-bottom:0}
.sig-title{font-size:0.9rem;font-weight:600;color:#fff;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #222}
.sig-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;font-size:0.85rem}
.sig-meta .label{color:#888}
.sig-meta .val{color:#e6e6e6;word-break:break-all}
.cert-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.cert-table th,.cert-table td{text-align:left;padding:8px 10px;border-bottom:1px solid #222;vertical-align:top}
.cert-table th{color:#888;font-weight:600;width:120px}
.cert-table tr:last-child td,.cert-table tr:last-child th{border-bottom:none}
.cert-inner{display:grid;gap:3px}
.cert-inner .pair{display:flex;gap:6px}
.cert-inner .pair .k{color:#888;min-width:70px}
.cert-inner .pair .v{color:#e6e6e6}
.validity{display:flex;flex-direction:column;gap:4px;font-size:0.85rem}
.toggle-btn{background:none;border:1px solid #333;color:#4da6ff;cursor:pointer;font-size:0.8rem;padding:3px 8px;border-radius:4px;white-space:nowrap}
.toggle-btn:hover{background:#1a1a2e}
.pem-box{background:#0a0a0a;border:1px solid #222;border-radius:6px;padding:10px;font-family:monospace;font-size:0.7rem;color:#aaa;max-height:160px;overflow:auto;white-space:pre;margin-top:6px;display:none}
.pem-box.open{display:block}
.error-msg{color:#f87171;font-size:0.9rem;padding:10px 14px;background:#2e0a0a;border:1px solid #991b1b;border-radius:8px}
.loading{text-align:center;padding:20px;color:#888}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script type="module">
import verifyPDF from 'https://esm.sh/pdf-signature-reader@1.4.3';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const errorEl = document.getElementById('error');
const loadingEl = document.getElementById('loading');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f && f.name.endsWith('.pdf')) processFile(f); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badge(label, ok) {
  return `<span class="badge ${ok ? 'ok' : 'fail'}">${ok ? '鉁? : '鉁?} ${esc(label)}</span>`;
}

async function processFile(file) {
  errorEl.style.display = 'none';
  resultsEl.innerHTML = '';
  fileInfo.style.display = 'flex';
  fileInfo.innerHTML = `<span class="name">${esc(file.name)}</span><span class="size">${fmtSize(file.size)}</span>`;
  loadingEl.style.display = 'block';
  statusEl.style.display = 'none';

  try {
    const buf = await file.arrayBuffer();
    const result = verifyPDF(buf);
    loadingEl.style.display = 'none';

    statusEl.style.display = 'flex';
    statusEl.innerHTML = badge('Verified', result.verified) + badge('Authenticity', result.authenticity) + badge('Integrity', result.integrity) + badge('Expired', !result.expired) + `<span class="badge info">${result.signatures.length} signature(s)</span>`;

    let html = '';
    for (let i = 0; i < result.signatures.length; i++) {
      const sig = result.signatures[i];
      const m = sig.meta;
      html += `<div class="card sig-block"><div class="sig-title">Signature ${i + 1}</div>`;
      html += `<div class="sig-meta">`;
      if (m.signatureMeta.name) html += `<div><span class="label" ti="label_name" ti="label_name" ti="label_name">Name:</span> <span class="val">${esc(m.signatureMeta.name)}</span></div>`;
      if (m.signatureMeta.reason) html += `<div><span class="label" ti="label_reason" ti="label_reason" ti="label_reason">Reason:</span> <span class="val">${esc(m.signatureMeta.reason)}</span></div>`;
      if (m.signatureMeta.location) html += `<div><span class="label" ti="label_location" ti="label_location" ti="label_location">Location:</span> <span class="val">${esc(m.signatureMeta.location)}</span></div>`;
      if (m.signatureMeta.contactInfo) html += `<div><span class="label" ti="label_contact" ti="label_contact" ti="label_contact">Contact:</span> <span class="val">${esc(m.signatureMeta.contactInfo)}</span></div>`;
      html += `</div>`;

      for (let j = 0; j < m.certs.length; j++) {
        const c = m.certs[j];
        const isClient = c.clientCertificate;
        html += `<table class="cert-table"><caption style="caption-side:top;text-align:left;font-weight:600;color:#aaa;font-size:0.85rem;margin-bottom:6px">Certificate ${j + 1}${isClient ? ' (signer)' : ' (CA)'}</caption>`;
        html += `<tr><th ti="th_issued_to" ti="th_issued_to" ti="th_issued_to">Issued To</th><td><div class="cert-inner">${field('CN', c.issuedTo.commonName)}${field('O', c.issuedTo.organizationName)}${field('OU', c.issuedTo.organizationalUnitName)}${field('C', c.issuedTo.countryName)}${field('L', c.issuedTo.localityName)}${field('S', c.issuedTo.stateOrProvinceName)}</div></td></tr>`;
        html += `<tr><th ti="th_issued_by" ti="th_issued_by" ti="th_issued_by">Issued By</th><td><div class="cert-inner">${field('CN', c.issuedBy.commonName)}${field('O', c.issuedBy.organizationName)}${field('OU', c.issuedBy.organizationalUnitName)}${field('C', c.issuedBy.countryName)}${field('L', c.issuedBy.localityName)}${field('S', c.issuedBy.stateOrProvinceName)}</div></td></tr>`;
        const nb = new Date(c.validityPeriod.notBefore).toLocaleString();
        const na = new Date(c.validityPeriod.notAfter).toLocaleString();
        html += `<tr><th ti="th_validity" ti="th_validity" ti="th_validity">Validity</th><td><div class="validity"><span>From: ${esc(nb)}</span><span>To: ${esc(na)}</span></div></td></tr>`;
        html += `<tr><th ti="th_pem" ti="th_pem" ti="th_pem">PEM</th><td><button class="toggle-btn" data-target="pem-${i}-${j}" ti="btn_show_pem" ti="btn_show_pem" ti="btn_show_pem">Show PEM</button><div class="pem-box" id="pem-${i}-${j}">${esc(c.pemCertificate)}</div></td></tr>`;
        html += `</table>`;
      }
      html += `</div>`;
    }
    resultsEl.innerHTML = html;

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const box = document.getElementById(btn.dataset.target);
        const open = box.classList.toggle('open');
        btn.textContent = open ? 'Hide PEM' : 'Show PEM';
      });
    });

  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = 'No signatures found in the provided file. ' + e.message;
  }
}

function field(k, v) {
  if (!v) return '';
  return `<div class="pair"><span class="k">${k}:</span><span class="v">${esc(v)}</span></div>`;
}
</script>
