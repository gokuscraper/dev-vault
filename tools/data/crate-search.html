<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crate Search — Rust Package Explorer</title>
<meta name="description" content="Search and explore Rust crates from crates.io. Version history, dependencies, download stats, license info. Fast crate discovery.">
<meta property="og:title" content="Crate Search — Rust Package Explorer">
<meta property="og:description" content="Search and explore Rust crates. Version history, dependencies, downloads, and more.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/crate-search/">
<link rel="canonical" href="https://yurukusa.github.io/crate-search/">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#dea584;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--rust:#dea584}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
code{background:rgba(110,118,129,.2);padding:1px 5px;border-radius:3px;font-size:13px;font-family:monospace}

.container{max-width:800px;margin:0 auto;padding:24px 16px}
header{text-align:center;margin-bottom:24px}
header h1{font-size:28px;margin-bottom:6px}
header h1 span{color:var(--rust)}
header p{color:var(--muted);font-size:14px}

.search-row{display:flex;gap:8px;margin-bottom:20px}
.search-row input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;outline:none}
.search-row input:focus{border-color:var(--rust)}
.search-row button{padding:10px 18px;background:var(--rust);color:#0d1117;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.search-row button:hover{opacity:.9}
.search-row button:disabled{opacity:.5;cursor:not-allowed}

.status{text-align:center;color:var(--muted);padding:12px;font-size:14px}
.status.error{color:var(--red)}

.back-btn{display:inline-block;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:12px}
.back-btn:hover{color:var(--text)}

.crate-detail{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.crate-detail h2{font-size:20px;margin-bottom:4px}
.crate-detail h2 a{color:var(--text)}
.crate-detail .summary{color:var(--muted);font-size:14px;margin-bottom:10px}
.crate-detail .meta{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--muted);margin-bottom:10px}
.crate-detail .meta span{display:flex;align-items:center;gap:4px}
.crate-detail .install{background:rgba(222,165,132,.1);border:1px solid rgba(222,165,132,.3);border-radius:6px;padding:8px 12px;font-family:monospace;font-size:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.crate-detail .install button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px}
.crate-detail .install button.copied{color:var(--green)}

.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{background:rgba(222,165,132,.1);color:var(--rust);padding:2px 8px;border-radius:10px;font-size:11px}
.tag.category{background:rgba(88,166,255,.1);color:var(--blue)}

.versions-section,.deps-section{margin-bottom:16px}
.versions-section h3,.deps-section h3{font-size:14px;color:var(--muted);margin-bottom:8px}
.version-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.version-chip{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-family:monospace;font-size:12px;display:flex;justify-content:space-between}
.version-chip.latest{border-color:var(--green);color:var(--green)}
.version-chip .date{color:var(--muted);font-size:11px}

.dep-list{display:flex;flex-wrap:wrap;gap:6px}
.dep{background:var(--surface);border:1px solid var(--border);padding:3px 10px;border-radius:12px;font-size:12px;cursor:pointer;color:var(--blue);transition:border-color .2s}
.dep:hover{border-color:var(--blue)}
.dep .dep-kind{color:var(--muted);font-size:10px;margin-left:4px}

.search-results{display:grid;gap:10px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .2s}
.result-card:hover{border-color:var(--rust)}
.result-card h3{font-size:15px;margin-bottom:2px}
.result-card h3 a{color:var(--text)}
.result-card .desc{color:var(--muted);font-size:13px;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-card .info{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px}

.loading{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--rust);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:32px}
@media(max-width:600px){.search-row{flex-direction:column}.crate-detail .meta{flex-direction:column;gap:4px}.version-list{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><span>Crate</span> Search</h1>
    <p>Explore Rust crates — versions, deps, downloads, license</p>
  </header>

  <div class="search-row">
    <input type="text" id="input" placeholder="Search crates (e.g. serde, tokio, reqwest)" autocomplete="off">
    <button id="btn" onclick="search()">Search</button>
  </div>

  <div id="status"></div>
  <div id="content"></div>
</div>

<footer>
  <p>Crate Search — Data from <a href="https://crates.io/" target="_blank">crates.io</a> | Part of <a href="https://yurukusa.github.io/dev-toolkit/" target="_blank">Dev Toolkit</a></p>
</footer>

<script>
const API = 'https://crates.io/api/v1';
const UA = 'dev-toolkit-crate-search (https://yurukusa.github.io/crate-search/)';
const inp = document.getElementById('input');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const contentEl = document.getElementById('content');

let lastSearchQuery = '';

inp.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

const q = new URLSearchParams(location.search).get('q');
if (q) { inp.value = q; search(); }

async function apiFetch(url) {
  const res = await fetch(url, { headers: { 'User-Agent': UA } });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

async function search() {
  const query = inp.value.trim();
  if (!query) return;

  btn.disabled = true;
  statusEl.innerHTML = '<span class="loading"></span> Searching...';
  statusEl.className = 'status';
  contentEl.innerHTML = '';
  lastSearchQuery = query;

  try {
    const data = await apiFetch(`${API}/crates?q=${encodeURIComponent(query)}&per_page=20`);
    const crates = data.crates || [];

    if (crates.length === 0) {
      statusEl.textContent = `No crates found for "${query}"`;
    } else if (crates.length === 1 || (crates[0] && crates[0].exact_match)) {
      // Single result or exact match — show detail directly
      statusEl.textContent = '';
      await loadCrate(crates[0].id);
      btn.disabled = false;
      updateURL(query);
      return;
    } else {
      // Check if first result is exact name match
      const exact = crates.find(c => c.id.toLowerCase() === query.toLowerCase());
      if (exact) {
        statusEl.textContent = '';
        await loadCrate(exact.id);
        btn.disabled = false;
        updateURL(query);
        return;
      }
      statusEl.textContent = `${crates.length} results`;
      renderSearchResults(crates);
    }
  } catch (err) {
    statusEl.textContent = `Search failed: ${err.message}`;
    statusEl.className = 'status error';
  }

  btn.disabled = false;
  updateURL(query);
}

async function loadCrate(name) {
  inp.value = name;
  statusEl.innerHTML = '<span class="loading"></span> Loading...';
  contentEl.innerHTML = '';

  try {
    // Fetch crate info, versions, and deps in parallel
    const [crateData, versionsData] = await Promise.all([
      apiFetch(`${API}/crates/${encodeURIComponent(name)}`),
      apiFetch(`${API}/crates/${encodeURIComponent(name)}/versions`)
    ]);

    const crate = crateData.crate;
    const versions = versionsData.versions || [];
    const categories = crateData.categories || [];
    const keywords = (crateData.crate.keywords || []);

    // Get deps for latest version
    let deps = [];
    if (versions.length > 0) {
      try {
        const latestVer = versions[0].num;
        const depsData = await apiFetch(`${API}/crates/${encodeURIComponent(name)}/${latestVer}/dependencies`);
        deps = depsData.dependencies || [];
      } catch {}
    }

    statusEl.textContent = '';
    renderCrate(crate, versions, deps, categories, keywords);
    updateURL(name);
  } catch (err) {
    statusEl.textContent = `Failed to load "${name}": ${err.message}`;
    statusEl.className = 'status error';
  }
}

function renderCrate(crate, versions, deps, categories, keywords) {
  const latest = versions[0];
  const latestNum = latest ? latest.num : crate.newest_version;
  const license = latest ? latest.license : '';
  const repo = crate.repository;

  // Format downloads
  const dl = crate.downloads;
  const recentDl = crate.recent_downloads || 0;

  let html = '';

  // Back to results button
  if (lastSearchQuery && lastSearchQuery.toLowerCase() !== crate.id.toLowerCase()) {
    html += `<span class="back-btn" onclick="inp.value='${esc(lastSearchQuery)}';search()">&#8592; Back to results</span>`;
  }

  html += `<div class="crate-detail">
    <h2><a href="https://crates.io/crates/${esc(crate.id)}" target="_blank">${esc(crate.id)}</a> <span style="color:var(--green);font-size:14px">v${esc(latestNum)}</span></h2>
    <div class="summary">${esc(crate.description || '')}</div>
    <div class="meta">
      ${license ? `<span>&#128196; ${esc(license)}</span>` : ''}
      <span>&#11015; ${formatNum(dl)} downloads</span>
      ${recentDl ? `<span>&#128200; ${formatNum(recentDl)} recent</span>` : ''}
      <span>${versions.length} versions</span>
      ${latest && latest.rust_version ? `<span>MSRV ${esc(latest.rust_version)}</span>` : ''}
    </div>
    <div class="install">
      <span>cargo add ${esc(crate.id)}</span>
      <button onclick="copyCmd(this, 'cargo add ${crate.id}')">Copy</button>
    </div>
    ${repo ? `<div style="font-size:12px;margin-top:6px"><a href="${esc(repo)}" target="_blank">Repository</a>${crate.homepage && crate.homepage !== repo ? ` &middot; <a href="${esc(crate.homepage)}" target="_blank">Homepage</a>` : ''}${crate.documentation ? ` &middot; <a href="${esc(crate.documentation)}" target="_blank">Docs</a>` : ''}</div>` : ''}
    ${categories.length || keywords.length ? renderTags(categories, keywords) : ''}
  </div>`;

  // Dependencies
  const normalDeps = deps.filter(d => d.kind === 'normal');
  const devDeps = deps.filter(d => d.kind === 'dev');
  const buildDeps = deps.filter(d => d.kind === 'build');

  if (deps.length > 0) {
    html += `<div class="deps-section">
      <h3>Dependencies (${normalDeps.length}${devDeps.length ? ` + ${devDeps.length} dev` : ''}${buildDeps.length ? ` + ${buildDeps.length} build` : ''})</h3>
      <div class="dep-list">
        ${normalDeps.map(d => `<span class="dep" onclick="loadCrate('${esc(d.crate_id)}')">${esc(d.crate_id)} <span style="color:var(--muted)">${esc(d.req)}</span></span>`).join('')}
        ${devDeps.map(d => `<span class="dep" onclick="loadCrate('${esc(d.crate_id)}')">${esc(d.crate_id)} <span class="dep-kind">dev</span></span>`).join('')}
        ${buildDeps.map(d => `<span class="dep" onclick="loadCrate('${esc(d.crate_id)}')">${esc(d.crate_id)} <span class="dep-kind">build</span></span>`).join('')}
      </div>
    </div>`;
  }

  // Versions (last 10)
  const displayVersions = versions.slice(0, 10);
  if (displayVersions.length > 0) {
    html += `<div class="versions-section">
      <h3>Version History</h3>
      <div class="version-list">${displayVersions.map(v => {
        const date = v.created_at;
        const dateStr = date ? new Date(date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'}) : '';
        const isLatest = v.num === latestNum;
        const yanked = v.yanked ? ' style="text-decoration:line-through;opacity:.5"' : '';
        return `<div class="version-chip ${isLatest ? 'latest' : ''}"${yanked}>
          <span>${esc(v.num)}</span>
          <span class="date">${dateStr}${v.yanked ? ' (yanked)' : ''}</span>
        </div>`;
      }).join('')}</div>
      ${versions.length > 10 ? `<div style="font-size:12px;color:var(--muted);margin-top:6px">+${versions.length - 10} more versions on <a href="https://crates.io/crates/${esc(crate.id)}/versions" target="_blank">crates.io</a></div>` : ''}
    </div>`;
  }

  contentEl.innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderTags(categories, keywords) {
  let html = '<div class="tags">';
  categories.forEach(c => {
    html += `<span class="tag category">${esc(c.category || c.slug || c)}</span>`;
  });
  if (Array.isArray(keywords)) {
    keywords.forEach(k => {
      html += `<span class="tag">${esc(typeof k === 'string' ? k : k.keyword || k.id)}</span>`;
    });
  }
  html += '</div>';
  return html;
}

function renderSearchResults(crates) {
  contentEl.innerHTML = `<div class="search-results">${crates.map(c => `
    <div class="result-card" onclick="loadCrate('${esc(c.id)}')">
      <h3><a href="#">${esc(c.id)}</a> <span style="color:var(--green);font-size:12px">v${esc(c.newest_version || c.max_version)}</span></h3>
      <div class="desc">${esc(c.description || '')}</div>
      <div class="info">
        <span>&#11015; ${formatNum(c.downloads)}</span>
        ${c.recent_downloads ? `<span>&#128200; ${formatNum(c.recent_downloads)} recent</span>` : ''}
      </div>
    </div>
  `).join('')}</div>`;
}

function copyCmd(button, text) {
  navigator.clipboard.writeText(text).then(() => {
    button.textContent = 'Copied!';
    button.classList.add('copied');
    setTimeout(() => {
      button.textContent = 'Copy';
      button.classList.remove('copied');
    }, 1500);
  });
}

function updateURL(q) {
  const url = new URL(location);
  url.searchParams.set('q', q);
  history.replaceState(null, '', url);
}

function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}
</script>
</body>
</html>
