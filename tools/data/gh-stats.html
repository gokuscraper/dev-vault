try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}

<script>
const $=id=>document.getElementById(id);
const API='https://api.github.com';

// GitHub language colors (subset)
const LANG_COLORS={JavaScript:'#f1e05a',TypeScript:'#3178c6',Python:'#3572a5',Go:'#00add8',Rust:'#dea584',Java:'#b07219',Ruby:'#701516',PHP:'#4f5d95',C:'#555555','C++':'#f34b7d','C#':'#178600',Swift:'#f05138',Kotlin:'#a97bff',Dart:'#00b4ab',Shell:'#89e051',HTML:'#e34c26',CSS:'#563d7c',Vue:'#41b883',Svelte:'#ff3e00',Lua:'#000080',Zig:'#ec915c',Elixir:'#6e4a7e',Haskell:'#5e5086',Scala:'#c22d40',R:'#198ce7',Jupyter:'#da5b0b',GDScript:'#355570',Nix:'#7e7eff',Vim:'#199f4b'};

$('username').addEventListener('keydown',e=>{if(e.key==='Enter')analyze()});

async function analyze(){
  const user=$('username').value.trim();
  if(!user)return;
  $('analyzeBtn').disabled=true;
  $('analyzeBtn').textContent=T("jtc_loading");
  $('error').style.display='none';
  $('results').style.display='none';

  try{
    const [profile,repos]=await Promise.all([
      fetchJSON(`${API}/users/${encodeURIComponent(user)}`),
      fetchAllRepos(user)
    ]);
    render(profile,repos);
    $('results').style.display='block';
  }catch(e){
    $('error').textContent=e.message;
    $('error').style.display='block';
  }finally{
    $('analyzeBtn').disabled=false;
    $('analyzeBtn').textContent=T("jtc_analyze");
  }
}

async function fetchJSON(url){
  const r=await fetch(url);
  if(r.status===404)throw new Error('User not found');
  if(r.status===403)throw new Error('Rate limited. Try again in a minute.');
  if(!r.ok)throw new Error('GitHub API error ('+r.status+')');
  return r.json();
}

async function fetchAllRepos(user){
  let all=[],page=1;
  while(true){
    const r=await fetch(`${API}/users/${encodeURIComponent(user)}/repos?per_page=100&page=${page}&sort=updated`);
    if(!r.ok)throw new Error('Failed to fetch repos ('+r.status+')');
    const data=await r.json();
    if(!data.length)break;
    all=all.concat(data);
    if(data.length<100)break;
    page++;
  }
  return all;
}

function render(profile,repos){
  // Filter to non-fork repos for most analysis
  const ownRepos=repos.filter(r=>!r.fork);
  const totalStars=ownRepos.reduce((s,r)=>s+r.stargazers_count,0);
  const totalForks=ownRepos.reduce((s,r)=>s+r.forks_count,0);
  const totalWatchers=ownRepos.reduce((s,r)=>s+r.watchers_count,0);

  // Account age
  const created=new Date(profile.created_at);
  const now=new Date();
  const years=((now-created)/(365.25*24*60*60*1000)).toFixed(1);

  // Profile header
  $('profileHeader').innerHTML=`
    <img class="avatar" src="${profile.avatar_url}" alt="${esc(profile.login)}">
    <div class="profile-info">
      <h2 ti="h2_esc_profile_name_profile">${esc(profile.name||profile.login)}</h2>
      ${profile.bio?`<div class="bio">${esc(profile.bio)}</div>`:''}
      <div class="meta">
        <span>@${esc(profile.login)}</span>
        ${profile.location?`<span>${esc(profile.location)}</span>`:''}
        <span>Joined ${created.toLocaleDateString('en',{month:'short',year:'numeric'})}</span>
      </div>
    </div>
  `;

  // Stats grid
  $('statsGrid').innerHTML=`
    <div class="stat-card"><div class="num">${profile.public_repos}</div><div class="label">Public Repos</div></div>
    <div class="stat-card"><div class="num">${fmt(totalStars)}</div><div class="label">Stars Earned</div></div>
    <div class="stat-card"><div class="num">${fmt(totalForks)}</div><div class="label">Forks</div></div>
    <div class="stat-card"><div class="num">${fmt(profile.followers)}</div><div class="label">Followers</div></div>
    <div class="stat-card"><div class="num">${profile.following}</div><div class="label">Following</div></div>
    <div class="stat-card"><div class="num">${years}y</div><div class="label">Account Age</div></div>
  `;

  // Top repos by stars
  const sorted=[...ownRepos].sort((a,b)=>b.stargazers_count-a.stargazers_count);
  $('topRepos').innerHTML=sorted.slice(0,10).map(r=>`
    <div class="repo-row">
      <div style="flex:1;overflow:hidden">
        <a class="repo-name" href="${r.html_url}" target="_blank">${esc(r.name)}</a>
        ${r.description?`<div class="repo-desc">${esc(r.description)}</div>`:''}
      </div>
      <div class="repo-metrics">
        ${r.language?`<span>${r.language}</span>`:''}
        <span>${r.stargazers_count} stars</span>
        <span>${r.forks_count} forks</span>
      </div>
    </div>
  `).join('');

  // Language distribution (by repo count)
  const langMap={};
  ownRepos.forEach(r=>{
    if(r.language){
      langMap[r.language]=(langMap[r.language]||0)+1;
    }
  });
  const langs=Object.entries(langMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxLang=langs.length?langs[0][1]:1;
  $('langBars').innerHTML=langs.map(([lang,count])=>`
    <div class="lang-row">
      <div class="lang-dot" style="background:${LANG_COLORS[lang]||'#666'}"></div>
      <div class="lang-name">${lang}</div>
      <div class="lang-track">
        <div class="lang-fill" style="width:${(count/maxLang*100)}%;background:${LANG_COLORS[lang]||'#666'}"></div>
        <div class="lang-pct">${count} repos (${Math.round(count/ownRepos.length*100)}%)</div>
      </div>
    </div>
  `).join('');

  // Repos per year
  const yearMap={};
  ownRepos.forEach(r=>{
    const y=new Date(r.created_at).getFullYear();
    yearMap[y]=(yearMap[y]||0)+1;
  });
  const years_list=Object.entries(yearMap).sort((a,b)=>a[0]-b[0]);
  const maxYear=Math.max(...years_list.map(y=>y[1]));
  const yearColors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899'];
  $('yearChart').innerHTML=years_list.map(([y,c],i)=>`
    <div class="bar-row">
      <div class="bar-label">${y}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(c/maxYear*100)}%;background:${yearColors[i%yearColors.length]}"></div>
        <div class="bar-val">${c}</div>
      </div>
    </div>
  `).join('');

  // License distribution
  const licenseMap={};
  ownRepos.forEach(r=>{
    const lic=r.license?r.license.spdx_id:'None';
    licenseMap[lic]=(licenseMap[lic]||0)+1;
  });
  const licenses=Object.entries(licenseMap).sort((a,b)=>b[1]-a[1]);
  $('licenseInfo').innerHTML=`<div class="lang-bars">${licenses.slice(0,6).map(([lic,count])=>{
    const color=lic==='MIT'?'#10b981':lic==='Apache-2.0'?'#3b82f6':lic==='GPL-3.0'?'#f59e0b':lic==='None'?'#555':'#8b5cf6';
    return `<div class="lang-row">
      <div class="lang-dot" style="background:${color}"></div>
      <div class="lang-name">${lic==='NOASSERTION'?'Other':lic}</div>
      <div class="lang-track">
        <div class="lang-fill" style="width:${(count/ownRepos.length*100)}%;background:${color}"></div>
        <div class="lang-pct">${count} repos</div>
      </div>
    </div>`;
  }).join('')}</div>`;

  // Insights
  const topLang=langs.length?langs[0][0]:'N/A';
  const topRepo=sorted.length?sorted[0]:null;
  const avgStars=ownRepos.length?(totalStars/ownRepos.length).toFixed(1):0;
  const recentRepos=ownRepos.filter(r=>new Date(r.pushed_at)>new Date(Date.now()-90*24*60*60*1000));
  const archivedCount=ownRepos.filter(r=>r.archived).length;
  const starsPerYear=years>0?(totalStars/parseFloat(years)).toFixed(1):totalStars;

  const ins=[];
  ins.push(`${ownRepos.length} original repos over ${years} years (${(ownRepos.length/parseFloat(years)).toFixed(1)} repos/year)`);
  if(topRepo)ins.push(`Top repo: "${topRepo.name}" (${topRepo.stargazers_count} stars)`);
  ins.push(`Primary language: ${topLang} (${langs.length?langs[0][1]:0} repos)`);
  ins.push(`${fmt(totalStars)} total stars (${avgStars} avg/repo, ${starsPerYear}/year)`);
  if(recentRepos.length)ins.push(`${recentRepos.length} repos active in the last 90 days`);
  if(archivedCount)ins.push(`${archivedCount} archived repos`);
  if(repos.length>ownRepos.length)ins.push(`${repos.length-ownRepos.length} forked repos (excluded from stats)`);

  $('insights').innerHTML=`<h3 ti="h3_insights_for_esc_profile">Insights for @${esc(profile.login)}</h3><ul>${ins.map(i=>`<li>${i}</li>`).join('')}</ul>`;

  // Share
  const shareText=`My GitHub stats: ${ownRepos.length} repos, ${totalStars} stars, primary language: ${topLang}. Check yours:`;
  $('shareBtn').href=`https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent('https://gokuscraper.github.io/dev-vault/gh-stats/')}`;
}

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'K':n.toString()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Auto-analyze if URL has ?user=xxx
const params=new URLSearchParams(location.search);
if(params.get('user')){$('username').value=params.get('user');analyze()}
</script>
