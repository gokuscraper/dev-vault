<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:32px;font-size:0.95rem}
.input-row{display:flex;gap:10px;max-width:480px;margin:0 auto 40px}
.input-row input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:1rem;outline:none}
.input-row input:focus{border-color:#3b82f6}
.input-row button{padding:12px 24px;border-radius:10px;border:none;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;font-size:0.95rem;white-space:nowrap}
.input-row button:hover{background:#2563eb}
.input-row button:disabled{opacity:0.5;cursor:not-allowed}
#error{color:#ef4444;text-align:center;margin-bottom:16px;display:none}
#results{display:none}
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding:20px;background:#161616;border:1px solid #222;border-radius:12px}
.avatar{width:80px;height:80px;border-radius:50%;border:2px solid #333}
.profile-info h2{font-size:1.3rem;color:#fff;margin-bottom:4px}
.profile-info .bio{font-size:0.85rem;color:#888;margin-bottom:6px}
.profile-info .meta{font-size:0.78rem;color:#666}
.profile-info .meta span{margin-right:14px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:32px}
.stat-card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:4px}
.stat-card .label{font-size:0.78rem;color:#888;text-transform:uppercase;letter-spacing:0.5px}
.section{margin-bottom:32px}
.section h2{font-size:1.15rem;color:#ccc;margin-bottom:14px;border-bottom:1px solid #222;padding-bottom:8px}
.repo-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:#161616;border:1px solid #1a1a1a;gap:12px}
.repo-row:hover{border-color:#333}
.repo-name{flex:1;font-size:0.88rem;color:#ddd;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.repo-name:hover{color:#3b82f6}
.repo-metrics{display:flex;gap:16px;font-size:0.78rem;color:#888;flex-shrink:0}
.repo-metrics span{white-space:nowrap}
.repo-desc{font-size:0.75rem;color:#666;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lang-bars{display:flex;flex-direction:column;gap:8px}
.lang-row{display:flex;align-items:center;gap:10px}
.lang-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.lang-name{width:100px;font-size:0.82rem;color:#ccc;flex-shrink:0}
.lang-track{flex:1;height:20px;background:#1a1a1a;border-radius:6px;overflow:hidden;position:relative}
.lang-fill{height:100%;border-radius:6px;transition:width 0.6s ease}
.lang-pct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.72rem;color:#888}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:40px;text-align:right;font-size:0.78rem;color:#888;flex-shrink:0}
.bar-track{flex:1;height:24px;background:#1a1a1a;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width 0.6s ease}
.bar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.72rem;color:#888}
.insights{background:#0d1b2a;border:1px solid #1b3a5c;border-radius:12px;padding:20px}
.insights h3{color:#4da6ff;margin-bottom:10px;font-size:0.95rem}
.insights ul{list-style:none;padding:0}
.insights li{padding:6px 0;color:#a0c4e8;font-size:0.85rem;border-bottom:1px solid #132a42}
.insights li:last-child{border:none}
.insights li::before{content:'>';margin-right:8px;color:#4da6ff}
.share-btn{display:inline-block;margin-top:16px;padding:10px 20px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#888;font-size:0.82rem;cursor:pointer;text-decoration:none}
.share-btn:hover{border-color:#555;color:#ccc}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}.profile-header{flex-direction:column;text-align:center}.repo-metrics{gap:8px}}

<body>
<div class="container">
<h1>gh-stats</h1>
<p class="subtitle">Your GitHub profile dashboard. Free, no login required.</p>

<div class="input-row">
  <input type="text" id="username" placeholder="GitHub username" autocomplete="off">
  <button id="analyzeBtn" onclick="analyze()">Analyze</button>
</div>
<div id="error"></div>

<div id="results">
  <div class="profile-header" id="profileHeader"></div>
  <div class="stats-grid" id="statsGrid"></div>

  <div class="section" id="insightsSection">
    <div class="insights" id="insights"></div>
  </div>

  <div class="section">
    <h2>Top Repositories</h2>
    <div id="topRepos"></div>
  </div>

  <div class="section">
    <h2>Languages</h2>
    <div class="lang-bars" id="langBars"></div>
  </div>

  <div class="section">
    <h2>Repos Created Per Year</h2>
    <div class="bar-chart" id="yearChart"></div>
  </div>

  <div class="section">
    <h2>License Distribution</h2>
    <div id="licenseInfo"></div>
  </div>

  <div style="text-align:center">
    <a class="share-btn" id="shareBtn" target="_blank">Share on X</a>
  </div>
</div>
</div>

<footer>
  <a href="https://github.com/gokuscraper/gh-stats">GitHub</a> ·
  Also: <a href="https://gokuscraper.github.io/dev-vault/devto-stats/">dev.to Stats</a> ·
  <a href="https://gokuscraper.github.io/dev-vault/readme-score/">README Score</a> ·
</footer>

<script>
const $=id=>document.getElementById(id);
const API='https://api.github.com';

// GitHub language colors (subset)
const LANG_COLORS={JavaScript:'#f1e05a',TypeScript:'#3178c6',Python:'#3572a5',Go:'#00add8',Rust:'#dea584',Java:'#b07219',Ruby:'#701516',PHP:'#4f5d95',C:'#555555','C++':'#f34b7d','C#':'#178600',Swift:'#f05138',Kotlin:'#a97bff',Dart:'#00b4ab',Shell:'#89e051',HTML:'#e34c26',CSS:'#563d7c',Vue:'#41b883',Svelte:'#ff3e00',Lua:'#000080',Zig:'#ec915c',Elixir:'#6e4a7e',Haskell:'#5e5086',Scala:'#c22d40',R:'#198ce7',Jupyter:'#da5b0b',GDScript:'#355570',Nix:'#7e7eff',Vim:'#199f4b'};

$('username').addEventListener('keydown',e=>{if(e.key==='Enter')analyze()});

async function analyze(){
  const user=$('username').value.trim();
  if(!user)return;
  $('analyzeBtn').disabled=true;
  $('analyzeBtn').textContent='Loading...';
  $('error').style.display='none';
  $('results').style.display='none';

  try{
    const [profile,repos]=await Promise.all([
      fetchJSON(`${API}/users/${encodeURIComponent(user)}`),
      fetchAllRepos(user)
    ]);
    render(profile,repos);
    $('results').style.display='block';
  }catch(e){
    $('error').textContent=e.message;
    $('error').style.display='block';
  }finally{
    $('analyzeBtn').disabled=false;
    $('analyzeBtn').textContent='Analyze';
  }
}

async function fetchJSON(url){
  const r=await fetch(url);
  if(r.status===404)throw new Error('User not found');
  if(r.status===403)throw new Error('Rate limited. Try again in a minute.');
  if(!r.ok)throw new Error('GitHub API error ('+r.status+')');
  return r.json();
}

async function fetchAllRepos(user){
  let all=[],page=1;
  while(true){
    const r=await fetch(`${API}/users/${encodeURIComponent(user)}/repos?per_page=100&page=${page}&sort=updated`);
    if(!r.ok)throw new Error('Failed to fetch repos ('+r.status+')');
    const data=await r.json();
    if(!data.length)break;
    all=all.concat(data);
    if(data.length<100)break;
    page++;
  }
  return all;
}

function render(profile,repos){
  // Filter to non-fork repos for most analysis
  const ownRepos=repos.filter(r=>!r.fork);
  const totalStars=ownRepos.reduce((s,r)=>s+r.stargazers_count,0);
  const totalForks=ownRepos.reduce((s,r)=>s+r.forks_count,0);
  const totalWatchers=ownRepos.reduce((s,r)=>s+r.watchers_count,0);

  // Account age
  const created=new Date(profile.created_at);
  const now=new Date();
  const years=((now-created)/(365.25*24*60*60*1000)).toFixed(1);

  // Profile header
  $('profileHeader').innerHTML=`
    <img class="avatar" src="${profile.avatar_url}" alt="${esc(profile.login)}">
    <div class="profile-info">
      <h2>${esc(profile.name||profile.login)}</h2>
      ${profile.bio?`<div class="bio">${esc(profile.bio)}</div>`:''}
      <div class="meta">
        <span>@${esc(profile.login)}</span>
        ${profile.location?`<span>${esc(profile.location)}</span>`:''}
        <span>Joined ${created.toLocaleDateString('en',{month:'short',year:'numeric'})}</span>
      </div>
    </div>
  `;

  // Stats grid
  $('statsGrid').innerHTML=`
    <div class="stat-card"><div class="num">${profile.public_repos}</div><div class="label">Public Repos</div></div>
    <div class="stat-card"><div class="num">${fmt(totalStars)}</div><div class="label">Stars Earned</div></div>
    <div class="stat-card"><div class="num">${fmt(totalForks)}</div><div class="label">Forks</div></div>
    <div class="stat-card"><div class="num">${fmt(profile.followers)}</div><div class="label">Followers</div></div>
    <div class="stat-card"><div class="num">${profile.following}</div><div class="label">Following</div></div>
    <div class="stat-card"><div class="num">${years}y</div><div class="label">Account Age</div></div>
  `;

  // Top repos by stars
  const sorted=[...ownRepos].sort((a,b)=>b.stargazers_count-a.stargazers_count);
  $('topRepos').innerHTML=sorted.slice(0,10).map(r=>`
    <div class="repo-row">
      <div style="flex:1;overflow:hidden">
        <a class="repo-name" href="${r.html_url}" target="_blank">${esc(r.name)}</a>
        ${r.description?`<div class="repo-desc">${esc(r.description)}</div>`:''}
      </div>
      <div class="repo-metrics">
        ${r.language?`<span>${r.language}</span>`:''}
        <span>${r.stargazers_count} stars</span>
        <span>${r.forks_count} forks</span>
      </div>
    </div>
  `).join('');

  // Language distribution (by repo count)
  const langMap={};
  ownRepos.forEach(r=>{
    if(r.language){
      langMap[r.language]=(langMap[r.language]||0)+1;
    }
  });
  const langs=Object.entries(langMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxLang=langs.length?langs[0][1]:1;
  $('langBars').innerHTML=langs.map(([lang,count])=>`
    <div class="lang-row">
      <div class="lang-dot" style="background:${LANG_COLORS[lang]||'#666'}"></div>
      <div class="lang-name">${lang}</div>
      <div class="lang-track">
        <div class="lang-fill" style="width:${(count/maxLang*100)}%;background:${LANG_COLORS[lang]||'#666'}"></div>
        <div class="lang-pct">${count} repos (${Math.round(count/ownRepos.length*100)}%)</div>
      </div>
    </div>
  `).join('');

  // Repos per year
  const yearMap={};
  ownRepos.forEach(r=>{
    const y=new Date(r.created_at).getFullYear();
    yearMap[y]=(yearMap[y]||0)+1;
  });
  const years_list=Object.entries(yearMap).sort((a,b)=>a[0]-b[0]);
  const maxYear=Math.max(...years_list.map(y=>y[1]));
  const yearColors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899'];
  $('yearChart').innerHTML=years_list.map(([y,c],i)=>`
    <div class="bar-row">
      <div class="bar-label">${y}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(c/maxYear*100)}%;background:${yearColors[i%yearColors.length]}"></div>
        <div class="bar-val">${c}</div>
      </div>
    </div>
  `).join('');

  // License distribution
  const licenseMap={};
  ownRepos.forEach(r=>{
    const lic=r.license?r.license.spdx_id:'None';
    licenseMap[lic]=(licenseMap[lic]||0)+1;
  });
  const licenses=Object.entries(licenseMap).sort((a,b)=>b[1]-a[1]);
  $('licenseInfo').innerHTML=`<div class="lang-bars">${licenses.slice(0,6).map(([lic,count])=>{
    const color=lic==='MIT'?'#10b981':lic==='Apache-2.0'?'#3b82f6':lic==='GPL-3.0'?'#f59e0b':lic==='None'?'#555':'#8b5cf6';
    return `<div class="lang-row">
      <div class="lang-dot" style="background:${color}"></div>
      <div class="lang-name">${lic==='NOASSERTION'?'Other':lic}</div>
      <div class="lang-track">
        <div class="lang-fill" style="width:${(count/ownRepos.length*100)}%;background:${color}"></div>
        <div class="lang-pct">${count} repos</div>
      </div>
    </div>`;
  }).join('')}</div>`;

  // Insights
  const topLang=langs.length?langs[0][0]:'N/A';
  const topRepo=sorted.length?sorted[0]:null;
  const avgStars=ownRepos.length?(totalStars/ownRepos.length).toFixed(1):0;
  const recentRepos=ownRepos.filter(r=>new Date(r.pushed_at)>new Date(Date.now()-90*24*60*60*1000));
  const archivedCount=ownRepos.filter(r=>r.archived).length;
  const starsPerYear=years>0?(totalStars/parseFloat(years)).toFixed(1):totalStars;

  const ins=[];
  ins.push(`${ownRepos.length} original repos over ${years} years (${(ownRepos.length/parseFloat(years)).toFixed(1)} repos/year)`);
  if(topRepo)ins.push(`Top repo: "${topRepo.name}" (${topRepo.stargazers_count} stars)`);
  ins.push(`Primary language: ${topLang} (${langs.length?langs[0][1]:0} repos)`);
  ins.push(`${fmt(totalStars)} total stars (${avgStars} avg/repo, ${starsPerYear}/year)`);
  if(recentRepos.length)ins.push(`${recentRepos.length} repos active in the last 90 days`);
  if(archivedCount)ins.push(`${archivedCount} archived repos`);
  if(repos.length>ownRepos.length)ins.push(`${repos.length-ownRepos.length} forked repos (excluded from stats)`);

  $('insights').innerHTML=`<h3>Insights for @${esc(profile.login)}</h3><ul>${ins.map(i=>`<li>${i}</li>`).join('')}</ul>`;

  // Share
  const shareText=`My GitHub stats: ${ownRepos.length} repos, ${totalStars} stars, primary language: ${topLang}. Check yours:`;
  $('shareBtn').href=`https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent('https://gokuscraper.github.io/dev-vault/gh-stats/')}`;
}

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'K':n.toString()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Auto-analyze if URL has ?user=xxx
const params=new URLSearchParams(location.search);
if(params.get('user')){$('username').value=params.get('user');analyze()}
</script>
