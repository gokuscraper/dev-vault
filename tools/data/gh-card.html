<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--purple:#bc8cff;--yellow:#d29922;--orange:#f0883e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:32px;font-size:.95rem}
.input-row{display:flex;gap:12px;margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.input-row input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;outline:none}
.input-row input:focus{border-color:var(--accent)}
.input-row input::placeholder{color:var(--text2)}
button.gen-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
button.gen-btn:hover{opacity:.85}
button.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.themes{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.themes button{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:.82rem;cursor:pointer;transition:all .2s}
.themes button:hover,.themes button.active{border-color:var(--accent);color:var(--accent)}
.error{background:rgba(248,81,73,.1);border:1px solid #f85149;border-radius:8px;padding:12px 16px;color:#f85149;margin-bottom:16px;display:none;text-align:center}
.loading{text-align:center;padding:40px;color:var(--text2);display:none}
.loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.card-wrapper{text-align:center;margin-bottom:24px;display:none}
canvas{border-radius:16px;max-width:100%}
.actions{display:flex;gap:12px;justify-content:center;margin-bottom:32px;display:none}
.actions button{padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;cursor:pointer;transition:all .2s}
.actions button:hover{border-color:var(--accent);color:var(--accent)}
footer{text-align:center;padding:32px 16px;color:var(--text2);font-size:.82rem}
footer a{color:var(--accent);text-decoration:none}
</style>

<body>
<div class="container">
  <h1>GitHub Profile Card</h1>
  <p class="subtitle">Enter a GitHub username. Get a shareable card.</p>

  <div class="input-row">
    <input type="text" id="username" placeholder="e.g. torvalds" autocomplete="off">
    <button class="gen-btn" id="genBtn" onclick="generate()">Generate</button>
  </div>

  <div class="themes" id="themes">
    <button class="active" onclick="setTheme('dark',this)">Dark</button>
    <button onclick="setTheme('midnight',this)">Midnight</button>
    <button onclick="setTheme('ocean',this)">Ocean</button>
    <button onclick="setTheme('forest',this)">Forest</button>
    <button onclick="setTheme('sunset',this)">Sunset</button>
    <button onclick="setTheme('light',this)">Light</button>
  </div>

  <div class="error" id="error"></div>
  <div class="loading" id="loading"><span class="spinner"></span>Fetching GitHub data...</div>

  <div class="card-wrapper" id="cardWrapper">
    <canvas id="card" width="600" height="340"></canvas>
  </div>

  <div class="actions" id="actions">
    <button onclick="downloadCard()">⬇ Download PNG</button>
    <button onclick="copyToClipboard()">📋 Copy to Clipboard</button>
  </div>
</div>

<footer>
  <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a> — 57+ free browser-based developer tools<br>
  Data from <a href="https://api.github.com" target="_blank">GitHub API</a>
</footer>

<script>
const $ = id => document.getElementById(id);

const THEMES = {
  dark: { bg: '#0d1117', surface: '#161b22', text: '#e6edf3', text2: '#8b949e', accent: '#58a6ff', border: '#30363d', statBg: '#1c2128' },
  midnight: { bg: '#0a0e1a', surface: '#111827', text: '#f0f6fc', text2: '#7d8590', accent: '#79c0ff', border: '#21262d', statBg: '#151d2e' },
  ocean: { bg: '#0c1929', surface: '#122240', text: '#e6f1ff', text2: '#7ea8c9', accent: '#4fc3f7', border: '#1a3a5c', statBg: '#0f2035' },
  forest: { bg: '#0d1a0d', surface: '#142014', text: '#d4f5d4', text2: '#7da67d', accent: '#66bb6a', border: '#1e3a1e', statBg: '#112211' },
  sunset: { bg: '#1a0d0d', surface: '#201414', text: '#f5d4d4', text2: '#a67d7d', accent: '#ff7043', border: '#3a1e1e', statBg: '#221111' },
  light: { bg: '#ffffff', surface: '#f6f8fa', text: '#1f2937', text2: '#57606a', accent: '#0969da', border: '#d0d7de', statBg: '#eef2f6' },
};

let currentTheme = 'dark';
let cachedData = null;

function setTheme(name, btn) {
  currentTheme = name;
  document.querySelectorAll('.themes button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (cachedData) drawCard(cachedData);
}

function showError(msg) { $('error').textContent = msg; $('error').style.display = 'block'; }
function hideError() { $('error').style.display = 'none'; }

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'K';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

async function generate() {
  const user = $('username').value.trim();
  if (!user) { showError('Enter a username'); return; }

  hideError();
  $('genBtn').disabled = true;
  $('loading').style.display = 'block';
  $('cardWrapper').style.display = 'none';
  $('actions').style.display = 'none';

  try {
    const [profile, repos] = await Promise.all([
      fetch(`https://api.github.com/users/${encodeURIComponent(user)}`).then(r => {
        if (!r.ok) throw new Error(r.status === 404 ? `User "${user}" not found` : `GitHub API error (${r.status})`);
        return r.json();
      }),
      fetch(`https://api.github.com/users/${encodeURIComponent(user)}/repos?per_page=100&sort=stargazers_count`).then(r => r.json()).catch(() => [])
    ]);

    const totalStars = repos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
    const totalForks = repos.reduce((s, r) => s + (r.forks_count || 0), 0);
    const languages = {};
    repos.forEach(r => { if (r.language) languages[r.language] = (languages[r.language] || 0) + 1; });
    const topLangs = Object.entries(languages).sort((a, b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);

    cachedData = {
      login: profile.login,
      name: profile.name || profile.login,
      bio: profile.bio || '',
      avatar: profile.avatar_url,
      repos: profile.public_repos,
      followers: profile.followers,
      following: profile.following,
      stars: totalStars,
      forks: totalForks,
      topLangs,
      created: new Date(profile.created_at).getFullYear(),
      company: profile.company || '',
      location: profile.location || '',
    };

    drawCard(cachedData);
    $('cardWrapper').style.display = 'block';
    $('actions').style.display = 'flex';

    history.replaceState(null, '', `?u=${encodeURIComponent(user)}`);
  } catch (err) {
    showError(err.message);
  } finally {
    $('genBtn').disabled = false;
    $('loading').style.display = 'none';
  }
}

function drawCard(data) {
  const canvas = $('card');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 600, H = 340;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const t = THEMES[currentTheme];

  // Background
  ctx.fillStyle = t.bg;
  roundRect(ctx, 0, 0, W, H, 16);
  ctx.fill();

  // Border
  ctx.strokeStyle = t.border;
  ctx.lineWidth = 1;
  roundRect(ctx, 0.5, 0.5, W - 1, H - 1, 16);
  ctx.stroke();

  // Avatar circle
  const avatarSize = 80;
  const ax = 40, ay = 40;
  ctx.save();
  ctx.beginPath();
  ctx.arc(ax + avatarSize / 2, ay + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
  ctx.clip();
  // Draw avatar if loaded
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.drawImage(img, ax, ay, avatarSize, avatarSize);
    ctx.restore();
    drawContent();
  };
  img.onerror = () => {
    ctx.fillStyle = t.surface;
    ctx.fill();
    ctx.restore();
    drawContent();
  };
  img.src = data.avatar;

  function drawContent() {
    // Name
    ctx.fillStyle = t.text;
    ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(data.name, 136, 62);

    // Username
    ctx.fillStyle = t.text2;
    ctx.font = '15px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText('@' + data.login, 136, 84);

    // Since
    ctx.fillStyle = t.text2;
    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Since ' + data.created, W - 30, 50);

    // GitHub logo text
    ctx.fillStyle = t.accent;
    ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText('GitHub', W - 30, 34);

    ctx.textAlign = 'left';

    // Bio (truncated)
    if (data.bio) {
      ctx.fillStyle = t.text2;
      ctx.font = '13px -apple-system, BlinkMacSystemFont, sans-serif';
      let bio = data.bio;
      if (ctx.measureText(bio).width > W - 80) {
        while (ctx.measureText(bio + '…').width > W - 80 && bio.length > 0) bio = bio.slice(0, -1);
        bio += '…';
      }
      ctx.fillText(bio, 40, 148);
    }

    // Location / Company
    let infoY = 170;
    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    if (data.location) {
      ctx.fillStyle = t.text2;
      ctx.fillText('📍 ' + data.location, 40, infoY);
      infoY += 18;
    }
    if (data.company) {
      ctx.fillStyle = t.text2;
      ctx.fillText('🏢 ' + data.company, 40, infoY);
    }

    // Stats boxes
    const stats = [
      { label: 'Repos', value: fmt(data.repos) },
      { label: 'Stars', value: fmt(data.stars) },
      { label: 'Forks', value: fmt(data.forks) },
      { label: 'Followers', value: fmt(data.followers) },
    ];

    const boxW = (W - 80 - 30) / 4;
    const boxY = 200;

    stats.forEach((s, i) => {
      const bx = 40 + i * (boxW + 10);
      ctx.fillStyle = t.statBg;
      roundRect(ctx, bx, boxY, boxW, 60, 8);
      ctx.fill();

      ctx.fillStyle = t.text;
      ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.value, bx + boxW / 2, boxY + 28);

      ctx.fillStyle = t.text2;
      ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(s.label, bx + boxW / 2, boxY + 46);
    });

    ctx.textAlign = 'left';

    // Top languages
    if (data.topLangs.length) {
      const langColors = {
        JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', Java: '#b07219',
        Go: '#00ADD8', Rust: '#dea584', Ruby: '#701516', PHP: '#4F5D95', C: '#555555',
        'C++': '#f34b7d', 'C#': '#178600', Swift: '#F05138', Kotlin: '#A97BFF', Dart: '#00B4AB',
        Shell: '#89e051', HTML: '#e34c26', CSS: '#563d7c', Vue: '#41b883', Svelte: '#ff3e00',
        Lua: '#000080', GDScript: '#355570',
      };

      const lx = 40, ly = 285;
      ctx.fillStyle = t.text2;
      ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('Top Languages', lx, ly);

      let dotX = lx;
      data.topLangs.forEach(lang => {
        const color = langColors[lang] || t.accent;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(dotX + 6, ly + 18, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = t.text;
        ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText(lang, dotX + 15, ly + 22);
        dotX += ctx.measureText(lang).width + 30;
      });
    }

    // Watermark
    ctx.fillStyle = t.text2;
    ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('yurukusa.github.io/gh-card', W - 30, H - 16);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function downloadCard() {
  const canvas = $('card');
  const a = document.createElement('a');
  a.download = `github-${cachedData.login}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

async function copyToClipboard() {
  const canvas = $('card');
  try {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    const btn = $('actions').querySelectorAll('button')[1];
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  } catch {
    showError('Copy failed. Try downloading instead.');
  }
}

// URL params
const params = new URLSearchParams(location.search);
if (params.get('u')) {
  $('username').value = params.get('u');
  generate();
}

// Enter key
$('username').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
</script>
