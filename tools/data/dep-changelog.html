<script>
const SAMPLE = `{
  "dependencies": {
    "react": "^18.2.0",
    "react-dom": "^18.2.0",
    "next": "^14.0.0",
    "express": "^4.18.0",
    "lodash": "^4.17.0"
  },
  "devDependencies": {
    "typescript": "^5.2.0",
    "eslint": "^8.50.0"
  }
}`;

function loadSample() {
  document.getElementById('input').value = SAMPLE;
}

function parseInput(text) {
  text = text.trim();
  // Try JSON parse (full package.json or deps object)
  try {
    const json = JSON.parse(text);
    const deps = {};
    if (json.dependencies) Object.assign(deps, json.dependencies);
    if (json.devDependencies) Object.assign(deps, json.devDependencies);
    if (json.peerDependencies) Object.assign(deps, json.peerDependencies);
    // If it's a flat object of name:version
    if (Object.keys(deps).length === 0 && typeof json === 'object') {
      for (const [k, v] of Object.entries(json)) {
        if (typeof v === 'string') deps[k] = v;
      }
    }
    if (Object.keys(deps).length > 0) return deps;
  } catch(e) {}
  // Try line-by-line package names
  const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('{') && !l.startsWith('}') && !l.startsWith('//') && !l.startsWith('#'));
  const deps = {};
  for (const line of lines) {
    // "package@version" or "package" or "\"package\": \"^1.0.0\""
    const jsonMatch = line.match(/"([^"]+)"\s*:\s*"([^"]+)"/);
    if (jsonMatch) { deps[jsonMatch[1]] = jsonMatch[2]; continue; }
    const atMatch = line.match(/^(@?[a-z0-9._-][a-z0-9._\-/]*)(?:@(.+))?$/i);
    if (atMatch) { deps[atMatch[1]] = atMatch[2] || '*'; continue; }
  }
  return deps;
}

function cleanVersion(v) {
  return v.replace(/^[\^~>=<]+/, '').split(' ')[0];
}

async function fetchNpmInfo(pkg) {
  const res = await fetch(`https://registry.npmjs.org/${encodeURIComponent(pkg)}/latest`);
  if (!res.ok) throw new Error(`npm: ${res.status}`);
  return res.json();
}

async function fetchGitHubRelease(repoUrl) {
  // Extract owner/repo from GitHub URL
  const match = repoUrl.match(/github\.com\/([^/]+\/[^/]+)/);
  if (!match) return null;
  const repo = match[1].replace(/\.git$/, '');
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
    if (!res.ok) return null;
    return res.json();
  } catch(e) { return null; }
}

async function fetchChangelog(repoUrl) {
  const match = repoUrl.match(/github\.com\/([^/]+\/[^/]+)/);
  if (!match) return null;
  const repo = match[1].replace(/\.git$/, '');
  // Try common changelog file names
  for (const file of ['CHANGELOG.md', 'CHANGES.md', 'HISTORY.md', 'changelog.md']) {
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${repo}/main/${file}`);
      if (res.ok) {
        const text = await res.text();
        // Return first ~2000 chars (latest entries)
        return text.substring(0, 2000);
      }
    } catch(e) {}
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${repo}/master/${file}`);
      if (res.ok) {
        const text = await res.text();
        return text.substring(0, 2000);
      }
    } catch(e) {}
  }
  return null;
}

function getRepoUrl(npmData) {
  const repo = npmData.repository;
  if (!repo) return null;
  if (typeof repo === 'string') {
    if (repo.includes('github.com')) return repo;
    if (repo.match(/^[a-z0-9-]+\/[a-z0-9-]+$/i)) return `https://github.com/${repo}`;
    return null;
  }
  if (repo.url) {
    return repo.url.replace(/^git\+/, '').replace(/\.git$/, '').replace('git://', 'https://').replace('ssh://git@', 'https://');
  }
  return null;
}

function highlightBreaking(text) {
  if (!text) return '';
  return text.split('\n').map(line => {
    const isBreaking = /break(ing)?|BREAK(ING)?|\!\s*:/.test(line);
    return isBreaking ? `<span class="breaking-line">${escHtml(line)}</span>` : escHtml(line);
  }).join('\n');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hasBreakingChanges(text) {
  if (!text) return false;
  return /break(ing)?\s*(change)?|BREAK(ING)?\s*(CHANGE)?|\!\s*:/i.test(text);
}

function compareVersions(current, latest) {
  const c = cleanVersion(current).split('.').map(Number);
  const l = latest.split('.').map(Number);
  if (l[0] > (c[0]||0)) return 'major';
  if (l[1] > (c[1]||0)) return 'minor';
  if (l[2] > (c[2]||0)) return 'patch';
  return 'uptodate';
}

async function analyze() {
  const input = document.getElementById('input').value;
  const deps = parseInput(input);
  const names = Object.keys(deps);
  if (names.length === 0) {
    document.getElementById('status').style.display = 'block';
    document.getElementById('status').textContent=T("jtc_no_packages_found_paste_a");
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent=T("jtc_analyzing");

  const statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  statusEl.textContent = `Fetching data for ${names.length} packages...`;

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  const summaryEl = document.getElementById('summary');
  let totalBreaking = 0, totalOutdated = 0, totalUptodate = 0;

  // Process packages with concurrency limit
  const CONCURRENCY = 5;
  const results = [];
  for (let i = 0; i < names.length; i += CONCURRENCY) {
    const batch = names.slice(i, i + CONCURRENCY);
    statusEl.textContent = `Fetching ${i+1}-${Math.min(i+CONCURRENCY, names.length)} of ${names.length}...`;
    const batchResults = await Promise.allSettled(batch.map(async name => {
      const currentVersion = deps[name];
      try {
        const npmData = await fetchNpmInfo(name);
        const latestVersion = npmData.version;
        const repoUrl = getRepoUrl(npmData);
        let changelog = null;
        let release = null;

        if (repoUrl) {
          [release, changelog] = await Promise.all([
            fetchGitHubRelease(repoUrl),
            fetchChangelog(repoUrl)
          ]);
        }

        const changeText = release?.body || changelog || null;
        const breaking = hasBreakingChanges(changeText);
        const vCompare = compareVersions(currentVersion, latestVersion);

        return { name, currentVersion, latestVersion, repoUrl, changeText, breaking, vCompare, release, error: null };
      } catch(e) {
        return { name, currentVersion, latestVersion: '?', error: e.message };
      }
    }));
    results.push(...batchResults.map(r => r.status === 'fulfilled' ? r.value : r.reason));
  }

  // Sort: breaking first, then outdated, then up-to-date
  results.sort((a, b) => {
    if (a.breaking && !b.breaking) return -1;
    if (!a.breaking && b.breaking) return 1;
    const order = {major: 0, minor: 1, patch: 2, uptodate: 3};
    return (order[a.vCompare]||4) - (order[b.vCompare]||4);
  });

  // Render
  for (const pkg of results) {
    if (pkg.breaking) totalBreaking++;
    if (pkg.vCompare === 'uptodate') totalUptodate++;
    else totalOutdated++;

    const card = document.createElement('div');
    card.className = `pkg-card${pkg.breaking ? ' has-breaking' : ''}`;

    const npmUrl = `https://www.npmjs.com/package/${encodeURIComponent(pkg.name)}`;
    const vClass = pkg.vCompare === 'uptodate' ? 'v-latest' : 'v-outdated';
    const changeHtml = pkg.changeText ? highlightBreaking(pkg.changeText) : '<span class="no-changelog">No changelog found</span>';
    const id = `cl-${pkg.name.replace(/[^a-z0-9]/gi, '-')}`;

    card.innerHTML = `
      <div class="pkg-header">
        <div>
          <span class="pkg-name"><a href="${npmUrl}" target="_blank" rel="noopener">${escHtml(pkg.name)}</a></span>
          ${pkg.breaking ? '<span class="breaking-badge">BREAKING</span>' : ''}
        </div>
        <div class="pkg-version">
          <span class="version-badge v-current">${escHtml(cleanVersion(pkg.currentVersion))}</span>
          <span class="arrow">→</span>
          <span class="version-badge ${vClass}">${escHtml(pkg.latestVersion)}</span>
        </div>
      </div>
      ${pkg.error ? `<div style="color:#f87171;font-size:0.85rem">Error: ${escHtml(pkg.error)}</div>` :
        `<button class="toggle-btn" onclick="document.getElementById('${id}').style.display=document.getElementById('${id}').style.display==='none'?'block':'none'" ti="btn_pkg_changetext_show_chan">
          ${pkg.changeText ? 'Show changelog' : 'No changelog available'}
        </button>
        <div id="${id}" class="changelog-content" style="display:none">${changeHtml}</div>`
      }
    `;
    resultsEl.appendChild(card);
  }

  // Summary
  summaryEl.style.display = 'block';
  summaryEl.innerHTML = `
    <div class="summary">
      <h2 ti="h2_summary">Summary</h2>
      <div class="summary-grid">
        <div class="summary-stat"><div class="num">${names.length}</div><div class="label">Packages</div></div>
        <div class="summary-stat"><div class="num" style="color:${totalBreaking?'#f87171':'#4ade80'}">${totalBreaking}</div><div class="label">Breaking</div></div>
        <div class="summary-stat"><div class="num" style="color:${totalOutdated?'#fb923c':'#4ade80'}">${totalOutdated}</div><div class="label">Outdated</div></div>
        <div class="summary-stat"><div class="num" style="color:#4ade80">${totalUptodate}</div><div class="label">Up to date</div></div>
      </div>
    </div>
  `;

  statusEl.style.display = 'none';
  btn.disabled = false;
  btn.textContent=T("jtc_analyze_dependencies");
}
</script>
