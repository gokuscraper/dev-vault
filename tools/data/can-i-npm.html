<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>can-i-npm — Package Name Checker</title>
<meta name="description" content="Check if an npm package name is available. Validate names, view package info, and batch check multiple names at once.">
<meta property="og:title" content="can-i-npm — Package Name Checker">
<meta property="og:description" content="Check if an npm package name is available. Validate names, view package info, and batch check multiple names at once.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/can-i-npm/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://yurukusa.github.io/can-i-npm/">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.container{max-width:860px;margin:0 auto;padding:24px 16px;flex:1;width:100%}
h1{text-align:center;font-size:2rem;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:var(--muted);margin-bottom:32px;font-size:.9rem}

/* Single check */
.search-box{display:flex;gap:8px;margin-bottom:24px}
.search-box input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:1rem;font-family:'SFMono-Regular',Consolas,monospace;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box button{background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);padding:12px 24px;font-weight:600;cursor:pointer;font-size:.95rem;transition:opacity .2s;white-space:nowrap}
.search-box button:hover{opacity:.85}
.search-box button:disabled{opacity:.5;cursor:not-allowed}

/* Result card */
.result{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.result.show{display:block}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.status-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.status-dot.available{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.taken{background:var(--red);box-shadow:0 0 8px var(--red)}
.status-dot.invalid{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.result-name{font-size:1.3rem;font-weight:700;font-family:monospace}
.result-status{font-size:.85rem;font-weight:600;margin-left:auto}
.result-status.available{color:var(--green)}
.result-status.taken{color:var(--red)}
.result-status.invalid{color:var(--yellow)}

.pkg-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.pkg-info-item{background:var(--bg);border-radius:6px;padding:12px}
.pkg-info-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pkg-info-value{font-size:.95rem;word-break:break-word}
.pkg-desc{color:var(--muted);font-size:.9rem;margin-bottom:16px;line-height:1.5}

/* Suggestions */
.suggestions{margin-top:16px}
.suggestions h3{font-size:.9rem;color:var(--muted);margin-bottom:10px}
.suggestion-list{display:flex;flex-wrap:wrap;gap:8px}
.suggestion-chip{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-family:monospace;font-size:.85rem;cursor:pointer;transition:border-color .2s;display:flex;align-items:center;gap:6px}
.suggestion-chip:hover{border-color:var(--accent)}
.suggestion-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.suggestion-chip .dot.available{background:var(--green)}
.suggestion-chip .dot.taken{background:var(--red)}
.suggestion-chip .dot.checking{background:var(--muted);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;cursor:pointer;font-size:.9rem;color:var(--muted);border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Batch */
.batch-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.batch-area textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--text);font-family:monospace;font-size:.9rem;min-height:120px;resize:vertical;outline:none;transition:border-color .2s}
.batch-area textarea:focus{border-color:var(--accent)}
.batch-area textarea::placeholder{color:#484f58}
.batch-controls{display:flex;gap:8px;margin-top:12px;align-items:center}
.batch-controls button{background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);padding:10px 20px;font-weight:600;cursor:pointer;font-size:.9rem;transition:opacity .2s}
.batch-controls button:hover{opacity:.85}
.batch-controls button:disabled{opacity:.5;cursor:not-allowed}
.batch-controls .batch-status{color:var(--muted);font-size:.85rem;margin-left:auto}
.batch-results{margin-top:16px}
.batch-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-family:monospace;font-size:.9rem;cursor:pointer;transition:border-color .2s}
.batch-row:hover{border-color:var(--accent)}
.batch-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.batch-row .name{flex:1;word-break:break-all}
.batch-row .info{color:var(--muted);font-size:.8rem;text-align:right;min-width:100px}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
footer{border-top:1px solid var(--border);padding:16px;text-align:center;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent)}

@media(max-width:500px){
  .search-box{flex-direction:column}
  .search-box button{width:100%}
  h1{font-size:1.5rem}
  .pkg-info{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
<h1>can-i-npm</h1>
<p class="subtitle">Check if an npm package name is available</p>

<div class="tabs">
  <div class="tab active" data-tab="single">Single Check</div>
  <div class="tab" data-tab="batch">Batch Check</div>
</div>

<!-- Single Check Tab -->
<div class="tab-content active" id="tab-single">
  <div class="search-box">
    <input type="text" id="nameInput" placeholder="package-name" autocomplete="off" spellcheck="false" autofocus>
    <button id="checkBtn" onclick="checkSingle()">Check</button>
  </div>
  <div class="result" id="singleResult"></div>
</div>

<!-- Batch Check Tab -->
<div class="tab-content" id="tab-batch">
  <div class="batch-area">
    <textarea id="batchInput" placeholder="Enter package names, one per line:&#10;my-awesome-lib&#10;super-tool&#10;cool-utils"></textarea>
    <div class="batch-controls">
      <button id="batchBtn" onclick="checkBatch()">Check All</button>
      <span class="batch-status" id="batchStatus"></span>
    </div>
  </div>
  <div class="batch-results" id="batchResults"></div>
</div>
</div>

<footer>
  Data from <a href="https://www.npmjs.com/" target="_blank" rel="noopener">npm registry</a>
  &nbsp;|&nbsp;
  Part of <a href="https://yurukusa.github.io/dev-toolkit/" target="_blank" rel="noopener">Dev Toolkit</a>
</footer>

<script>
/* --- npm naming rules ---
 * - Must be lowercase
 * - No spaces
 * - Only letters, numbers, hyphens, dots, underscores, tildes
 * - Cannot start with . or _
 * - Cannot be a Node built-in module name
 * - Scoped: @scope/name is valid
 * - Max 214 chars
 */

const BUILTINS = new Set([
  'assert','buffer','child_process','cluster','console','constants','crypto',
  'dgram','dns','domain','events','fs','http','https','module','net','os',
  'path','punycode','querystring','readline','repl','stream','string_decoder',
  'sys','timers','tls','tty','url','util','vm','zlib'
]);

const SUFFIXES = ['-js','-lib','-utils','-tool','-kit','-app','-cli','-core'];

function validateName(name) {
  if (!name) return { valid: false, reason: 'Name is empty' };
  if (name.length > 214) return { valid: false, reason: 'Must be ≤214 characters' };
  if (name !== name.toLowerCase()) return { valid: false, reason: 'Must be lowercase' };
  if (name.includes(' ')) return { valid: false, reason: 'Cannot contain spaces' };
  // Scoped package
  if (name.startsWith('@')) {
    const m = name.match(/^@([a-z0-9][\w.-]*)\/([\w][\w.-]*)$/);
    if (!m) return { valid: false, reason: 'Invalid scoped name format (use @scope/name)' };
    return { valid: true };
  }
  if (/^[._]/.test(name)) return { valid: false, reason: 'Cannot start with . or _' };
  if (!/^[a-z0-9][\w.\-~]*$/.test(name)) return { valid: false, reason: 'Contains invalid characters' };
  if (BUILTINS.has(name)) return { valid: false, reason: `"${name}" is a Node.js built-in module` };
  return { valid: true };
}

async function fetchPkg(name) {
  try {
    const res = await fetch(`https://registry.npmjs.org/${encodeURIComponent(name)}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (res.status === 404) return { available: true };
    if (!res.ok) return { error: `Registry returned ${res.status}` };
    const data = await res.json();
    const latest = data['dist-tags']?.latest;
    const time = data.time?.[latest];
    return {
      available: false,
      name: data.name,
      version: latest || '?',
      description: data.description || '',
      lastPublish: time || data.time?.modified || '',
      homepage: data.homepage || '',
      license: data.license || ''
    };
  } catch (e) {
    return { error: e.message };
  }
}

async function fetchDownloads(name) {
  try {
    const res = await fetch(`https://api.npmjs.org/downloads/point/last-week/${encodeURIComponent(name)}`);
    if (!res.ok) return 0;
    const data = await res.json();
    return data.downloads || 0;
  } catch { return 0; }
}

function formatNumber(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  const diff = Date.now() - d.getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return `${days} days ago`;
  if (days < 365) return `${Math.floor(days/30)} months ago`;
  return `${Math.floor(days/365)} years ago`;
}

function renderSingleResult(name, validation, pkg, downloads) {
  const el = document.getElementById('singleResult');
  el.classList.add('show');

  if (!validation.valid) {
    el.innerHTML = `
      <div class="result-header">
        <span class="status-dot invalid"></span>
        <span class="result-name">${esc(name)}</span>
        <span class="result-status invalid">${esc(validation.reason)}</span>
      </div>`;
    return;
  }

  if (pkg.error) {
    el.innerHTML = `
      <div class="result-header">
        <span class="status-dot invalid"></span>
        <span class="result-name">${esc(name)}</span>
        <span class="result-status invalid">Error: ${esc(pkg.error)}</span>
      </div>`;
    return;
  }

  if (pkg.available) {
    el.innerHTML = `
      <div class="result-header">
        <span class="status-dot available"></span>
        <span class="result-name">${esc(name)}</span>
        <span class="result-status available">Available!</span>
      </div>
      <p style="color:var(--muted);font-size:.9rem">This name is not registered on npm. You can claim it with <code style="background:var(--bg);padding:2px 6px;border-radius:4px">npm init</code> and <code style="background:var(--bg);padding:2px 6px;border-radius:4px">npm publish</code>.</p>`;
    return;
  }

  // Taken — show info
  const dl = typeof downloads === 'number' ? downloads : 0;
  el.innerHTML = `
    <div class="result-header">
      <span class="status-dot taken"></span>
      <span class="result-name">${esc(name)}</span>
      <span class="result-status taken">Taken</span>
    </div>
    ${pkg.description ? `<p class="pkg-desc">${esc(pkg.description)}</p>` : ''}
    <div class="pkg-info">
      <div class="pkg-info-item">
        <div class="pkg-info-label">Version</div>
        <div class="pkg-info-value">${esc(pkg.version)}</div>
      </div>
      <div class="pkg-info-item">
        <div class="pkg-info-label">Weekly Downloads</div>
        <div class="pkg-info-value">${formatNumber(dl)}</div>
      </div>
      <div class="pkg-info-item">
        <div class="pkg-info-label">Last Published</div>
        <div class="pkg-info-value">${formatDate(pkg.lastPublish)}</div>
      </div>
      <div class="pkg-info-item">
        <div class="pkg-info-label">License</div>
        <div class="pkg-info-value">${esc(pkg.license || '—')}</div>
      </div>
    </div>
    <div class="suggestions">
      <h3>Try these alternatives:</h3>
      <div class="suggestion-list" id="suggestions"></div>
    </div>`;

  // Check suggestions
  checkSuggestions(name);
}

async function checkSuggestions(baseName) {
  const el = document.getElementById('suggestions');
  if (!el) return;
  // strip existing suffix to avoid double-suffix
  const base = baseName.replace(/-(js|lib|utils|tool|kit|app|cli|core)$/, '');
  const candidates = SUFFIXES.map(s => base + s).filter(n => n !== baseName);
  // Also suggest @yourscope/name
  candidates.push(`@scope/${baseName}`);

  el.innerHTML = candidates.map(n =>
    `<div class="suggestion-chip" data-name="${esc(n)}" onclick="checkFromSuggestion('${esc(n)}')">
      <span class="dot checking"></span>
      <span>${esc(n)}</span>
    </div>`
  ).join('');

  // Check each (excluding @scope/ which is just a hint)
  for (const n of candidates) {
    if (n.startsWith('@scope/')) continue;
    const v = validateName(n);
    const chip = el.querySelector(`[data-name="${CSS.escape(n)}"]`);
    if (!chip) continue;
    const dot = chip.querySelector('.dot');
    if (!v.valid) { dot.className = 'dot'; dot.style.background = 'var(--yellow)'; continue; }
    const res = await fetchPkg(n);
    dot.classList.remove('checking');
    dot.classList.add(res.available ? 'available' : 'taken');
  }
}

function checkFromSuggestion(name) {
  const input = document.getElementById('nameInput');
  input.value = name;
  checkSingle();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* Single check */
async function checkSingle() {
  const input = document.getElementById('nameInput');
  const btn = document.getElementById('checkBtn');
  const name = input.value.trim();
  if (!name) return;

  const validation = validateName(name);
  if (!validation.valid) {
    renderSingleResult(name, validation);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  const el = document.getElementById('singleResult');
  el.classList.add('show');
  el.innerHTML = '<div style="text-align:center;padding:20px"><span class="spinner"></span> Checking…</div>';

  const [pkg, downloads] = await Promise.all([
    fetchPkg(name),
    fetchDownloads(name)
  ]);

  btn.disabled = false;
  btn.textContent = 'Check';
  renderSingleResult(name, validation, pkg, downloads);

  // Update URL
  const url = new URL(window.location);
  url.searchParams.set('q', name);
  history.replaceState(null, '', url);
}

/* Batch check */
async function checkBatch() {
  const textarea = document.getElementById('batchInput');
  const btn = document.getElementById('batchBtn');
  const statusEl = document.getElementById('batchStatus');
  const resultsEl = document.getElementById('batchResults');

  const names = textarea.value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!names.length) return;

  const unique = [...new Set(names)];
  btn.disabled = true;
  resultsEl.innerHTML = '';

  let done = 0;
  statusEl.textContent = `0 / ${unique.length}`;

  // Process in parallel with concurrency limit of 4
  const results = [];
  const queue = [...unique];

  async function worker() {
    while (queue.length) {
      const name = queue.shift();
      const validation = validateName(name);
      let status, info = '';

      if (!validation.valid) {
        status = 'invalid';
        info = validation.reason;
      } else {
        const pkg = await fetchPkg(name);
        if (pkg.error) {
          status = 'invalid';
          info = pkg.error;
        } else if (pkg.available) {
          status = 'available';
          info = 'Available';
        } else {
          status = 'taken';
          const dl = await fetchDownloads(name);
          info = `v${pkg.version} · ${formatNumber(dl)}/wk`;
        }
      }

      results.push({ name, status, info });
      done++;
      statusEl.textContent = `${done} / ${unique.length}`;

      // Append row immediately
      const row = document.createElement('div');
      row.className = 'batch-row';
      row.onclick = () => {
        document.getElementById('nameInput').value = name;
        switchTab('single');
        checkSingle();
      };
      row.innerHTML = `
        <span class="dot" style="background:var(--${status === 'available' ? 'green' : status === 'taken' ? 'red' : 'yellow'})"></span>
        <span class="name">${esc(name)}</span>
        <span class="info" style="color:var(--${status === 'available' ? 'green' : status === 'taken' ? 'red' : 'yellow'})">${esc(info)}</span>`;
      resultsEl.appendChild(row);
    }
  }

  const workers = Array.from({ length: Math.min(4, unique.length) }, () => worker());
  await Promise.all(workers);

  btn.disabled = false;
  statusEl.textContent = `Done — ${results.filter(r => r.status === 'available').length} available, ${results.filter(r => r.status === 'taken').length} taken`;
}

/* Tabs */
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + id));
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

/* Enter key */
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkSingle();
});

/* URL param */
(function init() {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('nameInput').value = q;
    checkSingle();
  }
})();
</script>
</body>
</html>
