<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--green:#3fb950;--blue:#58a6ff;--red:#f85149;--orange:#d29922;--purple:#bc8cff;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
h1,h2,h3{font-weight:600}
.container{max-width:960px;margin:0 auto;padding:0 16px;width:100%}
header{padding:24px 0;border-bottom:1px solid var(--border)}
header h1{font-size:1.5rem;display:flex;align-items:center;gap:8px}
header h1 svg{width:28px;height:28px;fill:var(--text)}
.search-section{padding:24px 0}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;outline:none}

.search-row button:hover{opacity:.9}

.presets span{font-size:.85rem;color:var(--text-dim);margin-right:4px}
.preset-btn{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--blue);cursor:pointer;font-size:.8rem}
.preset-btn:hover{background:var(--surface);border-color:var(--blue)}
.error-box{padding:12px 16px;border-radius:var(--radius);background:#f8514922;border:1px solid var(--red);color:var(--red);margin:12px 0;display:none}
.rate-limit-box{padding:12px 16px;border-radius:var(--radius);background:#d2992222;border:1px solid var(--orange);color:var(--orange);margin:12px 0;display:none}

.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}

#results{display:none}

.card h3{margin-bottom:16px;font-size:1rem;color:var(--text-dim)}

.timeline{margin-bottom:24px}
.timeline h3{margin-bottom:12px;font-size:1rem;color:var(--text-dim)}
.event-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.event-item:last-child{border-bottom:none}

.event-icon.pr{background:#bc8cff33;color:var(--purple)}
.event-icon.issue{background:#3fb95033;color:var(--green)}

.event-icon.star{background:#d2992233;color:var(--orange)}
.event-icon.fork{background:#8b949e33;color:var(--text-dim)}

.event-icon.delete{background:#f8514933;color:var(--red)}
.event-icon.release{background:#3fb95033;color:var(--green)}
.event-body{flex:1;min-width:0}
.event-body .event-title{font-size:.9rem;word-break:break-word}
.event-body .event-title strong{color:var(--text)}
.event-body .event-time{font-size:.75rem;color:var(--text-dim);margin-top:2px}

.repos-section{margin-bottom:24px}
.repos-section h3{margin-bottom:12px;font-size:1rem;color:var(--text-dim)}

.repo-item .repo-name{font-weight:600;color:var(--blue);font-size:.9rem}

footer{margin-top:auto;padding:20px 0;border-top:1px solid var(--border);text-align:center;font-size:.8rem;color:var(--text-dim)}
footer a{color:var(--blue)}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.75rem;color:var(--text-dim)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{width:80px;text-align:right;font-size:.8rem;color:var(--text-dim);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-value{width:40px;font-size:.8rem;color:var(--text-dim);flex-shrink:0}
</style>

<script>
const EVENT_META = {
  PushEvent:              { icon: '⬆', cls: 'push',    label: 'Push' },
  CreateEvent:            { icon: '✦', cls: 'create',  label: 'Create' },
  DeleteEvent:            { icon: '✕', cls: 'delete',  label: 'Delete' },
  PullRequestEvent:       { icon: '⎇', cls: 'pr',      label: 'Pull Request' },
  PullRequestReviewEvent: { icon: '✓', cls: 'pr',      label: 'PR Review' },
  IssuesEvent:            { icon: '●', cls: 'issue',   label: 'Issue' },
  IssueCommentEvent:      { icon: '💬', cls: 'comment', label: 'Comment' },
  WatchEvent:             { icon: '★', cls: 'star',    label: 'Star' },
  ForkEvent:              { icon: '⑂', cls: 'fork',    label: 'Fork' },
  ReleaseEvent:           { icon: '🏷', cls: 'release', label: 'Release' },
  PublicEvent:            { icon: '🔓', cls: 'create',  label: 'Public' },
  MemberEvent:            { icon: '👤', cls: 'create',  label: 'Member' },
  GollumEvent:            { icon: '📝', cls: 'comment', label: 'Wiki' },
  CommitCommentEvent:     { icon: '💬', cls: 'comment', label: 'Commit Comment' },
};

const CHART_COLORS = ['#58a6ff','#3fb950','#bc8cff','#d29922','#f85149','#79c0ff','#56d364','#d2a8ff','#e3b341','#ff7b72','#a5d6ff','#7ee787'];

/* Why: GitHub language colors for common languages */
const LANG_COLORS = {
  JavaScript:'#f1e05a',TypeScript:'#3178c6',Python:'#3572A5',Java:'#b07219',Go:'#00ADD8',
  Rust:'#dea584',Ruby:'#701516',PHP:'#4F5D95',C:'#555555','C++':'#f34b7d','C#':'#178600',
  Swift:'#F05138',Kotlin:'#A97BFF',Dart:'#00B4AB',Shell:'#89e051',HTML:'#e34c26',CSS:'#563d7c',
  Vue:'#41b883',Svelte:'#ff3e00',Lua:'#000080',Vim:'#199f4b',Zig:'#ec915c',Nix:'#7e7eff',
  Haskell:'#5e5086',Scala:'#c22d40',Elixir:'#6e4a7e',Clojure:'#db5855',OCaml:'#3be133',
};

function $(id) { return document.getElementById(id); }

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d}d ago`;
  const mo = Math.floor(d / 30);
  return `${mo}mo ago`;
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function showError(msg) {
  $('errorBox').textContent = msg;
  $('errorBox').style.display = 'block';
}

function showRateLimit(reset) {
  const mins = Math.max(1, Math.ceil((reset * 1000 - Date.now()) / 60000));
  $('rateLimitBox').textContent = `Rate limited. Try again in ${mins} minute${mins > 1 ? 's' : ''}.`;
  $('rateLimitBox').style.display = 'block';
}

function hideMessages() {
  $('errorBox').style.display = 'none';
  $('rateLimitBox').style.display = 'none';
}

async function apiFetch(url) {
  const res = await fetch(url);
  if (res.status === 403 || res.status === 429) {
    const reset = res.headers.get('X-RateLimit-Reset');
    showRateLimit(reset ? parseInt(reset) : Math.floor(Date.now()/1000) + 3600);
    return null;
  }
  if (!res.ok) {
    showError(`GitHub API error: ${res.status} ${res.statusText}`);
    return null;
  }
  return res.json();
}

async function fetchUser() {
  const username = $('usernameInput').value.trim();
  if (!username) return;

  hideMessages();
  $('results').style.display = 'none';
  $('loading').style.display = 'block';

  /* Why: update URL for shareability without reload */
  const url = new URL(window.location);
  url.searchParams.set('u', username);
  history.replaceState(null, '', url);

  try {
    const [user, events, repos] = await Promise.all([
      apiFetch(`https://api.github.com/users/${encodeURIComponent(username)}`),
      apiFetch(`https://api.github.com/users/${encodeURIComponent(username)}/events/public?per_page=100`),
      apiFetch(`https://api.github.com/users/${encodeURIComponent(username)}/repos?sort=updated&per_page=30`),
    ]);

    $('loading').style.display = 'none';

    if (!user) {
      if (!$('rateLimitBox').style.display || $('rateLimitBox').style.display === 'none') {
        showError(`User "${username}" not found.`);
      }
      return;
    }

    renderProfile(user);
    renderDonutChart(events || []);
    renderLanguages(repos || []);
    renderRepos(repos || []);
    renderTimeline(events || []);
    $('results').style.display = 'block';

  } catch (err) {
    $('loading').style.display = 'none';
    showError(`Network error: ${err.message}`);
  }
}

function renderProfile(u) {
  $('profileCard').innerHTML = `
    <img src="${u.avatar_url}" alt="${u.login}" width="96" height="96">
    <div class="profile-info">
      <h2 ti="h2_eschtml_u_name_u_login">${escHtml(u.name || u.login)}</h2>
      <div class="username"><a href="${u.html_url}" target="_blank" rel="noopener">@${escHtml(u.login)}</a></div>
      ${u.bio ? `<div class="bio">${escHtml(u.bio)}</div>` : ''}
      <div class="profile-stats">
        <div class="stat"><strong ti="strong_u_followers">${u.followers}</strong> <span>followers</span></div>
        <div class="stat"><strong ti="strong_u_following">${u.following}</strong> <span>following</span></div>
        <div class="stat"><strong ti="strong_u_public_repos">${u.public_repos}</strong> <span>repos</span></div>
        <div class="stat"><span>Joined</span> <strong ti="strong_formatdate_u_created_at">${formatDate(u.created_at)}</strong></div>
      </div>
    </div>`;
}

function renderDonutChart(events) {
  const counts = {};
  events.forEach(e => {
    const label = (EVENT_META[e.type] || {}).label || e.type.replace('Event','');
    counts[label] = (counts[label] || 0) + 1;
  });

  const entries = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const total = events.length;
  const canvas = $('donutChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 280 * dpr;
  canvas.height = 280 * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, 280, 280);

  if (!total) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No recent events', 140, 140);
    $('donutLegend').innerHTML = '';
    return;
  }

  const cx = 140, cy = 140, outerR = 110, innerR = 65;
  let startAngle = -Math.PI / 2;

  entries.forEach(([label, count], i) => {
    const slice = (count / total) * Math.PI * 2;
    const color = CHART_COLORS[i % CHART_COLORS.length];
    ctx.beginPath();
    ctx.moveTo(cx + innerR * Math.cos(startAngle), cy + innerR * Math.sin(startAngle));
    ctx.arc(cx, cy, outerR, startAngle, startAngle + slice);
    ctx.arc(cx, cy, innerR, startAngle + slice, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    startAngle += slice;
  });

  /* Why: center text shows total events count */
  ctx.fillStyle = '#e6edf3';
  ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy - 8);
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#8b949e';
  ctx.fillText('events', cx, cy + 12);

  $('donutLegend').innerHTML = entries.map(([label, count], i) =>
    `<div class="legend-item"><span class="legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></span>${label} (${count})</div>`
  ).join('');
}

function renderLanguages(repos) {
  const langBytes = {};
  repos.forEach(r => {
    if (r.language) langBytes[r.language] = (langBytes[r.language] || 0) + (r.size || 1);
  });

  const entries = Object.entries(langBytes).sort((a,b) => b[1] - a[1]).slice(0, 8);
  const max = entries.length ? entries[0][1] : 1;
  const container = $('langBars');

  if (!entries.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:.85rem">No language data available</div>';
    return;
  }

  container.innerHTML = entries.map(([lang, size]) => {
    const pct = Math.round((size / max) * 100);
    const color = LANG_COLORS[lang] || '#8b949e';
    return `<div class="bar-row">
      <div class="bar-label">${escHtml(lang)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-value">${pct}%</div>
    </div>`;
  }).join('');
}

function renderRepos(repos) {
  const container = $('reposList');
  const top = repos.slice(0, 10);

  if (!top.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:.85rem">No public repos</div>';
    return;
  }

  container.innerHTML = top.map(r => {
    const langColor = LANG_COLORS[r.language] || '#8b949e';
    return `<div class="repo-item">
      <div>
        <a class="repo-name" href="${r.html_url}" target="_blank" rel="noopener">${escHtml(r.name)}</a>
        ${r.description ? `<div style="font-size:.8rem;color:var(--text-dim);margin-top:2px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(r.description)}</div>` : ''}
      </div>
      <div class="repo-meta">
        ${r.language ? `<span><span class="lang-dot" style="background:${langColor}"></span>${escHtml(r.language)}</span>` : ''}
        <span>⭐ ${r.stargazers_count}</span>
        <span>🍴 ${r.forks_count}</span>
        <span>${timeAgo(r.updated_at)}</span>
      </div>
    </div>`;
  }).join('');
}

function renderTimeline(events) {
  const container = $('activityTimeline');
  const shown = events.slice(0, 30);

  if (!shown.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:.85rem;padding:12px 0">No recent public events</div>';
    return;
  }

  container.innerHTML = shown.map(e => {
    const meta = EVENT_META[e.type] || { icon:'?', cls:'', label: e.type.replace('Event','') };
    const repo = e.repo ? e.repo.name : '';
    let detail = '';

    if (e.type === 'PushEvent' && e.payload.commits) {
      const n = e.payload.commits.length;
      const msg = e.payload.commits[0]?.message?.split('\n')[0] || '';
      detail = `${n} commit${n > 1 ? 's' : ''}${msg ? ': ' + msg : ''}`;
    } else if (e.type === 'CreateEvent') {
      detail = `Created ${e.payload.ref_type}${e.payload.ref ? ' ' + e.payload.ref : ''}`;
    } else if (e.type === 'DeleteEvent') {
      detail = `Deleted ${e.payload.ref_type} ${e.payload.ref || ''}`;
    } else if (e.type === 'PullRequestEvent') {
      detail = `${e.payload.action} #${e.payload.pull_request?.number || ''}`;
    } else if (e.type === 'IssuesEvent') {
      detail = `${e.payload.action} #${e.payload.issue?.number || ''}`;
    } else if (e.type === 'IssueCommentEvent') {
      detail = `commented on #${e.payload.issue?.number || ''}`;
    } else if (e.type === 'ReleaseEvent') {
      detail = `${e.payload.action} ${e.payload.release?.tag_name || ''}`;
    } else if (e.type === 'ForkEvent') {
      detail = `forked to ${e.payload.forkee?.full_name || ''}`;
    } else if (e.type === 'WatchEvent') {
      detail = 'starred';
    }

    return `<div class="event-item">
      <div class="event-icon ${meta.cls}">${meta.icon}</div>
      <div class="event-body">
        <div class="event-title"><strong ti="strong_meta_label">${meta.label}</strong> in <a href="https://github.com/${repo}" target="_blank" rel="noopener">${escHtml(repo)}</a></div>
        ${detail ? `<div class="event-detail">${escHtml(detail)}</div>` : ''}
        <div class="event-time">${timeAgo(e.created_at)}</div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadPreset(name) {
  $('usernameInput').value = name;
  fetchUser();
}

/* Why: support ?u= URL parameter for direct linking */
(function init() {
  const params = new URLSearchParams(window.location.search);
  const u = params.get('u');
  if (u) {
    $('usernameInput').value = u;
    fetchUser();
  }
  $('usernameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchUser();
  });
})();
</script>
