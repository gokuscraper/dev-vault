<script>
const $=id=>document.getElementById(id);
const REG='https://registry.npmjs.org';
const DL='https://api.npmjs.org/downloads';

$('pkgName').addEventListener('keydown',e=>{if(e.key==='Enter')check()});

async function check(){
  const pkg=$('pkgName').value.trim();
  if(!pkg)return;
  $('checkBtn').disabled=true;
  $('checkBtn').textContent=T("jtc_checking");
  $('error').style.display='none';
  $('results').style.display='none';

  try{
    // Fetch package info and download stats in parallel
    const sixMonthsAgo=new Date(Date.now()-180*24*60*60*1000).toISOString().slice(0,10);
    const today=new Date().toISOString().slice(0,10);

    const [meta,dlRange,dlPoint]=await Promise.all([
      fetchJSON(`${REG}/${encodeURIComponent(pkg)}`),
      fetchJSON(`${DL}/range/${sixMonthsAgo}:${today}/${encodeURIComponent(pkg)}`),
      fetchJSON(`${DL}/point/last-week/${encodeURIComponent(pkg)}`)
    ]);

    render(pkg,meta,dlRange,dlPoint);
    $('results').style.display='block';
  }catch(e){
    $('error').textContent=e.message;
    $('error').style.display='block';
  }finally{
    $('checkBtn').disabled=false;
    $('checkBtn').textContent=T("jtc_check");
  }
}

async function fetchJSON(url){
  const r=await fetch(url);
  if(r.status===404)throw new Error('Package not found');
  if(!r.ok)throw new Error('API error ('+r.status+')');
  return r.json();
}

function render(pkgName,meta,dlRange,dlPoint){
  const latest=meta['dist-tags']?.latest||'';
  const latestData=meta.versions?.[latest]||{};
  const time=meta.time||{};
  const lastPublish=time[latest]?new Date(time[latest]):null;
  const created=time.created?new Date(time.created):null;
  const versions=Object.keys(meta.versions||{});
  const weeklyDL=dlPoint.downloads||0;
  const desc=meta.description||'';
  const license=latestData.license||meta.license||'Unknown';
  const deps=Object.keys(latestData.dependencies||{}).length;
  const devDeps=Object.keys(latestData.devDependencies||{}).length;
  const hasTypes=!!(latestData.types||latestData.typings||latestData.exports?.['.']?.types);
  const repo=meta.repository?.url||'';
  const homepage=meta.homepage||'';

  // Days since last publish
  const daysSinceUpdate=lastPublish?Math.floor((Date.now()-lastPublish)/(1000*60*60*24)):999;
  const ageInYears=created?((Date.now()-created)/(365.25*24*60*60*1000)).toFixed(1):'?';

  // Package header
  $('pkgHeader').innerHTML=`
    <div class="pkg-icon">${pkgName.startsWith('@')?'@':'📦'}</div>
    <div class="pkg-info">
      <h2 ti="h2_esc_pkgname_esc_latest" ti="h2_esc_pkgname_esc_latest" ti="h2_esc_pkgname_esc_latest" ti="h2_esc_pkgname_esc_latest" ti="h2_esc_pkgname_esc_latest">${esc(pkgName)}@${esc(latest)}</h2>
      ${desc?`<div class="desc">${esc(desc)}</div>`:''}
      <div class="meta">
        <span>${esc(typeof license==='object'?license.type:license)}</span>
        ${lastPublish?`<span>Updated ${timeAgo(lastPublish)}</span>`:''}
        <span>${versions.length} versions</span>
        ${homepage?`<a href="${esc(homepage)}" target="_blank">Homepage</a>`:repo?`<a href="${esc(repo.replace('git+','').replace('.git',''))}" target="_blank">Repo</a>`:''}
      </div>
    </div>
  `;

  // Health checks
  const checks=[
    {name:'Recent Updates',desc:`Last published ${daysSinceUpdate} days ago`,weight:20,
     status:daysSinceUpdate<=90?'pass':daysSinceUpdate<=365?'warn':'fail',
     score:daysSinceUpdate<=90?20:daysSinceUpdate<=180?15:daysSinceUpdate<=365?8:0},
    {name:'Popularity',desc:`${fmt(weeklyDL)} weekly downloads`,weight:15,
     status:weeklyDL>=10000?'pass':weeklyDL>=1000?'warn':'fail',
     score:weeklyDL>=100000?15:weeklyDL>=10000?12:weeklyDL>=1000?8:weeklyDL>=100?4:0},
    {name:'Version Maturity',desc:`${versions.length} versions released`,weight:10,
     status:versions.length>=10?'pass':versions.length>=3?'warn':'fail',
     score:versions.length>=20?10:versions.length>=10?8:versions.length>=3?5:2},
    {name:'Minimal Dependencies',desc:`${deps} runtime dependencies`,weight:15,
     status:deps<=5?'pass':deps<=15?'warn':'fail',
     score:deps===0?15:deps<=3?13:deps<=5?10:deps<=10?6:deps<=15?3:0},
    {name:'License',desc:typeof license==='object'?license.type:license,weight:10,
     status:license&&license!=='Unknown'?'pass':'fail',
     score:license&&license!=='Unknown'?10:0},
    {name:'TypeScript Support',desc:hasTypes?'Has type definitions':'No type definitions found',weight:10,
     status:hasTypes?'pass':'warn',
     score:hasTypes?10:3},
    {name:'Description',desc:desc?`${desc.length} chars`:'No description',weight:5,
     status:desc&&desc.length>20?'pass':desc?'warn':'fail',
     score:desc&&desc.length>20?5:desc?3:0},
    {name:'Project Age',desc:`${ageInYears} years old`,weight:10,
     status:parseFloat(ageInYears)>=1?'pass':parseFloat(ageInYears)>=0.25?'warn':'fail',
     score:parseFloat(ageInYears)>=3?10:parseFloat(ageInYears)>=1?8:parseFloat(ageInYears)>=0.25?4:1},
    {name:'Semantic Versioning',desc:latest.match(/^\d+\.\d+\.\d+/)?'Follows semver':'Non-standard versioning',weight:5,
     status:latest.match(/^\d+\.\d+\.\d+/)?'pass':'warn',
     score:latest.match(/^\d+\.\d+\.\d+/)?5:2},
  ];

  const totalWeight=checks.reduce((s,c)=>s+c.weight,0);
  const earned=checks.reduce((s,c)=>s+c.score,0);
  const pct=Math.round(earned/totalWeight*100);
  const grade=pct>=85?'A':pct>=70?'B':pct>=50?'C':pct>=30?'D':'F';
  const gradeColor={A:'#10b981',B:'#3b82f6',C:'#f59e0b',D:'#ef4444',F:'#dc2626'}[grade];

  // Score ring
  const circ=2*Math.PI*55;
  const offset=circ-(pct/100*circ);
  $('scoreSection').innerHTML=`
    <div class="score-ring">
      <svg viewBox="0 0 130 130">
        <circle class="bg" cx="65" cy="65" r="55"/>
        <circle class="fg" cx="65" cy="65" r="55" stroke="${gradeColor}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="score-num">${pct}</div>
    </div>
    <div class="score-label grade-${grade}">${{A:'Healthy',B:'Good',C:'Fair',D:'Aging',F:'Risky'}[grade]} Package</div>
  `;

  // Stats grid
  $('statsGrid').innerHTML=`
    <div class="stat-card"><div class="num">${fmt(weeklyDL)}</div><div class="label">Weekly DL</div></div>
    <div class="stat-card"><div class="num">${versions.length}</div><div class="label">Versions</div></div>
    <div class="stat-card"><div class="num">${deps}</div><div class="label">Dependencies</div></div>
    <div class="stat-card"><div class="num">${daysSinceUpdate}d</div><div class="label">Since Update</div></div>
    <div class="stat-card"><div class="num">${ageInYears}y</div><div class="label">Age</div></div>
    <div class="stat-card"><div class="num">${grade}</div><div class="label">Grade</div></div>
  `;

  // Check list
  $('checkList').innerHTML=checks.map(c=>`
    <div class="check ${c.status}">
      <div class="check-icon">${c.status==='pass'?'<span style="color:#10b981">&#10003;</span>':c.status==='warn'?'<span style="color:#f59e0b">&#9888;</span>':'<span style="color:#ef4444">&#10007;</span>'}</div>
      <div class="check-body">
        <div class="check-name">${c.name}</div>
        <div class="check-desc">${c.desc}</div>
      </div>
      <div class="check-weight">${c.score}/${c.weight}</div>
    </div>
  `).join('');

  // Download chart (aggregate to weekly)
  const downloads=dlRange.downloads||[];
  const weeks=[];
  for(let i=0;i<downloads.length;i+=7){
    const chunk=downloads.slice(i,i+7);
    const sum=chunk.reduce((s,d)=>s+d.downloads,0);
    const label=chunk[0].day.slice(5);
    weeks.push({label,sum});
  }
  const maxW=Math.max(...weeks.map(w=>w.sum),1);
  // Show last 26 weeks (approx 6 months)
  const recentWeeks=weeks.slice(-26);
  $('dlChart').innerHTML=recentWeeks.map(w=>`
    <div class="dl-row">
      <div class="dl-label">${w.label}</div>
      <div class="dl-track">
        <div class="dl-fill" style="width:${(w.sum/maxW*100)}%;background:#3b82f6"></div>
        <div class="dl-val">${fmt(w.sum)}</div>
      </div>
    </div>
  `).join('');

  // Insights
  const ins=[];
  ins.push(`${esc(pkgName)} v${latest} — ${pct}/100 health score (${grade})`);
  if(weeklyDL>=100000)ins.push(`High popularity: ${fmt(weeklyDL)} weekly downloads`);
  else if(weeklyDL>=10000)ins.push(`Moderate popularity: ${fmt(weeklyDL)} weekly downloads`);
  else if(weeklyDL<100)ins.push(`Low adoption: only ${weeklyDL} weekly downloads`);

  if(daysSinceUpdate>365)ins.push(`Not updated in over a year — may be abandoned`);
  else if(daysSinceUpdate>180)ins.push(`Last update was ${daysSinceUpdate} days ago — could use attention`);
  else if(daysSinceUpdate<=30)ins.push(`Actively maintained — updated ${daysSinceUpdate} days ago`);

  if(deps===0)ins.push(`Zero runtime dependencies — minimal supply chain risk`);
  else if(deps>15)ins.push(`${deps} dependencies — elevated supply chain risk`);

  if(!hasTypes)ins.push(`No TypeScript types — consider @types/${pkgName} or DefinitelyTyped`);

  // Download trend
  if(recentWeeks.length>=4){
    const recent4=recentWeeks.slice(-4).reduce((s,w)=>s+w.sum,0);
    const prev4=recentWeeks.slice(-8,-4).reduce((s,w)=>s+w.sum,0);
    if(prev4>0){
      const trend=((recent4-prev4)/prev4*100).toFixed(0);
      if(parseInt(trend)>10)ins.push(`Downloads trending up: +${trend}% vs previous month`);
      else if(parseInt(trend)<-10)ins.push(`Downloads trending down: ${trend}% vs previous month`);
      else ins.push(`Downloads stable over the last month`);
    }
  }

  $('insights').innerHTML=`<h3 ti="h3_insights_for_esc_pkgname" ti="h3_insights_for_esc_pkgname" ti="h3_insights_for_esc_pkgname" ti="h3_insights_for_esc_pkgname" ti="h3_insights_for_esc_pkgname">Insights for ${esc(pkgName)}</h3><ul>${ins.map(i=>`<li>${i}</li>`).join('')}</ul>`;

  // Share
  const shareText=`${pkgName} scored ${pct}/100 (${grade}) on npm Health Check!`;
  $('shareBtn').href=`https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent('https://gokuscraper.github.io/dev-vault/npm-health/')}`;
}

function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(date){const d=Math.floor((Date.now()-date)/(1000*60*60*24));if(d===0)return'today';if(d===1)return'yesterday';if(d<30)return d+' days ago';if(d<365)return Math.floor(d/30)+' months ago';return(d/365).toFixed(1)+' years ago'}

// Auto-check if URL has ?pkg=xxx
const params=new URLSearchParams(location.search);
if(params.get('pkg')){$('pkgName').value=params.get('pkg');check()}
</script>
