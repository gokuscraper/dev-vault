<style>
:root{--bg:#0a0a0a;--surface:#161616;--border:#2a2a2a;--text:#e0e0e0;--text2:#888;--accent:#4da6ff;--green:#4ec9b0;--orange:#ce9178;--purple:#c586c0;--gray:#6a6a6a;--red:#f44747;--hover:#1e1e1e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.back-link{color:var(--text2);text-decoration:none;font-size:13px}.back-link:hover{color:var(--accent)}
h1{font-size:16px;font-weight:600;color:var(--text)}
main{flex:1;display:flex;flex-direction:column;gap:12px;padding:16px;max-width:1200px;width:100%;margin:0 auto}
.input-section{display:flex;flex-direction:column;gap:8px}
textarea{width:100%;height:140px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;resize:vertical;outline:none}
textarea:focus{border-color:var(--accent)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .15s}
button:hover{background:var(--hover);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-primary:hover{opacity:.85}
.search-box{flex:1;min-width:180px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
.stats{display:flex;gap:16px;flex-wrap:wrap;padding:8px 12px;background:var(--surface);border-radius:6px;border:1px solid var(--border);font-size:12px;color:var(--text2)}
.stats span{white-space:nowrap}.stats b{color:var(--text);margin-right:2px}
.path-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-family:monospace;font-size:13px;color:var(--accent);min-height:32px;cursor:pointer;user-select:all}
.path-bar:empty::before{content:'Click a node to see its JSONPath';color:var(--text2);font-family:sans-serif}
.path-bar:hover{border-color:var(--accent)}
.error{color:var(--red);padding:10px 12px;background:#1a0a0a;border:1px solid #3a1515;border-radius:6px;font-size:13px;font-family:monospace;white-space:pre-wrap}
.tree-container{flex:1;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;min-height:200px;line-height:1.6}
.tree-node{position:relative;padding-left:20px}
.tree-node>.tree-children{border-left:1px solid var(--border);margin-left:8px}
.tree-key{color:var(--accent)}.tree-str{color:var(--green)}.tree-num{color:var(--orange)}.tree-bool{color:var(--purple)}.tree-null{color:var(--gray);font-style:italic}
.tree-toggle{display:inline-block;width:16px;cursor:pointer;user-select:none;color:var(--text2);text-align:center;flex-shrink:0}
.tree-toggle:hover{color:var(--accent)}
.tree-line{display:flex;align-items:baseline;padding:1px 0;border-radius:3px;cursor:default}
.tree-line:hover{background:var(--hover)}
.tree-line.selected{background:#1a2a3a}
.tree-count{color:var(--text2);font-size:11px;margin-left:4px}
.tree-children{overflow:hidden}
.tree-children.collapsed{display:none}
.highlight{background:#4da6ff33;border-radius:2px}
.truncated{color:var(--text2);cursor:pointer;text-decoration:underline dotted}
.truncated:hover{color:var(--text)}
.copy-btn{visibility:hidden;background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;padding:2px 6px;margin-left:4px}
.tree-line:hover .copy-btn{visibility:visible}
.copy-btn:hover{color:var(--accent)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#000;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{text-align:center;padding:16px;font-size:12px;color:var(--text2);border-top:1px solid var(--border)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.related{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px}
</style>
</head>
<body>
<header>
<a href="https://gokuscraper.github.io/dev-vault/" class="back-link">dev-toolkit</a>
<h1>JSON Tree Viewer</h1>
</header>
<main>
<div class="input-section">
<textarea id="input" placeholder="Paste JSON here..." spellcheck="false"></textarea>
<div class="toolbar">
<button class="btn-primary" onclick="parseAndRender()">Parse</button>
<button onclick="formatInput()">Format</button>
<button onclick="clearAll()">Clear</button>
<span style="color:var(--border)">|</span>
<button onclick="expandAll()">Expand All</button>
<button onclick="collapseAll()">Collapse All</button>
<input type="text" class="search-box" id="search" placeholder="Search keys or values..." oninput="doSearch(this.value)">
</div>
</div>
<div id="error"></div>
<div class="stats" id="stats" style="display:none"></div>
<div class="path-bar" id="pathBar" onclick="copyPath()" title="Click to copy path"></div>
<div class="tree-container" id="treeContainer"></div>
</main>
<div class="toast" id="toast"></div>
<footer>
<a href="https://gokuscraper.github.io/dev-vault/">dev-toolkit</a> — Free browser tools for developers
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/json-format/">JSON Format</a> <a href="https://gokuscraper.github.io/dev-vault/json-viewer/">JSON Viewer</a> <a href="https://gokuscraper.github.io/dev-vault/json-path/">JSON Path</a></div>
</footer>
<script>
const TRUNC=120,LAZY_THRESHOLD=500;
let parsedData=null,currentPath='',allNodes=[];

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

function copyPath(){const p=document.getElementById('pathBar').textContent;if(p&&!p.startsWith('Click')){navigator.clipboard.writeText(p).then(()=>toast('Path copied'))}}

function formatInput(){const ta=document.getElementById('input');try{ta.value=JSON.stringify(JSON.parse(ta.value),null,2);document.getElementById('error').textContent=''}catch(e){showError(e,ta.value)}}

function clearAll(){document.getElementById('input').value='';document.getElementById('treeContainer').innerHTML='';document.getElementById('error').textContent='';document.getElementById('stats').style.display='none';document.getElementById('pathBar').textContent='';parsedData=null;allNodes=[]}

function showError(e,src){const el=document.getElementById('error');let msg=e.message;const m=msg.match(/position\s+(\d+)/i);if(m&&src){const pos=parseInt(m[1]);const lines=src.substring(0,pos).split('\n');msg+=`\n  Line ${lines.length}, Column ${lines[lines.length-1].length+1}`}
el.innerHTML='<div class="error">'+escHtml(msg)+'</div>';document.getElementById('treeContainer').innerHTML='';document.getElementById('stats').style.display='none'}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function computeStats(data){let keys=0,nodes=0,maxD=0;function walk(v,d){nodes++;if(d>maxD)maxD=d;if(v&&typeof v==='object'){const entries=Array.isArray(v)?v:Object.keys(v);if(!Array.isArray(v))keys+=Object.keys(v).length;for(const k of(Array.isArray(v)?v:Object.values(v)))walk(k,d+1)}}
walk(data,0);return{keys,nodes,maxDepth:maxD}}

function parseAndRender(){const src=document.getElementById('input').value.trim();if(!src)return;document.getElementById('error').textContent='';try{parsedData=JSON.parse(src)}catch(e){return showError(e,src)}
const st=computeStats(parsedData);const sz=new Blob([src]).size;const statsEl=document.getElementById('stats');statsEl.style.display='flex';statsEl.innerHTML=`<span><b>${st.keys}</b> keys</span><span><b>${st.nodes}</b> nodes</span><span>depth <b>${st.maxDepth}</b></span><span><b>${fmtSize(sz)}</b></span>`;
allNodes=[];const container=document.getElementById('treeContainer');container.innerHTML='';const tree=buildNode(parsedData,'$',0,null,true);container.appendChild(tree)}

function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}

function buildNode(value,path,depth,key,isLast){const wrap=document.createElement('div');wrap.className='tree-node';const line=document.createElement('div');line.className='tree-line';line.dataset.path=path;allNodes.push(line);

if(value!==null&&typeof value==='object'){
const isArr=Array.isArray(value);const entries=isArr?value:Object.entries(value);const len=isArr?value.length:Object.keys(value).length;
const toggle=document.createElement('span');toggle.className='tree-toggle';toggle.textContent='\u25BC';
const label=document.createElement('span');
let keyPart=key!==null?`<span class="tree-key">${escHtml(String(key))}</span>: `:'';
label.innerHTML=keyPart+(isArr?'[':'{');
const count=document.createElement('span');count.className='tree-count';count.textContent=isArr?`${len} items`:`${len} keys`;

line.appendChild(toggle);line.appendChild(label);line.appendChild(count);
line.addEventListener('click',e=>{if(e.target===toggle||e.target===line||e.target===label||e.target===count){selectNode(line,path)}});

const children=document.createElement('div');children.className='tree-children';

// Lazy rendering: defer children if large
const renderChildren=()=>{if(children.dataset.rendered)return;children.dataset.rendered='1';
const items=isArr?value.map((v,i)=>[i,v]):Object.entries(value);
items.forEach(([k,v],idx)=>{const childPath=isArr?`${path}[${k}]`:`${path}.${validKey(String(k))?String(k):'["'+escJsonStr(String(k))+'"]'}`;
children.appendChild(buildNode(v,childPath,depth+1,k,idx===items.length-1))});
const close=document.createElement('div');close.className='tree-line';close.innerHTML='<span class="tree-toggle"></span>'+(isArr?']':'}')+(isLast?'':',');children.appendChild(close)};

if(len<=LAZY_THRESHOLD||depth<2)renderChildren();

toggle.addEventListener('click',e=>{e.stopPropagation();const collapsed=children.classList.toggle('collapsed');
toggle.textContent=collapsed?'\u25B6':'\u25BC';count.style.display=collapsed?'inline':'inline';
if(!collapsed)renderChildren()});

wrap.appendChild(line);wrap.appendChild(children)}else{
const toggle=document.createElement('span');toggle.className='tree-toggle';toggle.textContent=' ';
const content=document.createElement('span');
let keyPart=key!==null?`<span class="tree-key">${escHtml(String(key))}</span>: `:'';
let valHtml=formatValue(value,path);
content.innerHTML=keyPart+valHtml+(isLast?'':',');

const copyBtn=document.createElement('span');copyBtn.className='copy-btn';copyBtn.textContent='copy';copyBtn.addEventListener('click',e=>{e.stopPropagation();navigator.clipboard.writeText(typeof value==='string'?value:JSON.stringify(value)).then(()=>toast('Value copied'))});

line.appendChild(toggle);line.appendChild(content);line.appendChild(copyBtn);
line.addEventListener('click',()=>selectNode(line,path));
wrap.appendChild(line)}
return wrap}

function validKey(k){return/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k)}
function escJsonStr(s){return s.replace(/\\/g,'\\\\').replace(/"/g,'\\"')}

function formatValue(v,path){
if(v===null)return'<span class="tree-null">null</span>';
if(typeof v==='boolean')return`<span class="tree-bool">${v}</span>`;
if(typeof v==='number')return`<span class="tree-num">${v}</span>`;
if(typeof v==='string'){const esc=escHtml(v);if(v.length>TRUNC){const short=escHtml(v.substring(0,TRUNC));return`<span class="tree-str">"${short}<span class="truncated" onclick="event.stopPropagation();this.parentElement.innerHTML='&quot;'+${JSON.stringify(escHtml(v)).replace(/'/g,"\\'")}+'&quot;'"title="Click to expand">...${v.length-TRUNC} more</span>"</span>`}
return`<span class="tree-str">"${esc}"</span>`}
return escHtml(String(v))}

function selectNode(line,path){document.querySelectorAll('.tree-line.selected').forEach(el=>el.classList.remove('selected'));line.classList.add('selected');currentPath=path;document.getElementById('pathBar').textContent=path}

function expandAll(){document.querySelectorAll('.tree-children').forEach(el=>{el.classList.remove('collapsed');if(!el.dataset.rendered){/* trigger render via toggle click */}});document.querySelectorAll('.tree-toggle').forEach(t=>{if(t.textContent==='\u25B6')t.textContent='\u25BC'})}

function collapseAll(){document.querySelectorAll('.tree-children').forEach(el=>el.classList.add('collapsed'));document.querySelectorAll('.tree-toggle').forEach(t=>{if(t.textContent==='\u25BC'&&t.parentElement.querySelector('.tree-count'))t.textContent='\u25B6'})}

function doSearch(q){document.querySelectorAll('.highlight').forEach(el=>el.classList.remove('highlight'));if(!q.trim())return;const lq=q.toLowerCase();let first=null;
allNodes.forEach(line=>{const text=line.textContent.toLowerCase();if(text.includes(lq)){line.classList.add('highlight');if(!first)first=line;
// Expand parents
let p=line.parentElement;while(p){if(p.classList&&p.classList.contains('tree-children')&&p.classList.contains('collapsed')){p.classList.remove('collapsed');const tog=p.previousElementSibling?.querySelector('.tree-toggle');if(tog)tog.textContent='\u25BC'}
p=p.parentElement}}});
if(first)first.scrollIntoView({behavior:'smooth',block:'center'})}

// Auto-parse on paste
document.getElementById('input').addEventListener('paste',()=>setTimeout(parseAndRender,50));

// Sample data on load
document.getElementById('input').value=JSON.stringify({"name":"JSON Tree Viewer","version":"1.0","features":["collapsible tree","search","JSONPath","copy value"],"config":{"theme":"dark","maxDepth":null,"autoExpand":true,"colors":{"string":"green","number":"orange","boolean":"purple"}},"stats":[42,3.14,true,false,null]},null,2);
parseAndRender();
</script>
</body>
</html>
