<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}

.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}

.search-row{display:flex;gap:10px;max-width:600px;margin:0 auto 16px}
.search-row input{flex:1;padding:12px 18px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:1rem;outline:none}
.search-row input:focus{border-color:#3b82f6}

.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}

.type-row{display:flex;gap:6px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.type-btn{padding:6px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.78rem;cursor:pointer;font-weight:600;font-family:'Fira Code',monospace}
.type-btn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.type-btn:hover:not(.active){background:#1c1c1c}

.quick-domains{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.quick-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.75rem;cursor:pointer}
.quick-btn:hover{border-color:#3b82f6;color:#888}

.loading{text-align:center;color:#555;padding:40px;font-size:0.9rem}
.error-msg{text-align:center;color:#ef4444;padding:16px;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:10px;margin-bottom:20px}

.results{display:none}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.result-header h2{font-size:1rem;color:#fff}
.result-header .domain{font-family:'Fira Code',monospace;color:#10b981}
.result-header .count{font-size:0.78rem;color:#555}

.record-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.record-table th{text-align:left;font-size:0.72rem;color:#555;text-transform:uppercase;letter-spacing:0.5px;padding:8px 12px;border-bottom:1px solid #222;background:#0d0d0d}
.record-table td{padding:10px 12px;border-bottom:1px solid #1a1a1a;font-family:'Fira Code',monospace;font-size:0.82rem;color:#ddd;word-break:break-all}
.record-table tr:hover td{background:#161616}
.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:700;min-width:50px;text-align:center}
.type-A{background:#0a2e1a;color:#10b981}
.type-AAAA{background:#0a1e2e;color:#38bdf8}
.type-CNAME{background:#2e1a0a;color:#fb923c}
.type-MX{background:#1a0a2e;color:#a78bfa}
.type-NS{background:#2e2e0a;color:#facc15}
.type-TXT{background:#1a1a1a;color:#888}
.type-SOA{background:#2e0a1a;color:#f472b6}

.summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.summary-item{background:#161616;border:1px solid #222;border-radius:8px;padding:10px;text-align:center}
.summary-item .num{font-family:'Fira Code',monospace;font-size:1.2rem;color:#4da6ff}
.summary-item .lbl{font-size:0.7rem;color:#555;margin-top:2px}

.raw-output{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;margin-top:16px;cursor:pointer}
.raw-output:hover{border-color:#3b82f6}
.raw-output pre{font-family:'Fira Code',monospace;font-size:0.75rem;color:#888;white-space:pre-wrap;max-height:200px;overflow:auto}
.raw-output .hint{font-size:0.72rem;color:#555;margin-top:6px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

footer a:hover{color:#999}

<body>
<div class="container">
<h1>DNS Lookup</h1>
<p class="subtitle">Query DNS records for any domain using Google DNS.</p>

<div class="search-row">
  <input type="text" id="domain" placeholder="Enter domain (e.g., github.com)" onkeydown="if(event.key==='Enter')lookupAll()">
  <button class="btn primary" onclick="lookupAll()">Lookup</button>
</div>

<div class="type-row" id="typeRow"></div>

<div class="quick-domains">
  <button class="quick-btn" onclick="setDomain('google.com')">google.com</button>
  <button class="quick-btn" onclick="setDomain('github.com')">github.com</button>
  <button class="quick-btn" onclick="setDomain('cloudflare.com')">cloudflare.com</button>
  <button class="quick-btn" onclick="setDomain('example.com')">example.com</button>
</div>

<div id="loading" class="loading" style="display:none">Querying DNS...</div>
<div id="error" class="error-msg" style="display:none"></div>

<div class="results" id="results">
  <div class="result-header">
    <h2>Records for <span class="domain" id="resDomain"></span></h2>
    <span class="count" id="resCount"></span>
  </div>
  <div class="summary" id="summary"></div>
  <table class="record-table">
    <thead><tr><th>Type</th><th>Name</th><th>Value</th><th>TTL</th></tr></thead>
    <tbody id="recordBody"></tbody>
  </table>
  <div class="raw-output" onclick="copyRaw()">
    <pre id="rawOutput"></pre>
    <div class="hint">Click to copy</div>
  </div>
</div>

</div>

<footer>
  <a href="https://github.com/gokuscraper/dns-lookup">GitHub</a> ·
  Part of <a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a>
</footer>

<script>
const TYPES=['A','AAAA','CNAME','MX','NS','TXT','SOA'];
let selectedTypes=new Set(TYPES);
let allRecords=[];

function renderTypes(){
  document.getElementById('typeRow').innerHTML=
    `<button class="type-btn ${selectedTypes.size===TYPES.length?'active':''}" onclick="toggleAll()">ALL</button>`+
    TYPES.map(t=>`<button class="type-btn ${selectedTypes.has(t)?'active':''}" onclick="toggleType('${t}')">${t}</button>`).join('');
}

function toggleType(t){
  if(selectedTypes.has(t))selectedTypes.delete(t);
  else selectedTypes.add(t);
  renderTypes();
  if(allRecords.length)showResults();
}

function toggleAll(){
  if(selectedTypes.size===TYPES.length)selectedTypes.clear();
  else TYPES.forEach(t=>selectedTypes.add(t));
  renderTypes();
  if(allRecords.length)showResults();
}

function setDomain(d){
  document.getElementById('domain').value=d;
  lookupAll();
}

async function queryType(domain,type){
  try{
    const r=await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${type}`);
    const d=await r.json();
    if(d.Answer)return d.Answer.map(a=>({type,name:a.name,value:a.data,ttl:a.TTL}));
    return[];
  }catch(e){return[]}
}

async function lookupAll(){
  const domain=document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/.*$/,'');
  if(!domain)return;
  document.getElementById('domain').value=domain;
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('results').style.display='none';
  allRecords=[];

  try{
    const results=await Promise.all(TYPES.map(t=>queryType(domain,t)));
    allRecords=results.flat();
    document.getElementById('resDomain').textContent=domain;
    if(allRecords.length===0){
      document.getElementById('error').textContent='No DNS records found for this domain.';
      document.getElementById('error').style.display='block';
    }else{
      showResults();
    }
  }catch(e){
    document.getElementById('error').textContent='DNS lookup failed. Check the domain and try again.';
    document.getElementById('error').style.display='block';
  }
  document.getElementById('loading').style.display='none';
}

function showResults(){
  const filtered=allRecords.filter(r=>selectedTypes.has(r.type));
  document.getElementById('resCount').textContent=`${filtered.length} of ${allRecords.length} records`;

  // Summary
  const counts={};
  allRecords.forEach(r=>{counts[r.type]=(counts[r.type]||0)+1});
  document.getElementById('summary').innerHTML=TYPES.filter(t=>counts[t]).map(t=>`
    <div class="summary-item">
      <div class="num">${counts[t]}</div>
      <div class="lbl">${t}</div>
    </div>
  `).join('');

  // Table
  document.getElementById('recordBody').innerHTML=filtered.map(r=>`
    <tr>
      <td><span class="type-badge type-${r.type}">${r.type}</span></td>
      <td>${r.name}</td>
      <td>${escHtml(r.value)}</td>
      <td>${formatTTL(r.ttl)}</td>
    </tr>
  `).join('')||'<tr><td colspan="4" style="text-align:center;color:#555;padding:20px">No records match selected types.</td></tr>';

  // Raw
  document.getElementById('rawOutput').textContent=filtered.map(r=>`${r.name}\t${r.ttl}\tIN\t${r.type}\t${r.value}`).join('\n');
  document.getElementById('results').style.display='block';
}

function formatTTL(s){
  if(s>=3600)return Math.floor(s/3600)+'h';
  if(s>=60)return Math.floor(s/60)+'m';
  return s+'s';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function copyRaw(){
  navigator.clipboard.writeText(document.getElementById('rawOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent='Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

renderTypes();
</script>
