<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.container{max-width:960px;margin:0 auto;padding:24px 16px}

header{text-align:center;margin-bottom:32px}
header h1{font-size:28px;margin-bottom:8px}
header h1 span{color:var(--accent)}
header p{color:var(--muted);font-size:14px}

.search-box{display:flex;gap:8px;margin-bottom:24px}
.search-box input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.search-box button:hover{opacity:.9}
.search-box button:disabled{opacity:.5;cursor:not-allowed}

.status{text-align:center;color:var(--muted);padding:16px;font-size:14px}
.status.error{color:var(--red)}

.source-pkg{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:24px}
.source-pkg h2{font-size:18px;margin-bottom:4px}
.source-pkg .desc{color:var(--muted);font-size:14px;margin-bottom:8px}
.source-pkg .meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.source-pkg .meta span{display:flex;align-items:center;gap:4px}
.kw-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.kw{background:rgba(88,166,255,.15);color:var(--accent);padding:2px 8px;border-radius:12px;font-size:12px}

.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.results-header h3{font-size:16px}
.sort-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px}

.alt-grid{display:grid;gap:12px}
.alt-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;transition:border-color .2s}
.alt-card:hover{border-color:var(--accent)}
.alt-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.alt-card h4{font-size:15px}
.alt-card h4 a{color:var(--text)}
.alt-card h4 a:hover{color:var(--accent)}
.alt-card .ver{color:var(--muted);font-size:12px}
.alt-card .desc{color:var(--muted);font-size:13px;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.alt-card .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.stat{background:rgba(255,255,255,.03);border-radius:4px;padding:6px 8px}
.stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat .value{font-size:14px;font-weight:600}

.score-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.score-bar .fill{height:100%;border-radius:2px;transition:width .3s}

.match-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.match-high{background:rgba(63,185,80,.15);color:var(--green)}
.match-mid{background:rgba(210,153,34,.15);color:var(--yellow)}
.match-low{background:rgba(139,148,158,.15);color:var(--muted)}

footer{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:40px}

.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .search-box{flex-direction:column}
  .source-pkg .meta{flex-direction:column;gap:4px}
  .alt-card .stats{grid-template-columns:1fr 1fr}
}
</style>
</head>

<script>
const NPM_REGISTRY = 'https://registry.npmjs.org';
const NPM_SEARCH = 'https://registry.npmjs.org/-/v1/search';
const NPM_API = 'https://api.npmjs.org/downloads/point/last-week';

const input = document.getElementById('pkgInput');
const btn = document.getElementById('searchBtn');
const statusEl = document.getElementById('status');
const sourceEl = document.getElementById('sourceInfo');
const resultsEl = document.getElementById('results');

input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

// URL param support
const urlPkg = new URLSearchParams(location.search).get('q');
if (urlPkg) { input.value = urlPkg; search(); }

async function search() {
  const pkg = input.value.trim().toLowerCase();
  if (!pkg) return;

  btn.disabled = true;
  statusEl.innerHTML = '<span class="loading"></span> Fetching package info...';
  statusEl.className = 'status';
  sourceEl.innerHTML = '';
  resultsEl.innerHTML = '';

  try {
    // 1. Fetch source package
    const srcRes = await fetch(`${NPM_REGISTRY}/${encodeURIComponent(pkg)}`);
    if (!srcRes.ok) throw new Error(`Package "${pkg}" not found`);
    const srcData = await srcRes.json();

    const latest = srcData['dist-tags']?.latest;
    const latestVer = srcData.versions?.[latest] || {};
    const keywords = latestVer.keywords || srcData.keywords || [];
    const description = latestVer.description || srcData.description || '';

    // Fetch downloads for source
    let srcDownloads = 0;
    try {
      const dlRes = await fetch(`${NPM_API}/${encodeURIComponent(pkg)}`);
      if (dlRes.ok) { const d = await dlRes.json(); srcDownloads = d.downloads || 0; }
    } catch {}

    // Show source info
    sourceEl.innerHTML = renderSource(pkg, description, keywords, latest, srcDownloads, latestVer);

    // 2. Build search queries from keywords + description words
    const searchTerms = buildSearchTerms(pkg, keywords, description);
    if (searchTerms.length === 0) {
      statusEl.textContent=T("jtc_no_keywords_found_to_sear");
      btn.disabled = false;
      return;
    }

    statusEl.innerHTML = `<span class="loading"></span> Searching alternatives using ${searchTerms.length} keyword groups...`;

    // 3. Search npm for alternatives
    const candidates = new Map();
    const searches = searchTerms.slice(0, 4).map(term =>
      fetch(`${NPM_SEARCH}?text=${encodeURIComponent(term)}&size=15`)
        .then(r => r.ok ? r.json() : { objects: [] })
        .catch(() => ({ objects: [] }))
    );

    const searchResults = await Promise.all(searches);
    for (const result of searchResults) {
      for (const obj of (result.objects || [])) {
        const name = obj.package?.name;
        if (name && name !== pkg && !candidates.has(name)) {
          candidates.set(name, obj);
        }
      }
    }

    if (candidates.size === 0) {
      statusEl.textContent=T("jtc_no_alternatives_found_thi");
      btn.disabled = false;
      return;
    }

    statusEl.innerHTML = `<span class="loading"></span> Found ${candidates.size} candidates. Fetching download stats...`;

    // 4. Fetch download stats for top candidates
    const scored = scoreAndRank(Array.from(candidates.values()), keywords, pkg);
    const top = scored.slice(0, 20);

    // Batch download stats
    const dlPromises = top.map(item =>
      fetch(`${NPM_API}/${encodeURIComponent(item.package.name)}`)
        .then(r => r.ok ? r.json() : { downloads: 0 })
        .catch(() => ({ downloads: 0 }))
    );
    const dlResults = await Promise.all(dlPromises);
    top.forEach((item, i) => { item.weeklyDownloads = dlResults[i].downloads || 0; });

    // 5. Render
    statusEl.textContent = `Found ${top.length} alternatives for "${pkg}"`;
    renderResults(top, srcDownloads);

  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status error';
  }
  btn.disabled = false;
}

function buildSearchTerms(pkg, keywords, description) {
  const terms = [];

  // Use keywords directly
  if (keywords.length > 0) {
    // Group keywords for broader searches
    terms.push(keywords.slice(0, 3).join(' '));
    if (keywords.length > 3) terms.push(keywords.slice(3, 6).join(' '));
    // Individual important keywords
    keywords.slice(0, 3).forEach(k => terms.push(k));
  }

  // Extract meaningful words from description
  if (description) {
    const stopWords = new Set(['a','an','the','is','are','was','were','be','been','for','and','or','but','in','on','at','to','of','with','by','from','as','it','its','this','that','which','who','what','how','not','no','can','will','do','does','has','have','had']);
    const words = description.toLowerCase().split(/\W+/).filter(w => w.length > 3 && !stopWords.has(w) && w !== pkg.replace(/-/g,''));
    if (words.length > 0) terms.push(words.slice(0, 3).join(' '));
  }

  // Package name parts
  const parts = pkg.split(/[-_./]/).filter(p => p.length > 2);
  if (parts.length > 1) terms.push(parts.join(' '));

  return [...new Set(terms)];
}

function scoreAndRank(items, sourceKeywords, sourceName) {
  const srcKwSet = new Set(sourceKeywords.map(k => k.toLowerCase()));
  const srcParts = new Set(sourceName.split(/[-_./]/).filter(p => p.length > 2));

  return items.map(item => {
    const p = item.package;
    let score = 0;

    // Keyword overlap (most important)
    const itemKw = (p.keywords || []).map(k => k.toLowerCase());
    const overlap = itemKw.filter(k => srcKwSet.has(k)).length;
    score += overlap * 25;

    // npm search scores
    score += (item.score?.detail?.quality || 0) * 15;
    score += (item.score?.detail?.popularity || 0) * 20;
    score += (item.score?.detail?.maintenance || 0) * 10;

    // Name similarity bonus
    const itemParts = new Set(p.name.split(/[-_./]/).filter(pp => pp.length > 2));
    const nameParts = [...itemParts].filter(pp => srcParts.has(pp)).length;
    score += nameParts * 10;

    item.altScore = score;
    item.keywordOverlap = overlap;
    return item;
  }).sort((a, b) => b.altScore - a.altScore);
}

function renderSource(name, desc, keywords, version, downloads, latestVer) {
  const size = latestVer.dist?.unpackedSize;
  const sizeStr = size ? formatBytes(size) : '—';
  const license = latestVer.license || '—';

  return `<div class="source-pkg">
    <h2 ti="h2_esc_name" ti="h2_esc_name" ti="h2_esc_name" ti="h2_esc_name" ti="h2_esc_name">${esc(name)}</h2>
    <div class="desc">${esc(desc)}</div>
    <div class="meta">
      <span>v${esc(version)}</span>
      <span>${formatNum(downloads)}/week</span>
      <span>${esc(sizeStr)}</span>
      <span>${esc(license)}</span>
    </div>
    ${keywords.length ? `<div class="kw-list">${keywords.map(k => `<span class="kw">${esc(k)}</span>`).join('')}</div>` : ''}
  </div>`;
}

let currentSort = 'relevance';

function renderResults(items, srcDownloads) {
  const sortHtml = `<div class="results-header">
    <h3 ti="h3_alternatives" ti="h3_alternatives" ti="h3_alternatives" ti="h3_alternatives" ti="h3_alternatives">Alternatives</h3>
    <select class="sort-select" onchange="resort(this.value)">
      <option value="relevance">Sort: Relevance</option>
      <option value="downloads">Sort: Downloads</option>
      <option value="quality">Sort: Quality</option>
      <option value="maintenance">Sort: Maintenance</option>
    </select>
  </div>`;

  resultsEl.innerHTML = sortHtml + '<div class="alt-grid" id="altGrid"></div>';
  resultsEl._items = items;
  resultsEl._srcDl = srcDownloads;
  renderGrid(items, srcDownloads);
}

function renderGrid(items, srcDownloads) {
  const grid = document.getElementById('altGrid');
  grid.innerHTML = items.map(item => {
    const p = item.package;
    const dl = item.weeklyDownloads || 0;
    const quality = item.score?.detail?.quality || 0;
    const maintenance = item.score?.detail?.maintenance || 0;
    const popularity = item.score?.detail?.popularity || 0;

    // Match level
    const matchPct = Math.min(100, Math.round(item.altScore));
    let matchClass = 'match-low', matchLabel = 'Low match';
    if (matchPct >= 60) { matchClass = 'match-high'; matchLabel = 'High match'; }
    else if (matchPct >= 30) { matchClass = 'match-mid'; matchLabel = 'Medium match'; }

    // Download comparison
    const dlRatio = srcDownloads > 0 ? (dl / srcDownloads) : 0;
    let dlComp = '';
    if (srcDownloads > 0) {
      if (dlRatio > 1) dlComp = `<span style="color:var(--green)">↑ ${(dlRatio).toFixed(1)}×</span>`;
      else if (dlRatio > 0.5) dlComp = `<span style="color:var(--yellow)">≈ ${Math.round(dlRatio*100)}%</span>`;
      else dlComp = `<span style="color:var(--muted)">${Math.round(dlRatio*100)}%</span>`;
    }

    return `<div class="alt-card">
      <div class="top">
        <div>
          <h4><a href="https://www.npmjs.com/package/${encodeURIComponent(p.name)}" target="_blank">${esc(p.name)}</a></h4>
          <span class="ver">v${esc(p.version)} · ${esc(p.license || '—')}</span>
        </div>
        <span class="match-badge ${matchClass}">${matchLabel}</span>
      </div>
      <div class="desc">${esc(p.description || '')}</div>
      <div class="stats">
        <div class="stat">
          <div class="label">Weekly Downloads</div>
          <div class="value">${formatNum(dl)} ${dlComp}</div>
        </div>
        <div class="stat">
          <div class="label">Quality</div>
          <div class="value">${Math.round(quality*100)}%</div>
          <div class="score-bar"><div class="fill" style="width:${quality*100}%;background:${barColor(quality)}"></div></div>
        </div>
        <div class="stat">
          <div class="label">Maintenance</div>
          <div class="value">${Math.round(maintenance*100)}%</div>
          <div class="score-bar"><div class="fill" style="width:${maintenance*100}%;background:${barColor(maintenance)}"></div></div>
        </div>
        <div class="stat">
          <div class="label">Popularity</div>
          <div class="value">${Math.round(popularity*100)}%</div>
          <div class="score-bar"><div class="fill" style="width:${popularity*100}%;background:${barColor(popularity)}"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function resort(by) {
  currentSort = by;
  const items = [...resultsEl._items];
  if (by === 'downloads') items.sort((a,b) => (b.weeklyDownloads||0) - (a.weeklyDownloads||0));
  else if (by === 'quality') items.sort((a,b) => (b.score?.detail?.quality||0) - (a.score?.detail?.quality||0));
  else if (by === 'maintenance') items.sort((a,b) => (b.score?.detail?.maintenance||0) - (a.score?.detail?.maintenance||0));
  else items.sort((a,b) => b.altScore - a.altScore);
  renderGrid(items, resultsEl._srcDl);
}

function barColor(v) {
  if (v >= 0.7) return 'var(--green)';
  if (v >= 0.4) return 'var(--yellow)';
  return 'var(--red)';
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function formatBytes(b) {
  if (b >= 1e6) return (b/1e6).toFixed(1) + ' MB';
  if (b >= 1e3) return (b/1e3).toFixed(1) + ' KB';
  return b + ' B';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
