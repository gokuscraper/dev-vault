<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Text — Gradient Typography Generator</title>
<meta name="description" content="Generate beautiful CSS gradient text effects. Live preview with linear, radial, and conic gradients, animation, and text stroke options.">
<link rel="canonical" href="https://yurukusa.github.io/gradient-text/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Gradient Text","description":"Generate beautiful CSS gradient text effects with live preview.","url":"https://yurukusa.github.io/gradient-text/","applicationCategory":"DesignApplication","operatingSystem":"All","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:20px}
h1{text-align:center;font-size:1.4rem;margin-bottom:20px;color:#4da6ff}
.layout{display:grid;grid-template-columns:320px 1fr;gap:20px;max-width:1200px;margin:0 auto}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
.card{background:#161616;border-radius:10px;padding:20px;border:1px solid #222}
.card h2{font-size:.95rem;color:#4da6ff;margin-bottom:14px;border-bottom:1px solid #222;padding-bottom:8px}
label{display:block;font-size:.8rem;color:#999;margin-bottom:4px;margin-top:10px}
input[type=text],select{width:100%;background:#0a0a0a;border:1px solid #333;color:#e0e0e0;padding:7px 10px;border-radius:6px;font-size:.85rem}
input[type=range]{width:100%;accent-color:#4da6ff;margin:4px 0}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1}
.range-val{font-size:.75rem;color:#4da6ff;min-width:40px;text-align:right}
.color-stop{display:flex;align-items:center;gap:6px;margin:6px 0;padding:8px;background:#0a0a0a;border-radius:6px}
.color-stop input[type=color]{width:36px;height:28px;border:none;background:none;cursor:pointer}
.color-stop input[type=range]{flex:1}
.color-stop .pos-val{font-size:.75rem;color:#888;min-width:30px}
.btn-rm{background:none;border:none;color:#ff4d4d;cursor:pointer;font-size:1rem;padding:0 4px}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{padding:7px 14px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#e0e0e0;cursor:pointer;font-size:.8rem;transition:background .15s}
.btn:hover{background:#252525}
.btn-accent{background:#4da6ff;color:#000;border-color:#4da6ff;font-weight:600}
.btn-accent:hover{background:#3a8fdf}
.presets{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
.preset-btn{padding:6px 8px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#ccc;cursor:pointer;font-size:.75rem;text-align:center;transition:border-color .15s}
.preset-btn:hover{border-color:#4da6ff}
.preview-area{display:flex;align-items:center;justify-content:center;min-height:200px;padding:30px;text-align:center;word-break:break-word}
#previewText{font-size:64px;font-weight:700;line-height:1.2;transition:font-size .2s}
.code-box{position:relative;background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:14px;margin-top:12px;font-family:'Courier New',monospace;font-size:.8rem;color:#a8d8a8;white-space:pre-wrap;word-break:break-all;max-height:220px;overflow:auto}
.copy-wrap{position:absolute;top:8px;right:8px}
.check-row{display:flex;align-items:center;gap:6px;margin-top:10px}
.check-row input[type=checkbox]{accent-color:#4da6ff}
.check-row label{margin:0;cursor:pointer}
.dir-presets{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.dir-btn{padding:3px 8px;border-radius:4px;border:1px solid #333;background:#0a0a0a;color:#999;cursor:pointer;font-size:.7rem}
.dir-btn:hover,.dir-btn.active{border-color:#4da6ff;color:#4da6ff}
.stroke-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.stroke-row input[type=color]{width:32px;height:24px;border:none;background:none}
footer{text-align:center;margin-top:30px;padding:20px;font-size:.8rem;color:#666}
footer a{color:#4da6ff;text-decoration:none}
footer a:hover{text-decoration:underline}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
</style>
</head>
<body>
<h1>CSS Gradient Text &mdash; Gradient Typography Generator</h1>
<div class="layout">
<div class="controls">
  <div class="card">
    <h2>Text</h2>
    <label for="textInput">Preview Text</label>
    <input type="text" id="textInput" value="Hello World">
    <label>Font Size</label>
    <div class="range-row"><input type="range" id="fontSize" min="16" max="120" value="64"><span class="range-val" id="fontSizeVal">64px</span></div>
    <label>Font Weight</label>
    <select id="fontWeight"><option value="100">100</option><option value="200">200</option><option value="300">300</option><option value="400">400</option><option value="500">500</option><option value="600">600</option><option value="700" selected>700</option><option value="800">800</option><option value="900">900</option></select>
  </div>
  <div class="card" style="margin-top:12px">
    <h2>Gradient</h2>
    <label>Type</label>
    <select id="gradType"><option value="linear">Linear</option><option value="radial">Radial</option><option value="conic">Conic</option></select>
    <label>Angle</label>
    <div class="range-row"><input type="range" id="gradAngle" min="0" max="360" value="90"><span class="range-val" id="gradAngleVal">90&deg;</span></div>
    <div class="dir-presets" id="dirPresets"></div>
    <label>Color Stops</label>
    <div id="stopsContainer"></div>
    <div class="btn-row"><button class="btn" id="addStop">+ Add Stop</button></div>
  </div>
  <div class="card" style="margin-top:12px">
    <h2>Effects</h2>
    <div class="check-row"><input type="checkbox" id="animToggle"><label for="animToggle">Animate gradient</label></div>
    <div class="check-row"><input type="checkbox" id="strokeToggle"><label for="strokeToggle">Text stroke</label></div>
    <div class="stroke-row" id="strokeOpts" style="display:none">
      <input type="color" id="strokeColor" value="#ffffff">
      <input type="range" id="strokeWidth" min="1" max="6" value="2" style="flex:1">
      <span class="range-val" id="strokeWidthVal">2px</span>
    </div>
  </div>
  <div class="card" style="margin-top:12px">
    <h2>Presets</h2>
    <div class="presets" id="presetGrid"></div>
  </div>
</div>
<div class="right">
  <div class="card">
    <h2>Preview</h2>
    <div class="preview-area"><span id="previewText">Hello World</span></div>
  </div>
  <div class="card" style="margin-top:12px">
    <h2>CSS Output</h2>
    <div class="code-box" id="cssOutput"><div class="copy-wrap"><button class="btn btn-accent" id="copyBtn">Copy CSS</button></div></div>
  </div>
</div>
</div>
<footer>
  <a href="https://yurukusa.github.io/dev-toolkit/">dev-toolkit</a> &nbsp;|&nbsp;
  Related: <a href="https://yurukusa.github.io/css-gradient/">CSS Gradient</a> &middot;
  <a href="https://yurukusa.github.io/text-transform/">Text Transform</a> &middot;
  <a href="https://yurukusa.github.io/css-animation/">CSS Animation</a>
</footer>
<script>
const $ = s => document.getElementById(s);
const PRESETS = [
  {name:'Sunset',colors:['#ff512f','#f09819'],angle:90},
  {name:'Ocean',colors:['#2193b0','#6dd5ed'],angle:90},
  {name:'Fire',colors:['#f12711','#f5af19'],angle:90},
  {name:'Rainbow',colors:['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#8800ff'],angle:90},
  {name:'Neon',colors:['#ff00ff','#00ffff'],angle:90},
  {name:'Forest',colors:['#134e5e','#71b280'],angle:135},
  {name:'Gold',colors:['#f7971e','#ffd200'],angle:90},
  {name:'Galaxy',colors:['#654ea3','#eaafc8'],angle:135},
  {name:'Cotton Candy',colors:['#f093fb','#f5576c'],angle:90},
  {name:'Aurora',colors:['#00c9ff','#92fe9d'],angle:120}
];

let stops = [{color:'#ff0000',pos:0},{color:'#0000ff',pos:100}];

function init(){
  const grid = $('presetGrid');
  PRESETS.forEach((p,i) => {
    const b = document.createElement('button');
    b.className = 'preset-btn';
    b.textContent = p.name;
    b.style.background = `linear-gradient(90deg, ${p.colors.join(', ')})`;
    b.style.color = '#fff';
    b.style.textShadow = '0 1px 2px rgba(0,0,0,.6)';
    b.onclick = () => applyPreset(i);
    grid.appendChild(b);
  });
  const dirs = [['0','to top'],['90','to right'],['180','to bottom'],['270','to left'],['45','to top right'],['135','to bottom right'],['225','to bottom left'],['315','to top left']];
  const dp = $('dirPresets');
  dirs.forEach(([a,l]) => {
    const b = document.createElement('button');
    b.className = 'dir-btn';
    b.textContent = l;
    b.dataset.angle = a;
    b.onclick = () => { $('gradAngle').value = a; update(); };
    dp.appendChild(b);
  });
  renderStops();
  bind();
  update();
}

function bind(){
  ['textInput','fontSize','fontWeight','gradType','gradAngle','animToggle','strokeToggle','strokeColor','strokeWidth'].forEach(id => {
    $(id).addEventListener('input', update);
    $(id).addEventListener('change', update);
  });
  $('addStop').onclick = () => {
    if(stops.length >= 5) return;
    const last = stops[stops.length-1].pos;
    stops.push({color:'#ffffff', pos: Math.min(100, last)});
    redistributePositions();
    renderStops(); update();
  };
  $('copyBtn').onclick = copyCSS;
  $('strokeToggle').addEventListener('change', () => {
    $('strokeOpts').style.display = $('strokeToggle').checked ? 'flex' : 'none';
    update();
  });
}

function redistributePositions(){
  const n = stops.length;
  stops.forEach((s,i) => s.pos = Math.round(i/(n-1)*100));
}

function renderStops(){
  const c = $('stopsContainer');
  c.innerHTML = '';
  stops.forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'color-stop';
    d.innerHTML = `<input type="color" value="${s.color}" data-i="${i}" data-f="color"><input type="range" min="0" max="100" value="${s.pos}" data-i="${i}" data-f="pos"><span class="pos-val">${s.pos}%</span>${stops.length > 2 ? `<button class="btn-rm" data-i="${i}">&times;</button>` : ''}`;
    c.appendChild(d);
  });
  c.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = +e.target.dataset.i, f = e.target.dataset.f;
      stops[idx][f] = f === 'pos' ? +e.target.value : e.target.value;
      if(f === 'pos') e.target.nextElementSibling.textContent = e.target.value + '%';
      update();
    });
  });
  c.querySelectorAll('.btn-rm').forEach(b => {
    b.onclick = e => { stops.splice(+e.target.dataset.i, 1); renderStops(); update(); };
  });
}

function applyPreset(i){
  const p = PRESETS[i];
  const n = p.colors.length;
  stops = p.colors.map((c,j) => ({color:c, pos:Math.round(j/(n-1)*100)}));
  $('gradAngle').value = p.angle;
  $('gradType').value = 'linear';
  renderStops(); update();
}

function buildGradient(){
  const type = $('gradType').value;
  const angle = $('gradAngle').value;
  const colorStr = stops.map(s => `${s.color} ${s.pos}%`).join(', ');
  if(type === 'linear') return `linear-gradient(${angle}deg, ${colorStr})`;
  if(type === 'radial') return `radial-gradient(circle, ${colorStr})`;
  return `conic-gradient(from ${angle}deg, ${colorStr})`;
}

function update(){
  const el = $('previewText');
  const text = $('textInput').value || 'Hello World';
  const fs = $('fontSize').value;
  const fw = $('fontWeight').value;
  const anim = $('animToggle').checked;
  const stroke = $('strokeToggle').checked;
  const grad = buildGradient();

  el.textContent = text;
  el.style.fontSize = fs + 'px';
  el.style.fontWeight = fw;
  el.style.background = grad;
  el.style.webkitBackgroundClip = 'text';
  el.style.webkitTextFillColor = 'transparent';
  el.style.backgroundClip = 'text';

  if(anim){
    el.style.backgroundSize = '200% 200%';
    el.style.animation = 'gradientShift 3s ease infinite';
  } else {
    el.style.backgroundSize = '';
    el.style.animation = '';
  }

  if(stroke){
    const sc = $('strokeColor').value;
    const sw = $('strokeWidth').value;
    el.style.webkitTextStroke = `${sw}px ${sc}`;
    $('strokeWidthVal').textContent = sw + 'px';
  } else {
    el.style.webkitTextStroke = '';
  }

  $('fontSizeVal').textContent = fs + 'px';
  $('gradAngleVal').innerHTML = $('gradAngle').value + '&deg;';

  document.querySelectorAll('.dir-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.angle === $('gradAngle').value);
  });

  updateCSS(grad, anim, stroke);
}

function updateCSS(grad, anim, stroke){
  let css = `.gradient-text {\n  background: ${grad};\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;`;
  if(anim) css += `\n  background-size: 200% 200%;\n  animation: gradientShift 3s ease infinite;`;
  if(stroke) css += `\n  -webkit-text-stroke: ${$('strokeWidth').value}px ${$('strokeColor').value};`;
  css += '\n}';
  if(anim) css += '\n\n@keyframes gradientShift {\n  0% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n  100% { background-position: 0% 50%; }\n}';
  const out = $('cssOutput');
  const copyWrap = out.querySelector('.copy-wrap').outerHTML;
  out.innerHTML = copyWrap + '\n' + css.replace(/</g,'&lt;');
  out.querySelector('#copyBtn').onclick = copyCSS;
}

function copyCSS(){
  const text = $('cssOutput').textContent.replace('Copy CSS','').trim();
  navigator.clipboard.writeText(text).then(() => {
    const b = $('copyBtn');
    b.textContent = 'Copied!';
    setTimeout(() => b.textContent = 'Copy CSS', 1500);
  });
}

init();
</script>
</body>
</html>
