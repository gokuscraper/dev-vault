<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Container Queries Playground — Dev Vault</title>
<meta name="description" content="Interactive container queries playground. Resize containers, see @container rules trigger in real-time. Visual CSS container query builder.">
<meta property="og:title" content="CSS Container Queries Playground — Dev Vault">
<meta property="og:description" content="Interactive container queries playground. Resize containers, see @container rules trigger in real-time. Visual CSS container query builder.">
<meta property="og:type" content="website">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="CSS Container Queries Playground — Dev Vault">
<meta name="twitter:description" content="Interactive container queries playground. Resize containers, see @container rules trigger in real-time. Visual CSS container query builder.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-surface: #1a1a1a;
  --bg-input: #222222;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #e6e6e6;
  --text-secondary: #999;
  --text-dim: #666;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-glow: rgba(59, 130, 246, 0.15);
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 .icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.header .badge {
  font-size: 0.75rem;
  background: var(--accent-glow);
  color: var(--accent);
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 500;
}

/* Layout */
.app {
  display: flex;
  height: calc(100vh - 57px);
}
.controls-panel {
  width: 380px;
  min-width: 380px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg-elevated);
}
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Controls */
.section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

/* Presets */
.presets-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.preset-btn {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 500;
  text-align: left;
  transition: all 0.15s;
}
.preset-btn:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.preset-btn.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}
.preset-btn .preset-icon {
  font-size: 1.1rem;
  margin-bottom: 4px;
  display: block;
}
.preset-btn .preset-label {
  display: block;
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Form controls */
.control-group {
  margin-bottom: 14px;
}
.control-group:last-child { margin-bottom: 0; }
.control-label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
}

.radio-group {
  display: flex;
  gap: 6px;
}
.radio-btn {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.75rem;
  text-align: center;
  transition: all 0.15s;
}
.radio-btn:hover { border-color: var(--border-hover); }
.radio-btn.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
}

.text-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.15s;
}
.text-input:focus { border-color: var(--accent); }

/* Rule editor */
.rules-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.rule-item {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.rule-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.rule-condition {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
}
.rule-condition select, .rule-condition input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.8rem;
  outline: none;
}
.rule-condition select { cursor: pointer; }
.rule-condition input[type="number"] { width: 70px; }
.rule-css-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.8rem;
  outline: none;
  resize: vertical;
  min-height: 50px;
}
.rule-css-input:focus { border-color: var(--accent); }

.remove-rule-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1rem;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.15s;
}
.remove-rule-btn:hover { color: var(--red); background: rgba(239, 68, 68, 0.1); }

.add-rule-btn {
  width: 100%;
  background: var(--bg-input);
  border: 1px dashed var(--border);
  color: var(--text-secondary);
  padding: 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.85rem;
  transition: all 0.15s;
  margin-top: 8px;
}
.add-rule-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* CSS Output */
.css-output-section {
  position: relative;
}
.css-output {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-family: var(--mono);
  font-size: 0.78rem;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-secondary);
  max-height: 300px;
  overflow-y: auto;
}
.css-output .kw { color: var(--accent); }
.css-output .prop { color: #c084fc; }
.css-output .val { color: var(--green); }
.css-output .num { color: var(--orange); }
.css-output .brace { color: var(--text-dim); }

.copy-btn {
  position: absolute;
  top: 40px;
  right: 28px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 500;
  transition: all 0.15s;
  z-index: 2;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }

/* Preview area */
.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.preview-header h2 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.width-indicator {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  min-width: 60px;
  text-align: right;
}
.active-queries {
  font-size: 0.75rem;
  color: var(--green);
  margin-left: 12px;
}

.preview-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background: var(--bg);
  overflow: auto;
}

/* Resizable container */
.resizable-wrapper {
  position: relative;
  max-width: 100%;
}
.resizable-container {
  background: var(--bg-surface);
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  overflow: hidden;
  min-width: 120px;
  min-height: 100px;
  transition: border-color 0.2s;
  position: relative;
}
.resizable-container.resizing {
  border-color: var(--accent);
  border-style: solid;
}

/* Drag handle */
.resize-handle {
  position: absolute;
  right: -6px;
  top: 0;
  bottom: 0;
  width: 12px;
  cursor: col-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.resize-handle::before {
  content: '';
  width: 4px;
  height: 40px;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.15s;
}
.resize-handle:hover::before,
.resize-handle.active::before {
  background: var(--accent);
}

/* Width ruler */
.width-ruler {
  height: 20px;
  margin-bottom: 8px;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.ruler-label {
  position: absolute;
  top: 2px;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  transform: translateX(-50%);
}
.ruler-tick {
  position: absolute;
  bottom: 0;
  width: 1px;
  height: 8px;
  background: var(--border);
}

/* Preview content styles: these are the demo elements inside the container */
.preview-card {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.preview-card .card-image {
  width: 100%;
  height: 80px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 8px;
  flex-shrink: 0;
}
.preview-card .card-body { flex: 1; }
.preview-card .card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}
.preview-card .card-text {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.preview-card .card-meta {
  display: flex;
  gap: 12px;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.preview-card .card-btn {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  margin-top: 8px;
}

/* Nav preview */
.preview-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.preview-nav .nav-item {
  padding: 8px 14px;
  background: var(--bg-input);
  border-radius: 6px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.preview-nav .nav-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* Grid preview */
.preview-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.preview-grid .grid-item {
  background: var(--bg-input);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.preview-grid .grid-item .grid-num {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}

/* Sidebar preview */
.preview-sidebar-layout {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 200px;
}
.preview-sidebar-layout .sidebar {
  background: var(--bg-input);
  border-radius: 8px;
  padding: 12px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: none;
}
.preview-sidebar-layout .sidebar .sidebar-title {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.preview-sidebar-layout .sidebar .sidebar-link {
  padding: 4px 0;
  color: var(--text-dim);
}
.preview-sidebar-layout .main-content {
  flex: 1;
  background: var(--bg-input);
  border-radius: 8px;
  padding: 16px;
}
.preview-sidebar-layout .main-content .content-title {
  font-weight: 600;
  margin-bottom: 8px;
}
.preview-sidebar-layout .main-content .content-text {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* Responsive fallback for narrow screens */
@media (max-width: 800px) {
  .app { flex-direction: column; height: auto; }
  .controls-panel { width: 100%; min-width: 0; max-height: 50vh; }
  .preview-area { padding: 20px; min-height: 400px; }
}
</style>
</head>
<body>

<header class="header">
  <h1>
    <span class="icon">@</span>
    Container Queries Playground
  </h1>
  <span class="badge">Dev Vault</span>
</header>

<div class="app">
  <!-- Controls Panel -->
  <div class="controls-panel">

    <!-- Presets -->
    <div class="section">
      <div class="section-title">Presets</div>
      <div class="presets-grid">
        <button class="preset-btn active" data-preset="card">
          <span class="preset-icon">&#9634;</span>
          Responsive Card
          <span class="preset-label">Layout shifts</span>
        </button>
        <button class="preset-btn" data-preset="nav">
          <span class="preset-icon">&#9776;</span>
          Navigation
          <span class="preset-label">H &#8596; V</span>
        </button>
        <button class="preset-btn" data-preset="grid">
          <span class="preset-icon">&#9638;</span>
          Grid Layout
          <span class="preset-label">1&#8594;2&#8594;3 cols</span>
        </button>
        <button class="preset-btn" data-preset="sidebar">
          <span class="preset-icon">&#9881;</span>
          Sidebar
          <span class="preset-label">Show/hide</span>
        </button>
      </div>
    </div>

    <!-- Container Settings -->
    <div class="section">
      <div class="section-title">Container Settings</div>
      <div class="control-group">
        <label class="control-label">container-type</label>
        <div class="radio-group" id="containerTypeGroup">
          <button class="radio-btn active" data-value="inline-size">inline-size</button>
          <button class="radio-btn" data-value="size">size</button>
          <button class="radio-btn" data-value="normal">normal</button>
        </div>
      </div>
      <div class="control-group">
        <label class="control-label">container-name</label>
        <input type="text" class="text-input" id="containerName" value="card" placeholder="e.g. card, sidebar, layout">
      </div>
    </div>

    <!-- Container Query Rules -->
    <div class="section">
      <div class="section-title">@container Rules</div>
      <div class="rules-list" id="rulesList"></div>
      <button class="add-rule-btn" id="addRuleBtn">+ Add Rule</button>
    </div>

    <!-- CSS Output -->
    <div class="section css-output-section">
      <div class="section-title">Generated CSS</div>
      <button class="copy-btn" id="copyBtn">Copy</button>
      <div class="css-output" id="cssOutput"></div>
    </div>

  </div>

  <!-- Preview Panel -->
  <div class="preview-panel">
    <div class="preview-header">
      <h2>Live Preview</h2>
      <div style="display:flex;align-items:center;">
        <span class="active-queries" id="activeQueries"></span>
        <span class="width-indicator" id="widthIndicator">400px</span>
      </div>
    </div>
    <div class="preview-area">
      <div class="resizable-wrapper">
        <div class="width-ruler" id="widthRuler"></div>
        <div style="position:relative;display:inline-block;width:400px;" id="resizableOuter">
          <div class="resizable-container" id="previewContainer">
            <div id="previewContent"></div>
          </div>
          <div class="resize-handle" id="resizeHandle"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Dynamic style injection -->
<style id="dynamicStyles"></style>

<script>
(function() {
  'use strict';

  // State
  const state = {
    preset: 'card',
    containerType: 'inline-size',
    containerName: 'card',
    containerWidth: 400,
    rules: []
  };

  // DOM
  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

  const els = {
    containerTypeGroup: $('#containerTypeGroup'),
    containerName: $('#containerName'),
    rulesList: $('#rulesList'),
    addRuleBtn: $('#addRuleBtn'),
    cssOutput: $('#cssOutput'),
    copyBtn: $('#copyBtn'),
    previewContainer: $('#previewContainer'),
    previewContent: $('#previewContent'),
    resizableOuter: $('#resizableOuter'),
    resizeHandle: $('#resizeHandle'),
    widthIndicator: $('#widthIndicator'),
    widthRuler: $('#widthRuler'),
    activeQueries: $('#activeQueries'),
    dynamicStyles: $('#dynamicStyles')
  };

  // Presets
  const presets = {
    card: {
      containerName: 'card',
      containerType: 'inline-size',
      width: 400,
      rules: [
        { feature: 'min-width', value: 350, css: '.preview-card {\n  flex-direction: row;\n}\n.preview-card .card-image {\n  width: 120px;\n  height: auto;\n  min-height: 100px;\n}' },
        { feature: 'min-width', value: 500, css: '.preview-card .card-image {\n  width: 180px;\n}\n.preview-card .card-btn {\n  align-self: flex-end;\n}' }
      ],
      html: `<div class="preview-card">
  <div class="card-image"></div>
  <div class="card-body">
    <div class="card-title">Container Queries</div>
    <div class="card-text">This card adapts its layout based on container width, not viewport width.</div>
    <div class="card-meta"><span>3 min read</span><span>CSS</span></div>
    <span class="card-btn">Read more</span>
  </div>
</div>`
    },
    nav: {
      containerName: 'nav',
      containerType: 'inline-size',
      width: 400,
      rules: [
        { feature: 'min-width', value: 400, css: '.preview-nav {\n  flex-direction: row;\n  gap: 6px;\n}\n.preview-nav .nav-item {\n  flex: 1;\n  justify-content: center;\n}' }
      ],
      html: `<div class="preview-nav">
  <div class="nav-item"><span class="dot"></span> Home</div>
  <div class="nav-item"><span class="dot"></span> About</div>
  <div class="nav-item"><span class="dot"></span> Work</div>
  <div class="nav-item"><span class="dot"></span> Contact</div>
</div>`
    },
    grid: {
      containerName: 'grid',
      containerType: 'inline-size',
      width: 400,
      rules: [
        { feature: 'min-width', value: 350, css: '.preview-grid {\n  grid-template-columns: 1fr 1fr;\n}' },
        { feature: 'min-width', value: 550, css: '.preview-grid {\n  grid-template-columns: 1fr 1fr 1fr;\n}' }
      ],
      html: `<div class="preview-grid">
  <div class="grid-item"><div class="grid-num">1</div>Item</div>
  <div class="grid-item"><div class="grid-num">2</div>Item</div>
  <div class="grid-item"><div class="grid-num">3</div>Item</div>
  <div class="grid-item"><div class="grid-num">4</div>Item</div>
  <div class="grid-item"><div class="grid-num">5</div>Item</div>
  <div class="grid-item"><div class="grid-num">6</div>Item</div>
</div>`
    },
    sidebar: {
      containerName: 'layout',
      containerType: 'inline-size',
      width: 400,
      rules: [
        { feature: 'min-width', value: 450, css: '.preview-sidebar-layout {\n  flex-direction: row;\n}\n.preview-sidebar-layout .sidebar {\n  display: block;\n  width: 140px;\n  flex-shrink: 0;\n}' }
      ],
      html: `<div class="preview-sidebar-layout">
  <div class="sidebar">
    <div class="sidebar-title">Sidebar</div>
    <div class="sidebar-link">Dashboard</div>
    <div class="sidebar-link">Analytics</div>
    <div class="sidebar-link">Settings</div>
    <div class="sidebar-link">Help</div>
  </div>
  <div class="main-content">
    <div class="content-title">Main Content</div>
    <div class="content-text">When the container is wide enough, the sidebar appears alongside the content. Resize to see it disappear.</div>
  </div>
</div>`
    }
  };

  // Load preset
  function loadPreset(name) {
    const preset = presets[name];
    if (!preset) return;

    state.preset = name;
    state.containerName = preset.containerName;
    state.containerType = preset.containerType;
    state.containerWidth = preset.width;
    state.rules = preset.rules.map(r => ({ ...r }));

    // Update UI
    els.containerName.value = preset.containerName;
    $$('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
    $$('.radio-btn', els.containerTypeGroup).forEach(b => b.classList.toggle('active', b.dataset.value === preset.containerType));
    els.resizableOuter.style.width = preset.width + 'px';

    renderRules();
    applyAll();
  }

  // Render rule editors
  function renderRules() {
    els.rulesList.innerHTML = '';
    state.rules.forEach((rule, i) => {
      const item = document.createElement('div');
      item.className = 'rule-item';
      item.innerHTML = `
        <div class="rule-header">
          <div class="rule-condition">
            <span style="color:var(--accent);font-family:var(--mono);font-size:0.8rem;">@container</span>
            <select data-idx="${i}" data-field="feature">
              <option value="min-width" ${rule.feature === 'min-width' ? 'selected' : ''}>min-width</option>
              <option value="max-width" ${rule.feature === 'max-width' ? 'selected' : ''}>max-width</option>
            </select>
            <input type="number" data-idx="${i}" data-field="value" value="${rule.value}" min="0" max="2000" step="10">
            <span style="color:var(--text-dim);font-family:var(--mono);font-size:0.8rem;">px</span>
          </div>
          <button class="remove-rule-btn" data-idx="${i}" title="Remove rule">&times;</button>
        </div>
        <textarea class="rule-css-input" data-idx="${i}" data-field="css" rows="3" spellcheck="false">${escapeHtml(rule.css)}</textarea>
      `;
      els.rulesList.appendChild(item);
    });
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Apply container styles + @container rules
  function applyAll() {
    const name = state.containerName.trim();
    const type = state.containerType;

    // Container setup
    let css = `#previewContainer {\n  container-type: ${type};\n`;
    if (name) css += `  container-name: ${name};\n`;
    css += '}\n\n';

    // Rules
    state.rules.forEach(rule => {
      const cond = `(${rule.feature}: ${rule.value}px)`;
      if (name) {
        css += `@container ${name} ${cond} {\n`;
      } else {
        css += `@container ${cond} {\n`;
      }
      // Indent rule CSS
      const lines = rule.css.split('\n');
      lines.forEach(line => { css += '  ' + line + '\n'; });
      css += '}\n\n';
    });

    els.dynamicStyles.textContent = css;
    updateCSSOutput(css);
    updateWidthIndicator();
    updateActiveQueries();
    updateRuler();
  }

  // CSS output with syntax highlighting
  function updateCSSOutput(css) {
    const highlighted = css
      .replace(/@container/g, '<span class="kw">@container</span>')
      .replace(/(min-width|max-width|container-type|container-name)/g, '<span class="prop">$1</span>')
      .replace(/(\d+)(px)/g, '<span class="num">$1</span><span class="val">$2</span>')
      .replace(/(inline-size|size|normal)/g, '<span class="val">$1</span>')
      .replace(/([{}])/g, '<span class="brace">$1</span>');
    els.cssOutput.innerHTML = highlighted;
  }

  function updateWidthIndicator() {
    const w = Math.round(els.resizableOuter.getBoundingClientRect().width);
    state.containerWidth = w;
    els.widthIndicator.textContent = w + 'px';
  }

  function updateActiveQueries() {
    const w = state.containerWidth;
    let active = 0;
    state.rules.forEach(rule => {
      if (rule.feature === 'min-width' && w >= rule.value) active++;
      if (rule.feature === 'max-width' && w <= rule.value) active++;
    });
    if (active > 0) {
      els.activeQueries.textContent = active + ' quer' + (active === 1 ? 'y' : 'ies') + ' active';
    } else {
      els.activeQueries.textContent = '';
    }
  }

  // Width ruler
  function updateRuler() {
    const w = state.containerWidth;
    els.widthRuler.style.width = w + 'px';
    els.widthRuler.innerHTML = '';

    const step = w < 300 ? 100 : w < 600 ? 100 : 200;
    for (let x = 0; x <= w; x += step) {
      if (x === 0) continue;
      const pct = (x / w) * 100;
      els.widthRuler.innerHTML += `<span class="ruler-tick" style="left:${pct}%"></span><span class="ruler-label" style="left:${pct}%">${x}</span>`;
    }

    // Mark breakpoints
    state.rules.forEach(rule => {
      const bpPx = rule.value;
      if (bpPx <= w) {
        const pct = (bpPx / w) * 100;
        const active = (rule.feature === 'min-width' && w >= bpPx) || (rule.feature === 'max-width' && w <= bpPx);
        const color = active ? 'var(--green)' : 'var(--red)';
        els.widthRuler.innerHTML += `<span class="ruler-tick" style="left:${pct}%;background:${color};height:14px;width:2px;z-index:1;"></span>`;
      }
    });
  }

  // Render preview content
  function renderPreviewContent() {
    els.previewContent.innerHTML = presets[state.preset].html;
  }

  // Drag resize
  let dragging = false;
  let dragStartX = 0;
  let startWidth = 0;

  els.resizeHandle.addEventListener('mousedown', e => {
    e.preventDefault();
    dragging = true;
    dragStartX = e.clientX;
    startWidth = els.resizableOuter.getBoundingClientRect().width;
    els.resizeHandle.classList.add('active');
    els.previewContainer.classList.add('resizing');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - dragStartX;
    const newWidth = Math.max(120, Math.min(1200, startWidth + delta));
    els.resizableOuter.style.width = newWidth + 'px';
    updateWidthIndicator();
    updateActiveQueries();
    updateRuler();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    els.resizeHandle.classList.remove('active');
    els.previewContainer.classList.remove('resizing');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Touch support for resize
  els.resizeHandle.addEventListener('touchstart', e => {
    e.preventDefault();
    dragging = true;
    dragStartX = e.touches[0].clientX;
    startWidth = els.resizableOuter.getBoundingClientRect().width;
    els.resizeHandle.classList.add('active');
    els.previewContainer.classList.add('resizing');
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const delta = e.touches[0].clientX - dragStartX;
    const newWidth = Math.max(120, Math.min(1200, startWidth + delta));
    els.resizableOuter.style.width = newWidth + 'px';
    updateWidthIndicator();
    updateActiveQueries();
    updateRuler();
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    els.resizeHandle.classList.remove('active');
    els.previewContainer.classList.remove('resizing');
  });

  // Preset buttons
  $$('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      loadPreset(btn.dataset.preset);
      renderPreviewContent();
    });
  });

  // Container type buttons
  els.containerTypeGroup.addEventListener('click', e => {
    const btn = e.target.closest('.radio-btn');
    if (!btn) return;
    $$('.radio-btn', els.containerTypeGroup).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.containerType = btn.dataset.value;
    applyAll();
  });

  // Container name input
  els.containerName.addEventListener('input', () => {
    state.containerName = els.containerName.value;
    applyAll();
  });

  // Rule events (delegated)
  els.rulesList.addEventListener('input', e => {
    const idx = parseInt(e.target.dataset.idx);
    const field = e.target.dataset.field;
    if (isNaN(idx) || !field) return;

    if (field === 'value') {
      state.rules[idx].value = parseInt(e.target.value) || 0;
    } else if (field === 'css') {
      state.rules[idx].css = e.target.value;
    }
    applyAll();
  });

  els.rulesList.addEventListener('change', e => {
    const idx = parseInt(e.target.dataset.idx);
    const field = e.target.dataset.field;
    if (isNaN(idx) || !field) return;

    if (field === 'feature') {
      state.rules[idx].feature = e.target.value;
      applyAll();
    }
  });

  els.rulesList.addEventListener('click', e => {
    const btn = e.target.closest('.remove-rule-btn');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx);
    state.rules.splice(idx, 1);
    renderRules();
    applyAll();
  });

  // Add rule
  els.addRuleBtn.addEventListener('click', () => {
    state.rules.push({ feature: 'min-width', value: 300, css: '/* your styles here */' });
    renderRules();
    applyAll();
  });

  // Copy
  els.copyBtn.addEventListener('click', () => {
    const css = els.dynamicStyles.textContent;
    navigator.clipboard.writeText(css).then(() => {
      els.copyBtn.textContent = 'Copied!';
      els.copyBtn.classList.add('copied');
      setTimeout(() => {
        els.copyBtn.textContent = 'Copy';
        els.copyBtn.classList.remove('copied');
      }, 2000);
    });
  });

  // Init
  loadPreset('card');
  renderPreviewContent();
})();
</script>
</body>
</html>
