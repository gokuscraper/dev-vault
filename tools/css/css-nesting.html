const editor = document.getElementById('cssEditor');
const previewFrame = document.getElementById('previewFrame');
const errorBar = document.getElementById('errorBar');
const depthBadge = document.getElementById('depthBadge');
const charCount = document.getElementById('charCount');
const flatOutput = document.getElementById('flatOutput');
const flatCSS = document.getElementById('flatCSS');
const previewContainer = document.getElementById('previewContainer');
const rightPanelTitle = document.getElementById('rightPanelTitle');
const backToPreview = document.getElementById('backToPreview');
const toast = document.getElementById('toast');

let currentHTML = PRESETS.basic.html;
let showingFlat = false;

// --- Preset buttons ---
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const preset = PRESETS[btn.dataset.preset];
    editor.value = preset.css;
    currentHTML = preset.html;
    hideFlat();
    update();
  });
});

// --- Editor input ---
editor.addEventListener('input', () => {
  hideFlat();
  update();
});

// Tab key support in editor
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    update();
  }
});

// --- Core update ---
function update() {
  const css = editor.value;
  charCount.textContent = css.length + ' chars';

  // Depth analysis
  const depth = measureNestingDepth(css);
  depthBadge.textContent = depth;
  depthBadge.className = 'depth-badge ' + (depth <= 2 ? 'depth-ok' : depth <= 3 ? 'depth-warn' : 'depth-danger');

  // Error detection
  const error = detectErrors(css);
  if (error) {
    errorBar.textContent = error;
    errorBar.classList.add('visible');
  } else {
    errorBar.classList.remove('visible');
  }

  // Live preview
  renderPreview(css);
}

function renderPreview(css) {
  const doc = previewFrame.contentDocument;
  doc.open();
  doc.write(`<!DOCTYPE html>
<html><head><style>
body { margin: 20px; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
${css}
</style></head><body>${currentHTML}</body></html>`);
  doc.close();
}

// --- Nesting depth ---
function measureNestingDepth(css) {
  let max = 0, current = 0;
  let inString = false, stringChar = '';
  for (let i = 0; i < css.length; i++) {
    const c = css[i];
    if (inString) {
      if (c === stringChar && css[i-1] !== '\\') inString = false;
      continue;
    }
    if (c === '"' || c === "'") { inString = true; stringChar = c; continue; }
    if (c === '/' && css[i+1] === '*') {
      const end = css.indexOf('*/', i + 2);
      if (end !== -1) i = end + 1;
      continue;
    }
    if (c === '{') { current++; if (current > max) max = current; }
    if (c === '}') { current = Math.max(0, current - 1); }
  }
  return max;
}

// --- Error detection ---
function detectErrors(css) {
  let braces = 0;
  let inString = false, stringChar = '';
  for (let i = 0; i < css.length; i++) {
    const c = css[i];
    if (inString) {
      if (c === stringChar && css[i-1] !== '\\') inString = false;
      continue;
    }
    if (c === '"' || c === "'") { inString = true; stringChar = c; continue; }
    if (c === '/' && css[i+1] === '*') {
      const end = css.indexOf('*/', i + 2);
      if (end === -1) return 'Unterminated comment';
      i = end + 1;
      continue;
    }
    if (c === '{') braces++;
    if (c === '}') braces--;
    if (braces < 0) return 'Unexpected closing brace at position ' + i;
  }
  if (braces > 0) return braces + ' unclosed brace(s)';
  if (braces < 0) return Math.abs(braces) + ' extra closing brace(s)';

  // Check for nesting without selector
  const lines = css.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.endsWith('{') && line.length === 1 && i > 0) {
      // Standalone '{' is fine if previous line has selector
    }
    // Check for property: value { which is invalid
    if (/^[a-z-]+\s*:.*\{/.test(line) && !/\{[^}]*\}/.test(line)) {
      return 'Line ' + (i+1) + ': Cannot nest inside a property declaration';
    }
  }

  return null;
}

// --- Flatten CSS ---
document.getElementById('flattenBtn').addEventListener('click', () => {
  if (showingFlat) { hideFlat(); return; }
  const css = editor.value;
  const flattened = flattenCSS(css);
  flatCSS.value = flattened;
  showFlat();
});

function showFlat() {
  showingFlat = true;
  previewContainer.style.display = 'none';
  flatOutput.classList.add('visible');
  rightPanelTitle.textContent=T("jtc_flattened_css");
  backToPreview.style.display = '';
  document.getElementById('flattenBtn').textContent=T("jtc_show_preview");
}

function hideFlat() {
  showingFlat = false;
  previewContainer.style.display = '';
  flatOutput.classList.remove('visible');
  rightPanelTitle.textContent=T("jtc_live_preview");
  backToPreview.style.display = 'none';
  document.getElementById('flattenBtn').textContent=T("jtc_flatten_css");
}

backToPreview.addEventListener('click', hideFlat);

function flattenCSS(css) {
  // Tokenize and parse the nested CSS into a tree, then output flat
  try {
    const rules = parseCSS(css);
    return renderFlat(rules);
  } catch (e) {
    return '/* Error flattening: ' + e.message + ' */\n\n' + css;
  }
}

function parseCSS(text) {
  const rules = [];
  let i = 0;
  const len = text.length;

  function skipWhitespace() {
    while (i < len && /\s/.test(text[i])) i++;
  }

  function skipComment() {
    if (text[i] === '/' && text[i+1] === '*') {
      const end = text.indexOf('*/', i + 2);
      i = end === -1 ? len : end + 2;
      return true;
    }
    return false;
  }

  function readUntil(chars) {
    let result = '';
    let depth = 0;
    let inStr = false, strC = '';
    while (i < len) {
      const c = text[i];
      if (inStr) {
        result += c; i++;
        if (c === strC && text[i-2] !== '\\') inStr = false;
        continue;
      }
      if (c === '"' || c === "'") { inStr = true; strC = c; result += c; i++; continue; }
      if (c === '(' ) { depth++; result += c; i++; continue; }
      if (c === ')' ) { depth--; result += c; i++; continue; }
      if (depth === 0 && chars.includes(c)) break;
      result += c; i++;
    }
    return result;
  }

  function parseBlock() {
    const items = [];
    skipWhitespace();
    while (i < len && text[i] !== '}') {
      skipWhitespace();
      if (i >= len || text[i] === '}') break;
      if (skipComment()) continue;

      // Read selector or property
      const start = i;
      const chunk = readUntil('{;}');

      if (i >= len) break;

      if (text[i] === '{') {
        // This is a nested rule
        i++; // skip {
        const selector = chunk.trim();
        const children = parseBlock();
        i++; // skip }
        items.push({ type: 'rule', selector, children });
      } else if (text[i] === ';' || text[i] === '}') {
        if (text[i] === ';') i++;
        const decl = chunk.trim();
        if (decl) {
          items.push({ type: 'declaration', text: decl });
        }
      }
      skipWhitespace();
    }
    return items;
  }

  while (i < len) {
    skipWhitespace();
    if (i >= len) break;
    if (skipComment()) continue;

    const chunk = readUntil('{;}');
    if (i >= len) break;

    if (text[i] === '{') {
      i++;
      const selector = chunk.trim();
      const children = parseBlock();
      i++; // skip }
      if (selector) rules.push({ type: 'rule', selector, children });
    } else {
      if (text[i] === ';') i++;
    }
    skipWhitespace();
  }

  return rules;
}

function renderFlat(rules, parentSelectors) {
  let output = '';
  parentSelectors = parentSelectors || [];

  for (const rule of rules) {
    if (rule.type !== 'rule') continue;

    const isAtRule = rule.selector.startsWith('@');
    let currentSelectors;

    if (isAtRule) {
      currentSelectors = parentSelectors;
    } else {
      currentSelectors = resolveSelectors(parentSelectors, rule.selector);
    }

    // Collect declarations
    const decls = rule.children.filter(c => c.type === 'declaration');
    // Collect nested rules
    const nested = rule.children.filter(c => c.type === 'rule');

    if (isAtRule) {
      // At-rule wrapping
      let inner = '';
      if (decls.length > 0 && currentSelectors.length > 0) {
        inner += currentSelectors.join(',\n') + ' {\n';
        decls.forEach(d => { inner += '  ' + d.text + ';\n'; });
        inner += '}\n';
      }
      inner += renderFlat(nested, currentSelectors);
      if (inner.trim()) {
        output += rule.selector + ' {\n';
        inner.split('\n').forEach(line => {
          if (line.trim()) output += '  ' + line + '\n';
        });
        output += '}\n\n';
      }
    } else {
      if (decls.length > 0) {
        output += currentSelectors.join(',\n') + ' {\n';
        decls.forEach(d => { output += '  ' + d.text + ';\n'; });
        output += '}\n\n';
      }
      if (nested.length > 0) {
        output += renderFlat(nested, currentSelectors);
      }
    }
  }

  return output;
}

function resolveSelectors(parents, child) {
  const childParts = child.split(',').map(s => s.trim());
  if (parents.length === 0) return childParts;

  const resolved = [];
  for (const p of parents) {
    for (const c of childParts) {
      if (c.includes('&')) {
        resolved.push(c.replace(/&/g, p));
      } else if (c.startsWith('>') || c.startsWith('+') || c.startsWith('~')) {
        resolved.push(p + ' ' + c);
      } else {
        resolved.push(p + ' ' + c);
      }
    }
  }
  return resolved;
}

// --- Copy ---
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = showingFlat ? flatCSS.value : editor.value;
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
});

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// --- Init ---
editor.value = PRESETS.basic.css;
update();
</script>
