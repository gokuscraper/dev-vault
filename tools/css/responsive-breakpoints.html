<script>
const PRESETS = {
  'Bootstrap 5': [
    { name: 'xs', width: 0 }, { name: 'sm', width: 576 }, { name: 'md', width: 768 },
    { name: 'lg', width: 992 }, { name: 'xl', width: 1200 }, { name: 'xxl', width: 1400 }
  ],
  'Tailwind CSS': [
    { name: 'sm', width: 640 }, { name: 'md', width: 768 },
    { name: 'lg', width: 1024 }, { name: 'xl', width: 1280 }, { name: '2xl', width: 1536 }
  ],
  'Material Design': [
    { name: 'xs', width: 0 }, { name: 'sm', width: 600 }, { name: 'md', width: 905 },
    { name: 'lg', width: 1240 }, { name: 'xl', width: 1440 }
  ],
  'Foundation': [
    { name: 'small', width: 0 }, { name: 'medium', width: 640 },
    { name: 'large', width: 1024 }, { name: 'xlarge', width: 1200 }, { name: 'xxlarge', width: 1440 }
  ]
};

const DEVICES = [
  { name: 'iPhone SE', width: 375 },
  { name: 'iPhone 14', width: 390 },
  { name: 'iPhone Pro Max', width: 430 },
  { name: 'iPad Mini', width: 744 },
  { name: 'iPad', width: 820 },
  { name: 'iPad Pro', width: 1024 },
  { name: 'Laptop', width: 1366 },
  { name: 'Desktop', width: 1920 },
  { name: '4K', width: 3840 }
];

const SEGMENT_COLORS = [
  '#1a3a5c', '#2a4a3c', '#3a2a5c', '#4a3a2c', '#1a4a4c',
  '#3a1a4c', '#2a3a1c', '#4a1a3c', '#1a2a4c', '#3a4a1c'
];

const OUTPUT_FORMATS = [
  'CSS (min-width)', 'CSS (max-width)', 'SCSS Mixins',
  'Tailwind Config', 'CSS Variables', 'JavaScript'
];

let breakpoints = [];
let activePreset = 'Bootstrap 5';
let activeFormat = 0;

function init() {
  renderPresetBtns();
  loadPreset('Bootstrap 5');
  renderOutputTabs();
  updateViewport();
  window.addEventListener('resize', updateViewport);
}

function renderPresetBtns() {
  const c = document.getElementById('presetBtns');
  c.innerHTML = Object.keys(PRESETS).map(name =>
    `<button class="preset${name === activePreset ? ' active' : ''}" onclick="loadPreset('${name}')" ti="btn_name" ti="btn_name">${name}</button>`
  ).join('') + `<button class="preset${activePreset === 'Custom' ? ' active' : ''}" onclick="setCustom()" ti="btn_custom" ti="btn_custom">Custom</button>`;
}

function loadPreset(name) {
  activePreset = name;
  breakpoints = PRESETS[name].map(b => ({ ...b }));
  renderPresetBtns();
  refresh();
}

function setCustom() {
  activePreset = 'Custom';
  renderPresetBtns();
}

function resetToPreset() {
  if (PRESETS[activePreset]) loadPreset(activePreset);
}

function refresh() {
  renderBpList();
  renderTimeline();
  renderDevices();
  renderOutput();
  updateViewport();
}

function sorted() {
  return [...breakpoints].sort((a, b) => a.width - b.width);
}

function renderBpList() {
  const list = document.getElementById('bpList');
  list.innerHTML = breakpoints.map((bp, i) => {
    const si = sorted().findIndex(s => s === bp);
    const color = SEGMENT_COLORS[si % SEGMENT_COLORS.length];
    return `<div class="bp-item">
      <div class="bp-color" style="background:${color}"></div>
      <input class="bp-name" type="text" value="${bp.name}" onchange="updateBp(${i},'name',this.value)">
      <input class="bp-width" type="number" value="${bp.width}" min="0" onchange="updateBp(${i},'width',+this.value)">
      <span class="bp-unit">px</span>
      <button class="bp-remove" onclick="removeBp(${i})">&times;</button>
    </div>`;
  }).join('');
}

function updateBp(i, key, val) {
  breakpoints[i][key] = val;
  activePreset = 'Custom';
  renderPresetBtns();
  refresh();
}

function removeBp(i) {
  breakpoints.splice(i, 1);
  activePreset = 'Custom';
  renderPresetBtns();
  refresh();
}

function addBreakpoint() {
  const nameEl = document.getElementById('addName');
  const widthEl = document.getElementById('addWidth');
  const name = nameEl.value.trim();
  const width = parseInt(widthEl.value);
  if (!name || isNaN(width) || width < 0) return;
  breakpoints.push({ name, width });
  nameEl.value = '';
  widthEl.value = '';
  activePreset = 'Custom';
  renderPresetBtns();
  refresh();
}

function sortBreakpoints() {
  breakpoints.sort((a, b) => a.width - b.width);
  refresh();
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  const scale = 2000;
  const s = sorted();
  let html = '';
  for (let i = 0; i < s.length; i++) {
    const start = s[i].width;
    const end = i < s.length - 1 ? s[i + 1].width : scale;
    const left = (start / scale) * 100;
    const w = ((end - start) / scale) * 100;
    const color = SEGMENT_COLORS[i % SEGMENT_COLORS.length];
    html += `<div class="timeline-seg" style="left:${left}%;width:${w}%;background:${color}">
      <div class="seg-label">${s[i].name}<br>${s[i].width}px</div>
    </div>`;
  }
  const vw = window.innerWidth;
  const markerLeft = Math.min((vw / scale) * 100, 100);
  html += `<div class="timeline-marker" data-width="${vw}px" style="left:${markerLeft}%"></div>`;
  el.innerHTML = html;
}

function getBreakpointForWidth(w) {
  const s = sorted();
  let bp = s.length > 0 ? s[0].name : '--';
  for (const b of s) {
    if (w >= b.width) bp = b.name;
  }
  return bp;
}

function renderDevices() {
  const el = document.getElementById('deviceList');
  el.innerHTML = DEVICES.map(d => {
    const bp = getBreakpointForWidth(d.width);
    const s = sorted();
    const idx = s.findIndex(b => b.name === bp);
    const color = idx >= 0 ? SEGMENT_COLORS[idx % SEGMENT_COLORS.length] : '#333';
    return `<div class="device-item">
      <span class="dev-name">${d.name}</span>
      <span class="dev-width">${d.width}px</span>
      <span class="dev-bp" style="background:${color};color:#fff">${bp}</span>
    </div>`;
  }).join('');
}

function updateViewport() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  document.getElementById('vpSize').textContent = `${w} x ${h}`;
  document.getElementById('vpBp').textContent = getBreakpointForWidth(w);
  renderTimeline();
}

function renderOutputTabs() {
  const el = document.getElementById('outputTabs');
  el.innerHTML = OUTPUT_FORMATS.map((f, i) =>
    `<button class="tab${i === activeFormat ? ' active' : ''}" onclick="setFormat(${i})" ti="btn_f" ti="btn_f">${f}</button>`
  ).join('');
}

function setFormat(i) {
  activeFormat = i;
  renderOutputTabs();
  renderOutput();
}

function renderOutput() {
  const el = document.getElementById('outputArea');
  const s = sorted();
  let out = '';

  switch (activeFormat) {
    case 0: // CSS min-width
      out = s.filter(b => b.width > 0).map(b =>
        `@media (min-width: ${b.width}px) {\n  /* ${b.name} */\n}`
      ).join('\n\n');
      if (s.length && s[0].width === 0) {
        out = `/* ${s[0].name}: base styles (no media query needed) */\n\n` + out;
      }
      break;

    case 1: // CSS max-width
      out = s.filter(b => b.width > 0).reverse().map((b, i, arr) => {
        const max = b.width - 0.02;
        return `@media (max-width: ${max}px) {\n  /* below ${b.name} */\n}`;
      }).join('\n\n');
      break;

    case 2: // SCSS Mixins
      out = `// Breakpoint values\n$breakpoints: (\n${s.map(b => `  '${b.name}': ${b.width}px`).join(',\n')}\n);\n\n`;
      out += `// Mobile-first mixin\n@mixin respond-to($breakpoint) {\n  $value: map-get($breakpoints, $breakpoint);\n  @if $value {\n    @media (min-width: $value) {\n      @content;\n    }\n  } @else {\n    @warn "Unknown breakpoint: \#{$breakpoint}";\n  }\n}\n\n`;
      out += `// Usage:\n// @include respond-to('md') {\n//   .container { max-width: 720px; }\n// }`;
      break;

    case 3: // Tailwind Config
      out = `// tailwind.config.js\nmodule.exports = {\n  theme: {\n    screens: {\n`;
      out += s.filter(b => b.width > 0).map(b =>
        `      '${b.name}': '${b.width}px'`
      ).join(',\n');
      out += `\n    }\n  }\n}`;
      break;

    case 4: // CSS Custom Properties
      out = `:root {\n${s.map(b =>
        `  --breakpoint-${b.name}: ${b.width}px;`
      ).join('\n')}\n}`;
      break;

    case 5: // JavaScript
      out = `const breakpoints = {\n${s.map(b =>
        `  ${/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(b.name) ? b.name : `'${b.name}'`}: ${b.width}`
      ).join(',\n')}\n};\n\n`;
      out += `function getBreakpoint(width) {\n  const entries = Object.entries(breakpoints).reverse();\n  for (const [name, min] of entries) {\n    if (width >= min) return name;\n  }\n  return null;\n}\n\n`;
      out += `// Current: getBreakpoint(window.innerWidth)`;
      break;
  }

  el.textContent = out;
}

function copyOutput() {
  const text = document.getElementById('outputArea').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1500);
}

init();
</script>
