<body>
<div class="container">

<script>
const PRESETS = [
  { name: 'ease', v: [0.25, 0.1, 0.25, 1] },
  { name: 'ease-in', v: [0.42, 0, 1, 1] },
  { name: 'ease-out', v: [0, 0, 0.58, 1] },
  { name: 'ease-in-out', v: [0.42, 0, 0.58, 1] },
  { name: 'linear', v: [0, 0, 1, 1] },
  { name: 'easeInQuad', v: [0.55, 0.085, 0.68, 0.53] },
  { name: 'easeOutQuad', v: [0.25, 0.46, 0.45, 0.94] },
  { name: 'easeInOutQuad', v: [0.455, 0.03, 0.515, 0.955] },
  { name: 'easeInCubic', v: [0.55, 0.055, 0.675, 0.19] },
  { name: 'easeOutCubic', v: [0.215, 0.61, 0.355, 1] },
  { name: 'easeInOutCubic', v: [0.645, 0.045, 0.355, 1] },
  { name: 'easeInBack', v: [0.6, -0.28, 0.735, 0.045] },
  { name: 'easeOutBack', v: [0.175, 0.885, 0.32, 1.275] },
  { name: 'easeInOutBack', v: [0.68, -0.55, 0.265, 1.55] },
  { name: 'easeInElastic', v: [0.5, -0.5, 0.75, -0.25] },
  { name: 'easeOutBounce', v: [0.22, 1.12, 0.4, 1] }
];

const $ = id => document.getElementById(id);
const cvs = $('cvs'), ctx = cvs.getContext('2d');
const PAD = 30, W = 300 - PAD * 2, H = 300 - PAD * 2;
let cp = [0.25, 0.1, 0.25, 1];
let dragging = -1; // 0=cp1, 1=cp2
let animId = null;
let activePreset = 'ease';

// --- Cubic bezier math ---
function cubicBezier(t, p1, p2, p3, p4) {
  const u = 1 - t;
  return u*u*u*0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*1;
  // Actually for bezier curve: P0=(0,0), P1=(x1,y1), P2=(x2,y2), P3=(1,1)
}

function bezierY(t) {
  const u = 1 - t;
  return 3*u*u*t*cp[1] + 3*u*t*t*cp[3] + t*t*t;
}
function bezierX(t) {
  const u = 1 - t;
  return 3*u*u*t*cp[0] + 3*u*t*t*cp[2] + t*t*t;
}

// Solve t for given x using Newton's method
function solveBezierX(x) {
  let t = x;
  for (let i = 0; i < 14; i++) {
    const u = 1 - t;
    const xAt = 3*u*u*t*cp[0] + 3*u*t*t*cp[2] + t*t*t;
    const dx = 3*u*u*cp[0] + 6*u*t*(cp[2]-cp[0]) + 3*t*t*(1-cp[2]);
    if (Math.abs(dx) < 1e-10) break;
    t -= (xAt - x) / dx;
    t = Math.max(0, Math.min(1, t));
  }
  return t;
}

function easingAt(x) {
  const t = solveBezierX(x);
  return bezierY(t);
}

// --- Canvas coordinate helpers ---
function toCanvas(nx, ny) {
  // nx, ny in [0,1] (with possible overshoot for y)
  return [PAD + nx * W, PAD + H - ny * H];
}
function fromCanvas(cx, cy) {
  return [(cx - PAD) / W, (H - (cy - PAD)) / H];
}

// --- Draw ---
function draw(dotProgress) {
  ctx.clearRect(0, 0, 300, 300);

  // Grid
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const f = i / 4;
    const [x, y] = toCanvas(f, 0);
    ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, PAD + H); ctx.stroke();
    const [x2, y2] = toCanvas(0, f);
    ctx.beginPath(); ctx.moveTo(PAD, y2); ctx.lineTo(PAD + W, y2); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const [ox, oy] = toCanvas(0, 0);
  ctx.moveTo(ox, oy);
  const [ex, ey] = toCanvas(1, 0);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  const [tx, ty] = toCanvas(0, 1);
  ctx.lineTo(tx, ty);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#666';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('time', PAD + W / 2, PAD + H + 20);
  ctx.save();
  ctx.translate(12, PAD + H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('progress', 0, 0);
  ctx.restore();

  // Control point lines
  ctx.strokeStyle = '#4da6ff44';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  const [p0x, p0y] = toCanvas(0, 0);
  const [c1x, c1y] = toCanvas(cp[0], cp[1]);
  ctx.beginPath(); ctx.moveTo(p0x, p0y); ctx.lineTo(c1x, c1y); ctx.stroke();
  const [p3x, p3y] = toCanvas(1, 1);
  const [c2x, c2y] = toCanvas(cp[2], cp[3]);
  ctx.beginPath(); ctx.moveTo(p3x, p3y); ctx.lineTo(c2x, c2y); ctx.stroke();
  ctx.setLineDash([]);

  // Curve
  ctx.strokeStyle = '#4da6ff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const t = i / 200;
    const x = bezierX(t);
    const y = bezierY(t);
    const [cx2, cy2] = toCanvas(x, y);
    if (i === 0) ctx.moveTo(cx2, cy2);
    else ctx.lineTo(cx2, cy2);
  }
  ctx.stroke();

  // Control points
  [
    [cp[0], cp[1], '#4da6ff'],
    [cp[2], cp[3], '#f06292']
  ].forEach(([nx, ny, col]) => {
    const [px, py] = toCanvas(nx, ny);
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(px, py, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Animated dot
  if (dotProgress !== undefined && dotProgress >= 0) {
    const yVal = easingAt(dotProgress);
    const [dx, dy] = toCanvas(dotProgress, yVal);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(dx, dy, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- Inputs sync ---
function readInputs() {
  cp = [
    parseFloat($('x1').value) || 0,
    parseFloat($('y1').value) || 0,
    parseFloat($('x2').value) || 0,
    parseFloat($('y2').value) || 0
  ];
}

function writeInputs() {
  $('x1').value = cp[0].toFixed(2);
  $('y1').value = cp[1].toFixed(2);
  $('x2').value = cp[2].toFixed(2);
  $('y2').value = cp[3].toFixed(2);
}

function updateAll() {
  draw(-1);
  updateOutput();
  highlightPreset();
}

['x1','y1','x2','y2'].forEach(id => {
  $(id).addEventListener('input', () => { readInputs(); updateAll(); });
});

// --- Dragging ---
cvs.addEventListener('mousedown', e => {
  const rect = cvs.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (300 / rect.width);
  const my = (e.clientY - rect.top) * (300 / rect.height);
  const [c1x, c1y] = toCanvas(cp[0], cp[1]);
  const [c2x, c2y] = toCanvas(cp[2], cp[3]);
  const d1 = Math.hypot(mx - c1x, my - c1y);
  const d2 = Math.hypot(mx - c2x, my - c2y);
  if (d1 < 15 && d1 <= d2) dragging = 0;
  else if (d2 < 15) dragging = 1;
});

cvs.addEventListener('mousemove', e => {
  if (dragging < 0) return;
  const rect = cvs.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (300 / rect.width);
  const my = (e.clientY - rect.top) * (300 / rect.height);
  const [nx, ny] = fromCanvas(mx, my);
  const cx = Math.max(0, Math.min(1, nx));
  if (dragging === 0) { cp[0] = cx; cp[1] = ny; }
  else { cp[2] = cx; cp[3] = ny; }
  writeInputs();
  updateAll();
});

cvs.addEventListener('mouseup', () => { dragging = -1; });
cvs.addEventListener('mouseleave', () => { dragging = -1; });

// Touch support
cvs.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = cvs.getBoundingClientRect();
  const mx = (t.clientX - rect.left) * (300 / rect.width);
  const my = (t.clientY - rect.top) * (300 / rect.height);
  const [c1x, c1y] = toCanvas(cp[0], cp[1]);
  const [c2x, c2y] = toCanvas(cp[2], cp[3]);
  const d1 = Math.hypot(mx - c1x, my - c1y);
  const d2 = Math.hypot(mx - c2x, my - c2y);
  if (d1 < 25 && d1 <= d2) dragging = 0;
  else if (d2 < 25) dragging = 1;
}, { passive: false });

cvs.addEventListener('touchmove', e => {
  if (dragging < 0) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = cvs.getBoundingClientRect();
  const mx = (t.clientX - rect.left) * (300 / rect.width);
  const my = (t.clientY - rect.top) * (300 / rect.height);
  const [nx, ny] = fromCanvas(mx, my);
  const cx = Math.max(0, Math.min(1, nx));
  if (dragging === 0) { cp[0] = cx; cp[1] = ny; }
  else { cp[2] = cx; cp[3] = ny; }
  writeInputs();
  updateAll();
}, { passive: false });

cvs.addEventListener('touchend', () => { dragging = -1; });

// --- Presets ---
function buildPresets() {
  const grid = $('presetGrid');
  const compA = $('compA');
  const compB = $('compB');
  grid.innerHTML = '';
  compA.innerHTML = '';
  compB.innerHTML = '';
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset';
    btn.textContent = p.name;
    btn.addEventListener('click', () => {
      cp = [...p.v];
      activePreset = p.name;
      writeInputs();
      updateAll();
    });
    grid.appendChild(btn);

    const optA = document.createElement('option');
    optA.value = i; optA.textContent = p.name;
    compA.appendChild(optA);
    const optB = document.createElement('option');
    optB.value = i; optB.textContent = p.name;
    compB.appendChild(optB);
  });
  compB.value = '1'; // default B = ease-in
}

function highlightPreset() {
  document.querySelectorAll('.preset').forEach(btn => {
    const p = PRESETS.find(pr => pr.name === btn.textContent);
    const match = p && Math.abs(p.v[0]-cp[0])<0.01 && Math.abs(p.v[1]-cp[1])<0.01
      && Math.abs(p.v[2]-cp[2])<0.01 && Math.abs(p.v[3]-cp[3])<0.01;
    btn.classList.toggle('active', !!match);
    if (match) activePreset = p.name;
  });
}

// --- Output ---
function bezierStr() {
  return `cubic-bezier(${cp[0]}, ${cp[1]}, ${cp[2]}, ${cp[3]})`;
}

function updateOutput() {
  const b = bezierStr();
  $('outputArea').textContent =
`/* CSS transition */
transition-timing-function: ${b};

/* CSS animation */
animation-timing-function: ${b};

/* JavaScript */
element.animate(
  { transform: ['translateX(0)', 'translateX(100%)'] },
  { duration: ${$('duration').value}, easing: '${b}' }
);`;
}

// --- Copy ---
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg || 'Copied!';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 1500);
}

$('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText($('outputArea').textContent).then(() => showToast());
});

// --- Duration slider ---
$('duration').addEventListener('input', () => {
  $('durVal').textContent = $('duration').value + 'ms';
  updateOutput();
});

// --- Play animation on canvas ---
function playCanvasAnim() {
  if (animId) cancelAnimationFrame(animId);
  const dur = parseInt($('duration').value);
  const start = performance.now();
  function tick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / dur, 1);
    draw(progress);
    if (progress < 1) animId = requestAnimationFrame(tick);
    else animId = null;
  }
  animId = requestAnimationFrame(tick);
}

$('playBtn').addEventListener('click', () => {
  playCanvasAnim();
  animatePreviewBox($('previewBox'), bezierStr());
});

// --- Live preview box ---
function animatePreviewBox(box, easing) {
  const dur = parseInt($('duration').value);
  // Reset position
  box.style.transition = 'none';
  box.style.left = '0px';
  box.offsetHeight; // force reflow
  const trackW = box.parentElement.clientWidth - box.clientWidth;
  box.style.transition = `left ${dur}ms ${easing}`;
  box.style.left = trackW + 'px';
}

$('replayBtn').addEventListener('click', () => {
  animatePreviewBox($('previewBox'), bezierStr());
});

// --- Comparison ---
$('compPlayBtn').addEventListener('click', () => {
  const aIdx = parseInt($('compA').value);
  const bIdx = parseInt($('compB').value);
  const aV = PRESETS[aIdx].v;
  const bV = PRESETS[bIdx].v;
  const dur = parseInt($('duration').value);
  const boxA = $('compBoxA');
  const boxB = $('compBoxB');
  const easA = `cubic-bezier(${aV.join(', ')})`;
  const easB = `cubic-bezier(${bV.join(', ')})`;
  animatePreviewBox(boxA, easA);
  animatePreviewBox(boxB, easB);
});

// --- Steps section ---
function getStepPositions(count, jump) {
  const positions = [];
  let n = count;
  if (jump === 'jump-both') n = count + 1;
  else if (jump === 'jump-none') n = count - 1;

  for (let i = 0; i <= count; i++) {
    let t = i / count;
    let val;
    if (jump === 'jump-start') {
      val = Math.ceil(t * count) / count;
    } else if (jump === 'jump-end') {
      val = Math.floor(t * count) / count;
    } else if (jump === 'jump-both') {
      val = Math.ceil(t * count) / (count + 1);
    } else { // jump-none
      if (count <= 1) val = t;
      else val = Math.floor(t * count) / (count - 1);
      val = Math.min(val, 1);
    }
    positions.push({ t, val });
  }
  return positions;
}

function drawSteps() {
  const sCtx = $('stepCvs').getContext('2d');
  const sw = 300, sh = 150, sp = 20;
  const gw = sw - sp * 2, gh = sh - sp * 2;
  sCtx.clearRect(0, 0, sw, sh);

  // Grid
  sCtx.strokeStyle = '#222';
  sCtx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const x = sp + (i / 4) * gw;
    sCtx.beginPath(); sCtx.moveTo(x, sp); sCtx.lineTo(x, sp + gh); sCtx.stroke();
    const y = sp + (i / 4) * gh;
    sCtx.beginPath(); sCtx.moveTo(sp, y); sCtx.lineTo(sp + gw, y); sCtx.stroke();
  }

  const count = parseInt($('stepCount').value) || 4;
  const jump = $('stepJump').value;
  const positions = getStepPositions(count, jump);

  sCtx.strokeStyle = '#4da6ff';
  sCtx.lineWidth = 2;
  sCtx.beginPath();
  for (let i = 0; i < positions.length; i++) {
    const p = positions[i];
    const x = sp + p.t * gw;
    const y = sp + gh - p.val * gh;
    if (i === 0) {
      sCtx.moveTo(x, y);
    } else {
      // Horizontal line to current t at previous val
      const prev = positions[i - 1];
      const prevY = sp + gh - prev.val * gh;
      sCtx.lineTo(x, prevY);
      // Vertical step
      sCtx.lineTo(x, y);
    }
  }
  sCtx.stroke();

  // Dots at step corners
  sCtx.fillStyle = '#4da6ff';
  positions.forEach(p => {
    const x = sp + p.t * gw;
    const y = sp + gh - p.val * gh;
    sCtx.beginPath();
    sCtx.arc(x, y, 3, 0, Math.PI * 2);
    sCtx.fill();
  });

  updateStepOutput();
}

function updateStepOutput() {
  const count = parseInt($('stepCount').value) || 4;
  const jump = $('stepJump').value;
  // CSS uses: steps(count, jump-term)
  // jump-end is default, shown as "end" in older syntax
  $('stepOutput').textContent =
`transition-timing-function: steps(${count}, ${jump});
animation-timing-function: steps(${count}, ${jump});`;
}

$('stepCount').addEventListener('input', drawSteps);
$('stepJump').addEventListener('change', drawSteps);

$('stepPlayBtn').addEventListener('click', () => {
  const box = $('stepBox');
  const count = parseInt($('stepCount').value) || 4;
  const jump = $('stepJump').value;
  const dur = parseInt($('duration').value);
  const easing = `steps(${count}, ${jump})`;
  box.style.transition = 'none';
  box.style.left = '0px';
  box.offsetHeight;
  const trackW = box.parentElement.clientWidth - box.clientWidth;
  box.style.transition = `left ${dur}ms ${easing}`;
  box.style.left = trackW + 'px';
});

$('stepCopyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText($('stepOutput').textContent).then(() => showToast());
});

// --- Init ---
buildPresets();
writeInputs();
updateAll();
drawSteps();
</script>
</body>
</html>
