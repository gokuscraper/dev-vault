<script>
const $ = id => document.getElementById(id);

/* ---- Tokenizer ---- */
function tokenize(css) {
  const tokens = [];
  let i = 0;
  while (i < css.length) {
    // Comment
    if (css[i] === '/' && css[i+1] === '*') {
      let end = css.indexOf('*/', i + 2);
      if (end === -1) end = css.length - 2;
      tokens.push({ type: 'comment', value: css.slice(i, end + 2) });
      i = end + 2;
    // String
    } else if (css[i] === '"' || css[i] === "'") {
      const q = css[i];
      let j = i + 1;
      while (j < css.length && css[j] !== q) { if (css[j] === '\\') j++; j++; }
      tokens.push({ type: 'string', value: css.slice(i, j + 1) });
      i = j + 1;
    } else if (css[i] === '{') { tokens.push({ type: '{' }); i++;
    } else if (css[i] === '}') { tokens.push({ type: '}' }); i++;
    } else if (css[i] === ';') { tokens.push({ type: ';' }); i++;
    } else if (css[i] === ':') { tokens.push({ type: ':' }); i++;
    } else if (/\s/.test(css[i])) {
      while (i < css.length && /\s/.test(css[i])) i++;
      tokens.push({ type: 'ws' });
    } else {
      let j = i;
      while (j < css.length && !'/{};\':\"'.includes(css[j]) && !/\s/.test(css[j])) j++;
      if (j === i) { tokens.push({ type: 'text', value: css[i] }); i++; }
      else { tokens.push({ type: 'text', value: css.slice(i, j) }); i = j; }
    }
  }
  return tokens;
}

/* ---- Formatter ---- */
function formatCSS(css, opts) {
  const indent = opts.indent === 'tab' ? '\t' : ' '.repeat(Number(opts.indent));
  const braceNew = opts.brace === 'new';
  const spaceColon = opts.spaceColon;
  const blankBetween = opts.blankBetween;
  const sortProps = opts.sortProps;

  // Normalize: strip excess whitespace, preserve structure
  let cleaned = '';
  const tokens = tokenize(css);
  for (const t of tokens) {
    if (t.type === 'ws') cleaned += ' ';
    else if (t.type === 'comment') cleaned += t.value;
    else if (t.type === 'string') cleaned += t.value;
    else if (t.type === '{') cleaned += '{';
    else if (t.type === '}') cleaned += '}';
    else if (t.type === ';') cleaned += ';';
    else if (t.type === ':') cleaned += ':';
    else cleaned += t.value;
  }

  // Build formatted output by walking through the cleaned string
  let out = '';
  let depth = 0;
  let i = 0;
  let ruleCount = 0, propCount = 0;
  let lastWasRule = false;

  function ind() { return indent.repeat(depth); }
  function skipWs() { while (i < cleaned.length && /\s/.test(cleaned[i])) i++; }

  while (i < cleaned.length) {
    skipWs();
    if (i >= cleaned.length) break;

    // Comment
    if (cleaned[i] === '/' && cleaned[i+1] === '*') {
      let end = cleaned.indexOf('*/', i + 2);
      if (end === -1) end = cleaned.length - 2;
      const comment = cleaned.slice(i, end + 2);
      out += ind() + comment + '\n';
      i = end + 2;
      continue;
    }

    // Closing brace
    if (cleaned[i] === '}') {
      depth = Math.max(0, depth - 1);
      out += ind() + '}\n';
      i++;
      lastWasRule = true;
      continue;
    }

    // Read until { ; or }
    let chunk = '';
    let foundOpen = false, foundSemi = false;
    let startI = i;
    while (i < cleaned.length) {
      if (cleaned[i] === '/' && cleaned[i+1] === '*') {
        let cEnd = cleaned.indexOf('*/', i + 2);
        if (cEnd === -1) cEnd = cleaned.length - 2;
        chunk += cleaned.slice(i, cEnd + 2);
        i = cEnd + 2;
        continue;
      }
      if (cleaned[i] === '{') { foundOpen = true; i++; break; }
      if (cleaned[i] === ';') { foundSemi = true; i++; break; }
      if (cleaned[i] === '}') break;
      chunk += cleaned[i]; i++;
    }
    chunk = chunk.trim();
    if (!chunk && !foundOpen && !foundSemi) continue;

    if (foundOpen) {
      // Rule or at-rule opening
      if (blankBetween && lastWasRule && depth === 0 && out.length > 0) out += '\n';
      if (braceNew) {
        out += ind() + chunk + '\n' + ind() + '{\n';
      } else {
        out += ind() + chunk + ' {\n';
      }
      depth++;
      ruleCount++;
      lastWasRule = false;

      // If sorting properties, collect all declarations in this block
      if (sortProps) {
        let blockContent = collectBlock(cleaned, i);
        if (blockContent !== null) {
          let { declarations, comments: blockComments, nestedRules, endIdx } = blockContent;
          declarations.sort((a, b) => {
            let pa = a.prop.toLowerCase(), pb = b.prop.toLowerCase();
            return pa < pb ? -1 : pa > pb ? 1 : 0;
          });
          for (const c of blockComments) out += ind() + c + '\n';
          for (const d of declarations) {
            propCount++;
            out += ind() + d.prop + ':' + (spaceColon ? ' ' : '') + d.value + ';\n';
          }
          // Nested rules are left for the main loop
          i = endIdx;
          // Don't skip the closing brace — let the loop handle it
          continue;
        }
      }
    } else if (foundSemi) {
      // Declaration or @import etc.
      let colonPos = chunk.indexOf(':');
      // Check if this is an at-rule without braces (like @import)
      if (chunk.startsWith('@') || colonPos === -1) {
        if (blankBetween && lastWasRule && depth === 0) out += '\n';
        out += ind() + chunk + ';\n';
      } else {
        let prop = chunk.slice(0, colonPos).trim();
        let val = chunk.slice(colonPos + 1).trim();
        out += ind() + prop + ':' + (spaceColon ? ' ' : '') + val + ';\n';
        propCount++;
      }
      lastWasRule = false;
    }
  }

  return { text: out.trimEnd() + '\n', ruleCount, propCount };
}

/* Collect declarations in a single block for sorting. Returns null if nested rules found (skip sorting for that block). */
function collectBlock(css, startIdx) {
  let declarations = [], comments = [], i = startIdx, depth = 0;
  while (i < css.length) {
    while (i < css.length && /\s/.test(css[i])) i++;
    if (i >= css.length) break;
    if (css[i] === '}') { return { declarations, comments, nestedRules: [], endIdx: i }; }
    // Comment
    if (css[i] === '/' && css[i+1] === '*') {
      let end = css.indexOf('*/', i + 2);
      if (end === -1) end = css.length - 2;
      comments.push(css.slice(i, end + 2));
      i = end + 2;
      continue;
    }
    // Read chunk
    let chunk = '';
    while (i < css.length && css[i] !== '{' && css[i] !== ';' && css[i] !== '}') {
      if (css[i] === '/' && css[i+1] === '*') {
        let cEnd = css.indexOf('*/', i + 2);
        if (cEnd === -1) cEnd = css.length - 2;
        chunk += css.slice(i, cEnd + 2);
        i = cEnd + 2;
        continue;
      }
      chunk += css[i]; i++;
    }
    if (css[i] === '{') return null; // Nested rule — skip sorting
    if (css[i] === ';') {
      i++;
      chunk = chunk.trim();
      let colonPos = chunk.indexOf(':');
      if (colonPos > 0) {
        declarations.push({ prop: chunk.slice(0, colonPos).trim(), value: chunk.slice(colonPos + 1).trim() });
      }
    }
  }
  return { declarations, comments, nestedRules: [], endIdx: i };
}

/* ---- Minifier ---- */
function minifyCSS(css) {
  let r = css;
  r = r.replace(/\/\*[\s\S]*?\*\//g, '');
  r = r.replace(/\s+/g, ' ');
  r = r.replace(/\s*([{}:;,>~+])\s*/g, '$1');
  r = r.replace(/;}/g, '}');
  r = r.replace(/^\s+|\s+$/g, '');
  return r;
}

/* ---- Syntax Highlighting ---- */
function highlight(css) {
  const colorRe = /#(?:[0-9a-fA-F]{3,8})\b/g;
  let html = escHtml(css);
  // Comments
  html = html.replace(/\/\*[\s\S]*?\*\//g, m => `<span class="hl-com">${m}</span>`);
  // At-rules
  html = html.replace(/@[\w-]+/g, m => `<span class="hl-at">${m}</span>`);
  // Selectors (lines before {)
  html = html.replace(/^([^{}:;\/]+?)(\s*\{)/gm, (m, sel, brace) => {
    if (sel.match(/^\s*<span/)) return m; // Already highlighted
    return `<span class="hl-sel">${sel}</span><span class="hl-brace">${brace.trim()}</span>`;
  });
  // Properties and values
  html = html.replace(/^(\s+)([\w-]+)(\s*:\s*)(.*?)(;)$/gm, (m, ws, prop, colon, val, semi) => {
    // Color swatches
    val = val.replace(/#(?:[0-9a-fA-F]{3,8})\b/g, c =>
      `<span class="color-swatch" style="background:${c}"></span>${c}`
    );
    return `${ws}<span class="hl-prop">${prop}</span><span class="hl-colon">${colon}</span><span class="hl-val">${val}</span><span class="hl-semi">;</span>`;
  });
  // Braces
  html = html.replace(/([{}])/g, '<span class="hl-brace">$1</span>');
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---- Actions ---- */
function getOpts() {
  return {
    indent: $('optIndent').value,
    brace: $('optBrace').value,
    spaceColon: $('optColon').checked,
    blankBetween: $('optBlank').checked,
    sortProps: $('optSort').checked
  };
}

let lastOutput = '';

function doFormat() {
  const css = $('input').value;
  if (!css.trim()) return;
  const result = formatCSS(css, getOpts());
  lastOutput = result.text;
  $('output').innerHTML = highlight(result.text);
  updateStats(css, result.text, result.ruleCount, result.propCount);
}

function doMinify() {
  const css = $('input').value;
  if (!css.trim()) return;
  lastOutput = minifyCSS(css);
  $('output').innerHTML = `<span class="hl-val">${escHtml(lastOutput)}</span>`;
  const rc = (lastOutput.match(/\{/g) || []).length;
  const pc = (lastOutput.match(/[:]/g) || []).length;
  updateStats(css, lastOutput, rc, pc);
}

function doCopy() {
  if (!lastOutput) return;
  navigator.clipboard.writeText(lastOutput).then(() => {
    const btn = document.querySelectorAll('.btn')[2];
    const orig = btn.textContent;
    btn.textContent=T("jtc_copied");
    setTimeout(() => btn.textContent = orig, 1200);
  });
}

function doClear() {
  $('input').value = '';
  $('output').innerHTML = '';
  lastOutput = '';
  $('statRules').textContent=T("jtc_rules_0");
  $('statProps').textContent=T("jtc_properties_0");
  $('statSize').textContent=T("jtc_size_0_0");
}

function updateStats(before, after, rules, props) {
  const bSize = new Blob([before]).size;
  const aSize = new Blob([after]).size;
  $('statRules').textContent = `Rules: ${rules}`;
  $('statProps').textContent = `Properties: ${props}`;
  $('statSize').textContent = `Size: ${fmtSize(bSize)} → ${fmtSize(aSize)}`;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(1) + ' KB';
}

$('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doFormat(); }
