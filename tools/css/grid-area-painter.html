<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Area Painter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
h1{text-align:center;padding:16px;font-size:1.4rem;color:#34d399;border-bottom:1px solid #222}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;min-width:320px;border-right:1px solid #222;display:flex;flex-direction:column;overflow-y:auto;padding:16px}
.canvas-wrap{flex:1;display:flex;flex-direction:column;padding:20px;overflow:auto}
label{display:block;font-size:.82rem;color:#999;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;padding:6px 8px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;font-size:.85rem}
button{padding:8px 16px;background:#1a3a2a;color:#34d399;border:1px solid #2a5a3a;border-radius:4px;cursor:pointer;font-size:.85rem;transition:background .2s}
button:hover{background:#2a4a3a}
.btn-row{display:flex;gap:8px;margin-top:12px}
.section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #1a1a1a}
.section h3{font-size:.9rem;color:#34d399;margin-bottom:8px}
.grid-settings{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.color-palette{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.color-swatch{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch.active{border-color:#fff;transform:scale(1.15)}
.color-swatch:hover{transform:scale(1.1)}
.area-list{max-height:200px;overflow-y:auto}
.area-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin-bottom:2px;border-radius:4px;font-size:.82rem;cursor:pointer}
.area-item:hover{background:#1a1a1a}
.area-item .dot{width:12px;height:12px;border-radius:2px;margin-right:8px;flex-shrink:0}
.area-item .name{flex:1}
.area-item .del{color:#666;cursor:pointer;padding:0 4px}
.area-item .del:hover{color:#f66}
.grid-container{display:grid;gap:2px;user-select:none;flex:1;min-height:300px}
.grid-cell{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:#666;transition:background .1s;min-height:40px}
.grid-cell:hover{border-color:#34d399}
.grid-cell.painted{color:#fff;font-size:.75rem;font-weight:500}
.output-wrap{padding:16px;border-top:1px solid #222}
.output{font-family:monospace;font-size:.82rem;background:#0a0a0a;padding:12px;border-radius:4px;border:1px solid #222;white-space:pre;overflow-x:auto;line-height:1.6;max-height:300px;overflow-y:auto}
.import-area{width:100%;height:80px;resize:vertical;font-family:monospace;font-size:.8rem;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;padding:8px;margin-top:4px}
.preview-container{margin-top:16px;min-height:200px;border:1px solid #222;border-radius:6px;overflow:hidden}
</style>
</head>
<body>
<h1>CSS Grid Area Painter</h1>
<div class="app">
<div class="sidebar">
<div class="section">
<h3>Grid Size</h3>
<div class="grid-settings">
<div><label>Columns</label><input type="number" id="cols" value="4" min="1" max="20" onchange="rebuildGrid()"></div>
<div><label>Rows</label><input type="number" id="rows" value="3" min="1" max="20" onchange="rebuildGrid()"></div>
</div>
<div class="grid-settings" style="margin-top:8px">
<div><label>Col Size</label><input type="text" id="colSize" value="1fr" placeholder="1fr" onchange="updateOutput()"></div>
<div><label>Row Size</label><input type="text" id="rowSize" value="auto" placeholder="auto" onchange="updateOutput()"></div>
</div>
<label>Gap</label>
<input type="text" id="gap" value="8px" placeholder="8px" onchange="updateOutput()">
</div>

<div class="section">
<h3>Paint Area</h3>
<label>Area Name</label>
<input type="text" id="areaName" value="header" placeholder="e.g. header, sidebar, main">
<label>Color</label>
<div class="color-palette" id="palette"></div>
<div class="btn-row">
<button onclick="addArea()">Add as New Area</button>
</div>
</div>

<div class="section">
<h3>Named Areas</h3>
<div class="area-list" id="areaList"></div>
<div class="btn-row">
<button onclick="clearAllAreas()">Clear All</button>
<button onclick="fillEmpty()">Fill Empty as "."</button>
</div>
</div>

<div class="section">
<h3>Import</h3>
<textarea class="import-area" id="importArea" placeholder='Paste grid-template-areas, e.g.:\n"header header"\n"sidebar main"\n"footer footer"'></textarea>
<div class="btn-row">
<button onclick="importAreas()">Import</button>
</div>
</div>
</div>

<div class="canvas-wrap">
<div class="grid-container" id="gridContainer"></div>
<div class="preview-container" id="previewContainer"></div>
</div>
</div>

<div class="output-wrap">
<h3 style="font-size:.9rem;color:#34d399;margin-bottom:8px">Generated CSS</h3>
<div class="output" id="cssOutput"></div>
<div class="btn-row">
<button onclick="copyCSS()">Copy CSS</button>
</div>
</div>

<script>
const colors=['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#6366f1','#06b6d4','#84cc16','#f43f5e'];
let currentColor=colors[0];
let areas={};// name -> {color, cells:Set<"r,c">}
let grid=[];// [row][col] = areaName or ''
let cols=4,rows=3;
let painting=false;
let paintMode='paint';// 'paint' or 'erase'

// Build palette
const palette=document.getElementById('palette');
colors.forEach((c,i)=>{
  const s=document.createElement('div');
  s.className='color-swatch'+(i===0?' active':'');
  s.style.background=c;
  s.onclick=()=>{
    currentColor=c;
    palette.querySelectorAll('.color-swatch').forEach(sw=>sw.classList.remove('active'));
    s.classList.add('active');
  };
  palette.appendChild(s);
});

function rebuildGrid(){
  cols=parseInt(document.getElementById('cols').value)||4;
  rows=parseInt(document.getElementById('rows').value)||3;
  grid=Array.from({length:rows},()=>Array(cols).fill(''));
  // Preserve existing areas that fit
  Object.entries(areas).forEach(([name,area])=>{
    const newCells=new Set();
    area.cells.forEach(key=>{
      const[r,c]=key.split(',').map(Number);
      if(r<rows&&c<cols){
        grid[r][c]=name;
        newCells.add(key);
      }
    });
    area.cells=newCells;
    if(newCells.size===0)delete areas[name];
  });
  renderGrid();
  updateOutput();
}

function renderGrid(){
  const container=document.getElementById('gridContainer');
  container.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;
  container.style.gridTemplateRows=`repeat(${rows}, 1fr)`;
  container.innerHTML='';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=document.createElement('div');
      cell.className='grid-cell';
      cell.dataset.r=r;
      cell.dataset.c=c;
      const areaName=grid[r][c];
      if(areaName&&areas[areaName]){
        cell.classList.add('painted');
        cell.style.background=areas[areaName].color+'cc';
        cell.textContent=areaName;
      }else{
        cell.textContent=`${r+1},${c+1}`;
      }
      cell.addEventListener('mousedown',e=>{
        painting=true;
        const name=document.getElementById('areaName').value.trim();
        if(!name)return;
        if(grid[r][c]===name){
          paintMode='erase';
          eraseCell(r,c);
        }else{
          paintMode='paint';
          paintCell(r,c,name);
        }
      });
      cell.addEventListener('mouseenter',()=>{
        if(!painting)return;
        const name=document.getElementById('areaName').value.trim();
        if(!name)return;
        if(paintMode==='erase')eraseCell(r,c);
        else paintCell(r,c,name);
      });
      container.appendChild(cell);
    }
  }
}

window.addEventListener('mouseup',()=>{painting=false;});

function paintCell(r,c,name){
  // Remove from previous area
  const prev=grid[r][c];
  if(prev&&areas[prev]){
    areas[prev].cells.delete(`${r},${c}`);
    if(areas[prev].cells.size===0)delete areas[prev];
  }
  // Add to new area
  if(!areas[name])areas[name]={color:currentColor,cells:new Set()};
  areas[name].cells.add(`${r},${c}`);
  grid[r][c]=name;
  renderGrid();
  renderAreaList();
  updateOutput();
}

function eraseCell(r,c){
  const name=grid[r][c];
  if(name&&areas[name]){
    areas[name].cells.delete(`${r},${c}`);
    if(areas[name].cells.size===0)delete areas[name];
  }
  grid[r][c]='';
  renderGrid();
  renderAreaList();
  updateOutput();
}

function addArea(){
  const name=document.getElementById('areaName').value.trim();
  if(!name)return;
  if(!areas[name])areas[name]={color:currentColor,cells:new Set()};
  else areas[name].color=currentColor;
  renderAreaList();
}

function renderAreaList(){
  const list=document.getElementById('areaList');
  list.innerHTML='';
  Object.entries(areas).forEach(([name,area])=>{
    const item=document.createElement('div');
    item.className='area-item';
    item.innerHTML=`<div class="dot" style="background:${area.color}"></div><span class="name">${name} (${area.cells.size})</span><span class="del" data-name="${name}">&times;</span>`;
    item.onclick=e=>{
      if(e.target.classList.contains('del')){
        deleteArea(e.target.dataset.name);
        return;
      }
      document.getElementById('areaName').value=name;
      currentColor=area.color;
      palette.querySelectorAll('.color-swatch').forEach(s=>{
        s.classList.toggle('active',s.style.background===area.color);
      });
    };
    list.appendChild(item);
  });
}

function deleteArea(name){
  if(!areas[name])return;
  areas[name].cells.forEach(key=>{
    const[r,c]=key.split(',').map(Number);
    if(r<rows&&c<cols)grid[r][c]='';
  });
  delete areas[name];
  renderGrid();
  renderAreaList();
  updateOutput();
}

function clearAllAreas(){
  areas={};
  grid=Array.from({length:rows},()=>Array(cols).fill(''));
  renderGrid();
  renderAreaList();
  updateOutput();
}

function fillEmpty(){
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++)
      if(!grid[r][c])grid[r][c]='.';
  renderGrid();
  updateOutput();
}

function updateOutput(){
  const colSize=document.getElementById('colSize').value||'1fr';
  const rowSize=document.getElementById('rowSize').value||'auto';
  const gap=document.getElementById('gap').value||'8px';

  let templateAreas='';
  for(let r=0;r<rows;r++){
    const row=[];
    for(let c=0;c<cols;c++){
      row.push(grid[r][c]||'.');
    }
    templateAreas+=`    "${row.join(' ')}"`;
    if(r<rows-1)templateAreas+='\n';
  }

  const css=`.container {
  display: grid;
  grid-template-columns: repeat(${cols}, ${colSize});
  grid-template-rows: repeat(${rows}, ${rowSize});
  grid-template-areas:
${templateAreas};
  gap: ${gap};
}

${Object.keys(areas).map(name=>`.${name} {\n  grid-area: ${name};\n}`).join('\n\n')}`;

  document.getElementById('cssOutput').textContent=css;
  renderPreview(templateAreas,colSize,rowSize,gap);
}

function renderPreview(templateAreas,colSize,rowSize,gap){
  const container=document.getElementById('previewContainer');
  const areaRows=[];
  for(let r=0;r<rows;r++){
    const row=[];
    for(let c=0;c<cols;c++)row.push(grid[r][c]||'.');
    areaRows.push(`"${row.join(' ')}"`);
  }
  let style=`display:grid;grid-template-columns:repeat(${cols},${colSize});grid-template-rows:repeat(${rows},${rowSize});grid-template-areas:${areaRows.join(' ')};gap:${gap};min-height:200px;padding:${gap}`;
  container.innerHTML='';
  const gridEl=document.createElement('div');
  gridEl.setAttribute('style',style);
  const rendered=new Set();
  Object.entries(areas).forEach(([name,area])=>{
    if(rendered.has(name))return;
    rendered.add(name);
    const child=document.createElement('div');
    child.style.gridArea=name;
    child.style.background=area.color+'44';
    child.style.border=`1px solid ${area.color}88`;
    child.style.borderRadius='4px';
    child.style.display='flex';
    child.style.alignItems='center';
    child.style.justifyContent='center';
    child.style.fontSize='.82rem';
    child.style.color=area.color;
    child.style.fontWeight='600';
    child.textContent=name;
    gridEl.appendChild(child);
  });
  container.appendChild(gridEl);
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent)
    .then(()=>alert('CSS copied!'));
}

function importAreas(){
  const text=document.getElementById('importArea').value.trim();
  if(!text)return;
  const rowMatches=[...text.matchAll(/"([^"]+)"/g)];
  if(!rowMatches.length)return;
  areas={};
  const newRows=rowMatches.map(m=>m[1].trim().split(/\s+/));
  rows=newRows.length;
  cols=Math.max(...newRows.map(r=>r.length));
  document.getElementById('rows').value=rows;
  document.getElementById('cols').value=cols;
  grid=Array.from({length:rows},()=>Array(cols).fill(''));
  let colorIdx=0;
  newRows.forEach((row,r)=>{
    row.forEach((name,c)=>{
      if(name==='.'){grid[r][c]='.';return;}
      grid[r][c]=name;
      if(!areas[name]){
        areas[name]={color:colors[colorIdx%colors.length],cells:new Set()};
        colorIdx++;
      }
      areas[name].cells.add(`${r},${c}`);
    });
  });
  renderGrid();
  renderAreaList();
  updateOutput();
}

// Init
rebuildGrid();
renderAreaList();
</script>
</body>
</html>
