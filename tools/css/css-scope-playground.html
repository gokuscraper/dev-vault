<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-surface: #1a1a1a;
  --bg-input: #222222;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #e6e6e6;
  --text-secondary: #999;
  --text-dim: #666;
  --accent: #06b6d4;
  --accent-hover: #0891b2;
  --accent-glow: rgba(6, 182, 212, 0.15);
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --purple: #a78bfa;
  --pink: #f472b6;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 .icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  font-family: var(--mono);
}
.badge {
  font-size: 0.75rem;
  padding: 3px 8px;
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 99px;
  font-weight: 600;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-right a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
  transition: color 0.2s;
}
.header-right a:hover { color: var(--text); }

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr 1fr;
  height: calc(100vh - 57px);
}

/* Sidebar */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 16px;
  overflow-y: auto;
  background: var(--bg-elevated);
}
.sidebar h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.preset-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.preset-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-surface);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.85rem;
  transition: all 0.15s;
  text-align: left;
}
.preset-btn:hover { border-color: var(--border-hover); background: var(--bg-input); }
.preset-btn.active { border-color: var(--accent); background: var(--accent-glow); }
.preset-btn .p-icon {
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: var(--bg-input);
  flex-shrink: 0;
}
.preset-btn .p-info { display: flex; flex-direction: column; gap: 2px; }
.preset-btn .p-name { font-weight: 600; }
.preset-btn .p-desc { font-size: 0.75rem; color: var(--text-secondary); }

/* Info */
.info-section {
  margin-top: 20px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.info-section strong { color: var(--text); }
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.tag-green { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-orange { background: rgba(245,158,11,0.15); color: var(--orange); }

/* Center panels */
.center-panel {
  display: flex;
  flex-direction: column;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.panel-header h3 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
}

/* Preview */
.preview-frame {
  flex: 1;
  overflow: auto;
  padding: 24px;
  background: var(--bg);
}

/* Scope visualizer */
.scope-viz {
  font-family: var(--font);
  font-size: 0.9rem;
  line-height: 1.6;
}
.scope-root {
  border: 2px dashed var(--accent);
  border-radius: var(--radius-lg);
  padding: 16px;
  position: relative;
  margin-bottom: 16px;
}
.scope-root::before {
  content: attr(data-label);
  position: absolute;
  top: -10px;
  left: 12px;
  background: var(--bg);
  padding: 0 6px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.scope-limit {
  border: 2px dashed var(--orange);
  border-radius: var(--radius);
  padding: 12px;
  position: relative;
  margin-top: 12px;
}
.scope-limit::before {
  content: attr(data-label);
  position: absolute;
  top: -10px;
  left: 12px;
  background: var(--bg);
  padding: 0 6px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.scope-outside {
  opacity: 0.4;
  padding: 8px 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.scope-inside {
  padding: 8px 12px;
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.scope-excluded {
  padding: 8px 12px;
  border: 1px dashed var(--red);
  border-radius: var(--radius);
  opacity: 0.5;
  position: relative;
}
.scope-excluded::after {
  content: 'excluded by scope limit';
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.65rem;
  color: var(--red);
  font-weight: 600;
  text-transform: uppercase;
}

/* Card theme */
.card-example {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-example .card-header { padding: 16px; border-bottom: 1px solid var(--border); }
.card-example .card-body { padding: 16px; }
.card-example .card-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-secondary); }

/* Buttons */
.btn {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--border-hover); background: var(--bg-surface); }
.btn-outline.copied { border-color: var(--green); color: var(--green); }

/* Code */
.code-panel {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
}
.code-output {
  flex: 1;
  overflow: auto;
  padding: 16px;
  background: var(--bg);
}
.code-output pre {
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.7;
  white-space: pre-wrap;
}
.kw { color: #c084fc; }
.sel { color: #67e8f9; }
.prop { color: #93c5fd; }
.val { color: #86efac; }
.cmt { color: var(--text-dim); font-style: italic; }

/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 8px 16px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Footer */
.info-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-elevated);
  font-size: 0.8rem;
  color: var(--text-secondary);
}

@media (max-width: 1024px) {
  .layout { grid-template-columns: 1fr; height: auto; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .code-panel { border-left: none; border-top: 1px solid var(--border); }
  .preview-frame { min-height: 400px; }
}
</style>
</head>

  function renderPreset(key) {
    currentPreset = key;
    const p = presets[key];
    presetLabel.textContent = p.label;
    explanation.textContent = p.explanation;
    previewFrame.innerHTML = `<div class="scope-viz">${p.render()}</div>`;
    renderCode();

    // Update active button
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.preset === key);
    });
  }

  function renderCode() {
    const p = presets[currentPreset];
    const source = currentTab === 'css' ? p.css : p.html;
    let html;

    if (currentTab === 'css') {
      html = source
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="cmt">$1</span>')
        .replace(/(@scope|to)/g, '<span class="kw">$1</span>')
        .replace(/(\.[a-zA-Z][\w-]*)/g, '<span class="sel">$1</span>')
        .replace(/(color|font-size|font-weight|background|padding|border-radius|border-left|border|display|margin)(\s*:)/g, '<span class="prop">$1</span>$2');
    } else {
      html = source
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="sel">$2</span>')
        .replace(/(class)=/g, '<span class="prop">$1</span>=')
        .replace(/"([^"]*)"/g, '"<span class="val">$1</span>"');
    }

    codeContent.innerHTML = html;
  }

  // Events
  document.getElementById('presetList').addEventListener('click', e => {
    const btn = e.target.closest('.preset-btn');
    if (!btn) return;
    renderPreset(btn.dataset.preset);
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderCode();
    });
  });

  copyBtn.addEventListener('click', () => {
    const p = presets[currentPreset];
    const text = currentTab === 'css' ? p.css : p.html;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent=T("jtc_copied");
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent=T("jtc_copy");
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });

  // Init
  renderPreset('basic');
})();
</script>
