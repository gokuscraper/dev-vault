<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS @starting-style Playground — Dev Toolkit</title>
<meta name="description" content="Interactive @starting-style playground. Animate elements from display:none. Modals, popovers, toasts with pure CSS entry animations.">
<meta property="og:title" content="CSS @starting-style Playground — Dev Toolkit">
<meta property="og:description" content="Interactive @starting-style playground. Animate elements from display:none. Modals, popovers, toasts with pure CSS entry animations.">
<meta property="og:type" content="website">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="CSS @starting-style Playground — Dev Toolkit">
<meta name="twitter:description" content="Interactive @starting-style playground. Animate elements from display:none. Modals, popovers, toasts with pure CSS entry animations.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-surface: #1a1a1a;
  --bg-input: #222222;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #e6e6e6;
  --text-secondary: #999;
  --text-dim: #666;
  --accent: #8b5cf6;
  --accent-hover: #7c3aed;
  --accent-glow: rgba(139, 92, 246, 0.15);
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 .icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}
.header .badge {
  font-size: 0.75rem;
  padding: 3px 8px;
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 99px;
  font-weight: 600;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-right a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
  transition: color 0.2s;
}
.header-right a:hover { color: var(--text); }

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr 1fr;
  height: calc(100vh - 57px);
}

/* Sidebar */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 16px;
  overflow-y: auto;
  background: var(--bg-elevated);
}
.sidebar h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.preset-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.preset-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-surface);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.85rem;
  transition: all 0.15s;
  text-align: left;
}
.preset-btn:hover { border-color: var(--border-hover); background: var(--bg-input); }
.preset-btn.active { border-color: var(--accent); background: var(--accent-glow); }
.preset-btn .preset-icon {
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: var(--bg-input);
  flex-shrink: 0;
}
.preset-btn .preset-info { display: flex; flex-direction: column; gap: 2px; }
.preset-btn .preset-name { font-weight: 600; }
.preset-btn .preset-desc { font-size: 0.75rem; color: var(--text-secondary); }

/* Controls */
.controls {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.control-row:last-child { margin-bottom: 0; }
.control-row label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  min-width: 100px;
  font-weight: 500;
}
.control-row select, .control-row input[type="range"] {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  padding: 6px 10px;
}
.control-row input[type="range"] {
  -webkit-appearance: none;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-input);
  padding: 0;
  border: none;
}
.control-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.range-value {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--accent);
  min-width: 50px;
  text-align: right;
}

/* Preview */
.preview-area {
  display: flex;
  flex-direction: column;
}
.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.preview-header h3 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.preview-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* Action buttons */
.btn {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--border-hover); background: var(--bg-surface); }
.btn-outline.copied { border-color: var(--green); color: var(--green); }
.btn-group { display: flex; gap: 8px; }

/* Code panel */
.code-panel {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.code-header h3 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.code-output {
  flex: 1;
  overflow: auto;
  padding: 16px;
  background: var(--bg);
}
.code-output pre {
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text);
}
.code-output .kw { color: #c084fc; }
.code-output .sel { color: #67e8f9; }
.code-output .prop { color: #93c5fd; }
.code-output .val { color: #86efac; }
.code-output .cmt { color: var(--text-dim); font-style: italic; }

/* Info panel */
.info-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-elevated);
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 16px;
}
.info-bar .tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.tag-green { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-orange { background: rgba(245,158,11,0.15); color: var(--orange); }
.tag-red { background: rgba(239,68,68,0.15); color: var(--red); }

/* Demo elements */
.demo-stage {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* Modal demo */
.demo-modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.demo-modal-backdrop.visible {
  opacity: 1;
  pointer-events: auto;
}
.demo-modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.demo-modal h4 { font-size: 1.1rem; margin-bottom: 8px; }
.demo-modal p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }

/* Toast demo */
.demo-toast-container {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.demo-toast {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  min-width: 260px;
}
.demo-toast .toast-icon { font-size: 1.2rem; }

/* Popover demo */
.demo-popover-anchor {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.demo-popover {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  max-width: 240px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  position: absolute;
}

/* Card demo */
.demo-card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
}
.demo-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.demo-card .card-icon { font-size: 2rem; margin-bottom: 8px; }
.demo-card .card-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
.demo-card .card-desc { font-size: 0.75rem; color: var(--text-secondary); }

/* Accordion demo */
.demo-accordion {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.demo-accordion-item {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.demo-accordion-header {
  padding: 14px 16px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-surface);
  border: none;
  color: var(--text);
  width: 100%;
  font-family: var(--font);
}
.demo-accordion-header .arrow {
  transition: transform 0.3s;
}
.demo-accordion-item.open .arrow { transform: rotate(180deg); }
.demo-accordion-body {
  overflow: hidden;
}
.demo-accordion-content {
  padding: 0 16px 14px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

/* Nav item demo */
.demo-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
  max-width: 280px;
}
.demo-nav-item {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  cursor: pointer;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  font-family: var(--font);
  text-align: left;
  transition: all 0.2s;
}
.demo-nav-item:hover { background: var(--bg-surface); color: var(--text); }
.demo-nav-item.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--text);
  font-weight: 600;
}

/* Responsive */
@media (max-width: 1024px) {
  .layout { grid-template-columns: 1fr; height: auto; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .code-panel { border-left: none; border-top: 1px solid var(--border); }
  .preview-container { min-height: 400px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>
    <span class="icon">@s</span>
    @starting-style Playground
    <span class="badge">CSS 2024</span>
  </h1>
  <div class="header-right">
    <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
  </div>
</div>

<div class="layout">
  <!-- Sidebar: Presets -->
  <div class="sidebar">
    <h2>Presets</h2>
    <div class="preset-list" id="presetList">
      <button class="preset-btn active" data-preset="modal">
        <span class="preset-icon">M</span>
        <span class="preset-info">
          <span class="preset-name">Modal Fade-In</span>
          <span class="preset-desc">Animate dialog from hidden</span>
        </span>
      </button>
      <button class="preset-btn" data-preset="toast">
        <span class="preset-icon">T</span>
        <span class="preset-info">
          <span class="preset-name">Toast Slide-In</span>
          <span class="preset-desc">Notification from bottom-right</span>
        </span>
      </button>
      <button class="preset-btn" data-preset="popover">
        <span class="preset-icon">P</span>
        <span class="preset-info">
          <span class="preset-name">Popover Scale</span>
          <span class="preset-desc">Scale up from anchor point</span>
        </span>
      </button>
      <button class="preset-btn" data-preset="cards">
        <span class="preset-icon">C</span>
        <span class="preset-info">
          <span class="preset-name">Staggered Cards</span>
          <span class="preset-desc">Cards appear one by one</span>
        </span>
      </button>
      <button class="preset-btn" data-preset="accordion">
        <span class="preset-icon">A</span>
        <span class="preset-info">
          <span class="preset-name">Accordion Expand</span>
          <span class="preset-desc">Smooth content reveal</span>
        </span>
      </button>
      <button class="preset-btn" data-preset="nav">
        <span class="preset-icon">N</span>
        <span class="preset-info">
          <span class="preset-name">Nav Highlight</span>
          <span class="preset-desc">Active state entry animation</span>
        </span>
      </button>
    </div>

    <h2>Properties</h2>
    <div class="controls">
      <div class="control-row">
        <label>Duration</label>
        <input type="range" id="duration" min="100" max="1500" value="300" step="50">
        <span class="range-value" id="durationVal">300ms</span>
      </div>
      <div class="control-row">
        <label>Easing</label>
        <select id="easing">
          <option value="ease">ease</option>
          <option value="ease-in">ease-in</option>
          <option value="ease-out" selected>ease-out</option>
          <option value="ease-in-out">ease-in-out</option>
          <option value="linear">linear</option>
          <option value="cubic-bezier(0.34, 1.56, 0.64, 1)">spring (overshoot)</option>
          <option value="cubic-bezier(0.22, 1, 0.36, 1)">smooth-out</option>
        </select>
      </div>
      <div class="control-row">
        <label>Start Opacity</label>
        <input type="range" id="startOpacity" min="0" max="1" value="0" step="0.05">
        <span class="range-value" id="startOpacityVal">0</span>
      </div>
      <div class="control-row">
        <label>Start Scale</label>
        <input type="range" id="startScale" min="0" max="1.5" value="0.95" step="0.05">
        <span class="range-value" id="startScaleVal">0.95</span>
      </div>
      <div class="control-row">
        <label>Start Y offset</label>
        <input type="range" id="startY" min="-100" max="100" value="20" step="5">
        <span class="range-value" id="startYVal">20px</span>
      </div>
    </div>

    <div style="margin-top: 16px;">
      <h2>Browser Support</h2>
      <div class="info-bar" style="flex-direction: column; align-items: flex-start; gap: 6px; border: 1px solid var(--border); border-radius: var(--radius); margin-top: 8px;">
        <span><span class="tag tag-green">Chrome 117+</span></span>
        <span><span class="tag tag-green">Edge 117+</span></span>
        <span><span class="tag tag-green">Opera 103+</span></span>
        <span><span class="tag tag-green">Safari 17.5+</span></span>
        <span><span class="tag tag-orange">Firefox 129+</span></span>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-area">
    <div class="preview-header">
      <h3>Live Preview</h3>
      <div class="btn-group">
        <button class="btn btn-primary" id="triggerBtn">Trigger Animation</button>
        <button class="btn btn-outline" id="resetBtn">Reset</button>
      </div>
    </div>
    <div class="preview-container" id="previewContainer">
      <!-- Dynamic content rendered here -->
    </div>
    <div class="info-bar">
      <span>@starting-style defines the initial styles for entry animations from <code>display: none</code></span>
    </div>
  </div>

  <!-- Code Output -->
  <div class="code-panel">
    <div class="code-header">
      <h3>Generated CSS</h3>
      <button class="btn btn-outline" id="copyBtn">Copy</button>
    </div>
    <div class="code-output" id="codeOutput">
      <pre id="codeContent"></pre>
    </div>
  </div>
</div>

<style id="dynamicStyles"></style>

<script>
(() => {
  const els = {
    presetList: document.getElementById('presetList'),
    duration: document.getElementById('duration'),
    durationVal: document.getElementById('durationVal'),
    easing: document.getElementById('easing'),
    startOpacity: document.getElementById('startOpacity'),
    startOpacityVal: document.getElementById('startOpacityVal'),
    startScale: document.getElementById('startScale'),
    startScaleVal: document.getElementById('startScaleVal'),
    startY: document.getElementById('startY'),
    startYVal: document.getElementById('startYVal'),
    previewContainer: document.getElementById('previewContainer'),
    triggerBtn: document.getElementById('triggerBtn'),
    resetBtn: document.getElementById('resetBtn'),
    copyBtn: document.getElementById('copyBtn'),
    codeContent: document.getElementById('codeContent'),
    dynamicStyles: document.getElementById('dynamicStyles'),
  };

  let state = {
    preset: 'modal',
    duration: 300,
    easing: 'ease-out',
    startOpacity: 0,
    startScale: 0.95,
    startY: 20,
  };

  const presets = {
    modal: {
      duration: 300, easing: 'ease-out', startOpacity: 0, startScale: 0.95, startY: 20,
      label: 'Modal Fade-In',
    },
    toast: {
      duration: 400, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', startOpacity: 0, startScale: 1, startY: 40,
      label: 'Toast Slide-In',
    },
    popover: {
      duration: 200, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)', startOpacity: 0, startScale: 0.8, startY: 0,
      label: 'Popover Scale',
    },
    cards: {
      duration: 500, easing: 'ease-out', startOpacity: 0, startScale: 0.9, startY: 30,
      label: 'Staggered Cards',
    },
    accordion: {
      duration: 300, easing: 'ease-out', startOpacity: 0, startScale: 1, startY: -10,
      label: 'Accordion Expand',
    },
    nav: {
      duration: 250, easing: 'ease-out', startOpacity: 0, startScale: 0.98, startY: 0,
      label: 'Nav Highlight',
    },
  };

  // --- Update UI ---
  function updateControlUI() {
    els.duration.value = state.duration;
    els.durationVal.textContent = state.duration + 'ms';
    els.easing.value = state.easing;
    els.startOpacity.value = state.startOpacity;
    els.startOpacityVal.textContent = state.startOpacity;
    els.startScale.value = state.startScale;
    els.startScaleVal.textContent = state.startScale;
    els.startY.value = state.startY;
    els.startYVal.textContent = state.startY + 'px';
  }

  // --- Render Preview ---
  function renderPreview() {
    const p = state.preset;
    els.previewContainer.innerHTML = '';

    if (p === 'modal') {
      els.previewContainer.innerHTML = `
        <div class="demo-stage" style="position:relative;">
          <p style="color:var(--text-secondary);font-size:0.9rem;">Click "Trigger Animation" to show the modal</p>
          <div class="demo-modal-backdrop" id="modalBackdrop">
            <div class="demo-modal ss-target" id="modalEl">
              <h4>Confirm Action</h4>
              <p>This modal uses @starting-style for its entry animation. No JavaScript animations needed.</p>
              <button class="btn btn-primary" onclick="document.getElementById('modalBackdrop').classList.remove('visible');document.getElementById('modalEl').classList.remove('ss-visible');">Close</button>
            </div>
          </div>
        </div>`;
    } else if (p === 'toast') {
      els.previewContainer.innerHTML = `
        <div class="demo-stage" style="position:relative; min-height: 300px;">
          <p style="color:var(--text-secondary);font-size:0.9rem;">Click "Trigger Animation" to show toasts</p>
          <div class="demo-toast-container" id="toastContainer"></div>
        </div>`;
    } else if (p === 'popover') {
      els.previewContainer.innerHTML = `
        <div class="demo-stage">
          <p style="color:var(--text-secondary);font-size:0.9rem;">Click "Trigger Animation" to toggle the popover</p>
          <div style="position:relative;display:inline-block;">
            <button class="demo-popover-anchor" id="popAnchor">Hover Target</button>
            <div class="demo-popover ss-target" id="popoverEl" style="display:none;top:100%;left:50%;transform:translateX(-50%);margin-top:10px;">
              This popover animates in with @starting-style. Pure CSS, no JavaScript animation.
            </div>
          </div>
        </div>`;
    } else if (p === 'cards') {
      els.previewContainer.innerHTML = `
        <div class="demo-stage">
          <p style="color:var(--text-secondary);font-size:0.9rem;">Click "Trigger Animation" to reveal cards</p>
          <div class="demo-card-grid" id="cardGrid">
            <div class="demo-card ss-target" style="display:none;"><div class="card-icon">⚡</div><div class="card-title">Speed</div><div class="card-desc">Blazing fast</div></div>
            <div class="demo-card ss-target" style="display:none;"><div class="card-icon">🔒</div><div class="card-title">Security</div><div class="card-desc">Rock solid</div></div>
            <div class="demo-card ss-target" style="display:none;"><div class="card-icon">🎨</div><div class="card-title">Design</div><div class="card-desc">Beautiful UI</div></div>
          </div>
        </div>`;
    } else if (p === 'accordion') {
      els.previewContainer.innerHTML = `
        <div class="demo-stage">
          <div class="demo-accordion" id="accordionEl">
            <div class="demo-accordion-item">
              <button class="demo-accordion-header" data-idx="0">What is @starting-style? <span class="arrow">▼</span></button>
              <div class="demo-accordion-body ss-target" style="display:none;"><div class="demo-accordion-content">It defines the initial CSS values when an element first renders or transitions from display:none.</div></div>
            </div>
            <div class="demo-accordion-item">
              <button class="demo-accordion-header" data-idx="1">Why not just use keyframes? <span class="arrow">▼</span></button>
              <div class="demo-accordion-body ss-target" style="display:none;"><div class="demo-accordion-content">@starting-style works with CSS transitions, not animations. It's simpler for entry effects and composable with other transitions.</div></div>
            </div>
            <div class="demo-accordion-item">
              <button class="demo-accordion-header" data-idx="2">Browser support? <span class="arrow">▼</span></button>
              <div class="demo-accordion-body ss-target" style="display:none;"><div class="demo-accordion-content">Chrome 117+, Edge 117+, Safari 17.5+, Firefox 129+. Progressively enhanceable.</div></div>
            </div>
          </div>
        </div>`;
      // Accordion handlers
      setTimeout(() => {
        document.querySelectorAll('.demo-accordion-header').forEach(h => {
          h.addEventListener('click', () => {
            const item = h.parentElement;
            const body = item.querySelector('.demo-accordion-body');
            const isOpen = item.classList.contains('open');
            // Close all
            document.querySelectorAll('.demo-accordion-item').forEach(i => {
              i.classList.remove('open');
              i.querySelector('.demo-accordion-body').style.display = 'none';
              i.querySelector('.demo-accordion-body').classList.remove('ss-visible');
            });
            if (!isOpen) {
              item.classList.add('open');
              body.style.display = 'block';
              requestAnimationFrame(() => body.classList.add('ss-visible'));
            }
          });
        });
      }, 0);
    } else if (p === 'nav') {
      els.previewContainer.innerHTML = `
        <div class="demo-stage">
          <div class="demo-nav" id="navEl">
            <button class="demo-nav-item active ss-visible" data-idx="0">Dashboard</button>
            <button class="demo-nav-item" data-idx="1">Analytics</button>
            <button class="demo-nav-item" data-idx="2">Settings</button>
            <button class="demo-nav-item" data-idx="3">Team</button>
          </div>
        </div>`;
      setTimeout(() => {
        document.querySelectorAll('.demo-nav-item').forEach(item => {
          item.addEventListener('click', () => {
            document.querySelectorAll('.demo-nav-item').forEach(i => {
              i.classList.remove('active','ss-visible');
            });
            item.classList.add('active');
            requestAnimationFrame(() => item.classList.add('ss-visible'));
          });
        });
      }, 0);
    }

    applyDynamicCSS();
  }

  // --- Dynamic CSS with @starting-style ---
  function applyDynamicCSS() {
    const d = state.duration;
    const e = state.easing;
    const so = state.startOpacity;
    const ss = state.startScale;
    const sy = state.startY;

    const transforms = [];
    if (ss !== 1) transforms.push(`scale(${ss})`);
    if (sy !== 0) transforms.push(`translateY(${sy}px)`);
    const startTransform = transforms.length ? transforms.join(' ') : 'none';

    let css = '';
    // Common starting-style pattern
    css += `.ss-target {
  transition: opacity ${d}ms ${e}, transform ${d}ms ${e};
  opacity: 1;
  transform: none;
}

.ss-target.ss-visible {
  opacity: 1;
  transform: none;
}

@starting-style {
  .ss-target.ss-visible {
    opacity: ${so};
    transform: ${startTransform};
  }
}
`;

    // Staggered cards
    if (state.preset === 'cards') {
      css += `
.demo-card-grid .ss-target:nth-child(2) {
  transition-delay: ${Math.round(d * 0.3)}ms;
}
.demo-card-grid .ss-target:nth-child(3) {
  transition-delay: ${Math.round(d * 0.6)}ms;
}
@starting-style {
  .demo-card-grid .ss-target.ss-visible:nth-child(2) {
    opacity: ${so};
    transform: ${startTransform};
  }
  .demo-card-grid .ss-target.ss-visible:nth-child(3) {
    opacity: ${so};
    transform: ${startTransform};
  }
}
`;
    }

    els.dynamicStyles.textContent = css;
    renderCode(css);
  }

  // --- Syntax highlight ---
  function renderCode(css) {
    let html = css
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/(\/\*.*?\*\/)/gs, '<span class="cmt">$1</span>')
      .replace(/(@starting-style|@media)/g, '<span class="kw">$1</span>')
      .replace(/(\.[\w-]+(?::[\w-]+(?:\([^)]*\))?)*)/g, '<span class="sel">$1</span>')
      .replace(/(transition(?:-delay)?|opacity|transform)(\s*:)/g, '<span class="prop">$1</span>$2')
      .replace(/:\s*([^;{}]+)(;)/g, ': <span class="val">$1</span>;');
    els.codeContent.innerHTML = html;
  }

  // --- Trigger animation ---
  function triggerAnimation() {
    const p = state.preset;

    if (p === 'modal') {
      const backdrop = document.getElementById('modalBackdrop');
      const modal = document.getElementById('modalEl');
      if (backdrop && modal) {
        backdrop.classList.add('visible');
        modal.classList.remove('ss-visible');
        modal.style.display = 'none';
        requestAnimationFrame(() => {
          modal.style.display = '';
          requestAnimationFrame(() => modal.classList.add('ss-visible'));
        });
      }
    } else if (p === 'toast') {
      const container = document.getElementById('toastContainer');
      if (container) {
        const toasts = ['Saved successfully', 'Email sent', 'File uploaded'];
        const icons = ['✓', '✉', '📁'];
        container.innerHTML = '';
        toasts.forEach((text, i) => {
          setTimeout(() => {
            const t = document.createElement('div');
            t.className = 'demo-toast ss-target';
            t.innerHTML = `<span class="toast-icon">${icons[i]}</span> ${text}`;
            t.style.display = 'none';
            container.appendChild(t);
            requestAnimationFrame(() => {
              t.style.display = '';
              requestAnimationFrame(() => t.classList.add('ss-visible'));
            });
            // Auto-dismiss
            setTimeout(() => {
              t.style.opacity = '0';
              t.style.transform = `translateY(${state.startY}px)`;
              setTimeout(() => t.remove(), state.duration);
            }, 2000 + i * 400);
          }, i * 300);
        });
      }
    } else if (p === 'popover') {
      const pop = document.getElementById('popoverEl');
      if (pop) {
        const isVisible = pop.style.display !== 'none';
        if (isVisible) {
          pop.classList.remove('ss-visible');
          setTimeout(() => pop.style.display = 'none', state.duration);
        } else {
          pop.style.display = '';
          requestAnimationFrame(() => pop.classList.add('ss-visible'));
        }
      }
    } else if (p === 'cards') {
      const cards = document.querySelectorAll('#cardGrid .ss-target');
      cards.forEach((c, i) => {
        c.classList.remove('ss-visible');
        c.style.display = 'none';
        setTimeout(() => {
          c.style.display = '';
          requestAnimationFrame(() => c.classList.add('ss-visible'));
        }, i * Math.round(state.duration * 0.3));
      });
    } else if (p === 'accordion') {
      // Open the first item
      const firstHeader = document.querySelector('.demo-accordion-header[data-idx="0"]');
      if (firstHeader) firstHeader.click();
    } else if (p === 'nav') {
      // Cycle through nav items
      const items = document.querySelectorAll('.demo-nav-item');
      let current = 0;
      items.forEach((item, i) => { if (item.classList.contains('active')) current = i; });
      const next = (current + 1) % items.length;
      items[next].click();
    }
  }

  function resetPreview() {
    renderPreview();
  }

  // --- Event listeners ---

  // Presets
  els.presetList.addEventListener('click', (e) => {
    const btn = e.target.closest('.preset-btn');
    if (!btn) return;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const key = btn.dataset.preset;
    state.preset = key;
    const p = presets[key];
    state.duration = p.duration;
    state.easing = p.easing;
    state.startOpacity = p.startOpacity;
    state.startScale = p.startScale;
    state.startY = p.startY;
    updateControlUI();
    renderPreview();
  });

  // Controls
  els.duration.addEventListener('input', () => {
    state.duration = parseInt(els.duration.value);
    els.durationVal.textContent = state.duration + 'ms';
    applyDynamicCSS();
  });
  els.easing.addEventListener('change', () => {
    state.easing = els.easing.value;
    applyDynamicCSS();
  });
  els.startOpacity.addEventListener('input', () => {
    state.startOpacity = parseFloat(els.startOpacity.value);
    els.startOpacityVal.textContent = state.startOpacity;
    applyDynamicCSS();
  });
  els.startScale.addEventListener('input', () => {
    state.startScale = parseFloat(els.startScale.value);
    els.startScaleVal.textContent = state.startScale;
    applyDynamicCSS();
  });
  els.startY.addEventListener('input', () => {
    state.startY = parseInt(els.startY.value);
    els.startYVal.textContent = state.startY + 'px';
    applyDynamicCSS();
  });

  // Trigger / Reset
  els.triggerBtn.addEventListener('click', triggerAnimation);
  els.resetBtn.addEventListener('click', resetPreview);

  // Copy
  els.copyBtn.addEventListener('click', () => {
    const css = els.dynamicStyles.textContent;
    navigator.clipboard.writeText(css).then(() => {
      els.copyBtn.textContent = 'Copied!';
      els.copyBtn.classList.add('copied');
      setTimeout(() => {
        els.copyBtn.textContent = 'Copy';
        els.copyBtn.classList.remove('copied');
      }, 2000);
    });
  });

  // Init
  updateControlUI();
  renderPreview();
})();
</script>
</body>
</html>
