<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS text-wrap Playground — Dev Toolkit</title>
<meta name="description" content="Interactive text-wrap playground. Compare balance, pretty, wrap, stable side by side. See how CSS text wrapping affects headings and paragraphs.">
<meta property="og:title" content="CSS text-wrap Playground — Dev Toolkit">
<meta property="og:description" content="Interactive text-wrap playground. Compare balance, pretty, wrap, stable side by side. See how CSS text wrapping affects headings and paragraphs.">
<meta property="og:type" content="website">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Georgia&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-surface: #1a1a1a;
  --bg-input: #222222;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --text: #e6e6e6;
  --text-secondary: #999;
  --text-dim: #666;
  --accent: #f97316;
  --accent-hover: #ea580c;
  --accent-glow: rgba(249, 115, 22, 0.15);
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a78bfa;
  --pink: #f472b6;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --serif: 'Georgia', 'Times New Roman', serif;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 .icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
}
.badge {
  font-size: 0.75rem;
  padding: 3px 8px;
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 99px;
  font-weight: 600;
}
.header-right a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
}
.header-right a:hover { color: var(--text); }

/* Controls bar */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  flex-wrap: wrap;
}
.control-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.control-group label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
  white-space: nowrap;
}
.control-group select, .control-group input[type="range"] {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  padding: 6px 10px;
}
.control-group input[type="range"] {
  -webkit-appearance: none;
  width: 160px;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-input);
  padding: 0;
  border: none;
}
.control-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.range-val {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--accent);
  min-width: 40px;
}
.btn {
  padding: 6px 14px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--border-hover); background: var(--bg-input); }
.btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }

/* Comparison grid */
.comparison {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 0;
  flex: 1;
  overflow: auto;
}
.panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.panel:last-child { border-right: none; }
.panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-header h3 {
  font-size: 0.9rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-header .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.panel-header .line-count {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: var(--mono);
}
.panel-body {
  flex: 1;
  padding: 24px;
  overflow: auto;
  position: relative;
}
.demo-text {
  transition: all 0.2s;
  word-break: normal;
  overflow-wrap: break-word;
}

/* Highlight orphans */
.orphan-highlight {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  pointer-events: none;
}

/* Code output */
.code-bar {
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.code-bar pre {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.code-bar .kw { color: #c084fc; }
.code-bar .prop { color: #93c5fd; }
.code-bar .val { color: #86efac; }
.btn-copy {
  padding: 4px 12px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text);
}
.btn-copy.copied { border-color: var(--green); color: var(--green); }

/* Info */
.info-bar {
  padding: 10px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg-elevated);
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.tag-green { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-orange { background: rgba(245,158,11,0.15); color: #f59e0b; }

/* Presets */
.preset-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Main layout */
.main {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 57px);
}

@media (max-width: 900px) {
  .comparison { grid-template-columns: 1fr; }
  .panel { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>
<div class="header">
  <h1>
    <span class="icon">Tw</span>
    text-wrap Playground
    <span class="badge">CSS 2024</span>
  </h1>
  <div class="header-right">
    <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
  </div>
</div>

<div class="main">
  <!-- Controls -->
  <div class="controls-bar">
    <div class="control-group">
      <label>Width</label>
      <input type="range" id="widthSlider" min="180" max="600" value="360" step="10">
      <span class="range-val" id="widthVal">360px</span>
    </div>
    <div class="control-group">
      <label>Font Size</label>
      <input type="range" id="fontSlider" min="12" max="48" value="20" step="1">
      <span class="range-val" id="fontVal">20px</span>
    </div>
    <div class="control-group">
      <label>Font</label>
      <select id="fontSelect">
        <option value="Inter, sans-serif">Inter (sans)</option>
        <option value="Georgia, serif">Georgia (serif)</option>
        <option value="system-ui, sans-serif">System UI</option>
        <option value="'JetBrains Mono', monospace">Monospace</option>
      </select>
    </div>
    <div class="control-group">
      <label>Text</label>
      <div class="preset-bar">
        <button class="btn active" data-text="heading">Heading</button>
        <button class="btn" data-text="subtitle">Subtitle</button>
        <button class="btn" data-text="paragraph">Paragraph</button>
        <button class="btn" data-text="custom">Custom</button>
      </div>
    </div>
  </div>

  <!-- Custom text input (hidden by default) -->
  <div id="customInput" style="display:none;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg-elevated);">
    <textarea id="customText" rows="3" style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:0.9rem;padding:10px;resize:vertical;" placeholder="Type your own text to compare...">CSS is awesome and text-wrap makes typography better</textarea>
  </div>

  <!-- Comparison panels -->
  <div class="comparison" id="comparison">
    <div class="panel" data-mode="wrap">
      <div class="panel-header">
        <h3><span class="dot" style="background:var(--text-dim);"></span> wrap <span style="font-weight:400;color:var(--text-dim);font-size:0.8rem;">(default)</span></h3>
        <span class="line-count" id="lines-wrap"></span>
      </div>
      <div class="panel-body">
        <div class="demo-text" id="text-wrap" style="text-wrap:wrap;"></div>
      </div>
    </div>
    <div class="panel" data-mode="balance">
      <div class="panel-header">
        <h3><span class="dot" style="background:var(--accent);"></span> balance</h3>
        <span class="line-count" id="lines-balance"></span>
      </div>
      <div class="panel-body">
        <div class="demo-text" id="text-balance" style="text-wrap:balance;"></div>
      </div>
    </div>
    <div class="panel" data-mode="pretty">
      <div class="panel-header">
        <h3><span class="dot" style="background:var(--blue);"></span> pretty</h3>
        <span class="line-count" id="lines-pretty"></span>
      </div>
      <div class="panel-body">
        <div class="demo-text" id="text-pretty" style="text-wrap:pretty;"></div>
      </div>
    </div>
    <div class="panel" data-mode="stable">
      <div class="panel-header">
        <h3><span class="dot" style="background:var(--purple);"></span> stable</h3>
        <span class="line-count" id="lines-stable"></span>
      </div>
      <div class="panel-body">
        <div class="demo-text" id="text-stable" style="text-wrap:stable;"></div>
      </div>
    </div>
  </div>

  <!-- Code output -->
  <div class="code-bar">
    <pre id="codeOutput"></pre>
    <button class="btn-copy" id="copyBtn">Copy CSS</button>
  </div>

  <!-- Info -->
  <div class="info-bar">
    <span><span class="tag tag-green">balance</span> equalizes line lengths (headings, max 6 lines)</span>
    <span><span class="tag tag-green">pretty</span> avoids orphaned words on last line</span>
    <span><span class="tag tag-orange">stable</span> prevents reflow during editing (contenteditable)</span>
  </div>
</div>

<script>
(() => {
  const texts = {
    heading: 'The Future of Web Typography Is Already Here',
    subtitle: 'CSS text-wrap balance and pretty give you fine control over how text wraps without any JavaScript or manual line breaks',
    paragraph: 'Modern CSS has evolved to give developers unprecedented control over typography. The text-wrap property with its balance and pretty values solves problems that previously required JavaScript hacks or manual line breaks. No more single words dangling on the last line of a paragraph.',
  };

  let customText = 'CSS is awesome and text-wrap makes typography better';
  let currentPreset = 'heading';

  const widthSlider = document.getElementById('widthSlider');
  const widthVal = document.getElementById('widthVal');
  const fontSlider = document.getElementById('fontSlider');
  const fontVal = document.getElementById('fontVal');
  const fontSelect = document.getElementById('fontSelect');
  const customInput = document.getElementById('customInput');
  const customTextArea = document.getElementById('customText');
  const copyBtn = document.getElementById('copyBtn');
  const codeOutput = document.getElementById('codeOutput');

  const modes = ['wrap', 'balance', 'pretty', 'stable'];
  const els = {};
  const lineEls = {};
  modes.forEach(m => {
    els[m] = document.getElementById('text-' + m);
    lineEls[m] = document.getElementById('lines-' + m);
  });

  function getText() {
    return currentPreset === 'custom' ? customText : texts[currentPreset];
  }

  function update() {
    const w = widthSlider.value + 'px';
    const fs = fontSlider.value + 'px';
    const ff = fontSelect.value;
    const text = getText();

    widthVal.textContent = w;
    fontVal.textContent = fs;

    modes.forEach(m => {
      const el = els[m];
      el.textContent = text;
      el.style.width = w;
      el.style.maxWidth = '100%';
      el.style.fontSize = fs;
      el.style.fontFamily = ff;
      el.style.lineHeight = '1.4';

      // Count visual lines
      requestAnimationFrame(() => {
        const lineH = parseFloat(fs) * 1.4;
        const totalH = el.offsetHeight;
        const lines = Math.round(totalH / lineH);
        lineEls[m].textContent = lines + ' line' + (lines !== 1 ? 's' : '');
      });
    });

    // Update code
    codeOutput.innerHTML =
      `<span class="prop">text-wrap</span>: <span class="val">balance</span>;  <span style="color:var(--text-dim);">/* headings — equalizes line lengths */</span>\n` +
      `<span class="prop">text-wrap</span>: <span class="val">pretty</span>;   <span style="color:var(--text-dim);">/* paragraphs — avoids orphan words */</span>`;
  }

  // Events
  widthSlider.addEventListener('input', update);
  fontSlider.addEventListener('input', update);
  fontSelect.addEventListener('change', update);

  document.querySelectorAll('[data-text]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-text]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPreset = btn.dataset.text;
      customInput.style.display = currentPreset === 'custom' ? 'block' : 'none';
      if (currentPreset === 'heading') {
        fontSlider.value = 28;
      } else if (currentPreset === 'subtitle') {
        fontSlider.value = 18;
      } else if (currentPreset === 'paragraph') {
        fontSlider.value = 16;
      }
      update();
    });
  });

  customTextArea.addEventListener('input', () => {
    customText = customTextArea.value;
    update();
  });

  copyBtn.addEventListener('click', () => {
    const css = `/* Headings: equalize line lengths */\nh1, h2, h3 {\n  text-wrap: balance;\n}\n\n/* Paragraphs: prevent orphaned last words */\np {\n  text-wrap: pretty;\n}`;
    navigator.clipboard.writeText(css).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy CSS';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });

  // Init
  update();
})();
</script>
</body>
</html>
