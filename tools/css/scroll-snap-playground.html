<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-surface: #1a1a1a;
  --bg-input: #222222;
  --border: #2a2a2a;
  --text: #e6e6e6;
  --text-secondary: #999;
  --text-dim: #666;
  --accent: #f472b6;
  --accent-hover: #ec4899;
  --accent-glow: rgba(244, 114, 182, 0.15);
  --green: #22c55e;
  --radius: 8px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html { font-size: 14px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg-elevated);
}
.header h1 { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.header h1 .icon {
  width: 28px; height: 28px; background: var(--accent); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
}
.badge { font-size: 0.75rem; padding: 3px 8px; background: var(--accent-glow); color: var(--accent); border-radius: 99px; font-weight: 600; }
.header-right a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }

.layout { display: grid; grid-template-columns: 300px 1fr 1fr; height: calc(100vh - 57px); }

/* Controls */
.controls-panel {
  display: flex; flex-direction: column; border-right: 1px solid var(--border);
  overflow-y: auto; background: var(--bg-elevated);
}
.section-title {
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-dim); padding: 12px 16px 6px;
}
.control-group { padding: 6px 16px 12px; border-bottom: 1px solid var(--border); }
.control-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.control-row:last-child { margin-bottom: 0; }
.control-row label { font-size: 0.8rem; color: var(--text-secondary); min-width: 100px; flex-shrink: 0; }
.control-row select, .control-row input {
  flex: 1; font-family: var(--font); font-size: 0.8rem;
  padding: 6px 10px; border-radius: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); outline: none;
}
.control-row select:focus, .control-row input:focus { border-color: var(--accent); }
.control-row input[type="range"] { padding: 0; border: none; background: none; accent-color: var(--accent); }
.control-row .val-display { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); min-width: 40px; text-align: right; }

/* Presets */
.presets { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px 12px; border-bottom: 1px solid var(--border); }
.preset-btn {
  padding: 5px 12px; border-radius: 99px; font-family: var(--font);
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary);
  transition: all 0.15s;
}
.preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.preset-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* Item overrides */
.item-list { padding: 8px 16px; }
.item-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 6px; padding: 8px 12px;
}
.item-card .item-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.item-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.item-row label { font-size: 0.75rem; color: var(--text-dim); min-width: 75px; }
.item-row select {
  flex: 1; font-family: var(--font); font-size: 0.75rem;
  padding: 3px 6px; border-radius: 4px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); outline: none;
}

/* Preview Panel */
.preview-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg-elevated);
}
.panel-header h3 { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }

.preview-area { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; overflow: hidden; }

/* Scroll containers */
.snap-container {
  border: 2px solid var(--border); border-radius: var(--radius); overflow: auto;
  position: relative;
}
.snap-container.horizontal {
  width: 100%; max-width: 500px; height: 250px;
  display: flex; flex-direction: row; flex-wrap: nowrap;
}
.snap-container.vertical {
  width: 280px; height: 350px;
  display: flex; flex-direction: column; flex-wrap: nowrap;
}
.snap-container.both {
  width: 350px; height: 350px;
  display: grid; grid-template-columns: repeat(3, 350px);
  grid-auto-rows: 350px;
}

.snap-item {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.5rem; color: rgba(255,255,255,0.8);
  position: relative;
}
.snap-container.horizontal .snap-item { width: 100%; max-width: 500px; height: 100%; }
.snap-container.vertical .snap-item { width: 100%; height: 350px; }
.snap-container.both .snap-item { width: 350px; height: 350px; }

.snap-item .item-label {
  position: absolute; top: 10px; left: 12px;
  font-size: 0.7rem; font-weight: 600; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em;
}
.snap-item .item-info {
  position: absolute; bottom: 10px; right: 12px;
  font-family: var(--mono); font-size: 0.65rem; opacity: 0.5;
}

/* Scroll padding indicator */
.padding-indicator {
  position: absolute; inset: 0; pointer-events: none; z-index: 2;
  border: 2px dashed rgba(244, 114, 182, 0.4);
}

.colors-0 { background: linear-gradient(135deg, #667eea, #764ba2); }
.colors-1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
.colors-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.colors-3 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
.colors-4 { background: linear-gradient(135deg, #fa709a, #fee140); }
.colors-5 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
.colors-6 { background: linear-gradient(135deg, #fccb90, #d57eeb); }
.colors-7 { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); }

.info-bar {
  padding: 10px 16px; border-top: 1px solid var(--border);
  background: var(--bg-elevated); font-size: 0.8rem; color: var(--text-secondary);
  display: flex; gap: 16px; align-items: center;
}
.tag-green { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: rgba(34,197,94,0.15); color: var(--green); }

/* Scroll position indicator */
.scroll-pos {
  padding: 8px 16px; border-top: 1px solid var(--border); background: var(--bg-elevated);
  font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim);
}

/* Code Panel */
.code-panel { display: flex; flex-direction: column; }
.code-output { flex: 1; overflow: auto; padding: 16px; background: var(--bg); }
.code-output pre { font-family: var(--mono); font-size: 0.8rem; line-height: 1.7; white-space: pre-wrap; }
.kw { color: #c084fc; }
.sel { color: #67e8f9; }
.prop { color: #93c5fd; }
.val { color: #86efac; }
.cmt { color: var(--text-dim); font-style: italic; }

.btn-outline {
  padding: 6px 14px; border-radius: var(--radius); font-family: var(--font);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text);
}
.btn-outline.copied { border-color: var(--green); color: var(--green); }

/* Direction toggle */
.dir-btns { display: flex; gap: 4px; }
.dir-btn {
  padding: 4px 10px; border-radius: 6px; font-family: var(--font);
  font-size: 0.7rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary);
}
.dir-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

@media (max-width: 1100px) {
  .layout { grid-template-columns: 1fr 1fr; }
  .controls-panel { display: none; }
}
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .preview-panel { min-height: 400px; }
}
</style>

<script>
(() => {
  const container = document.getElementById('snapContainer');
  const codeContent = document.getElementById('codeContent');
  const copyBtn = document.getElementById('copyBtn');
  const itemList = document.getElementById('itemList');
  const scrollPos = document.getElementById('scrollPos');

  let itemOverrides = []; // per-item overrides: { align, stop, margin }

  const PRESETS = {
    carousel: { direction: 'x', type: 'mandatory', padding: 0, align: 'center', stop: 'normal', margin: 0, items: 5 },
    pages: { direction: 'y', type: 'mandatory', padding: 0, align: 'start', stop: 'always', margin: 0, items: 5 },
    gallery: { direction: 'x', type: 'proximity', padding: 0, align: 'center', stop: 'normal', margin: 0, items: 8 },
    cards: { direction: 'x', type: 'mandatory', padding: 20, align: 'start', stop: 'normal', margin: 0, items: 5 },
    padded: { direction: 'x', type: 'mandatory', padding: 40, align: 'start', stop: 'normal', margin: 10, items: 6 },
  };

  function loadPreset(name) {
    const p = PRESETS[name];
    if (!p) return;
    document.getElementById('opt-direction').value = p.direction;
    document.getElementById('opt-type').value = p.type;
    document.getElementById('opt-padding').value = p.padding;
    document.getElementById('val-padding').textContent = p.padding + 'px';
    document.getElementById('opt-align').value = p.align;
    document.getElementById('opt-stop').value = p.stop;
    document.getElementById('opt-margin').value = p.margin;
    document.getElementById('val-margin').textContent = p.margin + 'px';
    document.getElementById('opt-items').value = p.items;
    document.getElementById('val-items').textContent = p.items;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.toggle('active', b.dataset.dir === p.direction));
    itemOverrides = [];
    rebuild();
  }

  function getConfig() {
    return {
      direction: document.getElementById('opt-direction').value,
      type: document.getElementById('opt-type').value,
      padding: parseInt(document.getElementById('opt-padding').value),
      align: document.getElementById('opt-align').value,
      stop: document.getElementById('opt-stop').value,
      margin: parseInt(document.getElementById('opt-margin').value),
      items: parseInt(document.getElementById('opt-items').value),
    };
  }

  function rebuild() {
    const cfg = getConfig();
    const n = cfg.items;

    // Ensure overrides array
    while (itemOverrides.length < n) itemOverrides.push({});
    itemOverrides.length = n;

    // Container class
    container.className = 'snap-container ' + (cfg.direction === 'y' ? 'vertical' : cfg.direction === 'both' ? 'both' : 'horizontal');

    // Container style
    const snapAxis = cfg.direction === 'y' ? 'y' : cfg.direction === 'both' ? 'both' : 'x';
    container.style.scrollSnapType = `${snapAxis} ${cfg.type}`;
    container.style.scrollPadding = cfg.padding ? cfg.padding + 'px' : '0';

    // Items
    container.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const item = document.createElement('div');
      item.className = `snap-item colors-${i % 8}`;

      const align = itemOverrides[i].align || cfg.align;
      const stop = itemOverrides[i].stop || cfg.stop;
      const margin = itemOverrides[i].margin !== undefined ? itemOverrides[i].margin : cfg.margin;

      item.style.scrollSnapAlign = align;
      if (stop === 'always') item.style.scrollSnapStop = 'always';
      if (margin) item.style.scrollMargin = margin + 'px';

      item.innerHTML = `${i + 1}`;
      const label = document.createElement('span');
      label.className = 'item-label';
      label.textContent = `Item ${i + 1}`;
      item.appendChild(label);

      const info = document.createElement('span');
      info.className = 'item-info';
      info.textContent = `align: ${align}`;
      item.appendChild(info);

      container.appendChild(item);
    }

    renderItemOverrides(cfg);
    renderCode(cfg);
  }

  function renderItemOverrides(cfg) {
    const n = cfg.items;
    itemList.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `<div class="item-title" style="color:var(--text-dim)">Item ${i + 1}</div>`;

      // align override
      const alignRow = document.createElement('div');
      alignRow.className = 'item-row';
      alignRow.innerHTML = `<label>snap-align</label>`;
      const alignSel = document.createElement('select');
      ['(default)', 'start', 'center', 'end', 'none'].forEach(v => {
        const o = document.createElement('option');
        o.value = v === '(default)' ? '' : v;
        o.textContent = v;
        if ((itemOverrides[i].align || '') === (v === '(default)' ? '' : v)) o.selected = true;
        alignSel.appendChild(o);
      });
      alignSel.onchange = () => { itemOverrides[i].align = alignSel.value; rebuild(); };
      alignRow.appendChild(alignSel);
      card.appendChild(alignRow);

      // stop override
      const stopRow = document.createElement('div');
      stopRow.className = 'item-row';
      stopRow.innerHTML = `<label>snap-stop</label>`;
      const stopSel = document.createElement('select');
      ['(default)', 'normal', 'always'].forEach(v => {
        const o = document.createElement('option');
        o.value = v === '(default)' ? '' : v;
        o.textContent = v;
        if ((itemOverrides[i].stop || '') === (v === '(default)' ? '' : v)) o.selected = true;
        stopSel.appendChild(o);
      });
      stopSel.onchange = () => { itemOverrides[i].stop = stopSel.value; rebuild(); };
      stopRow.appendChild(stopSel);
      card.appendChild(stopRow);

      itemList.appendChild(card);
    }
  }

  function renderCode(cfg) {
    const axis = cfg.direction === 'y' ? 'y' : cfg.direction === 'both' ? 'both' : 'x';
    let html = `<span class="cmt">/* Scroll Snap Container */</span>
<span class="sel">.scroll-container</span> {
  <span class="prop">scroll-snap-type</span>: <span class="val">${axis} ${cfg.type}</span>;`;

    if (cfg.direction === 'y') {
      html += `\n  <span class="prop">overflow-y</span>: <span class="val">auto</span>;`;
    } else if (cfg.direction === 'both') {
      html += `\n  <span class="prop">overflow</span>: <span class="val">auto</span>;`;
    } else {
      html += `\n  <span class="prop">overflow-x</span>: <span class="val">auto</span>;`;
    }

    if (cfg.padding) {
      html += `\n  <span class="prop">scroll-padding</span>: <span class="val">${cfg.padding}px</span>;`;
    }
    html += `\n}

<span class="cmt">/* Scroll Snap Items */</span>
<span class="sel">.scroll-item</span> {
  <span class="prop">scroll-snap-align</span>: <span class="val">${cfg.align}</span>;`;

    if (cfg.stop === 'always') {
      html += `\n  <span class="prop">scroll-snap-stop</span>: <span class="val">always</span>;`;
    }
    if (cfg.margin) {
      html += `\n  <span class="prop">scroll-margin</span>: <span class="val">${cfg.margin}px</span>;`;
    }
    html += `\n}`;

    // Per-item overrides
    const hasOverrides = itemOverrides.some(o => o.align || o.stop);
    if (hasOverrides) {
      html += `\n\n<span class="cmt">/* Per-item overrides */</span>`;
      itemOverrides.forEach((o, i) => {
        if (o.align || o.stop) {
          html += `\n<span class="sel">.scroll-item:nth-child(${i + 1})</span> {`;
          if (o.align) html += `\n  <span class="prop">scroll-snap-align</span>: <span class="val">${o.align}</span>;`;
          if (o.stop) html += `\n  <span class="prop">scroll-snap-stop</span>: <span class="val">${o.stop}</span>;`;
          html += `\n}`;
        }
      });
    }

    // Explanation comments
    html += `\n
<span class="cmt">/* scroll-snap-type values:
   x mandatory  — horizontal, always snaps
   y mandatory  — vertical, always snaps
   x proximity  — snaps only when near a snap point
   both mandatory — snaps in both axes */</span>

<span class="cmt">/* scroll-snap-align values:
   start  — snap to start edge
   center — snap to center
   end    — snap to end edge
   none   — no snapping for this item */</span>

<span class="cmt">/* scroll-snap-stop: always
   Forces each item to be visited when scrolling fast.
   Without it, momentum scrolling can skip items. */</span>

<span class="cmt">/* scroll-padding on container:
   Adds inset before snap positions.
   Useful for sticky headers or peek layouts. */</span>

<span class="cmt">/* scroll-margin on items:
   Offsets the snap position per item.
   Useful for spacing between snapped items. */</span>`;

    codeContent.innerHTML = html;
  }

  function getPlainCode() {
    const cfg = getConfig();
    const axis = cfg.direction === 'y' ? 'y' : cfg.direction === 'both' ? 'both' : 'x';
    const overflow = cfg.direction === 'y' ? 'overflow-y: auto;' : cfg.direction === 'both' ? 'overflow: auto;' : 'overflow-x: auto;';
    let code = `/* Scroll Snap Container */\n.scroll-container {\n  scroll-snap-type: ${axis} ${cfg.type};\n  ${overflow}\n`;
    if (cfg.padding) code += `  scroll-padding: ${cfg.padding}px;\n`;
    code += `}\n\n/* Scroll Snap Items */\n.scroll-item {\n  scroll-snap-align: ${cfg.align};\n`;
    if (cfg.stop === 'always') code += `  scroll-snap-stop: always;\n`;
    if (cfg.margin) code += `  scroll-margin: ${cfg.margin}px;\n`;
    code += `}`;

    const hasOverrides = itemOverrides.some(o => o.align || o.stop);
    if (hasOverrides) {
      code += `\n\n/* Per-item overrides */`;
      itemOverrides.forEach((o, i) => {
        if (o.align || o.stop) {
          code += `\n.scroll-item:nth-child(${i + 1}) {`;
          if (o.align) code += `\n  scroll-snap-align: ${o.align};`;
          if (o.stop) code += `\n  scroll-snap-stop: ${o.stop};`;
          code += `\n}`;
        }
      });
    }
    return code;
  }

  // Events
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => loadPreset(btn.dataset.preset));
  });

  document.querySelectorAll('.dir-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('opt-direction').value = btn.dataset.dir;
      rebuild();
    });
  });

  ['direction', 'type', 'align', 'stop'].forEach(id => {
    document.getElementById('opt-' + id).addEventListener('change', rebuild);
  });

  ['padding', 'margin'].forEach(id => {
    const el = document.getElementById('opt-' + id);
    const valEl = document.getElementById('val-' + id);
    el.addEventListener('input', () => { valEl.textContent = el.value + 'px'; rebuild(); });
  });

  document.getElementById('opt-items').addEventListener('input', () => {
    document.getElementById('val-items').textContent = document.getElementById('opt-items').value;
    rebuild();
  });

  container.addEventListener('scroll', () => {
    scrollPos.textContent = `scroll: ${Math.round(container.scrollLeft)}, ${Math.round(container.scrollTop)}`;
  });

  copyBtn.onclick = () => {
    navigator.clipboard.writeText(getPlainCode()).then(() => {
      copyBtn.textContent=T("jtc_copied");
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent=T("jtc_copy"); copyBtn.classList.remove('copied'); }, 2000);
    });
  };

  // Init
  loadPreset('carousel');
})();
</script>
