<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --text:#e6e6e6;--text-dim:#888;--accent:#3b82f6;--accent-hover:#2563eb;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent)}

/* Layout */
.app{max-width:1200px;margin:0 auto;padding:24px 20px}
header{text-align:center;margin-bottom:32px}
header h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.02em}
header h1 span{color:var(--accent)}
header p{color:var(--text-dim);margin-top:6px;font-size:0.95rem}

/* Browser support */
.support{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.8rem;margin-top:12px}
.support-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.support-dot.yes{background:var(--green)}.support-dot.no{background:var(--red)}

/* Presets */
.presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;justify-content:center}
.preset-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-size:0.85rem;transition:all .15s}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.preset-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Main panels */
.panels{display:grid;grid-template-rows:auto auto;gap:20px}

/* Demo area */
.demo-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);font-size:0.85rem;color:var(--text-dim)}
.panel-header strong{color:var(--text);font-weight:600}
.demo-content{padding:24px;min-height:200px}

/* Code area */
.code-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.code-sections{display:grid;grid-template-columns:1fr 1fr;gap:0}
.code-section{padding:16px;position:relative}
.code-section:first-child{border-right:1px solid var(--border)}
.code-section label{display:block;font-size:0.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.code-section pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'SF Mono',Consolas,'Liberation Mono',monospace;font-size:0.82rem;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-word;color:#c9d1d9;max-height:300px;overflow-y:auto}
.code-section pre .kw{color:#ff7b72}.code-section pre .sel{color:#79c0ff}.code-section pre .val{color:#a5d6ff}.code-section pre .prop{color:#d2a8ff}.code-section pre .tag{color:#7ee787}.code-section pre .attr{color:#ffa657}.code-section pre .str{color:#a5d6ff}.code-section pre .cmt{color:#6e7681}

/* Custom selector input */
.custom-row{display:flex;gap:12px;align-items:center;padding:0 16px 16px;flex-wrap:wrap}
.custom-row label{font-size:0.8rem;color:var(--text-dim);white-space:nowrap}
.custom-input{flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:'SF Mono',Consolas,monospace;font-size:0.85rem}
.custom-input:focus{outline:none;border-color:var(--accent)}
.custom-input::placeholder{color:#555}

/* Copy button */
.copy-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.75rem;transition:all .15s;white-space:nowrap}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Explanation */
.explanation{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin:16px 16px 0;font-size:0.85rem;color:var(--text-dim);line-height:1.7}
.explanation code{background:var(--bg);padding:2px 6px;border-radius:4px;font-family:'SF Mono',Consolas,monospace;font-size:0.8rem;color:var(--accent)}

/* ===== DEMO STYLES ===== */

/* Preset 1: Form Validation */
.demo-form .field{padding:12px;border:2px solid var(--border);border-radius:var(--radius);margin-bottom:12px;transition:all .2s}
.demo-form .field label{display:block;font-size:0.85rem;margin-bottom:6px;color:var(--text-dim)}
.demo-form .field input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;width:100%;font-size:0.9rem}
.demo-form .field input:focus{outline:none;border-color:var(--accent)}
.demo-form .field:has(input:invalid:not(:placeholder-shown)){border-color:var(--red);background:rgba(239,68,68,0.05)}
.demo-form .field:has(input:valid:not(:placeholder-shown)){border-color:var(--green);background:rgba(34,197,94,0.05)}

/* Preset 2: Checked Parent */
.demo-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.demo-cards .card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;transition:all .25s;cursor:pointer}
.demo-cards .card span{display:block;font-size:0.9rem;margin-bottom:8px}
.demo-cards .card input[type="checkbox"]{accent-color:var(--accent);width:18px;height:18px;cursor:pointer}
.demo-cards .card:has(input:checked){border-color:var(--accent);background:rgba(59,130,246,0.1);transform:translateY(-2px);box-shadow:0 4px 12px rgba(59,130,246,0.15)}

/* Preset 3: Image Card */
.demo-articles{display:grid;gap:16px}
.demo-articles article{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s}
.demo-articles article:has(img){display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:center}
.demo-articles article img{width:100%;border-radius:6px;height:80px;object-fit:cover;background:var(--accent);display:block}
.demo-articles article h3{font-size:0.95rem;margin-bottom:4px}
.demo-articles article p{font-size:0.8rem;color:var(--text-dim)}

/* Preset 4: Empty State */
.demo-list{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:120px;position:relative}
.demo-list .items{display:flex;flex-wrap:wrap;gap:8px}
.demo-list .item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:0.85rem;display:flex;align-items:center;gap:8px}
.demo-list .item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;line-height:1;padding:0 2px}
.demo-list .empty-msg{display:none;color:var(--text-dim);text-align:center;padding:20px;font-size:0.9rem}
.demo-list:has(.items:empty) .empty-msg{display:block}
.demo-list .list-controls{margin-top:12px;display:flex;gap:8px}
.demo-list .list-controls button{background:var(--accent);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem}
.demo-list .list-controls button:hover{background:var(--accent-hover)}

/* Preset 5: Focus Within */
.demo-search{display:flex;justify-content:center;padding:20px 0}
.demo-search .search{display:flex;align-items:center;gap:8px;background:var(--surface2);border:2px solid var(--border);border-radius:40px;padding:8px 16px;width:240px;transition:all .3s ease}
.demo-search .search svg{flex-shrink:0;color:var(--text-dim);transition:color .2s}
.demo-search .search input{background:none;border:none;color:var(--text);font-size:0.9rem;width:100%;outline:none}
.demo-search .search input::placeholder{color:#555}
.demo-search .search:has(input:focus){width:400px;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.2)}
.demo-search .search:has(input:focus) svg{color:var(--accent)}
.demo-search .search-hint{font-size:0.8rem;color:var(--text-dim);text-align:center;margin-top:12px}

/* Preset 6: Quantity Query */
.demo-grid{padding:8px 0}
.demo-grid .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;transition:all .2s}
.demo-grid .grid:has(:nth-child(4)){grid-template-columns:repeat(3,1fr)}
.demo-grid .grid:has(:nth-child(7)){grid-template-columns:repeat(4,1fr)}
.demo-grid .grid-item{background:var(--accent);border-radius:var(--radius);padding:20px;text-align:center;font-weight:600;font-size:0.9rem;color:#fff;opacity:0.85;transition:all .2s}
.demo-grid .grid-item:hover{opacity:1}
.demo-grid .grid-controls{margin-top:14px;display:flex;gap:8px;align-items:center}
.demo-grid .grid-controls button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.demo-grid .grid-controls button:hover{border-color:var(--accent);color:var(--accent)}
.demo-grid .grid-controls span{font-size:0.85rem;color:var(--text-dim)}
.demo-grid .grid-label{font-size:0.8rem;color:var(--text-dim);margin-top:8px}

/* Custom styles injected by user */
#custom-style{}

footer{text-align:center;padding:32px 0 16px;font-size:0.8rem;color:var(--text-dim)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}

@media(max-width:700px){
  .code-sections{grid-template-columns:1fr}
  .code-section:first-child{border-right:none;border-bottom:1px solid var(--border)}
  header h1{font-size:1.4rem}
  .demo-search .search:has(input:focus){width:100%}
  .demo-articles article:has(img){grid-template-columns:1fr}
}
</style>
</head>

.grid:has(:nth-child(4)) {
  grid-template-columns: repeat(3, 1fr);
}

/* 7+ items: 4 columns */
.grid:has(:nth-child(7)) {
  grid-template-columns: repeat(4, 1fr);
}`,
    html: `<div class="demo-grid">
  <div class="grid" id="quantityGrid">
    <div class="grid-item">1</div>
    <div class="grid-item">2</div>
    <div class="grid-item">3</div>
  </div>
  <div class="grid-label" id="gridLabel">3 items &rarr; 2 columns</div>
  <div class="grid-controls">
    <button onclick="removeGridItem()">-</button>
    <span id="gridCount">3 items</span>
    <button onclick="addGridItem()">+</button>
  </div>
</div>`,
    render() {
      return this.html;
    }
  }
};

let currentPreset = 'form';

// Syntax highlighting (minimal)
function highlightCSS(code) {
  return code
    .replace(/\/\*[\s\S]*?\*\//g, m => `<span class="cmt">${m}</span>`)
    .replace(/([\w\-.*#:()[\]>+~=^$|,\s]+?)(\{)/g, (_, sel, br) => `<span class="sel">${sel}</span>${br}`)
    .replace(/([\w-]+)(\s*:\s*)/g, (_, p, c) => `<span class="prop">${p}</span>${c}`)
    .replace(/(:?\s)(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\)|\d+[\w%]*)/g, (_, sp, v) => `${sp}<span class="val">${v}</span>`);
}

function highlightHTML(code) {
  return code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(&lt;\/?)([\w-]+)/g, (_, br, tag) => `${br}<span class="tag">${tag}</span>`)
    .replace(/([\w-]+)(=)/g, (_, attr, eq) => `<span class="attr">${attr}</span>${eq}`)
    .replace(/(".*?")/g, '<span class="str">$1</span>');
}

function loadPreset(name) {
  currentPreset = name;
  const p = presets[name];

  // Update buttons
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === name);
  });

  // Render demo
  document.getElementById('demoContent').innerHTML = p.render();
  document.getElementById('demoHint').textContent = p.hint;

  // Render code
  document.getElementById('cssCode').innerHTML = highlightCSS(p.css);
  document.getElementById('htmlCode').innerHTML = highlightHTML(p.html);

  // Explanation
  const box = document.getElementById('explanationBox');
  box.innerHTML = p.explanation;
  box.style.display = 'block';

  // Clear custom input
  document.getElementById('customInput').value = '';
  document.getElementById('custom-style').textContent = '';
}

// Preset buttons
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (btn) loadPreset(btn.dataset.preset);
});

// Copy CSS
document.getElementById('copyBtn').addEventListener('click', () => {
  const p = presets[currentPreset];
  const custom = document.getElementById('customInput').value.trim();
  const text = custom ? p.css + '\n\n/* Custom */\n' + custom : p.css;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent=T("jtc_copied");
    setTimeout(() => btn.textContent=T("jtc_copy_css"), 1500);
  });
});

// Custom selector
document.getElementById('customInput').addEventListener('input', e => {
  document.getElementById('custom-style').textContent = e.target.value;
});

// Empty State helpers
function addListItem() {
  const items = document.getElementById('listItems');
  if (!items) return;
  const words = ['Plan', 'Build', 'Test', 'Ship', 'Monitor', 'Iterate', 'Learn', 'Grow'];
  const word = words[Math.floor(Math.random() * words.length)];
  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML = `${word} <button onclick="this.parentElement.remove()">&times;</button>`;
  items.appendChild(div);
}

// Quantity Query helpers
function addGridItem() {
  const grid = document.getElementById('quantityGrid');
  if (!grid) return;
  const count = grid.children.length + 1;
  if (count > 12) return;
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.textContent = count;
  grid.appendChild(div);
  updateGridLabel();
}

function removeGridItem() {
  const grid = document.getElementById('quantityGrid');
  if (!grid || grid.children.length <= 1) return;
  grid.removeChild(grid.lastElementChild);
  updateGridLabel();
}

function updateGridLabel() {
  const grid = document.getElementById('quantityGrid');
  if (!grid) return;
  const n = grid.children.length;
  const cols = n >= 7 ? 4 : n >= 4 ? 3 : 2;
  document.getElementById('gridCount').textContent = `${n} item${n !== 1 ? 's' : ''}`;
  document.getElementById('gridLabel').innerHTML = `${n} item${n !== 1 ? 's' : ''} &rarr; ${cols} column${cols !== 1 ? 's' : ''}`;
}

// Browser support detection
function checkSupport() {
  const dot = document.getElementById('supportDot');
  const text = document.getElementById('supportText');
  try {
    document.querySelector(':has(*)');
    dot.classList.add('yes');
    text.textContent=T("jtc_has_is_supported_in_your");
  } catch {
    dot.classList.add('no');
    text.textContent=T("jtc_has_is_not_supported_try");
  }
}

// Init
checkSupport();
loadPreset('form');
</script>
