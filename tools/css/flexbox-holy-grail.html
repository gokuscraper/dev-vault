<!DOCTYPE html>
<html tk="title_flexbox_layout_patterns" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Layout Patterns</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
h1{text-align:center;padding:16px;font-size:1.4rem;color:#38bdf8;border-bottom:1px solid #222}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;min-width:260px;border-right:1px solid #222;overflow-y:auto;padding:8px}
.nav-item{padding:10px 12px;border-radius:6px;cursor:pointer;font-size:.85rem;margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:#1a1a2a}
.nav-item.active{background:#1a2a3a;color:#38bdf8;border-left:3px solid #38bdf8}
.main{flex:1;overflow-y:auto;padding:24px}
.pattern{display:none}
.pattern.active{display:block}
.pattern h2{font-size:1.2rem;color:#38bdf8;margin-bottom:8px}
.pattern .desc{font-size:.85rem;color:#999;margin-bottom:16px;line-height:1.5}
.preview-wrap{background:#0f0f0f;border:1px solid #222;border-radius:8px;padding:16px;margin-bottom:16px;min-height:200px;resize:horizontal;overflow:auto}
.code-block{background:#0f0f0f;border:1px solid #222;border-radius:6px;padding:16px;font-family:monospace;font-size:.82rem;white-space:pre;overflow-x:auto;line-height:1.6;margin-bottom:12px;position:relative}
.code-block .copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;background:#1a2a3a;color:#38bdf8;border:1px solid #2a3a4a;border-radius:4px;cursor:pointer;font-size:.72rem}
.code-block .copy-btn:hover{background:#2a3a4a}
.props{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding:12px;background:#111;border:1px solid #222;border-radius:6px}
.props label{font-size:.78rem;color:#999}
.props select,.props input{padding:4px 6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:3px;font-size:.82rem}
.prop-group{display:flex;flex-direction:column;gap:4px}
/* Pattern demo styles */
.demo-box{background:#1a2a3a;border:1px solid #2a3a4a;border-radius:4px;padding:12px 16px;text-align:center;font-size:.8rem;color:#38bdf8}
.demo-header{background:#162030;min-height:40px}
.demo-footer{background:#162030;min-height:40px}
.demo-sidebar{background:#1a2a3a;min-width:100px}
.demo-main{background:#0f1a2a;min-height:80px;flex:1}
.demo-nav{background:#162030;min-height:40px}
.responsive-note{font-size:.78rem;color:#666;margin-top:8px;font-style:italic}
</style>
</head>
<body>


<h1 ti="title_flexbox_layout_patterns" ti="h1_flexbox_layout_patterns">Flexbox Layout Patterns</h1>
<div class="app">
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"></div>
</div>


<script>var _LANG={'title_flexbox_layout_patterns':["Flexbox Layout Patterns", "Flexbox布局模式"],'h1_flexbox_layout_patterns':["Flexbox Layout Patterns", "Flexbox布局模式"],'h2_p_name':["${p.name}", "${p.name}"],'h3_live_preview':["Live Preview", "实时预览"],'h3_css_code':["CSS Code", "CSS 代码"],'h3_html_structure':["HTML Structure", "HTML结构"],'subtitle_p_desc':["${p.desc}", "${p.desc}"],'btn_copy':["Copy", "复制"],'btn_copy_2':["Copy", "复制"],'strong_media_title':["Media Title", "媒体标题"],'jtc_copied':["Copied!", "已复制！"],'jtc_copy':["Copy", "复制"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const patterns=[
{
  name:'Holy Grail',
  desc:'The classic holy grail layout with header, footer, main content, and two sidebars. The most requested CSS layout pattern.',
  css:`.holy-grail {
  display: flex;
  flex-direction: column;
  min-height: 300px;
}
.holy-grail .header,
.holy-grail .footer {
  flex-shrink: 0;
}
.holy-grail .body {
  display: flex;
  flex: 1;
}
.holy-grail .main {
  flex: 1;
}
.holy-grail .sidebar {
  flex: 0 0 120px;
}`,
  html:`<div class="holy-grail">
  <div class="demo-box demo-header">Header</div>
  <div style="display:flex;flex:1">
    <div class="demo-box demo-sidebar" style="flex:0 0 120px">Left</div>
    <div class="demo-box demo-main" style="flex:1">Main Content</div>
    <div class="demo-box demo-sidebar" style="flex:0 0 120px">Right</div>
  </div>
  <div class="demo-box demo-footer">Footer</div>
</div>`,
  containerStyle:'display:flex;flex-direction:column;min-height:300px;gap:4px'
},
{
  name:'Sticky Footer',
  desc:'Footer sticks to the bottom of the viewport even when content is short.',
  css:`.sticky-footer {
  display: flex;
  flex-direction: column;
  min-height: 300px;
}
.sticky-footer .content {
  flex: 1;
}`,
  html:`<div style="display:flex;flex-direction:column;min-height:300px;gap:4px">
  <div class="demo-box demo-header">Header</div>
  <div class="demo-box demo-main" style="flex:1">Content (flex: 1 pushes footer down)</div>
  <div class="demo-box demo-footer">Footer (always at bottom)</div>
</div>`
},
{
  name:'Sidebar Layout',
  desc:'Fixed-width sidebar with fluid main content area.',
  css:`.sidebar-layout {
  display: flex;
}
.sidebar-layout .sidebar {
  flex: 0 0 200px; /* fixed width */
}
.sidebar-layout .main {
  flex: 1; /* fills remaining space */
}`,
  html:`<div style="display:flex;gap:4px;min-height:250px">
  <div class="demo-box demo-sidebar" style="flex:0 0 200px">Sidebar<br>(200px fixed)</div>
  <div class="demo-box demo-main" style="flex:1">Main Content (fluid)</div>
</div>`
},
{
  name:'Card Grid',
  desc:'Responsive card grid using flexbox wrap. Cards have equal height per row.',
  css:`.card-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.card-grid .card {
  flex: 1 1 200px; /* grow, shrink, min 200px */
  max-width: calc(33.333% - 8px);
}`,
  html:`<div style="display:flex;flex-wrap:wrap;gap:12px">${Array.from({length:9},(_, i)=>`<div class="demo-box" style="flex:1 1 200px;max-width:calc(33.333% - 8px);min-height:80px">Card ${i+1}</div>`).join('')}</div>`
},
{
  name:'Navigation Bar',
  desc:'Horizontal navigation with logo on the left and links on the right.',
  css:`.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.navbar .nav-links {
  display: flex;
  gap: 16px;
}`,
  html:`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#162030;border-radius:6px">
  <div class="demo-box" style="padding:8px 20px">Logo</div>
  <div style="display:flex;gap:12px">
    <div class="demo-box" style="padding:8px 12px">Home</div>
    <div class="demo-box" style="padding:8px 12px">About</div>
    <div class="demo-box" style="padding:8px 12px">Contact</div>
  </div>
</div>`
},
{
  name:'Media Object',
  desc:'Image/icon on the left with text content on the right. A fundamental UI pattern.',
  css:`.media {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.media .media-img {
  flex-shrink: 0;
}
.media .media-body {
  flex: 1;
}`,
  html:`<div style="display:flex;gap:16px;align-items:flex-start;padding:8px">
  <div class="demo-box" style="flex-shrink:0;width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center">IMG</div>
  <div style="flex:1">
    <div class="demo-box" style="margin-bottom:8px;text-align:left"><strong ti="strong_media_title">Media Title</strong></div>
    <div class="demo-box" style="text-align:left;min-height:60px">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore.</div>
  </div>
</div>`
},
{
  name:'Centered Content',
  desc:'Perfect centering both horizontally and vertically.',
  css:`.centered {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 300px;
}`,
  html:`<div style="display:flex;justify-content:center;align-items:center;min-height:250px;background:#0f1a2a;border-radius:6px">
  <div class="demo-box" style="padding:24px 40px;font-size:1rem">Perfectly Centered</div>
</div>`
},
{
  name:'Equal Height Columns',
  desc:'All columns stretch to match the tallest column automatically.',
  css:`.equal-cols {
  display: flex;
  gap: 12px;
}
.equal-cols .col {
  flex: 1;
  /* align-items: stretch is default */
}`,
  html:`<div style="display:flex;gap:12px">
  <div class="demo-box" style="flex:1;padding:16px">Short</div>
  <div class="demo-box" style="flex:1;padding:16px">Medium content that is a bit taller than the short one</div>
  <div class="demo-box" style="flex:1;padding:16px">Tall content that has the most text. All columns will stretch to match this height automatically with flexbox.</div>
</div>`
},
{
  name:'Input Group',
  desc:'Input with prepended/appended buttons or labels.',
  css:`.input-group {
  display: flex;
}
.input-group input {
  flex: 1;
}
.input-group .addon {
  flex-shrink: 0;
}`,
  html:`<div style="display:flex;gap:0;max-width:400px">
  <div class="demo-box" style="border-radius:4px 0 0 4px;padding:8px 12px;border-right:none">https://</div>
  <div class="demo-box" style="flex:1;border-radius:0;padding:8px 12px;background:#0f1a2a">example.com</div>
  <div class="demo-box" style="border-radius:0 4px 4px 0;padding:8px 16px;border-left:none;cursor:pointer">Go</div>
</div>`
},
{
  name:'Masonry-like',
  desc:'Column-based layout with flex-direction: column and fixed height container.',
  css:`.masonry {
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  height: 400px;
  gap: 8px;
}
.masonry .item {
  width: calc(33% - 6px);
}`,
  html:`<div style="display:flex;flex-direction:column;flex-wrap:wrap;height:350px;gap:8px">${[80,120,60,100,70,90,110,50,130].map((h,i)=>`<div class="demo-box" style="width:calc(33% - 6px);height:${h}px">Item ${i+1}</div>`).join('')}</div>`
},
{
  name:'Split Screen',
  desc:'Two equal halves of the viewport, common for landing pages.',
  css:`.split {
  display: flex;
  min-height: 300px;
}
.split .half {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}`,
  html:`<div style="display:flex;min-height:250px;gap:2px">
  <div class="demo-box" style="flex:1;display:flex;align-items:center;justify-content:center;background:#162030;font-size:1rem">Left Half</div>
  <div class="demo-box" style="flex:1;display:flex;align-items:center;justify-content:center;background:#1a2a3a;font-size:1rem">Right Half</div>
</div>`
},
{
  name:'Tag/Chip List',
  desc:'Wrapping list of tags or chips with consistent spacing.',
  css:`.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tags .tag {
  flex-shrink: 0;
}`,
  html:`<div style="display:flex;flex-wrap:wrap;gap:8px">${['JavaScript','CSS','Flexbox','Grid','React','Vue','TypeScript','Node.js','Python','HTML','SASS','Webpack','Vite','Next.js','Tailwind'].map(t=>`<div class="demo-box" style="padding:6px 14px;border-radius:20px;font-size:.8rem">${t}</div>`).join('')}</div>`
},
{
  name:'Vertical Timeline',
  desc:'Timeline with alternating content using flex-direction and order.',
  css:`.timeline-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.timeline-item .dot {
  flex-shrink: 0;
}
.timeline-item .content {
  flex: 1;
}`,
  html:`<div style="display:flex;flex-direction:column;gap:0">${[{t:'2024',d:'Started project'},{t:'2025 Q1',d:'Beta release'},{t:'2025 Q3',d:'v1.0 launched'},{t:'2026',d:'Growing community'}].map(item=>`<div style="display:flex;gap:16px;align-items:flex-start"><div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0"><div class="demo-box" style="width:12px;height:12px;border-radius:50%;padding:0"></div><div style="width:2px;height:40px;background:#2a3a4a"></div></div><div><div class="demo-box" style="margin-bottom:4px;padding:4px 10px;font-weight:bold">${item.t}</div><div style="font-size:.82rem;color:#888;padding-bottom:12px">${item.d}</div></div></div>`).join('')}</div>`
},
{
  name:'Pricing Table',
  desc:'Side-by-side pricing cards with a featured/highlighted option.',
  css:`.pricing {
  display: flex;
  gap: 16px;
  align-items: flex-end;
}
.pricing .plan {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.pricing .plan.featured {
  transform: scale(1.05);
}`,
  html:`<div style="display:flex;gap:16px;align-items:flex-end">${[{n:'Basic',p:'$9',f:['5 Users','10GB','Email']},{n:'Pro',p:'$29',f:['25 Users','100GB','Priority'],feat:true},{n:'Enterprise',p:'$99',f:['Unlimited','1TB','24/7 Phone']}].map(plan=>`<div class="demo-box" style="flex:1;display:flex;flex-direction:column;padding:20px;${plan.feat?'transform:scale(1.05);border-color:#38bdf8;':''}"><div style="font-size:1.1rem;font-weight:bold;margin-bottom:4px">${plan.n}</div><div style="font-size:1.5rem;margin-bottom:12px">${plan.p}<span style="font-size:.7rem;color:#666">/mo</span></div>${plan.f.map(f=>`<div style="padding:4px 0;font-size:.8rem;color:#999;border-top:1px solid #222">${f}</div>`).join('')}</div>`).join('')}</div>`
},
{
  name:'Aspect Ratio Boxes',
  desc:'Maintaining aspect ratios with flexbox and padding trick (or aspect-ratio property).',
  css:`.ratio-grid {
  display: flex;
  gap: 12px;
}
.ratio-grid .box {
  flex: 1;
  aspect-ratio: 16/9;
  /* Modern: use aspect-ratio property */
}`,
  html:`<div style="display:flex;gap:12px">${['1/1','16/9','4/3','21/9'].map(r=>`<div class="demo-box" style="flex:1;aspect-ratio:${r};display:flex;align-items:center;justify-content:center">${r}</div>`).join('')}</div>`
},
{
  name:'Space Between Items',
  desc:'Different justify-content values compared side by side.',
  css:`.spaced {
  display: flex;
  justify-content: space-between;
  /* Also: space-around, space-evenly */
}`,
  html:`<div style="display:flex;flex-direction:column;gap:16px">${['flex-start','flex-end','center','space-between','space-around','space-evenly'].map(j=>`<div><div style="font-size:.72rem;color:#666;margin-bottom:4px">${j}</div><div style="display:flex;justify-content:${j};gap:0;background:#0f1a2a;padding:8px;border-radius:4px">${Array.from({length:4},(_,i)=>`<div class="demo-box" style="padding:8px 16px">${i+1}</div>`).join('')}</div></div>`).join('')}</div>`
}
];

// Build sidebar and patterns
const sidebar=document.getElementById('sidebar');
const main=document.getElementById('main');

patterns.forEach((p,i)=>{
  // Nav item
  const nav=document.createElement('div');
  nav.className='nav-item'+(i===0?' active':'');
  nav.textContent=p.name;
  nav.onclick=()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.pattern').forEach(n=>n.classList.remove('active'));
    nav.classList.add('active');
    document.getElementById('pattern-'+i).classList.add('active');
  };
  sidebar.appendChild(nav);

  // Pattern content
  const div=document.createElement('div');
  div.className='pattern'+(i===0?' active':'');
  div.id='pattern-'+i;
  div.innerHTML=`
    <h2 ti="h2_p_name">${p.name}</h2>
    <p class="desc" ti="subtitle_p_desc">${p.desc}</p>
    <h3 style="font-size:.9rem;color:#999;margin-bottom:8px" ti="h3_live_preview">Live Preview</h3>
    <p class="responsive-note">Resize the preview area horizontally to test responsive behavior</p>
    <div class="preview-wrap" ${p.containerStyle?`style="${p.containerStyle}"`:''}>${p.html}</div>
    <h3 style="font-size:.9rem;color:#999;margin-bottom:8px" ti="h3_css_code">CSS Code</h3>
    <div class="code-block"><button class="copy-btn" onclick="copyCode(this)" ti="btn_copy" ti="btn_copy_2">Copy</button>${escapeHtml(p.css)}</div>
    <h3 style="font-size:.9rem;color:#999;margin-bottom:8px" ti="h3_html_structure">HTML Structure</h3>
    <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>${escapeHtml(p.html.replace(/style="[^"]*"/g,'class="..."').replace(/\s+/g,' ').replace(/> </g,'>\n  <'))}</div>
  `;
  main.appendChild(div);
});

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copyCode(btn){
  const block=btn.parentElement;
  const text=block.textContent.replace('Copy','').trim();
  navigator.clipboard.writeText(text).then(()=>{btn.textContent=T("jtc_copied");setTimeout(()=>btn.textContent=T("jtc_copy"),1500);});
}
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
