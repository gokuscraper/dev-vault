<body>
<div class="container">
<h1>QR Code Generator</h1>
<p class="subtitle">Generate QR codes for URLs, text, WiFi, and more.</p>

<div class="tabs">
  <button class="tab active" onclick="setMode('text')">Text / URL</button>
  <button class="tab" onclick="setMode('wifi')">WiFi</button>
  <button class="tab" onclick="setMode('email')">Email</button>
  <button class="tab" onclick="setMode('phone')">Phone</button>
  <button class="tab" onclick="setMode('sms')">SMS</button>
</div>

<div class="input-section" id="inputSection"></div>

<div class="customize">
  <h3>Customize</h3>
  <div class="row">
    <label>FG Color</label>
    <input type="color" id="fgColor" value="#000000" oninput="generate()">
    <label>BG Color</label>
    <input type="color" id="bgColor" value="#ffffff" oninput="generate()">
    <label>Size</label>
    <select id="qrSize" onchange="generate()">
      <option value="200">200px</option>
      <option value="300" selected>300px</option>
      <option value="400">400px</option>
      <option value="500">500px</option>
    </select>
  </div>
</div>

<div class="preview">
  <canvas id="qrCanvas" width="300" height="300"></canvas>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="downloadPng()">Download PNG</button>
  <button class="btn" onclick="copyImage()">Copy Image</button>
</div>

<script>
// Minimal QR Code generator (alphanumeric + byte mode, ECC L)
// Based on simplified QR algorithm for web use
let currentMode='text';

function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.toLowerCase().includes(mode==='text'?'text':mode))t.classList.add('active')});
  renderInput();
}

function renderInput(){
  const sec=document.getElementById('inputSection');
  switch(currentMode){
    case'text':
      sec.innerHTML=`<textarea id="qrData" placeholder="Enter text or URL..." oninput="generate()">https://github.com</textarea>`;
      break;
    case'wifi':
      sec.innerHTML=`
        <div class="row"><label>SSID</label><input type="text" id="wifiSsid" placeholder="Network name" oninput="generate()"></div>
        <div class="row"><label>Password</label><input type="password" id="wifiPass" placeholder="Password" oninput="generate()"></div>
        <div class="row"><label>Security</label><select id="wifiSec" onchange="generate()"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`;
      break;
    case'email':
      sec.innerHTML=`
        <div class="row"><label>Email</label><input type="text" id="emailTo" placeholder="user@example.com" oninput="generate()"></div>
        <div class="row"><label>Subject</label><input type="text" id="emailSubj" placeholder="Subject" oninput="generate()"></div>
        <div class="row"><label>Body</label><input type="text" id="emailBody" placeholder="Message" oninput="generate()"></div>`;
      break;
    case'phone':
      sec.innerHTML=`<div class="row"><label>Phone</label><input type="text" id="phone" placeholder="+1234567890" oninput="generate()"></div>`;
      break;
    case'sms':
      sec.innerHTML=`
        <div class="row"><label>Phone</label><input type="text" id="smsPhone" placeholder="+1234567890" oninput="generate()"></div>
        <div class="row"><label>Message</label><input type="text" id="smsMsg" placeholder="Hello!" oninput="generate()"></div>`;
      break;
  }
  generate();
}

function getData(){
  switch(currentMode){
    case'text':return document.getElementById('qrData')?.value||'';
    case'wifi':{
      const s=document.getElementById('wifiSsid')?.value||'';
      const p=document.getElementById('wifiPass')?.value||'';
      const t=document.getElementById('wifiSec')?.value||'WPA';
      return`WIFI:T:${t};S:${s};P:${p};;`;
    }
    case'email':{
      const to=document.getElementById('emailTo')?.value||'';
      const subj=document.getElementById('emailSubj')?.value||'';
      const body=document.getElementById('emailBody')?.value||'';
      return`mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
    }
    case'phone':return`tel:${document.getElementById('phone')?.value||''}`;
    case'sms':{
      const ph=document.getElementById('smsPhone')?.value||'';
      const msg=document.getElementById('smsMsg')?.value||'';
      return`sms:${ph}${msg?'?body='+encodeURIComponent(msg):''}`;
    }
    default:return'';
  }
}

// Use Google Charts API for QR generation (reliable, no library needed)
function generate(){
  const data=getData();
  if(!data)return;
  const size=+document.getElementById('qrSize').value;
  const fg=document.getElementById('fgColor').value.replace('#','');
  const bg=document.getElementById('bgColor').value.replace('#','');
  const canvas=document.getElementById('qrCanvas');
  canvas.width=size;canvas.height=size;

  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const ctx=canvas.getContext('2d');
    // Fill background
    ctx.fillStyle='#'+bg;
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);

    // Apply foreground color if not black
    if(fg!=='000000'){
      const imageData=ctx.getImageData(0,0,size,size);
      const d=imageData.data;
      const fr=parseInt(fg.slice(0,2),16);
      const fg_=parseInt(fg.slice(2,4),16);
      const fb=parseInt(fg.slice(4,6),16);
      const br=parseInt(bg.slice(0,2),16);
      const bg_=parseInt(bg.slice(2,4),16);
      const bb=parseInt(bg.slice(4,6),16);
      for(let i=0;i<d.length;i+=4){
        // If pixel is dark (QR module), apply fg color
        if(d[i]<128){d[i]=fr;d[i+1]=fg_;d[i+2]=fb}
        else{d[i]=br;d[i+1]=bg_;d[i+2]=bb}
      }
      ctx.putImageData(imageData,0,0);
    }
  };
  img.onerror=function(){
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#'+bg;
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle='#555';
    ctx.font='14px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Enter text to generate QR',size/2,size/2);
  };
  img.src=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}&color=${fg}&bgcolor=${bg}`;
}

function downloadPng(){
  const canvas=document.getElementById('qrCanvas');
  const link=document.createElement('a');
  link.download='qr-code.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

function copyImage(){
  const canvas=document.getElementById('qrCanvas');
  canvas.toBlob(blob=>{
    navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    const el=document.createElement('div');
    el.className='copied';el.textContent='QR Copied!';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  });
}

renderInput();
</script>
