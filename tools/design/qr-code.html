<script>
// Minimal QR Code generator (alphanumeric + byte mode, ECC L)
// Based on simplified QR algorithm for web use
let currentMode='text';

function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.toLowerCase().includes(mode==='text'?'text':mode))t.classList.add('active')});
  renderInput();
}

function renderInput(){
  const sec=document.getElementById('inputSection');
  switch(currentMode){
    case'text':
      sec.innerHTML=`<textarea id="qrData" tp="placeholder_enter_text_or_url" placeholder="Enter text or URL..." oninput="generate()">https://github.com</textarea>`;
      break;
    case'wifi':
      sec.innerHTML=`
        <div class="row"><label ti="label_ssid">SSID</label><input type="text" id="wifiSsid" tp="placeholder_network_name" placeholder="Network name" oninput="generate()"></div>
        <div class="row"><label ti="label_password">Password</label><input type="password" id="wifiPass" tp="placeholder_password" placeholder="Password" oninput="generate()"></div>
        <div class="row"><label ti="label_security">Security</label><select id="wifiSec" onchange="generate()"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`;
      break;
    case'email':
      sec.innerHTML=`
        <div class="row"><label>Email</label><input type="text" id="emailTo" tp="placeholder_user_example_com" placeholder="user@example.com" oninput="generate()"></div>
        <div class="row"><label ti="label_subject">Subject</label><input type="text" id="emailSubj" tp="placeholder_subject" placeholder="Subject" oninput="generate()"></div>
        <div class="row"><label ti="label_body">Body</label><input type="text" id="emailBody" tp="placeholder_message" placeholder="Message" oninput="generate()"></div>`;
      break;
    case'phone':
      sec.innerHTML=`<div class="row"><label>Phone</label><input type="text" id="phone" tp="placeholder_1234567890" tp="placeholder_1234567890_2" placeholder="+1234567890" oninput="generate()"></div>`;
      break;
    case'sms':
      sec.innerHTML=`
        <div class="row"><label>Phone</label><input type="text" id="smsPhone" placeholder="+1234567890" oninput="generate()"></div>
        <div class="row"><label ti="label_message">Message</label><input type="text" id="smsMsg" tp="placeholder_hello" placeholder="Hello!" oninput="generate()"></div>`;
      break;
  }
  generate();
}

function getData(){
  switch(currentMode){
    case'text':return document.getElementById('qrData')?.value||'';
    case'wifi':{
      const s=document.getElementById('wifiSsid')?.value||'';
      const p=document.getElementById('wifiPass')?.value||'';
      const t=document.getElementById('wifiSec')?.value||'WPA';
      return`WIFI:T:${t};S:${s};P:${p};;`;
    }
    case'email':{
      const to=document.getElementById('emailTo')?.value||'';
      const subj=document.getElementById('emailSubj')?.value||'';
      const body=document.getElementById('emailBody')?.value||'';
      return`mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
    }
    case'phone':return`tel:${document.getElementById('phone')?.value||''}`;
    case'sms':{
      const ph=document.getElementById('smsPhone')?.value||'';
      const msg=document.getElementById('smsMsg')?.value||'';
      return`sms:${ph}${msg?'?body='+encodeURIComponent(msg):''}`;
    }
    default:return'';
  }
}

// Use Google Charts API for QR generation (reliable, no library needed)
function generate(){
  const data=getData();
  if(!data)return;
  const size=+document.getElementById('qrSize').value;
  const fg=document.getElementById('fgColor').value.replace('#','');
  const bg=document.getElementById('bgColor').value.replace('#','');
  const canvas=document.getElementById('qrCanvas');
  canvas.width=size;canvas.height=size;

  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const ctx=canvas.getContext('2d');
    // Fill background
    ctx.fillStyle='#'+bg;
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);

    // Apply foreground color if not black
    if(fg!=='000000'){
      const imageData=ctx.getImageData(0,0,size,size);
      const d=imageData.data;
      const fr=parseInt(fg.slice(0,2),16);
      const fg_=parseInt(fg.slice(2,4),16);
      const fb=parseInt(fg.slice(4,6),16);
      const br=parseInt(bg.slice(0,2),16);
      const bg_=parseInt(bg.slice(2,4),16);
      const bb=parseInt(bg.slice(4,6),16);
      for(let i=0;i<d.length;i+=4){
        // If pixel is dark (QR module), apply fg color
        if(d[i]<128){d[i]=fr;d[i+1]=fg_;d[i+2]=fb}
        else{d[i]=br;d[i+1]=bg_;d[i+2]=bb}
      }
      ctx.putImageData(imageData,0,0);
    }
  };
  img.onerror=function(){
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#'+bg;
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle='#555';
    ctx.font='14px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Enter text to generate QR',size/2,size/2);
  };
  img.src=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}&color=${fg}&bgcolor=${bg}`;
}

function downloadPng(){
  const canvas=document.getElementById('qrCanvas');
  const link=document.createElement('a');
  link.download='qr-code.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

function copyImage(){
  const canvas=document.getElementById('qrCanvas');
  canvas.toBlob(blob=>{
    navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    const el=document.createElement('div');
    el.className='copied';el.textContent=T("jtc_qr_copied");
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  });
}

renderInput();
</script>
