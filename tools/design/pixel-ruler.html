<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Ruler — On-Screen Measurement Tool</title>
<meta name="description" content="On-screen pixel measurement tool with rulers, crosshair, distance and rectangle measurement, guide lines, grid overlay, and unit conversion. No dependencies.">
<link rel="canonical" href="https://yurukusa.github.io/pixel-ruler/">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pixel Ruler","url":"https://yurukusa.github.io/pixel-ruler/","description":"On-screen pixel measurement with rulers, crosshair tracking, distance and rectangle measurement, guide lines, and grid overlay.","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;overflow:hidden;height:100vh;width:100vw}
canvas{position:fixed;top:0;left:0;z-index:1;cursor:crosshair}
#panel{position:fixed;top:8px;right:8px;z-index:10;background:#161616;border:1px solid #222;border-radius:8px;padding:10px 14px;font-size:.75rem;min-width:220px;pointer-events:auto;max-height:calc(100vh - 16px);overflow-y:auto}
#panel h1{color:#4da6ff;font-size:.95rem;margin-bottom:6px;white-space:nowrap}
.row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #1a1a1a}
.row .lbl{color:#888}.row .val{color:#4da6ff;font-weight:700}
.sep{height:1px;background:#222;margin:6px 0}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.tbtn{background:#222;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:.7rem;cursor:pointer;font-family:inherit}
.tbtn:hover{background:#2a2a2a;border-color:#4da6ff}
.tbtn.active{background:#1a2a3a;border-color:#4da6ff;color:#4da6ff}
.meas{background:#111;border:1px solid #222;border-radius:4px;padding:6px;margin-top:6px;font-size:.7rem}
.meas .big{color:#4da6ff;font-size:1rem;font-weight:700}
.meas .dim{color:#888;margin-top:2px}
.hint{color:#555;font-size:.65rem;margin-top:6px;line-height:1.4}
footer{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;color:#555;font-size:.7rem}
footer a{color:#4da6ff;text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="panel">
  <h1>Pixel Ruler</h1>
  <div class="row"><span class="lbl">Mouse</span><span class="val" id="vPos">0, 0</span></div>
  <div class="row"><span class="lbl">DPR</span><span class="val" id="vDpr">1</span></div>
  <div class="row"><span class="lbl">Logical DPI</span><span class="val" id="vDpi">96</span></div>
  <div class="row"><span class="lbl">Zoom</span><span class="val" id="vZoom">100%</span></div>
  <div class="row"><span class="lbl">Viewport</span><span class="val" id="vVp">0×0</span></div>
  <div class="sep"></div>
  <div class="toolbar" id="modeBar">
    <button class="tbtn active" data-mode="measure">Measure</button>
    <button class="tbtn" data-mode="rect">Rectangle</button>
  </div>
  <div class="toolbar" id="unitBar">
    <button class="tbtn active" data-unit="px">px</button>
    <button class="tbtn" data-unit="rem">rem</button>
    <button class="tbtn" data-unit="em">em</button>
    <button class="tbtn" data-unit="vp">vw/vh%</button>
  </div>
  <div class="toolbar">
    <button class="tbtn" id="gridBtn">Grid: Off</button>
    <button class="tbtn" id="gridSize">8px</button>
    <button class="tbtn" id="clearBtn">Clear (Esc)</button>
  </div>
  <div class="meas" id="measBox" style="display:none">
    <div class="big" id="measVal"></div>
    <div class="dim" id="measDim"></div>
  </div>
  <div class="hint">Click rulers to add guide lines (drag to move, double-click to remove).<br>G = toggle grid &middot; Esc = clear</div>
</div>
<footer>
  <a href="https://yurukusa.github.io/dev-toolkit/">dev-toolkit</a> &middot;
  Related: <a href="https://yurukusa.github.io/screen-resolution/">screen-resolution</a>,
  <a href="https://yurukusa.github.io/spacing-calc/">spacing-calc</a>
</footer>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const RULER=28,TICK_COL='#4da6ff',RULER_BG='#111',LINE_COL='rgba(77,166,255,0.5)';
const GRID_SIZES=[8,16,24,32];
let W,H,dpr,mx=0,my=0,mode='measure',unit='px';
let gridOn=false,gridIdx=0;
let guides=[],draggingGuide=null;
let p1=null,p2=null,measuring=false,rectDrag=false,rectStart=null,rectEnd=null;

function resize(){
  dpr=devicePixelRatio||1;
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  updateInfo();
}

function updateInfo(){
  document.getElementById('vDpr').textContent=dpr.toFixed(2);
  document.getElementById('vDpi').textContent=Math.round(96*dpr);
  document.getElementById('vVp').textContent=W+'×'+H;
  const baseZoom=Math.round(dpr/((screen.width>0?screen.width:W)/W>2?2:1)*100);
  document.getElementById('vZoom').textContent=Math.round(dpr*100/devicePixelRatio)+'% (est)';
}

function conv(px,axis){
  if(unit==='rem')return(px/16).toFixed(2)+' rem';
  if(unit==='em')return(px/16).toFixed(2)+' em';
  if(unit==='vp'){
    const ref=axis==='x'?W:axis==='y'?H:Math.max(W,H);
    return(px/ref*100).toFixed(2)+(axis==='x'?' vw':axis==='y'?' vh':' v%');
  }
  return px+'px';
}

function physicalSize(px){
  const inches=px/(96*dpr);
  if(inches<1)return(inches*25.4).toFixed(1)+'mm';
  return inches.toFixed(2)+'in';
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(gridOn)drawGrid();
  drawGuides();
  drawRulers();
  drawCrosshair();
  drawMeasurement();
  requestAnimationFrame(draw);
}

function drawGrid(){
  const sp=GRID_SIZES[gridIdx];
  ctx.strokeStyle='rgba(77,166,255,0.08)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=RULER;x<W;x+=sp){ctx.moveTo(x+.5,RULER);ctx.lineTo(x+.5,H)}
  for(let y=RULER;y<H;y+=sp){ctx.moveTo(RULER,y+.5);ctx.lineTo(W,y+.5)}
  ctx.stroke();
}

function drawRulers(){
  // horizontal
  ctx.fillStyle=RULER_BG;ctx.fillRect(0,0,W,RULER);
  ctx.fillRect(0,0,RULER,H);
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,RULER,RULER);
  ctx.fillStyle=TICK_COL;ctx.font='9px monospace';ctx.textBaseline='top';
  for(let x=RULER;x<W;x++){
    const v=x-RULER;
    if(v%100===0){
      ctx.fillStyle=TICK_COL;ctx.fillRect(x,.5,1,RULER-4);
      ctx.fillText(v,x+2,2);
    }else if(v%10===0){
      ctx.fillStyle='#335';ctx.fillRect(x,RULER-12,1,12);
    }else if(v%5===0){
      ctx.fillStyle='#223';ctx.fillRect(x,RULER-6,1,6);
    }
  }
  // vertical
  ctx.save();ctx.textBaseline='bottom';ctx.textAlign='right';
  for(let y=RULER;y<H;y++){
    const v=y-RULER;
    if(v%100===0){
      ctx.fillStyle=TICK_COL;ctx.fillRect(.5,y,RULER-4,1);
      ctx.save();ctx.translate(10,y+2);ctx.rotate(-Math.PI/2);
      ctx.fillText(v,0,0);ctx.restore();
    }else if(v%10===0){
      ctx.fillStyle='#335';ctx.fillRect(RULER-12,y,12,1);
    }else if(v%5===0){
      ctx.fillStyle='#223';ctx.fillRect(RULER-6,y,6,1);
    }
  }
  ctx.restore();
  // highlight on rulers
  ctx.fillStyle='rgba(77,166,255,0.3)';
  ctx.fillRect(mx,0,1,RULER);
  ctx.fillRect(0,my,RULER,1);
}

function drawCrosshair(){
  if(mx<RULER&&my<RULER)return;
  ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(77,166,255,0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(mx,RULER);ctx.lineTo(mx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(RULER,my);ctx.lineTo(W,my);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  document.getElementById('vPos').textContent=(mx-RULER)+', '+(my-RULER);
}

function drawGuides(){
  guides.forEach(g=>{
    ctx.save();
    ctx.strokeStyle='rgba(77,166,255,0.6)';ctx.lineWidth=1;ctx.setLineDash([6,3]);
    ctx.beginPath();
    if(g.axis==='h'){ctx.moveTo(RULER,g.pos);ctx.lineTo(W,g.pos)}
    else{ctx.moveTo(g.pos,RULER);ctx.lineTo(g.pos,H)}
    ctx.stroke();ctx.setLineDash([]);
    // label
    ctx.fillStyle='rgba(77,166,255,0.8)';ctx.font='9px monospace';
    const lbl=conv(g.axis==='h'?g.pos-RULER:g.pos-RULER,g.axis==='h'?'y':'x');
    if(g.axis==='h'){ctx.fillText(lbl,RULER+4,g.pos-3)}
    else{ctx.save();ctx.translate(g.pos+3,RULER+12);ctx.fillText(lbl,0,0);ctx.restore()}
    ctx.restore();
  });
}

function drawMeasurement(){
  if(mode==='measure'){
    if(p1){
      ctx.fillStyle='#4da6ff';ctx.beginPath();ctx.arc(p1.x,p1.y,4,0,Math.PI*2);ctx.fill();
    }
    if(p1&&p2){
      ctx.fillStyle='#4da6ff';ctx.beginPath();ctx.arc(p2.x,p2.y,4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=LINE_COL;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      // dashed dx/dy
      ctx.save();ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(77,166,255,0.25)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
  }else if(mode==='rect'&&rectStart&&rectEnd){
    const x=Math.min(rectStart.x,rectEnd.x),y=Math.min(rectStart.y,rectEnd.y);
    const w=Math.abs(rectEnd.x-rectStart.x),h=Math.abs(rectEnd.y-rectStart.y);
    ctx.strokeStyle=LINE_COL;ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
    ctx.fillStyle='rgba(77,166,255,0.06)';ctx.fillRect(x,y,w,h);
    // dimension labels
    ctx.fillStyle='#4da6ff';ctx.font='11px monospace';ctx.textAlign='center';
    ctx.fillText(conv(w,'x'),x+w/2,y-6);
    ctx.textAlign='left';ctx.fillText(conv(h,'y'),x+w+4,y+h/2+4);
  }
}

function showMeas(dx,dy){
  const dist=Math.sqrt(dx*dx+dy*dy);
  const box=document.getElementById('measBox');
  box.style.display='block';
  document.getElementById('measVal').textContent=conv(Math.round(dist))+' ('+physicalSize(dist)+')';
  document.getElementById('measDim').textContent='dx: '+conv(Math.abs(dx),'x')+' · dy: '+conv(Math.abs(dy),'y');
}

function showRectMeas(w,h){
  const box=document.getElementById('measBox');
  box.style.display='block';
  document.getElementById('measVal').textContent=conv(w,'x')+' × '+conv(h,'y');
  document.getElementById('measDim').textContent='Area: '+(w*h).toLocaleString()+'px² · Diag: '+conv(Math.round(Math.sqrt(w*w+h*h)))+' ('+physicalSize(Math.sqrt(w*w+h*h))+')';
}

function hideMeas(){document.getElementById('measBox').style.display='none'}

function clearAll(){p1=p2=rectStart=rectEnd=null;measuring=false;rectDrag=false;hideMeas()}

function guideAt(x,y,tol){
  return guides.findIndex(g=>(g.axis==='h'&&Math.abs(g.pos-y)<tol)||(g.axis==='v'&&Math.abs(g.pos-x)<tol));
}

// Panel pointer events — prevent canvas interactions when clicking panel
document.getElementById('panel').addEventListener('mousedown',e=>e.stopPropagation());
document.getElementById('panel').addEventListener('click',e=>e.stopPropagation());
document.getElementById('panel').addEventListener('dblclick',e=>e.stopPropagation());

cv.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  if(draggingGuide!==null){
    const g=guides[draggingGuide];
    g.pos=g.axis==='h'?my:mx;
    return;
  }
  if(mode==='rect'&&rectDrag){
    rectEnd={x:mx,y:my};
    const w=Math.abs(rectEnd.x-rectStart.x),h=Math.abs(rectEnd.y-rectStart.y);
    showRectMeas(w,h);
  }
});

cv.addEventListener('mousedown',e=>{
  mx=e.clientX;my=e.clientY;
  // check guide drag
  const gi=guideAt(mx,my,5);
  if(gi>=0){draggingGuide=gi;e.preventDefault();return}
  // ruler click -> add guide
  if(my<RULER&&mx>RULER){guides.push({axis:'v',pos:mx});return}
  if(mx<RULER&&my>RULER){guides.push({axis:'h',pos:my});return}
  if(mode==='measure'){
    if(!p1||p2){clearAll();p1={x:mx,y:my}}
    else{p2={x:mx,y:my};showMeas(p2.x-p1.x,p2.y-p1.y)}
  }else if(mode==='rect'){
    clearAll();rectDrag=true;rectStart={x:mx,y:my};rectEnd={x:mx,y:my};
  }
});

cv.addEventListener('mouseup',()=>{
  if(draggingGuide!==null){draggingGuide=null;return}
  if(mode==='rect'&&rectDrag){
    rectDrag=false;
    if(rectStart&&rectEnd){
      const w=Math.abs(rectEnd.x-rectStart.x),h=Math.abs(rectEnd.y-rectStart.y);
      if(w<3&&h<3){rectStart=rectEnd=null;hideMeas()}
    }
  }
});

cv.addEventListener('dblclick',e=>{
  const gi=guideAt(e.clientX,e.clientY,5);
  if(gi>=0)guides.splice(gi,1);
});

// mode buttons
document.getElementById('modeBar').addEventListener('click',e=>{
  const btn=e.target.closest('[data-mode]');if(!btn)return;
  mode=btn.dataset.mode;clearAll();
  document.querySelectorAll('#modeBar .tbtn').forEach(b=>b.classList.toggle('active',b===btn));
});

// unit buttons
document.getElementById('unitBar').addEventListener('click',e=>{
  const btn=e.target.closest('[data-unit]');if(!btn)return;
  unit=btn.dataset.unit;
  document.querySelectorAll('#unitBar .tbtn').forEach(b=>b.classList.toggle('active',b===btn));
  if(p1&&p2)showMeas(p2.x-p1.x,p2.y-p1.y);
  if(rectStart&&rectEnd&&!rectDrag)showRectMeas(Math.abs(rectEnd.x-rectStart.x),Math.abs(rectEnd.y-rectStart.y));
});

// grid
document.getElementById('gridBtn').addEventListener('click',()=>{
  gridOn=!gridOn;
  document.getElementById('gridBtn').textContent='Grid: '+(gridOn?GRID_SIZES[gridIdx]+'px':'Off');
  document.getElementById('gridBtn').classList.toggle('active',gridOn);
});
document.getElementById('gridSize').addEventListener('click',()=>{
  gridIdx=(gridIdx+1)%GRID_SIZES.length;
  document.getElementById('gridSize').textContent=GRID_SIZES[gridIdx]+'px';
  if(gridOn)document.getElementById('gridBtn').textContent='Grid: '+GRID_SIZES[gridIdx]+'px';
});
document.getElementById('clearBtn').addEventListener('click',()=>{clearAll();guides=[]});

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){clearAll();guides=[]}
  if(e.key==='g'||e.key==='G'){
    gridOn=!gridOn;
    document.getElementById('gridBtn').textContent='Grid: '+(gridOn?GRID_SIZES[gridIdx]+'px':'Off');
    document.getElementById('gridBtn').classList.toggle('active',gridOn);
  }
});

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
