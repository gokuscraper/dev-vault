<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Transform Generator</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header a {
      color: var(--text2);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    header a:hover {
      color: var(--accent);
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      height: calc(100vh - 49px);
    }

    /* Left panel */
    .controls {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .slider-row:last-child {
      margin-bottom: 0;
    }

    .slider-label {
      width: 72px;
      font-size: 12px;
      color: var(--text2);
      flex-shrink: 0;
    }

    .slider-label span {
      font-size: 10px;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .slider-value {
      width: 52px;
      text-align: right;
      font-size: 12px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* Origin selector */
    .origin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .origin-btn {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .origin-btn:hover {
      border-color: var(--accent);
    }

    .origin-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .origin-btn .dot {
      width: 6px;
      height: 6px;
      background: var(--text2);
      border-radius: 50%;
    }

    .origin-btn.active .dot {
      background: #fff;
    }

    /* Presets */
    .presets-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .preset-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 12px;
      color: var(--text2);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: var(--text2);
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: #fff;
    }

    /* Right panel */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Preview area */
    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .preview-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
    }

    .preview-crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      pointer-events: none;
    }

    .preview-crosshair::before,
    .preview-crosshair::after {
      content: '';
      position: absolute;
      background: var(--border);
    }

    .preview-crosshair::before {
      width: 1px;
      height: 100%;
      left: 50%;
    }

    .preview-crosshair::after {
      width: 100%;
      height: 1px;
      top: 50%;
    }

    .preview-box-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-box {
      width: 120px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), #6e57ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      box-shadow: 0 8px 32px rgba(88, 166, 255, 0.25);
      user-select: none;
    }

    /* Output area */
    .output-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .output-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
    }

    .output-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }

    .btn-copy {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-copy:hover {
      opacity: 0.85;
    }

    .btn-copy.copied {
      background: var(--green);
      border-color: var(--green);
    }

    .btn-reset {
      background: transparent;
      color: var(--red);
      border-color: var(--red);
    }

    .btn-reset:hover {
      background: var(--red);
      color: #fff;
    }

    .output-code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }

    .output-code .prop {
      color: var(--accent);
    }

    .output-code .val {
      color: var(--yellow);
    }

    /* Scrollbar */
    .controls::-webkit-scrollbar {
      width: 6px;
    }

    .controls::-webkit-scrollbar-track {
      background: transparent;
    }

    .controls::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    @media (max-width: 700px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        height: auto;
        min-height: calc(100vh - 49px);
      }

      .controls {
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-y: visible;
        height: auto;
      }

      .right-panel {
        min-height: 300px;
      }

      .preview-area {
        min-height: 240px;
      }
    }
  </style>
</head>
<body>

<header>
  <a href="https://gokuscraper.github.io/dev-vault/">← Dev Vault</a>
  <h1>CSS Transform Generator</h1>
</header>

<div class="container">
  <!-- Left: Controls -->
  <div class="controls">

    <!-- Translate -->
    <div class="section">
      <div class="section-title">Translate</div>
      <div class="slider-row">
        <div class="slider-label">X <span>(px)</span></div>
        <input type="range" id="translateX" min="-300" max="300" value="0" step="1">
        <div class="slider-value" id="translateX-val">0px</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Y <span>(px)</span></div>
        <input type="range" id="translateY" min="-300" max="300" value="0" step="1">
        <div class="slider-value" id="translateY-val">0px</div>
      </div>
    </div>

    <!-- Rotate -->
    <div class="section">
      <div class="section-title">Rotate</div>
      <div class="slider-row">
        <div class="slider-label">Z <span>(deg)</span></div>
        <input type="range" id="rotateZ" min="-180" max="180" value="0" step="1">
        <div class="slider-value" id="rotateZ-val">0deg</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">X <span>(deg)</span></div>
        <input type="range" id="rotateX" min="-180" max="180" value="0" step="1">
        <div class="slider-value" id="rotateX-val">0deg</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Y <span>(deg)</span></div>
        <input type="range" id="rotateY" min="-180" max="180" value="0" step="1">
        <div class="slider-value" id="rotateY-val">0deg</div>
      </div>
    </div>

    <!-- Scale -->
    <div class="section">
      <div class="section-title">Scale</div>
      <div class="slider-row">
        <div class="slider-label">X</div>
        <input type="range" id="scaleX" min="0.1" max="3" value="1" step="0.01">
        <div class="slider-value" id="scaleX-val">1</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Y</div>
        <input type="range" id="scaleY" min="0.1" max="3" value="1" step="0.01">
        <div class="slider-value" id="scaleY-val">1</div>
      </div>
    </div>

    <!-- Skew -->
    <div class="section">
      <div class="section-title">Skew</div>
      <div class="slider-row">
        <div class="slider-label">X <span>(deg)</span></div>
        <input type="range" id="skewX" min="-60" max="60" value="0" step="1">
        <div class="slider-value" id="skewX-val">0deg</div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Y <span>(deg)</span></div>
        <input type="range" id="skewY" min="-60" max="60" value="0" step="1">
        <div class="slider-value" id="skewY-val">0deg</div>
      </div>
    </div>

    <!-- Perspective -->
    <div class="section">
      <div class="section-title">Perspective</div>
      <div class="slider-row">
        <div class="slider-label"><span>(px)</span></div>
        <input type="range" id="perspective" min="100" max="2000" value="800" step="10">
        <div class="slider-value" id="perspective-val">800px</div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px;">Applied to parent when using rotateX/Y</div>
    </div>

    <!-- Transform Origin -->
    <div class="section">
      <div class="section-title">Transform Origin</div>
      <div class="origin-grid" id="origin-grid">
        <!-- 9 buttons inserted by JS -->
      </div>
    </div>

    <!-- Transition toggle -->
    <div class="section">
      <div class="toggle-row">
        <span class="toggle-label">Smooth transition (0.3s ease)</span>
        <label class="toggle">
          <input type="checkbox" id="transition-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Presets -->
    <div class="section">
      <div class="section-title">Presets</div>
      <div class="presets-grid" id="presets-grid">
        <!-- Preset buttons inserted by JS -->
      </div>
    </div>

  </div>

  <!-- Right: Preview + Output -->
  <div class="right-panel">
    <div class="preview-area" id="preview-area">
      <div class="preview-grid"></div>
      <div class="preview-box-wrap" id="preview-wrap">
        <div class="preview-box" id="preview-box">Preview</div>
      </div>
    </div>

    <div class="output-area">
      <div class="output-header">
        <span class="output-title">Generated CSS</span>
        <div class="output-actions">
          <button class="btn btn-reset" id="btn-reset">Reset All</button>
          <button class="btn btn-copy" id="btn-copy">Copy CSS</button>
        </div>
      </div>
      <div class="output-code" id="output-code"></div>
    </div>
  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  const state = {
    translateX: 0,
    translateY: 0,
    rotateZ: 0,
    rotateX: 0,
    rotateY: 0,
    scaleX: 1,
    scaleY: 1,
    skewX: 0,
    skewY: 0,
    perspective: 800,
    origin: 'center center',
    transition: true,
  };

  const defaults = { ...state };

  // ─── Origin config ───────────────────────────────────────────────────────────
  const originPoints = [
    { label: 'top-left',     value: 'top left',     pos: [0, 0] },
    { label: 'top-center',   value: 'top center',   pos: [1, 0] },
    { label: 'top-right',    value: 'top right',    pos: [2, 0] },
    { label: 'mid-left',     value: 'center left',  pos: [0, 1] },
    { label: 'center',       value: 'center center',pos: [1, 1] },
    { label: 'mid-right',    value: 'center right', pos: [2, 1] },
    { label: 'bot-left',     value: 'bottom left',  pos: [0, 2] },
    { label: 'bot-center',   value: 'bottom center',pos: [1, 2] },
    { label: 'bot-right',    value: 'bottom right', pos: [2, 2] },
  ];

  // ─── Presets ─────────────────────────────────────────────────────────────────
  const presets = [
    {
      name: 'Flip Horizontal',
      values: { scaleX: -1, scaleY: 1, translateX: 0, translateY: 0, rotateZ: 0, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Flip Vertical',
      values: { scaleX: 1, scaleY: -1, translateX: 0, translateY: 0, rotateZ: 0, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Rotate 45°',
      values: { rotateZ: 45, translateX: 0, translateY: 0, scaleX: 1, scaleY: 1, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Scale Up 1.5×',
      values: { scaleX: 1.5, scaleY: 1.5, translateX: 0, translateY: 0, rotateZ: 0, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Skew Card',
      values: { skewX: -15, skewY: 0, translateX: 0, translateY: 0, rotateZ: 0, rotateX: 0, rotateY: 0, scaleX: 1, scaleY: 1 },
    },
    {
      name: 'Perspective Tilt',
      values: { rotateY: 30, rotateX: 10, translateX: 0, translateY: 0, rotateZ: 0, scaleX: 1, scaleY: 1, skewX: 0, skewY: 0, perspective: 600 },
    },
    {
      name: 'Hover Lift',
      values: { translateY: -12, scaleX: 1.05, scaleY: 1.05, translateX: 0, rotateZ: 0, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Spin 180°',
      values: { rotateZ: 180, translateX: 0, translateY: 0, scaleX: 1, scaleY: 1, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Squeeze',
      values: { scaleX: 0.5, scaleY: 1.5, translateX: 0, translateY: 0, rotateZ: 0, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
    {
      name: 'Diamond',
      values: { rotateZ: 45, scaleX: 0.8, scaleY: 0.8, translateX: 0, translateY: 0, rotateX: 0, rotateY: 0, skewX: 0, skewY: 0 },
    },
  ];

  // ─── Build origin grid ────────────────────────────────────────────────────────
  const originGrid = document.getElementById('origin-grid');
  originPoints.forEach(pt => {
    const btn = document.createElement('button');
    btn.className = 'origin-btn' + (pt.value === state.origin ? ' active' : '');
    btn.title = pt.value;
    btn.setAttribute('data-origin', pt.value);
    btn.innerHTML = '<div class="dot"></div>';
    btn.addEventListener('click', () => {
      state.origin = pt.value;
      document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyTransform();
    });
    originGrid.appendChild(btn);
  });

  // ─── Build presets ────────────────────────────────────────────────────────────
  const presetsGrid = document.getElementById('presets-grid');
  presets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.name;
    btn.addEventListener('click', () => applyPreset(p));
    presetsGrid.appendChild(btn);
  });

  function applyPreset(preset) {
    Object.entries(preset.values).forEach(([key, val]) => {
      state[key] = val;
      const el = document.getElementById(key);
      if (el) el.value = val;
      updateSliderVal(key, val);
    });
    applyTransform();
  }

  // ─── Slider wiring ────────────────────────────────────────────────────────────
  const sliderIds = ['translateX', 'translateY', 'rotateZ', 'rotateX', 'rotateY', 'scaleX', 'scaleY', 'skewX', 'skewY', 'perspective'];

  function formatVal(id, v) {
    if (id === 'scaleX' || id === 'scaleY') return parseFloat(v).toFixed(2);
    if (id === 'perspective') return `${v}px`;
    if (id === 'translateX' || id === 'translateY') return `${v}px`;
    return `${v}deg`;
  }

  function updateSliderVal(id, v) {
    const el = document.getElementById(`${id}-val`);
    if (el) el.textContent = formatVal(id, v);
  }

  sliderIds.forEach(id => {
    const slider = document.getElementById(id);
    if (!slider) return;
    slider.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      state[id] = v;
      updateSliderVal(id, v);
      applyTransform();
    });
    // Init display
    updateSliderVal(id, slider.value);
  });

  // ─── Transition toggle ────────────────────────────────────────────────────────
  document.getElementById('transition-toggle').addEventListener('change', e => {
    state.transition = e.target.checked;
    applyTransform();
  });

  // ─── Apply transform ──────────────────────────────────────────────────────────
  const previewBox = document.getElementById('preview-box');
  const previewWrap = document.getElementById('preview-wrap');

  function buildTransformStr() {
    const parts = [];

    if (state.translateX !== 0 || state.translateY !== 0) {
      parts.push(`translate(${state.translateX}px, ${state.translateY}px)`);
    }
    if (state.rotateZ !== 0) parts.push(`rotate(${state.rotateZ}deg)`);
    if (state.rotateX !== 0) parts.push(`rotateX(${state.rotateX}deg)`);
    if (state.rotateY !== 0) parts.push(`rotateY(${state.rotateY}deg)`);
    if (state.scaleX !== 1 || state.scaleY !== 1) {
      parts.push(`scale(${parseFloat(state.scaleX).toFixed(2)}, ${parseFloat(state.scaleY).toFixed(2)})`);
    }
    if (state.skewX !== 0 || state.skewY !== 0) {
      parts.push(`skew(${state.skewX}deg, ${state.skewY}deg)`);
    }

    return parts.length > 0 ? parts.join(' ') : 'none';
  }

  function buildCSSOutput(transformStr) {
    const lines = [];
    const needsPerspective = state.rotateX !== 0 || state.rotateY !== 0;

    if (needsPerspective) {
      lines.push(`/* Parent element */`);
      lines.push(`perspective: ${state.perspective}px;`);
      lines.push(``);
      lines.push(`/* Target element */`);
    }

    lines.push(`transform: ${transformStr};`);
    lines.push(`transform-origin: ${state.origin};`);
    if (state.transition) {
      lines.push(`transition: transform 0.3s ease;`);
    }

    return lines.join('\n');
  }

  function applyTransform() {
    const transformStr = buildTransformStr();
    const needsPerspective = state.rotateX !== 0 || state.rotateY !== 0;

    // Apply perspective to the wrap
    previewWrap.style.perspective = needsPerspective ? `${state.perspective}px` : '';

    // Apply to preview box
    previewBox.style.transform = transformStr;
    previewBox.style.transformOrigin = state.origin;
    previewBox.style.transition = state.transition ? 'transform 0.3s ease' : 'none';

    // Update output
    const css = buildCSSOutput(transformStr);
    renderCSSOutput(css);
  }

  function renderCSSOutput(css) {
    const el = document.getElementById('output-code');
    // Simple colorizing: prop: val;
    const html = css
      .split('\n')
      .map(line => {
        if (line.startsWith('/*')) {
          return `<span style="color:var(--text2)">${escHtml(line)}</span>`;
        }
        if (line === '') return '';
        const colonIdx = line.indexOf(':');
        if (colonIdx === -1) return escHtml(line);
        const prop = line.slice(0, colonIdx);
        const rest = line.slice(colonIdx); // includes ':'
        return `<span class="prop">${escHtml(prop)}</span><span style="color:var(--text)">${escHtml(rest)}</span>`;
      })
      .join('\n');
    el.innerHTML = html || '<span style="color:var(--text2)">transform: none;</span>';
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ─── Copy button ──────────────────────────────────────────────────────────────
  document.getElementById('btn-copy').addEventListener('click', () => {
    const transformStr = buildTransformStr();
    const css = buildCSSOutput(transformStr);
    navigator.clipboard.writeText(css).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy CSS';
        btn.classList.remove('copied');
      }, 1500);
    });
  });

  // ─── Reset button ─────────────────────────────────────────────────────────────
  document.getElementById('btn-reset').addEventListener('click', () => {
    Object.assign(state, defaults);
    sliderIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.value = defaults[id];
        updateSliderVal(id, defaults[id]);
      }
    });

    // Reset origin
    state.origin = 'center center';
    document.querySelectorAll('.origin-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-origin') === 'center center');
    });

    // Reset transition
    state.transition = true;
    document.getElementById('transition-toggle').checked = true;

    applyTransform();
  });

  // ─── Init ─────────────────────────────────────────────────────────────────────
  applyTransform();
</script>
</body>
</html>
