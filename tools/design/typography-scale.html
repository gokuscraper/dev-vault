{

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:0.78rem;color:#888;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e6e6e6;font-size:0.82rem}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.tab:hover{border-color:#3b82f6;color:#4da6ff}
.tab.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.preset:hover{border-color:#3b82f6;color:#4da6ff}
.output-area{width:100%;min-height:200px;max-height:400px;background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:10px;color:#e6e6e6;font-family:'Fira Code',monospace;font-size:0.72rem;overflow:auto;white-space:pre}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.8rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.btn-primary{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}

.related a{color:#4da6ff;text-decoration:none;margin:0 8px}

/* Tool-specific styles */
.preview-step{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a}
.preview-step:last-child{border-bottom:none}
.step-meta{min-width:140px;flex-shrink:0;font-size:0.72rem;color:#888;line-height:1.4}
.step-meta .step-num{color:#4da6ff;font-weight:700}
.step-meta .step-lh{color:#666}
.step-sample{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#e6e6e6}
.preview-scroll{max-height:460px;overflow-y:auto}
.chart-wrap{position:relative;height:200px;display:flex;align-items:flex-end;gap:3px;padding:10px 0}
.chart-bar{background:#1a2744;border-radius:3px 3px 0 0;min-width:12px;flex:1;position:relative;transition:background .2s}
.chart-bar:hover{background:#2a4a7a}
.chart-bar .bar-label{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:0.6rem;color:#888;white-space:nowrap}
.chart-bar.base-bar{background:#2a4a7a}
.custom-ratio-wrap{display:none;margin-top:6px}
.custom-ratio-wrap.visible{display:block}
.preset.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
</style>
</head>
<body>
<div class="container">
<h1>Typography Scale Generator</h1>
<p class="sub">Create harmonious type scales with modular ratios</p>

<div class="presets">
  <span style="font-size:0.75rem;color:#888;line-height:2;margin-right:4px">Presets:</span>
  <button class="preset" onclick="applyPreset('blog')">Blog / Article</button>
  <button class="preset" onclick="applyPreset('dashboard')">Dashboard</button>
  <button class="preset" onclick="applyPreset('landing')">Landing Page</button>
  <button class="preset" onclick="applyPreset('docs')">Documentation</button>
</div>

<div class="layout">
  <!-- Left column: Controls + Preview -->
  <div>
    <div class="section">
      <h3>Scale Settings</h3>
      <div class="field-row">
        <div class="field">
          <label>Base Font Size (px)</label>
          <input type="number" id="baseSize" value="16" min="8" max="48" step="1" oninput="generate()">
        </div>
        <div class="field">
          <label>Base Line Height</label>
          <input type="number" id="baseLH" value="1.5" min="1" max="3" step="0.05" oninput="generate()">
        </div>
      </div>
      <div class="field">
        <label>Scale Ratio</label>
        <select id="ratioSelect" onchange="onRatioChange()">
          <option value="1.067">Minor Second (1.067)</option>
          <option value="1.125">Major Second (1.125)</option>
          <option value="1.2">Minor Third (1.2)</option>
          <option value="1.25" selected>Major Third (1.25)</option>
          <option value="1.333">Perfect Fourth (1.333)</option>
          <option value="1.414">Augmented Fourth (1.414)</option>
          <option value="1.5">Perfect Fifth (1.5)</option>
          <option value="1.618">Golden Ratio (1.618)</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="custom-ratio-wrap" id="customRatioWrap">
        <div class="field">
          <label>Custom Ratio</label>
          <input type="number" id="customRatio" value="1.333" min="1.01" max="3" step="0.001" oninput="generate()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Steps Above Base</label>
          <input type="number" id="stepsAbove" value="6" min="1" max="12" step="1" oninput="generate()">
        </div>
        <div class="field">
          <label>Steps Below Base</label>
          <input type="number" id="stepsBelow" value="2" min="0" max="6" step="1" oninput="generate()">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>Live Preview</h3>
      <div class="preview-scroll" id="preview"></div>
    </div>
  </div>

  <!-- Right column: Output + Visualization -->
  <div>
    <div class="section">
      <h3>Scale Visualization</h3>
      <div class="chart-wrap" id="chart"></div>
    </div>

    <div class="section">
      <h3>Output</h3>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('css',this)">CSS Vars</button>
        <button class="tab" onclick="switchTab('scss',this)">SCSS</button>
        <button class="tab" onclick="switchTab('tailwind',this)">Tailwind</button>
        <button class="tab" onclick="switchTab('classes',this)">CSS Classes</button>
      </div>
      <div class="output-area" id="output"></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="copyOutput()">Copy</button>
      </div>
    </div>
  </div>
</div>

<div class="footer"><a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a></div>
<div class="related">Related: <a href="https://gokuscraper.github.io/dev-vault/font-pair/">Font Pair</a> | <a href="https://gokuscraper.github.io/dev-vault/font-preview/">Font Preview</a> | <a href="https://gokuscraper.github.io/dev-vault/spacing-calc/">Spacing Calc</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const NAMES_ABOVE = ['base','lg','xl','2xl','3xl','4xl','5xl','6xl','7xl','8xl','9xl','10xl','11xl'];
const NAMES_BELOW = ['sm','xs','2xs','3xs','4xs','5xs','6xs'];

const PRESETS = {
  blog:      { base: 18, ratio: '1.25',  above: 5, below: 2, lh: 1.6 },
  dashboard: { base: 14, ratio: '1.125', above: 5, below: 1, lh: 1.4 },
  landing:   { base: 18, ratio: '1.333', above: 6, below: 2, lh: 1.5 },
  docs:      { base: 16, ratio: '1.2',   above: 4, below: 2, lh: 1.6 }
};

let currentTab = 'css';
let scaleData = [];

function getRatio() {
  const sel = document.getElementById('ratioSelect').value;
  if (sel === 'custom') return parseFloat(document.getElementById('customRatio').value) || 1.25;
  return parseFloat(sel);
}

function onRatioChange() {
  const sel = document.getElementById('ratioSelect').value;
  document.getElementById('customRatioWrap').classList.toggle('visible', sel === 'custom');
  generate();
}

function calcLineHeight(fontSize, baseLH, baseSize) {
  // Larger text needs tighter line-height; smaller text needs looser
  // Formula: as font grows, line-height decreases toward 1.2; as font shrinks, it increases toward 1.8
  if (fontSize <= baseSize) {
    const t = Math.min((baseSize - fontSize) / baseSize, 1);
    return Math.min(baseLH + t * 0.3, 2.0);
  }
  const t = Math.min((fontSize - baseSize) / (baseSize * 3), 1);
  return Math.max(baseLH - t * 0.3, 1.1);
}

function generate() {
  const baseSize = parseFloat(document.getElementById('baseSize').value) || 16;
  const baseLH = parseFloat(document.getElementById('baseLH').value) || 1.5;
  const ratio = getRatio();
  const above = parseInt(document.getElementById('stepsAbove').value) || 6;
  const below = parseInt(document.getElementById('stepsBelow').value) || 0;

  scaleData = [];

  // Below base (descending step numbers: -1, -2, ...)
  for (let i = below; i >= 1; i--) {
    const px = baseSize / Math.pow(ratio, i);
    const name = NAMES_BELOW[i - 1] || `${i}xs`;
    scaleData.push({ step: -i, name, px, lh: calcLineHeight(px, baseLH, baseSize) });
  }

  // Base
  scaleData.push({ step: 0, name: 'base', px: baseSize, lh: baseLH });

  // Above base
  for (let i = 1; i <= above; i++) {
    const px = baseSize * Math.pow(ratio, i);
    const name = NAMES_ABOVE[i] || `${i}xl`;
    scaleData.push({ step: i, name, px, lh: calcLineHeight(baseSize * Math.pow(ratio, i), baseLH, baseSize) });
  }

  renderPreview(baseSize);
  renderChart();
  renderOutput();
}

function renderPreview(baseSize) {
  const el = document.getElementById('preview');
  el.innerHTML = scaleData.map(d => {
    const px = d.px.toFixed(2);
    const rem = (d.px / 16).toFixed(3);
    const em = (d.px / baseSize).toFixed(3);
    const lh = d.lh.toFixed(2);
    return `<div class="preview-step">
      <div class="step-meta">
        <div><span class="step-num">${d.name}</span> (step ${d.step >= 0 ? '+' : ''}${d.step})</div>
        <div>${px}px / ${rem}rem / ${em}em</div>
        <div class="step-lh">line-height: ${lh}</div>
      </div>
      <div class="step-sample" style="font-size:${px}px;line-height:${lh}">The quick brown fox</div>
    </div>`;
  }).join('');
}

function renderChart() {
  const el = document.getElementById('chart');
  const maxPx = Math.max(...scaleData.map(d => d.px));
  el.innerHTML = scaleData.map(d => {
    const h = Math.max((d.px / maxPx) * 180, 4);
    const cls = d.step === 0 ? ' base-bar' : '';
    return `<div class="chart-bar${cls}" style="height:${h}px" title="${d.name}: ${d.px.toFixed(1)}px">
      <span class="bar-label">${d.name}</span>
    </div>`;
  }).join('');
}

function renderOutput() {
  const el = document.getElementById('output');
  el.textContent = generators[currentTab]();
}

const generators = {
  css() {
    let out = ':root {\n';
    scaleData.forEach(d => {
      out += `  --font-size-${d.name}: ${d.px.toFixed(2)}px; /* ${(d.px / 16).toFixed(3)}rem */\n`;
    });
    out += '\n';
    scaleData.forEach(d => {
      out += `  --line-height-${d.name}: ${d.lh.toFixed(2)};\n`;
    });
    out += '}';
    return out;
  },
  scss() {
    let out = '// Typography Scale\n';
    scaleData.forEach(d => {
      out += `$font-size-${d.name}: ${d.px.toFixed(2)}px; // ${(d.px / 16).toFixed(3)}rem\n`;
    });
    out += '\n// Line Heights\n';
    scaleData.forEach(d => {
      out += `$line-height-${d.name}: ${d.lh.toFixed(2)};\n`;
    });
    return out;
  },
  tailwind() {
    let out = '// tailwind.config.js\nmodule.exports = {\n  theme: {\n    fontSize: {\n';
    scaleData.forEach(d => {
      out += `      '${d.name}': ['${(d.px / 16).toFixed(3)}rem', { lineHeight: '${d.lh.toFixed(2)}' }],\n`;
    });
    out += '    },\n  },\n};';
    return out;
  },
  classes() {
    let out = '/* Typography Scale Classes */\n';
    scaleData.forEach(d => {
      out += `.text-${d.name} {\n  font-size: ${d.px.toFixed(2)}px; /* ${(d.px / 16).toFixed(3)}rem */\n  line-height: ${d.lh.toFixed(2)};\n}\n\n`;
    });
    return out.trim();
  }
};

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderOutput();
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1500);
  });
}

function applyPreset(name) {
  const p = PRESETS[name];
  document.getElementById('baseSize').value = p.base;
  document.getElementById('baseLH').value = p.lh;
  document.getElementById('stepsAbove').value = p.above;
  document.getElementById('stepsBelow').value = p.below;

  const sel = document.getElementById('ratioSelect');
  const opt = [...sel.options].find(o => o.value === p.ratio);
  if (opt) {
    sel.value = p.ratio;
    document.getElementById('customRatioWrap').classList.remove('visible');
  } else {
    sel.value = 'custom';
    document.getElementById('customRatio').value = p.ratio;
    document.getElementById('customRatioWrap').classList.add('visible');
  }

  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preset[onclick*="${name}"]`).classList.add('active');
  generate();
}

generate();
</script>
</body>
</html>
