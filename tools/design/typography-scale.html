var _L=_l;

<script>
const NAMES_ABOVE = ['base','lg','xl','2xl','3xl','4xl','5xl','6xl','7xl','8xl','9xl','10xl','11xl'];
const NAMES_BELOW = ['sm','xs','2xs','3xs','4xs','5xs','6xs'];

const PRESETS = {
  blog:      { base: 18, ratio: '1.25',  above: 5, below: 2, lh: 1.6 },
  dashboard: { base: 14, ratio: '1.125', above: 5, below: 1, lh: 1.4 },
  landing:   { base: 18, ratio: '1.333', above: 6, below: 2, lh: 1.5 },
  docs:      { base: 16, ratio: '1.2',   above: 4, below: 2, lh: 1.6 }
};

let currentTab = 'css';
let scaleData = [];

function getRatio() {
  const sel = document.getElementById('ratioSelect').value;
  if (sel === 'custom') return parseFloat(document.getElementById('customRatio').value) || 1.25;
  return parseFloat(sel);
}

function onRatioChange() {
  const sel = document.getElementById('ratioSelect').value;
  document.getElementById('customRatioWrap').classList.toggle('visible', sel === 'custom');
  generate();
}

function calcLineHeight(fontSize, baseLH, baseSize) {
  // Larger text needs tighter line-height; smaller text needs looser
  // Formula: as font grows, line-height decreases toward 1.2; as font shrinks, it increases toward 1.8
  if (fontSize <= baseSize) {
    const t = Math.min((baseSize - fontSize) / baseSize, 1);
    return Math.min(baseLH + t * 0.3, 2.0);
  }
  const t = Math.min((fontSize - baseSize) / (baseSize * 3), 1);
  return Math.max(baseLH - t * 0.3, 1.1);
}

function generate() {
  const baseSize = parseFloat(document.getElementById('baseSize').value) || 16;
  const baseLH = parseFloat(document.getElementById('baseLH').value) || 1.5;
  const ratio = getRatio();
  const above = parseInt(document.getElementById('stepsAbove').value) || 6;
  const below = parseInt(document.getElementById('stepsBelow').value) || 0;

  scaleData = [];

  // Below base (descending step numbers: -1, -2, ...)
  for (let i = below; i >= 1; i--) {
    const px = baseSize / Math.pow(ratio, i);
    const name = NAMES_BELOW[i - 1] || `${i}xs`;
    scaleData.push({ step: -i, name, px, lh: calcLineHeight(px, baseLH, baseSize) });
  }

  // Base
  scaleData.push({ step: 0, name: 'base', px: baseSize, lh: baseLH });

  // Above base
  for (let i = 1; i <= above; i++) {
    const px = baseSize * Math.pow(ratio, i);
    const name = NAMES_ABOVE[i] || `${i}xl`;
    scaleData.push({ step: i, name, px, lh: calcLineHeight(baseSize * Math.pow(ratio, i), baseLH, baseSize) });
  }

  renderPreview(baseSize);
  renderChart();
  renderOutput();
}

function renderPreview(baseSize) {
  const el = document.getElementById('preview');
  el.innerHTML = scaleData.map(d => {
    const px = d.px.toFixed(2);
    const rem = (d.px / 16).toFixed(3);
    const em = (d.px / baseSize).toFixed(3);
    const lh = d.lh.toFixed(2);
    return `<div class="preview-step">
      <div class="step-meta">
        <div><span class="step-num">${d.name}</span> (step ${d.step >= 0 ? '+' : ''}${d.step})</div>
        <div>${px}px / ${rem}rem / ${em}em</div>
        <div class="step-lh">line-height: ${lh}</div>
      </div>
      <div class="step-sample" style="font-size:${px}px;line-height:${lh}">The quick brown fox</div>
    </div>`;
  }).join('');
}

function renderChart() {
  const el = document.getElementById('chart');
  const maxPx = Math.max(...scaleData.map(d => d.px));
  el.innerHTML = scaleData.map(d => {
    const h = Math.max((d.px / maxPx) * 180, 4);
    const cls = d.step === 0 ? ' base-bar' : '';
    return `<div class="chart-bar${cls}" style="height:${h}px" title="${d.name}: ${d.px.toFixed(1)}px">
      <span class="bar-label" ti="label_d_name">${d.name}</span>
    </div>`;
  }).join('');
}

function renderOutput() {
  const el = document.getElementById('output');
  el.textContent = generators[currentTab]();
}

const generators = {
  css() {
    let out = ':root {\n';
    scaleData.forEach(d => {
      out += `  --font-size-${d.name}: ${d.px.toFixed(2)}px; /* ${(d.px / 16).toFixed(3)}rem */\n`;
    });
    out += '\n';
    scaleData.forEach(d => {
      out += `  --line-height-${d.name}: ${d.lh.toFixed(2)};\n`;
    });
    out += '}';
    return out;
  },
  scss() {
    let out = '// Typography Scale\n';
    scaleData.forEach(d => {
      out += `$font-size-${d.name}: ${d.px.toFixed(2)}px; // ${(d.px / 16).toFixed(3)}rem\n`;
    });
    out += '\n// Line Heights\n';
    scaleData.forEach(d => {
      out += `$line-height-${d.name}: ${d.lh.toFixed(2)};\n`;
    });
    return out;
  },
  tailwind() {
    let out = '// tailwind.config.js\nmodule.exports = {\n  theme: {\n    fontSize: {\n';
    scaleData.forEach(d => {
      out += `      '${d.name}': ['${(d.px / 16).toFixed(3)}rem', { lineHeight: '${d.lh.toFixed(2)}' }],\n`;
    });
    out += '    },\n  },\n};';
    return out;
  },
  classes() {
    let out = '/* Typography Scale Classes */\n';
    scaleData.forEach(d => {
      out += `.text-${d.name} {\n  font-size: ${d.px.toFixed(2)}px; /* ${(d.px / 16).toFixed(3)}rem */\n  line-height: ${d.lh.toFixed(2)};\n}\n\n`;
    });
    return out.trim();
  }
};

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderOutput();
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1500);
  });
}

function applyPreset(name) {
  const p = PRESETS[name];
  document.getElementById('baseSize').value = p.base;
  document.getElementById('baseLH').value = p.lh;
  document.getElementById('stepsAbove').value = p.above;
  document.getElementById('stepsBelow').value = p.below;

  const sel = document.getElementById('ratioSelect');
  const opt = [...sel.options].find(o => o.value === p.ratio);
  if (opt) {
    sel.value = p.ratio;
    document.getElementById('customRatioWrap').classList.remove('visible');
  } else {
    sel.value = 'custom';
    document.getElementById('customRatio').value = p.ratio;
    document.getElementById('customRatioWrap').classList.add('visible');
  }

  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preset[onclick*="${name}"]`).classList.add('active');
  generate();
}

generate();
</script>
