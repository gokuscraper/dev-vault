<script>
const SAMPLES={
  circle:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="40" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3"/>
</svg>`,
  star:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <polygon points="50,5 63,35 95,35 69,57 78,90 50,70 22,90 31,57 5,35 37,35" fill="#facc15" stroke="#ca8a04" stroke-width="2"/>
</svg>`,
  gradient:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="15" fill="url(#g1)"/>
</svg>`,
  icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100" height="100" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2L2 7l10 5 10-5-10-5z"/>
  <path d="M2 17l10 5 10-5"/>
  <path d="M2 12l10 5 10-5"/>
</svg>`
};

function loadSample(name){document.getElementById('svgCode').value=SAMPLES[name];render()}

function render(){
  const code=document.getElementById('svgCode').value;
  const preview=document.getElementById('preview');
  // Sanitize: only allow SVG
  if(code.trim().startsWith('<svg')){
    preview.innerHTML=code;
  }else{
    preview.innerHTML='<span style="color:#555;font-size:0.82rem">Paste SVG code to preview</span>';
  }
  updateStats(code);
}

function updateStats(code){
  const bytes=new Blob([code]).size;
  const elements=(code.match(/<[a-z]/gi)||[]).length;
  const hasViewBox=/viewBox/.test(code);
  const hasXmlns=/xmlns/.test(code);
  document.getElementById('stats').innerHTML=[
    {num:formatBytes(bytes),lbl:'Size'},
    {num:elements,lbl:'Elements'},
    {num:hasViewBox?'✓':'✗',lbl:'viewBox'},
    {num:hasXmlns?'✓':'✗',lbl:'xmlns'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function formatBytes(b){
  if(b<1024)return b+' B';
  return(b/1024).toFixed(1)+' KB';
}

function setBg(type){
  const box=document.getElementById('preview');
  box.className='preview-box '+type;
  document.querySelectorAll('.bg-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function copySvg(){
  navigator.clipboard.writeText(document.getElementById('svgCode').value);
  toast('SVG Copied!');
}

function showDataUri(){
  const code=document.getElementById('svgCode').value;
  const uri='data:image/svg+xml,'+encodeURIComponent(code);
  document.getElementById('dataUriPre').textContent=uri;
  document.getElementById('dataUriOut').style.display='block';
}

function showCssBg(){
  const code=document.getElementById('svgCode').value;
  const uri='data:image/svg+xml,'+encodeURIComponent(code);
  document.getElementById('cssBgPre').textContent=`background-image: url("${uri}");`;
  document.getElementById('cssBgOut').style.display='block';
}

function copyOutput(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  toast('Copied!');
}

function downloadSvg(){
  const blob=new Blob([document.getElementById('svgCode').value],{type:'image/svg+xml'});
  const link=document.createElement('a');
  link.download='image.svg';
  link.href=URL.createObjectURL(blob);
  link.click();
}

function downloadPng(){
  const code=document.getElementById('svgCode').value;
  const blob=new Blob([code],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement('canvas');
    canvas.width=img.naturalWidth||200;
    canvas.height=img.naturalHeight||200;
    canvas.getContext('2d').drawImage(img,0,0);
    const link=document.createElement('a');
    link.download='image.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

loadSample('gradient');
</script>
