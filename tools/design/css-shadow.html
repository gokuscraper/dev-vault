<script>
const $=id=>document.getElementById(id);

let layers=[
  {x:0,y:4,blur:15,spread:0,color:'#000000',opacity:25,inset:false},
];
let activeLayer=0;

const PRESETS=[
  {name:'Subtle',layers:[{x:0,y:1,blur:3,spread:0,color:'#000000',opacity:12,inset:false}]},
  {name:'Medium',layers:[{x:0,y:4,blur:15,spread:0,color:'#000000',opacity:25,inset:false}]},
  {name:'Elevated',layers:[{x:0,y:10,blur:40,spread:-5,color:'#000000',opacity:30,inset:false}]},
  {name:'Heavy',layers:[{x:0,y:20,blur:60,spread:-10,color:'#000000',opacity:40,inset:false}]},
  {name:'Layered',layers:[{x:0,y:1,blur:2,spread:0,color:'#000000',opacity:7,inset:false},{x:0,y:2,blur:4,spread:0,color:'#000000',opacity:7,inset:false},{x:0,y:4,blur:8,spread:0,color:'#000000',opacity:7,inset:false},{x:0,y:8,blur:16,spread:0,color:'#000000',opacity:7,inset:false}]},
  {name:'Glow',layers:[{x:0,y:0,blur:30,spread:5,color:'#3b82f6',opacity:40,inset:false}]},
  {name:'Neumorphic',layers:[{x:8,y:8,blur:16,spread:0,color:'#000000',opacity:20,inset:false},{x:-8,y:-8,blur:16,spread:0,color:'#ffffff',opacity:5,inset:false}]},
  {name:'Inset',layers:[{x:0,y:2,blur:8,spread:0,color:'#000000',opacity:30,inset:true}]},
  {name:'Sharp',layers:[{x:6,y:6,blur:0,spread:0,color:'#000000',opacity:100,inset:false}]},
  {name:'Double',layers:[{x:0,y:4,blur:8,spread:0,color:'#000000',opacity:15,inset:false},{x:0,y:0,blur:0,spread:3,color:'#3b82f6',opacity:30,inset:false}]},
];

function renderPresets(){
  $('presets').innerHTML=PRESETS.map((p,i)=>
    `<button class="preset-btn" onclick="applyPreset(${i})" ti="btn_p_name">${p.name}</button>`
  ).join('');
}

function applyPreset(i){
  layers=PRESETS[i].layers.map(l=>({...l}));
  activeLayer=0;
  renderLayers();
  renderControls();
  update();
}

function renderLayers(){
  $('layerCount').textContent=`(${layers.length})`;
  $('layerTabs').innerHTML=layers.map((l,i)=>
    `<div class="layer-tab ${i===activeLayer?'active':''}" onclick="selectLayer(${i})">
      Layer ${i+1}${layers.length>1?`<span class="remove-layer" onclick="event.stopPropagation();removeLayer(${i})">×</span>`:''}
    </div>`
  ).join('')+`<div class="layer-tab add" onclick="addLayer()">+ Add</div>`;
}

function selectLayer(i){activeLayer=i;renderLayers();renderControls()}

function addLayer(){
  layers.push({x:0,y:4,blur:15,spread:0,color:'#000000',opacity:25,inset:false});
  activeLayer=layers.length-1;
  renderLayers();renderControls();update();
}

function removeLayer(i){
  if(layers.length<=1)return;
  layers.splice(i,1);
  if(activeLayer>=layers.length)activeLayer=layers.length-1;
  renderLayers();renderControls();update();
}

function renderControls(){
  const l=layers[activeLayer];
  $('layerControls').innerHTML=`
    <h3 ti="h3_layer_activelayer_1_setti">Layer ${activeLayer+1} Settings</h3>
    <div class="control-row">
      <label ti="label_x_offset">X Offset</label>
      <input type="range" min="-50" max="50" value="${l.x}" oninput="setLayer('x',this.value)">
      <span class="val">${l.x}px</span>
    </div>
    <div class="control-row">
      <label ti="label_y_offset">Y Offset</label>
      <input type="range" min="-50" max="50" value="${l.y}" oninput="setLayer('y',this.value)">
      <span class="val">${l.y}px</span>
    </div>
    <div class="control-row">
      <label ti="label_blur">Blur</label>
      <input type="range" min="0" max="100" value="${l.blur}" oninput="setLayer('blur',this.value)">
      <span class="val">${l.blur}px</span>
    </div>
    <div class="control-row">
      <label ti="label_spread">Spread</label>
      <input type="range" min="-30" max="50" value="${l.spread}" oninput="setLayer('spread',this.value)">
      <span class="val">${l.spread}px</span>
    </div>
    <div class="control-row">
      <label ti="label_color">Color</label>
      <input type="color" value="${l.color}" oninput="setLayer('color',this.value)">
      <label style="width:auto" ti="label_opacity">Opacity</label>
      <input type="range" min="0" max="100" value="${l.opacity}" style="width:80px" oninput="setLayer('opacity',this.value)">
      <span class="val">${l.opacity}%</span>
    </div>
    <div class="control-row">
      <label ti="label_inset">Inset</label>
      <input type="checkbox" ${l.inset?'checked':''} onchange="setLayer('inset',this.checked)">
    </div>
  `;
}

function setLayer(prop,val){
  if(prop==='color')layers[activeLayer][prop]=val;
  else if(prop==='inset')layers[activeLayer][prop]=val;
  else layers[activeLayer][prop]=parseInt(val);
  renderControls();
  update();
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}

function getShadowCSS(){
  return layers.map(l=>{
    const{r,g,b}=hexToRgb(l.color);
    const a=(l.opacity/100).toFixed(2);
    return`${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px rgba(${r}, ${g}, ${b}, ${a})`;
  }).join(',\n    ');
}

function update(){
  const shadow=getShadowCSS();
  const radius=$('borderRadius').value;
  const boxColor=$('boxColor').value;

  $('borderRadiusVal').textContent=radius;
  $('previewBox').style.boxShadow=shadow.replace(/\n\s+/g,' ');
  $('previewBox').style.borderRadius=radius+'px';
  $('previewBox').style.background=boxColor;
  $('cssOutput').textContent=`box-shadow: ${shadow};\nborder-radius: ${radius}px;`;
}

function setBg(color){
  $('previewPanel').style.background=color;
  document.querySelectorAll('.bg-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function copyCSSOutput(){
  navigator.clipboard.writeText($('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';
  el.textContent=T("jtc_css_copied");
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Init
renderPresets();
renderLayers();
renderControls();
update();
</script>
