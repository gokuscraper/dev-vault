<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Breakpoint Simulator</title>
<meta name="description" content="Interactive CSS media query breakpoint simulator. Design responsive breakpoints visually, see which rules apply at any viewport width, and export clean CSS.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242837;--border:#2e3347;--text:#e4e7f1;--dim:#8b90a5;--accent:#6c8cff;--accent2:#a78bfa;--green:#4ade80;--red:#f87171;--orange:#fbbf24;--cyan:#22d3ee}
body{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:15px;font-weight:600}
.header span{color:var(--dim);font-size:12px}
.main{display:flex;height:calc(100vh - 49px)}

/* Left panel: Breakpoint definitions */
.left{width:360px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.section-header{padding:10px 14px;font-size:11px;color:var(--dim);background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bp-list{flex:1;overflow-y:auto;padding:8px}
.bp-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;padding:10px;transition:border-color .2s}
.bp-item.active{border-color:var(--green);background:rgba(74,222,128,.05)}
.bp-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bp-item-header .color-bar{width:4px;height:24px;border-radius:2px}
.bp-item-header .name{font-size:12px;font-weight:600;flex:1}
.bp-item-header .range-text{font-size:10px;color:var(--dim)}
.bp-row{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px}
.bp-row label{min-width:55px;color:var(--dim)}
.bp-row input[type="number"]{width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);font-family:inherit;font-size:11px}
.bp-row input[type="text"]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);font-family:inherit;font-size:11px}
.bp-row select{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);font-family:inherit;font-size:11px}
.bp-css{margin-top:8px;padding:6px 8px;background:var(--bg);border-radius:4px;font-size:10px;color:var(--dim);line-height:1.5}
.btn{padding:6px 14px;border-radius:6px;border:none;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5a7aee}
.btn-sm{padding:3px 8px;font-size:10px;background:var(--surface2);color:var(--dim);border:1px solid var(--border);border-radius:4px;cursor:pointer}
.btn-sm:hover{color:var(--text)}
.btn-danger{color:var(--red);background:none;border:none;cursor:pointer;font-size:10px;font-family:inherit}

/* Right panel: Visualization */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Viewport slider */
.viewport-bar{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.viewport-row{display:flex;align-items:center;gap:12px}
.viewport-row .vp-label{font-size:12px;font-weight:600;min-width:80px}
.viewport-row .vp-value{font-size:14px;color:var(--accent);font-weight:700;min-width:55px}
.viewport-row input[type="range"]{flex:1;accent-color:var(--accent)}
.device-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.device-chip{padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s}
.device-chip:hover{border-color:var(--accent);color:var(--text)}
.device-chip.active{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}

/* Timeline visualization */
.timeline-area{flex:1;padding:20px;overflow:auto}
.timeline{position:relative;margin-bottom:40px}

/* Breakpoint bars */
.bp-timeline-row{display:flex;align-items:center;margin-bottom:4px;height:28px}
.bp-timeline-label{min-width:100px;font-size:11px;font-weight:600;padding-right:8px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bp-timeline-track{flex:1;height:28px;position:relative;background:var(--surface);border-radius:4px;overflow:hidden}
.bp-timeline-bar{position:absolute;top:2px;bottom:2px;border-radius:3px;opacity:.7;transition:opacity .2s}
.bp-timeline-bar.active{opacity:1;box-shadow:0 0 8px rgba(255,255,255,.1)}

/* Ruler */
.ruler{display:flex;position:relative;height:24px;margin-bottom:4px;padding-left:100px}
.ruler-track{flex:1;position:relative}
.ruler-mark{position:absolute;top:0;font-size:9px;color:var(--dim);border-left:1px solid var(--border);padding-left:3px;height:100%}
.viewport-line{position:absolute;top:-4px;bottom:-10px;width:2px;background:var(--accent);z-index:10;pointer-events:none}
.viewport-line::after{content:attr(data-w);position:absolute;top:-14px;left:4px;font-size:10px;color:var(--accent);white-space:nowrap}

/* Active rules */
.active-rules{padding:16px 20px;border-top:1px solid var(--border);background:var(--surface);max-height:200px;overflow-y:auto}
.active-rules h3{font-size:11px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.active-rule{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.active-rule .color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.active-rule .rule-name{font-weight:600;min-width:80px}
.active-rule .rule-query{color:var(--dim)}
.active-rule .rule-css{color:var(--green);font-size:10px}
.no-rules{color:var(--dim);font-size:11px;font-style:italic}

/* Export */
.export-area{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}

/* Presets */
.presets-row{padding:8px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:6px;flex-wrap:wrap}
.preset-chip{padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s}
.preset-chip:hover{border-color:var(--accent);color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <h1>CSS Breakpoint Simulator</h1>
  <span>Design responsive breakpoints visually</span>
</div>

<div class="main">
  <div class="left">
    <div class="section-header">
      <span>Breakpoints</span>
      <button class="btn-sm" onclick="addBreakpoint()">+ Add</button>
    </div>
    <div class="bp-list" id="bpList"></div>
    <div class="presets-row" id="presetsRow"></div>
  </div>
  <div class="right">
    <div class="viewport-bar">
      <div class="viewport-row">
        <span class="vp-label">Viewport:</span>
        <span class="vp-value" id="vpValue">1024px</span>
        <input type="range" id="vpSlider" min="320" max="1920" value="1024" oninput="updateViewport(this.value)">
      </div>
      <div class="device-chips" id="deviceChips"></div>
    </div>
    <div class="timeline-area" id="timelineArea"></div>
    <div class="active-rules" id="activeRules">
      <h3>Active Rules at Current Width</h3>
      <div id="activeRulesList"></div>
    </div>
    <div class="export-area">
      <button class="btn btn-primary" onclick="exportCSS()">Export CSS</button>
      <button class="btn-sm" onclick="exportJSON()">Export JSON</button>
      <span style="font-size:10px;color:var(--dim);margin-left:auto" id="summaryText"></span>
    </div>
  </div>
</div>

<script>
// State
let breakpoints = [];
let nextId = 1;
let viewportWidth = 1024;
const MAX_WIDTH = 1920;

const COLORS = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#06b6d4','#ec4899','#84cc16','#f97316','#8b5cf6','#14b8a6','#e11d48'];

const DEVICES = [
  { name: 'iPhone SE', w: 375 },
  { name: 'iPhone 14', w: 390 },
  { name: 'iPhone 14 Pro Max', w: 430 },
  { name: 'iPad Mini', w: 768 },
  { name: 'iPad Pro', w: 1024 },
  { name: 'Laptop', w: 1366 },
  { name: 'Desktop', w: 1920 },
];

const PRESETS = [
  {
    name: 'Tailwind CSS',
    bps: [
      { name: 'sm', min: 640, max: null, css: '/* sm */' },
      { name: 'md', min: 768, max: null, css: '/* md */' },
      { name: 'lg', min: 1024, max: null, css: '/* lg */' },
      { name: 'xl', min: 1280, max: null, css: '/* xl */' },
      { name: '2xl', min: 1536, max: null, css: '/* 2xl */' },
    ]
  },
  {
    name: 'Bootstrap 5',
    bps: [
      { name: 'sm', min: 576, max: null, css: '/* sm */' },
      { name: 'md', min: 768, max: null, css: '/* md */' },
      { name: 'lg', min: 992, max: null, css: '/* lg */' },
      { name: 'xl', min: 1200, max: null, css: '/* xl */' },
      { name: 'xxl', min: 1400, max: null, css: '/* xxl */' },
    ]
  },
  {
    name: 'Material Design',
    bps: [
      { name: 'compact', min: 0, max: 599, css: '/* phone */' },
      { name: 'medium', min: 600, max: 839, css: '/* tablet */' },
      { name: 'expanded', min: 840, max: null, css: '/* desktop */' },
    ]
  },
  {
    name: 'Content-Based',
    bps: [
      { name: 'base', min: 0, max: 479, css: 'font-size: 14px;' },
      { name: 'reading', min: 480, max: 767, css: 'font-size: 16px; max-width: 65ch;' },
      { name: 'comfortable', min: 768, max: 1199, css: 'font-size: 18px; max-width: 70ch;' },
      { name: 'spacious', min: 1200, max: null, css: 'font-size: 18px; max-width: 75ch;' },
    ]
  },
  {
    name: 'Custom (Empty)',
    bps: []
  }
];

// Init devices
const deviceChips = document.getElementById('deviceChips');
DEVICES.forEach(d => {
  const chip = document.createElement('button');
  chip.className = 'device-chip';
  chip.textContent = `${d.name} (${d.w})`;
  chip.addEventListener('click', () => {
    document.getElementById('vpSlider').value = d.w;
    updateViewport(d.w);
  });
  deviceChips.appendChild(chip);
});

// Init presets
const presetsRow = document.getElementById('presetsRow');
PRESETS.forEach(p => {
  const chip = document.createElement('button');
  chip.className = 'preset-chip';
  chip.textContent = p.name;
  chip.addEventListener('click', () => {
    breakpoints = [];
    nextId = 1;
    p.bps.forEach(bp => {
      breakpoints.push({
        id: nextId++,
        name: bp.name,
        type: bp.max ? 'range' : (bp.min === 0 ? 'max' : 'min'),
        min: bp.min || 0,
        max: bp.max || MAX_WIDTH,
        css: bp.css || '',
        color: COLORS[(breakpoints.length) % COLORS.length]
      });
    });
    renderAll();
  });
  presetsRow.appendChild(chip);
});

function addBreakpoint(opts = {}) {
  const id = nextId++;
  breakpoints.push({
    id,
    name: opts.name || `bp-${id}`,
    type: opts.type || 'min',
    min: opts.min ?? 768,
    max: opts.max ?? MAX_WIDTH,
    css: opts.css || '',
    color: opts.color || COLORS[(id - 1) % COLORS.length]
  });
  renderAll();
}

function removeBreakpoint(id) {
  breakpoints = breakpoints.filter(b => b.id !== id);
  renderAll();
}

function updateBP(id, prop, value) {
  const bp = breakpoints.find(b => b.id === id);
  if (!bp) return;
  bp[prop] = value;

  // Auto-adjust type
  if (prop === 'type') {
    if (value === 'min') bp.max = MAX_WIDTH;
    if (value === 'max') bp.min = 0;
  }

  renderAll();
}

function isActive(bp) {
  const w = viewportWidth;
  switch (bp.type) {
    case 'min': return w >= bp.min;
    case 'max': return w <= bp.max;
    case 'range': return w >= bp.min && w <= bp.max;
  }
  return false;
}

function getMediaQuery(bp) {
  switch (bp.type) {
    case 'min': return `@media (min-width: ${bp.min}px)`;
    case 'max': return `@media (max-width: ${bp.max}px)`;
    case 'range': return `@media (min-width: ${bp.min}px) and (max-width: ${bp.max}px)`;
  }
}

function updateViewport(w) {
  viewportWidth = parseInt(w);
  document.getElementById('vpValue').textContent = w + 'px';

  // Update device chip highlights
  document.querySelectorAll('.device-chip').forEach((chip, i) => {
    chip.classList.toggle('active', DEVICES[i].w === viewportWidth);
  });

  renderTimeline();
  renderActiveRules();
}

function renderAll() {
  renderBPList();
  renderTimeline();
  renderActiveRules();
  updateSummary();
}

function renderBPList() {
  const list = document.getElementById('bpList');
  list.innerHTML = breakpoints.map(bp => {
    const active = isActive(bp);
    const query = getMediaQuery(bp);

    return `<div class="bp-item${active ? ' active' : ''}">
      <div class="bp-item-header">
        <span class="color-bar" style="background:${bp.color}"></span>
        <span class="name">${escHTML(bp.name)}</span>
        <span class="range-text">${query}</span>
        <button class="btn-danger" onclick="removeBreakpoint(${bp.id})">×</button>
      </div>
      <div class="bp-row">
        <label>Name</label>
        <input type="text" value="${escHTML(bp.name)}" onchange="updateBP(${bp.id},'name',this.value)">
      </div>
      <div class="bp-row">
        <label>Type</label>
        <select onchange="updateBP(${bp.id},'type',this.value)">
          <option value="min"${bp.type === 'min' ? ' selected' : ''}>min-width</option>
          <option value="max"${bp.type === 'max' ? ' selected' : ''}>max-width</option>
          <option value="range"${bp.type === 'range' ? ' selected' : ''}>range</option>
        </select>
      </div>
      ${bp.type !== 'max' ? `<div class="bp-row">
        <label>Min</label>
        <input type="number" value="${bp.min}" min="0" max="1920" onchange="updateBP(${bp.id},'min',parseInt(this.value))">
        <span style="font-size:10px;color:var(--dim)">px</span>
      </div>` : ''}
      ${bp.type !== 'min' ? `<div class="bp-row">
        <label>Max</label>
        <input type="number" value="${bp.max}" min="0" max="1920" onchange="updateBP(${bp.id},'max',parseInt(this.value))">
        <span style="font-size:10px;color:var(--dim)">px</span>
      </div>` : ''}
      <div class="bp-row">
        <label>CSS</label>
        <input type="text" value="${escHTML(bp.css)}" onchange="updateBP(${bp.id},'css',this.value)" placeholder="e.g. display: grid; columns: 3;">
      </div>
      <div class="bp-css">${escHTML(query)} { ... }</div>
    </div>`;
  }).join('');

  if (breakpoints.length === 0) {
    list.innerHTML = '<div style="color:var(--dim);font-size:11px;text-align:center;padding:40px 16px">No breakpoints defined.<br>Click "+ Add" or choose a preset below.</div>';
  }
}

function renderTimeline() {
  const area = document.getElementById('timelineArea');

  // Ruler
  let html = '<div class="timeline">';

  // Ruler marks
  html += '<div class="bp-timeline-row"><div class="bp-timeline-label" style="font-size:10px;color:var(--dim)">Width</div><div class="bp-timeline-track ruler-track" style="background:none">';
  const marks = [320, 480, 640, 768, 1024, 1280, 1440, 1600, 1920];
  marks.forEach(m => {
    const pct = ((m - 320) / (MAX_WIDTH - 320)) * 100;
    html += `<div class="ruler-mark" style="left:${pct}%">${m}</div>`;
  });

  // Viewport line
  const vpPct = ((viewportWidth - 320) / (MAX_WIDTH - 320)) * 100;
  html += `<div class="viewport-line" style="left:${vpPct}%" data-w="${viewportWidth}px"></div>`;
  html += '</div></div>';

  // Breakpoint bars
  breakpoints.forEach(bp => {
    const active = isActive(bp);
    const startPx = bp.type === 'max' ? 0 : bp.min;
    const endPx = bp.type === 'min' ? MAX_WIDTH : bp.max;

    const startPct = ((startPx - 320) / (MAX_WIDTH - 320)) * 100;
    const endPct = ((endPx - 320) / (MAX_WIDTH - 320)) * 100;
    const widthPct = endPct - startPct;

    html += `<div class="bp-timeline-row">
      <div class="bp-timeline-label" style="color:${bp.color}">${escHTML(bp.name)}</div>
      <div class="bp-timeline-track">
        <div class="bp-timeline-bar${active ? ' active' : ''}" style="left:${Math.max(0, startPct)}%;width:${Math.min(100, widthPct)}%;background:${bp.color}${active ? '' : '40'}"></div>
        <div class="viewport-line" style="left:${vpPct}%"></div>
      </div>
    </div>`;
  });

  html += '</div>';
  area.innerHTML = html;
}

function renderActiveRules() {
  const list = document.getElementById('activeRulesList');
  const active = breakpoints.filter(bp => isActive(bp));

  if (active.length === 0) {
    list.innerHTML = '<div class="no-rules">No breakpoints active at ' + viewportWidth + 'px</div>';
    return;
  }

  list.innerHTML = active.map(bp => {
    return `<div class="active-rule">
      <span class="color-dot" style="background:${bp.color}"></span>
      <span class="rule-name">${escHTML(bp.name)}</span>
      <span class="rule-query">${getMediaQuery(bp)}</span>
      ${bp.css ? `<span class="rule-css">${escHTML(bp.css)}</span>` : ''}
    </div>`;
  }).join('');
}

function updateSummary() {
  const active = breakpoints.filter(bp => isActive(bp));
  document.getElementById('summaryText').textContent =
    `${breakpoints.length} breakpoint${breakpoints.length !== 1 ? 's' : ''} · ${active.length} active at ${viewportWidth}px`;
}

function exportCSS() {
  if (breakpoints.length === 0) return;

  const sorted = [...breakpoints].sort((a, b) => {
    const aMin = a.type === 'max' ? 0 : a.min;
    const bMin = b.type === 'max' ? 0 : b.min;
    return aMin - bMin;
  });

  let css = '/* Generated by CSS Breakpoint Simulator */\n';
  css += '/* https://gokuscraper.github.io/dev-vault/css-breakpoint-sim/ */\n\n';

  sorted.forEach(bp => {
    css += `/* ${bp.name} */\n`;
    css += `${getMediaQuery(bp)} {\n`;
    if (bp.css) {
      css += `  ${bp.css}\n`;
    } else {
      css += `  /* ... */\n`;
    }
    css += '}\n\n';
  });

  copyToClipboard(css);
}

function exportJSON() {
  const data = breakpoints.map(bp => ({
    name: bp.name,
    query: getMediaQuery(bp),
    min: bp.type === 'max' ? null : bp.min,
    max: bp.type === 'min' ? null : bp.max,
    css: bp.css || null
  }));
  copyToClipboard(JSON.stringify(data, null, 2));
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.export-area .btn-primary');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function escHTML(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Load Tailwind preset by default
PRESETS[0].bps.forEach(bp => {
  breakpoints.push({
    id: nextId++,
    name: bp.name,
    type: bp.max ? 'range' : (bp.min === 0 ? 'max' : 'min'),
    min: bp.min || 0,
    max: bp.max || MAX_WIDTH,
    css: bp.css || '',
    color: COLORS[(breakpoints.length) % COLORS.length]
  });
});
renderAll();
</script>
</body>
</html>
