<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
let scale=[];
let format='css';

const PRESETS={
  tailwind:{base:4,steps:13,type:'custom',values:[0,1,2,4,5,6,8,10,12,14,16,20,24].map(n=>n*4)},
  material:{base:8,steps:10,type:'custom',values:[0,4,8,12,16,24,32,40,48,64]},
  bootstrap:{base:4,steps:6,type:'custom',values:[0,4,8,16,24,48]},
  linear4:{base:4,steps:12,type:'linear',ratio:1},
  linear8:{base:8,steps:10,type:'linear',ratio:1},
  golden:{base:4,steps:10,type:'ratio',ratio:1.618},
  fibonacci:{base:4,steps:10,type:'custom',values:[0,1,2,3,5,8,13,21,34,55].map(n=>n*4)},
};

function loadPreset(name){
  const p=PRESETS[name];
  document.getElementById('base').value=p.base;
  document.getElementById('steps').value=p.steps;
  document.getElementById('scaleType').value=p.type==='custom'?'custom':p.type;
  if(p.ratio)document.getElementById('ratio').value=p.ratio;
  if(p.values){scale=[...p.values]}
  else{scale=[]}
  generate();
}

function generate(){
  const base=+document.getElementById('base').value;
  const steps=+document.getElementById('steps').value;
  const type=document.getElementById('scaleType').value;
  const ratio=+document.getElementById('ratio').value;
  const rootSize=+document.getElementById('rootSize').value;

  if(type==='linear'){
    scale=[];for(let i=0;i<steps;i++)scale.push(i*base);
  }else if(type==='ratio'){
    scale=[0];for(let i=1;i<steps;i++)scale.push(Math.round(base*Math.pow(ratio,i-1)));
  }else if(!scale.length||scale.length!==steps){
    scale=[];for(let i=0;i<steps;i++)scale.push(i*base);
  }

  const maxVal=Math.max(...scale,1);
  const body=document.getElementById('scaleBody');
  body.innerHTML=scale.map((px,i)=>{
    const rem=(px/rootSize).toFixed(px%rootSize===0&&px>0?0:3).replace(/\.?0+$/,'');
    const w=Math.max(2,px/maxVal*100);
    return`<tr>
      <td class="name">${i}</td>
      <td class="px-val">${px}px</td>
      <td class="rem-val">${rem}rem</td>
      <td class="bar-cell"><div class="bar" style="width:${w}%"></div></td>
    </tr>`;
  }).join('');

  renderOutput();
}

function setFormat(f){
  format=f;
  document.querySelectorAll('.out-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.out-tab')[f==='css'?0:f==='tailwind'?1:2].classList.add('active');
  renderOutput();
}

function renderOutput(){
  const rootSize=+document.getElementById('rootSize').value;
  let out='';
  if(format==='css'){
    out=':root {\n';
    scale.forEach((px,i)=>{
      const rem=(px/rootSize).toFixed(px%rootSize===0&&px>0?0:3).replace(/\.?0+$/,'');
      out+=`  --space-${i}: ${rem}rem; /* ${px}px */\n`;
    });
    out+='}';
  }else if(format==='tailwind'){
    out='// tailwind.config.js\nmodule.exports = {\n  theme: {\n    spacing: {\n';
    scale.forEach((px,i)=>{
      const rem=(px/rootSize).toFixed(px%rootSize===0&&px>0?0:3).replace(/\.?0+$/,'');
      out+=`      '${i}': '${rem}rem', // ${px}px\n`;
    });
    out+='    },\n  },\n};';
  }else{
    scale.forEach((px,i)=>{
      const rem=(px/rootSize).toFixed(px%rootSize===0&&px>0?0:3).replace(/\.?0+$/,'');
      out+=`$space-${i}: ${rem}rem; // ${px}px\n`;
    });
  }
  document.getElementById('cssOutput').textContent=out;
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent=T("jtc_copied");
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

loadPreset('tailwind');
</script>
