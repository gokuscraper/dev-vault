*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:24px;font-size:.95rem}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-group label{font-size:.78rem;color:var(--text2);font-weight:500}
.ctrl-group input,.ctrl-group select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.9rem;outline:none}
.ctrl-group input:focus,.ctrl-group select:focus{border-color:var(--accent)}
#search{width:240px}
#previewText{flex:1;min-width:200px}
#fontSize{width:80px}
select{cursor:pointer;appearance:auto}
.stats{color:var(--text2);font-size:.82rem;margin-bottom:16px}
.font-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.font-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s;cursor:pointer;position:relative}
.font-card:hover{border-color:var(--accent)}
.font-card.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}
.font-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.font-name{font-weight:600;font-size:.9rem}
.font-cat{font-size:.72rem;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:10px}
.font-preview{min-height:48px;line-height:1.4;word-break:break-word;transition:font-family .3s}
.font-actions{display:flex;gap:8px;margin-top:10px;opacity:0;transition:opacity .2s}
.font-card:hover .font-actions{opacity:1}
.font-actions button{padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:.75rem;cursor:pointer;transition:all .2s}
.font-actions button:hover{border-color:var(--accent);color:var(--accent)}
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 24px;display:none;z-index:100}
.compare-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px}
.compare-fonts{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.compare-tag{padding:4px 10px;background:var(--bg);border:1px solid var(--accent);border-radius:16px;font-size:.82rem;display:flex;align-items:center;gap:6px}
.compare-tag .remove{cursor:pointer;color:var(--text2);font-size:.9rem}
.compare-tag .remove:hover{color:var(--accent)}
.compare-btn{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}
.compare-panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
.compare-panel h3{margin-bottom:16px;font-size:1.1rem}
.compare-row{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.compare-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.compare-row .cr-name{font-weight:600;margin-bottom:4px;font-size:.9rem}
.compare-row .cr-preview{line-height:1.4}
.compare-row .cr-css{font-family:'SF Mono',Consolas,monospace;font-size:.78rem;color:var(--text2);margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:6px;cursor:pointer;position:relative}
.compare-row .cr-css:hover{color:var(--accent)}
.copied{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--green);font-size:.75rem}
.load-more{text-align:center;padding:20px}
.load-more button{padding:10px 32px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;cursor:pointer}
.load-more button:hover{border-color:var(--accent);color:var(--accent)}
footer{text-align:center;padding:32px 16px 80px;color:var(--text2);font-size:.82rem}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:640px){.controls{flex-direction:column}#search,#previewText{width:100%}.font-grid{grid-template-columns:1fr}}

  <div class="controls">
    <div class="ctrl-group">
      <label ti="label_search">Search</label>
      <input type="text" id="search" tp="placeholder_search_fonts" placeholder="Search fonts..." oninput="filterFonts()">
    </div>
    <div class="ctrl-group">
      <label ti="label_category">Category</label>
      <select id="category" onchange="filterFonts()">
        <option value="all">All</option>
        <option value="sans-serif">Sans Serif</option>
        <option value="serif">Serif</option>

      <label ti="label_preview_text">Preview Text</label>

  <div class="stats" id="stats"></div>

</div>

</div>

</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const $ = id => document.getElementById(id);
const API_KEY = 'AIzaSyAPE2fYMVVwVnrOPRqQ1Na9DmjkV-yeJd0'; // Google Fonts public API key
let allFonts = [];
let filtered = [];
let page = 0;
const PER_PAGE = 30;
let selected = new Set();
let loadedFonts = new Set();

async function init() {
  try {
    const r = await fetch(`https://www.googleapis.com/webfonts/v1/webfonts?key=${API_KEY}&sort=popularity`);
    const data = await r.json();
    allFonts = data.items || [];
    filterFonts();
  } catch {
    $('stats').textContent=T("jtc_failed_to_load_fonts_chec");
  }
}

function filterFonts() {
  const q = $('search').value.toLowerCase();
  const cat = $('category').value;
  const sort = $('sort').value;

  filtered = allFonts.filter(f => {
    if (q && !f.family.toLowerCase().includes(q)) return false;
    if (cat !== 'all' && f.category !== cat) return false;
    return true;
  });

  if (sort === 'alpha') filtered.sort((a, b) => a.family.localeCompare(b.family));
  // popularity is default sort from API, trending is similar

  page = 0;
  $('stats').textContent = `${filtered.length} fonts found`;
  $('grid').innerHTML = '';
  loadMore();
}

function loadMore() {
  const start = page * PER_PAGE;
  const batch = filtered.slice(start, start + PER_PAGE);
  if (!batch.length) { $('loadMore').style.display = 'none'; return; }

  const text = $('previewText').value || 'The quick brown fox';
  const size = $('fontSize').value || 28;

  // Load fonts
  const toLoad = batch.filter(f => !loadedFonts.has(f.family));
  if (toLoad.length) {
    const families = toLoad.map(f => f.family.replace(/ /g, '+')).join('&family=');
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${families}&display=swap`;
    document.head.appendChild(link);
    toLoad.forEach(f => loadedFonts.add(f.family));
  }

  batch.forEach(f => {
    const card = document.createElement('div');
    card.className = `font-card${selected.has(f.family) ? ' selected' : ''}`;
    card.innerHTML = `
      <div class="font-meta">
        <span class="font-name">${f.family}</span>
        <span class="font-cat">${f.category}</span>
      </div>
      <div class="font-preview" style="font-family:'${f.family}',${f.category};font-size:${size}px">${text}</div>
      <div class="font-actions">
        <button onclick="event.stopPropagation();copyCSS('${f.family}')" ti="btn_copy_css">Copy CSS</button>
        <button onclick="event.stopPropagation();toggleSelect('${f.family}',this.closest('.font-card'))" ti="btn_selected_has_f_family_se">
          ${selected.has(f.family) ? '✓ Selected' : '+ Compare'}
        </button>
        <button onclick="event.stopPropagation();window.open('https://fonts.google.com/specimen/${encodeURIComponent(f.family)}','_blank')" ti="btn_google_fonts">Google Fonts ↗</button>
      </div>
    `;
    card.addEventListener('click', () => toggleSelect(f.family, card));
    $('grid').appendChild(card);
  });

  page++;
  $('loadMore').style.display = (start + PER_PAGE < filtered.length) ? 'block' : 'none';
}

function updatePreview() {
  const text = $('previewText').value || 'The quick brown fox';
  document.querySelectorAll('.font-preview').forEach(el => el.textContent = text);
  updateComparePreview();
}

function updateSize() {
  const size = $('fontSize').value || 28;
  document.querySelectorAll('.font-preview').forEach(el => el.style.fontSize = size + 'px');
  updateComparePreview();
}

function toggleSelect(family, card) {
  if (selected.has(family)) {
    selected.delete(family);
    if (card) card.classList.remove('selected');
  } else {
    if (selected.size >= 6) return; // max 6
    selected.add(family);
    if (card) card.classList.add('selected');
  }
  updateCompareBar();
}

function updateCompareBar() {
  const bar = $('compareBar');
  if (selected.size === 0) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';
  $('compareFonts').innerHTML = [...selected].map(f =>
    `<span class="compare-tag">${f}<span class="remove" onclick="toggleSelect('${f}',document.querySelector('.font-card.selected'))">&times;</span></span>`
  ).join('');
}

function showCompare() {
  if (selected.size < 2) return;
  const panel = $('comparePanel');
  const text = $('previewText').value || 'The quick brown fox';
  const size = $('fontSize').value || 28;

  // Ensure fonts loaded
  const toLoad = [...selected].filter(f => !loadedFonts.has(f));
  if (toLoad.length) {
    const families = toLoad.map(f => f.replace(/ /g, '+')).join('&family=');
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${families}&display=swap`;
    document.head.appendChild(link);
    toLoad.forEach(f => loadedFonts.add(f));
  }

  panel.innerHTML = `<h3 ti="h3_comparing_selected_size_f">Comparing ${selected.size} Fonts</h3>` +
    [...selected].map(f => {
      const css = `@import url('https://fonts.googleapis.com/css2?family=${f.replace(/ /g, '+')}&display=swap');\nfont-family: '${f}', sans-serif;`;
      return `<div class="compare-row">
        <div class="cr-name">${f}</div>
        <div class="cr-preview" style="font-family:'${f}',sans-serif;font-size:${size}px">${text}</div>
        <div class="cr-css" onclick="copyText(this,'${css.replace(/'/g, "\\'").replace(/\n/g, '\\n')}')">${css}</div>
      </div>`;
    }).join('');

  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth' });
}

function updateComparePreview() {
  const text = $('previewText').value || 'The quick brown fox';
  const size = $('fontSize').value || 28;
  document.querySelectorAll('.cr-preview').forEach(el => {
    el.textContent = text;
    el.style.fontSize = size + 'px';
  });
}

function copyCSS(family) {
  const css = `@import url('https://fonts.googleapis.com/css2?family=${family.replace(/ /g, '+')}&display=swap');\nfont-family: '${family}', sans-serif;`;
  navigator.clipboard.writeText(css).catch(() => {});
}

function copyText(el, text) {
  navigator.clipboard.writeText(text.replace(/\\n/g, '\n')).then(() => {
    const span = document.createElement('span');
    span.className = 'copied';
    span.textContent=T("jtc_copied");
    el.appendChild(span);
    setTimeout(() => span.remove(), 1500);
  }).catch(() => {});
}

init();
</script>
