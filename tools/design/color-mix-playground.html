<html tk="title_css_color_mix_playground" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS color-mix() Playground — Dev Vault</title>
<meta name="description" content="Mix colors with CSS color-mix(). 8 color spaces. Live preview, comparison, presets. Visual color mixing.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;--text:#e6e6e6;--text2:#999;--accent:#3b82f6;--accent-hover:#2563eb;--radius:8px;--gap:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
h1{font-size:1.6rem;font-weight:700;text-align:center;padding:28px 16px 4px}
h1 span{color:var(--accent)}
.subtitle{text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:24px}
.container{max-width:960px;margin:0 auto;padding:0 16px 48px}
.panel{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.panel h2{font-size:1rem;font-weight:600;margin-bottom:14px;color:var(--text)}
.controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
@media(max-width:600px){.controls-grid{grid-template-columns:1fr}}
label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
input[type="color"]{-webkit-appearance:none;appearance:none;border:2px solid var(--bg4);border-radius:var(--radius);width:100%;height:48px;cursor:pointer;background:none;padding:2px}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:6px}
input[type="color"]::-moz-color-swatch{border:none;border-radius:6px}
.hex-input{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-family:monospace;font-size:.85rem;margin-top:4px}
.hex-input:focus{outline:none;border-color:var(--accent)}
.slider-wrap{margin:16px 0}
.slider-wrap input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--bg4);outline:none;cursor:pointer}
.slider-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:2px solid var(--text);cursor:pointer}
.slider-wrap input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);border:2px solid var(--text);cursor:pointer}
.slider-labels{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin-top:4px}
.slider-value{text-align:center;font-size:1.1rem;font-weight:600;color:var(--accent);margin-top:4px}
select{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--text);padding:8px 10px;font-size:.85rem;cursor:pointer}
select:focus{outline:none;border-color:var(--accent)}
.preview-area{display:flex;flex-direction:column;gap:var(--gap)}
.result-swatch{width:100%;height:120px;border-radius:var(--radius);border:1px solid var(--bg4);position:relative;overflow:hidden}
.result-swatch .label{position:absolute;bottom:8px;right:12px;font-size:.7rem;color:rgba(255,255,255,.7);background:rgba(0,0,0,.5);padding:2px 8px;border-radius:4px}
.gradient-strip{position:relative;width:100%;height:40px;border-radius:var(--radius);border:1px solid var(--bg4);overflow:hidden}
.gradient-bar{width:100%;height:100%}
.gradient-marker{position:absolute;top:0;height:100%;width:2px;background:var(--text);pointer-events:none}
.gradient-marker::after{content:attr(data-pct);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--text2);white-space:nowrap}
.code-block{background:var(--bg);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px 14px;font-family:'SF Mono',Consolas,monospace;font-size:.82rem;color:#93c5fd;word-break:break-all;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:.75rem;cursor:pointer;transition:background .2s}
.copy-btn:hover{background:var(--accent-hover)}
.copy-btn.copied{background:#22c55e}
.output-values{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
@media(max-width:600px){.output-values{grid-template-columns:1fr}}
.output-val{background:var(--bg);border:1px solid var(--bg4);border-radius:6px;padding:8px 10px;font-family:monospace;font-size:.78rem;color:var(--text2);cursor:pointer;transition:border-color .2s}
.output-val:hover{border-color:var(--accent)}
.output-val span{display:block;font-size:.65rem;text-transform:uppercase;color:var(--text2);margin-bottom:2px;letter-spacing:.04em}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:600px){.presets{grid-template-columns:repeat(2,1fr)}}
.preset-btn{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:10px;cursor:pointer;transition:border-color .2s,transform .1s;text-align:left}
.preset-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
.preset-btn .swatch{width:100%;height:24px;border-radius:4px;margin-bottom:6px;border:1px solid var(--bg4)}
.preset-btn .name{font-size:.78rem;color:var(--text);font-weight:500}
.preset-btn .desc{font-size:.65rem;color:var(--text2);margin-top:2px}
.comparison-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:600px){.comparison-grid{grid-template-columns:repeat(2,1fr)}}
.comp-item{background:var(--bg);border:1px solid var(--bg4);border-radius:var(--radius);overflow:hidden;text-align:center}
.comp-swatch{height:48px}
.comp-label{font-size:.7rem;color:var(--text2);padding:6px 4px;font-family:monospace}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#22c55e;color:#fff;padding:8px 20px;border-radius:var(--radius);font-size:.85rem;opacity:0;transition:all .3s;pointer-events:none;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>

<div class="container" style="position:relative">
  <!-- Controls -->
  <div class="panel">
    <h2>Colors &amp; Settings</h2>
    <div class="controls-grid">
      <div>
        <label ti="label_color_a">Color A</label>
        <input type="color" id="colorA" value="#3b82f6">
        <input type="text" class="hex-input" id="hexA" value="#3b82f6" spellcheck="false" maxlength="7">
      </div>

    </div>
    <div class="slider-wrap">
      <label ti="label_mix_ratio_color_a">Mix Ratio (Color A %)</label>
      <input type="range" id="ratio" min="0" max="100" value="50">
      <div class="slider-labels"><span>0% A (100% B)</span><span>100% A (0% B)</span></div>

        <div class="output-val" id="outRgb" onclick="copyText(this)" title="Click to copy"><span>RGB</span>—</div>

      </div>
    </div>
  </div>

  <!-- Presets -->
  <div class="panel">
    <h2 ti="h2_presets">Presets</h2>

  <!-- Comparison -->

</div>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const $ = id => document.getElementById(id);
const colorA = $('colorA'), colorB = $('colorB');
const hexA = $('hexA'), hexB = $('hexB');
const ratio = $('ratio'), ratioDisplay = $('ratioDisplay');
const colorSpace = $('colorSpace');
const resultSwatch = $('resultSwatch');
const gradientBar = $('gradientBar');
const gradientMarker = $('gradientMarker');
const cssCode = $('cssCode');
const copyBtn = $('copyBtn');
const outHex = $('outHex'), outRgb = $('outRgb'), outHsl = $('outHsl');
const comparison = $('comparison');
const spaces = ['srgb','srgb-linear','lab','oklab','lch','oklch','hsl','hwb'];

const presets = [
  { name:'Muted Red', desc:'red + gray in oklch', a:'#ef4444', b:'#9ca3af', pct:60, space:'oklch' },
  { name:'Pastel Blue', desc:'blue + white in srgb', a:'#3b82f6', b:'#ffffff', pct:40, space:'srgb' },
  { name:'Dark Mode Green', desc:'green + black in lab', a:'#22c55e', b:'#000000', pct:50, space:'lab' },
  { name:'Warm Shadow', desc:'transparent + brown in oklch', a:'#00000000', b:'#92400e', pct:50, space:'oklch' },
  { name:'Brand Variant', desc:'primary lightened in oklab', a:'#6366f1', b:'#e0e7ff', pct:65, space:'oklab' },
  { name:'Complementary Mix', desc:'opposites blended in lch', a:'#f97316', b:'#3b82f6', pct:50, space:'lch' }
];

/* ---- Color math helpers ---- */
function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  if (hex.length === 8) hex = hex.slice(0,6); // drop alpha for display
  const n = parseInt(hex, 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}

function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0, s=0, l=(max+min)/2;
  if(d){
    s = l>0.5 ? d/(2-max-min) : d/(max-min);
    if(max===r) h=((g-b)/d+(g<b?6:0))/6;
    else if(max===g) h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

/* Resolve computed color-mix() via a hidden element */
const probe = document.createElement('div');
probe.style.display = 'none';
document.body.appendChild(probe);

function resolveColorMix(space, a, b, pct) {
  const expr = `color-mix(in ${space}, ${a} ${pct}%, ${b})`;
  probe.style.color = '';
  probe.style.color = expr;
  const computed = getComputedStyle(probe).color;
  return computed || 'rgb(128,128,128)';
}

function parseComputedRgb(str) {
  // handles rgb(), rgba(), color() outputs
  const m = str.match(/rgba?\(\s*([\d.]+),?\s*([\d.]+),?\s*([\d.]+)/);
  if (m) return [+m[1], +m[2], +m[3]];
  // color(srgb ...) format
  const c = str.match(/color\(srgb\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/);
  if (c) return [Math.round(c[1]*255), Math.round(c[2]*255), Math.round(c[3]*255)];
  return [128,128,128];
}

/* ---- Update everything ---- */
function update() {
  const a = colorA.value;
  const b = colorB.value;
  const pct = +ratio.value;
  const sp = colorSpace.value;

  ratioDisplay.textContent = pct + '%';

  // CSS expression
  const expr = `color-mix(in ${sp}, ${a} ${pct}%, ${b})`;

  // Result swatch
  resultSwatch.style.background = expr;

  // Gradient strip
  gradientBar.style.background = `linear-gradient(to right, ${a}, ${b})`;
  gradientMarker.style.left = pct + '%';
  gradientMarker.dataset.pct = pct + '%';

  // CSS code
  cssCode.innerHTML = expr + '<button class="copy-btn" onclick="copyCSS()">Copy</button>';

  // Resolve computed color
  const computed = resolveColorMix(sp, a, b, pct);
  const rgb = parseComputedRgb(computed);
  const hex = rgbToHex(...rgb);
  const hsl = rgbToHsl(...rgb);

  outHex.innerHTML = `<span>HEX</span>${hex}`;
  outRgb.innerHTML = `<span>RGB</span>rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  outHsl.innerHTML = `<span>HSL</span>hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;

  // Comparison
  let html = '';
  for (const s of spaces) {
    const mixExpr = `color-mix(in ${s}, ${a} ${pct}%, ${b})`;
    const c = resolveColorMix(s, a, b, pct);
    const cRgb = parseComputedRgb(c);
    const cHex = rgbToHex(...cRgb);
    html += `<div class="comp-item"><div class="comp-swatch" style="background:${mixExpr}"></div><div class="comp-label">${s}<br>${cHex}</div></div>`;
  }
  comparison.innerHTML = html;
}

/* ---- Presets ---- */
function renderPresets() {
  const container = $('presets');
  let html = '';
  for (const p of presets) {
    const expr = `color-mix(in ${p.space}, ${p.a} ${p.pct}%, ${p.b})`;
    html += `<button class="preset-btn" onclick="applyPreset('${p.a}','${p.b}',${p.pct},'${p.space}')">
      <div class="swatch" style="background:${expr}"></div>
      <div class="name">${p.name}</div>
      <div class="desc">${p.desc}</div>
    </button>`;
  }
  container.innerHTML = html;
}

function applyPreset(a, b, pct, space) {
  colorA.value = a.slice(0,7);
  hexA.value = a.slice(0,7);
  colorB.value = b.slice(0,7);
  hexB.value = b.slice(0,7);
  ratio.value = pct;
  colorSpace.value = space;
  update();
}

/* ---- Copy ---- */
function copyCSS() {
  const a = colorA.value, b = colorB.value, pct = +ratio.value, sp = colorSpace.value;
  const expr = `color-mix(in ${sp}, ${a} ${pct}%, ${b})`;
  navigator.clipboard.writeText(expr).then(() => showToast('CSS copied!'));
}

function copyText(el) {
  const text = el.textContent.replace(/^(HEX|RGB|HSL)/, '').trim();
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

/* ---- Events ---- */
colorA.addEventListener('input', () => { hexA.value = colorA.value; update(); });
colorB.addEventListener('input', () => { hexB.value = colorB.value; update(); });
hexA.addEventListener('input', () => {
  const v = hexA.value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) { colorA.value = v; update(); }
});
hexB.addEventListener('input', () => {
  const v = hexB.value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) { colorB.value = v; update(); }
});
ratio.addEventListener('input', update);
colorSpace.addEventListener('change', update);

/* ---- Init ---- */
renderPresets();
update();
</script>

if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;

document.querySelectorAll('[ti]').forEach(function(e){

  e.textContent=T(k);

document.querySelectorAll('[tp]').forEach(function(e){

document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
