<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.layout{display:grid;grid-template-columns:280px 1fr;gap:16px;margin-bottom:16px}
.controls{background:#161616;border:1px solid #222;border-radius:12px;padding:16px;max-height:520px;overflow-y:auto}
.ctrl-group{margin-bottom:14px}
.ctrl-group h3{font-size:0.78rem;color:#888;margin-bottom:8px;border-bottom:1px solid #222;padding-bottom:4px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ctrl-row label{font-size:0.72rem;color:#555;min-width:80px}
.ctrl-row select,.ctrl-row input{padding:5px 8px;border-radius:6px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.78rem;outline:none}
.ctrl-row select:focus,.ctrl-row input:focus{border-color:#3b82f6}
.ctrl-row input[type=number]{width:60px;text-align:center}
.ctrl-row input[type=range]{flex:1;accent-color:#3b82f6}
.range-val{font-size:0.68rem;color:#4da6ff;font-family:'Fira Code',monospace;min-width:40px;text-align:right}

.preview-area{background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:350px;position:relative}
.preview-box{width:80px;height:80px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#fff;font-weight:600}
.preview-controls{position:absolute;bottom:12px;display:flex;gap:8px}
.pbtn{padding:5px 14px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.72rem;cursor:pointer}
.pbtn:hover{border-color:#3b82f6;color:#4da6ff}

.presets{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.output{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer;margin-bottom:16px}
.output:hover{border-color:#3b82f6}
.output pre{font-family:'Fira Code',monospace;font-size:0.75rem;color:#10b981;white-space:pre-wrap}
.output .hint{font-size:0.72rem;color:#555;margin-top:6px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
</style>

<body>
<div class="container">
<h1>CSS Animation</h1>
<p class="subtitle">Visual keyframe animation generator. 12 presets, custom timing.</p>

<div class="presets">
  <button class="preset-btn" onclick="loadPreset('bounce')">Bounce</button>
  <button class="preset-btn" onclick="loadPreset('pulse')">Pulse</button>
  <button class="preset-btn" onclick="loadPreset('shake')">Shake</button>
  <button class="preset-btn" onclick="loadPreset('spin')">Spin</button>
  <button class="preset-btn" onclick="loadPreset('fadeIn')">Fade In</button>
  <button class="preset-btn" onclick="loadPreset('fadeOut')">Fade Out</button>
  <button class="preset-btn" onclick="loadPreset('slideIn')">Slide In</button>
  <button class="preset-btn" onclick="loadPreset('slideUp')">Slide Up</button>
  <button class="preset-btn" onclick="loadPreset('flip')">Flip</button>
  <button class="preset-btn" onclick="loadPreset('swing')">Swing</button>
  <button class="preset-btn" onclick="loadPreset('rubber')">Rubber</button>
  <button class="preset-btn" onclick="loadPreset('jello')">Jello</button>
</div>

<div class="layout">
  <div class="controls">
    <div class="ctrl-group">
      <h3>Timing</h3>
      <div class="ctrl-row"><label>duration</label><input type="range" id="duration" min="0.1" max="5" step="0.1" value="1" oninput="update()"><span class="range-val" id="durVal">1s</span></div>
      <div class="ctrl-row"><label>delay</label><input type="range" id="delay" min="0" max="3" step="0.1" value="0" oninput="update()"><span class="range-val" id="delVal">0s</span></div>
      <div class="ctrl-row"><label>easing</label><select id="easing" onchange="update()"><option>ease</option><option>ease-in</option><option>ease-out</option><option>ease-in-out</option><option>linear</option><option value="cubic-bezier(0.68,-0.55,0.27,1.55)">bounce-out</option><option value="cubic-bezier(0.34,1.56,0.64,1)">overshoot</option><option value="steps(5)">steps(5)</option><option value="steps(10)">steps(10)</option></select></div>
    </div>
    <div class="ctrl-group">
      <h3>Behavior</h3>
      <div class="ctrl-row"><label>iteration</label><select id="iteration" onchange="update()"><option>1</option><option>2</option><option>3</option><option>5</option><option>infinite</option></select></div>
      <div class="ctrl-row"><label>direction</label><select id="direction" onchange="update()"><option>normal</option><option>reverse</option><option>alternate</option><option>alternate-reverse</option></select></div>
      <div class="ctrl-row"><label>fill-mode</label><select id="fillMode" onchange="update()"><option>none</option><option>forwards</option><option>backwards</option><option>both</option></select></div>
    </div>
    <div class="ctrl-group">
      <h3>Animation Name</h3>
      <div class="ctrl-row"><label>name</label><input type="text" id="animName" value="myAnimation" oninput="update()" style="flex:1"></div>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-box" id="previewBox">Box</div>
    <div class="preview-controls">
      <button class="pbtn" onclick="replay()">▶ Replay</button>
      <button class="pbtn" onclick="togglePause()">⏸ Pause</button>
    </div>
  </div>
</div>

<div class="output" onclick="copyCSS()">
  <pre id="cssOutput"></pre>
  <div class="hint">Click to copy CSS</div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/css-animation">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
const PRESETS={
  bounce:{keyframes:{'0%,20%,50%,80%,100%':'transform: translateY(0)','40%':'transform: translateY(-30px)','60%':'transform: translateY(-15px)'},dur:1,ease:'ease',iter:'infinite',dir:'normal'},
  pulse:{keyframes:{'0%':'transform: scale(1)','50%':'transform: scale(1.15)','100%':'transform: scale(1)'},dur:1,ease:'ease-in-out',iter:'infinite',dir:'normal'},
  shake:{keyframes:{'0%,100%':'transform: translateX(0)','10%,30%,50%,70%,90%':'transform: translateX(-8px)','20%,40%,60%,80%':'transform: translateX(8px)'},dur:0.8,ease:'ease-in-out',iter:'1',dir:'normal'},
  spin:{keyframes:{'from':'transform: rotate(0deg)','to':'transform: rotate(360deg)'},dur:1,ease:'linear',iter:'infinite',dir:'normal'},
  fadeIn:{keyframes:{'from':'opacity: 0','to':'opacity: 1'},dur:0.6,ease:'ease',iter:'1',dir:'normal'},
  fadeOut:{keyframes:{'from':'opacity: 1','to':'opacity: 0'},dur:0.6,ease:'ease',iter:'1',dir:'normal'},
  slideIn:{keyframes:{'from':'transform: translateX(-100px); opacity: 0','to':'transform: translateX(0); opacity: 1'},dur:0.5,ease:'ease-out',iter:'1',dir:'normal'},
  slideUp:{keyframes:{'from':'transform: translateY(50px); opacity: 0','to':'transform: translateY(0); opacity: 1'},dur:0.5,ease:'ease-out',iter:'1',dir:'normal'},
  flip:{keyframes:{'from':'transform: perspective(400px) rotateY(0)','to':'transform: perspective(400px) rotateY(360deg)'},dur:1,ease:'ease-in-out',iter:'1',dir:'normal'},
  swing:{keyframes:{'20%':'transform: rotate(15deg)','40%':'transform: rotate(-10deg)','60%':'transform: rotate(5deg)','80%':'transform: rotate(-5deg)','100%':'transform: rotate(0deg)'},dur:1,ease:'ease-in-out',iter:'1',dir:'normal'},
  rubber:{keyframes:{'0%':'transform: scaleX(1)','30%':'transform: scaleX(1.25) scaleY(0.75)','40%':'transform: scaleX(0.75) scaleY(1.25)','50%':'transform: scaleX(1.15) scaleY(0.85)','65%':'transform: scaleX(0.95) scaleY(1.05)','75%':'transform: scaleX(1.05) scaleY(0.95)','100%':'transform: scaleX(1) scaleY(1)'},dur:1,ease:'ease-in-out',iter:'1',dir:'normal'},
  jello:{keyframes:{'0%,100%':'transform: skewX(0deg) skewY(0deg)','11.1%':'transform: skewX(-12.5deg) skewY(-12.5deg)','22.2%':'transform: skewX(6.25deg) skewY(6.25deg)','33.3%':'transform: skewX(-3.125deg) skewY(-3.125deg)','44.4%':'transform: skewX(1.5625deg) skewY(1.5625deg)','55.5%':'transform: skewX(-0.78deg) skewY(-0.78deg)','66.6%':'transform: skewX(0.39deg) skewY(0.39deg)','77.7%':'transform: skewX(-0.195deg) skewY(-0.195deg)'},dur:1,ease:'ease-in-out',iter:'1',dir:'normal'},
};

let currentKeyframes=PRESETS.bounce.keyframes;
let styleEl=null;
let paused=false;

function loadPreset(name){
  const p=PRESETS[name];
  currentKeyframes=p.keyframes;
  document.getElementById('duration').value=p.dur;
  document.getElementById('easing').value=p.ease;
  document.getElementById('iteration').value=p.iter;
  document.getElementById('direction').value=p.dir;
  document.getElementById('delay').value=0;
  document.getElementById('fillMode').value='none';
  document.getElementById('animName').value=name;
  paused=false;
  update();
}

function update(){
  const dur=document.getElementById('duration').value;
  const del=document.getElementById('delay').value;
  const ease=document.getElementById('easing').value;
  const iter=document.getElementById('iteration').value;
  const dir=document.getElementById('direction').value;
  const fill=document.getElementById('fillMode').value;
  const name=document.getElementById('animName').value||'myAnimation';

  document.getElementById('durVal').textContent=dur+'s';
  document.getElementById('delVal').textContent=del+'s';

  // Build keyframes CSS
  let kf=`@keyframes ${name} {\n`;
  for(const[key,val] of Object.entries(currentKeyframes)){
    kf+=`  ${key} { ${val}; }\n`;
  }
  kf+='}\n';

  let anim=`.element {\n  animation: ${name} ${dur}s ${ease}`;
  if(+del>0)anim+=` ${del}s`;
  if(iter!=='1')anim+=` ${iter}`;
  if(dir!=='normal')anim+=` ${dir}`;
  if(fill!=='none')anim+=` ${fill}`;
  anim+=';\n}\n';

  document.getElementById('cssOutput').textContent=kf+'\n'+anim;

  // Apply to preview
  if(styleEl)styleEl.remove();
  styleEl=document.createElement('style');
  styleEl.textContent=kf.replace(name,'__preview');
  document.head.appendChild(styleEl);

  const box=document.getElementById('previewBox');
  box.style.animation='none';
  void box.offsetWidth;
  box.style.animation=`__preview ${dur}s ${ease} ${del}s ${iter} ${dir} ${fill}`;
  box.style.animationPlayState=paused?'paused':'running';
}

function replay(){
  paused=false;
  update();
}

function togglePause(){
  paused=!paused;
  document.getElementById('previewBox').style.animationPlayState=paused?'paused':'running';
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent='CSS Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

loadPreset('bounce');
</script>
