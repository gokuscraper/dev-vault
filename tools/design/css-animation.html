  rubber:{keyframes:{'0%':'transform: scaleX(1)','30%':'transform: scaleX(1.25) scaleY(0.75)','40%':'transform: scaleX(0.75) scaleY(1.25)','50%':'transform: scaleX(1.15) scaleY(0.85)','65%':'transform: scaleX(0.95) scaleY(1.05)','75%':'transform: scaleX(1.05) scaleY(0.95)','100%':'transform: scaleX(1) scaleY(1)'},dur:1,ease:'ease-in-out',iter:'1',dir:'normal'},
  jello:{keyframes:{'0%,100%':'transform: skewX(0deg) skewY(0deg)','11.1%':'transform: skewX(-12.5deg) skewY(-12.5deg)','22.2%':'transform: skewX(6.25deg) skewY(6.25deg)','33.3%':'transform: skewX(-3.125deg) skewY(-3.125deg)','44.4%':'transform: skewX(1.5625deg) skewY(1.5625deg)','55.5%':'transform: skewX(-0.78deg) skewY(-0.78deg)','66.6%':'transform: skewX(0.39deg) skewY(0.39deg)','77.7%':'transform: skewX(-0.195deg) skewY(-0.195deg)'},dur:1,ease:'ease-in-out',iter:'1',dir:'normal'},
};

let currentKeyframes=PRESETS.bounce.keyframes;
let styleEl=null;
let paused=false;

function loadPreset(name){
  const p=PRESETS[name];
  currentKeyframes=p.keyframes;
  document.getElementById('duration').value=p.dur;
  document.getElementById('easing').value=p.ease;
  document.getElementById('iteration').value=p.iter;
  document.getElementById('direction').value=p.dir;
  document.getElementById('delay').value=0;
  document.getElementById('fillMode').value='none';
  document.getElementById('animName').value=name;
  paused=false;
  update();
}

function update(){
  const dur=document.getElementById('duration').value;
  const del=document.getElementById('delay').value;
  const ease=document.getElementById('easing').value;
  const iter=document.getElementById('iteration').value;
  const dir=document.getElementById('direction').value;
  const fill=document.getElementById('fillMode').value;
  const name=document.getElementById('animName').value||'myAnimation';

  document.getElementById('durVal').textContent=dur+'s';
  document.getElementById('delVal').textContent=del+'s';

  // Build keyframes CSS
  let kf=`@keyframes ${name} {\n`;
  for(const[key,val] of Object.entries(currentKeyframes)){
    kf+=`  ${key} { ${val}; }\n`;
  }
  kf+='}\n';

  let anim=`.element {\n  animation: ${name} ${dur}s ${ease}`;
  if(+del>0)anim+=` ${del}s`;
  if(iter!=='1')anim+=` ${iter}`;
  if(dir!=='normal')anim+=` ${dir}`;
  if(fill!=='none')anim+=` ${fill}`;
  anim+=';\n}\n';

  document.getElementById('cssOutput').textContent=kf+'\n'+anim;

  // Apply to preview
  if(styleEl)styleEl.remove();
  styleEl=document.createElement('style');
  styleEl.textContent=kf.replace(name,'__preview');
  document.head.appendChild(styleEl);

  const box=document.getElementById('previewBox');
  box.style.animation='none';
  void box.offsetWidth;
  box.style.animation=`__preview ${dur}s ${ease} ${del}s ${iter} ${dir} ${fill}`;
  box.style.animationPlayState=paused?'paused':'running';
}

function replay(){
  paused=false;
  update();
}

function togglePause(){
  paused=!paused;
  document.getElementById('previewBox').style.animationPlayState=paused?'paused':'running';
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent=T("jtc_css_copied");
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

loadPreset('bounce');
</script>
