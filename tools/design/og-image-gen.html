<script>
const W=1200,H=630;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let bgType='solid';
let textAlign='center';

function $(id){return document.getElementById(id)}

function syncColor(id,val){
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    $(id).value=val;render();
  }
}

function updateRange(id){
  $(id+'Val').textContent=$(id).value;
}

function setBgType(type,btn){
  bgType=type;
  document.querySelectorAll('[data-bg]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  $('bg-solid').style.display=type==='solid'?'':'none';
  $('bg-gradient').style.display=type==='gradient'?'':'none';
  render();
}

function setAlign(a,btn){
  textAlign=a;
  document.querySelectorAll('[data-align]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setGradient(c1,c2){
  $('gradColor1').value=c1;$('gradColor1Text').value=c1;
  $('gradColor2').value=c2;$('gradColor2Text').value=c2;
  render();
}

function render(){
  // Background
  if(bgType==='solid'){
    ctx.fillStyle=$('bgColor').value;
    ctx.fillRect(0,0,W,H);
  } else {
    const dir=$('gradDir').value;
    let g;
    if(dir==='horizontal') g=ctx.createLinearGradient(0,0,W,0);
    else if(dir==='vertical') g=ctx.createLinearGradient(0,0,0,H);
    else g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,$('gradColor1').value);
    g.addColorStop(1,$('gradColor2').value);
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W,H);
  }

  // Pattern overlay
  const pat=$('pattern').value;
  if(pat!=='none'){
    const opacity=parseInt($('patternOpacity').value)/100;
    ctx.save();
    ctx.globalAlpha=opacity;
    ctx.strokeStyle='#ffffff';
    ctx.fillStyle='#ffffff';
    if(pat==='dots'){
      const spacing=30;
      for(let x=spacing;x<W;x+=spacing){
        for(let y=spacing;y<H;y+=spacing){
          ctx.beginPath();
          ctx.arc(x,y,1.5,0,Math.PI*2);
          ctx.fill();
        }
      }
    } else if(pat==='lines'){
      ctx.lineWidth=1;
      const spacing=20;
      for(let i=-H;i<W+H;i+=spacing){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i+H,H);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Border
  const bw=parseInt($('borderWidth').value);
  if(bw>0){
    ctx.strokeStyle=$('borderColor').value;
    ctx.lineWidth=bw;
    ctx.strokeRect(bw/2,bw/2,W-bw,H-bw);
  }

  // Text setup
  const font=$('fontFamily').value;
  const titleSize=parseInt($('titleSize').value);
  const subSize=parseInt($('subSize').value);
  const title=$('titleText').value;
  const sub=$('subText').value;

  let tx,canvasAlign;
  const padX=80;
  if(textAlign==='left'){tx=padX;canvasAlign='left';}
  else if(textAlign==='right'){tx=W-padX;canvasAlign='right';}
  else{tx=W/2;canvasAlign='center';}

  ctx.textAlign=canvasAlign;

  // Compute vertical center for title+subtitle block
  const gap=16;
  const hasTitle=title.length>0;
  const hasSub=sub.length>0;
  let blockH=0;
  if(hasTitle) blockH+=titleSize;
  if(hasTitle&&hasSub) blockH+=gap;
  if(hasSub) blockH+=subSize;
  let startY=H/2-blockH/2;

  // Word-wrap helper
  function wrapText(text,maxW,fontSize,bold){
    ctx.font=(bold?'bold ':'')+fontSize+'px '+font;
    const words=text.split(' ');
    const lines=[];
    let line='';
    for(const w of words){
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxW&&line){
        lines.push(line);
        line=w;
      } else {
        line=test;
      }
    }
    if(line) lines.push(line);
    return lines;
  }

  const maxTextW=W-padX*2;

  // Title
  if(hasTitle){
    ctx.fillStyle=$('titleColor').value;
    ctx.font='bold '+titleSize+'px '+font;
    const lines=wrapText(title,maxTextW,titleSize,true);
    const lineH=titleSize*1.2;
    const titleBlockH=lines.length*lineH;
    // Recalculate block height with wrapped lines
    let totalH=titleBlockH;
    let subLines=[];
    if(hasSub){
      subLines=wrapText(sub,maxTextW,subSize,false);
      totalH+=gap+subLines.length*subSize*1.2;
    }
    startY=H/2-totalH/2;

    for(let i=0;i<lines.length;i++){
      ctx.fillText(lines[i],tx,startY+titleSize+(i*lineH));
    }

    // Subtitle
    if(hasSub){
      ctx.fillStyle=$('subColor').value;
      ctx.font=subSize+'px '+font;
      const subStartY=startY+titleBlockH+gap;
      for(let i=0;i<subLines.length;i++){
        ctx.fillText(subLines[i],tx,subStartY+subSize+(i*subSize*1.2));
      }
    }
  } else if(hasSub){
    ctx.fillStyle=$('subColor').value;
    ctx.font=subSize+'px '+font;
    const subLines=wrapText(sub,maxTextW,subSize,false);
    const subBlockH=subLines.length*subSize*1.2;
    startY=H/2-subBlockH/2;
    for(let i=0;i<subLines.length;i++){
      ctx.fillText(subLines[i],tx,startY+subSize+(i*subSize*1.2));
    }
  }

  // Badge
  const badgeTxt=$('badgeText').value;
  if(badgeTxt){
    const shape=$('badgeShape').value;
    const pos=$('badgePos').value;
    const size=60;
    const margin=40;
    let bx,by;
    if(pos.includes('left')) bx=margin+size/2;
    else bx=W-margin-size/2;
    if(pos.includes('top')) by=margin+size/2;
    else by=H-margin-size/2;

    ctx.fillStyle=$('badgeBg').value;
    if(shape==='circle'){
      ctx.beginPath();
      ctx.arc(bx,by,size/2,0,Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillRect(bx-size/2,by-size/2,size,size);
    }
    ctx.fillStyle=$('badgeFg').value;
    ctx.font='bold 22px '+font;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(badgeTxt,bx,by);
    ctx.textBaseline='alphabetic';
  }
}

function downloadPNG(){
  const a=document.createElement('a');
  a.download='og-image.png';
  a.href=cv.toDataURL('image/png');
  a.click();
  showToast('Downloaded og-image.png');
}

async function copyToClipboard(){
  try{
    const blob=await new Promise(r=>cv.toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    showToast('Copied to clipboard');
  }catch(e){
    showToast('Copy failed — try Download instead');
  }
}

function showToast(msg){
  const t=$('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

function applyPreset(name){
  const presets={
    blog:{
      bgType:'gradient',gradColor1:'#1e1e2e',gradColor2:'#0a0a0a',gradDir:'diagonal',
      titleText:'Blog Post Title',titleSize:64,titleColor:'#ffffff',
      subText:'Your name — March 2026',subSize:28,subColor:'#aaaaaa',
      font:0,align:'center',badgeText:'',borderWidth:0,pattern:'none',patternOpacity:15
    },
    product:{
      bgType:'gradient',gradColor1:'#7c3aed',gradColor2:'#3b82f6',gradDir:'horizontal',
      titleText:'Product Name',titleSize:80,titleColor:'#ffffff',
      subText:'The tagline that sells',subSize:32,subColor:'#e0e0ff',
      font:0,align:'center',badgeText:'NEW',badgeBg:'#facc15',badgeFg:'#000000',
      borderWidth:0,pattern:'dots',patternOpacity:10
    },
    tutorial:{
      bgType:'gradient',gradColor1:'#059669',gradColor2:'#10b981',gradDir:'vertical',
      titleText:'How to Build X',titleSize:60,titleColor:'#ffffff',
      subText:'Step-by-step tutorial',subSize:26,subColor:'#d1fae5',
      font:0,align:'left',badgeText:'',borderWidth:4,borderColor:'#34d399',
      pattern:'none',patternOpacity:15
    },
    devtool:{
      bgType:'solid',bgColor:'#0a0a0a',
      titleText:'Tool Name',titleSize:72,titleColor:'#4da6ff',
      subText:'What it does in one line',subSize:28,subColor:'#888888',
      font:4,align:'center',badgeText:'DEV',badgeBg:'#4da6ff',badgeFg:'#000000',
      borderWidth:2,borderColor:'#222222',pattern:'dots',patternOpacity:12
    },
    announce:{
      bgType:'gradient',gradColor1:'#f97316',gradColor2:'#ec4899',gradDir:'diagonal',
      titleText:'Big Announcement',titleSize:76,titleColor:'#ffffff',
      subText:'Something exciting is here',subSize:30,subColor:'#fff0f5',
      font:0,align:'center',badgeText:'',borderWidth:0,pattern:'lines',patternOpacity:8
    }
  };
  const p=presets[name];if(!p)return;

  // Background
  if(p.bgType==='solid'){
    document.querySelector('[data-bg="solid"]').click();
    $('bgColor').value=p.bgColor||'#0a0a0a';
    $('bgColorText').value=p.bgColor||'#0a0a0a';
  } else {
    document.querySelector('[data-bg="gradient"]').click();
    $('gradColor1').value=p.gradColor1;$('gradColor1Text').value=p.gradColor1;
    $('gradColor2').value=p.gradColor2;$('gradColor2Text').value=p.gradColor2;
    $('gradDir').value=p.gradDir;
  }

  // Text
  $('titleText').value=p.titleText;
  $('titleSize').value=p.titleSize;$('titleSizeVal').textContent=p.titleSize;
  $('titleColor').value=p.titleColor;$('titleColorText').value=p.titleColor;
  $('subText').value=p.subText;
  $('subSize').value=p.subSize;$('subSizeVal').textContent=p.subSize;
  $('subColor').value=p.subColor;$('subColorText').value=p.subColor;

  // Font
  $('fontFamily').selectedIndex=p.font||0;

  // Align
  document.querySelector('[data-align="'+p.align+'"]').click();

  // Badge
  $('badgeText').value=p.badgeText||'';
  if(p.badgeBg){$('badgeBg').value=p.badgeBg;$('badgeBgText').value=p.badgeBg;}
  if(p.badgeFg){$('badgeFg').value=p.badgeFg;$('badgeFgText').value=p.badgeFg;}

  // Border
  $('borderWidth').value=p.borderWidth||0;$('borderWidthVal').textContent=p.borderWidth||0;
  if(p.borderColor){$('borderColor').value=p.borderColor;$('borderColorText').value=p.borderColor;}

  // Pattern
  $('pattern').value=p.pattern||'none';
  $('patternOpacity').value=p.patternOpacity||15;$('patternOpacityVal').textContent=p.patternOpacity||15;

  render();
}

// Sync color text inputs on color picker change
document.querySelectorAll('input[type="color"]').forEach(el=>{

    const txt=$(el.id+'Text');
    if(txt) txt.value=el.value;
  });
});

render();
</script>
