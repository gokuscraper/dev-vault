<script>
const UNITS=[
  {id:'px',name:'px',type:'Absolute',desc:'Pixels. 1px = 1/96th of 1 inch. The most common unit.'},
  {id:'rem',name:'rem',type:'Relative',desc:'Relative to root element font-size. 1rem = root font-size (usually 16px).'},
  {id:'em',name:'em',type:'Relative',desc:'Relative to parent element font-size. Compounds when nested.'},
  {id:'vw',name:'vw',type:'Viewport',desc:'1% of viewport width. 100vw = full viewport width.'},
  {id:'vh',name:'vh',type:'Viewport',desc:'1% of viewport height. 100vh = full viewport height.'},
  {id:'percent',name:'%',type:'Relative',desc:'Percentage of parent element size. Context-dependent.'},
  {id:'pt',name:'pt',type:'Absolute',desc:'Points. 1pt = 1/72 of 1 inch. Common in print.'},
  {id:'cm',name:'cm',type:'Absolute',desc:'Centimeters. 1cm = 96px/2.54 ≈ 37.8px.'},
  {id:'mm',name:'mm',type:'Absolute',desc:'Millimeters. 1mm = 1/10th of 1cm ≈ 3.78px.'},
  {id:'in',name:'in',type:'Absolute',desc:'Inches. 1in = 96px = 2.54cm.'},
];

function toPx(val,unit){
  const rootFs=+document.getElementById('rootFs').value;
  const parentFs=+document.getElementById('parentFs').value;
  const vpW=+document.getElementById('vpW').value;
  const vpH=+document.getElementById('vpH').value;
  const contW=+document.getElementById('contW').value;
  switch(unit){
    case 'px':return val;
    case 'rem':return val*rootFs;
    case 'em':return val*parentFs;
    case 'vw':return val*vpW/100;
    case 'vh':return val*vpH/100;
    case 'percent':return val*contW/100;
    case 'pt':return val*96/72;
    case 'cm':return val*96/2.54;
    case 'mm':return val*96/25.4;
    case 'in':return val*96;
  }
}

function fromPx(px,unit){
  const rootFs=+document.getElementById('rootFs').value;
  const parentFs=+document.getElementById('parentFs').value;
  const vpW=+document.getElementById('vpW').value;
  const vpH=+document.getElementById('vpH').value;
  const contW=+document.getElementById('contW').value;
  switch(unit){
    case 'px':return px;
    case 'rem':return px/rootFs;
    case 'em':return px/parentFs;
    case 'vw':return px*100/vpW;
    case 'vh':return px*100/vpH;
    case 'percent':return px*100/contW;
    case 'pt':return px*72/96;
    case 'cm':return px*2.54/96;
    case 'mm':return px*25.4/96;
    case 'in':return px/96;
  }
}

function fmt(n){
  if(Number.isInteger(n))return n.toString();
  const s=n.toFixed(4);
  return s.replace(/\.?0+$/,'');
}

function convert(){
  const val=+document.getElementById('inputVal').value;
  const from=document.getElementById('fromUnit').value;
  const px=toPx(val,from);

  const unitInfo=UNITS.find(u=>u.id===from);
  const unitLabel=unitInfo?unitInfo.name:from;

  document.getElementById('results').innerHTML=UNITS.map(u=>{
    const converted=fromPx(px,u.id);
    return`<div class="result-card" onclick="copyVal('${fmt(converted)}${u.name}')">
      <div class="val">${fmt(converted)}</div>
      <div class="unit">${u.name}</div>
    </div>`;
  }).join('');
}

function copyVal(v){
  navigator.clipboard.writeText(v);
  const el=document.createElement('div');
  el.className='copied';el.textContent=v+' copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

function renderRef(){
  document.getElementById('refGrid').innerHTML=UNITS.map(u=>
    `<div class="ref-card"><h4>${u.name}</h4><div class="type">${u.type}</div><p>${u.desc}</p></div>`
  ).join('');
}

// Auto-detect viewport
document.getElementById('vpW').value=window.innerWidth;
document.getElementById('vpH').value=window.innerHeight;

convert();
renderRef();
</script>
