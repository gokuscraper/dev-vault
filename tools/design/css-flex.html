<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
let items=[
  {grow:0,shrink:1,basis:'auto',align:'auto',order:0,w:80,h:60},
  {grow:0,shrink:1,basis:'auto',align:'auto',order:0,w:80,h:60},
  {grow:0,shrink:1,basis:'auto',align:'auto',order:0,w:80,h:60}
];
let selected=0;

function preset(dir,just,align,wrap,count){
  document.getElementById('flexDir').value=dir;
  document.getElementById('justCont').value=just;
  document.getElementById('alignItems').value=align;
  document.getElementById('flexWrap').value=wrap;
  document.getElementById('alignCont').value='stretch';
  document.getElementById('gap').value=8;
  items=[];
  for(let i=0;i<count;i++)items.push({grow:0,shrink:1,basis:'auto',align:'auto',order:0,w:80,h:60});
  selected=0;
  loadItemUI();
  update();
}

function addItem(){
  if(items.length>=12)return;
  items.push({grow:0,shrink:1,basis:'auto',align:'auto',order:0,w:80,h:60});
  update();
}

function removeItem(){
  if(items.length<=1)return;
  items.pop();
  if(selected>=items.length)selected=items.length-1;
  loadItemUI();
  update();
}

function selectItem(i){
  selected=i;
  loadItemUI();
  document.querySelectorAll('.flex-item').forEach((el,idx)=>el.classList.toggle('selected',idx===i));
}

function loadItemUI(){
  const it=items[selected];
  document.getElementById('selLabel').textContent=selected+1;
  document.getElementById('itemGrow').value=it.grow;
  document.getElementById('itemShrink').value=it.shrink;
  document.getElementById('itemBasis').value=it.basis;
  document.getElementById('itemAlign').value=it.align;
  document.getElementById('itemOrder').value=it.order;
  document.getElementById('itemW').value=it.w;
  document.getElementById('itemH').value=it.h;
}

function updateItem(){
  items[selected]={
    grow:+document.getElementById('itemGrow').value,
    shrink:+document.getElementById('itemShrink').value,
    basis:document.getElementById('itemBasis').value,
    align:document.getElementById('itemAlign').value,
    order:+document.getElementById('itemOrder').value,
    w:+document.getElementById('itemW').value,
    h:+document.getElementById('itemH').value
  };
  update();
}

function update(){
  const dir=document.getElementById('flexDir').value;
  const just=document.getElementById('justCont').value;
  const ai=document.getElementById('alignItems').value;
  const wrap=document.getElementById('flexWrap').value;
  const ac=document.getElementById('alignCont').value;
  const gap=document.getElementById('gap').value;

  const box=document.getElementById('flexBox');
  box.style.display='flex';
  box.style.flexDirection=dir;
  box.style.justifyContent=just;
  box.style.alignItems=ai;
  box.style.flexWrap=wrap;
  box.style.alignContent=ac;
  box.style.gap=gap+'px';

  box.innerHTML='';
  items.forEach((it,i)=>{
    const el=document.createElement('div');
    el.className='flex-item'+(i===selected?' selected':'');
    el.style.background=COLORS[i%COLORS.length];
    el.style.width=it.w+'px';
    el.style.height=it.h+'px';
    el.style.flexGrow=it.grow;
    el.style.flexShrink=it.shrink;
    el.style.flexBasis=it.basis;
    if(it.align!=='auto')el.style.alignSelf=it.align;
    el.style.order=it.order;
    el.textContent=i+1;
    el.onclick=()=>selectItem(i);
    box.appendChild(el);
  });

  document.getElementById('itemCount').textContent=items.length;

  // CSS output
  let css=`.container {\n  display: flex;\n  flex-direction: ${dir};\n  justify-content: ${just};\n  align-items: ${ai};\n`;
  if(wrap!=='nowrap')css+=`  flex-wrap: ${wrap};\n`;
  if(ac!=='stretch'&&wrap!=='nowrap')css+=`  align-content: ${ac};\n`;
  if(+gap>0)css+=`  gap: ${gap}px;\n`;
  css+='}\n';

  const hasCustom=items.some(it=>it.grow||it.shrink!==1||it.basis!=='auto'||it.align!=='auto'||it.order);
  if(hasCustom){
    items.forEach((it,i)=>{
      const parts=[];
      if(it.grow)parts.push(`flex-grow: ${it.grow}`);
      if(it.shrink!==1)parts.push(`flex-shrink: ${it.shrink}`);
      if(it.basis!=='auto')parts.push(`flex-basis: ${it.basis}`);
      if(it.align!=='auto')parts.push(`align-self: ${it.align}`);
      if(it.order)parts.push(`order: ${it.order}`);
      if(parts.length){
        css+=`\n.item-${i+1} {\n  ${parts.join(';\n  ')};\n}\n`;
      }
    });
  }

  document.getElementById('cssOutput').textContent=css;
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent=T("jtc_css_copied");
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

update();
</script>
