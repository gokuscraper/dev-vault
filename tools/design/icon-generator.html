<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:0.95rem;color:#ccc;margin-bottom:12px;font-weight:600}
.label{font-size:0.8rem;color:#888;margin-bottom:6px;font-weight:600}
select,input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none}
select:focus,input:focus{border-color:#3b82f6}
.upload-zone{border:2px dashed #333;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s;margin-bottom:12px}
.upload-zone:hover{border-color:#3b82f6}
.upload-zone.dragover{border-color:#4ade80;background:#0a2e1a}

.upload-zone .icon{font-size:2.5rem;margin-bottom:10px}
.preview{display:flex;align-items:center;justify-content:center;margin:12px 0}
.preview img{max-width:160px;max-height:160px;border-radius:8px;object-fit:contain;border:1px solid #333}
.btn-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#fff}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.btn.green{background:#10b981;border-color:#10b981;color:#fff}
.btn.green:hover{background:#059669}
.preset-row{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.preset-btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#0d0d0d;color:#888;font-size:0.78rem;cursor:pointer;font-weight:600}
.preset-btn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}

.opt-row{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap}
.opt-row > div{flex:1;min-width:120px}
.checkbox-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.checkbox-row label{font-size:0.82rem;color:#888;cursor:pointer}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:12px}
.icon-card{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:10px;text-align:center}
.icon-card img{width:64px;height:64px;object-fit:contain;margin-bottom:6px}
.icon-card .icon-label{font-size:0.72rem;color:#888}
.icon-card .icon-size{font-size:0.68rem;color:#555}
.size-tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.size-tag{padding:4px 10px;border-radius:4px;background:#0d0d0d;border:1px solid #333;font-size:0.75rem;color:#888}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){h1{font-size:1.4rem}}
</style>

<body>


<div class="container" style="position:relative">
<h1 ti="title_icon_generator" ti="h1_icon_generator">Icon Generator</h1>
<p class="subtitle" ti="subtitle_generate_app_icons_in_mul">Generate app icons in multiple sizes from a single image.</p>

<div class="card">
  <h3 ti="h3_presets">Presets</h3>
  <div class="preset-row">
    <button class="preset-btn" data-preset="pwa" onclick="togglePreset('pwa')" ti="btn_pwa_72_512">📱 PWA (72-512)</button>
    <button class="preset-btn" data-preset="android" onclick="togglePreset('android')" ti="btn_android_48_512">🤖 Android (48-512)</button>
    <button class="preset-btn" data-preset="ios" onclick="togglePreset('ios')" ti="btn_ios_20_1024">🍎 iOS (20-1024)</button>
  </div>
  
  <div class="opt-row">
    <div><div class="label">Fit Mode</div><select id="fitMode"><option value="cover">Cover (fill square)</option><option value="contain">Contain (fit inside)</option></select></div>
    <div><div class="label">Base Name</div><input id="baseName" type="text" value="icon" oninput="updateSizes()"></div>
  </div>
  
  <div class="checkbox-row">
    <input type="checkbox" id="includeManifest" checked>
    <label for="includeManifest" ti="label_include_site_webmanifest">Include site.webmanifest (PWA)</label>
  </div>
  
  <div class="label">Selected Sizes</div>
  <div class="size-tags" id="sizeTags"></div>
  
  <div style="display:flex;gap:8px;margin:8px 0">
    <input id="customSize" type="number" min="16" max="2048" tp="placeholder_custom_size" placeholder="Custom size" style="width:120px;flex:none">
    <button class="btn" onclick="addCustomSize()" ti="btn_add_size">Add Size</button>
    <button class="btn" onclick="clearSizes()" ti="btn_clear_all">Clear All</button>
  </div>
</div>

<div class="card" id="uploadCard">
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">🖼️</div>
    <p>Drop an image here or click to upload</p>
    <p style="font-size:0.75rem;margin-top:4px">PNG, JPG, WebP, SVG</p>
  </div>
  <input id="fileInput" type="file" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
  
  <div id="previewSection" style="display:none">
    <div class="preview"><img id="previewImg"></div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn primary" onclick="generateIcons()" ti="btn_generate_icons">Generate Icons</button>
      <button class="btn green" id="downloadZipBtn" style="display:none" onclick="downloadZip()" ti="btn_download_zip">⬇ Download ZIP</button>
    </div>
  </div>
</div>

<div class="card" id="resultsCard" style="display:none">
  <h3 ti="h3_generated_icons">Generated Icons</h3>
  <div class="icon-grid" id="iconGrid"></div>
</div>

<footer>
  <p><a href="https://github.com/gokuscraper/dev-toolkit" ti="link_github">GitHub</a></p>
</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>var _LANG={'title_icon_generator':["Icon Generator", "图标生成器"],'metadesc_generate_app_icons_in_mul':["Generate app icons in multiple sizes from a single image. PWA, Android, iOS presets. Download as ZIP.", "从单张图片生成多种尺寸的应用图标。支持 PWA、Android 和 iOS 预设。可下载 ZIP 文件。"],'h1_icon_generator':["Icon Generator", "图标生成器"],'h3_presets':["Presets", "预设"],'h3_generated_icons':["Generated Icons", "生成的图标"],'subtitle_generate_app_icons_in_mul':["Generate app icons in multiple sizes from a single image.", "从单张图片生成多种尺寸的应用图标。"],'btn_pwa_72_512':["📱 PWA (72-512)", "📱 PWA (72-512)"],'btn_android_48_512':["🤖 Android (48-512)", "🤖 Android (48-512)"],'btn_ios_20_1024':["🍎 iOS (20-1024)", "🍎 iOS (20-1024)"],'btn_add_size':["Add Size", "增加尺寸"],'btn_clear_all':["Clear All", "全部清除"],'btn_generate_icons':["Generate Icons", "生成图标"],'btn_download_zip':["⬇ Download ZIP", "⬇ 下载 ZIP 文件"],'placeholder_custom_size':["Custom size", "定制尺寸"],'label_include_site_webmanifest':["Include site.webmanifest (PWA)", "包含 site.webmanifest（PWA）"],'link_github':["GitHub", "GitHub"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
const PRESETS = {
  pwa: [72, 96, 128, 144, 152, 192, 384, 512],
  android: [48, 72, 96, 144, 192, 512],
  ios: [20, 29, 40, 58, 60, 76, 80, 87, 120, 152, 167, 180, 1024],
};

let selectedSizes = new Set();
let sourceImage = null;
let generatedIcons = [];

function togglePreset(name) {
  const btn = document.querySelector('[data-preset="' + name + '"]');
  const sizes = PRESETS[name];
  const allActive = sizes.every(s => selectedSizes.has(s));
  
  sizes.forEach(s => {
    if (allActive) selectedSizes.delete(s);
    else selectedSizes.add(s);
  });
  
  btn.classList.toggle('active');
  updateSizes();
}

function addCustomSize() {
  const val = parseInt(document.getElementById('customSize').value);
  if (val >= 16 && val <= 2048) {
    selectedSizes.add(val);
    document.getElementById('customSize').value = '';
    updateSizes();
  }
}

function clearSizes() {
  selectedSizes.clear();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  updateSizes();
}

function updateSizes() {
  const sorted = [...selectedSizes].sort((a, b) => a - b);
  document.getElementById('sizeTags').innerHTML = sorted.map(s => '<span class="size-tag">' + s + '×' + s + ' <span style="cursor:pointer;color:#ef4444" onclick="removeSize(' + s + ')">✕</span></span>').join('');
}

function removeSize(s) {
  selectedSizes.delete(s);
  document.querySelectorAll('.preset-btn').forEach(b => {
    const presetSizes = PRESETS[b.dataset.preset] || [];
    if (!presetSizes.every(sz => selectedSizes.has(sz))) b.classList.remove('active');
  });
  updateSizes();
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      sourceImage = img;
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('uploadZone').querySelector('p').textContent = file.name;
      document.getElementById('downloadZipBtn').style.display = 'none';
      document.getElementById('resultsCard').style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Drag and drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

function generateIcons() {
  if (!sourceImage || selectedSizes.size === 0) return;
  
  const sorted = [...selectedSizes].sort((a, b) => a - b);
  const fitMode = document.getElementById('fitMode').value;
  const baseName = document.getElementById('baseName').value || 'icon';
  
  generatedIcons = [];
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = '';
  
  sorted.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    const sx = size / sourceImage.width;
    const sy = size / sourceImage.height;
    const scale = fitMode === 'cover' ? Math.max(sx, sy) : Math.min(sx, sy);
    const dw = sourceImage.width * scale;
    const dh = sourceImage.height * scale;
    const dx = (size - dw) / 2;
    const dy = (size - dh) / 2;
    
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(sourceImage, dx, dy, dw, dh);
    
    const dataUrl = canvas.toDataURL('image/png');
    const filename = baseName + '-' + size + 'x' + size + '.png';
    generatedIcons.push({ size, filename, dataUrl });
    
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.innerHTML = '<img src="' + dataUrl + '" alt="' + size + 'x' + size + '"><div class="icon-label">' + filename + '</div><div class="icon-size">' + size + '×' + size + '</div>';
    card.querySelector('img').onclick = function() {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = filename;
      a.click();
    };
    grid.appendChild(card);
  });
  
  document.getElementById('resultsCard').style.display = 'block';
  document.getElementById('downloadZipBtn').style.display = 'inline-block';
}

async function downloadZip() {
  if (generatedIcons.length === 0) return;
  
  const zip = new JSZip();
  const baseName = document.getElementById('baseName').value || 'icon';
  
  generatedIcons.forEach(icon => {
    const base64 = icon.dataUrl.split(',')[1];
    zip.file(icon.filename, base64, { base64: true });
  });
  
  // Include manifest
  if (document.getElementById('includeManifest').checked) {
    const manifest = {
      name: baseName,
      short_name: baseName,
      icons: generatedIcons.map(icon => ({
        src: icon.filename,
        sizes: icon.size + 'x' + icon.size,
        type: 'image/png',
        purpose: 'any maskable'
      })),
      theme_color: '#ffffff',
      background_color: '#ffffff',
      display: 'standalone'
    };
    zip.file('site.webmanifest', JSON.stringify(manifest, null, 2));
  }
  
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = baseName + '-icons.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Default: select PWA preset
togglePreset('pwa');
</script>
