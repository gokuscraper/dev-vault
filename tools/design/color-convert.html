<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.picker-row{display:flex;gap:16px;align-items:center;justify-content:center;margin-bottom:20px}
.color-input{width:80px;height:80px;border:none;border-radius:12px;cursor:pointer;background:none}
.color-input::-webkit-color-swatch-wrapper{padding:0}
.color-input::-webkit-color-swatch{border:2px solid #333;border-radius:12px}
.swatch{width:200px;height:80px;border-radius:12px;border:2px solid #333}

.hex-input{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.hex-input input{padding:10px 16px;border-radius:8px;border:1px solid #333;background:#0d0d0d;color:#4da6ff;font-family:'Fira Code',monospace;font-size:1.1rem;text-align:center;width:180px;outline:none}
.hex-input input:focus{border-color:#3b82f6}

.formats{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px}
.fmt-card{background:#161616;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.2s}
.fmt-card:hover{border-color:#3b82f6}
.fmt-card .label{font-size:0.68rem;color:#555;margin-bottom:4px}
.fmt-card .value{font-family:'Fira Code',monospace;font-size:0.92rem;color:#10b981;word-break:break-all}

.contrast-section{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:20px}
.contrast-section h3{font-size:0.82rem;color:#888;margin-bottom:12px}
.contrast-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.contrast-demo{padding:12px 20px;border-radius:8px;font-size:0.88rem;font-weight:600;flex:1;text-align:center;min-width:150px}
.contrast-info{display:flex;gap:12px;flex-wrap:wrap}
.contrast-badge{padding:6px 12px;border-radius:6px;font-size:0.75rem;font-weight:600}
.pass{background:#10b981;color:#fff}
.fail{background:#ef4444;color:#fff}

.presets{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.preset-btn{width:28px;height:28px;border-radius:6px;border:2px solid #333;cursor:pointer}
.preset-btn:hover{border-color:#fff}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

<body>
<div class="container">
<h1>Color Convert</h1>
<p class="subtitle">Convert colors between HEX, RGB, HSL, HSB, CMYK.</p>

<div class="presets" id="presets"></div>

<div class="picker-row">
  <input type="color" class="color-input" id="picker" value="#3b82f6" oninput="fromPicker()">
  <div class="swatch" id="swatch"></div>
</div>

<div class="hex-input">
  <input type="text" id="hexInput" value="#3b82f6" oninput="fromHex()" placeholder="#hex" maxlength="7">
</div>

<div class="formats" id="formats"></div>

<div class="contrast-section">
  <h3>Contrast Check (against white & black)</h3>
  <div class="contrast-row" id="contrastRow"></div>
</div>
</div>

<footer>
  <a href="https://github.com/gokuscraper/color-convert">GitHub</a> ·
  Part of <a href="https://gokuscraper.github.io/dev-vault/">Dev Vault</a>
</footer>

<script>
const PRESET_COLORS=['#ef4444','#f97316','#f59e0b','#84cc16','#10b981','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#f43f5e','#000000','#ffffff','#6b7280','#1e293b'];

document.getElementById('presets').innerHTML=PRESET_COLORS.map(c=>
  `<button class="preset-btn" style="background:${c}" onclick="setColor('${c}')"></button>`
).join('');

let r=59,g=130,b=246;

function setColor(hex){
  document.getElementById('picker').value=hex;
  document.getElementById('hexInput').value=hex;
  fromPicker();
}

function fromPicker(){
  const hex=document.getElementById('picker').value;
  document.getElementById('hexInput').value=hex;
  parseHex(hex);
  render();
}

function fromHex(){
  let hex=document.getElementById('hexInput').value.trim();
  if(!hex.startsWith('#'))hex='#'+hex;
  if(/^#[0-9a-f]{6}$/i.test(hex)){
    document.getElementById('picker').value=hex;
    parseHex(hex);
    render();
  }
}

function parseHex(hex){
  r=parseInt(hex.slice(1,3),16);
  g=parseInt(hex.slice(3,5),16);
  b=parseInt(hex.slice(5,7),16);
}

function toHex(){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function toRGB(){return`rgb(${r}, ${g}, ${b})`}
function toRGBA(){return`rgba(${r}, ${g}, ${b}, 1)`}

function toHSL(){
  const rn=r/255,gn=g/255,bn=b/255;
  const max=Math.max(rn,gn,bn),min=Math.min(rn,gn,bn);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case rn:h=((gn-bn)/d+(gn<bn?6:0))/6;break;
      case gn:h=((bn-rn)/d+2)/6;break;
      case bn:h=((rn-gn)/d+4)/6;break;
    }
  }
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function toHSLStr(){const{h,s,l}=toHSL();return`hsl(${h}, ${s}%, ${l}%)`}

function toHSB(){
  const rn=r/255,gn=g/255,bn=b/255;
  const max=Math.max(rn,gn,bn),min=Math.min(rn,gn,bn);
  let h,s=max===0?0:(max-min)/max,v=max;
  if(max===min)h=0;
  else{
    const d=max-min;
    switch(max){
      case rn:h=((gn-bn)/d+(gn<bn?6:0))/6;break;
      case gn:h=((bn-rn)/d+2)/6;break;
      case bn:h=((rn-gn)/d+4)/6;break;
    }
  }
  return`hsb(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(v*100)}%)`;
}

function toCMYK(){
  const rn=r/255,gn=g/255,bn=b/255;
  const k=1-Math.max(rn,gn,bn);
  if(k===1)return'cmyk(0%, 0%, 0%, 100%)';
  const c=Math.round((1-rn-k)/(1-k)*100);
  const m=Math.round((1-gn-k)/(1-k)*100);
  const y=Math.round((1-bn-k)/(1-k)*100);
  return`cmyk(${c}%, ${m}%, ${y}%, ${Math.round(k*100)}%)`;
}

function luminance(r,g,b){
  const[rs,gs,bs]=[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4)});
  return 0.2126*rs+0.7152*gs+0.0722*bs;
}

function contrastRatio(l1,l2){
  const lighter=Math.max(l1,l2),darker=Math.min(l1,l2);
  return(lighter+0.05)/(darker+0.05);
}

function render(){
  const hex=toHex();
  document.getElementById('swatch').style.background=hex;

  const fmts=[
    {label:'HEX',value:hex},
    {label:'HEX (no #)',value:hex.slice(1)},
    {label:'RGB',value:toRGB()},
    {label:'RGBA',value:toRGBA()},
    {label:'HSL',value:toHSLStr()},
    {label:'HSB/HSV',value:toHSB()},
    {label:'CMYK',value:toCMYK()},
    {label:'CSS Named',value:findNamedColor(hex)||'—'},
  ];

  document.getElementById('formats').innerHTML=fmts.map(f=>
    `<div class="fmt-card" onclick="copyVal('${f.value.replace(/'/g,"\\'")}')">
      <div class="label">${f.label}</div>
      <div class="value">${f.value}</div>
    </div>`
  ).join('');

  // Contrast
  const lum=luminance(r,g,b);
  const whiteContrast=contrastRatio(1,lum).toFixed(2);
  const blackContrast=contrastRatio(lum,0).toFixed(2);
  const textOnColor=lum>0.179?'#000':'#fff';

  document.getElementById('contrastRow').innerHTML=`
    <div class="contrast-demo" style="background:${hex};color:${textOnColor}">Text on Color</div>
    <div class="contrast-info">
      <span>vs White: <strong>${whiteContrast}:1</strong>
        <span class="contrast-badge ${+whiteContrast>=4.5?'pass':'fail'}">${+whiteContrast>=4.5?'AA Pass':'AA Fail'}</span>
        <span class="contrast-badge ${+whiteContrast>=7?'pass':'fail'}">${+whiteContrast>=7?'AAA Pass':'AAA Fail'}</span>
      </span><br>
      <span>vs Black: <strong>${blackContrast}:1</strong>
        <span class="contrast-badge ${+blackContrast>=4.5?'pass':'fail'}">${+blackContrast>=4.5?'AA Pass':'AA Fail'}</span>
        <span class="contrast-badge ${+blackContrast>=7?'pass':'fail'}">${+blackContrast>=7?'AAA Pass':'AAA Fail'}</span>
      </span>
    </div>`;
}

function findNamedColor(hex){
  const names={'#000000':'black','#ffffff':'white','#ff0000':'red','#00ff00':'lime','#0000ff':'blue','#ffff00':'yellow','#00ffff':'cyan','#ff00ff':'magenta','#808080':'gray','#c0c0c0':'silver','#800000':'maroon','#808000':'olive','#008000':'green','#800080':'purple','#008080':'teal','#000080':'navy','#ffa500':'orange','#ffc0cb':'pink','#a52a2a':'brown','#ff6347':'tomato','#4169e1':'royalblue','#ff69b4':'hotpink','#daa520':'goldenrod','#2e8b57':'seagreen','#6a5acd':'slateblue','#ff4500':'orangered','#da70d6':'orchid','#20b2aa':'lightseagreen','#778899':'lightslategray','#b0c4de':'lightsteelblue'};
  return names[hex.toLowerCase()]||null;
}

function copyVal(v){
  navigator.clipboard.writeText(v);
  const el=document.createElement('div');
  el.className='copied';el.textContent=v+' copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

render();
</script>
