<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}

<script>
const $=id=>document.getElementById(id);
let H=210,S=80,L=55;
let mode='complementary';
let draggingWheel=false,draggingSL=false;

// --- Color conversions ---
function hslToRgb(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)]}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}h*=360}return[Math.round(h),Math.round(s*100),Math.round(l*100)]}
function hslToHsv(h,s,l){s/=100;l/=100;const v=l+s*Math.min(l,1-l);const sv=v===0?0:2*(1-l/v);return[Math.round(h),Math.round(sv*100),Math.round(v*100)]}
function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const n=parseInt(hex,16);return[(n>>16)&255,(n>>8)&255,n&255]}

// --- Draw wheel ---
const wCanvas=$('wheelCanvas'),wCtx=wCanvas.getContext('2d');
const cx=140,cy=140,outerR=135,innerR=85;

function drawWheel(){
  wCtx.clearRect(0,0,280,280);
  for(let a=0;a<360;a+=0.5){
    const r1=a*Math.PI/180,r2=(a+1)*Math.PI/180;
    wCtx.beginPath();wCtx.moveTo(cx+innerR*Math.cos(r1),cy+innerR*Math.sin(r1));
    wCtx.arc(cx,cy,outerR,r1,r2);wCtx.arc(cx,cy,innerR,r2,r1,true);
    wCtx.fillStyle=`hsl(${a},100%,50%)`;wCtx.fill();
  }
  // center fill
  wCtx.beginPath();wCtx.arc(cx,cy,innerR-1,0,Math.PI*2);
  wCtx.fillStyle='#161616';wCtx.fill();
  // harmony indicators
  const angles=getHarmonyAngles();
  angles.forEach(a=>{
    const rad=a*Math.PI/180;const mr=(outerR+innerR)/2;
    wCtx.beginPath();wCtx.arc(cx+mr*Math.cos(rad),cy+mr*Math.sin(rad),6,0,Math.PI*2);
    wCtx.fillStyle=`hsl(${a},${S}%,${L}%)`;wCtx.strokeStyle='#fff';wCtx.lineWidth=2;wCtx.fill();wCtx.stroke();
  });
  // selected hue marker
  const hRad=(H-90)*Math.PI/180,mr=(outerR+innerR)/2;
  const mx=cx+mr*Math.cos(hRad),my=cy+mr*Math.sin(hRad);
  wCtx.beginPath();wCtx.arc(mx,my,8,0,Math.PI*2);
  wCtx.strokeStyle='#fff';wCtx.lineWidth=2.5;wCtx.stroke();
  wCtx.beginPath();wCtx.arc(mx,my,6,0,Math.PI*2);
  wCtx.fillStyle=`hsl(${H},100%,50%)`;wCtx.fill();
}

// --- SL picker ---
const slCanvas=$('slCanvas'),slCtx=slCanvas.getContext('2d');
function drawSL(){
  const w=160,h=160;
  const img=slCtx.createImageData(w,h);
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    const s2=x/w*100,l2=(1-y/h)*100;
    const[r,g,b]=hslToRgb(H,s2,l2);const i=(y*w+x)*4;
    img.data[i]=r;img.data[i+1]=g;img.data[i+2]=b;img.data[i+3]=255;
  }}
  slCtx.putImageData(img,0,0);
  // marker
  const mx=S/100*w,my=(1-L/100)*h;
  slCtx.beginPath();slCtx.arc(mx,my,7,0,Math.PI*2);
  slCtx.strokeStyle=L>50?'#000':'#fff';slCtx.lineWidth=2;slCtx.stroke();
}

// --- Harmony ---
function getHarmonyAngles(){
  const h=H;
  const m={complementary:[(h+180)%360],analogous:[(h+30)%360,(h+330)%360],triadic:[(h+120)%360,(h+240)%360],split:[(h+150)%360,(h+210)%360],tetradic:[(h+90)%360,(h+180)%360,(h+270)%360]};
  return m[mode]||[];
}
function getHarmonyColors(){
  return getHarmonyAngles().map(a=>({h:a,s:S,l:L}));
}
function renderHarmony(){
  const colors=getHarmonyColors();
  const base={h:H,s:S,l:L};
  const all=[base,...colors];
  $('harmonySwatches').innerHTML=all.map((c,i)=>{
    const hex=rgbToHex(...hslToRgb(c.h,c.s,c.l));
    return`<div class="hswatch" style="background:${hex}" onclick="copyHex('${hex}')" title="${hex}"><span class="htip">${hex}</span></div>`;
  }).join('');
}

// --- Tints & Shades ---
function renderShades(){
  let tintsHtml='',shadesHtml='';
  for(let i=1;i<=5;i++){
    const tl=Math.min(100,L+(100-L)*i/5);
    const sl=Math.max(0,L-L*i/5);
    const thex=rgbToHex(...hslToRgb(H,S,Math.round(tl)));
    const shex=rgbToHex(...hslToRgb(H,S,Math.round(sl)));
    tintsHtml+=`<div style="background:${thex}" onclick="copyHex('${thex}')" title="${thex}"></div>`;
    shadesHtml+=`<div style="background:${shex}" onclick="copyHex('${shex}')" title="${shex}"></div>`;
  }
  $('tints').innerHTML=tintsHtml;
  $('shades').innerHTML=shadesHtml;
}

// --- Update all ---
function update(){
  const[r,g,b]=hslToRgb(H,S,L);
  const hex=rgbToHex(r,g,b);
  const[hv,sv,vv]=hslToHsv(H,S,L);
  $('mainSwatch').style.background=hex;
  $('vHex').value=hex;
  $('vRgb').value=`${r}, ${g}, ${b}`;
  $('vHsl').value=`${H}, ${S}%, ${L}%`;
  $('vHsv').value=`${hv}, ${sv}%, ${vv}%`;
  drawWheel();drawSL();renderHarmony();renderShades();
}

// --- Wheel interaction ---
function wheelFromEvent(e){
  const rect=wCanvas.getBoundingClientRect();
  const x=e.clientX-rect.left-cx,y=e.clientY-rect.top-cy;
  const dist=Math.sqrt(x*x+y*y);
  if(dist>=innerR&&dist<=outerR){
    H=(Math.atan2(y,x)*180/Math.PI+90+360)%360;H=Math.round(H);
    return true;
  }
  return false;
}
function handleTouch(e){e.preventDefault();const t=e.touches[0];return{clientX:t.clientX,clientY:t.clientY}}
wCanvas.addEventListener('mousedown',e=>{if(wheelFromEvent(e)){draggingWheel=true;update()}});
wCanvas.addEventListener('touchstart',e=>{const t=handleTouch(e);if(wheelFromEvent(t)){draggingWheel=true;update()}},{passive:false});
document.addEventListener('mousemove',e=>{if(draggingWheel){wheelFromEvent(e);update()}});
document.addEventListener('touchmove',e=>{if(draggingWheel){const t=handleTouch(e);wheelFromEvent(t);update()}},{passive:false});
document.addEventListener('mouseup',()=>{draggingWheel=false;draggingSL=false});
document.addEventListener('touchend',()=>{draggingWheel=false;draggingSL=false});

// --- SL interaction ---
function slFromEvent(e){
  const rect=slCanvas.getBoundingClientRect();
  const x=Math.max(0,Math.min(159,e.clientX-rect.left));
  const y=Math.max(0,Math.min(159,e.clientY-rect.top));
  S=Math.round(x/159*100);L=Math.round((1-y/159)*100);
}
slCanvas.addEventListener('mousedown',e=>{draggingSL=true;slFromEvent(e);update()});
slCanvas.addEventListener('touchstart',e=>{draggingSL=true;const t=handleTouch(e);slFromEvent(t);update()},{passive:false});
document.addEventListener('mousemove',e=>{if(draggingSL){slFromEvent(e);update()}});
document.addEventListener('touchmove',e=>{if(draggingSL){const t=handleTouch(e);slFromEvent(t);update()}},{passive:false});

// --- Input edits ---
$('vHex').addEventListener('change',function(){
  const m=this.value.match(/^#?([0-9a-f]{6})$/i);
  if(m){const[r,g,b]=hexToRgb(m[1]);[H,S,L]=rgbToHsl(r,g,b);update()}
});
$('vRgb').addEventListener('change',function(){
  const p=this.value.split(',').map(Number);
  if(p.length===3&&p.every(v=>v>=0&&v<=255)){[H,S,L]=rgbToHsl(...p);update()}
});
$('vHsl').addEventListener('change',function(){
  const p=this.value.replace(/%/g,'').split(',').map(Number);
  if(p.length===3){H=p[0];S=p[1];L=p[2];update()}
});

// --- Mode buttons ---
document.querySelectorAll('.modes button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.modes button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');mode=btn.dataset.mode;update();
  });
});

// --- Copy ---
function copyHex(hex){
  navigator.clipboard.writeText(hex).then(()=>toast('Copied '+hex));
}
$('mainSwatch').addEventListener('click',()=>copyHex($('vHex').value));

// --- Export CSS vars ---
$('exportBtn').addEventListener('click',()=>{
  const all=[{h:H,s:S,l:L},...getHarmonyColors()];
  const names=['primary','harmony-1','harmony-2','harmony-3','harmony-4'];
  const lines=all.map((c,i)=>`  --${names[i]||'harmony-'+i}: ${rgbToHex(...hslToRgb(c.h,c.s,c.l))};`);
  const css=`:root {\n${lines.join('\n')}\n}`;
  navigator.clipboard.writeText(css).then(()=>toast('CSS variables copied'));
});

// --- Toast ---
let toastTimer;
function toast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}

update();
</script>

(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
