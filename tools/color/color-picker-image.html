<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:#fff}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
.drop-zone{border:2px dashed #333;border-radius:10px;padding:40px;text-align:center;cursor:pointer;margin-bottom:14px;transition:border-color 0.2s}
.drop-zone:hover,.drop-zone.drag{border-color:#3b82f6}
.drop-zone p{color:#888;font-size:0.9rem}
.drop-zone input{display:none}
.workspace{display:none}
.canvas-area{background:#161616;border:1px solid #222;border-radius:10px;padding:8px;margin-bottom:14px;position:relative}
.canvas-wrap{overflow:auto;max-height:500px;cursor:crosshair;position:relative}
.canvas-wrap canvas{display:block;max-width:100%;height:auto}
.zoom-ring{position:absolute;pointer-events:none;width:120px;height:120px;border:2px solid #fff;border-radius:50%;overflow:hidden;display:none;box-shadow:0 0 10px rgba(0,0,0,0.5);z-index:10}
.zoom-ring canvas{width:120px;height:120px}
.zoom-crosshair{position:absolute;top:50%;left:50%;width:12px;height:12px;margin:-6px 0 0 -6px;border:1px solid #fff;border-radius:50%;pointer-events:none}
.section{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.section h3{font-size:0.9rem;color:#4da6ff;margin-bottom:10px}
.picked-color{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.color-swatch{width:64px;height:64px;border-radius:10px;border:2px solid #333;flex-shrink:0}

.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-row label{font-size:0.78rem;color:#888;min-width:36px;font-weight:600}
.color-row input{flex:1;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:5px 8px;color:#e6e6e6;font-family:'Fira Code',monospace;font-size:0.82rem}
.color-row .copy-btn{padding:4px 10px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.75rem;font-weight:600;white-space:nowrap}

.palette-item{width:48px;height:48px;border-radius:8px;border:2px solid #333;cursor:pointer;position:relative;transition:transform 0.15s}
.palette-item:hover{transform:scale(1.1);border-color:#3b82f6}
.palette-item .remove{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:#ef4444;color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.palette-item:hover .remove{display:flex}
.saved-palette{display:flex;gap:4px;align-items:center;margin-bottom:8px;padding:8px;background:#0d0d0d;border-radius:8px}
.saved-palette .swatch{width:28px;height:28px;border-radius:6px;border:1px solid #333;cursor:pointer}
.saved-palette .name{font-size:0.78rem;color:#aaa;flex:1;margin-left:8px}
.saved-palette .acts{display:flex;gap:4px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:8px 16px;border-radius:6px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.85rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6;color:#4da6ff}
.btn-primary{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.btn-primary:hover{background:#234080}
.btn-sm{padding:4px 10px;font-size:0.75rem}
.btn-danger{border-color:#7f1d1d;color:#ef4444}
.btn-danger:hover{background:#1a0505}
.info{font-size:0.78rem;color:#666;text-align:center;margin-top:6px}
.toast{position:fixed;bottom:20px;right:20px;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;display:none;z-index:99}
.footer{text-align:center;margin-top:24px;padding:16px 0;border-top:1px solid #222}
.footer a{color:#4da6ff;text-decoration:none;font-size:0.8rem}
.related{margin-top:20px;text-align:center;font-size:0.8rem;color:#666}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}
.dominant-colors{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.dominant-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.dominant-swatch{width:40px;height:40px;border-radius:8px;border:2px solid #333;transition:transform 0.15s}
.dominant-item:hover .dominant-swatch{transform:scale(1.1);border-color:#3b82f6}
.dominant-label{font-size:0.7rem;color:#888;font-family:'Fira Code',monospace}

<body>
<div class="container">
<h1>Image Color Picker</h1>
<p class="sub">Pick colors from images — extract palettes — nothing uploaded</p>

<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
<p>Drop an image here or click to select</p>
<input type="file" id="fileInput" accept="image/*">
</div>

<div class="workspace" id="workspace">
<div class="canvas-area">
<div class="canvas-wrap" id="canvasWrap">
<canvas id="canvas"></canvas>
</div>
<div class="zoom-ring" id="zoomRing"><canvas id="zoomCanvas" width="120" height="120"></canvas><div class="zoom-crosshair"></div></div>
</div>

<div class="section">
<h3>Picked Color</h3>
<div class="picked-color">
<div class="color-swatch" id="colorSwatch" style="background:#000"></div>
<div class="color-values">
<div class="color-row"><label>HEX</label><input id="vHex" value="#000000" readonly><button class="copy-btn" onclick="copyVal('vHex')">Copy</button></div>
<div class="color-row"><label>RGB</label><input id="vRgb" value="rgb(0, 0, 0)" readonly><button class="copy-btn" onclick="copyVal('vRgb')">Copy</button></div>
<div class="color-row"><label>HSL</label><input id="vHsl" value="hsl(0, 0%, 0%)" readonly><button class="copy-btn" onclick="copyVal('vHsl')">Copy</button></div>
</div>
</div>
<div class="actions">
<button class="btn btn-primary" onclick="addToPalette()">Add to Palette</button>
<button class="btn" onclick="loadNewImage()">New Image</button>
</div>
</div>

<div class="section">
<h3>Dominant Colors (auto-extracted)</h3>
<div class="dominant-colors" id="dominantColors"></div>
<div class="info">Click a color to select it</div>
</div>

<div class="section palette-section">
<h3>Your Palette <span style="font-size:0.75rem;color:#666" id="paletteCount">(0)</span></h3>
<div class="palette-grid" id="paletteGrid"></div>
<div class="actions">
<button class="btn btn-sm" onclick="exportPalette('hex')">Copy HEX List</button>
<button class="btn btn-sm" onclick="exportPalette('css')">Copy CSS Vars</button>
<button class="btn btn-sm" onclick="exportPalette('scss')">Copy SCSS</button>
<button class="btn btn-sm" onclick="exportPalette('tailwind')">Copy Tailwind</button>
<button class="btn btn-sm btn-danger" onclick="clearPalette()">Clear</button>
</div>
</div>
</div>

<div class="footer"><a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a></div>
<div class="related">Related: <a href="https://yurukusa.github.io/color-converter/">Color Converter</a> | <a href="https://yurukusa.github.io/image-filter/">Image Filter</a> | <a href="https://yurukusa.github.io/image-crop/">Image Crop</a></div>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
const zoomCanvas=document.getElementById('zoomCanvas');
const zoomCtx=zoomCanvas.getContext('2d');
const zoomRing=document.getElementById('zoomRing');
let imgData=null;
let currentColor={r:0,g:0,b:0};
let palette=[];

// File handling
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('drag');
  if(e.dataTransfer.files.length)loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change',e=>{if(e.target.files.length)loadImage(e.target.files[0])});

function loadImage(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxDim=2000;
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        const scale=maxDim/Math.max(w,h);
        w=Math.round(w*scale);h=Math.round(h*scale);
      }
      canvas.width=w;canvas.height=h;
      ctx.drawImage(img,0,0,w,h);
      imgData=ctx.getImageData(0,0,w,h);
      document.getElementById('workspace').style.display='block';
      dropZone.style.display='none';
      extractDominant();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadNewImage(){
  document.getElementById('workspace').style.display='none';
  dropZone.style.display='block';
  fileInput.value='';
}

// Canvas interaction
const canvasWrap=document.getElementById('canvasWrap');

canvasWrap.addEventListener('mousemove',e=>{
  if(!imgData)return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const x=Math.floor((e.clientX-rect.left)*scaleX);
  const y=Math.floor((e.clientY-rect.top)*scaleY);
  if(x<0||y<0||x>=canvas.width||y>=canvas.height)return;

  // Update zoom ring
  zoomRing.style.display='block';
  const wrapRect=canvasWrap.getBoundingClientRect();
  let ringX=e.clientX-wrapRect.left+canvasWrap.scrollLeft+20;
  let ringY=e.clientY-wrapRect.top+canvasWrap.scrollTop-60;
  if(ringX+130>canvasWrap.scrollLeft+wrapRect.width)ringX=e.clientX-wrapRect.left+canvasWrap.scrollLeft-140;
  zoomRing.style.left=ringX+'px';
  zoomRing.style.top=ringY+'px';

  // Draw zoomed area (8x magnification)
  const zoom=8;
  const srcSize=Math.floor(120/zoom);
  zoomCtx.imageSmoothingEnabled=false;
  zoomCtx.clearRect(0,0,120,120);
  zoomCtx.drawImage(canvas,x-srcSize/2,y-srcSize/2,srcSize,srcSize,0,0,120,120);

  // Preview color under cursor
  const idx=(y*canvas.width+x)*4;
  const r=imgData.data[idx],g=imgData.data[idx+1],b=imgData.data[idx+2];
  zoomRing.style.borderColor=`rgb(${r},${g},${b})`;
});

canvasWrap.addEventListener('mouseleave',()=>{zoomRing.style.display='none'});

canvasWrap.addEventListener('click',e=>{
  if(!imgData)return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const x=Math.floor((e.clientX-rect.left)*scaleX);
  const y=Math.floor((e.clientY-rect.top)*scaleY);
  if(x<0||y<0||x>=canvas.width||y>=canvas.height)return;
  const idx=(y*canvas.width+x)*4;
  pickColor(imgData.data[idx],imgData.data[idx+1],imgData.data[idx+2]);
});

function pickColor(r,g,b){
  currentColor={r,g,b};
  const hex=rgbToHex(r,g,b);
  const hsl=rgbToHsl(r,g,b);
  document.getElementById('colorSwatch').style.background=hex;
  document.getElementById('vHex').value=hex;
  document.getElementById('vRgb').value=`rgb(${r}, ${g}, ${b})`;
  document.getElementById('vHsl').value=`hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
}

function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

// Dominant color extraction using median-cut quantization
function extractDominant(){
  if(!imgData)return;
  const data=imgData.data;
  const pixels=[];
  // Sample every 4th pixel for performance
  for(let i=0;i<data.length;i+=16){
    const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
    if(a<128)continue; // skip transparent
    pixels.push([r,g,b]);
  }

  const colors=medianCut(pixels,8);
  const container=document.getElementById('dominantColors');
  container.innerHTML='';
  colors.forEach(c=>{
    const hex=rgbToHex(c[0],c[1],c[2]);
    const el=document.createElement('div');
    el.className='dominant-item';
    el.innerHTML=`<div class="dominant-swatch" style="background:${hex}"></div><span class="dominant-label">${hex}</span>`;
    el.onclick=()=>pickColor(c[0],c[1],c[2]);
    container.appendChild(el);
  });
}

function medianCut(pixels,depth){
  if(depth===0||pixels.length===0){
    if(pixels.length===0)return[];
    const avg=[0,0,0];
    pixels.forEach(p=>{avg[0]+=p[0];avg[1]+=p[1];avg[2]+=p[2]});
    return[[Math.round(avg[0]/pixels.length),Math.round(avg[1]/pixels.length),Math.round(avg[2]/pixels.length)]];
  }
  // Find channel with greatest range
  let ranges=[0,1,2].map(ch=>{
    const vals=pixels.map(p=>p[ch]);
    return Math.max(...vals)-Math.min(...vals);
  });
  const ch=ranges.indexOf(Math.max(...ranges));
  pixels.sort((a,b)=>a[ch]-b[ch]);
  const mid=Math.floor(pixels.length/2);
  return[...medianCut(pixels.slice(0,mid),depth-1),...medianCut(pixels.slice(mid),depth-1)];
}

// Palette management
function addToPalette(){
  const hex=rgbToHex(currentColor.r,currentColor.g,currentColor.b);
  if(palette.includes(hex))return;
  palette.push(hex);
  renderPalette();
}

function renderPalette(){
  const grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  palette.forEach((hex,i)=>{
    const el=document.createElement('div');
    el.className='palette-item';
    el.style.background=hex;
    el.title=hex;
    el.onclick=()=>{
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      pickColor(r,g,b);
    };
    const rm=document.createElement('button');
    rm.className='remove';
    rm.textContent='×';
    rm.onclick=e=>{e.stopPropagation();palette.splice(i,1);renderPalette()};
    el.appendChild(rm);
    grid.appendChild(el);
  });
  document.getElementById('paletteCount').textContent=`(${palette.length})`;
}

function clearPalette(){palette=[];renderPalette()}

function exportPalette(fmt){
  if(!palette.length)return;
  let text='';
  switch(fmt){
    case 'hex':text=palette.join('\n');break;
    case 'css':text=palette.map((h,i)=>`  --color-${i+1}: ${h};`).join('\n');text=`:root {\n${text}\n}`;break;
    case 'scss':text=palette.map((h,i)=>`$color-${i+1}: ${h};`).join('\n');break;
    case 'tailwind':
      text=palette.map((h,i)=>`        '${i+1}': '${h}',`).join('\n');
      text=`module.exports = {\n  theme: {\n    extend: {\n      colors: {\n        palette: {\n${text}\n        }\n      }\n    }\n  }\n}`;
      break;
  }
  navigator.clipboard.writeText(text).then(()=>showToast('Copied!'));
}

function copyVal(id){
  navigator.clipboard.writeText(document.getElementById(id).value).then(()=>showToast('Copied!'));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg||'Copied!';
  t.style.display='block';
  setTimeout(()=>t.style.display='none',1500);
}
</script>
</body>
</html>
