<title>YAML to TOML Converter</title>
<meta name="description" content="Convert YAML data to TOML format and back. Supports nested objects, arrays, booleans, numbers, and strings.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}

h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#111;color:#ccd;font-family:monospace;font-size:0.85rem;outline:none;resize:vertical;min-height:150px;margin-bottom:8px}
textarea:focus{border-color:#3b82f6}
.tabs{display:flex;gap:2px;margin-bottom:8px}
.tabs button{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;font-size:0.8rem;font-weight:600}
.tabs button.active{background:#161616;color:#fff;border-color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.error{color:#ef4444;font-size:0.85rem;margin-top:4px;min-height:20px}
</style>
</head>
<body>


<div class="container" style="position:relative">
  <h1 ti="title_yaml_to_toml_converter" ti="h1_yaml_to_toml_converter">YAML to TOML Converter</h1>
  <p class="desc" ti="subtitle_convert_between_yaml_and">Convert between YAML and TOML formats</p>
  <div class="card">
    <div class="tabs">
      <button class="active" data-dir="yaml2toml" ti="btn_yaml_toml">YAML → TOML</button>
      <button data-dir="toml2yaml" ti="btn_toml_yaml">TOML → YAML</button>
    </div>
    <label ti="label_input">Input</label>
    <textarea id="input" rows="8" spellcheck="false">title: YAML Example
owner:
  name: Tom
  dob: 1979-05-27 07:32:00
database:
  server: 192.168.1.1
  ports:
    - 8001
    - 8001
    - 8002
  connection_max: 5000
  enabled: true</textarea>
    <label ti="label_output">Output</label>
    <textarea id="output" rows="8" readonly></textarea>
    <div class="error" id="error"></div>
    <div class="flex-center">
      <button id="convertBtn" ti="btn_convert">Convert</button>
      <button id="copyBtn" ti="btn_copy_output">Copy Output</button>
    </div>
  </div>
</div>

<script>var _LANG={'title_yaml_to_toml_converter':["YAML to TOML Converter", "YAML 转 TOML 转换器"],'metadesc_convert_yaml_data_to_toml':["Convert YAML data to TOML format and back. Supports nested objects, arrays, booleans, numbers, and strings.", "将 YAML 数据转换为 TOML 格式，反之亦然。支持嵌套对象、数组、布尔值、数字和字符串。"],'h1_yaml_to_toml_converter':["YAML to TOML Converter", "YAML 转 TOML 转换器"],'subtitle_convert_between_yaml_and':["Convert between YAML and TOML formats", "YAML 和 TOML 格式之间的转换"],'btn_yaml_toml':["YAML → TOML", "YAML → TOML"],'btn_toml_yaml':["TOML → YAML", "TOML → YAML"],'btn_convert':["Convert", "转变"],'btn_copy_output':["Copy Output", "复制输出"],'label_input':["Input", "输入"],'label_output':["Output", "输出"],'jtc_error':["Error:", "错误："],'jtcpre_error':["Error: ", "错误："]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function yamlToObj(text) {
  const result = {};
  const lines = text.split('\n');
  const stack = [{ obj: result, indent: -1 }];
  let lastArrayKey = null;
  for (const line of lines) {
    if (!line.trim() || line.trim().startsWith('#')) continue;
    const indent = line.search(/\S/);
    const trimmed = line.trim();
    while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
    const current = stack[stack.length - 1].obj;
    if (trimmed.startsWith('- ')) {
      const val = parseYamlScalar(trimmed.slice(2).trim());
      if (!Array.isArray(current)) {
        const parent = stack[stack.length - 2]?.obj;
        if (parent && lastArrayKey) {
          parent[lastArrayKey] = current;
        }
      }
      if (Array.isArray(current)) {
        current.push(val);
      }
      continue;
    }
    const colonIdx = trimmed.indexOf(':');
    if (colonIdx === -1) continue;
    const key = trimmed.slice(0, colonIdx).trim();
    let val = trimmed.slice(colonIdx + 1).trim();
    lastArrayKey = key;
    if (val === '') {
      const newObj = [];
      current[key] = newObj;
      stack.push({ obj: newObj, indent });
    } else {
      current[key] = parseYamlScalar(val);
    }
  }
  return result;
}

function parseYamlScalar(s) {
  if (s === '~' || s === 'null') return null;
  if (s === 'true') return true;
  if (s === 'false') return false;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (/^\d+\.\d+$/.test(s)) return parseFloat(s);
  if ((s.startsWith("'") && s.endsWith("'")) || (s.startsWith('"') && s.endsWith('"'))) return s.slice(1, -1);
  return s;
}

function objToToml(obj, prefix) {
  let lines = [];
  for (const [key, val] of Object.entries(obj)) {
    const k = /^[a-zA-Z0-9_-]+$/.test(key) ? key : JSON.stringify(key);
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      lines.push('');
      lines.push('[' + (prefix ? prefix + '.' + k : k) + ']');
      lines.push(objToToml(val, prefix ? prefix + '.' + k : k));
    } else if (Array.isArray(val)) {
      lines.push(k + ' = [' + val.map(v => tomlScalar(v)).join(', ') + ']');
    } else {
      lines.push(k + ' = ' + tomlScalar(val));
    }
  }
  return lines.join('\n');
}

function tomlScalar(v) {
  if (v === null) return '';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') return isFinite(v) ? v.toString() : '';
  if (typeof v === 'string') return "'" + v.replace(/'/g, "\\'") + "'";
  return '';
}

function escapeYaml(s) {
  if (/[:{}\[\],&*?|>!%@`#]/.test(s) || s.includes("'") || s.includes('"') || /^\s/.test(s) || /\s$/.test(s) || s === '' || /^(true|false|yes|no|on|off|null|~|\d+\.?\d*)$/i.test(s)) {
    return "'" + s.replace(/'/g, "''") + "'";
  }
  return s;
}

function objToYaml(obj, indent) {
  let out = '';
  for (const [key, val] of Object.entries(obj)) {
    const pad = '  '.repeat(indent);
    if (val !== null && typeof val === 'object') {
      if (Array.isArray(val)) {
        if (val.length === 0) out += pad + key + ': []\n';
        else out += pad + key + ':\n' + val.map(v => pad + '  - ' + (typeof v === 'object' ? '\n' + objToYaml(v, indent + 3).trim() : escapeYaml(v))).join('\n') + '\n';
      } else {
        out += pad + key + ':\n' + objToYaml(val, indent + 1);
      }
    } else {
      out += pad + key + ': ' + escapeYaml(val) + '\n';
    }
  }
  return out;
}

function tomlToObj(text) {
  const result = {};
  let current = result;
  const lines = text.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;
    if (trimmed.startsWith('[')) {
      const path = trimmed.replace(/^\[|\]$/g, '').trim().split('.');
      current = result;
      for (const seg of path) {
        if (!current[seg]) current[seg] = {};
        current = current[seg];
      }
      continue;
    }
    const eqIdx = trimmed.indexOf('=');
    if (eqIdx === -1) continue;
    const key = trimmed.slice(0, eqIdx).trim();
    let val = trimmed.slice(eqIdx + 1).trim();
    if (val === 'true') current[key] = true;
    else if (val === 'false') current[key] = false;
    else if (/^\d+$/.test(val)) current[key] = parseInt(val, 10);
    else if (/^\d+\.\d+$/.test(val)) current[key] = parseFloat(val);
    else if ((val.startsWith("'") && val.endsWith("'")) || (val.startsWith('"') && val.endsWith('"'))) current[key] = val.slice(1, -1);
    else if (val.startsWith('[') && val.endsWith(']')) {
      current[key] = val.slice(1, -1).split(',').map(x => {
        x = x.trim();
        if (x === 'true') return true;
        if (x === 'false') return false;
        if (/^\d+$/.test(x)) return parseInt(x, 10);
        if (/^\d+\.\d+$/.test(x)) return parseFloat(x);
        return x.replace(/^['"]|['"]$/g, '');
      });
    } else current[key] = val;
  }
  return result;
}

let direction = 'yaml2toml';
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const error = document.getElementById('error');
  const output = document.getElementById('output');
  error.textContent = '';
  try {
    if (direction === 'yaml2toml') {
      const obj = yamlToObj(input);
      output.value = objToToml(obj, '').trim();
    } else {
      const obj = tomlToObj(input);
      output.value = objToYaml(obj, 0).trim();
    }
  } catch(e) {
    error.textContent=T("jtcpre_error")+ e.message;
    output.value = '';
  }
}

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
convert();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);

document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
