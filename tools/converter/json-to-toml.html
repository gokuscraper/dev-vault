<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to TOML Converter</title>
<meta name="description" content="Convert JSON data to TOML format and back. Supports nested objects, arrays, booleans, numbers, and strings.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:680px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#111;color:#ccd;font-family:monospace;font-size:0.85rem;outline:none;resize:vertical;min-height:160px;margin-bottom:8px}
textarea:focus{border-color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.tabs{display:flex;gap:2px;margin-bottom:8px}
.tabs button{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;font-size:0.8rem;font-weight:600}
.tabs button.active{background:#161616;color:#fff;border-color:#3b82f6}
.error{color:#ef4444;font-size:0.85rem;margin-top:4px;min-height:20px}
</style>
</head>
<body>
<div class="container">
  <h1>JSON to TOML Converter</h1>
  <p class="desc">Convert between JSON and TOML formats</p>
  <div class="card">
    <div class="tabs">
      <button class="active" data-dir="json2toml">JSON → TOML</button>
      <button data-dir="toml2json">TOML → JSON</button>
    </div>
    <label>Input</label>
    <textarea id="input" rows="8" spellcheck="false">{
  "title": "TOML Example",
  "owner": {
    "name": "Tom",
    "dob": "1979-05-27T07:32:00-08:00"
  },
  "database": {
    "server": "192.168.1.1",
    "ports": [8001, 8001, 8002],
    "connection_max": 5000,
    "enabled": true
  }
}</textarea>
    <label>Output</label>
    <textarea id="output" rows="8" readonly></textarea>
    <div class="error" id="error"></div>
    <div class="flex-center">
      <button id="convertBtn">Convert</button>
      <button id="copyBtn">Copy Output</button>
    </div>
  </div>
</div>
<script>
function jsonToToml(obj, prefix) {
  let lines = [];
  for (const [key, val] of Object.entries(obj)) {
    const k = /^[a-zA-Z0-9_-]+$/.test(key) ? key : JSON.stringify(key);
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      lines.push('');
      lines.push('[' + (prefix ? prefix + '.' + k : k) + ']');
      lines.push(jsonToToml(val, prefix ? prefix + '.' + k : k));
    } else {
      lines.push(k + ' = ' + tomlValue(val));
    }
  }
  return lines.join('\n');
}

function tomlValue(v) {
  if (v === null) return '';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') return isFinite(v) ? v.toString() : '';
  if (typeof v === 'string') {
    if (/[^\x20-\x7e]/.test(v)) return JSON.stringify(v);
    if (v.includes("'")) return JSON.stringify(v);
    return "'" + v + "'";
  }
  if (Array.isArray(v)) {
    const items = v.map(tomlValue).join(', ');
    return '[' + items + ']';
  }
  return '';
}

function tomlToJson(toml) {
  const result = {};
  let current = result;
  let currentPath = [];
  const lines = toml.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;
    if (trimmed.startsWith('[')) {
      const path = trimmed.replace(/^\[|\]$/g, '').trim().split('.');
      currentPath = path;
      current = result;
      for (const seg of path) {
        if (!current[seg]) current[seg] = {};
        current = current[seg];
      }
      continue;
    }
    const eqIdx = trimmed.indexOf('=');
    if (eqIdx === -1) continue;
    const key = trimmed.slice(0, eqIdx).trim();
    const val = trimmed.slice(eqIdx + 1).trim();
    current[key] = parseTomlValue(val);
  }
  return result;
}

function parseTomlValue(s) {
  if (s === 'true') return true;
  if (s === 'false') return false;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (/^\d+\.\d+$/.test(s)) return parseFloat(s);
  if ((s.startsWith("'") && s.endsWith("'")) || (s.startsWith('"') && s.endsWith('"'))) {
    try { return JSON.parse(s); } catch(e) { return s.slice(1, -1); }
  }
  if (s.startsWith('[') && s.endsWith(']')) {
    const inner = s.slice(1, -1);
    return inner ? inner.split(',').map(x => parseTomlValue(x.trim())).filter(x => x !== '') : [];
  }
  return s;
}

let direction = 'json2toml';
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const error = document.getElementById('error');
  const output = document.getElementById('output');
  error.textContent = '';
  try {
    if (direction === 'json2toml') {
      const obj = JSON.parse(input);
      output.value = jsonToToml(obj, '').trim();
    } else {
      const obj = tomlToJson(input);
      output.value = JSON.stringify(obj, null, 2);
    }
  } catch(e) {
    error.textContent = 'Error: ' + e.message;
    output.value = '';
  }
}

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
convert();
</script>
</body>
</html>
