<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML to JSON Converter</title>
<meta name="description" content="Convert XML data to JSON format and back. Supports attributes, nested elements, arrays, and CDATA sections.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:680px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#111;color:#ccd;font-family:monospace;font-size:0.85rem;outline:none;resize:vertical;min-height:150px;margin-bottom:8px}
textarea:focus{border-color:#3b82f6}
.tabs{display:flex;gap:2px;margin-bottom:8px}
.tabs button{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;font-size:0.8rem;font-weight:600}
.tabs button.active{background:#161616;color:#fff;border-color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.error{color:#ef4444;font-size:0.85rem;margin-top:4px;min-height:20px}
</style>
</head>
<body>
<div class="container">
  <h1>XML to JSON Converter</h1>
  <p class="desc">Convert between XML and JSON formats</p>
  <div class="card">
    <div class="tabs">
      <button class="active" data-dir="xml2json">XML → JSON</button>
      <button data-dir="json2xml">JSON → XML</button>
    </div>
    <label>Input</label>
    <textarea id="input" rows="8" spellcheck="false"><root>
  <person id="1">
    <name>John</name>
    <age>30</age>
    <city>New York</city>
    <hobbies>
      <item>Reading</item>
      <item>Coding</item>
    </hobbies>
  </person>
  <person id="2">
    <name>Jane</name>
    <age>25</age>
    <city>London</city>
  </person>
</root></textarea>
    <label>Output</label>
    <textarea id="output" rows="8" readonly></textarea>
    <div class="error" id="error"></div>
    <div class="flex-center">
      <button id="convertBtn">Convert</button>
      <button id="copyBtn">Copy Output</button>
    </div>
  </div>
</div>
<script>
function xmlNodeToJson(node) {
  if (node.nodeType === 3) return node.textContent.trim();
  if (node.nodeType !== 1) return null;
  const children = Array.from(node.childNodes);
  const textOnly = children.every(c => c.nodeType === 3 || (c.nodeType === 1 && c.childNodes.length === 1 && c.childNodes[0].nodeType === 3));
  const obj = {};
  // Attributes
  if (node.attributes && node.attributes.length > 0) {
    obj['@attributes'] = {};
    for (const attr of node.attributes) {
      obj['@attributes'][attr.name] = attr.value;
    }
  }
  const elemChildren = children.filter(c => c.nodeType === 1);
  if (elemChildren.length === 0) {
    const text = node.textContent.trim();
    if (text) {
      if (obj['@attributes']) obj['#text'] = text;
      else return text;
    }
    return Object.keys(obj).length ? obj : '';
  }
  for (const child of elemChildren) {
    const tag = child.tagName;
    const val = xmlNodeToJson(child);
    if (obj[tag] === undefined) {
      obj[tag] = val;
    } else if (Array.isArray(obj[tag])) {
      obj[tag].push(val);
    } else {
      obj[tag] = [obj[tag], val];
    }
  }
  return obj;
}

function xmlToJson(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const err = doc.querySelector('parsererror');
  if (err) throw new Error(err.textContent);
  return xmlNodeToJson(doc.documentElement);
}

function escapeXml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function jsonToXml(obj, name) {
  if (obj === null || obj === undefined) return `<${name}/>`;
  if (typeof obj !== 'object') return `<${name}>${escapeXml(obj)}</${name}>`;
  if (Array.isArray(obj)) return obj.map(item => jsonToXml(item, name)).join('\n');
  let attrs = '';
  let content = '';
  const attrObj = obj['@attributes'];
  if (attrObj) {
    for (const [k, v] of Object.entries(attrObj)) attrs += ' ' + k + '="' + escapeXml(v) + '"';
  }
  const textContent = obj['#text'];
  const entries = Object.entries(obj).filter(([k]) => k !== '@attributes' && k !== '#text');
  if (entries.length === 0 && textContent !== undefined) {
    return `<${name}${attrs}>${escapeXml(textContent)}</${name}>`;
  }
  if (entries.length === 0) return `<${name}${attrs}/>`;
  content = entries.map(([k, v]) => jsonToXml(v, k)).join('\n');
  return `<${name}${attrs}>\n${content.replace(/^/gm, '  ')}\n</${name}>`;
}

let direction = 'xml2json';
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const error = document.getElementById('error');
  const output = document.getElementById('output');
  error.textContent = '';
  try {
    if (direction === 'xml2json') {
      const obj = xmlToJson(input);
      output.value = JSON.stringify(obj, null, 2);
    } else {
      const obj = JSON.parse(input);
      const rootName = Object.keys(obj)[0] || 'root';
      output.value = '<?xml version="1.0" encoding="UTF-8"?>\n' + jsonToXml(obj[rootName], rootName);
    }
  } catch(e) {
    error.textContent = 'Error: ' + e.message;
    output.value = '';
  }
}

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
convert();
</script>
</body>
</html>
