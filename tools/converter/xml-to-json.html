button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}

<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_xml_to_json_converter" ti="h1_xml_to_json_converter">XML to JSON Converter</h1>
  <p class="desc" ti="subtitle_convert_between_xml_and_j">Convert between XML and JSON formats</p>
  <div class="card">
    <div class="tabs">
      <button class="active" data-dir="xml2json" ti="btn_xml_json">XML → JSON</button>
      <button data-dir="json2xml" ti="btn_json_xml">JSON → XML</button>
    </div>
    <label ti="label_input">Input</label>
    <textarea id="input" rows="8" spellcheck="false"><root>
  <person id="1">
    <name>John</name>
    <age>30</age>

</root></textarea>
    <label ti="label_output">Output</label>

    <div class="flex-center">

</div>

<script>var _LANG={'title_xml_to_json_converter':["XML to JSON Converter", "XML 转 JSON 转换器"],'metadesc_convert_xml_data_to_json':["Convert XML data to JSON format and back. Supports attributes, nested elements, arrays, and CDATA sections.", "将 XML 数据转换为 JSON 格式，反之亦然。支持属性、嵌套元素、数组和 CDATA 部分。"],'h1_xml_to_json_converter':["XML to JSON Converter", "XML 转 JSON 转换器"],'subtitle_convert_between_xml_and_j':["Convert between XML and JSON formats", "XML 和 JSON 格式之间的转换"],'btn_xml_json':["XML → JSON", "XML → JSON"],'btn_json_xml':["JSON → XML", "JSON → XML"],'btn_convert':["Convert", "转变"],'btn_copy_output':["Copy Output", "复制输出"],'label_input':["Input", "输入"],'label_output':["Output", "输出"],'jtc_error':["Error:", "错误："],'jtcpre_error':["Error: ", "错误："]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function xmlNodeToJson(node) {
  if (node.nodeType === 3) return node.textContent.trim();
  if (node.nodeType !== 1) return null;
  const children = Array.from(node.childNodes);
  const textOnly = children.every(c => c.nodeType === 3 || (c.nodeType === 1 && c.childNodes.length === 1 && c.childNodes[0].nodeType === 3));
  const obj = {};
  // Attributes
  if (node.attributes && node.attributes.length > 0) {
    obj['@attributes'] = {};
    for (const attr of node.attributes) {
      obj['@attributes'][attr.name] = attr.value;
    }
  }
  const elemChildren = children.filter(c => c.nodeType === 1);
  if (elemChildren.length === 0) {
    const text = node.textContent.trim();
    if (text) {
      if (obj['@attributes']) obj['#text'] = text;
      else return text;
    }
    return Object.keys(obj).length ? obj : '';
  }
  for (const child of elemChildren) {
    const tag = child.tagName;
    const val = xmlNodeToJson(child);
    if (obj[tag] === undefined) {
      obj[tag] = val;
    } else if (Array.isArray(obj[tag])) {
      obj[tag].push(val);
    } else {
      obj[tag] = [obj[tag], val];
    }
  }
  return obj;
}

function xmlToJson(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const err = doc.querySelector('parsererror');
  if (err) throw new Error(err.textContent);
  return xmlNodeToJson(doc.documentElement);
}

function escapeXml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function jsonToXml(obj, name) {
  if (obj === null || obj === undefined) return `<${name}/>`;
  if (typeof obj !== 'object') return `<${name}>${escapeXml(obj)}</${name}>`;
  if (Array.isArray(obj)) return obj.map(item => jsonToXml(item, name)).join('\n');
  let attrs = '';
  let content = '';
  const attrObj = obj['@attributes'];
  if (attrObj) {
    for (const [k, v] of Object.entries(attrObj)) attrs += ' ' + k + '="' + escapeXml(v) + '"';
  }
  const textContent = obj['#text'];
  const entries = Object.entries(obj).filter(([k]) => k !== '@attributes' && k !== '#text');
  if (entries.length === 0 && textContent !== undefined) {
    return `<${name}${attrs}>${escapeXml(textContent)}</${name}>`;
  }
  if (entries.length === 0) return `<${name}${attrs}/>`;
  content = entries.map(([k, v]) => jsonToXml(v, k)).join('\n');
  return `<${name}${attrs}>\n${content.replace(/^/gm, '  ')}\n</${name}>`;
}

let direction = 'xml2json';
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const error = document.getElementById('error');
  const output = document.getElementById('output');
  error.textContent = '';
  try {
    if (direction === 'xml2json') {
      const obj = xmlToJson(input);
      output.value = JSON.stringify(obj, null, 2);
    } else {
      const obj = JSON.parse(input);
      const rootName = Object.keys(obj)[0] || 'root';
      output.value = '<?xml version="1.0" encoding="UTF-8"?>\n' + jsonToXml(obj[rootName], rootName);
    }
  } catch(e) {
    error.textContent=T("jtcpre_error")+ e.message;
    output.value = '';
  }
}

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
convert();
</script>

if(typeof _LANG==='undefined'){_LANG={}}

});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
