<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percentage Calculator</title>
<meta name="description" content="Three-mode percentage calculator: what is X% of Y, X is what % of Y, and percentage increase/decrease.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:24px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:0.9rem;color:#4da6ff;margin-bottom:12px;font-weight:600}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.row label{color:#aaa;font-size:0.85rem}
input{padding:8px 12px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;width:100px}
input:focus{border-color:#3b82f6}
input.result-inp{color:#4da6ff;font-weight:600;background:#0d1520;border-color:#2a4a7a}
.inline-label{color:#888;font-size:0.9rem}
@media(max-width:480px){input{width:80px}}
</style>
</head>
<body>
<div class="container">
  <h1>Percentage Calculator</h1>
  <p class="desc">Three useful percentage calculations</p>

  <div class="card">
    <h2>What is X% of Y?</h2>
    <div class="row">
      <input type="number" id="pctX" value="15" placeholder="X">
      <span class="inline-label">% of</span>
      <input type="number" id="pctY" value="200" placeholder="Y">
      <span class="inline-label">=</span>
      <input type="text" id="pctResult" class="result-inp" readonly>
    </div>
  </div>

  <div class="card">
    <h2>X is what percent of Y?</h2>
    <div class="row">
      <input type="number" id="numX" value="30" placeholder="X">
      <span class="inline-label">is what % of</span>
      <input type="number" id="numY" value="150" placeholder="Y">
      <span class="inline-label">=</span>
      <input type="text" id="numResult" class="result-inp" readonly>
      <span class="inline-label">%</span>
    </div>
  </div>

  <div class="card">
    <h2>Percentage increase / decrease</h2>
    <div class="row">
      <span class="inline-label">From</span>
      <input type="number" id="incFrom" value="50" placeholder="From">
      <span class="inline-label">To</span>
      <input type="number" id="incTo" value="75" placeholder="To">
      <span class="inline-label">=</span>
      <input type="text" id="incResult" class="result-inp" readonly>
      <span class="inline-label">%</span>
    </div>
  </div>
</div>
<script>
['pctX','pctY'].forEach(id => document.getElementById(id).addEventListener('input', calcPct));
['numX','numY'].forEach(id => document.getElementById(id).addEventListener('input', calcNum));
['incFrom','incTo'].forEach(id => document.getElementById(id).addEventListener('input', calcInc));

function calcPct() {
  const x = parseFloat(document.getElementById('pctX').value);
  const y = parseFloat(document.getElementById('pctY').value);
  document.getElementById('pctResult').value = (isNaN(x)||isNaN(y)) ? '' : (x / 100 * y).toString();
}

function calcNum() {
  const x = parseFloat(document.getElementById('numX').value);
  const y = parseFloat(document.getElementById('numY').value);
  if (isNaN(x)||isNaN(y)||y===0) { document.getElementById('numResult').value = ''; return; }
  const r = 100 * x / y;
  document.getElementById('numResult').value = (isFinite(r) ? Math.round(r*100)/100 : '') + '';
}

function calcInc() {
  const f = parseFloat(document.getElementById('incFrom').value);
  const t = parseFloat(document.getElementById('incTo').value);
  if (isNaN(f)||isNaN(t)||f===0) { document.getElementById('incResult').value = ''; return; }
  const r = (t - f) / f * 100;
  document.getElementById('incResult').value = (isFinite(r) ? Math.round(r*100)/100 : '') + '';
}

calcPct(); calcNum(); calcInc();
</script>
</body>
</html>
