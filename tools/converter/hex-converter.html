<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Converter</title>
<meta name="description" content="Convert between hex and text/numbers. UTF-8, integers with configurable endianness and bit width.">
<link rel="canonical" href="https://yurukusa.github.io/hex-converter/">
<script type="application/ld+json">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:0.95rem;color:#ccc;margin-bottom:12px;font-weight:600}
textarea{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none;resize:vertical;font-family:monospace;min-height:80px}
textarea:focus{border-color:#3b82f6}
.output{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:10px;word-break:break-all;font-family:monospace;font-size:0.82rem;color:#10b981;cursor:pointer;min-height:40px;max-height:150px;overflow:auto}
.output:hover{border-color:#3b82f6}
.label{font-size:0.8rem;color:#888;margin-bottom:6px;font-weight:600}
select,input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none}
select:focus,input:focus{border-color:#3b82f6}
.opt-row{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
.opt-row > div{flex:1;min-width:120px}
.copy-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid #222;padding-bottom:4px}
.tab{padding:8px 16px;border-radius:8px 8px 0 0;border:1px solid transparent;background:none;color:#888;font-size:0.85rem;cursor:pointer;font-weight:600}
.tab.active{background:#161616;color:#fff;border-color:#222;border-bottom-color:#161616}
.tab:hover:not(.active){color:#ccc}
.panel{display:none}.panel.active{display:block}
@media(max-width:600px){h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="container">
<h1>Hex Converter</h1>
<p class="subtitle">Convert between hex, text, and numbers.</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('text')">Text ↔ Hex</button>
  <button class="tab" onclick="showTab('numbers')">Numbers ↔ Hex</button>
</div>

<div class="panel active" id="panel-text">
  <div class="card">
    <h3>Text to Hex</h3>
    <textarea id="textInput" placeholder="Enter text..." oninput="textToHex()">Hello World</textarea>
    <div class="label">Hex (click to copy)</div>
    <div class="output" id="textHexOut" onclick="copyVal('textHexOut')">—</div>
  </div>
  <div class="card">
    <h3>Hex to Text</h3>
    <textarea id="hexInput" placeholder="Enter hex (with or without spaces)..." oninput="hexToText()">48656c6c6f20576f726c64</textarea>
    <div class="label">Text (click to copy)</div>
    <div class="output" id="hexTextOut" onclick="copyVal('hexTextOut')">—</div>
  </div>
</div>

<div class="panel" id="panel-numbers">
  <div class="card">
    <h3>Numbers to Hex</h3>
    <textarea id="numInput" placeholder="Space-separated numbers (e.g. 255 128 0 42)..." oninput="numsToHex()">255 128 0 42</textarea>
    
    <div class="opt-row">
      <div><div class="label">Bit Width</div><select id="numBits" onchange="numsToHex()"><option value="8">8</option><option value="16">16</option><option value="32" selected>32</option><option value="64">64</option></select></div>
      <div><div class="label">Signed</div><select id="numSigned" onchange="numsToHex()"><option value="0" selected>Unsigned</option><option value="1">Signed</option></select></div>
      <div><div class="label">Endianness</div><select id="numEndian" onchange="numsToHex()"><option value="0" selected>Little Endian</option><option value="1">Big Endian</option></select></div>
    </div>
    
    <div class="label">Hex (click to copy)</div>
    <div class="output" id="numHexOut" onclick="copyVal('numHexOut')">—</div>
  </div>
  
  <div class="card">
    <h3>Hex to Numbers</h3>
    <textarea id="numHexInput" placeholder="Enter hex..." oninput="hexToNums()">ff80002a</textarea>
    
    <div class="opt-row">
      <div><div class="label">Bit Width</div><select id="hexBits" onchange="hexToNums()"><option value="8">8</option><option value="16">16</option><option value="32" selected>32</option><option value="64">64</option></select></div>
      <div><div class="label">Signed</div><select id="hexSigned" onchange="hexToNums()"><option value="0" selected>Unsigned</option><option value="1">Signed</option></select></div>
      <div><div class="label">Endianness</div><select id="hexEndian" onchange="hexToNums()"><option value="0" selected>Little Endian</option><option value="1">Big Endian</option></select></div>
      <div><div class="label">Output Format</div><select id="hexOutFormat" onchange="hexToNums()"><option value="dec">Decimal</option><option value="hex">Hexadecimal</option><option value="bin">Binary</option></select></div>
    </div>
    
    <div class="label">Numbers (click to copy)</div>
    <div class="output" id="hexNumOut" onclick="copyVal('hexNumOut')">—</div>
  </div>
</div>

<footer>
  <p><a href="https://github.com/yurukusa/dev-toolkit">GitHub</a></p>
</footer>
</div>

<script>
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[onclick*="' + name + '"]').classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// Text <-> Hex
function textToHex() {
  const text = document.getElementById('textInput').value;
  const out = document.getElementById('textHexOut');
  if (!text) { out.textContent = '—'; return; }
  const bytes = new TextEncoder().encode(text);
  out.textContent = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

function hexToText() {
  const hex = document.getElementById('hexInput').value.replace(/\s+/g, '');
  const out = document.getElementById('hexTextOut');
  if (!hex) { out.textContent = '—'; return; }
  if (hex.length % 2 !== 0) { out.textContent = 'Invalid hex (odd length)'; return; }
  try {
    const bytes = new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
    out.textContent = new TextDecoder().decode(bytes);
  } catch(e) { out.textContent = 'Invalid hex'; }
}

// Numbers <-> Hex
function writeUInt(buf, val, bits, le) {
  for (let i = 0; i < bits/8; i++) {
    const shift = le ? i * 8 : (bits/8 - 1 - i) * 8;
    buf[i] = (val >> shift) & 0xff;
  }
}

function readUInt(buf, bits, le) {
  let val = 0;
  for (let i = 0; i < bits/8; i++) {
    const shift = le ? i * 8 : (bits/8 - 1 - i) * 8;
    val |= buf[i] << shift;
  }
  return val >>> 0;
}

function toSigned(val, bits) {
  if (val >= Math.pow(2, bits-1)) return val - Math.pow(2, bits);
  return val;
}

function fromSigned(val, bits) {
  if (val < 0) return val + Math.pow(2, bits);
  return val;
}

function numsToHex() {
  const input = document.getElementById('numInput').value.trim();
  const bits = parseInt(document.getElementById('numBits').value);
  const signed = parseInt(document.getElementById('numSigned').value);
  const le = parseInt(document.getElementById('numEndian').value) === 0;
  const out = document.getElementById('numHexOut');
  
  if (!input) { out.textContent = '—'; return; }
  
  const nums = input.split(/\s+/).map(Number);
  const byteLen = bits / 8;
  const buf = new Uint8Array(nums.length * byteLen);
  
  try {
    nums.forEach((n, i) => {
      let v = signed ? fromSigned(n, bits) : n;
      if (v < 0 || v >= Math.pow(2, bits)) throw new Error('Value out of range');
      writeUInt(buf.subarray(i * byteLen), v, bits, le);
    });
    out.textContent = Array.from(buf).map(b => b.toString(16).padStart(2, '0')).join('');
  } catch(e) {
    out.textContent = 'Error: ' + e.message;
  }
}

function hexToNums() {
  const hex = document.getElementById('numHexInput').value.replace(/\s+/g, '');
  const bits = parseInt(document.getElementById('hexBits').value);
  const signed = parseInt(document.getElementById('hexSigned').value);
  const le = parseInt(document.getElementById('hexEndian').value) === 0;
  const format = document.getElementById('hexOutFormat').value;
  const out = document.getElementById('hexNumOut');
  
  if (!hex) { out.textContent = '—'; return; }
  if (hex.length % 2 !== 0) { out.textContent = 'Invalid hex (odd length)'; return; }
  
  try {
    const bytes = new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
    const byteLen = bits / 8;
    if (bytes.length % byteLen !== 0) { out.textContent = 'Data length must be multiple of ' + byteLen + ' bytes'; return; }
    
    const nums = [];
    for (let i = 0; i < bytes.length; i += byteLen) {
      let val = readUInt(bytes.subarray(i), bits, le);
      if (signed) val = toSigned(val, bits);
      if (format === 'hex') nums.push('0x' + val.toString(16));
      else if (format === 'bin') nums.push('0b' + val.toString(2));
      else nums.push(val);
    }
    out.textContent = nums.join(' ');
  } catch(e) {
    out.textContent = 'Error: ' + e.message;
  }
}

function copyVal(id) {
  const val = document.getElementById(id).textContent;
  if (!val || val === '—') return;
  navigator.clipboard.writeText(val).then(() => {
    const t = document.createElement('div');
    t.className = 'copy-toast';
    t.textContent = 'Copied!';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1500);
  });
}

// Trigger initial calculations
textToHex();
hexToText();
numsToHex();
hexToNums();
</script>
</body>
</html>
