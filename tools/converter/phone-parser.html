<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Number Parser</title>
<meta name="description" content="Parse and format international phone numbers. Detect country, type, and format in E.164, International, National, and RFC3966.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:#3b82f6}
table{width:100%;border-collapse:collapse;margin-top:8px}
td{padding:8px 10px;border-bottom:1px solid #222;font-size:0.85rem}
td:first-child{color:#888;font-weight:600;width:40%}
td:last-child{color:#e6e6e6;font-family:monospace}
</style>
</head>
<body>
<div class="container">
  <h1>Phone Number Parser</h1>
  <p class="desc">Parse, validate, and format international phone numbers</p>
  <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.11.20/bundle/libphonenumber-max.js"></script>
  <div class="card">
    <label>Default country code</label>
    <select id="countryCode">
      <option value="FR">France (+33)</option>
      <option value="US">United States (+1)</option>
      <option value="GB">United Kingdom (+44)</option>
      <option value="DE">Germany (+49)</option>
      <option value="CN">China (+86)</option>
      <option value="JP">Japan (+81)</option>
      <option value="KR">South Korea (+82)</option>
      <option value="RU">Russia (+7)</option>
      <option value="BR">Brazil (+55)</option>
      <option value="IN">India (+91)</option>
      <option value="AU">Australia (+61)</option>
      <option value="CA">Canada (+1)</option>
    </select>
    <label>Phone number</label>
    <input type="text" id="phoneInput" placeholder="Enter a phone number..." value="" spellcheck="false">
    <div id="phoneInfo"></div>
  </div>
</div>
<script>
const typeLabels = {
  MOBILE: 'Mobile', FIXED_LINE: 'Fixed line', 'FIXED_LINE_OR_MOBILE': 'Fixed line or mobile',
  PERSONAL_NUMBER: 'Personal number', PREMIUM_RATE: 'Premium rate', SHARED_COST: 'Shared cost',
  TOLL_FREE: 'Toll free', UAN: 'Universal access number', VOICEMAIL: 'Voicemail', VOIP: 'VoIP', PAGER: 'Pager'
};

function update() {
  const raw = document.getElementById('phoneInput').value;
  const country = document.getElementById('countryCode').value;
  const info = document.getElementById('phoneInfo');

  if (!raw) { info.innerHTML = ''; return; }

  try {
    const parsed = libphonenumber.parsePhoneNumber(raw, country);
    if (!parsed) { info.innerHTML = '<table><tr><td colspan="2" style="color:#f87171">Unable to parse this number</td></tr></table>'; return; }

    info.innerHTML = `
      <table>
        <tr><td>Country</td><td>${parsed.country || 'Unknown'}</td></tr>
        <tr><td>Calling code</td><td>+${parsed.countryCallingCode}</td></tr>
        <tr><td>Valid?</td><td style="color:${parsed.isValid() ? '#34d399' : '#f87171'}">${parsed.isValid() ? 'Yes' : 'No'}</td></tr>
        <tr><td>Possible?</td><td style="color:${parsed.isPossible() ? '#34d399' : '#f87171'}">${parsed.isPossible() ? 'Yes' : 'No'}</td></tr>
        <tr><td>Type</td><td>${typeLabels[parsed.getType()] || 'Unknown'}</td></tr>
        <tr><td>International</td><td>${parsed.formatInternational()}</td></tr>
        <tr><td>National</td><td>${parsed.formatNational()}</td></tr>
        <tr><td>E.164</td><td>${parsed.format('E.164')}</td></tr>
        <tr><td>RFC3966</td><td>${parsed.format('RFC3966')}</td></tr>
      </table>`;
  } catch(e) {
    info.innerHTML = '<table><tr><td colspan="2" style="color:#f87171">Invalid phone number</td></tr></table>';
  }
}

document.getElementById('phoneInput').addEventListener('input', update);
document.getElementById('countryCode').addEventListener('change', update);
</script>
</body>
</html>
