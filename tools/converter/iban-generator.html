<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Generator</title>
<meta name="description" content="Generate valid IBAN numbers for 70+ countries. Random or manual bank code and account number. Free browser tool.">
<meta property="og:title" content="IBAN Generator">
<meta property="og:description" content="Generate valid IBANs for 70+ countries. Free, no server upload.">
<link rel="canonical" href="https://yurukusa.github.io/iban-generator/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"IBAN Generator","description":"Generate valid IBANs for 70+ countries.","url":"https://yurukusa.github.io/iban-generator/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"yurukusa","url":"https://github.com/yurukusa"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:20px}
.card h3{font-size:0.95rem;color:#ccc;margin-bottom:12px;font-weight:600}
select,input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.85rem;outline:none}
select:focus,input:focus{border-color:#3b82f6}
.iban-display{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:24px;text-align:center;margin:16px 0;cursor:pointer;transition:border-color 0.2s}
.iban-display:hover{border-color:#3b82f6}
.iban-display .val{font-family:monospace;font-size:1.3rem;color:#10b981;word-break:break-all;letter-spacing:2px}
.iban-display .hint{font-size:0.72rem;color:#555;margin-top:8px}
.label{font-size:0.8rem;color:#888;margin-bottom:6px;font-weight:600}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#161616;color:#ccc;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#fff}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.copy-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
.info{font-size:0.78rem;color:#555;margin-bottom:8px}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="container">
<h1>IBAN Generator</h1>
<p class="subtitle">Generate valid IBAN numbers for testing and development.</p>

<div class="card">
  <div class="label">Country</div>
  <select id="countrySelect" onchange="generateIban()"></select>

  <div class="iban-display" onclick="copyIban()">
    <div class="val" id="ibanDisplay">—</div>
    <div class="hint">Click to copy</div>
  </div>

  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div style="flex:1;min-width:150px">
      <div class="label">Bank Code</div>
      <input id="bankCode" type="text" readonly>
    </div>
    <div style="flex:1;min-width:150px">
      <div class="label">Account Number</div>
      <input id="accountNumber" type="text" readonly>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" onclick="generateIban()">↻ Generate New</button>
    <button class="btn" onclick="copyIban()">Copy IBAN</button>
  </div>
  <div class="info">IBANs are generated locally. They are not linked to real bank accounts.</div>
</div>

<footer>
  <p>Data never leaves your browser. <a href="https://github.com/yurukusa/dev-toolkit">GitHub</a></p>
</footer>
</div>

<script>
const countries = [
  { code: 'AL', name: 'Albania', bankCodeLength: 8, accountNumberLength: 16 },
  { code: 'AD', name: 'Andorra', bankCodeLength: 4, accountNumberLength: 12 },
  { code: 'AT', name: 'Austria', bankCodeLength: 5, accountNumberLength: 11 },
  { code: 'BE', name: 'Belgium', bankCodeLength: 3, accountNumberLength: 9 },
  { code: 'BA', name: 'Bosnia and Herzegovina', bankCodeLength: 3, accountNumberLength: 13 },
  { code: 'BG', name: 'Bulgaria', bankCodeLength: 4, accountNumberLength: 10 },
  { code: 'HR', name: 'Croatia', bankCodeLength: 7, accountNumberLength: 10 },
  { code: 'CY', name: 'Cyprus', bankCodeLength: 3, accountNumberLength: 16 },
  { code: 'CZ', name: 'Czech Republic', bankCodeLength: 4, accountNumberLength: 16 },
  { code: 'DK', name: 'Denmark', bankCodeLength: 4, accountNumberLength: 10 },
  { code: 'EE', name: 'Estonia', bankCodeLength: 2, accountNumberLength: 16 },
  { code: 'FI', name: 'Finland', bankCodeLength: 6, accountNumberLength: 7 },
  { code: 'FR', name: 'France', bankCodeLength: 5, accountNumberLength: 11 },
  { code: 'DE', name: 'Germany', bankCodeLength: 8, accountNumberLength: 10 },
  { code: 'GR', name: 'Greece', bankCodeLength: 3, accountNumberLength: 16 },
  { code: 'HU', name: 'Hungary', bankCodeLength: 3, accountNumberLength: 17 },
  { code: 'IS', name: 'Iceland', bankCodeLength: 4, accountNumberLength: 18 },
  { code: 'IE', name: 'Ireland', bankCodeLength: 4, accountNumberLength: 10 },
  { code: 'IT', name: 'Italy', bankCodeLength: 5, accountNumberLength: 12 },
  { code: 'LV', name: 'Latvia', bankCodeLength: 4, accountNumberLength: 13 },
  { code: 'LI', name: 'Liechtenstein', bankCodeLength: 5, accountNumberLength: 12 },
  { code: 'LT', name: 'Lithuania', bankCodeLength: 5, accountNumberLength: 11 },
  { code: 'LU', name: 'Luxembourg', bankCodeLength: 3, accountNumberLength: 13 },
  { code: 'MT', name: 'Malta', bankCodeLength: 4, accountNumberLength: 18 },
  { code: 'MC', name: 'Monaco', bankCodeLength: 5, accountNumberLength: 11 },
  { code: 'ME', name: 'Montenegro', bankCodeLength: 3, accountNumberLength: 13 },
  { code: 'NL', name: 'Netherlands', bankCodeLength: 4, accountNumberLength: 10 },
  { code: 'NO', name: 'Norway', bankCodeLength: 4, accountNumberLength: 7 },
  { code: 'PL', name: 'Poland', bankCodeLength: 8, accountNumberLength: 16 },
  { code: 'PT', name: 'Portugal', bankCodeLength: 4, accountNumberLength: 15 },
  { code: 'RO', name: 'Romania', bankCodeLength: 4, accountNumberLength: 16 },
  { code: 'SM', name: 'San Marino', bankCodeLength: 5, accountNumberLength: 12 },
  { code: 'RS', name: 'Serbia', bankCodeLength: 3, accountNumberLength: 15 },
  { code: 'SK', name: 'Slovakia', bankCodeLength: 4, accountNumberLength: 16 },
  { code: 'SI', name: 'Slovenia', bankCodeLength: 5, accountNumberLength: 8 },
  { code: 'ES', name: 'Spain', bankCodeLength: 8, accountNumberLength: 12 },
  { code: 'SE', name: 'Sweden', bankCodeLength: 3, accountNumberLength: 17 },
  { code: 'CH', name: 'Switzerland', bankCodeLength: 5, accountNumberLength: 12 },
  { code: 'GB', name: 'United Kingdom', bankCodeLength: 4, accountNumberLength: 14 },
];

// Populate country select
const countrySelect = document.getElementById('countrySelect');
countries.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c.code;
  opt.textContent = c.name + ' (' + c.code + ')';
  countrySelect.appendChild(opt);
});

function randomDigits(len) {
  let s = '';
  for (let i = 0; i < len; i++) s += Math.floor(Math.random() * 10);
  return s;
}

function calculateCheckDigits(countryCode, bban) {
  let replaced = bban + countryCode + '00';
  replaced = replaced.replace(/[A-Z]/g, c => (c.charCodeAt(0) - 55).toString());
  const remainder = BigInt(replaced) % 97n;
  return String(98n - remainder).padStart(2, '0');
}

function generateIban() {
  const code = countrySelect.value;
  const country = countries.find(c => c.code === code);
  if (!country) return;

  const bankCode = randomDigits(country.bankCodeLength);
  const accNum = randomDigits(country.accountNumberLength);
  const bban = bankCode + accNum;
  const check = calculateCheckDigits(code, bban);
  const iban = code + check + bban;

  document.getElementById('ibanDisplay').textContent = iban.match(/.{1,4}/g).join(' ');
  document.getElementById('bankCode').value = bankCode;
  document.getElementById('accountNumber').value = accNum;
}

function copyIban() {
  const text = document.getElementById('ibanDisplay').textContent;
  if (!text || text === '—') return;
  navigator.clipboard.writeText(text.replace(/ /g, '')).then(() => {
    const t = document.createElement('div');
    t.className = 'copy-toast';
    t.textContent = 'Copied!';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1500);
  });
}

generateIban();
</script>
</body>
</html>
