<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safelink Decoder</title>
<meta name="description" content="Decode Microsoft Defender, Google Safe Browsing, and other URL protection safelinks to reveal the original destination URL.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:640px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.85rem;outline:none;resize:vertical;min-height:80px;font-family:monospace;margin-bottom:12px}
textarea:focus{border-color:#3b82f6}
.result-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:14px;margin-bottom:10px;word-break:break-all}
.result-box .label{color:#888;font-size:0.8rem;margin-bottom:4px}
.result-box .url{color:#4da6ff;font-size:0.9rem;font-family:monospace}
.result-box .raw{color:#666;font-size:0.8rem;margin-top:4px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px}
</style>
</head>
<body>
<div class="container">
  <h1>Safelink Decoder</h1>
  <p class="desc">Decode protected URLs from Microsoft Defender, Google, and other safelink services</p>
  <div class="card">
    <label>Paste a safelink URL or raw encoded URL</label>
    <textarea id="input" rows="4" spellcheck="false">https://nam12.safelinks.protection.outlook.com/?url=https%3A%2F%2Fexample.com%2Fpage%3Fq%3Dtest&amp;data=05%7C02%7C</textarea>
    <div id="results"></div>
    <div class="flex-center">
      <button id="decodeBtn">Decode</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>
</div>
<script>
function decodeSafelink(url) {
  const results = [];
  
  // Extract URL parameter from various safelink formats
  let decoded = url;
  
  // Try to extract from Microsoft Defender safelinks
  try {
    const parsed = new URL(url);
    if (parsed.hostname.includes('safelinks.protection.outlook.com')) {
      const u = parsed.searchParams.get('url');
      if (u) {
        decoded = decodeURIComponent(u);
        results.push({ service: 'Microsoft Defender', url: decoded, raw: url });
      }
    }
    // Google safelinks
    else if (parsed.hostname.includes('google.com') || parsed.hostname.includes('googleapis.com')) {
      const u = parsed.searchParams.get('url') || parsed.searchParams.get('q') || parsed.searchParams.get('continue');
      if (u) {
        decoded = decodeURIComponent(u);
        results.push({ service: 'Google', url: decoded, raw: url });
      }
    }
    // Generic URL-encoded safelink
    else if (url.includes('%')) {
      const decodedUrl = decodeURIComponent(url);
      if (decodedUrl !== url && decodedUrl.startsWith('http')) {
        results.push({ service: 'URL-encoded', url: decodedUrl, raw: url });
        decoded = decodedUrl;
      }
    }
    
    // If no specific service detected but URL is encoded
    if (results.length === 0 && url.includes('%')) {
      const decodedUrl = decodeURIComponent(url);
      if (decodedUrl !== url) {
        results.push({ service: 'URL-encoded', url: decodedUrl, raw: url });
        decoded = decodedUrl;
      }
    }
    
 // Detect if there's still a secondary safelink in the decoded URL
    if (results.length > 0) {
      const lastResult = results[results.length - 1];
      if (lastResult.url.includes('%')) {
        const doubleDecoded = decodeURIComponent(lastResult.url);
        if (doubleDecoded !== lastResult.url && doubleDecoded.startsWith('http')) {
          results.push({ service: 'Double-encoded', url: doubleDecoded, raw: lastResult.url });
        }
      }
    }
  } catch(e) {
    // URL parsing failed
  }
  
  return results.length > 0 ? results : [{ service: 'Raw URL', url: url, raw: url }];
}

function decode() {
  const input = document.getElementById('input').value.trim();
  const container = document.getElementById('results');
  container.innerHTML = '';
  if (!input) return;

  const results = decodeSafelink(input);
  container.innerHTML = results.map((r, i) => `
    <div class="result-box">
      <div class="label">${r.service} ${i > 0 ? '(recursed)' : ''}</div>
      <div class="url">${r.url}</div>
      ${r.raw !== r.url ? `<div class="raw">Original: ${r.raw}</div>` : ''}
    </div>
  `).join('');
}

document.getElementById('decodeBtn').addEventListener('click', decode);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('input').value = '';
  document.getElementById('results').innerHTML = '';
});
// Auto-decode on input
document.getElementById('input').addEventListener('input', decode);
</script>
</body>
</html>
