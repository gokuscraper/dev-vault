<script>
function decodeSafelink(url) {
  const results = [];
  
  // Extract URL parameter from various safelink formats
  let decoded = url;
  
  // Try to extract from Microsoft Defender safelinks
  try {
    const parsed = new URL(url);
    if (parsed.hostname.includes('safelinks.protection.outlook.com')) {
      const u = parsed.searchParams.get('url');
      if (u) {
        decoded = decodeURIComponent(u);
        results.push({ service: 'Microsoft Defender', url: decoded, raw: url });
      }
    }
    // Google safelinks
    else if (parsed.hostname.includes('google.com') || parsed.hostname.includes('googleapis.com')) {
      const u = parsed.searchParams.get('url') || parsed.searchParams.get('q') || parsed.searchParams.get('continue');
      if (u) {
        decoded = decodeURIComponent(u);
        results.push({ service: 'Google', url: decoded, raw: url });
      }
    }
    // Generic URL-encoded safelink
    else if (url.includes('%')) {
      const decodedUrl = decodeURIComponent(url);
      if (decodedUrl !== url && decodedUrl.startsWith('http')) {
        results.push({ service: 'URL-encoded', url: decodedUrl, raw: url });
        decoded = decodedUrl;
      }
    }
    
    // If no specific service detected but URL is encoded
    if (results.length === 0 && url.includes('%')) {
      const decodedUrl = decodeURIComponent(url);
      if (decodedUrl !== url) {
        results.push({ service: 'URL-encoded', url: decodedUrl, raw: url });
        decoded = decodedUrl;
      }
    }
    
 // Detect if there's still a secondary safelink in the decoded URL
    if (results.length > 0) {
      const lastResult = results[results.length - 1];
      if (lastResult.url.includes('%')) {
        const doubleDecoded = decodeURIComponent(lastResult.url);
        if (doubleDecoded !== lastResult.url && doubleDecoded.startsWith('http')) {
          results.push({ service: 'Double-encoded', url: doubleDecoded, raw: lastResult.url });
        }
      }
    }
  } catch(e) {
    // URL parsing failed
  }
  
  return results.length > 0 ? results : [{ service: 'Raw URL', url: url, raw: url }];
}

function decode() {
  const input = document.getElementById('input').value.trim();
  const container = document.getElementById('results');
  container.innerHTML = '';
  if (!input) return;

  const results = decodeSafelink(input);
  container.innerHTML = results.map((r, i) => `
    <div class="result-box">
      <div class="label">${r.service} ${i > 0 ? '(recursed)' : ''}</div>
      <div class="url">${r.url}</div>
      ${r.raw !== r.url ? `<div class="raw">Original: ${r.raw}</div>` : ''}
    </div>
  `).join('');
}

document.getElementById('decodeBtn').addEventListener('click', decode);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('input').value = '';
  document.getElementById('results').innerHTML = '';
});
// Auto-decode on input
document.getElementById('input').addEventListener('input', decode);
</script>
