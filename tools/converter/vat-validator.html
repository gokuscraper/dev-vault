<style>

<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
<h1 ti="title_vat_validator" ti="h1_vat_validator">VAT Validator</h1>
<p class="subtitle" ti="subtitle_validate_european_vat_num">Validate European VAT numbers.</p>

<div class="card">
  <input id="vatInput" type="text" tp="placeholder_enter_vat_number_e_g_be04" placeholder="Enter VAT number (e.g. BE0411905847)" value="BE0411905847" oninput="validate()" style="text-transform:uppercase">
  
  <div id="result" class="result" style="margin-top:14px">Checking...</div>

<script>var _LANG={'title_vat_validator':["VAT Validator", "增值税验证器"],'metadesc_validate_european_vat_num':["Validate European VAT numbers for all 27 EU countries. Check format, country, and structure.", "验证欧盟27个成员国的欧洲增值税号。检查格式、国家/地区和结构。"],'h1_vat_validator':["VAT Validator", "增值税验证器"],'subtitle_validate_european_vat_num':["Validate European VAT numbers.", "验证欧洲增值税号。"],'placeholder_enter_vat_number_e_g_be04':["Enter VAT number (e.g. BE0411905847)", "请输入增值税号（例如 BE0411905847）"],'link_github':["GitHub", "GitHub"],'jtc_enter_a_vat_number':["Enter a VAT number", "请输入增值税号"],'jtc_unknown_country_code':["✗ Unknown country code:", "✗ 未知国家代码："],'jtc_valid':["✓ Valid", "✓ 有效"],'jtc_invalid_format_for':["✗ Invalid format for", "✗ 格式无效"],'jtcpre_unknown_country_code':["✗ Unknown country code: ", "✗ 未知国家代码："],'jtcpre_valid':["✓ Valid ", "✓ 有效"],'jtcpre_invalid_format_for':["✗ Invalid format for ", "✗ 格式无效"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
// EU VAT validation rules for all 27 member states
const vatRules = {
  AT: { name: 'Austria', regex: /^ATU\d{8}$/, format: 'ATU########' },
  BE: { name: 'Belgium', regex: /^BE0?\d{9}$/, format: 'BE0#########' },
  BG: { name: 'Bulgaria', regex: /^BG\d{9,10}$/, format: 'BG##########' },
  CY: { name: 'Cyprus', regex: /^CY\d{8}[A-Z]$/, format: 'CY########L' },
  CZ: { name: 'Czech Republic', regex: /^CZ\d{8,10}$/, format: 'CZ##########' },
  DE: { name: 'Germany', regex: /^DE\d{9}$/, format: 'DE#########' },
  DK: { name: 'Denmark', regex: /^DK\d{8}$/, format: 'DK########' },
  EE: { name: 'Estonia', regex: /^EE\d{9}$/, format: 'EE#########' },
  EL: { name: 'Greece', regex: /^EL\d{9}$/, format: 'EL#########' },
  ES: { name: 'Spain', regex: /^ES[A-Z]\d{7}[A-Z]|\d{8}[A-Z]|[A-Z]\d{8}$/, format: 'ES########' },
  FI: { name: 'Finland', regex: /^FI\d{8}$/, format: 'FI########' },
  FR: { name: 'France', regex: /^FR[A-Z0-9]{2}\d{9}$/, format: 'FRKK#########' },
  HR: { name: 'Croatia', regex: /^HR\d{11}$/, format: 'HR###########' },
  HU: { name: 'Hungary', regex: /^HU\d{8}$/, format: 'HU########' },
  IE: { name: 'Ireland', regex: /^IE\d[A-Z0-9+*]\d{5}[A-Z]$/, format: 'IE#L#####L' },
  IT: { name: 'Italy', regex: /^IT\d{11}$/, format: 'IT###########' },
  LT: { name: 'Lithuania', regex: /^LT\d{9,12}$/, format: 'LT###########' },
  LU: { name: 'Luxembourg', regex: /^LU\d{8}$/, format: 'LU########' },
  LV: { name: 'Latvia', regex: /^LV\d{11}$/, format: 'LV###########' },
  MT: { name: 'Malta', regex: /^MT\d{8}$/, format: 'MT########' },
  NL: { name: 'Netherlands', regex: /^NL[A-Z0-9+*]{12}\d{2}$/, format: 'NL###########' },
  PL: { name: 'Poland', regex: /^PL\d{10}$/, format: 'PL##########' },
  PT: { name: 'Portugal', regex: /^PT\d{9}$/, format: 'PT#########' },
  RO: { name: 'Romania', regex: /^RO\d{2,10}$/, format: 'RO##########' },
  SE: { name: 'Sweden', regex: /^SE\d{10}\d{2}$/, format: 'SE##########' },
  SI: { name: 'Slovenia', regex: /^SI\d{8}$/, format: 'SI########' },
  SK: { name: 'Slovakia', regex: /^SK\d{10}$/, format: 'SK##########' },
};

function validate() {
  const input = document.getElementById('vatInput').value.trim().toUpperCase();
  const result = document.getElementById('result');
  const infoGrid = document.getElementById('infoGrid');
  
  if (!input) {
    result.className = 'result';
    result.textContent=T("jtc_enter_a_vat_number");
    infoGrid.innerHTML = '';
    return;
  }
  
  const cc = input.substring(0, 2);
  const rule = vatRules[cc];
  
  if (!rule) {
    result.className = 'result invalid';
    result.textContent=T("jtcpre_unknown_country_code")+ cc;
    infoGrid.innerHTML = '';
    return;
  }
  
  const isValidFormat = rule.regex.test(input);
  
  if (isValidFormat) {
    result.className = 'result valid';
    result.textContent=T("jtcpre_valid")+ rule.name + ' VAT Number';
  } else {
    result.className = 'result invalid';
    result.textContent=T("jtcpre_invalid_format_for")+ rule.name;
  }
  
  infoGrid.innerHTML = [
    { label: 'Country', value: rule.name },
    { label: 'Country Code', value: cc },
    { label: 'Valid Format', value: isValidFormat ? 'Yes' : 'No' },
    { label: 'Expected Format', value: rule.format },
    { label: 'Length', value: input.length + ' chars' },
    { label: 'Clean Value', value: input },
  ].map(item => '<div class="info-item"><span class="lbl">' + item.label + '</span><span class="val">' + item.value + '</span></div>').join('');
}

validate();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
