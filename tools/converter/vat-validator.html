<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAT Validator</title>
<meta name="description" content="Validate European VAT numbers for all 27 EU countries. Check format, country, and structure.">
<link rel="canonical" href="https://gokuscraper.github.io/dev-vault/vat-validator/">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"VAT Validator","description":"Validate European VAT numbers for all 27 EU countries.","url":"https://gokuscraper.github.io/dev-vault/vat-validator/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"gokuscraper","url":"https://github.com/gokuscraper"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}
.card{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:0.95rem;color:#ccc;margin-bottom:12px;font-weight:600}
input{width:100%;padding:14px 16px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:1.1rem;outline:none;font-family:monospace;letter-spacing:1px}
input:focus{border-color:#3b82f6}
.result{padding:16px;border-radius:10px;margin-bottom:12px;font-weight:600;font-size:1rem}
.valid{background:#0a2e1a;border:1px solid #10b981;color:#10b981}
.invalid{background:#2e0a0a;border:1px solid #ef4444;color:#ef4444}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.info-item{font-size:0.82rem;padding:8px 10px;background:#0d0d0d;border:1px solid #222;border-radius:6px;display:flex;justify-content:space-between}
.info-item .lbl{color:#888}
.info-item .val{color:#ddd;font-weight:600}
.label{font-size:0.8rem;color:#888;margin-bottom:6px;font-weight:600}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){h1{font-size:1.4rem}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>VAT Validator</h1>
<p class="subtitle">Validate European VAT numbers.</p>

<div class="card">
  <input id="vatInput" type="text" placeholder="Enter VAT number (e.g. BE0411905847)" value="BE0411905847" oninput="validate()" style="text-transform:uppercase">
  
  <div id="result" class="result" style="margin-top:14px">Checking...</div>
  <div class="info-grid" id="infoGrid"></div>
  <div style="margin-top:12px;font-size:0.78rem;color:#555">Format: CC + VAT number (country code + numbers, may include letters)</div>
</div>

<footer>
  <p><a href="https://github.com/gokuscraper/dev-toolkit">GitHub</a></p>
</footer>
</div>

<script>
// EU VAT validation rules for all 27 member states
const vatRules = {
  AT: { name: 'Austria', regex: /^ATU\d{8}$/, format: 'ATU########' },
  BE: { name: 'Belgium', regex: /^BE0?\d{9}$/, format: 'BE0#########' },
  BG: { name: 'Bulgaria', regex: /^BG\d{9,10}$/, format: 'BG##########' },
  CY: { name: 'Cyprus', regex: /^CY\d{8}[A-Z]$/, format: 'CY########L' },
  CZ: { name: 'Czech Republic', regex: /^CZ\d{8,10}$/, format: 'CZ##########' },
  DE: { name: 'Germany', regex: /^DE\d{9}$/, format: 'DE#########' },
  DK: { name: 'Denmark', regex: /^DK\d{8}$/, format: 'DK########' },
  EE: { name: 'Estonia', regex: /^EE\d{9}$/, format: 'EE#########' },
  EL: { name: 'Greece', regex: /^EL\d{9}$/, format: 'EL#########' },
  ES: { name: 'Spain', regex: /^ES[A-Z]\d{7}[A-Z]|\d{8}[A-Z]|[A-Z]\d{8}$/, format: 'ES########' },
  FI: { name: 'Finland', regex: /^FI\d{8}$/, format: 'FI########' },
  FR: { name: 'France', regex: /^FR[A-Z0-9]{2}\d{9}$/, format: 'FRKK#########' },
  HR: { name: 'Croatia', regex: /^HR\d{11}$/, format: 'HR###########' },
  HU: { name: 'Hungary', regex: /^HU\d{8}$/, format: 'HU########' },
  IE: { name: 'Ireland', regex: /^IE\d[A-Z0-9+*]\d{5}[A-Z]$/, format: 'IE#L#####L' },
  IT: { name: 'Italy', regex: /^IT\d{11}$/, format: 'IT###########' },
  LT: { name: 'Lithuania', regex: /^LT\d{9,12}$/, format: 'LT###########' },
  LU: { name: 'Luxembourg', regex: /^LU\d{8}$/, format: 'LU########' },
  LV: { name: 'Latvia', regex: /^LV\d{11}$/, format: 'LV###########' },
  MT: { name: 'Malta', regex: /^MT\d{8}$/, format: 'MT########' },
  NL: { name: 'Netherlands', regex: /^NL[A-Z0-9+*]{12}\d{2}$/, format: 'NL###########' },
  PL: { name: 'Poland', regex: /^PL\d{10}$/, format: 'PL##########' },
  PT: { name: 'Portugal', regex: /^PT\d{9}$/, format: 'PT#########' },
  RO: { name: 'Romania', regex: /^RO\d{2,10}$/, format: 'RO##########' },
  SE: { name: 'Sweden', regex: /^SE\d{10}\d{2}$/, format: 'SE##########' },
  SI: { name: 'Slovenia', regex: /^SI\d{8}$/, format: 'SI########' },
  SK: { name: 'Slovakia', regex: /^SK\d{10}$/, format: 'SK##########' },
};

function validate() {
  const input = document.getElementById('vatInput').value.trim().toUpperCase();
  const result = document.getElementById('result');
  const infoGrid = document.getElementById('infoGrid');
  
  if (!input) {
    result.className = 'result';
    result.textContent = 'Enter a VAT number';
    infoGrid.innerHTML = '';
    return;
  }
  
  const cc = input.substring(0, 2);
  const rule = vatRules[cc];
  
  if (!rule) {
    result.className = 'result invalid';
    result.textContent = '✗ Unknown country code: ' + cc;
    infoGrid.innerHTML = '';
    return;
  }
  
  const isValidFormat = rule.regex.test(input);
  
  if (isValidFormat) {
    result.className = 'result valid';
    result.textContent = '✓ Valid ' + rule.name + ' VAT Number';
  } else {
    result.className = 'result invalid';
    result.textContent = '✗ Invalid format for ' + rule.name;
  }
  
  infoGrid.innerHTML = [
    { label: 'Country', value: rule.name },
    { label: 'Country Code', value: cc },
    { label: 'Valid Format', value: isValidFormat ? 'Yes' : 'No' },
    { label: 'Expected Format', value: rule.format },
    { label: 'Length', value: input.length + ' chars' },
    { label: 'Clean Value', value: input },
  ].map(item => '<div class="info-item"><span class="lbl">' + item.label + '</span><span class="val">' + item.value + '</span></div>').join('');
}

validate();
</script>
</body>
</html>
