<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<meta name="description" content="Convert between 8 temperature scales: Kelvin, Celsius, Fahrenheit, Rankine, Delisle, Newton, Réaumur, Rømer.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:24px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#161616;border:1px solid #222;border-radius:10px;padding:10px 14px}
.row label{color:#aaa;font-size:0.85rem;min-width:80px;font-weight:600}
.row input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none;min-width:0}
.row input:focus{border-color:#3b82f6}
.row .unit{color:#666;font-size:0.85rem;min-width:36px;text-align:right}
@media(max-width:400px){.row{flex-wrap:wrap}.row label{min-width:100%}}
</style>
</head>
<body>
<div class="container">
  <h1>Temperature Converter</h1>
  <p class="desc">Convert between 8 temperature scales — click any field to edit</p>
  <div id="rows"></div>
</div>
<script>
const scales = [
  { id:'kelvin',    title:'Kelvin',    unit:'K',   toK: v=>v,                                  fromK: v=>v },
  { id:'celsius',   title:'Celsius',   unit:'°C',  toK: v=>v + 273.15,                         fromK: v=>v - 273.15 },
  { id:'fahrenheit',title:'Fahrenheit',unit:'°F',  toK: v=>(v + 459.67) * 5/9,                 fromK: v=>v * 9/5 - 459.67 },
  { id:'rankine',   title:'Rankine',   unit:'°R',  toK: v=>v * 5/9,                            fromK: v=>v * 9/5 },
  { id:'delisle',   title:'Delisle',   unit:'°De', toK: v=>373.15 - 2/3 * v,                   fromK: v=>3/2 * (373.15 - v) },
  { id:'newton',    title:'Newton',    unit:'°N',  toK: v=>v * 100/33 + 273.15,                fromK: v=>(v - 273.15) * 33/100 },
  { id:'reaumur',   title:'Réaumur',   unit:'°Ré', toK: v=>v * 5/4 + 273.15,                   fromK: v=>(v - 273.15) * 4/5 },
  { id:'romer',     title:'Rømer',     unit:'°Rø', toK: v=>(v - 7.5) * 40/21 + 273.15,         fromK: v=>(v - 273.15) * 21/40 + 7.5 },
];

const container = document.getElementById('rows');
const inputs = {};

scales.forEach(s => {
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `<label>${s.title}</label><input type="number" id="inp_${s.id}" step="any" value="0"><span class="unit">${s.unit}</span>`;
  container.appendChild(div);
  const inp = div.querySelector('input');
  inputs[s.id] = inp;
  inp.addEventListener('input', () => update(s.id));
});

function update(srcId) {
  const src = scales.find(s => s.id === srcId);
  const raw = parseFloat(inputs[srcId].value);
  if (isNaN(raw)) return;
  const kelvin = src.toK(raw);
  scales.forEach(s => {
    if (s.id === srcId) return;
    const val = s.fromK(kelvin);
    const inp = inputs[s.id];
    if (document.activeElement !== inp) {
      inp.value = isFinite(val) ? Math.round(val * 100) / 100 : '';
    }
  });
}

update('kelvin');
</script>
</body>
</html>
