<style>

<script>

<script>
const scales = [
  { id:'kelvin',    title:'Kelvin',    unit:'K',   toK: v=>v,                                  fromK: v=>v },
  { id:'celsius',   title:'Celsius',   unit:'°C',  toK: v=>v + 273.15,                         fromK: v=>v - 273.15 },
  { id:'fahrenheit',title:'Fahrenheit',unit:'°F',  toK: v=>(v + 459.67) * 5/9,                 fromK: v=>v * 9/5 - 459.67 },
  { id:'rankine',   title:'Rankine',   unit:'°R',  toK: v=>v * 5/9,                            fromK: v=>v * 9/5 },
  { id:'delisle',   title:'Delisle',   unit:'°De', toK: v=>373.15 - 2/3 * v,                   fromK: v=>3/2 * (373.15 - v) },
  { id:'newton',    title:'Newton',    unit:'°N',  toK: v=>v * 100/33 + 273.15,                fromK: v=>(v - 273.15) * 33/100 },
  { id:'reaumur',   title:'Réaumur',   unit:'°Ré', toK: v=>v * 5/4 + 273.15,                   fromK: v=>(v - 273.15) * 4/5 },
  { id:'romer',     title:'Rømer',     unit:'°Rø', toK: v=>(v - 7.5) * 40/21 + 273.15,         fromK: v=>(v - 273.15) * 21/40 + 7.5 },
];

const container = document.getElementById('rows');
const inputs = {};

scales.forEach(s => {
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `<label ti="label_s_title" ti="label_s_title" ti="label_s_title">${s.title}</label><input type="number" id="inp_${s.id}" step="any" value="0"><span class="unit">${s.unit}</span>`;
  container.appendChild(div);
  const inp = div.querySelector('input');
  inputs[s.id] = inp;
  inp.addEventListener('input', () => update(s.id));
});

function update(srcId) {
  const src = scales.find(s => s.id === srcId);
  const raw = parseFloat(inputs[srcId].value);
  if (isNaN(raw)) return;
  const kelvin = src.toK(raw);
  scales.forEach(s => {
    if (s.id === srcId) return;
    const val = s.fromK(kelvin);
    const inp = inputs[s.id];
    if (document.activeElement !== inp) {
      inp.value = isFinite(val) ? Math.round(val * 100) / 100 : '';
    }
  });
}

update('kelvin');
</script>

})();
