<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Time Converter</title>
<meta name="description" content="Convert between date and time formats: Unix timestamp, ISO 8601, RFC 2822, UTC, local time, relative time, and more.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:600px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;margin-bottom:12px;font-family:monospace}
input:focus,select:focus{border-color:#3b82f6}
.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.output-item{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:12px}
.output-item .label{color:#888;font-size:0.75rem;margin-bottom:2px}
.output-item .value{color:#4da6ff;font-size:0.85rem;font-family:monospace;word-break:break-all;cursor:pointer}
.output-item .value:hover{color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>Date Time Converter</h1>
  <p class="desc">Convert between date and time formats</p>
  <div class="card">
    <label>Input format</label>
    <select id="inFmt">
      <option value="datetime-local">Local date & time</option>
      <option value="unix">Unix timestamp (seconds)</option>
      <option value="unix-ms">Unix timestamp (milliseconds)</option>
      <option value="iso">ISO 8601</option>
      <option value="rfc">RFC 2822</option>
    </select>
    <input type="text" id="input" value="2026-07-09T12:00:00" spellcheck="false">
    <div class="output-grid" id="outputs"></div>
    <div class="flex-center">
      <button id="nowBtn">Now</button>
    </div>
  </div>
</div>
<script>
function parseDate(text, fmt) {
  switch(fmt) {
    case 'datetime-local': return new Date(text);
    case 'unix': return new Date(parseInt(text) * 1000);
    case 'unix-ms': return new Date(parseInt(text));
    case 'iso': return new Date(text);
    case 'rfc': return new Date(text);
    default: return new Date(text);
  }
}

function formatDate(d) {
  if (isNaN(d.getTime())) return { error: 'Invalid date' };
  return {
    'Unix timestamp (s)': Math.floor(d.getTime() / 1000).toString(),
    'Unix timestamp (ms)': d.getTime().toString(),
    'ISO 8601': d.toISOString(),
    'RFC 2822': d.toUTCString().replace('GMT', 'UTC'),
    'Local date': d.toLocaleDateString(),
    'Local time': d.toLocaleTimeString(),
    'Local string': d.toLocaleString(),
    'Date (YYYY-MM-DD)': d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
    'Time (HH:mm:ss)': String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0'),
    'UTC date': d.toUTCString(),
  };
}

function update() {
  const input = document.getElementById('input').value;
  const fmt = document.getElementById('inFmt').value;
  const d = parseDate(input, fmt);
  const grid = document.getElementById('outputs');
  const data = formatDate(d);
  if (data.error) {
    grid.innerHTML = `<div class="output-item" style="grid-column:1/-1"><div class="value" style="color:#ef4444">${data.error}</div></div>`;
    return;
  }
  grid.innerHTML = Object.entries(data).map(([k, v]) => `
    <div class="output-item">
      <div class="label">${k}</div>
      <div class="value" onclick="navigator.clipboard.writeText(this.textContent)">${v}</div>
    </div>
  `).join('');
}

document.getElementById('input').addEventListener('input', update);
document.getElementById('inFmt').addEventListener('change', update);
document.getElementById('nowBtn').addEventListener('click', () => {
  document.getElementById('inFmt').value = 'datetime-local';
  const now = new Date();
  const s = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  document.getElementById('input').value = s;
  update();
});
update();
</script>
</body>
</html>
