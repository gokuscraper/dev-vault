<!DOCTYPE html>
<html tk="title_email_normalizer" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Normalizer</title>
<meta name="description" content="Normalize email addresses by removing dots, plus aliasing, and domain case. Paste multiple emails (one per line) to normalize them all at once.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none;font-family:monospace;resize:vertical;min-height:80px}
textarea:focus{border-color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button:disabled{opacity:.4;cursor:default}
button.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
button.primary:hover{background:#2563eb}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:12px}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_email_normalizer" ti="h1_email_normalizer">Email Normalizer</h1>
  <p class="desc" ti="subtitle_normalize_email_addresses">Normalize email addresses — remove dots, plus aliasing, and domain case</p>
  <script src="https://cdn.jsdelivr.net/npm/email-normalizer@1.3.0/dist/email-normalizer.umd.js"></script>
  <div class="card">
    <label ti="label_raw_emails_one_per_line">Raw emails (one per line)</label>
    <textarea id="rawEmails" rows="5" spellcheck="false">John.Doe+spam@GMAIL.com
ALICE.SMITH@outlook.com
bob+test@YAHOO.CO.UK
carol@PROTONMAIL.CH</textarea>
    <label class="mt-10" ti="label_normalized_emails">Normalized emails</label>
    <textarea id="normalizedEmails" rows="5" readonly></textarea>
    <div class="flex-center">
      <button id="clearBtn" ti="btn_clear">Clear</button>
      <button class="primary" id="copyBtn" ti="btn_copy_normalized">Copy normalized</button>
    </div>
  </div>
</div>

<script>var _LANG={'title_email_normalizer':["Email Normalizer", "电子邮件规范化器"],'metadesc_normalize_email_addresses':["Normalize email addresses by removing dots, plus aliasing, and domain case. Paste multiple emails (one per line) to normalize them all at once.", "通过移除点号、别名和​​域名大小写来规范化电子邮件地址。粘贴多个电子邮件地址（每行一个）即可一次性规范化所有地址。"],'h1_email_normalizer':["Email Normalizer", "电子邮件规范化器"],'subtitle_normalize_email_addresses':["Normalize email addresses — remove dots, plus aliasing, and domain case", "规范化电子邮件地址——移除点号、别名和​​域名大小写"],'btn_clear':["Clear", "清除"],'btn_copy_normalized':["Copy normalized", "复制规范化"],'label_raw_emails_one_per_line':["Raw emails (one per line)", "原始邮件内容（每行一封）"],'label_normalized_emails':["Normalized emails", "规范化电子邮件"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function normalizeEmails(text) {
  if (!text) return '';
  return text.split('\n').map(line => {
    line = line.trim();
    if (!line) return '';
    try {
      return emailNormalizer.normalizeEmail({ email: line });
    } catch(e) {
      return 'Unable to parse: ' + line;
    }
  }).join('\n');
}

function update() {
  const raw = document.getElementById('rawEmails').value;
  document.getElementById('normalizedEmails').value = normalizeEmails(raw);
}

document.getElementById('rawEmails').addEventListener('input', update);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('rawEmails').value = '';
  update();
});
document.getElementById('copyBtn').addEventListener('click', () => {
  const v = document.getElementById('normalizedEmails').value;
  if (v) navigator.clipboard.writeText(v);
});
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
