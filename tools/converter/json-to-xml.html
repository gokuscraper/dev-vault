<!DOCTYPE html>
<html tk="title_json_to_xml_converter" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to XML Converter</title>
<meta name="description" content="Convert JSON data to XML format and back. Supports nested objects, arrays, attributes, and custom root element names.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:680px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#111;color:#ccd;font-family:monospace;font-size:0.85rem;outline:none;resize:vertical;min-height:150px;margin-bottom:8px}
textarea:focus{border-color:#3b82f6}
input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.85rem;outline:none;margin-bottom:8px;font-family:monospace}
input:focus{border-color:#3b82f6}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.tabs{display:flex;gap:2px;margin-bottom:8px}
.tabs button{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;font-size:0.8rem;font-weight:600}
.tabs button.active{background:#161616;color:#fff;border-color:#3b82f6}
.error{color:#ef4444;font-size:0.85rem;margin-top:4px;min-height:20px}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_json_to_xml_converter" ti="h1_json_to_xml_converter">JSON to XML Converter</h1>
  <p class="desc" ti="subtitle_convert_between_json_and">Convert between JSON and XML formats</p>
  <div class="card">
    <div class="tabs">
      <button class="active" data-dir="json2xml" ti="btn_json_xml">JSON → XML</button>
      <button data-dir="xml2json" ti="btn_xml_json">XML → JSON</button>
    </div>
    <div id="rootDiv" style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <label style="min-width:80px;margin:0" ti="label_root_element">Root element</label>
      <input type="text" id="rootName" value="root" style="width:120px;margin:0">
    </div>
    <label ti="label_input">Input</label>
    <textarea id="input" rows="8" spellcheck="false">{
  "name": "John",
  "age": 30,
  "city": "New York",
  "hobbies": ["reading", "coding", "gaming"],
  "address": {
    "street": "123 Main St",
    "zip": 10001
  }
}</textarea>
    <label ti="label_output">Output</label>
    <textarea id="output" rows="8" readonly></textarea>
    <div class="error" id="error"></div>
    <div class="flex-center">
      <button id="convertBtn" ti="btn_convert">Convert</button>
      <button id="copyBtn" ti="btn_copy_output">Copy Output</button>
    </div>
  </div>
</div>

<script>var _LANG={'title_json_to_xml_converter':["JSON to XML Converter", "JSON 转 XML 转换器"],'metadesc_convert_json_data_to_xml':["Convert JSON data to XML format and back. Supports nested objects, arrays, attributes, and custom root element names.", "将 JSON 数据转换为 XML 格式，反之亦然。支持嵌套对象、数组、属性和自定义根元素名称。"],'h1_json_to_xml_converter':["JSON to XML Converter", "JSON 转 XML 转换器"],'subtitle_convert_between_json_and':["Convert between JSON and XML formats", "JSON 和 XML 格式之间的转换"],'btn_json_xml':["JSON → XML", "JSON → XML"],'btn_xml_json':["XML → JSON", "XML → JSON"],'btn_convert':["Convert", "转变"],'btn_copy_output':["Copy Output", "复制输出"],'label_root_element':["Root element", "根元素"],'label_input':["Input", "输入"],'label_output':["Output", "输出"],'jtc_error':["Error:", "错误："],'jtcpre_error':["Error: ", "错误："]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function escapeXml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function jsonToXml(obj, name) {
  if (obj === null || obj === undefined) return `<${name}/>`;
  if (typeof obj !== 'object') return `<${name}>${escapeXml(obj)}</${name}>`;
  if (Array.isArray(obj)) {
    return obj.map(item => {
      if (typeof item === 'object' && item !== null) return jsonToXml(item, name);
      return `<${name}>${escapeXml(item)}</${name}>`;
    }).join('\n');
  }
  let xml = '';
  for (const [key, val] of Object.entries(obj)) {
    xml += jsonToXml(val, key) + '\n';
  }
  return `<${name}>\n${xml.replace(/^/gm, '  ')}\n</${name}>`;
}

function xmlToJson(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const errors = doc.querySelector('parsererror');
  if (errors) throw new Error('Invalid XML: ' + errors.textContent);
  function parse(node) {
    if (node.nodeType === 3) return node.textContent.trim();
    if (node.nodeType !== 1) return null;
    const children = Array.from(node.childNodes).filter(n => n.nodeType === 1 || (n.nodeType === 3 && n.textContent.trim()));
    if (children.length === 0) return '';
    const textOnly = children.every(c => c.nodeType === 3);
    if (textOnly) return children.map(c => c.textContent).join('').trim();
    const result = {};
    for (const child of children) {
      if (child.nodeType !== 1) continue;
      const val = parse(child);
      if (result[child.tagName] === undefined) {
        result[child.tagName] = val;
      } else if (Array.isArray(result[child.tagName])) {
        result[child.tagName].push(val);
      } else {
        result[child.tagName] = [result[child.tagName], val];
      }
    }
    return Object.keys(result).length === 0 ? '' : result;
  }
  return parse(doc.documentElement);
}

let direction = 'json2xml';
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
    document.getElementById('rootDiv').style.display = direction === 'json2xml' ? 'flex' : 'none';
    convert();
  });
});

function convert() {
  const input = document.getElementById('input').value;
  const root = document.getElementById('rootName').value || 'root';
  const error = document.getElementById('error');
  const output = document.getElementById('output');
  error.textContent = '';
  try {
    if (direction === 'json2xml') {
      const obj = JSON.parse(input);
      output.value = '<?xml version="1.0" encoding="UTF-8"?>\n' + jsonToXml(obj, root);
    } else {
      const obj = xmlToJson(input);
      output.value = JSON.stringify(obj, null, 2);
    }
  } catch(e) {
    error.textContent=T("jtcpre_error")+ e.message;
    output.value = '';
  }
}

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').value);
});
document.getElementById('rootName').addEventListener('input', convert);
convert();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
