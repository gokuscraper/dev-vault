<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Validator</title>
<meta name="description" content="Validate and parse IBAN (International Bank Account Number). Check validity, extract country code, BBAN, and friendly format.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:0.95rem;color:#4da6ff;margin-bottom:14px;font-weight:600}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;outline:none;margin-bottom:12px;font-family:monospace}
input:focus{border-color:#3b82f6}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222}
.row:last-child{border-bottom:none}
.rl{color:#888;font-size:0.85rem}
.rv{color:#e6e6e6;font-family:monospace;font-size:0.9rem;text-align:right}
.rv .yes{color:#34d399}
.rv .no{color:#f87171}
.examples{display:flex;flex-direction:column;gap:8px}
.example{font-family:monospace;font-size:0.85rem;color:#aaa;cursor:pointer;padding:4px 8px;border-radius:4px}
.example:hover{background:#1a1a1a;color:#fff}
</style>
</head>
<body>
<div class="container">
  <h1>IBAN Validator</h1>
  <p class="desc">Validate and parse International Bank Account Numbers</p>
  <script src="https://cdn.jsdelivr.net/npm/ibantools@4.5.1/build/ibantools.umd.js"></script>
  <div class="card">
    <input type="text" id="ibanInput" placeholder="Enter an IBAN number..." spellcheck="false">
    <div id="ibanInfo"></div>
  </div>
  <div class="card">
    <h2>Valid IBAN examples</h2>
    <div class="examples">
      <span class="example" data-iban="FR7630006000011234567890189">FR7630006000011234567890189</span>
      <span class="example" data-iban="DE89370400440532013000">DE89370400440532013000</span>
      <span class="example" data-iban="GB29NWBK60161331926819">GB29NWBK60161331926819</span>
    </div>
  </div>
</div>
<script>
const ibanErrorMap = {
  NO_IBAN_PROVIDED: 'No IBAN provided',
  NO_IBAN_COUNTRY: 'No IBAN country',
  WRONG_BBAN_LENGTH: 'Wrong BBAN length',
  WRONG_BBAN_FORMAT: 'Wrong BBAN format',
  CHECKSUM_NOT_NUMBER: 'Checksum is not a number',
  WRONG_IBAN_CHECKSUM: 'Wrong IBAN checksum',
  WRONG_ACCOUNT_BANK_BRANCH_CHECKSUM: 'Wrong account bank branch checksum',
  QR_IBAN_NOT_ALLOWED: 'QR-IBAN not allowed',
};

function update() {
  const raw = document.getElementById('ibanInput').value;
  const info = document.getElementById('ibanInfo');
  const iban = raw.toUpperCase().replace(/\s/g, '').replace(/-/g, '');
  if (!iban) { info.innerHTML = ''; return; }

  const result = ibantools.validateIBAN(iban);
  const ext = ibantools.extractIBAN(iban);
  const isQr = ibantools.isQRIBAN(iban);
  const friendly = ibantools.friendlyFormatIBAN(iban);

  const errors = (result.errorCodes || []).map(c => ibanErrorMap[c] || c).join(', ');

  info.innerHTML = `
    <div class="row"><span class="rl">Valid?</span><span class="rv"><span class="${result.valid ? 'yes' : 'no'}">${result.valid ? 'Yes' : 'No'}</span></span></div>
    ${errors ? `<div class="row"><span class="rl">Errors</span><span class="rv" style="color:#f87171">${errors}</span></div>` : ''}
    <div class="row"><span class="rl">QR-IBAN?</span><span class="rv">${isQr ? 'Yes' : 'No'}</span></div>
    <div class="row"><span class="rl">Country code</span><span class="rv">${ext.countryCode || '—'}</span></div>
    <div class="row"><span class="rl">BBAN</span><span class="rv">${ext.bban || '—'}</span></div>
    <div class="row"><span class="rl">Friendly format</span><span class="rv">${friendly || '—'}</span></div>
  `;
}

document.getElementById('ibanInput').addEventListener('input', update);
document.querySelectorAll('.example').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('ibanInput').value = el.dataset.iban;
    update();
  });
});
</script>
</body>
</html>
