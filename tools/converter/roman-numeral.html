<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Numeral Converter</title>
<meta name="description" content="Convert between Arabic and Roman numerals. Bidirectional, supports 1-3999.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:24px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:0.95rem;color:#4da6ff;margin-bottom:14px;font-weight:600}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:6px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.95rem;outline:none}
input:focus{border-color:#3b82f6}
.result{font-size:1.3rem;color:#fff;font-weight:600;font-family:monospace;text-align:center;padding:12px;background:#0d1520;border-radius:8px;border:1px solid #2a4a7a;margin-top:10px}
.flex{display:flex;gap:10px;align-items:center}
.mt-10{margin-top:10px}
.error{color:#f87171;font-size:0.8rem;margin-top:4px}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600;white-space:nowrap}
button:hover{background:#252525;border-color:#3b82f6}
button:disabled{opacity:.4;cursor:default}
@media(max-width:450px){.flex{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <h1>Roman Numeral Converter</h1>
  <p class="desc">Bidirectional conversion between Arabic and Roman numerals (1 – 3,999)</p>

  <div class="card">
    <h2>Arabic → Roman</h2>
    <label for="arabicInput">Arabic number</label>
    <div class="flex">
      <input type="number" id="arabicInput" min="1" max="3999" value="42" style="flex:1">
      <button id="copyRomanBtn">Copy</button>
    </div>
    <div id="arabicError" class="error"></div>
    <div class="result" id="romanOutput">XLII</div>
  </div>

  <div class="card">
    <h2>Roman → Arabic</h2>
    <label for="romanInput">Roman numeral</label>
    <div class="flex">
      <input type="text" id="romanInput" value="XLII" style="flex:1" spellcheck="false">
      <button id="copyArabicBtn">Copy</button>
    </div>
    <div id="romanError" class="error"></div>
    <div class="result" id="arabicOutput">42</div>
  </div>
</div>
<script>
const lookup = { M:1000, CM:900, D:500, CD:400, C:100, XC:90, L:50, XL:40, X:10, IX:9, V:5, IV:4, I:1 };
const romanRegex = /^M{0,3}(CM|CD|D?C{0,3})(XC|XL|L?X{0,3})(IX|IV|V?I{0,3})$/;
const romanMap = { I:1, V:5, X:10, L:50, C:100, D:500, M:1000 };

function arabicToRoman(num) {
  if (num < 1 || num > 3999 || !Number.isInteger(num)) return '';
  let roman = '';
  for (const i in lookup) {
    while (num >= lookup[i]) { roman += i; num -= lookup[i]; }
  }
  return roman;
}

function isValidRoman(s) { return romanRegex.test(s); }

function romanToArabic(s) {
  if (!isValidRoman(s)) return null;
  return [...s].reduce((r, c, i, a) => romanMap[a[i+1]] > romanMap[c] ? r - romanMap[c] : r + romanMap[c], 0);
}

const arabicInput = document.getElementById('arabicInput');
const romanInput = document.getElementById('romanInput');
const romanOutput = document.getElementById('romanOutput');
const arabicOutput = document.getElementById('arabicOutput');
const arabicError = document.getElementById('arabicError');
const romanError = document.getElementById('romanError');

arabicInput.addEventListener('input', () => {
  const val = parseInt(arabicInput.value, 10);
  if (isNaN(val) || val < 1 || val > 3999) {
    arabicError.textContent = 'Enter a number between 1 and 3,999';
    romanOutput.textContent = '';
  } else {
    arabicError.textContent = '';
    romanOutput.textContent = arabicToRoman(val);
  }
});

romanInput.addEventListener('input', () => {
  const val = romanInput.value.toUpperCase();
  romanInput.value = val;
  if (!val) {
    romanError.textContent = '';
    arabicOutput.textContent = '';
    return;
  }
  if (!isValidRoman(val)) {
    romanError.textContent = 'Invalid Roman numeral';
    arabicOutput.textContent = '';
  } else {
    romanError.textContent = '';
    arabicOutput.textContent = romanToArabic(val);
  }
});

document.getElementById('copyRomanBtn').addEventListener('click', () => {
  const text = romanOutput.textContent;
  if (text) navigator.clipboard.writeText(text);
});
document.getElementById('copyArabicBtn').addEventListener('click', () => {
  const text = arabicOutput.textContent;
  if (text) navigator.clipboard.writeText(text);
});
</script>
</body>
</html>
