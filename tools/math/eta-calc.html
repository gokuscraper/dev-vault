<!DOCTYPE html>
<html tk="title_eta_calculator" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETA Calculator</title>
<meta name="description" content="Estimate completion time based on consumption rate. If you process X units in Y time, how long will N units take?">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:16px}
.example{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:12px 16px;color:#a0c4e8;font-size:0.85rem;margin-bottom:20px;line-height:1.5}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
.row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.row label{min-width:140px}
input,select{padding:8px 12px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.9rem;outline:none}
input:focus,select:focus{border-color:#3b82f6}
input[type=number]{width:120px}
select{width:130px}
.stat{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:16px;text-align:center}
.stat .stat-label{color:#888;font-size:0.8rem;font-weight:600}
.stat .stat-value{color:#4da6ff;font-size:1.5rem;font-weight:700;margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="lb" style="position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:100;font-size:0.75rem"><button class="lb" dl="en" onclick="sL('en')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">EN</button><button class="lb" dl="zh" onclick="sL('zh')" style="padding:3px 8px;border-radius:5px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-weight:600">中</button></div><style>.lb.a{background:#1a2744!important;color:#4da6ff!important;border-color:#2a4a7a!important}</style>

<div class="container" style="position:relative">
  <h1 ti="title_eta_calculator" ti="h1_eta_calculator">ETA Calculator</h1>
  <p class="desc" ti="subtitle_estimate_how_long_a_task">Estimate how long a task will take based on your consumption rate</p>

  <div class="example">Example: If you wash 5 plates in 3 minutes and you have 500 plates to wash, it will take you 5 hours to wash them all.</div>

  <div class="card">
    <div class="row">
      <label ti="label_total_units_to_consume">Total units to consume</label>
      <input type="number" id="unitCount" value="500" min="1">
    </div>
    <div class="row">
      <label ti="label_units_consumed_per_time_s">Units consumed per time span</label>
      <input type="number" id="unitPerSpan" value="5" min="1">
    </div>
    <div class="row">
      <label ti="label_time_span">Time span</label>
      <input type="number" id="timeSpanVal" value="3" min="1">
      <select id="timeSpanUnit">
        <option value="1">milliseconds</option>
        <option value="1000">seconds</option>
        <option value="60000" selected>minutes</option>
        <option value="3600000">hours</option>
        <option value="86400000">days</option>
      </select>
    </div>
  </div>

  <div class="grid-2">
    <div class="stat">
      <div class="stat-label">Total duration</div>
      <div class="stat-value" id="totalDuration">5 hours</div>
    </div>
    <div class="stat">
      <div class="stat-label">Estimated completion</div>
      <div class="stat-value" id="endTime" style="font-size:1rem">--</div>
    </div>
  </div>
</div>

<script>var _LANG={'title_eta_calculator':["ETA Calculator", "预计到达时间计算器"],'metadesc_estimate_completion_time':["Estimate completion time based on consumption rate. If you process X units in Y time, how long will N units take?", "根据消耗率估算完成时间。如果加工 X 个单位需要 Y 时间，那么加工 N 个单位需要多长时间？"],'h1_eta_calculator':["ETA Calculator", "预计到达时间计算器"],'subtitle_estimate_how_long_a_task':["Estimate how long a task will take based on your consumption rate", "根据您的消耗速率估算完成任务所需的时间"],'label_total_units_to_consume':["Total units to consume", "消耗的总单位数"],'label_units_consumed_per_time_s':["Units consumed per time span", "单位时间消耗量"],'label_time_span':["Time span", "时间跨度"]};
</script>

<script>
try{var _l=JSON.parse(localStorage.getItem('_dv_lang')||'""');if(_l!=='zh')_l='en'}catch(e){_l='en'}
var _L=_l;
function T(k){var a=_LANG&&_LANG[k];return a?a[_L==='zh'?1:0]:k}
function sL(l){try{localStorage.setItem('_dv_lang',l)}catch(e){}location.reload()}
</script>
<script>
function formatDuration(ms) {
  const parts = [];
  if (ms >= 86400000) { parts.push(Math.floor(ms/86400000) + ' days'); ms %= 86400000; }
  if (ms >= 3600000) { parts.push(Math.floor(ms/3600000) + ' hours'); ms %= 3600000; }
  if (ms >= 60000) { parts.push(Math.floor(ms/60000) + ' min'); ms %= 60000; }
  if (ms >= 1000) { parts.push(Math.floor(ms/1000) + ' sec'); ms %= 1000; }
  if (ms > 0) parts.push(ms + ' ms');
  return parts.join(' ') || '0 ms';
}

function update() {
  const total = parseFloat(document.getElementById('unitCount').value) || 0;
  const perSpan = parseFloat(document.getElementById('unitPerSpan').value) || 1;
  const spanVal = parseFloat(document.getElementById('timeSpanVal').value) || 1;
  const spanUnit = parseFloat(document.getElementById('timeSpanUnit').value);

  const durationMs = total / (perSpan / (spanVal * spanUnit));
  document.getElementById('totalDuration').textContent = formatDuration(durationMs);

  const end = new Date(Date.now() + durationMs);
  document.getElementById('endTime').textContent = end.toLocaleString();
}

['unitCount','unitPerSpan','timeSpanVal','timeSpanUnit'].forEach(id =>
  document.getElementById(id).addEventListener('input', update));
update();
</script>


<script>
(function(){var L=_L;
if(typeof _LANG==='undefined'){_LANG={}}
document.documentElement.lang=L;
var tk=document.documentElement.getAttribute('tk');if(tk&&_LANG[tk])document.title=T(tk);
document.querySelectorAll('[ti]').forEach(function(e){
  var k=e.getAttribute('ti');if(!k||!_LANG[k])return;
  e.textContent=T(k);
});
document.querySelectorAll('[tp]').forEach(function(e){
  var k=e.getAttribute('tp');if(!k||!_LANG[k])return;
  e.placeholder=T(k);
});
document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('a',b.getAttribute('dl')===L)});
})();
</script>
</body>
</html>
