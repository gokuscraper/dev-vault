<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark Builder</title>
<meta name="description" content="Run and compare JavaScript code snippets. Measure execution time, identify performance bottlenecks, and benchmark implementations side-by-side.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:680px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
.case{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:10px}
.case textarea{width:100%;padding:10px;border-radius:6px;border:1px solid #333;background:#111;color:#ccd;font-family:monospace;font-size:0.85rem;outline:none;resize:vertical;min-height:60px}
.case textarea:focus{border-color:#3b82f6}
.case .label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.case .label-row span{color:#fff;font-weight:600;font-size:0.85rem}
.case .label-row button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.8rem;font-weight:600;padding:2px 6px;border-radius:4px}
.case .label-row button:hover{background:#2a1a1a}
button{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e6e6e6;font-size:0.85rem;cursor:pointer;font-weight:600}
button:hover{background:#252525;border-color:#3b82f6}
button.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
button.primary:hover{background:#2563eb}
button.success{background:#16a34a;color:#fff;border-color:#16a34a}
button.success:hover{background:#15803d}
.flex-center{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.row select{padding:8px 12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:0.85rem;outline:none}
.results-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:0.85rem}
.results-table th,.results-table td{padding:8px 10px;text-align:left;border-bottom:1px solid #222}
.results-table th{color:#888;font-weight:600}
.results-table td{font-family:monospace}
.results-table .fastest{color:#22c55e;font-weight:600}
.results-table .slowest{color:#ef4444}
</style>
</head>
<body>
<div class="container">
  <h1>Benchmark Builder</h1>
  <p class="desc">Compare performance of JavaScript code snippets</p>
  <div class="card">
    <div class="row">
      <label>Iterations</label>
      <select id="iterations">
        <option value="1000">1,000</option>
        <option value="10000" selected>10,000</option>
        <option value="100000">100,000</option>
        <option value="1000000">1,000,000</option>
      </select>
      <button id="addCaseBtn">+ Add Case</button>
    </div>
    <div id="cases"></div>
    <div class="flex-center">
      <button class="primary" id="runBtn">Run Benchmark</button>
      <button id="clearBtn">Clear Results</button>
    </div>
    <div id="results"></div>
  </div>
</div>
<script>
let caseCount = 0;
const container = document.getElementById('cases');

function addCase(code) {
  caseCount++;
  const div = document.createElement('div');
  div.className = 'case';
  div.dataset.index = caseCount;
  div.innerHTML = `
    <div class="label-row">
      <span>Case ${caseCount}</span>
      <button class="remove-btn">×</button>
    </div>
    <textarea rows="3" spellcheck="false">${code || ''}</textarea>
  `;
  div.querySelector('.remove-btn').addEventListener('click', () => {
    div.remove();
  });
  container.appendChild(div);
}

addCase('// Case 1\nlet sum = 0;\nfor (let i = 0; i < 1000; i++) {\n  sum += i;\n}');
addCase('// Case 2\nlet sum = Array.from({length: 1000}, (_, i) => i).reduce((a,b) => a + b, 0);');

document.getElementById('addCaseBtn').addEventListener('click', () => addCase(''));

document.getElementById('runBtn').addEventListener('click', runBenchmark);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('results').innerHTML = '';
});

function runBenchmark() {
  const cases = document.querySelectorAll('.case');
  const iterations = parseInt(document.getElementById('iterations').value);
  const resultsDiv = document.getElementById('results');
  const timings = [];

  if (cases.length < 2) {
    resultsDiv.innerHTML = '<p style="color:#ef4444;margin-top:10px">Add at least 2 cases to compare.</p>';
    return;
  }

  for (const c of cases) {
    const code = c.querySelector('textarea').value;
    try {
      const fn = new Function(code);
      const start = performance.now();
      for (let i = 0; i < iterations; i++) {
        fn();
      }
      const elapsed = performance.now() - start;
      timings.push({ code, elapsed, ops: Math.round(iterations / (elapsed / 1000)) });
    } catch(e) {
      timings.push({ code, elapsed: -1, ops: -1, error: e.message });
    }
  }

  if (timings.length === 0) return;

  const minTime = Math.min(...timings.filter(t => t.elapsed >= 0).map(t => t.elapsed));
  const maxTime = Math.max(...timings.filter(t => t.elapsed >= 0).map(t => t.elapsed));

  let html = '<table class="results-table"><thead><tr><th>Case</th><th>Time (ms)</th><th>Ops/s</th><th>vs Fastest</th></tr></thead><tbody>';
  timings.forEach((t, i) => {
    if (t.error) {
      html += `<tr><td>Case ${i + 1}</td><td colspan="3" style="color:#ef4444">Error: ${t.error}</td></tr>`;
    } else {
      const ratio = t.elapsed / minTime;
      const cls = t.elapsed === minTime ? 'fastest' : (t.elapsed === maxTime ? 'slowest' : '');
      html += `<tr><td>Case ${i + 1}</td><td class="${cls}">${t.elapsed.toFixed(2)}</td><td>${t.ops.toLocaleString()}</td><td>${ratio.toFixed(2)}×</td></tr>`;
    }
  });
  html += '</tbody></table>';
  resultsDiv.innerHTML = html;
}
</script>
</body>
</html>
