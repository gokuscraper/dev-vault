<script>
function update() {
  const expr = document.getElementById('exprInput').value;
  const out = document.getElementById('resultOutput');
  if (!expr.trim()) { out.textContent = ''; return; }
  try {
    const result = math.evaluate(expr);
    out.textContent = typeof result === 'object' ? result.toString() : String(result);
  } catch(e) {
    out.textContent = e.message;
    out.style.color = '#f87171';
    return;
  }
  out.style.color = '#4da6ff';
}

document.getElementById('exprInput').addEventListener('input', update);
document.querySelectorAll('[data-expr]').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('exprInput').value = el.dataset.expr;
    update();
  });
});
update();
</script>
