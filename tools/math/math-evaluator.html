<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Evaluator</title>
<meta name="description" content="Evaluate mathematical expressions with support for sqrt, sin, cos, log, and more. Real-time evaluation using math.js.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh;display:flex;justify-content:center;padding:24px}
.container{max-width:560px;width:100%}
h1{font-size:1.4rem;color:#fff;margin-bottom:6px}
.desc{color:#888;font-size:0.9rem;margin-bottom:20px}
.card{background:#161616;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:4px;font-weight:600}
textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;outline:none;font-family:monospace;resize:none;min-height:50px}
textarea:focus{border-color:#3b82f6}
.result-box{background:#0d1520;border:1px solid #2a4a7a;border-radius:8px;padding:16px;text-align:center;margin-top:12px}
.result-box .label{color:#888;font-size:0.8rem;font-weight:600}
.result-box .value{color:#4da6ff;font-size:1.5rem;font-weight:700;margin-top:4px;word-break:break-all}
.examples{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.examples span{font-family:monospace;font-size:0.85rem;color:#888;cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid #333}
.examples span:hover{background:#1a1a1a;color:#fff;border-color:#3b82f6}
</style>
</head>
<body>
<div class="container">
  <h1>Math Evaluator</h1>
  <p class="desc">Evaluate mathematical expressions in real-time</p>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.3/math.min.js"></script>
  <div class="card">
    <label>Expression</label>
    <textarea id="exprInput" rows="2" spellcheck="false">2 * sqrt(6) + sin(45 deg)</textarea>
    <div class="result-box">
      <div class="label">Result</div>
      <div class="value" id="resultOutput">6.898...</div>
    </div>
    <div class="examples">
      <span data-expr="2 + 2">2+2</span>
      <span data-expr="sqrt(16)">sqrt(16)</span>
      <span data-expr="sin(30 deg)">sin(30°)</span>
      <span data-expr="3^4">3^4</span>
      <span data-expr="log(1000, 10)">log(1000)</span>
      <span data-expr="(2+3)*4">(2+3)*4</span>
      <span data-expr="pi * r^2">πr²</span>
      <span data-expr="45 deg * 2">45°×2</span>
    </div>
  </div>
</div>
<script>
function update() {
  const expr = document.getElementById('exprInput').value;
  const out = document.getElementById('resultOutput');
  if (!expr.trim()) { out.textContent = ''; return; }
  try {
    const result = math.evaluate(expr);
    out.textContent = typeof result === 'object' ? result.toString() : String(result);
  } catch(e) {
    out.textContent = e.message;
    out.style.color = '#f87171';
    return;
  }
  out.style.color = '#4da6ff';
}

document.getElementById('exprInput').addEventListener('input', update);
document.querySelectorAll('[data-expr]').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('exprInput').value = el.dataset.expr;
    update();
  });
});
update();
</script>
</body>
</html>
